<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Participants Management</title>
</head>
<body>
    <div id="participants-page">
        <h1>Participants Management</h1>
        <input type="text" id="search-participant-input" name="search_participant" placeholder="Search participants..." form="participant-search-form" />
        <select id="participant-status-filter" name="status_filter" form="participant-search-form">
            <option value="">All Statuses</option>
            <option value="Registered">Registered</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Attended">Attended</option>
        </select>
        <button form="participant-search-form" type="submit">Search</button>
        <form id="participant-search-form" method="POST" action="{{ url_for('search_participants') }}">
        </form>

        <table id="participants-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Event ID</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in participants %}
                <tr>
                    <td>{{ participant.name }}</td>
                    <td>{{ participant.email }}</td>
                    <td>{{ participant.event_id }}</td>
                    <td>{{ participant.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="add-participant-button">Add Participant</button>
    </div>
</body>
</html>
