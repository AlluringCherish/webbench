<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events Catalog</title>
</head>
<body>
    <div id="events-page">
        <h1>Events Catalog</h1>
        <form method="POST" action="{{ url_for('events_search') }}">
            <input type="text" id="event-search-input" name="search_query" placeholder="Search events..." />
            <select id="event-category-filter" name="category_filter">
                <option value="">All Categories</option>
                <!-- Assuming categories are known; if needed they can be populated dynamically -->
                <option value="Conference">Conference</option>
                <option value="Concert">Concert</option>
                <option value="Sports">Sports</option>
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="events-grid">
            {% for event in events %}
            <div class="event-card">
                <h2>{{ event.event_name }}</h2>
                <p>Category: {{ event.category }}</p>
                <p>Date: {{ event.date }} Time: {{ event.time }}</p>
                <p>Location: {{ event.location }}</p>
                <p>{{ event.description }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details_page', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
