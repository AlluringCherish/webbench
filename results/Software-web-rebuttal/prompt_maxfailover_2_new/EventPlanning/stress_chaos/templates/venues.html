<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <form method="POST" action="{{ url_for('venues_search') }}">
            <input type="text" id="venue-search-input" name="venue_search" placeholder="Search venues..." />
            <select id="venue-capacity-filter" name="capacity_filter">
                <option value="">All Sizes</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card">
                <h2>{{ venue.venue_name }}</h2>
                <p>Location: {{ venue.location }}</p>
                <p>Capacity: {{ venue.capacity }}</p>
                <p>Amenities: {{ venue.amenities }}</p>
                <p>Contact: {{ venue.contact }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
