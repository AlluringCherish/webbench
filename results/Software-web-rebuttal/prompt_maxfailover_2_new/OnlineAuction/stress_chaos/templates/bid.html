<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
<h1>Place Your Bid for {{ auction.title }}</h1>
<form method="POST" action="{{ url_for('submit_bid', auction_id=auction.id) }}">
    <label for="bid_amount">Bid Amount (USD):</label>
    <input type="number" name="bid_amount" id="bid_amount" min="{{ auction.starting_price + 1 }}" required>
    <button type="submit">Submit Bid</button>
</form>
</body>
</html>
