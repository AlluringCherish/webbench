<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Status</title>
</head>
<body>
<h1>Auction Status</h1>
<table border="1">
    <thead>
        <tr><th>Auction</th><th>Status</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for auction in auctions %}
        <tr>
            <td>{{ auction.title }}</td>
            <td>{{ auction.status }}</td>
            <td>
                <button type="button" onclick="location.href='{{ url_for('auction_details', auction_id=auction.id) }}'">View</button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</body>
</html>
