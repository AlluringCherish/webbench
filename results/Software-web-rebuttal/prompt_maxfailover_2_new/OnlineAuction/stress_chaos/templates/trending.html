<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
<h1>Trending Auctions</h1>
<ul>
    {% for auction in trending_auctions %}
    <li>
        <a href="{{ url_for('auction_details', auction_id=auction.id) }}">{{ auction.title }}</a> - {{ auction.current_price }} USD
    </li>
    {% endfor %}
</ul>
</body>
</html>
