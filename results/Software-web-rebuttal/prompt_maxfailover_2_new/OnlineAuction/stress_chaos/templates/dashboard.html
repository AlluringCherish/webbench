<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
</head>
<body>
<h1>Dashboard</h1>
<ul>
    {% for auction in user_auctions %}
    <li>
        {{ auction.title }} - Status: {{ auction.status }}
        <button type="button" onclick="location.href='{{ url_for('auction_details', auction_id=auction.id) }}'">View Details</button>
    </li>
    {% endfor %}
</ul>
</body>
</html>
