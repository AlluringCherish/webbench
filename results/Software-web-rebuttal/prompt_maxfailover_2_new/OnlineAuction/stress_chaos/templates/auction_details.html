<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Details</title>
</head>
<body>
<h1>{{ auction.title }}</h1>
<p>Description: {{ auction.description }}</p>
<p>Starting Price: {{ auction.starting_price }} USD</p>
<h2>Bids</h2>
<ul>
    {% for bid in bids %}
    <li>{{ bid.bidder_name }}: ${{ bid.amount }}</li>
    {% endfor %}
</ul>
<a href="{{ url_for('bid', auction_id=auction.id) }}">Place a Bid</a>
</body>
</html>
