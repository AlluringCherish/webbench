<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Workout Records</title>
</head>
<body>
  <div id="workouts-page">
    <label for="filter-by-type">Filter by Workout Type:</label>
    <select id="filter-by-type">
      <option value="Class">Class</option>
      <option value="PT Session">PT Session</option>
      <option value="Personal">Personal</option>
    </select>
    <table id="workouts-table">
      <thead>
        <tr>
          <th>Member Name</th>
          <th>Workout Type</th>
          <th>Workout Date</th>
          <th>Duration (minutes)</th>
          <th>Calories Burned</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        {% for workout in workouts %}
        <tr>
          <td>{{ workout.member_name }}</td>
          <td>{{ workout.workout_type }}</td>
          <td>{{ workout.workout_date }}</td>
          <td>{{ workout.duration_minutes }}</td>
          <td>{{ workout.calories_burned }}</td>
          <td>{{ workout.notes }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button id="log-workout-button" onclick="location.href='{{ url_for('log_workout_page') }}'">Log Workout</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
