<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Class Schedule</title>
</head>
<body>
  <div id="schedule-page">
    <input id="schedule-search" type="text" placeholder="Search classes by name or trainer" />
    <select id="schedule-filter">
      <option>Yoga</option>
      <option>CrossFit</option>
      <option>Pilates</option>
      <option>Boxing</option>
    </select>
    <div id="classes-grid">
      {% for class in classes %}
      <div class="class-card">
        <h3>{{ class.class_name }}</h3>
        <p>Trainer ID: {{ class.trainer_id }}</p>
        <p>Type: {{ class.class_type }}</p>
        <p>Day: {{ class.schedule_day }}</p>
        <p>Time: {{ class.schedule_time }}</p>
        <p>Capacity: {{ class.capacity }}</p>
        <p>Duration: {{ class.duration }} minutes</p>
        <button id="enroll-class-button-{{ class.class_id }}">Enroll in Class</button>
      </div>
      {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
