<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trainer Profile</title>
</head>
<body>
  <div id="trainer-detail-page">
    <h1 id="trainer-name">{{ trainer.name }}</h1>
    <div id="trainer-certifications">{{ trainer.certifications }}</div>
    <div id="trainer-bio">{{ trainer.bio }}</div>
    <button id="book-session-button">Book a Session</button>
    <div id="trainer-reviews">
      {% if reviews|length > 0 %}
      {% for review in reviews %}
      <div class="review">
        <strong>{{ review.name }}</strong>: {{ review.comment }}
      </div>
      {% endfor %}
      {% else %}
      <p>No reviews available.</p>
      {% endif %}
    </div>
    <button id="back-to-profiles" onclick="location.href='{{ url_for('trainer_profiles_page') }}'">Back to Profiles</button>
  </div>
</body>
</html>
