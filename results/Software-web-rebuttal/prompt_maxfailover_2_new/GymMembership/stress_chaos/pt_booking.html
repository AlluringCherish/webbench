<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Personal Training</title>
</head>
<body>
  <div id="booking-page">
    <form method="POST">
      <label for="select-trainer">Select Trainer:</label>
      <select id="select-trainer" name="select-trainer">
        {% for trainer in trainers %}
        <option value="{{ trainer.trainer_id }}">{{ trainer.name }}</option>
        {% endfor %}
      </select>
      <label for="session-date">Session Date:</label>
      <input type="date" id="session-date" name="session-date" required>
      <label for="session-time">Session Time:</label>
      <select id="session-time" name="session-time">
        <option value="08:00">08:00</option>
        <option value="10:00">10:00</option>
        <option value="12:00">12:00</option>
        <option value="14:00">14:00</option>
      </select>
      <label for="session-duration">Session Duration (minutes):</label>
      <select id="session-duration" name="session-duration">
        <option value="30">30</option>
        <option value="60">60</option>
        <option value="90">90</option>
      </select>
      <button id="confirm-booking-button" type="submit">Confirm Booking</button>
    </form>
    <div id="booking-result">{{ booking_result }}</div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
