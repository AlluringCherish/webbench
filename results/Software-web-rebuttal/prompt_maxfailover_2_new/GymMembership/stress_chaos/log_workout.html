<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log Workout</title>
</head>
<body>
  <div id="log-workout-page">
    <form method="POST">
      <label for="workout-type">Workout Type:</label>
      <select id="workout-type" name="workout-type">
        <option value="Cardio">Cardio</option>
        <option value="Strength">Strength</option>
        <option value="Flexibility">Flexibility</option>
        <option value="Sports">Sports</option>
      </select>
      <label for="workout-duration">Duration (minutes):</label>
      <input type="number" id="workout-duration" name="workout-duration" required>
      <label for="calories-burned">Calories Burned:</label>
      <input type="number" id="calories-burned" name="calories-burned">
      <label for="workout-notes">Notes:</label>
      <textarea id="workout-notes" name="workout-notes"></textarea>
      <button id="submit-workout-button" type="submit">Submit</button>
    </form>
    <div id="submission-result">{{ submission_result }}</div>
    <button id="back-to-workouts" onclick="location.href='{{ url_for('workout_records_page') }}'">Back to Workouts</button>
  </div>
</body>
</html>
