<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trainer Profiles</title>
</head>
<body>
  <div id="trainers-page">
    <input id="trainer-search" type="text" placeholder="Search trainers by name or specialty" />
    <select id="specialty-filter">
      <option>Strength</option>
      <option>Cardio</option>
      <option>Flexibility</option>
      <option>Weight Loss</option>
    </select>
    <div id="trainers-grid">
      {% for trainer in trainers %}
      <div class="trainer-card">
        <h3>{{ trainer.name }}</h3>
        <p>Specialty: {{ trainer.specialty }}</p>
        <p>Certifications: {{ trainer.certifications }}</p>
        <p>Experience: {{ trainer.experience_years }} years</p>
        <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="location.href='{{ url_for('trainer_detail_page', trainer_id=trainer.trainer_id) }}'">View Profile</button>
      </div>
      {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
