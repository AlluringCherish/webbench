<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Plan Details</title>
</head>
<body>
  <div id="plan-details-page">
    <h1 id="plan-title">{{ plan.plan_name }}</h1>
    <div id="plan-price">${{ plan.price }} {{ plan.billing_cycle }}</div>
    <div id="plan-features">{{ plan.features }}</div>
    <button id="enroll-plan-button">Enroll Plan</button>
    <div id="plan-reviews">
      {% if reviews|length > 0 %}
      {% for review in reviews %}
      <div class="review">
        <strong>{{ review.name }}</strong>: {{ review.comment }}
      </div>
      {% endfor %}
      {% else %}
      <p>No reviews available.</p>
      {% endif %}
    </div>
    <button id="back-to-memberships" onclick="location.href='{{ url_for('memberships_page') }}'">Back to Memberships</button>
  </div>
</body>
</html>
