<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <h1>Waitlist</h1>
        <form method="POST" action="{{ url_for('waitlist_page') }}">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="party_size" required>
                {% for size in range(1,11) %}
                    <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>
            <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        </form>

        <div id="user-position">
            {% if user_position is not none %}
                Your waitlist position: {{ user_position }}
            {% else %}
                You are not currently on the waitlist.
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
