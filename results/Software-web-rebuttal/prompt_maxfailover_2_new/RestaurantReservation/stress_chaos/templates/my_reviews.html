<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>My Reviews</h1>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <h2>Dish: {{ review.dish_name }}</h2>
                <p>Rating: {{ review.rating }}</p>
                <p>{{ review.review_text }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review_page') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
