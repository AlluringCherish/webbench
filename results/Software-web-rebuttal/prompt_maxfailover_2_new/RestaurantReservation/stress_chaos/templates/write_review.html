<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review</h1>
        <form method="POST" action="{{ url_for('write_review_page') }}">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id" required>
                {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                {% for r in range(1,6) %}
                <option value="{{ r }}">{{ r }}</option>
                {% endfor %}
            </select>

            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" required></textarea>

            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews_page') }}'">Back to Reviews</button>
    </div>
</body>
</html>
