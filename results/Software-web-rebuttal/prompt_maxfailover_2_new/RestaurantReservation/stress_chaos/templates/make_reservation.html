<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <div id="reservation-page">
        <h1>Make Reservation</h1>
        <form method="POST" action="{{ url_for('make_reservation_page') }}">
            <label for="guest-name">Guest Name:</label>
            <input id="guest-name" type="text" name="guest_name" required>

            <label for="party-size">Party Size:</label>
            <select id="party-size" name="party_size" required>
                {% for size in range(1, 11) %}
                    <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>

            <label for="reservation-date">Reservation Date:</label>
            <input id="reservation-date" type="date" name="reservation_date" required>

            <button id="submit-reservation-button" type="submit">Submit Reservation</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
