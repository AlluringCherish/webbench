<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <form method="POST" action="{{ url_for('profile_page') }}">
            <div id="profile-username">{{ username }}</div>

            <label for="profile-email">Email:</label>
            <input id="profile-email" type="email" name="email" value="{{ email }}" required>

            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
