<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <h1>Restaurant Menu</h1>
        <div id="menu-grid">
            {% for dish in menus %}
            <div class="menu-item">
                <h2>{{ dish.name }}</h2>
                <p>Category: {{ dish.category }}</p>
                <p>Price: ${{ '%.2f'|format(dish.price) }}</p>
                <p>{{ dish.description }}</p>
                <button id="view-dish-button-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_details_page', dish_id=dish.dish_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
