<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <h1 id="restaurant-name">Restaurant Menu</h1>
        <div id="restaurant-info">
            <p>Address: {{ restaurant.address }}</p>
            <p>Phone: {{ restaurant.phone }}</p>
            <p>Rating: {{ restaurant.rating }}</p>
        </div>
        <h1 id="restaurant-name">{{ restaurant.name }}</h1>
        <div id="menu-items-grid">
            {% for item in menu_items %}
            <div class="menu-item" id="menu-item-{{ item.item_id }}">
                <h2>{{ item.item_name }}</h2>
                <p>{{ item.description }}</p>
                <p>Price: {{ item.price }}</p>
                <input type="number" id="quantity-input-{{ item.item_id }}" name="quantity" min="1" value="1">
                <button id="add-to-cart-button-{{ item.item_id }}">Add to Cart</button>
                <a href="{{ url_for('item_details_page', item_id=item.item_id) }}">
                    <button id="view-item-details-{{ item.item_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
