<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <form method="POST" action="{{ url_for('shopping_cart') }}">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr id="cart-item-{{ item.cart_id }}">
                        <td>{{ item.item_name }}</td>
                        <td><input type="number" id="update-quantity-{{ item.cart_id }}" name="quantity_{{ item.cart_id }}" min="1" value="{{ item.quantity }}"></td>
                        <td>{{ item.price }}</td>
                        <td><button id="remove-item-button-{{ item.cart_id }}" name="remove_{{ item.cart_id }}" value="1">Remove</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div id="total-amount">Total: {{ total_amount }}</div>
            <button id="proceed-checkout-button" type="submit">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
