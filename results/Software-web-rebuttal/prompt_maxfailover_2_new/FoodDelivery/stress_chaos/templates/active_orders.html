<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <h1>Active Orders</h1>
        <select id="status-filter">
            <option value="all">All</option>
            <option value="Preparing">Preparing</option>
            <option value="On the Way">On the Way</option>
            <option value="Delivered">Delivered</option>
        </select>
        <div id="orders-list">
            {% for order in active_orders %}
            <div class="order-card" id="order-{{ order.order_id }}">
                <p>Order ID: {{ order.order_id }}</p>
                <p>Status: {{ order.status }}</p>
                <p>Estimated Time: {{ order.estimated_time if order.estimated_time else 'N/A' }}</p>
                <a href="{{ url_for('order_tracking', order_id=order.order_id) }}">
                    <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
