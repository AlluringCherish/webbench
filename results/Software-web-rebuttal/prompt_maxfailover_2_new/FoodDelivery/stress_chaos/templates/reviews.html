<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Order Reviews</h1>
        <select id="filter-by-rating">
            <option value="all">All Ratings</option>
            <option value="5">5 Stars</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
        </select>
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review" id="review-{{ review.review_id }}">
                <p>Customer: {{ review.customer_name }}</p>
                <p>Rating: {{ review.rating }}</p>
                <p>{{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('write_review_page') }}">
            <button id="write-review-button">Write Review</button>
        </a>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
