<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Vehicle Details</title>
</head>
<body>
<div id="vehicle-details-page">
    <h1 id="vehicle-name">{{ vehicle.make }} {{ vehicle.model }}</h1>
    <div id="vehicle-specs">
        <p>Type: {{ vehicle.vehicle_type }}</p>
        <p>Seats: {{ vehicle.seats }}</p>
        <p>Transmission: {{ vehicle.transmission }}</p>
        <p>Fuel Type: {{ vehicle.fuel_type }}</p>
    </div>
    <div id="daily-rate">
        <p>Daily Rate: ${{ "%.2f"|format(vehicle.daily_rate) }}</p>
    </div>

    <form method="GET" action="{{ url_for('booking') }}">
        <input type="hidden" name="vehicle_id" value="{{ vehicle.vehicle_id }}" />
        <button id="book-now-button" type="submit">Book Now</button>
    </form>

    <div id="vehicle-reviews">
        <!-- Customer reviews will be displayed here -->
    </div>
</div>
</body>
</html>
