<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body>
    <h1>Location Details</h1>
    <div id="location-detail" >
        <h2>{{ location.city }}</h2>
        <p>Address: {{ location.address }}</p>
        <p>Phone: {{ location.phone }}</p>
        <p>Hours: {{ location.hours }}</p>
        <p>Available Vehicles: {{ location.available_vehicles }}</p>
    </div>
    <a href="{{ url_for('locations_page') }}" id="back-to-locations">Back to Locations</a>
</body>
</html>
