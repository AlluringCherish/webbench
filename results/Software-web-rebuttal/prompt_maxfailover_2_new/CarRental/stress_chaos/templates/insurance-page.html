<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Select Insurance Coverage</title>
</head>
<body>
<div id="insurance-page">
    <h1>Select Insurance Coverage</h1>
    <form method="POST" action="{{ url_for('insurance_options') }}">
        <div id="insurance-options">
            {% for plan in insurance_plans %}
            <div>
                <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="insurance_id" value="{{ plan.insurance_id }}" {% if selected_plan and selected_plan.insurance_id == plan.insurance_id %}checked{% endif %} />
                <label for="select-insurance-{{ plan.insurance_id }}">{{ plan.plan_name }} - ${{ "%.2f"|format(plan.daily_cost) }} per day</label>
                <div id="insurance-description">
                    <p>{{ plan.description }}</p>
                </div>
                <div id="insurance-price">
                    <p>Coverage Limit: {{ plan.coverage_limit }}</p>
                    <p>Deductible: ${{ plan.deductible }}</p>
                </div>
            </div>
            {% endfor %}
        </div>

        <button id="confirm-booking-button" type="submit">Confirm Booking</button>
    </form>
</div>
</body>
</html>
