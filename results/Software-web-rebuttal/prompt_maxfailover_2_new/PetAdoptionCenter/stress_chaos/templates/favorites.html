<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>

        <div id="favorites-grid">
            {% if favorite_pets %}
                <ul style="list-style: none; padding: 0;">
                {% for pet in favorite_pets %}
                    <li id="favorite-pet-{{ pet.pet_id }}">
                        <strong>{{ pet.name }}</strong> - {{ pet.species }}, {{ pet.age }}
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>You have no favorite pets.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
