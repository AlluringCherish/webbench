<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
    <div id="company-profile-page">
        <h1>Company Profile</h1>

        <div id="company-info">
            <h2>{{ company.company_name }}</h2>
            <p>Industry: {{ company.industry }}</p>
            <p>Location: {{ company.location }}</p>
            <p>{{ company.description }}</p>
        </div>

        <div id="company-jobs">
            <h3>Open Jobs</h3>
            <div id="jobs-list">
                {% for job in jobs %}
                <div class="job-listing">
                    <span>{{ job.title }}</span> - <span>{{ job.status if job.status is defined else "Open" }}</span>
                    <a href="{{ url_for('job_details_page', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Job</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

        <a href="{{ url_for('companies_directory_page') }}">
            <button id="back-to-companies">Back to Companies</button>
        </a>
    </div>
</body>
</html>
