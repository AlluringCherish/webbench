<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>

        <form method="get" action="">
            <input type="text" id="search-company-input" name="search_query" value="{{ search_query }}" placeholder="Search companies or industries">
            <button type="submit">Search</button>
        </form>

        <div id="companies-list">
            {% for company in companies %}
            <div class="company-card">
                <h3>{{ company.company_name }}</h3>
                <p>Industry: {{ company.industry }}</p>
                <p>Location: {{ company.location }}</p>
                <a href="{{ url_for('company_profile_page', company_id=company.company_id) }}">
                    <button id="view-company-button-{{ company.company_id }}">View Company</button>
                </a>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
