<!DOCTYPE html>
<html lang="en">
<head>
    <title>Select Showtime</title>
</head>
<body>
    <div id="showtime-page">
        <h1>Select Showtime</h1>
        <select id="theater-filter" name="theater_filter">
            <option value="">All Theaters</option>
            {% for theater in theaters %}
            <option value="{{ theater.theater_id }}" {% if filters.theater_filter == theater.theater_id %}selected{% endif %}>{{ theater.theater_name }}</option>
            {% endfor %}
        </select>
        <input type="date" id="date-filter" name="date_filter" value="{{ filters.date_filter }}">
        <div id="showtimes-list">
            {% for showtime in showtimes %}
            <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">
                {{ showtime.showtime_date }} {{ showtime.showtime_time }} - ${{ showtime.price }}
            </button>
            {% endfor %}
        </div>
    </div>
</body>
</html>
