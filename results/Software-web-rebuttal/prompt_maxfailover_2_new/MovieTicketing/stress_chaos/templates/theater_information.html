<!DOCTYPE html>
<html lang="en">
<head>
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>
        <select id="theater-location-filter" name="location_filter">
            <option value="">All Locations</option>
            {% for location in locations %}
            <option value="{{ location }}" {% if location_filter == location %}selected{% endif %}>{{ location }}</option>
            {% endfor %}
        </select>
        <div id="theaters-list">
            {% for theater in theaters %}
            <div>{{ theater.theater_name }} - {{ theater.location }}, {{ theater.city }}</div>
            {% endfor %}
        </div>
        <div id="facilities-display">
            {% if selected_theater %}
            <p>{{ selected_theater.facilities }}</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
