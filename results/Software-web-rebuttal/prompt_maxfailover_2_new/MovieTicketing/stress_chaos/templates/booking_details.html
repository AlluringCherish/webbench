<!DOCTYPE html>
<html lang="en">
<head>
    <title>Booking Details</title>
</head>
<body>
    <div id="booking-details-page">
        <h1>Booking Details</h1>
        <div id="booking-info">
            <p>Booking ID: {{ booking.booking_id }}</p>
            <p>Movie Title: {{ booking.movie_title }}</p>
            <p>Showtime Date: {{ booking.showtime_date }}</p>
            <p>Showtime Time: {{ booking.showtime_time }}</p>
            <p>Theater: {{ booking.theater_name }}</p>
            <p>Seats: {{ booking.seats | join(', ') }}</p>
            <p>Status: {{ booking.status }}</p>
        </div>
        <button id="back-to-bookings" onclick="location.href='{{ url_for('booking_history') }}'">Back to Bookings</button>
    </div>
</body>
</html>
