<!DOCTYPE html>
<html lang="en">
<head>
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="booking-summary">
            <p>Movie Title: {{ booking_summary.movie_title }}</p>
            <p>Date: {{ booking_summary.showtime_date }}</p>
            <p>Time: {{ booking_summary.showtime_time }}</p>
            <p>Theater: {{ booking_summary.theater_name }}</p>
            <p>Seats: {{ booking_summary.seats | join(', ') }}</p>
            <p>Total Price: ${{ booking_summary.total_price }}</p>
        </div>
        <form method="post" action="{{ url_for('confirm_booking') }}">
            <label for="customer-name">Name:</label>
            <input id="customer-name" name="customer_name" type="text" required>
            <label for="customer-email">Email:</label>
            <input id="customer-email" name="customer_email" type="email" required>
            <button id="confirm-booking-button" type="submit">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
