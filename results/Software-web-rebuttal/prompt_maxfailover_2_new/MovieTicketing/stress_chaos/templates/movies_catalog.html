<!DOCTYPE html>
<html lang="en">
<head>
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <input type="text" id="search-input" name="search" placeholder="Search by title or genre">
        <select id="genre-filter" name="genre_filter">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}">{{ genre }}</option>
            {% endfor %}
        </select>
        <div id="movies-grid">
            {% for movie in movies %}
            <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">{{ movie.title }} ({{ movie.genre }}) - Rating: {{ movie.rating }}</button>
            {% endfor %}
        </div>
    </div>
</body>
</html>
