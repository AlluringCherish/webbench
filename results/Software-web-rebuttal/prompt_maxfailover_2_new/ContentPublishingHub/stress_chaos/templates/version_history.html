<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - ContentPublishingHub</title>
</head>
<body>
    <div id="version-history-page">
        <h1>Version History for Article {{ article_id }}</h1>

        <div id="versions-list">
            <ul>
                {% for version in versions %}
                <li id="version-{{ version.version_number }}" {% if version.version_number == current_version_id %}style="font-weight:bold;"{% endif %}>
                    Version {{ version.version_number }} - {{ version.timestamp }}<br>
                    Author: {{ version.author }}<br>
                    Summary: {{ version.change_summary }}
                </li>
                {% endfor %}
            </ul>
        </div>

        <button onclick="window.location.href='{{ url_for('edit_article', article_id=article_id) }}'" id="back-to-edit-article-button">Back to Edit Article</button>
        <button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard-button">Back to Dashboard</button>
    </div>
</body>
</html>
