<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>

        <form method="get" id="filter-form">
            <label for="status-filter">Filter by Status:</label>
            <select name="status" id="status-filter" onchange="document.getElementById('filter-form').submit()">
                <option value="" {% if not filter_status %}selected{% endif %}>All</option>
                <option value="draft" {% if filter_status == 'draft' %}selected{% endif %}>Draft</option>
                <option value="submitted" {% if filter_status == 'submitted' %}selected{% endif %}>Submitted</option>
                <option value="approved" {% if filter_status == 'approved' %}selected{% endif %}>Approved</option>
                <option value="published" {% if filter_status == 'published' %}selected{% endif %}>Published</option>
            </select>
        </form>

        <ul id="my-articles-list">
            {% for article in articles %}
            <li id="article-{{ article.article_id }}">
                <strong>{{ article.title }}</strong> - Status: {{ article.status }}
                <button onclick="window.location.href='{{ url_for('edit_article', article_id=article.article_id) }}'" id="edit-article-{{ article.article_id }}">Edit</button>
                <button onclick="window.location.href='{{ url_for('version_history', article_id=article.article_id) }}'" id="view-versions-{{ article.article_id }}">Versions</button>
                <button onclick="window.location.href='{{ url_for('article_analytics', article_id=article.article_id) }}'" id="view-analytics-{{ article.article_id }}">Analytics</button>
            </li>
            {% else %}
            <li>No articles found.</li>
            {% endfor %}
        </ul>

        <button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard-button">Back to Dashboard</button>
    </div>
</body>
</html>
