<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ContentPublishingHub</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>
        <p>Welcome, {{ username }}!</p>

        <section id="quick-stats">
            <h2>Quick Stats</h2>
            <ul>
                {% for stat_key, stat_value in quick_stats.items() %}
                <li id="stat-{{ stat_key|replace(' ', '-')}}">{{ stat_key }}: {{ stat_value }}</li>
                {% endfor %}
            </ul>
        </section>

        <section id="recent-activity">
            <h2>Recent Activity</h2>
            <ul>
                {% for activity in recent_activity %}
                <li id="activity-{{ loop.index }}">{{ activity }}</li>
                {% endfor %}
            </ul>
        </section>

        <nav id="dashboard-navigation">
            <button onclick="window.location.href='{{ url_for('create_article_route') }}'" id="create-article-button">Create New Article</button>
            <button onclick="window.location.href='{{ url_for('my_articles') }}'" id="my-articles-button">My Articles</button>
            <button onclick="window.location.href='{{ url_for('published_articles') }}'" id="published-articles-button">Published Articles</button>
            <button onclick="window.location.href='{{ url_for('content_calendar') }}'" id="calendar-button">Content Calendar</button>
            <button onclick="window.location.href='{{ url_for('article_analytics', article_id=0) }}'" id="analytics-button">Article Analytics</button>
        </nav>
    </div>
</body>
</html>
