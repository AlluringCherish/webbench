<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>

        {% if errors %}
        <div id="error-messages">
            <ul>
                {% for error in errors.values() %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        {% if success_message %}
        <div id="success-message">
            <p>{{ success_message }}</p>
        </div>
        {% endif %}

        <form action="{{ url_for('edit_article', article_id=article.article_id) }}" method="post" id="edit-article-form">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ form_data.title }}" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="10" cols="50" required>{{ form_data.content }}</textarea><br><br>

            <label for="change-summary">Change Summary:</label><br>
            <input type="text" id="change-summary" name="change_summary" value="{{ form_data.change_summary }}"><br><br>

            <button type="submit" id="submit-edit-article">Save Changes</button>
        </form>

        <button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard-button">Back to Dashboard</button>
    </div>
</body>
</html>
