<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>

        {% if errors %}
        <div id="error-messages">
            <ul>
                {% for error in errors.values() %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}

        {% if success_message %}
        <div id="success-message">
            <p>{{ success_message }}</p>
        </div>
        {% endif %}

        <form action="{{ url_for('create_article_route') }}" method="post" id="create-article-form">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ form_data.title or '' }}" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="10" cols="50" required>{{ form_data.content or '' }}</textarea><br><br>

            <button type="submit" id="submit-create-article">Create Article</button>
        </form>

        <button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard-button">Back to Dashboard</button>
    </div>
</body>
</html>
