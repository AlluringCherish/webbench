<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <div id="book-info-display">
            <p><strong>Title:</strong> {{ book.title }}</p>
            <p><strong>Author:</strong> {{ book.author }}</p>
        </div>

        <form method="POST" action="{{ url_for('submit_review', book_id=book.book_id) }}">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for r in range(1,6) %}
                    <option value="{{ r }}" {% if existing_review and existing_review.rating == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
            <br />

            <label for="review-text">Review:</label>
            <br />
            <textarea id="review-text" name="review_text" rows="5" cols="40">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea>
            <br />

            <button id="submit-review-button" type="submit">Submit Review</button>
            <button id="back-to-book" type="button" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
        </form>
    </div>
</body>
</html>
