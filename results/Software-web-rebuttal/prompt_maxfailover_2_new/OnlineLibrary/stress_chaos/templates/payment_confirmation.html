<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">
            <p>Fine Amount: ${{ "%.2f"|format(fine.amount) }}</p>
            <p>Status: {{ fine.status }}</p>
        </div>

        <form method="POST" action="{{ url_for('confirm_payment', fine_id=fine.fine_id) }}">
            <button id="confirm-payment-button" type="submit" {% if fine.status == 'Paid' %}disabled{% endif %}>Confirm Payment</button>
            <button id="back-to-profile" type="button" onclick="window.location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
        </form>
    </div>
</body>
</html>
