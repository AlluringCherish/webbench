<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div id="profile-username">
            <p>Username: {{ username }}</p>
        </div>

        <form method="POST" action="{{ url_for('update_profile') }}">
            <label for="profile-email">Email:</label>
            <input type="text" id="profile-email" name="email" value="{{ email }}" />
            <br />
            <label for="profile-phone">Phone:</label>
            <input type="text" id="profile-phone" name="phone" value="{{ phone }}" disabled />
            <br />
            <label for="profile-address">Address:</label>
            <input type="text" id="profile-address" name="address" value="{{ address }}" disabled />
            <br />
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>

        <div id="borrow-history">
            <h2>Borrow History</h2>
            <ul>
                {% for record in borrow_history %}
                <li>
                    {{ record.title }} (Borrowed: {{ record.borrow_date }}, Returned: {% if record.return_date %}{{ record.return_date }}{% else %}Not Returned{% endif %})
                </li>
                {% endfor %}
            </ul>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
