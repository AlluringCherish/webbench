<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item" id="review-{{ review.review_id }}">
                <h3>{{ review.title }}</h3>
                <p>Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
                <button id="edit-review-button-{{ review.review_id }}" onclick="window.location.href='{{ url_for('write_review', book_id=review.book_id) }}'">Edit Review</button>
                <form method="POST" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                    <button type="submit" id="delete-review-button-{{ review.review_id }}">Delete Review</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
