<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ username }}!</h1>

        {% if featured_books and featured_books|length > 0 %}
        <section id="featured-books">
            <h2>Featured Books</h2>
            <ul>
                {% for book in featured_books %}
                <li>{{ book.title }} by {{ book.author }}</li>
                {% endfor %}
            </ul>
        </section>
        {% endif %}

        <button id="browse-books-button" onclick="window.location.href='{{ url_for('book_catalog') }}'">Browse Books</button>
        <button id="my-borrows-button" onclick="window.location.href='{{ url_for('my_borrowings') }}'">My Borrowings</button>
    </div>
</body>
</html>
