<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>
        <div id="favorites-list">
            {% for property in favorites %}
            <div class="favorite-property">
                <h2>{{ property.address }}</h2>
                <p>Price: ${{ "{:.2f}"|format(property.price) }}</p>
                <p>Type: {{ property.property_type }}</p>
                <p>Bedrooms: {{ property.bedrooms }}</p>
                <p>Bathrooms: {{ property.bathrooms }}</p>
                <p>Square Feet: {{ property.square_feet }}</p>
                <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View</button>
                </a>
                <form method="POST" action="{{ url_for('remove_favorite', property_id=property.property_id) }}" style="display:inline;">
                    <button id="remove-from-favorites-button-{{ property.property_id }}" type="submit">Remove</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
