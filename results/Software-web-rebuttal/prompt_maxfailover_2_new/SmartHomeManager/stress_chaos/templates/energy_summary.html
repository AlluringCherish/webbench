<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Summary</title>
</head>
<body>
    <h1>Energy Summary</h1>
    <table id="energy-table" border="1">
        <thead>
            <tr>
                <th>Username</th><th>Date</th><th>Device ID</th><th>Consumption (kWh)</th>
            </tr>
        </thead>
        <tbody>
            {% for log in energy_logs %}
            <tr>
                <td>{{ log.username }}</td>
                <td>{{ log.date }}</td>
                <td>{{ log.device_id }}</td>
                <td>{{ log.consumption_kwh }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
