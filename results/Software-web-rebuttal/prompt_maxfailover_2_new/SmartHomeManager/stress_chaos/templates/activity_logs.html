<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <h1>Activity Logs</h1>
    <form method="get" action="{{ url_for('activity_logs') }}">
        <label for="date-filter">Filter by Date:</label>
        <input type="date" id="date-filter" name="date_filter" value="{{ date_filter }}" />
        <button id="apply-filter-button" type="submit">Apply Filter</button>
    </form>
    <table id="activity-table" border="1">
        <thead>
            <tr>
                <th>Username</th><th>Timestamp</th><th>Device ID</th><th>Action</th><th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for activity in activities %}
            <tr>
                <td>{{ activity.username }}</td>
                <td>{{ activity.timestamp }}</td>
                <td>{{ activity.device_id }}</td>
                <td>{{ activity.action }}</td>
                <td>{{ activity.details }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
