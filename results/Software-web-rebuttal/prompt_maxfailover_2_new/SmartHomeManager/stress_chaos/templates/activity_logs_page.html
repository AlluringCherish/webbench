<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <div id="activity-page">
        <h1>Activity Logs</h1>

        <form method="GET" action="{{ url_for('activity_logs') }}">
            <label for="search-activity">Search:</label>
            <input type="text" id="search-activity" name="search_filter" value="{{ search_filter }}">
            <button type="submit" id="apply-search-button">Apply Search</button>
        </form>

        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for activity in activities %}
                <tr>
                    <td>{{ activity.timestamp }}</td>
                    <td>{{ activity.device_name }}</td>
                    <td>{{ activity.action }}</td>
                    <td>{{ activity.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
