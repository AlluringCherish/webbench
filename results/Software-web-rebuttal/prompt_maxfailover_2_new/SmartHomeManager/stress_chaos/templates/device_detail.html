<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Details - {{ device.device_name }}</title>
</head>
<body>
    <h1>Device Details - {{ device.device_name }}</h1>
    <p>Device ID: {{ device.device_id }}</p>
    <p>Type: {{ device.device_type }}</p>
    <p>Room: {{ device.room }}</p>
    <p>Brand: {{ device.brand }}</p>
    <p>Model: {{ device.model }}</p>
    <p>Status: {{ device.status }}</p>

    <form method="post">
        <label for="power">Power:</label>
        <select id="control-device-button-{{ device.device_id }}" name="power">
            <option value="on" {% if device.power == 'on' %}selected{% endif %}>On</option>
            <option value="off" {% if device.power == 'off' %}selected{% endif %}>Off</option>
        </select><br>

        <label for="brightness">Brightness:</label>
        <input type="number" id="brightness" name="brightness" value="{{ device.brightness }}" min="0" max="100"/><br>

        <button id="save-settings-button" type="submit">Save Settings</button>
        <button id="back-to-devices" type="button" onclick="location.href='{{ url_for('device_list') }}'">Back to Devices List</button>
    </form>
</body>
</html>
