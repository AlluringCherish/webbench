<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <h1 id="category-title">{{ category_name }}</h1>
    <div id="category-articles">
        {% for article in articles %}
            <div class="article-item">
                <h2>{{ article.title }}</h2>
                <p>Date: {{ article.date }}</p>
                <p>Popularity: {{ article.popularity }}</p>
            </div>
        {% endfor %}
    </div>
    <button id="sort-by-date" onclick="location.href='{{ url_for('sort_category_articles', category_name=category_name, sort_key='date') }}'">Sort by Date</button>
    <button id="sort-by-popularity" onclick="location.href='{{ url_for('sort_category_articles', category_name=category_name, sort_key='popularity') }}'">Sort by Popularity</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
