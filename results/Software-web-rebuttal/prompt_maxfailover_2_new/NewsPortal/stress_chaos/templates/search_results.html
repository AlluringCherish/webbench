<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">Search query: "{{ query }}"</div>
        <div id="results-list">
            {% if results|length > 0 %}
                <ul>
                {% for article in results %}
                    <li>
                        <strong>{{ article.title }}</strong>
                        <p>{{ article.excerpt }}</p>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <div id="no-results-message">No results found.</div>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
