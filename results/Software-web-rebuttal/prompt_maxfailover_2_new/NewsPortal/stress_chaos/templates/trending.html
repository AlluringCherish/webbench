<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Articles</title>
</head>
<body>
    <h1>Trending Articles</h1>
    <form method="POST" action="{{ url_for('filter_trending') }}">
        <label for="time-period-filter">Time Period:</label>
        <select name="time-period-filter" id="time-period-filter">
            {% for period in periods %}
                <option value="{{ period }}" {% if period == selected_period %}selected{% endif %}>{{ period }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="trending-articles">
        {% for article in trending_articles %}
            <div class="trending-article">
                <h2>{{ article.rank }}. {{ article.title }}</h2>
                <p>Category: {{ article.category }}</p>
                <p>View Count: {{ article.view_count }}</p>
            </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
