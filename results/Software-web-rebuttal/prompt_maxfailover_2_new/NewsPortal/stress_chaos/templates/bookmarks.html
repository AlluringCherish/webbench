<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
</head>
<body>
    <div id="bookmarks-page">
        <h1>Bookmarks</h1>
        <div id="bookmarks-list">
            {% for bookmark in bookmarks %}
                <div class="bookmark-item">
                    <h2>{{ bookmark.article_title }}</h2>
                    <p>Bookmarked on: {{ bookmark.bookmarked_date }}</p>
                    <form method="GET" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}">
                        <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Remove</button>
                    </form>
                    <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('article_details', article_id=bookmark.article_id) }}'">Read</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
