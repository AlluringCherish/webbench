<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
</head>
<body>
    <h1>Catalog</h1>
    <input type="text" placeholder="Search articles" name="search-input">
    <select name="category-filter">
        <option value="">All</option>
        {% for category in categories %}
            <option value="{{ category.category_id }}">{{ category.category_name }}</option>
        {% endfor %}
    </select>
    <div id="articles-list">
        {% for article in articles %}
        <div class="article-item" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">
            <img src="{{ article.thumbnail }}" alt="{{ article.title }}">
            <h3>{{ article.title }}</h3>
            <p>By {{ article.author }} on {{ article.date }}</p>
            <p>Category: {{ article.category }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
