<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Details</title>
</head>
<body>
    <div id="article-details-page">
        <h1>{{ article.title }}</h1>
        <div id="article-author">By {{ article.author }}</div>
        <div id="article-date">Date: {{ article.date }}</div>
        <form method="POST" action="{{ url_for('bookmark_article', article_id=article.article_id) }}">
            <button id="bookmark-button" type="submit">
                {% if bookmarked %}Remove Bookmark{% else %}Add Bookmark{% endif %}
            </button>
        </form>
        <div id="article-content">
            {{ article.content|safe }}
        </div>
    </div>
</body>
</html>
