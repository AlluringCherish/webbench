<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="learning-page">
        <h1>Course Learning - {{ course.title }}</h1>
        <div id="lessons-list">
            <ul>
                {% for lesson in lessons %}
                    <li {% if lesson.lesson_id == current_lesson.lesson_id %}style="font-weight:bold;"{% endif %}>
                        {{ lesson.title }}
                    </li>
                {% endfor %}
            </ul>
        </div>
        <div id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <p>{{ current_lesson.content }}</p>
            <p>Progress: {{ progress }}%</p>
            <form method="POST" action="{{ url_for('course_learning', course_id=course.course_id) }}">
                {% if can_mark_complete %}
                    <button type="submit" id="mark-complete-button">Mark Complete</button>
                {% else %}
                    <button type="submit" id="mark-complete-button" disabled>Mark Complete</button>
                {% endif %}
            </form>
        </div>
        <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
