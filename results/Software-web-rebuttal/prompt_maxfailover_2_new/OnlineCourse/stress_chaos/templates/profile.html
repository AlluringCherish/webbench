<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <form method="POST" action="{{ url_for('profile') }}">
            <label for="profile-email">Email:</label><br>
            <input type="email" id="profile-email" name="email" value="{{ email }}" required><br>
            <label for="profile-fullname">Full Name:</label><br>
            <input type="text" id="profile-fullname" name="fullname" value="{{ fullname }}" required><br>
            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
