<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="submit-page">
        <h1>Submit Assignment</h1>
        <div id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>{{ assignment.description }}</p>
        </div>
        {% if submission_status %}
            <p>{{ submission_status }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}">
            <label for="submission-text">Your Submission:</label><br>
            <textarea id="submission-text" name="submission_text" rows="10" cols="50" required></textarea><br>
            <button type="submit" id="submit-button">Submit</button>
        </form>
        <button id="back-to-assignments" onclick="location.href='{{ url_for('my_assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
