<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ fullname }}</h1>
        <div id="enrolled-courses">
            {% if enrolled_courses %}
                <ul>
                {% for course in enrolled_courses %}
                    <li>{{ course.title }} - Progress: {{ course.progress }}%</li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No enrolled courses yet.</p>
            {% endif %}
        </div>
        <button id="browse-courses-button" onclick="location.href='{{ url_for('catalog') }}'">Browse Courses</button>
        <button id="my-courses-button" onclick="location.href='{{ url_for('my_courses') }}'">My Courses</button>
    </div>
</body>
</html>
