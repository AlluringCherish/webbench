<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Alerts</title>
</head>
<body>
    <div id="alerts-page">
        <h1>Weather Alerts</h1>
        <div id="alerts-list">
            {% for alert in alerts %}
            <div class="alert-entry">
                <h2>{{ alert.alert_type }} - {{ alert.severity }}</h2>
                <p>{{ alert.description }}</p>
                <p>Location: {{ alert.location_name }}</p>
                <p>Start: {{ alert.start_time }}</p>
                <p>End: {{ alert.end_time }}</p>
                <button id="acknowledge-alert-button-{{ alert.alert_id }}">Acknowledge</button>
            </div>
            {% endfor %}
        </div>
        <select id="severity-filter" name="severity-filter">
            <option value="All" {% if severity_filter == None %}selected{% endif %}>All Severities</option>
            <option value="Critical" {% if severity_filter == 'Critical' %}selected{% endif %}>Critical</option>
            <option value="Medium" {% if severity_filter == 'Medium' %}selected{% endif %}>Medium</option>
            <option value="Low" {% if severity_filter == 'Low' %}selected{% endif %}>Low</option>
        </select>
        <select id="location-filter" name="location-filter">
            <option value="None" {% if location_filter == None %}selected{% endif %}>All Locations</option>
            {% for loc in locations %}
            <option value="{{ loc.location_id }}" {% if loc.location_id == location_filter %}selected{% endif %}>{{ loc.location_name }}</option>
            {% endfor %}
        </select>
    </div>
</body>
</html>
