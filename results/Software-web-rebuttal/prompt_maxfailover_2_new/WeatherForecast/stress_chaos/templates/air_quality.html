<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Air Quality Index</title>
</head>
<body>
<div id="air-quality-page">
    <h1>Air Quality Index</h1>
    <div id="aqi-display">AQI: {{ air_quality.aqi_index }}</div>
    <div id="aqi-description">{{ aqi_description }}</div>
    <table id="pollution-details">
        <thead>
            <tr><th>Pollutant</th><th>Value</th></tr>
        </thead>
        <tbody>
            <tr><td>PM2.5</td><td>{{ air_quality.pm25 }}</td></tr>
            <tr><td>PM10</td><td>{{ air_quality.pm10 }}</td></tr>
            <tr><td>NO2</td><td>{{ air_quality.no2 }}</td></tr>
            <tr><td>O3</td><td>{{ air_quality.o3 }}</td></tr>
        </tbody>
    </table>
    <div id="health-recommendation">Health Recommendation: {{ health_recommendation }}</div>
    <select id="location-aqi-filter" name="location-aqi-filter">
        {% for location in locations %}
        <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>{{ location.location_name }}</option>
        {% endfor %}
    </select>
</div>
</body>
</html>
