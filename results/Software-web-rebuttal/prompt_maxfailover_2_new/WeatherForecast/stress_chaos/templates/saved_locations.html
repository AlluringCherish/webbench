<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saved Locations</title>
</head>
<body>
<div id="saved-locations-page">
    <h1>Saved Locations</h1>
    <table id="locations-table">
        <thead>
            <tr>
                <th>Location Name</th>
                <th>Temperature (&deg;C)</th>
                <th>Condition</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for loc in locations %}
            <tr>
                <td>{{ loc.location_name }}</td>
                <td>{{ loc.temperature }}</td>
                <td>{{ loc.condition }}</td>
                <td>
                    <button id="view-location-weather-{{ loc.location_id }}">View Weather</button>
                    <button id="remove-location-button-{{ loc.location_id }}">Remove</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="add-new-location-button">Add Location</button>
</div>
</body>
</html>
