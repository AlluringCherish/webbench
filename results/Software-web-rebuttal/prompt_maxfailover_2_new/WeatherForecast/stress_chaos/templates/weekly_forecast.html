<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly Forecast</title>
</head>
<body>
<div id="forecast-page">
    <h1>Weekly Forecast</h1>
    <select id="location-filter" name="location-filter">
        {% for location in locations %}
        <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>{{ location.location_name }}</option>
        {% endfor %}
    </select>
    <table id="forecast-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>High Temp (&deg;C)</th>
                <th>Low Temp (&deg;C)</th>
                <th>Condition</th>
                <th>Precipitation (%)</th>
                <th>Humidity (%)</th>
            </tr>
        </thead>
        <tbody>
            {% for forecast in forecasts %}
            <tr>
                <td>{{ forecast.date }}</td>
                <td>{{ forecast.high_temp }}</td>
                <td>{{ forecast.low_temp }}</td>
                <td>{{ forecast.condition }}</td>
                <td>{{ forecast.precipitation }}</td>
                <td>{{ forecast.humidity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
