<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
    <div id="bestsellers-page">
        <h1>Bestsellers</h1>

        <div>
            <label for="time-period-filter">Filter by Period:</label>
            <select id="time-period-filter" name="period" onchange="this.form.submit()" form="filter-form">
                <option value="">All</option>
                <option value="This Week" {% if request.args.get('period') == 'This Week' %}selected{% endif %}>This Week</option>
                <option value="This Month" {% if request.args.get('period') == 'This Month' %}selected{% endif %}>This Month</option>
                <option value="All Time" {% if request.args.get('period') == 'All Time' %}selected{% endif %}>All Time</option>
            </select>
        </div>

        <form id="filter-form" method="GET" action="{{ url_for('bestsellers_page') }}">
        </form>

        <div id="bestsellers-list">
            {% for bestseller in bestsellers %}
            <div>
                <strong>{{ bestseller.title }}</strong> by {{ bestseller.author }} - Sales: {{ bestseller.sales_count }}
                <button id="view-book-button-{{ bestseller.book_id }}" onclick="window.location.href='{{ url_for('book_details_page', book_id=bestseller.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
