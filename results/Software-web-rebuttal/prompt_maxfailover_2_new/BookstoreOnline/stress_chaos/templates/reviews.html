<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Customer Reviews</h1>

        <div>
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating" onchange="this.form.submit()" form="filter-form">
                <option value="">All</option>
                <option value="1" {% if request.args.get('rating') == '1' %}selected{% endif %}>1 Star</option>
                <option value="2" {% if request.args.get('rating') == '2' %}selected{% endif %}>2 Stars</option>
                <option value="3" {% if request.args.get('rating') == '3' %}selected{% endif %}>3 Stars</option>
                <option value="4" {% if request.args.get('rating') == '4' %}selected{% endif %}>4 Stars</option>
                <option value="5" {% if request.args.get('rating') == '5' %}selected{% endif %}>5 Stars</option>
            </select>
        </div>

        <form id="filter-form" method="GET" action="{{ url_for('reviews_page') }}">
        </form>

        <div id="reviews-list">
            {% for review in reviews %}
            <div>
                <strong>{{ review.customer_name }}</strong> ({{ review.review_date }}) - Rating: {{ review.rating }}/5
                <p>{{ review.review_text }}</p>
            </div>
            {% else %}
            <p>No reviews found.</p>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review_page') }}'">Write a Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
