<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>

        <form method="POST" action="{{ url_for('write_review_page') }}">
            <div>
                <label for="select-book">Select Book:</label>
                <select id="select-book" name="book_id" required>
                    <option value="">-- Select a Book --</option>
                    {% for book in books %}
                    <option value="{{ book.book_id }}">{{ book.title }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="rating-select">Rating:</label>
                <select id="rating-select" name="rating" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>

            <div>
                <label for="review-text">Review Text:</label>
                <textarea id="review-text" name="review_text" rows="5" required></textarea>
            </div>

            <div>
                <label for="customer-name">Your Name:</label>
                <input type="text" id="customer-name" name="customer_name" required>
            </div>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
    </div>
</body>
</html>
