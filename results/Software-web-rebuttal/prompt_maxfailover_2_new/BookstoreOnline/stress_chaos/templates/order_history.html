<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
    <div id="orders-page">
        <h1>Order History</h1>

        <div>
            <label for="order-status-filter">Filter by Status:</label>
            <select id="order-status-filter" name="status" onchange="this.form.submit()" form="filter-form">
                <option value="">All</option>
                <option value="Pending" {% if request.args.get('status') == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Shipped" {% if request.args.get('status') == 'Shipped' %}selected{% endif %}>Shipped</option>
                <option value="Delivered" {% if request.args.get('status') == 'Delivered' %}selected{% endif %}>Delivered</option>
            </select>
        </div>

        <form id="filter-form" method="GET" action="{{ url_for('order_history_page') }}">
        </form>

        <table id="orders-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Order Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Shipping Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr>
                    <td>{{ order.order_id }}</td>
                    <td>{{ order.customer_name }}</td>
                    <td>{{ order.order_date }}</td>
                    <td>${{ "%.2f"|format(order.total_amount) }}</td>
                    <td>{{ order.status }}</td>
                    <td>{{ order.shipping_address }}</td>
                    <td>
                        <button id="view-order-button-{{ order.order_id }}" onclick="window.location.href='{{ url_for('order_details_page', order_id=order.order_id) }}'">View Details</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
