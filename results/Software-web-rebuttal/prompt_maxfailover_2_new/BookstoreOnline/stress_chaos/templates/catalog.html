<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <div>
            <label for="search-input">Search:</label>
            <input type="text" id="search-input" name="search" placeholder="Search by title, author or ISBN">
        </div>

        <div>
            <label for="category-filter">Filter by Category:</label>
            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category.category_id }}">{{ category.category_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div id="books-grid">
            {% for book in books %}
            <div>
                <h3>{{ book.title }}</h3>
                <div>Author: {{ book.author }}</div>
                <div>Category: {{ book.category }}</div>
                <div>ISBN: {{ book.isbn }}</div>
                <div>Price: ${{ "%.2f"|format(book.price) }}</div>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
