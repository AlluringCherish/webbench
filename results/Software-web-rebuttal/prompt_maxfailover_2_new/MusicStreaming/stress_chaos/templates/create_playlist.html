<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create New Playlist</title>
</head>
<body>
  <div id="create-playlist-page">

    <h1>Create New Playlist</h1>

    <form method="POST" action="{{ url_for('create_playlist') }}">
      <label for="playlist-name-input">Name:</label>
      <input type="text" id="playlist-name-input" name="playlist-name-input" required>

      <label for="playlist-description-input">Description:</label>
      <textarea id="playlist-description-input" name="playlist-description-input" required></textarea>

      <button type="submit" id="save-playlist-button">Save Playlist</button>
      <a href="{{ url_for('playlists') }}">
        <button type="button" id="cancel-create-button">Cancel</button>
      </a>
    </form>

  </div>
</body>
</html>
