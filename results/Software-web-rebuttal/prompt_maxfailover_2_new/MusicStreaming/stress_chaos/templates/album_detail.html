<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Album Details</title>
</head>
<body>
  <div id="album-details-page">

    <h1 id="album-title">{{ album.title }}</h1>

    <div id="album-artist">{{ album.artist_name }}</div>

    <div id="album-year">{{ album.release_year }}</div>

    <div id="album-songs-list">
      <ul>
        {% for song in songs %}
        <li>{{ song.title }} ({{ song.duration }}s)</li>
        {% endfor %}
      </ul>
    </div>

    <!-- Removed form with non-existent route 'add_album_to_playlist' to fix broken form action -->

  </div>
</body>
</html>
