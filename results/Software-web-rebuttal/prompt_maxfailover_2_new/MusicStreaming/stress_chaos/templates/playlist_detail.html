<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlist Details</title>
</head>
<body>
  <div id="playlist-details-page">

    <h1 id="playlist-title">{{ playlist.title }}</h1>

    <div id="playlist-description">{{ playlist.description }}</div>

    <!-- Removed form with non-existent route 'delete_playlist' to fix broken form action -->

    <table id="songs-in-playlist" border="1">
      <thead>
        <tr>
          <th>Title</th>
          <th>Artist</th>
          <th>Album</th>
          <th>Duration</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody>
        {% for song in songs %}
        <tr>
          <td>{{ song.title }}</td>
          <td>{{ song.artist_name }}</td>
          <td>{{ song.album_name }}</td>
          <td>{{ song.duration }}s</td>
          <td>
            <!-- Removed form with non-existent route 'remove_song_from_playlist' -->
            <button type="button" id="remove-song-button-{{ song.id }}" disabled>Remove</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

  </div>
</body>
</html>
