<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Genre Exploration</title>
</head>
<body>
  <div id="genres-page">

    <h1>Genre Exploration</h1>

    <form method="GET" action="{{ url_for('genres_page') }}">
      <select id="select-genre" name="genre">
        <option value="">Select Genre</option>
        {% for genre in genres %}
        <option value="{{ genre.id }}" {% if genre.id == selected_genre_id %}selected{% endif %}>{{ genre.genre_name }}</option>
        {% endfor %}
      </select>
      <button type="submit">Explore</button>
    </form>

    <div id="genre-songs">
      <h2>Songs</h2>
      <ul>
        {% for song in genre_songs %}
        <li>{{ song.title }} by {{ song.artist_name }}</li>
        {% endfor %}
      </ul>
    </div>

    <div id="genre-artists">
      <h2>Artists</h2>
      <ul>
        {% for artist in genre_artists %}
        <li>{{ artist.name }}</li>
        {% endfor %}
      </ul>
    </div>

    <a href="{{ url_for('dashboard') }}">
      <button id="back-to-dashboard">Back to Dashboard</button>
    </a>

  </div>
</body>
</html>
