<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Playlists</title>
</head>
<body>
  <div id="playlists-page">
    <h1>My Playlists</h1>

    <div id="playlists-grid">
      {% for playlist in playlists %}
      <div class="playlist-item">
        <div>{{ playlist.title }}</div>
        <div>{{ playlist.description }}</div>
        <div>{{ playlist.total_songs }} songs</div>
        <a href="{{ url_for('playlist_details', playlist_id=playlist.id) }}">
          <button id="view-playlist-button-{{ playlist.id }}">View</button>
        </a>
      </div>
      {% endfor %}
    </div>

    <a href="{{ url_for('create_playlist') }}">
      <button id="create-playlist-button">Create Playlist</button>
    </a>

    <a href="{{ url_for('dashboard') }}">
      <button id="back-to-dashboard">Back to Dashboard</button>
    </a>

  </div>
</body>
</html>
