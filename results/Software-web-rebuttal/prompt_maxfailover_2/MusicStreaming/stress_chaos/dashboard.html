<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Streaming Dashboard</title>
</head>
<body id="dashboard-page">
    <h1>Music Streaming Dashboard</h1>

    <div id="featured-songs">
        <h2>Featured Songs</h2>
        <ul id="featured-songs-list">
            {% for song in featured_songs %}
            <li id="featured-song-{{ song.song_id }}">{{ song.title }} by {{ song.artist_name }} ({{ song.duration }}s)</li>
            {% else %}
            <p id="no-featured-songs-message">No featured songs available.</p>
            {% endfor %}
        </ul>
    </div>

    <div id="buttons">
        <a href="{{ url_for('song_catalog') }}"><button id="browse-songs-button">Browse Songs</button></a>
        <a href="{{ url_for('playlists_page') }}"><button id="my-playlists-button">My Playlists</button></a>
        <a href="{{ url_for('artists_page') }}"><button id="trending-artists-button">Trending Artists</button></a>
    </div>
</body>
</html>
