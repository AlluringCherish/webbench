<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>

    <div id="album-artist">Artist: <a href="{{ url_for('artist_profile', artist_id=album.artist_id) }}">{{ album.artist_name }}</a></div>
    <div id="album-year">Release Year: {{ album.release_year }}</div>

    <div id="album-songs-list">
        <h2>Songs</h2>
        <ul id="songs-list">
            {% for song in album_songs %}
            <li id="song-{{ song.song_id }}">{{ song.title }} ({{ song.duration }}s)</li>
            {% else %}
            <li id="no-songs-message">No songs found.</li>
            {% endfor %}
        </ul>
    </div>

    <button id="add-album-to-playlist-button" type="button">Add Album to Playlist</button>
    <a href="{{ url_for('albums_page') }}"><button id="back-to-albums-button" type="button">Back to Albums</button></a>
</body>
</html>
