<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Song Catalog</h1>

        <form method="get" action="">
            <input id="search-input" name="search" type="text" value="{{ search_query }}" placeholder="Search songs..." />
            <select id="genre-filter" name="genre">
                <option value="">All Genres</option>
                {% for genre_name in genres %}
                <option value="{{ genre_name }}" {% if genre_name == selected_genre %}selected{% endif %}>{{ genre_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="songs-grid">
            {% for song in songs %}
            <div class="song-item">
                <div>{{ song.title }} by {{ song.artist_name }}</div>
                <div>Album: {{ song.album_name }}</div>
                <div>Genre: {{ song.genre }}</div>
                <div>Duration: {{ song.duration }}s</div>
                <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
