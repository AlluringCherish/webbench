<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
    <div id="artist-profile-page">
        <h1 id="artist-name">{{ artist.name }}</h1>

        <section id="artist-songs">
            <h2>Songs</h2>
            <ul>
                {% for song in artist_songs %}
                <li><a href="{{ url_for('song_details', song_id=song.song_id) }}">{{ song.title }}</a> ({{ song.album_name }}, {{ song.duration }}s)</li>
                {% endfor %}
            </ul>
        </section>

        <section id="artist-albums">
            <h2>Albums</h2>
            <ul>
                {% for album in artist_albums %}
                <li><a href="{{ url_for('album_details', album_id=album.album_id) }}">{{ album.title }} ({{ album.release_year }})</a></li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
