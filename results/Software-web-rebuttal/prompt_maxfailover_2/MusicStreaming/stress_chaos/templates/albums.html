<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
    <div id="albums-page">
        <h1>Albums</h1>

        <form method="get" action="">
            <input id="search-albums" name="search" type="text" value="{{ search_query }}" placeholder="Search albums..." />
            <select id="sort-albums" name="sort">
                <option value="By Title" {% if sort_option == 'By Title' %}selected{% endif %}>By Title</option>
                <option value="By Artist" {% if sort_option == 'By Artist' %}selected{% endif %}>By Artist</option>
                <option value="By Year" {% if sort_option == 'By Year' %}selected{% endif %}>By Year</option>
            </select>
            <button type="submit">Search & Sort</button>
        </form>

        <div id="albums-grid">
            {% for album in albums %}
            <div class="album-item">
                <div>{{ album.title }} by {{ album.artist_name }} ({{ album.release_year }})</div>
                <a href="{{ url_for('album_details', album_id=album.album_id) }}">
                    <button id="view-album-button-{{ album.album_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
