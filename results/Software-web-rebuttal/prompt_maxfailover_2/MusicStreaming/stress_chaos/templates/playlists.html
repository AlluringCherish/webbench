<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
    <div id="playlists-page">
        <h1>My Playlists</h1>

        <div id="playlists-grid">
            {% for playlist in playlists %}
            <div class="playlist-item">
                <div>{{ playlist.title }} ({{ playlist.total_songs }} songs)</div>
                <a href="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
                    <button id="view-playlist-button-{{ playlist.playlist_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>

        <div id="playlist-actions">
            <a href="{{ url_for('create_playlist_page') }}"><button id="create-playlist-button">Create Playlist</button></a>
            <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
        </div>
    </div>
</body>
</html>
