<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body id="create-playlist-page">
    <h1>Create New Playlist</h1>

    <form method="post" action="{{ url_for('create_playlist_submit') }}">
        <label for="playlist-name-input">Playlist Name:</label><br>
        <input id="playlist-name-input" name="playlist_name" type="text" required><br><br>

        <label for="playlist-description-input">Playlist Description:</label><br>
        <textarea id="playlist-description-input" name="playlist_description" rows="4" cols="50"></textarea><br><br>

        <button id="save-playlist-button" type="submit">Save Playlist</button>
        <a href="{{ url_for('playlists_page') }}"><button id="cancel-create-button" type="button">Cancel</button></a>
    </form>
</body>
</html>
