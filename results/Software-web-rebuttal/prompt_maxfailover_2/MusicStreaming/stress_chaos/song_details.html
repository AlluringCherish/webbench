<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>

    <div id="artist-name">
        <a href="{{ url_for('artist_profile', artist_id=song.artist_id) }}">{{ song.artist_name }}</a>
    </div>

    <div id="album-name">Album: <a href="{{ url_for('album_details', album_id=song.album_id) }}">{{ song.album_name }}</a></div>
    <div id="duration-display">Duration: {{ song.duration }}s</div>

    <button id="play-button" type="button">Play</button>
    <a href="{{ url_for('song_catalog') }}"><button id="back-to-catalog-button" type="button">Back to Catalog</button></a>
</body>
</html>
