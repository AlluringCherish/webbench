<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body id="playlists-page">
    <h1>My Playlists</h1>

    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-item" id="playlist-{{ playlist.playlist_id }}">
            <div id="playlist-title-{{ playlist.playlist_id }}">{{ playlist.title }} ({{ playlist.total_songs }} songs)</div>
            <a href="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
                <button id="view-playlist-button-{{ playlist.playlist_id }}" type="button">View</button>
            </a>
        </div>
        {% else %}
        <p id="no-playlists-message">No playlists found.</p>
        {% endfor %}
    </div>

    <div id="playlist-actions">
        <a href="{{ url_for('create_playlist_page') }}"><button id="create-playlist-button">Create Playlist</button></a>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
