<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body id="catalog-page">
    <h1>Song Catalog</h1>

    <form method="get" action="">
        <input id="search-input" name="search" type="text" value="{{ search_query }}" placeholder="Search songs..." />
        <select id="genre-filter" name="genre">
            <option value="">All Genres</option>
            {% for genre_name in genres %}
            <option value="{{ genre_name }}" {% if genre_name == selected_genre %}selected{% endif %}>{{ genre_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="songs-grid">
        {% for song in songs %}
        <div class="song-item" id="song-{{ song.song_id }}">
            <div id="song-title-{{ song.song_id }}">{{ song.title }} by {{ song.artist_name }}</div>
            <div id="song-album-{{ song.song_id }}">Album: {{ song.album_name }}</div>
            <div id="song-genre-{{ song.song_id }}">Genre: {{ song.genre }}</div>
            <div id="song-duration-{{ song.song_id }}">Duration: {{ song.duration }}s</div>
            <button id="add-to-playlist-button-{{ song.song_id }}" type="button">Add to Playlist</button>
        </div>
        {% else %}
        <p id="no-songs-message">No songs found.</p>
        {% endfor %}
    </div>
</body>
</html>
