<!DOCTYPE html>
<html lang="en">
<head>
    <title>Theater Information</title>
</head>
<body>
    <h1>Theater Information</h1>
    <div id="theater-page">
        <label for="theater-location-filter">Filter by Location:</label>
        <select id="theater-location-filter" name="location_filter" onchange="this.form.submit()">
            <option value="">All Locations</option>
            {% for theater in theaters %}
              <option value="{{ theater.city }}" {% if filter_location == theater.city %}selected{% endif %}>{{ theater.city }}</option>
            {% endfor %}
        </select>
        <div id="theaters-list">
            {% for theater in theaters %}
            <div id="theater-{{ theater.theater_id }}">
                <h2>{{ theater.theater_name }}</h2>
                <div>Location: {{ theater.location }}, {{ theater.city }}</div>
                <div>Screens: {{ theater.screens }}</div>
                <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
