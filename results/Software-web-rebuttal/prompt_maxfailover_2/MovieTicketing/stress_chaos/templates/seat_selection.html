<!DOCTYPE html>
<html lang="en">
<head>
    <title>Select Seats</title>
</head>
<body>
    <h1>Select Seats</h1>
    <div id="seat-selection-page">
        <div id="seat-map">
            {% for seat in seat_map %}
            <button id="seat-{{ seat.row }}{{ seat.column }}">{{ seat.row }}{{ seat.column }} ({{ seat.seat_type }})</button>
            {% endfor %}
        </div>
        <div id="selected-seats-display">Selected Seats: {% for seat in selected_seats %}{{ seat }} {% endfor %}</div>
        <button id="proceed-booking-button" onclick="location.href='{{ url_for('booking_confirmation', showtime_id=showtime_id) }}'">Proceed to Booking Confirmation</button>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
