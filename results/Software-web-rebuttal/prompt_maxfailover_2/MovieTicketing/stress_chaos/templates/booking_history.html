<!DOCTYPE html>
<html lang="en">
<head>
    <title>Booking History</title>
</head>
<body>
    <h1>Booking History</h1>
    <div id="bookings-page">
        <label for="status-filter">Filter by Status:</label>
        <select id="status-filter" name="status_filter" onchange="this.form.submit()">
            <option value="">All</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Pending">Pending</option>
        </select>
        <div id="bookings-table">
            <table>
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Movie Title</th>
                        <th>Booking Date</th>
                        <th>Seats Booked</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for booking in bookings %}
                    <tr id="booking-row-{{ booking.booking_id }}">
                        <td>{{ booking.booking_id }}</td>
                        <td>{{ booking.movie_title }}</td>
                        <td>{{ booking.booking_date }}</td>
                        <td>{{ booking.seats_booked | join(", ") }}</td>
                        <td>{{ booking.status }}</td>
                        <td>
                            <button id="view-booking-button-{{ booking.booking_id }}" onclick="location.href='{{ url_for('booking_details', booking_id=booking.booking_id) }}'">View</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
