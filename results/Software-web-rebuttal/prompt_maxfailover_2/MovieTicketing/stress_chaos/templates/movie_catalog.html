<!DOCTYPE html>
<html lang="en">
<head>
    <title>Movie Catalog</title>
</head>
<body>
    <h1>Movie Catalog</h1>
    <div id="catalog-page">
        <input type="text" id="search-input" name="search" placeholder="Search movies..." />
        <select id="genre-filter" name="genre">
          <option value="">All Genres</option>
          {% for genre in genres %}
          <option value="{{ genre.genre_name }}">{{ genre.genre_name }}</option>
          {% endfor %}
        </select>
        <div id="movies-grid">
            {% for movie in movies %}
            <div id="movie-{{ movie.movie_id }}">
                <img src="{{ movie.poster_url }}" alt="Poster of {{ movie.title }}" />
                <h2>{{ movie.title }}</h2>
                <div>Genre: {{ movie.genre }}</div>
                <div>Rating: {{ movie.rating }}</div>
                <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
