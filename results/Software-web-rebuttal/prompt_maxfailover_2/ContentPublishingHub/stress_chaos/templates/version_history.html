<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History</title>
</head>
<body>
    <div id="version-history-page">
        <nav id="navigation-bar">
            <button id="dashboard-button" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="create-article-button" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>
            <button id="my-articles-button" onclick="location.href='{{ url_for('my_articles') }}'">My Articles</button>
            <button id="published-articles-button" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="calendar-button" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        </nav>
        <h1 id="page-title">Version History</h1>
        <section id="versions-list">
            <ul>
                {% for version in versions %}
                <li id="version-{{ version.version_id }}">
                    <span>Version {{ version.version_number }} - {{ version.created_at }}</span>
                    <button id="compare-version-button-{{ version.version_id }}" onclick="location.href='{{ url_for('compare_versions', article_id=article.article_id, version_id=version.version_id) }}'">Compare</button>
                    <button id="restore-version-button-{{ version.version_id }}" onclick="location.href='{{ url_for('restore_version', article_id=article.article_id, version_id=version.version_id) }}'">Restore</button>
                </li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
