<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
</head>
<body>
    <div id="create-article-page">
        <nav id="navigation-bar">
            <button id="dashboard-button" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="create-article-button" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>
            <button id="my-articles-button" onclick="location.href='{{ url_for('my_articles') }}'">My Articles</button>
            <button id="published-articles-button" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="calendar-button" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        </nav>
        <h1 id="page-title">Create Article</h1>
        <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
            <label for="article-title">Title</label>
            <input id="article-title" name="title" type="text" required />
            <label for="article-content">Content</label>
            <textarea id="article-content" name="content" required></textarea>
            <button id="submit-article-button" type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
