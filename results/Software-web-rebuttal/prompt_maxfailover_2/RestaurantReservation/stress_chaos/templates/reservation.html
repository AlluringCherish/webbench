<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <h1 id="reservation-page">Make Reservation</h1>
    {% if error %}
    <p id="error-message" style="color:red;">{{ error }}</p>
    {% endif %}
    <form action="/reservation" method="POST">
        <label for="guest-name">Guest Name:</label>
        <input type="text" id="guest-name" name="guest_name" required>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="party-size">Party Size:</label>
        <input type="number" id="party-size" name="party_size" min="1" required>

        <label for="reservation-date">Date:</label>
        <input type="date" id="reservation-date" name="reservation_date" required>

        <label for="reservation-time">Time:</label>
        <input type="time" id="reservation-time" name="reservation_time" required>

        <label for="special-requests">Special Requests:</label>
        <textarea id="special-requests" name="special_requests"></textarea>

        <button type="submit" id="submit-reservation-button">Submit</button>
    </form>
    <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back</button>
</body>
</html>
