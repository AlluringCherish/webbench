<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <h1 id="waitlist-page">Waitlist</h1>
    <form action="/waitlist" method="POST">
        <label for="party-size">Party Size:</label>
        <input type="number" id="waitlist-party-size" name="party_size" min="1" required>
        <button type="submit" id="join-waitlist-button">Join Waitlist</button>
    </form>
    <h2>Current Waitlist</h2>
    <table id="waitlist-table" border="1">
        <thead>
            <tr>
                <th>Position</th>
                <th>Username</th>
                <th>Party Size</th>
                <th>Join Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for idx, entry in enumerate(waitlist) %}
            <tr id="waitlist-entry-{{ entry.waitlist_id }}">
                <td id="user-position">{{ idx + 1 }}</td>
                <td>{{ entry.username }}</td>
                <td>{{ entry.party_size }}</td>
                <td>{{ entry.join_time }}</td>
                <td>{{ entry.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back</button>
</body>
</html>
