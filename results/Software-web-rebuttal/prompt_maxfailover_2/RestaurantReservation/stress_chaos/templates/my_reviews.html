<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <h1 id="my-reviews-page">My Reviews</h1>
    <div id="reviews-list">
        {% for review in reviews %}
        <div class="review-item" id="review-{{ review.review_id }}">
            <p><strong>Dish:</strong> {{ review.dish_id }}</p>
            <p><strong>Rating:</strong> {{ review.rating }}</p>
            <p><strong>Review:</strong> {{ review.review_text }}</p>
            <p><strong>Date:</strong> {{ review.review_date }}</p>
        </div>
        <hr>
        {% endfor %}
    </div>
    <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back</button>
</body>
</html>
