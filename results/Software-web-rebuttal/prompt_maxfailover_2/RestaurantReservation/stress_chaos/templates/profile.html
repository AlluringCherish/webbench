<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <h1 id="profile-page">Profile</h1>
    <form action="/profile" method="POST">
        <label for="profile-username">Username:</label>
        <input type="text" name="username" id="profile-username" value="{{ user.username }}" readonly required>

        <label for="profile-email">Email:</label>
        <input type="email" name="email" id="profile-email" value="{{ user.email }}" required>

        <label for="profile-phone">Phone:</label>
        <input type="text" name="phone" id="profile-phone" value="{{ user.phone }}" required>

        <label for="profile-full-name">Full Name:</label>
        <input type="text" name="full_name" id="profile-full-name" value="{{ user.full_name }}" required>

        <button type="submit" id="update-profile-button">Update</button>
    </form>
    <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back</button>
</body>
</html>
