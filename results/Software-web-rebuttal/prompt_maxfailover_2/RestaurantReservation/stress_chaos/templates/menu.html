<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
</head>
<body>
    <h1 id="menu-page">Menu</h1>
    <div id="menu-grid">
        {% for dish in dishes %}
        <div class="dish-card">
            <h2 id="dish-name">{{ dish.name }}</h2>
            <p id="dish-category">Category: {{ dish.category }}</p>
            <p id="dish-description">Description: {{ dish.description }}</p>
            <p id="dish-ingredients">Ingredients: {{ dish.ingredients }}</p>
            <p id="dish-dietary">Dietary: {{ dish.dietary }}</p>
            <p id="dish-price">Price: ${{ "%.2f"|format(dish.price) }}</p>
            <p id="dish-rating">Average Rating: {{ "%.1f"|format(dish.avg_rating) }}</p>
            <button onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'" id="view-dish-button-{{ dish.dish_id }}">View Details</button>
        </div>
        {% endfor %}
    </div>
    <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back</button>
</body>
</html>
