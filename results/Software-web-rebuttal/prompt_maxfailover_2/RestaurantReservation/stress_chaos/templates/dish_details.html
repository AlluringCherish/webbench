<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dish Details</title>
</head>
<body>
    <div id="dish-details-page">
        <h1 id="dish-name">{{ dish.name }}</h1>
        <div id="dish-price">Price: ${{ "%.2f"|format(dish.price) }}</div>
        <div>
            <p>Category: {{ dish.category }}</p>
            <p>Description: {{ dish.description }}</p>
            <p>Ingredients: {{ dish.ingredients }}</p>
            <p>Dietary: {{ dish.dietary }}</p>
            <p>Average Rating: {{ "%.1f"|format(dish.avg_rating) }}</p>
        </div>
        <button id="back-to-menu" onclick="location.href='{{ url_for('menu') }}'">Back to Menu</button>
    </div>
</body>
</html>
