<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <h1 id="write-review-page">Write Review for {{ dish.name }}</h1>
    {% if error %}
    <p id="error-message" style="color:red;">{{ error }}</p>
    {% endif %}
    <form action="/write_review" method="POST">
        <label for="rating-input">Rating:</label>
        <select id="rating-input" name="rating" required>
            {% for i in range(1, 6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <label for="review-text">Review Text:</label>
        <textarea id="review-text" name="review_text" required></textarea>

        <input type="hidden" name="dish_id" value="{{ dish.dish_id }}">

        <button type="submit" id="submit-review-button">Submit</button>
    </form>
    <button onclick="location.href='{{ url_for('my_reviews') }}'" id="back-to-my-reviews">Back to My Reviews</button>
</body>
</html>
