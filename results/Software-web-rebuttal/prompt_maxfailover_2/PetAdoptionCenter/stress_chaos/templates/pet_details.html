<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Details</title>
</head>
<body>
    <div id="pet-details-page">
        <h1 id="pet-name">{{ pet.name }}</h1>
        <div id="pet-species">Species: {{ pet.species }}, Breed: {{ pet.breed }}, Age: {{ pet.age }}, Gender: {{ pet.gender }}, Size: {{ pet.size }}</div>
        <div id="pet-description">{{ pet.description }}</div>

        <button id="adopt-button" onclick="window.location.href='{{ url_for('adoption_application', pet_id=pet.pet_id) }}'">Adopt Me</button>
        <button id="back-to-listings" onclick="window.location.href='{{ url_for('pet_listings') }}'">Back to Listings</button>
    </div>
</body>
</html>
