<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>

        <div id="conversation-list">
            {% if conversations %}
                <ul>
                {% for conv in conversations %}
                    <li id="conversation-{{ conv.conversation_id }}">
                        <strong>{{ conv.other_user }}</strong><br>
                        <span>{{ conv.last_message }}</span><br>
                        <small>{{ conv.timestamp }}</small>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No conversations available.</p>
            {% endif %}
        </div>

        <form method="post" action="{{ url_for('send_message') }}">
            <textarea id="message-input" name="message" placeholder="Type your message here..."></textarea><br>
            <button type="submit" id="send-message-button">Send</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
