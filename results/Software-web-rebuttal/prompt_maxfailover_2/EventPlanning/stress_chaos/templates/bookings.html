<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="bookings-page">
  <h1 id="bookings-page">{{ page_title }}</h1>
  <input type="text" id="booking-search-input" placeholder="Search bookings..." value="{{ request.args.get('search', '') }}">
  <table id="bookings-table">
    <thead>
      <tr>
        <th>Booking ID</th>
        <th>Event Name</th>
        <th>Date</th>
        <th>Ticket Count</th>
        <th>Ticket Type</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for booking in bookings %}
      <tr>
        <td>{{ booking.booking_id }}</td>
        <td>{{ booking.event_name }}</td>
        <td>{{ booking.date }}</td>
        <td>{{ booking.ticket_count }}</td>
        <td>{{ booking.ticket_type }}</td>
        <td>{{ booking.status }}</td>
        <td>
          <form method="POST" action="{{ url_for('cancel_booking', booking_id=booking.booking_id) }}" onsubmit="return confirm('Are you sure you want to cancel this booking?');">
            <button id="cancel-booking-button-{{ booking.booking_id }}" type="submit">Cancel</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
