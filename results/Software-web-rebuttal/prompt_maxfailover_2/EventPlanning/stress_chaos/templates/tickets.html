<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Booking</title>
</head>
<body>

<h1>Ticket Booking</h1>
<form method="POST" action="{{ url_for('book_tickets') }}" id="ticket-booking-form">
    <label for="select-event-dropdown">Select Event:</label>
    <select name="event_id" id="select-event-dropdown">
        {% for event in events %}
            <option value="{{ event.event_id }}">{{ event.event_name }}</option>
        {% endfor %}
    </select>

    <label for="ticket-quantity">Number of Tickets:</label>
    <input type="number" id="ticket-quantity" name="ticket_count" min="1" required>

    <label for="ticket-type">Ticket Type:</label>
    <select name="ticket_type" id="ticket-type">
        <option value="Early Bird">Early Bird</option>
        <option value="General">General</option>
        <option value="VIP">VIP</option>
    </select>

    <button type="submit">Submit Booking</button>
</form>

<div id="confirmation-details">
    {% if success_message %}
        <p style="color: green;">{{ success_message }}</p>
    {% elif error_message %}
        <p style="color: red;">{{ error_message }}</p>
    {% endif %}
</div>

</body>
</html>
