<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="dashboard-page">
  <h1 id="dashboard-page">{{ page_title }}</h1>
  <div id="featured-events">
    {% for event in featured_events %}
    <div class="featured-event">
      <h2>{{ event.event_name }}</h2>
      <p>{{ event.date }} | {{ event.location }}</p>
    </div>
    {% endfor %}
  </div>
  <button id="browse-events-button" onclick="window.location.href='{{ url_for('events_listing') }}'">Browse Events</button>
  <button id="venues-button" onclick="window.location.href='{{ url_for('venues_page') }}'">Venues</button>
  <button id="view-tickets-button" onclick="window.location.href='{{ url_for('bookings_summary') }}'">View Tickets</button>
</div>
</body>
</html>
