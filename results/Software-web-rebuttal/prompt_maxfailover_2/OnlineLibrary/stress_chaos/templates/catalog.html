<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <input type="text" id="search-input" placeholder="Search books..." />

        <div id="book-grid">
            {% for book in books %}
            <div class="book-item" id="book-{{ book.book_id }}">
                <h3>{{ book.title }}</h3>
                <div>Author: {{ book.author }}</div>
                <div>Status: {{ book.status }}</div>
                <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
