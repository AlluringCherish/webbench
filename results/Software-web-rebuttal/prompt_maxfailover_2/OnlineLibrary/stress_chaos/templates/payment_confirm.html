<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <form method="POST" action="">
            <div id="fine-amount-display">Amount Due: ${{ '%.2f' % fine_amount }}</div>

            <button id="confirm-payment-button" type="submit">Confirm Payment</button>
            <button id="back-to-profile" type="button" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
        </form>
    </div>
</body>
</html>
