<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        <form method="POST" action="">
            <div id="borrow-book-info">
                <h2>{{ book.title }}</h2>
                <div>Author: {{ book.author }}</div>
                <div>Status: {{ book.status }}</div>
                <div>Description: {{ book.description }}</div>
                <div>Average Rating: {{ '%.1f' % book.avg_rating if book.avg_rating is not none else 'N/A' }}</div>
            </div>
            <div id="due-date-display">Due Date: {{ due_date }}</div>

            <button id="confirm-borrow-button" type="submit">Confirm Borrow</button>
            <button id="cancel-borrow-button" type="button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
