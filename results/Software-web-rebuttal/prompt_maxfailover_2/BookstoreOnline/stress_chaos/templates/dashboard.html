<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookstore Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Bookstore Dashboard</h1>

        <div id="featured-books">
            {% for book in featured_books %}
            <div class="featured-book">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>Price: ${{ "%.2f" | format(book.price) }}</p>
            </div>
            {% else %}
            <p>No featured books available.</p>
            {% endfor %}
        </div>

        <button id="browse-catalog-button" onclick="window.location.href='{{ url_for('catalog') }}'">Browse Catalog</button>
        <button id="view-cart-button" onclick="window.location.href='{{ url_for('cart') }}'">View Cart</button>
        <button id="bestsellers-button" onclick="window.location.href='{{ url_for('bestsellers') }}'">Bestsellers</button>
    </div>
</body>
</html>
