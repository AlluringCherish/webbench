<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Customer Reviews</h1>

        <div>
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating" onchange="window.location.href='{{ url_for('reviews') }}?rating=' + this.value">
                <option value="" {% if not selected_rating %}selected{% endif %}>All</option>
                <option value="5" {% if selected_rating == '5' %}selected{% endif %}>5 Stars</option>
                <option value="4" {% if selected_rating == '4' %}selected{% endif %}>4 Stars</option>
                <option value="3" {% if selected_rating == '3' %}selected{% endif %}>3 Stars</option>
                <option value="2" {% if selected_rating == '2' %}selected{% endif %}>2 Stars</option>
                <option value="1" {% if selected_rating == '1' %}selected{% endif %}>1 Star</option>
            </select>

            <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review') }}'">Write a Review</button>
            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <h3>{{ review.book_title }}</h3>
                <p>Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
            </div>
            {% else %}
            <p>No reviews found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
