<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book.title }}</h1>
        <div id="book-author">Author: {{ book.author }}</div>
        <div id="book-price">Price: ${{ "%.2f" | format(book.price) }}</div>

        <form method="post" action="{{ url_for('add_to_cart') }}">
            <input type="hidden" name="book_id" value="{{ book.book_id }}">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" value="1">
            <button id="add-to-cart-button" type="submit">Add to Cart</button>
        </form>

        <div id="book-reviews">
            <h2>Customer Reviews</h2>
            {% for review in reviews %}
            <div class="review">
                <p><strong>{{ review.customer_name }}</strong> rated {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
            </div>
            {% else %}
            <p>No reviews yet.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
