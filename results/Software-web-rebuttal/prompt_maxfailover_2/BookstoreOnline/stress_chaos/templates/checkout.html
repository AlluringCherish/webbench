<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>

        <form method="post" action="{{ url_for('checkout') }}">
            <label for="customer-name">Customer Name:</label><br>
            <input id="customer-name" type="text" name="customer_name" required><br><br>

            <label for="shipping-address">Shipping Address:</label><br>
            <textarea id="shipping-address" name="shipping_address" rows="4" required></textarea><br><br>

            <label for="payment-method">Payment Method:</label><br>
            <select id="payment-method" name="payment_method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select><br><br>

            <button id="place-order-button" type="submit">Place Order</button>
        </form>
    </div>
</body>
</html>
