<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
    <div id="course-details-page">
        <h1 id="course-title">{{ course.title }}</h1>
        <div id="course-description">{{ course.description }}</div>
        <form method="POST" action="{{ url_for('enroll_course', course_id=course.course_id) }}">
            <button id="enroll-button" type="submit" {% if is_enrolled %} disabled {% endif %}>
                {% if is_enrolled %}Already Enrolled{% else %}Enroll{% endif %}
            </button>
        </form>
        {% if success_message %}
        <div id="success-message">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
        <div id="error-message">{{ error_message }}</div>
        {% endif %}
        <button id="back-to-catalog" onclick="location.href='{{ url_for('course_catalog') }}'">Back to Catalog</button>
    </div>
</body>
</html>
