<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <form method="POST" action="{{ url_for('update_profile') }}">
            <label for="profile-fullname">Full Name:</label>
            <input type="text" id="profile-fullname" name="fullname" value="{{ user.fullname }}" required>
            <br>
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ user.email }}" required>
            <br>
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
