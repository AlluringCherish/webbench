<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="learning-page">
        <h1>Course Learning</h1>
        <div id="lessons-list">
            <ul>
                {% for lesson in lessons %}
                <li>{{ lesson.title }}</li>
                {% endfor %}
            </ul>
        </div>
        <div id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <p>{{ current_lesson.content }}</p>
        </div>
        <form method="POST" action="{{ url_for('mark_lesson_complete', course_id=course.course_id, lesson_id=current_lesson.lesson_id) }}">
            <button id="mark-complete-button" type="submit" {% if progress == 100 %} disabled {% endif %}>Mark as Complete</button>
        </form>
        <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
