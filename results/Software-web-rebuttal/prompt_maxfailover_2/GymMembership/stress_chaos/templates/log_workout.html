<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
</head>
<body>
    <div id="log-workout-page">
        <h1>Log Workout</h1>
        {% if submission_status %}
        <p id="submission-feedback">{{ submission_status }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('log_workout') }}">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout_type" required>
                <option value="Cardio">Cardio</option>
                <option value="Strength">Strength</option>
                <option value="Flexibility">Flexibility</option>
                <option value="Sports">Sports</option>
            </select>
            <label for="workout-duration">Duration (minutes):</label>
            <input type="number" id="workout-duration" name="workout_duration" required>
            <label for="calories-burned">Calories Burned:</label>
            <input type="number" id="calories-burned" name="calories_burned" required>
            <label for="workout-notes">Notes:</label>
            <textarea id="workout-notes" name="workout_notes"></textarea>
            <button type="submit" id="submit-workout-button">Submit</button>
        </form>
    </div>
</body>
</html>
