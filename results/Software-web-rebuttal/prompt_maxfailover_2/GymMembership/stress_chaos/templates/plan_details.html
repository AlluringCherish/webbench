<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">
            ${{ plan.price }} / {{ plan.billing_cycle }}
        </div>
        <div id="plan-features">
            {{ plan.features }}
        </div>
        <button id="enroll-plan-button">Enroll in this Plan</button>
        <div id="plan-reviews">
            <!-- Member reviews will be displayed here -->
            <p>No reviews available.</p>
        </div>
    </div>
</body>
</html>
