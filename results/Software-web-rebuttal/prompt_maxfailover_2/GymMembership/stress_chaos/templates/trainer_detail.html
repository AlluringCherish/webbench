<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">
            {{ trainer.bio }}
        </div>
        <div id="trainer-certifications">
            Certifications: {{ trainer.certifications }}
        </div>
        <a href="{{ url_for('booking') }}">
            <button id="book-session-button">Book a Session</button>
        </a>
        <div id="trainer-reviews">
            <!-- Client reviews placeholder -->
            <p>No reviews available.</p>
        </div>
    </div>
</body>
</html>
