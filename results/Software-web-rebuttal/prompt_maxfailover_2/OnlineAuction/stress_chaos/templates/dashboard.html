<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body id="dashboard-page">
    <h1>Dashboard</h1>

    <section id="trending-auctions">
        <h2>Trending Auctions</h2>
        <ul id="trending-list">
            {% for auction in trending_auctions %}
            <li>
                <a href="{{ url_for('auction_details', auction_id=auction.id) }}">{{ auction.title }}</a>
                <button class="bid-button">Place Bid</button>
            </li>
            {% endfor %}
        </ul>
    </section>

    <nav>
        <a href="{{ url_for('dashboard') }}" id="dashboard-link">Dashboard</a>
    </nav>
</body>
</html>
