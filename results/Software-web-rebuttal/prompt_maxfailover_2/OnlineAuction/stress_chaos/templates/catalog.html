<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body id="catalog-page">
    <h1>Auction Catalog</h1>

    <section id="auction-list">
        {% for auction in auctions %}
        <div class="auction-card" id="auction-{{ auction.id }}">
            <h2>{{ auction.title }}</h2>
            <p>Category: {{ auction.category }}</p>
            <a href="{{ url_for('auction_details', auction_id=auction.id) }}">View Details</a>
        </div>
        {% endfor %}
    </section>

    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
</body>
</html>
