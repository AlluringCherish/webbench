<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Auctions</title>
</head>
<body id="winners-page">
    <h1>Winning Auctions</h1>

    <section id="filter-by-winner">
        <label for="winner-filter">Filter by Winner:</label>
        <select id="winner-filter" name="winner">
            {% for winner in winners %}
            <option value="{{ winner.id }}">{{ winner.name }}</option>
            {% endfor %}
        </select>
    </section>

    <section id="winner-cards">
        {% for auction in winning_auctions %}
        <div class="winner-card" id="winner-card-{{ auction.id }}">
            <h2>{{ auction.title }}</h2>
            <p>Winner: {{ auction.winner }}</p>
        </div>
        {% endfor %}
    </section>

    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
</body>
</html>
