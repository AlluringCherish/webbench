<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Categories</title>
</head>
<body>
    <div id="categories-page">
        <h1>Auction Categories</h1>
        <div id="categories-list">
            {% for category in categories %}
            <div id="category-card-{{ category.category_id }}">
                <h2>{{ category.category_name }}</h2>
                <p>{{ category.description }}</p>
                <p>Items: {{ category.item_count }}</p>
                <!-- Note: route to category filtered catalog not implemented, button no link -->
                <button id="view-category-button-{{ category.category_id }}">View Category</button>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
