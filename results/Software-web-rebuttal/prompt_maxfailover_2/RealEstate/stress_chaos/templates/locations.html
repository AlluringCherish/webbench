<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Featured Locations</title>
</head>
<body>
    <h1>Featured Locations</h1>
    <div id="locations-page">
        <label for="location-sort">Sort Locations:</label>
        <select id="location-sort" name="location_sort" form="sort-form">
            <option value="By Name" {% if sort_option == 'By Name' %}selected{% endif %}>By Name</option>
            <option value="By Properties Count" {% if sort_option == 'By Properties Count' %}selected{% endif %}>By Properties Count</option>
            <option value="By Average Price" {% if sort_option == 'By Average Price' %}selected{% endif %}>By Average Price</option>
        </select>
        <div id="locations-list">
            {% for location in locations %}
            <div id="location-card-{{ location.location_id }}">
                <p>Name: {{ location.location_name }}</p>
                <p>Region: {{ location.region }}</p>
                <p>Average Price: ${{ location.average_price }}</p>
                <p>Property Count: {{ location.property_count }}</p>
                <p>Description: {{ location.description }}</p>
                <button id="view-location-button-{{ location.location_id }}" onclick="location.href='{{ url_for('property_search_page') }}?location={{ location.location_name }}'">View Properties</button>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
