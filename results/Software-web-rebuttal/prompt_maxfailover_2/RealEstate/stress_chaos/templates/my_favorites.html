<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <h1>My Favorite Properties</h1>
    <div id="favorites-page">
        <div id="favorites-list">
            {% for property in favorites %}
            <div id="favorite-card-{{ property.property_id }}">
                <p>{{ property.address }}</p>
                <p>${{ property.price }}</p>
                <a href="{{ url_for('property_details_page', property_id=property.property_id) }}"><button id="view-property-button-{{ property.property_id }}">View</button></a>
                <form method="POST" action="{{ url_for('remove_from_favorites', property_id=property.property_id) }}" style="display:inline;">
                    <button id="remove-from-favorites-button-{{ property.property_id }}" type="submit">Remove</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
