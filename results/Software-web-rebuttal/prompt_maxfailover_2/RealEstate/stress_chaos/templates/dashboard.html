<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Dashboard</title>
</head>
<body>
    <h1>Real Estate Dashboard</h1>
    <div id="dashboard-page">
        <div id="featured-properties">
            {% for property in featured_properties %}
            <div id="featured-property-{{ property.property_id }}">
                <h2>{{ property.address }}</h2>
                <img src="{{ property.image_url }}" alt="Property Image">
                <p>${{ property.price }}</p>
            </div>
            {% endfor %}
        </div>
        <nav>
            <a href="{{ url_for('property_search_page') }}"><button id="browse-properties-button">Browse Properties</button></a>
            <a href="{{ url_for('my_inquiries_page') }}"><button id="my-inquiries-button">My Inquiries</button></a>
            <a href="{{ url_for('my_favorites_page') }}"><button id="my-favorites-button">My Favorites</button></a>
        </nav>
    </div>
</body>
</html>
