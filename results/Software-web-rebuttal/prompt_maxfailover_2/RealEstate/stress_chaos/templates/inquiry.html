<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Property Inquiry</title>
</head>
<body>
    <h1>Submit Property Inquiry</h1>
    <div id="inquiry-page">
        {% if errors %}
        <div id="error-messages">
            <ul>
                {% for error in errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
        </div>
        {% endif %}
        <form method="POST" action="{{ url_for('submit_property_inquiry') }}">
            <label for="select-property">Select Property:</label>
            <select id="select-property" name="property_id">
                {% for property in properties %}
                <option value="{{ property.property_id }}">{{ property.address }}</option>
                {% endfor %}
            </select>

            <label for="inquiry-name">Name:</label>
            <input type="text" id="inquiry-name" name="customer_name" required>

            <label for="inquiry-email">Email:</label>
            <input type="email" id="inquiry-email" name="customer_email" required>

            <label for="inquiry-phone">Phone:</label>
            <input type="tel" id="inquiry-phone" name="customer_phone" required>

            <label for="inquiry-message">Message:</label>
            <textarea id="inquiry-message" name="message" rows="4" required></textarea>

            <button id="submit-inquiry-button" type="submit">Submit Inquiry</button>
        </form>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
