<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <h1>Real Estate Agents</h1>
    <div id="agents-page">
        <input type="text" id="agent-search" placeholder="Search agents">
        <div id="agents-list">
            {% for agent in agents %}
            <div id="agent-card-{{ agent.agent_id }}">
                <p>Name: {{ agent.agent_name }}</p>
                <p>Specialization: {{ agent.specialization }}</p>
                <p>Email: <a href="mailto:{{ agent.email }}">{{ agent.email }}</a></p>
                <p>Phone: {{ agent.phone }}</p>
                <p>Properties Sold: {{ agent.properties_sold }}</p>
                <button id="contact-agent-button-{{ agent.agent_id }}" onclick="location.href='mailto:{{ agent.email }}'">Contact</button>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
