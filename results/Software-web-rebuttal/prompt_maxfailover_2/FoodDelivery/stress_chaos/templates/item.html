<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
</head>
<body>
    <div id="item-details-page">
        <h1 id="item-name">{{ item.item_name }}</h1>
        <p id="item-description">{{ item.description }}</p>
        <div id="item-price">
            <p>Price: ${{ '%.2f'|format(item.price) }}</p>
        </div>

        <form method="POST" action="{{ url_for('item_details', item_id=item.item_id) }}">
            <label for="quantity-input">Quantity:</label>
            <input type="number" id="quantity-input" name="quantity" value="1" min="1">
            <button type="submit" id="add-to-cart-button">Add to Cart</button>
        </form>

        <a href="{{ url_for('restaurant_menu', restaurant_id=item.restaurant_id) }}"><button id="back-to-menu-button">Back to Menu</button></a>
    </div>
</body>
</html>
