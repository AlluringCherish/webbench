<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <form method="POST" action="{{ url_for('shopping_cart') }}">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Subtotal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cart_item in cart_items %}
                    <tr>
                        <td>{{ cart_item.item_name }}</td>
                        <td>${{ '%.2f'|format(cart_item.price) }}</td>
                        <td>
                            <input type="number" id="update-quantity-{{ cart_item.item_id }}" name="update-quantity-{{ cart_item.item_id }}" value="{{ cart_item.quantity }}" min="1">
                        </td>
                        <td>${{ '%.2f'|format(cart_item.subtotal) }}</td>
                        <td>
                            <button type="submit" id="remove-item-button-{{ cart_item.item_id }}" name="remove-item-button-{{ cart_item.item_id }}">Remove</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>
        <div>
            <strong>Total Amount: ${{ '%.2f'|format(total_amount) }}</strong>
        </div>
        <div>
            <a href="{{ url_for('checkout') }}"><button id="proceed-checkout-button">Proceed to Checkout</button></a>
        </div>
    </div>
</body>
</html>
