<!DOCTYPE html>
<html>
<head>
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <h1>Active Orders</h1>
        <form method="GET" action="{{ url_for('active_orders') }}">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status_filter">
                <option value="All" {% if selected_status == 'All' %}selected{% endif %}>All</option>
                {% for status_option in status_options %}
                    <option value="{{ status_option }}" {% if selected_status == status_option %}selected{% endif %}>{{ status_option }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="orders-list">
            {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Customer: {{ order.customer_name }}</p>
                    <p>Status: {{ order.status }}</p>
                    <a href="{{ url_for('order_tracking', order_id=order.order_id) }}" id="track-order-button-{{ order.order_id }}">Track Order</a>
                </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
