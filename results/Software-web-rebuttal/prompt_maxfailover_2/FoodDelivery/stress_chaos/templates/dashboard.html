<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Featured Restaurants</h1>
        <ul id="featured-restaurants">
            {% for restaurant in featured_restaurants %}
                <li>{{ restaurant.name }} - {{ restaurant.cuisine }}</li>
            {% endfor %}
        </ul>

        <h2>Popular Cuisines</h2>
        <ul id="popular-cuisines">
            {% for cuisine in popular_cuisines %}
                <li>{{ cuisine }}</li>
            {% endfor %}
        </ul>

        <nav>
            <a href="{{ url_for('restaurants') }}"><button id="browse-restaurants-button">Browse Restaurants</button></a>
            <a href="{{ url_for('shopping_cart') }}"><button id="view-cart-button">View Cart</button></a>
            <a href="{{ url_for('active_orders') }}"><button id="view-orders-button">View Orders</button></a>
        </nav>
    </div>
</body>
</html>
