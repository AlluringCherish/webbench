<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trending Articles</title>
</head>
<body>
<div id="trending-page">
    <h1>Trending Articles</h1>

    <form method="GET" action="{{ url_for('trending_page') }}">
        <label for="time-period-filter">Filter By Time Period:</label>
        <select id="time-period-filter" name="time_period_filter">
            <option value="">All Periods</option>
            {% for period in ['This Week', 'This Month', 'This Year'] %}
                <option value="{{ period }}" {% if time_period_filter == period %}selected{% endif %}>{{ period }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="trending-list">
        {% if trending_articles %}
            <ul>
            {% for article in trending_articles %}
                <li id="article-{{ article.article_id }}">
                    <div><strong>{{ article.article_title }}</strong> in {{ article.category }} - Views: {{ article.view_count }} ({{ article.period }})</div>
                    <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No trending articles available.</p>
        {% endif %}
    </div>

    <div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</div>
</body>
</html>
