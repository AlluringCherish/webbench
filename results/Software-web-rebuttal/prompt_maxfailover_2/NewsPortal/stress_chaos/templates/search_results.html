<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container-id">
        <h1>{{ page_title }}</h1>
        <div id="search-query-display">Search Results for: {{ search_query }}</div>
        <div id="results-list">
            {% if articles %}
                <ul>
                {% for article in articles %}
                    <li id="article-{{ article.article_id }}">
                        <div>{{ article.title }}</div>
                        <div id="article-date">Published: {{ article.date }}</div>
                        <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <div id="no-results-message">No results found for your query.</div>
            {% endif %}
        </div>
        <div>
            <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
