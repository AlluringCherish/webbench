<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Category Articles</title>
</head>
<body>
<div id="category-page">
    <h1 id="category-title">Category: {{ category_name }}</h1>

    <div id="category-articles">
        {% if articles %}
            <ul>
            {% for article in articles %}
                <li id="article-{{ article.article_id }}">
                    <div><strong>{{ article.title }}</strong></div>
                    <div>By {{ article.author }} | {{ article.date }}</div>
                    <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <div id="no-results-message">No articles found in this category.</div>
        {% endif %}
    </div>

    <div>
        <button id="sort-by-date" {% if sort_order != 'popularity' %}disabled{% endif %}>Sort by Date</button>
        <button id="sort-by-popularity" {% if sort_order != 'date' %}disabled{% endif %}>Sort by Popularity</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</div>
</body>
</html>
