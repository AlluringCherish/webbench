<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Portal</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>News Portal</h1>

        <div id="featured-articles">
            {% if articles %}
                <ul>
                    {% for article in articles %}
                        <li id="article-{{ article.article_id }}">
                            <strong>{{ article.title }}</strong> by {{ article.author }} in {{ article.category }} ({{ article.date }})
                            <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No featured articles available.</p>
            {% endif %}
        </div>

        <div>
            <button id="browse-articles-button" onclick="location.href='{{ url_for('catalog_page') }}'">Browse Articles</button>
            <button id="view-bookmarks-button" onclick="location.href='{{ url_for('bookmarks_page') }}'">View Bookmarks</button>
            <button id="trending-articles-button" onclick="location.href='{{ url_for('trending_page') }}'">Trending Articles</button>
        </div>
    </div>
</body>
</html>
