<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Write a Comment</title>
</head>
<body>
<div id="write-comment-page">
    <h1>Write a Comment</h1>

    <form method="POST" action="{{ url_for('write_comment_page') }}">
        <label for="select-article">Select Article:</label>
        <select id="select-article" name="article_id" required>
            {% for article in articles %}
                <option value="{{ article.article_id }}">{{ article.title }}</option>
            {% endfor %}
        </select>

        <label for="commenter-name">Your Name:</label>
        <input type="text" id="commenter-name" name="commenter_name" required />

        <label for="comment-text">Comment:</label>
        <textarea id="comment-text" name="comment_text" required></textarea>

        <button type="submit" id="submit-comment-button">Submit Comment</button>
    </form>
</div>
</body>
</html>
