<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>
        <form method="GET" action="{{ url_for('application_tracking') }}">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status_filter" onchange="this.form.submit()">
                <option value="">All</option>
                {% for status in ['Applied', 'Under Review', 'Interview', 'Rejected'] %}
                <option value="{{ status }}" {% if selected_status == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </form>
        <table id="applications-table">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.job_title }}</td>
                    <td>{{ app.company_name }}</td>
                    <td>{{ app.status }}</td>
                    <td>{{ app.applied_date }}</td>
                    <td>
                        <button id="view-application-button-{{ app.application_id }}" onclick="location.href='{{ url_for('application_details', app_id=app.application_id) }}'">View Details</button>
                    </td>
                </tr>
                {% else %}
                <tr id="no-results-message">
                    <td colspan="5">No applications found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
