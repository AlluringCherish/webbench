<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
</head>
<body>
    <div id="job-details-page">
        <h1 id="job-title">{{ job.title }}</h1>
        <div id="company-name">{{ company.company_name }}</div>
        <div id="job-description">{{ job.description }}</div>
        <div id="salary-range">${{ job.salary_min }} - ${{ job.salary_max }}</div>
        <button id="apply-now-button" onclick="location.href='{{ url_for('application_form', job_id=job.job_id) }}'">Apply Now</button>
        <button id="back-to-listings" onclick="location.href='{{ url_for('job_listings') }}'">Back to Listings</button>
    </div>
</body>
</html>
