<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>
        <form id="upload-resume-form" method="POST" enctype="multipart/form-data" action="{{ url_for('resume_management') }}">
            <input type="file" id="resume-file-input" name="resume_file" hidden>
            <label for="resume-file-input">
                <button type="button" id="upload-resume-button" onclick="document.getElementById('resume-file-input').click();">Upload Resume</button>
            </label>
        </form>
        <div id="resumes-list">
            {% for resume in resumes %}
            <div class="resume-entry" id="resume-{{ resume.resume_id }}">
                <p><strong>Name:</strong> {{ resume.applicant_name }}</p>
                <p><strong>Email:</strong> {{ resume.applicant_email }}</p>
                <p><strong>Filename:</strong> {{ resume.filename }}</p>
                <p><strong>Upload Date:</strong> {{ resume.upload_date }}</p>
                <form method="POST" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}">
                    <button type="submit" id="delete-resume-button-{{ resume.resume_id }}">Delete</button>
                </form>
            </div>
            {% else %}
            <p id="no-results-message">No resumes available.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
