<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
    <div id="company-profile-page">
        <h1>Company Profile</h1>
        <div id="company-info">
            <p><strong>{{ company.company_name }}</strong></p>
            <p>Industry: {{ company.industry }}</p>
            <p>Location: {{ company.location }}</p>
            <p>{{ company.description }}</p>
        </div>
        <div id="company-jobs">
            <h2>Jobs</h2>
            <div id="jobs-list">
                {% for job in jobs %}
                <div class="job-entry" id="job-{{ job.job_id }}">
                    <p>{{ job.title }}</p>
                    <p>Status: {{ job.status }}</p>
                    <button id="view-job-button-{{ job.job_id }}" onclick="location.href='{{ url_for('job_details', job_id=job.job_id) }}'">View Job</button>
                </div>
                {% else %}
                <p id="no-jobs-message">No jobs available for this company.</p>
                {% endfor %}
            </div>
        </div>
        <button id="back-to-companies" onclick="location.href='{{ url_for('companies_directory') }}'">Back to Companies</button>
    </div>
</body>
</html>
