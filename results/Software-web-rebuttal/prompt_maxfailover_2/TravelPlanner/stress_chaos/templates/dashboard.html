<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Planner Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Travel Planner Dashboard</h1>

        <div id="featured-destinations">
            <h2>Featured Destinations</h2>
            <ul>
                {% for dest in featured_destinations %}
                <li>
                    <img src="{{ dest.image_url }}" alt="{{ dest.name }} image" />
                    <div>{{ dest.name }}, {{ dest.country }}</div>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div id="upcoming-trips">
            <h2>Upcoming Trips</h2>
            <ul>
                {% for trip in upcoming_trips %}
                <li>
                    <div>{{ trip.name }} - {{ trip.destination }} - {{ trip.start_date }}</div>
                </li>
                {% endfor %}
            </ul>
        </div>

        <button id="browse-destinations-button" onclick="location.href='{{ url_for('destinations_view') }}'">Browse Destinations</button>
        <button id="plan-itinerary-button" onclick="location.href='{{ url_for('itinerary_view') }}'">Plan Your Itinerary</button>
    </div>
</body>
</html>
