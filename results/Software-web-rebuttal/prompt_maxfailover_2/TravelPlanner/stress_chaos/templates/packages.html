<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>

        <form method="GET" action="{{ url_for('packages_view') }}">
            <label for="duration-filter">Filter by Duration:</label>
            <select id="duration-filter" name="duration_filter" onchange="this.form.submit()">
                <option value="">All Durations</option>
                <option value="short" {% if duration_filter == 'short' %}selected{% endif %}>Short</option>
                <option value="medium" {% if duration_filter == 'medium' %}selected{% endif %}>Medium</option>
                <option value="long" {% if duration_filter == 'long' %}selected{% endif %}>Long</option>
            </select>
        </form>

        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-item">
                <div>{{ pkg.package_name }} - {{ pkg.destination }} - {{ pkg.duration_days }} days - ${{ pkg.price }}</div>
                <div>Includes: {{ pkg.included_items }}</div>
                <div>Difficulty: {{ pkg.difficulty_level }}</div>
                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_detail_view', pkg_id=pkg.package_id) }}'">View Details</button>
                <button id="book-package-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('book_package', pkg_id=pkg.package_id) }}'">Book Package</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
