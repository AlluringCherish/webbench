<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <h1>Audio Guides</h1>
        <form method="POST" action="{{ url_for('audio_guides') }}">
            <label for="filter-language">Filter by Language:</label>
            <select id="filter-language" name="selected_language">
                {% for language in languages %}
                <option value="{{ language }}" {% if selected_language == language %}selected{% endif %}>{{ language }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="apply-language-filter">Apply Filter</button>
        </form>
        <table id="audio-guide-list">
            <thead>
                <tr>
                    <th>Exhibit Number</th>
                    <th>Title</th>
                    <th>Language</th>
                    <th>Duration (minutes)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for guide in audio_guides %}
                <tr>
                    <td>{{ guide.exhibit_number }}</td>
                    <td>{{ guide.title }}</td>
                    <td>{{ guide.language }}</td>
                    <td>{{ guide.duration }}</td>
                    <td><a href="{{ url_for('play_audio_guide', guide_id=guide.guide_id) }}" id="play-guide-button-{{ guide.guide_id }}">Play Guide</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
