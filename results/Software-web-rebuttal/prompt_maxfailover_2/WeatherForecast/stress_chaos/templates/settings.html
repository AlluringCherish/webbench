<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <h1>Settings</h1>
    <form method="post" action="{{ url_for('settings_page') }}">
        <label for="default_location">Default Location:</label>
        <select name="default_location" id="default_location">
            {% for location in locations %}
            <option value="{{ location.location_id }}" {% if default_location and default_location.location_id == location.location_id %}selected{% endif %}>
                {{ location.location_name }}
            </option>
            {% endfor %}
        </select>
        <br>
        <label for="alert_notifications">Alert Notifications:</label>
        <input type="checkbox" id="alert_notifications" name="alert_notifications" {% if alert_notifications %}checked{% endif %}>
        <br>
        <button type="submit" id="save-settings-button">Save</button>
    </form>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
