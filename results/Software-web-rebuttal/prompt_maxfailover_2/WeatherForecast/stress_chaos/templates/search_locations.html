<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <h1>Search Locations</h1>
    <form method="post" action="{{ url_for('search_locations_page') }}">
        <input type="text" name="name" placeholder="Enter location name" value="{{ name_query }}" required>
        <button type="submit">Search</button>
    </form>

    {% if search_results %}
    <ul>
        {% for location in search_results %}
        <li>{{ location.location_name }} 
            <a href="{{ url_for('add_saved_location', location_id=location.location_id) }}">Add</a>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No results found.</p>
    {% endif %}

    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
