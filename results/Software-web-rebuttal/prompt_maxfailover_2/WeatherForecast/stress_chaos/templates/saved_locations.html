<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <h1>Saved Locations</h1>
    <ul>
        {% for location in saved_locations %}
        <li>{{ location.location_name }} {% if location.is_default %}(Default){% endif %} 
            <a href="{{ url_for('remove_saved_location', location_id=location.location_id) }}">Remove</a>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
