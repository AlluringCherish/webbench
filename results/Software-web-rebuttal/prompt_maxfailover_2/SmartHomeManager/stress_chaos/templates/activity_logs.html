<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <div id="activity-page">
        <h1>Activity Logs</h1>
        <form method="POST" action="{{ url_for('search_activity_logs') }}">
            <input type="text" id="search-activity" name="search_query" placeholder="Search..." required>
            <button type="submit" id="apply-search-button">Search</button>
        </form>
        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device ID</th>
                    <th>Device Name</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for log in activity_logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td>{{ log.device_id }}</td>
                    <td>{{ log.device_name }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
