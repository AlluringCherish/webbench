<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>
        <h2 id="device-name-display">{{ device.name }}</h2>
        <div id="device-status-display">Status: {{ device.status }}</div>
        <form method="POST" action="{{ url_for('post_device_control', device_id=device.device_id) }}">
            <button type="submit" name="power_toggle" id="power-toggle">Toggle Power</button>
            <!-- Additional controls could be added here if required -->
            <button type="submit" id="save-settings-button">Save Settings</button>
        </form>
        <button id="back-to-devices" onclick="location.href='{{ url_for('device_list_page') }}'">Back to Devices</button>
    </div>
</body>
</html>
