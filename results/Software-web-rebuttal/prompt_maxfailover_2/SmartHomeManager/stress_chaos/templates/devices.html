<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Devices</title>
</head>
<body>
    <div id="device-list-page">
        <h1>My Devices</h1>
        <table id="device-table" border="1">
            <thead>
                <tr>
                    <th>Device ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Room</th>
                    <th>Status</th>
                    <th>Control</th>
                </tr>
            </thead>
            <tbody>
                {% for device in devices %}
                <tr>
                    <td>{{ device.device_id }}</td>
                    <td>{{ device.name }}</td>
                    <td>{{ device.type }}</td>
                    <td>{{ device.room }}</td>
                    <td>{{ device.status }}</td>
                    <td>
                        <button id="control-device-button-{{ device.device_id }}" onclick="location.href='{{ url_for('device_control_page', device_id=device.device_id) }}'">Control</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
