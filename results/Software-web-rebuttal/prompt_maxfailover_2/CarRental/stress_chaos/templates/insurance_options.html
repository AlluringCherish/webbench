<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="main-container">
        <h1>Select Insurance Coverage</h1>
        <div id="insurance-page">
            <form method="POST" action="">
                <div id="insurance-options">
                    {% for plan in insurance_plans %}
                        <label>
                            <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="selected_plan" value="{{ plan.insurance_id }}" {% if selected_plan and selected_plan.insurance_id == plan.insurance_id %}checked{% endif %}>
                            {{ plan.plan_name }} - ${{ plan.daily_cost }} per day
                        </label><br>
                    {% endfor %}
                </div>
                <div id="insurance-description">
                    {% if selected_plan %}
                        <p>{{ selected_plan.description }}</p>
                    {% else %}
                        <p>Please select an insurance plan.</p>
                    {% endif %}
                </div>
                <div id="insurance-price">
                    {% if selected_plan %}
                        <p>Daily Cost: ${{ selected_plan.daily_cost }}</p>
                    {% endif %}
                </div>
                <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
