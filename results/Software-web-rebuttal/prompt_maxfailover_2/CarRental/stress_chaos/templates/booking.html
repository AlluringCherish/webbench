<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="POST" action="">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location" required>
                    {% for location in locations %}
                        <option value="{{ location }}" {% if location == pickup_location %}selected{% endif %}>{{ location }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location" required>
                    {% for location in locations %}
                        <option value="{{ location }}" {% if location == dropoff_location %}selected{% endif %}>{{ location }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input type="date" id="pickup-date" name="pickup_date" value="{{ pickup_date }}" required>

                <label for="dropoff-date">Dropoff Date:</label>
                <input type="date" id="dropoff-date" name="dropoff_date" value="{{ dropoff_date }}" required>

                <button type="submit" id="calculate-price-button">Calculate Total Price</button>
            </form>
            <div id="total-price">
                {% if total_price is not none %}
                    Total Price: ${{ '%.2f'|format(total_price) }}
                {% else %}
                    Total Price: N/A
                {% endif %}
            </div>
            {% if total_price is not none %}
            <button id="proceed-to-insurance-button" onclick="location.href='{{ url_for('insurance_options_page', reservation_id=reservation_id) }}'">Proceed to Insurance</button>
            {% endif %}
        </div>
    </div>
</body>
</html>
