<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="main-container">
        <h1>Search Vehicles</h1>
        <div id="search-page">
            <form method="GET" action="">
                <label for="location-filter">Pickup Location:</label>
                <select id="location-filter" name="location">
                    <option value="">All Locations</option>
                    {% for location in locations %}
                        <option value="{{ location }}" {% if location == request.args.get('location') %}selected{% endif %}>{{ location }}</option>
                    {% endfor %}
                </select>

                <label for="vehicle-type-filter">Vehicle Type:</label>
                <select id="vehicle-type-filter" name="vehicle_type">
                    <option value="">All Types</option>
                    {% for vtype in vehicle_types %}
                        <option value="{{ vtype }}" {% if vtype == request.args.get('vehicle_type') %}selected{% endif %}>{{ vtype }}</option>
                    {% endfor %}
                </select>

                <label for="date-range-input">Date Range:</label>
                <input type="text" id="date-range-input" name="date_range" value="{{ date_range if date_range else '' }}" placeholder="YYYY-MM-DD to YYYY-MM-DD">

                <button type="submit">Filter</button>
            </form>
            <div id="vehicles-grid">
                {% if vehicles %}
                    <ul>
                    {% for vehicle in vehicles %}
                        <li>
                            <div>{{ vehicle.make }} {{ vehicle.model }} - {{ vehicle.vehicle_type }}</div>
                            <div>Daily Rate: ${{ vehicle.daily_rate }}</div>
                            <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="location.href='{{ url_for('vehicle_details_page', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
                        </li>
                    {% endfor %}
                    </ul>
                {% else %}
                    <p>No vehicles match the search criteria.</p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
