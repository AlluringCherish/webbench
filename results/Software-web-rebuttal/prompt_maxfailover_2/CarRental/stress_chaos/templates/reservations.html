<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="main-container">
        <h1>My Reservations</h1>
        <div id="reservations-page">
            <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
            <button id="sort-by-date-button">Sort by Date</button>
            <div id="reservations-list">
                {% if reservations %}
                    <ul>
                    {% for res in reservations %}
                        <li>
                            <span>Reservation ID: {{ res.reservation_id }} - Status: {{ res.status }}</span>
                            <button id="modify-reservation-button-{{ res.reservation_id }}">Modify</button>
                            <button id="cancel-reservation-button-{{ res.reservation_id }}">Cancel</button>
                        </li>
                    {% endfor %}
                    </ul>
                {% else %}
                    <p>No reservations found.</p>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
