<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="{{ url_for('book_catalog') }}" id="filter-form">
            <input type="text" id="search-input" name="search" placeholder="Search title, author, ISBN..." value="{{ search_query }}" />

            <select name="category_id" id="category-filter">
                <option value="" {% if selected_category_id is none %}selected{% endif %}>All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_id }}" {% if selected_category_id == category.category_id %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="books-grid">
            {% for book in books %}
            <div class="book-card">
                <h3>{{ book.title }}</h3>
                <div>Author: {{ book.author }}</div>
                <div>Category: {{ book.category }}</div>
                <div>Price: ${{ "%.2f"|format(book.price) }}</div>
                <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
