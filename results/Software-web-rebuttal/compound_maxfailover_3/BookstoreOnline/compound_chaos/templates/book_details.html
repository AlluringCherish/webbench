<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book.title }}</h1>
        <div id="book-author">Author: {{ book.author }}</div>
        <div id="book-price">Price: ${{ "%.2f"|format(book.price) }}</div>
        <div id="book-description">{{ book.description }}</div>

        <form method="post" action="" id="add-to-cart-form">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" min="1" max="{{ book.stock }}" value="1" required />
            <button type="submit" id="add-to-cart-button">Add to Cart</button>
        </form>

        <div id="book-reviews">
            <h2>Reviews</h2>
            {% for review in reviews %}
            <div class="review" id="review-{{ review.review_id }}">
                <strong>{{ review.customer_name }}</strong> rated {{ review.rating }}/5 on {{ review.review_date }}<br />
                <p>{{ review.review_text }}</p>
            </div>
            {% else %}
            <p>No reviews yet.</p>
            {% endfor %}
        </div>

    </div>
</body>
</html>
