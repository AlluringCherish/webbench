<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>

        <form method="post" action="">
            <label for="select-book">Select Book:</label><br />
            <select id="select-book" name="book_id" required>
                {% for book in purchased_books %}
                <option value="{{ book.book_id }}">{{ book.title }}</option>
                {% endfor %}
            </select><br /><br />

            <label for="rating-select">Rating:</label><br />
            <select id="rating-select" name="rating" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select><br /><br />

            <label for="review-text">Review:</label><br />
            <textarea id="review-text" name="review_text" required></textarea><br /><br />

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
    </div>
</body>
</html>
