<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>

        <form method="post" action="">
            <table id="cart-items-table" border="1" cellpadding="5" cellspacing="0">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                {% for item in cart_items %}
                    <tr id="cart-item-{{ item.cart_id }}">
                        <td>{{ item.title }}</td>
                        <td>
                            <input type="number" id="update-quantity-{{ item.cart_id }}" name="quantity_{{ item.cart_id }}" value="{{ item.quantity }}" min="1" />
                        </td>
                        <td>${{ "%.2f"|format(item.price) }}</td>
                        <td>${{ "%.2f"|format(item.subtotal) }}</td>
                        <td>
                            <button type="submit" name="update" value="{{ item.cart_id }}">Update</button>
                            <button type="submit" id="remove-item-button-{{ item.cart_id }}" name="remove" value="{{ item.cart_id }}">Remove</button>
                        </td>
                    </tr>
                {% else %}
                    <tr><td colspan="5">Your cart is empty.</td></tr>
                {% endfor %}
                </tbody>
            </table>
        </form>

        <div id="total-amount">
            <strong>Total: ${{ "%.2f"|format(total_amount) }}</strong>
        </div>

        <button id="proceed-checkout-button" onclick="location.href='{{ url_for('checkout') }}'">Proceed to Checkout</button>
    </div>
</body>
</html>
