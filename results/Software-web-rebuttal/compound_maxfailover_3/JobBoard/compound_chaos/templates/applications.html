<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>

        <form method="get" action="">
            <label for="status-filter">Filter by status:</label>
            <select id="status-filter" name="status">
                <option value="" {% if not filter_status %}selected{% endif %}>All</option>
                <option value="applied" {% if filter_status == 'applied' %}selected{% endif %}>Applied</option>
                <option value="under review" {% if filter_status == 'under review' %}selected{% endif %}>Under Review</option>
                <option value="interview" {% if filter_status == 'interview' %}selected{% endif %}>Interview</option>
                <option value="rejected" {% if filter_status == 'rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Date Applied</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.job_title }}</td>
                    <td>{{ app.company_name }}</td>
                    <td>{{ app.status }}</td>
                    <td>{{ app.applied_date }}</td>
                    <td>
                        <a href="{{ url_for('application_details', app_id=app.application_id) }}">
                            <button id="view-application-button-{{ app.application_id }}">View Details</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
