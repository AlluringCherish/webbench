<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Museum Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Museum Dashboard</h1>
        <div id="exhibition-summary">
            <p>Total Exhibitions: {{ total_exhibitions }}</p>
            <p>Active Exhibitions: {{ active_exhibitions }}</p>
        </div>
        <button id="artifact-catalog-button" onclick="location.href='{{ url_for('artifact_catalog_page') }}'">Artifact Catalog</button>
        <button id="exhibitions-button" onclick="location.href='{{ url_for('exhibitions_page') }}'">Exhibitions</button>
        <button id="visitor-tickets-button" onclick="location.href='{{ url_for('visitor_tickets_page') }}'">Visitor Tickets</button>
        <button id="virtual-events-button" onclick="location.href='{{ url_for('virtual_events_page') }}'">Virtual Events</button>
        <button id="audio-guides-button" onclick="location.href='{{ url_for('audio_guides_page') }}'">Audio Guides</button>
    </div>
</body>
</html>
