<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibition Details</title>
</head>
<body>
    <div id="exhibition-details-page">
        <h1 id="exhibition-title">{{ exhibition.title }}</h1>
        <div id="exhibition-description">{{ exhibition.description }}</div>
        <div id="exhibition-dates">{{ exhibition.start_date }} to {{ exhibition.end_date }}</div>
        <table id="exhibition-artifacts" border="1">
            <thead>
                <tr>
                    <th>Artifact ID</th>
                    <th>Artifact Name</th>
                    <th>Period</th>
                    <th>Origin</th>
                </tr>
            </thead>
            <tbody>
                {% for artifact in artifacts %}
                <tr>
                    <td>{{ artifact.artifact_id }}</td>
                    <td>{{ artifact.artifact_name }}</td>
                    <td>{{ artifact.period }}</td>
                    <td>{{ artifact.origin }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-exhibitions" onclick="location.href='{{ url_for('exhibitions_page') }}'">Back to Exhibitions</button>
    </div>
</body>
</html>
