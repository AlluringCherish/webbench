<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
    <div id="artifact-catalog-page">
        <h1>Artifact Catalog</h1>
        <form method="post" action="{{ url_for('apply_artifact_filter') }}">
            <input type="text" id="search-artifact" name="search_query" value="{{ search_query }}" placeholder="Search artifacts">
            <button type="submit" id="apply-artifact-filter">Apply Filter</button>
        </form>
        <table id="artifact-table" border="1">
            <thead>
                <tr>
                    <th>Artifact ID</th>
                    <th>Artifact Name</th>
                    <th>Period</th>
                    <th>Origin</th>
                    <th>Exhibition</th>
                </tr>
            </thead>
            <tbody>
                {% for artifact in artifacts %}
                <tr>
                    <td>{{ artifact.artifact_id }}</td>
                    <td>{{ artifact.artifact_name }}</td>
                    <td>{{ artifact.period }}</td>
                    <td>{{ artifact.origin }}</td>
                    <td>{% if artifact.exhibition %}{{ artifact.exhibition }}{% else %}-{% endif %}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
