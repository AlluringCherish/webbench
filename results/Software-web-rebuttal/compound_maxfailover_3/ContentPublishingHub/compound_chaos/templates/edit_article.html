<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        {% if errors.general %}
            <p id="error-general" style="color:red">{{ errors.general }}</p>
        {% endif %}

        <form id="edit-article-form" method="post" action="{{ url_for('edit_article', article_id=article.article_id) }}">
            <label for="article-title">Title:</label>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" required />
            {% if errors.title %}
                <span id="error-title" style="color:red">{{ errors.title }}</span>
            {% endif %}

            <label for="article-content">Content:</label>
            <textarea id="article-content" name="content" required>{{ article.content }}</textarea>
            {% if errors.content %}
                <span id="error-content" style="color:red">{{ errors.content }}</span>
            {% endif %}

            <label for="current-version">Current Version:</label>
            <input type="text" id="current-version" name="current_version" value="{{ current_version }}" readonly />

            <button type="submit" id="submit-article">Save Changes</button>
        </form>

        <nav>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
            <a href="{{ url_for('article_version_history', article_id=article.article_id) }}" id="view-version-history">View Version History</a>
        </nav>
    </div>
</body>
</html>
