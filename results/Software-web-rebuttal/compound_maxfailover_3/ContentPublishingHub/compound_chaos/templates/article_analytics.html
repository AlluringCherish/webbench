<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Article Analytics</h1>

        <section id="analytics-overview">
            <h2>Overview</h2>
            <ul>
                {% for key, value in analytics_overview.items() %}
                <li><strong>{{ key|replace('_', ' ')|capitalize }}:</strong> {{ value }}</li>
                {% endfor %}
                <li><strong>Total Views:</strong> {{ total_views }}</li>
                <li><strong>Unique Visitors:</strong> {{ unique_visitors }}</li>
            </ul>
        </section>

        <nav>
            <a href="{{ url_for('published_articles') }}" id="back-to-published">Back to Published Articles</a>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
    </div>
</body>
</html>
