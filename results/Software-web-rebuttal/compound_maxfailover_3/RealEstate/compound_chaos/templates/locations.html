<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Featured Locations</title>
</head>
<body>
    <div id="locations-page">
        <select id="location-sort" name="sort_order">
            <option value="By Name" {% if sort_order == 'By Name' %}selected{% endif %}>By Name</option>
            <option value="By Properties Count" {% if sort_order == 'By Properties Count' %}selected{% endif %}>By Properties Count</option>
            <option value="By Average Price" {% if sort_order == 'By Average Price' %}selected{% endif %}>By Average Price</option>
        </select>
        <div id="locations-list">
            {% for location in locations %}
                <div id="location-{{ location.location_id }}">
                    <span>{{ location.location_name }} - {{ location.region }}</span>
                    <button id="view-location-button-{{ location.location_id }}" onclick="window.location.href='{{ url_for('property_search') }}?location={{ location.location_name }}'">View Properties</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
