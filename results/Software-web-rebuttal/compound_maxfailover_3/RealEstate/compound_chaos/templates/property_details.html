<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1 id="property-address">{{ property.address }}</h1>
        <div id="property-price">Price: ${{ property.price }}</div>
        <div id="property-description">{{ property.description }}</div>
        <div id="property-features">
            <ul>
                <li>Bedrooms: {{ property.bedrooms }}</li>
                <li>Bathrooms: {{ property.bathrooms }}</li>
                <li>Square Feet: {{ property.square_feet }}</li>
                <li>Type: {{ property.property_type }}</li>
                <li>Status: {{ property.status }}</li>
            </ul>
        </div>
        <form method="POST" action="{{ url_for('add_to_favorites', property_id=property.property_id) }}">
            <button type="submit" id="add-to-favorites-button">{% if is_favorite %}Remove from Favorites{% else %}Add to Favorites{% endif %}</button>
        </form>
        <button id="submit-inquiry-button" onclick="window.location.href='{{ url_for('inquiry_form') }}'">Submit Inquiry</button>
    </div>
</body>
</html>
