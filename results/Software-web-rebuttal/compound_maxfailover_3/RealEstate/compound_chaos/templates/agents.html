<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <input type="text" id="agent-search" name="search" value="{{ search_query }}" placeholder="Search agents..." />
        <div id="agents-list">
            {% for agent in agents %}
                <div id="agent-{{ agent.agent_id }}">
                    <span>{{ agent.agent_name }} - {{ agent.specialization }}</span>
                    <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
