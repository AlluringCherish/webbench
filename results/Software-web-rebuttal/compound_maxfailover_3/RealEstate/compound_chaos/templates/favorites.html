<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <div id="favorites-list">
            {% for favorite in favorites %}
                {% set prop = properties_map[favorite.property_id] %}
                <div id="favorite-property-{{ favorite.property_id }}">
                    <span>{{ prop.address }} - ${{ prop.price }}</span>
                    <form method="POST" action="{{ url_for('remove_from_favorites', property_id=favorite.property_id) }}" style="display:inline;">
                        <button type="submit" id="remove-from-favorites-button-{{ favorite.property_id }}">Remove</button>
                    </form>
                    <button id="view-property-button-{{ favorite.property_id }}" onclick="window.location.href='{{ url_for('property_details', property_id=favorite.property_id) }}'">View</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
