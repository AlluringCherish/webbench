<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <input id="search-input" type="text" name="search" placeholder="Search courses...">

        <div id="course-grid">
            {% for course in courses %}
                <div>
                    <h3>{{ course.title }}</h3>
                    <p>Category: {{ course.category }}</p>
                    <p>Level: {{ course.level }}</p>
                    <p>Duration: {{ course.duration }}</p>
                    <p>Status: {{ course.status }}</p>
                    <p>{{ course.description }}</p>
                    <button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
                </div>
            {% else %}
                <p>No courses available.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
