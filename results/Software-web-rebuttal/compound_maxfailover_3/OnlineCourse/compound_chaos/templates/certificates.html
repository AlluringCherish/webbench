<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <div id="certificates-grid">
            {% for certificate in certificates %}
                <div>
                    <h3>{{ certificate.title }}</h3>
                    <p>Course ID: {{ certificate.course_id }}</p>
                    <p>Issued on: {{ certificate.issue_date }}</p>
                </div>
            {% else %}
                <p>No certificates found.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
