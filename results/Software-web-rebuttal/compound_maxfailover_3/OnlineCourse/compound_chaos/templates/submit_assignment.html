<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="submit-page">
        <div id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>{{ assignment.description }}</p>
        </div>

        {% if submission_success is defined %}
            {% if submission_success %}
                <p>Submission successful!</p>
            {% else %}
                <p style="color:red;">{{ error_message }}</p>
            {% endif %}
        {% endif %}

        <form method="post" action="{{ url_for('submit_assignment_post', assignment_id=assignment.assignment_id) }}">
            <textarea id="submission-text" name="submission_text" rows="10" cols="50" required></textarea><br>
            <button id="submit-button" type="submit">Submit</button>
        </form>

        <button id="back-to-assignments" onclick="location.href='{{ url_for('my_assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
