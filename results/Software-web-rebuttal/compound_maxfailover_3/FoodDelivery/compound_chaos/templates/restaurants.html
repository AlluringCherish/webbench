<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurants</title>
</head>
<body>
    <div id="restaurants-page">
        <h1>Browse Restaurants</h1>
        <input type="text" id="search-input" name="search" placeholder="Search restaurants..." />
        <select id="cuisine-filter" name="cuisine">
            <option value="all">All Cuisines</option>
            {% for cuisine in cuisine_options %}
                <option value="{{ cuisine }}">{{ cuisine }}</option>
            {% endfor %}
        </select>
        <div id="restaurants-grid">
            {% for restaurant in restaurants %}
            <div class="restaurant-card">
                <h2 id="restaurant-name">{{ restaurant.name }}</h2>
                <div id="restaurant-info">
                    Cuisine: {{ restaurant.cuisine }}<br>
                    Address: {{ restaurant.address }}<br>
                    Phone: <span id="phone-number">{{ restaurant.phone }}</span><br>
                    Rating: {{ restaurant.rating }}<br>
                    Delivery Time: {{ restaurant.delivery_time }} mins
                </div>
                <a href="{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}">
                    <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
