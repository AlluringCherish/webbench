<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>
        <form method="POST" action="{{ url_for('checkout') }}">
            <label for="customer-name">Customer Name:</label><br>
            <input type="text" id="customer-name" name="customer_name" required><br>

            <label for="delivery-address">Delivery Address:</label><br>
            <textarea id="delivery-address" name="delivery_address" required></textarea><br>

            <label for="phone-number">Phone Number:</label><br>
            <input type="text" id="phone-number" name="phone_number" required><br>

            <label for="payment-method">Payment Method:</label><br>
            <select id="payment-method" name="payment_method" required>
                <option value="card">Card</option>
                <option value="cash">Cash</option>
                <option value="online">Online</option>
            </select><br>

            <button id="place-order-button" type="submit">Place Order</button>
            <a href="{{ url_for('view_cart') }}">
                <button id="back-to-cart" type="button">Back to Cart</button>
            </a>
        </form>
    </div>
</body>
</html>
