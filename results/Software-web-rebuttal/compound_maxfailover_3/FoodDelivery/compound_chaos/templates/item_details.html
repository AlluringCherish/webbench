<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
</head>
<body>
    <div id="item-details-page">
        <h1 id="item-name">{{ item.item_name }}</h1>
        <div id="item-description">{{ item.description }}</div>
        <div id="item-price">${{ item.price }}</div>

        <form method="POST" action="{{ url_for('add_to_cart', item_id=item.item_id) }}">
            <label for="quantity-input">Quantity:</label>
            <input type="number" id="quantity-input" name="quantity" min="1" value="1" required />
            <button id="add-to-cart-button" type="submit">Add to Cart</button>
        </form>

        <a href="{{ url_for('menu', restaurant_id=item.restaurant_id) }}">
            <button id="back-to-dashboard">Back to Menu</button>
        </a>
    </div>
</body>
</html>
