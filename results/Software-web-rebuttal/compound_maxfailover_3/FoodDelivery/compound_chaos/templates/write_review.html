<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review</h1>
        <form id="review-form" method="POST" action="{{ url_for('submit_review', restaurant_id=restaurant_id) }}">
            <label for="restaurant-select">Restaurant:</label>
            <select id="restaurant-select" name="restaurant_id" required>
                {% for r in restaurants %}
                    <option value="{{ r.restaurant_id }}">{{ r.name }}</option>
                {% endfor %}
            </select><br />
            <label for="customer-name-input">Name:</label>
            <input type="text" id="customer-name-input" name="customer_name" required /><br />
            <label for="rating-select">Rating:</label>
            <select id="rating-select" name="rating" required>
                {% for i in range(1, 6) %}
                    <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select><br />
            <label for="review-textarea">Review:</label><br />
            <textarea id="review-textarea" name="review_text" required></textarea><br />
            <button id="submit-review-button" type="submit">Submit Review</button>
            <a href="{{ url_for('dashboard') }}"><button type="button" id="back-to-dashboard">Back to Dashboard</button></a>
        </form>
    </div>
</body>
</html>
