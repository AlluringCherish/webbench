<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Order Reviews</h1>
        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating_filter">
            <option value="all">All</option>
            {% for r in rating_filter_options %}
                <option value="{{ r }}">{{ r }} stars & above</option>
            {% endfor %}
        </select>
        <div id="reviews-list">
            <ul>
                {% for review in reviews %}
                    <li>
                        <strong>{{ review.customer_name }}</strong> rated {{ review.rating }} stars<br/>
                        <em>{{ review.review_text }}</em><br/>
                        <small>{{ review.review_date }}</small>
                    </li>
                {% endfor %}
            </ul>
        </div>
        <a href="{{ url_for('write_review') }}">
            <button id="write-review-button">Write Review</button>
        </a>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
