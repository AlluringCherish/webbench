<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }}</title>
</head>
<body>
  <div id="bookings-page">
    <h1>{{ page_title }}</h1>
    <input type="text" id="booking-search-input" placeholder="Search bookings..." />
    <table id="bookings-table" border="1">
      <thead>
        <tr>
          <th>Event</th>
          <th>Date</th>
          <th>Ticket Count</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for booking in bookings %}
        <tr>
          <td>{{ booking.event_id }}</td>
          <td>{{ booking.booking_date }}</td>
          <td>{{ booking.ticket_count }}</td>
          <td>{{ booking.status }}</td>
          <td><button id="cancel-booking-button-{{ booking.booking_id }}">Cancel</button></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
