<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Ticket</title>
</head>
<body>
    <h1 id="book-ticket-title">Book Ticket</h1>

    <form method="POST" id="book_ticket_form">
        <label for="ticket-type-select">Ticket Type:</label>
        <select id="ticket-type-select" name="ticket_type" required>
            {% for ticket in tickets %}
            <option value="{{ ticket.ticket_type }}">{{ ticket.ticket_type }} - ${{ ticket.price }}</option>
            {% endfor %}
        </select>

        <label for="ticket-quantity-input">Quantity:</label>
        <input type="number" id="ticket-quantity-input" name="ticket_quantity" min="1" max="10" required />

        <button type="submit" id="book-ticket-button">Book Now</button>
    </form>
</body>
</html>
