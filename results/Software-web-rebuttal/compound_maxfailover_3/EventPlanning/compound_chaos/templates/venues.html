<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }}</title>
</head>
<body>
  <div id="venues-page">
    <h1>{{ page_title }}</h1>
    <input type="text" id="venue-search-input" placeholder="Search venues..." />
    <select id="venue-capacity-filter">
      <option>Small</option>
      <option>Medium</option>
      <option>Large</option>
    </select>
    <div id="venues-grid">
      {% for venue in venues %}
      <div class="venue-card">
        <h3>{{ venue.venue_name }}</h3>
        <p>{{ venue.location }}</p>
        <p>Capacity: {{ venue.capacity }}</p>
        <p>Amenities: {{ venue.amenities }}</p>
        <p>Contact: {{ venue.contact }}</p>
        <button id="view-venue-details-{{ venue.venue_id }}">View Details</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
