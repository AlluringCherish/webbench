<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }}</title>
</head>
<body>
  <div id="event-details-page">
    <h1 id="event-title">{{ event.event_name }}</h1>
    <div id="event-date">{{ event.date }} {{ event.time }}</div>
    <div id="event-location">{{ event.location }}</div>
    <div id="event-description">{{ event.description }}</div>
    <button id="book-ticket-button" onclick="location.href='{{ url_for('ticket_booking_page', event_id=event.event_id) }}'">Book Ticket</button>
  </div>
</body>
</html>
