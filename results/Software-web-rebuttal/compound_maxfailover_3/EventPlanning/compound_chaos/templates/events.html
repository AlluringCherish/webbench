<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }}</title>
</head>
<body>
  <div id="events-page">
    <input type="text" id="event-search-input" placeholder="Search events..." />
    <select id="event-category-filter">
      <option>Conference</option>
      <option>Concert</option>
      <option>Sports</option>
      <option>Workshop</option>
      <option>Social</option>
    </select>
    <div id="events-grid">
      {% for event in events %}
      <div class="event-card">
        <h3>{{ event.event_name }}</h3>
        <p>{{ event.category }} - {{ event.date }} {{ event.time }}</p>
        <p>{{ event.location }}</p>
        <p>{{ event.description }}</p>
        <p>Capacity: {{ event.capacity }}</p>
        <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details_page', event_id=event.event_id) }}'">View Details</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
