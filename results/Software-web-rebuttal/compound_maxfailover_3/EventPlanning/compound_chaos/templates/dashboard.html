<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page_title }}</title>
</head>
<body>
  <div id="dashboard-page">
    <div id="featured-events">
      {% for event in featured_events %}
      <div class="event-card">
        <h3>{{ event.event_name }}</h3>
        <p>{{ event.category }} - {{ event.date }} {{ event.time }}</p>
        <p>{{ event.location }}</p>
        <p>{{ event.description }}</p>
        <p>Capacity: {{ event.capacity }}</p>
      </div>
      {% endfor %}
    </div>
    <button id="browse-events-button" onclick="location.href='{{ url_for('events_listing_page') }}'">Browse Events</button>
    <button id="view-tickets-button" onclick="location.href='{{ url_for('bookings_summary_page') }}'">View Tickets</button>
    <button id="venues-button" onclick="location.href='{{ url_for('venues_page') }}'">Venues</button>
  </div>
</body>
</html>
