<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <button id="sort-by-date-button" type="button" onclick="// Sorting handled server side or JS outside scope">Sort by Date</button>
        <div id="reservations-list">
            {% if reservations %}
            <ul>
                {% for r in reservations %}
                <li>
                    Reservation #{{ r.reservation_id }} - Status: {{ r.status }}
                    <button id="modify-reservation-button-{{ r.reservation_id }}" onclick="location.href='{{ url_for('reservation_management', action='modify', reservation_id=r.reservation_id) }}'">Modify</button>
                    <button id="cancel-reservation-button-{{ r.reservation_id }}" onclick="location.href='{{ url_for('reservation_management', action='cancel', reservation_id=r.reservation_id) }}'">Cancel</button>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No reservations found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
