<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="requests-page">
        <form method="post" action="{{ url_for('special_requests') }}">
            <label for="select-reservation">Select Reservation:</label>
            <select id="select-reservation" name="reservation_id" required>
                {% for r in reservations %}
                <option value="{{ r.reservation_id }}">Reservation #{{ r.reservation_id }} - Status: {{ r.status }}</option>
                {% endfor %}
            </select>

            <label for="driver-assistance-checkbox">
                <input id="driver-assistance-checkbox" type="checkbox" name="driver_assistance">
                Driver Assistance
            </label>

            <label for="gps-option-checkbox">
                <input id="gps-option-checkbox" type="checkbox" name="gps_option">
                GPS Option
            </label>

            <label for="child-seat-quantity">Child Seat Quantity:</label>
            <input id="child-seat-quantity" type="number" name="child_seat_quantity" min="0" value="0">

            <label for="special-notes">Special Notes:</label>
            <textarea id="special-notes" name="special_notes" rows="4" cols="50"></textarea>

            <button id="submit-requests-button" type="submit">Submit Special Requests</button>
        </form>
    </div>
</body>
</html>
