<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
</head>
<body>
<div id="artists-page">
    <h1>Artists</h1>
    <form method="GET" action="{{ url_for('artists_page') }}">
        <input type="text" name="search_artists" placeholder="Search Artists">
        <button type="submit">Search</button>
    </form>
    <ul>
        {% for artist in artists %}
            <li id="artist-{{ artist.artist_id }}">
                {{ artist.name }} ({{ artist.genre }}) {{ artist.country }}<br>
                <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_profile', artist_id=artist.artist_id) }}'">View Profile</button>
            </li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
