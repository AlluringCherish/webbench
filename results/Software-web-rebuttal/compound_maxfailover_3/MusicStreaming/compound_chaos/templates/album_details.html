<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
    <h1>{{ album.album_name }}</h1>
    <div id="album-artist">Artist: {{ album.artist_name }}</div>
    <div id="album-release-year">Released: {{ album.release_year }}</div>
    <ul id="album-songs-list">
        {% for song in songs %}
            <li id="song-{{ song.song_id }}">{{ song.title }} - Duration: {{ song.duration }} seconds</li>
        {% endfor %}
    </ul>
    <button id="back-to-albums" onclick="location.href='{{ url_for('albums_page') }}'">Back to Albums</button>
</body>
</html>
