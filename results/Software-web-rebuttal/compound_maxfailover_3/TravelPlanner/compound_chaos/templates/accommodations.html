<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>
        <form method="POST" action="{{ url_for('accommodations') }}">
            <label for="destination-input">Destination City:</label>
            <input type="text" id="destination-input" name="destination" value="{{ filters.destination }}">

            <label for="check-in-date">Check-in Date:</label>
            <input type="date" id="check-in-date" name="check_in" value="{{ filters.check_in }}">

            <label for="check-out-date">Check-out Date:</label>
            <input type="date" id="check-out-date" name="check_out" value="{{ filters.check_out }}">

            <label for="price-filter">Price Range:</label>
            <select id="price-filter" name="price_range">
                <option value="" {% if filters.price_range == '' %}selected{% endif %}>All Prices</option>
                <option value="Budget" {% if filters.price_range == 'Budget' %}selected{% endif %}>Budget</option>
                <option value="Mid-range" {% if filters.price_range == 'Mid-range' %}selected{% endif %}>Mid-range</option>
                <option value="Luxury" {% if filters.price_range == 'Luxury' %}selected{% endif %}>Luxury</option>
            </select>

            <button type="submit">Search</button>
        </form>

        <div id="hotels-list">
            <h2>Hotels</h2>
            <ul>
                {% for hotel in hotels %}
                <li>
                    <strong>{{ hotel.name }}</strong> - {{ hotel.city }}<br>
                    Rating: {{ hotel.rating }} stars<br>
                    Price per night: ${{ hotel.price_per_night }}<br>
                    Amenities: {{ hotel.amenities }}<br>
                    Category: {{ hotel.category }}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
