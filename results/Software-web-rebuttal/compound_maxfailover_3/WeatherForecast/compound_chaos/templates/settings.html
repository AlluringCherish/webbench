<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
<div id="settings-page">
    <h1>Settings</h1>
    <form id="settings-form" method="POST" action="{{ url_for('save_settings') }}">
        <label for="default-location-select">Default Location:</label>
        <select id="default-location-select" name="default_location_id">
            {% for location in locations %}
                <option value="{{ location.location_id }}" {% if location.location_id == default_location_id %}selected{% endif %}>{{ location.location_name }}</option>
            {% endfor %}
        </select>
        <br />
        <label for="temperature-unit-select">Temperature Unit:</label>
        <select id="temperature-unit-select" name="temperature_unit">
            {% for unit in temperature_units %}
                <option value="{{ unit }}" {% if unit == temperature_units %}selected{% endif %}>{{ unit }}</option>
            {% endfor %}
        </select>
        <br />
        <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" value="true" {% if alert_notifications_enabled %}checked{% endif %} />
        <label for="alert-notifications-toggle">Enable Alert Notifications</label>
        <br />
        <button id="save-settings-button" type="submit">Save Settings</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
