<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Alerts</title>
</head>
<body>
<div id="alerts-page">
    <h1>Weather Alerts</h1>
    <label for="severity-filter">Severity Filter:</label>
    <select id="severity-filter">
        {% for severity in severity_filter_options %}
            <option value="{{ severity }}">{{ severity }}</option>
        {% endfor %}
    </select>
    <label for="location-filter-alerts">Location Filter:</label>
    <select id="location-filter-alerts">
        {% for location in location_filter_options %}
            <option value="{{ location.location_id }}">{{ location.location_name }}</option>
        {% endfor %}
    </select>
    <div id="alerts-list">
        {% for alert in alerts %}
        <div class="alert-entry">
            <p>Type: {{ alert.alert_type }}</p>
            <p>Severity: {{ alert.severity }}</p>
            <p>Description: {{ alert.description }}</p>
            <p>Start Time: {{ alert.start_time }}</p>
            <p>End Time: {{ alert.end_time }}</p>
            {% if not alert.is_acknowledged %}
            <form method="POST" action="{{ url_for('acknowledge_alert', alert_id=alert.alert_id) }}">
                <button id="acknowledge-alert-button-{{ alert.alert_id }}" type="submit">Acknowledge</button>
            </form>
            {% else %}
            <p>Acknowledged</p>
            {% endif %}
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
