<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
<div id="saved-locations-page">
    <h1>Saved Locations</h1>
    <table id="locations-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Temperature</th>
                <th>Condition</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for location in saved_locations %}
            <tr>
                <td>{{ location.location_id }}</td>
                <td>{{ location.location_name }}</td>
                <td>{{ location.temperature }}</td>
                <td>{{ location.condition }}</td>
                <td>
                    <button id="view-location-weather-{{ location.location_id }}" onclick="location.href='{{ url_for('view_location_weather', location_id=location.location_id) }}'">View Weather</button>
                    <form method="POST" action="{{ url_for('remove_saved_location', location_id=location.location_id) }}" style="display:inline;">
                        <button type="submit" id="remove-location-button-{{ location.location_id }}">Remove</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="add-new-location-button" onclick="location.href='{{ url_for('location_search_page') }}'">Add New Location</button>
</div>
</body>
</html>
