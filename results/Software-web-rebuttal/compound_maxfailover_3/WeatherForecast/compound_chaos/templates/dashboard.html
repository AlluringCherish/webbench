<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <div id="current-weather-summary">
        <h1>Weather Dashboard</h1>
        <p>Location: {{ current_weather_summary.location_name }}</p>
        <p>Temperature: <span id="temperature-display">{{ current_weather_summary.temperature }}</span></p>
        <p>Condition: <span id="condition-display">{{ current_weather_summary.condition }}</span></p>
        <p>Humidity: <span id="humidity-info">{{ current_weather_summary.humidity }}</span>%</p>
        <p>Wind Speed: <span id="wind-speed-info">{{ current_weather_summary.wind_speed }}</span> mph</p>
    </div>
    <button id="search-location-button" onclick="location.href='{{ quick_access_buttons.search_location }}'">Search Location</button>
    <button id="view-forecast-button" onclick="location.href='{{ quick_access_buttons.weekly_forecast }}'">View Weekly Forecast</button>
    <button id="view-alerts-button" onclick="location.href='{{ quick_access_buttons.alerts }}'">View Weather Alerts</button>
</div>
</body>
</html>
