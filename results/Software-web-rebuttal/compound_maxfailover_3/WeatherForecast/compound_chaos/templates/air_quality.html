<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
<div id="air-quality-page">
    <h1>Air Quality Index</h1>
    <label for="location-aqi-filter">Select Location:</label>
    <select id="location-aqi-filter" onchange="window.location.href='?location_id=' + this.value">
        {% for location in location_filter_options %}
            <option value="{{ location.location_id }}">{{ location.location_name }}</option>
        {% endfor %}
    </select>
    <div id="aqi-display">
        <p>AQI Index: {{ aqi_data.aqi_index }}</p>
    </div>
    <div id="aqi-description">
        <p>{{ health_recommendation }}</p>
    </div>
    <table id="pollution-details">
        <thead>
            <tr>
                <th>PM2.5</th>
                <th>PM10</th>
                <th>NO2</th>
                <th>O3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ aqi_data.pm25 }}</td>
                <td>{{ aqi_data.pm10 }}</td>
                <td>{{ aqi_data.no2 }}</td>
                <td>{{ aqi_data.o3 }}</td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
