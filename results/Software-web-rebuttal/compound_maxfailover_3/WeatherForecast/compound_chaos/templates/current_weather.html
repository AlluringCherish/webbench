<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
<div id="current-weather-page">
    <h1 id="location-name">{{ location_name }}</h1>
    <div id="temperature-display">Temperature: {{ temperature }}</div>
    <div id="weather-condition">Condition: {{ condition }}</div>
    <div id="humidity-info">Humidity: {{ humidity }}%</div>
    <div id="wind-speed-info">Wind Speed: {{ wind_speed }} mph</div>
</div>
</body>
</html>
