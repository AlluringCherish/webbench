<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memberships</title>
</head>
<body>
    <div id="memberships-section">
        <h1 id="memberships-title">Memberships</h1>
        <ul id="plans-list">
            {% for membership in memberships %}
                <li id="membership-{{ membership.membership_id }}">
                    {{ membership.plan_name }} - ${{ membership.price }} / {{ membership.billing_cycle }}
                    <a href="{{ url_for('plan_details', plan_id=membership.membership_id) }}">
                        <button id="view-details-button-{{ membership.membership_id }}">View Details</button>
                    </a>
                </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard-button">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
