<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-section">
        <h1 id="plan-title">Plan Details</h1>
        <p id="plan-name"><strong>Plan Name:</strong> {{ plan.plan_name }}</p>
        <p id="price"><strong>Price:</strong> ${{ plan.price }}</p>
        <p id="billing-cycle"><strong>Billing Cycle:</strong> {{ plan.billing_cycle }}</p>
        <p id="features"><strong>Features:</strong></p>
        <ul id="features-list">
            {% for feature in plan.features %}
                <li>- {{ feature }}</li>
            {% endfor %}
        </ul>
        <p id="max-classes"><strong>Maximum Classes:</strong> {{ plan.max_classes }}</p>

        <a href="{{ url_for('memberships') }}">
            <button id="back-to-memberships-button">Back to Memberships</button>
        </a>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard-button">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
