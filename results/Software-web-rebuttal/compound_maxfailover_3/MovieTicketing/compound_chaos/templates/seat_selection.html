<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>
        <div id="seat-map">
            {% for seat in seat_map %}
            <button 
                id="seat-{{ seat.row }}{{ seat.column }}" 
                class="seat-button {{ seat.status|lower }}"
                {% if seat.status != 'Available' %}disabled{% endif %}
                data-seat-id="{{ seat.seat_id }}"
                data-seat-type="{{ seat.seat_type }}"
            >
                {{ seat.row }}{{ seat.column }}
            </button>
            {% endfor %}
        </div>
        <div id="selected-seats-display">
            <!-- Selected seats to be displayed dynamically via JS -->
        </div>
        <button id="proceed-booking-button" onclick="location.href='{{ url_for('booking_confirmation') }}'">Proceed to Booking</button>
    </div>
</body>
</html>
