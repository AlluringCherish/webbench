<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>
        <div id="featured-movies">
            {% for movie in featured_movies %}
            <div class="featured-movie">
                <h2>{{ movie.title }}</h2>
                <p>Rating: {{ movie.rating }}</p>
                <p>Duration: {{ movie.duration }} min</p>
                <form action="{{ url_for('movie_details', movie_id=movie.movie_id) }}" method="get" style="display:inline;">
                    <button type="submit" id="view-movie-button-{{ movie.movie_id }}">View Movie Details</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <button id="browse-movies-button" onclick="location.href='{{ url_for('movie_catalog') }}'">Browse Movies</button>
        <button id="view-bookings-button" onclick="location.href='{{ url_for('booking_history') }}'">View Bookings</button>
        <button id="showtimes-button" onclick="location.href='{{ url_for('movie_catalog') }}'">Showtimes</button>
    </div>
</body>
</html>
