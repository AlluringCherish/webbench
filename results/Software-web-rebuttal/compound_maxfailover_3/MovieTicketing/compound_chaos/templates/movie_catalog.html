<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <form method="post" action="{{ url_for('movie_search') }}">
            <input type="text" id="search-input" name="search_term" placeholder="Search movies..." value="{{ search_term if search_term is defined else '' }}" />
            <select id="genre-filter" name="genre_filter">
                <option value="">All Genres</option>
                {% set genres = movies|map(attribute='genre')|unique|list|sort %}
                {% for genre in genres %}
                <option value="{{ genre }}" {% if genre_filter is defined and genre == genre_filter %}selected{% endif %}>{{ genre }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="movies-grid">
            {% for movie in movies %}
            <div class="movie-card">
                <h2>{{ movie.title }}</h2>
                <p>Genre: {{ movie.genre }}</p>
                <p>Rating: {{ movie.rating }}</p>
                <p>Duration: {{ movie.duration }} min</p>
                <form method="get" action="{{ url_for('movie_details', movie_id=movie.movie_id) }}">
                    <button type="submit" id="view-movie-button-{{ movie.movie_id }}">View Details</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
