<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auction Details</title>
</head>
<body>
<h1 id="auction-title">{{ auctions.title }}</h1>
<button id="place-bid-button" onclick="location.href='{{ url_for('place_bid', auction_id=auctions.auction_id) }}'">Place Bid</button>
<ul>
{% for bid in bid_history %}
<li>by {{ bid.bidder_name }} {{ bid.bid_time }}</li>
{% endfor %}
</ul>
</body>
</html>
