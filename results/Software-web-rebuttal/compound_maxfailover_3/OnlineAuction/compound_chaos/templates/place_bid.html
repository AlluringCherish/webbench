<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place Bid</title>
</head>
<body>
  <h1>Place a Bid</h1>
  <form method="post" action="{{ url_for('place_bid', auction_id=auction_id) }}">
    <label for="bid-amount">Bid Amount (minimum: $<span id="minimum-bid">{{ minimum_bid }}</span>):</label>
    <input type="number" id="bid-amount" name="bid_amount" min="{{ minimum_bid }}" required />
    <button type="submit" id="place-bid-button">Submit Bid</button>
  </form>
  <button id="cancel-button" onclick="location.href='{{ url_for('auction_details', auction_id=auction_id) }}'">Cancel</button>
</body>
</html>
