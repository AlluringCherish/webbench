<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
</head>
<body>
  <h1>Dashboard</h1>
  <button id="trending-auctions-button" onclick="location.href='{{ url_for('trending') }}'">Trending Auctions</button>
  <section id="auctions">
    <ul>
      {% for auction in auctions %}
      <li>
        <h2>{{ auction.title }}</h2>
        <p>{{ auction.description }}</p>
        <p>Current Bid: ${{ auction.current_bid }}</p>
        <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Auction</button>
      </li>
      {% endfor %}
    </ul>
  </section>
</body>
</html>
