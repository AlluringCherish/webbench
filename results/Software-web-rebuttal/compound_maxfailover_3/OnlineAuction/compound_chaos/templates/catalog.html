<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog</title>
</head>
<body id="catalog-page">
  <h1>Catalog</h1>
  <section id="categories">
    <ul>
    {% for category in categories %}
      <li id="category-card-{{ category.category_id }}">{{ category.name }}</li>
    {% endfor %}
    </ul>
  </section>
  <section id="auctions">
    <ul>
    {% for auction in auctions %}
      <li>
        <h2>{{ auction.title }}</h2>
        <p>{{ auction.description }}</p>
        <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Auction</button>
      </li>
    {% endfor %}
    </ul>
  </section>
</body>
</html>
