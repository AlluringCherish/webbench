<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
    <div id="bid-history-page">
        <h1>Bid History</h1>
        <select id="filter-by-auction">
            <option value="">All Auctions</option>
            {% for auction in auctions %}
                <option value="{{ auction.auction_id }}">{{ auction.item_name }}</option>
            {% endfor %}
        </select>
        <button id="sort-by-amount">Sort by Amount</button>
        <table id="bids-table" border="1">
            <thead>
                <tr>
                    <th>Bid ID</th>
                    <th>Auction Name</th>
                    <th>Bidder Name</th>
                    <th>Bid Amount</th>
                    <th>Bid Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                    <tr>
                        <td>{{ bid.bid_id }}</td>
                        <td>{{ bid.auction_name }}</td>
                        <td>{{ bid.bidder_name }}</td>
                        <td>${{ "%.2f"|format(bid.bid_amount) }}</td>
                        <td>{{ bid.bid_timestamp }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
