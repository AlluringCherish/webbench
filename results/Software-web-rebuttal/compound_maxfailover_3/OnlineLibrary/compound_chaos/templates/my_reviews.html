<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>My Reviews</h1>
    {% if reviews %}
    <div id="reviews-list">
        {% for review in reviews %}
        <div class="review-item" id="review-{{ review.review_id }}">
            <h3>{{ review.book_title }}</h3>
            <div>Rating: {{ review.rating }}/5</div>
            <p>{{ review.review_text }}</p>
            <button onclick="window.location.href='{{ url_for('write_review', book_id=review.book_id) }}'" id="edit-review-button-{{ review.review_id }}">Edit</button>
            <form action="{{ url_for('delete_review', review_id=review.review_id) }}" method="POST" style="display:inline;">
                <button type="submit" id="delete-review-button-{{ review.review_id }}">Delete</button>
            </form>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div id="no-reviews-message">You have no reviews yet.</div>
    {% endif %}
    <button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
</body>
</html>
