<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review for {{ book.title }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h2>Write a Review for "{{ book.title }}"</h2>
    <form action="{{ url_for('submit_review', book_id=book.book_id) }}" method="POST" id="write-review-form">
        <label for="rating-input">Rating:</label>
        <select id="rating-input" name="rating" required>
            {% for i in range(1, 6) %}
                <option value="{{ i }}" {% if existing_review and existing_review.rating == i %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
        </select><br/>

        <label for="review-text">Review:</label><br/>
        <textarea id="review-text" name="review_text" rows="5" cols="40">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea><br/>

        <button type="submit" id="submit-review-button">Submit Review</button>
    </form>
    <button onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'" id="back-to-book">Back to Book</button>
</body>
</html>
