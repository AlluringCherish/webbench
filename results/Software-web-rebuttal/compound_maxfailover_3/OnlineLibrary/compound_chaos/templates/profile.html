<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="profile-page">
        <h1 id="profile-username">Username: {{ username }}</h1>
        <form action="{{ url_for('update_profile') }}" method="POST" id="profile-update-form">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ email }}" required><br/>

            <label for="profile-phone">Phone:</label>
            <input type="text" id="profile-phone" name="phone" value="{{ phone }}"><br/>

            <label for="profile-address">Address:</label>
            <textarea id="profile-address" name="address" rows="4">{{ address }}</textarea><br/>

            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>
        <button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
