<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ username }}!</h1>
        <button onclick="window.location.href='{{ url_for('book_catalog') }}'" id="browse-books-button">Browse Books</button>
        <button onclick="window.location.href='{{ url_for('my_borrows') }}'" id="my-borrows-button">My Borrowings</button>
        <button onclick="window.location.href='{{ url_for('my_reservations') }}'" id="my-reservations-button">My Reservations</button>
        <button onclick="window.location.href='{{ url_for('my_reviews') }}'" id="my-reviews-button">My Reviews</button>
        <button onclick="window.location.href='{{ url_for('user_profile') }}'" id="profile-button">Profile</button>
    </div>
</body>
</html>
