<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu</title>
</head>
<body>
<h1>Restaurant Menu</h1>
<div id="menu-grid">
{% for dish in menus %}
<div class="dish-card">
<h3>{{ dish.name }}</h3>
<p>Category: {{ dish.category }}</p>
<p>Price: ${{ '%.2f'|format(dish.price) }}</p>
<p>Description: {{ dish.description }}</p>
<button onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">Details</button>
</div>
{% endfor %}
</div>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
