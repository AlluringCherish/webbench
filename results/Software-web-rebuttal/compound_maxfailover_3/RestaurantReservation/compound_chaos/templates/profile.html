<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
</head>
<body>
<div id="profile-page">
<h1>Profile</h1>
<div id="profile-username">Username: {{ username }}</div>
<form method="POST" action="/profile">
<label for="email">Email:</label>
<input id="email" name="email" type="text" value="{{ email }}" required>
<button id="update-profile-button" type="submit">Update Profile</button>
</form>
{% if success_message %}
<div style="color: green;">{{ success_message }}</div>
{% endif %}
{% if error_message %}
<div style="color: red;">{{ error_message }}</div>
{% endif %}
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
