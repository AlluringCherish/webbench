<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Write Review</title>
</head>
<body>
<div id="write-review-page">
<h1>Write Review</h1>
{% if errors %}
<ul style="color:red;">
{% for error in errors %}
<li>{{ error }}</li>
{% endfor %}
</ul>
{% endif %}
<form method="POST" action="/write-review">
<label for="select-dish">Select Dish:</label>
<select id="select-dish" name="dish_id">
{% for dish in dishes %}
<option value="{{ dish.dish_id }}">{{ dish.name }}</option>
{% endfor %}
</select>
<label for="rating-input">Rating:</label>
<select id="rating-input" name="rating">
{% for rating in range(1, 6) %}
<option value="{{ rating }}">{{ rating }}</option>
{% endfor %}
</select>
<label for="review-text">Review:</label>
<textarea id="review-text" name="review_text" rows="4" cols="50" required></textarea>
<button id="submit-review-button" type="submit">Submit Review</button>
</form>
<button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
</div>
</body>
</html>
