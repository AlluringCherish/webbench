<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Reservations</title>
</head>
<body>
<div id="my-reservations-page">
<h1>My Reservations</h1>
<table border="1">
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Party Size</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for reservation in reservations %}
<tr>
<td>{{ reservation.date }}</td>
<td>{{ reservation.time }}</td>
<td>{{ reservation.party_size }}</td>
<td>{{ reservation.status }}</td>
<td>
<form method="POST" action="/cancel-reservation/{{ reservation.reservation_id }}" style="display:inline;">
<button type="submit">Cancel</button>
</form>
</td>
</tr>
{% endfor %}
</tbody>
</table>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
