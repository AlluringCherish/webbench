<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waitlist</title>
</head>
<body>
<div id="waitlist-page">
<h1>Waitlist</h1>
{% if error_message %}
<p style="color:red;">{{ error_message }}</p>
{% endif %}
<form method="POST" action="/waitlist">
<label for="party-size">Party Size:</label>
<select id="party-size" name="party_size">
{% for size in range(1, 11) %}
<option value="{{ size }}">{{ size }}</option>
{% endfor %}
</select>
<button type="submit" id="join-waitlist-button">Join Waitlist</button>
</form>
<div id="user-position">
{% if user_position is not none %}
<p>Your position in waitlist: {{ user_position }}</p>
{% else %}
<p>You are not currently in the waitlist.</p>
{% endif %}
</div>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
