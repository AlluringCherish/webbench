<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Reviews</title>
</head>
<body>
<div id="reviews-list">
<h1>My Reviews</h1>
{% for review in reviews %}
<div class="review-entry">
<h3>{{ review.dish_name }} {{ review.rating }}/5</h3>
<p>{{ review.review_text }}</p>
</div>
{% endfor %}
<button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write Review</button>
<button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
