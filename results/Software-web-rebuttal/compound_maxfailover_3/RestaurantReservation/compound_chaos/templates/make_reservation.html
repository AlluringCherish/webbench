<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make Reservation</title>
</head>
<body>
<div id="reservation-page">
<h1>Make Reservation</h1>
{% if error_message %}
<p style="color:red;">{{ error_message }}</p>
{% endif %}
<form method="POST" action="/make-reservation">
<label for="guest-name">Guest Name:</label>
<input id="guest-name" name="guest_name" type="text" required>
<label for="party-size">Party Size:</label>
<select id="party-size" name="party_size" required>
{% for size in range(1, 11) %}
<option value="{{ size }}">{{ size }}</option>
{% endfor %}
</select>
<label for="reservation-date">Reservation Date:</label>
<input id="reservation-date" name="reservation_date" type="date" required>
<button id="submit-reservation" type="submit">Make Reservation</button>
</form>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
