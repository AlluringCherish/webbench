<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>
        <h2 id="device-name-display">{{ device.device_name }}</h2>
        <div id="device-status-display">Status: {{ device.status }}</div>

        <form method="POST" action="{{ url_for('device_control_submit', device_id=device.device_id) }}">
            <button type="submit" id="power-toggle" name="power_toggle">Toggle Power</button>
            <!-- Additional controls can be included as needed -->
            <button type="submit" id="save-settings-button" name="save_settings">Save Settings</button>
        </form>

        <button id="back-to-devices" onclick="window.location.href='{{ url_for('device_list_page') }}'">Back to Devices</button>
    </div>
</body>
</html>
