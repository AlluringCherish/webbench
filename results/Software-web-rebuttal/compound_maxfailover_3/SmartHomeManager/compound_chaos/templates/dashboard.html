<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Smart Home Dashboard</h1>
        <div id="device-summary">
            <p>Total Devices: {{ device_counts.total }}</p>
            <p>Active Devices: {{ device_counts.active }}</p>
            <p>Offline Devices: {{ device_counts.offline }}</p>
        </div>

        <button id="device-list-button" onclick="window.location.href='{{ url_for('device_list_page') }}'">Device List</button>
        <button id="add-device-button" onclick="window.location.href='{{ url_for('add_device_page') }}'">Add Device</button>
        <button id="automation-button" onclick="window.location.href='{{ url_for('automation_rules_page') }}'">Automation Rules</button>
        <button id="energy-button" onclick="window.location.href='{{ url_for('energy_report_page') }}'">Energy Report</button>
        <button id="activity-button" onclick="window.location.href='{{ url_for('activity_logs_page') }}'">Activity Logs</button>

        <div id="room-list">
            <h2>Rooms Summary</h2>
            <ul>
                {% for room_name, counts in rooms_summary.items() %}
                <li>{{ room_name }}: {{ counts }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
