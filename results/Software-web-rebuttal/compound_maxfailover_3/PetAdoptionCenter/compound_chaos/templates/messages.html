<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>
        <div id="conversation-list">
            {% for convo in conversations %}
            <div id="conversation-{{ convo.message_id }}">
                <h3>{{ convo.subject }}</h3>
                <p>From: {{ convo.sender_username }} To: {{ convo.recipient_username }}</p>
                <p>{{ convo.last_message }}</p>
                {% if convo.unread_count > 0 %}
                <p><strong>Unread Messages: {{ convo.unread_count }}</strong></p>
                {% endif %}
            </div>
            {% endfor %}
        </div>
        <form method="post" action="">
            <textarea id="message-input" name="message" placeholder="Write your message here..."></textarea><br>
            <button type="submit" id="send-message-button">Send</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
