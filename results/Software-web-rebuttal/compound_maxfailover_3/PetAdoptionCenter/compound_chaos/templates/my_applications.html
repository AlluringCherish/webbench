<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>
        <form method="get" action="">
            <label for="filter-status">Filter Status:</label>
            <select id="filter-status" name="filter_status">
                <option value="" {% if filter_status == '' %}selected{% endif %}>All</option>
                <option value="Pending" {% if filter_status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Approved" {% if filter_status == 'Approved' %}selected{% endif %}>Approved</option>
                <option value="Rejected" {% if filter_status == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Application ID</th>
                    <th>Pet Name</th>
                    <th>Date Submitted</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr id="application-{{ app.application_id }}">
                    <td>{{ app.application_id }}</td>
                    <td>{{ app.pet_name }}</td>
                    <td>{{ app.date_submitted }}</td>
                    <td>{{ app.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
