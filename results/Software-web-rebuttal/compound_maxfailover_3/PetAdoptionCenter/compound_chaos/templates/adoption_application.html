<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
    <div id="application-page">
        <h1>Adoption Application for {{ pet.name }}</h1>
        <form method="post" action="">
            <label for="applicant-name">Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" required>

            <label for="applicant-phone">Phone:</label>
            <input type="text" id="applicant-phone" name="phone" required>

            <label for="housing-type">Housing Type:</label>
            <select id="housing-type" name="housing_type" required>
                <option value="House">House</option>
                <option value="Apartment">Apartment</option>
                <option value="Condo">Condo</option>
                <option value="Other">Other</option>
            </select>

            <label for="reason">Reason for Adoption:</label>
            <textarea id="reason" name="reason" required></textarea>

            <button type="submit" id="submit-application-button">Submit Application</button>
        </form>
        <button id="back-to-pet" onclick="location.href='{{ url_for('pet_details_page', pet_id=pet.pet_id) }}'">Back to Pet</button>
    </div>
</body>
</html>
