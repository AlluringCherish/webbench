<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <div id="profile-username">{{ username }}</div>
        <form method="post" action="">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ email }}" required>
            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
