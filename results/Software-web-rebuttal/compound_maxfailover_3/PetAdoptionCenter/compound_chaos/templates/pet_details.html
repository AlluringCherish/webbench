<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Details</title>
</head>
<body>
    <div id="pet-details-page">
        <h1 id="pet-name">{{ pet.name }}</h1>
        <div id="pet-species">Species: {{ pet.species }}</div>
        <div id="pet-description">{{ pet.description }}</div>

        <button id="adopt-button" onclick="location.href='{{ url_for('adoption_application_page', pet_id=pet.pet_id) }}'">Adopt</button>
        <button id="back-to-listings" onclick="location.href='{{ url_for('pet_listings_page') }}'">Back to Listings</button>
    </div>
</body>
</html>
