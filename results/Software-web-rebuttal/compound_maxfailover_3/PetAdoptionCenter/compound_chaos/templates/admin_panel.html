<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
    <div id="admin-panel-page">
        <h1>Admin Panel</h1>
        <div id="pending-applications">
            <h2>Pending Applications</h2>
            {% for app in pending_applications %}
            <div id="application-{{ app.application_id }}">
                <p>Applicant: {{ app.applicant_name }}</p>
                <p>Pet: {{ app.pet_name }}</p>
                <p>Date Submitted: {{ app.date_submitted }}</p>
                <form method="post" action="{{ url_for('approve_application', application_id=app.application_id) }}" style="display:inline">
                    <button type="submit">Approve</button>
                </form>
                <form method="post" action="{{ url_for('reject_application', application_id=app.application_id) }}" style="display:inline">
                    <button type="submit">Reject</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <div id="all-pets-list">
            <h2>All Pets</h2>
            {% for pet in all_pets %}
            <div id="pet-{{ pet.pet_id }}">
                <p>Name: {{ pet.name }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
