<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
</head>
<body>
<div id="create_article-page">
    <h1>Create New Article</h1>
    <form id="create_article_form" method="POST" action="{{ url_for('create_article') }}">
        <label for="article-title">Title:</label>
        <input type="text" id="article-title" name="title" required />

        <label for="article-content">Content:</label>
        <textarea id="article-content" name="content" required></textarea>

        <button type="submit">Create Article</button>
    </form>

    <nav id="nav_buttons">
        <button onclick="window.location.href='{{ url_for('dashboard') }}'">Dashboard</button>
        <button onclick="window.location.href='{{ url_for('my_articles') }}'">My Articles</button>
    </nav>
</div>
</body>
</html>
