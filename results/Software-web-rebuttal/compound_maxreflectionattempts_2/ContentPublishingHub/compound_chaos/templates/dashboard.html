<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Welcome, {{ username }}!</h1>
    <section id="quick_stats">
        <h2>Quick Stats</h2>
        <ul>
            {% for stat_name, stat_value in quick_stats.items() %}
            <li><strong>{{ stat_name }}:</strong> {{ stat_value }}</li>
            {% endfor %}
        </ul>
    </section>

    <section id="recent_activity">
        <h2>Recent Activity</h2>
        <ul>
            {% for activity in recent_activity %}
            <li>{{ activity }}</li>
            {% endfor %}
        </ul>
    </section>

    <nav id="nav_buttons">
        <button onclick="window.location.href='{{ url_for('create_article') }}'">Create New Article</button>
        <button onclick="window.location.href='{{ url_for('my_articles') }}'">My Articles</button>
        <button onclick="window.location.href='{{ url_for('published_articles') }}'">Published Articles</button>
        <button onclick="window.location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        <button onclick="window.location.href='{{ url_for('my_articles') }}'">Article Analytics</button>
    </nav>
</div>
</body>
</html>
