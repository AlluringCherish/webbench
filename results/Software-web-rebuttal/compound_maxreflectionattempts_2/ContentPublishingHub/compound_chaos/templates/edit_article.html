<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
</head>
<body>
<div id="edit_article-page">
    <h1>Edit Article</h1>
    <form id="edit_article_form" method="POST" action="{{ url_for('edit_article', article_id=article.article_id) }}">
        <label for="article-title">Title:</label>
        <input type="text" id="article-title" name="title" value="{{ article.title }}" required />

        <label for="article-content">Content:</label>
        <textarea id="article-content" name="content" required>{{ latest_version.content if latest_version else '' }}</textarea>

        <button type="submit">Save Changes</button>
    </form>

    <nav id="nav_buttons">
        <button onclick="window.location.href='{{ url_for('dashboard') }}'">Dashboard</button>
        <button onclick="window.location.href='{{ url_for('my_articles') }}'">My Articles</button>
        <button onclick="window.location.href='{{ url_for('article_version_history', article_id=article.article_id) }}'">Version History</button>
    </nav>
</div>
</body>
</html>
