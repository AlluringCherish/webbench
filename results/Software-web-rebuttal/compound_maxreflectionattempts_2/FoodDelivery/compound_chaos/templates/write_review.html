<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="write-review-page">
            <h1>Write Review</h1>
            <form method="POST" action="{{ url_for('submit_review') }}">
                <label for="select-restaurant">Select Restaurant:</label>
                <select id="select-restaurant" name="restaurant_id" required>
                    {% for restaurant in restaurants %}
                        <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                    {% endfor %}
                </select>

                <label for="reviewer-name">Your Name:</label>
                <input type="text" id="reviewer-name" name="customer_name" required>

                <label for="rating-select">Rating:</label>
                <select id="rating-select" name="rating" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review_text" required></textarea>

                <button type="submit" id="submit-review-button">Submit Review</button>
            </form>
        </div>
    </div>
</body>
</html>
