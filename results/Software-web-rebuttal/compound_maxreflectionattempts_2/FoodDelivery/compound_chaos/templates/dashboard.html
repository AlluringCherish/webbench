<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="dashboard-page">
            <h1>Food Delivery Dashboard</h1>
            <div id="featured-restaurants">
                {% for restaurant in featured_restaurants %}
                    <div class="restaurant-card">
                        <h2>{{ restaurant.name }}</h2>
                        <p>Cuisine: {{ restaurant.cuisine }}</p>
                        <p>Rating: {{ restaurant.rating }}</p>
                    </div>
                {% endfor %}
            </div>
            <a href="{{ url_for('browse_restaurants') }}">
                <button id="browse-restaurants-button">Browse Restaurants</button>
            </a>
            <a href="{{ url_for('shopping_cart') }}">
                <button id="view-cart-button">View Cart</button>
            </a>
            <a href="{{ url_for('active_orders') }}">
                <button id="active-orders-button">Active Orders</button>
            </a>
        </div>
    </div>
</body>
</html>
