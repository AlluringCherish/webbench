<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders-page">
            <h1>Active Orders</h1>
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status">
                <option value="">All</option>
                {% for status_option in status_filter_options %}
                    <option value="{{ status_option }}" {% if status_option == selected_status %}selected{% endif %}>{{ status_option }}</option>
                {% endfor %}
            </select>
            <div id="orders-list">
                {% for order in active_orders %}
                    <div class="order-card">
                        <p>Order ID: {{ order.order_id }}</p>
                        <p>Customer: {{ order.customer_name }}</p>
                        <p>Status: {{ order.status }}</p>
                        <a href="{{ url_for('order_tracking', order_id=order.order_id) }}">
                            <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                        </a>
                    </div>
                {% endfor %}
            </div>
            <a href="{{ url_for('dashboard_page') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
