<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating">
                <option value="">All</option>
                {% for rating_option in rating_filter_options %}
                    <option value="{{ rating_option }}" {% if rating_option == selected_rating %}selected{% endif %}>{{ rating_option }}</option>
                {% endfor %}
            </select>
            <div id="reviews-list">
                {% for review in reviews %}
                    <div class="review-card">
                        <p>Customer: {{ review.customer_name }}</p>
                        <p>Rating: {{ review.rating }}</p>
                        <p>Review: {{ review.review_text }}</p>
                    </div>
                {% endfor %}
            </div>
            <a href="{{ url_for('write_review_page') }}">
                <button id="write-review-button">Write Review</button>
            </a>
            <a href="{{ url_for('dashboard_page') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
