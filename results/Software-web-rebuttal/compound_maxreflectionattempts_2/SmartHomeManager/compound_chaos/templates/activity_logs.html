<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <div id="activity-page">
        <h1>Activity Logs</h1>
        <form method="POST" action="{{ url_for('activity_logs_page') }}">
            <input type="text" id="search-activity" name="search_term" placeholder="Search logs..." value="{{ search_term }}">
            <button type="submit" id="apply-search-button">Search</button>
        </form>
        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for log in activity_logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td>
                        {% for device in devices %}
                            {% if device.device_id == log.device_id %}
                                {{ device.device_name }}
                            {% endif %}
                        {% endfor %}
                    </td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
