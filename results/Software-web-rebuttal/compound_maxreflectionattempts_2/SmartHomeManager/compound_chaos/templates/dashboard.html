<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Smart Home Dashboard</h1>
        <div id="device-summary">
            <!-- Summary of total devices, active devices, and offline devices count -->
            <p>Total Devices: {{ device_summary.total_devices }}</p>
            <p>Active Devices: {{ device_summary.active_devices }}</p>
            <p>Offline Devices: {{ device_summary.offline_devices }}</p>
        </div>
        <button id="device-list-button" onclick="location.href='{{ url_for('device_list_page') }}'">Device List</button>
        <button id="add-device-button" onclick="location.href='{{ url_for('add_device_page') }}'">Add Device</button>
        <button id="automation-button" onclick="location.href='{{ url_for('automation_rules_page') }}'">Automation Rules</button>
        <button id="energy-button" onclick="location.href='{{ url_for('energy_report_page') }}'">Energy Report</button>
        <button id="activity-button" onclick="location.href='{{ url_for('activity_logs_page') }}'">Activity Logs</button>
        <div id="room-list">
            <!-- List all rooms with device counts -->
            <ul>
                {% for room in rooms %}
                <li>{{ room.room_name }} ({{ room.device_count }})</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
