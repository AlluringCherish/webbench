<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="my-reservations-page">
        <table id="reservations-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Party Size</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.date }}</td>
                    <td>{{ reservation.time }}</td>
                    <td>{{ reservation.party_size }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        {% if reservation.status == 'Upcoming' %}
                        <form action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}" method="POST" style="display:inline;">
                            <button type="submit" id="cancel-reservation-button-{{ reservation.reservation_id }}">Cancel</button>
                        </form>
                        {% else %}
                        &mdash;
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
