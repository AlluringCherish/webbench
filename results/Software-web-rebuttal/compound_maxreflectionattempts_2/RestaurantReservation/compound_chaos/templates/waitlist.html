<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <form action="" method="POST">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="party_size" required>
                {% for size in range(1, 11) %}
                <option value="{{ size }}" {% if user_party_size == size %}selected{% endif %}>{{ size }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="join-waitlist-button">Join Waitlist</button>
        </form>
        <div id="user-position">Your current position in the waitlist: {{ waitlist_position }}</div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
