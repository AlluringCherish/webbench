<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        {% if success_message %}
        <div class="success-message">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
        <div class="error-message">{{ error_message }}</div>
        {% endif %}
        <form action="" method="POST">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="select_dish" required>
                {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                {% for r in range(1, 6) %}
                <option value="{{ r }}">{{ r }}</option>
                {% endfor %}
            </select>

            <label for="review-text">Review Text:</label>
            <textarea id="review-text" name="review_text" required></textarea>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
        <button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
    </div>
</body>
</html>
