<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>My Reviews</h1>
        <div id="reviews-list">
            {% if reviews|length == 0 %}
            <p>You have not written any reviews yet.</p>
            {% else %}
            {% for review in reviews %}
            <div class="review-entry">
                <h3>{{ review.dish_name }}</h3>
                <div>Rating: {{ review.rating }} / 5</div>
                <p>{{ review.review_text }}</p>
            </div>
            {% endfor %}
            {% endif %}
        </div>
        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
