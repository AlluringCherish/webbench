<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Details</title>
</head>
<body>
    <div id="movie-details-page">
        <h1>Movie Details</h1>

        <h1 id="movie-title">{{ movie.title }}</h1>
        <div id="movie-director">Director: {{ movie.director }}</div>
        <div id="movie-rating">Rating: {{ movie.rating }}</div>
        <div id="movie-description">Description: {{ movie.description }}</div>

        <button id="select-showtime-button" onclick="window.location.href='{{ url_for('select_showtime', movie_id=movie.movie_id) }}'">Select Showtime</button>
    </div>
</body>
</html>
