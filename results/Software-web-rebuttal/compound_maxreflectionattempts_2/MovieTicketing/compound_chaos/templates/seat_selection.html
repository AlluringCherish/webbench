<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>

        <div id="seat-map">
            {% for seat in seats_map %}
                <button id="seat-{{ seat.row }}{{ seat.column }}" class="seat {{ seat.seat_type }} {{ seat.status|lower }}">{{ seat.row }}{{ seat.column }}</button>
            {% endfor %}
        </div>

        <div id="selected-seats-display">
            <h2>Selected Seats</h2>
            <ul>
                {% for seat in seats_map if seat.status == 'Selected' %}
                    <li>{{ seat.row }}{{ seat.column }}</li>
                {% endfor %}
            </ul>
        </div>

        <button id="proceed-booking-button" onclick="window.location.href='{{ url_for('booking_confirmation', movie_id=showtime.movie_id, showtime_id=showtime.showtime_id) }}'">Proceed to Booking</button>
    </div>
</body>
</html>
