<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>

        <form method="get" action="" id="search-form">
            <input type="text" id="search-input" name="search_query" value="{{ search_query }}" placeholder="Search movies by title or genre">
            <select id="genre-filter" name="selected_genre" onchange="this.form.submit()">
                <option value="">All Genres</option>
                {% for genre in genres %}
                    <option value="{{ genre }}" {% if selected_genre == genre %}selected{% endif %}>{{ genre }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="movies-grid">
            {% for movie in movies %}
                <div class="movie-card">
                    <img src="{{ movie.poster_url }}" alt="{{ movie.title }} poster" />
                    <div>{{ movie.title }}</div>
                    <div>Genre: {{ movie.genre }}</div>
                    <div>Rating: {{ movie.rating }}</div>
                    <div>Duration: {{ movie.duration }} min</div>
                    <button id="view-movie-button-{{ movie.movie_id }}" onclick="window.location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
