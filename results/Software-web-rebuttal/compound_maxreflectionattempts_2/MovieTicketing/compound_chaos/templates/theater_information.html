<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>

        <form method="get" action="" id="location-filter-form">
            <label for="theater-location-filter">Filter by Location:</label>
            <select id="theater-location-filter" name="selected_location" onchange="this.form.submit()">
                <option value="">All Locations</option>
                {% for theater in theaters %}
                    <option value="{{ theater.location }}" {% if selected_location == theater.location %}selected{% endif %}>{{ theater.location }}</option>
                {% endfor %}
            </select>
        </form>

        <div id="theaters-list">
            {% for theater in theaters %}
                <div class="theater-item">
                    <div><strong>{{ theater.theater_name }}</strong></div>
                    <div>Location: {{ theater.location }}</div>
                    <div>City: {{ theater.city }}</div>
                    <div>Screens: {{ theater.screens }}</div>
                    <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
                </div>
            {% else %}
                <div>No theaters found.</div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
