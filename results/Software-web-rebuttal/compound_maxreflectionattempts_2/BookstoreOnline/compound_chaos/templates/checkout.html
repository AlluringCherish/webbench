<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>

        <div id="cart-summary">
            <h2>Order Summary</h2>
            <ul>
            {% for item in cart_items %}
                <li>{{ item.title }} x {{ item.quantity }} - ${{ "%.2f"|format(item.subtotal) }}</li>
            {% endfor %}
            </ul>
            <div id="total-amount">
                <strong>Total Amount: ${{ "%.2f"|format(total_amount) }}</strong>
            </div>
        </div>

        <form method="post" action="{{ url_for('checkout_page') }}">
            <label for="customer-name">Customer Name:</label><br>
            <input type="text" id="customer-name" name="customer_name" required><br><br>

            <label for="shipping-address">Shipping Address:</label><br>
            <textarea id="shipping-address" name="shipping_address" rows="4" cols="50" required></textarea><br><br>

            <label for="payment-method">Payment Method:</label><br>
            <select id="payment-method" name="payment_method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select><br><br>

            <button type="submit" id="place-order-button">Place Order</button>
        </form>

    </div>
</body>
</html>
