<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Customer Reviews</h1>

        <form method="get" action="{{ url_for('reviews_page') }}">
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating_filter" onchange="this.form.submit()">
                <option value="All" {% if rating_filter == 'All' %}selected{% endif %}>All</option>
                <option value="5 stars" {% if rating_filter == '5 stars' %}selected{% endif %}>5 stars</option>
                <option value="4 stars" {% if rating_filter == '4 stars' %}selected{% endif %}>4 stars</option>
                <option value="3 stars" {% if rating_filter == '3 stars' %}selected{% endif %}>3 stars</option>
                <option value="2 stars" {% if rating_filter == '2 stars' %}selected{% endif %}>2 stars</option>
                <option value="1 star" {% if rating_filter == '1 star' %}selected{% endif %}>1 star</option>
            </select>
        </form>

        <div id="reviews-list">
            {% for review in reviews %}
                <div class="review">
                    <h3>{{ review.book_title }}</h3>
                    <p>Rating: {{ review.rating }}/5</p>
                    <p>{{ review.review_text }}</p>
                    <p><em>Reviewed on {{ review.review_date }}</em></p>
                </div>
            {% else %}
                <p>No reviews found.</p>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="location.href='{{ url_for('write_review_page') }}'">Write a Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
