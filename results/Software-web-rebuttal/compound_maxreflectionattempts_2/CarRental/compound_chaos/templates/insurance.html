<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="main-container">
        <h1>Select Insurance Coverage</h1>
        <div id="insurance-page">
            <form method="post">
                <div id="insurance-options">
                    {% for plan in insurance_plans %}
                    <div class="insurance-plan">
                        <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="insurance_plan" value="{{ plan.insurance_id }}" {% if selected_plan and selected_plan.insurance_id == plan.insurance_id %}checked{% endif %} />
                        <label for="select-insurance-{{ plan.insurance_id }}">{{ plan.plan_name }}</label>
                    </div>
                    {% endfor %}
                </div>

                {% if selected_plan %}
                <div id="insurance-description">Description: {{ selected_plan.description }}</div>
                <div id="insurance-price">Daily Price: ${{ "%.2f"|format(selected_plan.daily_cost) }}</div>
                {% else %}
                <div id="insurance-description">No insurance plan selected.</div>
                <div id="insurance-price"></div>
                {% endif %}

                <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
