<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="main-container">
        <h1>Pickup and Dropoff Locations</h1>
        <div id="locations-page">
            <label for="hours-filter">Hours Filter:</label>
            <select id="hours-filter" name="hours-filter">
                {% for option in hours_filter_options %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>

            <label for="search-location-input">Search Location:</label>
            <input type="text" id="search-location-input" name="search_location_input" />

            <div id="locations-list">
                {% for loc in locations %}
                <div class="location-card">
                    <p>{{ loc.city }} - {{ loc.address }}</p>
                    <button id="location-detail-button-{{ loc.location_id }}">View Details</button>
                </div>
                {% endfor %}
            </div>

            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
