<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            <form method="post">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="select_reservation">
                    {% for res in reservations %}
                    <option value="{{ res.reservation_id }}" {% if submitted_data and submitted_data.select_reservation == res.reservation_id|string %}selected{% endif %}>Reservation {{ res.reservation_id }}</option>
                    {% endfor %}
                </select>

                <label for="driver-assistance-checkbox">
                    <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance" {% if submitted_data and submitted_data.driver_assistance %}checked{% endif %} /> Driver Assistance
                </label>

                <label for="gps-option-checkbox">
                    <input type="checkbox" id="gps-option-checkbox" name="gps_option" {% if submitted_data and submitted_data.gps_option %}checked{% endif %} /> GPS Option
                </label>

                <label for="child-seat-quantity">Child Seat Quantity:</label>
                <input type="number" id="child-seat-quantity" name="child_seat_quantity" value="{{ submitted_data.child_seat_quantity if submitted_data else 0 }}" min="0" />

                <label for="special-notes">Special Notes:</label>
                <textarea id="special-notes" name="special_notes">{{ submitted_data.special_notes if submitted_data else '' }}</textarea>

                <button type="submit" id="submit-requests-button">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
