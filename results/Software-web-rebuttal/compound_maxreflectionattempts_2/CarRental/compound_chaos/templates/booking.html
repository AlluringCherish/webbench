<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="post">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location">
                    {% for loc in locations %}
                    <option value="{{ loc.location_id }}" {% if booking_form_data.pickup_location == loc.location_id|string %}selected{% endif %}>{{ loc.city }} - {{ loc.address }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location">
                    {% for loc in locations %}
                    <option value="{{ loc.location_id }}" {% if booking_form_data.dropoff_location == loc.location_id|string %}selected{% endif %}>{{ loc.city }} - {{ loc.address }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input type="date" id="pickup-date" name="pickup_date" value="{{ booking_form_data.pickup_date }}" />

                <label for="dropoff-date">Dropoff Date:</label>
                <input type="date" id="dropoff-date" name="dropoff_date" value="{{ booking_form_data.dropoff_date }}" />

                <button type="submit" id="calculate-price-button">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if booking_form_data.total_price is defined %}
                Total Price: ${{ "%.2f"|format(booking_form_data.total_price) }}
                {% else %}
                Total Price: N/A
                {% endif %}
            </div>

            {% if booking_form_data.total_price is defined and booking_form_data.total_price > 0 %}
            <button id="proceed-to-insurance-button" onclick="window.location.href='{{ url_for('insurance', reservation_id=booking_form_data.reservation_id) }}'">Proceed to Insurance Options</button>
            {% endif %}
        </div>
    </div>
</body>
</html>
