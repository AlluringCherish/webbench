<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Board Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Job Board Dashboard</h1>

        <div id="featured-jobs">
            {% for job in featured_jobs %}
            <div class="featured-job-card">
                <h3>{{ job.title }}</h3>
                <p><strong>Company:</strong> {{ job.company_name }}</p>
                <p><strong>Location:</strong> {{ job.location }}</p>
                <p><strong>Salary:</strong> ${{ job.salary_min }} - ${{ job.salary_max }}</p>
                <p><strong>Category:</strong> {{ job.category }}</p>
            </div>
            {% else %}
            <p>No featured jobs available.</p>
            {% endfor %}
        </div>

        <a href="{{ url_for('job_listings') }}">
            <button id="browse-jobs-button">Browse Jobs</button>
        </a>
        <a href="{{ url_for('application_tracking') }}">
            <button id="my-applications-button">My Applications</button>
        </a>
        <a href="{{ url_for('companies_directory') }}">
            <button id="companies-button">Companies</button>
        </a>

    </div>
</body>
</html>
