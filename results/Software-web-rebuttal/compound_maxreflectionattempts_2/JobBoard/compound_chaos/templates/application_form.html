<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
    <div id="application-form-page">
        <h1>Submit Application</h1>

        <form method="POST" action="{{ url_for('application_form', job_id=job.job_id) }}" enctype="multipart/form-data">
            <label for="applicant-name">Name:</label><br>
            <input type="text" id="applicant-name" name="applicant_name" required><br>

            <label for="applicant-email">Email:</label><br>
            <input type="email" id="applicant-email" name="applicant_email" required><br>

            <label for="resume-upload">Upload Resume:</label><br>
            <input type="file" id="resume-upload" name="resume_file" accept=".pdf,.doc,.docx" required><br>

            <label for="cover-letter">Cover Letter:</label><br>
            <textarea id="cover-letter" name="cover_letter" required></textarea><br>

            <button type="submit" id="submit-application-button">Submit Application</button>
        </form>
    </div>
</body>
</html>
