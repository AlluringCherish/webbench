<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
    <div id="company-profile-page">
        <h1>{{ company.company_name }}</h1>

        <div id="company-info">
            <p><strong>Industry:</strong> {{ company.industry }}</p>
            <p><strong>Location:</strong> {{ company.location }}</p>
            <p><strong>Description:</strong></p>
            <p>{{ company.description }}</p>
        </div>

        <div id="company-jobs">
            <h2>Open Positions</h2>
            <div id="jobs-list">
                {% for job in jobs %}
                <div class="job-card">
                    <span>{{ job.title }}</span> - <span>{{ job.status }}</span>
                    <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Details</button>
                    </a>
                </div>
                {% else %}
                <p>No open jobs available.</p>
                {% endfor %}
            </div>
        </div>

        <a href="{{ url_for('companies_directory') }}">
            <button id="back-to-companies">Back to Companies</button>
        </a>
    </div>
</body>
</html>
