<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>

        <input type="text" id="search-company-input" placeholder="Search companies by name or industry" />

        <div id="companies-list">
            {% for company in companies %}
            <div class="company-card">
                <h3>{{ company.company_name }}</h3>
                <p><strong>Industry:</strong> {{ company.industry }}</p>
                <p><strong>Employees:</strong> {{ company.employee_count }}</p>
                <a href="{{ url_for('company_profile', company_id=company.company_id) }}">
                    <button id="view-company-button-{{ company.company_id }}">View Profile</button>
                </a>
            </div>
            {% else %}
            <p>No companies found.</p>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_view') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
