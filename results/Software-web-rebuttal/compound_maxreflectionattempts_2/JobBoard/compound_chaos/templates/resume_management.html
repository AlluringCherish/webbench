<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
    <script>
    function triggerUpload() {
        document.getElementById('resume-file-input').click();
    }
    function submitDeleteForm(formId) {
        document.getElementById(formId).submit();
    }
    </script>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>

        <div id="resumes-list">
            {% for resume in resumes %}
            <div class="resume-card">
                <p><strong>Name:</strong> {{ resume.applicant_name }}</p>
                <p><strong>Email:</strong> {{ resume.applicant_email }}</p>
                <p><strong>Filename:</strong> {{ resume.filename }}</p>
                <p><strong>Uploaded on:</strong> {{ resume.upload_date }}</p>
                <p><strong>Summary:</strong> {{ resume.summary }}</p>
                <form id="delete-form-{{ resume.resume_id }}" method="POST" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}">
                    <button type="button" id="delete-resume-button-{{ resume.resume_id }}" onclick="submitDeleteForm('delete-form-{{ resume.resume_id }}')">Delete</button>
                </form>
            </div>
            {% else %}
            <p>No resumes uploaded.</p>
            {% endfor %}
        </div>

        <button id="upload-resume-button" onclick="triggerUpload()">Upload New Resume</button>
        <form method="POST" action="{{ url_for('resume_management') }}" enctype="multipart/form-data" style="display:none;" id="upload-form">
            <input type="file" id="resume-file-input" name="resume_file" accept=".pdf,.doc,.docx" onchange="document.getElementById('upload-form').submit()" />
            <label for="applicant-name">Name:</label><br>
            <input type="text" id="applicant-name" name="applicant_name" required><br>
            <label for="applicant-email">Email:</label><br>
            <input type="email" id="applicant-email" name="applicant_email" required><br>
            <label for="summary">Summary:</label><br>
            <textarea id="summary" name="summary" required></textarea><br>
        </form>

        <a href="{{ url_for('dashboard_view') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>

    </div>
</body>
</html>
