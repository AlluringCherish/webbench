<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    <div id="book-info-display">
        <h2>{{ book.title }}</h2>
        <p>Author: {{ book.author }}</p>
    </div>
    <form method="POST" action="{{ url_for('submit_review') }}">
        <input type="hidden" name="review_id" value="{{ review.review_id if review else '' }}">
        <input type="hidden" name="book_id" value="{{ book.book_id }}">

        <label for="rating-input">Rating:</label>
        <select id="rating-input" name="rating">
            {% for i in range(1,6) %}
                <option value="{{ i }}" {% if review and review.rating == i %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
        </select>

        <br/>

        <label for="review-text">Review:</label><br/>
        <textarea id="review-text" name="review_text" rows="5" cols="50">{{ review.review_text if review else '' }}</textarea>

        <br/>
        <button type="submit" id="submit-review-button">Submit Review</button>
    </form>
    <button id="back-to-book" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
</div>
</body>
</html>
