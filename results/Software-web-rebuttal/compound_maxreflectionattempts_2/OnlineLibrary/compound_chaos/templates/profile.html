<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <div id="profile-username">Username: {{ username }}</div>
    <form method="POST" action="{{ url_for('update_profile') }}">
        <label for="profile-email">Email:</label>
        <input id="profile-email" type="email" name="email" value="{{ email }}" required />
        <br/>
        <label for="profile-phone">Phone:</label>
        <input id="profile-phone" type="text" name="phone" value="{{ phone }}" required />
        <br/>
        <label for="profile-address">Address:</label>
        <input id="profile-address" type="text" name="address" value="{{ address }}" required />
        <br/>
        <button type="submit" id="update-profile-button">Update Profile</button>
    </form>

    <div id="borrow-history">
        <h2>Borrow History</h2>
        <ul>
            {% for entry in borrow_history %}
            <li>
                {{ entry.book_title }} - Borrowed on {{ entry.borrow_date }}
                {% if entry.return_date %}
                , Returned on {{ entry.return_date }}
                {% else %}
                , Not returned yet
                {% endif %}
            </li>
            {% endfor %}
        </ul>
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
