<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Confirmation</title>
</head>
<body>
<div id="payment-page">
    <div id="fine-amount-display">
        <p>Amount Due: ${{ '%.2f'|format(fine.amount) }}</p>
    </div>
    <form method="POST" action="{{ url_for('confirm_payment', fine_id=fine.fine_id) }}">
        <button type="submit" id="confirm-payment-button">Confirm Payment</button>
        <button type="button" id="back-to-profile" onclick="window.location.href='{{ url_for('profile') }}'">Back to Profile</button>
    </form>
</div>
</body>
</html>
