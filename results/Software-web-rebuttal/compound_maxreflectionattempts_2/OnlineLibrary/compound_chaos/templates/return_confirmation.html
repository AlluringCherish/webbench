<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Return Confirmation</title>
</head>
<body>
<div id="return-confirmation-page">
    <h2>Return Confirmation for: {{ borrowing.book_title }}</h2>
    <p>Borrow Date: {{ borrowing.borrow_date }}</p>
    <p>Due Date: {{ borrowing.due_date }}</p>
    <p>Status: {{ borrowing.status }}</p>
    <div id="fine-amount-display">
        {% if fine_amount > 0 %}
            <p>Fine Amount: ${{ '%.2f'|format(fine_amount) }}</p>
        {% else %}
            <p>No fines due.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
