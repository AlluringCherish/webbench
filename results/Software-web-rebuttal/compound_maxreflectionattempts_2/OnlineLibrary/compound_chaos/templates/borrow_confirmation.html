<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Borrow Confirmation</title>
</head>
<body>
<div id="borrow-page">
    <div id="borrow-book-info">
        <h2>Borrow: {{ book.title }}</h2>
        <p>Author: {{ book.author }}</p>
    </div>
    <div id="due-date-display">Due Date: {{ due_date }}</div>

    <form method="POST" action="{{ url_for('confirm_borrow') }}">
        <input type="hidden" name="book_id" value="{{ book.book_id }}" />
        <button type="submit" id="confirm-borrow-button">Confirm Borrow</button>
        <button type="button" id="cancel-borrow-button" onclick="window.location.href='{{ url_for('catalog') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
