<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Catalog</title>
</head>
<body>
<div id="catalog-page">
    <form method="GET" action="{{ url_for('catalog') }}">
        <input type="text" id="search-input" name="search_query" placeholder="Search books..." value="{{ search_query }}" />
        <button type="submit" id="search-button">Search</button>
    </form>

    <div id="book-grid">
        {% for book in books %}
        <div class="book-card">
            <h3>{{ book.title }}</h3>
            <p>Author: {{ book.author }}</p>
            <p>Status: {{ book.status }}</p>
            <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
