<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>

        <div id="conversation-list">
            {% for message in messages %}
            <div>
                <strong>From:</strong> {{ message.sender_username }}<br>
                <strong>Subject:</strong> {{ message.subject }}<br>
                <p>{{ message.content }}</p>
                <small>{{ message.timestamp }}</small>
                <hr>
            </div>
            {% endfor %}
        </div>

        <form method="POST" action="{{ url_for('messages') }}">
            <textarea id="message-input" name="message_content" placeholder="Type your message here..."></textarea><br>
            <button id="send-message-button" type="submit">Send</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
