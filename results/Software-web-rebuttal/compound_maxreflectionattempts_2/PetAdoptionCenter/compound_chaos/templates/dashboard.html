<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>

        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div>
                <h2>{{ pet.name }}</h2>
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
                {% if pet.photo_url %}
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <button id="browse-pets-button" onclick="window.location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
