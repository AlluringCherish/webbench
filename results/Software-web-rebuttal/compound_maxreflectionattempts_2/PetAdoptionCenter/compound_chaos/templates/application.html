<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
    <div id="application-page">
        <h1>Adoption Application</h1>

        <form method="POST" action="{{ url_for('new_application', pet_id=pet.pet_id) }}">
            <label for="applicant-name">Name:</label>
            <input id="applicant-name" name="applicant_name" type="text" required>

            <label for="applicant-phone">Phone:</label>
            <input id="applicant-phone" name="phone" type="text" required>

            <label for="housing-type">Housing Type:</label>
            <select id="housing-type" name="housing_type" required>
                <option value="House">House</option>
                <option value="Apartment">Apartment</option>
                <option value="Other">Other</option>
            </select>

            <label for="reason">Reason for Adoption:</label>
            <textarea id="reason" name="reason" required></textarea>

            <button id="submit-application-button" type="submit">Submit</button>
        </form>

        <button id="back-to-pet" onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet</button>
    </div>
</body>
</html>
