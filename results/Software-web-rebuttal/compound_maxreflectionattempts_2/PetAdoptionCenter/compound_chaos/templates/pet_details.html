<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Details</title>
</head>
<body>
    <div id="pet-details-page">
        <h1 id="pet-name">{{ pet.name }}</h1>

        <div id="pet-species">Species: {{ pet.species }}</div>
        <div>Breed: {{ pet.breed }}</div>
        <div>Age: {{ pet.age }}</div>
        <div>Gender: {{ pet.gender }}</div>
        <div>Size: {{ pet.size }}</div>
        <div id="pet-description">Description: {{ pet.description }}</div>
        <div>Shelter ID: {{ pet.shelter_id }}</div>
        <div>Status: {{ pet.status }}</div>
        <div>Date Added: {{ pet.date_added }}</div>

        <button id="adopt-button" onclick="window.location.href='{{ url_for('new_application', pet_id=pet.pet_id) }}'">Adopt</button>
        <button id="back-to-listings" onclick="window.location.href='{{ url_for('pet_listings') }}'">Back to Listings</button>
    </div>
</body>
</html>
