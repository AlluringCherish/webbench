<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>

        <div id="profile-username">Username: {{ user.username }}</div>
        <form method="POST" action="{{ url_for('profile') }}">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="email" type="email" value="{{ user.email }}" required>

            <label for="profile-phone">Phone:</label>
            <input id="profile-phone" name="phone" type="text" value="{{ user.phone }}">

            <label for="profile-address">Address:</label>
            <input id="profile-address" name="address" type="text" value="{{ user.address }}">

            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
