<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Category Articles</title>
</head>
<body>
  <div id="category-page">
    <h1 id="category-title">{{ category_name }}</h1>

    <form method="post" action="{{ url_for('sort_category_articles', category_name=category_name) }}">
      <button id="sort-by-date" name="sort_option" value="date" type="submit">Sort by Date</button>
      <button id="sort-by-popularity" name="sort_option" value="popularity" type="submit">Sort by Popularity</button>
    </form>

    <div id="category-articles">
      {% for article in articles %}
      <article>
        <h2>{{ article.title }}</h2>
        <p><strong>By:</strong> {{ article.author }} | <strong>Date:</strong> {{ article.date }} | <strong>Views:</strong> {{ article.views }}</p>
      </article>
      {% endfor %}
    </div>

    <form method="get" action="{{ url_for('dashboard') }}">
      <button id="back-to-dashboard" type="submit">Back to Dashboard</button>
    </form>
  </div>
</body>
</html>
