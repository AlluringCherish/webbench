<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Article Details</title>
</head>
<body>
  <div id="article-details-page">
    <h1 id="article-title">{{ article.title }}</h1>
    <div id="article-author">Author: {{ article.author }}</div>
    <div id="article-date">Published on: {{ article.date }}</div>
    <div id="article-content">{{ article.content }}</div>

    <form method="post" action="{{ url_for('bookmark_article', article_id=article.article_id) }}">
      <button id="bookmark-button" type="submit" {% if is_bookmarked %}disabled{% endif %}>
        {% if is_bookmarked %}Bookmarked{% else %}Bookmark This Article{% endif %}
      </button>
    </form>
  </div>
</body>
</html>
