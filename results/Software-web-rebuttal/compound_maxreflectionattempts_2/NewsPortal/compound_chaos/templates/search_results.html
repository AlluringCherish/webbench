<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Results</title>
</head>
<body>
  <div id="search-results-page">
    <h1>Search Results for <span id="search-query-display">{{ search_query }}</span></h1>

    <div id="results-list">
      {% if results|length > 0 %}
        {% for result in results %}
        <article>
          <h2>{{ result.title }}</h2>
          <p>{{ result.excerpt }}</p>
        </article>
        {% endfor %}
      {% else %}
        <div id="no-results-message">No results found.</div>
      {% endif %}
    </div>

    <form method="get" action="{{ url_for('dashboard') }}">
      <button id="back-to-dashboard" type="submit">Back to Dashboard</button>
    </form>
  </div>
</body>
</html>
