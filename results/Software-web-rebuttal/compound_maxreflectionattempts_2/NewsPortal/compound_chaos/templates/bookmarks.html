<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Bookmarks</title>
</head>
<body>
  <div id="bookmarks-page">
    <h1>My Bookmarks</h1>
    <div id="bookmarks-list">
      {% for bookmark in bookmarks %}
      <div class="bookmark-item">
        <div><strong>{{ bookmark.article_title }}</strong> (Bookmarked on: {{ bookmark.bookmarked_date }})</div>
        <form method="post" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}" style="display:inline;">
          <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Remove Bookmark</button>
        </form>
        <form method="get" action="{{ url_for('article_details', article_id=bookmark.article_id) }}" style="display:inline;">
          <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">View Article</button>
        </form>
      </div>
      {% endfor %}
    </div>
    <form method="get" action="{{ url_for('dashboard') }}">
      <button id="back-to-dashboard" type="submit">Back to Dashboard</button>
    </form>
  </div>
</body>
</html>
