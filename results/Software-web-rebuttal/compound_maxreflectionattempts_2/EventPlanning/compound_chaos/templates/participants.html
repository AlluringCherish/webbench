<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="participants_management">
        <h1>Participants</h1>
        <div id="participant-status-filter">
            <form method="GET" action="{{ url_for('participants_page') }}">
                <select id="participant-status-filter" name="status">
                    <option value="">All</option>
                    {% for status in status_options %}
                        <option value="{{ status }}" {% if status == selected_status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>
                <button id="filter-participants-button" type="submit">Filter</button>
            </form>
        </div>
        <table id="participants-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Registration Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in participants %}
                <tr id="participant-row-{{ participant.participant_id }}">
                    <td>{{ participant.name }}</td>
                    <td>{{ participant.email }}</td>
                    <td>{{ participant.status }}</td>
                    <td>{{ participant.registration_date }}</td>
                    <td>
                        <a href="{{ url_for('edit_participant', participant_id=participant.participant_id) }}" id="edit-participant-button-{{ participant.participant_id }}">Edit</a>
                        <form method="POST" action="{{ url_for('delete_participant', participant_id=participant.participant_id) }}" style="display:inline">
                            <button type="submit" id="delete-participant-button-{{ participant.participant_id }}">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('add_participant') }}" id="add-participant-button">Add Participant</a>
    </div>
</body>
</html>
