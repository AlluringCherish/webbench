<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="events-grid">
        <h1>{{ page_title }}</h1>
        <div id="event-category-filter">
            <form method="GET" action="{{ url_for('events_listing') }}">
                <select id="select-event-dropdown" name="category">
                    <option value="">All Categories</option>
                    {% for category in categories %}
                        <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                </select>
                <button id="filter-events-button" type="submit">Filter</button>
            </form>
        </div>
        <div id="featured-events">
            {% for event in featured_events %}
            <div class="event-card">
                <h2 id="event-name">{{ event.event_name }}</h2>
                <p id="event-date">{{ event.date }}</p>
                <p id="event-location">{{ event.location }}</p>
                <a href="{{ url_for('event_details_page', event_id=event.event_id) }}" id="view-event-button-{{ event.event_id }}">View Details</a>
            </div>
            {% endfor %}
        </div>
        <div id="events-list">
            {% for event in events %}
            <div class="event-card">
                <h2 id="event-name">{{ event.event_name }}</h2>
                <p id="event-date">{{ event.date }}</p>
                <p id="event-location">{{ event.location }}</p>
                <a href="{{ url_for('event_details_page', event_id=event.event_id) }}" id="view-event-button-{{ event.event_id }}">View Details</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
