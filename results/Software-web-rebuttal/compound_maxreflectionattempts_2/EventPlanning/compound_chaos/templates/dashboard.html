<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>{{ page_title }}</h1>
        <nav>
            <ul>
                <li><a href="{{ url_for('events_listing') }}" id="events-link">Events</a></li>
                <li><a href="{{ url_for('venues_page') }}" id="venues-link">Venues</a></li>
                <li><a href="{{ url_for('bookings_summary') }}" id="bookings-link">Bookings</a></li>
                <li><a href="{{ url_for('participants_page') }}" id="participants-link">Participants</a></li>
            </ul>
        </nav>
        <div id="featured-events">
            {% for event in featured_events %}
            <div class="event-card" id="featured-event-{{ event.event_id }}">
                <h3 id="event-name">{{ event.event_name }}</h3>
                <p id="event-date">{{ event.date }}</p>
                <p id="event-location">{{ event.location }}</p>
                <a href="{{ url_for('event_details_page', event_id=event.event_id) }}" id="view-event-button-{{ event.event_id }}">View Details</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
