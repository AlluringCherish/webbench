<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Property Search</h1>

        <form method="POST">
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location_input" value="{{ applied_filters.location }}">
            
            <label for="price-range-min">Min Price:</label>
            <input type="number" id="price-range-min" name="price_range_min" value="{{ applied_filters.price_min if applied_filters.price_min is not none }}">

            <label for="price-range-max">Max Price:</label>
            <input type="number" id="price-range-max" name="price_range_max" value="{{ applied_filters.price_max if applied_filters.price_max is not none }}">

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type_filter">
                <option value="" {% if not applied_filters.property_type %}selected{% endif %}>Any</option>
                <option value="House" {% if applied_filters.property_type == 'House' %}selected{% endif %}>House</option>
                <option value="Apartment" {% if applied_filters.property_type == 'Apartment' %}selected{% endif %}>Apartment</option>
                <option value="Condo" {% if applied_filters.property_type == 'Condo' %}selected{% endif %}>Condo</option>
                <option value="Land" {% if applied_filters.property_type == 'Land' %}selected{% endif %}>Land</option>
            </select>

            <button type="submit" id="search-submit-button">Search</button>
        </form>

        <div id="properties-grid">
            {% for property in properties %}
            <div class="property-card">
                <h2>{{ property.address }}</h2>
                <div>Price: ${{ property.price }}</div>
                <div>Type: {{ property.property_type }}</div>
                <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
