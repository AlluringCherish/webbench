<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <input type="text" id="agent-search" placeholder="Search agents..." />

        <div id="agents-list">
            {% for agent in agents %}
            <div class="agent-card">
                <h2>{{ agent.agent_name }}</h2>
                <div>Specialization: {{ agent.specialization }}</div>
                <div>Email: {{ agent.email }}</div>
                <div>Phone: {{ agent.phone }}</div>
                <div>Properties Sold: {{ agent.properties_sold }}</div>
                <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>

    </div>
</body>
</html>
