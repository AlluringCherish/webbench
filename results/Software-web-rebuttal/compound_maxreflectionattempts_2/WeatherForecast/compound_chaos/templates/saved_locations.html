<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <h1>Saved Locations</h1>

        <table id="locations-table" border="1">
            <thead>
                <tr>
                    <th>Location Name</th>
                    <th>Current Temperature</th>
                    <th>Condition</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for location in saved_locations %}
                <tr>
                    <td>{{ location.location_name }}</td>
                    <td>{{ weather_summary_per_location[location.location_id].temperature }}</td>
                    <td>{{ weather_summary_per_location[location.location_id].condition }}</td>
                    <td>
                        <button id="view-location-weather-{{ location.location_id }}" onclick="location.href='{{ url_for('current_weather', location_id=location.location_id) }}'">View</button>
                        <button id="remove-location-button-{{ location.location_id }}">Remove</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="add-new-location-button" onclick="location.href='{{ url_for('search_locations') }}'">Add New Location</button>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
