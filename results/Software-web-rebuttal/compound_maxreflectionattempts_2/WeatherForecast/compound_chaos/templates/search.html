<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <h1>Search Locations</h1>

        <form method="post" action="{{ url_for('search_locations') }}">
            <input type="text" id="location-search-input" name="location-search-input" placeholder="Enter location name" />
            <button type="submit">Search</button>
        </form>

        <div id="search-results">
            <h2>Results</h2>
            <ul>
                {% for location in search_results %}
                <li>
                    {{ location.location_name }} ({{ location.country }}, {{ location.timezone }})
                    <button id="select-location-button-{{ location.location_id }}" onclick="location.href='{{ url_for('current_weather', location_id=location.location_id) }}'">Select</button>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div id="saved-locations-list">
            <h2>Saved Locations</h2>
            <ul>
                {% for location in saved_locations %}
                <li>{{ location.location_name }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
