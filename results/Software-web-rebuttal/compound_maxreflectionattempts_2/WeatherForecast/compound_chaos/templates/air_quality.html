<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
    <div id="air-quality-page">
        <h1>Air Quality Index for {{ location_name }}</h1>

        <label for="location-aqi-filter">Select Location:</label>
        <select id="location-aqi-filter">
            {% for location in location_filter_options %}
            <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>{{ location.location_name }}</option>
            {% endfor %}
        </select>

        <div id="aqi-display">
            <p>AQI Index: {{ air_quality.aqi_index }}</p>
            <p>Last Updated: {{ air_quality.last_updated }}</p>
        </div>

        <div id="aqi-description">{{ aqi_description }}</div>

        <table id="pollution-details" border="1">
            <thead>
                <tr>
                    <th>PM2.5</th>
                    <th>PM10</th>
                    <th>NO2</th>
                    <th>O3</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>{{ air_quality.pm25 }}</td>
                    <td>{{ air_quality.pm10 }}</td>
                    <td>{{ air_quality.no2 }}</td>
                    <td>{{ air_quality.o3 }}</td>
                </tr>
            </tbody>
        </table>

        <div id="health-recommendation">{{ health_recommendation }}</div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
