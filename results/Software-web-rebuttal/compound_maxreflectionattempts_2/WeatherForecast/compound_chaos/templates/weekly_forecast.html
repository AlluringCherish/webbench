<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Forecast</title>
</head>
<body>
    <div id="forecast-page">
        <h1>Weekly Forecast for {{ location_name }}</h1>

        <select id="location-filter">
            <option selected>{{ location_name }}</option>
        </select>

        <div id="forecast-list">
            <table id="forecast-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>High Temp</th>
                        <th>Low Temp</th>
                        <th>Condition</th>
                    </tr>
                </thead>
                <tbody>
                    {% for forecast in forecast_list %}
                    <tr>
                        <td>{{ forecast.date }}</td>
                        <td>{{ forecast.high_temp }}</td>
                        <td>{{ forecast.low_temp }}</td>
                        <td>{{ forecast.condition }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
