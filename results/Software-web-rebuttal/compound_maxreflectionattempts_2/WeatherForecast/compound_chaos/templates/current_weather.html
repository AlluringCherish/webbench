<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <div id="current-weather-page">
        <h1 id="location-name">{{ location_name }}</h1>

        <div id="temperature-display">Temperature: {{ current_weather.temperature }}</div>
        <div id="weather-condition">Condition: {{ current_weather.condition }}</div>
        <div id="humidity-info">Humidity: {{ current_weather.humidity }}%</div>
        <div id="wind-speed-info">Wind Speed: {{ current_weather.wind_speed }}</div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
