<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">{{ trainer.bio }}</div>
        <div id="trainer-certifications">Certifications: {{ trainer.certifications }}</div>
        <button id="book-session-button" onclick="window.location.href='{{ url_for('booking', trainer_id=trainer.trainer_id) }}'">Book a Session</button>

        <div id="trainer-reviews">
            <h2>Client Reviews</h2>
            {% if reviews %}
                {% for review in reviews %}
                <div class="review">
                    <strong>{{ review.author }}</strong>: {{ review.comment }}
                </div>
                {% endfor %}
            {% else %}
                <p>No reviews available.</p>
            {% endif %}
        </div>

        <button id="back-to-trainers" onclick="window.location.href='{{ url_for('trainers') }}'">Back to Trainers</button>
    </div>
</body>
</html>
