<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Memberships List</title>
</head>
<body>
    <div id="memberships-list-page">
        <select id="plan-filter">
            {% for filter_option in filters %}
            <option value="{{ filter_option }}">{{ filter_option }}</option>
            {% endfor %}
        </select>

        <div id="plans-grid">
            {% for plan in memberships_list %}
            <div id="plan-card-{{ plan.plan_id }}">
                <h3 id="plan-title-{{ plan.plan_id }}">{{ plan.plan_name }}</h3>
                <p id="plan-price-{{ plan.plan_id }}">Price: {{ plan.price }} ({{ plan.billing_cycle }})</p>
                <p id="plan-description-{{ plan.plan_id }}">{{ plan.description }}</p>
                <button id="view-details-button-{{ plan.plan_id }}" onclick="window.location.href='{{ url_for('plan_details', plan_id=plan.plan_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
