<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Gym Membership Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="member-welcome">Status: {{ member_status }}</div>

        <section id="featured-classes">
            {% for fc in featured_classes %}
            <article class="featured-class">
                <h3>{{ fc.class_name }}</h3>
                <p>{{ fc.schedule_day }} - {{ fc.schedule_time }}</p>
            </article>
            {% endfor %}
        </section>

        <nav id="dashboard-nav">
            <button id="browse-membership-button" onclick="window.location.href='{{ url_for('memberships') }}'">Browse Membership</button>
            <button id="view-schedule-button" onclick="window.location.href='{{ url_for('classes') }}'">View Schedule</button>
            <button id="book-trainer-button" onclick="window.location.href='{{ url_for('booking') }}'">Book Trainer</button>
        </nav>

        {% if quick_links %}
        <section id="quick-links">
            {% for link in quick_links %}
            <a href="{{ link.url }}">{{ link.name }}</a>
            {% endfor %}
        </section>
        {% endif %}
    </div>
</body>
</html>
