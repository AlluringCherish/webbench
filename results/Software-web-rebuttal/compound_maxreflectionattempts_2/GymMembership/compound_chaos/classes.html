<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Class Schedule</title>
</head>
<body>
    <div id="schedule-page">
        <input type="text" id="schedule-search" placeholder="Search classes..." />
        <select id="schedule-filter">
            {% for ctype in class_types %}
            <option value="{{ ctype }}">{{ ctype }}</option>
            {% endfor %}
        </select>

        <div id="classes-grid">
            {% for class in classes_list %}
            <div class="class-card">
                <h3>{{ class.class_name }}</h3>
                <p>Type: {{ class.class_type }}</p>
                <p>Schedule: {{ class.schedule_day }} at {{ class.schedule_time }}</p>
                <p>Duration: {{ class.duration }} mins</p>
                <form method="POST" action="#">
                    <button type="submit" id="enroll-class-button-{{ class.class_id }}">Enroll</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
