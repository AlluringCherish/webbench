<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Membership Plans</title>
</head>
<body>
    <div id="membership-page">
        <label for="plan-filter">Filter by Membership Type:</label>
        <select id="plan-filter" name="plan-filter">
            {% for type in membership_types %}
            <option value="{{ type }}">{{ type }}</option>
            {% endfor %}
        </select>

        <div id="plans-grid">
            {% for plan in memberships_list %}
            <div class="plan-card">
                <h3>{{ plan.plan_name }}</h3>
                <p>Price: ${{ '%.2f' % plan.price }} per {{ plan.billing_cycle }}</p>
                <p>Features: {{ plan.features }}</p>
                <p>Max Classes: {{ plan.max_classes }}</p>
                <button id="view-details-button-{{ plan.membership_id }}" onclick="window.location.href='{{ url_for('plan_details', plan_id=plan.membership_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
