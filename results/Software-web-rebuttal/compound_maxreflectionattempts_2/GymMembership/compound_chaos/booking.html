<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Book Personal Training</title>
</head>
<body>
    <div id="booking-page">
        {% if booking_success %}
        <div id="booking-success-message">Booking Successful!</div>
        {% endif %}

        <form method="POST" action="{{ url_for('booking') }}">
            <label for="select-trainer">Select Trainer:</label>
            <select id="select-trainer" name="trainer_id">
                {% for trainer in trainers_list %}
                <option value="{{ trainer.trainer_id }}">{{ trainer.name }}</option>
                {% endfor %}
            </select>

            <label for="session-date">Session Date:</label>
            <input type="date" id="session-date" name="session_date" required />

            <label for="session-time">Session Time:</label>
            <select id="session-time" name="session_time">
                {% for time in available_times %}
                <option value="{{ time }}">{{ time }}</option>
                {% endfor %}
            </select>

            <label for="session-duration">Session Duration:</label>
            <select id="session-duration" name="duration">
                <option value="30">30</option>
                <option value="60">60</option>
                <option value="90">90</option>
            </select>

            <button type="submit" id="confirm-booking-button">Confirm Booking</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
