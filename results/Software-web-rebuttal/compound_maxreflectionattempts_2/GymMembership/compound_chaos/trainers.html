<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <input type="text" id="trainer-search" placeholder="Search trainers..." />
        <select id="specialty-filter">
            {% for specialty in specialties %}
            <option value="{{ specialty }}">{{ specialty }}</option>
            {% endfor %}
        </select>

        <div id="trainers-grid">
            {% for trainer in trainers_list %}
            <div class="trainer-card">
                <h3>{{ trainer.name }}</h3>
                <p>Specialty: {{ trainer.specialty }}</p>
                <p>Certifications: {{ trainer.certifications }}</p>
                <p>Experience: {{ trainer.experience_years }} years</p>
                <p>Bio: {{ trainer.bio }}</p>
                <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="window.location.href='{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}'">View Profile</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
