<!DOCTYPE html>
<html>
<head>
    <title>Album Details - {{ album.title }}</title>
</head>
<body>
    <h1 id="album-title">{{ album.title }}</h1>
    <p>Artist: <a href="{{ url_for('artist_profile', artist_id=album.artist_id) }}" id="album-artist">{{ album.artist_name }}</a></p>
    <p>Release Year: <span id="album-release-year">{{ album.release_year }}</span></p>
    <h2>Songs in this album</h2>
    <ul id="album-songs-list">
        {% for song in songs %}
        <li id="song-{{ song.song_id }}">
            {{ song.title }} - Duration: {{ song.duration }} seconds
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('albums_page') }}" id="back-to-albums">Back to Albums</a>
</body>
</html>
