<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genres</title>
</head>
<body>
<div id="genres-page">
    <h1>Genres</h1>
    <div id="genres-list">
        <ul>
            {% for genre in genres %}
            <li>
                <strong>{{ genre }}</strong>
                <button id="view-genre-button-{{ genre|replace(' ', '_')|lower }}" onclick="location.href='{{ url_for('genre_songs', genre_name=genre) }}'">View Genre</button>
            </li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard-button" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
