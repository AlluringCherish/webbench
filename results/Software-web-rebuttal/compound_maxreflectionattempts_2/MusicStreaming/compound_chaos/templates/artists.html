<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
</head>
<body>
<div id="artists-page">
    <h1>Artists</h1>
    <div id="artists-list">
        <ul>
            {% for artist in artists %}
            <li>
                <strong>{{ artist.name }}</strong>
                <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_profile', artist_id=artist.artist_id) }}'">View Artist</button>
            </li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard-button" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
