<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <input type="text" id="search-input" name="search" placeholder="Search songs...">

    <select id="genre-filter" name="genre">
        <option value="">All Genres</option>
        {% for genre in genres %}
        <option value="{{ genre }}">{{ genre }}</option>
        {% endfor %}
    </select>

    <div id="songs-grid">
        <ul>
            {% for song in songs %}
            <li>
                <div>{{ song.title }} by {{ song.artist_name }} ({{ song.album_name }}) - {{ song.duration }}s</div>
                <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
