<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <input type="text" id="search-albums" name="search_albums" placeholder="Search albums...">

    <select id="sort-albums" name="sort_albums">
        <option value="title_asc">Title Ascending</option>
        <option value="title_desc">Title Descending</option>
        <option value="year_asc">Year Ascending</option>
        <option value="year_desc">Year Descending</option>
    </select>

    <div id="albums-grid">
        <ul>
            {% for album in albums %}
            <li>
                <div><strong>{{ album.title }}</strong> by {{ album.artist_name }} ({{ album.release_year }})</div>
                <button id="view-album-button-{{ album.album_id }}" onclick="location.href='{{ url_for('album_details', album_id=album.album_id) }}'">View Album</button>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
