<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <div id="playlists-grid">
        <ul>
            {% for playlist in playlists %}
            <li>
                <div>
                    <strong>{{ playlist.title }}</strong>: {{ playlist.description }} ({{ playlist.total_songs }} songs)
                </div>
                <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="location.href='{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}'">View Playlist</button>
            </li>
            {% endfor %}
        </ul>
    </div>

    <button id="create-playlist-button" onclick="location.href='{{ url_for('create_playlist') }}'">Create Playlist</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
