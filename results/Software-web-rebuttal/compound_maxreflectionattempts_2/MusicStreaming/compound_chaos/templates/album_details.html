<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
<div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">Artist: <a href="{{ url_for('artist_profile', artist_id=album.artist_id) }}">{{ album.artist_name }}</a></div>
    <div id="album-release-year">Released: {{ album.release_year }}</div>

    <h2>Songs in this Album</h2>
    <ul id="album-songs-list">
        {% for song in album_songs %}
        <li>
            {{ song.title }} - {{ song.duration }}s
            <button id="play-song-button-{{ song.song_id }}" onclick="location.href='{{ url_for('song_details', song_id=song.song_id) }}'">Details</button>
        </li>
        {% endfor %}
    </ul>

    <button id="back-to-albums-button" onclick="location.href='{{ url_for('albums_page') }}'">Back to Albums</button>
</div>
</body>
</html>
