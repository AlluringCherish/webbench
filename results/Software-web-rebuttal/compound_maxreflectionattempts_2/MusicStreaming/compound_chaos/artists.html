<!DOCTYPE html>
<html>
<head>
    <title>Artists</title>
</head>
<body>
    <h1 id="artists-title">Artists</h1>
    <ul id="artists-list">
        {% for artist in artists %}
        <li id="artist-{{ artist.artist_id }}">
            <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}" id="artist-name-{{ artist.artist_id }}">{{ artist.name }}</a> - Genre: {{ artist.genre }}, Country: {{ artist.country }}
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard_page') }}" id="back-to-dashboard">Back to Dashboard</a>
</body>
</html>
