<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>

        <label for="filter-by-winner">Filter by Winner Name:</label>
        <input type="text" id="filter-by-winner" name="filter_name" value="{{ filter_name }}" placeholder="Enter winner name">

        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                <h2>{{ winner.item_name }}</h2>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ '%.2f'|format(winner.winning_bid) }}</p>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
