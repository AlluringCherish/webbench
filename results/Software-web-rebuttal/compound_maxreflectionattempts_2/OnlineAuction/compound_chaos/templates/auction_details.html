<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Details</title>
</head>
<body>
    <div id="auction-details-page">
        <h1 id="auction-title">{{ auction.title }}</h1>
        <div id="auction-description">
            {{ auction.description }}
        </div>
        <div id="current-bid">
            Current Bid: {{ auction.current_bid }} {{ auction.currency }}
        </div>
        <button id="bid-button">Place a Bid</button>
        <section id="bid-history">
            <h2>Bid History</h2>
            <ul>
                {% for bid in auction.bid_history %}
                <li>{{ bid.bidder_name }}: {{ bid.amount }} {{ auction.currency }} at {{ bid.time }}</li>
                {% endfor %}
            </ul>
        </section>
        <button id="back-to-dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
