<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Auction Dashboard</h1>

        <div id="featured-auctions">
            {% for auction in featured_auctions %}
            <div class="featured-auction-item">
                <h2>{{ auction.item_name }}</h2>
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
                <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('auction_catalog_page') }}"><button id="browse-auctions-button">Browse Auctions</button></a>
        <a href="{{ url_for('bid_history_page') }}"><button id="view-bids-button">View Bids</button></a>
        <a href="{{ url_for('trending_auctions_page') }}"><button id="trending-auctions-button">Trending Auctions</button></a>
    </div>
</body>
</html>
