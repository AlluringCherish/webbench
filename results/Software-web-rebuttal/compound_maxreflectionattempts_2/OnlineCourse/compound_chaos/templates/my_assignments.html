<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Assignments</title>
</head>
<body>
    <div id="assignments-page">
        <table id="assignments-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Due Date</th>
                    <th>Max Points</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for assignment in assignments %}
                <tr>
                    <td>{{ assignment.title }}</td>
                    <td>{{ assignment.description }}</td>
                    <td>{{ assignment.due_date }}</td>
                    <td>{{ assignment.max_points }}</td>
                    <td>
                        <button id="submit-assignment-button-{{ assignment.assignment_id }}" onclick="window.location.href='{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}'">Submit</button>
                    </td>
                </tr>
                {% endfor %}
                {% if assignments|length == 0 %}
                <tr><td colspan="5">No assignments found.</td></tr>
                {% endif %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
