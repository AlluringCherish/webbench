<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
    <div id="course-details-page">
        <h1 id="course-title">{{ course.title }}</h1>

        <div id="course-description">
            <p>{{ course.description }}</p>
        </div>

        <form method="POST" action="{{ url_for('enroll_course', course_id=course.course_id) }}">
            {% if enrolled %}
                <button id="enroll-button" type="submit" disabled>Already Enrolled</button>
            {% else %}
                <button id="enroll-button" type="submit">Enroll</button>
            {% endif %}
        </form>

        <button id="back-to-catalog" onclick="window.location.href='{{ url_for('course_catalog') }}'">Back to Catalog</button>
    </div>
</body>
</html>
