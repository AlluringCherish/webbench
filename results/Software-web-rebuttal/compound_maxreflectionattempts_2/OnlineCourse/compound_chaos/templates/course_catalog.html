<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <input type="text" id="search-input" name="search" placeholder="Search courses..." />

        <div id="course-grid">
            {% for course in courses %}
                <div class="course-card">
                    <h3>{{ course.title }}</h3>
                    <p>{{ course.description }}</p>
                    <p>Category: {{ course.category }}, Level: {{ course.level }}, Duration: {{ course.duration }}</p>
                    <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Course</button>
                </div>
            {% endfor %}
            {% if courses|length == 0 %}
                <p>No courses available.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
