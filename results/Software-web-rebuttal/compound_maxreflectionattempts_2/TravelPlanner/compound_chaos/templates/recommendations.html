<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1 id="page-title">Travel Recommendations</h1>

        <form method="GET" action="">
            <label for="recommendation-season-filter">Season:</label>
            <select id="recommendation-season-filter" name="season_filter">
                <option value="" {% if not season_filter %}selected{% endif %}>All Seasons</option>
                {% for season in season_options %}
                <option value="{{ season }}" {% if season == season_filter %}selected{% endif %}>{{ season }}</option>
                {% endfor %}
            </select>

            <label for="budget-filter">Budget:</label>
            <select id="budget-filter" name="budget_filter">
                <option value="" {% if not budget_filter %}selected{% endif %}>All Budgets</option>
                {% for budget in budget_options %}
                <option value="{{ budget }}" {% if budget == budget_filter %}selected{% endif %}>{{ budget }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="trending-destinations">
            <h2>Trending Destinations</h2>
            <ul>
                {% for dest in trending_destinations %}
                <li>{{ dest.name }} - {{ dest.country }}</li>
                {% endfor %}
            </ul>
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
