<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
    <div id="destinations-page">
        <h1 id="page-title">Travel Destinations</h1>

        <form method="GET" action="">
            <input type="text" id="search-destination" name="search_query" value="{{ search_query|default('') }}" placeholder="Search by name or country">
            <select id="region-filter" name="selected_region">
                <option value="" {% if not selected_region %}selected{% endif %}>All Regions</option>
                {% for region in regions %}
                <option value="{{ region }}" {% if region == selected_region %}selected{% endif %}>{{ region }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="destinations-grid">
            {% for dest in destinations %}
            <div class="destination-card">
                <h3>{{ dest.name }}</h3>
                <p>{{ dest.country }}, {{ dest.region }}</p>
                <button id="view-destination-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
