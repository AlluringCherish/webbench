<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1 id="page-title">Booking Confirmation</h1>

        <div id="confirmation-number">
            <strong>Confirmation Number:</strong> {{ confirmation_number }}
        </div>

        <div id="booking-details">
            <h2>Booking Details</h2>
            <ul>
            {% for key, value in booking_details.items() %}
                <li><strong>{{ key|replace('_', ' ')|capitalize }}:</strong> {{ value }}</li>
            {% endfor %}
            </ul>
        </div>

        <button id="download-itinerary-button">Download Itinerary</button>
        <button id="share-trip-button">Share Trip</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
