<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <table id="reservations-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Reservation Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.title }}</td>
                    <td>{{ reservation.reservation_date }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        {% if reservation.status != 'Cancelled' %}
                        <form method="post" action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}">
                            <button type="submit" id="cancel-reservation-button-{{ reservation.reservation_id }}">Cancel</button>
                        </form>
                        {% else %}
                        N/A
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
