<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        <div id="borrow-book-info">
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
            <p>Status: {{ book.status }}</p>
        </div>
        <div id="due-date-display">
            <p>Due Date for Return: {{ due_date }}</p>
        </div>
        <form method="post" action="{{ url_for('confirm_borrow') }}">
            <input type="hidden" name="book_id" value="{{ book.book_id }}">
            <button type="submit" id="confirm-borrow-button">Confirm Borrow</button>
        </form>
        <button id="cancel-borrow-button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Cancel</button>
    </div>
</body>
</html>
