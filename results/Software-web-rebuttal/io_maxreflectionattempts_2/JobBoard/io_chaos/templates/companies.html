<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>

        <form method="get" action="{{ url_for('companies_directory_page') }}">
            <input
                type="text"
                id="search-company-input"
                name="search_query"
                placeholder="Search companies"
                value="{{ search_query if search_query else '' }}"
            >
            <button type="submit">Search</button>
        </form>

        <div id="companies-list">
            {% for company in companies %}
            <div class="company-card">
                <h2>{{ company.company_name }}</h2>
                <div>Industry: {{ company.industry }}</div>
                <div>Employees: {{ company.employee_count }}</div>
                <a href="{{ url_for('company_profile_page', company_id=company.company_id) }}">
                    <button id="view-company-button-{{ company.company_id }}">View Profile</button>
                </a>
            </div>
            {% else %}
            <p>No companies found.</p>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
