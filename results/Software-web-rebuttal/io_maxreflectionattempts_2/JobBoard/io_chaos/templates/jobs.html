<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
    <div id="listings-page">
        <h1>Job Listings</h1>

        <form method="post" action="{{ url_for('job_listings_page_search') }}">
            <input
                type="text"
                id="search-input"
                name="search_input"
                placeholder="Search for jobs, companies, locations"
                value="{{ search_query if search_query else '' }}"
            >
            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
            <select id="location-filter" name="location_filter">
                <option value="">All Locations</option>
                {% for location in locations %}
                <option value="{{ location }}" {% if selected_location == location %}selected{% endif %}>{{ location }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="jobs-grid">
            {% for job in jobs %}
            <div class="job-card">
                <h2>{{ job.title }}</h2>
                <div>{{ job.company_name }}</div>
                <div>{{ job.location }}</div>
                <div>
                    Salary: ${{ job.salary_min }} - ${{ job.salary_max }}
                </div>
                <a href="{{ url_for('job_details_page', job_id=job.job_id) }}">
                    <button id="view-job-button-{{ job.job_id }}">View Job</button>
                </a>
            </div>
            {% else %}
            <p>No jobs found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
