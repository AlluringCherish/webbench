<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>

        <form id="upload-resume-form" method="post" action="{{ url_for('upload_resume') }}" enctype="multipart/form-data" style="display:none;">
            <input type="file" id="resume-file-input" name="resume_file" accept=".pdf,.doc,.docx" onchange="document.getElementById('upload-resume-form').submit();">
            <input type="text" name="summary" placeholder="Summary">
        </form>

        <div id="resumes-list">
            {% for resume in resumes %}
            <div class="resume-card">
                <div><strong>{{ resume.filename }}</strong> (Uploaded: {{ resume.upload_date }})</div>
                <div>{{ resume.summary }}</div>
                <form method="post" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}">
                    <button type="submit" id="delete-resume-button-{{ resume.resume_id }}">Delete</button>
                </form>
            </div>
            {% else %}
            <p>No resumes found.</p>
            {% endfor %}
        </div>

        <button id="upload-resume-button" onclick="document.getElementById('resume-file-input').click(); return false;">Upload New Resume</button>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
