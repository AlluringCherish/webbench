<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Board Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Job Board Dashboard</h1>

        <div id="featured-jobs">
            <h2>Featured Jobs</h2>
            <ul>
                {% for job in featured_jobs %}
                <li>
                    <strong>{{ job.title }}</strong> at {{ job.company_name }} - {{ job.location }}<br>
                    Salary: ${{ job.salary_min }} - ${{ job.salary_max }}
                </li>
                {% endfor %}
            </ul>
        </div>

        <div>
            <a href="{{ url_for('job_listings_page') }}">
                <button id="browse-jobs-button">Browse Jobs</button>
            </a>
            <a href="{{ url_for('application_tracking_page') }}">
                <button id="my-applications-button">My Applications</button>
            </a>
            <a href="{{ url_for('companies_directory_page') }}">
                <button id="companies-button">Companies</button>
            </a>
        </div>

    </div>
</body>
</html>
