<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
</head>
<body>
    <div id="job-details-page">
        <h1 id="job-title">{{ job.title }}</h1>
        <div id="company-name">{{ job.company_name }}</div>
        <div id="job-description">
            <p>{{ job.description }}</p>
        </div>
        <div id="salary-range">
            Salary: ${{ job.salary_min }} - ${{ job.salary_max }}
        </div>
        <a href="{{ url_for('application_form_page', job_id=job.job_id) }}">
            <button id="apply-now-button">Apply Now</button>
        </a>
    </div>
</body>
</html>
