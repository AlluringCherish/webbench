<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
    <div id="orders-page">
        <h1>Order History</h1>

        <form method="get" action="">
            <label for="order-status-filter">Filter by status:</label>
            <select id="order-status-filter" name="selected_status" onchange="this.form.submit()">
                <option value="All" {% if selected_status == 'All' %}selected{% endif %}>All</option>
                <option value="Pending" {% if selected_status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Shipped" {% if selected_status == 'Shipped' %}selected{% endif %}>Shipped</option>
                <option value="Delivered" {% if selected_status == 'Delivered' %}selected{% endif %}>Delivered</option>
            </select>
        </form>

        <table id="orders-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Order Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr>
                    <td>{{ order.order_id }}</td>
                    <td>{{ order.customer_name }}</td>
                    <td>{{ order.order_date }}</td>
                    <td>${{ "%.2f" | format(order.total_amount) }}</td>
                    <td>{{ order.status }}</td>
                    <td>
                        <button id="view-order-button-{{ order.order_id }}" onclick="window.location.href='{{ url_for('order_details_page', order_id=order.order_id) }}'">View Details</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

    </div>
</body>
</html>
