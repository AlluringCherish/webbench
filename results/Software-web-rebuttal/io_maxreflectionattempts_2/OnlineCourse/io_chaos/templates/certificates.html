<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <div id="certificates-grid">
            {% for cert in certificates %}
            <div class="certificate-card">
                <h3>Certificate ID: {{ cert.certificate_id }}</h3>
                <p>Username: {{ cert.username }}</p>
                <p>Course: {{ courses[cert.course_id] if cert.course_id in courses else 'Unknown Course' }}</p>
                <p>Issued On: {{ cert.issue_date }}</p>
            </div>
            {% else %}
            <p>No certificates found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
