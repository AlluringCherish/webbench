<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <form method="POST" action="{{ url_for('course_catalog_search') }}">
            <input type="text" id="search-input" name="search_query" placeholder="Search courses...">
            <button type="submit">Search</button>
        </form>
        <div id="course-grid">
            {% for course in courses %}
            <div class="course-card">
                <h3>{{ course.title }}</h3>
                <p>{{ course.description }}</p>
                <p>Category: {{ course.category }}</p>
                <p>Level: {{ course.level }}</p>
                <p>Duration: {{ course.duration }}</p>
                <p>Status: {{ course.status }}</p>
                <button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Course</button>
            </div>
            {% else %}
            <p>No courses available.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
