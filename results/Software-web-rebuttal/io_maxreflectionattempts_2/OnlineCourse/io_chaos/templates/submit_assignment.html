<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="submit-page">
        <div id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>{{ assignment.description }}</p>
            <p>Due Date: {{ assignment.due_date }}</p>
            <p>Max Points: {{ assignment.max_points }}</p>
        </div>

        {% if submission_success is defined and submission_success %}
        <p>Submission successful!</p>
        {% endif %}

        <form method="POST" action="{{ url_for('submit_assignment_post', assignment_id=assignment.assignment_id) }}">
            <textarea id="submission-text" name="submission_text" required rows="10" cols="50" placeholder="Enter your submission here..."></textarea><br>
            <button type="submit" id="submit-button">Submit</button>
        </form>

        <button id="back-to-assignments" onclick="location.href='{{ url_for('my_assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
