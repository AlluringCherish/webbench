<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Devices</title>
</head>
<body>
    <div id="device-list-page">
        <h1>My Devices</h1>
        <table id="device-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Room</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for device in devices %}
                <tr>
                    <td>{{ device.device_name }}</td>
                    <td>{{ device.device_type }}</td>
                    <td>{{ device.room }}</td>
                    <td>{{ device.status }}</td>
                    <td>
                        <button id="control-device-button-{{ device.device_id }}" onclick="window.location.href='{{ url_for('device_control', device_id=device.device_id) }}'">Control</button>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
