<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
    <div id="energy-page">
        <h1>Energy Report</h1>
        <div id="energy-summary">
            <p>Total Consumption: {{ energy_summary.total_consumption }} kWh</p>
            <p>Estimated Cost: ${{ energy_summary.cost_estimate }}</p>
        </div>
        <form method="POST" action="{{ url_for('energy_report') }}">
            <label for="date-filter">Date Filter:</label>
            <input type="date" id="date-filter" name="filter_date" value="{{ filter_date if filter_date else '' }}"><br><br>
            <button type="submit" id="apply-filter-button">Apply Filter</button>
        </form>
        <table id="energy-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Device</th>
                    <th>Date</th>
                    <th>Consumption (kWh)</th>
                </tr>
            </thead>
            <tbody>
            {% for entry in energy_data %}
                <tr>
                    <td>{{ entry.device_name }}</td>
                    <td>{{ entry.date }}</td>
                    <td>{{ entry.consumption_kwh }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
