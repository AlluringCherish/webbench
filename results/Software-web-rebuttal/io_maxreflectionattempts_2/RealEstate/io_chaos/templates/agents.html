<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <form method="GET" action="{{ url_for('agent_directory') }}">
            <label for="agent-search">Search Agents:</label>
            <input type="text" id="agent-search" name="agent_search_query" value="{{ agent_search_query }}" />
            <button type="submit">Search</button>
        </form>

        <ul id="agents-list">
            {% for agent in agents %}
            <li>
                {{ agent.agent_name }} - {{ agent.specialization }}
                <a href="mailto:{{ agent.email }}">
                    <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
                </a>
            </li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>

    </div>
</body>
</html>
