<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>

        <ul id="favorites-list">
            {% for favorite in favorites %}
            {% set property = properties_map[favorite.property_id] %}
            <li>
                {{ property.address }} - ${{ property.price }}
                <form method="POST" action="{{ url_for('my_favorites') }}" style="display:inline;">
                    <input type="hidden" name="property_id" value="{{ property.property_id }}" />
                    <button type="submit" id="remove-from-favorites-button-{{ property.property_id }}">Remove</button>
                </form>
                <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View</button>
                </a>
            </li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>

    </div>
</body>
</html>
