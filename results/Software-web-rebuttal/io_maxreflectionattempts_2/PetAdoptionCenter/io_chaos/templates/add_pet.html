<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
    <div id="add-pet-page">
        <h1>Add New Pet</h1>
        <form method="POST" action="{{ url_for('submit_pet') }}">
            <label for="pet-name-input">Name:</label>
            <input id="pet-name-input" name="name" type="text" value="{{ pet.name if pet is defined else '' }}" required>

            <label for="pet-species-input">Species:</label>
            <select id="pet-species-input" name="species" required>
                {% set species_options = ['Dog', 'Cat', 'Bird', 'Rabbit', 'Other'] %}
                {% for option in species_options %}
                <option value="{{ option }}" {% if pet is defined and pet.species == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="pet-breed-input">Breed:</label>
            <input id="pet-breed-input" name="breed" type="text" value="{{ pet.breed if pet is defined else '' }}" required>

            <label for="pet-age-input">Age:</label>
            <input id="pet-age-input" name="age" type="text" value="{{ pet.age if pet is defined else '' }}" required>

            <label for="pet-gender-input">Gender:</label>
            <select id="pet-gender-input" name="gender" required>
                {% set gender_options = ['Male', 'Female'] %}
                {% for option in gender_options %}
                <option value="{{ option }}" {% if pet is defined and pet.gender == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="pet-size-input">Size:</label>
            <select id="pet-size-input" name="size" required>
                {% set size_options = ['Small', 'Medium', 'Large'] %}
                {% for option in size_options %}
                <option value="{{ option }}" {% if pet is defined and pet.size == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="pet-description-input">Description:</label>
            <textarea id="pet-description-input" name="description" required>{{ pet.description if pet is defined else '' }}</textarea>

            <button id="submit-pet-button" type="submit">Submit</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
