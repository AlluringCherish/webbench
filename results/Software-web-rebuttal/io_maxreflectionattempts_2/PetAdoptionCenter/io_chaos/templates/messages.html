<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>
        <div id="conversation-list">
            {% for convo in conversations %}
            <div id="conversation-{{ convo.conversation_id }}">
                <div><strong>{{ convo.other_party_username }}</strong></div>
                <div>{{ convo.last_message_preview }}</div>
                <div>{{ convo.last_message_timestamp }}</div>
            </div>
            {% endfor %}
        </div>
        <form method="POST" action="{{ url_for('send_message') }}">
            <textarea id="message-input" name="message" placeholder="Type your message here..."></textarea>
            <button id="send-message-button" type="submit">Send Message</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
