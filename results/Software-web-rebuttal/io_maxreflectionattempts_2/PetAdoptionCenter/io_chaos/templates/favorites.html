<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>
        <div id="favorites-grid">
            {% for pet in favorites %}
            <div id="favorite-pet-{{ pet.pet_id }}">
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                <div>{{ pet.name }}</div>
                <div>{{ pet.species }}</div>
                <div>{{ pet.age }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
