<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Pets</title>
</head>
<body>
    <div id="pet-listings-page">
        <h1>Available Pets</h1>
        <form method="POST" action="{{ url_for('search_pets') }}">
            <input id="search-input" name="search" type="text" placeholder="Search pets...">
            <select id="filter-species" name="species">
                <option value="">All Species</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Bird">Bird</option>
                <option value="Rabbit">Rabbit</option>
                <option value="Other">Other</option>
            </select>
            <button type="submit">Search/Filter</button>
        </form>
        <div id="pet-grid">
            {% for pet in pets %}
            <div id="pet-card-{{ pet.pet_id }}">
                <a href="{{ url_for('pet_details_page', pet_id=pet.pet_id) }}">
                    <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                    <div>{{ pet.name }}</div>
                    <div>{{ pet.species }}</div>
                    <div>{{ pet.age }}</div>
                </a>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
