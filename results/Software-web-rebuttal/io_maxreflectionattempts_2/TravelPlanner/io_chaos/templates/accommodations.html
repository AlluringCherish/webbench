<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>

        <label for="destination-input">Destination:</label>
        <input type="text" id="destination-input" name="destination" />

        <label for="check-in-date">Check-in Date:</label>
        <input type="date" id="check-in-date" name="check_in_date" />

        <label for="check-out-date">Check-out Date:</label>
        <input type="date" id="check-out-date" name="check_out_date" />

        <label for="price-filter">Price Range:</label>
        <select id="price-filter" name="price_filter">
            <option value="">All Prices</option>
        </select>

        <div id="hotels-list">
            {% for hotel in hotels %}
            <div class="hotel-card">
                <h3>{{ hotel.name }}</h3>
                <p>City: {{ hotel.city }}</p>
                <p>Rating: {{ hotel.rating }}</p>
                <p>Price per Night: ${{ hotel.price_per_night }}</p>
                <p>Amenities: {{ hotel.amenities }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
