<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
    <div id="destinations-page">
        <h1>Travel Destinations</h1>

        <input type="text" id="search-destination" placeholder="Search destinations..." />

        <select id="region-filter">
            <option value="">All Regions</option>
            {# Could dynamically populate regions if needed #}
        </select>

        <div id="destinations-grid">
            {% for dest in destinations %}
            <div class="destination-card">
                <h3>{{ dest.name }}</h3>
                <p>Country: {{ dest.country }}</p>
                <p>Region: {{ dest.region }}</p>
                <button 
                    id="view-destination-button-{{ dest.dest_id }}" 
                    onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'"
                >View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
