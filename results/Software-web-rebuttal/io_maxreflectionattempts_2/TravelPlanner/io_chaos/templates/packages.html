<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>

        <label for="duration-filter">Filter by Duration:</label>
        <select id="duration-filter" name="duration_filter">
            <option value="">All Durations</option>
        </select>

        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-card">
                <h3>{{ pkg.package_name }}</h3>
                <p>Destination: {{ pkg.destination }}</p>
                <p>Duration: {{ pkg.duration_days }} days</p>
                <p>Price: ${{ pkg.price }}</p>

                <button 
                    id="view-package-details-button-{{ pkg.package_id }}" 
                    onclick="location.href='{{ url_for('travel_package_details', package_id=pkg.package_id) }}'"
                >View Details</button>

                <form method="POST" style="display:inline;">
                    <button type="submit" id="book-package-button-{{ pkg.package_id }}">Book Package</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
