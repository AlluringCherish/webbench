<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
    <div id="itinerary-page">
        <h1>Plan Your Itinerary</h1>

        <form method="POST">
            <label for="itinerary-name-input">Itinerary Name:</label>
            <input type="text" id="itinerary-name-input" name="itinerary_name" />

            <label for="start-date-input">Start Date:</label>
            <input type="date" id="start-date-input" name="start_date" />

            <label for="end-date-input">End Date:</label>
            <input type="date" id="end-date-input" name="end_date" />

            <button type="submit" id="add-activity-button">Add Activity</button>
        </form>

        <div id="itinerary-list">
            <h2>Your Itineraries</h2>
            <ul>
            {% for itinerary in itineraries %}
                <li>
                    <strong>{{ itinerary.itinerary_name }}</strong> to {{ itinerary.destination }} 
                    ({{ itinerary.start_date }} to {{ itinerary.end_date }}) - Status: {{ itinerary.status }}
                    <br />
                    Activities: {{ itinerary.activities }}
                </li>
            {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
