<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>

        <div id="trending-destinations">
            <h2>Trending Destinations</h2>
            <ul>
            {% for dest in trending_destinations %}
                <li>Rank {{ dest.popularity_rank }}: {{ dest.name }}</li>
            {% endfor %}
            </ul>
        </div>

        <label for="recommendation-season-filter">Filter by Season:</label>
        <select id="recommendation-season-filter">
            {% for season in season_filter_options %}
            <option value="{{ season }}">{{ season }}</option>
            {% endfor %}
        </select>

        <label for="budget-filter">Filter by Budget:</label>
        <select id="budget-filter">
            {% for budget in budget_filter_options %}
            <option value="{{ budget }}">{{ budget }}</option>
            {% endfor %}
        </select>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
