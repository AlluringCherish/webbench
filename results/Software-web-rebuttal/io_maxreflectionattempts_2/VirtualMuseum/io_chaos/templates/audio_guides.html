<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <h1>Audio Guides</h1>
        <form method="post" action="{{ url_for('audio_guides') }}">
            <select id="filter-language" name="selected_language">
                <option value="">-- Select Language --</option>
                {% for lang in languages %}
                    <option value="{{ lang }}" {% if selected_language == lang %}selected{% endif %}>{{ lang }}</option>
                {% endfor %}
            </select>
            <button id="apply-language-filter" type="submit">Apply Filter</button>
        </form>
        <table id="audio-guide-list" border="1">
            <thead>
                <tr>
                    <th>Exhibit Number</th>
                    <th>Title</th>
                    <th>Language</th>
                    <th>Duration</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for guide in audio_guides %}
                <tr>
                    <td>{{ guide.exhibit_number }}</td>
                    <td>{{ guide.title }}</td>
                    <td>{{ guide.language }}</td>
                    <td>{{ guide.duration }}</td>
                    <td>
                        <button id="play-guide-button-{{ guide.guide_id }}">Play</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
