<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders-page">
            <h1>Active Orders</h1>

            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status_filter">
                {% for status_option in status_filter_options %}
                    <option value="{{ status_option }}" {% if status_option == status_filter %}selected{% endif %}>{{ status_option }}</option>
                {% endfor %}
            </select>

            <div id="orders-list">
                {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Customer: {{ order.customer_name }}</p>
                    <p>Restaurant: {{ order.restaurant_name }}</p>
                    <p>Status: {{ order.status }}</p>
                    <a href="{{ url_for('order_tracking_page', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
                {% endfor %}
            </div>

            <a href="{{ url_for('dashboard_page') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
    <script>
    document.getElementById('status-filter').addEventListener('change', function() {
        const selectedStatus = this.value;
        const query = new URLSearchParams(window.location.search);
        if (selectedStatus === 'All') {
            query.delete('status');
        } else {
            query.set('status', selectedStatus);
        }
        window.location.search = query.toString();
    });
    </script>
</body>
</html>
