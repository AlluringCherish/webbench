<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="main-container">
        <div id="cart-page">
            <h1>Shopping Cart</h1>

            <form method="post" action="{{ url_for('shopping_cart') }}">
                <table id="cart-items-table" border="1">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Price per Unit</th>
                            <th>Subtotal</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for cart_item in cart_items %}
                        <tr>
                            <td>{{ cart_item.item_name }}</td>
                            <td>
                                <input type="number" name="update_quantity-{{ cart_item.cart_id }}" id="update-quantity-{{ cart_item.cart_id }}" value="{{ cart_item.quantity }}" min="1" />
                            </td>
                            <td>${{ '%.2f'|format(cart_item.price) }}</td>
                            <td>${{ '%.2f'|format(cart_item.price * cart_item.quantity) }}</td>
                            <td>
                                <button type="submit" name="remove_item-{{ cart_item.cart_id }}" id="remove-item-button-{{ cart_item.cart_id }}">Remove</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <div id="total-amount">
                    <strong>Total Amount: ${{ '%.2f'|format(total_amount) }}</strong>
                </div>

                <a href="{{ url_for('checkout_page') }}">
                    <button type="button" id="proceed-checkout-button">Proceed to Checkout</button>
                </a>
            </form>
        </div>
    </div>
</body>
</html>
