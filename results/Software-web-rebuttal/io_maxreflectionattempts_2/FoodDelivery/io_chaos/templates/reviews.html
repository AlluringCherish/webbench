<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>

            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating_filter">
                {% for rating_option in rating_filter_options %}
                    <option value="{{ rating_option }}">{{ rating_option }}</option>
                {% endfor %}
            </select>

            <div id="reviews-list">
                {% for review in reviews %}
                <div class="review-card">
                    <p><strong>{{ review.customer_name }}</strong> ({{ review.review_date }}) - Rating: {{ review.rating }}</p>
                    <p>{{ review.review_text }}</p>
                </div>
                {% endfor %}
            </div>

            <a href="{{ url_for('write_review_page') }}">
                <button id="write-review-button">Write a Review</button>
            </a>
            <a href="{{ url_for('dashboard_page') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
