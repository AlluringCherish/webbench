<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
    <div id="main-container">
        <h1>Car Rental Dashboard</h1>
        <div id="dashboard-page">
            <div id="featured-vehicles">
                {% for vehicle in featured_vehicles %}
                <div class="vehicle-card" id="vehicle-{{ vehicle.vehicle_id }}">
                    <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                    <p>Type: {{ vehicle.vehicle_type }}</p>
                    <p>Daily Rate: ${{ "%.2f"|format(vehicle.daily_rate) }}</p>
                </div>
                {% endfor %}
            </div>
            <button id="search-vehicles-button" onclick="location.href='{{ url_for('vehicle_search') }}'">Search Vehicles</button>
            <button id="my-reservations-button" onclick="location.href='{{ url_for('reservation_management') }}'">My Reservations</button>
            <div id="promotions-section">
                {% for promo in promotions %}
                <div class="promotion">
                    <h3>{{ promo.title }}</h3>
                    <p>{{ promo.description }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
