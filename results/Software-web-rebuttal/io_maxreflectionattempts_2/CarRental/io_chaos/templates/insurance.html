<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="main-container">
        <h1>Select Insurance Coverage</h1>
        <div id="insurance-page">
            <form method="POST" action="">
                <div id="insurance-options">
                    {% for plan in insurance_plans %}
                    <div class="insurance-plan">
                        <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="insurance_id" value="{{ plan.insurance_id }}" {% if selected_insurance_id == plan.insurance_id %}checked{% endif %}>
                        <label for="select-insurance-{{ plan.insurance_id }}">{{ plan.plan_name }}</label>
                        <div id="insurance-description">
                            <p>{{ plan.description }}</p>
                        </div>
                        <div id="insurance-price">
                            Price per day: ${{ "%.2f"|format(plan.daily_cost) }}
                        </div>
                    </div>
                    {% endfor %}
                </div>
                <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
