<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
    <div id="air-quality-page">
        <h1>Air Quality Index</h1>

        <label for="location-aqi-filter">Select Location:</label>
        <select id="location-aqi-filter" name="location-aqi-filter" onchange="window.location.href = this.value">
            <option value="">All Locations</option>
            {% for location in locations %}
                <option value="{{ url_for('air_quality') }}?location_id={{ location.location_id }}" {% if selected_location_id == location.location_id %}selected{% endif %}>
                    {{ location.location_name }}
                </option>
            {% endfor %}
        </select>

        <div id="aqi-display">AQI Index: {{ aqi_data.aqi_index }}</div>
        <div id="aqi-description">Description: {{ aqi_data.aqi_description }}</div>

        <table id="pollution-details" border="1">
            <thead>
                <tr>
                    <th>Pollutant</th>
                    <th>Level</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>PM2.5</td><td>{{ aqi_data.pm25 }}</td></tr>
                <tr><td>PM10</td><td>{{ aqi_data.pm10 }}</td></tr>
                <tr><td>NO2</td><td>{{ aqi_data.no2 }}</td></tr>
                <tr><td>O3</td><td>{{ aqi_data.o3 }}</td></tr>
            </tbody>
        </table>

        <div id="health-recommendation">Health Recommendation: {{ aqi_data.health_recommendation }}</div>
    </div>
</body>
</html>
