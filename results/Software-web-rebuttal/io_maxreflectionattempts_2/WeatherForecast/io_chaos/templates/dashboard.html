<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Weather Dashboard</h1>
        <div id="current-weather-summary">
            <p>Location: {{ default_location.location_name or 'N/A' }}</p>
            <p>Temperature: {{ default_location.temperature if default_location.temperature is not none else 'N/A' }}</p>
            <p>Condition: {{ default_location.condition or 'N/A' }}</p>
        </div>

        <a href="{{ url_for('location_search') }}">
            <button id="search-location-button">Search Locations</button>
        </a>

        <a href="{{ url_for('weekly_forecast') }}">
            <button id="view-forecast-button">View Weekly Forecast</button>
        </a>

        <a href="{{ url_for('alerts') }}">
            <button id="view-alerts-button">View Weather Alerts</button>
        </a>
    </div>
</body>
</html>
