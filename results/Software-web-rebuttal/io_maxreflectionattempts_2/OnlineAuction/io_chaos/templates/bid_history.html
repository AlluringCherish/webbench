<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
    <h1 id="page-title">Bid History</h1>

    <label for="filter-by-auction">Filter by Auction:</label>
    <select id="filter-by-auction" name="auction_id">
        {% for auction in auctions %}
        <option value="{{ auction.id }}">{{ auction.title }}</option>
        {% endfor %}
    </select>

    <label for="sort-by-amount">Sort by Amount:</label>
    <select id="sort-by-amount" name="sort_order">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>

    <table id="bids-table">
        <thead>
            <tr><th>Bidder</th><th>Amount</th><th>Date</th></tr>
        </thead>
        <tbody>
            {% for bid in bids %}
            <tr>
                <td>{{ bid.bidder }}</td>
                <td>{{ bid.amount }}</td>
                <td>{{ bid.date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button id="back-button" onclick="location.href='{{ url_for('dashboard_page') }}'">Back</button>
</body>
</html>
