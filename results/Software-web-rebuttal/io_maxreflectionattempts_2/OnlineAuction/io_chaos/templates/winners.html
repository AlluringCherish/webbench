<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winners</title>
</head>
<body>
    <h1 id="page-title">Winners</h1>

    <ul id="winners-list">
        {% for winner in winners %}
        <li>{{ winner.name }} - {{ winner.auction_title }} - {{ winner.amount }}</li>
        {% endfor %}
    </ul>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

</body>
</html>
