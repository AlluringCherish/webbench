<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Status</title>
</head>
<body>
    <h1 id="page-title">Status</h1>

    <label for="status-filter">Filter by Status:</label>
    <select id="status-filter" name="status">
        {% for status_option in status_options %}
        <option value="{{ status_option }}">{{ status_option }}</option>
        {% endfor %}
    </select>

    <table id="status-table">
        <thead>
            <tr><th>Auction</th><th>Status</th></tr>
        </thead>
        <tbody>
            {% for auction in auctions %}
            <tr>
                <td>{{ auction.title }}</td>
                <td>{{ auction.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

</body>
</html>
