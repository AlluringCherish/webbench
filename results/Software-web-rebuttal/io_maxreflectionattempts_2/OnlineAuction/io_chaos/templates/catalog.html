<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
</head>
<body>
    <h1 id="page-title">Catalog</h1>

    <input type="text" id="search-input" name="search" placeholder="Search auctions..." />

    <div id="auction-cards">
        {% for auction in auctions %}
        <div class="auction-card" id="auction-card-{{ auction.id }}">
            <h2>{{ auction.title }}</h2>
            <p>{{ auction.description }}</p>
            <button id="view-auction-button-{{ auction.id }}" onclick="location.href='{{ url_for('auction_details_page', auction_id=auction.id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
