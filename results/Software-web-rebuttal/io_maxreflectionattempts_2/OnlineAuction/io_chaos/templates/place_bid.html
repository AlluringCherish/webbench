<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <h1 id="page-title">Place Bid</h1>

    {% if error_message %}
    <div id="error-message">{{ error_message }}</div>
    {% endif %}

    <form id="bid-form" method="POST" action="{{ url_for('place_bid_page', auction_id=auction_id) }}">
        <label for="bid-amount">Bid Amount:</label>
        <input id="bid-amount" name="bid_amount" type="number" min="1" step="any" required />
        <button id="submit-bid-button" type="submit">Submit Bid</button>
    </form>

</body>
</html>
