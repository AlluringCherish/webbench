<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
</head>
<body>
    <h1 id="page-title">Categories</h1>

    <div id="category-list">
        {% for category in categories %}
        <div class="category-card" id="category-card-{{ category.id }}">
            <h2>{{ category.name }}</h2>
            <p>{{ category.description }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
