<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Details</title>
</head>
<body>
    <h1 id="page-title">Auction Details</h1>

    <div id="auction-info">
        <h2>{{ auction.title }}</h2>
        <p>{{ auction.description }}</p>
        <p>Start Date: {{ auction.start_date }}</p>
        <p>End Date: {{ auction.end_date }}</p>
    </div>

    <button id="place-bid-button" onclick="location.href='{{ url_for('place_bid_page', auction_id=auction.id) }}'">Place Bid</button>

</body>
</html>
