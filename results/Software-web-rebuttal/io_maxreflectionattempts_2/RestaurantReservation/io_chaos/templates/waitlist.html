<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <form method="POST" action="{{ url_for('join_waitlist') }}">
            <label for="waitlist-party-size">Select Party Size:</label>
            <select id="waitlist-party-size" name="party_size">
                {% for size in party_size_options %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="join-waitlist-button">Join Waitlist</button>
        </form>
        <div id="user-position">
            {% if user_position is not none %}
                Your position in the waitlist: {{ user_position }}
            {% else %}
                You are not currently on the waitlist.
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
