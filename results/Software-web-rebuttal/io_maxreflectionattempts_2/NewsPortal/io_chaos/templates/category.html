<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>
        <form method="post" action="{{ url_for('sort_category_articles', category_name=category_name) }}">
            <button type="submit" name="sort_by" value="date" id="sort-by-date">Sort by Date</button>
            <button type="submit" name="sort_by" value="popularity" id="sort-by-popularity">Sort by Popularity</button>
        </form>

        <div id="category-articles">
            {% for article in articles %}
            <div class="category-article">
                <h2>{{ article.title }}</h2>
                <div>Date: {{ article.date }}</div>
                <div>Popularity: {{ article.popularity }}</div>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
