<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Articles</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Articles</h1>

        <form method="post" action="{{ url_for('filter_trending') }}">
            <label for="time-period-filter">Filter by Time Period:</label>
            <select id="time-period-filter" name="time_period" onchange="this.form.submit()">
                <option value="Today" {% if time_period == 'Today' %}selected{% endif %}>Today</option>
                <option value="This Week" {% if time_period == 'This Week' %}selected{% endif %}>This Week</option>
                <option value="This Month" {% if time_period == 'This Month' %}selected{% endif %}>This Month</option>
            </select>
        </form>

        <div id="trending-list">
            {% for article in trending_articles %}
            <div class="trending-article">
                <div>Rank {{ article.rank }}: {{ article.title }} (Category: {{ article.category }}) - Views: {{ article.view_count }}</div>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
