<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Article Catalog</h1>

        <input type="text" id="search-input" name="search_query" placeholder="Search articles...">

        <select id="category-filter" name="category_id">
            {% for category in categories %}
            <option value="{{ category.category_id }}">{{ category.category_name }}</option>
            {% endfor %}
        </select>

        <div id="articles-grid">
            {% for article in articles %}
            <div class="article-card">
                <img src="{{ article.thumbnail_url }}" alt="Thumbnail for {{ article.title }}">
                <h2>{{ article.title }}</h2>
                <div>By {{ article.author }} on {{ article.date }}</div>
                <div>Category: {{ article.category }}</div>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
