<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">Results for query: "{{ query }}"</div>
        {% if results|length > 0 %}
        <div id="results-list">
            {% for article in results %}
            <div class="result-item">
                <h2>{{ article.title }}</h2>
                <p>{{ article.excerpt }}</p>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div id="no-results-message">No results found.</div>
        {% endif %}
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
