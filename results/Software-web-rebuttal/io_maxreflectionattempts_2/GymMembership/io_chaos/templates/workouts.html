<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Workout Records</title>
</head>
<body>
    <div id="workouts-page">
        <h1>My Workout Records</h1>

        <label for="filter-by-type">Filter by Workout Type:</label>
        <select id="filter-by-type" name="filter-by-type">
            {% for wtype in workout_types %}
            <option value="{{ wtype }}">{{ wtype }}</option>
            {% endfor %}
        </select>

        <table id="workouts-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Duration (minutes)</th>
                    <th>Calories Burned</th>
                </tr>
            </thead>
            <tbody>
                {% for workout in workouts %}
                <tr>
                    <td>{{ workout.workout_date }}</td>
                    <td>{{ workout.workout_type }}</td>
                    <td>{{ workout.duration_minutes }}</td>
                    <td>{{ workout.calories_burned }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('log_workout') }}">
            <button id="log-workout-button">Log Workout</button>
        </a>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
