<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
</head>
<body>
    <div id="membership-page">
        <h1>Membership Plans</h1>
        <label for="plan-filter">Filter Plans:</label>
        <select id="plan-filter" name="plan-filter">
            <option value="Basic">Basic</option>
            <option value="Premium">Premium</option>
            <option value="Elite">Elite</option>
        </select>

        <div id="plans-grid">
            {% for plan in membership_plans %}
            <div class="plan-item">
                <h2>{{ plan.plan_name }}</h2>
                <p>Price: ${{ plan.price }}</p>
                <p>Features: {{ plan.features }}</p>
                <a href="{{ url_for('plan_details', plan_id=plan.membership_id) }}">
                    <button id="view-details-button-{{ plan.membership_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
