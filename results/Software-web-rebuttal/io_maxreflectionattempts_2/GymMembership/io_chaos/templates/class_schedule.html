<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Schedule</title>
</head>
<body>
    <div id="schedule-page">
        <h1>Class Schedule</h1>

        <input type="text" id="schedule-search" name="schedule-search" placeholder="Search classes or trainers...">

        <label for="schedule-filter">Filter by Class Type:</label>
        <select id="schedule-filter" name="schedule-filter">
            {% for ctype in class_types %}
            <option value="{{ ctype }}">{{ ctype }}</option>
            {% endfor %}
        </select>

        <div id="classes-grid">
            {% for class in classes %}
            <div class="class-item">
                <h2>{{ class.class_name }}</h2>
                <p>Day: {{ class.schedule_day }}</p>
                <p>Time: {{ class.schedule_time }}</p>
                <p>Trainer: {{ class.trainer_name }}</p>
                <p>Capacity: {{ class.capacity }}</p>
                <p>Duration: {{ class.duration }} minutes</p>
                <button id="enroll-class-button-{{ class.class_id }}">Enroll</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
