<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>

    <form method="post" action="">
        <input id="search-artists" name="search" type="text" placeholder="Search artists...">
        <select id="artists-sort" name="sort">
            <option value="">Sort By</option>
            <option value="name_asc">Name A-Z</option>
            <option value="name_desc">Name Z-A</option>
            <option value="year_asc">Formation Year Ascending</option>
            <option value="year_desc">Formation Year Descending</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-item">
            <div><strong>{{ artist.name }}</strong></div>
            <div>Genre: {{ artist.genre }}</div>
            <div>Country: {{ artist.country }}</div>
            <div>Formed: {{ artist.formation_year }}</div>
            <a href="{{ url_for('artist_profile_page', artist_id=artist.artist_id) }}">
                <button id="view-artist-button-{{ artist.artist_id }}" type="button">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
