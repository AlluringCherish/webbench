<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>

    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-item">
            <h2>{{ playlist.title }}</h2>
            <p>{{ playlist.description }}</p>
            <p>Created: {{ playlist.creation_date }}</p>
            <p>Total Songs: {{ playlist.total_songs }}</p>
            <a href="{{ url_for('playlist_details_page', playlist_id=playlist.playlist_id) }}">
                <button id="view-playlist-button-{{ playlist.playlist_id }}" type="button">View</button>
            </a>
        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('create_playlist_page') }}"><button id="create-playlist-button">Create Playlist</button></a>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
