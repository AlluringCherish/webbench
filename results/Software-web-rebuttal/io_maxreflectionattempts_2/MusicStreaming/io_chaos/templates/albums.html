<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>

    <form method="post" action="">
        <input id="search-albums" name="search" type="text" placeholder="Search albums...">
        <select id="sort-albums" name="sort">
            <option value="">Sort By</option>
            <option value="year_asc">Year Ascending</option>
            <option value="year_desc">Year Descending</option>
            <option value="title_asc">Title A-Z</option>
            <option value="title_desc">Title Z-A</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-item">
            <div><strong>{{ album.title }}</strong></div>
            <div>Artist: {{ album.artist_name }}</div>
            <div>Year: {{ album.year }}</div>
            <div>Genre: {{ album.genre }}</div>
            <a href="{{ url_for('album_details_page', album_id=album.album_id) }}">
                <button id="view-album-button-{{ album.album_id }}" type="button">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
