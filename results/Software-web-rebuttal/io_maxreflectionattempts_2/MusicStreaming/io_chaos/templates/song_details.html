<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name">
        Artist: <a id="artist-link" href="{{ url_for('artist_profile_page', artist_id=song.artist_id) }}">{{ song.artist_name }}</a>
    </div>
    <div id="album-name">Album: {{ song.album_name }}</div>
    <div id="duration-display">Duration: {{ song.duration }} seconds</div>
    <div id="genre-display">Genre: {{ song.genre }}</div>
    <div id="release-date">Release Date: {{ song.release_date }}</div>
    <div id="play-count">Play Count: {{ song.play_count }}</div>
    <button id="play-button">Play</button>
</div>
</body>
</html>
