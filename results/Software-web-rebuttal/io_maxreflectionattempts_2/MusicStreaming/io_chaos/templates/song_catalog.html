<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>

    <form method="post" action="">
        <input type="text" id="search-input" name="search" placeholder="Search songs...">
        <select id="genre-filter" name="genre">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}">{{ genre }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="songs-grid">
        {% for song in songs %}
        <div class="song-item">
            <div><strong>{{ song.title }}</strong></div>
            <div>Artist: {{ song.artist_name }}</div>
            <div>Album: {{ song.album_name }}</div>
            <div>Genre: {{ song.genre }}</div>
            <div>Duration: {{ song.duration }} seconds</div>
            <button id="add-to-playlist-button-{{ song.song_id }}" type="button">Add to Playlist</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
