<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ContentPublishingHub</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>
        <div id="welcome-message">
            <p>Welcome, {{ username }}!</p>
        </div>
        <div id="quick-stats">
            <h2>Quick Stats</h2>
            <ul>
            {% for key, value in quick_stats.items() %}
                <li id="stat-{{ key|replace(' ', '-')|lower }}">{{ key }}: {{ value }}</li>
            {% endfor %}
            </ul>
        </div>
        <div id="recent-activity">
            <h2>Recent Activity</h2>
            <ul>
            {% for activity in recent_activity %}
                <li id="activity-{{ loop.index }}">
                    <strong>{{ activity.title }}</strong> - {{ activity.description }} on {{ activity.date }}
                </li>
            {% endfor %}
            </ul>
        </div>
        <nav id="navigation">
            <button id="btn-create-article" onclick="location.href='{{ url_for('create_article') }}'">Create New Article</button>
            <button id="btn-my-articles" onclick="location.href='{{ url_for('my_articles') }}'">My Articles</button>
            <button id="btn-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="btn-content-calendar" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
            <button id="btn-article-analytics" onclick="location.href='{{ url_for('article_analytics', article_id=1) }}'">Article Analytics</button>
        </nav>
    </div>
</body>
</html>
