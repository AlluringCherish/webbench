<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>
        {% if success_message %}
            <div id="success-message">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
            <div id="error-message">{{ error_message }}</div>
        {% endif %}
        <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="article_title" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="article_content" rows="15" cols="80" required></textarea><br><br>

            <button type="submit" id="btn-submit-article">Submit</button>
        </form>
        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
