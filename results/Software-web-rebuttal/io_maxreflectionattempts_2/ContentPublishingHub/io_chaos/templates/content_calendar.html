<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>
        <form id="calendar-form" method="POST" action="{{ url_for('content_calendar') }}">
            <label for="calendar-view">View:</label>
            <select id="calendar-view" name="calendar_view">
                <option value="monthly" {% if calendar_view == 'monthly' %}selected{% endif %}>Monthly</option>
                <option value="weekly" {% if calendar_view == 'weekly' %}selected{% endif %}>Weekly</option>
                <option value="daily" {% if calendar_view == 'daily' %}selected{% endif %}>Daily</option>
            </select>
            <button type="submit" id="btn-refresh-calendar">Refresh</button>
        </form>

        <div id="calendar-data">
            {# Assume calendar_data is a list of events or dicts for display #}
            <ul>
            {% for event in calendar_data %}
                <li id="event-{{ loop.index }}">
                    <strong>{{ event.title }}</strong>: {{ event.date }} - {{ event.description }}
                </li>
            {% endfor %}
            </ul>
        </div>

        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
