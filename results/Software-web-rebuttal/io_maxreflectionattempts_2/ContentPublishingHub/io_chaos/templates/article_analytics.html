<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Article Analytics</h1>
        <h2>Analytics for Article ID: {{ article_id }}</h2>

        <div id="analytics-details">
            <ul>
            {% for key, value in analytics.items() %}
                <li id="analytic-{{ key|replace(' ', '-')|lower }}">{{ key }}: {{ value }}</li>
            {% endfor %}
            </ul>
        </div>

        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
