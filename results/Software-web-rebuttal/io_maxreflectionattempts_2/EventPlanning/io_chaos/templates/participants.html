<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="participants-page">
        <h1>Participants Management</h1>

        <button id="add-participant-button">Add Participant</button>

        <form method="GET" action="{{ url_for('participants_page') }}">
            <input type="text" id="search-participant-input" name="search" placeholder="Search participants by name or email">

            <select id="participant-status-filter" name="status">
                <option value="">All Statuses</option>
                <option value="Registered">Registered</option>
                <option value="Confirmed">Confirmed</option>
                <option value="Attended">Attended</option>
            </select>

            <button type="submit">Filter</button>
        </form>

        <table id="participants-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Event</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in participants %}
                <tr>
                    <td>{{ participant.name }}</td>
                    <td>{{ participant.email }}</td>
                    <td>{{ participant.event_name }}</td>
                    <td>{{ participant.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

    </div>
</body>
</html>
