<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>

        <form method="GET" action="{{ url_for('venues_page') }}">
            <input type="text" id="venue-search-input" name="search" placeholder="Search venues by name or location">

            <select id="venue-capacity-filter" name="capacity">
                <option value="">All Capacities</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card">
                <h3>{{ venue.venue_name }}</h3>
                <p>Location: {{ venue.location }}</p>
                <p>Capacity: {{ venue.capacity }}</p>
                <p>Amenities: {{ venue.amenities }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}">View Details</button>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
