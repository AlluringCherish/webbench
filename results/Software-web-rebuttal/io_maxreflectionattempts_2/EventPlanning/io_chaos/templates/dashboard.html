<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Event Planning Dashboard</h1>

        <div id="featured-events">
            <h2>Featured Events</h2>
            <ul>
                {% for event in featured_events %}
                <li>
                    <strong>{{ event.event_name }}</strong><br>
                    Date: {{ event.date }}<br>
                    Location: {{ event.location }}
                </li>
                {% endfor %}
            </ul>
        </div>

        <button id="browse-events-button" onclick="window.location.href='{{ url_for('events_listing_page') }}'">Browse Events</button>
        <button id="view-tickets-button" onclick="window.location.href='{{ url_for('bookings_summary_page') }}'">View Tickets</button>
        <button id="venues-button" onclick="window.location.href='{{ url_for('venues_page') }}'">Venues</button>

        <div id="venues-section">
            <h2>Venues</h2>
            <ul>
                {% for venue in venues %}
                <li>
                    <strong>{{ venue.venue_name }}</strong> - {{ venue.location }}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
