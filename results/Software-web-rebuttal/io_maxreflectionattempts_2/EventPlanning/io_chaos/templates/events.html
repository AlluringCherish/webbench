<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="events-page">
        <h1>Events Catalog</h1>

        <form method="GET" action="{{ url_for('events_listing_page') }}">
            <input type="text" id="event-search-input" name="search" placeholder="Search by name, location, or date">

            <select id="event-category-filter" name="category">
                <option value="">All Categories</option>
                <option value="Conference">Conference</option>
                <option value="Concert">Concert</option>
                <option value="Sports">Sports</option>
                <option value="Workshop">Workshop</option>
                <option value="Social">Social</option>
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="events-grid">
            {% for event in events %}
            <div class="event-card">
                <h3>{{ event.event_name }}</h3>
                <p>Category: {{ event.category }}</p>
                <p>Date: {{ event.date }}</p>
                <p>Location: {{ event.location }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="window.location.href='{{ url_for('event_details_page', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
