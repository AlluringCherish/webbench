<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="schedules-page">
        <h1>Event Schedules</h1>

        <form method="GET" action="{{ url_for('event_schedules_page') }}">
            <label for="schedule-filter-date">Filter by Date:</label>
            <input type="date" id="schedule-filter-date" name="filter_date">

            <label for="schedule-filter-event">Filter by Event:</label>
            <select id="schedule-filter-event" name="filter_event">
                <option value="">All Events</option>
                {% for schedule in schedules %}
                <option value="{{ schedule.event_id }}">{{ schedule.session_title }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="schedules-timeline">
            <ul>
                {% for schedule in schedules %}
                <li>
                    <strong>{{ schedule.session_title }}</strong> - {{ schedule.session_time }} ({{ schedule.duration_minutes }} mins)<br>
                    Speaker: {{ schedule.speaker }}<br>
                    Venue ID: {{ schedule.venue_id }}
                </li>
                {% endfor %}
            </ul>
        </div>

        <button id="export-schedule-button">Export Schedule</button>
    </div>
</body>
</html>
