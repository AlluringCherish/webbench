<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="create-playlist-page">
    <h1>Create New Playlist</h1>
    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('create_playlist') }}">
        <label for="playlist-name-input">Playlist Name:</label><br>
        <input type="text" id="playlist-name-input" name="playlist-name-input" value="{{ title|default('') }}" required><br><br>
        <label for="playlist-description-input">Playlist Description:</label><br>
        <textarea id="playlist-description-input" name="playlist-description-input" rows="4" cols="50">{{ description|default('') }}</textarea><br><br>
        <button type="submit" id="save-playlist-button">Save Playlist</button>
        <button type="button" id="cancel-create-button" onclick="location.href='{{ url_for('playlists') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
