<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>
    <div id="playlists-grid">
        {% if playlists %}
            <ul>
                {% for playlist in playlists %}
                    <li>
                        <div class="playlist-card">
                            <div class="playlist-info">
                                <strong>{{ playlist.title }}</strong><br>
                                Songs: {{ playlist.total_songs }}
                            </div>
                            <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="location.href='{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}'">View</button>
                        </div>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No playlists found.</p>
        {% endif %}
    </div>
    <button id="create-playlist-button" onclick="location.href='{{ url_for('create_playlist') }}'">Create New Playlist</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
