<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name">
        Artist: <a href="{{ url_for('artist_profile', artist_id=song.artist_id) }}">{{ song.artist_name }}</a>
    </div>
    <div id="album-name">
        Album: <a href="{{ url_for('album_details', album_id=song.album_id) }}">{{ song.album_title }}</a>
    </div>
    <div id="duration-display">
        Duration: {{ (song.duration // 60) }}:{{ '%02d' % (song.duration % 60) }}
    </div>
    <button id="play-button" onclick="alert('Playing {{ song.title }}')">Play</button>
    <nav>
        <button onclick="location.href='{{ url_for('song_catalog') }}'">Back to Song Catalog</button>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </nav>
</div>
</body>
</html>
