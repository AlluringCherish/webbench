<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="catalog-page">
    <h1>Book Catalog</h1>
    <form method="get" action="{{ url_for('catalog') }}">
        <input type="text" id="search-input" name="search" placeholder="Search by title, author, or ISBN" value="{{ search_query }}">
        <select id="category-filter" name="category">
            {% for category in categories %}
            <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>{{ category }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search</button>
    </form>
    <div id="books-grid" class="books-grid">
        {% for book in books %}
        <div class="book-card">
            <h3>{{ book.title }}</h3>
            <p><strong>Author:</strong> {{ book.author }}</p>
            <p><strong>Price:</strong> ${{ "%.2f"|format(book.price) }}</p>
            <form action="{{ url_for('book_details', book_id=book.book_id) }}" method="get">
                <button type="submit" id="view-book-button-{{ book.book_id }}">View Details</button>
            </form>
        </div>
        {% else %}
        <p>No books found.</p>
        {% endfor %}
    </div>
    <form action="{{ url_for('back_to_dashboard') }}" method="post">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
