<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</head>
<body>
<div id="winners-page">
    <h1>Winning Items</h1>
    <label for="filter-by-winner">Filter by Winner Name:</label>
    <input type="text" id="filter-by-winner" name="filter-by-winner" value="{{ filter_winner }}">
    <div id="winners-list">
        {% if winners %}
            {% for winner in winners %}
                <div class="winner-card" id="winner-card-{{ winner.auction_id }}">
                    <h3>{{ winner.item_name }}</h3>
                    <p>Winner: {{ winner.winner_name }}</p>
                    <p>Winning Bid: ${{ '%.2f'|format(winner.winning_bid) }}</p>
                    <p>Win Date: {{ winner.win_date }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>No winning items found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard">Back to Dashboard</button>
</div>
</body>
</html>
