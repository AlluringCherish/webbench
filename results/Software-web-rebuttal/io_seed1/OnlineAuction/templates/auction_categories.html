<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Categories</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</head>
<body>
<div id="categories-page">
    <h1>Auction Categories</h1>
    <div id="categories-list">
        {% if categories %}
            {% for category in categories %}
                <div class="category-card" id="category-card-{{ category.category_id }}">
                    <h3>{{ category.category_name }}</h3>
                    <p>{{ category.description }}</p>
                    <p>Items: {{ category.item_count }}</p>
                    <button id="view-category-button-{{ category.category_id }}">View Items</button>
                </div>
            {% endfor %}
        {% else %}
            <p>No categories available.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard">Back to Dashboard</button>
</div>
</body>
</html>
