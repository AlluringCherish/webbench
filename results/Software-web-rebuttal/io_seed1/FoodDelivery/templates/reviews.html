<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="reviews-page">
    <h1>Order Reviews</h1>
    <form method="get" action="{{ url_for('reviews') }}">
        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating" onchange="this.form.submit()">
            {% for rating in ratings %}
                <option value="{{ rating }}" {% if selected_rating == rating %}selected{% endif %}>{{ rating }}</option>
            {% endfor %}
        </select>
    </form>
    <div id="reviews-list">
        {% if reviews %}
            <ul>
                {% for review in reviews %}
                    <li>
                        <strong>{{ review.restaurant_name }}</strong> - Rating: {{ review.rating }}<br>
                        <em>{{ review.customer_name }}</em> ({{ review.review_date }})<br>
                        <p>{{ review.review_text }}</p>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No reviews found.</p>
        {% endif %}
    </div>
    <button id="write-review-button" onclick="location.href='{{ url_for('write_review', restaurant_id=reviews[0].restaurant_id if reviews else 1) }}'">Write a Review</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
