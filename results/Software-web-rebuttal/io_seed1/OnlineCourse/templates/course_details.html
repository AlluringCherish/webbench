<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="course-details-page">
    <h1 id="course-title">{{ course.title }}</h1>
    <div id="course-description">
        <p>{{ course.description }}</p>
        <p><strong>Category:</strong> {{ course.category }}</p>
        <p><strong>Level:</strong> {{ course.level }}</p>
        <p><strong>Duration:</strong> {{ course.duration }}</p>
        <p><strong>Status:</strong> {{ course.status }}</p>
    </div>
    <form method="post" action="{{ url_for('course_details', course_id=course.course_id) }}">
        {% if already_enrolled %}
            <button id="enroll-button" type="submit" disabled>Already Enrolled</button>
        {% else %}
            <button id="enroll-button" type="submit">Enroll</button>
        {% endif %}
    </form>
    <button id="back-to-catalog" onclick="location.href='{{ url_for('course_catalog') }}'">Back to Course Catalog</button>
</div>
</body>
</html>
