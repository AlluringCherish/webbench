<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="certificates-page">
    <h1>My Certificates</h1>
    <div id="certificates-grid">
        {% if certificates %}
            <div class="certificate-cards">
                {% for cert in certificates %}
                    <div class="certificate-card">
                        <h3>{{ cert.title }}</h3>
                        <p>Issued on: {{ cert.issue_date }}</p>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>You have not earned any certificates yet.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
