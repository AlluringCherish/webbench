<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="menu-page">
    <h1>Restaurant Menu</h1>
    <div id="menu-grid" style="display:flex; flex-wrap: wrap; gap: 20px;">
        {% for dish in menu_items %}
        <div class="dish-card" style="width: 220px;">
            <h3>{{ dish.name }}</h3>
            <p><strong>Category:</strong> {{ dish.category }}</p>
            <p><strong>Price:</strong> ${{ "%.2f"|format(dish.price) }}</p>
            <p>{{ dish.description }}</p>
            <form action="{{ url_for('dish_details', dish_id=dish.dish_id) }}" method="get">
                <button type="submit" id="view-dish-button-{{ dish.dish_id }}">View Details</button>
            </form>
        </div>
        {% endfor %}
    </div>
    <form action="{{ url_for('back_to_dashboard') }}" method="get" style="margin-top: 30px;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
