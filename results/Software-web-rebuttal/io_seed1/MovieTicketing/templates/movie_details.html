<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="movie-details-page">
        <h1 id="movie-title">{{ movie.title }}</h1>
        <div id="movie-director"><strong>Director:</strong> {{ movie.director }}</div>
        <div id="movie-rating"><strong>Rating:</strong> {{ movie.rating }}</div>
        <div id="movie-description"><strong>Description:</strong> {{ movie.description }}</div>
        <button id="select-showtime-button" onclick="location.href='{{ url_for('showtime_selection') }}?movie={{ movie.movie_id }}'">Select Showtime</button>
        <nav>
            <button onclick="location.href='{{ url_for('movie_catalog') }}'">Back to Catalog</button>
            <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </nav>
    </div>
</body>
</html>
