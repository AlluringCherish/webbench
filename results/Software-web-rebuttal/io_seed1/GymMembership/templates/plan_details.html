<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="plan-details-page">
    <h1 id="plan-title">{{ plan.plan_name }}</h1>
    <div id="plan-price">
        <strong>Price:</strong> ${{ plan.price }} / {{ plan.billing_cycle }}
    </div>
    <div id="plan-features">
        <strong>Features:</strong> {{ plan.features }}
    </div>
    <form method="post" action="{{ url_for('plan_details', plan_id=plan.membership_id) }}">
        <button id="enroll-plan-button" type="submit">Enroll in Plan</button>
    </form>
    <div id="plan-reviews">
        <h3>Member Reviews</h3>
        {% if plan_reviews %}
            <ul>
                {% for review in plan_reviews %}
                <li>{{ review }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No reviews available.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
