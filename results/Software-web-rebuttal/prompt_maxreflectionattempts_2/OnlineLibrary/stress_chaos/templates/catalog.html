<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <form method="POST" action="{{ url_for('catalog_search') }}">
            <input id="search-input" type="text" name="search_query" value="{{ search_query if search_query is defined else '' }}" placeholder="Search books...">
            <button type="submit">Search</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        <div id="book-grid">
            {% for book in books %}
            <div>
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>Status: {{ book.status }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
