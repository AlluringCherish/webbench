<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="{{ catalog_page_id }}">
        <h1>Article Catalog</h1>
        <input type="text" id="{{ search_input_id }}" placeholder="Search articles...">
        <select id="{{ category_filter_id }}">
            <!-- Category options here -->
        </select>
        <div id="{{ articles_grid_id }}">
            {% for article in articles %}
            <div class="article-card">
                <img src="{{ article.thumbnail_url }}" alt="Thumbnail for {{ article.title }}">
                <h2>{{ article.title }}</h2>
                <p>By {{ article.author }} on {{ article.date }}</p>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
