<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="{{ search_results_page_id }}">
        <h1>Search Results</h1>
        <div id="{{ search_query_display_id }}">Search query: {{ search_query }}</div>
        {% if results_list|length == 0 %}
        <div id="{{ no_results_message_id }}">No results found.</div>
        {% else %}
        <div id="{{ results_list_id }}">
            {% for article in results_list %}
            <div class="search-result-item">
                <h3>{{ article.title }}</h3>
                <p>{{ article.excerpt }}</p>
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
