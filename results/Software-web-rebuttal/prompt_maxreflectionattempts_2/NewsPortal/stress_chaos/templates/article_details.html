<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Details</title>
</head>
<body>
    <div id="{{ article_details_page_id }}">
        <h1 id="article-title">{{ article_title }}</h1>
        <div id="article-author">By {{ article_author }}</div>
        <div id="article-date">{{ article_date }}</div>
        <button id="bookmark-button">Bookmark</button>
        <div id="article-content">{{ article_content }}</div>
    </div>
</body>
</html>
