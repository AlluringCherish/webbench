<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Comment</title>
</head>
<body>
    <div id="{{ write_comment_page_id }}">
        <h1>Write a Comment</h1>
        <form method="POST" action="{{ url_for('write_comment_page') }}">
            <label for="{{ select_article_id }}">Select Article:</label>
            <select id="{{ select_article_id }}" name="article_id">
                {% for article in articles %}
                <option value="{{ article.article_id }}">{{ article.title }}</option>
                {% endfor %}
            </select>
            <br />
            <label for="{{ commenter_name_input_id }}">Your Name:</label>
            <input type="text" id="{{ commenter_name_input_id }}" name="commenter_name" required>
            <br />
            <label for="{{ comment_text_textarea_id }}">Comment:</label>
            <textarea id="{{ comment_text_textarea_id }}" name="comment_text" required></textarea>
            <br />
            <button type="submit" id="{{ submit_comment_button_id }}">Submit Comment</button>
        </form>
    </div>
</body>
</html>
