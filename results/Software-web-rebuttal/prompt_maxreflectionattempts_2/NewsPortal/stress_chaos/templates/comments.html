<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Comments</title>
</head>
<body>
    <div id="{{ comments_page_id }}">
        <h1>Comments</h1>
        <div id="comments-list">
            {% for comment in comments_list %}
            <div class="comment-item">
                <h3>{{ comment.article_title }}</h3>
                <p><strong>{{ comment.commenter_name }}</strong> says:</p>
                <p>{{ comment.comment_text }}</p>
                <p><em>{{ comment.comment_date }}</em></p>
            </div>
            {% endfor %}
        </div>
        <button id="write-comment-button" onclick="location.href='{{ url_for('write_comment_page') }}'">Write Comment</button>
        <select id="filter-by-article">
            <!-- Article filter options here -->
        </select>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
