<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="{{ category_page_id }}">
        <h1 id="category-title">{{ category_name }}</h1>
        <button id="sort-by-date">Sort by Date</button>
        <button id="sort-by-popularity">Sort by Popularity</button>
        <div id="{{ category_articles_id }}">
            {% for article in category_articles %}
            <div class="category-article-item">
                <h3>{{ article.title }}</h3>
                <p>By {{ article.author }} on {{ article.date }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
