<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1 id="seat-selection-header">Select Seats</h1>
        <div id="seat-map">
            {% for seat in seat_map %}
                <button id="seat-{{ seat.row }}{{ seat.column }}" class="seat {{ seat.status|lower }}" data-seat-id="{{ seat.seat_id }}">
                    {{ seat.row }}{{ seat.column }} ({{ seat.seat_type }})
                </button>
            {% endfor %}
        </div>
        <div id="selected-seats-display">
            Selected Seats: {{ selected_seats | join(', ') }}
        </div>
        <button id="proceed-booking-button" onclick="location.href='{{ url_for('booking_confirmation') }}'">Proceed Booking</button>
    </div>
</body>
</html>
