<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <h1 id="catalog-header">Movie Catalog</h1>

    <div id="catalog-page">
        <form method="POST" action="{{ url_for('movie_search') }}">
            <input id="search-input" name="search" type="text" placeholder="Search by title or genre">

            <select id="genre-filter" name="genre">
                <option value="">All</option>
                {% for genre in genres %}
                    <option value="{{ genre }}">{{ genre }}</option>
                {% endfor %}
            </select>

            <button type="submit">Search</button>
        </form>

        <div id="movies-grid">
            {% for movie in movies %}
                <div class="movie-card">
                    <h2>{{ movie.title }}</h2>
                    <p>Genre: {{ movie.genre }}</p>
                    <p>Rating: {{ movie.rating }}</p>
                    <p>Duration: {{ movie.duration }} min</p>
                    <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Movie</button>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
