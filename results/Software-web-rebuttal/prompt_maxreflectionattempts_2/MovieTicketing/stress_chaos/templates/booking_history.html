<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking History</title>
</head>
<body>
    <div id="bookings-page">
        <h1 id="bookings-header">Booking History</h1>
        <label for="status-filter">Filter by Status:</label>
        <select id="status-filter" name="status">
            <option value="">All</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Cancelled">Cancelled</option>
        </select>
        <table id="bookings-table">
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Movie</th>
                    <th>Date</th>
                    <th>Seats</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                    <tr>
                        <td>{{ booking.booking_id }}</td>
                        <td>{{ booking.movie }}</td>
                        <td>{{ booking.date }}</td>
                        <td>{{ booking.seats | join(', ') }}</td>
                        <td>{{ booking.status }}</td>
                        <td>
                            <button id="view-booking-button-{{ booking.booking_id }}" onclick="location.href='{{ url_for('booking_details', booking_id=booking.booking_id) }}'">View</button>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
