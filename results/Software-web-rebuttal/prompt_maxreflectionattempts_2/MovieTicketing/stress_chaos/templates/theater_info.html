<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1 id="theater-header">Theater Information</h1>
        <label for="theater-location-filter">Filter by Location:</label>
        <select id="theater-location-filter" name="location">
            <option value="">All</option>
            {% for location in locations %}
                <option value="{{ location }}">{{ location }}</option>
            {% endfor %}
        </select>
        <div id="theaters-list">
            {% for theater in theaters %}
                <div class="theater-entry">
                    <p>Name: {{ theater.theater_name }}</p>
                    <p>Location: {{ theater.location }}</p>
                    <p>Screens: {{ theater.screens }}</p>
                    <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
