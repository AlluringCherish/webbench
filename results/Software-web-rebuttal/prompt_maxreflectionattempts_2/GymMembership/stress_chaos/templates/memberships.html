<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Membership Plans</title>
</head>
<body>
<div id="membership-page">
  <h1>Membership Plans</h1>
  <select id="plan-filter">
    <option value="Basic">Basic</option>
    <option value="Premium">Premium</option>
    <option value="Elite">Elite</option>
  </select>

  <div id="plans-grid">
    {% for plan in plans %}
    <div class="plan-card" id="plan-{{ plan.membership_id }}">
      <h2>{{ plan.plan_name }}</h2>
      <p>Price: ${{ plan.price }} / {{ plan.billing_cycle }}</p>
      <div id="plan-features-{{ plan.membership_id }}">{{ plan.features }}</div>
      <a href="{{ url_for('plan_details', plan_id=plan.membership_id) }}">
        <button id="view-details-button-{{ plan.membership_id }}">View Details</button>
      </a>
    </div>
    {% endfor %}
  </div>

  <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
