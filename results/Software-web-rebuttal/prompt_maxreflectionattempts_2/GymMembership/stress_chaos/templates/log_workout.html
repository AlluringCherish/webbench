<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Workout</title>
</head>
<body>
<div id="log-workout-page">
  <h1>Log Workout</h1>

  {% if log_result is defined and log_result %}
  <div id="log-result-message">
    <p>{{ log_result }}</p>
  </div>
  {% endif %}

  <form method="POST">
    <label for="workout-type">Workout Type:</label>
    <select id="workout-type" name="workout-type" required>
      <option value="Cardio">Cardio</option>
      <option value="Strength">Strength</option>
      <option value="Class">Class</option>
      <option value="Flexibility">Flexibility</option>
      <option value="Other">Other</option>
    </select>

    <label for="workout-duration">Duration (minutes):</label>
    <input type="number" id="workout-duration" name="workout-duration" min="1" required>

    <label for="calories-burned">Calories Burned:</label>
    <input type="number" id="calories-burned" name="calories-burned" min="0" required>

    <label for="workout-notes">Notes:</label>
    <textarea id="workout-notes" name="workout-notes"></textarea>

    <button id="submit-workout-button" type="submit">Submit Workout</button>
  </form>
</div>
</body>
</html>
