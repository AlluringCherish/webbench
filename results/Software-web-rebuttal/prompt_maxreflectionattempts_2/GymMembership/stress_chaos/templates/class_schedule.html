<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Class Schedule</title>
</head>
<body>
<div id="schedule-page">

  <input type="text" id="schedule-search" name="schedule-search" placeholder="Search classes or trainers" value="{{ search_query | default('') }}">

  <select id="schedule-filter" name="schedule-filter">
    <option value="">All Types</option>
    {% for ctype in class_types %}
    <option value="{{ ctype }}" {% if filter_type == ctype %}selected{% endif %}>{{ ctype }}</option>
    {% endfor %}
  </select>

  <div id="classes-grid">
    {% for cls in classes %}
    <div class="class-card" id="class-{{ cls.class_id }}">
      <h3>{{ cls.class_name }}</h3>
      <p>Type: {{ cls.class_type }}</p>
      <p>Schedule: {{ cls.schedule_day }} {{ cls.schedule_time }}</p>
      <p>Capacity: {{ cls.capacity }}</p>
      <p>Duration: {{ cls.duration }} mins</p>
      <button id="enroll-class-button-{{ cls.class_id }}">Enroll</button>
    </div>
    {% endfor %}
  </div>
</div>
</body>
</html>
