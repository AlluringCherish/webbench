<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainer Profiles</title>
</head>
<body>
<div id="trainers-page">
  <input type="text" id="trainer-search" name="trainer-search" value="{{ search_query | default('') }}" placeholder="Search trainers">

  <select id="specialty-filter" name="specialty-filter">
    <option value="">All Specialties</option>
    {% for spec in specialties %}
    <option value="{{ spec }}" {% if filter_specialty == spec %}selected{% endif %}>{{ spec }}</option>
    {% endfor %}
  </select>

  <div id="trainers-grid">
    {% for trainer in trainers %}
    <div class="trainer-card" id="trainer-{{ trainer.trainer_id }}">
      <h3>{{ trainer.name }}</h3>
      <p>Specialty: {{ trainer.specialty }}</p>
      <p>Certifications: {{ trainer.certifications }}</p>
      <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="location.href='{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}'">View Profile</button>
    </div>
    {% endfor %}
  </div>
</div>
</body>
</html>
