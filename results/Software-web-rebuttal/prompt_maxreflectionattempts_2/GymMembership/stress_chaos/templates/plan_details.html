<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plan Details</title>
</head>
<body>
<div id="plan-details-page">
  <h1 id="plan-title">{{ plan.plan_name }}</h1>
  <div id="plan-price">${{ plan.price }} / {{ plan.billing_cycle }}</div>
  <div id="plan-features">{{ plan.features }}</div>
  <button id="enroll-plan-button">Enroll</button>

  <div id="plan-reviews">
    {% for review in reviews %}
    <div class="review">
      <p>{{ review.text }}</p>
      <small>By: {{ review.author }}</small>
    </div>
    {% endfor %}
    {% if reviews|length == 0 %}
    <p>No reviews available.</p>
    {% endif %}
  </div>
</div>
</body>
</html>
