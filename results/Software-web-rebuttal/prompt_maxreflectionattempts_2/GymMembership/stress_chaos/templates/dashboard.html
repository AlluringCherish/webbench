<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gym Membership Dashboard</title>
</head>
<body>
<div id="dashboard-page">
  <div id="member-welcome">{{ member_status }}</div>

  <button id="browse-membership-button" onclick="location.href='{{ url_for('memberships') }}'">Browse Memberships</button>
  <button id="view-schedule-button" onclick="location.href='{{ url_for('class_schedule') }}'">View Schedule</button>
  <button id="book-trainer-button" onclick="location.href='{{ url_for('pt_booking') }}'">Book Trainer</button>

  <div id="featured-classes">
    {% for fc in featured_classes %}
    <div class="featured-class" id="featured-class-{{ loop.index }}">
      <h3>{{ fc.class_name }}</h3>
      <p>Trainer: {{ fc.trainer_name }}</p>
      <p>Time: {{ fc.schedule_time }}</p>
    </div>
    {% endfor %}
  </div>
</div>
</body>
</html>
