<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Personal Training</title>
</head>
<body>
<div id="booking-page">
  <h1>Book Personal Training</h1>
  <form method="POST">
    <label for="select-trainer">Trainer:</label>
    <select id="select-trainer" name="select-trainer">
      {% for trainer in trainers %}
      <option value="{{ trainer.trainer_id }}">{{ trainer.name }}</option>
      {% endfor %}
    </select>

    <label for="session-date">Date:</label>
    <input type="date" id="session-date" name="session-date" required>

    <label for="session-time">Time:</label>
    <select id="session-time" name="session-time">
      <option value="06:00">06:00</option>
      <option value="09:00">09:00</option>
      <option value="12:00">12:00</option>
      <option value="15:00">15:00</option>
      <option value="18:00">18:00</option>
    </select>

    <label for="session-duration">Duration:</label>
    <select id="session-duration" name="session-duration">
      <option value="30">30 min</option>
      <option value="60">60 min</option>
      <option value="90">90 min</option>
    </select>

    <button id="confirm-booking-button" type="submit">Confirm Booking</button>
  </form>
  {% if booking_result is defined %}
  <div id="booking-result">
    <p>{{ booking_result }}</p>
  </div>
  {% endif %}
</div>
</body>
</html>
