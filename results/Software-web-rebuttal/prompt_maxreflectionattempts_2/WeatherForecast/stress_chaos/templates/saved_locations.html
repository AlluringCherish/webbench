<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saved Locations</title>
</head>
<body>
  <div id="saved-locations-page">
    <h1>Saved Locations</h1>
    <table id="locations-table" border="1">
      <thead>
        <tr>
          <th>Name</th>
          <th>Current Temperature</th>
          <th>Condition</th>
          <th>Default</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for loc in saved_locations %}
        <tr>
          <td>{{ loc.location_name }}</td>
          <td>{{ loc.current_temperature }}</td>
          <td>{{ loc.current_condition }}</td>
          <td>{% if loc.is_default %}Yes{% else %}No{% endif %}</td>
          <td>
            <button id="view-location-weather-{{ loc.location_id }}" onclick="window.location.href='{{ url_for('current_weather', location_id=loc.location_id) }}'">View Weather</button>
            <button id="remove-location-button-{{ loc.location_id }}">Remove</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button id="add-new-location-button" onclick="window.location.href='{{ url_for('location_search') }}'">Add New Location</button>
  </div>
</body>
</html>
