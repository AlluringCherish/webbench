<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Dashboard</title>
</head>
<body>
  <div id="dashboard-page">
    <h1>Weather Dashboard</h1>
    <div id="current-weather-summary">
      <h2>{{ default_location.location_name }}</h2>
      <div>Temperature: {{ default_location.temperature }}&deg;</div>
      <div>Condition: {{ default_location.condition }}</div>
      <div>Humidity: {{ default_location.humidity }}%</div>
      <div>Wind Speed: {{ default_location.wind_speed }} mph</div>
    </div>
    <div>
      <button id="search-location-button" onclick="window.location.href='{{ url_for('location_search') }}'">Search Location</button>
      <button id="view-forecast-button" onclick="window.location.href='{{ url_for('weekly_forecast') }}'">View Forecast</button>
      <button id="view-alerts-button" onclick="window.location.href='{{ url_for('weather_alerts') }}'">View Alerts</button>
    </div>
  </div>
</body>
</html>
