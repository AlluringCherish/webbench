<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Current Weather</title>
</head>
<body>
  <div id="current-weather-page">
    <h1 id="location-name">{{ location_info.location_name }}</h1>
    <div id="temperature-display">Temperature: {{ weather_data.temperature }}&deg;</div>
    <div id="weather-condition">Condition: {{ weather_data.condition }}</div>
    <div id="humidity-info">Humidity: {{ weather_data.humidity }}%</div>
    <div id="wind-speed-info">Wind Speed: {{ weather_data.wind_speed }} mph</div>
  </div>
</body>
</html>
