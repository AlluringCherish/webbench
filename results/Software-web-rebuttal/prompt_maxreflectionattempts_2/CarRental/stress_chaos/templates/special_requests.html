<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            <form method="POST" action="{{ url_for('special_requests') }}">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id" required>
                    {% for reservation in reservations %}
                    <option value="{{ reservation.reservation_id }}"
                        {% if form_data and form_data.get('reservation_id', None) == reservation.reservation_id %}selected{% endif %}>
                        Reservation {{ reservation.reservation_id }}</option>
                    {% endfor %}
                </select>

                <label for="driver-assistance-checkbox">Driver Assistance:</label>
                <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance"
                    {% if form_data and form_data.get('driver_assistance') %}checked{% endif %} />

                <label for="gps-option-checkbox">GPS Option:</label>
                <input type="checkbox" id="gps-option-checkbox" name="gps_option"
                    {% if form_data and form_data.get('gps_option') %}checked{% endif %} />

                <label for="child-seat-quantity">Child Seat Quantity:</label>
                <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0"
                    value="{% if form_data and form_data.get('child_seat_quantity') %}{{ form_data.get('child_seat_quantity') }}{% else %}0{% endif %}" />

                <label for="special-notes">Special Notes:</label>
                <textarea id="special-notes" name="special_notes">{% if form_data and form_data.get('special_notes') %}{{ form_data.get('special_notes') }}{% endif %}</textarea>

                <button type="submit" id="submit-requests-button">Submit Requests</button>
            </form>
        </div>
    </div>
</body>
</html>
