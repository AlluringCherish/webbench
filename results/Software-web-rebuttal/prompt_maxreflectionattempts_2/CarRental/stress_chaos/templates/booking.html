<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="POST" action="{{ url_for('booking') }}">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location" required>
                    {% for loc in pickup_locations %}
                    <option value="{{ loc.city }}">{{ loc.city }} - {{ loc.address }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location" required>
                    {% for loc in dropoff_locations %}
                    <option value="{{ loc.city }}">{{ loc.city }} - {{ loc.address }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input type="date" id="pickup-date" name="pickup_date" required />

                <label for="dropoff-date">Dropoff Date:</label>
                <input type="date" id="dropoff-date" name="dropoff_date" required />

                <button type="submit" id="calculate-price-button">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if calculated_price is not none %}
                <p>Total Price: ${{ "%.2f"|format(calculated_price) }}</p>
                {% endif %}
            </div>

            <button id="proceed-to-insurance-button" onclick="location.href='{{ url_for('insurance_options') }}'">Proceed to Insurance</button>
        </div>
    </div>
</body>
</html>
