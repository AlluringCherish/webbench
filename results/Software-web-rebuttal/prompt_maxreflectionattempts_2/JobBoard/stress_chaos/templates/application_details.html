<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Details</title>
</head>
<body>
<div id="application-details-page">
    <h1>Application Details</h1>
    <div id="job-title">{{ application.job_title }}</div>
    <div id="company-name">{{ application.company_name }}</div>
    <div id="applicant-name">{{ application.applicant_name }}</div>
    <div id="applicant-email">{{ application.applicant_email }}</div>
    <div id="status">{{ application.status }}</div>
    <div id="applied-date">{{ application.applied_date }}</div>
    <div id="resume-filename">{{ application.resume_filename }}</div>
    <div id="cover-letter">{{ application.cover_letter }}</div>
    <a href="{{ url_for('application_tracking') }}"><button id="back-to-applications">Back to Applications</button></a>
</div>
</body>
</html>
