<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
<div id="companies-page">
    <h1>Company Directory</h1>
    <form method="get" action="{{ url_for('companies_directory') }}">
        <input type="text" id="search-company-input" name="search" placeholder="Search companies..." value="{{ search_query or '' }}" />
        <button type="submit">Search</button>
    </form>
    <div id="companies-list">
        {% for company in companies %}
            <div class="company-card">
                <div>{{ company.company_name }}</div>
                <div>{{ company.industry }}</div>
                <div>{{ company.employee_count }} employees</div>
                <a href="{{ url_for('company_profile', company_id=company.company_id) }}"><button id="view-company-button-{{ company.company_id }}">View Profile</button></a>
            </div>
        {% else %}
            <p>No companies found.</p>
        {% endfor %}
    </div>
    <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
</div>
</body>
</html>
