<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
<div id="listings-page">
    <h1>Job Listings</h1>
    <form method="get" action="{{ url_for('job_listings') }}">
        <input type="text" id="search-input" name="search" placeholder="Search jobs..." value="{{ request.args.get('search', '') }}" />
        <select id="category-filter" name="category">
            <option value="">All Categories</option>
            {% for category in categories %}
                <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>{{ category }}</option>
            {% endfor %}
        </select>
        <select id="location-filter" name="location">
            <option value="">All Locations</option>
            {% for loc in locations %}
                <option value="{{ loc }}" {% if loc == selected_location %}selected{% endif %}>{{ loc }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="jobs-grid">
    {% for job in jobs %}
        <div class="job-card">
            <div>{{ job.title }}</div>
            <div>{{ job.company_name }}</div>
            <div>{{ job.location }}</div>
            <div>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</div>
            <a href="{{ url_for('job_details', job_id=job.job_id) }}"><button id="view-job-button-{{ job.job_id }}">View Details</button></a>
        </div>
    {% else %}
        <p>No jobs found.</p>
    {% endfor %}
    </div>
</div>
</body>
</html>
