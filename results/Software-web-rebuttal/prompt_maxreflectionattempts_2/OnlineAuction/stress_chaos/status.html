<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auction Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="status-page" role="main">
    <label for="status-filter">Filter by Status</label>
    <select id="status-filter" aria-controls="status-table">
      <option value="open">Open</option>
      <option value="closed">Closed</option>
    </select>
    <table id="status-table" aria-label="Auction Status Table">
      <!-- Status rows here -->
    </table>
    <button id="refresh-status-button" aria-label="Refresh auction status">Refresh</button>
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard" aria-label="Back to Dashboard">Back to Dashboard</a>
  </div>
</body>
</html>
