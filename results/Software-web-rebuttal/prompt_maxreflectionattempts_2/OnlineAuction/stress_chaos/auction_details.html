<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auction Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="auction-details-page" role="main">
    <h1 id="auction-title" aria-label="Auction item name">{{ auction.item_name }}</h1>
    <p id="auction-description" aria-live="polite">{{ auction.description }}</p>
    <p id="current-bid">Current Bid: {{ auction.current_bid }}</p>
    <button id="place-bid-button" aria-label="Place a bid on this auction">Place Bid</button>
    <nav aria-label="Breadcrumb">
      <a href="{{ url_for('catalog') }}" id="back-to-catalog" aria-label="Back to Auction Catalog">Back to Catalog</a>
      <a href="{{ url_for('dashboard') }}" id="back-to-dashboard" aria-label="Back to Dashboard">Back to Dashboard</a>
    </nav>
    <ul id="bid-list" aria-label="Bid History">
      {% for bid in bids %}
      <li><a href="{{ url_for('bid_detail', bid_id=bid.id) }}" aria-label="Bid {{ bid.id }} by {{ bid.bidder }}">{{ bid.bidder }}: {{ bid.amount }}</a></li>
      {% endfor %}
    </ul>
  </div>
</body>
</html>
