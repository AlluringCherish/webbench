<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Place Auction Bid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <form id="place-bid-page" method="POST" action="{{ url_for('place_bid') }}" role="form">
    <label for="bidder-name">Bidder Name</label>
    <input type="text" id="bidder-name" name="bidder-name" placeholder="Enter your name" aria-required="true" />
    <label for="bid-amount">Bid Amount</label>
    <input type="number" id="minimum-bid" name="bid-amount" min="1" placeholder="Enter bid amount" aria-required="true" />
    <button type="submit" id="place-bid-button">Place Bid</button>
    <div id="bid-error-message" role="alert" aria-live="assertive" style="color: red; display: none;"></div>
  </form>
  <a href="{{ url_for('auction_detail', auction_id=auction.id) }}" id="back-to-auction" aria-label="Back to Auction Details">Back to Auction</a>
</body>
</html>
