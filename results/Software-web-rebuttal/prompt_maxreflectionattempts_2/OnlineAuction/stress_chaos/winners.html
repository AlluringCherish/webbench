<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Winners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="winners-page" role="main">
    <label for="filter-by-winner">Filter by Winner</label>
    <select id="filter-by-winner" aria-controls="winners-list">
      <!-- Winner filter options -->
    </select>
    <ul id="winners-list">
      {% for winner in winners %}
      <li id="winner-card-{{ winner.auction_id }}" role="listitem">{{ winner.name }}</li>
      {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard" aria-label="Back to Dashboard">Back to Dashboard</a>
  </div>
</body>
</html>
