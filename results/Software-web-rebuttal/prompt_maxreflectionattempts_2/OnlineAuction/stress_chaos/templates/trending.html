<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>

        <select id="time-range-filter">
            <option value="Last 24 Hours">Last 24 Hours</option>
            <option value="This Week">This Week</option>
            <option value="All Time">All Time</option>
        </select>

        <div id="trending-list">
            {% for trending in trending_list %}
            <div class="trending-item">
                <p>Rank {{ trending.trending_rank }} - {{ trending.item_name }}</p>
                <p>Bids: {{ trending.bid_count }}</p>
                <p>Current Bid: ${{ '%.2f'|format(trending.current_bid) }}</p>
                <p>Period: {{ trending.time_period }}</p>
                <a href="{{ url_for('auction_details', auction_id=trending.auction_id) }}">
                    <button id="view-auction-button-{{ trending.auction_id }}">View Auction</button>
                </a>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
