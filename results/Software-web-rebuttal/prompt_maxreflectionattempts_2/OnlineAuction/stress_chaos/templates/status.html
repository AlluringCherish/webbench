<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>

        <select id="status-filter">
            <option value="All">All</option>
            <option value="Active">Active</option>
            <option value="Closed">Closed</option>
            <option value="Upcoming">Upcoming</option>
        </select>

        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Time Remaining</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions_status %}
                <tr>
                    <td>{{ auction.name }}</td>
                    <td>{{ auction.status }}</td>
                    <td>{{ auction.time_remaining }}</td>
                    <td>${{ '%.2f'|format(auction.current_bid) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="refresh-status-button">Refresh Status</button>
        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
