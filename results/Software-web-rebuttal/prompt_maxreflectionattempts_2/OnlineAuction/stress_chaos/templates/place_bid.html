<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid</h1>

        <div id="auction-name">{{ auction_name }}</div>
        <div id="minimum-bid">Minimum Bid: ${{ '%.2f'|format(minimum_bid) }}</div>

        <form method="POST" action="">
            <label for="bidder-name">Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" required>

            <label for="bid-amount">Bid Amount:</label>
            <input type="number" step="0.01" min="{{ minimum_bid }}" id="bid-amount" name="bid_amount" required>

            <button type="submit" id="submit-bid-button">Submit Bid</button>
        </form>
    </div>
</body>
</html>
