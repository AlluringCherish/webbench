<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trending Auctions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="trending-page" role="main">
    <label for="time-range-filter">Filter by Time Range</label>
    <select id="time-range-filter" aria-controls="trending-list">
      <option value="24h">Last 24 hours</option>
      <option value="7d">Last 7 days</option>
    </select>
    <div id="trending-list">
      {% for trending in trending_auctions %}
      <a href="{{ url_for('auction_detail', auction_id=trending.auction_id) }}" id="view-auction-button-{{ trending.auction_id }}" aria-label="View details of {{ trending.name }}">{{ trending.name }}</a>
      {% endfor %}
    </div>
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard" aria-label="Back to Dashboard">Back to Dashboard</a>
  </div>
</body>
</html>
