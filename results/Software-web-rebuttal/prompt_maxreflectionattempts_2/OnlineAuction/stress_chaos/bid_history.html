<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bid History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="bid-history-page" role="main">
    <label for="filter-by-auction">Filter by Auction:</label>
    <select id="filter-by-auction" aria-controls="bid-history-table">
      {% for auction in auctions %}
      <option value="{{ auction.id }}">{{ auction.name }}</option>
      {% endfor %}
    </select>
    <label for="sort-by-amount">Sort by Amount:</label>
    <select id="sort-by-amount" aria-controls="bid-history-table">
      <option value="asc">Amount Ascending</option>
      <option value="desc">Amount Descending</option>
    </select>
    <table id="bid-history-table" aria-label="Bid History Table">
      <thead>
        <tr><th>Bidder</th><th>Amount</th><th>Date</th></tr>
      </thead>
      <tbody>
        {% for bid in bids %}
        <tr>
          <td><a href="{{ url_for('bid_detail', bid_id=bid.id) }}">{{ bid.bidder_name }}</a></td>
          <td>{{ bid.amount }}</td>
          <td>{{ bid.date }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard" aria-label="Back to Dashboard">Back to Dashboard</a>
  </div>
</body>
</html>
