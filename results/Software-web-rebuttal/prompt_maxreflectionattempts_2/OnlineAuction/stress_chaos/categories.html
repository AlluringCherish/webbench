<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auction Categories</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="categories-page" role="main">
    {% for category in categories %}
    <div id="category-card-{{ category.category_id }}" role="region" aria-label="Category {{ category.name }}">
      <p>{{ category.name }}</p>
      <button id="view-auction-button-{{ category.category_id }}" aria-label="View auctions in {{ category.name }}">View Auction</button>
    </div>
    {% endfor %}
    <button id="back-to-dashboard" aria-label="Back to Dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
