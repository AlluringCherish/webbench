<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auction Catalog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div id="catalog-page" role="main">
    {% if auctions|length == 0 %}
    <p id="no-results" aria-live="polite">No auctions found.</p>
    {% else %}
    {% for auction in auctions %}
    <section id="auction-{{ auction.id }}" aria-labelledby="auction-name-{{ auction.id }}">
      <h2 id="auction-name-{{ auction.id }}">{{ auction.name }}</h2>
      <a href="{{ url_for('auction_detail', auction_id=auction.id) }}" id="view-auction-button-{{ auction.id }}" aria-label="View details of {{ auction.name }}">View Auction</a>
    </section>
    {% endfor %}
    {% endif %}
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard" aria-label="Back to Dashboard">Back to Dashboard</a>
  </div>
</body>
</html>
