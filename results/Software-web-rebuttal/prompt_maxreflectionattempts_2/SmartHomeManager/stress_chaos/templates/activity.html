<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <div id="activity-page">
        <h1>Activity Logs</h1>

        <form method="GET" action="">
            <input id="search-activity" name="search" type="text" placeholder="Search activity..." />
            <button id="apply-search-button" type="submit">Apply Search</button>
        </form>

        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device ID</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for activity in activities %}
                <tr>
                    <td>{{ activity.timestamp }}</td>
                    <td>{{ activity.device_id }}</td>
                    <td>{{ activity.action }}</td>
                    <td>{{ activity.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
