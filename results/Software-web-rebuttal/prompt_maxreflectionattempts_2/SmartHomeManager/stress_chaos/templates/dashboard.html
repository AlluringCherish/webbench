<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Smart Home Dashboard</h1>

        <div id="device-summary">
            <p>Total Devices: {{ device_counts.total }}</p>
            <p>Active Devices: {{ device_counts.active }}</p>
            <p>Offline Devices: {{ device_counts.offline }}</p>
        </div>

        <button id="device-list-button" onclick="location.href='{{ url_for('list_devices') }}'">Device List</button>
        <button id="add-device-button" onclick="location.href='{{ url_for('add_device') }}'">Add Device</button>
        <button id="automation-button" onclick="location.href='{{ url_for('automation_page') }}'">Automation Rules</button>
        <button id="energy-button" onclick="location.href='{{ url_for('reports_page') }}'">Energy Report</button>
        <button id="activity-button" onclick="location.href='{{ url_for('activity_page') }}'">Activity Logs</button>

        <div id="room-list">
            <h2>Rooms</h2>
            <ul>
                {% for room in rooms %}
                <li>{{ room }}</li>
                {% endfor %}
            </ul>
        </div>

    </div>
</body>
</html>
