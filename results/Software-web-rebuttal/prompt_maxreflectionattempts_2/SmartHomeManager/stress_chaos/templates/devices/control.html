<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>

        <h2 id="device-name-display">{{ device.device_name }}</h2>
        <div id="device-status-display">Status: {{ device.status }}</div>

        <form method="POST" action="">
            <!-- Assuming power toggle as button which toggles power state via form submit -->
            <button id="power-toggle" type="submit" name="toggle_power" value="toggle">Toggle Power</button>
            <br />
            <button id="save-settings-button" type="submit" name="save_settings" value="save">Save Settings</button>
        </form>

        <button id="back-to-devices" onclick="location.href='{{ url_for('list_devices') }}'">Back to Devices</button>
    </div>
</body>
</html>
