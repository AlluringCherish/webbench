<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
<div id="agents-page">

    <h1>Real Estate Agents</h1>

    <form id="agent-search" method="GET" action="{{ url_for('agent_directory') }}">
        <input type="text" name="search" placeholder="Search agents...">
        <button type="submit">Search</button>
    </form>

    <ul id="agents-list">
        {% for agent in agents %}
        <li id="agent-{{ agent.agent_id }}">
            <strong>{{ agent.agent_name }}</strong><br>
            Specialization: {{ agent.specialization }}<br>
            Email: <a href="mailto:{{ agent.email }}">{{ agent.email }}</a><br>
            Phone: {{ agent.phone }}<br>
            <a id="contact-agent-button-{{ agent.agent_id }}" href="mailto:{{ agent.email }}">Contact</a>
        </li>
        {% endfor %}
    </ul>

    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>

</div>
</body>
</html>
