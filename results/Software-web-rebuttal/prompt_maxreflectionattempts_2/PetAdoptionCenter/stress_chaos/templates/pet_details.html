<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pet Details</title>
</head>
<body>
  <div id="pet-details-page">
    <h1 id="pet-name">{{ pet.name }}</h1>
    <div id="pet-species">Species: {{ pet.species }}</div>
    <div id="pet-breed">Breed: {{ pet.breed }}</div>
    <div id="pet-age">Age: {{ pet.age }}</div>
    <div id="pet-gender">Gender: {{ pet.gender }}</div>
    <div id="pet-size">Size: {{ pet.size }}</div>
    <div id="pet-description">{{ pet.description }}</div>

    <button id="adopt-button" onclick="location.href='{{ url_for('adoption_application', pet_id=pet.pet_id) }}'">Adopt</button>
    <button id="back-to-listings" onclick="location.href='{{ url_for('pet_listings') }}'">Back to Listings</button>
  </div>
</body>
</html>
