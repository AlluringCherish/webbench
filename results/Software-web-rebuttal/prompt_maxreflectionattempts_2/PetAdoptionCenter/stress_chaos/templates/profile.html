<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
</head>
<body>
  <div id="profile-page">
    <h1>My Profile</h1>

    <div id="profile-username">Username: {{ user_profile.username }}</div>

    <form method="post" action="{{ url_for('update_profile') }}">
      <label for="profile-email">Email:</label>
      <input type="email" id="profile-email" name="email" value="{{ user_profile.email }}" required />

      <p>Phone: {{ user_profile.phone }}</p>
      <p>Address: {{ user_profile.address }}</p>

      <button type="submit" id="update-profile-button">Update Profile</button>
      <button type="button" id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
  </div>
</body>
</html>
