<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add New Pet</title>
</head>
<body>
  <div id="add-pet-page">
    <h1>Add New Pet</h1>
    <form method="post" action="{{ url_for('add_pet_submit') }}">
      <label for="pet-name-input">Name:</label>
      <input type="text" id="pet-name-input" name="pet_name" required />

      <label for="pet-species-input">Species:</label>
      <select id="pet-species-input" name="pet_species" required>
        <option value="Dog">Dog</option>
        <option value="Cat">Cat</option>
        <option value="Bird">Bird</option>
        <option value="Rabbit">Rabbit</option>
        <option value="Other">Other</option>
      </select>

      <label for="pet-breed-input">Breed:</label>
      <input type="text" id="pet-breed-input" name="pet_breed" required />

      <label for="pet-age-input">Age:</label>
      <input type="text" id="pet-age-input" name="pet_age" placeholder="e.g., 2 years" required />

      <label for="pet-gender-input">Gender:</label>
      <select id="pet-gender-input" name="pet_gender" required>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>

      <label for="pet-size-input">Size:</label>
      <select id="pet-size-input" name="pet_size" required>
        <option value="Small">Small</option>
        <option value="Medium">Medium</option>
        <option value="Large">Large</option>
      </select>

      <label for="pet-description-input">Description:</label>
      <textarea id="pet-description-input" name="pet_description" rows="4" required></textarea>

      <button type="submit" id="submit-pet-button">Add Pet</button>
      <button type="button" id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
  </div>
</body>
</html>
