<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
</head>
<body>
  <div id="messages-page">
    <h1>Messages</h1>

    <div id="conversation-list">
      {% for conversation in conversations %}
      <div class="conversation-item" id="conversation-{{ conversation.conversation_id }}">
        <p><strong>{{ conversation.participant_username }}</strong></p>
        <p>{{ conversation.last_message_summary }}</p>
        <p>Unread: {{ conversation.unread_count }}</p>
      </div>
      {% endfor %}
    </div>

    <form method="post" action="{{ url_for('send_message') }}">
      <label for="recipient-username">Recipient Username:</label>
      <input type="text" id="recipient-username" name="recipient_username" required />

      <label for="subject">Subject:</label>
      <input type="text" id="subject" name="subject" required />

      <label for="message-input">Message:</label>
      <textarea id="message-input" name="content" rows="4" required></textarea>

      <button type="submit" id="send-message-button">Send Message</button>
    </form>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
