<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Favorites</title>
</head>
<body>
  <div id="favorites-page">
    <h1>My Favorites</h1>

    <div id="favorites-grid">
      {% for pet in favorites %}
      <div class="favorite-pet" id="pet-{{ pet.pet_id }}">
        <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}" id="pet-name-{{ pet.pet_id }}">{{ pet.name }}</a>
        <p id="pet-species-{{ pet.pet_id }}">Species: {{ pet.species }}</p>
        <p id="pet-breed-{{ pet.pet_id }}">Breed: {{ pet.breed }}</p>
        <p id="pet-age-{{ pet.pet_id }}">Age: {{ pet.age }}</p>
        <p id="pet-gender-{{ pet.pet_id }}">Gender: {{ pet.gender }}</p>
        <p id="pet-size-{{ pet.pet_id }}">Size: {{ pet.size }}</p>
        <p id="pet-description-{{ pet.pet_id }}">Description: {{ pet.description }}</p>
      </div>
      {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
