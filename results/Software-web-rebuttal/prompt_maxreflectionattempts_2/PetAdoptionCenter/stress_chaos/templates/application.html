<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adoption Application</title>
</head>
<body>
  <div id="application-page">
    <h1>Adoption Application</h1>
    <div id="pet-info">
      <h2 id="pet-name">{{ pet.name }}</h2>
      <p id="pet-species">Species: {{ pet.species }}</p>
      <p id="pet-breed">Breed: {{ pet.breed }}</p>
      <p id="pet-age">Age: {{ pet.age }}</p>
      <p id="pet-gender">Gender: {{ pet.gender }}</p>
      <p id="pet-size">Size: {{ pet.size }}</p>
      <p id="pet-description">{{ pet.description }}</p>
    </div>

    <form method="post" action="{{ url_for('submit_application', pet_id=pet.pet_id) }}">
      <label for="applicant-name">Name:</label>
      <input type="text" id="applicant-name" name="applicant_name" required />

      <label for="applicant-phone">Phone:</label>
      <input type="text" id="applicant-phone" name="applicant_phone" required />

      <label for="housing-type">Housing Type:</label>
      <select id="housing-type" name="housing_type" required>
        <option value="House">House</option>
        <option value="Apartment">Apartment</option>
        <option value="Condo">Condo</option>
        <option value="Other">Other</option>
      </select>

      <label for="reason">Reason for Adoption:</label>
      <textarea id="reason" name="reason" rows="4" required></textarea>

      <button type="submit" id="submit-application-button">Submit Application</button>
      <button type="button" id="back-to-pet" onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet Details</button>
    </form>
  </div>
</body>
</html>
