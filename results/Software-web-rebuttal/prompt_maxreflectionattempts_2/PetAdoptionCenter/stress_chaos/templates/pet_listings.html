<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Available Pets</title>
</head>
<body>
  <div id="pet-listings-page">
    <h1>Available Pets</h1>

    <input id="search-input" type="text" name="search_name" value="{{ search_name }}" placeholder="Search pets by name" />

    <select id="filter-species" name="filter_species">
      <option value="All" {% if filter_species == 'All' %}selected{% endif %}>All</option>
      <option value="Dog" {% if filter_species == 'Dog' %}selected{% endif %}>Dog</option>
      <option value="Cat" {% if filter_species == 'Cat' %}selected{% endif %}>Cat</option>
      <option value="Bird" {% if filter_species == 'Bird' %}selected{% endif %}>Bird</option>
      <option value="Rabbit" {% if filter_species == 'Rabbit' %}selected{% endif %}>Rabbit</option>
      <option value="Other" {% if filter_species == 'Other' %}selected{% endif %}>Other</option>
    </select>

    <div id="pet-grid">
      {% for pet in pets %}
      <div class="pet-card" id="pet-{{ pet.pet_id }}">
        <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}" id="pet-name-{{ pet.pet_id }}">{{ pet.name }}</a>
        <p id="pet-species-{{ pet.pet_id }}">Species: {{ pet.species }}</p>
        <p id="pet-breed-{{ pet.pet_id }}">Breed: {{ pet.breed }}</p>
        <p id="pet-age-{{ pet.pet_id }}">Age: {{ pet.age }}</p>
        <p id="pet-gender-{{ pet.pet_id }}">Gender: {{ pet.gender }}</p>
        <p id="pet-size-{{ pet.pet_id }}">Size: {{ pet.size }}</p>
        <p id="pet-description-{{ pet.pet_id }}">Description: {{ pet.description }}</p>
      </div>
      {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
