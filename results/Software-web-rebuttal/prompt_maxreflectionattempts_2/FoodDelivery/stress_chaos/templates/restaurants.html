<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurants</title>
</head>
<body>
    <div id="main-container">
        <div id="restaurants-page">
            <h1>Browse Restaurants</h1>
            <input type="text" id="search-input" name="search" placeholder="Search restaurants..." value="{% if filter_type %}{{ filter_type }}{% endif %}">

            <select id="cuisine-filter" name="cuisine">
                <option value="">All Cuisines</option>
                {% set cuisines = restaurant_list|map(attribute='cuisine')|unique|list|sort %}
                {% for cuisine in cuisines %}
                <option value="{{ cuisine }}" {% if cuisine == filter_type %}selected{% endif %}>{{ cuisine }}</option>
                {% endfor %}
            </select>

            <div id="restaurants-grid">
                {% for restaurant in restaurant_list %}
                <div class="restaurant-card">
                    <h2>{{ restaurant.name }}</h2>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                    <a href="{{ url_for('restaurant_menu_page', restaurant_id=restaurant.restaurant_id) }}">
                        <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
