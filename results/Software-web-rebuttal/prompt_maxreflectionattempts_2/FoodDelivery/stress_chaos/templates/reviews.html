<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>

            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating">
                <option value="">All Ratings</option>
                {% for rating_value in range(1, 6) %}
                <option value="{{ rating_value }}">{{ rating_value }}</option>
                {% endfor %}
            </select>

            <div id="reviews-list">
                {% for review in reviews_list %}
                <div class="review">
                    <p><strong>{{ review.customer_name }}</strong> rated {{ review.rating }}/5</p>
                    <p>{{ review.review_text }}</p>
                    <p><em>{{ review.review_date }}</em></p>
                </div>
                {% else %}
                <p>No reviews yet.</p>
                {% endfor %}
            </div>

            <button id="write-review-button">Write Review</button>

            <a href="{{ url_for('dashboard_page') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
