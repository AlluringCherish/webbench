<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - ContentPublishingHub</title>
</head>
<body>
    <h1>Version History</h1>
    <nav id="version-history-navigation">
        <button onclick="location.href='{{ url_for('edit_article', article_id=article_id) }}'" id="back-to-edit-button">Back to Edit Article</button>
        <button onclick="location.href='{{ url_for('my_articles') }}'" id="back-to-my-articles-button">Back to My Articles</button>
    </nav>
    <section id="versions-list">
        <table cellspacing="0" border="1">
            <thead>
                <tr>
                    <th>Version Number</th>
                    <th>Change Summary</th>
                    <th>Created Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for version in versions %}
                <tr>
                    <td>{{ version.version_number }}</td>
                    <td>{{ version.change_summary }}</td>
                    <td>{{ version.created_date }}</td>
                    <td>
                        <button onclick="location.href='{{ url_for('view_version_comparison', article_id=article_id, version_id=version.version_id) }}'">Compare</button>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4">No versions found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </section>
</body>
</html>
