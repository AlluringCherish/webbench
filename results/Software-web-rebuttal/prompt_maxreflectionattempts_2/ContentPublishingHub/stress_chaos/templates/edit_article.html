<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <h1>Edit Article</h1>
    <form method="post" id="edit-article-form" action="{{ url_for('edit_article', article_id=article.article_id) }}">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" value="{{ article.title }}" required><br><br>

        <label for="category">Category:</label><br>
        <input type="text" id="category" name="category" value="{{ article.category }}" required><br><br>

        <label for="content">Content:</label><br>
        <textarea id="content" name="content" rows="10" cols="50" required>{{ content }}</textarea><br><br>

        <button type="submit" id="save-changes">Save Changes</button>
        <button type="button" id="cancel-edit-article" onclick="location.href='{{ url_for('my_articles') }}'">Cancel</button>
    </form>
    {% if errors %}
    <ul id="validation-errors">
        {% for err in errors %}
            <li>{{ err }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</body>
</html>
