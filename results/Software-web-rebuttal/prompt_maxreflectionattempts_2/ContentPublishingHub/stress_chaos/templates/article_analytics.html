<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <h1>Analytics for Article: {{ article.title }}</h1>
    <nav id="analytics-navigation">
        <button onclick="location.href='{{ url_for('edit_article', article_id=article.id) }}'">Back to Edit Article</button>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </nav>
    <section id="analytics-results">
        <ul>
            {% for stat_name, stat_value in analytics_summary.items() %}
                <li><strong>{{ stat_name }}:</strong> {{ stat_value }}</li>
            {% else %}
                <li>No analytics data available.</li>
            {% endfor %}
        </ul>
    </section>
</body>
</html>
