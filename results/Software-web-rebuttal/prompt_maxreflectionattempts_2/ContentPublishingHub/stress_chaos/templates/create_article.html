<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <h1>Create Article</h1>
    <form method="post" id="create-article-form" action="{{ url_for('create_article') }}">
        <label for="title">Title:</label><br>
        <input type="text" id="title" name="title" value="{{ request.form.title or '' }}" required><br><br>

        <label for="category">Category:</label><br>
        <input type="text" id="category" name="category" value="{{ request.form.category or '' }}" required><br><br>

        <label for="content">Content:</label><br>
        <textarea id="content" name="content" rows="10" cols="50" required>{{ request.form.content or '' }}</textarea><br><br>

        <button type="submit" id="submit-article">Submit</button>
        <button type="button" id="cancel-create-article" onclick="location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
    {% if validation_errors %}
    <ul id="validation-errors">
        {% for err in validation_errors %}
            <li>{{ err }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</body>
</html>
