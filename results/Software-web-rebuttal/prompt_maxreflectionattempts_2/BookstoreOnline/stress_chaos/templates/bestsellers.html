<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
    <h1>Bestsellers</h1>
    <div id="bestsellers-page">
        <div id="bestsellers-list">
            {% for book in bestsellers %}
            <div class="book-card">
                <h2>{{ book.title }}</h2>
                <p>Author: {{ book.author }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
