<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <h1>Customer Reviews</h1>
    <div id="reviews-page">
        <select id="filter-by-rating" onchange="location = '?rating=' + this.value;">
            <option value="">All Ratings</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}" {% if rating_filter|int == i %}selected{% endif %}>{{ i }} stars and up</option>
            {% endfor %}
        </select>
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review">
                <h3>{{ review.book_title }}</h3>
                <p>Rating: {{ review.rating }}</p>
                <p>{{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review_page') }}'">Write Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
