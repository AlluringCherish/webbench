<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <h1>Write a Review</h1>
    <div id="write-review-page">
        <form method="post" action="{{ url_for('write_review_page') }}">
            <label for="select-book">Select Book:</label>
            <select id="select-book" name="book_id">
                {% for book in purchased_books %}
                <option value="{{ book.book_id }}">{{ book.title }}</option>
                {% endfor %}
            </select>

            <label for="rating-select">Rating:</label>
            <select id="rating-select" name="rating">
                {% for i in range(1,6) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>

            <label for="review-text">Review Text:</label>
            <textarea id="review-text" name="review_text" required></textarea>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
    </div>
</body>
</html>
