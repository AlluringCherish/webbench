<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <h1>Book Catalog</h1>
    <div id="catalog-page">
        <form id="filter-form" action="{{ url_for('catalog_page') }}" method="get">
            <input type="text" id="search-input" name="search" placeholder="Search books..." value="{{ search_query|default('') }}">
            <select id="category-filter" name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category.category_id }}" {% if category.category_id == selected_category %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="filter-button">Filter</button>
        </form>

        <div id="books-grid">
            {% for book in books %}
            <div class="book-card">
                <h2>{{ book.title }}</h2>
                <p>Author: {{ book.author }}</p>
                <p>Price: ${{ book.price }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
