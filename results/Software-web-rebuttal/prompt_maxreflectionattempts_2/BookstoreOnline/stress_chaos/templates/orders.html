<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
    <h1>Order History</h1>
    <div id="orders-page">
        <form method="get" action="{{ url_for('order_history') }}">
            <label for="order-status-filter">Filter by Status:</label>
            <select id="order-status-filter" name="status_filter" onchange="this.form.submit()">
                <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
                <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Shipped" {% if status_filter == 'Shipped' %}selected{% endif %}>Shipped</option>
                <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
            </select>
        </form>
        <table id="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Order Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Shipping Address</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                <tr>
                    <td>{{ order.order_id }}</td>
                    <td>{{ order.customer_name }}</td>
                    <td>{{ order.order_date }}</td>
                    <td>{{ order.total_amount }}</td>
                    <td>{{ order.status }}</td>
                    <td>{{ order.shipping_address }}</td>
                    <td><button id="view-order-button-{{ order.order_id }}" onclick="window.location.href='{{ url_for('order_details', order_id=order.order_id) }}'">View Details</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
