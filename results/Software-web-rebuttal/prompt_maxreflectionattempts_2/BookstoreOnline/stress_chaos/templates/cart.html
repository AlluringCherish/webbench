<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <h1>Shopping Cart</h1>
    <div id="cart-page">
        <form method="post" action="{{ url_for('shopping_cart') }}">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td><input type="number" id="update-quantity-{{ item.cart_id }}" name="update-quantity-{{ item.cart_id }}" value="{{ item.quantity }}" min="1"></td>
                        <td>{{ item.price }}</td>
                        <td>{{ item.subtotal }}</td>
                        <td><button type="submit" id="remove-item-button-{{ item.cart_id }}" name="remove-item-button-{{ item.cart_id }}">Remove</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>
        <div id="total-amount">Total Amount: ${{ total_amount }}</div>
        <button id="proceed-checkout-button" onclick="window.location.href='{{ url_for('checkout_page') }}'">Proceed to Checkout</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
