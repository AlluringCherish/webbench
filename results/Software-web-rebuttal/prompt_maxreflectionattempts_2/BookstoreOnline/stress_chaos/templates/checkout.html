<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <h1>Checkout</h1>
    <div id="checkout-page">
        <form method="post" action="{{ url_for('checkout_page') }}">
            <label for="customer-name">Customer Name:</label>
            <input type="text" id="customer-name" name="customer_name" required>

            <label for="shipping-address">Shipping Address:</label>
            <textarea id="shipping-address" name="shipping_address" required></textarea>

            <label for="payment-method">Payment Method:</label>
            <select id="payment-method" name="payment_method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>

            <button type="submit" id="place-order-button">Place Order</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
