<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="ticket-booking-page">
        <h1>{{ page_title }}</h1>
        <form method="POST" action="{{ url_for('ticket_booking') }}">
            <label for="select-event-dropdown">Select Event:</label>
            <select id="select-event-dropdown" name="selected_event">
                {% for event in events %}
                    <option value="{{ event.event_id }}">{{ event.event_name }}</option>
                {% endfor %}
            </select>

            <label for="ticket-quantity-input">Quantity:</label>
            <input type="number" id="ticket-quantity-input" name="ticket_quantity" min="1" value="1" required />

            <label for="ticket-type-select">Ticket Type:</label>
            <select id="ticket-type-select" name="ticket_type">
                {% for type in ticket_types %}
                    <option value="{{ type }}">{{ type }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="book-now-button">Book Now</button>
        </form>

        <div id="booking-confirmation">
            {% if confirmation_message %}
                <p>{{ confirmation_message }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
