<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="venues-page">
        <h1>{{ page_title }}</h1>

        <form method="GET" action="{{ url_for('venues') }}">
            <input type="text" id="venue-search-input" name="search_query" placeholder="Search venues..." value="{{ search_query }}" />

            <select id="venue-capacity-filter" name="selected_capacity_filter">
                <option value="">All Sizes</option>
                <option value="Small" {% if selected_capacity_filter == 'Small' %}selected{% endif %}>Small</option>
                <option value="Medium" {% if selected_capacity_filter == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Large" {% if selected_capacity_filter == 'Large' %}selected{% endif %}>Large</option>
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="venues-grid">
            {% for venue in venues %}
                <div class="venue-card">
                    <h3>{{ venue.venue_name }}</h3>
                    <p>Location: {{ venue.location }}</p>
                    <p>Capacity: {{ venue.capacity }}</p>
                    <p>Amenities: {{ venue.amenities }}</p>
                    <p>Contact: {{ venue.contact }}</p>
                    <button id="view-venue-details-{{ venue.venue_id }}" onclick="location.href='{{ url_for('venue_details', venue_id=venue.venue_id) }}'">View Details</button>
                </div>
            {% else %}
                <p>No venues found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
