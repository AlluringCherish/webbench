<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="schedules-page">
        <h1>{{ page_title }}</h1>

        <form method="GET" action="{{ url_for('event_schedules') }}">
            <label for="schedule-filter-date">Filter by Date:</label>
            <input type="date" id="schedule-filter-date" name="filter_date" value="{{ filter_date if filter_date }}" />

            <label for="schedule-filter-event">Filter by Event:</label>
            <select id="schedule-filter-event" name="filter_event_id">
                <option value="">All Events</option>
                {% for ev in schedules|map(attribute='event_id')|unique %}
                    <option value="{{ ev }}" {% if filter_event_id == ev %}selected{% endif %}>Event {{ ev }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <button id="export-schedule-button">Export Schedule</button>

        <div id="schedules-timeline">
            {% for schedule in schedules %}
                <div class="schedule-entry">
                    <h3>{{ schedule.session_title }}</h3>
                    <p>Time: {{ schedule.session_time }}</p>
                    <p>Duration: {{ schedule.duration_minutes }} minutes</p>
                    <p>Speaker: {{ schedule.speaker }}</p>
                    <p>Venue ID: {{ schedule.venue_id }}</p>
                </div>
            {% else %}
                <p>No schedules found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
