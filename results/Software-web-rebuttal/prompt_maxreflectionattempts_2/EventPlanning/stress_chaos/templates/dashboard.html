<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>{{ page_title }}</h1>

        <div id="featured-events">
            {% for event in featured_events %}
                <div class="featured-event">
                    <h3>{{ event.event_name }}</h3>
                    <p>Category: {{ event.category }}</p>
                    <p>Date: {{ event.date }}</p>
                    <p>Location: {{ event.location }}</p>
                </div>
            {% else %}
                <p>No featured events available.</p>
            {% endfor %}
        </div>

        <button id="browse-events-button" onclick="location.href='{{ url_for('events') }}'">Browse Events</button>
        <button id="view-tickets-button" onclick="location.href='{{ url_for('tickets') }}'">View Tickets</button>
        <button id="venues-button" onclick="location.href='{{ url_for('venues') }}'">Venues</button>
    </div>
</body>
</html>
