<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Courses Catalog</title>
</head>
<body>
<div id="course-catalog-page" class="container">
<form id="search-form" action="{{ url_for('course_catalog') }}" method="POST">
<input id="search-query" type="text" name="query" placeholder="Search courses" value="{{ query|default('') }}" />
<button id="search-button" type="submit">Search</button>
</form>
<div id="course-grid">
<ul>
{% for course in courses %}
<li id="course-{{ course.course_id }}">
<span>{{ course.title }}</span> - <span>{{ course.category }}</span> - <span>{{ course.level }}</span>
<button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
</li>
{% endfor %}
</ul>
</div>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
