<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Assignments</title>
</head>
<body>
<div id="assignments-page">
<h1>My Assignments</h1>
<table id="assignments-table">
<thead>
<tr>
<th>Title</th>
<th>Description</th>
<th>Due Date</th>
<th>Max Points</th>
<th>Action</th>
</tr>
</thead>
<tbody>
{% for assignment in assignments %}
<tr id="assignment-{{ assignment.assignment_id }}">
<td>{{ assignment.title }}</td>
<td>{{ assignment.description }}</td>
<td>{{ assignment.due_date }}</td>
<td>{{ assignment.max_points }}</td>
<td>
<form method="GET" action="{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}">
<button id="submit-assignment-button-{{ assignment.assignment_id }}" type="submit">Submit</button>
</form>
</td>
</tr>
{% endfor %}
</tbody>
</table>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
