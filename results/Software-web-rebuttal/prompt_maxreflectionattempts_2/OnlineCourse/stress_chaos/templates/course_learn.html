<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Learning</title>
</head>
<body>
<div id="learning-page" class="container">
<h1>Learning - {{ course.title }}</h1>
<div id="lessons-list">
<ul>
{% for lesson in lessons %}
<li id="lesson-{{ lesson.lesson_id }}" class="lesson-title">
{{ lesson.title }}
</li>
{% endfor %}
</ul>
</div>
<div id="lesson-content">
{% for lesson in lessons %}
<div id="lesson-content-{{ lesson.lesson_id }}" class="lesson-content" style="display:none;">
{{ lesson.content | safe }}
</div>
{% endfor %}
</div>
<form id="mark-complete-form" method="POST" action="{{ url_for('mark_lesson_complete', course_id=course.course_id) }}">
<input type="hidden" name="lesson_id" id="lesson-id-input" value="" />
<button id="mark-lesson-complete-button" type="submit">Mark Lesson Complete</button>
</form>
<button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
</div>
</body>
</html>
