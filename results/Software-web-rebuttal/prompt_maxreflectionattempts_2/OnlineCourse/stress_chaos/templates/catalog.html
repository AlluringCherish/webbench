<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Available Courses</title>
</head>
<body>
<div id="catalog-page">
<h1>Available Courses</h1>
<form method="POST" action="{{ url_for('course_catalog_search') }}">
<input id="search-input" name="query" type="text" placeholder="Search courses..." value="{{ request.form.query if request.form.query else '' }}" />
<button type="submit">Search</button>
</form>
<div id="course-grid">
<ul>
{% for course in courses %}
<li id="course-{{ course.course_id }}">
<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>
<p>Category: {{ course.category }} | Level: {{ course.level }} | Duration: {{ course.duration }}</p>
<button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
</li>
{% endfor %}
</ul>
</div>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
