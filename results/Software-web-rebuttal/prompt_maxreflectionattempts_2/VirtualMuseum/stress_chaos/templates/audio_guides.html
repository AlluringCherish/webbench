<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <h1 id="audio-guides-page">Audio Guides</h1>
        <form method="POST" action="{{ url_for('audio_guides') }}">
            <label for="filter-language">Filter by Language:</label>
            <select id="filter-language" name="selected_language">
                <option value="">-- All --</option>
                {% for lang in languages %}
                    <option value="{{ lang }}" {% if lang == selected_language %}selected{% endif %}>{{ lang }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="apply-language-filter">Apply Filter</button>
        </form>
        <table id="audio-guide-list" border="1">
            <thead>
                <tr>
                    <th>Exhibit Number</th>
                    <th>Title</th>
                    <th>Language</th>
                    <th>Duration (min)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for guide in audio_guides %}
                <tr>
                    <td>{{ guide.exhibit_number }}</td>
                    <td>{{ guide.title }}</td>
                    <td>{{ guide.language }}</td>
                    <td>{{ guide.duration }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('audio_guides') }}" style="display:inline;">
                            <input type="hidden" name="guide_id" value="{{ guide.guide_id }}">
                            <button type="submit" id="play-guide-button-{{ guide.guide_id }}">Play</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
