<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        {% if waitlist_position is none %}
        <form method="POST" action="{{ url_for('waitlist_page') }}">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="party_size">
                {% for i in range(1, 11) %}
                    <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
            <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        </form>
        {% else %}
        <p>You are on the waitlist.</p>
        <p>Your current position: {{ waitlist_position }}</p>
        {% endif %}
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
