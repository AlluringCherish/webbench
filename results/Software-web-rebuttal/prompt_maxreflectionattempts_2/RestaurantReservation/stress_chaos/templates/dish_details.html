<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dish Details</title>
</head>
<body>
    <div id="dish-details-page">
        <h1 id="dish-name">{{ dish.name }}</h1>
        <div id="dish-price">${{ '%.2f' % dish.price }}</div>
        <p id="dish-description">{{ dish.description }}</p>
        <button id="back-to-menu" onclick="window.location.href='{{ url_for('menu_page') }}'">Back to Menu</button>
    </div>
</body>
</html>
