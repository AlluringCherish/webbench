<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div id="profile-username">{{ user_profile.username }}</div>
        <form method="POST" action="{{ url_for('profile') }}">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="email" type="text" value="{{ user_profile.email }}">

            <label for="profile-phone">Phone:</label>
            <input id="profile-phone" name="phone" type="text" value="{{ user_profile.phone }}">

            <button id="update-profile-button" type="submit">Save</button>
            <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
