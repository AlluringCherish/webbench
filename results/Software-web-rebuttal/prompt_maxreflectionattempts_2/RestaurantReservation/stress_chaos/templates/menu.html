<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <div id="menu-grid">
            {% for dish in menus %}
            <div class="dish-card" id="dish-{{ dish.dish_id }}">
                <p>{{ dish.name }}</p>
                <p>{{ dish.category }}</p>
                <p>${{ '%.2f' % dish.price }}</p>
                <button id="view-dish-button-{{ dish.dish_id }}" onclick="window.location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
