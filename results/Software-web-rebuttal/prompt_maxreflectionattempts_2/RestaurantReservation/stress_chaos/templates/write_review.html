<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id" required>
                {% for dish in menus %}
                    <option value="{{ dish.dish_id }}" {% if request.method == 'POST' and request.form.dish_id == dish.dish_id|string %}selected{% endif %}>{{ dish.name }}</option>
                {% endfor %}
            </select>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                {% for i in range(1, 6) %}
                    <option value="{{ i }}" {% if request.method == 'POST' and request.form.rating == i|string %}selected{% endif %}>{{ i }}</option>
                {% endfor %}
            </select>

            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" required>{{ request.form.review_text if request.method == 'POST' else '' }}</textarea>

            {% if errors %}
            <div id="errors">
                {% for field, message in errors.items() %}
                    <p>{{ field }}: {{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <button id="submit-review-button" type="submit">Submit</button>
            <button id="back-to-reviews" type="button" onclick="window.location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
        </form>
    </div>
</body>
</html>
