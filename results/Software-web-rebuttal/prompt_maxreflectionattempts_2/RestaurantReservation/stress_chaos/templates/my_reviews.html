<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            <table>
                <thead>
                    <tr>
                        <th>Review ID</th>
                        <th>Dish Name</th>
                        <th>Rating</th>
                        <th>Review Text</th>
                    </tr>
                </thead>
                <tbody>
                    {% for review in reviews %}
                    <tr>
                        <td>{{ review.review_id }}</td>
                        <td>{{ review.dish_name }}</td>
                        <td>{{ review.rating }}</td>
                        <td>{{ review.review_text }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <button id="write-new-review-button" onclick="window.location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
