<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>

    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-card">
            <h3>{{ playlist.title }}</h3>
            <p>{{ playlist.description }}</p>
            <p>Created on: {{ playlist.creation_date }}</p>
            <p>Total Songs: {{ playlist.total_songs }}</p>
            <a href="{{ url_for('playlist_details_page', playlist_id=playlist.playlist_id) }}">
                <button id="view-playlist-button-{{ playlist.playlist_id }}">View Playlist</button>
            </a>
        </div>
        {% endfor %}
    </div>

    <button id="create-playlist-button" onclick="location.href='{{ url_for('create_playlist_page') }}'">Create Playlist</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
