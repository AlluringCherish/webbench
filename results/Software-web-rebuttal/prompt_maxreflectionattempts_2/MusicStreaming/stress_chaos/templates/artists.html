<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>

    <form method="POST" action="{{ url_for('artists_search') }}">
        <input type="text" id="search-artists" name="search_query" placeholder="Search artists..." />
        <select id="artists-sort" name="sort_option">
            <option value="">Sort By</option>
            <option value="name">Name</option>
            <option value="formation_year">Formation Year</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-card">
            <h3>{{ artist.name }}</h3>
            <p>Genre: {{ artist.genre }}</p>
            <p>Country: {{ artist.country }}</p>
            <p>Formation Year: {{ artist.formation_year }}</p>
            <a href="{{ url_for('artist_profile_page', artist_id=artist.artist_id) }}">
                <button id="view-artist-button-{{ artist.artist_id }}">View Artist</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
