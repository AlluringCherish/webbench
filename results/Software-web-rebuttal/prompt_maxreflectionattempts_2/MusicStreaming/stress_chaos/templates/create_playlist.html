<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
<div id="create-playlist-page">
    <h1>Create New Playlist</h1>

    <form method="POST" action="{{ url_for('create_playlist_submit') }}">
        <label for="playlist-name-input">Playlist Name:</label><br>
        <input type="text" id="playlist-name-input" name="title" required><br><br>
        <label for="playlist-description-input">Description:</label><br>
        <textarea id="playlist-description-input" name="description"></textarea><br><br>
        <button type="submit" id="save-playlist-button">Save Playlist</button>
        <button type="button" id="cancel-create-button" onclick="location.href='{{ url_for('playlists_page') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
