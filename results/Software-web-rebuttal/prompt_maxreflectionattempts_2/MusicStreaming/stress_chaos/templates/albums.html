<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>

    <form method="POST" action="{{ url_for('albums_search') }}">
        <input type="text" id="search-albums" name="search_query" placeholder="Search albums..." />
        <select id="sort-albums" name="sort_option">
            <option value="">Sort By</option>
            <option value="release_year">Release Year</option>
            <option value="genre">Genre</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-card">
            <h3>{{ album.title }}</h3>
            <p>Artist: {{ album.artist_name }}</p>
            <p>Release Year: {{ album.release_year }}</p>
            <p>Genre: {{ album.genre }}</p>
            <a href="{{ url_for('album_details_page', album_id=album.album_id) }}">
                <button id="view-album-button-{{ album.album_id }}">View Album</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
