<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>

    <form method="POST" action="{{ url_for('song_catalog_search') }}">
        <input type="text" id="search-input" name="search_query" placeholder="Search songs..." />
        <select id="genre-filter" name="genre_filter">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}">{{ genre }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="songs-grid">
        {% for song in songs %}
        <div class="song-card">
            <h3>{{ song.title }}</h3>
            <p>Artist: {{ song.artist_name }}</p>
            <p>Album: {{ song.album_name }}</p>
            <p>Genre: {{ song.genre }}</p>
            <p>Duration: {{ song.duration }} seconds</p>
            <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
