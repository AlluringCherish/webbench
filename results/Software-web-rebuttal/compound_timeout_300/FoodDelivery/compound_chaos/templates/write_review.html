<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>

        <form method="post" action="{{ url_for('write_review') }}">
            <label for="restaurant-id">Restaurant ID:</label>
            <input type="number" id="restaurant-id" name="restaurant_id" required>

            <label for="customer-name">Your Name:</label>
            <input type="text" id="customer-name" name="customer_name" required>

            <label for="rating">Rating (1 to 5):</label>
            <select id="rating" name="rating" required>
                <option value="">Select Rating</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>

            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" required></textarea>

            <button type="submit">Submit Review</button>
        </form>

        <button id="back-to-reviews" onclick="window.location.href='{{ url_for('reviews_page') }}'">Back to Reviews</button>
    </div>
</body>
</html>
