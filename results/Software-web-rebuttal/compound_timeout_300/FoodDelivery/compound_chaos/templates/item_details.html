<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
</head>
<body>
    <div id="item-details-page">
        <h1 id="item-name">{{ item.item_name }}</h1>

        <div id="item-description">
            <p>{{ item.description }}</p>
        </div>

        <div id="item-price">
            <p>Price: ${{ "%.2f"|format(item.price) }}</p>
        </div>

        <form method="post" action="{{ url_for('shopping_cart') }}">
            <label for="quantity-input">Quantity:</label>
            <input type="number" id="quantity-input" name="quantity" value="{{ quantity_default }}" min="1" required>
            <input type="hidden" name="item_id" value="{{ item.item_id }}">
            <button id="add-to-cart-button" type="submit">Add to Cart</button>
        </form>
    </div>
</body>
</html>
