<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Order Reviews</h1>

        <select id="filter-by-rating" name="rating">
            {% for rating_filter in filter_ratings %}
                <option value="{{ rating_filter }}">{{ rating_filter }}</option>
            {% endfor %}
        </select>

        <div id="reviews-list">
            {% for review in reviews %}
                <div class="review-card">
                    <p>Customer: {{ review.customer_name }}</p>
                    <p>Rating: {{ review.rating }}</p>
                    <p>Review: {{ review.review_text }}</p>
                    <p>Date: {{ review.review_date }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
