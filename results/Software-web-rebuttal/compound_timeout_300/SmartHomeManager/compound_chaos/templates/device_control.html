<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>
        <h2 id="device-name-display">{{ device.device_name }}</h2>
        <div id="device-status-display">Status: {{ device.status }}</div>
        <form method="POST" action="{{ url_for('device_control_post', device_id=device.device_id) }}">
            <button id="power-toggle" name="power_toggle" type="submit">Toggle Power</button>
            {% if device.brightness is not none %}
            <label for="brightness">Brightness:</label>
            <input type="number" id="brightness" name="brightness" min="0" max="100" value="{{ device.brightness }}">
            <br>
            {% endif %}
            {% if device.temperature is not none %}
            <label for="temperature">Temperature:</label>
            <input type="number" id="temperature" name="temperature" min="30" max="100" value="{{ device.temperature }}">
            <br>
            {% endif %}
            <label for="mode">Mode:</label>
            <input type="text" id="mode" name="mode" value="{{ device.mode }}">
            <br>
            <button type="submit" id="save-settings-button">Save Settings</button>
        </form>
        <button id="back-to-devices" onclick="window.location.href='{{ url_for('device_list') }}'">Back to Devices</button>
    </div>
</body>
</html>
