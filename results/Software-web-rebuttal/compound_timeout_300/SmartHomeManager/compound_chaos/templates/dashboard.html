<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Smart Home Dashboard</h1>
        <div id="device-summary">
            <p>Total Devices: {{ devices_summary.total }}</p>
            <p>Active Devices: {{ devices_summary.active }}</p>
            <p>Offline Devices: {{ devices_summary.offline }}</p>
        </div>
        <div>
            <button id="device-list-button" onclick="window.location.href='{{ url_for('device_list') }}'">Device List</button>
            <button id="add-device-button" onclick="window.location.href='{{ url_for('add_device') }}'">Add Device</button>
            <button id="automation-button" onclick="window.location.href='{{ url_for('automation_rules') }}'">Automation Rules</button>
            <button id="energy-button" onclick="window.location.href='{{ url_for('energy_report') }}'">Energy Report</button>
            <button id="activity-button" onclick="window.location.href='{{ url_for('activity_logs') }}'">Activity Logs</button>
        </div>
        <div id="room-list">
            <h2>Rooms</h2>
            <ul>
                {% for room in rooms_summary %}
                <li>{{ room.room_name }} ({{ room.device_count }} devices)</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
