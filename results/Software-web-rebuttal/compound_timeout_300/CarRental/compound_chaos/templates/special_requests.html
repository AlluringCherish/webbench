<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            {% if submission_status %}
            <p>{{ submission_status }}</p>
            {% endif %}
            <form method="post" action="">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id">
                    {% for res in reservations %}
                    <option value="{{ res.reservation_id }}">{{ res.description }}</option>
                    {% endfor %}
                </select>

                <label for="driver-assistance-checkbox">Driver Assistance:</label>
                <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance">

                <label for="gps-option-checkbox">GPS Option:</label>
                <input type="checkbox" id="gps-option-checkbox" name="gps_option">

                <label for="child-seat-quantity">Number of Child Seats:</label>
                <input type="number" id="child-seat-quantity" name="child_seats" min="0" value="0">

                <label for="special-notes">Special Notes:</label>
                <textarea id="special-notes" name="special_notes"></textarea>

                <button id="submit-requests-button" type="submit">Submit Requests</button>
            </form>
        </div>
    </div>
</body>
</html>
