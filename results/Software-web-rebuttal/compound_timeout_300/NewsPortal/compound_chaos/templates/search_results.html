<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search Results</title>
    <meta charset="UTF-8">
</head>
<body>
<div id="search-results-page">
    <div id="search-query-display">Results for: "{{ query }}"</div>
    {% if results %}
    <div id="results-list">
        {% for article in results %}
        <div class="article-card" id="article-{{ article.article_id }}">
            <h3>{{ article.title }}</h3>
            <p>{{ article.excerpt }}</p>
            <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div id="no-results-message">No results found for "{{ query }}"</div>
    {% endif %}
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
