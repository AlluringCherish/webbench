<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Bookmarks</title>
    <meta charset="UTF-8">
</head>
<body>
<div id="bookmarks-page">
    <div id="bookmarks-list">
        {% for bookmark in bookmarks %}
        <div>
            <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('article_details', article_id=bookmark.article_id) }}'">{{ bookmark.article_title }}</button>
            <form method="POST" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}" style="display:inline;">
                <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Remove</button>
            </form>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
