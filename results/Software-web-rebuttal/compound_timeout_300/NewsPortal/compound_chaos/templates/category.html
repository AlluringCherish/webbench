<!DOCTYPE html>
<html lang="en">
<head>
    <title>Category Articles</title>
    <meta charset="UTF-8">
</head>
<body>
<div id="category-page">
    <h1 id="category-title">{{ category_name }}</h1>
    <form method="POST" action="{{ url_for('category_sort', category_name=category_name) }}">
        <button id="sort-by-date" type="submit" name="sort_by" value="date">Sort by Date</button>
        <button id="sort-by-popularity" type="submit" name="sort_by" value="popularity">Sort by Popularity</button>
    </form>
    <div id="category-articles">
        {% for article in articles %}
        <div class="article-card" id="article-{{ article.article_id }}">
            <h3>{{ article.title }}</h3>
            <p>By {{ article.author }}</p>
            <p>Date: {{ article.date }}</p>
            <p>Popularity: {{ article.popularity }}</p>
            <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
