<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>

        <input type="text" id="filter-by-winner" name="filter-by-winner" placeholder="Filter by winner name" value="{{ filter_name | default('') }}" />

        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}">
                <h2>{{ winner.item_name }}</h2>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ '%.2f' | format(winner.winning_bid) }}</p>
                <p>Win Date: {{ winner.win_date }}</p>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
