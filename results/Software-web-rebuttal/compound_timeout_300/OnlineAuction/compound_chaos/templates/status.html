<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>

        <select id="status-filter" name="status-filter">
            <option value="">All Statuses</option>
            <option value="Active" {% if status_filter == 'Active' %}selected{% endif %}>Active</option>
            <option value="Closed" {% if status_filter == 'Closed' %}selected{% endif %}>Closed</option>
            <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
        </select>

        <button id="refresh-status-button">Refresh Status</button>

        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Auction Name</th>
                    <th>Status</th>
                    <th>Time Remaining</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                    {% if not status_filter or status_filter == auction.status %}
                    <tr id="auction-{{ auction.auction_id }}">
                        <td>{{ auction.item_name }}</td>
                        <td>{{ auction.status }}</td>
                        <td>{{ auction.end_time }}</td>
                        <td>${{ '%.2f' | format(auction.current_bid) }}</td>
                    </tr>
                    {% endif %}
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
