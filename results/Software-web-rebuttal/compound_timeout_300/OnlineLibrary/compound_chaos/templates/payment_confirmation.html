<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <form method="POST" action="{{ url_for('confirm_payment', fine_id=fine.fine_id) }}">
            <div id="fine-amount-display">Amount: ${{ "%.2f"|format(fine.amount) }}</div>
            <button id="confirm-payment-button" type="submit">Confirm Payment</button>
            <button id="back-to-profile" type="button" onclick="window.location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
        </form>
    </div>
</body>
</html>
