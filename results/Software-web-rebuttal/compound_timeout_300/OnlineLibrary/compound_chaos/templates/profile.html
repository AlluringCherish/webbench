<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <form method="POST" action="{{ url_for('update_profile') }}">
            <div id="profile-username">Username: {{ username }}</div>
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ email }}">
            <br>
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <div id="borrow-history">
            <h2>Borrow History</h2>
            <ul>
                {% for record in borrow_history %}
                <li>
                    {{ record.book_title }} - Borrowed: {{ record.borrow_date }} - Returned: {{ record.return_date if record.return_date else 'Not returned' }}
                </li>
                {% else %}
                <li>No borrow history.</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
