<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <form method="POST" action="{{ url_for('submit_review') }}">
            <div id="book-info-display">Book: {{ book.title }}</div>
            {% if review %}
            <input type="hidden" name="review_id" value="{{ review.review_id }}">
            {% endif %}
            <input type="hidden" name="book_id" value="{{ book.book_id }}">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for i in range(1,6) %}
                <option value="{{ i }}" {% if review and review.rating == i %}selected{% endif %}>{{ i }} Star{% if i > 1 %}s{% endif %}</option>
                {% endfor %}
            </select>
            <br>
            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="40">{% if review %}{{ review.review_text }}{% endif %}</textarea>
            <br>
            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-book" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
    </div>
</body>
</html>
