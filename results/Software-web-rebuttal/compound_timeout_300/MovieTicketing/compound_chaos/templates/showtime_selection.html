<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Showtime</title>
</head>
<body>
    <div id="showtime-page">
        <h1>Select Showtime</h1>

        <label for="theater-filter">Filter by Theater:</label>
        <select id="theater-filter" name="theater">
            <option value="">All Theaters</option>
            {% for theater in theaters %}
            <option value="{{ theater.theater_id }}" {% if filters.selected_theater_id == theater.theater_id %}selected{% endif %}>{{ theater.theater_name }}</option>
            {% endfor %}
        </select>

        <label for="date-filter">Filter by Date:</label>
        <input type="date" id="date-filter" name="date" value="{{ filters.selected_date if filters.selected_date else '' }}">

        <div id="showtimes-list">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Theater</th>
                        <th>Price</th>
                        <th>Select</th>
                    </tr>
                </thead>
                <tbody>
                    {% for showtime in showtimes %}
                    <tr>
                        <td>{{ showtime.showtime_date }}</td>
                        <td>{{ showtime.showtime_time }}</td>
                        <td>{{ showtime.theater_name }}</td>
                        <td>${{ "%.2f"|format(showtime.price) }}</td>
                        <td><button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Select</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
