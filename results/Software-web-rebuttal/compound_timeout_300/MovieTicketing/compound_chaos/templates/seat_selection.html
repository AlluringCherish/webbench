<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>

        <div id="seat-map">
            {% for seat in seats %}
            <button id="seat-{{ seat.row }}{{ seat.column }}" class="seat-button" data-seat-id="{{ seat.seat_id }}" data-status="{{ seat.status }}" data-seat-type="{{ seat.seat_type }}" {% if seat.status != 'Available' %}disabled{% endif %}>
                {{ seat.row }}{{ seat.column }}
            </button>
            {% endfor %}
        </div>

        <div id="selected-seats-display">
            Selected Seats: {% for seat_id in selected_seats %}{{ seat_id }} {% endfor %}
        </div>

        <button id="proceed-booking-button" onclick="location.href='{{ url_for('booking_confirmation', showtime_id=showtime_info.showtime_id) }}'">Proceed to Booking</button>
    </div>
</body>
</html>
