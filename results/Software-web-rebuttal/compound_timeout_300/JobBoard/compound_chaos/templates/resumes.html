<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>

        <div id="resumes-list">
            {% for resume in resumes %}
            <div class="resume-card">
                <div><strong>{{ resume.filename }}</strong> (Uploaded: {{ resume.upload_date }})</div>
                <div>{{ resume.summary }}</div>
                <form action="/delete_resume/{{ resume.resume_id }}" method="post" style="display:inline;">
                    <button type="submit" id="delete-resume-button-{{ resume.resume_id }}">Delete</button>
                </form>
            </div>
            {% else %}
            <p>No resumes uploaded.</p>
            {% endfor %}
        </div>

        <form action="" method="post" enctype="multipart/form-data">
            <label for="resume-file-input">Upload New Resume:</label><br>
            <input type="file" id="resume-file-input" name="resume_file" style="display:none;" required>
            <br>
            <label for="applicant-name">Name:</label><br>
            <input type="text" id="applicant-name" name="applicant_name" required>
            <br>
            <label for="applicant-email">Email:</label><br>
            <input type="email" id="applicant-email" name="applicant_email" required>
            <br><br>
            <button type="submit" id="upload-resume-button">Upload Resume</button>
        </form>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
