<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destination Details</title>
</head>
<body>
    <div id="destination-details-page">
        <h1 id="destination-name">{{ destination.name }}</h1>

        <div id="destination-country">Country: {{ destination.country }}</div>

        <div id="destination-description">{{ destination.description }}</div>

        <div id="destination-attractions">
            <h3>Main Attractions and Activities</h3>
            <ul>
                {% for attraction in destination.attractions %}
                <li>{{ attraction }}</li>
                {% endfor %}
            </ul>
        </div>

        <form method="post" action="">
            <button type="submit" id="add-to-trip-button">Add to Trip</button>
        </form>
    </div>
</body>
</html>
