<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Trips</title>
</head>
<body>
    <div id="trips-page">
        <h1 id="trips-title">My Trips</h1>

        <table id="trips-table" border="1">
            <thead>
                <tr>
                    <th>Trip Name</th>
                    <th>Destination</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Total Budget</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for trip in trips %}
                <tr>
                    <td>{{ trip.trip_name }}</td>
                    <td>{{ trip.destination }}</td>
                    <td>{{ trip.start_date }}</td>
                    <td>{{ trip.end_date }}</td>
                    <td>${{ "%.2f"|format(trip.total_budget) }}</td>
                    <td>{{ trip.status }}</td>
                    <td>
                        <button id="view-trip-details-button-{{ trip.trip_id }}">View</button>
                        <button id="edit-trip-button-{{ trip.trip_id }}">Edit</button>
                        <button id="delete-trip-button-{{ trip.trip_id }}">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
