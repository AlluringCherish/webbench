<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
    <div id="destinations-page">
        <h1 id="destinations-title">Travel Destinations</h1>

        <input type="text" id="search-destination" name="search-destination" placeholder="Search destinations..." />

        <select id="region-filter" name="region-filter">
            {% for region in regions %}
            <option value="{{ region }}">{{ region }}</option>
            {% endfor %}
        </select>

        <div id="destinations-grid">
            {% for dest in destinations %}
            <div class="destination-card">
                <img src="{{ dest.image_url }}" alt="{{ dest.name }}" style="max-width:200px; max-height:150px;" />
                <div><strong>{{ dest.name }}</strong></div>
                <div>{{ dest.country }}</div>
                <div>{{ dest.region }}</div>
                <button id="view-destination-button-{{ dest.dest_id }}" 
                        onclick="location.href='{{ url_for('destination_details_page', dest_id=dest.dest_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
