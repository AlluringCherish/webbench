<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Planner Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="dashboard-title">Travel Planner Dashboard</h1>

        <div id="featured-destinations">
            <h2>Featured Destinations</h2>
            <ul>
                {% for dest in featured_destinations %}
                <li>
                    <img src="{{ dest.image_url }}" alt="{{ dest.name }}" style="max-width:200px; max-height:150px;" />
                    <strong>{{ dest.name }}</strong>, {{ dest.country }}
                </li>
                {% endfor %}
            </ul>
        </div>

        <div id="upcoming-trips">
            <h2>Upcoming Trips</h2>
            <ul>
                {% for trip in upcoming_trips %}
                <li>
                    <strong>{{ trip.trip_name }}</strong>: {{ trip.start_date }} to {{ trip.end_date }}
                </li>
                {% endfor %}
            </ul>
        </div>

        <button id="browse-destinations-button" 
            onclick="location.href='{{ url_for('destinations_page') }}'">Browse Destinations</button>
        <button id="plan-itinerary-button" 
            onclick="location.href='{{ url_for('itinerary_page') }}'">Plan Itinerary</button>
    </div>
</body>
</html>
