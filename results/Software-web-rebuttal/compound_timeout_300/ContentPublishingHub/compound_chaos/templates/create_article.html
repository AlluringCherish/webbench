<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - Content Publishing Hub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>
        <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
            <label for="article-title">Title</label><br>
            <input type="text" id="article-title" name="title" required><br><br>

            <label for="article-content">Content</label><br>
            <textarea id="article-content" name="content" rows="10" cols="50" required></textarea><br><br>

            <button type="submit" id="submit-create-article">Submit</button>
            <button type="button" id="cancel-create-article" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
