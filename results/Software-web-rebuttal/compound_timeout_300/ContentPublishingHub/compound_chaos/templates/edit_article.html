<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - Content Publishing Hub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        <form id="edit-article-form" method="POST" action="{{ url_for('edit_article', article_id=article_id) }}">
            <label for="article-title">Title</label><br>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" disabled><br><br>

            <label for="article-content">Content</label><br>
            <textarea id="article-content" name="content" rows="10" cols="50" required>{{ article.content }}</textarea><br><br>

            <button type="submit" id="submit-edit-article">Save Changes</button>
            <button type="button" id="cancel-edit-article" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
