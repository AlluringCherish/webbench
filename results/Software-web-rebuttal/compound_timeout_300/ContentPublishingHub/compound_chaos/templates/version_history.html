<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - Content Publishing Hub</title>
</head>
<body>
    <div id="version-history-page">
        <h1>Version History</h1>
        <button id="back-to-article" onclick="window.location.href='{{ url_for('edit_article', article_id=article_id) }}'">Back to Article</button>
        <ul id="versions-list">
            {% for version in versions %}
            <li id="version-{{ version.version_id }}">
                <span>Version {{ version.version_number }} - {{ version.timestamp.strftime('%Y-%m-%d %H:%M') }}</span>
                <button class="view-version-details" data-version-id="{{ version.version_id }}">View Details</button>
            </li>
            {% else %}
            <li>No versions available.</li>
            {% endfor %}
        </ul>
        <div id="version-details">
            <!-- Details for selected version will appear here -->
        </div>
    </div>
</body>
</html>
