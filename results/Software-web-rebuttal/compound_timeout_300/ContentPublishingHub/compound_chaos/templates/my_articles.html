<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - Content Publishing Hub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <ul id="my-articles-list">
            {% for article in articles %}
            <li id="article-{{ article.article_id }}">
                <a href="{{ url_for('edit_article', article_id=article.article_id) }}">{{ article.title }}</a>
                (Last updated: {{ article.last_updated.strftime('%Y-%m-%d') }})
            </li>
            {% else %}
            <li>No articles found.</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
