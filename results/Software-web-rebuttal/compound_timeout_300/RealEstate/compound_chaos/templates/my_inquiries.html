<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Inquiries</title>
</head>
<body>
    <div id="inquiries-page">
        <form action="{{ url_for('my_inquiries_page') }}" method="get">
            <label for="inquiry-status-filter">Filter by Status:</label>
            <select id="inquiry-status-filter" name="status_filter">
                <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
                <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Contacted" {% if status_filter == 'Contacted' %}selected{% endif %}>Contacted</option>
                <option value="Resolved" {% if status_filter == 'Resolved' %}selected{% endif %}>Resolved</option>
            </select>
            <button type="submit">Apply Filter</button>
        </form>

        <table id="inquiries-table" border="1">
            <thead>
                <tr>
                    <th>Property</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for inquiry in inquiries %}
                <tr>
                    <td>{{ inquiry.property_address }}</td>
                    <td>{{ inquiry.inquiry_date }}</td>
                    <td>{{ inquiry.status }}</td>
                    <td>{{ inquiry.customer_name }}</td>
                    <td>{{ inquiry.customer_email }}</td>
                    <td>{{ inquiry.customer_phone }}</td>
                    <td>
                        <form action="{{ url_for('delete_inquiry', inquiry_id=inquiry.inquiry_id) }}" method="post" style="display:inline">
                            <button type="submit" id="delete-inquiry-button-{{ inquiry.inquiry_id }}">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
