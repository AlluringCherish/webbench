<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <div id="favorites-list">
            {% for property in favorites %}
                <div>
                    <h2>{{ property.address }}</h2>
                    <p>Price: ${{ "{0:,.2f}".format(property.price) }}</p>
                    <p>Bedrooms: {{ property.bedrooms }}, Bathrooms: {{ property.bathrooms }}</p>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                    <form action="{{ url_for('remove_favorite', property_id=property.property_id) }}" method="post" style="display:inline">
                        <button type="submit" id="remove-from-favorites-button-{{ property.property_id }}">Remove</button>
                    </form>
                </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
