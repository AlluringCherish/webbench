<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1 id="property-address">{{ property.address }}</h1>
        <div id="property-price">$ {{ "{0:,.2f}".format(property.price) }}</div>
        <div id="property-description">{{ property.description }}</div>
        <div id="property-features">
            <p>Bedrooms: {{ property.bedrooms }}</p>
            <p>Bathrooms: {{ property.bathrooms }}</p>
            <p>Square Feet: {{ property.square_feet }}</p>
        </div>
        <!-- Add to favorites button without form as adding favorites route not specified -->
        <a href="{{ url_for('my_favorites_page') }}">
            <button id="add-to-favorites-button">Add to Favorites</button>
        </a>
        <a href="{{ url_for('property_inquiry') }}?property_id={{ property.property_id }}">
            <button id="submit-inquiry-button">Submit Inquiry</button>
        </a>
    </div>
</body>
</html>
