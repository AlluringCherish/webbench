<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <form method="get">
            <label for="agent-search">Search Agents:</label>
            <input type="text" id="agent-search" name="search">
            <button type="submit">Search</button>
        </form>
        <div id="agents-list">
            {% for agent in agents %}
                <div>
                    <h2>{{ agent.agent_name }}</h2>
                    <p>Specialization: {{ agent.specialization }}</p>
                    <p>Email: {{ agent.email }}</p>
                    <p>Phone: {{ agent.phone }}</p>
                    <button id="contact-agent-button-{{ agent.agent_id }}" onclick="window.location.href='mailto:{{ agent.email }}'">Contact</button>
                </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
