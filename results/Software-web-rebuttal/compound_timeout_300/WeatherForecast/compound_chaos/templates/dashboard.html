<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="current-weather-summary">
            <h2>Current Weather for {{ default_location.location_name }}</h2>
            <p>Temperature: {{ default_location.temperature }}&deg;</p>
            <p>Condition: {{ default_location.condition }}</p>
            <p>Humidity: {{ default_location.humidity }}%</p>
            <p>Wind Speed: {{ default_location.wind_speed }} mph</p>
            <p>Last Updated: {{ default_location.last_updated }}</p>
        </div>
        <a href="{{ url_for('search_locations') }}"><button id="search-location-button">Search Location</button></a>
        <a href="{{ url_for('weekly_forecast') }}"><button id="view-forecast-button">View Forecast</button></a>
        <a href="{{ url_for('weather_alerts') }}"><button id="view-alerts-button">View Alerts</button></a>
    </div>
</body>
</html>
