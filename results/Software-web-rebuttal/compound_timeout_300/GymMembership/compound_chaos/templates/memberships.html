<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
</head>
<body>
    <div id="membership-page">
        <h1>Membership Plans</h1>
        <label for="plan-filter">Filter by Type:</label>
        <select id="plan-filter" name="plan-filter">
            <option value="">-- All Types --</option>
            {% for type in filter_types %}
            <option value="{{ type }}">{{ type }}</option>
            {% endfor %}
        </select>

        <div id="plans-grid">
            {% for plan in membership_plans %}
            <div class="plan-card" id="plan-card-{{ plan.membership_id }}">
                <h2>{{ plan.plan_name }}</h2>
                <p>Price: ${{ plan.price }} / {{ plan.billing_cycle }}</p>
                <p>Features: {{ plan.features }}</p>
                <p>Max Classes: {{ plan.max_classes }}</p>

                <button id="view-details-button-{{ plan.membership_id }}" onclick="location.href='{{ url_for('plan_details_page', plan_id=plan.membership_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
