<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <h1>Trainer Profiles</h1>
        <form method="get" action="">
            <input type="text" id="trainer-search" name="search_query" placeholder="Search trainers by name or specialty" value="{{ search_query }}" />
            <select id="specialty-filter" name="specialty">
                <option value="">-- All Specialties --</option>
                {% for specialty in specialties %}
                <option value="{{ specialty }}" {% if specialty == request.args.get('specialty', '') %}selected{% endif %}>{{ specialty }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="trainers-grid">
            {% for trainer in trainers %}
            <div class="trainer-card" id="trainer-card-{{ trainer.trainer_id }}">
                <h2>{{ trainer.name }}</h2>
                <p>Specialty: {{ trainer.specialty }}</p>
                <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="location.href='{{ url_for('trainer_detail_page', trainer_id=trainer.trainer_id) }}'">View Profile</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
