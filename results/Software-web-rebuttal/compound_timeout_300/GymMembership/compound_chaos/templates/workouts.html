<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Workout Records</title>
</head>
<body>
    <div id="workouts-page">
        <h1>My Workout Records</h1>
        <label for="filter-by-type">Filter by Workout Type:</label>
        <select id="filter-by-type" name="filter-type">
            <option value="">-- All Types --</option>
            {% for type in workout_types %}
            <option value="{{ type }}">{{ type }}</option>
            {% endfor %}
        </select>
        <button id="log-workout-button" onclick="location.href='{{ url_for('log_workout_page') }}'">Log New Workout</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <table id="workouts-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Duration (minutes)</th>
                    <th>Calories Burned</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody>
                {% for workout in workouts %}
                <tr>
                    <td>{{ workout.workout_date }}</td>
                    <td>{{ workout.workout_type }}</td>
                    <td>{{ workout.duration_minutes }}</td>
                    <td>{{ workout.calories_burned }}</td>
                    <td>{{ workout.notes }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
