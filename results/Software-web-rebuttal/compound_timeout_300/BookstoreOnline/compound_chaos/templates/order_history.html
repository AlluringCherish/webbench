<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
    <div id="orders-page">
        <h1>Order History</h1>

        <form method="get" action="{{ url_for('order_history') }}">
            <label for="order-status-filter">Filter by Status:</label>
            <select id="order-status-filter" name="status" onchange="this.form.submit()">
                <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
                <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Shipped" {% if status_filter == 'Shipped' %}selected{% endif %}>Shipped</option>
                <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
            </select>
        </form>

        <table id="orders-table" border="1">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>View</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                    <tr>
                        <td>{{ order.order_id }}</td>
                        <td>{{ order.order_date }}</td>
                        <td>${{ "%.2f" | format(order.total_amount) }}</td>
                        <td>{{ order.status }}</td>
                        <td>
                            <button id="view-order-button-{{ order.order_id }}" onclick="location.href='{{ url_for('order_details', order_id=order.order_id) }}'">View</button>
                        </td>
                    </tr>
                {% else %}
                    <tr><td colspan="5">No orders found.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
