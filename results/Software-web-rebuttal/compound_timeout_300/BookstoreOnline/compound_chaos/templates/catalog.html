<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="{{ url_for('catalog') }}">
            <input type="text" id="search-input" name="search" placeholder="Search books..." value="{{ search_query or '' }}" />

            <select id="category-filter" name="category" onchange="this.form.submit()">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_name }}" {% if selected_category == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Search</button>
        </form>

        <div id="books-grid">
            {% for book in books %}
                <div class="book-card">
                    <strong>{{ book.title }}</strong><br />
                    Author: {{ book.author }}<br />
                    Price: ${{ "%.2f" | format(book.price) }}<br />
                    <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
                </div>
            {% else %}
                <p>No books found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
