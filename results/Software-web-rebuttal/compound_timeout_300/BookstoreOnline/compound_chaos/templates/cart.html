<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>

        <form method="post">
            <table id="cart-items-table" border="1">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                        <tr>
                            <td>{{ item.title }}</td>
                            <td>
                                <input type="number" min="1" id="update-quantity-{{ item.cart_id }}" name="quantity_{{ item.cart_id }}" value="{{ item.quantity }}" />
                            </td>
                            <td>${{ "%.2f" | format(item.price) }}</td>
                            <td>${{ "%.2f" | format(item.subtotal) }}</td>
                            <td>
                                <button type="submit" name="remove_{{ item.cart_id }}" id="remove-item-button-{{ item.cart_id }}">Remove</button>
                            </td>
                        </tr>
                    {% else %}
                        <tr><td colspan="5">Your cart is empty.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        
            <div id="total-amount">
                <strong>Total: ${{ "%.2f" | format(total_amount) }}</strong>
            </div>

            <button type="button" id="proceed-checkout-button" onclick="location.href='{{ url_for('checkout') }}'">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
