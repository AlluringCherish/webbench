<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
    <div id="artifact-catalog-page">
        <h1>Artifact Catalog</h1>
        <form method="post" action="{{ url_for('artifact_catalog') }}">
            <input type="text" id="search-artifact" name="search_query" value="{{ search_query|default('') }}" placeholder="Search artifacts...">
            <button type="submit" id="apply-artifact-filter">Apply Filter</button>
        </form>
        <table id="artifact-table" border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Period</th>
                    <th>Origin</th>
                    <th>Exhibition</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for artifact in artifacts_list %}
                <tr>
                    <td>{{ artifact.artifact_id }}</td>
                    <td>{{ artifact.artifact_name }}</td>
                    <td>{{ artifact.period }}</td>
                    <td>{{ artifact.origin }}</td>
                    <td>{{ artifact.exhibition_title if artifact.exhibition_title else 'N/A' }}</td>
                    <td><!-- Actions can be implemented here if needed --></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
