<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create New Playlist</title>
</head>
<body>
  <div id="create-playlist-page">
    <form method="POST" action="{{ url_for('create_playlist') }}">
      <label for="playlist-name-input">Playlist Name:</label>
      <input type="text" id="playlist-name-input" name="name" required />

      <label for="playlist-description-input">Description:</label>
      <textarea id="playlist-description-input" name="description"></textarea>

      <button id="save-playlist-button" type="submit">Save Playlist</button>
      <button id="cancel-create-button" type="button" onclick="location.href='{{ url_for('playlists') }}'">Cancel</button>
    </form>
  </div>
</body>
</html>
