<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Artist Profiles</title>
</head>
<body>
  <div id="artists-page">
    <input type="text" id="search-artists" placeholder="Search artists..." />
    <select id="artists-sort">
      <option value="name">Name</option>
      <option value="genre">Genre</option>
      <option value="country">Country</option>
    </select>

    <div id="artists-grid">
      {% for artist in artists %}
      <div class="artist-item">
        <p>{{ artist.name }} ({{ artist.genre }}, {{ artist.country }})</p>
        <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_profile', artist_id=artist.artist_id) }}'">View Profile</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
