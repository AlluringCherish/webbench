<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Albums</title>
</head>
<body>
  <div id="albums-page">
    <input type="text" id="search-albums" placeholder="Search albums..." />
    <select id="sort-albums">
      <option value="release_year">Release Year</option>
      <option value="title">Title</option>
      <option value="artist_name">Artist</option>
    </select>
    <div id="albums-grid">
      {% for album in albums %}
      <div class="album-item">
        <p>{{ album.title }} by {{ album.artist_name }} ({{ album.year }})</p>
        <button id="view-album-button-{{ album.album_id }}" onclick="location.href='{{ url_for('album_details', album_id=album.album_id) }}'">View Album</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
