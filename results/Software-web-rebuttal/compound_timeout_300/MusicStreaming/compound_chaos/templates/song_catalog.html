<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Song Catalog</title>
</head>
<body>
  <div id="catalog-page">
    <input type="text" id="search-input" placeholder="Search songs..." />
    <select id="genre-filter">
      <option value="">All Genres</option>
      {% for genre in genres %}
      <option value="{{ genre }}" {% if selected_genre == genre %}selected{% endif %}>{{ genre }}</option>
      {% endfor %}
    </select>

    <div id="songs-grid">
      {% for song in songs %}
      <div class="song-item">
        <p>{{ song.title }} by {{ song.artist_name }} (Album: {{ song.album_name }})</p>
        <button id="add-to-playlist-button-{{ song.song_id }}" type="button">Add to Playlist</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
