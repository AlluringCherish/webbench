<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Playlists</title>
</head>
<body>
  <div id="playlists-page">
    <div id="playlists-grid">
      {% for playlist in playlists %}
      <div class="playlist-item">
        <h2>{{ playlist.title }}</h2>
        <p>{{ playlist.description }}</p>
        <p>Total Songs: {{ playlist.total_songs }}</p>
        <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="location.href='{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}'">View Playlist</button>
      </div>
      {% endfor %}
    </div>
    <button id="create-playlist-button" onclick="location.href='{{ url_for('create_playlist') }}'">Create New Playlist</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
