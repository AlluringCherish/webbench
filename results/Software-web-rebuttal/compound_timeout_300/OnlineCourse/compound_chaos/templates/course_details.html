<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
    <div id="course-details-page">
        <h1 id="course-title">{{ course.title }}</h1>
        <div id="course-description">{{ course.description }}</div>

        {% if enrolled %}
            <button id="enroll-button" disabled>Already Enrolled</button>
            <div id="enrollment-info">
                <p>Enrolled on: {{ enrollment_date }}</p>
                <p>Progress: {{ progress }}%</p>
            </div>
        {% else %}
            <button id="enroll-button" onclick="location.href='{{ url_for('enroll', course_id=course.course_id) }}'">Enroll</button>
        {% endif %}

        <button id="back-to-catalog" onclick="location.href='{{ url_for('available_courses') }}'">Back to Catalog</button>
    </div>
</body>
</html>
