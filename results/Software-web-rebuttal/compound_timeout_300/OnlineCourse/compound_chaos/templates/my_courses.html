<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
</head>
<body>
    <div id="my-courses-page">
        <div id="courses-list">
            {% if my_courses %}
                <ul>
                    {% for course in my_courses %}
                        <li>
                            {{ course.title }} - Progress: {{ course.progress }}%
                            <button id="continue-learning-button-{{ course.course_id }}" onclick="location.href='{{ url_for('learning_page', course_id=course.course_id) }}'">Continue Learning</button>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No courses found.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
