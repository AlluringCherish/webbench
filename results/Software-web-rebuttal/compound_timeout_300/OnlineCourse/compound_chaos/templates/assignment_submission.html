<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="submit-page">
        <div id="assignment-info">
            <h1>{{ assignment.title }}</h1>
            <p>{{ assignment.description }}</p>
        </div>
        <form method="POST">
            <textarea id="submission-text" name="submission_text" rows="10" cols="50" required></textarea>
            <br />
            <button type="submit" id="submit-button">Submit</button>
        </form>
        <button id="back-to-assignments" onclick="location.href='{{ url_for('assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
