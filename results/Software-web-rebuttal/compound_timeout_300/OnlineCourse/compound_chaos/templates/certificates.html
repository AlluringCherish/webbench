<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <div id="certificates-grid">
            {% if certificates %}
                {% for certificate in certificates %}
                    <div class="certificate-card">
                        <p>Course Title: {{ certificate.course_title }}</p>
                        <p>Username: {{ certificate.username }}</p>
                        <p>Issue Date: {{ certificate.issue_date }}</p>
                    </div>
                {% endfor %}
            {% else %}
                <p>No certificates earned.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
