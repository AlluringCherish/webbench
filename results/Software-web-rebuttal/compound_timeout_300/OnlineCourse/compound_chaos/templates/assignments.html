<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Assignments</title>
</head>
<body>
    <div id="assignments-page">
        <table id="assignments-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for assignment in assignments %}
                    <tr>
                        <td>{{ assignment.title }}</td>
                        <td>{{ assignment.due_date }}</td>
                        <td>{{ assignment.status }}</td>
                        <td>
                            <button id="submit-assignment-button-{{ assignment.assignment_id }}" {% if assignment.status != 'Pending' %}disabled{% endif %} onclick="location.href='{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}'">Submit</button>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
