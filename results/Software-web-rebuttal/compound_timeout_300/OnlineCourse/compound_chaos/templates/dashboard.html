<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ user_name }}!</h1>

        <div id="enrolled-courses">
            {% if enrollments %}
                <ul>
                    {% for enrollment in enrollments %}
                        <li>{{ enrollment.course_title }} - Progress: {{ enrollment.progress }}%</li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No enrolled courses.</p>
            {% endif %}
        </div>

        <button id="browse-courses-button" onclick="location.href='{{ url_for('available_courses') }}'">Browse Courses</button>
        <button id="my-courses-button" onclick="location.href='{{ url_for('my_courses') }}'">My Courses</button>
    </div>
</body>
</html>
