<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="learning-page">
        <div id="lessons-list">
            {% for lesson in lessons %}
                <div id="lesson-{{ lesson.lesson_id }}" class="lesson-item">
                    <h3>{{ lesson.title }}</h3>
                    {% if lesson.completed %}
                        <p>Completed</p>
                    {% else %}
                        <button id="mark-complete-button" onclick="location.href='{{ url_for('mark_lesson_completed', course_id=course_id, lesson_id=lesson.lesson_id) }}'">Mark Complete</button>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
        <div id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <p>{{ current_lesson.content }}</p>
        </div>
        <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
