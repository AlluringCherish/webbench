<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
                <div class="review-item">
                    <strong>{{ review.dish_name }}</strong><br>
                    Rating: {{ review.rating }}<br>
                    <p>{{ review.review_text }}</p>
                </div>
            {% endfor %}
            {% if reviews|length == 0 %}
            <div>No reviews found.</div>
            {% endif %}
        </div>

        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
