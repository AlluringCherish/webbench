<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <form method="POST" action="/waitlist">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="party_size" required>
                {% for i in range(1, 11) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="join-waitlist-button">Join Waitlist</button>
        </form>

        <div id="user-position">
            {% if user_position is not none %}
                Your current position in the waitlist is: {{ user_position }}
            {% else %}
                You are not currently on the waitlist.
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
