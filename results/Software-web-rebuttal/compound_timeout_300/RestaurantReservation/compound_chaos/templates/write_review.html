<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <form method="POST" action="/write-review">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id" required>
                {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                {% for i in range(1, 6) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>

            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="40" required></textarea><br>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>

        <button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
    </div>
</body>
</html>
