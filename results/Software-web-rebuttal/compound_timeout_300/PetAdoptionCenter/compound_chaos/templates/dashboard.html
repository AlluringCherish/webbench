<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>
        <button id="browse-pets-button" onclick="location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div class="featured-pet-card">
                <h2>{{ pet.name }}</h2>
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
            </div>
            {% endfor %}
        </div>

        <div id="recent-activities">
            <h2>Recent Activities</h2>
            <ul>
            {% for activity in recent_activities %}
                <li>{{ activity }}</li>
            {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
