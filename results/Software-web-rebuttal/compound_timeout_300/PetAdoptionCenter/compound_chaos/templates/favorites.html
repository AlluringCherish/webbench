<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        <div id="favorites-grid">
            {% for pet in favorite_pets %}
            <div class="favorite-pet-card" id="pet-{{ pet.pet_id }}">
                <h2>{{ pet.name }}</h2>
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
                <button onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
