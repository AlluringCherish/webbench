<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        {% if submission_result %}
            <p id="submission-result">{{ submission_result }}</p>
        {% endif %}

        <div id="conversation-list">
            {% for convo in conversations %}
            <div class="conversation" id="conversation-{{ convo.recipient_username }}">
                <p><strong>To: </strong>{{ convo.recipient_username }}</p>
                <p><strong>Last Message: </strong>{{ convo.last_message }}</p>
                <p><strong>Unread Count: </strong>{{ convo.unread_count }}</p>
            </div>
            {% endfor %}
        </div>

        <textarea id="message-input" name="message"></textarea>
        <button id="send-message-button">Send Message</button>
    </div>
</body>
</html>
