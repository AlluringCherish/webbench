<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        <label for="filter-status">Filter by Status:</label>
        <select id="filter-status" name="selected_status">
            {% for status in status_options %}
            <option value="{{ status }}" {% if status == selected_status %}selected{% endif %}>{{ status }}</option>
            {% endfor %}
        </select>

        <table id="applications-table">
            <thead>
                <tr>
                    <th>Application ID</th>
                    <th>Pet Name</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for application in applications %}
                <tr>
                    <td>{{ application.application_id }}</td>
                    <td>{{ application.pet_name }}</td>
                    <td>{{ application.date }}</td>
                    <td>{{ application.status }}</td>
                    <td>
                        <button onclick="location.href='{{ url_for('withdraw_application', application_id=application.application_id) }}'">Withdraw</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
