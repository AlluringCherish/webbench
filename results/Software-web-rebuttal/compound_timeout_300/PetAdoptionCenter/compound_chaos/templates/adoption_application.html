<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
    <div id="application-page">
        <h1>Adoption Application</h1>

        {% if submission_result %}
            <p id="submission-result">{{ submission_result }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('adoption_application', pet_id=pet.pet_id) }}">
            <label for="applicant-name">Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" required>

            <label for="applicant-phone">Phone:</label>
            <input type="tel" id="applicant-phone" name="phone" required>

            <label for="housing-type">Housing Type:</label>
            <select id="housing-type" name="housing_type" required>
                {% for option in housing_options %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>

            <label for="reason">Reason for adopting:</label>
            <textarea id="reason" name="reason" required></textarea>

            <button type="submit" id="submit-application-button">Submit Application</button>
        </form>

        <button id="back-to-pet" onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet Details</button>
    </div>
</body>
</html>
