<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
    <div id="add-pet-page">
        <h1>Add New Pet</h1>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        {% if submission_result %}
            <p id="submission-result">{{ submission_result }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('add_pet') }}">
            <label for="pet-name-input">Name:</label>
            <input type="text" id="pet-name-input" name="name" required>

            <label for="pet-species-input">Species:</label>
            <select id="pet-species-input" name="species" required>
                {% for species in species_options %}
                <option value="{{ species }}">{{ species }}</option>
                {% endfor %}
            </select>

            <label for="pet-breed-input">Breed:</label>
            <input type="text" id="pet-breed-input" name="breed" required>

            <label for="pet-age-input">Age:</label>
            <input type="number" id="pet-age-input" name="age" min="0" required>

            <label for="pet-gender-input">Gender:</label>
            <select id="pet-gender-input" name="gender" required>
                {% for gender in gender_options %}
                <option value="{{ gender }}">{{ gender }}</option>
                {% endfor %}
            </select>

            <label for="pet-size-input">Size:</label>
            <select id="pet-size-input" name="size" required>
                {% for size in size_options %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>

            <label for="pet-description-input">Description:</label>
            <textarea id="pet-description-input" name="description" required></textarea>

            <button type="submit" id="submit-pet-button">Submit</button>
        </form>
    </div>
</body>
</html>
