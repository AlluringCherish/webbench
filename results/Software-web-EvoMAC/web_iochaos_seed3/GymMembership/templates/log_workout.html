<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="log-workout-page">
        <h1>Log Workout</h1>
        {% if error %}
            <div class="error-message" style="color: red;">{{ error }}</div>
        {% endif %}
        {% if success_message %}
            <div class="success-message" style="color: green;">{{ success_message }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('log_workout') }}">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout-type" required>
                <option value="">-- Select Workout Type --</option>
                <option value="Cardio">Cardio</option>
                <option value="Strength">Strength</option>
                <option value="Flexibility">Flexibility</option>
                <option value="Sports">Sports</option>
            </select>
            <br><br>
            <label for="workout-duration">Workout Duration (minutes):</label>
            <input type="number" id="workout-duration" name="workout-duration" min="1" required>
            <br><br>
            <label for="calories-burned">Calories Burned:</label>
            <input type="number" id="calories-burned" name="calories-burned" min="0" required>
            <br><br>
            <label for="workout-notes">Workout Notes:</label><br>
            <textarea id="workout-notes" name="workout-notes" rows="4" cols="50" placeholder="Add any notes about your workout..."></textarea>
            <br><br>
            <input type="hidden" name="member_name" value="Guest User">
            <button type="submit" id="submit-workout-button">Submit Workout Record</button>
        </form>
        <br>
        <button onclick="location.href='{{ url_for('workout_records') }}'">Back to Workout Records</button>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
