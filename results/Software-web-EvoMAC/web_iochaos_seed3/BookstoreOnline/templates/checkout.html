'''
Checkout page template for BookstoreOnline.
Allows user to enter shipping info and place order.
Uses Flask url_for() for navigation and form actions.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
<div id="checkout-page">
    <h1>Checkout</h1>
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('checkout') }}">
        <label for="customer-name">Customer Name:</label><br>
        <input type="text" id="customer-name" name="customer-name" required><br><br>
        <label for="shipping-address">Shipping Address:</label><br>
        <textarea id="shipping-address" name="shipping-address" rows="4" cols="50" required></textarea><br><br>
        <label for="payment-method">Payment Method:</label><br>
        <select id="payment-method" name="payment-method" required>
            <option value="">Select Payment Method</option>
            <option value="Credit Card">Credit Card</option>
            <option value="PayPal">PayPal</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select><br><br>
        <button type="submit" id="place-order-button">Place Order</button>
    </form>
    <button onclick="location.href='{{ url_for('cart') }}'">Back to Cart</button>
    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
