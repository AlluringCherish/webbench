<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="course-details-page">
        <h1 id="course-title">{{ title }}</h1>
        <div id="course-description">
            <p>{{ description }}</p>
        </div>
        {% if already_enrolled %}
            <button id="enroll-button" disabled>Already Enrolled</button>
        {% else %}
            <form method="post" action="{{ url_for('enroll_course', course_id=course_id) }}">
                <button id="enroll-button" type="submit">Enroll</button>
            </form>
        {% endif %}
        <button id="back-to-catalog" onclick="location.href='{{ url_for('course_catalog') }}'">Back to Catalog</button>
    </div>
</body>
</html>
