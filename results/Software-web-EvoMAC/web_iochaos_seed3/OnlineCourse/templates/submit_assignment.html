<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="submit-page">
        <h1>Submit Assignment</h1>
        <div id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>{{ assignment.description }}</p>
            <p><strong>Due Date:</strong> {{ assignment.due_date }}</p>
        </div>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        {% if confirmation %}
            <p style="color: green;">{{ confirmation }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}">
            <textarea id="submission-text" name="submission_text" rows="10" cols="50" placeholder="Enter your assignment text here..."></textarea><br>
            <button id="submit-button" type="submit">Submit</button>
        </form>
        <button id="back-to-assignments" onclick="location.href='{{ url_for('my_assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
