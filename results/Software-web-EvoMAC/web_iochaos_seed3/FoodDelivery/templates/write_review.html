<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>
        <form method="post" action="{{ url_for('write_review') }}">
            <label for="restaurant-select">Select Restaurant:</label><br>
            <select id="restaurant-select" name="restaurant_id" required>
                <option value="">--Select--</option>
                {% for restaurant in restaurants %}
                <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                {% endfor %}
            </select><br><br>
            <label for="customer-name">Your Name:</label><br>
            <input type="text" id="customer-name" name="customer_name" required><br><br>
            <label for="rating">Rating:</label><br>
            <select id="rating" name="rating" required>
                <option value="">--Select--</option>
                <option value="5">5 stars</option>
                <option value="4">4 stars</option>
                <option value="3">3 stars</option>
                <option value="2">2 stars</option>
                <option value="1">1 star</option>
            </select><br><br>
            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="50" required></textarea><br><br>
            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
        <button onclick="location.href='{{ url_for('reviews') }}'">Back to Reviews</button>
    </div>
</body>
</html>
