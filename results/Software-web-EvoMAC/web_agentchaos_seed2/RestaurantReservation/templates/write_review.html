<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="write-review-page">
    <h1>Write Review</h1>
    <form method="post" action="{{ url_for('write_review') }}">
        <label for="select-dish">Select Dish:</label><br>
        <select id="select-dish" name="select-dish" required>
            <option value="">-- Select a dish --</option>
            {% for dish in menu %}
            <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
            {% endfor %}
        </select><br><br>
        <label for="rating-input">Rating:</label><br>
        <select id="rating-input" name="rating-input" required>
            <option value="">-- Select rating --</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }} Star{{ 's' if i > 1 else '' }}</option>
            {% endfor %}
        </select><br><br>
        <label for="review-text">Review:</label><br>
        <textarea id="review-text" name="review-text" rows="5" cols="40" required></textarea><br><br>
        <button type="submit" id="submit-review-button">Submit Review</button>
    </form>
    <form action="{{ url_for('back_to_reviews') }}" method="get" style="margin-top:20px;">
        <button type="submit" id="back-to-reviews">Back to My Reviews</button>
    </form>
</div>
</body>
</html>
