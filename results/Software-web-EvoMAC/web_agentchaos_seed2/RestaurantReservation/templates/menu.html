<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        #menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
            gap: 20px;
        }
        .dish-card {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
        }
        .dish-card h3 {
            margin-top: 0;
        }
    </style>
</head>
<body>
<div id="menu-page">
    <h1>Restaurant Menu</h1>
    <div>
        <label for="category-filter">Filter by Category:</label>
        <select id="category-filter" onchange="filterCategory()">
            <option value="All">All</option>
            {% for category in categories %}
            <option value="{{ category }}">{{ category }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="menu-grid">
        {% for dish in menu.values() %}
        <div class="dish-card" data-category="{{ dish.category }}">
            <h3>{{ dish.name }}</h3>
            <p>Category: {{ dish.category }}</p>
            <p>Price: ${{ "%.2f"|format(dish.price) }}</p>
            <p>{{ dish.description }}</p>
            <form action="{{ url_for('dish_details', dish_id=dish.dish_id) }}" method="get">
                <button type="submit" id="view-dish-button-{{ dish.dish_id }}">View Details</button>
            </form>
        </div>
        {% endfor %}
    </div>
    <form action="{{ url_for('back_to_dashboard') }}" method="get" style="margin-top:20px;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
<script>
function filterCategory() {
    const selected = document.getElementById('category-filter').value;
    const cards = document.querySelectorAll('#menu-grid .dish-card');
    cards.forEach(card => {
        if (selected === 'All' || card.getAttribute('data-category') === selected) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>
</body>
</html>
