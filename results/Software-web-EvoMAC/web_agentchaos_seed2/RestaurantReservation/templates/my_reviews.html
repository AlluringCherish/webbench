<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        #reviews-list {
            margin-top: 20px;
        }
        .review-item {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        .review-item h3 {
            margin: 0 0 5px 0;
        }
        .review-rating {
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div id="reviews-page">
    <h1>My Reviews</h1>
    <div id="reviews-list">
        {% if reviews %}
            {% for review in reviews %}
            <div class="review-item">
                <h3>{{ review.dish_name }}</h3>
                <div class="review-rating">Rating: {{ review.rating }} / 5</div>
                <p>{{ review.review_text }}</p>
                <small>Reviewed on: {{ review.review_date }}</small>
            </div>
            {% endfor %}
        {% else %}
            <p>You have not written any reviews yet.</p>
        {% endif %}
    </div>
    <form action="{{ url_for('write_review') }}" method="get" style="display:inline;">
        <button type="submit" id="write-new-review-button">Write New Review</button>
    </form>
    <form action="{{ url_for('back_to_dashboard') }}" method="get" style="display:inline; margin-left: 10px;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
