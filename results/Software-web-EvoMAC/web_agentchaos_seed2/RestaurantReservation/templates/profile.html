<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="profile-page">
    <h1>My Profile</h1>
    <form method="post" action="{{ url_for('profile') }}">
        <label for="profile-username">Username:</label><br>
        <div id="profile-username">{{ user.username }}</div><br>
        <label for="profile-email">Email:</label><br>
        <input type="email" id="profile-email" name="profile-email" value="{{ user.email }}" required><br><br>
        <button type="submit" id="update-profile-button">Update Profile</button>
    </form>
    <form action="{{ url_for('back_to_dashboard') }}" method="get" style="margin-top:20px;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
