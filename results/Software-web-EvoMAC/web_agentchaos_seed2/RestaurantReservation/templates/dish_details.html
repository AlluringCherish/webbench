<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dish Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="dish-details-page">
    <h1 id="dish-name">{{ dish.name }}</h1>
    <div id="dish-price">Price: ${{ "%.2f"|format(dish.price) }}</div>
    <p><strong>Category:</strong> {{ dish.category }}</p>
    <p><strong>Description:</strong> {{ dish.description }}</p>
    <p><strong>Ingredients:</strong> {{ dish.ingredients | join(', ') }}</p>
    <p><strong>Dietary:</strong> {{ dish.dietary }}</p>
    <p><strong>Average Rating:</strong> {{ dish.avg_rating }}</p>
    <form action="{{ url_for('back_to_menu') }}" method="get" style="margin-top:20px;">
        <button type="submit" id="back-to-menu">Back to Menu</button>
    </form>
</div>
</body>
</html>
