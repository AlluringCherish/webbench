<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="reservation-page">
    <h1>Make Reservation</h1>
    <form method="post" action="{{ url_for('make_reservation') }}">
        <label for="guest-name">Guest Name:</label><br>
        <input type="text" id="guest-name" name="guest-name" required><br><br>
        <label for="party-size">Party Size:</label><br>
        <select id="party-size" name="party-size" required>
            {% for i in range(1,11) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select><br><br>
        <label for="reservation-date">Reservation Date:</label><br>
        <input type="date" id="reservation-date" name="reservation-date" required><br><br>
        <label for="reservation-time">Reservation Time:</label><br>
        <input type="time" id="reservation-time" name="reservation-time" value="19:00" required><br><br>
        <label for="special-requests">Special Requests:</label><br>
        <textarea id="special-requests" name="special-requests" rows="3" cols="30"></textarea><br><br>
        <button type="submit" id="submit-reservation-button">Submit Reservation</button>
    </form>
    <form action="{{ url_for('back_to_dashboard') }}" method="get" style="margin-top:20px;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
