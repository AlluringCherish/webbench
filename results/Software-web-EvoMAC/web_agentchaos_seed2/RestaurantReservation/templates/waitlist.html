<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="waitlist-page">
    <h1>Waitlist</h1>
    <form method="post" action="{{ url_for('waitlist') }}">
        <label for="waitlist-party-size">Select Party Size:</label><br>
        <select id="waitlist-party-size" name="waitlist-party-size" required>
            {% for i in range(1, 11) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select><br><br>
        <button type="submit" id="join-waitlist-button">Join Waitlist</button>
    </form>
    {% if user_position %}
    <div id="user-position" style="margin-top:20px;">
        Your current position in the waitlist is: {{ user_position }}
    </div>
    {% else %}
    <div id="user-position" style="margin-top:20px;">
        You are not currently in the waitlist.
    </div>
    {% endif %}
    <form action="{{ url_for('back_to_dashboard') }}" method="get" style="margin-top:20px;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
