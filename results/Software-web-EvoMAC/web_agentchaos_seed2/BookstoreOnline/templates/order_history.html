<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="orders-page">
    <h1>Order History</h1>
    <form method="get" action="{{ url_for('order_history') }}">
        <label for="order-status-filter">Filter by Status:</label>
        <select id="order-status-filter" name="status" onchange="this.form.submit()">
            <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
            <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="Shipped" {% if status_filter == 'Shipped' %}selected{% endif %}>Shipped</option>
            <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
        </select>
    </form>
    {% if orders %}
    <table id="orders-table" border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Date</th>
                <th>Total Amount</th>
                <th>Status</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.order_id }}</td>
                <td>{{ order.order_date }}</td>
                <td>${{ "%.2f"|format(order.total_amount) }}</td>
                <td>{{ order.status }}</td>
                <td>
                    <a href="{{ url_for('order_details', order_id=order.order_id) }}">
                        <button id="view-order-button-{{ order.order_id }}">View Order</button>
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No orders found.</p>
    {% endif %}
    <nav class="orders-nav">
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </nav>
</div>
</body>
</html>
