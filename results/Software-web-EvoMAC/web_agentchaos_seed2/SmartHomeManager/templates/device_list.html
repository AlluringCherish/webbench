<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="{{ page_id }}">
    <h1>{{ page_title }}</h1>
    <table id="device-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Room</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for device in devices %}
            <tr>
                <td>{{ device.device_name }}</td>
                <td>{{ device.device_type }}</td>
                <td>{{ device.room }}</td>
                <td>{{ device.status }}</td>
                <td>
                    <button id="control-device-button-{{ device.device_id }}" onclick="location.href='{{ url_for('device_control', device_id=device.device_id) }}'">Control</button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5" style="text-align:center;">No devices found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
