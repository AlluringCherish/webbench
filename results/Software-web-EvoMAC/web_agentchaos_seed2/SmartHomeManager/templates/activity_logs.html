<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="{{ page_id }}">
    <h1>{{ page_title }}</h1>
    <form method="post" action="{{ url_for('activity_logs') }}">
        <label for="search-activity">Search Activity Logs</label>
        <input type="text" id="search-activity" name="search-activity" value="{{ search_term }}">
        <button id="apply-search-button" type="submit">Search</button>
    </form>
    <table id="activity-table">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Device</th>
                <th>Action</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for log in activity_logs %}
            <tr>
                <td>{{ log.timestamp }}</td>
                <td>{{ log.device_name }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.details }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align:center;">No activity logs found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
