<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #create-article-page { max-width: 700px; margin: auto; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input[type="text"], textarea { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        textarea { height: 200px; resize: vertical; }
        #save-draft-button, #cancel-button {
            margin-top: 20px; padding: 10px 20px; font-size: 1em; cursor: pointer;
        }
        #save-draft-button { background-color: #28a745; color: white; border: none; }
        #cancel-button { background-color: #dc3545; color: white; border: none; margin-left: 10px; }
        .flash-message { margin-top: 10px; padding: 10px; border-radius: 5px; }
        .flash-error { background-color: #f8d7da; color: #721c24; }
        .flash-success { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>
<div id="create-article-page">
    <h1>Create New Article</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-message flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post" action="{{ url_for('create_article') }}">
        <label for="article-title">Article Title</label>
        <input type="text" id="article-title" name="article-title" required>
        <label for="article-content">Content</label>
        <textarea id="article-content" name="article-content"></textarea>
        <button type="submit" id="save-draft-button">Save as Draft</button>
        <button type="button" id="cancel-button" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
