<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
    <style>
        #item-details-page {
            max-width: 600px;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        #item-description {
            margin-bottom: 15px;
        }
        #item-price {
            font-weight: bold;
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input[type="number"] {
            width: 60px;
            padding: 5px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 15px;
            cursor: pointer;
        }
        form {
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div id="item-details-page">
    <h1 id="item-name">{{ item.item_name }}</h1>
    <div id="item-description">{{ item.description }}</div>
    <div id="item-price">Price: ${{ "%.2f"|format(item.price) }}</div>
    <form method="post" action="{{ url_for('item_details_page', item_id=item.item_id) }}">
        <label for="quantity-input">Quantity:</label>
        <input type="number" id="quantity-input" name="quantity" value="1" min="1" required>
        <button type="submit" id="add-to-cart-button">Add to Cart</button>
    </form>
</div>
</body>
</html>
