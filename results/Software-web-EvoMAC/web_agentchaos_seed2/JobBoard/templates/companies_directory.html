<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
    <style>
        #companies-page {
            max-width: 900px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        #search-company-input {
            padding: 8px;
            font-size: 1em;
            width: 300px;
            margin-bottom: 20px;
        }
        #companies-list {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
            gap: 15px;
        }
        .company-card {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
        }
        .company-name {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 5px;
        }
        .company-info {
            color: #555;
            margin-bottom: 10px;
        }
        button {
            padding: 8px 15px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #007BFF;
            background-color: #007BFF;
            color: white;
        }
        button:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
        #back-to-dashboard {
            margin-top: 20px;
            padding: 8px 15px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #6c757d;
            background-color: #6c757d;
            color: white;
        }
        #back-to-dashboard:hover {
            background-color: #5a6268;
            border-color: #5a6268;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div id="companies-page">
    <h1>Company Directory</h1>
    <form method="get" action="{{ url_for('companies_directory') }}">
        <input type="text" id="search-company-input" name="search" placeholder="Search companies..." value="{{ search_query }}">
        <button type="submit">Search</button>
    </form>
    <div id="companies-list">
        {% if companies %}
            {% for company in companies %}
                <div class="company-card">
                    <div class="company-name">{{ company.company_name }}</div>
                    <div class="company-info">{{ company.industry }} - {{ company.employee_count }} employees</div>
                    <form action="{{ url_for('company_profile', company_id=company.company_id) }}" method="get">
                        <button type="submit" id="view-company-button-{{ company.company_id }}">View Profile</button>
                    </form>
                </div>
            {% endfor %}
        {% else %}
            <p>No companies found matching your criteria.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
