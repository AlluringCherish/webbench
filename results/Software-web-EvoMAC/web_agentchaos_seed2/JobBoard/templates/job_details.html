<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
    <style>
        #job-details-page {
            max-width: 800px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }
        #job-title {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 10px;
        }
        #company-name {
            font-size: 1.2em;
            color: #555;
            margin-bottom: 20px;
        }
        #job-description {
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
        #salary-range {
            font-weight: bold;
            margin-bottom: 20px;
        }
        #apply-now-button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #28a745;
            background-color: #28a745;
            color: white;
        }
        #apply-now-button:hover {
            background-color: #218838;
            border-color: #1e7e34;
        }
        #back-to-listings {
            margin-top: 20px;
            padding: 8px 15px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #6c757d;
            background-color: #6c757d;
            color: white;
        }
        #back-to-listings:hover {
            background-color: #5a6268;
            border-color: #5a6268;
        }
    </style>
</head>
<body>
<div id="job-details-page">
    <h1 id="job-title">{{ job.title }}</h1>
    <div id="company-name">{{ company_name }}</div>
    <div id="job-description">{{ job.description }}</div>
    <div id="salary-range">Salary Range: ${{ job.salary_min }} - ${{ job.salary_max }}</div>
    <form action="{{ url_for('application_form', job_id=job.job_id) }}" method="get">
        <button type="submit" id="apply-now-button">Apply Now</button>
    </form>
    <button id="back-to-listings" onclick="location.href='{{ url_for('job_listings') }}'">Back to Job Listings</button>
</div>
</body>
</html>
