<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="article-details-page">
    <h1 id="article-title">{{ article.title }}</h1>
    <div id="article-author">By {{ article.author }}</div>
    <div id="article-date">Published on {{ article.date }}</div>
    <form method="post" action="{{ url_for('bookmark_article', article_id=article.article_id) }}">
        {% if is_bookmarked %}
            <button type="submit" id="bookmark-button" disabled>Bookmarked</button>
        {% else %}
            <button type="submit" id="bookmark-button">Bookmark</button>
        {% endif %}
    </form>
    <div id="article-content">
        <p>{{ article.content }}</p>
    </div>
    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
