<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="bookmarks-page">
    <h1>My Bookmarks</h1>
    <div id="bookmarks-list">
        {% if bookmarks %}
            <ul>
                {% for bookmark in bookmarks %}
                    <li>
                        <div>
                            <strong>{{ bookmark.article_title }}</strong> ({{ bookmark.bookmarked_date }})
                        </div>
                        <form method="post" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}" style="display:inline;">
                            <button type="submit" id="remove-bookmark-button-{{ bookmark.bookmark_id }}">Remove</button>
                        </form>
                        <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('read_bookmarked_article', bookmark_id=bookmark.bookmark_id) }}'">Read</button>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No bookmarks found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
