<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="category-page">
    <h1 id="category-title">{{ category_title }}</h1>
    <div>
        <button id="sort-by-date" onclick="location.href='{{ url_for('category_page', category_name=category_title, sort='date') }}'">Sort by Date</button>
        <button id="sort-by-popularity" onclick="location.href='{{ url_for('category_page', category_name=category_title, sort='popularity') }}'">Sort by Popularity</button>
    </div>
    <div id="category-articles">
        {% if category_articles %}
            <ul>
                {% for article in category_articles %}
                    <li>
                        <a href="{{ url_for('article_details', article_id=article.article_id) }}">{{ article.title }}</a>
                        <div>By {{ article.author }} | {{ article.date }} | Views: {{ article.views }}</div>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No articles found in this category.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
