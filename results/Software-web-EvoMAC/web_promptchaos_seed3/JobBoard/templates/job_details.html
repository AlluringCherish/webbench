<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>{{ job.title }} - Job Details - JobBoard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
        #job-details-page { border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        h1 { margin-bottom: 5px; }
        #company-name { font-weight: bold; color: #555; margin-bottom: 15px; }
        #description { margin-bottom: 15px; white-space: pre-wrap; }
        #salary-range { color: green; margin-bottom: 15px; }
        #location { font-style: italic; color: #777; margin-bottom: 15px; }
        button { padding: 10px 20px; font-size: 1em; cursor: pointer; }
    </style>
</head>
<body>
    <div id="job-details-page">
        <h1 id="job-title">{{ job.title }}</h1>
        <div id="company-name">{{ job.company_name }}</div>
        <div id="location">{{ job.location }}</div>
        <div id="salary-range">${{ "{:,}".format(job.salary_min) }} - ${{ "{:,}".format(job.salary_max) }}</div>
        <div id="description">{{ job.description }}</div>
        <button id="apply-now-button" onclick="location.href='{{ url_for('application_form.apply', job_id=job.job_id) }}'">Apply Now</button>
    </div>
</body>
</html>
