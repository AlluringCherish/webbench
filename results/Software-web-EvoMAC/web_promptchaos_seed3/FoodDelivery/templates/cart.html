'''
Shopping Cart Page HTML structure for FoodDelivery web application.
Contains the container div, table for cart items, total amount display, and proceed to checkout button.
'''
<div id="cart-page">
  <h1>Shopping Cart</h1>
  <table id="cart-items-table" aria-label="Shopping Cart Items">
    <thead>
      <tr>
        <th scope="col">Item Code</th>
        <th scope="col">Name</th>
        <th scope="col">Description</th>
        <th scope="col">Price</th>
        <th scope="col">Quantity</th>
        <th scope="col">Subtotal</th>
        <th scope="col">Actions</th>
      </tr>
    </thead>
    <tbody id="cart-items-body">
      <!-- Cart items will be dynamically inserted here -->
    </tbody>
  </table>
  <div id="cart-summary" aria-live="polite" style="margin-top: 1em;">
    <strong>Total: $<span id="total-amount">0.00</span></strong>
  </div>
  <button id="proceed-checkout-button" aria-label="Proceed to Checkout">Proceed to Checkout</button>
</div>
