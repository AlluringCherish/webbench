<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <form method="get" action="{{ url_for('venues_page') }}">
            <input type="text" id="venue-search-input" name="search" placeholder="Search by name or location" value="{{ search_query }}">
            <select id="venue-capacity-filter" name="capacity">
                <option value="">All Capacities</option>
                <option value="Small" {% if capacity_filter == 'Small' %}selected{% endif %}>Small (&lt; 500)</option>
                <option value="Medium" {% if capacity_filter == 'Medium' %}selected{% endif %}>Medium (500 - 1999)</option>
                <option value="Large" {% if capacity_filter == 'Large' %}selected{% endif %}>Large (2000+)</option>
            </select>
            <button type="submit">Search/Filter</button>
            <button type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
        <div id="venues-grid">
            {% if venues %}
                <ul>
                    {% for venue in venues %}
                        <li>
                            <div class="venue-card">
                                <h3>{{ venue.venue_name }}</h3>
                                <p>Location: {{ venue.location }}</p>
                                <p>Capacity: {{ venue.capacity }}</p>
                                <p>Amenities: {{ venue.amenities }}</p>
                                <button id="view-venue-details-{{ venue.venue_id }}" onclick="alert('Venue details not implemented.')">View Details</button>
                            </div>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No venues found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
