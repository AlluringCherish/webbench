<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <form method="post" action="{{ url_for('user_profile') }}">
            <label for="profile-email">Email:</label><br>
            <input type="email" id="profile-email" name="profile-email" value="{{ user.email }}" required><br><br>
            <label for="profile-fullname">Full Name:</label><br>
            <input type="text" id="profile-fullname" name="profile-fullname" value="{{ user.fullname }}" required><br><br>
            <button id="update-profile-button" type="submit">Save Changes</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
