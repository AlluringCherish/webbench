<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ username }}!</h1>
        <h2>Featured Books</h2>
        <div id="featured-books" style="display: flex; gap: 20px;">
            {% for book in featured_books %}
            <div class="book-card" style="border: 1px solid #ccc; padding: 10px; width: 200px;">
                <div class="book-cover" style="height: 250px; background-color: #eee; margin-bottom: 10px; display: flex; align-items: center; justify-content: center;">
                    <img src="{{ url_for('static', filename='images/' + book.book_id + '.jpg') }}" alt="{{ book.title }} cover" style="max-height: 100%; max-width: 100%;">
                </div>
                <div class="book-info">
                    <h3>{{ book.title }}</h3>
                    <p><strong>Author:</strong> {{ book.author }}</p>
                    <p><strong>Status:</strong> {{ book.status }}</p>
                    <p><strong>Avg. Rating:</strong> {{ "%.1f"|format(book.avg_rating) }}</p>
                    <form action="{{ url_for('book_details', book_id=book.book_id) }}" method="get">
                        <button type="submit" id="view-book-button-{{ book.book_id }}">View Details</button>
                    </form>
                </div>
            </div>
            {% else %}
            <p>No featured books available.</p>
            {% endfor %}
        </div>
        <div style="margin-top: 30px;">
            <form action="{{ url_for('book_catalog') }}" method="get" style="display: inline;">
                <button type="submit" id="browse-books-button">Browse Books</button>
            </form>
            <form action="{{ url_for('my_borrowings') }}" method="get" style="display: inline; margin-left: 10px;">
                <button type="submit" id="my-borrows-button">My Borrowings</button>
            </form>
        </div>
    </div>
</body>
</html>
