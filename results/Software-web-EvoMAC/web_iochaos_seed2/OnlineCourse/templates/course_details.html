<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div id="{{ course_details_page_id }}">
    <h1 id="course-title">{{ course_title }}</h1>
    <div id="course-description">{{ course_description }}</div>
    <form method="post" action="{{ url_for('course_details', course_id=request.view_args.course_id) }}">
        {% if enrolled %}
            <button id="enroll-button" type="submit" disabled>Already Enrolled</button>
        {% else %}
            <button id="enroll-button" type="submit">Enroll</button>
        {% endif %}
    </form>
    <button id="back-to-catalog" onclick="location.href='{{ url_for('course_catalog') }}'">Back to Catalog</button>
</div>
</body>
</html>
