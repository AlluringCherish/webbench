<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Devices</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #device-list-page { max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        button { padding: 6px 12px; cursor: pointer; }
    </style>
</head>
<body>
<div id="device-list-page">
    <h1>My Devices</h1>
    <table id="device-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Room</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for device in devices %}
            <tr>
                <td>{{ device.device_name }}</td>
                <td>{{ device.device_type }}</td>
                <td>{{ device.room }}</td>
                <td>{{ device.status }}</td>
                <td>
                    <button id="control-device-button-{{ device.device_id }}" 
                            onclick="location.href='{{ url_for('device_control', device_id=device.device_id) }}'">
                        Control
                    </button>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="5">No devices found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
