<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="create-article-page" class="page-container">
        <header>
            <h1>Create New Article</h1>
        </header>
        <form action="{{ url_for('create_article') }}" method="post">
            <label for="article-title">Article Title</label>
            <input type="text" id="article-title" name="title" required value="{{ title|default('') }}">
            <label for="article-content">Content</label>
            <textarea id="article-content" name="content" required>{{ content|default('') }}</textarea>
            <div class="form-actions">
                <button type="submit" id="save-draft-button" name="action" value="save_draft" class="button">Save as Draft</button>
                <a href="{{ url_for('dashboard') }}" id="cancel-button" class="button">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
