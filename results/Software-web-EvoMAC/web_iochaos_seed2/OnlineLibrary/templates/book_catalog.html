<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>
        <form method="post" action="{{ url_for('book_catalog') }}">
            <input type="text" id="search-input" name="search-input" placeholder="Search by title or author" value="{{ search_query }}">
            <button type="submit">Search</button>
        </form>
        <div id="book-grid" class="book-grid" style="margin-top: 20px;">
            {% if books %}
                {% for book in books %}
                    <div class="book-card">
                        <div class="book-cover">
                            <img src="{{ url_for('static', filename='images/' + book.book_id + '.jpg') }}" alt="Cover of {{ book.title }}" onerror="this.onerror=null;this.src='{{ url_for('static', filename='images/default_cover.jpg') }}';">
                        </div>
                        <div class="book-info">
                            <h3>{{ book.title }}</h3>
                            <p>by {{ book.author }}</p>
                            <p>Status: <span class="status-{{ book.status }}">{{ book.status }}</span></p>
                            <p>Avg. Rating: {{ book.avg_rating }}</p>
                            <form action="{{ url_for('book_details', book_id=book.book_id) }}" method="get">
                                <button type="submit" id="view-book-button-{{ book.book_id }}">View Details</button>
                            </form>
                        </div>
                    </div>
                {% endfor %}
            {% else %}
                <p>No books found.</p>
            {% endif %}
        </div>
        <form action="{{ url_for('dashboard') }}" method="get" style="margin-top: 20px;">
            <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
