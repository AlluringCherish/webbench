<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="borrow-page">
        <h1>Borrow Confirmation</h1>
        <div id="borrow-book-info">
            <h2>{{ book.title }}</h2>
            <p><strong>Author:</strong> {{ book.author }}</p>
            <p><strong>ISBN:</strong> {{ book.isbn }}</p>
            <p><strong>Genre:</strong> {{ book.genre }}</p>
            <p><strong>Publisher:</strong> {{ book.publisher }}</p>
            <p><strong>Year:</strong> {{ book.year }}</p>
        </div>
        <div id="due-date-display" style="margin-top: 15px;">
            <strong>Due Date for Return:</strong> {{ due_date.strftime('%Y-%m-%d') }}
        </div>
        <form method="post" style="margin-top: 20px;">
            <button type="submit" name="confirm-borrow-button" id="confirm-borrow-button">Confirm Borrowing</button>
            <button type="submit" name="cancel-borrow-button" id="cancel-borrow-button" style="margin-left: 10px;">Cancel</button>
        </form>
    </div>
</body>
</html>
