<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <h1>Trainer Profiles</h1>
        <div>
            <input id="trainer-search" type="text" placeholder="Search trainers by name or specialty" value="{{ search_query }}" onkeydown="if(event.key === 'Enter'){ applyFilters(); }">
            <select id="specialty-filter" onchange="applyFilters()">
                <option value="">All Specialties</option>
                <option value="Strength" {% if filter_specialty == 'strength' %}selected{% endif %}>Strength</option>
                <option value="Cardio" {% if filter_specialty == 'cardio' %}selected{% endif %}>Cardio</option>
                <option value="Flexibility" {% if filter_specialty == 'flexibility' %}selected{% endif %}>Flexibility</option>
                <option value="Weight Loss" {% if filter_specialty == 'weight loss' %}selected{% endif %}>Weight Loss</option>
            </select>
        </div>
        <div id="trainers-grid">
            {% for trainer in trainers %}
                <div>
                    <img src="https://via.placeholder.com/100" alt="Photo of {{ trainer.name }}">
                    <h3>{{ trainer.name }}</h3>
                    <p>Expertise: {{ trainer.specialty }}</p>
                    <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="location.href='{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}'">View Profile</button>
                </div>
            {% else %}
                <p>No trainers found.</p>
            {% endfor %}
        </div>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
    <script>
        function applyFilters() {
            const search = document.getElementById('trainer-search').value.trim();
            const filter = document.getElementById('specialty-filter').value;
            let url = '{{ url_for("trainer_profiles") }}';
            let params = [];
            if (search) {
                params.push('search=' + encodeURIComponent(search));
            }
            if (filter) {
                params.push('filter=' + encodeURIComponent(filter));
            }
            if (params.length > 0) {
                url += '?' + params.join('&');
            }
            window.location.href = url;
        }
    </script>
</body>
</html>
