<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Personal Training</title>
</head>
<body>
    <div id="booking-page">
        <h1>Book Personal Training</h1>
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('pt_booking') }}">
            <label for="select-trainer">Select Trainer:</label>
            <select id="select-trainer" name="select-trainer" required>
                <option value="">-- Select Trainer --</option>
                {% for trainer in trainers %}
                    <option value="{{ trainer.trainer_id }}">{{ trainer.name }} ({{ trainer.specialty }})</option>
                {% endfor %}
            </select>
            <br><br>
            <label for="session-date">Session Date:</label>
            <input id="session-date" name="session-date" type="date" required>
            <br><br>
            <label for="session-time">Session Time:</label>
            <select id="session-time" name="session-time" required>
                <option value="">-- Select Time --</option>
                <option value="06:00">06:00</option>
                <option value="07:00">07:00</option>
                <option value="08:00">08:00</option>
                <option value="09:00">09:00</option>
                <option value="10:00">10:00</option>
                <option value="11:00">11:00</option>
                <option value="12:00">12:00</option>
                <option value="13:00">13:00</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
            </select>
            <br><br>
            <label for="session-duration">Session Duration:</label>
            <select id="session-duration" name="session-duration" required>
                <option value="">-- Select Duration --</option>
                <option value="30">30 minutes</option>
                <option value="60">60 minutes</option>
                <option value="90">90 minutes</option>
            </select>
            <br><br>
            <button id="confirm-booking-button" type="submit">Confirm Booking</button>
        </form>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
