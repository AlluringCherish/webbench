<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">Price: ${{ plan.price }} / {{ plan.billing_cycle }}</div>
        <div id="plan-features">Features: {{ plan.features }}</div>
        <button id="enroll-plan-button" onclick="alert('Enrollment functionality not implemented.')">Enroll in Plan</button>
        <div id="plan-reviews">
            <h3>Member Reviews</h3>
            {% if plan_reviews %}
                <ul>
                    {% for review in plan_reviews %}
                        <li>{{ review }}</li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No reviews available.</p>
            {% endif %}
        </div>
        <button onclick="location.href='{{ url_for('membership_plans') }}'">Back to Membership Plans</button>
    </div>
</body>
</html>
