<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
</head>
<body>
    <div id="log-workout-page">
        <h1>Log Workout</h1>
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
        <form method="post" action="{{ url_for('log_workout') }}">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout-type" required>
                <option value="">-- Select Workout Type --</option>
                <option value="Cardio">Cardio</option>
                <option value="Strength">Strength</option>
                <option value="Flexibility">Flexibility</option>
                <option value="Sports">Sports</option>
            </select>
            <br><br>
            <label for="workout-duration">Duration (minutes):</label>
            <input id="workout-duration" name="workout-duration" type="number" min="1" required>
            <br><br>
            <label for="calories-burned">Calories Burned:</label>
            <input id="calories-burned" name="calories-burned" type="number" min="0" required>
            <br><br>
            <label for="workout-notes">Notes:</label>
            <br>
            <textarea id="workout-notes" name="workout-notes" rows="4" cols="50"></textarea>
            <br><br>
            <button id="submit-workout-button" type="submit">Submit Workout Record</button>
        </form>
        <button onclick="location.href='{{ url_for('workout_records') }}'">Back to Workout Records</button>
    </div>
</body>
</html>
