<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RestaurantReservation</title>
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <!-- Dashboard Page -->
    <div id="dashboard-page" class="page">
        <h1 id="welcome-message">Welcome, User</h1>
        <button id="make-reservation-button" onclick="location.href='/make-reservation'">Make Reservation</button>
        <button id="view-menu-button" onclick="location.href='/menu'">View Menu</button>
        <button id="back-to-dashboard" onclick="location.href='/'">Refresh</button>
        <button id="my-reservations-button" onclick="location.href='/my-reservations'">My Reservations</button>
        <button id="my-reviews-button" onclick="location.href='/my-reviews'">My Reviews</button>
        <button id="waitlist-button" onclick="location.href='/waitlist'">Waitlist</button>
        <button id="profile-button" onclick="location.href='/profile'">Profile</button>
    </div>
    <!-- Menu Page -->
    <div id="menu-page" class="page" style="display:none;">
        <h1>Restaurant Menu</h1>
        <div id="menu-grid" class="grid"></div>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
    <!-- Dish Details Page -->
    <div id="dish-details-page" class="page" style="display:none;">
        <h1 id="dish-name"></h1>
        <div id="dish-price"></div>
        <div id="dish-description"></div>
        <div id="dish-ingredients"></div>
        <div id="dish-dietary"></div>
        <button id="back-to-menu" onclick="location.href='/menu'">Back to Menu</button>
    </div>
    <!-- Make Reservation Page -->
    <div id="reservation-page" class="page" style="display:none;">
        <h1>Make Reservation</h1>
        <form id="reservation-form" method="post" action="/make-reservation">
            <label for="guest-name">Guest Name:</label>
            <input type="text" id="guest-name" name="guest_name" required />
            <label for="party-size">Party Size (1-10):</label>
            <select id="party-size" name="party_size" required>
                <option value="" disabled selected>Select party size</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option>
            </select>
            <label for="reservation-date">Reservation Date:</label>
            <input type="date" id="reservation-date" name="reservation_date" required />
            <label for="special-requests">Special Requests:</label>
            <input type="text" id="special-requests" name="special_requests" />
            <button id="submit-reservation-button" type="submit">Submit Reservation</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
    <!-- My Reservations Page -->
    <div id="my-reservations-page" class="page" style="display:none;">
        <h1>My Reservations</h1>
        <table id="reservations-table" border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Party Size</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <!-- Reservations will be dynamically inserted here -->
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
    <!-- Waitlist Page -->
    <div id="waitlist-page" class="page" style="display:none;">
        <h1>Waitlist</h1>
        <form id="waitlist-form" method="post" action="/waitlist">
            <label for="waitlist-party-size">Select Party Size:</label>
            <select id="waitlist-party-size" name="party_size" required>
                <option value="" disabled selected>Select party size</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option>
            </select>
            <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        </form>
        <div id="user-position"></div>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
    <!-- My Reviews Page -->
    <div id="reviews-page" class="page" style="display:none;">
        <h1>My Reviews</h1>
        <div id="reviews-list">
            <!-- Reviews will be dynamically inserted here -->
        </div>
        <button id="write-new-review-button" onclick="location.href='/write-review'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
    <!-- Write Review Page -->
    <div id="write-review-page" class="page" style="display:none;">
        <h1>Write Review</h1>
        <form id="write-review-form" method="post" action="/write-review">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id" required>
                <!-- Dish options will be dynamically inserted here -->
            </select>
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                <option value="" disabled selected>Select rating</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option>
            </select>
            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" rows="4" required></textarea>
            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-reviews" onclick="location.href='/my-reviews'">Back to Reviews</button>
    </div>
    <!-- User Profile Page -->
    <div id="profile-page" class="page" style="display:none;">
        <h1>My Profile</h1>
        <div id="profile-username"></div>
        <form id="profile-form" method="post" action="/profile">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" required />
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
    <script src="/app.js"></script>
</body>
</html>
