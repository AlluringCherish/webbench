'''
Book Catalog page for BookstoreOnline web application.
Allows searching and filtering books by category.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>
        <input type="text" id="search-input" placeholder="Search by title, author, or ISBN">
        <select id="category-filter">
            <option value="">All Categories</option>
            <option value="Fiction">Fiction</option>
            <option value="Non-Fiction">Non-Fiction</option>
            <option value="Science">Science</option>
            <option value="History">History</option>
            <!-- Add other categories as needed -->
        </select>
        <div id="books-grid">
            <!-- Book cards will be dynamically inserted here -->
        </div>
    </div>
</body>
</html>
