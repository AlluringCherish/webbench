'''
Dashboard page for BookstoreOnline web application.
Contains featured books section and navigation buttons to catalog, cart, and order history.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookstore Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Bookstore Dashboard</h1>
        <div id="featured-books">
            <h2>Featured Books</h2>
            <!-- Featured books will be dynamically inserted here -->
        </div>
        <button id="browse-catalog-button" onclick="location.href='book_catalog.html'">Browse Catalog</button>
        <button id="view-cart-button" onclick="location.href='cart.html'">View Cart</button>
        <button id="order-history-button" onclick="location.href='order_history.html'">Order History</button>
    </div>
</body>
</html>
