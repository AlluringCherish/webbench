'''
Checkout page for BookstoreOnline web application.
Allows users to enter shipping information and complete purchase.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>
        <form>
            <label for="customer-name">Name:</label>
            <input type="text" id="customer-name" name="customer-name" required><br><br>
            <label for="shipping-address">Shipping Address:</label><br>
            <textarea id="shipping-address" name="shipping-address" rows="4" cols="50" required></textarea><br><br>
            <label for="payment-method">Payment Method:</label>
            <select id="payment-method" name="payment-method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select><br><br>
            <button id="place-order-button" type="submit">Confirm and Place Order</button>
        </form>
    </div>
</body>
</html>
