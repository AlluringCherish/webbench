'''
Customer Reviews page for BookstoreOnline web application.
Displays all customer reviews and allows writing new reviews.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Customer Reviews</h1>
        <div id="reviews-list">
            <!-- Reviews will be displayed here -->
        </div>
        <select id="filter-by-rating">
            <option value="all">All Ratings</option>
            <option value="5">5 Stars</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
        </select>
        <button id="write-review-button" onclick="location.href='write_review.html'">Write a Review</button>
        <button id="back-to-dashboard" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>
</body>
</html>
