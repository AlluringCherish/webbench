'''
Order History page for BookstoreOnline web application.
Displays previous orders with tracking information.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
    <div id="orders-page">
        <h1>Order History</h1>
        <table id="orders-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                <!-- Orders will be dynamically inserted here -->
            </tbody>
        </table>
        <select id="order-status-filter">
            <option value="All">All</option>
            <option value="Pending">Pending</option>
            <option value="Shipped">Shipped</option>
            <option value="Delivered">Delivered</option>
        </select>
        <button id="back-to-dashboard" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>
</body>
</html>
