'''
Bestsellers page for BookstoreOnline web application.
Displays top-selling books ranked by sales with time period filter.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
    <div id="bestsellers-page">
        <h1>Bestsellers</h1>
        <div id="bestsellers-list">
            <!-- Bestselling books list will be dynamically inserted here -->
        </div>
        <select id="time-period-filter">
            <option value="This Week">This Week</option>
            <option value="This Month">This Month</option>
            <option value="All Time">All Time</option>
        </select>
        <button id="back-to-dashboard" onclick="location.href='dashboard.html'">Back to Dashboard</button>
    </div>
</body>
</html>
