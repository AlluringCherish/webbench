'''
Shopping Cart page for BookstoreOnline web application.
Displays cart items with quantity management and checkout option.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Your Cart</h1>
        <table id="cart-items-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody>
                <!-- Cart items will be dynamically inserted here -->
            </tbody>
        </table>
        <div id="total-amount">
            Total: $<span id="total-amount-value">0.00</span>
        </div>
        <button id="proceed-checkout-button" onclick="location.href='checkout.html'">Proceed to Checkout</button>
    </div>
</body>
</html>
