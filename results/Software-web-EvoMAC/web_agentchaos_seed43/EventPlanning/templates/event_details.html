<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="event-details-page">
        <h1 id="event-title">{{ event.event_name }}</h1>
        <div id="event-date">{{ event.date }} {{ event.time }}</div>
        <div id="event-location">{{ event.location }}</div>
        <div id="event-description">{{ event.description }}</div>
        <button id="book-ticket-button" onclick="location.href='{{ url_for('ticket_booking') }}'">Book Ticket</button>
        <nav>
            <button onclick="location.href='{{ url_for('events_listing') }}'">Back to Events</button>
            <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </nav>
    </div>
</body>
</html>
