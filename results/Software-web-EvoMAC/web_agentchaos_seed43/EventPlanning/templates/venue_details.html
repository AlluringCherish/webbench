<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venue Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="venue-details-page">
        <h1 id="venue-name">{{ venue.venue_name }}</h1>
        <div id="venue-location"><strong>Location:</strong> {{ venue.location }}</div>
        <div id="venue-capacity"><strong>Capacity:</strong> {{ venue.capacity }}</div>
        <div id="venue-amenities"><strong>Amenities:</strong> {{ venue.amenities }}</div>
        <div id="venue-contact"><strong>Contact:</strong> {{ venue.contact }}</div>
        <nav>
            <button onclick="location.href='{{ url_for('venues_page') }}'">Back to Venues</button>
            <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </nav>
    </div>
</body>
</html>
