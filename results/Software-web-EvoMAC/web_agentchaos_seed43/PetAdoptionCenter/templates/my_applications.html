<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>
        <form method="get" action="{{ url_for('my_applications') }}">
            <input type="hidden" name="username" value="{{ username }}">
            <label for="filter-status">Filter by Status:</label>
            <select id="filter-status" name="status" onchange="this.form.submit()">
                <option value="All" {% if filter_status == 'All' %}selected{% endif %}>All</option>
                <option value="Pending" {% if filter_status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Approved" {% if filter_status == 'Approved' %}selected{% endif %}>Approved</option>
                <option value="Rejected" {% if filter_status == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
        </form>
        <table id="applications-table" border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>Pet Name</th>
                    <th>Date Submitted</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% if applications %}
                    {% for app in applications %}
                        <tr>
                            <td>{{ app.pet_name }}</td>
                            <td>{{ app.date_submitted }}</td>
                            <td>{{ app.status }}</td>
                            <td>
                                <a href="{{ url_for('pet_details', pet_id=app.pet_id) }}">View Pet</a>
                            </td>
                        </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="4">No applications found.</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('back_to_dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
