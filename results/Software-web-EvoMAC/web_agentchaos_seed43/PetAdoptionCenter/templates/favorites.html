<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>
        <div id="favorites-grid" class="pet-cards">
            {% if favorites %}
                {% for pet in favorites %}
                    <div class="pet-card">
                        <h3>{{ pet.name }}</h3>
                        <p><strong>Species:</strong> {{ pet.species }}</p>
                        <p><strong>Age:</strong> {{ pet.age }}</p>
                        <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">View Details</a>
                    </div>
                {% endfor %}
            {% else %}
                <p>You have no favorite pets saved.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('back_to_dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
