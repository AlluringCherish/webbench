<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Details</title>
    <style>
        #movie-details-page {
            max-width: 700px;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        #movie-title {
            font-size: 2em;
            margin-bottom: 10px;
        }
        #movie-director, #movie-rating, #movie-description {
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        #select-showtime-button {
            padding: 10px 15px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: #007BFF;
            color: white;
        }
        #select-showtime-button:hover {
            background-color: #0056b3;
        }
        a.back-link {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        a.back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div id="movie-details-page">
    <a href="{{ url_for('movie_catalog') }}" class="back-link">&larr; Back to Catalog</a>
    <h1 id="movie-title">{{ movie.title }}</h1>
    <div id="movie-director"><strong>Director:</strong> {{ movie.director }}</div>
    <div id="movie-rating"><strong>Rating:</strong> {{ movie.rating }}</div>
    <div id="movie-description"><strong>Description:</strong> {{ movie.description }}</div>
    <form action="{{ url_for('showtime_selection', movie_id=movie.movie_id) }}" method="get">
        <button type="submit" id="select-showtime-button">Select Showtime</button>
    </form>
</div>
</body>
</html>
