<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
    <style>
        #confirmation-page {
            max-width: 700px;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        #booking-summary {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
            border-radius: 6px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            font-size: 1em;
            margin-top: 5px;
            box-sizing: border-box;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        #confirm-booking-button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 5px;
            border: none;
            background-color: #28a745;
            color: white;
        }
        #confirm-booking-button:hover {
            background-color: #1e7e34;
        }
        a.back-link {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: #007BFF;
            font-weight: bold;
        }
        a.back-link:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #dc3545;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div id="confirmation-page">
    <a href="{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}" class="back-link">&larr; Back to Seat Selection</a>
    <h1>Booking Confirmation</h1>
    <div id="booking-summary">
        <p><strong>Movie:</strong> {{ movie.title }}</p>
        <p><strong>Theater:</strong> {{ theater.theater_name }}</p>
        <p><strong>Showtime:</strong> {{ showtime.showtime_date }} {{ showtime.showtime_time }}</p>
        <p><strong>Seats:</strong> {{ selected_seats|join(', ') }}</p>
        <p><strong>Total Price:</strong> ${{ "%.2f"|format(total_price) }}</p>
    </div>
    <form method="post" action="{{ url_for('booking_confirmation', showtime_id=showtime.showtime_id) }}?seats={{ selected_seats|join(',') }}">
        <label for="customer-name">Name:</label>
        <input type="text" id="customer-name" name="customer_name" value="{{ customer_name }}" required>
        <label for="customer-email">Email:</label>
        <input type="email" id="customer-email" name="customer_email" value="{{ customer_email }}" required>
        <button type="submit" id="confirm-booking-button">Confirm Booking</button>
    </form>
</div>
</body>
</html>
