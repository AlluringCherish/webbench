'''
Payment Confirmation page template for OnlineLibrary.
Confirms payment of overdue fines.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
<div id="payment-page">
    <h1>Payment Confirmation</h1>
    <div id="fine-amount-display">
        <p>Fine Amount to Pay: ${{ "%.2f"|format(fine_amount) }}</p>
    </div>
    <form method="post" action="">
        <button type="submit" id="confirm-payment-button">Confirm Payment</button>
    </form>
    <button id="back-to-profile" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
</div>
</body>
</html>
