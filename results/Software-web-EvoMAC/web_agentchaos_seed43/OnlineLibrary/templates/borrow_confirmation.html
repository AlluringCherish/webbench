'''
Borrow Confirmation page template for OnlineLibrary.
Confirms borrowing details before finalizing the borrow.
'''
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
<div id="borrow-page">
    <h1>Borrow Confirmation</h1>
    <div id="borrow-book-info">
        <p><strong>Title:</strong> {{ book.title }}</p>
        <p><strong>Author:</strong> {{ book.author }}</p>
    </div>
    <div id="due-date-display">
        <p>Due Date: {{ due_date }}</p>
    </div>
    <form method="post" action="{{ url_for('borrow_confirmation', book_id=book.book_id) }}">
        <button type="submit" id="confirm-borrow-button">Confirm Borrow</button>
    </form>
    <button id="cancel-borrow-button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Cancel</button>
</div>
</body>
</html>
