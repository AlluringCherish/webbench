<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f8;
        }
        #activity-page {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        form {
            margin-bottom: 20px;
            text-align: center;
        }
        input[type="text"]#search-activity {
            padding: 8px 12px;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 300px;
            margin-right: 10px;
            transition: border-color 0.3s ease;
        }
        input[type="text"]#search-activity:focus {
            border-color: #007BFF;
            outline: none;
        }
        #apply-search-button {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 9px 18px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #apply-search-button:hover {
            background-color: #0056b3;
        }
        #activity-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #activity-table th, #activity-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #ddd;
            text-align: left;
            color: #555;
        }
        #activity-table th {
            background-color: #007BFF;
            color: white;
            font-weight: bold;
        }
        #activity-table tr:hover {
            background-color: #f1f9ff;
        }
        #back-to-dashboard {
            margin-top: 20px;
            background-color: #6c757d;
            border: none;
            color: white;
            padding: 10px 18px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            width: 150px;
            text-align: center;
            margin-left: auto;
            margin-right: auto;
            transition: background-color 0.3s ease;
        }
        #back-to-dashboard:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
<div id="activity-page">
    <h1>Activity Logs</h1>
    <form method="post" action="{{ url_for('activity_logs') }}">
        <input type="text" id="search-activity" name="search-activity" placeholder="Search activity logs..." value="{{ search_term }}">
        <button type="submit" id="apply-search-button">Search</button>
    </form>
    <table id="activity-table">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Device</th>
                <th>Action</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for log in activity_logs %}
            <tr>
                <td>{{ log.timestamp }}</td>
                <td>{{ device_names.get(log.device_id, 'Unknown Device') }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.details }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" style="text-align:center; color:#777;">No activity logs found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
