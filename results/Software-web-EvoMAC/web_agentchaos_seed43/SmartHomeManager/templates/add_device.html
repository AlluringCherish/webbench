<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Device</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f8;
        }
        #add-device-page {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus, select:focus {
            border-color: #007BFF;
            outline: none;
        }
        #submit-device-button {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }
        #submit-device-button:hover {
            background-color: #0056b3;
        }
        #back-to-dashboard {
            margin-top: 15px;
            background-color: #6c757d;
            border: none;
            color: white;
            padding: 10px 18px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s ease;
        }
        #back-to-dashboard:hover {
            background-color: #5a6268;
        }
    </style>
</head>
<body>
<div id="add-device-page">
    <h1>Add New Device</h1>
    <form method="post" action="{{ url_for('add_device') }}">
        <label for="device-name">Device Name</label>
        <input type="text" id="device-name" name="device-name" required>
        <label for="device-type">Device Type</label>
        <select id="device-type" name="device-type" required>
            <option value="" disabled selected>Select device type</option>
            <option value="Light">Light</option>
            <option value="Thermostat">Thermostat</option>
            <option value="Camera">Camera</option>
            <option value="Lock">Lock</option>
            <option value="Sensor">Sensor</option>
            <option value="Appliance">Appliance</option>
        </select>
        <label for="device-room">Room</label>
        <select id="device-room" name="device-room" required>
            <option value="" disabled selected>Select room</option>
            <option value="Living Room">Living Room</option>
            <option value="Bedroom">Bedroom</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Bathroom">Bathroom</option>
            <option value="Garage">Garage</option>
        </select>
        <button type="submit" id="submit-device-button">Add Device</button>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
