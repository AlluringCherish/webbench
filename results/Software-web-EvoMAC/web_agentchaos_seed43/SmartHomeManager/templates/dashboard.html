<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f8;
        }
        #dashboard-page {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #device-summary {
            background-color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            font-size: 1.1em;
            color: #444;
        }
        #device-summary div {
            text-align: center;
        }
        #device-summary div span.count {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #007BFF;
            margin-top: 5px;
        }
        #dashboard-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        #dashboard-buttons button {
            background-color: #007BFF;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #dashboard-buttons button:hover {
            background-color: #0056b3;
        }
        #room-list {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        #room-list h2 {
            margin-top: 0;
            color: #333;
            margin-bottom: 15px;
        }
        #room-list ul {
            list-style: none;
            padding-left: 0;
        }
        #room-list ul li {
            padding: 10px 15px;
            border-bottom: 1px solid #ddd;
            font-size: 1em;
            color: #555;
            display: flex;
            justify-content: space-between;
        }
        #room-list ul li:last-child {
            border-bottom: none;
        }
        #room-list ul li span.count {
            font-weight: bold;
            color: #007BFF;
        }
    </style>
</head>
<body>
<div id="dashboard-page">
    <h1>Smart Home Dashboard</h1>
    <div id="device-summary">
        <div>
            Total Devices
            <span class="count" id="total-devices">{{ total_devices }}</span>
        </div>
        <div>
            Active Devices
            <span class="count" id="active-devices">{{ active_devices }}</span>
        </div>
        <div>
            Offline Devices
            <span class="count" id="offline-devices">{{ offline_devices }}</span>
        </div>
    </div>
    <div id="dashboard-buttons">
        <button id="device-list-button" onclick="location.href='{{ url_for('device_list') }}'">Device List</button>
        <button id="add-device-button" onclick="location.href='{{ url_for('add_device') }}'">Add Device</button>
        <button id="automation-button" onclick="location.href='{{ url_for('automation_rules') }}'">Automation Rules</button>
        <button id="energy-button" onclick="location.href='{{ url_for('energy_report') }}'">Energy Report</button>
        <button id="activity-button" onclick="location.href='{{ url_for('activity_logs') }}'">Activity Logs</button>
    </div>
    <div id="room-list">
        <h2>Rooms and Device Counts</h2>
        <ul>
            {% for room_name, count in room_counts.items() %}
            <li>
                <span class="room-name">{{ room_name }}</span>
                <span class="count">{{ count }}</span>
            </li>
            {% else %}
            <li>No rooms found.</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
