<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <form method="post" action="/audio-guides/filter">
            <select id="filter-language" name="filter-language">
                <option value="">--All Languages--</option>
                <option value="English">English</option>
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
            </select>
            <button type="submit" id="apply-language-filter">Apply Filter</button>
        </form>
        <table id="audio-guide-list" border="1">
            <thead>
                <tr>
                    <th>Exhibit Number</th>
                    <th>Title</th>
                    <th>Language</th>
                    <th>Duration</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for guide in audio_guides %}
                <tr>
                    <td>{{ guide.exhibit_number }}</td>
                    <td>{{ guide.title }}</td>
                    <td>{{ guide.language }}</td>
                    <td>{{ guide.duration }}</td>
                    <td><button id="play-guide-button-{{ guide.guide_id }}">Play</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
