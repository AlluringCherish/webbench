<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
    <div id="artifact-catalog-page">
        <form method="post" action="/artifacts/search">
            <input type="text" id="search-artifact" name="search-artifact" placeholder="Search by ID or name">
            <button type="submit" id="apply-artifact-filter">Search</button>
        </form>
        <table id="artifact-table" border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Period</th>
                    <th>Origin</th>
                    <th>Exhibition</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for artifact in artifacts %}
                <tr>
                    <td>{{ artifact.artifact_id }}</td>
                    <td>{{ artifact.artifact_name }}</td>
                    <td>{{ artifact.period }}</td>
                    <td>{{ artifact.origin }}</td>
                    <td>{{ artifact.exhibition_title }}</td>
                    <td><!-- possible future action buttons --></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
