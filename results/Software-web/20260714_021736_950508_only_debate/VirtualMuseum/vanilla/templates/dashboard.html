<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Museum Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="exhibition-summary">
            <p>Total Exhibitions: {{ total_exhibitions }}</p>
            <p>Active Exhibitions: {{ active_exhibitions }}</p>
        </div>
        <button id="artifact-catalog-button" onclick="window.location.href='/artifacts'">Artifact Catalog</button>
        <button id="exhibitions-button" onclick="window.location.href='/exhibitions'">Exhibitions</button>
        <button id="visitor-tickets-button" onclick="window.location.href='/tickets'">Visitor Tickets</button>
        <button id="virtual-events-button" onclick="window.location.href='/events'">Virtual Events</button>
        <button id="audio-guides-button" onclick="window.location.href='/audio-guides'">Audio Guides</button>
    </div>
</body>
</html>
