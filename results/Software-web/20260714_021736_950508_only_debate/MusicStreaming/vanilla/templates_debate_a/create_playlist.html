<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Playlist</title>
</head>
<body>
<div id="create-playlist-page">
    <h1>Create Playlist</h1>
    {% if errors %}
    <ul style="color:red;">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <form method="POST" action="/playlists/create">
        <input id="playlist-name-input" name="playlist_name" type="text" placeholder="Playlist Name">
        <textarea id="playlist-description-input" name="playlist_description" placeholder="Description"></textarea>
        <button id="save-playlist-button" type="submit">Save Playlist</button>
        <button id="cancel-create-button" type="button" onclick="window.location.href='/playlists'">Cancel</button>
    </form>
</div>
</body>
</html>
