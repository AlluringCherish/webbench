<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profile</title>
</head>
<body>
<div id="artist-profile-page">
    <h1>{{ artist.name }}</h1>
    <h2>Songs</h2>
    <ul>
        {% for song in songs %}
        <li>{{ song.title }}</li>
        {% endfor %}
    </ul>
    <h2>Albums</h2>
    <ul>
        {% for album in albums %}
        <li>{{ album.title }} ({{ album.release_year }})</li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
