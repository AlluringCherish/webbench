<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genres</title>
</head>
<body>
<div id="genres-page">
    <h1>Genres</h1>
    <form method="POST" action="/genres">
        <select id="select-genre" name="selected_genre">
            <option value="">Select Genre</option>
            {% for genre in genres %}
            <option value="{{ genre }}" {% if genre == selected_genre %}selected{% endif %}>{{ genre }}</option>
            {% endfor %}
        </select>
        <button type="submit">Explore</button>
    </form>
    <div id="genre-songs">
        <ul>
        {% for song in genre_songs %}
            <li>{{ song.title }}</li>
        {% endfor %}
        </ul>
    </div>
    <div id="genre-artists">
        <ul>
        {% for artist in genre_artists %}
            <li>{{ artist.name }}</li>
        {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
