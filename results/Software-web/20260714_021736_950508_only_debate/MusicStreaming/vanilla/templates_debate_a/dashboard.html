<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Dashboard</h1>
    <div id="featured-songs">
        <h2>Featured Songs</h2>
        <ul>
            {% for song in featured_songs %}
            <li>{{ song.title }} ({{ song.genre }})</li>
            {% endfor %}
        </ul>
    </div>

    <div>
        <button id="browse-songs-button" onclick="window.location.href='/songs'">Browse Songs</button>
        <button id="my-playlists-button" onclick="window.location.href='/playlists'">My Playlists</button>
        <button id="trending-artists-button" onclick="window.location.href='/artists'">Trending Artists</button>
    </div>
</div>
</body>
</html>
