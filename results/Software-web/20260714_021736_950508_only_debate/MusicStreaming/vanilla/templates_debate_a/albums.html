<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>
    <form method="POST" action="/albums">
        <input id="search-albums" name="search_albums" type="text" placeholder="Search albums..." value="{{ search_albums }}">
        <select id="sort-albums" name="sort_albums">
            <option value="">Sort By</option>
            <option value="title" {% if sort_albums == 'title' %}selected{% endif %}>Title</option>
            <option value="release_year" {% if sort_albums == 'release_year' %}selected{% endif %}>Release Year</option>
        </select>
        <button type="submit">Apply</button>
    </form>
    <div id="albums-grid">
        <ul>
            {% for album in albums %}
            <li>
                {{ album.title }} ({{ album.release_year }})
                <button id="view-album-button-{{ album.album_id }}" onclick="window.location.href='/albums/{{ album.album_id }}'">View</button>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
