<!DOCTYPE html>
<html lang="en">
<head>
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>
    <form method="get" action="{{ url_for('songs_catalog') }}">
        <input id="search-input" name="search_query" type="text" placeholder="Search songs..." value="{{ search_query }}">
        <select id="genre-filter" name="genre_filter">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}" {% if genre == genre_filter %}selected{% endif %}>{{ genre }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="songs-grid">
        {% for song in songs %}
        <div>
            <div>{{ song.title }}</div>
            <div>Genre: {{ song.genre }}</div>
            <form method="post" action="{{ url_for('songs_catalog') }}">
                <input type="hidden" name="song_id" value="{{ song.song_id }}">
                <button id="add-to-playlist-button-{{ song.song_id }}" type="submit">Add to Playlist</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
