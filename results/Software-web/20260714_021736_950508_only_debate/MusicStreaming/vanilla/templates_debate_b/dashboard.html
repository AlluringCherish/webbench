<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Dashboard</h1>
    <div id="featured-songs">
        <h2>Featured Songs</h2>
        <ul>
            {% for song in featured_songs %}
            <li>{{ song.title }} by Artist ID {{ song.artist_id }}</li>
            {% endfor %}
        </ul>
    </div>

    <button id="browse-songs-button" onclick="location.href='{{ url_for('songs_catalog') }}'">Browse Songs</button>
    <button id="my-playlists-button" onclick="location.href='{{ url_for('playlists') }}'">My Playlists</button>
    <button id="trending-artists-button" onclick="location.href='{{ url_for('artists') }}'">Trending Artists</button>
</div>
</body>
</html>
