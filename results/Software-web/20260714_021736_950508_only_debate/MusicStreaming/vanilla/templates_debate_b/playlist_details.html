<!DOCTYPE html>
<html lang="en">
<head>
    <title>Playlist Details</title>
</head>
<body>
<div id="playlist-details-page">
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>

    <form method="post" action="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
        <table id="songs-in-playlist">
            <thead>
                <tr><th>Title</th><th>Action</th></tr>
            </thead>
            <tbody>
            {% for song in songs %}
                <tr>
                    <td>{{ song.title }}</td>
                    <td>
                        <button id="remove-song-button-{{ song.song_id }}" name="song_id" type="submit" value="{{ song.song_id }}">Remove</button>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <button id="delete-playlist-button" name="delete" value="true" type="submit">Delete Playlist</button>
    </form>
</div>
</body>
</html>
