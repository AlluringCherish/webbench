<!DOCTYPE html>
<html lang="en">
<head>
    <title>Song Details</title>
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name">
        <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">{{ artist.name }}</a>
    </div>
    <div id="album-name">{{ album.title if album else 'Unknown Album' }}</div>
    <div id="duration-display">Duration: {{ song.duration }} seconds</div>
    <button id="play-button">Play</button>
</div>
</body>
</html>
