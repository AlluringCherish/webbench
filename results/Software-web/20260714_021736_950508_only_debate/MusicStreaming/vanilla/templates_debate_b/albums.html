<!DOCTYPE html>
<html lang="en">
<head>
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>
    <form method="get" action="{{ url_for('albums') }}">
        <input id="search-albums" name="search_albums" type="text" value="{{ search_albums }}" placeholder="Search albums...">
        <select id="sort-albums" name="sort_albums">
            <option value="">Sort By</option>
            <option value="title" {% if sort_albums == 'title' %}selected{% endif %}>Title</option>
            <option value="release_year" {% if sort_albums == 'release_year' %}selected{% endif %}>Release Year</option>
        </select>
        <button type="submit">Search</button>
    </form>
    <div id="albums-grid">
        {% for album in albums %}
        <div>
            <span>{{ album.title }}</span>
            <button id="view-album-button-{{ album.album_id }}" onclick="location.href='{{ url_for('album_details', album_id=album.album_id) }}'">View</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
