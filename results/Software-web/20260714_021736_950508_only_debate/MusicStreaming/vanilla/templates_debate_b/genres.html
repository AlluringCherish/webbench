<!DOCTYPE html>
<html lang="en">
<head>
    <title>Genres</title>
</head>
<body>
<div id="genres-page">
    <h1>Genres</h1>
    <form method="post" action="{{ url_for('genres') }}">
        <select id="select-genre" name="selected_genre">
            <option value="">Select Genre</option>
            {% for genre in genres %}
            <option value="{{ genre }}" {% if genre == selected_genre %}selected{% endif %}>{{ genre }}</option>
            {% endfor %}
        </select>
        <button type="submit">Explore</button>
    </form>

    <div id="genres-list">
        <h2>Songs</h2>
        <ul>
            {% for song in genre_songs %}
            <li>{{ song.title }}</li>
            {% endfor %}
        </ul>

        <h2>Artists</h2>
        <ul>
            {% for artist in genre_artists %}
            <li>{{ artist.name }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
