<!DOCTYPE html>
<html lang="en">
<head>
    <title>Artists</title>
</head>
<body>
<div id="artists-page">
    <h1>Artists</h1>
    <form method="get" action="{{ url_for('artists') }}">
        <input id="search-artists" name="search_artists" type="text" value="{{ search_artists }}" placeholder="Search artists...">
        <select id="artists-sort" name="artists_sort">
            <option value="">Sort By</option>
            <option value="name" {% if artists_sort == 'name' %}selected{% endif %}>Name</option>
            <option value="formation_year" {% if artists_sort == 'formation_year' %}selected{% endif %}>Formation Year</option>
        </select>
        <button type="submit">Search</button>
    </form>
    <div id="artists-grid">
        {% for artist in artists %}
        <div>
            <span>{{ artist.name }}</span>
            <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_profile', artist_id=artist.artist_id) }}'">View</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
