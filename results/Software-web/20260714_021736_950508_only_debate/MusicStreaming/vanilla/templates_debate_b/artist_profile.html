<!DOCTYPE html>
<html lang="en">
<head>
    <title>Artist Profile</title>
</head>
<body>
<div id="artist-profile-page">
    <h1>{{ artist.name }}</h1>
    <div id="artist-name">Genre: {{ artist.genre }}</div>
    <div id="artist-genre">Country: {{ artist.country }}</div>
    <div id="artist-country">Formed: {{ artist.formation_year }}</div>
    <h2>Songs</h2>
    <ul>
        {% for song in songs %}
        <li>{{ song.title }}</li>
        {% endfor %}
    </ul>
    <h2>Albums</h2>
    <ul>
        {% for album in albums %}
        <li>{{ album.title }}</li>
        {% endfor %}
    </ul>
</div>
</body>
</html>
