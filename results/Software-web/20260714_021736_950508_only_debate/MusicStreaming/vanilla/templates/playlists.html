<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>Playlists</h1>
    <div id="playlists-grid">
        <ul>
            {% for playlist in playlists %}
            <li>
                {{ playlist.title }}
                <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="window.location.href='/playlists/{{ playlist.playlist_id }}'">View</button>
            </li>
            {% endfor %}
        </ul>
    </div>
    <button id="create-playlist-button" onclick="window.location.href='/playlists/create'">Create Playlist</button>
</div>
</body>
</html>
