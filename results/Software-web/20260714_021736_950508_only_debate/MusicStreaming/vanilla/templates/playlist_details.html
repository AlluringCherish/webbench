<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
</head>
<body>
<div id="playlist-details-page">
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>
    <table id="songs-in-playlist">
        <thead>
            <tr><th>Title</th><th>Genre</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for song in songs %}
            <tr>
                <td>{{ song.title }}</td>
                <td>{{ song.genre }}</td>
                <td>
                    <form method="POST" action="/playlists/{{ playlist.playlist_id }}" style="display:inline;">
                        <input type="hidden" name="song_id" value="{{ song.song_id }}">
                        <button id="remove-song-button-{{ song.song_id }}" type="submit" name="remove_song_button">Remove</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <form method="POST" action="/playlists/{{ playlist.playlist_id }}">
        <button id="delete-playlist-button" type="submit" name="delete_playlist_button">Delete Playlist</button>
    </form>
</div>
</body>
</html>
