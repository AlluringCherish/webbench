<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
</head>
<body>
<div id="artists-page">
    <h1>Artists</h1>
    <form method="POST" action="/artists">
        <input id="search-artists" name="search_artists" type="text" placeholder="Search artists..." value="{{ search_artists }}">
        <select id="artists-sort" name="artists_sort">
            <option value="">Sort By</option>
            <option value="name" {% if artists_sort == "name" %}selected{% endif %}>Name</option>
            <option value="formation_year" {% if artists_sort == "formation_year" %}selected{% endif %}>Formation Year</option>
        </select>
        <button type="submit">Apply</button>
    </form>
    <div id="artists-grid">
        <ul>
            {% for artist in artists %}
            <li>
                {{ artist.name }}
                <button id="view-artist-button-{{ artist.artist_id }}" onclick="window.location.href='/artists/{{ artist.artist_id }}'">View</button>
            </li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
