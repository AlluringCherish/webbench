<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
<div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">Artist ID: {{ album.artist_id }}</div>
    <div id="album-year">Released: {{ album.release_year }}</div>
    <div id="album-songs-list">
        <ul>
            {% for song in songs %}
            <li>{{ song.title }}</li>
            {% endfor %}
        </ul>
    </div>
    <form method="POST" action="/albums/{{ album.album_id }}">
        <input type="hidden" name="album_id" value="{{ album.album_id }}">
        <button id="add-album-to-playlist-button" type="submit">Add Album to Playlist</button>
    </form>
</div>
</body>
</html>
