<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
<div id="accommodations-page">
    <h1>Search Accommodations</h1>
    <form method="POST">
        <label for="destination-input">Destination:</label>
        <input type="text" id="destination-input" name="destination-input" value="{{ destination }}">
        <br>
        <label for="check-in-date">Check-in Date:</label>
        <input type="date" id="check-in-date" name="check-in-date" value="{{ check_in }}">
        <br>
        <label for="check-out-date">Check-out Date:</label>
        <input type="date" id="check-out-date" name="check-out-date" value="{{ check_out }}">
        <br>
        <label for="price-filter">Price Filter:</label>
        <select id="price-filter" name="price-filter">
            <option value="" {% if price_filter == '' %}selected{% endif %}>-- All Prices --</option>
            <option value="<100" {% if price_filter == '<100' %}selected{% endif %}>&lt; $100</option>
            <option value="100-200" {% if price_filter == '100-200' %}selected{% endif %}>$100 - $200</option>
            <option value=">200" {% if price_filter == '>200' %}selected{% endif %}>&gt; $200</option>
        </select>
        <br>
        <button type="submit">Search</button>
    </form>
    <div id="hotels-list">
        <h2>Hotels</h2>
        <ul>
            {% for hotel in hotels %}
                <li>{{ hotel.name }} - {{ hotel.city }} - Rating: {{ hotel.rating }} - ${{ hotel.price_per_night }} per night - Amenities: {{ hotel.amenities }}</li>
            {% else %}
                <li>No hotels found.</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
