<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
<div id="destinations-page">
    <h1>Travel Destinations</h1>
    <form method="POST">
        <input type="text" id="search-destination" name="search-destination" placeholder="Search destinations..." value="{{ search_term }}">
        <select id="region-filter" name="region-filter">
            <option value="">-- All Regions --</option>
            {% for region in regions %}
                <option value="{{ region }}" {% if region == region_filter %}selected{% endif %}>{{ region }}</option>
            {% endfor %}
        </select>
        <button type="submit">Search/Filter</button>
    </form>
    <div id="destinations-grid">
        <ul>
            {% for dest in destinations %}
                <li>
                    <strong>{{ dest.name }}</strong> - {{ dest.country }}<br>
                    <button id="view-destination-button-{{ dest.dest_id }}" onclick="window.location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
                </li>
            {% else %}
                <li>No destinations found.</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
