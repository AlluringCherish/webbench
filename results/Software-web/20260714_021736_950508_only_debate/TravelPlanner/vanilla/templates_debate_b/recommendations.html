<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
<div id="recommendations-page">
    <h1>Travel Recommendations</h1>
    <form method="POST" action="{{ url_for('recommendations') }}">
        <select id="recommendation-season-filter" name="recommendation_season_filter">
            <option value="">All Seasons</option>
            <option value="Winter" {% if season_filter == 'Winter' %}selected{% endif %}>Winter</option>
            <option value="Spring" {% if season_filter == 'Spring' %}selected{% endif %}>Spring</option>
            <option value="Summer" {% if season_filter == 'Summer' %}selected{% endif %}>Summer</option>
            <option value="Fall" {% if season_filter == 'Fall' %}selected{% endif %}>Fall</option>
        </select>
        <select id="budget-filter" name="budget_filter">
            <option value="">Any Budget</option>
            <option value="1000" {% if budget_filter == '1000' %}selected{% endif %}>&lt;= $1000</option>
            <option value="2000" {% if budget_filter == '2000' %}selected{% endif %}>&lt;= $2000</option>
            <option value="3000" {% if budget_filter == '3000' %}selected{% endif %}>&lt;= $3000</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="trending-destinations">
        <h2>Trending Destinations</h2>
        <ul>
            {% for dest in trending_destinations %}
                <li>{{ dest.name }} - {{ dest.climate }}</li>
            {% endfor %}
        </ul>
    </div>

    <div id="recommendations-list">
        <ul>
            {% for dest in destinations %}
                <li>{{ dest.name }}: {{ dest.description }}</li>
            {% endfor %}
        </ul>
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
