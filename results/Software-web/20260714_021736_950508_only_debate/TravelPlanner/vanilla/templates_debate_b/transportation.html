<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Flights</title>
</head>
<body>
<div id="transportation-page">
    <h1>Book Flights</h1>
    <form method="POST" action="{{ url_for('transportation') }}">
        <input type="text" id="departure-city" name="departure_city" placeholder="Departure City" value="{{ departure_city }}">
        <input type="text" id="arrival-city" name="arrival_city" placeholder="Arrival City" value="{{ arrival_city }}">
        <input type="date" id="departure-date" name="departure_date" value="{{ departure_date }}">
        <select id="flight-class-filter" name="flight_class_filter">
            <option value="">Any Class</option>
            <option value="Economy" {% if flight_class_filter == 'Economy' %}selected{% endif %}>Economy</option>
            <option value="Business" {% if flight_class_filter == 'Business' %}selected{% endif %}>Business</option>
            <option value="First" {% if flight_class_filter == 'First' %}selected{% endif %}>First</option>
        </select>
        <button type="submit">Search Flights</button>
    </form>

    <div id="available-flights">
        <ul>
            {% for flight in flights %}
                <li>{{ flight.airline }}: {{ flight.departure_city }} to {{ flight.arrival_city }} at {{ flight.departure_time }} - ${{ flight.price }} ({{ flight.class_type }})</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
