<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
<div id="accommodations-page">
    <h1>Search Accommodations</h1>
    <form method="POST" action="{{ url_for('accommodations') }}">
        <input type="text" id="destination-input" name="destination_input" placeholder="Destination City" value="{{ destination_input }}">
        <input type="date" id="check-in-date" name="check_in_date" value="{{ check_in_date }}">
        <input type="date" id="check-out-date" name="check_out_date" value="{{ check_out_date }}">
        <select id="price-filter" name="price_filter">
            <option value="">Any Price</option>
            <option value="100" {% if price_filter == '100' %}selected{% endif %}>Up to $100</option>
            <option value="200" {% if price_filter == '200' %}selected{% endif %}>Up to $200</option>
            <option value="300" {% if price_filter == '300' %}selected{% endif %}>Up to $300</option>
            <option value="500" {% if price_filter == '500' %}selected{% endif %}>Up to $500</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="hotels-list">
        <ul>
            {% for hotel in hotels %}
                <li>{{ hotel.name }} ({{ hotel.category }}) - ${{ hotel.price_per_night }} per night, Rating: {{ hotel.rating }}</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
