<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
<div id="destinations-page">
    <h1>Travel Destinations</h1>
    <form method="POST" action="{{ url_for('destinations') }}">
        <input type="text" name="search_destination" id="search-destination" placeholder="Search destinations..." value="{{ search_query }}">
        <select name="region_filter" id="region-filter">
            <option value="">All Regions</option>
            {% for region in regions %}
                <option value="{{ region }}" {% if region == region_filter %}selected{% endif %}>{{ region }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="destinations-grid">
        <ul>
            {% for dest in destinations %}
                <li>
                    {{ dest.name }}, {{ dest.country }} 
                    <button id="view-destination-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
                </li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
