<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
<div id="itinerary-page">
    <h1>Plan Your Itinerary</h1>
    {% if message %}<div><strong>{{ message }}</strong></div>{% endif %}
    <form method="POST" action="{{ url_for('itinerary') }}">
        <input type="text" id="itinerary-name-input" name="itinerary_name_input" placeholder="Itinerary Name" required>
        <input type="date" id="start-date-input" name="start_date_input" required>
        <input type="date" id="end-date-input" name="end_date_input" required>
        <input type="text" name="add_activity" placeholder="Add Activity">
        <button type="submit" id="add-activity-button">Add Activity</button>
    </form>

    <div id="itinerary-list">
        <ul>
            {% for itn in itineraries %}
                <li>{{ itn.itinerary_name }}: {{ itn.start_date }} to {{ itn.end_date }}, Activities: {{ itn.activities }}</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
