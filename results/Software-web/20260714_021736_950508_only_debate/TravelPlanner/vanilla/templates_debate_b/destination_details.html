<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destination Details</title>
</head>
<body>
<div id="destination-details-page">
    <h1 id="destination-name">{{ destination.name }}</h1>
    <div id="destination-country">Country: {{ destination.country }}</div>
    <div id="destination-description">Description: {{ destination.description }}</div>
    <div id="destination-attractions">Attractions: {{ destination.attractions }}</div>
    {% if message %}<div><strong>{{ message }}</strong></div>{% endif %}
    <form method="POST" action="{{ url_for('destination_details', dest_id=destination.dest_id) }}">
        <input type="text" name="trip_name" placeholder="Trip name" required>
        <button type="submit" id="add-to-trip-button">Add to Trip</button>
    </form>
</div>
</body>
</html>
