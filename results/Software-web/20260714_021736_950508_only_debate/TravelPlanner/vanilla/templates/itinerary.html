<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
<div id="itinerary-page">
    <h1>Plan Your Itinerary</h1>
    <form method="POST">
        <label for="itinerary-name-input">Itinerary Name:</label>
        <input type="text" id="itinerary-name-input" name="itinerary-name-input" required>
        <br>
        <label for="start-date-input">Start Date:</label>
        <input type="date" id="start-date-input" name="start-date-input" required>
        <br>
        <label for="end-date-input">End Date:</label>
        <input type="date" id="end-date-input" name="end-date-input" required>
        <br>
        <label for="add-activity-input">Add Activity:</label>
        <input type="text" id="add-activity-input" name="add-activity-input">
        <br>
        <button type="submit" id="add-activity-button">Add / Update</button>
    </form>
    <div id="itinerary-list">
        <h2>Existing Itineraries</h2>
        <ul>
            {% for it in itineraries %}
                <li>{{ it.itinerary_name }} ({{ it.start_date }} to {{ it.end_date }}) - Activities: {{ it.activities }}</li>
            {% else %}
                <li>No itineraries planned yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
