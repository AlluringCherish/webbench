<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
<div id="recommendations-page">
    <h1>Travel Recommendations</h1>
    <form method="POST">
        <label for="recommendation-season-filter">Season:</label>
        <select id="recommendation-season-filter" name="recommendation-season-filter">
            <option value="">-- All Seasons --</option>
            <option value="Temperate" {% if season_filter == 'Temperate' %}selected{% endif %}>Temperate</option>
            <option value="Tropical" {% if season_filter == 'Tropical' %}selected{% endif %}>Tropical</option>
            <option value="Cold" {% if season_filter == 'Cold' %}selected{% endif %}>Cold</option>
        </select>
        <label for="budget-filter">Budget up to:</label>
        <select id="budget-filter" name="budget-filter">
            <option value="">-- No limit --</option>
            <option value="500" {% if budget_filter == '500' %}selected{% endif %}>$500</option>
            <option value="1000" {% if budget_filter == '1000' %}selected{% endif %}>$1000</option>
            <option value="2000" {% if budget_filter == '2000' %}selected{% endif %}>$2000</option>
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="trending-destinations">
        <h2>Trending Destinations</h2>
        <ul>
            {% for dest in destinations %}
                <li>{{ dest.name }} - {{ dest.region }} - Climate: {{ dest.climate }}</li>
            {% else %}
                <li>No destinations found.</li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
