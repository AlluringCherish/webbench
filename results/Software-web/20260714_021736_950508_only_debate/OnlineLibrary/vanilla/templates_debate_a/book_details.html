<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book[1] }}</h1>
        <div id="book-author">Author: {{ book[2] }}</div>
        <div id="book-status">Status: {{ book[8] }}</div>
        <button id="borrow-button" onclick="location.href='{{ url_for('borrow_book', book_id=book[0]) }}'">Borrow</button>
        <button id="write-review-button" onclick="location.href='{{ url_for('write_review', book_id=book[0]) }}'">Write Review</button>
        <div id="reviews-section">
            <h2>Reviews:</h2>
            {% if reviews %}
                <ul>
                    {% for review in reviews %}
                    <li><strong>Rating:</strong> {{ review[3] }} - {{ review[4] }} ({{ review[5] }})</li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No reviews yet.</p>
            {% endif %}
        </div>
        <button id="back-to-catalog" onclick="location.href='{{ url_for('catalog') }}'">Back</button>
    </div>
</body>
</html>
