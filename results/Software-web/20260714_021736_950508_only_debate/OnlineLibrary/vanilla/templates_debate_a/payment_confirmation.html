<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">Amount: ${{ fine.amount }}</div>

        <form method="post" action="{{ url_for('payment', fine_id=fine.fine_id) }}">
            <button type="submit" id="confirm-payment-button">Confirm Payment</button>
            <button type="button" id="back-to-profile" onclick="location.href='{{ url_for('profile') }}'">Back</button>
        </form>
    </div>
</body>
</html>
