<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <div id="book-info-display">
            <h2>{{ book.title }}</h2>
            <div>Author: {{ book.author }}</div>
        </div>
        <form method="post" action="{{ url_for('write_review', book_id=book.book_id) }}">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for i in range(1, 6) %}
                <option value="{{ i }}" {% if existing_review and existing_review.rating == i %}selected{% endif %}>{{ i }}</option>
                {% endfor %}
            </select><br>
            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="40">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea><br>
            <button type="submit" id="submit-review-button">Submit Review</button>
            <button type="button" id="back-to-book" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back</button>
        </form>
    </div>
</body>
</html>
