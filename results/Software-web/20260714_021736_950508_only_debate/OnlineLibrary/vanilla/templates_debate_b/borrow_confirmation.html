<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        <div id="borrow-book-info">
            <h2>{{ book.title }}</h2>
            <div>Author: {{ book.author }}</div>
        </div>
        <div id="due-date-display">Due Date: {{ due_date }}</div>

        <form method="post" action="{{ url_for('borrow', book_id=book.book_id) }}">
            <button type="submit" id="confirm-borrow-button">Confirm Borrow</button>
            <button type="button" id="cancel-borrow-button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
