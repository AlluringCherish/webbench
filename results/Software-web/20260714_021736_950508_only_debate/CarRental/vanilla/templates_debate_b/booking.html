<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
<div id="booking-page">
    <h1>Book Your Rental</h1>
    <form method="post">
        <label for="pickup-location">Pickup Location:</label>
        <select id="pickup-location" name="pickup-location">
            {% for loc in locations %}
                <option value="{{ loc.location_id }}">{{ loc.city }}</option>
            {% endfor %}
        </select><br>

        <label for="dropoff-location">Dropoff Location:</label>
        <select id="dropoff-location" name="dropoff-location">
            {% for loc in locations %}
                <option value="{{ loc.location_id }}">{{ loc.city }}</option>
            {% endfor %}
        </select><br>

        <label for="pickup-date">Pickup Date:</label>
        <input type="date" id="pickup-date" name="pickup-date" required><br>

        <label for="dropoff-date">Dropoff Date:</label>
        <input type="date" id="dropoff-date" name="dropoff-date" required><br>

        <button id="calculate-price-button" name="calculate-price-button" type="submit">Calculate Price</button><br>

        <div id="total-price">
            {% if calculated_price is not none %}
                Total Price: ${{ calculated_price }}
            {% endif %}
        </div>

        <button id="proceed-to-insurance-button" name="proceed-to-insurance-button" type="submit">Proceed to Insurance</button>
    </form>
</div>
</body>
</html>
