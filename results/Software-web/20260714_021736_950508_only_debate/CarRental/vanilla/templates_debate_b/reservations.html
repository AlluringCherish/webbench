<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
    <h1>My Reservations</h1>
    <form method="post">
        <div id="reservations-list">
            {% for res in reservations %}
                <div>
                    <span>Reservation ID: {{ res.reservation_id }} | Vehicle ID: {{ res.vehicle_id }} | Status: {{ res.status }}</span>
                    <button id="modify-reservation-button-{{ res.reservation_id }}" name="modify-reservation-button-{{ res.reservation_id }}" type="submit">Modify</button>
                    <button id="cancel-reservation-button-{{ res.reservation_id }}" name="cancel-reservation-button-{{ res.reservation_id }}" type="submit">Cancel</button>
                </div>
            {% else %}
                <p>No reservations found.</p>
            {% endfor %}
        </div>
        <button id="sort-by-date-button" name="sort-by-date-button" type="submit">Sort by Date</button>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
