<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
<div id="locations-page">
    <h1>Pickup and Dropoff Locations</h1>
    <form method="post">
        <label for="hours-filter">Filter by Hours:</label>
        <select id="hours-filter" name="hours-filter">
            <option value="">-- Select --</option>
            {% for option in hours_options %}
                <option value="{{ option }}" {% if selected_hours_filter == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>

        <label for="search-location-input">Search:</label>
        <input type="text" id="search-location-input" name="search-location-input" value="{{ search_text }}" placeholder="City or Address">

        <button type="submit">Search</button>
    </form>

    <div id="locations-list">
        <ul>
            {% for loc in locations %}
                <li>{{ loc.city }} - {{ loc.address }} - Hours: {{ loc.hours }}
                    <button id="location-detail-button-{{ loc.location_id }}">Details</button>
                </li>
            {% else %}
                <li>No locations found.</li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
</div>
</body>
</html>
