<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
    <h1>My Reservations</h1>

    <form method="post" action="/reservations">
        <div id="reservations-list">
            {% for res in reservations %}
                <div>
                    <p>Reservation ID: {{ res.reservation_id }}, Status: {{ res.status }}</p>
                    <button type="submit" name="modify-reservation-button-{{ res.reservation_id }}" id="modify-reservation-button-{{ res.reservation_id }}">Modify</button>
                    <button type="submit" name="cancel-reservation-button-{{ res.reservation_id }}" id="cancel-reservation-button-{{ res.reservation_id }}">Cancel</button>
                </div>
            {% else %}
                <p>No reservations found.</p>
            {% endfor %}
        </div>
        <button type="submit" name="sort-by-date-button" id="sort-by-date-button">Sort by Date</button>
    </form>

    <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
