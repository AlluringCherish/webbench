<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1 id="auction-name">{{ auction.item_name }}</h1>
        <div id="minimum-bid">Minimum Bid: ${{ '%.2f'|format(auction.current_bid + 0.01) }}</div>
        {% if error_message %}
        <div style="color: red;">{{ error_message }}</div>
        {% endif %}
        {% if success_message %}
        <div style="color: green;">{{ success_message }}</div>
        {% endif %}
        <form method="post" action="/place-bid/{{ auction.auction_id }}">
            <label for="bidder-name">Your Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" required />
            <br>
            <label for="bid-amount">Bid Amount:</label>
            <input type="number" id="bid-amount" name="bid_amount" step="0.01" required />
            <br>
            <button id="submit-bid-button" type="submit">Submit Bid</button>
        </form>
    </div>
</body>
</html>
