<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Auction Dashboard</h1>
        <div id="featured-auctions">
            {% if featured_auctions %}
            <ul>
            {% for auction in featured_auctions %}
                <li>{{ auction.item_name }} - Status: {{ auction.status }} - Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</li>
            {% endfor %}
            </ul>
            {% else %}
            <p>No featured auctions available.</p>
            {% endif %}
        </div>
        <button id="browse-auctions-button" onclick="location.href='/catalog'">Browse Auctions</button>
        <button id="view-bids-button" onclick="location.href='/bid-history'">View Bids</button>
        <button id="trending-auctions-button" onclick="location.href='/trending'">Trending Auctions</button>
    </div>
</body>
</html>
