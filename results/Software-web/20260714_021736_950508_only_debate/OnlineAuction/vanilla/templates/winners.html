<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>
        <form method="post" action="/winners">
            <input type="text" id="filter-by-winner" name="filter_winner" placeholder="Filter by winner name" value="{{ filter_winner }}" />
            <button type="submit">Filter</button>
        </form>
        <div id="winners-list">
            {% if winners %}
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}">
                <h3>{{ winner.item_name }}</h3>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ '%.2f'|format(winner.winning_bid) }}</p>
                <p>Win Date: {{ winner.win_date.strftime('%Y-%m-%d') }}</p>
            </div>
            {% endfor %}
            {% else %}
            <p>No winners found.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
