<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
    <div id="bid-history-page">
        <h1>Bid History</h1>
        <form method="post" action="/bid-history">
            <label for="filter-by-auction">Filter by Auction:</label>
            <select id="filter-by-auction" name="filter_auction">
                <option value="">All</option>
                {% for auction_id, auction_name in auction_options %}
                <option value="{{ auction_id }}" {% if filter_auction|int == auction_id %}selected{% endif %}>{{ auction_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
            <button type="submit" name="sort_by_amount" id="sort-by-amount">Sort by Amount</button>
        </form>
        <table id="bids-table" border="1">
            <thead>
                <tr>
                    <th>Bid ID</th>
                    <th>Auction Name</th>
                    <th>Bidder</th>
                    <th>Amount</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                <tr>
                    <td>{{ bid.history_id }}</td>
                    <td>{{ bid.auction_name }}</td>
                    <td>{{ bid.bidder_name }}</td>
                    <td>${{ '%.2f'|format(bid.bid_amount) }}</td>
                    <td>{{ bid.bid_timestamp }}</td>
                </tr>
                {% else %}
                <tr><td colspan="5">No bids found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
