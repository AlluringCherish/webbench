<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Auction Details</title>
</head>
<body>
    <div id="auction-details-page">
        <h1 id="auction-title">{{ auction.item_name }}</h1>
        <div id="auction-description">{{ auction.description }}</div>
        <div id="current-bid">Current Bid: ${{ '%.2f'|format(current_bid) }}</div>
        <div id="bid-history">
            <h2>Bid History</h2>
            <ul>
                {% for bid in bids %}
                <li>{{ bid.bidder_name }} bid ${{ '%.2f'|format(bid.bid_amount) }} at {{ bid.bid_timestamp.strftime('%Y-%m-%d %H:%M') }}</li>
                {% endfor %}
            </ul>
        </div>
        <button id="place-bid-button" onclick="location.href='{{ url_for('place_bid', auction_id=auction.auction_id) }}'">Place Bid</button>
    </div>
</body>
</html>
