<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>
        <form method="post" action="{{ url_for('trending') }}">
            <label for="time-range-filter">Time Range:</label>
            <select id="time-range-filter" name="time_range">
                <option value="Last 24 Hours" {% if time_range == 'Last 24 Hours' %}selected{% endif %}>Last 24 Hours</option>
                <option value="This Week" {% if time_range == 'This Week' %}selected{% endif %}>This Week</option>
                <option value="All Time" {% if time_range == 'All Time' %}selected{% endif %}>All Time</option>
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="trending-list">
            {% for item in trending %}
            <div>
                <h3>{{ item.item_name }}</h3>
                <p>Bids: {{ item.bid_count }} | Current Bid: ${{ '%.2f'|format(item.current_bid) }} | Rank: {{ item.trending_rank }}</p>
                <button id="view-auction-button-{{ item.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=item.auction_id) }}'">View Details</button>
            </div>
            {% else %}
            <p>No trending auctions found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
