<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>
        <form method="post" action="{{ url_for('catalog') }}">
            <input id="search-input" name="search_query" type="text" value="{{ search_query }}" placeholder="Search auctions..." />
            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="auctions-grid">
            {% for auction in auctions %}
            <div>
                <h3>{{ auction.item_name }}</h3>
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}" style="max-width:200px; max-height:150px;" />
                <p>{{ auction.description }}</p>
                <p>Category: {{ auction.category }}</p>
                <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
                <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Details</button>
            </div>
            {% else %}
            <p>No auctions found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
