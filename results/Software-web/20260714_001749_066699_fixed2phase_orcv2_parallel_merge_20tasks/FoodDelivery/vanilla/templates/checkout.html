<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <label for="customer-name">Name:</label>
        <input type="text" id="customer-name" name="customer_name" />

        <label for="delivery-address">Delivery Address:</label>
        <textarea id="delivery-address" name="delivery_address"></textarea>

        <label for="phone-number">Phone Number:</label>
        <input type="text" id="phone-number" name="phone_number" />

        <label for="payment-method">Payment Method:</label>
        <select id="payment-method" name="payment_method">
            <option value="Credit Card">Credit Card</option>
            <option value="Cash">Cash</option>
            <option value="PayPal">PayPal</option>
        </select>

        <button id="place-order-button">Place Order</button>
    </div>
</body>
</html>
