<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="featured-restaurants">
            {% for restaurant in featured_restaurants %}
            <div class="restaurant-card" id="restaurant-{{ restaurant.id }}">
                <img src="{{ restaurant.logo_url }}" alt="{{ restaurant.name }} logo">
                <h3>{{ restaurant.name }}</h3>
                <p>{{ restaurant.cuisine }}</p>
                <p>Rating: {{ restaurant.rating }}</p>
                <p>Delivery Time: {{ restaurant.delivery_time }} mins</p>
            </div>
            {% endfor %}
        </div>

        <button id="browse-restaurants-button" onclick="window.location.href='/restaurants'">Browse Restaurants</button>
        <button id="view-cart-button" onclick="window.location.href='/cart'">View Cart</button>
        <button id="active-orders-button" onclick="window.location.href='/active-orders'">Active Orders</button>
    </div>
</body>
</html>
