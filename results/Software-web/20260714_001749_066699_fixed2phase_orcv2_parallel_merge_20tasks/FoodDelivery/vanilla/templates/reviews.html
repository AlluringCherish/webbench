<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <select id="filter-by-rating" name="rating">
            <option value="">All Ratings</option>
            {% for r in range(1,6) %}
            <option value="{{ r }}" {% if selected_rating_filter == r|string %}selected{% endif %}>{{ r }} Stars</option>
            {% endfor %}
        </select>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <p>Restaurant: {{ review.restaurant_name }}</p>
                <p>Rating: {{ review.rating }}</p>
                <p>Review: {{ review.review_text }}</p>
                <p>By: {{ review.customer_name }} on {{ review.review_date }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="window.location.href='/write-review'">Write Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
