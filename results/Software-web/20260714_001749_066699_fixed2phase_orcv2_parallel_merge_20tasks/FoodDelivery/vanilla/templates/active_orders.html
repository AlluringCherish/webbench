<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <select id="status-filter" name="status">
            <option value="All" {% if filter_status == 'All' %}selected{% endif %}>All</option>
            <option value="Preparing" {% if filter_status == 'Preparing' %}selected{% endif %}>Preparing</option>
            <option value="On the Way" {% if filter_status == 'On the Way' %}selected{% endif %}>On the Way</option>
            <option value="Delivered" {% if filter_status == 'Delivered' %}selected{% endif %}>Delivered</option>
        </select>

        <div id="orders-list">
            {% for order in active_orders %}
            <div class="order-item" id="order-{{ order.order_id }}">
                <p>Order ID: {{ order.order_id }}</p>
                <p>Restaurant: {{ order.restaurant_name }}</p>
                <p>Status: {{ order.status }}</p>
                <p>ETA: {{ order.eta }}</p>
                <button id="track-order-button-{{ order.order_id }}" onclick="window.location.href='/tracking/{{ order.order_id }}'">Track Order</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
