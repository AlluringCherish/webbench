<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <table id="cart-items-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr id="cart-item-{{ item.item_id }}">
                    <td>{{ item.name }}</td>
                    <td><input type="number" id="update-quantity-{{ item.item_id }}" name="quantity" min="1" value="{{ item.quantity }}" /></td>
                    <td>${{ '%.2f' | format(item.price) }}</td>
                    <td>${{ '%.2f' | format(item.subtotal) }}</td>
                    <td><button id="remove-item-button-{{ item.item_id }}">Remove</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div id="total-amount">Total: ${{ '%.2f' | format(total_amount) }}</div>
        <button id="proceed-checkout-button" onclick="window.location.href='/checkout'">Proceed to Checkout</button>
    </div>
</body>
</html>
