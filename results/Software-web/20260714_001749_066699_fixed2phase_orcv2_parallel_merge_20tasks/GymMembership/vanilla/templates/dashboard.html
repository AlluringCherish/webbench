<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Membership Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="member-welcome">
            <h2>Welcome, {{ member_status }}</h2>
        </div>
        <button id="browse-membership-button" onclick="location.href='{{ url_for('membership_plans') }}'">Browse Memberships</button>
        <button id="view-schedule-button" onclick="location.href='{{ url_for('class_schedule') }}'">View Class Schedule</button>
        <button id="book-trainer-button" onclick="location.href='{{ url_for('pt_booking') }}'">Book a Trainer</button>
        
        <h3>Featured Classes</h3>
        <div id="featured-classes">
            {% for cls in featured_classes %}
                <div class="featured-class-card">
                    <h4>{{ cls.class_name }}</h4>
                    <p>Trainer: {{ cls.trainer_name }}</p>
                    <p>Type: {{ cls.class_type }}</p>
                    <p>Time: {{ cls.schedule_day }}, {{ cls.schedule_time }}</p>
                </div>
            {% else %}
                <p>No featured classes available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
