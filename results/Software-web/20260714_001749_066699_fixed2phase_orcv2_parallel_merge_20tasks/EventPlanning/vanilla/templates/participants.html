<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Participants Management</title>
</head>
<body>
<div id="participants-page">
    <h1>Participants Management</h1>

    <form method="GET" action="{{ url_for('participants_management') }}">
        <input id="search-participant-input" type="text" name="search" placeholder="Search participants..." value="{{ request.args.get('search', '') }}" />

        <select id="participant-status-filter" name="status">
            <option value="">All Statuses</option>
            {% for status in status_options %}
            <option value="{{ status }}" {% if request.args.get('status') == status %}selected{% endif %}>{{ status }}</option>
            {% endfor %}
        </select>

        <button type="submit">Filter</button>
    </form>

    <button id="add-participant-button" onclick="openAddParticipantModal()">Add Participant</button>

    <table id="participants-table" border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Event</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for participant in participants %}
            <tr>
                <td>{{ participant.name }}</td>
                <td>{{ participant.email }}</td>
                <td>{{ participant.event_id }}</td>
                <td>{{ participant.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        function openAddParticipantModal() {
            alert('Add Participant form/modal would open here.');
        }
    </script>
</div>
</body>
</html>
