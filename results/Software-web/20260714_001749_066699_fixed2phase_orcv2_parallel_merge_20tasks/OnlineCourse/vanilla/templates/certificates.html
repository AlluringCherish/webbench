<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
<div id="certificates-page">
    <!-- Certificates grid -->
    <div id="certificates-grid">
        {% if certificates %}
            <ul>
            {% for cert in certificates %}
                <li>
                    <strong>Course:</strong> {{ cert.course_title }}<br>
                    <strong>Issued On:</strong> {{ cert.issue_date }}
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>You have no certificates yet.</p>
        {% endif %}
    </div>

    <!-- Back to dashboard button -->
    <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
</div>
</body>
</html>
