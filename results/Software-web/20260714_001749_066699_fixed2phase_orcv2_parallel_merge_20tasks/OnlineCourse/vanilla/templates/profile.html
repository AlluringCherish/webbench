<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>
<body>
<div id="profile-page">
    <form method="post" action="">
        <label for="profile-email">Email:</label><br>
        <input type="email" id="profile-email" name="email" value="{{ profile.email }}" required><br><br>

        <label for="profile-fullname">Full Name:</label><br>
        <input type="text" id="profile-fullname" name="fullname" value="{{ profile.fullname }}" required><br><br>

        <button type="submit" id="update-profile-button">Update Profile</button>
    </form>

    <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
</div>
</body>
</html>
