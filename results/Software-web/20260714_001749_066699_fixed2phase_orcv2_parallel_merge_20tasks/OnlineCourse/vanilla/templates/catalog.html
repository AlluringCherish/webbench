<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Catalog</title>
</head>
<body>
<div id="catalog-page">
    <!-- Search input for filtering courses -->
    <input type="text" id="search-input" name="search" placeholder="Search courses..." value="{{ request.args.get('search', '') }}" onkeydown="if(event.key==='Enter'){window.location.href='?search='+this.value;}">

    <!-- Grid for course cards -->
    <div id="course-grid">
        {% if courses %}
            {% for course in courses %}
                <div class="course-card" id="course-card-{{ course.course_id }}">
                    <h3>{{ course.title }}</h3>
                    <p>{{ course.description }}</p>
                    <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='/courses/{{ course.course_id }}'">View Details</button>
                </div>
            {% endfor %}
        {% else %}
            <p>No courses found.</p>
        {% endif %}
    </div>

    <!-- Back button to dashboard -->
    <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
</div>
</body>
</html>
