<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
</head>
<body>
<div id="my-courses-page">
    <!-- List of enrolled courses with progress -->
    <div id="courses-list">
        {% if enrolled_courses %}
            <ul>
                {% for course in enrolled_courses %}
                    <li>
                        <strong>{{ course.title }}</strong> - Progress: {{ course.progress }}%
                        <button id="continue-learning-button-{{ course.course_id }}" onclick="window.location.href='/course/{{ course.course_id }}/learning'">Continue Learning</button>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>You have no enrolled courses.</p>
        {% endif %}
    </div>

    <!-- Back to dashboard button -->
    <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
</div>
</body>
</html>
