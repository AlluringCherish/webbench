<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
<div id="course-details-page">
    <!-- Course title -->
    <h1 id="course-title">{{ course.title }}</h1>

    <!-- Course description and syllabus placeholder -->
    <div id="course-description">
        <p>{{ course.description }}</p>
        <h3>Syllabus</h3>
        <p>{{ syllabus or "Syllabus will be updated soon." }}</p>
    </div>

    <!-- Enroll button -->
    {% if enrolled %}
        <button id="enroll-button" disabled>Already Enrolled</button>
    {% else %}
        <form method="post" action="/courses/{{ course.course_id }}/enroll">
            <button type="submit" id="enroll-button">Enroll</button>
        </form>
    {% endif %}

    <!-- Back to catalog button -->
    <button id="back-to-catalog" onclick="window.location.href='/courses/catalog'">Back to Catalog</button>
</div>
</body>
</html>
