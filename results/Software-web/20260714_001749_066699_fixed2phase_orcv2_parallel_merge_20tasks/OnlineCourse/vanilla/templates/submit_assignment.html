<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
<div id="submit-page">
    <!-- Assignment info -->
    <div id="assignment-info">
        <h2>{{ assignment.title }}</h2>
        <p>{{ assignment.description }}</p>
    </div>

    <!-- Submission form -->
    <form method="post" action="">
        <textarea id="submission-text" name="submission_text" rows="10" cols="50" placeholder="Enter your submission here..." required></textarea><br>
        <button type="submit" id="submit-button">Submit</button>
    </form>

    <!-- Back to assignments button -->
    <button id="back-to-assignments" onclick="window.location.href='/assignments'">Back to Assignments</button>
</div>
</body>
</html>
