<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <!-- Welcome message with user's full name -->
    <h1 id="welcome-message">Welcome, {{ fullname }}!</h1>

    <!-- Enrolled courses with progress -->
    <div id="enrolled-courses">
        {% if enrolled_courses %}
            <ul>
            {% for course in enrolled_courses %}
                <li>
                    <strong>{{ course.title }}</strong><br>
                    Progress: {{ course.progress }}%
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>You are not enrolled in any courses yet.</p>
        {% endif %}
    </div>

    <!-- Navigation buttons -->
    <button id="browse-courses-button" onclick="window.location.href='/courses/catalog'">Browse Courses</button>
    <button id="my-courses-button" onclick="window.location.href='/my-courses'">My Courses</button>
</div>
</body>
</html>
