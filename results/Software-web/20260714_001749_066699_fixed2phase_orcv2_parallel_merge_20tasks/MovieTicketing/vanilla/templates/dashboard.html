<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MovieTicketing</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>
        <div id="featured-movies">
            {% for movie in featured_movies %}
            <div class="featured-movie-card">
                <img src="{{ movie.poster_url }}" alt="{{ movie.title }} poster" />
                <h3>{{ movie.title }}</h3>
            </div>
            {% endfor %}
        </div>
        <div class="navigation-buttons">
            <button id="browse-movies-button" onclick="window.location.href='/movies'">Browse Movies</button>
            <button id="view-bookings-button" onclick="window.location.href='/bookings'">View Bookings</button>
            <button id="showtimes-button" onclick="window.location.href='/showtimes'">Showtimes</button>
        </div>
    </div>
</body>
</html>
