<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seat Selection - MovieTicketing</title>
    <style>
        .seat {
            width: 30px;
            height: 30px;
            margin: 2px;
        }
        .available {
            background-color: #90ee90;
        }
        .booked {
            background-color: #ffcccb;
            cursor: not-allowed;
        }
        .selected {
            background-color: #007bff;
            color: white;
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const selectedSeats = new Set({{ selected_seats|tojson }});

            function updateSelectedDisplay() {
                const display = document.getElementById('selected-seats-display');
                display.textContent = "Selected Seats: " + Array.from(selectedSeats).join(", ");
            }

            updateSelectedDisplay();

            document.querySelectorAll('[id^="seat-"]').forEach(button => {
                if(!button.classList.contains('booked')) {
                    button.addEventListener('click', () => {
                        const seatId = button.dataset.seatId;
                        if(selectedSeats.has(seatId)) {
                            selectedSeats.delete(seatId);
                            button.classList.remove('selected');
                        } else {
                            selectedSeats.add(seatId);
                            button.classList.add('selected');
                        }
                        updateSelectedDisplay();
                        document.getElementById('selected_seats_input').value = Array.from(selectedSeats).join(',');
                    });
                }
            });
        });
    </script>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Seat Selection</h1>
        <div>
            <div>Showtime: {{ showtime.showtime_date }} {{ showtime.showtime_time }}</div>
            <div>Price per seat: ${{ '%.2f'|format(showtime.price) }}</div>
        </div>
        <div id="seat-map">
            {% for seat in seats %}
            <button type="button" 
                    id="seat-{{ seat.row }}{{ seat.column }}" 
                    class="seat {% if seat.status == 'Booked' %}booked{% else %}available{% endif %} {% if seat.seat_id in selected_seats %}selected{% endif %}" 
                    data-seat-id="{{ seat.seat_id }}" 
                    {% if seat.status == 'Booked' %}disabled{% endif %}>
                {{ seat.row }}{{ seat.column }}
            </button>
            {% endfor %}
        </div>
        <div id="selected-seats-display">Selected Seats: </div>
        <form method="get" action="/booking_confirmation">
            <input type="hidden" name="showtime_id" value="{{ showtime.showtime_id }}" />
            <input type="hidden" id="selected_seats_input" name="seats" value="{{ selected_seats|join(',') }}" />
            <button id="proceed-booking-button" type="submit">Proceed to Booking</button>
        </form>
    </div>
</body>
</html>
