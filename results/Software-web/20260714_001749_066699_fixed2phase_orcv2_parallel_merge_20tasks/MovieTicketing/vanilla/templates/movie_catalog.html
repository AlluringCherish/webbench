<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog - MovieTicketing</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <form method="get" action="/movies">
            <input type="text" id="search-input" name="search" placeholder="Search by title or genre" value="{{ search_query }}" />
            <select id="genre-filter" name="genre">
                <option value="">All Genres</option>
                {% for genre in genres %}
                <option value="{{ genre }}" {% if genre == selected_genre %}selected{% endif %}>{{ genre }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="movies-grid">
            {% for movie in movies %}
            <div class="movie-card">
                <img src="{{ movie.poster_url }}" alt="{{ movie.title }} poster" />
                <h3>{{ movie.title }}</h3>
                <div>Rating: {{ movie.rating }}</div>
                <div>Duration: {{ movie.duration }} minutes</div>
                <div>Genre: {{ movie.genre }}</div>
                <button id="view-movie-button-{{ movie.movie_id }}" onclick="window.location.href='/movie/{{ movie.movie_id }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
