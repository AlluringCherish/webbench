<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation - MovieTicketing</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="booking-summary">
            <div>Movie: {{ movie.title }}</div>
            <div>Showtime: {{ showtime.showtime_date }} {{ showtime.showtime_time }}</div>
            <div>Seats: {{ selected_seats|join(', ') }}</div>
            <div>Total Price: ${{ '%.2f'|format(total_price) }}</div>
        </div>
        <form method="post" action="/bookings/confirm">
            <input type="hidden" name="showtime_id" value="{{ showtime.showtime_id }}" />
            <input type="hidden" name="seats" value="{{ selected_seats|join(',') }}" />
            <div>
                <label for="customer-name">Name:</label>
                <input type="text" id="customer-name" name="customer_name" required />
            </div>
            <div>
                <label for="customer-email">Email:</label>
                <input type="email" id="customer-email" name="customer_email" required />
            </div>
            <button id="confirm-booking-button" type="submit">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
