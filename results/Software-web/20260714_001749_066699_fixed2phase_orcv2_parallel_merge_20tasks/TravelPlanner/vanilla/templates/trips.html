<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Trips</title>
</head>
<body>
    <!-- 'trips-page' container -->
    <div id="trips-page">
        <h1>My Trips</h1>

        <table id="trips-table" border="1">
            <thead>
                <tr>
                    <th>Trip Name</th>
                    <th>Destination</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Total Budget</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% if trips %}
                    {% for trip in trips %}
                    <tr>
                        <td>{{ trip.trip_name }}</td>
                        <td>{{ trip.destination }}</td>
                        <td>{{ trip.start_date }}</td>
                        <td>{{ trip.end_date }}</td>
                        <td>${{ trip.total_budget }}</td>
                        <td>{{ trip.status }}</td>
                        <td>
                            <button id="view-trip-details-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('trip_details', trip_id=trip.trip_id) }}'">View Details</button>
                            <button id="edit-trip-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('edit_trip', trip_id=trip.trip_id) }}'">Edit</button>
                            <form method="post" action="{{ url_for('delete_trip', trip_id=trip.trip_id) }}" style="display:inline;">
                                <button type="submit" id="delete-trip-button-{{ trip.trip_id }}">Delete</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="7">No trips found.</td></tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</body>
</html>
