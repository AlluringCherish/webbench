<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destination Details</title>
</head>
<body>
    <!-- 'destination-details-page': Container -->
    <div id="destination-details-page">
        <h1 id="destination-name">{{ destination.name }}</h1>
        <div id="destination-country">Country: {{ destination.country }}</div>
        <div id="destination-description">{{ destination.description }}</div>

        <form method="post" action="{{ url_for('add_destination_to_trip', dest_id=destination.dest_id) }}">
            <button type="submit" id="add-to-trip-button">Add to Trip</button>
        </form>

        <div id="destination-attractions">
            <h2>Main Attractions</h2>
            <ul>
                {% for attraction in destination.attractions.split(',') %}
                    <li>{{ attraction.strip() }}</li>
                {% else %}
                    <li>No main attractions listed.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
