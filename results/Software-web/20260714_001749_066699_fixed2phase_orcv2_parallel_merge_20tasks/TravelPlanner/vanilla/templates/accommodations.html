<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
    <!-- 'accommodations-page' container -->
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>

        <form method="get" action="{{ url_for('search_accommodations') }}">
            <label for="destination-input">Destination:</label>
            <input type="text" id="destination-input" name="destination" value="{{ destination|default('') }}" />

            <label for="check-in-date">Check-in Date:</label>
            <input type="date" id="check-in-date" name="check_in_date" value="{{ check_in_date|default('') }}" />

            <label for="check-out-date">Check-out Date:</label>
            <input type="date" id="check-out-date" name="check_out_date" value="{{ check_out_date|default('') }}" />

            <label for="price-filter">Price Range:</label>
            <select id="price-filter" name="price_filter">
                <option value="" {% if not price_filter %}selected{% endif %}>All</option>
                <option value="Budget" {% if price_filter == 'Budget' %}selected{% endif %}>Budget</option>
                <option value="Mid-range" {% if price_filter == 'Mid-range' %}selected{% endif %}>Mid-range</option>
                <option value="Luxury" {% if price_filter == 'Luxury' %}selected{% endif %}>Luxury</option>
            </select>

            <button type="submit">Search</button>
        </form>

        <!-- Hotels List -->
        <div id="hotels-list">
            {% if hotels %}
                <ul>
                {% for hotel in hotels %}
                    <li>
                        <strong>{{ hotel.name }}</strong> in {{ hotel.city }} - Rating: {{ hotel.rating }}/5 - ${{ hotel.price_per_night }}/night
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No hotels found matching your criteria.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
