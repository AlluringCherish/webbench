<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
    <div id="bid-history-page">
        <h1>Bid History</h1>
        <select id="filter-by-auction" name="auction_id" onchange="location = '?auction_id=' + this.value;">
            <option value="">All Auctions</option>
            {% for auction in auctions %}
            <option value="{{ auction.auction_id }}" {% if request.args.get('auction_id') == auction.auction_id|string %}selected{% endif %}>{{ auction.item_name }}</option>
            {% endfor %}
        </select>
        <button id="sort-by-amount" onclick="location = location.pathname + '?sort=amount'">Sort by Amount</button>
        <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
        <table id="bids-table" border="1">
            <thead>
                <tr>
                    <th>Bid ID</th>
                    <th>Auction Name</th>
                    <th>Bidder</th>
                    <th>Amount</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                <tr>
                    <td>{{ bid.bid_id }}</td>
                    <td>{{ bid.auction_name }}</td>
                    <td>{{ bid.bidder_name }}</td>
                    <td>{{ bid.bid_amount }}</td>
                    <td>{{ bid.bid_timestamp }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
