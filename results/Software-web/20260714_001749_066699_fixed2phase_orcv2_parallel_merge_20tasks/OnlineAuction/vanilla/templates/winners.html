<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>
        <form method="get" action="/winners">
        <input type="text" id="filter-by-winner" name="name" placeholder="Filter winners by name" value="{{ request.args.get('name', '') }}" />
        </form>
        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                <h2>{{ winner.item_name }}</h2>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: {{ winner.winning_bid }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
