<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Auction Dashboard</h1>
        <div id="featured-auctions">
            {% for auction in featured_auctions %}
            <div class="featured-auction-item">
                <h2>{{ auction.item_name }}</h2>
                <p>{{ auction.description }}</p>
                <p>Current Bid: {{ auction.current_bid }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="browse-auctions-button" onclick="window.location.href='/auctions'">Browse Auctions</button>
        <button id="view-bids-button" onclick="window.location.href='/bid_history'">View Bids</button>
        <button id="trending-auctions-button" onclick="window.location.href='/trending'">Trending Auctions</button>
    </div>
</body>
</html>
