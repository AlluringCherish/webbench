<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>
        <form method="get" action="/auctions">
        <input type="text" id="search-input" name="search" placeholder="Search auctions..." value="{{ request.args.get('search', '') }}"/>
        <select id="category-filter" name="category">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_name }}" {% if request.args.get('category') == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
        </form>
        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-item-card">
                <h2>{{ auction.item_name }}</h2>
                <p>{{ auction.description }}</p>
                <p>Current Bid: {{ auction.current_bid }}</p>
                <button id="view-auction-button-{{ auction.auction_id }}" onclick="window.location.href='/auction/{{ auction.auction_id }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
