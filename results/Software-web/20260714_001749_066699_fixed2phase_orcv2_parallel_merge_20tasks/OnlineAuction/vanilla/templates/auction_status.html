<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>
        <select id="status-filter" name="status" onchange="location = '?status=' + this.value;">
            <option value="All" {% if request.args.get('status') == 'All' %}selected{% endif %}>All</option>
            <option value="Active" {% if request.args.get('status') == 'Active' %}selected{% endif %}>Active</option>
            <option value="Closed" {% if request.args.get('status') == 'Closed' %}selected{% endif %}>Closed</option>
            <option value="Upcoming" {% if request.args.get('status') == 'Upcoming' %}selected{% endif %}>Upcoming</option>
        </select>
        <button id="refresh-status-button" onclick="location.reload();">Refresh Status</button>
        <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Time Remaining</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions_status %}
                <tr>
                    <td>{{ auction.item_name }}</td>
                    <td>{{ auction.status }}</td>
                    <td>{{ auction.time_remaining }}</td>
                    <td>{{ auction.current_bid }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
