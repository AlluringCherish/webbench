<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Categories</title>
</head>
<body>
    <div id="categories-page">
        <h1>Auction Categories</h1>
        <div id="categories-list">
            {% for category in categories %}
            <div id="category-card-{{ category.category_id }}" class="category-card">
                <h2>{{ category.category_name }}</h2>
                <p>{{ category.description }}</p>
                <p>Items: {{ category.item_count }}</p>
                <button id="view-category-button-{{ category.category_id }}" onclick="window.location.href='/category/{{ category.category_id }}/items'">View Items</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
