<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
    <!-- 'Adoption Application Form Container' -->
    <div id="application-page">
        <form action="{{ url_for('add_application', pet_id=pet.pet_id) }}" method="post">
            <label for="applicant-name">Full Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" value="{{ applicant_name|default('') }}" required />

            <label for="applicant-phone">Phone Number:</label>
            <input type="text" id="applicant-phone" name="phone" value="{{ applicant_phone|default('') }}" required />

            <label for="housing-type">Housing Type:</label>
            <select id="housing-type" name="housing_type" required>
                {% set housing_options = ['House', 'Apartment', 'Condo', 'Other'] %}
                {% for option in housing_options %}
                    <option value="{{ option }}" {% if housing_type == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <label for="reason">Reason for Adoption:</label>
            <textarea id="reason" name="reason" required>{{ reason|default('') }}</textarea>

            <button type="submit" id="submit-application-button">Submit Application</button>
            <button type="button" id="back-to-pet" onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet</button>
        </form>
    </div>
</body>
</html>
