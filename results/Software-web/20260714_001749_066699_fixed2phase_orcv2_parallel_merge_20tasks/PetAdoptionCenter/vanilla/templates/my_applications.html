<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <!-- 'My Applications Page Container' -->
    <div id="my-applications-page">
        <form method="get" action="{{ url_for('my_applications') }}">
            <label for="filter-status">Filter by Status:</label>
            <select id="filter-status" name="status" onchange="this.form.submit()">
                {% set status_options = ['All', 'Pending', 'Approved', 'Rejected'] %}
                {% for status in status_options %}
                    <option value="{{ status }}" {% if request.args.get('status', 'All') == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </form>

        <table id="applications-table" border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>Pet Name</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for application in applications %}
                    <tr>
                        <td>{{ application.pet_name }}</td>
                        <td>{{ application.date_submitted }}</td>
                        <td>{{ application.status }}</td>
                        <td>
                            {# Potentially actions like view or edit - placeholder #}
                            <a href="#">View</a>
                        </td>
                    </tr>
                {% else %}
                    <tr>
                        <td colspan="4">No applications found.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
