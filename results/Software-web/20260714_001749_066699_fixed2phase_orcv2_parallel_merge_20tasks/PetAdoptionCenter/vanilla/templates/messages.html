<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <!-- 'Messages Page Container' -->
    <div id="messages-page">
        <!-- 'List of Message Conversations' -->
        <div id="conversation-list">
            {% for convo in conversations %}
                <div class="conversation-item">
                    <a href="{{ url_for('view_conversation', other_username=convo.other_username) }}">{{ convo.other_username }}</a>
                    {% if convo.unread_count > 0 %}<strong>({{ convo.unread_count }})</strong>{% endif %}
                </div>
            {% else %}
                <p>No conversations found.</p>
            {% endfor %}
        </div>

        <!-- 'Compose New Message' -->
        <form action="{{ url_for('send_message') }}" method="post">
            <textarea id="message-input" name="message" placeholder="Write your message here..."></textarea>
            <br />
            <button type="submit" id="send-message-button">Send Message</button>
        </form>

        <!-- 'Back to Dashboard Button' -->
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
