<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Details</title>
</head>
<body>
    <!-- 'Pet Details Page Container' -->
    <div id="pet-details-page">
        <!-- 'Pet Name' -->
        <h1 id="pet-name">{{ pet.name }}</h1>

        <!-- 'Pet Species' -->
        <div id="pet-species">{{ pet.species }}</div>

        <!-- 'Detailed Pet Description' -->
        <div id="pet-description">{{ pet.description }}</div>

        <!-- 'Start Adoption Application Process Button' -->
        <button id="adopt-button" onclick="location.href='{{ url_for('add_application', pet_id=pet.pet_id) }}'">Adopt</button>

        <!-- 'Navigate back to Pet Listings' -->
        <button id="back-to-listings" onclick="location.href='{{ url_for('pet_listings') }}'">Back to Listings</button>
    </div>
</body>
</html>
