<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
    <!-- 'Add Pet Page Container' -->
    <div id="add-pet-page">
        <form action="{{ url_for('add_pet') }}" method="post">
            <label for="pet-name-input">Pet Name:</label>
            <input type="text" id="pet-name-input" name="name" required />

            <label for="pet-species-input">Species:</label>
            <select id="pet-species-input" name="species" required>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Bird">Bird</option>
                <option value="Rabbit">Rabbit</option>
                <option value="Other">Other</option>
            </select>

            <label for="pet-breed-input">Breed:</label>
            <input type="text" id="pet-breed-input" name="breed" required />

            <label for="pet-age-input">Age:</label>
            <input type="text" id="pet-age-input" name="age" placeholder="e.g., 2 years" required />

            <label for="pet-gender-input">Gender:</label>
            <select id="pet-gender-input" name="gender" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label for="pet-size-input">Size:</label>
            <select id="pet-size-input" name="size" required>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>

            <label for="pet-description-input">Description:</label>
            <textarea id="pet-description-input" name="description" required></textarea>

            <button type="submit" id="submit-pet-button">Submit New Pet</button>
            <button type="button" id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
