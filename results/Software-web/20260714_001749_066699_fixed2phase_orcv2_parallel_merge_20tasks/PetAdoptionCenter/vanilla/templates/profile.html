<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <!-- 'User Profile Page Container' -->
    <div id="profile-page">
        <!-- 'Display Username, Not Editable' -->
        <div id="profile-username">Username: {{ user.username }}</div>

        <!-- 'Input Field to Update Email' -->
        <form action="{{ url_for('profile') }}" method="post">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ user.email }}" required />

            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
