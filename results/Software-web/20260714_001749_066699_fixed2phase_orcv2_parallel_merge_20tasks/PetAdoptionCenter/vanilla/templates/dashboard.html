<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <!-- 'Dashboard Page Container' -->
    <div id="dashboard-page">
        <!-- 'Featured Pets Display, max 5 pets' -->
        <div id="featured-pets">
            {# Loop to display featured pets dynamically #}
            {% for pet in featured_pets %}
                <div class="featured-pet-card">
                    <h3>{{ pet.name }}</h3>
                    <p>Species: {{ pet.species }}</p>
                    <p>Age: {{ pet.age }}</p>
                </div>
            {% endfor %}
        </div>

        <!-- 'Button to navigate to Pet Listings page' -->
        <button id="browse-pets-button" onclick="location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>

        <!-- 'Button to refresh dashboard page' -->
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Refresh Dashboard</button>
    </div>
</body>
</html>
