<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="locations-page">
        <label for="hours-filter">Filter by Operating Hours:</label>
        <select id="hours-filter" name="hours">
            <option value="">All Hours</option>
            <option value="24/7">24/7</option>
            <option value="09:00-18:00">09:00-18:00</option>
            <!-- Add more options as needed -->
        </select>

        <label for="search-location-input">Search by City or Name:</label>
        <input type="text" id="search-location-input" name="search_location" placeholder="Enter city or location name">

        <div id="locations-list">
            {% for location in locations %}
            <div class="location-item">
                <p>{{ location.city }} - {{ location.address }}</p>
                <p>Phone: {{ location.phone }}</p>
                <p>Hours: {{ location.hours }}</p>
                <button id="location-detail-button-{{ location.location_id }}" onclick="window.location.href='/locations/{{ location.location_id }}'">View Details</button>
            </div>
            {% else %}
            <p>No locations found.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
