<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <div id="reservations-list">
            {% for reservation in reservations %}
            <div class="reservation-item">
                <p>Reservation ID: {{ reservation.reservation_id }}</p>
                <p>Status: {{ reservation.status }}</p>
                <button id="modify-reservation-button-{{ reservation.reservation_id }}" onclick="window.location.href='/reservations/{{ reservation.reservation_id }}/modify'">Modify</button>
                <button id="cancel-reservation-button-{{ reservation.reservation_id }}" onclick="window.location.href='/reservations/{{ reservation.reservation_id }}/cancel'">Cancel</button>
            </div>
            {% else %}
            <p>No reservations found.</p>
            {% endfor %}
        </div>
        <button id="sort-by-date-button">Sort by Date</button>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
