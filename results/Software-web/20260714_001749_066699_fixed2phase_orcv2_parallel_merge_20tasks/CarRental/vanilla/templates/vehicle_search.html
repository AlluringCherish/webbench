<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="search-page">
        <label for="location-filter">Pickup Location:</label>
        <select id="location-filter" name="location">
            <option value="">All Locations</option>
            {% for location in locations %}
            <option value="{{ location.city }}">{{ location.city }}</option>
            {% endfor %}
        </select>

        <label for="vehicle-type-filter">Vehicle Type:</label>
        <select id="vehicle-type-filter" name="vehicle_type">
            <option value="">All Types</option>
            <option value="Economy">Economy</option>
            <option value="Compact">Compact</option>
            <option value="Sedan">Sedan</option>
            <option value="SUV">SUV</option>
            <option value="Luxury">Luxury</option>
        </select>

        <label for="date-range-input">Rental Date Range:</label>
        <input type="text" id="date-range-input" name="date_range" placeholder="YYYY-MM-DD to YYYY-MM-DD">

        <div id="vehicles-grid">
            {% for vehicle in vehicles %}
            <div class="vehicle-card">
                <img src="{{ vehicle.image_url if vehicle.image_url else '/static/default_vehicle.jpg' }}" alt="{{ vehicle.make }} {{ vehicle.model }}">
                <h3>{{ vehicle.make }} {{ vehicle.model }}</h3>
                <p>Price per day: ${{ vehicle.daily_rate }}</p>
                <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="window.location.href='/vehicles/{{ vehicle.vehicle_id }}'">View Details</button>
            </div>
            {% else %}
            <p>No vehicles found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
