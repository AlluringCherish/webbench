<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="insurance-page">
        <div id="insurance-options">
            <form method="post" action="/booking/confirm">
            {% for plan in insurance_plans %}
            <div class="insurance-plan">
                <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="insurance_id" value="{{ plan.insurance_id }}">
                <label for="select-insurance-{{ plan.insurance_id }}">
                    <h4>{{ plan.plan_name }}</h4>
                    <p>{{ plan.description }}</p>
                    <p>Daily Cost: ${{ plan.daily_cost }}</p>
                    <p>Coverage Limit: {{ plan.coverage_limit }}</p>
                    <p>Deductible: ${{ plan.deductible }}</p>
                </label>
            </div>
            {% endfor %}
            <div id="insurance-description"></div>
            <div id="insurance-price"></div>
            <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
