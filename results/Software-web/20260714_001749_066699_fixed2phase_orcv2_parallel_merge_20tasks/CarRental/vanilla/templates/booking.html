<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="booking-page">
        <label for="pickup-location">Pickup Location:</label>
        <select id="pickup-location" name="pickup_location">
            {% for location in locations %}
            <option value="{{ location.city }}">{{ location.city }}</option>
            {% endfor %}
        </select>

        <label for="dropoff-location">Dropoff Location:</label>
        <select id="dropoff-location" name="dropoff_location">
            {% for location in locations %}
            <option value="{{ location.city }}">{{ location.city }}</option>
            {% endfor %}
        </select>

        <label for="pickup-date">Pickup Date:</label>
        <input type="date" id="pickup-date" name="pickup_date">

        <label for="dropoff-date">Dropoff Date:</label>
        <input type="date" id="dropoff-date" name="dropoff_date">

        <button id="calculate-price-button">Calculate Price</button>
        <div id="total-price">
            {% if total_price is defined %}
            <p>Total Price: ${{ total_price }}</p>
            {% endif %}
        </div>

        <button id="proceed-to-insurance-button" onclick="window.location.href='/insurance'">Proceed to Insurance</button>
    </div>
</body>
</html>
