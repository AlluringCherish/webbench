<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
<div id="artifact-catalog-page">
    <h1>Artifact Catalog</h1>
    <form method="get" action="{{ url_for('artifact_catalog') }}">
        <input type="text" id="search-artifact" name="search" placeholder="Search artifacts..." value="{{ request.args.get('search', '') }}">
        <button id="apply-artifact-filter" type="submit">Apply Filter</button>
    </form>
    <table id="artifact-table" border="1">
        <thead>
            <tr>
                <th>Artifact ID</th>
                <th>Name</th>
                <th>Period</th>
                <th>Origin</th>
                <th>Exhibition</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for artifact in artifacts %}
            <tr>
                <td>{{ artifact.artifact_id }}</td>
                <td>{{ artifact.artifact_name }}</td>
                <td>{{ artifact.period }}</td>
                <td>{{ artifact.origin }}</td>
                <td>{{ artifact.exhibition_name }}</td>
                <td><!-- Placeholder for any artifact actions --></td>
            </tr>
        {% else %}
            <tr><td colspan="6">No artifacts found.</td></tr>
        {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
