<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
<div id="audio-guides-page">
    <h1>Audio Guides</h1>
    <form method="get" action="{{ url_for('audio_guides') }}">
        <label for="filter-language">Language:</label>
        <select id="filter-language" name="language">
            <option value="" {% if not request.args.get('language') %}selected{% endif %}>All</option>
            <option value="English" {% if request.args.get('language') == 'English' %}selected{% endif %}>English</option>
            <option value="Spanish" {% if request.args.get('language') == 'Spanish' %}selected{% endif %}>Spanish</option>
            <option value="French" {% if request.args.get('language') == 'French' %}selected{% endif %}>French</option>
        </select>
        <button id="apply-language-filter" type="submit">Apply Filter</button>
    </form>
    <table id="audio-guide-list" border="1">
        <thead>
            <tr>
                <th>Exhibit Number</th>
                <th>Title</th>
                <th>Language</th>
                <th>Duration (min)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        {% for guide in audioguides %}
            <tr>
                <td>{{ guide.exhibit_number }}</td>
                <td>{{ guide.title }}</td>
                <td>{{ guide.language }}</td>
                <td>{{ guide.duration }}</td>
                <td><button id="play-guide-button-{{ guide.guide_id }}">Play</button></td>
            </tr>
        {% else %}
            <tr><td colspan="5">No audio guides found.</td></tr>
        {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
