<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Content Calendar</title>
</head>
<body>
  <!-- Content Calendar Page Container -->
  <div id="calendar-page">

    <h1>Content Calendar</h1>

    <!-- Calendar View Selector -->
    <label for="calendar-view">View:</label>
    <select id="calendar-view" name="calendar_view" onchange="location = this.value;">
      {% for view_option in calendar_view_options %}
      <option value="?view={{ view_option }}" {% if selected_view == view_option %}selected{% endif %}>{{ view_option | capitalize }}</option>
      {% endfor %}
    </select>

    <!-- Calendar Grid -->
    <div id="calendar-grid">
      {% if scheduled_items %}
      <ul>
        {% for item in scheduled_items %}
        <li>{{ item.publish_date }} - <a href="/article/{{ item.article_id }}/edit">{{ item.title }}</a></li>
        {% endfor %}
      </ul>
      {% else %}
      <p>No scheduled items.</p>
      {% endif %}
    </div>

    <!-- Schedule Button -->
    <button id="schedule-button" onclick="window.location.href='/article/create'">Schedule New Content</button>

    <!-- Back to Dashboard Button -->
    <button id="back-to-dashboard-calendar" onclick="window.location.href='/dashboard'">Back to Dashboard</button>

  </div>
</body>
</html>
