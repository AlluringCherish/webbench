<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Article</title>
</head>
<body>
  <!-- Create Article Page Container -->
  <div id="create-article-page">

    <h1>Create New Article</h1>

    <form method="post" action="">
      <!-- Article Title Input -->
      <label for="article-title">Title:</label><br>
      <input type="text" id="article-title" name="article_title" value="{{ article_title | default('') }}" required><br><br>

      <!-- Article Content Textarea -->
      <label for="article-content">Content:</label><br>
      <textarea id="article-content" name="article_content" rows="15" cols="80" required>{{ article_content | default('') }}</textarea><br><br>

      <!-- Save Draft and Cancel Buttons -->
      <button type="submit" id="save-draft-button" name="save_draft" value="1">Save Draft</button>
      <button type="button" id="cancel-button" onclick="window.location.href='/dashboard'">Cancel</button>
    </form>

  </div>
</body>
</html>
