<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Article Analytics</title>
</head>
<body>
  <!-- Article Analytics Page Container -->
  <div id="analytics-page">

    <h1>Analytics for Article {{ article_id }}</h1>

    <section id="analytics-overview">
      <p id="analytics-total-views"><strong>Total Views:</strong> {{ analytics_summary.total_views }}</p>
      <p id="analytics-unique-visitors"><strong>Unique Visitors:</strong> {{ analytics_summary.unique_visitors }}</p>
      <!-- Additional analytics can be added here -->
    </section>

    <button id="back-to-article-analytics" onclick="window.location.href='/article/' + {{ article_id }} + '/edit'">Back to Article</button>

  </div>
</body>
</html>
