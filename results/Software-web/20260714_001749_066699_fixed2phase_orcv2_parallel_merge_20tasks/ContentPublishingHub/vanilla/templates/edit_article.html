<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Article</title>
</head>
<body>
  <!-- Edit Article Page Container -->
  <div id="edit-article-page">

    <h1>Edit Article</h1>

    <form method="post" action="">
      <!-- Article Title Input -->
      <label for="edit-article-title">Title:</label><br>
      <input type="text" id="edit-article-title" name="edit-article-title" value="{{ article_title }}" required><br><br>

      <!-- Article Content Textarea -->
      <label for="edit-article-content">Content:</label><br>
      <textarea id="edit-article-content" name="edit-article-content" rows="15" cols="80" required>{{ article_content }}</textarea><br><br>

      <!-- Save Version and Cancel Buttons -->
      <button type="submit" id="save-version-button" name="save_version" value="1">Save Version</button>
      <button type="button" id="cancel-edit" onclick="window.location.href='/dashboard'">Cancel</button>
    </form>

  </div>
</body>
</html>
