<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog - MusicStreaming</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>

    <form method="get" action="">
        <input type="text" id="search-input" name="search" value="{{ request.args.get('search', '') }}" placeholder="Search songs...">
        <select id="genre-filter" name="genre">
            <option value="">All Genres</option>
            {% for genre in genres %}
                <option value="{{ genre.genre_name }}" {% if request.args.get('genre') == genre.genre_name %}selected{% endif %}>{{ genre.genre_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="songs-grid">
        {% if songs %}
            {% for song in songs %}
                <div class="song-card">
                    <div class="song-title">{{ song.title }}</div>
                    <div class="song-artist">{{ song.artist_name }}</div>
                    <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
                </div>
            {% endfor %}
        {% else %}
            <p>No songs found.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
