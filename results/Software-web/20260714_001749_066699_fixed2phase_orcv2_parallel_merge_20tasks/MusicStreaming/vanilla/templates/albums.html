<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums - MusicStreaming</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>

    <form method="get" action="">
        <input type="text" id="search-albums" name="search" value="{{ request.args.get('search', '') }}" placeholder="Search albums or artists...">
        <select id="sort-albums" name="sort">
            <option value="">Sort By</option>
            <option value="title" {% if request.args.get('sort') == 'title' %}selected{% endif %}>Title</option>
            <option value="artist" {% if request.args.get('sort') == 'artist' %}selected{% endif %}>Artist</option>
            <option value="year" {% if request.args.get('sort') == 'year' %}selected{% endif %}>Year</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="albums-grid">
        {% if albums %}
            {% for album in albums %}
                <div class="album-card">
                    <div class="album-title">{{ album.title }}</div>
                    <div class="album-artist">{{ album.artist_name }}</div>
                    <button id="view-album-button-{{ album.album_id }}" onclick="location.href='{{ url_for('album_details', album_id=album.album_id) }}'">View</button>
                </div>
            {% endfor %}
        {% else %}
            <p>No albums found.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
