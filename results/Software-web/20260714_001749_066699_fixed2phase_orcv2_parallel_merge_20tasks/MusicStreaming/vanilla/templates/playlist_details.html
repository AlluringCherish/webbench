<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ playlist.title }} - Playlist Details - MusicStreaming</title>
</head>
<body>
<div id="playlist-details-page">
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>

    <table id="songs-in-playlist" border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Artist</th>
                <th>Duration</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% if songs %}
                {% for song in songs %}
                    <tr>
                        <td>{{ song.title }}</td>
                        <td>{{ song.artist_name }}</td>
                        <td>{{ song.duration }} seconds</td>
                        <td><button id="remove-song-button-{{ song.song_id }}">Remove</button></td>
                    </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="4">No songs in this playlist.</td>
                </tr>
            {% endif %}
        </tbody>
    </table>

    <button id="delete-playlist-button">Delete Playlist</button>
</div>
</body>
</html>
