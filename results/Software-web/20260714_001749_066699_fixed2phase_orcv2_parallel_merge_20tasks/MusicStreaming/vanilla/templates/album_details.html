<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ album.title }} - Album Details - MusicStreaming</title>
</head>
<body>
<div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">Artist: {{ artist.name }}</div>
    <div id="album-year">Year: {{ album.release_year }}</div>

    <div id="album-songs-list">
        <h2>Songs</h2>
        <ul>
            {% for song in songs %}
                <li>{{ song.title }} - {{ song.duration }} seconds</li>
            {% else %}
                <li>No songs in this album.</li>
            {% endfor %}
        </ul>
    </div>

    <button id="add-album-to-playlist-button">Add Album to Playlist</button>
</div>
</body>
</html>
