<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ song.title }} - Song Details - MusicStreaming</title>
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>

    <div id="artist-name">
        Artist: <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">{{ artist.name }}</a>
    </div>

    <div id="album-name">
        Album: {{ album.title }}
    </div>

    <div id="duration-display">
        Duration: {{ song.duration }} seconds
    </div>

    <button id="play-button">Play</button>
</div>
</body>
</html>
