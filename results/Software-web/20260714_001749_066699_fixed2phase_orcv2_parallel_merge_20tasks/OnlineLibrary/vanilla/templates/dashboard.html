<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        /* Basic styles for layout */
        #dashboard-page { max-width: 800px; margin: auto; padding: 20px; }
        button { margin: 10px 5px; padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
<div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ username }}!</h1>
    <div>
        <button id="browse-books-button" onclick="window.location.href='{{ url_for('list_books') }}'">Browse Books</button>
        <button id="my-borrows-button" onclick="window.location.href='{{ url_for('list_user_borrowings') }}'">My Borrowings</button>
    </div>

    {% if featured_books %}
    <h2>Featured Books</h2>
    <ul>
        {% for book in featured_books %}
        <li><a href="{{ url_for('show_book_details', book_id=book.book_id) }}">{{ book.title }}</a> by {{ book.author }}</li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No featured books available.</p>
    {% endif %}
</div>
</body>
</html>
