<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
    <style>
        #payment-page { max-width: 500px; margin: auto; padding: 20px; }
        #fine-amount-display { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>
<div id="payment-page">
    <h1>Fine Payment</h1>
    <div id="fine-amount-display">Amount to Pay: ${{ '%.2f'|format(fine.amount) }}</div>

    <form method="post" action="{{ url_for('payment_fines', fine_id=fine.fine_id) }}">
        <button type="submit" id="confirm-payment-button">Confirm Payment</button>
        <button type="button" id="back-to-profile" onclick="window.location.href='{{ url_for('show_profile') }}'">Back to Profile</button>
    </form>
</div>
</body>
</html>
