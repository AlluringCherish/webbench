<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
    <style>
        #reviews-page { max-width: 900px; margin: auto; padding: 20px; }
        #reviews-list { margin-top: 20px; }
        .review-item { padding: 10px; border-bottom: 1px solid #ccc; }
        button { margin-right: 10px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
<div id="reviews-page">
    <h1>My Reviews</h1>
    <div id="reviews-list">
        {% for review in reviews %}
        <div class="review-item">
            <div><strong>Book:</strong> {{ books[review.book_id].title }}</div>
            <div><strong>Rating:</strong> {{ review.rating }} / 5</div>
            <div><strong>Review:</strong> {{ review.review_text }}</div>
            <button id="edit-review-button-{{ review.review_id }}" onclick="window.location.href='{{ url_for('write_review', book_id=review.book_id) }}'">Edit</button>
            <form method="post" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this review?');">
                <button type="submit" id="delete-review-button-{{ review.review_id }}">Delete</button>
            </form>
        </div>
        {% else %}
        <p>No reviews found.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('show_dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
