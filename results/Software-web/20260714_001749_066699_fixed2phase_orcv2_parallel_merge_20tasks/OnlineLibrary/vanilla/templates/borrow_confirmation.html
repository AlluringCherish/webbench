<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
    <style>
        #borrow-page { max-width: 600px; margin: auto; padding: 20px; }
        #borrow-book-info { margin-bottom: 20px; }
        button { margin-right: 15px; padding: 10px 20px; font-size: 16px; }
    </style>
</head>
<body>
<div id="borrow-page">
    <h1>Borrow Confirmation</h1>
    <div id="borrow-book-info">
        <h2>{{ book.title }}</h2>
        <p>Author: {{ book.author }}</p>
        <p>Status: {{ book.status }}</p>
    </div>
    <div id="due-date-display">Due Date: {{ due_date }}</div>

    <form method="post" action="{{ url_for('borrow_confirm', book_id=book.book_id) }}">
        <button type="submit" id="confirm-borrow-button">Confirm Borrow</button>
        <button type="button" id="cancel-borrow-button" onclick="window.location.href='{{ url_for('show_book_details', book_id=book.book_id) }}'">Cancel</button>
    </form>
</div>
</body>
</html>
