<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <form method="POST" action="/waitlist">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="party_size">
                {% for size in possible_party_sizes %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>
            <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        </form>
        <div id="user-position">{{ user_position }}</div>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
