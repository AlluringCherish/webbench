<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <form method="POST" action="/reviews/write">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id">
                {% for dish in dishes_for_review %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for i in range(1,6) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>

            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" rows="4" cols="50"></textarea>

            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-reviews" onclick="window.location.href='/reviews/my'">Back to My Reviews</button>
    </div>
</body>
</html>
