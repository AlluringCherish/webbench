<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <div id="menu-grid">
            {% for dish in menu_items %}
            <div class="dish-item">
                <h2>{{ dish.name }}</h2>
                <p>Category: {{ dish.category }}</p>
                <p>Price: ${{ '%.2f' | format(dish.price) }}</p>
                <p>{{ dish.description }}</p>
                <p>Average Rating: {{ dish.avg_rating }}</p>
                <button id="view-dish-button-{{ dish.dish_id }}" onclick="window.location.href='/menu/{{ dish.dish_id }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
