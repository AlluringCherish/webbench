<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <div id="reservation-page">
        <form method="POST" action="/reservation/make">
            <label for="guest-name">Guest Name:</label>
            <input id="guest-name" name="guest_name" type="text" value="{{ guest_name | default('') }}" required>

            <label for="party-size">Party Size:</label>
            <select id="party-size" name="party_size">
                {% for size in possible_party_sizes %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>

            <label for="reservation-date">Reservation Date:</label>
            <input id="reservation-date" name="reservation_date" type="date" required>

            <button id="submit-reservation-button" type="submit">Submit Reservation</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
