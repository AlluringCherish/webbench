<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <h3>{{ review.dish_name }}</h3>
                <p>Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
                {% if review.review_date %}<p>Date: {{ review.review_date }}</p>{% endif %}
            </div>
            {% endfor %}
        </div>
        <button id="write-new-review-button" onclick="window.location.href='/reviews/write'">Write New Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
