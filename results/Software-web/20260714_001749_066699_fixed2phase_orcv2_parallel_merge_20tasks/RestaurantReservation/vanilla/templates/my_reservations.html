<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="my-reservations-page">
        <table id="reservations-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Party Size</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.date }}</td>
                    <td>{{ reservation.time }}</td>
                    <td>{{ reservation.party_size }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        <form method="POST" action="/reservations/cancel/{{ reservation.reservation_id }}" style="display:inline;">
                            <button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="submit">Cancel</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
