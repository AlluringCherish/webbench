<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ username }}!</h1>
        <button id="make-reservation-button" onclick="window.location.href='/reservation/make'">Make Reservation</button>
        <button id="view-menu-button" onclick="window.location.href='/menu'">View Menu</button>
        <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Refresh Dashboard</button>
        <button id="my-reservations-button" onclick="window.location.href='/reservations/my'">My Reservations</button>
        <button id="my-reviews-button" onclick="window.location.href='/reviews/my'">My Reviews</button>
        <button id="waitlist-button" onclick="window.location.href='/waitlist'">Waitlist</button>
        <button id="profile-button" onclick="window.location.href='/profile'">User Profile</button>
    </div>
</body>
</html>
