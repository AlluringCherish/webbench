<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog - BookstoreOnline</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="/catalog">
            <input type="text" id="search-input" name="search" placeholder="Search by title, author, ISBN" value="{{ request.args.get('search', '') }}">

            <select id="category-filter" name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_name }}" {% if request.args.get('category', '') == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="books-grid">
            {% if books %}
                <ul>
                {% for book in books %}
                    <li>
                        <div>
                            <strong>{{ book.title }}</strong><br>
                            Author: {{ book.author }}<br>
                            ISBN: {{ book.isbn }}<br>
                            Category: {{ book.category }}<br>
                            Price: ${{ "%.2f"|format(book.price) }}
                            <br>
                            <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='/book/{{ book.book_id }}'">View Details</button>
                        </div>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No books found.</p>
            {% endif %}
        </div>

    </div>
</body>
</html>
