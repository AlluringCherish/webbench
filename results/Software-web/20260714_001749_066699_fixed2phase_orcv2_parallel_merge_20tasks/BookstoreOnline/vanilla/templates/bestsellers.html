<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers - BookstoreOnline</title>
</head>
<body>
    <div id="bestsellers-page">
        <h1>Bestsellers</h1>

        <form method="get" action="/bestsellers">
            <label for="time-period-filter">Select Time Period:</label>
            <select id="time-period-filter" name="period" onchange="this.form.submit()">
                <option value="This Week" {% if request.args.get('period', 'This Week') == 'This Week' %}selected{% endif %}>This Week</option>
                <option value="This Month" {% if request.args.get('period') == 'This Month' %}selected{% endif %}>This Month</option>
                <option value="All Time" {% if request.args.get('period') == 'All Time' %}selected{% endif %}>All Time</option>
            </select>
        </form>

        <div id="bestsellers-list">
            {% if bestsellers %}
                <ol>
                {% for book in bestsellers %}
                    <li>
                        {{ book.title }} by {{ book.author }} - Sales: {{ book.sales_count }}
                        <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='/book/{{ book.book_id }}'">View Details</button>
                    </li>
                {% endfor %}
                </ol>
            {% else %}
                <p>No bestsellers available for this period.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
