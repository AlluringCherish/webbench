<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - BookstoreOnline</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>

        <section id="featured-books">
            <h2>Featured Books</h2>
            <ul>
            {% for book in featured_books %}
                <li>{{ book.title }} by {{ book.author }}</li>
            {% else %}
                <li>No featured books available.</li>
            {% endfor %}
            </ul>
        </section>

        <div>
            <button id="browse-catalog-button" onclick="window.location.href='/catalog'">Browse Catalog</button>
            <button id="view-cart-button" onclick="window.location.href='/cart'">View Cart</button>
            <button id="bestsellers-button" onclick="window.location.href='/bestsellers'">Bestsellers</button>
        </div>
    </div>
</body>
</html>
