<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review - BookstoreOnline</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>

        <form method="post" action="">
            <label for="select-book">Select Book:</label><br>
            <select id="select-book" name="book_id" required>
                {% for book in books %}
                    <option value="{{ book.book_id }}">{{ book.title }} by {{ book.author }}</option>
                {% else %}
                    <option disabled>No books available</option>
                {% endfor %}
            </select><br><br>

            <label for="rating-select">Rating:</label><br>
            <select id="rating-select" name="rating" required>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select><br><br>

            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" required></textarea><br><br>

            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
