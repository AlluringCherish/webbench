<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews - BookstoreOnline</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Reviews</h1>

        <form method="get" action="/reviews">
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating_filter" onchange="this.form.submit()">
                <option value="All" {% if request.args.get('rating_filter', 'All') == 'All' %}selected{% endif %}>All</option>
                <option value="5" {% if request.args.get('rating_filter') == '5' %}selected{% endif %}>5</option>
                <option value="4" {% if request.args.get('rating_filter') == '4' %}selected{% endif %}>4</option>
                <option value="3" {% if request.args.get('rating_filter') == '3' %}selected{% endif %}>3</option>
                <option value="2" {% if request.args.get('rating_filter') == '2' %}selected{% endif %}>2</option>
                <option value="1" {% if request.args.get('rating_filter') == '1' %}selected{% endif %}>1</option>
            </select>
        </form>

        <div id="reviews-list">
            {% if reviews %}
                <ul>
                {% for review in reviews %}
                    <li>
                        <strong>{{ review.customer_name }}</strong> rated {{ review.rating }}/5<br>
                        "{{ review.review_text }}"<br>
                        <small>{{ review.review_date }}</small>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No reviews available.</p>
            {% endif %}
        </div>

        <button id="write-review-button" onclick="window.location.href='/write-review'">Write a Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
