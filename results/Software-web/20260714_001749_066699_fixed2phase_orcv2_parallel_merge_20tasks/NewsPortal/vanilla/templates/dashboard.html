<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Portal</title>
</head>
<body>
    <div id="dashboard-page">
        <section id="featured-articles">
            {% for article in featured_articles %}
            <article>
                <h2>{{ article.title }}</h2>
                <p>By {{ article.author }} on {{ article.date }}</p>
                <p>{{ article.content[:200] }}...</p>
                <a id="view-article-button-{{ article.article_id }}" href="{{ url_for('article_details', article_id=article.article_id) }}">Read More</a>
            </article>
            {% else %}
            <p>No featured articles available.</p>
            {% endfor %}
        </section>

        <button id="browse-articles-button" onclick="location.href='{{ url_for('article_catalog') }}'">Browse Articles</button>
        <button id="view-bookmarks-button" onclick="location.href='{{ url_for('view_bookmarks') }}'">View Bookmarks</button>
        <button id="trending-articles-button" onclick="location.href='{{ url_for('trending_articles') }}'">Trending Articles</button>
    </div>
</body>
</html>
