<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Details</title>
</head>
<body>
    <div id="article-details-page">
        <h1 id="article-title">{{ article.title }}</h1>
        <p id="article-author">By {{ article.author }}</p>
        <p id="article-date">{{ article.date }}</p>

        <form id="bookmark-form" method="post" action="{{ url_for('add_bookmark') }}">
            <input type="hidden" name="article_id" value="{{ article.article_id }}">
            <button type="submit" id="bookmark-button">Bookmark</button>
        </form>

        <div id="article-content">
            <p>{{ article.content }}</p>
        </div>
    </div>
</body>
</html>
