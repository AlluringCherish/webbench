<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <form id="search-form" method="get" action="{{ url_for('article_catalog') }}">
            <input id="search-input" name="search" type="text" placeholder="Search articles..." value="{{ request.args.get('search', '') }}" />
            <select id="category-filter" name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category.category_name }}" {% if category.category_name == request.args.get('category') %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <section id="articles-grid">
            {% if articles %}
                {% for article in articles %}
                <article>
                    <h2>{{ article.title }}</h2>
                    <p>By {{ article.author }} on {{ article.date }}</p>
                    <p>{{ article.content[:150] }}...</p>
                    <a id="view-article-button-{{ article.article_id }}" href="{{ url_for('article_details', article_id=article.article_id) }}">View Article</a>
                </article>
                {% endfor %}
            {% else %}
                <p>No articles found.</p>
            {% endif %}
        </section>
    </div>
</body>
</html>
