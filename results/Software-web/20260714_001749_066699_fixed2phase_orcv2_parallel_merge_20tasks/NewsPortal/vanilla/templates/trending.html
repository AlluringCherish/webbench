<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Articles</title>
</head>
<body>
    <div id="trending-page">
        <form id="time-period-filter-form" method="get" action="{{ url_for('trending_articles') }}">
            <label for="time-period-filter">Filter by Time Period:</label>
            <select id="time-period-filter" name="period">
                <option value="">All</option>
                <option value="Today" {% if request.args.get('period') == 'Today' %}selected{% endif %}>Today</option>
                <option value="This Week" {% if request.args.get('period') == 'This Week' %}selected{% endif %}>This Week</option>
                <option value="This Month" {% if request.args.get('period') == 'This Month' %}selected{% endif %}>This Month</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <section id="trending-list">
            {% if trending_articles %}
                <ul>
                {% for article in trending_articles %}
                    <li>
                        <span>{{ article.article_title }} (Category: {{ article.category }}, Views: {{ article.view_count }})</span>
                        <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No trending articles found for the selected period.</p>
            {% endif %}
        </section>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
