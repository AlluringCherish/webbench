<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
</head>
<body>
    <div id="bookmarks-page">
        <section id="bookmarks-list">
            {% if bookmarks %}
                <ul>
                {% for bookmark in bookmarks %}
                    <li>
                        <span>{{ bookmark.article_title }} (Bookmarked on {{ bookmark.bookmarked_date }})</span>
                        <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" onclick="fetch('{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}', {method: 'DELETE'}).then(() => location.reload())">Remove</button>
                        <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('article_details', article_id=bookmark.article_id) }}'">Read</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No bookmarks found.</p>
            {% endif %}
        </section>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
