{% extends "base.html" %}

{% block title %}Job Board Dashboard{% endblock %}

{% block content %}
<div id="dashboard-page">
    <div id="featured-jobs">
        {% for job in featured_jobs %}
        <div class="featured-job-card">
            <h3>{{ job.title }}</h3>
            <p>{{ job.company_name }} - {{ job.location }}</p>
            <p>{{ job.description }}</p>
            <button id="view-job-button-{{ job.job_id }}" onclick="location.href='/jobs/{{ job.job_id }}'">View Details</button>
        </div>
        {% else %}
        <p>No featured jobs available at the moment.</p>
        {% endfor %}
    </div>

    <button id="browse-jobs-button" onclick="location.href='/jobs'">Browse Jobs</button>
    <button id="my-applications-button" onclick="location.href='/applications'">My Applications</button>
    <button id="companies-button" onclick="location.href='/companies'">Companies</button>
</div>
{% endblock %}
