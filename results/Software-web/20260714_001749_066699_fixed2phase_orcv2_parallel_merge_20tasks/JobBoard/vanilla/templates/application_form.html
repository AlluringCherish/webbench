{% extends "base.html" %}

{% block title %}Submit Application{% endblock %}

{% block content %}
<div id="application-form-page">
    {% if errors %}
    <ul class="error-messages">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        <label for="applicant-name">Name:</label>
        <input type="text" id="applicant-name" name="applicant_name" required value="{{ applicant_name|default('') }}" />

        <label for="applicant-email">Email:</label>
        <input type="email" id="applicant-email" name="applicant_email" required value="{{ applicant_email|default('') }}" />

        <label for="resume-upload">Upload Resume:</label>
        <input type="file" id="resume-upload" name="resume_upload" required />

        <label for="cover-letter">Cover Letter:</label>
        <textarea id="cover-letter" name="cover_letter" rows="6" required>{{ cover_letter|default('') }}</textarea>

        <button type="submit" id="submit-application-button">Submit Application</button>
    </form>
</div>
{% endblock %}
