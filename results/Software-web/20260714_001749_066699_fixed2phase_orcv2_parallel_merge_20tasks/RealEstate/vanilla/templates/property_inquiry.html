<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit Property Inquiry</title>
</head>
<body>
    <main id="inquiry-page">
        <h1>Submit Property Inquiry</h1>

        <form method="post" action="/inquiry">
            <input type="hidden" name="property_id" id="property_id" value="{{ property_id or '' }}" />

            <label for="customer_name">Name:</label>
            <input type="text" id="customer_name" name="customer_name" required />

            <label for="customer_email">Email:</label>
            <input type="email" id="customer_email" name="customer_email" required />

            <label for="customer_phone">Phone:</label>
            <input type="tel" id="customer_phone" name="customer_phone" required />

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit" id="submit-inquiry-button">Submit Inquiry</button>
        </form>

        <nav>
            <button onclick="location.href='/dashboard'" id="back-to-dashboard">Back to Dashboard</button>
        </nav>
    </main>
</body>
</html>
