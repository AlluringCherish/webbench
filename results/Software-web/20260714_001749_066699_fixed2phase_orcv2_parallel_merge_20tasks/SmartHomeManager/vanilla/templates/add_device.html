<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Device</title>
</head>
<body>
    <!-- Add device page container -->
    <div id="add-device-page">
        <form method="post" action="">
            <!-- Device Name Input -->
            <label for="device-name">Device Name:</label>
            <input type="text" id="device-name" name="device_name" required />
            <br />
            <!-- Device Type Dropdown -->
            <label for="device-type">Device Type:</label>
            <select id="device-type" name="device_type" required>
                <option value="Light">Light</option>
                <option value="Thermostat">Thermostat</option>
                <option value="Camera">Camera</option>
                <option value="Lock">Lock</option>
                <option value="Sensor">Sensor</option>
                <option value="Appliance">Appliance</option>
            </select>
            <br />
            <!-- Device Room Dropdown -->
            <label for="device-room">Room:</label>
            <select id="device-room" name="device_room" required>
                <option value="Living Room">Living Room</option>
                <option value="Bedroom">Bedroom</option>
                <option value="Kitchen">Kitchen</option>
                <option value="Bathroom">Bathroom</option>
                <option value="Garage">Garage</option>
            </select>
            <br />
            <!-- Brand Input (optional) -->
            <label for="brand">Brand:</label>
            <input type="text" id="brand" name="brand" />
            <br />
            <!-- Model Input (optional) -->
            <label for="model">Model:</label>
            <input type="text" id="model" name="model" />
            <br />
            <!-- Submit Button -->
            <button type="submit" id="submit-device-button">Add Device</button>
        </form>

        <!-- Back to dashboard button -->
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
