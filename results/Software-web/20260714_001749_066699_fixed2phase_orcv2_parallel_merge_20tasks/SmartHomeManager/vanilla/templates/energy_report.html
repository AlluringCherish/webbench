<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
    <!-- Energy report page container -->
    <div id="energy-page">
        <!-- Energy summary -->
        <div id="energy-summary">
            <p>Total Consumption: {{ total_consumption }} kWh</p>
            <p>Estimated Cost: {{ estimated_cost }}</p>
        </div>

        <!-- Filter by date -->
        <form method="get" action="">
            <label for="date-filter">Date:</label>
            <input type="date" id="date-filter" name="date" value="{{ selected_date }}" />
            <button type="submit" id="apply-filter-button">Apply Filter</button>
        </form>

        <!-- Energy data table -->
        <table id="energy-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Device</th>
                    <th>Consumption (kWh)</th>
                </tr>
            </thead>
            <tbody>
            {% for log in energy_logs %}
                <tr>
                    <td>{{ log.date }}</td>
                    <td>{{ log.device_name }}</td>
                    <td>{{ log.consumption_kwh }}</td>
                </tr>
            {% else %}
                <tr><td colspan="3">No energy data found.</td></tr>
            {% endfor %}
            </tbody>
        </table>

        <!-- Back to dashboard button -->
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
