<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <!-- Activity logs page container -->
    <div id="activity-page">
        <!-- Search input and button -->
        <form method="get" action="">
            <label for="search-activity">Search:</label>
            <input type="text" id="search-activity" name="search" value="{{ search_term }}" />
            <button type="submit" id="apply-search-button">Apply Search</button>
        </form>

        <!-- Activity logs table -->
        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
            {% for log in activity_logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td>{{ log.device_name }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.details }}</td>
                </tr>
            {% else %}
                <tr><td colspan="4">No activity logs found.</td></tr>
            {% endfor %}
            </tbody>
        </table>

        <!-- Back to dashboard button -->
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
