<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <!-- Device control page container -->
    <div id="device-control-page">
        <!-- Device name display -->
        <h2 id="device-name-display">{{ device.device_name }}</h2>

        <!-- Device status display -->
        <div id="device-status-display">Status: {{ device.status }}</div>

        <form method="post" action="">
            <!-- Power toggle button -->
            <label for="power-toggle">Power:</label>
            <button type="submit" id="power-toggle" name="power" value="{{ 'off' if device.power == 'on' else 'on' }}">{{ 'Turn Off' if device.power == 'on' else 'Turn On' }}</button>
            <br />

            <!-- Brightness input if applicable -->
            {% if device.device_type == 'Light' %}
            <label for="brightness">Brightness:</label>
            <input type="number" id="brightness" name="brightness" min="0" max="100" value="{{ device.brightness if device.brightness != '' else 0 }}" />
            <br />
            {% endif %}

            <!-- Temperature input if applicable -->
            {% if device.device_type == 'Thermostat' %}
            <label for="temperature">Temperature:</label>
            <input type="number" id="temperature" name="temperature" value="{{ device.temperature if device.temperature != '' else 0 }}" />
            <br />
            {% endif %}

            <!-- Mode input if applicable -->
            {% if device.mode %}
            <label for="mode">Mode:</label>
            <input type="text" id="mode" name="mode" value="{{ device.mode }}" />
            <br />
            {% endif %}

            <!-- Schedule time input if applicable -->
            {% if device.schedule_time %}
            <label for="schedule-time">Schedule Time (HH:MM):</label>
            <input type="time" id="schedule-time" name="schedule_time" value="{{ device.schedule_time }}" />
            <br />
            {% endif %}

            <!-- Save settings button -->
            <button type="submit" id="save-settings-button" name="save_settings">Save Settings</button>
        </form>

        <!-- Back to device list button -->
        <button id="back-to-devices" onclick="location.href='{{ url_for('device_list') }}'">Back to Devices</button>
    </div>
</body>
</html>
