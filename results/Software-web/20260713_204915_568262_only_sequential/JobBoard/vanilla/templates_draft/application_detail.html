<!DOCTYPE html>
<html lang="en">
<head>
    <title>Application Details</title>
</head>
<body>
<div id="application-detail-page">
    <h1>Application Details</h1>
    <p><strong>Applicant Name:</strong> {{ application.applicant_name }}</p>
    <p><strong>Email:</strong> {{ application.applicant_email }}</p>
    <p><strong>Job Title:</strong> {{ job.title }}</p>
    <p><strong>Company:</strong> {{ company.company_name }}</p>
    <p><strong>Status:</strong> {{ application.status }}</p>
    <p><strong>Date Applied:</strong> {{ application.applied_date }}</p>
</div>
</body>
</html>
