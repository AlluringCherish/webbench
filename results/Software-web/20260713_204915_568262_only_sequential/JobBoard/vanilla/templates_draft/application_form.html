<!DOCTYPE html>
<html lang="en">
<head>
    <title>Submit Application</title>
</head>
<body>
<div id="application-form-page">
    <h1>Submit Application</h1>
    <form method="post" enctype="multipart/form-data">
        <label for="applicant-name">Name:</label>
        <input type="text" id="applicant-name" name="applicant_name" required><br>

        <label for="applicant-email">Email:</label>
        <input type="email" id="applicant-email" name="applicant_email" required><br>

        <label for="resume-upload">Resume:</label>
        <input type="file" id="resume-upload" name="resume" required><br>

        <label for="cover-letter">Cover Letter:</label><br>
        <textarea id="cover-letter" name="cover_letter" rows="5" cols="40"></textarea><br>

        <button type="submit" id="submit-application-button">Submit Application</button>
    </form>
</div>
</body>
</html>
