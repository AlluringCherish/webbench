<!DOCTYPE html>
<html lang="en">
<head>
    <title>Job Listings</title>
</head>
<body>
<div id="listings-page">
    <h1>Job Listings</h1>
    <input type="text" id="search-input" placeholder="Search jobs..." value="{{ search_query|default('') }}">
    <select id="category-filter">
        <option value="">All Categories</option>
        {% for category in categories %}
        <option value="{{ category.category_name }}">{{ category.category_name }}</option>
        {% endfor %}
    </select>
    <select id="location-filter">
        <option value="">All Locations</option>
        <option value="Remote">Remote</option>
        <option value="On-site">On-site</option>
        <option value="Hybrid">Hybrid</option>
    </select>
    <div id="jobs-grid">
        {% for job in jobs %}
        <div class="job-card">
            <h3>{{ job.title }}</h3>
            <p>{{ job.company_name }} - {{ job.location }}</p>
            <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
            <button id="view-job-button-{{ job.job_id }}" onclick="location.href='/jobs/{{ job.job_id }}'">View Job</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
