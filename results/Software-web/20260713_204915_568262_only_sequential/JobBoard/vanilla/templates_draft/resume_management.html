<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Resumes</title>
</head>
<body>
<div id="resume-page">
    <h1>My Resumes</h1>
    <div id="resumes-list">
        {% for resume in resumes %}
        <div class="resume-card">
            <p>{{ resume.applicant_name }} - {{ resume.filename }} ({{ resume.upload_date }})</p>
            <button id="delete-resume-button-{{ resume.resume_id }}" onclick="document.getElementById('delete-form-{{ resume.resume_id }}').submit();">Delete</button>
            <form id="delete-form-{{ resume.resume_id }}" method="post" action="/resumes/{{ resume.resume_id }}/delete" style="display:none;"></form>
        </div>
        {% endfor %}
    </div>
    <button id="upload-resume-button" onclick="document.getElementById('resume-file-input').click();">Upload Resume</button>
    <form method="post" enctype="multipart/form-data">
        <input type="file" id="resume-file-input" name="resume_file" style="display:none;" onchange="this.form.submit();">
    </form>
    <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
