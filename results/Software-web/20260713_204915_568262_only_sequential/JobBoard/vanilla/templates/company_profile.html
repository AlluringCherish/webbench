<!DOCTYPE html>
<html lang="en">
<head>
    <title>Company Profile</title>
</head>
<body>
<div id="company-profile-page">
    <h1>{{ company.company_name }}</h1>
    <div id="company-info">
        <p><strong>Industry:</strong> {{ company.industry }}</p>
        <p><strong>Location:</strong> {{ company.location }}</p>
        <p><strong>Description:</strong> {{ company.description }}</p>
    </div>
    <div id="company-jobs">
        <h2>Jobs</h2>
        <div id="jobs-list">
            {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <button id="view-job-button-{{ job.job_id }}" onclick="location.href='/jobs/{{ job.job_id }}'">View Job</button>
            </div>
            {% endfor %}
        </div>
    </div>
    <button id="back-to-companies" onclick="location.href='/companies'">Back to Companies</button>
</div>
</body>
</html>
