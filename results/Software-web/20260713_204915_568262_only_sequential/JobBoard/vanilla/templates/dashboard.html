<!DOCTYPE html>
<html lang="en">
<head>
    <title>Job Board Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Job Board Dashboard</h1>
    <div id="featured-jobs">
        <h2>Featured Jobs</h2>
        <ul>
            {% for job in featured_jobs %}
            <li>{{ job.title }} at {{ job.company_name }} - {{ job.location }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="browse-jobs-button" onclick="location.href='/jobs'">Browse Jobs</button>
    <button id="my-applications-button" onclick="location.href='/applications'">My Applications</button>
    <button id="companies-button" onclick="location.href='/companies'">Companies</button>
</div>
</body>
</html>
