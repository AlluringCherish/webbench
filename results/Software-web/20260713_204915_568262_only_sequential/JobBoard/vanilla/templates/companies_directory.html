<!DOCTYPE html>
<html lang="en">
<head>
    <title>Company Directory</title>
</head>
<body>
<div id="companies-page">
    <h1>Company Directory</h1>
    <input type="text" id="search-company-input" placeholder="Search companies..." value="{{ search_query|default('') }}">
    <div id="companies-list">
        {% for company in companies %}
        <div class="company-card">
            <h3>{{ company.company_name }}</h3>
            <p>Industry: {{ company.industry }}</p>
            <p>Employees: {{ company.employee_count }}</p>
            <button id="view-company-button-{{ company.company_id }}" onclick="location.href='/companies/{{ company.company_id }}'">View Profile</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
