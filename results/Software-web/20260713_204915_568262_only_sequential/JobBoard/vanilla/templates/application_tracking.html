<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Applications</title>
</head>
<body>
<div id="tracking-page">
    <h1>My Applications</h1>
    <select id="status-filter">
        <option value="All">All</option>
        <option value="Applied">Applied</option>
        <option value="Under Review">Under Review</option>
        <option value="Interview">Interview</option>
        <option value="Rejected">Rejected</option>
    </select>
    <table id="applications-table" border="1">
        <thead>
            <tr>
                <th>Job Title</th>
                <th>Company</th>
                <th>Status</th>
                <th>Date Applied</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for app in applications %}
            <tr>
                <td>{{ app.job_title }}</td>
                <td>{{ app.company_name }}</td>
                <td>{{ app.status }}</td>
                <td>{{ app.applied_date }}</td>
                <td><button id="view-application-button-{{ app.application_id }}" onclick="location.href='/applications/{{ app.application_id }}'">View</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
