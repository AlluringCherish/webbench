<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Add New Device</title>
</head>
<body>
    <div id="add-device-page">
        <h1>Add New Device</h1>
        <form method="POST">
            <label for="device-name">Device Name:</label>
            <input type="text" id="device-name" name="device-name" required /> <br />

            <label for="device-type">Device Type:</label>
            <select id="device-type" name="device-type" required>
                {% for dt in device_types %}
                    <option value="{{ dt }}">{{ dt }}</option>
                {% endfor %}
            </select> <br />

            <label for="device-room">Device Room:</label>
            <select id="device-room" name="device-room" required>
                {% for room in rooms %}
                    <option value="{{ room }}">{{ room }}</option>
                {% endfor %}
            </select> <br />

            <button type="submit" id="submit-device-button">Submit</button>
            <button type="button" id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
