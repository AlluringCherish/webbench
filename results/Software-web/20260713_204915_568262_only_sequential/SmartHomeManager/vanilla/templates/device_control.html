<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>
        <h2 id="device-name-display">{{ device_name }}</h2>
        <div id="device-status-display">Status: {{ device_status }}</div>

        <form method="POST">
            <button type="submit" name="power-toggle" id="power-toggle">
                {% if power_state == 'on' %}Power Off{% else %}Power On{% endif %}
            </button>

            {% if device.device_type == 'Light' %}
            <label for="brightness">Brightness:</label>
            <input type="number" id="brightness" name="brightness" min="0" max="100" value="{{ brightness }}" /> <br />
            {% elif device.device_type == 'Thermostat' %}
            <label for="temperature">Temperature:</label>
            <input type="number" id="temperature" name="temperature" value="{{ temperature }}" /> <br />
            {% endif %}

            <button type="submit" name="save-settings-button" id="save-settings-button">Save Settings</button>
            <button type="button" id="back-to-devices" onclick="location.href='{{ url_for('device_list_page') }}'">Back to Devices</button>
        </form>
    </div>
</body>
</html>
