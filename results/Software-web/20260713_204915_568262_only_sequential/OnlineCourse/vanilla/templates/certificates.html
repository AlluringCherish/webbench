<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificates</title>
</head>
<body>
<div id="certificates-page">
    <div id="certificates-grid">
        {% if certificates %}
            <ul>
                {% for cert in certificates %}
                    <li>Certificate for {{ cert.course_title }} issued on {{ cert.issue_date }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No certificates available.</p>
        {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
