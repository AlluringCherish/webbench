<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
<div id="learning-page">
    <h1>{{ course.title }}</h1>

    <div id="lessons-list">
        <ul>
            {% for lesson in course.lessons %}
                <li>
                    {{ lesson.title }} {% if lesson.completed %} (Completed) {% endif %}
                </li>
            {% endfor %}
        </ul>
    </div>

    <div id="lesson-content">
        <h2>{{ current_lesson.title }}</h2>
        <p>{{ current_lesson.content }}</p>
    </div>

    <form id="mark-complete-form" method="post" action="{{ url_for('mark_lesson_complete', course_id=course.course_id) }}">
        <button id="mark-complete-button" type="submit">Mark Complete</button>
    </form>

    <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
</div>
</body>
</html>
