<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
<div id="course-details-page">
    <h1 id="course-title">{{ course.title }}</h1>
    <div id="course-description">{{ course.description }}</div>

    {% if enrolled %}
        <button id="enroll-button" disabled>Already Enrolled</button>
    {% else %}
        <form id="enroll-form" method="post" action="{{ url_for('enroll_course', course_id=course.course_id) }}">
            <button id="enroll-button" type="submit">Enroll</button>
        </form>
    {% endif %}

    <button id="back-to-catalog" onclick="location.href='{{ url_for('course_catalog') }}'">Back to Catalog</button>
</div>
</body>
</html>
