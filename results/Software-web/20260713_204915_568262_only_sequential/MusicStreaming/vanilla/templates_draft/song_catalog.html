<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
  <div id="catalog-page">
    <h1>Song Catalog</h1>
    <form method="get" action="{{ url_for('song_catalog') }}">
      <input id="search-input" type="text" name="search" placeholder="Search songs..." value="{{ request.args.get('search', '') }}"/>
      <select id="genre-filter" name="genre">
        <option value="">--All Genres--</option>
        {% for genre in genres %}
        <option value="{{ genre }}" {% if genre == selected_genre %}selected{% endif %}>{{ genre }}</option>
        {% endfor %}
      </select>
      <button type="submit">Filter</button>
    </form>
    <div id="songs-grid">
      {% for song in songs %}
      <div class="song-card">
        <h3>{{ song.title }}</h3>
        <p>Artist: {{ song.artist_id }}</p>
        <p>Duration: {{ song.duration }} sec</p>
        <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
