<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
  <div id="create-playlist-page">
    <h1>Create New Playlist</h1>
    <form method="post">
      <label for="playlist-name-input">Playlist Name:</label><br />
      <input id="playlist-name-input" name="playlist_name" type="text" value="{{ form_data.title }}" />
      {% if form_data.errors.title %}<div style="color:red">{{ form_data.errors.title }}</div>{% endif %}
      <br />
      <label for="playlist-description-input">Description:</label><br />
      <textarea id="playlist-description-input" name="playlist_description">{{ form_data.description }}</textarea><br />
      <button id="save-playlist-button" type="submit">Save Playlist</button>
      <button id="cancel-create-button" type="button" onclick="location.href='{{ url_for('playlists') }}'">Cancel</button>
    </form>
  </div>
</body>
</html>
