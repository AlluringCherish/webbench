<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
  <div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name"><a href="{{ url_for('artist_details', artist_id=artist.artist_id) }}">{{ artist.name }}</a></div>
    <div id="album-name">{{ album.title }}</div>
    <div id="duration-display">{{ song.duration }} seconds</div>
    <button id="play-button">Play</button>
  </div>
</body>
</html>
