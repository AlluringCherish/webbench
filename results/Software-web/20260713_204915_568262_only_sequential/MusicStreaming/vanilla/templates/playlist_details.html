<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
</head>
<body>
  <div id="playlist-details-page">
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>
    <form method="post">
      <table id="songs-in-playlist" border="1">
        <thead>
          <tr>
            <th>Title</th>
            <th>Artist</th>
            <th>Duration (sec)</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for song in songs_in_playlist %}
          <tr>
            <td>{{ song.title }}</td>
            <td>{{ song.artist.name }}</td>
            <td>{{ song.duration }}</td>
            <td>
              <button id="remove-song-button-{{ song.song_id }}" name="remove_song_id" type="submit" value="{{ song.song_id }}">Remove</button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
      <button id="delete-playlist-button" name="delete_playlist" type="submit" value="1">Delete Playlist</button>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
