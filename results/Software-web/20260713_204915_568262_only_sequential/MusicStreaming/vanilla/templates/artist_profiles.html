<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
  <div id="artists-page">
    <h1>Artist Profiles</h1>
    <form method="get" action="{{ url_for('artist_profiles') }}">
      <input id="search-artists" type="text" name="search" placeholder="Search artists..." value="{{ search_query }}" />
      <select id="artists-sort" name="sort">
        <option value="name" {% if sort_option == 'name' %}selected{% endif %}>By Name</option>
        <option value="genre" {% if sort_option == 'genre' %}selected{% endif %}>By Genre</option>
      </select>
      <button type="submit">Sort</button>
    </form>
    <div id="artists-grid">
      {% for artist in artists %}
      <div class="artist-card">
        <h3>{{ artist.name }}</h3>
        <p>Genre: {{ artist.genre }}</p>
        <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_details', artist_id=artist.artist_id) }}'">View</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
