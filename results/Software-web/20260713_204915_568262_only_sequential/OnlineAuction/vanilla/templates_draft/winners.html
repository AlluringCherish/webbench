<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
<div id="winners-page">
    <h1>Winning Items</h1>
    <input id="filter-by-winner" type="text" placeholder="Filter by winner name..." onkeyup="filterWinners()" value="{{ filter_name }}">
    <div id="winners-list">
        {% if winners %}
            {% for winner in winners %}
                <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                    <h3>{{ winner.item_name }}</h3>
                    <p>Winner: {{ winner.winner_name }}</p>
                    <p>Winning Bid: ${{ '%.2f' % winner.winning_bid }}</p>
                </div>
            {% endfor %}
        {% else %}
            <p>No winners found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
<script>
function filterWinners() {
    var input, filter, cards, card, i, txtValue;
    input = document.getElementById('filter-by-winner');
    filter = input.value.toLowerCase();
    cards = document.querySelectorAll('#winners-list .winner-card');
    for (i = 0; i < cards.length; i++) {
        card = cards[i];
        txtValue = card.textContent || card.innerText;
        if (txtValue.toLowerCase().indexOf(filter) > -1) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    }
}
</script>
</body>
</html>
