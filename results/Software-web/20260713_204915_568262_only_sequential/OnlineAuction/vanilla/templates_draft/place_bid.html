<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
<div id="place-bid-page">
    <h1>Place Bid</h1>
    <div id="auction-name">Item: {{ auction.item_name }}</div>
    <div id="minimum-bid">Minimum Bid: ${{ '%.2f' % auction.minimum_bid }}</div>
    <form method="post">
        <label for="bidder-name">Bidder Name:</label><br>
        <input type="text" id="bidder-name" name="bidder-name" value="{{ request.form.get('bidder-name', '') }}">
        {% if errors.bidder_name %}
          <div style="color:red">{{ errors.bidder_name }}</div>
        {% endif %}
        <br>
        <label for="bid-amount">Bid Amount:</label><br>
        <input type="text" id="bid-amount" name="bid-amount" value="{{ request.form.get('bid-amount', '') }}">
        {% if errors.bid_amount %}
          <div style="color:red">{{ errors.bid_amount }}</div>
        {% endif %}
        <br>
        <button id="submit-bid-button" type="submit">Submit Bid</button>
    </form>
</div>
</body>
</html>
