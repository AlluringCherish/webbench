<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
<div id="artifact-catalog-page">
    <h1>Artifact Catalog</h1>
    <input type="text" id="search-artifact" name="search-artifact" placeholder="Search artifacts..." value="{{ search_query if search_query else '' }}">
    <button id="apply-artifact-filter" type="submit">Apply Filter</button>
    <table id="artifact-table" border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Period</th>
            <th>Origin</th>
            <th>Exhibition</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for artifact in artifacts %}
            <tr>
                <td>{{ artifact.artifact_id }}</td>
                <td>{{ artifact.artifact_name }}</td>
                <td>{{ artifact.period }}</td>
                <td>{{ artifact.origin }}</td>
                <td>{{ artifact.exhibition }}</td>
                <td>
                    {# Placeholder for actions buttons #}
                    <button>View</button>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
