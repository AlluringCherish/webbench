<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
</head>
<body>
<div id="bookmarks-page">
    <h1>My Bookmarks</h1>

    <div id="bookmarks-list">
        {% for bookmark in bookmarks %}
        <div class="bookmark-item">
            <h3>{{ bookmark.article_title }}</h3>
            <div>Bookmarked on: {{ bookmark.bookmarked_date }}</div>
            <form method="post" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}" style="display:inline">
                <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Remove</button>
            </form>
            <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="window.location.href='{{ url_for('read_bookmark', bookmark_id=bookmark.bookmark_id) }}'">Read</button>
        </div>
        {% else %}
        <p>No bookmarks found.</p>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
