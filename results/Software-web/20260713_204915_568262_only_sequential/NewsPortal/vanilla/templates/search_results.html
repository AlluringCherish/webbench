<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
<div id="search-results-page">
    <h1>Search Results</h1>

    <div id="search-query-display">Results for "{{ query }}"</div>

    <div id="results-list">
        {% if results|length > 0 %}
            {% for article in results %}
            <div class="result-item">
                <h2>{{ article.title }}</h2>
                <div>By {{ article.author }}</div>
                <div>Date: {{ article.date }}</div>
                <button onclick="window.location.href='{{ url_for('article_details', article_id=article.article_id) }}'">Read Article</button>
            </div>
            {% endfor %}
        {% else %}
            <div id="no-results-message">No results found.</div>
        {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
