<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Details</title>
</head>
<body>
<div id="article-details-page">
    <h1 id="article-title">{{ article.title }}</h1>
    <div id="article-author">By {{ article.author }}</div>
    <div id="article-date">{{ article.date }}</div>

    <form method="post" action="{{ url_for('post_bookmark', article_id=article.article_id) }}">
        <button id="bookmark-button" type="submit">Bookmark</button>
    </form>

    <div id="article-content">{{ article.content }}</div>
</div>
</body>
</html>
