<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Comments</title>
</head>
<body>
<div id="comments-page">
    <h1>Article Comments</h1>

    <select id="filter-by-article" name="filter_by_article" onchange="
        var val = this.value;
        var url = new URL(window.location.href);
        if(val) {
            url.searchParams.set('article_id', val);
        } else {
            url.searchParams.delete('article_id');
        }
        window.location.href = url.toString();
    ">
        <option value="">All Articles</option>
        {% for article in articles %}
            <option value="{{ article.article_id }}" {% if article.article_id|string == selected_article_id %}selected{% endif %}>{{ article.title }}</option>
        {% endfor %}
    </select>

    <div id="comments-list">
        {% for comment in comments %}
        <div class="comment-item">
            <h3>{{ comment.article_title }}</h3>
            <div>By {{ comment.commenter_name }} on {{ comment.comment_date }}</div>
            <p>{{ comment.comment_text }}</p>
        </div>
        {% else %}
        <p>No comments found.</p>
        {% endfor %}
    </div>

    <button id="write-comment-button" onclick="window.location.href='{{ url_for('write_comment_page') }}'">Write a Comment</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
