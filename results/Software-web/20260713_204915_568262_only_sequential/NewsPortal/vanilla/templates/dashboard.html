<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Portal</title>
</head>
<body>
<div id="dashboard-page">
    <h1>News Portal</h1>

    <div id="featured-articles">
        {% for article in featured_articles %}
            <div class="featured-article">
                <h2>{{ article.title }}</h2>
                <div>By {{ article.author }}</div>
                <div>Category: {{ article.category }}</div>
                <div>Date: {{ article.date }}</div>
            </div>
        {% else %}
            <p>No featured articles available.</p>
        {% endfor %}
    </div>

    <button id="browse-articles-button" onclick="window.location.href='{{ url_for('articles_catalog') }}'">Browse Articles</button>
    <button id="view-bookmarks-button" onclick="window.location.href='{{ url_for('bookmarks') }}'">View Bookmarks</button>
    <button id="trending-articles-button" onclick="window.location.href='{{ url_for('trending_articles') }}'">Trending Articles</button>
</div>
</body>
</html>
