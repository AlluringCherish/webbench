<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Order Reviews</h1>
        <form method="get">
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating" onchange="this.form.submit()">
                <option value="All" {% if selected_rating.lower() == 'all' %}selected{% endif %}>All</option>
                <option value="5" {% if selected_rating == '5' %}selected{% endif %}>5 stars</option>
                <option value="4" {% if selected_rating == '4' %}selected{% endif %}>4 stars</option>
                <option value="3" {% if selected_rating == '3' %}selected{% endif %}>3 stars</option>
                <option value="2" {% if selected_rating == '2' %}selected{% endif %}>2 stars</option>
                <option value="1" {% if selected_rating == '1' %}selected{% endif %}>1 star</option>
            </select>
        </form>
        <div id="reviews-list">
            <ul>
                {% for review in reviews %}
                <li>
                    <strong>{{ review.restaurant_name }}</strong> - Rating: {{ review.rating }} - {{ review.review_text }} (by {{ review.customer_name }})
                </li>
                {% endfor %}
            </ul>
        </div>
        <button id="write-review-button" onclick="location.href='/write-review'">Write Review</button>
        <button id="back-to-dashboard" onclick="location.href='/dashboard'">Back to Dashboard</button>
    </div>
</body>
</html>
