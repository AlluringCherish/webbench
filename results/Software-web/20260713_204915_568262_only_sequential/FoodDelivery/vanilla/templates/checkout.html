<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>
        <form method="POST" action="/checkout">
            <label for="customer-name">Name:</label><br>
            <input type="text" id="customer-name" name="customer-name" required><br><br>

            <label for="delivery-address">Delivery Address:</label><br>
            <textarea id="delivery-address" name="delivery-address" rows="4" cols="50" required></textarea><br><br>

            <label for="phone-number">Phone Number:</label><br>
            <input type="text" id="phone-number" name="phone-number" required><br><br>

            <label for="payment-method">Payment Method:</label><br>
            <select id="payment-method" name="payment-method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="Cash">Cash</option>
                <option value="PayPal">PayPal</option>
            </select><br><br>

            <button type="submit" id="place-order-button">Place Order</button>
        </form>
    </div>
</body>
</html>
