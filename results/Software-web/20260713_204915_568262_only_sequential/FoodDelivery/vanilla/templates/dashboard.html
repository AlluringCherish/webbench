<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Food Delivery Dashboard</h1>
        <div id="featured-restaurants">
            <h2>Featured Restaurants</h2>
            <ul>
                {% for restaurant in featured_restaurants %}
                <li>{{ restaurant.name }} - {{ restaurant.cuisine }} - Rating: {{ restaurant.rating }}</li>
                {% endfor %}
            </ul>
        </div>
        <button id="browse-restaurants-button" onclick="location.href='/restaurants'">Browse Restaurants</button>
        <button id="view-cart-button" onclick="location.href='/cart'">View Cart</button>
        <button id="active-orders-button" onclick="location.href='/active-orders'">Active Orders</button>
    </div>
</body>
</html>
