<!DOCTYPE html>
<html lang="en">
<head>
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="current-weather-summary">
            <p>Location: {{ current_weather.location_name }}</p>
            <p>Temperature: {{ current_weather.temperature }}&deg;</p>
            <p>Condition: {{ current_weather.condition }}</p>
            <p>Humidity: {{ current_weather.humidity }}%</p>
            <p>Wind Speed: {{ current_weather.wind_speed }} mph</p>
        </div>
        <button id="search-location-button" onclick="window.location.href='/location_search'">Search Locations</button>
        <button id="view-forecast-button" onclick="window.location.href='/weekly_forecast'">View Forecast</button>
        <button id="view-alerts-button" onclick="window.location.href='/weather_alerts'">View Alerts</button>
    </div>
</body>
</html>
