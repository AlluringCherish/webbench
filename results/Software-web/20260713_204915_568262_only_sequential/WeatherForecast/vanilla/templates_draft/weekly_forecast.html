<!DOCTYPE html>
<html lang="en">
<head>
    <title>Weekly Forecast</title>
</head>
<body>
    <div id="forecast-page">
        <form method="post">
            <label for="location-filter">Select Location:</label>
            <select id="location-filter" name="location-filter">
                {% for loc in locations %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == selected_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>
            <button id="back-to-dashboard" type="button" onclick="window.location.href='/'">Back to Dashboard</button>
            <button type="submit">Filter</button>
        </form>
        <div id="forecast-list">
            <table id="forecast-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Condition</th>
                        <th>Precipitation</th>
                        <th>Humidity</th>
                    </tr>
                </thead>
                <tbody>
                    {% for f in forecasts %}
                    <tr>
                        <td>{{ f.date }}</td>
                        <td>{{ f.high_temp }}</td>
                        <td>{{ f.low_temp }}</td>
                        <td>{{ f.condition }}</td>
                        <td>{{ f.precipitation }}</td>
                        <td>{{ f.humidity }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
