<!DOCTYPE html>
<html lang="en">
<head>
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <table id="locations-table">
            <thead>
                <tr>
                    <th>Location Name</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for loc in saved_locations %}
                <tr>
                    <td>{{ loc.location_name }}{% if loc.is_default %} (Default){% endif %}</td>
                    <td>
                        <button id="view-location-weather-{{ loc.location_id }}">View Weather</button>
                        <button id="remove-location-button-{{ loc.location_id }}">Remove</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="add-new-location-button">Add New Location</button>
    </div>
</body>
</html>
