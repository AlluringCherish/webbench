<!DOCTYPE html>
<html lang="en">
<head>
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <form method="post">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature-unit-select">
                <option value="F" {% if temperature_unit == 'F' %}selected{% endif %}>Fahrenheit</option>
                <option value="C" {% if temperature_unit == 'C' %}selected{% endif %}>Celsius</option>
            </select>

            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default-location-select">
                {% for loc in locations %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == default_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>

            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert-notifications-toggle" {% if alert_notifications_enabled %}checked{% endif %}>

            <button id="save-settings-button" type="submit">Save Settings</button>
            <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
