<!DOCTYPE html>
<html lang="en">
<head>
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <form method="post">
            <input type="text" id="location-search-input" name="location-search-input" value="{{ search_query }}" placeholder="Enter location">
            <button type="submit">Search</button>
        </form>
        <div id="search-results">
            {% for loc in search_results %}
            <div>
                <span>{{ loc.location_name }}, {{ loc.country }}</span>
                <form method="post" style="display:inline;">
                    <input type="hidden" name="add_location_id" value="{{ loc.location_id }}">
                    <input type="hidden" name="add_location_name" value="{{ loc.location_name }}">
                    <button type="submit" id="select-location-button-{{ loc.location_id }}">Select</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <div id="saved-locations-list">
            <h3>Saved Locations</h3>
            <ul>
                {% for loc in saved_locations %}
                <li>{{ loc.location_name }}{% if loc.is_default %} (Default){% endif %}</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
