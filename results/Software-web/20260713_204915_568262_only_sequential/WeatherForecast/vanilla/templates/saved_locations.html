<!DOCTYPE html>
<html lang="en">
<head>
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <form method="post">
            <table id="locations-table">
                <thead>
                    <tr>
                        <th>Location Name</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for loc in saved_locations %}
                    <tr>
                        <td>{{ loc.location_name }}{% if loc.is_default %} (Default){% endif %}</td>
                        <td>
                            <button id="view-location-weather-{{ loc.location_id }}" type="button" onclick="window.location.href='{{ url_for('current_weather', location_id=loc.location_id) }}'">View Weather</button>
                            <button id="remove-location-button-{{ loc.location_id }}" name="remove_location_button_{{ loc.location_id }}" type="submit">Remove</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button id="add-new-location-button" type="button" onclick="document.getElementById('add-location-form').style.display='block'">Add New Location</button>
        </form>
        <div id="add-location-form" style="display:none;">
            <form method="post">
                <label for="new_location_id">Location ID:</label>
                <input type="number" id="new_location_id" name="new_location_id" required>
                <label for="new_location_name">Location Name:</label>
                <input type="text" id="new_location_name" name="new_location_name" required>
                <button type="submit" name="add_new_location" value="1">Add Location</button>
                <button type="button" onclick="document.getElementById('add-location-form').style.display='none'">Cancel</button>
            </form>
        </div>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
