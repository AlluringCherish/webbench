<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
<div id="venues-page">
    <h1>Venues</h1>
    <form method="get" action="{{ url_for('venues_information_page') }}">
        <input type="text" id="venue-search-input" name="search" placeholder="Search venues" />
        <select id="venue-capacity-filter" name="capacity">
            <option value="">All Capacities</option>
            <option value="Small" {% if capacity_filter == 'Small' %}selected{% endif %}>Small</option>
            <option value="Medium" {% if capacity_filter == 'Medium' %}selected{% endif %}>Medium</option>
            <option value="Large" {% if capacity_filter == 'Large' %}selected{% endif %}>Large</option>
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="venues-grid">
        {% for venue in venues %}
        <div class="venue-card">
            <h3>{{ venue.venue_name }}</h3>
            <div>Capacity: {{ venue.capacity }}</div>
            <div>Amenities: {{ venue.amenities }}</div>
            <button id="view-venue-details-{{ venue.venue_id }}" onclick="window.location.href='{{ url_for('venue_details_page', venue_id=venue.venue_id) }}'">View Details</button>
        </div>
        {% else %}
        <div>No venues found.</div>
        {% endfor %}
    </div>
</div>
</body>
</html>
