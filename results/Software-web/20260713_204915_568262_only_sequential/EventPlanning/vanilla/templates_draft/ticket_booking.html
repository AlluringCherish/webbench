<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Tickets</title>
</head>
<body>
<div id="ticket-booking-page">
    <h1>Book Your Tickets</h1>
    <form method="post" action="{{ url_for('ticket_booking_page') }}">
        <label for="select-event-dropdown">Select Event:</label>
        <select id="select-event-dropdown" name="select-event-dropdown">
            {% for event in events %}
            <option value="{{ event.event_id }}" {% if request.args.get('event_id', type=int) == event.event_id %}selected{% endif %}>{{ event.event_name }}</option>
            {% endfor %}
        </select><br>
        <label for="ticket-quantity-input">Number of Tickets:</label>
        <input type="number" id="ticket-quantity-input" name="ticket-quantity-input" min="1" value="1" required><br>
        <label for="ticket-type-select">Ticket Type:</label>
        <select id="ticket-type-select" name="ticket-type-select">
            <option value="General">General</option>
            <option value="VIP">VIP</option>
            <option value="Early Bird">Early Bird</option>
        </select><br>
        <label for="customer-name-input">Your Name:</label>
        <input type="text" id="customer-name-input" name="customer-name-input" placeholder="Enter your name"><br>
        <button type="submit" id="book-now-button">Book Now</button>
    </form>
    {% if booking_confirmation %}
    <div id="booking-confirmation">{{ booking_confirmation }}</div>
    {% endif %}
</div>
</body>
</html>
