<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Planning Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Event Planning Dashboard</h1>
    <div id="featured-events">
        <h2>Featured Events</h2>
        <ul>
            {% for event in featured_events %}
                <li>{{ event.event_name }} - {{ event.date }} at {{ event.location }}</li>
            {% else %}
                <li>No featured events available.</li>
            {% endfor %}
        </ul>
    </div>
    <button id="browse-events-button" onclick="window.location.href='{{ url_for('events_listing_page') }}'">Browse Events</button>
    <button id="view-tickets-button" onclick="window.location.href='{{ url_for('bookings_summary_page') }}'">View Tickets</button>
    <button id="venues-button" onclick="window.location.href='{{ url_for('venues_information_page') }}'">Venues</button>
</div>
</body>
</html>
