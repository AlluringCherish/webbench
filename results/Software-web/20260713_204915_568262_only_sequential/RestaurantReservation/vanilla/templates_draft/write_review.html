<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        {% if error %}
            <div class="error" style="color:red;">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('write_review') }}">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id">
                {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for star in range(1,6) %}
                <option value="{{ star }}">{{ star }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text"></textarea>
            <br>
            <button id="submit-review-button" type="submit">Submit Review</button>
            <button id="back-to-reviews" type="button" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
        </form>
    </div>
</body>
</html>
