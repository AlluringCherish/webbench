<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div id="profile-username">Username: {{ user_profile.username }}</div>
        <form method="post" action="{{ url_for('update_profile') }}">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="email" type="email" value="{{ user_profile.email }}" required>
            <br>
            <button id="update-profile-button" type="submit">Update Profile</button>
            <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
