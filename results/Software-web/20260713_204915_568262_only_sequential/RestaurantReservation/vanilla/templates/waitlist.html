<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <form method="post" action="{{ url_for('waitlist_page') }}">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="party_size">
                {% for size in range(1,11) %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>
            <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        </form>
        <div id="user-position">
            {% if waitlist_position %}
                Your current position in the waitlist is: {{ waitlist_position }}
            {% else %}
                You are not currently on the waitlist.
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
