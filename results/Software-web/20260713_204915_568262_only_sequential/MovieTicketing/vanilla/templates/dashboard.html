<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>
        <div id="featured-movies">
            {% for movie in featured_movies %}
                <div>{{ movie.title }} ({{ movie.rating }})</div>
            {% endfor %}
        </div>
        <button id="browse-movies-button" onclick="location.href='{{ url_for('movie_catalog_page') }}'">Browse Movies</button>
        <button id="view-bookings-button" onclick="location.href='{{ url_for('booking_history_page') }}'">View Bookings</button>
        <button id="showtimes-button" onclick="location.href='{{ url_for('showtime_selection_page', movie_id=0) }}'">Showtimes</button>
    </div>
</body>
</html>
