<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <form method="post" action="">
            <input id="search-input" name="search-input" type="text" placeholder="Search..." value="{{ search_query }}">
            <select id="genre-filter" name="genre-filter">
                {% for genre in genres %}
                    <option value="{{ genre }}" {% if genre == selected_genre %}selected{% endif %}>{{ genre }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="movies-grid">
            {% for movie in movies %}
                <div>
                    <h3>{{ movie.title }}</h3>
                    <p>Rating: {{ movie.rating }}</p>
                    <p>Duration: {{ movie.duration }} min</p>
                    <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details_page', movie_id=movie.movie_id) }}'">View Details</button>
                </div>
            {% else %}
                <p>No movies found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
