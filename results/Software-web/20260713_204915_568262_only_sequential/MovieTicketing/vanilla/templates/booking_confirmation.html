<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="booking-summary">
            {% if booking_summary and booking_summary.seats %}
                <p>Seats: {{ booking_summary.seats }}</p>
            {% endif %}
            {% if booking_summary and booking_summary.showtime_id %}
                <p>Showtime ID: {{ booking_summary.showtime_id }}</p>
            {% endif %}
        </div>
        <form method="post" action="">
            <label for="customer-name">Name:</label>
            <input id="customer-name" name="customer-name" type="text" value="{{ customer_name }}" required>
            <br>
            <label for="customer-email">Email:</label>
            <input id="customer-email" name="customer-email" type="email" value="{{ customer_email }}" required>
            <br>
            <input type="hidden" name="selected-seats" value="{{ booking_summary.seats if booking_summary and booking_summary.seats else '' }}">
            <input type="hidden" name="showtime-id" value="{{ booking_summary.showtime_id if booking_summary and booking_summary.showtime_id else '' }}">
            <button type="submit" id="confirm-booking-button">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
