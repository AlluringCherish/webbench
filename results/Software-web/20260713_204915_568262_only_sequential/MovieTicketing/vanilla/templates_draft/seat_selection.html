<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>
        <form method="post" action="">
            <div id="seat-map">
                {% for seat in seats %}
                    <button type="button" id="seat-{{ seat.row }}{{ seat.column }}" class="seat-button" data-seat="{{ seat.row }}{{ seat.column }}" {% if seat.status != 'Available' %}disabled{% endif %}>
                        {{ seat.row }}{{ seat.column }}
                    </button>
                {% endfor %}
            </div>
            <div id="selected-seats-display">Selected Seats: <span id="selected-seats-list"></span></div>
            <input type="hidden" name="selected_seats" id="selected_seats_input">
            <button type="submit" id="proceed-booking-button">Proceed to Booking</button>
        </form>
        <script>
            const seatButtons = document.querySelectorAll('.seat-button');
            const selectedSeatsList = document.getElementById('selected-seats-list');
            const hiddenInput = document.getElementById('selected_seats_input');
            let selectedSeats = [];

            seatButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const seat = button.getAttribute('data-seat');
                    if (selectedSeats.includes(seat)) {
                        selectedSeats = selectedSeats.filter(s => s !== seat);
                        button.style.backgroundColor = '';
                    } else {
                        selectedSeats.push(seat);
                        button.style.backgroundColor = 'lightgreen';
                    }
                    selectedSeatsList.textContent = selectedSeats.join(', ');
                    hiddenInput.value = selectedSeats.join(',');
                });
            });
        </script>
    </div>
</body>
</html>
