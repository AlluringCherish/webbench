<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
<div id="edit-article-page">
    <h1>Edit Article</h1>

    {% if error %}
    <div style="color: red;">{{ error }}</div>
    {% endif %}

    <form method="post">
        <label for="edit-article-title">Title:</label><br>
        <input type="text" id="edit-article-title" name="edit-article-title" value="{{ article.title }}"><br><br>

        <label for="edit-article-content">Content:</label><br>
        <textarea id="edit-article-content" name="edit-article-content" rows="10" cols="50">{{ content }}</textarea><br><br>

        <button type="submit" id="save-version-button">Save New Version</button>
        <button type="button" id="cancel-edit" onclick="window.location.href='/articles/mine'">Cancel</button>
    </form>
</div>
</body>
</html>
