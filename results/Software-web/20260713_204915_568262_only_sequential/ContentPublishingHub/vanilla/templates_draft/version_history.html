<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - ContentPublishingHub</title>
</head>
<body>
<div id="version-history-page">
    <h1>Version History for Article: {{ article.title }}</h1>

    <div id="versions-list">
        <ul>
            {% for version in versions %}
            <li>
                Version {{ version.version_number }} - {{ version.created_date }} - {{ version.change_summary }}
                <form method="post" action="/article/{{ article.article_id }}/versions/restore" style="display:inline;">
                    <input type="hidden" name="version_id" value="{{ version.version_id }}">
                    <button type="submit" id="restore-version-1">Restore</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>

    <div id="version-comparison">
        <!-- Placeholder for version comparison -->
        <p>Select versions to compare (functionality not implemented in draft).</p>
    </div>

    <button id="back-to-edit-history" onclick="window.location.href='/article/{{ article.article_id }}/edit'">Back to Edit</button>
</div>
</body>
</html>
