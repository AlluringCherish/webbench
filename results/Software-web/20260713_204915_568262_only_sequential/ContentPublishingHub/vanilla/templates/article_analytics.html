<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
<div id="analytics-page">
    <h1>Analytics for Article: {{ article.title }}</h1>
    <div id="analytics-overview">
        <p id="analytics-total-views">Total Views: {{ total_views }}</p>
        <p id="analytics-unique-visitors">Unique Visitors: {{ unique_visitors }}</p>
    </div>
    <button id="back-to-article-analytics" onclick="window.location.href='/article/{{ article.article_id }}/edit'">Back to Article</button>
</div>
</body>
</html>
