<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
<div id="create-article-page">
    <h1>Create New Article</h1>

    {% if error %}
    <div style="color: red;">{{ error }}</div>
    {% endif %}

    <form method="post">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="article-title" value="{{ request.form['article-title'] if request.form['article-title'] else '' }}"><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="article-content" rows="10" cols="50">{{ request.form['article-content'] if request.form['article-content'] else '' }}</textarea><br><br>

        <button type="submit" id="save-draft-button">Save as Draft</button>
        <button type="button" id="cancel-button" onclick="window.location.href='/dashboard'">Cancel</button>
    </form>
</div>
</body>
</html>
