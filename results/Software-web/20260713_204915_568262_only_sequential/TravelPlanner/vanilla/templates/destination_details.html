<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Destination Details</title>
</head>
<body>
    <div id="destination-details-page">
        <h1 id="destination-name">{{ destination.name }}</h1>
        <div id="destination-country">{{ destination.country }}</div>
        <div id="destination-description">{{ destination.description }}</div>
        <button id="add-to-trip-button" type="button" onclick="document.getElementById('add-to-trip-form').submit();">Add to Trip</button>
        <form id="add-to-trip-form" method="post" action="{{ url_for('add_destination_to_trip', dest_id=destination.dest_id) }}" style="display:none;">
            <!-- Hidden form to add destination to trip -->
        </form>
        <div id="destination-attractions">
            <h3>Main Attractions</h3>
            <ul>
                {% for attraction in destination.attractions.split(',') %}
                <li>{{ attraction.strip() }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
