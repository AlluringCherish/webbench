<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>
        <form method="get" action="{{ url_for('packages') }}">
            <label for="duration-filter">Filter by Duration:</label>
            <select id="duration-filter" name="duration_filter">
                <option value="">--All Durations--</option>
                <option value="3-5 days" {% if duration_filter == '3-5 days' %}selected{% endif %}>3-5 days</option>
                <option value="7-10 days" {% if duration_filter == '7-10 days' %}selected{% endif %}>7-10 days</option>
                <option value="14+ days" {% if duration_filter == '14+ days' %}selected{% endif %}>14+ days</option>
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="packages-grid">
            {% for package in packages %}
            <div class="package-card">
                <h2>{{ package.package_name }}</h2>
                <p>Destination: {{ package.destination }}</p>
                <p>Duration: {{ package.duration_days }} days</p>
                <p>Price: ${{ package.price }}</p>
                <button id="view-package-details-button-{{ package.package_id }}" type="button" onclick="location.href='{{ url_for('view_package_details', pkg_id=package.package_id) }}'">View Details</button>
                <form method="post" action="{{ url_for('book_package', pkg_id=package.package_id) }}" style="display:inline;">
                    <button id="book-package-button-{{ package.package_id }}" type="submit">Book Package</button>
                </form>
            </div>
            {% else %}
            <p>No packages available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
