<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Search Accommodations</title>
</head>
<body>
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>
        <form method="get" action="{{ url_for('accommodations') }}">
            <label for="destination-input">Destination City:</label>
            <input type="text" id="destination-input" name="destination_city" value="{{ selected_city }}" />
            <br />
            <label for="check-in-date">Check-in Date:</label>
            <input type="date" id="check-in-date" name="check_in_date" />
            <br />
            <label for="check-out-date">Check-out Date:</label>
            <input type="date" id="check-out-date" name="check_out_date" />
            <br />
            <label for="price-filter">Price Range:</label>
            <select id="price-filter" name="price_range">
                <option value="Budget" {% if price_filter == 'Budget' %}selected{% endif %}>Budget</option>
                <option value="Mid-range" {% if price_filter == 'Mid-range' %}selected{% endif %}>Mid-range</option>
                <option value="Luxury" {% if price_filter == 'Luxury' %}selected{% endif %}>Luxury</option>
            </select>
            <br />
            <button type="submit">Search</button>
        </form>
        <div id="hotels-list">
            {% for hotel in hotels %}
            <div class="hotel-card">
                <h3>{{ hotel.name }}</h3>
                <p>Rating: {{ hotel.rating }}</p>
                <p>Price per night: ${{ hotel.price_per_night }}</p>
                <p>Amenities: {{ hotel.amenities }}</p>
            </div>
            {% else %}
            <p>No hotels found matching your criteria.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
