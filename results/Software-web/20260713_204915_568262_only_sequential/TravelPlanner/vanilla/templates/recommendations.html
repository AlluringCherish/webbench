<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>
        <label for="recommendation-season-filter">Season:</label>
        <select id="recommendation-season-filter" name="season">
            <option value="Spring">Spring</option>
            <option value="Summer">Summer</option>
            <option value="Fall">Fall</option>
            <option value="Winter">Winter</option>
        </select>

        <label for="budget-filter">Budget:</label>
        <select id="budget-filter" name="budget">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <div id="trending-destinations">
            {% for dest in trending_destinations %}
            <div class="trending-destination">
                <h2>{{ dest.name }}</h2>
                <p>Popularity Rank: {{ dest.popularity_rank }}</p>
            </div>
            {% else %}
            <p>No trending destinations at this time.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
