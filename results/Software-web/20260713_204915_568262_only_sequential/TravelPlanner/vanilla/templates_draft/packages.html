<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>
        <label for="duration-filter">Filter by Duration:</label>
        <select id="duration-filter" name="duration_filter">
            <option value="3-5 days">3-5 days</option>
            <option value="7-10 days">7-10 days</option>
            <option value="14+ days">14+ days</option>
        </select>

        <div id="packages-grid">
            {% for package in packages %}
            <div class="package-card">
                <h2>{{ package.package_name }}</h2>
                <p>Destination: {{ package.destination }}</p>
                <p>Duration: {{ package.duration_days }} days</p>
                <p>Price: ${{ package.price }}</p>
                <button id="view-package-details-button-{{ package.package_id }}" type="button">View Details</button>
                <button id="book-package-button-{{ package.package_id }}" type="button">Book Package</button>
            </div>
            {% else %}
            <p>No packages available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
