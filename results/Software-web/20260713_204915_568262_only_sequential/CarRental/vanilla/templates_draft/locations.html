<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
<div id="locations-page">
    <h1>Pickup and Dropoff Locations</h1>

    <form method="get" action="{{ url_for('locations') }}">
        <label for="hours-filter">Filter by Operating Hours:</label>
        <select id="hours-filter" name="hours_filter">
            <option value="All" {% if hours_filter == 'All' %}selected{% endif %}>All</option>
            <option value="24/7" {% if hours_filter == '24/7' %}selected{% endif %}>24/7</option>
            <option value="09:00-18:00" {% if hours_filter == '09:00-18:00' %}selected{% endif %}>Business Hours</option>
            <option value="Weekend" {% if hours_filter == 'Weekend' %}selected{% endif %}>Weekend</option>
        </select>

        <label for="search-location-input">Search Location:</label>
        <input type="text" id="search-location-input" name="search_location" value="{{ search_location }}" placeholder="City or Name">

        <button type="submit">Filter</button>
    </form>

    <div id="locations-list">
        <ul>
            {% for loc in locations %}
                <li>
                    {{ loc.city }} - {{ loc.address }} - Phone: {{ loc.phone }} - Hours: {{ loc.hours }} - Vehicles: {{ loc.available_vehicles }}
                    <button id="location-detail-button-{{ loc.location_id }}">Details</button>
                </li>
            {% else %}
                <li>No locations found.</li>
            {% endfor %}
        </ul>
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
