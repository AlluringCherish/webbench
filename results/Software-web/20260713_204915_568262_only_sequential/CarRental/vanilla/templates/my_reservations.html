<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
    <h1>My Reservations</h1>

    <div id="reservations-list">
        <ul>
            {% for r in reservations %}
                <li>
                    Vehicle: {{ r.vehicle }} - Status: {{ r.status }} 
                    <button id="modify-reservation-button-{{ r.reservation_id }}">Modify</button>
                    <button id="cancel-reservation-button-{{ r.reservation_id }}">Cancel</button>
                </li>
            {% else %}
                <li>No reservations found.</li>
            {% endfor %}
        </ul>
    </div>

    <button id="sort-by-date-button">Sort by Date</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
