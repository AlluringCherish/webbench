<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
<div id="requests-page">
    <h1>Special Requests</h1>

    {% if message %}
        <div style="color: green;">{{ message }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('special_requests') }}">
        <label for="select-reservation">Select Reservation:</label>
        <select id="select-reservation" name="select_reservation" required>
            <option value="">Select</option>
            {% for r in reservations %}
                <option value="{{ r.reservation_id }}">{{ r.reservation_id }} - {{ r.status }}</option>
            {% endfor %}
        </select><br>

        <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance_checkbox">
        <label for="driver-assistance-checkbox">Driver Assistance</label><br>

        <input type="checkbox" id="gps-option-checkbox" name="gps_option_checkbox">
        <label for="gps-option-checkbox">GPS Option</label><br>

        <label for="child-seat-quantity">Child Seat Quantity:</label>
        <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="0"><br>

        <label for="special-notes">Special Notes:</label><br>
        <textarea id="special-notes" name="special_notes" rows="4" cols="40"></textarea><br>

        <button type="submit" id="submit-requests-button">Submit Special Requests</button>
    </form>
</div>
</body>
</html>
