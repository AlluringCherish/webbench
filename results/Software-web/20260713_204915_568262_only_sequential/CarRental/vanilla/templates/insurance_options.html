<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
<div id="insurance-page">
    <h1>Select Insurance Coverage</h1>

    <form method="post">
        <div id="insurance-options">
            {% for ins in insurances %}
                <input type="radio" id="select-insurance-{{ ins.insurance_id }}" name="select_insurance" value="{{ ins.insurance_id }}"
                    {% if ins.insurance_id == selected_insurance_id %}checked{% endif %}>
                <label for="select-insurance-{{ ins.insurance_id }}">{{ ins.plan_name }}</label><br>
            {% endfor %}
        </div>

        <div id="insurance-description">
            <p>{{ insurance_description }}</p>
        </div>
        <div id="insurance-price">
            <p>Price: {% if insurance_price is not none %}${{ '%.2f'|format(insurance_price) }}{% else %}N/A{% endif %}</p>
        </div>

        <button type="submit" id="confirm-booking-button">Confirm Booking</button>
    </form>
</div>
</body>
</html>
