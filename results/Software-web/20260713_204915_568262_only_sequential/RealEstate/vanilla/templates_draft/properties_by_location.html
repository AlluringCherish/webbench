<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Properties by Location</title>
</head>
<body>
    <div id="location-properties-page">
        <h1>Properties in {{ location.location_name }}</h1>
        <div id="properties-grid">
            {% for property in properties %}
            <div class="property-card">
                <h2>{{ property.address }}</h2>
                <p>Price: ${{ property.price }}</p>
                <p>Beds: {{ property.bedrooms }}, Baths: {{ property.bathrooms }}</p>
                <button id="view-property-button-{{ property.property_id }}" onclick="location.href='{{ url_for('property_details_page', property_id=property.property_id) }}'">View Property</button>
            </div>
            {% else %}
            <p>No properties found in this location.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
