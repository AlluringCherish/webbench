<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>
        <form method="get">
            <input type="text" id="agent-search" name="agent-search" value="{{ search_query }}" placeholder="Search agents by name">
            <button type="submit">Search</button>
        </form>
        <div id="agents-list">
            {% for agent in agents %}
            <div class="agent-card">
                <p>Name: {{ agent.agent_name }}</p>
                <p>Specialization: {{ agent.specialization }}</p>
                <p>Email: {{ agent.email }}</p>
                <p>Phone: {{ agent.phone }}</p>
                <button id="contact-agent-button-{{ agent.agent_id }}" onclick="alert('Contacting {{ agent.agent_name }} via email: {{ agent.email }}')">Contact Agent</button>
            </div>
            {% else %}
            <p>No agents found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
