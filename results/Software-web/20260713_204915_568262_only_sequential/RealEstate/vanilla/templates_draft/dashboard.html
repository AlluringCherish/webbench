<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Real Estate Dashboard</h1>
        <div id="featured-properties">
            {% for property in featured_properties %}
                <div class="property-card">
                    <h2>{{ property.address }}</h2>
                    <p>Location: {{ property.location }}</p>
                    <p>Price: ${{ property.price }}</p>
                    <p>Type: {{ property.property_type }}</p>
                    <p>Beds: {{ property.bedrooms }}, Baths: {{ property.bathrooms }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="browse-properties-button" onclick="location.href='{{ url_for('property_search_page') }}'">Browse Properties</button>
        <button id="my-inquiries-button" onclick="location.href='{{ url_for('my_inquiries_page') }}'">My Inquiries</button>
        <button id="my-favorites-button" onclick="location.href='{{ url_for('my_favorites_page') }}'">My Favorites</button>
    </div>
</body>
</html>
