<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>
        <div id="favorites-list">
            {% for fav in favorites %}
            <div class="favorite-item">
                <p>Address: {{ fav.address }}</p>
                <p>Price: ${{ fav.price }}</p>
                <form method="post" action="{{ url_for('remove_favorite', property_id=fav.property_id) }}" style="display:inline;">
                    <button type="submit" id="remove-from-favorites-button-{{ fav.property_id }}">Remove from Favorites</button>
                </form>
                <button id="view-property-button-{{ fav.property_id }}" onclick="location.href='{{ url_for('property_details_page', property_id=fav.property_id) }}'">View Property</button>
            </div>
            {% else %}
            <p>No favorite properties found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
