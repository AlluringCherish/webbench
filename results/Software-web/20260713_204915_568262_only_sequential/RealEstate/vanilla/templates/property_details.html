<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1 id="property-address">{{ property.address }}</h1>
        <div id="property-price">Price: ${{ property.price }}</div>
        <div id="property-description">Description: {{ property.description }}</div>
        <div id="property-features">Bedrooms: {{ property.bedrooms }}, Bathrooms: {{ property.bathrooms }}, Square Feet: {{ property.square_feet }}</div>

        <form method="post">
            {% if not favorite_status %}
            <button id="add-to-favorites-button" type="submit">Add to Favorites</button>
            {% else %}
            <button id="add-to-favorites-button" type="submit" disabled>Added to Favorites</button>
            {% endif %}
        </form>

        <button id="submit-inquiry-button" onclick="location.href='{{ url_for('property_inquiry_page') }}?property_id={{ property.property_id }}'">Submit Inquiry</button>
    </div>
</body>
</html>
