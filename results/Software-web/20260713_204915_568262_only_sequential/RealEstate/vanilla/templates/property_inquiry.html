<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Property Inquiry</title>
</head>
<body>
    <div id="inquiry-page">
        <h1>Submit Property Inquiry</h1>

        {% if inquiry_submitted %}
            <p>Your inquiry has been submitted successfully.</p>
            <button onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        {% else %}
            <form method="post">
                <label for="select-property">Select Property:</label>
                <select id="select-property" name="select-property">
                    {% for property in properties %}
                        <option value="{{ property.property_id }}" {% if preselected_property_id == property.property_id %}selected{% endif %}>{{ property.address }}</option>
                    {% endfor %}
                </select><br>

                <label for="inquiry-name">Name:</label>
                <input type="text" id="inquiry-name" name="inquiry-name" required><br>

                <label for="inquiry-email">Email:</label>
                <input type="email" id="inquiry-email" name="inquiry-email" required><br>

                <label for="inquiry-phone">Phone:</label>
                <input type="tel" id="inquiry-phone" name="inquiry-phone"><br>

                <label for="inquiry-message">Message:</label><br>
                <textarea id="inquiry-message" name="inquiry-message" required></textarea><br>

                <button id="submit-inquiry-button" type="submit">Submit Inquiry</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
