<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <h1>My Profile</h1>

    <div id="profile-username">Username: {{ user_profile.username }}</div>

    <form method="post" action="{{ url_for('user_profile') }}">
        <label for="profile-email">Email:</label><br>
        <input type="email" id="profile-email" name="profile-email" value="{{ user_profile.email }}" required><br>

        <button type="submit" id="update-profile-button">Update Profile</button>
        <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
