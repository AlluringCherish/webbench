<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
<div id="favorites-page">
    <h1>My Favorites</h1>

    <div id="favorites-grid">
        {% for pet in favorite_pets %}
            <div class="pet-card" style="border:1px solid #ccc; margin:5px; padding:5px;">
                <div><strong>{{ pet.name }}</strong></div>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
            </div>
        {% else %}
            <div>No favorite pets found.</div>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
