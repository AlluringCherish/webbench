<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
<div id="messages-page">
    <h1>Messages</h1>

    <div id="conversation-list">
        {% for conv in conversations %}
            <div class="conversation">
                <h3>Conversation with {{ conv.other_username }}</h3>
                <p><strong>Last Subject:</strong> {{ conv.last_subject }}</p>
                <p><strong>Last Message:</strong> {{ conv.last_content }}</p>
                <p><em>Last Updated: {{ conv.last_timestamp }}</em></p>
            </div>
            <hr>
        {% else %}
            <p>No conversations.</p>
        {% endfor %}
    </div>

    <form method="post" action="{{ url_for('messages') }}">
        <label for="recipient-username">Recipient Username:</label><br>
        <input type="text" id="recipient-username" name="recipient_username" required><br>

        <label for="subject">Subject:</label><br>
        <input type="text" id="subject" name="subject"><br>

        <label for="message-input">Message:</label><br>
        <textarea id="message-input" name="message-input" rows="4" cols="50" required></textarea><br>

        <button type="submit" id="send-message-button">Send Message</button>
        <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
