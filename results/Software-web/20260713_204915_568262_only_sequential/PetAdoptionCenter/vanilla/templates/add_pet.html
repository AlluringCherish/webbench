<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
<div id="add-pet-page">
    <h1>Add New Pet</h1>
    <form method="post" action="{{ url_for('add_pet') }}">
        <label for="pet-name-input">Name:</label>
        <input type="text" id="pet-name-input" name="pet-name-input" required><br>

        <label for="pet-species-input">Species:</label>
        <select id="pet-species-input" name="pet-species-input" required>
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Bird">Bird</option>
            <option value="Rabbit">Rabbit</option>
            <option value="Other">Other</option>
        </select><br>

        <label for="pet-breed-input">Breed:</label>
        <input type="text" id="pet-breed-input" name="pet-breed-input" required><br>

        <label for="pet-age-input">Age:</label>
        <input type="text" id="pet-age-input" name="pet-age-input" required><br>

        <label for="pet-gender-input">Gender:</label>
        <select id="pet-gender-input" name="pet-gender-input" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select><br>

        <label for="pet-size-input">Size:</label>
        <select id="pet-size-input" name="pet-size-input" required>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
        </select><br>

        <label for="pet-description-input">Description:</label><br>
        <textarea id="pet-description-input" name="pet-description-input" rows="4" cols="50" required></textarea><br>

        <button type="submit" id="submit-pet-button">Submit</button>
        <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
