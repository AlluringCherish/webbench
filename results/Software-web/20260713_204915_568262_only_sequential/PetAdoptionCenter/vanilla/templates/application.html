<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
<div id="application-page">
    <h1>Adoption Application for {{ pet.name }}</h1>
    <form method="post" action="{{ url_for('adoption_application', pet_id=pet.pet_id) }}">
        <label for="applicant-name">Full Name:</label><br>
        <input type="text" id="applicant-name" name="applicant-name" required><br>

        <label for="applicant-phone">Phone Number:</label><br>
        <input type="tel" id="applicant-phone" name="applicant-phone" required><br>

        <label for="housing-type">Housing Type:</label><br>
        <select id="housing-type" name="housing-type" required>
            <option value="House">House</option>
            <option value="Apartment">Apartment</option>
            <option value="Condo">Condo</option>
            <option value="Other">Other</option>
        </select><br>

        <label for="reason">Why do you want to adopt this pet?</label><br>
        <textarea id="reason" name="reason" rows="4" cols="50" required></textarea><br>

        <button type="submit" id="submit-application-button">Submit Application</button>
        <button type="button" id="back-to-pet" onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet Details</button>
    </form>
</div>
</body>
</html>
