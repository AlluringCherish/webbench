<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
<div id="checkout-page">
    <h1>Checkout</h1>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        <label for="customer-name">Name:</label><br>
        <input id="customer-name" type="text" name="customer-name" required><br><br>

        <label for="shipping-address">Shipping Address:</label><br>
        <textarea id="shipping-address" name="shipping-address" rows="4" cols="30" required></textarea><br><br>

        <label for="payment-method">Payment Method:</label><br>
        <select id="payment-method" name="payment-method" required>
            <option value="Credit Card">Credit Card</option>
            <option value="PayPal">PayPal</option>
            <option value="Bank Transfer">Bank Transfer</option>
        </select><br><br>

        <button id="place-order-button" type="submit">Place Order</button>
    </form>

    <button onclick="location.href='{{ url_for('shopping_cart') }}'" type="button">Back to Cart</button>
</div>
</body>
</html>
