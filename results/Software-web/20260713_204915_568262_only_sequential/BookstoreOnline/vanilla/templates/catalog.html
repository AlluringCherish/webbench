<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Book Catalog</h1>

    <form method="get" action="{{ url_for('book_catalog') }}">
        <input id="search-input" type="text" name="search" placeholder="Search by title, author, or ISBN" value="{{ search_query or '' }}">
        <select id="category-filter" name="category">
            <option value="All" {% if not selected_category or selected_category == 'All' %}selected{% endif %}>All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_name }}" {% if selected_category == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="books-grid">
        {% for book in books %}
        <div class="book-card">
            <h3>{{ book.title }}</h3>
            <div>{{ book.author }}</div>
            <div>${{ '%.2f'|format(book.price) }}</div>
            <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
        </div>
        {% else %}
        <p>No books found.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
