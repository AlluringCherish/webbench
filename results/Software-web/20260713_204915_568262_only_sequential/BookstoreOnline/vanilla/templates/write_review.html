<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write a Review</h1>

    <form method="post">
        <label for="select-book">Select Book:</label><br>
        <select id="select-book" name="select-book" required>
            {% for book in purchased_books %}
            <option value="{{ book.book_id }}">{{ book.title }}</option>
            {% endfor %}
        </select><br><br>

        <label for="rating-select">Rating:</label><br>
        <select id="rating-select" name="rating-select" required>
            {% for i in range(1, 6) %}
            <option value="{{ i }}">{{ i }} Star{% if i > 1 %}s{% endif %}</option>
            {% endfor %}
        </select><br><br>

        <label for="review-text">Review:</label><br>
        <textarea id="review-text" name="review-text" rows="5" cols="40" required></textarea><br><br>

        <button id="submit-review-button" type="submit">Submit Review</button>
    </form>

    <button onclick="location.href='{{ url_for('reviews') }}'" type="button">Back to Reviews</button>
</div>
</body>
</html>
