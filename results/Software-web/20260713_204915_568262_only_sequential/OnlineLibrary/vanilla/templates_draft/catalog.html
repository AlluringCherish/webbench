<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <form method="post">
            <input type="text" id="search-input" name="search-input" placeholder="Search books..." value="{{ search_query }}" />
            <button type="submit">Search</button>
        </form>
        <div id="book-grid">
            {% for book in books %}
                <div class="book-item">
                    <h2>{{ book.title }}</h2>
                    <div>Author: {{ book.author }}</div>
                    <div>Genre: {{ book.genre }}</div>
                    <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
