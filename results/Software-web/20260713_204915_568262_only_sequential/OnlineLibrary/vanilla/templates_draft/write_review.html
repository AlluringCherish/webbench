<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <div id="book-info-display">
            <h2>{{ book.title }} by {{ book.author }}</h2>
        </div>
        <form method="post">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating-input" required>
                <option value="1" {% if review and review.rating == 1 %}selected{% endif %}>1</option>
                <option value="2" {% if review and review.rating == 2 %}selected{% endif %}>2</option>
                <option value="3" {% if review and review.rating == 3 %}selected{% endif %}>3</option>
                <option value="4" {% if review and review.rating == 4 %}selected{% endif %}>4</option>
                <option value="5" {% if review and review.rating == 5 %}selected{% endif %}>5</option>
            </select>
            <br>
            <label for="review-text">Review Text:</label><br>
            <textarea id="review-text" name="review-text" rows="5" cols="40" required>{% if review %}{{ review.review_text }}{% endif %}</textarea><br>
            <button type="submit" id="submit-review-button">Submit Review</button>
            <button type="button" id="back-to-book" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
        </form>
    </div>
</body>
</html>
