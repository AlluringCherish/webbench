<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <form method="post">
            <table id="reservations-table" border="1">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Reservation Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in reservations %}
                    <tr>
                        <td>{{ r.title }}</td>
                        <td>{{ r.reservation_date }}</td>
                        <td>{{ r.status }}</td>
                        <td>
                            {% if r.status == 'Active' %}
                            <button id="cancel-reservation-button-{{ r.reservation_id }}" type="submit" name="cancel-reservation-button-{{ r.reservation_id }}">Cancel</button>
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
