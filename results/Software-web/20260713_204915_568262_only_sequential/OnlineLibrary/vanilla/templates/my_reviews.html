<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <form method="post">
            <div id="reviews-list">
                {% for review in reviews %}
                <div class="review-item">
                    <strong>{{ review.book_id }}</strong> - Rating: {{ review.rating }}/5 - {{ review.review_date }}<br>
                    <p>{{ review.review_text }}</p>
                    <button id="edit-review-button-{{ review.review_id }}" type="submit" name="edit-review-button-{{ review.review_id }}">Edit</button>
                    <button id="delete-review-button-{{ review.review_id }}" type="submit" name="delete-review-button-{{ review.review_id }}">Delete</button>
                </div>
                {% else %}
                <p>No reviews written yet.</p>
                {% endfor %}
            </div>
            <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
