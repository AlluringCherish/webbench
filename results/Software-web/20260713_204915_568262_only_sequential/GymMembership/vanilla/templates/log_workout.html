<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
</head>
<body>
    <div id="log-workout-page">
        {% if submission_status %}
        <p>{{ submission_status }}</p>
        {% endif %}
        <form method="post">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout_type">
                <option value="Cardio">Cardio</option>
                <option value="Strength">Strength</option>
                <option value="Flexibility">Flexibility</option>
                <option value="Sports">Sports</option>
            </select>

            <label for="workout-duration">Duration (minutes):</label>
            <input type="number" id="workout-duration" name="workout_duration" min="1">

            <label for="calories-burned">Calories Burned:</label>
            <input type="number" id="calories-burned" name="calories_burned" min="0">

            <label for="workout-notes">Notes:</label>
            <textarea id="workout-notes" name="workout_notes"></textarea>

            <button id="submit-workout-button" type="submit">Submit Workout</button>
        </form>
    </div>
</body>
</html>
