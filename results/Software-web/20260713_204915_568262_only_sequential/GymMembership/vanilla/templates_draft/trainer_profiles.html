<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <!-- trainers-page -->
    <div id="trainers-page">
        <form method="get">
            <input id="trainer-search" type="text" name="search_query" placeholder="Search trainers by name or specialty" value="{{ search_query if search_query else '' }}">
            <select id="specialty-filter" name="specialty_filter" onchange="this.form.submit()">
                <option value="" {% if not specialty_filter %}selected{% endif %}>All</option>
                <option value="Strength" {% if specialty_filter == 'Strength' %}selected{% endif %}>Strength</option>
                <option value="Cardio" {% if specialty_filter == 'Cardio' %}selected{% endif %}>Cardio</option>
                <option value="Flexibility" {% if specialty_filter == 'Flexibility' %}selected{% endif %}>Flexibility</option>
                <option value="Weight Loss" {% if specialty_filter == 'Weight Loss' %}selected{% endif %}>Weight Loss</option>
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="trainers-grid">
            {% for trainer in trainers %}
            <div class="trainer-card" style="border:1px solid #000; padding:8px; margin:8px;">
                <h4>{{ trainer.name }}</h4>
                <p>Specialty: {{ trainer.specialty }}</p>
                <p>Certifications: {{ trainer.certifications }}</p>
                <p>Experience: {{ trainer.experience_years }} years</p>
                <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="window.location.href='{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}'">View Profile</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
