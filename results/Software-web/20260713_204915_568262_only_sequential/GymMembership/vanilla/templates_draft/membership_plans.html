<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
</head>
<body>
    <!-- membership-page -->
    <div id="membership-page">
        <form method="get">
            <label for="plan-filter">Filter by plan type:</label>
            <select id="plan-filter" name="filter_type" onchange="this.form.submit()">
                <option value="" {% if not filter_type %}selected{% endif %}>All</option>
                <option value="Basic" {% if filter_type == 'Basic' %}selected{% endif %}>Basic</option>
                <option value="Premium" {% if filter_type == 'Premium' %}selected{% endif %}>Premium</option>
                <option value="Elite" {% if filter_type == 'Elite' %}selected{% endif %}>Elite</option>
            </select>
        </form>
        <div id="plans-grid">
            {% for plan in memberships %}
            <div class="plan-card" style="border:1px solid #000; padding:8px; margin:8px;">
                <h3>{{ plan.plan_name }}</h3>
                <p>Price: {{ plan.price }} / {{ plan.billing_cycle }}</p>
                <p>Features: {{ plan.features }}</p>
                <button id="view-details-button-{{ plan.membership_id }}" onclick="window.location.href='{{ url_for('plan_details', plan_id=plan.membership_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
