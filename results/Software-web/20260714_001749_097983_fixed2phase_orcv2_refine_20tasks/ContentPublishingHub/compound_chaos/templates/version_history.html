<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History</title>
</head>
<body id="version-history-page">
    <h1>Version History for Article {{ article_id }}</h1>
    <ul id="versions-list">
        {% for version in versions %}
        <li>
            Version {{ version.version_number }} - by {{ version.author }} at {{ version.created_date }}<br>
            Change Summary: {{ version.change_summary }}<br>
            <form action="/article/{{ article_id }}/versions/{{ version.version_id }}/restore" method="POST" style="display:inline">
                <button type="submit" id="restore-version-{{ version.version_id }}">Restore</button>
            </form>
            <button class="edit-version" data-version-id="{{ version.version_id }}">Compare</button>
        </li>
        {% endfor %}
    </ul>
    <div id="version-comparison">
        <!-- Version comparison UI will be displayed here -->
    </div>
    <button id="back-to-edit-history" onclick="window.location.href='/article/{{ article_id }}/edit'">Back to Edit</button>
    <button onclick="window.location.href='/dashboard'">Back to Dashboard</button>
</body>
</html>
