<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
</head>
<body id="edit-article-page">
    <h1>Edit Article</h1>
    <form method="POST">
        <label for="edit-article-title">Title:</label>
        <input type="text" name="edit-article-title" id="edit-article-title" value="{{ article.title }}" required>
        <br><br>

        <label for="edit-article-content">Content:</label><br>
        <textarea name="edit-article-content" id="edit-article-content" rows="10" cols="50" required></textarea>
        <br><br>

        <label for="change-summary">Change Summary:</label><br>
        <input type="text" name="change-summary" id="change-summary" required placeholder="Brief summary of changes">
        <br><br>

        <button type="submit" id="save-version-button">Save New Version</button>
        <button type="button" id="cancel-edit" onclick="window.location.href='/dashboard'">Cancel</button>
    </form>
</body>
</html>
