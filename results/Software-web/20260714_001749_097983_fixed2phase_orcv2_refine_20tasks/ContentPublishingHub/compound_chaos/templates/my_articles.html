<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles</title>
</head>
<body id="my-articles-page">
    <h1>My Articles</h1>
    <button id="create-new-article" onclick="location.href='/article/create'">Create New Article</button>
    <button id="back-to-dashboard" onclick="window.location.href='/dashboard'">Back to Dashboard</button>
    <label for="filter-article-status">Filter by Status:</label>
    <select id="filter-article-status" name="status">
        <option value="">All</option>
        <option value="draft">Draft</option>
        <option value="pending_review">Pending Review</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="published">Published</option>
    </select>

    <table id="articles-table" border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Status</th>
                <th>Created Date</th>
                <th>Publish Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for article in articles %}
            <tr>
                <td>{{ article.title }}</td>
                <td>{{ article.category }}</td>
                <td>{{ article.status }}</td>
                <td>{{ article.created_date }}</td>
                <td>{{ article.publish_date }}</td>
                <td><a href="/article/{{ article.article_id }}/edit">Edit</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
