<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body id="dashboard-page">
    <h1 id="welcome-message">Welcome to ContentPublishingHub</h1>
    <div id="quick-stats">
        <p>User count: {{ quick_stats.user_count }}</p>
        <p>Article count: {{ quick_stats.article_count }}</p>
    </div>

    <button id="create-article-button" onclick="location.href='/article/create'">Create Article</button>

    <section id="recent-activity">
        <h2>Recent Activity</h2>
        {% if recent_activity %}
            <ul>
            {% for activity in recent_activity %}
                <li>{{ activity }}</li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No recent activity.</p>
        {% endif %}
    </section>
</body>
</html>
