<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles</title>
</head>
<body id="published-articles-page">
    <h1>Published Articles</h1>
    <label for="filter-published-category">Filter by Category:</label>
    <select id="filter-published-category" name="category">
        <option value="">All</option>
        <option value="news">News</option>
        <option value="blog">Blog</option>
        <option value="tutorial">Tutorial</option>
        <option value="announcement">Announcement</option>
    </select>

    <label for="sort-published">Sort by:</label>
    <select id="sort-published" name="sort">
        <option value="date">Date</option>
        <option value="title">Title</option>
    </select>

    <button id="back-to-dashboard-published" onclick="window.location.href='/dashboard'">Back to Dashboard</button>

    <div id="published-articles-grid">
        {% for article in articles %}
            <div class="article-item">
                <h3>{{ article.title }}</h3>
                <p>Category: {{ article.category }}</p>
                <p>Status: {{ article.status }}</p>
                <p>Published: {{ article.publish_date }}</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
