<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
</head>
<body id="create-article-page">
    <h1>Create New Article</h1>
    <form method="POST">
        <label for="article-title">Title:</label>
        <input type="text" name="article-title" id="article-title" required>
        <br><br>

        <label for="article-content">Content:</label><br>
        <textarea name="article-content" id="article-content" rows="10" cols="50" required></textarea>
        <br><br>

        <button type="submit" id="save-draft-button">Save as Draft</button>
        <button type="button" id="cancel-button" onclick="window.location.href='/dashboard'">Cancel</button>
    </form>
</body>
</html>
