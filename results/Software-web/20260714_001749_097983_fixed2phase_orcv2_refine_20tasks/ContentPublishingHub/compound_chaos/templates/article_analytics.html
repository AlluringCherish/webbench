<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics</title>
</head>
<body id="analytics-page">
    <h1>Analytics for Article {{ article_id }}</h1>
    <div id="analytics-overview">
        <!-- Some overview content here -->
    </div>
    <div id="analytics-unique-visitors">
        <h2>Unique Visitors</h2>
        <ul>
            {% for entry in analytics %}
                <li>Date: {{ entry.date }}, Views: {{ entry.views }}, Visitors: {{ entry.unique_visitors }}, Avg Time: {{ entry.avg_time_seconds }}s, Shares: {{ entry.shares }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-article-analytics" onclick="window.history.back()">Back</button>
</body>
</html>
