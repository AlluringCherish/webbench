<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ContentPublishingHub</title>
</head>
<body>
<div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ user.fullname }}</h1>
    <div id="quick-stats">
        <p>Total Articles: {{ total_articles }}</p>
        <p>Approved Articles: {{ approved_articles }}</p>
        <p>Recent Approvals: {{ recent_approvals|length }}</p>
    </div>
    <button id="create-article-button" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>

    <div id="recent-activity">
        <h3>Recent Activity</h3>
        <ul>
        {% for activity in recent_activity %}
            <li>{{ activity }}</li>
        {% else %}
            <li>No recent activity.</li>
        {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
