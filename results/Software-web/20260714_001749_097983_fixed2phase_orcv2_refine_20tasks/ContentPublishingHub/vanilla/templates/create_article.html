<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
<div id="create-article-page">
    <h1>Create New Article</h1>
    <form method="POST">
        <label for="article-title">Title:</label><br>
        <input id="article-title" name="article-title" type="text" required><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="article-content" rows="10" cols="50" required></textarea><br><br>

        <button id="save-draft-button" type="submit">Save as Draft</button>
        <button id="cancel-button" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
