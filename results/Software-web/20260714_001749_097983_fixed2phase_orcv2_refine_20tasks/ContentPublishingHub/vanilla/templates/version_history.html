<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - ContentPublishingHub</title>
</head>
<body>
<div id="version-history-page">
    <h1>Version History for Article: {{ article.title }}</h1>
    <ul id="versions-list">
        {% for version in versions %}
        <li>
            Version {{ version.version_number }} - {{ version.created_date }}
            <form method="POST" action="{{ url_for('restore_version', article_id=article.article_id, version_number=version.version_number) }}" style="display:inline;">
                <button id="restore-version-{{ version.version_number }}" type="submit">Restore</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    <button id="back-to-edit-history" onclick="window.location.href='{{ url_for('edit_article', article_id=article.article_id) }}'">Back to Edit</button>
</div>
</body>
</html>
