<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Smart Home Dashboard</h1>
    <div id="device-summary">
        <p>Total Devices: {{ total_devices }}</p>
        <p>Online Devices: {{ online_devices }}</p>
        <p>Offline Devices: {{ offline_devices }}</p>
    </div>
    <button id="device-list-button" onclick="location.href='{{ url_for('device_list') }}'">Device List</button>
    <button id="add-device-button" onclick="location.href='{{ url_for('add_device') }}'">Add Device</button>
    <button id="automation-button" onclick="location.href='{{ url_for('automation') }}'">Automation Rules</button>
    <button id="energy-button" onclick="location.href='{{ url_for('energy') }}'">Energy Report</button>
    <button id="activity-button" onclick="location.href='{{ url_for('activity') }}'">Activity Logs</button>
    <div id="room-list">
        <h2>Rooms and Device Counts</h2>
        <ul>
            {% for room, count in room_counts.items() %}
            <li>{{ room }}: {{ count }} devices</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
