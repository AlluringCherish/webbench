<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
<div id="device-control-page">
    <h2 id="device-name-display">{{ device.device_name }}</h2>
    <div id="device-status-display">Status: {{ device.status }}</div>
    <form method="POST">
        <button id="power-toggle" name="power" value="on" type="submit">Toggle Power On</button>
        <button id="power-toggle-off" name="power" value="off" type="submit">Toggle Power Off</button><br>

        {% if device.device_type == 'Light' or device.device_type == 'Appliance' %}
        <label for="brightness">Brightness (0-100):</label>
        <input type="number" name="brightness" min="0" max="100" value="{{ device.brightness }}"><br>
        {% endif %}

        {% if device.device_type == 'Thermostat' %}
        <label for="temperature">Temperature (°F):</label>
        <input type="number" name="temperature" min="50" max="90" value="{{ device.temperature }}"><br>
        {% endif %}

        <button id="save-settings-button" type="submit">Save Settings</button>
        <button id="back-to-devices" type="button" onclick="location.href='{{ url_for('device_list') }}'">Back to Devices</button>
    </form>
</div>
</body>
</html>
