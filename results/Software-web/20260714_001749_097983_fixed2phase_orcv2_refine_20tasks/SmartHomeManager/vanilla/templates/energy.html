<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
<div id="energy-page">
    <h1>Energy Report</h1>
    <div id="energy-summary">
        <p>Total Consumption: {{ '{:.2f}'.format(total_kwh) }} kWh</p>
    </div>
    <form method="POST">
        <label for="date-filter">Date Filter:</label>
        <input id="date-filter" name="date-filter" type="date" value="{{ date_filter }}">
        <button id="apply-filter-button" type="submit">Apply Filter</button>
    </form>
    <table id="energy-table" border="1">
        <thead>
            <tr>
                <th>Device</th>
                <th>Date</th>
                <th>kWh</th>
            </tr>
        </thead>
        <tbody>
            {% for log in energy_logs %}
            <tr>
                <td>{{ device_map.get(log.device_id, 'Unknown') }}</td>
                <td>{{ log.date }}</td>
                <td>{{ log.consumption_kwh }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
