<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Device</title>
</head>
<body>
<div id="add-device-page">
    <h1>Add New Device</h1>
    <form method="post" action="">
        <label for="device-name">Device Name:</label>
        <input id="device-name" name="device-name" type="text" required>
        <br><br>
        <label for="device-type">Device Type:</label>
        <select id="device-type" name="device-type" required>
            <option value="Light">Light</option>
            <option value="Thermostat">Thermostat</option>
            <option value="Camera">Camera</option>
            <option value="Lock">Lock</option>
            <option value="Sensor">Sensor</option>
            <option value="Appliance">Appliance</option>
        </select>
        <br><br>
        <label for="device-room">Room:</label>
        <select id="device-room" name="device-room" required>
            <option value="Living Room">Living Room</option>
            <option value="Bedroom">Bedroom</option>
            <option value="Kitchen">Kitchen</option>
            <option value="Bathroom">Bathroom</option>
            <option value="Garage">Garage</option>
        </select>
        <br><br>
        <button id="submit-device-button" type="submit">Add Device</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
