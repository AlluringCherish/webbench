<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
<div id="energy-page">
    <h1>Energy Report</h1>
    <div id="energy-summary">
        <p>Total Consumption: {{ total_kwh }} kWh</p>
        <p>Estimated Cost: ${{ '%.2f'|format(total_cost) }}</p>
    </div>
    <form method="post" action="">
        <label for="date-filter">Filter by Date:</label>
        <input type="date" id="date-filter" name="date-filter" value="{{ date_filter }}">
        <button id="apply-filter-button" type="submit">Apply Filter</button>
    </form>
    <br>
    <table id="energy-table" border="1">
        <thead>
        <tr>
            <th>Device</th>
            <th>Date</th>
            <th>kWh</th>
        </tr>
        </thead>
        <tbody>
        {% for log in energy_logs %}
            <tr>
                <td>{{ log.device_name }}</td>
                <td>{{ log.date }}</td>
                <td>{{ log.consumption_kwh }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <br>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
