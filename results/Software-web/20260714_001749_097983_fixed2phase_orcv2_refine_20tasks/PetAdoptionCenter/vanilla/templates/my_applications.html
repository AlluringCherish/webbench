<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
<div id="my-applications-page">
    <h1>My Applications</h1>
    <form method="get">
        <label>Status Filter:
            <select id="filter-status" name="status">
                {% for stat in ['All', 'Pending', 'Approved', 'Rejected'] %}
                    <option value="{{ stat }}" {% if status_filter == stat %}selected{% endif %}>{{ stat }}</option>
                {% endfor %}
            </select>
        </label>
        <button type="submit">Filter</button>
    </form>
    <table id="applications-table" border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>Pet Name</th>
                <th>Date Submitted</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for app in applications %}
                <tr>
                    <td>{{ app.pet_name }}</td>
                    <td>{{ app.date_submitted }}</td>
                    <td>{{ app.status }}</td>
                    <td><!-- Actions placeholder --></td>
                </tr>
            {% else %}
                <tr><td colspan="4">No applications found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
