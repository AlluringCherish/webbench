<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <h1>My Profile</h1>
    <div id="profile-username">Username: {{ user.username }}</div>
    <form method="post">
        <label>Email: <input id="profile-email" name="profile-email" value="{{ user.email }}" required></label><br>
        <button id="update-profile-button" type="submit">Update Profile</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
