<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
<div id="favorites-page">
    <h1>My Favorites</h1>
    <div id="favorites-grid">
        {% for pet in pets %}
            <div class="pet-card">
                <h3>{{ pet.name }}</h3>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
            </div>
        {% else %}
            <p>No favorite pets yet.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
