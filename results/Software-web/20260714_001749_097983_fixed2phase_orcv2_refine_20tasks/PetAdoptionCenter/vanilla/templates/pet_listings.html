<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Pets</title>
</head>
<body>
<div id="pet-listings-page">
    <h1>Available Pets</h1>
    <form method="get">
        <input id="search-input" name="search" placeholder="Search by name" value="{{ search_term }}">
        <select id="filter-species" name="species">
            {% for sp in ['All', 'Dog', 'Cat', 'Bird', 'Rabbit', 'Other'] %}
                <option value="{{ sp }}" {% if species_filter == sp %}selected{% endif %}>{{ sp }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="pet-grid">
        {% for pet in pets %}
        <div class="pet-card" onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'" style="cursor:pointer; border:1px solid #ccc; margin:5px; padding:5px;">
            <h3>{{ pet.name }}</h3>
            <div>Species: {{ pet.species }}</div>
            <div>Age: {{ pet.age }}</div>
        </div>
        {% else %}
        <p>No pets found.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
