<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
<div id="application-page">
    <h1>Adoption Application for {{ pet.name }}</h1>
    <form method="post">
        <label>Full Name: <input id="applicant-name" name="applicant-name" required></label><br>
        <label>Phone: <input id="applicant-phone" name="applicant-phone" required></label><br>
        <label>Housing Type:
            <select id="housing-type" name="housing-type" required>
                <option value="House">House</option>
                <option value="Apartment">Apartment</option>
                <option value="Condo">Condo</option>
                <option value="Other">Other</option>
            </select>
        </label><br>
        <label>Reason for Adoption:<br>
            <textarea id="reason" name="reason" required></textarea>
        </label><br>
        <button id="submit-application-button" type="submit">Submit Application</button>
        <button id="back-to-pet" type="button" onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet Details</button>
    </form>
</div>
</body>
</html>
