<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
<div id="add-pet-page">
    <h1>Add New Pet</h1>
    <form method="post">
        <label>Name: <input id="pet-name-input" name="pet-name-input" required></label><br>
        <label>Species: 
            <select id="pet-species-input" name="pet-species-input" required>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Bird">Bird</option>
                <option value="Rabbit">Rabbit</option>
                <option value="Other">Other</option>
            </select>
        </label><br>
        <label>Breed: <input id="pet-breed-input" name="pet-breed-input" required></label><br>
        <label>Age: <input id="pet-age-input" name="pet-age-input" required placeholder="e.g., 2 years"></label><br>
        <label>Gender:
            <select id="pet-gender-input" name="pet-gender-input" required>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </label><br>
        <label>Size:
            <select id="pet-size-input" name="pet-size-input" required>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>
        </label><br>
        <label>Description:<br>
            <textarea id="pet-description-input" name="pet-description-input" required></textarea>
        </label><br>
        <button id="submit-pet-button" type="submit">Add Pet</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
