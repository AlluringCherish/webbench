<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
<div id="messages-page">
    <h1>Messages</h1>
    <div id="conversation-list">
        {% for contact, msgs in conversations.items() %}
            <div class="conversation">
                <h3>Conversation with {{ contact }}</h3>
                {% for msg in msgs %}
                    <div><b>{{ msg.sender }}</b> ({{ msg.timestamp }}): {{ msg.content }}</div>
                {% endfor %}
            </div>
        {% else %}
            <p>No messages found.</p>
        {% endfor %}
    </div>
    <form method="post">
        <label>To: <input name="recipient" required></label><br>
        <label>Subject: <input name="subject"></label><br>
        <label>Message:<br>
            <textarea id="message-input" name="content" required></textarea>
        </label><br>
        <button id="send-message-button" type="submit">Send Message</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
