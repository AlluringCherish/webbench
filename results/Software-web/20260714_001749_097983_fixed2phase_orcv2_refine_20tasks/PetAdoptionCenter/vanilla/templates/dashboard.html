<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Pet Adoption Dashboard</h1>
    <div id="featured-pets">
        {% for pet in featured_pets %}
            <div class="pet-card">
                <h3>{{ pet.name }}</h3>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
            </div>
        {% else %}
            <p>No featured pets available.</p>
        {% endfor %}
    </div>
    <button id="browse-pets-button" onclick="location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Refresh Dashboard</button>
    <br>
    <nav>
        <a href="{{ url_for('add_pet') }}">Add Pet (Admin)</a> |
        <a href="{{ url_for('favorites') }}">Favorites</a> |
        <a href="{{ url_for('messages') }}">Messages</a> |
        <a href="{{ url_for('profile') }}">My Profile</a> |
        <a href="{{ url_for('admin_panel') }}">Admin Panel (Admin)</a>
    </nav>
</div>
</body>
</html>
