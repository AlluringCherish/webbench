<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application - PetAdoptionCenter</title>
</head>
<body>
    <h1>Submit Adoption Application</h1>
    <nav>
        <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">Back to Pet Details</a> |
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
    </nav>
    <h2>Applying for {{ pet.name }}</h2>
    <form method="post">
        <label>Your Name: <input type="text" name="applicant_name" required></label><br>
        <label>Phone: <input type="text" name="phone" required></label><br>
        <label>Address: <input type="text" name="address" required></label><br>
        <label>Housing Type: <input type="text" name="housing_type" required></label><br>
        <label>Have Yard: <select name="has_yard">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
        </select></label><br>
        <label>Other Pets: <select name="other_pets">
            <option value="Yes">Yes</option>
            <option value="No" selected>No</option>
        </select></label><br>
        <label>Experience with Pets: <textarea name="experience" required></textarea></label><br>
        <label>Reason for Adoption: <textarea name="reason" required></textarea></label><br>
        <button type="submit">Submit Application</button>
    </form>
</body>
</html>
