<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Listings - PetAdoptionCenter</title>
</head>
<body>
    <h1>Pet Listings</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> | 
        <a href="{{ url_for('favorites', username='john_doe') }}">Favorites</a> | 
        <a href="{{ url_for('profile', username='john_doe') }}">Profile</a>
    </nav>
    <form method="get" action="{{ url_for('pet_listings') }}">
        <label for="species">Species:</label>
        <input type="text" name="species" id="species" value="{{ species_filter }}">
        <label for="status">Status:</label>
        <input type="text" name="status" id="status" value="{{ status_filter }}">
        <button type="submit">Filter</button>
    </form>
    <ul>
    {% for pet in pets %}
        <li>
            <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">{{ pet.name }} ({{ pet.species }})</a>
        </li>
    {% else %}
        <li>No pets found.</li>
    {% endfor %}
    </ul>
</body>
</html>
