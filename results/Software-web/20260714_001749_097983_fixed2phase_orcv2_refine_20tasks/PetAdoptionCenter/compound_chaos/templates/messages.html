<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages - PetAdoptionCenter</title>
</head>
<body>
    <h1>Messages</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> | 
        <a href="{{ url_for('profile', username=username) }}">Profile</a>
    </nav>
    <ul>
    {% for msg in messages %}
        <li><strong>From: {{ msg.sender_username }}</strong> - Subject: {{ msg.subject }}<br>{{ msg.content }}</li>
    {% else %}
        <li>No messages found.</li>
    {% endfor %}
    </ul>
</body>
</html>
