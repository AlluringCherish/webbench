<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - PetAdoptionCenter</title>
</head>
<body>
    <h1>User Profile</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> | 
        <a href="{{ url_for('pet_listings') }}">Pet Listings</a>
    </nav>
    <form method="post">
        <label>Email: <input type="email" name="email" value="{{ user.email }}" required></label><br>
        <label>Phone: <input type="text" name="phone" value="{{ user.phone }}" required></label><br>
        <label>Address: <input type="text" name="address" value="{{ user.address }}" required></label><br>
        <button type="submit" id="update-profile-button">Update Profile</button>
    </form>
</body>
</html>
