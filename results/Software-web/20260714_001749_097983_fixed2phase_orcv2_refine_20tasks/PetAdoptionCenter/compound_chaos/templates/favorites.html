<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites - PetAdoptionCenter</title>
</head>
<body>
    <h1>My Favorite Pets</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> | 
        <a href="{{ url_for('pet_listings') }}">Pet Listings</a>
    </nav>
    <ul>
    {% for pet in pets %}
        <li>
            <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">{{ pet.name }} ({{ pet.species }})</a>
            <form method="post" action="{{ url_for('remove_favorite', username=username, pet_id=pet.pet_id) }}" style="display:inline;">
                <button type="submit">Remove</button>
            </form>
        </li>
    {% else %}
        <li>No favorites found.</li>
    {% endfor %}
    </ul>
</body>
</html>
