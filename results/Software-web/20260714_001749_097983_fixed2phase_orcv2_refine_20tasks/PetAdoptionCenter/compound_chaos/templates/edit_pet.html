<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Pet - PetAdoptionCenter</title>
</head>
<body>
    <h1>Edit Pet</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> | 
        <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">Back to Details</a>
    </nav>
    <form method="post">
        <label>Name: <input type="text" name="name" value="{{ pet.name }}" required></label><br>
        <label>Species: <input type="text" name="species" value="{{ pet.species }}" required></label><br>
        <label>Breed: <input type="text" name="breed" value="{{ pet.breed }}" required></label><br>
        <label>Age: <input type="number" name="age" value="{{ pet.age }}" required></label><br>
        <label>Gender: <input type="text" name="gender" value="{{ pet.gender }}" required></label><br>
        <label>Size: <input type="text" name="size" value="{{ pet.size }}" required></label><br>
        <label>Description: <textarea name="description" required>{{ pet.description }}</textarea></label><br>
        <label>Shelter: <select name="shelter_id">
            {% for shelter in shelters %}
                <option value="{{ shelter.shelter_id }}" {% if shelter.shelter_id == pet.shelter_id %}selected{% endif %}>{{ shelter.name }}</option>
            {% endfor %}
        </select></label><br>
        <label>Status: <select name="status">
            <option value="Available" {% if pet.status == 'Available' %}selected{% endif %}>Available</option>
            <option value="Pending" {% if pet.status == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="Adopted" {% if pet.status == 'Adopted' %}selected{% endif %}>Adopted</option>
        </select></label><br>
        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
