<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Send Message - PetAdoptionCenter</title>
</head>
<body>
    <h1>Send Message</h1>
    <nav>
        <a href="{{ url_for('messages', username=sender) }}">Back to Messages</a>
    </nav>
    <form method="post">
        <label>Subject: <input type="text" name="subject" required></label><br>
        <label>Content:<br><textarea name="content" required></textarea></label><br>
        <button type="submit">Send</button>
    </form>
</body>
</html>
