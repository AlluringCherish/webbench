<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Pet - PetAdoptionCenter</title>
</head>
<body>
    <h1>Add New Pet (Admin)</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
    </nav>
    <form method="post">
        <label>Name: <input type="text" name="name" required></label><br>
        <label>Species: <input type="text" name="species" required></label><br>
        <label>Breed: <input type="text" name="breed" required></label><br>
        <label>Age: <input type="number" name="age" required></label><br>
        <label>Gender: <input type="text" name="gender" required></label><br>
        <label>Size: <input type="text" name="size" required></label><br>
        <label>Description: <textarea name="description" required></textarea></label><br>
        <label>Shelter: <select name="shelter_id">
            {% for shelter in shelters %}
                <option value="{{ shelter.shelter_id }}">{{ shelter.name }}</option>
            {% endfor %}
        </select></label><br>
        <button type="submit">Add Pet</button>
    </form>
</body>
</html>
