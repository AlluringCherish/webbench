<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
  <h1>My Playlists</h1>
  <div id="playlists-grid">
    {% for playlist in playlists %}
      <div class="playlist-card">
        <p><strong>{{ playlist.title }}</strong></p>
        <p>{{ playlist.total_songs }} songs</p>
        <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="window.location.href='/playlists/{{ playlist.playlist_id }}'">View Playlist</button>
      </div>
    {% else %}
      <p>No playlists found.</p>
    {% endfor %}
  </div>
  <button id="create-playlist-button" onclick="window.location.href='/playlists/create'">Create Playlist</button>
  <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
