<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create New Playlist</title>
</head>
<body>
<div id="create-playlist-page">
  <h1>Create New Playlist</h1>
  {% if error %}
  <p style="color:red">{{ error }}</p>
  {% endif %}
  <form method="post">
    <label for="playlist-name-input">Playlist Name:</label>
    <input id="playlist-name-input" name="playlist-name-input" type="text" required>
    <br>
    <label for="playlist-description-input">Description:</label>
    <textarea id="playlist-description-input" name="playlist-description-input"></textarea>
    <br>
    <button type="submit" id="save-playlist-button">Save Playlist</button>
    <button type="button" id="cancel-create-button" onclick="window.location.href='/playlists'">Cancel</button>
  </form>
</div>
</body>
</html>
