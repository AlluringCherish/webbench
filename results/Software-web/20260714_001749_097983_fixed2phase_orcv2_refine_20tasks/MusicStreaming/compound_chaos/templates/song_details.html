<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Song Details</title>
</head>
<body>
<div id="song-details-page">
  <h1 id="song-title">{{ song.title }}</h1>
  <div id="artist-name"><a href="/artists/{{ artist.artist_id }}">{{ artist.name }}</a></div>
  <div id="album-name">{{ album.title if album else '' }}</div>
  <div id="duration-display">Duration: {{ song.duration }} seconds</div>
  <button id="play-button" onclick="alert('Playing song: {{ song.title }}')">Play</button>
  <button id="back-to-catalog" onclick="window.location.href='/catalog'">Back to Catalog</button>
</div>
</body>
</html>
