<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Streaming Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Music Streaming Dashboard</h1>
    <div id="featured-songs">
        <h2>Featured Songs</h2>
        <ul>
        {% for song in featured_songs %}
            <li>{{ song.title }} by {{ song.artist_id }}</li>
        {% endfor %}
        </ul>
    </div>

    <div id="trending-artists">
        <h2>Trending Artists</h2>
        <ul>
        {% for artist in trending_artists %}
            <li>{{ artist.name }}</li>
        {% endfor %}
        </ul>
    </div>

    <button id="browse-songs-button" onclick="window.location.href='/catalog'">Browse Songs</button>
    <button id="my-playlists-button" onclick="window.location.href='/playlists'">My Playlists</button>
    <button id="trending-artists-button" onclick="window.location.href='/artists'">Trending Artists</button>
    <button id="genres-exploration-button" onclick="window.location.href='/genres'">Genres Exploration</button>
</div>
</body>
</html>
