<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Album Details</title>
</head>
<body>
<div id="album-details-page">
  <h1 id="album-title">{{ album.title }}</h1>
  <div id="album-artist">{{ artist.name }}</div>
  <div id="album-year">{{ album.release_year }}</div>
  <div id="album-songs-list">
    <ul>
      {% for song in songs %}
      <li>{{ song.title }} ({{ song.duration }}s)</li>
      {% else %}
      <li>No songs in this album.</li>
      {% endfor %}
    </ul>
  </div>
  <button id="add-album-to-playlist-button" onclick="alert('Add album songs to playlist feature coming soon!')">Add Album to Playlist</button>
  <button id="back-to-albums" onclick="window.location.href='/albums'">Back to Albums</button>
</div>
</body>
</html>
