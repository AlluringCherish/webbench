<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>
    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-card">
            <p><strong>{{ playlist.title }}</strong></p>
            <p>Song Count: {{ playlist.total_songs }}</p>
            <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="window.location.href='{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}'">View Details</button>
        </div>
        {% else %}
        <p>No playlists available.</p>
        {% endfor %}
    </div>
    <button id="create-playlist-button" onclick="window.location.href='{{ url_for('create_playlist') }}'">Create New Playlist</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
