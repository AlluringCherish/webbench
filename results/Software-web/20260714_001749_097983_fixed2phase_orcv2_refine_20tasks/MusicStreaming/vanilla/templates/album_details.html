<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
<div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">{{ album_artist.name }}</div>
    <div id="album-year">{{ album.release_year }}</div>

    <div id="album-songs-list">
        <h3>Songs in Album</h3>
        <ul>
            {% for song in album_songs %}
            <li>{{ song.title }} ({{ song.duration }} sec)</li>
            {% else %}
            <li>No songs available.</li>
            {% endfor %}
        </ul>
    </div>

    <form method="post" action="{{ url_for('add_album_to_playlist', album_id=album.album_id) }}">
        <label for="playlist_id">Add all to playlist:</label>
        <select name="playlist_id" id="playlist_id">
            {% for playlist in playlists %}
            <option value="{{ playlist.playlist_id }}">{{ playlist.title }}</option>
            {% endfor %}
        </select>
        <button id="add-album-to-playlist-button" type="submit">Add</button>
    </form>
</div>
</body>
</html>
