<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Streaming Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Music Streaming Dashboard</h1>
    <div id="featured-songs">
        <h2>Featured Songs</h2>
        <ul>
            {% for song in featured_songs %}
            <li><a href="{{ url_for('song_details', song_id=song.song_id) }}">{{ song.title }}</a> by {{ song.artist_name }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="browse-songs-button" onclick="window.location.href='{{ url_for('song_catalog') }}'">Browse Songs</button>
    <button id="my-playlists-button" onclick="window.location.href='{{ url_for('playlists') }}'">My Playlists</button>
    <button id="trending-artists-button" onclick="window.location.href='{{ url_for('artists') }}'">Trending Artists</button>
</div>
</body>
</html>
