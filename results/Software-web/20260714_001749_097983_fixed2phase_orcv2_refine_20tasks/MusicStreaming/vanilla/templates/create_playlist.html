<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
<div id="create-playlist-page">
    <h1>Create New Playlist</h1>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('create_playlist') }}">
        <label for="playlist-name-input">Playlist Name:</label><br>
        <input type="text" id="playlist-name-input" name="playlist_name" required><br><br>

        <label for="playlist-description-input">Playlist Description:</label><br>
        <textarea id="playlist-description-input" name="playlist_description"></textarea><br><br>

        <button id="save-playlist-button" type="submit">Save</button>
        <button id="cancel-create-button" type="button" onclick="window.location.href='{{ url_for('playlists') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
