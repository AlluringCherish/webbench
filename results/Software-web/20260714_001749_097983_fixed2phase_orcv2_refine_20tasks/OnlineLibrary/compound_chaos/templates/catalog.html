<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <form method="POST">
            <input id="search-input" name="search-input" type="text" placeholder="Search by title or author" value="{{ search_term }}">
            <button type="submit">Search</button>
        </form>

        <div id="book-grid">
            {% for book in books %}
                <div class="book-card">
                    <h3>{{ book.title }}</h3>
                    <p>Author: {{ book.author }}</p>
                    <p>Status: {{ book.status }}</p>
                    <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Book</button>
                </div>
            {% else %}
                <p>No books found.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
