<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome {{ username }}!</h1>
        <button id="browse-books-button" onclick="location.href='{{ url_for('catalog') }}'">Browse Books</button>
        <button id="my-borrows-button" onclick="location.href='{{ url_for('my_borrows') }}'">My Borrows</button>
        <button onclick="location.href='{{ url_for('my_reservations') }}'">My Reservations</button>
        <button onclick="location.href='{{ url_for('my_reviews') }}'">My Reviews</button>
        <button onclick="location.href='{{ url_for('profile') }}'">My Profile</button>
        <button onclick="location.href='{{ url_for('logout') }}'">Logout</button>

        <h2>Featured Books</h2>
        <ul>
        {% for book in featured_books %}
            <li>{{ book.title }} by {{ book.author }} (Status: {{ book.status }})</li>
        {% endfor %}
        </ul>
    </div>
</body>
</html>
