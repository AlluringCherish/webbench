<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
                <div>
                    <strong>{{ review.title }}</strong><br>
                    Rating: {{ review.rating }}<br>
                    {{ review.review_text }}<br>
                    <form method="GET" action="{{ url_for('write_review', book_id=review.book_id, review_id=review.review_id) }}" style="display:inline;">
                        <button id="edit-review-button-{{ review.review_id }}" type="submit">Edit Review</button>
                    </form>
                    <form method="POST" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                        <button id="delete-review-button-{{ review.review_id }}" type="submit">Delete Review</button>
                    </form>
                </div>
                <hr>
            {% else %}
                <p>No reviews found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
