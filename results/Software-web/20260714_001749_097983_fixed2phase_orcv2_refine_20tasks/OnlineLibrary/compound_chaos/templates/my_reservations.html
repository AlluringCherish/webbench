<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <table id="reservations-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Reservation Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.title }}</td>
                    <td>{{ reservation.reservation_date }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        {% if reservation.status == 'Active' %}
                            <form method="POST">
                                <input type="hidden" name="cancel_reservation_id" value="{{ reservation.reservation_id }}">
                                <button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="submit">Cancel Reservation</button>
                            </form>
                        {% else %}
                            N/A
                        {% endif %}
                    </td>
                </tr>
            {% else %}
                <tr><td colspan="4">No reservations found.</td></tr>
            {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
