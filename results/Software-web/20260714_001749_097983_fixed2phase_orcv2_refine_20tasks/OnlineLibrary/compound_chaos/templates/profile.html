<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div id="profile-username">Username: {{ user.username }}</div>
        <form method="POST">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="profile-email" type="email" value="{{ user.email }}" required>
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <h2>Borrow History</h2>
        <div id="borrow-history">
            <ul>
            {% for borrow in borrow_history %}
                <li>{{ borrow.title }} - Borrowed on {{ borrow.borrow_date }} - Status: {{ borrow.status }}</li>
            {% else %}
                <p>No borrowing history found.</p>
            {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
