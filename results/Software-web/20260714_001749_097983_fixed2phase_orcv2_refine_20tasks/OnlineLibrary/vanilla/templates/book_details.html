<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
<div id="book-details-page">
    <h1 id="book-title">{{ book.title }}</h1>
    <div id="book-author">Author: {{ book.author }}</div>
    <div id="book-status">Status: {{ book.status }}</div>
    {% if book.status == 'Available' %}
    <button id="borrow-button" onclick="location.href='{{ url_for('borrow_book', book_id=book.book_id) }}'">Borrow</button>
    {% endif %}
    <button id="write-review-button" onclick="location.href='{{ url_for('write_review', book_id=book.book_id) }}'">Write Review</button>
    <div id="reviews-section">
        <h3>Reviews:</h3>
        {% for review in reviews %}
        <div class="review">
            <strong>{{ review.rating }} stars</strong> - {{ review.review_text }} <small>({{ review.review_date }})</small>
        </div>
        {% else %}
        <p>No reviews yet.</p>
        {% endfor %}
    </div>
    <button id="back-to-catalog" onclick="location.href='{{ url_for('catalog') }}'">Back to Catalog</button>
</div>
</body>
</html>
