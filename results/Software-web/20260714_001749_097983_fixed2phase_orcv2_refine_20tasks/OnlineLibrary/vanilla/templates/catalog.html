<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
<div id="catalog-page">
    <form method="get" action="{{ url_for('catalog') }}">
        <input type="text" id="search-input" name="search" placeholder="Search by title or author" value="{{ search_query }}">
        <button type="submit">Search</button>
    </form>
    <div id="book-grid">
        {% for book in books %}
        <div class="book-card">
            <div><strong>{{ book.title }}</strong></div>
            <div>{{ book.author }}</div>
            <div>Status: {{ book.status }}</div>
            <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
        </div>
        {% else %}
        <p>No books found.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
