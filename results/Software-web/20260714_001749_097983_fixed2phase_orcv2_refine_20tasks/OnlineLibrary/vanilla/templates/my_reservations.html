<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
    <form method="post">
        <table id="reservations-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Reservation Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                    <tr>
                        <td>{{ books[reservation.book_id].title }}</td>
                        <td>{{ reservation.reservation_date }}</td>
                        <td>{{ reservation.status }}</td>
                        <td>
                            {% if reservation.status == 'Active' %}
                            <button id="cancel-reservation-button-{{ reservation.reservation_id }}" name="cancel_reservation_id" value="{{ reservation.reservation_id }}" type="submit">Cancel</button>
                            {% else %}
                            -
                            {% endif %}
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
