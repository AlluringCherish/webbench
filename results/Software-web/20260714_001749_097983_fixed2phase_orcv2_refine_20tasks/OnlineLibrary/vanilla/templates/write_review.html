<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    <div id="book-info-display">
        <h2>{{ book.title }}</h2>
        <p>Author: {{ book.author }}</p>
    </div>
    <form method="post">
        <label for="rating-input">Rating</label>
        <select id="rating-input" name="rating-input">
            {% for i in range(1,6) %}
                <option value="{{ i }}" {% if review.rating == i %}selected{% endif %}>{{ i }} Star{{ 's' if i > 1 else '' }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="review-text">Review</label>
        <textarea id="review-text" name="review-text" rows="5" cols="50">{{ review.review_text }}</textarea>
        <br>
        <button id="submit-review-button" type="submit">Submit Review</button>
        <button id="back-to-book" type="button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
    </form>
</div>
</body>
</html>
