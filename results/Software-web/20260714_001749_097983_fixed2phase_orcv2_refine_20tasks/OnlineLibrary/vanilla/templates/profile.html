<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <div id="profile-username">Username: {{ user.username }}</div>
    <form method="post">
        <label for="profile-email">Email:</label>
        <input type="email" id="profile-email" name="profile-email" value="{{ user.email }}" required>
        <button id="update-profile-button" type="submit">Update Profile</button>
    </form>
    <div id="borrow-history">
        <h3>Borrow History</h3>
        <ul>
            {% for borrow in user_borrows %}
            <li>{{ borrow.book_id }} - Borrowed on {{ borrow.borrow_date }}, Status: {{ borrow.status }}</li>
            {% else %}
            <li>No borrow history available.</li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
