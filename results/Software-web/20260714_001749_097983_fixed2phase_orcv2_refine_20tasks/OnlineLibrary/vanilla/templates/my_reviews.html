<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
<div id="reviews-page">
    <form method="post">
        <div id="reviews-list">
            {% for review in reviews %}
                <div class="review-entry">
                    <strong>{{ books[review.book_id].title }}</strong> - Rating: {{ review.rating }}<br>
                    <p>{{ review.review_text }}</p>
                    <button id="edit-review-button-{{ review.review_id }}" type="button" onclick="location.href='{{ url_for('write_review', book_id=review.book_id, review_id=review.review_id) }}'">Edit</button>
                    <button id="delete-review-button-{{ review.review_id }}" name="delete_review_id" value="{{ review.review_id }}" type="submit">Delete</button>
                    <hr>
                </div>
            {% else %}
            <p>No reviews written yet.</p>
            {% endfor %}
        </div>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
