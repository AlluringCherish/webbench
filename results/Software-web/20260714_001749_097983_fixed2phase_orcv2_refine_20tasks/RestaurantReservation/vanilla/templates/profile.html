<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <div id="profile-username">Username: {{ user.username }}</div>
    <form method="POST">
        <label for="profile-email">Email:</label>
        <input id="profile-email" name="profile_email" type="email" value="{{ user.email }}" required>
        <br>
        <button id="update-profile-button" type="submit">Update Profile</button>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
