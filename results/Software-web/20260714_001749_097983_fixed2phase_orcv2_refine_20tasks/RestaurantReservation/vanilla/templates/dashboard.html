<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ username }}!</h1>
    <button id="make-reservation-button" onclick="window.location.href='{{ url_for('make_reservation') }}'">Make Reservation</button>
    <button id="view-menu-button" onclick="window.location.href='{{ url_for('menu') }}'">View Menu</button>
    <button id="my-reservations-button" onclick="window.location.href='{{ url_for('my_reservations') }}'">My Reservations</button>
    <button id="my-reviews-button" onclick="window.location.href='{{ url_for('my_reviews') }}'">My Reviews</button>
    <button id="waitlist-button" onclick="window.location.href='{{ url_for('waitlist') }}'">Waitlist</button>
    <button id="profile-button" onclick="window.location.href='{{ url_for('profile') }}'">Profile</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Refresh Dashboard</button>
</div>
</body>
</html>
