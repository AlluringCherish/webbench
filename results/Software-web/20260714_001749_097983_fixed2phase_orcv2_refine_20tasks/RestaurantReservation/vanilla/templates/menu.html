<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <style>
        .dish-card {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            width: 250px;
            display: inline-block;
            vertical-align: top;
        }
    </style>
</head>
<body>
<div id="menu-page">
    <div id="menu-grid">
        {% for dish in menu %}
        <div class="dish-card">
            <h3>{{ dish.name }}</h3>
            <p><strong>Price:</strong> ${{ '%.2f' % dish.price }}</p>
            <p>{{ dish.description }}</p>
            <button id="view-dish-button-{{ dish.dish_id }}" onclick="window.location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
