<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    <form method="POST">
        <label for="select-dish">Select Dish:</label>
        <select id="select-dish" name="select_dish" required>
            <option value="0">-- Select --</option>
            {% for dish in menu %}
            <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="rating-input">Rating:</label>
        <select id="rating-input" name="rating_input" required>
            {% for i in range(1, 6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="review-text">Review:</label>
        <br>
        <textarea id="review-text" name="review_text" rows="4" cols="40" required></textarea>
        <br>
        <button id="submit-review-button" type="submit">Submit Review</button>
        <button id="back-to-reviews" type="button" onclick="window.location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
    </form>
</div>
</body>
</html>
