<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
<div id="waitlist-page">
    <form method="POST">
        <label for="waitlist-party-size">Party Size:</label>
        <select id="waitlist-party-size" name="waitlist_party_size" required>
            {% for i in range(1, 11) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>
        <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
    <div id="user-position">
        {% if user_position %}
        Your position in the waitlist is: {{ user_position }}
        {% else %}
        You are not currently in the waitlist.
        {% endif %}
    </div>
</div>
</body>
</html>
