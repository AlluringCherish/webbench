<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
<div id="reservation-page">
    {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
    <form method="POST">
        <label for="guest-name">Guest Name:</label>
        <input id="guest-name" name="guest_name" type="text" required>
        <br>
        <label for="party-size">Party Size:</label>
        <select id="party-size" name="party_size" required>
            {% for i in range(1, 11) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="reservation-date">Reservation Date:</label>
        <input id="reservation-date" name="reservation_date" type="date" required>
        <br>
        <button id="submit-reservation-button" type="submit">Submit Reservation</button>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
