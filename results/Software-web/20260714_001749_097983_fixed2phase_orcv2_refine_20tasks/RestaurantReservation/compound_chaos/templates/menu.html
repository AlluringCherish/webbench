<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <style>
        #menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .dish-card {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
        }
        .dish-name {
            font-weight: bold;
            font-size: 1.2em;
        }
        .dish-price {
            color: green;
            margin-bottom: 10px;
        }
        .dish-description {
            font-style: italic;
        }
    </style>
</head>
<body>
<div id="menu-page">
    <h1>Menu</h1>
    <div id="menu-grid">
        {% for dish in dishes %}
        <div class="dish-card">
            <div class="dish-name">{{ dish.name }}</div>
            <div class="dish-price">${{ '%.2f'|format(dish.price) }}</div>
            <div class="dish-description">{{ dish.description }}</div>
            <button id="view-dish-button-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
