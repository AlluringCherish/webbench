<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write a Review</h1>
    <form method="post">
        <label for="select-dish">Select Dish:</label>
        <select id="select-dish" name="select-dish">
            {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
            {% endfor %}
        </select><br><br>
        <label for="rating-input">Rating (1-5):</label>
        <select id="rating-input" name="rating-input">
            {% for i in range(1, 6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select><br><br>
        <label for="review-text">Review:</label><br>
        <textarea id="review-text" name="review-text" rows="5" cols="40" required></textarea><br><br>
        <button id="submit-review-button" type="submit">Submit Review</button>
        <button id="back-to-reviews" type="button" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
    </form>
</div>
</body>
</html>
