<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="my-reservations-page">
    <h1>My Reservations</h1>
    <form method="post">
    <table id="reservations-table" border="1" cellpadding="5">
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Party Size</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for res in reservations %}
            <tr>
                <td>{{ res.date }}</td>
                <td>{{ res.time }}</td>
                <td>{{ res.party_size }}</td>
                <td>{{ res.status }}</td>
                <td>
                    <button id="cancel-reservation-button-{{ res.reservation_id }}" name="cancel_id" type="submit" value="{{ res.reservation_id }}">Cancel</button>
                </td>
            </tr>
            {% endfor %}
            {% if reservations|length == 0 %}
            <tr><td colspan="5">No upcoming reservations.</td></tr>
            {% endif %}
        </tbody>
    </table>
    <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
