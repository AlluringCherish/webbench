<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <h1>My Profile</h1>
    <form method="post">
        <label>Username: </label>
        <div id="profile-username">{{ user.username }}</div><br>
        <label for="profile-email">Email:</label>
        <input type="email" id="profile-email" name="profile-email" value="{{ user.email }}" required><br><br>
        <button id="update-profile-button" type="submit">Update Profile</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
