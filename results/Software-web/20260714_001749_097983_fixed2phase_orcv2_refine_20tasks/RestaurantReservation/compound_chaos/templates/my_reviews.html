<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
<div id="reviews-page">
    <h1>My Reviews</h1>
    <div id="reviews-list">
        {% if reviews|length == 0 %}
            <p>No reviews yet.</p>
        {% else %}
            <ul>
            {% for review in reviews %}
                <li><strong>{{ review.dish_name }}</strong>: Rated {{ review.rating }}/5 - {{ review.review_text }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    </div>
    <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
