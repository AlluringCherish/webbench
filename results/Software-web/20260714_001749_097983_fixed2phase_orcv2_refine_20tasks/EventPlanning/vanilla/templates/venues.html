<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <form method="get" action="/venues">
            <input type="text" id="venue-search-input" name="search" placeholder="Search venues..." value="{{ search_query }}">
            <select id="venue-capacity-filter" name="capacity">
                <option value="">All</option>
                <option value="Small" {% if capacity_filter == 'Small' %}selected{% endif %}>Small</option>
                <option value="Medium" {% if capacity_filter == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Large" {% if capacity_filter == 'Large' %}selected{% endif %}>Large</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card">
                <h3>{{ venue.venue_name }}</h3>
                <p>{{ venue.location }}</p>
                <p>Capacity: {{ venue.capacity }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}" onclick="alert('Venue details for {{ venue.venue_name }}')">View Details</button>
            </div>
            {% else %}
            <p>No venues found.</p>
            {% endfor %}
        </div>

        <button onclick="window.location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
