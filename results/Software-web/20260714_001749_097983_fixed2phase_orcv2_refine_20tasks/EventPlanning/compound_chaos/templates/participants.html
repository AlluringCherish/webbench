<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Participants Management</title>
</head>
<body>
<div id="participants-page">
    <h1>Participants Management</h1>

    <form method="get" action="{{ url_for('participants_page') }}">
        <input type="text" id="search-participant-input" name="search" placeholder="Search by name or email" value="{{ search }}">
        <select id="participant-status-filter" name="status">
            <option value="All" {% if status_filter == 'All' or status_filter == '' %}selected{% endif %}>All Statuses</option>
            <option value="Registered" {% if status_filter == 'Registered' %}selected{% endif %}>Registered</option>
            <option value="Confirmed" {% if status_filter == 'Confirmed' %}selected{% endif %}>Confirmed</option>
            <option value="Attended" {% if status_filter == 'Attended' %}selected{% endif %}>Attended</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <table id="participants-table" border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Event</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for participant in participants %}
                <tr>
                    <td>{{ participant.name }}</td>
                    <td>{{ participant.email }}</td>
                    <td>{{ participant.event_name }}</td>
                    <td>{{ participant.status }}</td>
                </tr>
            {% endfor %}
            {% if not participants %}
                <tr><td colspan="4">No participants found.</td></tr>
            {% endif %}
        </tbody>
    </table>

    <button id="add-participant-button" onclick="alert('Add participant functionality not implemented.')">Add Participant</button>
    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
