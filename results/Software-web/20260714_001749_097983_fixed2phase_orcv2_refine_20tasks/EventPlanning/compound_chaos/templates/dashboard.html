<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Planning Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Event Planning Dashboard</h1>

    <div id="featured-events">
        <h2>Featured Events</h2>
        {% if featured_events %}
            <ul>
                {% for event in featured_events %}
                    <li>{{ event.event_name }} - {{ event.date }} at {{ event.time }} ({{ event.location }})</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No upcoming events.</p>
        {% endif %}
    </div>

    <button id="browse-events-button" onclick="location.href='{{ url_for('events_listing') }}'">Browse Events</button>
    <button id="view-tickets-button" onclick="location.href='{{ url_for('bookings_page') }}'">View Tickets</button>
    <button id="venues-button" onclick="location.href='{{ url_for('venues_page') }}'">Venues</button>
    <button id="participants-button" onclick="location.href='{{ url_for('participants_page') }}'">Participants</button>
    <button id="schedules-button" onclick="location.href='{{ url_for('schedules_page') }}'">Schedules</button>
</div>
</body>
</html>
