<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
<div id="accommodations-page">
    <h1>Search Accommodations</h1>

    <form method="post">
        <input id="destination-input" name="destination_input" type="text" placeholder="Destination city" value="{{ destination_input }}">
        <input id="check-in-date" name="check_in_date" type="date" value="{{ check_in_date }}">
        <input id="check-out-date" name="check_out_date" type="date" value="{{ check_out_date }}">
        <select id="price-filter" name="price_filter">
            <option value="">-- Price Range --</option>
            <option value="Budget" {% if price_filter == 'Budget' %}selected{% endif %}>Budget</option>
            <option value="Mid-range" {% if price_filter == 'Mid-range' %}selected{% endif %}>Mid-range</option>
            <option value="Luxury" {% if price_filter == 'Luxury' %}selected{% endif %}>Luxury</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="hotels-list">
        {% for hotel in hotels %}
            <div class="hotel-card">
                <h3>{{ hotel[1] }}</h3>
                <p>Rating: {{ hotel[3] }}</p>
                <p>Price per night: ${{ hotel[4] }}</p>
                <p>Amenities: {{ hotel[5] }}</p>
            </div>
        {% else %}
            <p>No hotels found.</p>
        {% endfor %}
    </div>

    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
