<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
<div id="packages-page">
    <h1>Travel Packages</h1>

    <form method="post">
        <select id="duration-filter" name="duration_filter">
            <option value="">-- Select Duration --</option>
            <option value="3-5 days" {% if duration_filter == '3-5 days' %}selected{% endif %}>3-5 days</option>
            <option value="7-10 days" {% if duration_filter == '7-10 days' %}selected{% endif %}>7-10 days</option>
            <option value="14+ days" {% if duration_filter == '14+ days' %}selected{% endif %}>14+ days</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="packages-grid">
        {% for pkg in packages %}
            <div class="package-card">
                <h3>{{ pkg[1] }} - {{ pkg[2] }}</h3>
                <p>Duration: {{ pkg[3] }} days</p>
                <p>Price: ${{ pkg[4] }}</p>
                <p>Included: {{ pkg[5] }}</p>
                <p>Difficulty: {{ pkg[6] }}</p>
                <button id="view-package-details-button-{{ pkg[0] }}" onclick="alert('View details for package {{ pkg[1] }}')">View Details</button>
                <button id="book-package-button-{{ pkg[0] }}" onclick="alert('Book package {{ pkg[1] }}')">Book Package</button>
            </div>
        {% else %}
            <p>No packages found.</p>
        {% endfor %}
    </div>

    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
