<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
<div id="itinerary-page">
    <h1>Plan Your Itinerary</h1>

    <form method="post">
        <input id="itinerary-name-input" name="itinerary_name_input" type="text" placeholder="Itinerary Name" required>
        <input id="destination-input" name="destination_input" type="text" placeholder="Destination" required>
        <input id="start-date-input" name="start_date_input" type="date" required>
        <input id="end-date-input" name="end_date_input" type="date" required>
        <input id="activities-input" name="activities_input" type="text" placeholder="Activities">
        <button id="add-activity-button" type="submit">Add / Update Itinerary</button>
    </form>

    <div id="itinerary-list">
        <h2>Existing Itineraries</h2>
        <ul>
            {% for it in itineraries %}
                <li>ID: {{ it[0] }}, Name: {{ it[1] }}, Destination: {{ it[2] }}, Period: {{ it[3] }} to {{ it[4] }}, Activities: {{ it[5] }}, Status: {{ it[6] }}</li>
            {% else %}
                <li>No itineraries found.</li>
            {% endfor %}
        </ul>
    </div>

    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
