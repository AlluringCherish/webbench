<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
<div id="confirmation-page">
    <h1>Booking Confirmation</h1>

    <div id="confirmation-number">Confirmation Number: {{ details.confirmation_number }}</div>
    <div id="booking-details">
        <p>Trip Name: {{ details.trip_name }}</p>
        <p>Booking Type: {{ details.booking_type }}</p>
        <p>Booking Date: {{ details.booking_date }}</p>
        <p>Amount: ${{ details.amount }}</p>
        <p>Status: {{ details.status }}</p>
    </div>

    <button id="download-itinerary-button" onclick="alert('Download PDF functionality not implemented')">Download Itinerary PDF</button>
    <button id="share-trip-button" onclick="alert('Share trip functionality not implemented')">Share Trip</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
