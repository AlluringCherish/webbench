<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destination Details</title>
</head>
<body>
<div id="destination-details-page">
    <h1 id="destination-name">{{ destination[1] }}</h1>
    <div id="destination-country">Country: {{ destination[2] }}</div>
    <div id="destination-description">{{ destination[4] }}</div>
    <div id="destination-attractions">Attractions: {{ destination[5] }}</div>

    <form method="post" action="{{ url_for('add_to_trip', dest_id=destination[0]) }}">
        <button id="add-to-trip-button" type="submit">Add to Trip</button>
    </form>

    <button onclick="location.href='{{ url_for('destinations') }}'">Back to Destinations</button>
</div>
</body>
</html>
