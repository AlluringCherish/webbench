<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Trips</title>
</head>
<body>
<div id="trips-page">
    <h1>My Trips</h1>

    <table id="trips-table" border="1">
        <thead>
        <tr>
            <th>Trip Name</th>
            <th>Destination</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for trip in trips %}
            <tr>
                <td>{{ trip[1] }}</td>
                <td>{{ trip[2] }}</td>
                <td>{{ trip[3] }}</td>
                <td>{{ trip[4] }}</td>
                <td>{{ trip[6] }}</td>
                <td>
                    <button id="view-trip-details-button-{{ trip[0] }}" onclick="alert('View details for trip {{ trip[1] }}')">View</button>
                    <button id="edit-trip-button-{{ trip[0] }}" onclick="alert('Edit trip {{ trip[1] }}')">Edit</button>
                    <button id="delete-trip-button-{{ trip[0] }}" onclick="alert('Delete trip {{ trip[1] }}')">Delete</button>
                </td>
            </tr>
        {% else %}
            <tr><td colspan="6">No trips found.</td></tr>
        {% endfor %}
        </tbody>
    </table>

    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
