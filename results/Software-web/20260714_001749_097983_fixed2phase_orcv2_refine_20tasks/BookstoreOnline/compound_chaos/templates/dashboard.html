<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Book Dashboard</h1>
        <section id="featured-books">
            <h2>Featured Books</h2>
            <ul>
                {% for book in books %}
                <li>
                    <a href="{{ url_for('book_details', book_id=book.id) }}">{{ book.title }}</a> by {{ book.author }} - ${{ '%.2f'|format(book.price) }}
                </li>
                {% endfor %}
            </ul>
        </section>
        <section id="bestsellers">
            <h2>Bestsellers</h2>
            <ul>
                {% for book in bestsellers %}
                <li>
                    <a href="{{ url_for('book_details', book_id=book.id) }}">{{ book.title }}</a> by {{ book.author }} - ${{ '%.2f'|format(book.price) }}
                </li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
