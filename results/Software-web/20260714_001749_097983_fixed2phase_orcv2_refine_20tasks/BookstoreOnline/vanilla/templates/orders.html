<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History for {{ username }}</title>
</head>
<body>
<div id="orders-page">
    <h1>Order History for {{ username }}</h1>
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Book Title</th>
                <th>Quantity</th>
                <th>Total Price</th>
            </tr>
        </thead>
        <tbody>
        {% for order in orders %}
            <tr>
                <td>{{ order.order_id }}</td>
                <td>{{ order.book_title }}</td>
                <td>{{ order.quantity }}</td>
                <td>${{ '%.2f'|format(order.total_price) }}</td>
            </tr>
        {% else %}
            <tr><td colspan="4">No orders found.</td></tr>
        {% endfor %}
        </tbody>
    </table>
    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</div>
</body>
</html>
