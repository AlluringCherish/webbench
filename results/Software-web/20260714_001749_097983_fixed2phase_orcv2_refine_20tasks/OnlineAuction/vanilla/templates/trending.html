<!DOCTYPE html>
<html>
<head>
    <title>Trending Auctions</title>
</head>
<body>
<div id="trending-page">
    <h1>Trending Auctions</h1>

    <form method="get" action="{{ url_for('trending') }}">
        <select id="time-range-filter" name="time_range">
            <option value="Last 24 Hours" {% if time_filter == 'Last 24 Hours' %}selected{% endif %}>Last 24 Hours</option>
            <option value="This Week" {% if time_filter == 'This Week' %}selected{% endif %}>This Week</option>
            <option value="All Time" {% if time_filter == 'All Time' %}selected{% endif %}>All Time</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="trending-list">
        {% for trend in trending %}
        <div class="trending-card">
            <h3>{{ trend.item_name }} (Rank: {{ trend.trending_rank }})</h3>
            <p>Bid Count: {{ trend.bid_count }}</p>
            <p>Current Bid: ${{ "%.2f"|format(trend.current_bid) }}</p>
            <button id="view-auction-button-{{ trend.auction_id }}" onclick="window.location.href='{{ url_for('auction_details', auction_id=trend.auction_id) }}'">View Details</button>
        </div>
        {% else %}
        <p>No trending auctions available.</p>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
