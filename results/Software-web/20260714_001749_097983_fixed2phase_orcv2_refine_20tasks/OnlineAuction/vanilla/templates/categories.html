<!DOCTYPE html>
<html>
<head>
    <title>Auction Categories</title>
</head>
<body>
<div id="categories-page">
    <h1>Auction Categories</h1>

    <div id="categories-list">
        {% for category in categories %}
        <div id="category-card-{{ category.category_id }}" class="category-card">
            <h3>{{ category.category_name }}</h3>
            <p>{{ category.description }}</p>
            <p>Items: {{ category.item_count }}</p>
            <button id="view-category-button-{{ category.category_id }}" onclick="window.location.href='{{ url_for('auctions_in_category', category_id=category.category_id) }}'">View Auctions</button>
        </div>
        {% else %}
        <p>No categories available.</p>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
