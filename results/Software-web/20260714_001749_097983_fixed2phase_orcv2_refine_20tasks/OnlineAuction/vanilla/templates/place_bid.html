<!DOCTYPE html>
<html>
<head>
    <title>Place Bid</title>
</head>
<body>
<div id="place-bid-page">
    <h1>Place Bid</h1>

    <div id="auction-name">Auction: {{ auction.item_name }}</div>
    <div id="minimum-bid">Minimum Bid: ${{ "%.2f"|format(minimum_bid) }}</div>

    {% if error %}
    <div style="color:red">{{ error }}</div>
    {% endif %}

    <form method="post">
        <label for="bidder-name">Name:</label>
        <input id="bidder-name" name="bidder_name" type="text" required />

        <label for="bid-amount">Bid Amount:</label>
        <input id="bid-amount" name="bid_amount" type="number" step="0.01" min="{{ minimum_bid }}" required />

        <button id="submit-bid-button" type="submit">Submit Bid</button>
    </form>
</div>
</body>
</html>
