<!DOCTYPE html>
<html>
<head>
    <title>Auction Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Auction Catalog</h1>

    <form method="get" action="{{ url_for('catalog') }}">
        <input id="search-input" name="search" type="text" placeholder="Search..." value="{{ search_term }}" />
        <select id="category-filter" name="filter">
            <option value="All" {% if selected_category == 'All' %}selected{% endif %}>All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_name }}" {% if selected_category == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="auctions-grid">
        {% for auction in auctions %}
        <div class="auction-card">
            <h3>{{ auction.item_name }}</h3>
            <p>{{ auction.description }}</p>
            <p>Category: {{ auction.category }}</p>
            <p>Current Bid: ${{ "%.2f"|format(auction.current_bid) }}</p>
            <button id="view-auction-button-{{ auction.auction_id }}" onclick="window.location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Details</button>
        </div>
        {% else %}
        <p>No auctions found.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
