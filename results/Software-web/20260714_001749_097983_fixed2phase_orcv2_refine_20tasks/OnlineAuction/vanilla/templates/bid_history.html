<!DOCTYPE html>
<html>
<head>
    <title>Bid History</title>
</head>
<body>
<div id="bid-history-page">
    <h1>Bid History</h1>

    <form method="get" action="{{ url_for('bid_history') }}">
        <select id="filter-by-auction" name="filter">
            <option value="">All Auctions</option>
            {% for auction in auctions %}
            <option value="{{ auction.auction_id }}" {% if filter_auction == auction.auction_id %}selected{% endif %}>{{ auction.item_name }}</option>
            {% endfor %}
        </select>
        <button id="sort-by-amount" name="sort" value="amount">Sort by Amount</button>
        <button type="submit">Filter</button>
    </form>

    <table id="bids-table" border="1">
        <thead>
            <tr>
                <th>Bid ID</th>
                <th>Auction Name</th>
                <th>Bidder</th>
                <th>Amount</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody>
        {% for bid in bids %}
            <tr>
                <td>{{ bid.bid_id }}</td>
                <td>{{ bid.auction_id }}</td>
                <td>{{ bid.bidder_name }}</td>
                <td>${{ "%.2f"|format(bid.bid_amount) }}</td>
                <td>{{ bid.bid_timestamp }}</td>
            </tr>
        {% else %}
            <tr><td colspan="5">No bids found.</td></tr>
        {% endfor %}
        </tbody>
    </table>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
