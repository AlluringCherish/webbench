<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>
        <input id="filter-by-winner" type="text" placeholder="Filter by winner name..." value="{{ filter_winner }}" onkeydown="if(event.key==='Enter'){location.href='?filter_winner='+this.value;}">
        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                <h3>{{ winner.item_name }}</h3>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ "%.2f"|format(winner.winning_bid) }}</p>
            </div>
            {% endfor %}
            {% if winners|length == 0 %}
            <p>No winners found.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
