<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid for: <span id="auction-name">{{ auction.item_name }}</span></h1>
        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}
        <form method="POST">
            <label for="bidder-name">Bidder Name:</label>
            <input id="bidder-name" name="bidder_name" type="text" value="{{ bidder_name if bidder_name is defined else '' }}" required>
            <br>
            <label for="bid-amount">Bid Amount:</label>
            <input id="bid-amount" name="bid_amount" type="number" step="0.01" min="{{ minimum_bid }}" value="{{ bid_amount if bid_amount is defined else minimum_bid }}" required>
            <br>
            <div>Minimum Bid: <span id="minimum-bid">${{ "%.2f"|format(minimum_bid) }}</span></div>
            <br>
            <button id="submit-bid-button" type="submit">Submit Bid</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
