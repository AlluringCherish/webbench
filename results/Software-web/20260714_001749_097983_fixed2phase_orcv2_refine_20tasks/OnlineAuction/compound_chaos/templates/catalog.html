<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>

        <input id="search-input" type="text" name="search" placeholder="Search auctions..." value="{{ search_query }}" onkeydown="if(event.key==='Enter'){location.href='?search='+this.value+'&category={{ selected_category }}';}">

        <select id="category-filter" onchange="location.href='?category='+this.value+'&search={{ search_query }}'">
            <option value="">All</option>
            {% for category in categories %}
                <option value="{{ category.category_name }}" {% if category.category_name == selected_category %}selected{% endif %}>
                    {{ category.category_name }}
                </option>
            {% endfor %}
        </select>

        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-card">
                <h3>{{ auction.item_name }}</h3>
                <p>{{ auction.description }}</p>
                <p>Current Bid: ${{ "%.2f"|format(auction.current_bid) }}</p>
                <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Details</button>
            </div>
            {% endfor %}
            {% if auctions|length == 0 %}
            <p>No auctions found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
