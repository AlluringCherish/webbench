<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
<div id="search-page">
    <h1>Search Locations</h1>

    <form method="get">
        <input type="text" id="location-search-input" name="q" value="{{ search_query }}" placeholder="Enter city or coordinates">
        <button type="submit">Search</button>
    </form>

    <div id="search-results">
        <form method="post">
        {% for loc in locations %}
            <div class="search-result-entry">
                <span>{{ loc.location_name }} ({{ loc.latitude }}, {{ loc.longitude }})</span>
                <button type="submit" id="select-location-button-{{ loc.location_id }}" name="select_location_id" value="{{ loc.location_id }}">Select</button>
            </div>
        {% endfor %}
        </form>
    </div>

    <div id="saved-locations-list">
        <h2>Saved Locations</h2>
        <ul>
            {% for loc in saved_locations %}
            <li>{{ loc.location_name }}</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
