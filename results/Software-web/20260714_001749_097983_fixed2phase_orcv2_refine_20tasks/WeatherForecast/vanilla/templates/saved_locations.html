<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <form method="post">
            <table id="locations-table" border="1">
                <thead>
                    <tr>
                        <th>Location Name</th>
                        <th>Temperature</th>
                        <th>Condition</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                {% for loc in locations_info %}
                    <tr>
                        <td>{{ loc.location_name }}</td>
                        <td>{{ loc.temperature }}&deg;</td>
                        <td>{{ loc.condition }}</td>
                        <td>
                            <button id="view-location-weather-{{ loc.location_id }}" type="button" onclick="location.href='{{ url_for('current_weather', location_id=loc.location_id) }}'">View Weather</button>
                            <button id="remove-location-button-{{ loc.location_id }}" type="submit" name="remove_location_id" value="{{ loc.saved_id }}">Remove</button>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
            <button id="add-new-location-button" type="button" onclick="location.href='{{ url_for('search_locations') }}'">Add New Location</button>
        </form>
    </div>
</body>
</html>
