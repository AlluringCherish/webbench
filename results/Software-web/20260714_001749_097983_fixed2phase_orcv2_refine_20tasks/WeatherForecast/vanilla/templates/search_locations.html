<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <form method="post">
            <input type="text" id="location-search-input" name="location_search_input" placeholder="Search by city or coordinates" value="{{ query }}">
            <button type="submit">Search</button>
        </form>
        <div id="search-results">
            {% for loc in matched_locations %}
                <div class="search-result">
                    <span>{{ loc.location_name }} ({{ loc.latitude }}, {{ loc.longitude }})</span>
                    <button id="select-location-button-{{ loc.location_id }}" onclick="location.href='{{ url_for('select_location', location_id=loc.location_id) }}'">Select</button>
                </div>
            {% endfor %}
        </div>
        <div id="saved-locations-list">
            <h3>Saved Locations</h3>
            {% for sl in saved_locations %}
                <div class="saved-location">{{ sl.location_name }}</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
