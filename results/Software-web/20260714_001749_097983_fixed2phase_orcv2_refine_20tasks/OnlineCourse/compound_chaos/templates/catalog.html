<!doctype html>
<html lang="en">
<head>
    <title>Available Courses</title>
</head>
<body>
<div id="catalog-page">
    <form method="post" action="{{ url_for('course_catalog') }}">
        <input id="search-input" name="search" type="text" placeholder="Search courses..." value="{{ search_term }}">
        <button type="submit">Search</button>
    </form>

    <div id="course-grid">
        {% if courses %}
            <ul>
            {% for course in courses %}
                <li>
                    <strong>{{ course.title }}</strong> - {{ course.category }}, {{ course.level }}<br>
                    <button id="view-course-button-{{ course.course_id }}" 
                            onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">
                        View Details
                    </button>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No courses found.</p>
        {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
