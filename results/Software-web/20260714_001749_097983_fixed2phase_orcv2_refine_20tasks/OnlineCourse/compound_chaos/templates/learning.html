<!doctype html>
<html lang="en">
<head>
    <title>Course Learning</title>
</head>
<body>
<div id="learning-page">
    <div id="lessons-list">
        <ul>
            {% for lesson in lessons %}
                <li>
                    <strong>{{ lesson.title }}</strong> 
                    {% if lesson.completed %}
                        (Completed)
                    {% endif %}
                </li>
            {% endfor %}
        </ul>
    </div>

    <div id="lesson-content">
        <p>{{ lesson_content }}</p>
    </div>

    <form method="post" action="{{ url_for('course_learning', course_id=course.course_id, lesson_num=lesson_num) }}">
        <button id="mark-complete-button" type="submit">Mark Complete</button>
    </form>

    <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
</div>
</body>
</html>
