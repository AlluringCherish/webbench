<!doctype html>
<html lang="en">
<head>
    <title>My Courses</title>
</head>
<body>
<div id="my-courses-page">
    <div id="courses-list">
        {% if courses %}
            <ul>
            {% for course in courses %}
                <li>
                    <strong>{{ course.title }}</strong> - Progress: {{ course.progress }}% ({{ course.status }})
                    <button id="continue-learning-button-{{ course.course_id }}" 
                            onclick="location.href='{{ url_for('course_learning', course_id=course.course_id, lesson_num=1) }}'">
                        Continue Learning
                    </button>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>You are not enrolled in any courses.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
