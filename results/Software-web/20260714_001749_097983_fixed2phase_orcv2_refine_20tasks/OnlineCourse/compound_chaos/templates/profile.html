<!doctype html>
<html lang="en">
<head>
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <form method="post" action="{{ url_for('profile') }}">
        <label>Email:</label><br>
        <input id="profile-email" name="profile-email" type="email" value="{{ email }}"><br>
        <label>Full Name:</label><br>
        <input id="profile-fullname" name="profile-fullname" type="text" value="{{ fullname }}"><br>
        <button id="update-profile-button" type="submit">Update Profile</button>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
