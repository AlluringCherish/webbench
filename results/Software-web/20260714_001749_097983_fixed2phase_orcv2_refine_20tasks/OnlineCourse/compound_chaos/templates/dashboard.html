<!doctype html>
<html lang="en">
<head>
    <title>Learning Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ fullname }}!</h1>

    <div id="enrolled-courses">
        {% if enrolled_courses %}
            <ul>
            {% for course in enrolled_courses %}
                <li>
                    <strong>{{ course.title }}</strong> - Progress: {{ course.progress }}% ({{ course.status }})
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>You are not enrolled in any courses.</p>
        {% endif %}
    </div>

    <button id="browse-courses-button" onclick="location.href='{{ url_for('course_catalog') }}'">Browse Courses</button>
    <button id="my-courses-button" onclick="location.href='{{ url_for('my_courses') }}'">My Courses</button>
    <button id="my-assignments-button" onclick="location.href='{{ url_for('my_assignments') }}'">My Assignments</button>
    <button id="certificates-button" onclick="location.href='{{ url_for('certificates') }}'">Certificates</button>
    <button id="profile-button" onclick="location.href='{{ url_for('profile') }}'">Profile</button>
</div>
</body>
</html>
