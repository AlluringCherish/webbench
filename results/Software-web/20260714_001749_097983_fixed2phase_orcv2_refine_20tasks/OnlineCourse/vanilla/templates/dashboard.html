<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ user.fullname }}!</h1>

        <div id="enrolled-courses">
            {% if courses %}
                <ul>
                {% for course in courses %}
                    <li>{{ course.title }} - Progress: {{ course.progress }}%</li>
                {% endfor %}
                </ul>
            {% else %}
                <p>You are not enrolled in any courses.</p>
            {% endif %}
        </div>

        <button id="browse-courses-button" onclick="window.location.href='{{ url_for('course_catalog') }}'">Browse Courses</button>
        <button id="my-courses-button" onclick="window.location.href='{{ url_for('my_courses') }}'">My Courses</button>
        <button id="my-assignments-button" onclick="window.location.href='{{ url_for('my_assignments') }}'">My Assignments</button>
        <button id="my-certificates-button" onclick="window.location.href='{{ url_for('certificates') }}'">My Certificates</button>
        <button id="my-profile-button" onclick="window.location.href='{{ url_for('profile') }}'">My Profile</button>
    </div>
</body>
</html>
