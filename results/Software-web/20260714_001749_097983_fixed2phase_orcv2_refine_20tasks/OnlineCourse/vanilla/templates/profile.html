<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <form method="post">
            <label for="profile-email">Email:</label><br>
            <input type="email" id="profile-email" name="profile_email" value="{{ user.email }}" required><br>

            <label for="profile-fullname">Full Name:</label><br>
            <input type="text" id="profile-fullname" name="profile_fullname" value="{{ user.fullname }}" required><br>

            <button id="update-profile-button" type="submit">Save</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
