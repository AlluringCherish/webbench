<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
</head>
<body>
    <div id="my-courses-page">
        <div id="courses-list">
            {% if courses %}
                <ul>
                {% for course in courses %}
                    <li>
                        {{ course.title }} - Progress: {{ course.progress }}%
                        <button id="continue-learning-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('course_learning', course_id=course.course_id) }}'">Continue Learning</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>You have no enrolled courses.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
