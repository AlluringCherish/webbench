<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="learning-page">
        <h2>{{ course.title }}</h2>
        <div id="lessons-list">
            <ol>
                {% for idx, lesson in enumerate(lessons) %}
                    <li {% if idx == lesson_index %}style="font-weight:bold;"{% endif %}>
                        {{ lesson.title }} {% if idx < lesson_index %} (Completed) {% endif %}
                    </li>
                {% endfor %}
            </ol>
        </div>
        <div id="lesson-content">
            <h3>{{ current_lesson.title }}</h3>
            <p>{{ current_lesson.content }}</p>
        </div>

        <form method="post">
            <button id="mark-complete-button" type="submit">Mark Complete</button>
        </form>

        <button id="back-to-my-courses" onclick="window.location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
