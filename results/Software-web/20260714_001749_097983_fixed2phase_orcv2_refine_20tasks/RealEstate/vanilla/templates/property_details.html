<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1 id="property-address">{{ property.address }}</h1>
        <div id="property-price">Price: ${{ property.price }}</div>
        <div id="property-description">Description: {{ property.description }}</div>
        <div id="property-features">
            <p>Beds: {{ property.bedrooms }}</p>
            <p>Baths: {{ property.bathrooms }}</p>
            <p>Square Feet: {{ property.square_feet }}</p>
        </div>

        <form action="{{ url_for('add_favorite', property_id=property.property_id) }}" method="post">
            <button type="submit" id="add-to-favorites-button">Add to Favorites</button>
        </form>

        <button id="submit-inquiry-button" onclick="location.href='{{ url_for('inquire_property', property_id=property.property_id) }}'">Submit Inquiry</button>
    </div>
</body>
</html>
