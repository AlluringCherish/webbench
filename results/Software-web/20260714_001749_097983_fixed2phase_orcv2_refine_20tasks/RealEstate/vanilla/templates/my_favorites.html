<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>

        <div id="favorites-list">
            {% if favorite_properties %}
                <ul>
                {% for property in favorite_properties %}
                    <li>
                        <strong>{{ property.address }}</strong> - ${{ property.price }} - {{ property.property_type }}<br>
                        <button id="view-property-button-{{ property.property_id }}" onclick="location.href='{{ url_for('property_details', property_id=property.property_id) }}'">View Details</button>
                        <form action="{{ url_for('remove_favorite', property_id=property.property_id) }}" method="post" style="display:inline;">
                            <button type="submit" id="remove-from-favorites-button-{{ property.property_id }}">Remove from Favorites</button>
                        </form>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No favorites found.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
