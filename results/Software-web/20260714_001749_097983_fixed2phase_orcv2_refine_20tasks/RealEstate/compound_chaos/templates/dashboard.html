<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Real Estate Dashboard</h1>
        <div id="featured-properties">
            {% for prop in featured_properties %}
            <div class="property-card">
                <h3 id="property-address">{{ prop.address }}</h3>
                <div id="property-price">Price: ${{ prop.price }}</div>
                <div id="property-features">{{ prop.beds }} beds | {{ prop.baths }} baths | {{ prop.sqft }} sqft</div>
                <button id="view-property-button-{{ prop.id }}" onclick="location.href='/property/{{ prop.id }}'">View Details</button>
                <form method="post" action="/add-to-favorites/{{ prop.id }}" style="display:inline;">
                    <button type="submit" id="add-to-favorites-button-{{ prop.id }}">Add to Favorites</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <button id="browse-properties-button" onclick="location.href='/search'">Browse Properties</button>
        <button id="my-inquiries-button" onclick="location.href='/inquiries'">My Inquiries</button>
        <button id="my-favorites-button" onclick="location.href='/favorites'">My Favorites</button>
    </div>
</body>
</html>
