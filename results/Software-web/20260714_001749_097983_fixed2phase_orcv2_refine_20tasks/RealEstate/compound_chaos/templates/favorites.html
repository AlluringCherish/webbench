<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>
        <button id="back-to-dashboard" onclick="location.href='/dashboard'">Back to Dashboard</button>

        <div id="favorites-list">
            {% for fav in favorites %}
            <div class="favorite-item">
                <h2>{{ fav.property.address }}</h2>
                <div>Price: ${{ fav.property.price }}</div>
                <div>{{ fav.property.beds }} beds | {{ fav.property.baths }} baths | {{ fav.property.sqft }} sqft</div>

                <button id="view-property-button-{{ fav.property.id }}" onclick="location.href='/property/{{ fav.property.id }}'">View Details</button>

                <form method="post" action="/remove-from-favorites/{{ fav.favorite_id }}" style="display:inline;">
                    <button type="submit" id="remove-from-favorites-button-{{ fav.property.id }}">Remove from Favorites</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
