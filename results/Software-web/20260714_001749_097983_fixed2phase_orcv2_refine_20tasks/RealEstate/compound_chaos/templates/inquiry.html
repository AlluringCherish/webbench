<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Property Inquiry</title>
</head>
<body>
    <div id="inquiry-page">
        <h1>Submit Property Inquiry</h1>
        <form method="post" action="/inquiry">
            <label for="select-property">Select Property:</label>
            <select id="select-property" name="select-property" required>
                {% for prop in properties %}
                <option value="{{ prop.id }}" {% if request.args.get('property_id') == prop.id %}selected{% endif %}>{{ prop.address }}</option>
                {% endfor %}
            </select><br>

            <label for="inquiry-name">Name:</label>
            <input type="text" id="inquiry-name" name="inquiry-name" required><br>

            <label for="inquiry-email">Email:</label>
            <input type="email" id="inquiry-email" name="inquiry-email" required><br>

            <label for="inquiry-phone">Phone:</label>
            <input type="tel" id="inquiry-phone" name="inquiry-phone" required><br>

            <label for="inquiry-message">Message:</label>
            <textarea id="inquiry-message" name="inquiry-message"></textarea><br>

            <button type="submit" id="submit-inquiry-button">Submit Inquiry</button>
        </form>
    </div>
</body>
</html>
