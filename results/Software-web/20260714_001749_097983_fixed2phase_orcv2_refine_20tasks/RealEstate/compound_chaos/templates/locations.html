<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Featured Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Featured Locations</h1>
        <button id="back-to-dashboard" onclick="location.href='/dashboard'">Back to Dashboard</button>

        <label for="location-sort">Sort By:</label>
        <select id="location-sort" name="location-sort" onchange="location.href='?location-sort='+this.value">
            <option value="Name" {% if sort_criteria == 'Name' %}selected{% endif %}>Name</option>
            <option value="Properties Count" {% if sort_criteria == 'Properties Count' %}selected{% endif %}>Properties Count</option>
            <option value="Average Price" {% if sort_criteria == 'Average Price' %}selected{% endif %}>Average Price</option>
        </select>

        <div id="locations-list">
            {% for loc in locations %}
            <div class="location-item">
                <h2>{{ loc.name }}</h2>
                <div>Region: {{ loc.region }}</div>
                <div>Property Count: {{ loc.property_count }}</div>
                <div>Average Price: ${{ loc.average_price }}</div>
                <div>Description: {{ loc.description }}</div>
                <button id="view-location-button-{{ loc.id }}" onclick="location.href='/view-location/{{ loc.id }}'">View Properties</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
