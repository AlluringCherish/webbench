<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write Review</h1>
    <form method="post">
        <label for="restaurant-select">Select Restaurant:</label><br>
        <select id="restaurant-select" name="restaurant-select">
            {% for r in restaurants %}
            <option value="{{ r.restaurant_id }}">{{ r.name }}</option>
            {% endfor %}
        </select><br><br>

        <label for="customer-name-input">Your Name:</label><br>
        <input type="text" id="customer-name-input" name="customer-name-input" required><br><br>

        <label for="rating-select">Rating:</label><br>
        <select id="rating-select" name="rating-select">
            {% for star in range(1, 6) %}
            <option value="{{ star }}">{{ star }}</option>
            {% endfor %}
        </select><br><br>

        <label for="review-textarea">Review:</label><br>
        <textarea id="review-textarea" name="review-textarea" required></textarea><br><br>

        <button type="submit" id="submit-review-button">Submit Review</button>
        <button type="button" id="cancel-button" onclick="window.location.href='{{ url_for('reviews') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
