<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
<div id="reviews-page">
    <h1>Order Reviews</h1>
    <form method="get">
        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating">
            <option value="All" {% if selected_rating == 'All' %}selected{% endif %}>All</option>
            {% for star in range(5, 0, -1) %}
            <option value="{{ star }}" {% if selected_rating == star|string %}selected{% endif %}>{{ star }} stars</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div id="reviews-list">
        {% for r in reviews %}
        <div class="review-card">
            <h3>{{ r.restaurant_name }}</h3>
            <p>Rating: {{ r.rating }} stars</p>
            <p>Review: {{ r.review_text }}</p>
            <p>By: {{ r.customer_name }} on {{ r.review_date }}</p>
        </div>
        {% else %}
        <p>No reviews found.</p>
        {% endfor %}
    </div>

    <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review') }}'">Write Review</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
