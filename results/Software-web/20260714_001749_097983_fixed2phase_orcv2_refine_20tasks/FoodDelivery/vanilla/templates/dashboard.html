<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Food Delivery Dashboard</h1>

    <div id="featured-restaurants">
        <h2>Featured Restaurants</h2>
        <ul>
            {% for r in featured %}
            <li>{{ r.name }} - Rating: {{ r.rating }} - Delivery Time: {{ r.delivery_time }} min</li>
            {% endfor %}
        </ul>
    </div>

    <button id="browse-restaurants-button" onclick="window.location.href='{{ url_for('restaurant_listing') }}'">Browse Restaurants</button>
    <button id="view-cart-button" onclick="window.location.href='{{ url_for('shopping_cart') }}'">View Cart</button>
    <button id="active-orders-button" onclick="window.location.href='{{ url_for('active_orders') }}'">Active Orders</button>
</div>
</body>
</html>
