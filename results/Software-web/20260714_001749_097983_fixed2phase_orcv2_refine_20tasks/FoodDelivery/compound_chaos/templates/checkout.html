<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>
        {% if error %}
        <p style="color: red;">{{ error }}</p>
        {% endif %}
        <form method="post">
            <label for="customer-name">Customer Name:</label><br/>
            <input type="text" id="customer-name" name="customer-name" required /><br/>
            <label for="delivery-address">Delivery Address:</label><br/>
            <textarea id="delivery-address" name="delivery-address" required></textarea><br/>
            <label for="phone-number">Phone Number:</label><br/>
            <input type="tel" id="phone-number" name="phone-number" required /><br/>
            <label for="payment-method">Payment Method:</label><br/>
            <select id="payment-method" name="payment-method">
                <option value="Credit Card">Credit Card</option>
                <option value="Cash">Cash</option>
                <option value="PayPal">PayPal</option>
            </select><br/><br/>
            <button type="submit" id="place-order-button">Place Order</button>
        </form>
        <p>Total Amount: ${{ '%.2f'|format(total_amount) }}</p>
    </div>
</body>
</html>
