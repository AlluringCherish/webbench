<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
    <div id="application-form-page">
        <h1>Submit Application for {{ job.title }}</h1>
        <form method="post" enctype="multipart/form-data">
            <label for="applicant-name">Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" required /><br />

            <label for="applicant-email">Email:</label>
            <input type="email" id="applicant-email" name="applicant_email" required /><br />

            <label for="resume-upload">Upload Resume:</label>
            <input type="file" id="resume-upload" name="resume_upload" accept=".pdf,.doc,.docx,.txt" required /><br />

            <label for="cover-letter">Cover Letter:</label><br />
            <textarea id="cover-letter" name="cover_letter" rows="6" cols="40" required></textarea><br />

            <button id="submit-application-button" type="submit">Submit Application</button>
        </form>
    </div>
</body>
</html>
