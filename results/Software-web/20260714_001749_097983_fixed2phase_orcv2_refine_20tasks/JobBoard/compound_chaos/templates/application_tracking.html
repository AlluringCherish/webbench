<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>
        <form method="get" action="{{ url_for('application_tracking') }}">
            <label for="status-filter">Filter by status:</label>
            <select id="status-filter" name="status_filter">
                <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
                <option value="Applied" {% if status_filter == 'Applied' %}selected{% endif %}>Applied</option>
                <option value="Under Review" {% if status_filter == 'Under Review' %}selected{% endif %}>Under Review</option>
                <option value="Interview" {% if status_filter == 'Interview' %}selected{% endif %}>Interview</option>
                <option value="Rejected" {% if status_filter == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% if applications %}
                    {% for app in applications %}
                    <tr>
                        <td>{{ app.job_title }}</td>
                        <td>{{ app.company_name }}</td>
                        <td>{{ app.status }}</td>
                        <td>{{ app.applied_date }}</td>
                        <td><button id="view-application-button-{{ app.application_id }}" onclick="location.href='{{ url_for('view_application', app_id=app.application_id) }}'">View</button></td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="5">No applications found.</td></tr>
                {% endif %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
