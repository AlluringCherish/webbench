<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>
        <form method="get" action="{{ url_for('companies_directory') }}">
            <input type="text" id="search-company-input" name="search_company_input" placeholder="Search companies" value="{{ search_query }}" />
            <button type="submit">Search</button>
        </form>

        <div id="companies-list">
            {% if companies %}
                <ul>
                {% for company in companies %}
                    <li>
                        {{ company.company_name }} - {{ company.industry }}
                        <button id="view-company-button-{{ company.company_id }}" onclick="location.href='{{ url_for('company_profile', company_id=company.company_id) }}'">View Profile</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No companies found.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
