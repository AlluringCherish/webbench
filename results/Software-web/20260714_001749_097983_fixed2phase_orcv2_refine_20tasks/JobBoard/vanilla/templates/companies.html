<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Company Directory</title>
</head>
<body>
  <div id="companies-page">
    <h1>Company Directory</h1>

    <input id="search-company-input" type="text" placeholder="Search companies" value="{{ search_query }}" onkeydown="if(event.key ==='Enter'){ location.href='?search=' + this.value; }" />

    <div id="companies-list">
      <ul>
        {% for company in companies %}
        <li>
          {{ company.company_name }} ({{ company.industry }}) - Employees: {{ company.employee_count }}
          <button id="view-company-button-{{ company.company_id }}" onclick="location.href='{{ url_for('company_profile', company_id=company.company_id) }}'">View Profile</button>
        </li>
        {% else %}
        <li>No companies found.</li>
        {% endfor %}
      </ul>
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
