<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Applications</title>
</head>
<body>
  <div id="tracking-page">
    <h1>My Applications</h1>

    <label for="status-filter">Filter by status:</label>
    <select id="status-filter" onchange="location.href='?status=' + this.value;">
      <option value="">All</option>
      {% for status in statuses %}
        <option value="{{ status }}" {% if status_filter == status %}selected{% endif %}>{{ status }}</option>
      {% endfor %}
    </select>

    <table id="applications-table" border="1">
      <thead>
        <tr>
          <th>Job Title</th>
          <th>Company</th>
          <th>Status</th>
          <th>Date Applied</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for app in applications %}
        <tr>
          <td>{{ app.job_title }}</td>
          <td>{{ app.company_name }}</td>
          <td>{{ app.status }}</td>
          <td>{{ app.applied_date }}</td>
          <td><button id="view-application-button-{{ app.application_id }}" onclick="alert('Application details not implemented.')">View</button></td>
        </tr>
        {% else %}
        <tr><td colspan="5">No applications found.</td></tr>
        {% endfor %}
      </tbody>
    </table>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
