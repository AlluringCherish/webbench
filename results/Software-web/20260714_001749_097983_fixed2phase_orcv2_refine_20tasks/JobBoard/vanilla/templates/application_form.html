<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submit Application</title>
</head>
<body>
  <div id="application-form-page">
    <h1>Submit Application for {{ job.title }}</h1>
    <form method="POST" enctype="multipart/form-data">
      <label for="applicant-name">Name:</label>
      <input id="applicant-name" name="applicant-name" type="text" required />

      <label for="applicant-email">Email:</label>
      <input id="applicant-email" name="applicant-email" type="email" required />

      <label for="resume-upload">Upload Resume:</label>
      <input id="resume-upload" name="resume-upload" type="file" accept=".pdf,.doc,.docx" required />

      <label for="cover-letter">Cover Letter:</label>
      <textarea id="cover-letter" name="cover-letter"></textarea>

      <button id="submit-application-button" type="submit">Submit Application</button>
    </form>
  </div>
</body>
</html>
