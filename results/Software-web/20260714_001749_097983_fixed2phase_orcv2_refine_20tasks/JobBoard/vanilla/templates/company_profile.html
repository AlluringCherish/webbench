<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Company Profile</title>
</head>
<body>
  <div id="company-profile-page">
    <h1>{{ company.company_name }}</h1>
    <div id="company-info">
      <p>Industry: {{ company.industry }}</p>
      <p>Location: {{ company.location }}</p>
      <p>Description: {{ company.description }}</p>
    </div>

    <h2>Open Jobs</h2>
    <div id="company-jobs">
      <ul id="jobs-list">
        {% for job in jobs %}
        <li>
          {{ job.title }}
          <button id="view-job-button-{{ job.job_id }}" onclick="location.href='{{ url_for('job_details', job_id=job.job_id) }}'">View Details</button>
        </li>
        {% else %}
        <li>No jobs available for this company.</li>
        {% endfor %}
      </ul>
    </div>

    <button id="back-to-companies" onclick="location.href='{{ url_for('companies_directory') }}'">Back to Companies Directory</button>
  </div>
</body>
</html>
