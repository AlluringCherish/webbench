<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>

        <form method="get" action="">
            <input type="text" id="search-input" name="search" placeholder="Search..." value="{{ search_query }}"/>
            <select id="genre-filter" name="genre">
                <option value="">All</option>
                {% for genre in genres %}
                <option value="{{ genre.genre_name }}" {% if genre.genre_name == selected_genre %}selected{% endif %}>{{ genre.genre_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="movies-grid">
            {% for movie in movies %}
            <div class="movie-card">
                <h3>{{ movie.title }}</h3>
                <div>Rating: {{ movie.rating }}</div>
                <div>Duration: {{ movie.duration }} min</div>
                <button id="view-movie-button-{{ movie.movie_id }}" onclick="window.location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
            </div>
            {% else %}
            <p>No movies found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
