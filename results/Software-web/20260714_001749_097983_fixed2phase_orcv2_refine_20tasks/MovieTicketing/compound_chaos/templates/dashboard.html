<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>

        <div id="featured-movies">
            {% for movie in featured_movies %}
            <div class="movie">
                <h3>{{ movie.title }}</h3>
                <div>Rating: {{ movie.rating }}</div>
            </div>
            {% endfor %}
        </div>

        <button id="browse-movies-button" onclick="window.location.href='{{ url_for('catalog') }}'">Browse Movies</button>
        <button id="view-bookings-button" onclick="window.location.href='{{ url_for('bookings') }}'">View Bookings</button>
        <button id="showtimes-button" onclick="window.location.href='{{ url_for('showtimes', movie_id=featured_movies[0].movie_id if featured_movies else 0) }}'">Showtimes</button>
    </div>
</body>
</html>
