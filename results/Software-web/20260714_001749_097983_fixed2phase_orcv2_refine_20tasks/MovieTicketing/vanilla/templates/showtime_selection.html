<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Showtime</title>
</head>
<body>
<div id="showtime-page">
    <h1>Select Showtime</h1>

    <label for="theater-filter">Filter by Theater:</label>
    <select id="theater-filter" onchange="filterShowtimes()">
        <option value="">All Theaters</option>
        {% for theater in theaters %}
        <option value="{{ theater.theater_id }}" {% if theater_filter|int == theater.theater_id %}selected{% endif %}>{{ theater.theater_name }}</option>
        {% endfor %}
    </select>

    <label for="date-filter">Filter by Date:</label>
    <input id="date-filter" type="date" value="{{ date_filter|default('') }}" onchange="filterShowtimes()" />

    <div id="showtimes-list">
        {% for showtime in showtimes %}
        <div class="showtime-item">
            <div>Date: {{ showtime.showtime_date }}</div>
            <div>Time: {{ showtime.showtime_time }}</div>
            <div>Theater: {{ theaters | selectattr('theater_id', 'equalto', showtime.theater_id) | map(attribute='theater_name') | list | first }}</div>
            <div>Price: ${{ showtime.price }}</div>
            <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="location.href='/seat_selection/{{ showtime.showtime_id }}'">Select</button>
        </div>
        {% endfor %}
    </div>
</div>
<script>
function filterShowtimes() {
    const theater = document.getElementById('theater-filter').value;
    const date = document.getElementById('date-filter').value;
    const params = new URLSearchParams();
    if (theater) params.append('theater', theater);
    if (date) params.append('date', date);
    window.location.href = '/showtimes?' + params.toString();
}
</script>
</body>
</html>
