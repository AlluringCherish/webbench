<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Movie Catalog</h1>

    <input id="search-input" type="text" placeholder="Search movies by title or genre" value="{{ search|default('') }}" oninput="filterMovies()" />

    <select id="genre-filter" onchange="filterMovies()">
        <option value="">All Genres</option>
        {% for genre in genres %}
          <option value="{{ genre.genre_name }}" {% if genre_filter == genre.genre_name %}selected{% endif %}>{{ genre.genre_name }}</option>
        {% endfor %}
    </select>

    <div id="movies-grid">
        {% for movie in movies %}
        <div class="movie-card">
            <h3>{{ movie.title }}</h3>
            <div>Rating: {{ movie.rating }}</div>
            <div>Duration: {{ movie.duration }} min</div>
            <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>

</div>

<script>
function filterMovies() {
    const search = document.getElementById('search-input').value;
    const genre = document.getElementById('genre-filter').value;
    const params = new URLSearchParams();
    if(search) params.append('search', search);
    if(genre) params.append('genre', genre);
    window.location.href = '/catalog?' + params.toString();
}
</script>

</body>
</html>
