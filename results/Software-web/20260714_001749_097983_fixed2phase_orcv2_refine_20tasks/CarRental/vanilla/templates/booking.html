<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="booking-page">
        <h1>Book Your Rental</h1>
        <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
        <form method="post">
            <label for="pickup-location">Pickup Location:</label>
            <select id="pickup-location" name="pickup_location">
              {% for loc in locations %}
                <option value="{{ loc.city }}">{{ loc.city }}</option>
              {% endfor %}
            </select><br>

            <label for="dropoff-location">Dropoff Location:</label>
            <select id="dropoff-location" name="dropoff_location">
              {% for loc in locations %}
                <option value="{{ loc.city }}">{{ loc.city }}</option>
              {% endfor %}
            </select><br>

            <label for="pickup-date">Pickup Date:</label>
            <input type="date" id="pickup-date" name="pickup_date" required><br>

            <label for="dropoff-date">Dropoff Date:</label>
            <input type="date" id="dropoff-date" name="dropoff_date" required><br>

            <button id="calculate-price-button" type="submit" name="calculate_price_button">Calculate Price</button>
            <div id="total-price">
                {% if total_price %}
                <p>Total Price: {{ total_price }}</p>
                {% endif %}
            </div>

            <button id="proceed-to-insurance-button" type="submit" name="proceed_to_insurance_button">Proceed to Insurance</button>
        </form>
    </div>
</body>
</html>
