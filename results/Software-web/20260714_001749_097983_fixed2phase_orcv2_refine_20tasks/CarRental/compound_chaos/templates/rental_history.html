<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rental History</title>
</head>
<body>
<div id="history-page">
    <h1>Rental History</h1>
    <form method="post">
        <label for="status-filter">Filter by Status:</label>
        <select id="status-filter" name="status-filter">
            <option value="" {% if status_filter == '' %}selected{% endif %}>All</option>
            <option value="Active" {% if status_filter == 'Active' %}selected{% endif %}>Active</option>
            <option value="Completed" {% if status_filter == 'Completed' %}selected{% endif %}>Completed</option>
            <option value="Cancelled" {% if status_filter == 'Cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
        <button type="submit">Filter</button>
    </form>

    <table id="rentals-table" border="1" cellpadding="5" cellspacing="0">
        <thead>
            <tr>
                <th>Rental ID</th>
                <th>Vehicle</th>
                <th>Customer</th>
                <th>Pickup Date</th>
                <th>Dropoff Date</th>
                <th>Status</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for rental in rentals %}
            <tr>
                <td>{{ rental.rental_id }}</td>
                <td>{{ rental.vehicle.make }} {{ rental.vehicle.model }}</td>
                <td>{{ rental.customer.name }}</td>
                <td>{{ rental.pickup_date }}</td>
                <td>{{ rental.dropoff_date }}</td>
                <td>{{ rental.status }}</td>
                <td><button id="view-rental-details-{{ rental.rental_id }}" onclick="alert('Rental Details:\nVehicle: {{ rental.vehicle.make }} {{ rental.vehicle.model }}\nCustomer: {{ rental.customer.name }}\nPickup: {{ rental.pickup_date }}\nDropoff: {{ rental.dropoff_date }}\nStatus: {{ rental.status }}')">View Details</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
