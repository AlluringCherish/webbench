<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
<div id="insurance-page">
    <h1>Select Insurance Coverage</h1>
    <form method="post">
        <div id="insurance-options">
            {% for plan in insurance_plans %}
            <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="insurance" value="{{ plan.insurance_id }}" required>
            <label for="select-insurance-{{ plan.insurance_id }}">
                {{ plan.plan_name }} - ${{ plan.daily_cost }} per day
            </label><br>
            {% endfor %}
        </div>
        <div id="insurance-description"></div>
        <div id="insurance-price"></div>

        <!-- Hidden inputs to pass booking info -->
        <input type="hidden" name="pickup_location" value="{{ pickup_location }}">
        <input type="hidden" name="dropoff_location" value="{{ dropoff_location }}">
        <input type="hidden" name="pickup_date" value="{{ pickup_date }}">
        <input type="hidden" name="dropoff_date" value="{{ dropoff_date }}">
        <input type="hidden" name="total_price" value="{{ total_price }}">

        <button id="confirm-booking-button" type="submit">Confirm Booking</button>
    </form>
</div>
<button onclick="history.back()">Back to Booking</button>
</body>
</html>
