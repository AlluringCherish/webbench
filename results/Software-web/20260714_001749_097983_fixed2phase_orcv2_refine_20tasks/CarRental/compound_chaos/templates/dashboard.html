<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Car Rental Dashboard</h1>
    <div id="featured-vehicles">
        <h2>Featured Vehicles</h2>
        <ul>
            {% for vehicle in vehicles[:3] %}
            <li>{{ vehicle.make }} {{ vehicle.model }} - ${{ vehicle.daily_rate }} / day</li>
            {% endfor %}
        </ul>
    </div>

    <button id="search-vehicles-button" onclick="location.href='{{ url_for('vehicle_search') }}'">Search Vehicles</button>
    <button id="my-reservations-button" onclick="location.href='{{ url_for('reservation_management') }}'">My Reservations</button>

    <div id="promotions-section">
        <h2>Promotions</h2>
        <p>{{ promotions_section }}</p>
    </div>
</div>
</body>
</html>
