<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
    <h1>My Reservations</h1>
    <form method="post">
        <button id="sort-by-date-button" name="sort-by-date-button" type="submit">Sort by Date</button>
    </form>

    <div id="reservations-list">
        {% for res in reservations %}
        <div>
            <p>Reservation ID: {{ res.reservation_id }} - Status: {{ res.status }} - Vehicle: {{ vehicles[res.vehicle_id].make }} {{ vehicles[res.vehicle_id].model }}</p>
            <form method="post" style="display:inline;">
                <button id="modify-reservation-button-{{ res.reservation_id }}" name="modify" value="{{ res.reservation_id }}" type="button" onclick="window.location.href='/special_requests?reservation_id={{ res.reservation_id }}'">Modify</button>
                <button id="cancel-reservation-button-{{ res.reservation_id }}" name="cancel" value="{{ res.reservation_id }}" type="submit">Cancel</button>
            </form>
        </div>
        {% else %}
        <p>No reservations found.</p>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
