<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
<div id="booking-page">
    <h1>Book Your Rental</h1>
    <form method="post">
        <label for="pickup-location">Pickup Location:</label>
        <select id="pickup-location" name="pickup-location" required>
            {% for loc in locations %}
            <option value="{{ loc.city }}">{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="dropoff-location">Dropoff Location:</label>
        <select id="dropoff-location" name="dropoff-location" required>
            {% for loc in locations %}
            <option value="{{ loc.city }}">{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="pickup-date">Pickup Date:</label>
        <input type="date" id="pickup-date" name="pickup-date" required>

        <label for="dropoff-date">Dropoff Date:</label>
        <input type="date" id="dropoff-date" name="dropoff-date" required>

        <button id="calculate-price-button" name="calculate-price-button" type="submit">Calculate Price</button>

        {% if total_price is not none %}
        <div id="total-price">
            Total Price: ${{ total_price }}</div>
        {% endif %}

        <button id="proceed-to-insurance-button" name="proceed-to-insurance-button" type="submit">Proceed to Insurance</button>
    </form>
</div>
<button onclick="history.back()">Back to Vehicle Details</button>
</body>
</html>
