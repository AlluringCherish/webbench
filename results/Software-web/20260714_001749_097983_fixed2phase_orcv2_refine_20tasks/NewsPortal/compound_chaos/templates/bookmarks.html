<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>My Bookmarks</title>
</head>
<body>
    <div id="bookmarks-page">
        <h1>My Bookmarks</h1>
        <form action="" method="post">
            <div id="bookmarks-list">
                {% for bookmark in bookmarks %}
                    <div>
                        <h3>{{ bookmark.article_title }}</h3>
                        <p>Date: {{ bookmark.bookmarked_date }}</p>
                        <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" name="remove-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Remove</button>
                        <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" name="read-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Read</button>
                    </div>
                {% else %}
                    <p>No bookmarks found.</p>
                {% endfor %}
            </div>
        </form>

        <form action="{{ url_for('dashboard') }}" method="get">
            <button id="back-to-dashboard" type="submit">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
