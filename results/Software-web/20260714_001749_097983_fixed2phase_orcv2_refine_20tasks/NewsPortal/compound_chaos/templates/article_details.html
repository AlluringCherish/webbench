<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Article Details</title>
</head>
<body>
    <div id="article-details-page">
        <h1 id="article-title">{{ article.title }}</h1>
        <div id="article-author">By {{ article.author }}</div>
        <div id="article-date">Published on {{ article.date }}</div>

        <form action="" method="post">
            <button id="bookmark-button" type="submit">Bookmark This Article</button>
        </form>

        <div id="article-content">
            <p>{{ article.content }}</p>
        </div>
    </div>
</body>
</html>
