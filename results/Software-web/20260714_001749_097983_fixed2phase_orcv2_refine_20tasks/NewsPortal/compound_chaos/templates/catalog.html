<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Article Catalog</h1>

        <form action="{{ url_for('catalog') }}" method="post">
            <input type="text" id="search-input" name="search-input" placeholder="Search articles..." value="{{ search_query|default('') }}" />

            <select id="category-filter" name="category-filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>

            <button type="submit">Search / Filter</button>
        </form>

        <div id="articles-grid">
            {% for article in articles %}
                <div>
                    <h3>{{ article.title }}</h3>
                    <p>By {{ article.author }} on {{ article.date }}</p>

                    <form action="{{ url_for('article_details', article_id=article.article_id) }}" method="get">
                        <button id="view-article-button-{{ article.article_id }}" type="submit">View Article</button>
                    </form>
                </div>
            {% else %}
                <p>No articles found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
