<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Article Comments</title>
</head>
<body>
    <div id="comments-page">
        <h1>Article Comments</h1>
        <form action="" method="get">
            <label for="filter-by-article">Filter by Article:</label>
            <select id="filter-by-article" name="filter-by-article" onchange="this.form.submit()">
                <option value="">All Articles</option>
                {% for article in articles %}
                    <option value="{{ article }}" {% if article == selected_article %}selected{% endif %}>{{ article }}</option>
                {% endfor %}
            </select>
        </form>

        <div id="comments-list">
            {% for comment in comments %}
                <div>
                    <h3>{{ comment.article_title }}</h3>
                    <p><strong>{{ comment.commenter_name }}:</strong> {{ comment.comment_text }}</p>
                </div>
            {% else %}
                <p>No comments found.</p>
            {% endfor %}
        </div>

        <form action="{{ url_for('write_comment') }}" method="get">
            <button id="write-comment-button" type="submit">Write Comment</button>
        </form>

        <form action="{{ url_for('dashboard') }}" method="get">
            <button id="back-to-dashboard" type="submit">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
