<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>

        <form action="" method="post">
            <button id="sort-by-date" name="sort-by" value="date" type="submit">Sort by Date</button>
            <button id="sort-by-popularity" name="sort-by" value="popularity" type="submit">Sort by Popularity</button>
        </form>

        <div id="category-articles">
            {% for article in category_articles %}
                <div>
                    <h3>{{ article.title }}</h3>
                    <p>By {{ article.author }} on {{ article.date }} - Views: {{ article.views }}</p>
                    <form action="{{ url_for('article_details', article_id=article.article_id) }}" method="get">
                        <button type="submit">Read Article</button>
                    </form>
                </div>
            {% else %}
                <p>No articles in this category.</p>
            {% endfor %}
        </div>

        <form action="{{ url_for('dashboard') }}" method="get">
            <button id="back-to-dashboard" type="submit">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
