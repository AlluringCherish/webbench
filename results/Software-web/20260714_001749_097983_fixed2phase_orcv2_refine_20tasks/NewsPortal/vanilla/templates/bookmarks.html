<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
</head>
<body>
<div id="bookmarks-page">
    <h1>My Bookmarks</h1>
    <div id="bookmarks-list">
        <form method="post" action="{{ url_for('bookmarks') }}">
        {% for bookmark in bookmarks %}
            <div>
                <h3>{{ bookmark.article_title }}</h3>
                <p>Bookmarked on {{ bookmark.bookmarked_date }}</p>
                <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" type="button" onclick="location.href='{{ url_for('article_details', article_id=bookmark.article_id) }}'">Read</button>
                <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" name="remove_id" value="{{ bookmark.bookmark_id }}" type="submit">Remove</button>
            </div>
        {% else %}
            <p>No bookmarks saved.</p>
        {% endfor %}
        </form>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
