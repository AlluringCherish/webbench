<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visitor Tickets</title>
</head>
<body>
    <div id="visitor-tickets-container">
        <h1 id="visitor-tickets-title">Visitor Tickets</h1>
        {% if message %}<p>{{ message }}</p>{% endif %}
        <form id="ticket-purchase-form" method="post">
            <label for="input-visitor-name">Visitor Name:</label><br>
            <input type="text" id="input-visitor-name" name="visitor_name" required><br>

            <label for="select-exhibition">Exhibition:</label><br>
            <select id="select-exhibition" name="exhibition_id" required>
                <option value="" disabled selected>Select an exhibition</option>
                {% for exhibition in exhibitions.values() %}
                <option value="{{ exhibition.id }}">{{ exhibition.name }}</option>
                {% endfor %}
            </select><br>

            <label for="input-ticket-date">Date:</label><br>
            <input type="date" id="input-ticket-date" name="date" required pattern="\d{4}-\d{2}-\d{2}"><br><br>

            <button type="submit" id="btn-submit-ticket">Purchase Ticket</button>
        </form>
        <button id="btn-back-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
