<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ exhibition.name }}</title>
</head>
<body>
    <div id="exhibition-details-container">
        <h1 id="exhibition-details-title">{{ exhibition.name }}</h1>
        <p id="exhibition-description">{{ exhibition.description }}</p>
        <div id="exhibition-artifact-list">
            {% for artifact in artifacts %}
            <div class="exhibition-artifact-item">
                <strong>{{ artifact.name }}</strong><br />
                <span>{{ artifact.description }}</span>
            </div>
            {% endfor %}
        </div>
        <button id="btn-back-exhibitions" onclick="location.href='/exhibitions'">Back to Exhibitions</button>
        <button id="btn-back-artifact-catalog" onclick="location.href='/artifact-catalog'">Back to Artifact Catalog</button>
    </div>
</body>
</html>
