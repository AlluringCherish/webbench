<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Events</title>
</head>
<body>
    <div id="virtual-events-container">
        <h1 id="virtual-events-title">Virtual Events</h1>
        {% if message %}<p>{{ message }}</p>{% endif %}
        <div id="events-list">
            {% for event in events %}
            <div class="event-item">
                <strong>{{ event.name }}</strong><br>
                <span>{{ event.description }}</span><br>
                <span>Date: {{ event.date }} Time: {{ event.time }}</span>
            </div>
            {% endfor %}
        </div>
        <form id="event-registration-form" method="post">
            <label for="input-event-visitor-name">Visitor Name:</label><br>
            <input type="text" id="input-event-visitor-name" name="visitor_name" required><br>

            <label for="select-event">Select Event:</label><br>
            <select id="select-event" name="event_id" required>
                <option value="" disabled selected>Select an event</option>
                {% for event in events %}
                <option value="{{ event.id }}">{{ event.name }}</option>
                {% endfor %}
            </select><br><br>

            <button type="submit" id="btn-submit-registration">Register</button>
        </form>
        <button id="btn-back-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
