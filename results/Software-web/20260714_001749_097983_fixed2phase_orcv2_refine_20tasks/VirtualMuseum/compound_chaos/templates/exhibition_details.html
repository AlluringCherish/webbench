<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibition Details</title>
</head>
<body>
    <div id="exhibitionDetailsPage">
        <h2 id="exhibitionTitle">{{ exhibition.title }}</h2>
        <div id="exhibitionDescription">{{ exhibition.description }}</div>
        <div id="exhibitionArtifactList">
            {% for artifact in artifacts %}
                <div class="artifact">
                    <h3>{{ artifact.name }}</h3>
                    <img src="/static/images/{{ artifact.image_filename }}" alt="{{ artifact.name }}" style="max-width:200px; max-height:150px;" />
                    <p>{{ artifact.description }}</p>
                    <p>Origin: {{ artifact.origin }}</p>
                    <p>Year: {{ artifact.year }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="btnBookTicketsFromExhibition" onclick="location.href='/tickets'">Book Tickets</button>
        <button id="btnBackToExhibitions" onclick="location.href='/exhibitions'">Back to Exhibitions</button>
    </div>
</body>
</html>
