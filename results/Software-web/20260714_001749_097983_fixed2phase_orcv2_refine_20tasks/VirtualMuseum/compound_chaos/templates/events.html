<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Events</title>
</head>
<body>
    <div id="eventsPage">
        <div id="eventsList">
            {% for event in events %}
                <div class="event">
                    <h3>{{ event.title }}</h3>
                    <p>{{ event.description }}</p>
                    <p>Date: {{ event.event_date }}</p>
                    <p>Time: {{ event.start_time }} - {{ event.end_time }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="btnRegisterEvent" onclick="alert('Event registration form not implemented yet.')">Register for Event</button>
        <button id="btnBackToDashboardFromEvents" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
