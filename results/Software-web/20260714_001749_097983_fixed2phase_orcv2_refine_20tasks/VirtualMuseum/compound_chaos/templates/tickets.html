<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visitor Tickets</title>
</head>
<body>
    <div id="ticketsPage">
        <div id="ticketsList">
            {% for ticket in tickets %}
                <div class="ticket">
                    <p>Ticket ID: {{ ticket.ticket_id }}</p>
                    <p>User ID: {{ ticket.user_id }}</p>
                    <p>Exhibition ID: {{ ticket.exhibition_id }}</p>
                    <p>Purchase Date: {{ ticket.purchase_date }}</p>
                    <p>Seat Number: {{ ticket.seat_number }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="btnPurchaseTicket" onclick="alert('Ticket purchase form not implemented yet.')">Purchase Ticket</button>
        <button id="btnBackToDashboardFromTickets" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
