<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibitions</title>
</head>
<body>
    <div id="exhibitionsPage">
        <div id="exhibitionsList">
            {% for exhibition in exhibitions %}
                <div class="exhibition">
                    <a href="/exhibitions/{{ exhibition.exhibition_id }}">{{ exhibition.title }}</a>
                    <p>{{ exhibition.description }}</p>
                    <p>From {{ exhibition.start_date }} to {{ exhibition.end_date }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="btnBackToDashboardFromExhibitions" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
