<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audioGuidesPage">
        <div id="audioGuidesList">
            {% for guide in guides %}
                <div class="audioGuide">
                    <h3>{{ guide.title }}</h3>
                    <audio controls>
                        <source src="/static/audio/{{ guide.audio_filename }}" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                    <p>Duration: {{ guide.duration_seconds }} seconds</p>
                </div>
            {% endfor %}
        </div>
        <button id="btnPlayAudioGuide" onclick="alert('Play audio guide functionality not implemented yet.')">Play Audio Guide</button>
        <button id="btnBackToDashboardFromAudioGuides" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
