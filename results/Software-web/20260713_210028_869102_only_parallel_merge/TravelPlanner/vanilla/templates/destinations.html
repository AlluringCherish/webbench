<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
    <div id="destinations-page">
        <h1>Travel Destinations</h1>
        <form method="get" action="{{ url_for('destinations') }}">
            <input id="search-destination" type="text" name="search" placeholder="Search by name or country" value="{{ search }}" />
            <select id="region-filter" name="region">
                <option value="">--Select Region--</option>
                {% for region in ['Asia', 'Europe', 'Americas', 'Africa', 'Oceania'] %}
                    <option value="{{ region }}" {% if region == region_filter %}selected{% endif %}>{{ region }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="destinations-grid">
            {% for dest in destinations %}
            <div class="destination-card">
                <h3>{{ dest.name }}</h3>
                <p>{{ dest.country }}</p>
                <button id="view-destination-button-{{ dest.dest_id }}" onclick="window.location.href='{{ url_for('destination_detail', dest_id=dest.dest_id) }}'">View Details</button>
            </div>
            {% else %}
            <p>No destinations found.</p>
            {% endfor %}
        </div>
        <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
