<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>
        <form method="get" action="{{ url_for('recommendations') }}">
            <label for="recommendation-season-filter">Season:</label>
            <select id="recommendation-season-filter" name="season">
                <option value="">--Select Season--</option>
                {% for season in ['Spring', 'Summer', 'Fall', 'Winter'] %}
                    <option value="{{ season }}" {% if season == season_filter %}selected{% endif %}>{{ season }}</option>
                {% endfor %}
            </select>
            <label for="budget-filter">Budget:</label>
            <select id="budget-filter" name="budget">
                <option value="">--Select Budget--</option>
                {% for budget in ['Low', 'Medium', 'High'] %}
                    <option value="{{ budget }}" {% if budget == budget_filter %}selected{% endif %}>{{ budget }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="trending-destinations">
            <h2>Trending Destinations</h2>
            <ul>
                {% for dest in trending_destinations %}
                <li>{{ dest.name }} - {{ dest.country }}</li>
                {% else %}
                <li>No trending destinations found.</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
