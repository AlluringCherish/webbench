<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destination Details</title>
</head>
<body>
    <div id="destination-details-page">
        <h1 id="destination-name">{{ destination.name }}</h1>
        <div id="destination-country">{{ destination.country }}</div>
        <div id="destination-description">{{ destination.description }}</div>
        <div id="destination-attractions">Main Attractions: {{ destination.attractions }}</div>
        <form method="post" action="{{ url_for('destination_detail', dest_id=destination.dest_id) }}">
            <button id="add-to-trip-button" type="submit">Add to Trip</button>
            <div>
                <label for="itinerary_name">Itinerary Name:</label>
                <input type="text" name="itinerary_name" required />
            </div>
            <div>
                <label for="start_date">Start Date:</label>
                <input type="date" name="start_date" required />
            </div>
            <div>
                <label for="end_date">End Date:</label>
                <input type="date" name="end_date" required />
            </div>
            <div>
                <label for="activities">Activities:</label>
                <input type="text" name="activities" />
            </div>
        </form>
        <button onclick="window.location.href='{{ url_for('destinations') }}'">Back to Destinations</button>
    </div>
</body>
</html>
