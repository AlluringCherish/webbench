<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>
        <form method="get" action="{{ url_for('accommodations') }}">
            <input id="destination-input" type="text" name="destination" placeholder="Destination City" value="{{ destination }}" />
            <input id="check-in-date" type="date" name="check_in_date" />
            <input id="check-out-date" type="date" name="check_out_date" />
            <select id="price-filter" name="price">
                <option value="">--Price Range--</option>
                <option value="Budget" {% if price_filter == 'Budget' %}selected{% endif %}>Budget</option>
                <option value="Mid-range" {% if price_filter == 'Mid-range' %}selected{% endif %}>Mid-range</option>
                <option value="Luxury" {% if price_filter == 'Luxury' %}selected{% endif %}>Luxury</option>
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="hotels-list">
            {% if hotels %}
            <ul>
                {% for hotel in hotels %}
                <li>
                    <b>{{ hotel.name }}</b> ({{ hotel.city }}) - Rating: {{ hotel.rating }} - Price: ${{ hotel.price_per_night }}<br />
                    Amenities: {{ hotel.amenities }}
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No hotels found.</p>
            {% endif %}
        </div>
        <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
