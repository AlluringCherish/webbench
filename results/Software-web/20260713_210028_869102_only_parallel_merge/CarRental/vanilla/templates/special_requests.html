<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
<div id="requests-page">
    <h1>Special Requests</h1>
    <form method="post">
        <label for="select-reservation">Select Reservation:</label>
        <select id="select-reservation" name="select-reservation">
            <option value="">-- Select --</option>
            {% for rid, desc in reservations %}
            <option value="{{ rid }}">{{ desc }}</option>
            {% endfor %}
        </select>
        <br>
        <input type="checkbox" id="driver-assistance-checkbox" name="driver-assistance-checkbox" value="yes">
        <label for="driver-assistance-checkbox">Driver Assistance</label>
        <br>
        <input type="checkbox" id="gps-option-checkbox" name="gps-option-checkbox" value="yes">
        <label for="gps-option-checkbox">GPS Option</label>
        <br>
        <label for="child-seat-quantity">Child Seat Quantity:</label>
        <input type="number" id="child-seat-quantity" name="child-seat-quantity" min="0" value="0">
        <br>
        <label for="special-notes">Special Notes:</label>
        <br>
        <textarea id="special-notes" name="special-notes" rows="4" cols="50"></textarea>
        <br>
        <button type="submit" id="submit-requests-button">Submit Special Requests</button>
    </form>
</div>
</body>
</html>
