<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
<div id="locations-page">
    <h1>Pickup and Dropoff Locations</h1>
    <form method="get">
        <label for="hours-filter">Filter by Operating Hours:</label>
        <select id="hours-filter" name="hours-filter">
            <option value="All" {% if not filter_hours or filter_hours == 'All' %}selected{% endif %}>All</option>
            <option value="24/7" {% if filter_hours == '24/7' %}selected{% endif %}>24/7</option>
            <option value="Business Hours" {% if filter_hours == 'Business Hours' %}selected{% endif %}>Business Hours</option>
            <option value="Weekend" {% if filter_hours == 'Weekend' %}selected{% endif %}>Weekend</option>
        </select>
        <label for="search-location-input">Search Location:</label>
        <input type="text" id="search-location-input" name="search-location-input" value="{{ search_input }}">
        <button type="submit">Apply</button>
    </form>
    <div id="locations-list">
        {% if locations %}
        <ul>
            {% for loc in locations %}
            <li>
                <strong>{{ loc.city }}</strong><br>
                {{ loc.address }}<br>
                Phone: {{ loc.phone }}<br>
                Hours: {{ loc.hours }}<br>
                <button id="location-detail-button-{{ loc.location_id }}" onclick="alert('Details for {{ loc.city }}\nAddress: {{ loc.address }}\nPhone: {{ loc.phone }}\nHours: {{ loc.hours }}')">View Details</button>
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No locations found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
