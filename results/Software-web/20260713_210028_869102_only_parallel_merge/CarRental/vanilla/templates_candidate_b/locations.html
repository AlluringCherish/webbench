<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
<div id="locations-page">
    <h1>Pickup and Dropoff Locations</h1>
    <form method="get">
        <label for="hours-filter">Filter by Operating Hours:</label>
        <select name="hours_filter" id="hours-filter" onchange="this.form.submit()">
            <option value="All" {% if filter_hours == 'All' %}selected{% endif %}>All</option>
            <option value="24/7" {% if filter_hours == '24/7' %}selected{% endif %}>24/7</option>
            <option value="09:00-18:00" {% if filter_hours == '09:00-18:00' %}selected{% endif %}>Business Hours</option>
            <option value="Weekend" {% if filter_hours == 'Weekend' %}selected{% endif %}>Weekend</option>
        </select>
        <label for="search-location-input">Search Location:</label>
        <input type="text" name="search_location_input" id="search-location-input" value="{{ search_query }}" placeholder="City or Address" />
        <button type="submit">Search</button>
    </form>
    <div id="locations-list">
        {% for loc in locations %}
        <div class="location-item">
            <p>City: {{ loc.city }}</p>
            <p>Address: {{ loc.address }}</p>
            <p>Phone: {{ loc.phone }}</p>
            <p>Hours: {{ loc.hours }}</p>
            <button id="location-detail-button-{{ loc.location_id }}" onclick="alert('Location Details:\nCity: {{ loc.city }}\nAddress: {{ loc.address }}\nPhone: {{ loc.phone }}\nHours: {{ loc.hours }}')">View Details</button>
        </div>
        <hr />
        {% else %}
        <p>No locations found.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
