<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Details</title>
</head>
<body>
<div id="vehicle-details-page">
    <h1 id="vehicle-name">{{ vehicle.make }} {{ vehicle.model }}</h1>
    <div id="vehicle-specs">
        <p>Seats: {{ vehicle.seats }}</p>
        <p>Transmission: {{ vehicle.transmission }}</p>
        <p>Fuel Type: {{ vehicle.fuel_type }}</p>
    </div>
    <div id="daily-rate">
        <p>Daily Rate: ${{ vehicle.daily_rate }}</p>
    </div>
    <button id="book-now-button" onclick="window.location.href='{{ url_for('booking', vehicle_id=vehicle.vehicle_id) }}'">Book Now</button>
    <div id="vehicle-reviews">
        <h2>Customer Reviews</h2>
        <ul>
            {% for review in reviews %}
            <li><strong>{{ review.user }}:</strong> {{ review.comment }}</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
