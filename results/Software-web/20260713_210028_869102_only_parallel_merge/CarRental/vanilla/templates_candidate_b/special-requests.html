<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
<div id="requests-page">
    <h1>Special Requests</h1>
    <form method="post">
        <label for="select-reservation">Select Reservation:</label>
        <select id="select-reservation" name="select_reservation">
            {% for res in reservations %}
            <option value="{{ res.reservation_id }}">Reservation {{ res.reservation_id }} - Vehicle ID {{ res.vehicle_id }}</option>
            {% endfor %}
        </select>
        <div>
            <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance_checkbox" />
            <label for="driver-assistance-checkbox">Driver Assistance</label>
        </div>
        <div>
            <input type="checkbox" id="gps-option-checkbox" name="gps_option_checkbox" />
            <label for="gps-option-checkbox">GPS Option</label>
        </div>
        <div>
            <label for="child-seat-quantity">Child Seat Quantity:</label>
            <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" />
        </div>
        <div>
            <label for="special-notes">Special Notes:</label>
            <textarea id="special-notes" name="special_notes" rows="4" cols="40"></textarea>
        </div>
        <button type="submit" id="submit-requests-button">Submit Requests</button>
    </form>
</div>
</body>
</html>
