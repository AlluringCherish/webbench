<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
<div id="booking-page">
    <h1>Book Your Rental</h1>
    {% if error_msg %}
    <p style="color:red;">{{ error_msg }}</p>
    {% endif %}
    <form method="post" action="">
        <label for="pickup-location">Pickup Location:</label>
        <select id="pickup-location" name="pickup_location">
            <option value="">Select pickup location</option>
            {% for loc in locations %}
            <option value="{{ loc.city }}" {% if pickup_location == loc.city %}selected{% endif %}>{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="dropoff-location">Dropoff Location:</label>
        <select id="dropoff-location" name="dropoff_location">
            <option value="">Select dropoff location</option>
            {% for loc in locations %}
            <option value="{{ loc.city }}" {% if dropoff_location == loc.city %}selected{% endif %}>{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="pickup-date">Pickup Date:</label>
        <input type="date" id="pickup-date" name="pickup_date" value="{{ pickup_date }}" />

        <label for="dropoff-date">Dropoff Date:</label>
        <input type="date" id="dropoff-date" name="dropoff_date" value="{{ dropoff_date }}" />

        <button type="submit" id="calculate-price-button">Calculate Price</button>
    </form>
    {% if total_price is not none %}
    <div id="total-price">
        <p>Total Price: ${{ '%.2f' | format(total_price) }}</p>
        <form method="post" action="{{ url_for('insurance_options', reservation_id=request.args.get('reservation_id') or '' ) }}">
            <button type="button" id="proceed-to-insurance-button" onclick="window.location.href='{{ url_for('insurance_options', reservation_id=None) }}'">Proceed to Insurance Options</button>
        </form>
    </div>
    {% endif %}
</div>
</body>
</html>
