<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Car Rental Dashboard</h1>
    <div id="featured-vehicles">
        <h2>Featured Vehicles</h2>
        <ul>
            {% for vehicle in featured_vehicles %}
            <li>{{ vehicle.make }} {{ vehicle.model }} - ${{ vehicle.daily_rate }} per day</li>
            {% endfor %}
        </ul>
    </div>
    <button id="search-vehicles-button" onclick="window.location.href='{{ url_for('vehicle_search') }}'">Search Vehicles</button>
    <button id="my-reservations-button" onclick="window.location.href='{{ url_for('reservations') }}'">My Reservations</button>
    <div id="promotions-section">
        <h2>Current Promotions</h2>
        <ul>
            {% for promo in promotions %}
            <li>{{ promo }}</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
