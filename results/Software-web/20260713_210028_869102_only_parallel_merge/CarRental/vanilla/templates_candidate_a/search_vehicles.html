<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
<div id="search-page">
    <h1>Search Vehicles</h1>
    <form method="post" action="{{ url_for('vehicle_search') }}">
        <label for="location-filter">Pickup Location:</label>
        <select id="location-filter" name="location-filter">
            <option value="All" {% if not selected_location or selected_location == 'All' %}selected{% endif %}>All</option>
            {% for loc in locations %}
            <option value="{{ loc.city }}" {% if selected_location == loc.city %}selected{% endif %}>{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="vehicle-type-filter">Vehicle Type:</label>
        <select id="vehicle-type-filter" name="vehicle-type-filter">
            <option value="All" {% if not selected_type or selected_type == 'All' %}selected{% endif %}>All</option>
            {% for vtype in vehicle_types %}
            <option value="{{ vtype }}" {% if selected_type == vtype %}selected{% endif %}>{{ vtype }}</option>
            {% endfor %}
        </select>

        <label for="date-range-input">Rental Date Range:</label>
        <input type="text" id="date-range-input" name="date-range-input" value="{{ date_range }}">

        <button type="submit">Apply Filters</button>
    </form>

    <div id="vehicles-grid">
        {% if vehicles %}
            {% for v in vehicles %}
            <div class="vehicle-card">
                <p><strong>{{ v.make }} {{ v.model }}</strong></p>
                <p>Type: {{ v.vehicle_type }}</p>
                <p>Daily Rate: ${{ "%.2f" | format(v.daily_rate) }}</p>
                <button id="view-details-button-{{ v.vehicle_id }}" onclick="location.href='{{ url_for('vehicle_details', vehicle_id=v.vehicle_id) }}'">View Details</button>
            </div>
            <hr>
            {% endfor %}
        {% else %}
            <p>No vehicles found.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
