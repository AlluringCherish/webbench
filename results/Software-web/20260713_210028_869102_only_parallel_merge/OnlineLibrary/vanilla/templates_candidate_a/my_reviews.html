<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% if reviews %}
                <ul>
                    {% for review in reviews %}
                        <li>
                            <strong>{{ review.book_title }}</strong> - Rating: {{ review.rating }}<br>
                            {{ review.review_text }}<br>
                            <form method="get" action="{{ url_for('write_review', book_id=review.review_id) }}" style="display:inline">
                                <button id="edit-review-button-{{ review.review_id }}" type="submit">Edit</button>
                            </form>
                            <form method="post" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline" onsubmit="return confirm('Are you sure you want to delete this review?');">
                                <button id="delete-review-button-{{ review.review_id }}" type="submit">Delete</button>
                            </form>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No reviews written yet.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
