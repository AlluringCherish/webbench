<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div>
            <label>Username:</label>
            <div id="profile-username">{{ username }}</div>
        </div>
        <form method="post">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="profile-email" type="email" value="{{ email }}">
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>

        <div id="borrow-history">
            <h2>Borrow History</h2>
            <ul>
                {% for b in borrow_history %}
                    <li>{{ b.book_title }} - Borrowed: {{ b.borrow_date }} - Returned: {{ b.return_date or "Not returned" }}</li>
                {% endfor %}
            </ul>
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
