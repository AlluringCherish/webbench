<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <div id="book-info-display">
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
        </div>
        <form method="post">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating-input">
                {% for i in range(1,6) %}
                    <option value="{{ i }}" {% if existing_review and existing_review.rating == i %}selected{% endif %}>{{ i }} Stars</option>
                {% endfor %}
            </select>
            <br>
            <label for="review-text">Review Text:</label><br>
            <textarea id="review-text" name="review-text" rows="5" cols="40">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea><br>
            <button id="submit-review-button" type="submit">Submit Review</button>
            <button id="back-to-book" type="button" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
        </form>
    </div>
</body>
</html>
