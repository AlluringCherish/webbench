<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <table id="reservations-table" border="1">
            <thead>
                <tr>
                    <th>Book Title</th><th>Reservation Date</th><th>Status</th><th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for res in reservations %}
                <tr>
                    <td>{{ res.book_title }}</td>
                    <td>{{ res.reservation_date }}</td>
                    <td>{{ res.status }}</td>
                    <td>
                        {% if res.status == 'Active' %}
                        <form method="post" action="{{ url_for('cancel_reservation', reservation_id=res.reservation_id) }}" style="display:inline">
                            <button id="cancel-reservation-button-{{ res.reservation_id }}" type="submit">Cancel Reservation</button>
                        </form>
                        {% else %}
                        -
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
