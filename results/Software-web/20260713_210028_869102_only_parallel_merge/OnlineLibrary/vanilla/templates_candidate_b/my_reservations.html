<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <form method="post">
            <table id="reservations-table" border="1">
                <thead>
                    <tr>
                        <th>Book Title</th>
                        <th>Reservation Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for reservation in reservations %}
                    <tr>
                        <td>{{ reservation.book_title }}</td>
                        <td>{{ reservation.reservation_date }}</td>
                        <td>{{ reservation.status }}</td>
                        <td>
                        {% if reservation.status == 'Active' %}
                            <button id="cancel-reservation-button-{{ reservation.reservation_id }}" name="cancel_id" value="{{ reservation.reservation_id }}" type="submit">Cancel Reservation</button>
                        {% else %}
                            -
                        {% endif %}
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
