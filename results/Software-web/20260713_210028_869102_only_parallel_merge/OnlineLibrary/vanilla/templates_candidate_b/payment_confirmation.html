<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">
            <p>Fine Amount: ${{ fine.amount }}</p>
        </div>
        <form method="post">
            <button id="confirm-payment-button" type="submit">Confirm Payment</button>
            <button id="back-to-profile" type="button" onclick="window.location.href='{{ url_for('profile') }}'">Back to Profile</button>
        </form>
    </div>
</body>
</html>
