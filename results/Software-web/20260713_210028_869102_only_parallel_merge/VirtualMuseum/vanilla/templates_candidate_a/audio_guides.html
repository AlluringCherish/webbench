<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
<div id="audio-guides-page">
    <h1>Audio Guides</h1>
    <form method="post">
        <label for="filter-language">Language:</label>
        <select id="filter-language" name="filter-language">
            <option value="">All</option>
            {% for lang in languages %}
                <option value="{{ lang }}" {% if lang == filter_language %}selected{% endif %}>{{ lang }}</option>
            {% endfor %}
        </select>
        <button id="apply-language-filter" type="submit">Apply Filter</button>
    </form>
    <table id="audio-guide-list" border="1">
        <thead>
        <tr>
            <th>Guide ID</th>
            <th>Exhibit Number</th>
            <th>Title</th>
            <th>Language</th>
            <th>Duration (min)</th>
            <th>Narrator</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for guide in audio_guides %}
            <tr>
                <td>{{ guide.guide_id }}</td>
                <td>{{ guide.exhibit_number }}</td>
                <td>{{ guide.title }}</td>
                <td>{{ guide.language }}</td>
                <td>{{ guide.duration }}</td>
                <td>{{ guide.narrator }}</td>
                <td>
                    <button id="play-guide-button-{{ guide.guide_id }}">Play</button>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
