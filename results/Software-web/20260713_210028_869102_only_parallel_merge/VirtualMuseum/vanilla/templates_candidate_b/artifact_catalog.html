<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
    <div id="artifact-catalog-page">
        <h1>Artifact Catalog</h1>
        <form method="post">
            <input id="search-artifact" type="text" name="search-artifact" placeholder="Search by name or ID">
            <select id="filter-period" name="filter-period">
                <option value="">All Periods</option>
                {% for period in periods %}
                <option value="{{ period }}">{{ period }}</option>
                {% endfor %}
            </select>
            <select id="filter-origin" name="filter-origin">
                <option value="">All Origins</option>
                {% for origin in origins %}
                <option value="{{ origin }}">{{ origin }}</option>
                {% endfor %}
            </select>
            <button id="apply-artifact-filter" type="submit">Apply Filter</button>
        </form>
        <table id="artifact-table" border="1">
            <thead>
                <tr>
                    <th>Artifact ID</th>
                    <th>Name</th>
                    <th>Period</th>
                    <th>Origin</th>
                    <th>Exhibition Title</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for artifact in artifacts %}
                <tr>
                    <td>{{ artifact.artifact_id }}</td>
                    <td>{{ artifact.artifact_name }}</td>
                    <td>{{ artifact.period }}</td>
                    <td>{{ artifact.origin }}</td>
                    <td>{{ exhibitions.get(artifact.exhibition_id, '') }}</td>
                    <td>
                        <button id="view-artifact-button-{{ artifact.artifact_id }}">View</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='/'">Back to Dashboard</button>
    </div>
</body>
</html>
