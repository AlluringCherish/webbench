<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Museum Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Museum Dashboard</h1>
    <div id="exhibition-summary">
        <p>Total Exhibitions: {{ total_exhibitions }}</p>
        <p>Active Exhibitions: {{ active_exhibitions }}</p>
    </div>
    <div id="artifact-summary">
        <p>Total Artifacts: {{ total_artifacts }}</p>
    </div>
    <button id="artifact-catalog-button" onclick="window.location.href='{{ url_for('artifacts') }}'">Artifact Catalog</button>
    <button id="exhibitions-button" onclick="window.location.href='{{ url_for('exhibitions') }}'">Exhibitions</button>
    <button id="visitor-tickets-button" onclick="window.location.href='{{ url_for('visitor_tickets') }}'">Visitor Tickets</button>
    <button id="virtual-events-button" onclick="window.location.href='{{ url_for('virtual_events') }}'">Virtual Events</button>
    <button id="audio-guides-button" onclick="window.location.href='{{ url_for('audio_guides') }}'">Audio Guides</button>
</div>
</body>
</html>
