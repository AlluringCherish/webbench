<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Device Control</title>
</head>
<body>
  <div id="device-control-page">
    <h1>Device Control</h1>
    <h2 id="device-name-display">{{ device.device_name }}</h2>
    <div id="device-status-display">Status: {{ device.status }}</div>
    
    <form method="POST">
      <label for="power-toggle">Power:</label>
      <button type="submit" id="power-toggle" name="power" value="{{ 'off' if device.power == 'on' else 'on' }}">
        {{ 'Turn Off' if device.power == 'on' else 'Turn On' }}
      </button><br><br>

      {% if device.device_type == 'Light' %}
      <label for="brightness">Brightness:</label>
      <input type="number" id="brightness" name="brightness" min="0" max="100" value="{{ device.brightness }}"><br><br>
      {% endif %}

      {% if device.device_type == 'Thermostat' %}
      <label for="temperature">Temperature:</label>
      <input type="number" id="temperature" name="temperature" value="{{ device.temperature }}"><br><br>
      {% endif %}

      <button type="submit" id="save-settings-button">Save Settings</button>
    </form>

    <button id="back-to-devices" onclick="location.href='{{ url_for('device_list') }}'">Back to Devices</button>
  </div>
</body>
</html>
