<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
<div id="device-control-page">
    <h2 id="device-name-display">{{ device.device_name }}</h2>
    <div id="device-status-display">Status: {{ device.status }}</div>

    <form method="post">
        <button type="submit" name="power-toggle" id="power-toggle" value="toggle">Toggle Power</button><br><br>

        {% if device.device_type == 'Light' or device.device_type == 'Appliance' or device.device_type == 'Sensor' %}
            <label for="brightness">Brightness:</label>
            <input type="text" id="brightness" name="brightness" value="{{ device.brightness }}"><br><br>
        {% endif %}

        {% if device.device_type == 'Thermostat' %}
            <label for="temperature">Temperature:</label>
            <input type="text" id="temperature" name="temperature" value="{{ device.temperature }}"><br><br>
        {% endif %}

        <label for="mode">Mode:</label>
        <input type="text" id="mode" name="mode" value="{{ device.mode }}"><br><br>
        <label for="schedule_time">Schedule Time:</label>
        <input type="text" id="schedule_time" name="schedule_time" value="{{ device.schedule_time }}"><br><br>

        <button type="submit" id="save-settings-button">Save Settings</button>
    </form>
    <button id="back-to-devices" onclick="location.href='{{ url_for('device_list') }}'">Back to Device List</button>
</div>
</body>
</html>
