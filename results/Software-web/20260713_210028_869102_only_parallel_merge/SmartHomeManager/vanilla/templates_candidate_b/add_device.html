<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Device</title>
</head>
<body>
<div id="add-device-page">
    <h1>Add New Device</h1>
    <form method="post">
        <label for="device-name">Device Name:</label>
        <input type="text" id="device-name" name="device-name" required><br><br>

        <label for="device-type">Device Type:</label>
        <select id="device-type" name="device-type">
            {% for dtype in device_types %}
            <option value="{{ dtype }}">{{ dtype }}</option>
            {% endfor %}
        </select><br><br>

        <label for="device-room">Room:</label>
        <select id="device-room" name="device-room">
            {% for room in rooms %}
            <option value="{{ room }}">{{ room }}</option>
            {% endfor %}
        </select><br><br>

        <button type="submit" id="submit-device-button">Add Device</button>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
