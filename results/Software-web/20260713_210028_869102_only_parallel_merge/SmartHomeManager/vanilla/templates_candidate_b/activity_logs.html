<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
<div id="activity-page">
    <h1>Activity Logs</h1>
    <form method="post">
        <input type="text" id="search-activity" name="search-activity" value="{{ search_query }}" placeholder="Search activities...">
        <button type="submit" id="apply-search-button">Apply Search</button>
    </form>
    <table id="activity-table" border="1">
        <thead>
            <tr>
                <th>Timestamp</th>
                <th>Device</th>
                <th>Action</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.timestamp }}</td>
                <td>{{ log.device_name }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.details }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
