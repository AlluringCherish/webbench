<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name">
        {% if artist %}
        <a href="/artists">{{ artist.name }}</a>
        {% else %}
        Unknown Artist
        {% endif %}
    </div>
    <div id="album-name">{{ album.title if album else 'Unknown Album' }}</div>
    <div id="duration-display">{{ duration }}</div>
    <button id="play-button">Play</button>
</div>
</body>
</html>
