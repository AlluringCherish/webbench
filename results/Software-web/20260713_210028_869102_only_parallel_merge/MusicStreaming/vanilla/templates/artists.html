<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>
    <form method="get" action="/artists">
        <input type="text" id="search-artists" name="search" placeholder="Search artists by name" value="{{ search_text }}">
        <select id="artists-sort" name="sort">
            <option value="">Sort By</option>
            <option value="name" {% if sort_by=='name' %}selected{% endif %}>By Name</option>
            <option value="genre" {% if sort_by=='genre' %}selected{% endif %}>By Genre</option>
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-card">
            <div><strong>{{ artist.name }}</strong> - Genre: {{ artist.genre }}</div>
            <button id="view-artist-button-{{ artist.artist_id }}" onclick="window.location.href='/artists/{{ artist.artist_id }}'">View</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
