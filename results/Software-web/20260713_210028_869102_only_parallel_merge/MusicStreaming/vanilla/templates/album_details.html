<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
<div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">{{ artist.name if artist else 'Unknown Artist' }}</div>
    <div id="album-year">{{ album.release_year }}</div>
    <div id="album-songs-list">
        <ul>
            {% for song in songs %}
            <li>{{ song.title }} - {{ song.duration }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="add-album-to-playlist-button">Add All Songs to Playlist</button>
</div>
</body>
</html>
