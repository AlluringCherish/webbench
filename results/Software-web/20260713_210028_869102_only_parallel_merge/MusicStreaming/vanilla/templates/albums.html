<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>
    <form method="get" action="/albums">
        <input type="text" id="search-albums" name="search" placeholder="Search albums by title or artist" value="{{ search_text }}">
        <select id="sort-albums" name="sort">
            <option value="">Sort By</option>
            <option value="title" {% if sort_by=='title' %}selected{% endif %}>By Title</option>
            <option value="artist" {% if sort_by=='artist' %}selected{% endif %}>By Artist</option>
            <option value="year" {% if sort_by=='year' %}selected{% endif %}>By Year</option>
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-card">
            <div><strong>{{ album.title }}</strong> by {{ album.artist_name }} ({{ album.release_year }})</div>
            <button id="view-album-button-{{ album.album_id }}" onclick="window.location.href='/albums/{{ album.album_id }}'">View</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
