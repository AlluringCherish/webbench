<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>
    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-card">
            <div><strong>{{ playlist.title }}</strong> ({{ playlist.total_songs }} songs)</div>
            <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="window.location.href='/playlists/{{ playlist.playlist_id }}'">View</button>
        </div>
        {% endfor %}
    </div>
    <button id="create-playlist-button" onclick="window.location.href='/playlists/create'">Create New Playlist</button>
    <button id="back-to-dashboard" onclick="window.location.href='/'">Back to Dashboard</button>
</div>
</body>
</html>
