<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
<div id="create-playlist-page">
    <h1>Create New Playlist</h1>
    {% if error %}
    <div style="color: red;">{{ error }}</div>
    {% endif %}
    <form method="post" action="/playlists/create">
        <label for="playlist-name-input">Playlist Name:</label><br>
        <input type="text" id="playlist-name-input" name="playlist-name-input" value="{{ title|default('') }}"><br><br>
        <label for="playlist-description-input">Description:</label><br>
        <textarea id="playlist-description-input" name="playlist-description-input">{{ description|default('') }}</textarea><br><br>
        <button id="save-playlist-button" type="submit">Save Playlist</button>
        <button id="cancel-create-button" type="button" onclick="window.location.href='/playlists'">Cancel</button>
    </form>
</div>
</body>
</html>
