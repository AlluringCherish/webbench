<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>
    <form method="get" action="/songs">
        <input type="text" id="search-input" name="search" placeholder="Search by title, artist, or album" value="{{ search_text }}">
        <select id="genre-filter" name="genre">
            <option value="">All Genres</option>
            {% for genre in genres %}
                <option value="{{ genre.genre_name }}" {% if genre.genre_name==selected_genre %}selected{% endif %}>{{ genre.genre_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="songs-grid">
        {% for song in songs %}
        <div class="song-card">
            <div>
                <strong><a href="/songs/{{ song.song_id }}">{{ song.title }}</a></strong>
            </div>
            <div>Artist: {{ song.artist_name }}</div>
            <div>Duration: {{ song.duration }}</div>
            <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
