<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name">
        <a href="{{ url_for('artists') }}">{{ artist.name if artist else 'Unknown Artist' }}</a>
    </div>
    <div id="album-name">{{ album.title if album else 'Unknown Album' }}</div>
    <div id="duration-display">{{ (song.duration // 60)|string }}:{{ '%02d' % (song.duration % 60) }}</div>
    <button id="play-button">Play</button>
</div>
</body>
</html>
