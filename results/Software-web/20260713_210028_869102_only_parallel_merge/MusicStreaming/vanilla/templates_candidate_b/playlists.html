<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>

    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-card">
            <div class="playlist-title">{{ playlist.title }}</div>
            <div class="song-count">Songs: {{ playlist.total_songs }}</div>
            <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="window.location.href='{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}'">View</button>
        </div>
        {% endfor %}
    </div>

    <button id="create-playlist-button" onclick="window.location.href='{{ url_for('create_playlist') }}'">Create Playlist</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
