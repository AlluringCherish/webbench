<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>

    <input id="search-artists" type="text" placeholder="Search artists by name" value="{{ search_query }}" onkeypress="if(event.key === 'Enter') { window.location.href='{{ url_for('artists') }}?search='+this.value+'&sort={{ sort_option }}'; }">

    <select id="artists-sort" onchange="window.location.href='{{ url_for('artists') }}?search={{ search_query }}&sort='+this.value;">
        <option value="">Sort By</option>
        <option value="Name" {% if sort_option == 'Name' %}selected{% endif %}>By Name</option>
        <option value="Genre" {% if sort_option == 'Genre' %}selected{% endif %}>By Genre</option>
    </select>

    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-card">
            <div class="artist-name">{{ artist.name }}</div>
            <div class="artist-genre">{{ artist.genre }}</div>
            <button id="view-artist-button-{{ artist.artist_id }}">View</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
