<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
<div id="current-weather-page">
    <h1 id="location-name">{{ location.location_name }}</h1>
    <div id="temperature-display">{{ weather.temperature }}&deg;</div>
    <div id="weather-condition">{{ weather.condition }}</div>
    <div id="humidity-info">Humidity: {{ weather.humidity }}%</div>
    <div id="wind-speed-info">Wind Speed: {{ weather.wind_speed }}</div>
</div>
</body>
</html>
