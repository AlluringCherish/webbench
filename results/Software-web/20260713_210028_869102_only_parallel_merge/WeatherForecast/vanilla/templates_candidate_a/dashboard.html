<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    {% if current_weather %}
    <div id="current-weather-summary">
        <h2>{{ current_weather.location_name }}</h2>
        <p>Temperature: {{ current_weather.temperature }}&deg;</p>
        <p>Condition: {{ current_weather.condition }}</p>
    </div>
    {% else %}
    <div id="current-weather-summary">
        <p>No current weather data available.</p>
    </div>
    {% endif %}

    <button id="search-location-button" onclick="window.location.href='{{ url_for('search') }}'">Search Locations</button>
    <button id="view-forecast-button" onclick="window.location.href='{{ url_for('forecast') }}'">View Weekly Forecast</button>
    <button id="view-alerts-button" onclick="window.location.href='{{ url_for('alerts') }}'">View Weather Alerts</button>
</div>
</body>
</html>
