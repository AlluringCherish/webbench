<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
<div id="settings-page">
    {% if message %}
        <p>{{ message }}</p>
    {% endif %}
    <form method="POST">
        <label for="temperature-unit-select">Temperature Unit:</label>
        <select id="temperature-unit-select" name="temperature_unit">
            {% for unit in ['Celsius', 'Fahrenheit', 'Kelvin'] %}
                <option value="{{ unit }}" {% if settings.temperature_unit == unit %}selected{% endif %}>{{ unit }}</option>
            {% endfor %}
        </select>
        <br/>

        <label for="default-location-select">Default Location:</label>
        <select id="default-location-select" name="default_location">
            <option value="">None</option>
            {% for loc in locations %}
                <option value="{{ loc.location_id }}" {% if settings.default_location == loc.location_id %}selected{% endif %}>{{ loc.location_name }}</option>
            {% endfor %}
        </select>
        <br/>

        <label for="alert-notifications-toggle">Alert Notifications:</label>
        <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications" {% if settings.alert_notifications %}checked{% endif %} />
        <br/>

        <button id="save-settings-button" type="submit">Save Settings</button>
    </form>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
