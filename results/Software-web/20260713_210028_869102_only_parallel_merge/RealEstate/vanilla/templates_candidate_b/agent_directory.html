<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <form method="get" action="{{ url_for('agent_directory') }}">
            <label for="agent-search">Search by Name:</label>
            <input type="text" id="agent-search" name="search" value="{{ search_query }}">
            <button type="submit">Search</button>
        </form>

        <div id="agents-list">
            {% if agents %}
                <ul>
                {% for agent in agents %}
                    <li>
                        <strong>{{ agent.agent_name }}</strong> - {{ agent.specialization }}<br>
                        Email: {{ agent.email }}<br>
                        Phone: {{ agent.phone }}<br>
                        Properties Sold: {{ agent.properties_sold }}<br>
                        <button id="contact-agent-button-{{ agent.agent_id }}">Contact Agent</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No agents found.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
