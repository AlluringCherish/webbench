<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Property Inquiry</title>
</head>
<body>
    <div id="inquiry-page">
        <h1>Submit Property Inquiry</h1>

        {% if submission_status %}
            <p><strong>{{ submission_status }}</strong></p>
        {% endif %}

        <form method="post" action="{{ url_for('property_inquiry') }}">
            <label for="select-property">Select Property:</label>
            <select id="select-property" name="property_id" required>
                {% for prop in properties %}
                    <option value="{{ prop.property_id }}">{{ prop.address }} - {{ prop.location }}</option>
                {% endfor %}
            </select>

            <label for="inquiry-name">Name:</label>
            <input type="text" id="inquiry-name" name="customer_name" required>

            <label for="inquiry-email">Email:</label>
            <input type="email" id="inquiry-email" name="customer_email" required>

            <label for="inquiry-phone">Phone:</label>
            <input type="tel" id="inquiry-phone" name="customer_phone">

            <label for="inquiry-message">Message:</label>
            <textarea id="inquiry-message" name="message" required></textarea>

            <button id="submit-inquiry-button" type="submit">Submit Inquiry</button>
        </form>
    </div>
</body>
</html>
