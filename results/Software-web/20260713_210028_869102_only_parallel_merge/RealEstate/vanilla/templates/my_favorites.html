<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
<div id="favorites-page">
    <h1>My Favorite Properties</h1>
    {% if favorites %}
    <div id="favorites-list">
        {% for fav in favorites %}
        <div class="favorite-item">
            <p><strong>{{ fav.address }}</strong></p>
            <p>Price: ${{ fav.price }}</p>
            <form action="{{ url_for('remove_favorite', property_id=fav.property_id) }}" method="post" style="display:inline;">
                <button id="remove-from-favorites-button-{{ fav.property_id }}" type="submit">Remove from Favorites</button>
            </form>
            <button id="view-property-button-{{ fav.property_id }}" onclick="location.href='{{ url_for('property_details', property_id=fav.property_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p>No favorite properties found.</p>
    {% endif %}
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
