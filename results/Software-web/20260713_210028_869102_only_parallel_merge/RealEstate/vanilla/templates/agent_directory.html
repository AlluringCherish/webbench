<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
<div id="agents-page">
    <h1>Real Estate Agents</h1>
    <label for="agent-search">Search Agents:</label>
    <input type="text" id="agent-search" name="search_query" value="{{ search_query }}" oninput="location.href='{{ url_for('agent_directory') }}?search_query=' + encodeURIComponent(this.value)">
    <div id="agents-list">
        {% if agents %}
            {% for agent in agents %}
            <div class="agent-item">
                <p>Name: {{ agent.agent_name }}</p>
                <p>Specialization: {{ agent.specialization }}</p>
                <p>Email: {{ agent.email }}</p>
                <p>Phone: {{ agent.phone }}</p>
                <p>Properties Sold: {{ agent.properties_sold }}</p>
                <button id="contact-agent-button-{{ agent.agent_id }}">Contact Agent</button>
            </div>
            {% endfor %}
        {% else %}
            <p>No agents found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
