<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Property Inquiry</title>
</head>
<body>
<div id="inquiry-page">
    <h1>Submit Property Inquiry</h1>
    {% if submission_status %}
        <p>{{ submission_status }}</p>
    {% endif %}
    <form method="post">
        <label for="select-property">Select Property:</label>
        <select id="select-property" name="select_property">
            <option value="">-- Select a property --</option>
            {% for property in properties %}
                <option value="{{ property.property_id }}">{{ property.address }} - {{ property.location }}</option>
            {% endfor %}
        </select><br><br>
        <label for="inquiry-name">Name:</label>
        <input type="text" id="inquiry-name" name="inquiry_name"><br><br>
        <label for="inquiry-email">Email:</label>
        <input type="email" id="inquiry-email" name="inquiry_email"><br><br>
        <label for="inquiry-phone">Phone:</label>
        <input type="tel" id="inquiry-phone" name="inquiry_phone"><br><br>
        <label for="inquiry-message">Message:</label><br>
        <textarea id="inquiry-message" name="inquiry_message" rows="5" cols="40"></textarea><br><br>
        <button id="submit-inquiry-button" type="submit">Submit Inquiry</button>
    </form>
</div>
</body>
</html>
