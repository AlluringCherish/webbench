<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
<div id="favorites-page">
    <h1>My Favorite Properties</h1>
    <div id="favorites-list">
        {% if favorites %}
            <ul>
            {% for favorite in favorites %}
                <li>
                    <strong>{{ favorite.address }}</strong> - ${{ favorite.price }}<br>
                    <form method="post" action="{{ url_for('remove_favorite', property_id=favorite.property_id) }}" style="display:inline">
                        <button id="remove-from-favorites-button-{{ favorite.property_id }}" type="submit">Remove from Favorites</button>
                    </form>
                    <button id="view-property-button-{{ favorite.property_id }}" onclick="location.href='{{ url_for('property_details', property_id=favorite.property_id) }}'">View Details</button>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No favorite properties found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
