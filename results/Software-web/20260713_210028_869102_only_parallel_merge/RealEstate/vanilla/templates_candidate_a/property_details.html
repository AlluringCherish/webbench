<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
<div id="property-details-page">
    <h1 id="property-address">{{ property.address }}</h1>
    <div id="property-price">Price: ${{ property.price }}</div>
    <div id="property-description">{{ property.description }}</div>
    <div id="property-features">
        <p>Beds: {{ property.bedrooms }}</p>
        <p>Baths: {{ property.bathrooms }}</p>
        <p>Square Feet: {{ property.square_feet }}</p>
    </div>

    <form method="post" action="{{ url_for('add_favorite', property_id=property.property_id) }}">
        {% if is_favorite %}
            <button id="add-to-favorites-button" disabled>Already in Favorites</button>
        {% else %}
            <button id="add-to-favorites-button" type="submit">Add to Favorites</button>
        {% endif %}
    </form>

    <button id="submit-inquiry-button" onclick="location.href='{{ url_for('property_inquiry') }}'">Submit Inquiry</button>
</div>
</body>
</html>
