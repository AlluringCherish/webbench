<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write a Review</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
        {% for category, message in messages %}
          <li class="{{ category }}">{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('write_review') }}">
        <label for="select-book">Select Book:</label><br>
        <select id="select-book" name="select_book" required>
            <option value="">-- Select a Book --</option>
            {% for book in books %}
                <option value="{{ book.book_id }}">{{ book.title }}</option>
            {% endfor %}
        </select><br><br>

        <label for="rating-select">Rating:</label><br>
        <select id="rating-select" name="rating" required>
            <option value="">-- Select Rating --</option>
            <option value="5">5 stars</option>
            <option value="4">4 stars</option>
            <option value="3">3 stars</option>
            <option value="2">2 stars</option>
            <option value="1">1 star</option>
        </select><br><br>

        <label for="review-text">Review:</label><br>
        <textarea id="review-text" name="review_text" rows="5" cols="40" required></textarea><br><br>

        <button id="submit-review-button" type="submit">Submit Review</button>
    </form>

</div>
</body>
</html>
