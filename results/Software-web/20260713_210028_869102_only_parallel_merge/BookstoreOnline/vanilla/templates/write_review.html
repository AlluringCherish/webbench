<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write a Review</h1>
    <form method="post" action="{{ url_for('write_review') }}">
        <label for="select-book">Select Book:</label><br>
        <select id="select-book" name="select-book">
            <option value="">-- Select --</option>
            {% for book in purchased_books %}
            <option value="{{ book.book_id }}">{{ book.title }} by {{ book.author }}</option>
            {% endfor %}
        </select><br><br>

        <label for="rating-select">Rating:</label><br>
        <select id="rating-select" name="rating-select">
            <option value="">-- Select --</option>
            {% for i in range(1,6) %}
            <option value="{{ i }}">{{ i }} Star{{ 's' if i > 1 else '' }}</option>
            {% endfor %}
        </select><br><br>

        <label for="review-text">Review:</label><br>
        <textarea id="review-text" name="review-text" rows="5" cols="50"></textarea><br><br>

        <button type="submit" id="submit-review-button">Submit Review</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
        {% for category, message in messages %}
          <li style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
</div>
</body>
</html>
