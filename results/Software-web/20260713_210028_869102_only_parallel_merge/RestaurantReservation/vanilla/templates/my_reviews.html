<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% if reviews %}
            <ul>
                {% for r in reviews %}
                <li><strong>{{ r.dish_name }}</strong> - Rating: {{ r.rating }} - {{ r.review_text }}</li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No reviews found.</p>
            {% endif %}
        </div>
        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
