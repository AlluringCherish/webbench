<!DOCTYPE html>
<html lang="en">
<head>
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <div id="menu-grid" style="display:flex;flex-wrap:wrap;gap:20px;">
            {% for dish in dishes %}
            <div style="border:1px solid #ccc; padding:10px; width:250px;">
                <h3>{{ dish.name }}</h3>
                <div>Price: ${{ dish.price }}</div>
                <p>{{ dish.description }}</p>
                <button id="view-dish-button-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
