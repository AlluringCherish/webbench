<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <form method="post">
            <div>
                Username: <span id="profile-username">{{ user.username }}</span>
            </div>
            <br>
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="profile-email" type="email" value="{{ user.email }}" required><br><br>

            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
