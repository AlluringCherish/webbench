<!DOCTYPE html>
<html lang="en">
<head>
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <form method="post">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="select-dish" required>
                {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating-input" required>
                {% for i in range(1, 6) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select><br><br>

            <label for="review-text">Review Text:</label><br>
            <textarea id="review-text" name="review-text" rows="4" cols="50" required></textarea><br><br>

            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
        {% if error %}
        <p style="color:red">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
