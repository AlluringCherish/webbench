<!DOCTYPE html>
<html lang="en">
<head>
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlist-page">
        <form method="post">
            <label for="waitlist-party-size">Party Size:</label>
            <select id="waitlist-party-size" name="waitlist-party-size" required>
                {% for i in range(1, 11) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
            <button id="join-waitlist-button" type="submit">Join Waitlist</button>
        </form>

        <div id="user-position">
            {% if user_position %}
            Your position in waitlist: {{ user_position }}
            {% else %}
            You are not currently in the waitlist.
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
