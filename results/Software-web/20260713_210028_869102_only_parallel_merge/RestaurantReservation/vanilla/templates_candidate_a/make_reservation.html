<!DOCTYPE html>
<html lang="en">
<head>
    <title>Make Reservation</title>
</head>
<body>
    <div id="reservation-page">
        <form method="post">
            <label for="guest-name">Guest Name:</label>
            <input id="guest-name" name="guest-name" type="text" required><br><br>

            <label for="party-size">Party Size:</label>
            <select id="party-size" name="party-size" required>
                {% for i in range(1, 11) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select><br><br>

            <label for="reservation-date">Reservation Date:</label>
            <input id="reservation-date" name="reservation-date" type="date" required><br><br>

            <button id="submit-reservation-button" type="submit">Submit Reservation</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        {% if error %}
        <p style="color:red">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
