<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Reservations</title>
</head>
<body>
    <div id="my-reservations-page">
        <form method="post">
            <table id="reservations-table" border="1" cellpadding="5">
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Party Size</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                {% for res in reservations %}
                <tr>
                    <td>{{ res.date }}</td>
                    <td>{{ res.time }}</td>
                    <td>{{ res.party_size }}</td>
                    <td>{{ res.status }}</td>
                    <td>
                        {% if res.status == 'Upcoming' %}
                        <button id="cancel-reservation-button-{{ res.reservation_id }}" name="cancel-reservation-button-{{ res.reservation_id }}" type="submit">Cancel</button>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </table>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
