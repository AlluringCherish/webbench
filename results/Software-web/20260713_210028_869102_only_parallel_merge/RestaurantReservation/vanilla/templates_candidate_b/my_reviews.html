<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% if reviews %}
                <ul>
                {% for review in reviews %}
                    <li>
                        <strong>{{ review.dish_name }}</strong>: Rating {{ review.rating }} star{{ 's' if review.rating > 1 else '' }}<br>
                        {{ review.review_text }}<br>
                        <em>{{ review.review_date }}</em>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No reviews yet.</p>
            {% endif %}
        </div>
        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
