<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <div id="menu-grid">
            {% for dish in dishes %}
            <div class="dish-card">
                <h3>{{ dish.name }}</h3>
                <p>Category: {{ dish.category }}</p>
                <p>Price: ${{ "%.2f"|format(dish.price) }}</p>
                <p>Description: {{ dish.description }}</p>
                <button id="view-dish-button-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
