<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <div id="reservation-page">
        {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
        <form method="post">
            <label for="guest-name">Guest Name:</label>
            <input type="text" id="guest-name" name="guest-name" required><br><br>
            <label for="party-size">Party Size:</label>
            <select id="party-size" name="party-size">
                {% for i in range(1,11) %}
                <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select><br><br>
            <label for="reservation-date">Reservation Date:</label>
            <input type="date" id="reservation-date" name="reservation-date" required><br><br>
            <button type="submit" id="submit-reservation-button">Submit Reservation</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
