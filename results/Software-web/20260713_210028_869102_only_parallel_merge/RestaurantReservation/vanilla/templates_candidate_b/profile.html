<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <form method="post">
            <label for="profile-username">Username:</label>
            <div id="profile-username">{{ username }}</div><br>
            <label for="profile-email">Email:</label>
            <input type="text" id="profile-email" name="profile-email" value="{{ email }}" required><br><br>
            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
