<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="my-reservations-page">
        <form method="post">
        <table id="reservations-table" border="1">
            <thead>
                <tr><th>Date</th><th>Time</th><th>Party Size</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
                {% for r in reservations %}
                <tr>
                    <td>{{ r.date }}</td>
                    <td>{{ r.time }}</td>
                    <td>{{ r.party_size }}</td>
                    <td>{{ r.status }}</td>
                    <td>
                        {% if r.status == 'Upcoming' %}
                        <button type="submit" name="cancel-reservation-id" value="{{ r.reservation_id }}" id="cancel-reservation-button-{{ r.reservation_id }}">Cancel</button>
                        {% else %}
                        -
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
