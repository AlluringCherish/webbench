<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Profile</title>
</head>
<body>
  <div id="profile-page">
    <form method="post">
      <label for="profile-email">Email:</label><br/>
      <input id="profile-email" name="email" type="email" value="{{ user.email if user else '' }}" required /><br/>
      <label for="profile-fullname">Full Name:</label><br/>
      <input id="profile-fullname" name="fullname" type="text" value="{{ user.fullname if user else '' }}" required /><br/>
      <button id="update-profile-button" type="submit">Update Profile</button>
    </form>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
