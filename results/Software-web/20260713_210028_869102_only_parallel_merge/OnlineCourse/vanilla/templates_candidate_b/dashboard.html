<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Learning Dashboard</title>
</head>
<body>
  <div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ fullname }}</h1>

    <div id="enrolled-courses">
      {% if enrolled_courses %}
        <ul>
          {% for course in enrolled_courses %}
            <li>
              <strong>{{ course.title }}</strong> - Progress: {{ course.progress }}% - Status: {{ course.status }}
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p>You have not enrolled in any courses yet.</p>
      {% endif %}
    </div>

    <button id="browse-courses-button" onclick="window.location.href='{{ url_for('course_catalog') }}'">Browse Courses</button>
    <button id="my-courses-button" onclick="window.location.href='{{ url_for('my_courses') }}'">My Courses</button>
    <button onclick="window.location.href='{{ url_for('my_assignments') }}'">My Assignments</button>
    <button onclick="window.location.href='{{ url_for('certificates') }}'">My Certificates</button>
    <button onclick="window.location.href='{{ url_for('profile') }}'">My Profile</button>
  </div>
</body>
</html>
