<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Available Courses</title>
</head>
<body>
  <div id="catalog-page">

    <form method="post">
      <input id="search-input" name="search" type="text" placeholder="Search courses" value="{{search_text}}" />
      <button type="submit">Search</button>
    </form>

    <div id="course-grid">
      {% if courses %}
        <ul>
          {% for course in courses %}
            <li>
              <strong>{{ course.title }}</strong> - Category: {{ course.category }} - Level: {{ course.level }}
              <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p>No courses found.</p>
      {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

  </div>
</body>
</html>
