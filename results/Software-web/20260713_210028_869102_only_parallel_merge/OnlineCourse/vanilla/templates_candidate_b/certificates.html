<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Certificates</title>
</head>
<body>
  <div id="certificates-page">
    <div id="certificates-grid">
      {% if certificates %}
        <ul>
          {% for cert in certificates %}
            <li>
              <strong>Certificate for {{ cert.course_title }}</strong> - Issued on {{ cert.issue_date }}
            </li>
          {% endfor %}
        </ul>
      {% else %}
        <p>No certificates earned yet.</p>
      {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
