<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
<div id="catalog-page">

    <form method="post">
        <input type="text" name="search" id="search-input" placeholder="Search courses..." value="{{ search_query }}">
        <button type="submit">Search</button>
    </form>

    <div id="course-grid">
        {% if courses %}
            <ul>
            {% for course in courses %}
                <li>
                    <h3>{{ course.title }}</h3>
                    <p>{{ course.category }} - {{ course.level }} - Duration: {{ course.duration }}</p>
                    <form action="{{ url_for('course_details', course_id=course.course_id) }}" method="get" style="display:inline;">
                        <button type="submit" id="view-course-button-{{ course.course_id }}">View Details</button>
                    </form>
                </li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No active courses available.</p>
        {% endif %}
    </div>

    <form action="{{ url_for('dashboard') }}" method="get" style="display:inline;">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>

</div>
</body>
</html>
