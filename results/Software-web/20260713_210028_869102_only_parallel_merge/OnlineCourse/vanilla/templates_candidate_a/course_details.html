<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
<div id="course-details-page">
    <h1 id="course-title">{{ course.title }}</h1>
    <div id="course-description">{{ course.description }}</div>

    <form method="post">
        {% if enrolled %}
            <button type="submit" id="enroll-button" disabled>Already Enrolled</button>
        {% else %}
            <button type="submit" id="enroll-button">Enroll Now</button>
        {% endif %}
    </form>

    <form action="{{ url_for('course_catalog') }}" method="get">
        <button type="submit" id="back-to-catalog">Back to Catalog</button>
    </form>

</div>
</body>
</html>
