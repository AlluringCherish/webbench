<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
<div id="learning-page">
    <h2>{{ course.title }}</h2>

    <div id="lessons-list">
        <ol>
            {% for i in range(lessons|length) %}
                <li>
                    Lesson {{ i+1 }} {% if i < current_index %}(Completed){% elif i == current_index %}(Current){% endif %}
                </li>
            {% endfor %}
        </ol>
    </div>

    <div id="lesson-content">
        <p>{{ lesson_content }}</p>
    </div>

    <form method="post">
        {% if can_mark_complete %}
            <button type="submit" id="mark-complete-button">Mark Complete</button>
        {% else %}
            <button type="submit" id="mark-complete-button" disabled>Mark Complete</button>
        {% endif %}
    </form>

    <form action="{{ url_for('my_courses') }}" method="get">
        <button type="submit" id="back-to-my-courses">Back to My Courses</button>
    </form>
</div>
</body>
</html>
