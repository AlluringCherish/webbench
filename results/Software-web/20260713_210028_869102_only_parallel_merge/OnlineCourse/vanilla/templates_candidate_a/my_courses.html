<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
</head>
<body>
<div id="my-courses-page">
    {% if enrolled_courses %}
        <div id="courses-list">
            <ul>
            {% for course in enrolled_courses %}
                <li>
                    {{ course.title }} - Progress: {{ course.progress }}% ({{ course.status }})
                    <form action="{{ url_for('course_learning', course_id=course.course_id) }}" method="get" style="display:inline;">
                        <button type="submit" id="continue-learning-button-{{ course.course_id }}">Continue Learning</button>
                    </form>
                </li>
            {% endfor %}
            </ul>
        </div>
    {% else %}
        <p>No enrolled courses found.</p>
    {% endif %}

    <form action="{{ url_for('dashboard') }}" method="get">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
