<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <form method="post">
        <label for="profile-email">Email:</label><br>
        <input type="email" id="profile-email" name="email" value="{{ user.email }}" required><br><br>

        <label for="profile-fullname">Full Name:</label><br>
        <input type="text" id="profile-fullname" name="fullname" value="{{ user.fullname }}" required><br><br>

        <button type="submit" id="update-profile-button">Update Profile</button>
    </form>

    <form action="{{ url_for('dashboard') }}" method="get">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
