<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Assignments</title>
</head>
<body>
<div id="assignments-page">
    {% if assignments %}
    <table id="assignments-table" border="1">
        <thead>
            <tr>
                <th>Assignment ID</th>
                <th>Title</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for a in assignments %}
            <tr>
                <td>{{ a.assignment_id }}</td>
                <td>{{ a.title }}</td>
                <td>{{ a.due_date }}</td>
                <td>{{ a.status }}</td>
                <td>{{ a.grade }}</td>
                <td>
                {% if a.status == 'Pending' %}
                    <form action="{{ url_for('submit_assignment', assignment_id=a.assignment_id) }}" method="get">
                        <button type="submit" id="submit-assignment-button-{{ a.assignment_id }}">Submit</button>
                    </form>
                {% else %}
                    <button type="button" disabled>Submitted</button>
                {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No assignments found.</p>
    {% endif %}

    <form action="{{ url_for('dashboard') }}" method="get">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
