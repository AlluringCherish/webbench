<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
<div id="certificates-page">
    {% if certificates %}
        <div id="certificates-grid">
            <ul>
                {% for c in certificates %}
                    <li>
                        <h3>{{ c.course_title }}</h3>
                        <p>Issued on: {{ c.issue_date }}</p>
                    </li>
                {% endfor %}
            </ul>
        </div>
    {% else %}
        <p>No certificates earned yet.</p>
    {% endif %}

    <form action="{{ url_for('dashboard') }}" method="get">
        <button type="submit" id="back-to-dashboard">Back to Dashboard</button>
    </form>
</div>
</body>
</html>
