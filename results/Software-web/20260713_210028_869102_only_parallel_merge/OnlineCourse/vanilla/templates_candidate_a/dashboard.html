<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ fullname }}</h1>

    <div id="enrolled-courses">
        {% if enrolled_courses %}
            <ul>
            {% for course in enrolled_courses %}
                <li>{{ course.title }} - Progress: {{ course.progress }}% ({{ course.status }})</li>
            {% endfor %}
            </ul>
        {% else %}
            <p>You have not enrolled in any courses yet.</p>
        {% endif %}
    </div>

    <form action="{{ url_for('course_catalog') }}" method="get" style="display:inline;">
        <button type="submit" id="browse-courses-button">Browse Courses</button>
    </form>

    <form action="{{ url_for('my_courses') }}" method="get" style="display:inline;">
        <button type="submit" id="my-courses-button">My Courses</button>
    </form>

    <form action="{{ url_for('my_assignments') }}" method="get" style="display:inline;">
        <button type="submit">My Assignments</button>
    </form>

    <form action="{{ url_for('certificates') }}" method="get" style="display:inline;">
        <button type="submit">My Certificates</button>
    </form>

    <form action="{{ url_for('profile') }}" method="get" style="display:inline;">
        <button type="submit">My Profile</button>
    </form>

</div>
</body>
</html>
