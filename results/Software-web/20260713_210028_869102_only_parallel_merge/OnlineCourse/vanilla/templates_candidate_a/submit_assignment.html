<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
<div id="submit-page">
    <div id="assignment-info">
        <h2>{{ assignment.title }}</h2>
        <p>{{ assignment.description }}</p>
    </div>

    <form method="post">
        <textarea id="submission-text" name="submission_text" rows="10" cols="50" required></textarea>
        <br>
        <button type="submit" id="submit-button">Submit</button>
    </form>

    <form action="{{ url_for('my_assignments') }}" method="get">
        <button type="submit" id="back-to-assignments">Back to Assignments</button>
    </form>
</div>
</body>
</html>
