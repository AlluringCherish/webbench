<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
</head>
<body>
    <div id="membership-page">
        <label for="plan-filter">Filter by Membership Type:</label>
        <select id="plan-filter" name="plan-filter" onchange="filterPlans()">
            <option value="">All</option>
            {% for type in plan_types %}
            <option value="{{ type }}" {% if selected_filter == type %}selected{% endif %}>{{ type }}</option>
            {% endfor %}
        </select>

        <div id="plans-grid">
            {% for plan in memberships %}
            <div class="plan-card">
                <h3>{{ plan.plan_name }}</h3>
                <p>Price: ${{ plan.price }} / {{ plan.billing_cycle }}</p>
                <p>Features: {{ plan.features }}</p>
                <button id="view-details-button-{{ plan.membership_id }}" onclick="window.location.href='{{ url_for('plan_details', plan_id=plan.membership_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>

<script>
function filterPlans() {
    var filterValue = document.getElementById('plan-filter').value;
    var url = new URL(window.location.href);
    if (filterValue) {
        url.searchParams.set('filter', filterValue);
    } else {
        url.searchParams.delete('filter');
    }
    window.location.href = url.toString();
}
</script>
</body>
</html>
