<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
</head>
<body>
    <div id="log-workout-page">
        <h1>Log Workout</h1>
        {% if error %}<div style="color:red;">{{ error }}</div>{% endif %}
        <form method="post">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout-type">
                <option value="Cardio">Cardio</option>
                <option value="Strength">Strength</option>
                <option value="Flexibility">Flexibility</option>
                <option value="Sports">Sports</option>
            </select><br><br>

            <label for="workout-duration">Duration (minutes):</label>
            <input id="workout-duration" name="workout-duration" type="number" min="1"><br><br>

            <label for="calories-burned">Calories Burned:</label>
            <input id="calories-burned" name="calories-burned" type="number" min="0"><br><br>

            <label for="workout-notes">Notes:</label><br>
            <textarea id="workout-notes" name="workout-notes" rows="4" cols="50"></textarea><br><br>

            <button id="submit-workout-button" type="submit">Submit Workout</button>
        </form>
    </div>
</body>
</html>
