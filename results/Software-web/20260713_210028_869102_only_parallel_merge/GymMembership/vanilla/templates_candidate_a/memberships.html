<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
    <script>
      function applyFilter() {
        const filter = document.getElementById('plan-filter').value;
        let url = '{{ url_for("membership_plans") }}';
        if(filter) {
          url += '?filter=' + encodeURIComponent(filter);
        }
        window.location.href = url;
      }
    </script>
</head>
<body>
    <div id="membership-page">
        <h1>Membership Plans</h1>
        <label for="plan-filter">Filter by Type:</label>
        <select id="plan-filter" onchange="applyFilter()">
            <option value="">All</option>
            <option value="Basic" {% if selected_filter == 'Basic' %}selected{% endif %}>Basic</option>
            <option value="Premium" {% if selected_filter == 'Premium' %}selected{% endif %}>Premium</option>
            <option value="Elite" {% if selected_filter == 'Elite' %}selected{% endif %}>Elite</option>
        </select>

        <div id="plans-grid">
            {% for plan in memberships %}
            <div class="plan-card">
                <h2>{{ plan.plan_name }}</h2>
                <p>Price: ${{ plan.price }} / {{ plan.billing_cycle }}</p>
                <p>Features: {{ plan.features }}</p>
                <button id="view-details-button-{{ plan.membership_id }}" onclick="location.href='{{ url_for('plan_details', plan_id=plan.membership_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
