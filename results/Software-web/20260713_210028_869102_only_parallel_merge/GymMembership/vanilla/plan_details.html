<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">${{ plan.price }} / {{ plan.billing_cycle }}</div>
        <div id="plan-features">{{ plan.features }}</div>
        <button id="enroll-plan-button" onclick="alert('You have enrolled in the {{ plan.plan_name }} plan!')">Enroll in Plan</button>

        <div id="plan-reviews">
            <h3>Member Reviews:</h3>
            <ul>
                {% for review in reviews %}
                <li><strong>{{ review.reviewer }}:</strong> {{ review.comment }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
