<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Personal Training</title>
</head>
<body>
    <div id="booking-page">
        {% if error %}
        <div style="color:red">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div style="color:green">Booking confirmed successfully!</div>
        {% endif %}
        <form method="post">
            <label for="select-trainer">Select Trainer:</label>
            <select id="select-trainer" name="select-trainer">
                {% for trainer in trainers %}
                <option value="{{ trainer.trainer_id }}" {% if preselect_trainer_id == trainer.trainer_id %}selected{% endif %}>{{ trainer.name }}</option>
                {% endfor %}
            </select>
            <br/>
            <label for="session-date">Session Date:</label>
            <input id="session-date" name="session-date" type="date" required />
            <br/>
            <label for="session-time">Session Time:</label>
            <select id="session-time" name="session-time">
                {% for time in time_slots %}
                <option value="{{ time }}">{{ time }}</option>
                {% endfor %}
            </select>
            <br/>
            <label for="session-duration">Session Duration (minutes):</label>
            <select id="session-duration" name="session-duration">
                {% for dur in durations %}
                <option value="{{ dur }}">{{ dur }}</option>
                {% endfor %}
            </select>
            <br/>
            <button id="confirm-booking-button" type="submit">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
