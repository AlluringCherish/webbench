<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">Price: ${{ plan.price }} / {{ plan.billing_cycle }}</div>
        <div id="plan-features">Features: {{ plan.features }}</div>
        <button id="enroll-plan-button" onclick="alert('Enrollment simulated for {{ plan.plan_name }}')">Enroll in this Plan</button>
        <div id="plan-reviews">
            <h3>Member Reviews</h3>
            <ul>
                {% for review in reviews %}
                <li>{{ review }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
