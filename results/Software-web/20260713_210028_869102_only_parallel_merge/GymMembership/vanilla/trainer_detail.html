<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio"><p>{{ trainer.bio }}</p></div>
        <div id="trainer-certifications"><p>Certifications: {{ trainer.certifications }}</p></div>
        <button id="book-session-button" onclick="location.href='{{ url_for('pt_booking', trainer_id=trainer.trainer_id) }}'">Book Session</button>

        <div id="trainer-reviews">
            <h3>Client Reviews:</h3>
            <ul>
                {% for review in reviews %}
                <li><strong>{{ review.client }}:</strong> {{ review.comment }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
