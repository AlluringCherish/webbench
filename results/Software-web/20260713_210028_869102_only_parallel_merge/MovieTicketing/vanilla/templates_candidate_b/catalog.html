<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <form method="get" action="{{ url_for('catalog') }}">
            <input type="text" id="search-input" name="search" placeholder="Search by title or genre" value="{{ search_query }}" />
            <select id="genre-filter" name="genre">
                <option value="All" {% if selected_genre.lower() == 'all' or selected_genre == '' %}selected{% endif %}>All</option>
                {% for genre in genres %}
                    <option value="{{ genre.genre_name }}" {% if selected_genre.lower() == genre.genre_name.lower() %}selected{% endif %}>{{ genre.genre_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="movies-grid">
            {% if movies %}
                {% for movie in movies %}
                    <div class="movie-card">
                        <h3>{{ movie.title }}</h3>
                        <div>Rating: {{ movie.rating }}</div>
                        <div>Duration: {{ movie.duration }} mins</div>
                        <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
                    </div>
                {% endfor %}
            {% else %}
                <p>No movies found.</p>
            {% endif %}
        </div>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
