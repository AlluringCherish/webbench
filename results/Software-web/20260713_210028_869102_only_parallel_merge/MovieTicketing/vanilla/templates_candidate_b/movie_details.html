<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Details</title>
</head>
<body>
    <div id="movie-details-page">
        <h1 id="movie-title">{{ movie.title }}</h1>
        <div id="movie-director">Director: {{ movie.director }}</div>
        <div id="movie-rating">Rating: {{ movie.rating }}</div>
        <div id="movie-description">{{ movie.description }}</div>
        <button id="select-showtime-button" onclick="location.href='{{ url_for('showtimes', movie_id=movie.movie_id) }}'">Select Showtime</button>
        <button onclick="location.href='{{ url_for('catalog') }}'">Back to Catalog</button>
    </div>
</body>
</html>
