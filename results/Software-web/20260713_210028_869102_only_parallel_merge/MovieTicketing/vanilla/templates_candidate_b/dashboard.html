<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>
        <div id="featured-movies">
            <h2>Featured Movies</h2>
            <ul>
            {% for movie in featured_movies %}
                <li>{{ movie.title }} (Rating: {{ movie.rating }})</li>
            {% else %}
                <li>No featured movies available.</li>
            {% endfor %}
            </ul>
        </div>
        <button id="browse-movies-button" onclick="location.href='{{ url_for('catalog') }}'">Browse Movies</button>
        <button id="view-bookings-button" onclick="location.href='{{ url_for('booking_history') }}'">View Bookings</button>
        <button id="showtimes-button" onclick="location.href='{{ url_for('catalog') }}'">Showtimes</button>
    </div>
</body>
</html>
