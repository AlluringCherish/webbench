<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>
        <form method="get" action="{{ url_for('theaters') }}">
            <label for="theater-location-filter">Filter by location:</label>
            <select id="theater-location-filter" name="location">
                <option value="All" {% if selected_location.lower() == 'all' or selected_location == '' %}selected{% endif %}>All</option>
                {% for loc in locations %}
                    <option value="{{ loc }}" {% if selected_location.lower() == loc.lower() %}selected{% endif %}>{{ loc }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="theaters-list">
            {% if theaters %}
                <ul>
                {% for theater in theaters %}
                    <li>
                        <strong>{{ theater.theater_name }}</strong> - Location: {{ theater.location }}, Screens: {{ theater.screens }}<br />
                        <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No theaters found.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
