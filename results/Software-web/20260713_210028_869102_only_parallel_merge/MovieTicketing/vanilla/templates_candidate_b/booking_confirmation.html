<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="booking-summary">
            <p>Movie: {{ movie.title }}</p>
            <p>Theater: {{ theater.theater_name }}</p>
            <p>Date: {{ showtime.showtime_date }}</p>
            <p>Time: {{ showtime.showtime_time }}</p>
            <p>Seats: {{ selected_seats | join(", ") }}</p>
            <p>Total Price: ${{ "%.2f"|format(total_price) }}</p>
        </div>
        <form method="post" action="{{ url_for('confirm_booking') }}">
            <input type="hidden" name="showtime_id" value="{{ showtime.showtime_id }}" />
            <input type="hidden" name="selected_seats" value="{{ selected_seats | join(",") }}" />
            <label for="customer-name">Name:</label>
            <input type="text" id="customer-name" name="customer_name" required />
            <br />
            <label for="customer-email">Email:</label>
            <input type="email" id="customer-email" name="customer_email" required />
            <br />
            <button id="confirm-booking-button" type="submit">Confirm Booking</button>
        </form>
        <button onclick="location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Back to Seat Selection</button>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
