<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>
        <form method="get" action="">
            <label for="theater-location-filter">Filter by Location:</label>
            <select id="theater-location-filter" name="location_filter">
                <option value="">All Locations</option>
                {% for loc in locations %}
                <option value="{{ loc }}" {% if loc == location_filter %}selected{% endif %}>{{ loc }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="theaters-list">
            {% for theater in theaters %}
            <div class="theater-item">
                <h3>{{ theater.theater_name }}</h3>
                <div>Location: {{ theater.location }}, {{ theater.city }}</div>
                <div>Screens: {{ theater.screens }}</div>
            </div>
            {% endfor %}
        </div>
        <div id="facilities-display">
            <h3>Facilities</h3>
            <p>{{ facilities_display }}</p>
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
