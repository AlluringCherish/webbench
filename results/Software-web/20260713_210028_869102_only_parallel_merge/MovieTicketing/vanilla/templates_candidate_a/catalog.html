<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <form method="get" action="">
            <input id="search-input" name="search" type="text" placeholder="Search by title or genre" value="{{ search }}" />
            <select id="genre-filter" name="genre_filter">
                <option value="">All Genres</option>
                {% for genre in genres %}
                <option value="{{ genre.genre_name }}" {% if genre.genre_name == genre_filter %}selected{% endif %}>{{ genre.genre_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="movies-grid">
            {% for movie in movies %}
            <div class="movie-card">
                <h3>{{ movie.title }}</h3>
                <div>Rating: {{ movie.rating }}</div>
                <div>Duration: {{ movie.duration }} mins</div>
                <button id="view-movie-button-{{ movie.movie_id }}" onclick="window.location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
