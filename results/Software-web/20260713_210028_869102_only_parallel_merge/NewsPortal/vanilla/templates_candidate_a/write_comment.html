<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="write-comment-page">
    <h1>{{ page_title }}</h1>

    <form method="post" action="{{ url_for('write_comment_page_post') }}">
        <label for="select-article">Select Article:</label>
        <select id="select-article" name="select-article">
            {% for article in articles %}
                <option value="{{ article.article_id }}">{{ article.title }}</option>
            {% endfor %}
        </select>
        <br>

        <label for="commenter-name">Name:</label>
        <input id="commenter-name" name="commenter-name" type="text" required>
        <br>

        <label for="comment-text">Comment:</label>
        <textarea id="comment-text" name="comment-text" required></textarea>
        <br>

        <button id="submit-comment-button" type="submit">Submit Comment</button>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul class="messages">
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
</div>
</body>
</html>
