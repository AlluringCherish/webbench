<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="search-results-page">
    <h1>{{ page_title }}</h1>

    <div id="search-query-display">Search results for: "{{ query }}"</div>

    <div id="results-list">
        {% if results %}
            {% for result in results %}
                <div class="search-result">
                    <h3><a href="{{ url_for('article_details', article_id=result.article_id) }}">{{ result.title }}</a></h3>
                    <p>{{ result.excerpt }}</p>
                </div>
            {% endfor %}
        {% else %}
            <div id="no-results-message">No results found.</div>
        {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
