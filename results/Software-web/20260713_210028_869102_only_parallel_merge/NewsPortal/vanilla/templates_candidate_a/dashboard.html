<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="dashboard-page">
    <h1>{{ page_title }}</h1>

    <div id="featured-articles">
        <h2>Featured Articles</h2>
        <ul>
            {% for article in featured_articles %}
                <li><a href="{{ url_for('article_details', article_id=article.article_id) }}">{{ article.title }}</a> by {{ article.author }}</li>
            {% endfor %}
        </ul>
    </div>

    <button id="browse-articles-button" onclick="location.href='{{ url_for('article_catalog') }}'">Browse Articles</button>
    <button id="view-bookmarks-button" onclick="location.href='{{ url_for('bookmarks_page') }}'">View Bookmarks</button>
    <button id="trending-articles-button" onclick="location.href='{{ url_for('trending_page') }}'">Trending Articles</button>
</div>
</body>
</html>
