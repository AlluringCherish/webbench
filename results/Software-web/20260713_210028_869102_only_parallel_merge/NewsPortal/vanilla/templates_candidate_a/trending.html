<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="trending-page">
    <h1>{{ page_title }}</h1>

    <form method="get" action="{{ url_for('trending_page') }}">
        <label for="time-period-filter">Time Period:</label>
        <select id="time-period-filter" name="period" onchange="this.form.submit()">
            <option value="Today" {% if period_filter == 'Today' %}selected{% endif %}>Today</option>
            <option value="This Week" {% if period_filter == 'This Week' %}selected{% endif %}>This Week</option>
            <option value="This Month" {% if period_filter == 'This Month' %}selected{% endif %}>This Month</option>
        </select>
    </form>

    <div id="trending-list">
        {% for article in trending %}
            <div class="trending-item">
                <span>#{{ loop.index }}: </span>
                <strong>{{ article.article_title }}</strong> - {{ article.category }} - Views: {{ article.view_count }}
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
            </div>
        {% else %}
            <p>No trending articles found.</p>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

</div>
</body>
</html>
