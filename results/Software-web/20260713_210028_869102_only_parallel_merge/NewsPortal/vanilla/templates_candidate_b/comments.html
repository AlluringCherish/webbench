<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="comments-page">
    <h1>Article Comments</h1>
    <form method="get" action="{{ url_for('comments_page') }}">
        <select id="filter-by-article" name="article_id">
            <option value="">All Articles</option>
            {% for article in articles %}
                <option value="{{ article.article_id }}" {% if request.args.get('article_id', '') == article.article_id|string %}selected{% endif %}>{{ article.title }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>
    <div id="comments-list">
        {% for comment in comments %}
            <div>
                <h4>{{ comment.article_title }}</h4>
                <p><strong>{{ comment.commenter_name }}</strong> ({{ comment.comment_date }})</p>
                <p>{{ comment.comment_text }}</p>
            </div>
        {% else %}
            <p>No comments found.</p>
        {% endfor %}
    </div>
    <button id="write-comment-button" onclick="location.href='{{ url_for('write_comment_page_get') }}'">Write a Comment</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
