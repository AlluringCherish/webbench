<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="article-details-page">
    <h1 id="article-title">{{ article.title }}</h1>
    <div id="article-author">By {{ article.author }}</div>
    <div id="article-date">Published on {{ article.date }}</div>
    <form method="post" action="{{ url_for('bookmark_article', article_id=article.article_id) }}">
        <button id="bookmark-button" type="submit">{{ 'Bookmarked' if is_bookmarked else 'Bookmark' }}</button>
    </form>
    <div id="article-content">
        <p>{{ article.content }}</p>
    </div>
</div>
</body>
</html>
