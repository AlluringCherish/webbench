<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="bookmarks-page">
    <h1>My Bookmarks</h1>
    <div id="bookmarks-list">
        {% for bookmark in bookmarks %}
            <div>
                <h3>{{ bookmark.article_title }}</h3>
                <p>Date Bookmarked: {{ bookmark.bookmarked_date }}</p>
                <form method="post" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}" style="display:inline;">
                    <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" type="submit">Remove</button>
                </form>
                <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('article_details', article_id=bookmark.article_id) }}'">Read</button>
            </div>
        {% else %}
            <p>No bookmarks saved.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
