<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="write-comment-page">
    <h1>Write a Comment</h1>
    <form method="post" action="{{ url_for('write_comment_page_post') }}">
        <label for="select-article">Select Article:</label>
        <select id="select-article" name="select-article">
            {% for article in articles %}
                <option value="{{ article.article_id }}">{{ article.title }}</option>
            {% endfor %}
        </select><br>
        <label for="commenter-name">Your Name:</label>
        <input id="commenter-name" name="commenter-name" type="text" required><br>
        <label for="comment-text">Comment:</label><br>
        <textarea id="comment-text" name="comment-text" rows="5" cols="40" required></textarea><br>
        <button id="submit-comment-button" type="submit">Submit Comment</button>
    </form>
</div>
</body>
</html>
