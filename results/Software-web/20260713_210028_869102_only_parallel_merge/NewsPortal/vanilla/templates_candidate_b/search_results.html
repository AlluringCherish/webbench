<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="search-results-page">
    <h1>Search Results</h1>
    <div id="search-query-display">Search query: {{ query|e }}</div>
    <div id="results-list">
        {% if results %}
            {% for article in results %}
                <div>
                    <h3>{{ article.title }}</h3>
                    <p>{{ article.content[:100] }}{% if article.content|length > 100 %}...{% endif %}</p>
                    <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">Read More</button>
                </div>
            {% endfor %}
        {% else %}
            <div id="no-results-message">No results found.</div>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
