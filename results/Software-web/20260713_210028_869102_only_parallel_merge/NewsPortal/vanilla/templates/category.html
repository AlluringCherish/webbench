<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="category-page">
    <h1 id="category-title">{{ category_name }}</h1>
    <button id="sort-by-date" onclick="location.href='{{ url_for('category_page', category_name=category_name, sort='date') }}'">Sort by Date</button>
    <button id="sort-by-popularity" onclick="location.href='{{ url_for('category_page', category_name=category_name, sort='popularity') }}'">Sort by Popularity</button>
    <div id="category-articles">
        {% for article in articles %}
            <div>
                <h3>{{ article.title }}</h3>
                <p>By {{ article.author }} | {{ article.date }}</p>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Details</button>
            </div>
        {% else %}
            <p>No articles found in this category.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
