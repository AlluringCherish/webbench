<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="trending-page">
    <h1>{{ page_title }}</h1>

    <form method="get" action="{{ url_for('trending_page') }}">
        <label for="time-period-filter">Time Period:</label>
        <select id="time-period-filter" name="period" onchange="this.form.submit()">
            <option value="Today" {% if time_period == 'Today' %}selected{% endif %}>Today</option>
            <option value="This Week" {% if time_period == 'This Week' %}selected{% endif %}>This Week</option>
            <option value="This Month" {% if time_period == 'This Month' %}selected{% endif %}>This Month</option>
        </select>
    </form>

    <div id="trending-list">
        {% for idx, item in enumerate(trending, start=1) %}
            <div>
                <span>{{ idx }}. </span>
                <strong>{{ item.article_title }}</strong>
                <span>({{ item.category }})</span>
                <span>Views: {{ item.view_count }}</span>
                <button id="view-article-button-{{ item.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=item.article_id) }}'">View</button>
            </div>
        {% else %}
            <p>No trending articles for this period.</p>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
