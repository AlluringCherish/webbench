<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ page_title }}</title>
</head>
<body>
<div id="add-pet-page">
    <h1>{{ page_title }}</h1>
    <form method="post">
        <label for="pet-name-input">Pet Name:</label>
        <input id="pet-name-input" name="pet_name_input" type="text" value="{{ (form.pet_name_input if form) or '' }}" required />
        <br />
        <label for="pet-species-input">Species:</label>
        <select id="pet-species-input" name="pet_species_input" required>
            <option value="Dog" {% if form and form.pet_species_input == 'Dog' %}selected{% endif %}>Dog</option>
            <option value="Cat" {% if form and form.pet_species_input == 'Cat' %}selected{% endif %}>Cat</option>
            <option value="Bird" {% if form and form.pet_species_input == 'Bird' %}selected{% endif %}>Bird</option>
            <option value="Rabbit" {% if form and form.pet_species_input == 'Rabbit' %}selected{% endif %}>Rabbit</option>
            <option value="Other" {% if form and form.pet_species_input == 'Other' %}selected{% endif %}>Other</option>
        </select>
        <br />
        <label for="pet-breed-input">Breed:</label>
        <input id="pet-breed-input" name="pet_breed_input" type="text" value="{{ (form.pet_breed_input if form) or '' }}" />
        <br />
        <label for="pet-age-input">Age (e.g., 2 years):</label>
        <input id="pet-age-input" name="pet_age_input" type="text" value="{{ (form.pet_age_input if form) or '' }}" required />
        <br />
        <label for="pet-gender-input">Gender:</label>
        <select id="pet-gender-input" name="pet_gender_input" required>
            <option value="Male" {% if form and form.pet_gender_input == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if form and form.pet_gender_input == 'Female' %}selected{% endif %}>Female</option>
        </select>
        <br />
        <label for="pet-size-input">Size:</label>
        <select id="pet-size-input" name="pet_size_input" required>
            <option value="Small" {% if form and form.pet_size_input == 'Small' %}selected{% endif %}>Small</option>
            <option value="Medium" {% if form and form.pet_size_input == 'Medium' %}selected{% endif %}>Medium</option>
            <option value="Large" {% if form and form.pet_size_input == 'Large' %}selected{% endif %}>Large</option>
        </select>
        <br />
        <label for="pet-description-input">Description:</label><br />
        <textarea id="pet-description-input" name="pet_description_input">{{ (form.pet_description_input if form) or '' }}</textarea>
        <br />
        <button id="submit-pet-button" type="submit">Add Pet</button>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
</div>
</body>
</html>
