<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ page_title }}</title>
</head>
<body>
<div id="favorites-page">
    <h1>{{ page_title }}</h1>
    <div id="favorites-grid">
        {% for pet in pets %}
            <div>
                <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">
                    <strong>{{ pet.name }}</strong><br />
                    {{ pet.species }}<br />
                    {{ pet.age }}
                </a>
            </div>
        {% else %}
            <p>No favorite pets saved.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
