<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ page_title }}</title>
</head>
<body>
<div id="pet-details-page">
    <h1 id="pet-name">{{ pet.name }}</h1>
    <div id="pet-species">Species: {{ pet.species }}</div>
    <div id="pet-description">{{ pet.description }}</div>

    <form method="post">
    {% if is_favorite %}
        <button name="favorite_action" value="remove">Remove from Favorites</button>
    {% else %}
        <button name="favorite_action" value="add">Add to Favorites</button>
    {% endif %}
    </form>

    <button id="adopt-button" onclick="window.location.href='{{ url_for('adoption_application', pet_id=pet.pet_id) }}'">Adopt</button>
    <button id="back-to-listings" onclick="window.location.href='{{ url_for('pet_listings') }}'">Back to Listings</button>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
</div>
</body>
</html>
