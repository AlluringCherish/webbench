<!DOCTYPE html>
<html lang="en">
<head>
    <title>{{ page_title }}</title>
</head>
<body>
<div id="profile-page">
    <h1>{{ page_title }}</h1>
    <div id="profile-username">Username: {{ user.username }}</div>
    <form method="post">
        <label for="profile-email">Email:</label>
        <input id="profile-email" name="profile_email" type="email" value="{{ user.email }}" required />
        <br />
        <button id="update-profile-button" type="submit">Update Profile</button>
        <button id="back-to-dashboard" type="button" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </form>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <ul>
          {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
</div>
</body>
</html>
