<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Add New Pet</title>
</head>
<body>
    <div id="add-pet-page">
        <h1>Add New Pet</h1>
        <form method="post" action="">
            <label for="pet-name-input">Name:</label>
            <input id="pet-name-input" name="pet-name-input" type="text" required value="{{ pet_name if pet_name else '' }}" />

            <label for="pet-species-input">Species:</label>
            <select id="pet-species-input" name="pet-species-input" required>
                {% for sp in species_options %}
                <option value="{{ sp }}" {% if pet_species == sp %}selected{% endif %}>{{ sp }}</option>
                {% endfor %}
            </select>

            <label for="pet-breed-input">Breed:</label>
            <input id="pet-breed-input" name="pet-breed-input" type="text" value="{{ pet_breed if pet_breed else '' }}" />

            <label for="pet-age-input">Age:</label>
            <input id="pet-age-input" name="pet-age-input" type="text" placeholder="e.g., 2 years" value="{{ pet_age if pet_age else '' }}" required />

            <label for="pet-gender-input">Gender:</label>
            <select id="pet-gender-input" name="pet-gender-input" required>
                {% for gd in gender_options %}
                <option value="{{ gd }}" {% if pet_gender == gd %}selected{% endif %}>{{ gd }}</option>
                {% endfor %}
            </select>

            <label for="pet-size-input">Size:</label>
            <select id="pet-size-input" name="pet-size-input" required>
                {% for sz in size_options %}
                <option value="{{ sz }}" {% if pet_size == sz %}selected{% endif %}>{{ sz }}</option>
                {% endfor %}
            </select>

            <label for="pet-description-input">Description:</label>
            <textarea id="pet-description-input" name="pet-description-input">{{ pet_description if pet_description else '' }}</textarea>

            <button id="submit-pet-button" type="submit">Add Pet</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
