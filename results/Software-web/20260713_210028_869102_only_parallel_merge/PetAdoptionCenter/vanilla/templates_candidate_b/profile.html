<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <div id="profile-username">Username: {{ user.username }}</div>
        <form method="post" action="">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="profile-email" type="email" required value="{{ user.email }}" />
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
