<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Adoption Application</title>
</head>
<body>
    <div id="application-page">
        <h1>Adoption Application for {{ pet.name }}</h1>
        <form method="post" action="">
            <label for="applicant-name">Full Name:</label>
            <input id="applicant-name" name="applicant-name" type="text" required value="{{ applicant_name if applicant_name else '' }}" />

            <label for="applicant-phone">Phone:</label>
            <input id="applicant-phone" name="applicant-phone" type="text" required value="{{ applicant_phone if applicant_phone else '' }}" />

            <label for="housing-type">Housing Type:</label>
            <select id="housing-type" name="housing-type">
                <option value="House" {% if housing_type == 'House' %}selected{% endif %}>House</option>
                <option value="Apartment" {% if housing_type == 'Apartment' %}selected{% endif %}>Apartment</option>
                <option value="Condo" {% if housing_type == 'Condo' %}selected{% endif %}>Condo</option>
                <option value="Other" {% if housing_type == 'Other' %}selected{% endif %}>Other</option>
            </select>

            <label for="reason">Reason for Adoption:</label>
            <textarea id="reason" name="reason" required>{{ reason if reason else '' }}</textarea>

            <button id="submit-application-button" type="submit">Submit Application</button>
        </form>
        <button id="back-to-pet" onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet Details</button>
    </div>
</body>
</html>
