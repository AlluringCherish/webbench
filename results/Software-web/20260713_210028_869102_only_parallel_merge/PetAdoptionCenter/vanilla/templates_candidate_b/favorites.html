<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>
        <div id="favorites-grid">
            {% if favorite_pets %}
                {% for pet in favorite_pets %}
                <div class="pet-card">
                    <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">{{ pet.name }} ({{ pet.species }})</a>
                </div>
                {% endfor %}
            {% else %}
                <p>No favorite pets yet.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
