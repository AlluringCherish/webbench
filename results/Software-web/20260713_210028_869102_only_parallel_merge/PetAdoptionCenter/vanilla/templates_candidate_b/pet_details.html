<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Pet Details</title>
</head>
<body>
    <div id="pet-details-page">
        <h1 id="pet-name">{{ pet.name }}</h1>
        <div id="pet-species">Species: {{ pet.species }}</div>
        <div id="pet-description">Description: {{ pet.description }}</div>
        <form method="post" action="">
            {% if in_favorites %}
            <button name="favorite_action" value="remove" type="submit">Remove from Favorites</button>
            {% else %}
            <button name="favorite_action" value="add" type="submit">Add to Favorites</button>
            {% endif %}
        </form>
        <button id="adopt-button" onclick="window.location.href='{{ url_for('adopt_pet', pet_id=pet.pet_id) }}'">Adopt</button>
        <button id="back-to-listings" onclick="window.location.href='{{ url_for('pets') }}'">Back to Listings</button>
    </div>
</body>
</html>
