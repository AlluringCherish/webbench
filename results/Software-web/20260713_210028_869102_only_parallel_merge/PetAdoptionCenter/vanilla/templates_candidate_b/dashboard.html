<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>
        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div class="pet-card">
                <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">{{ pet.name }} ({{ pet.species }})</a>
            </div>
            {% else %}
            <p>No featured pets available.</p>
            {% endfor %}
        </div>
        <button id="browse-pets-button" onclick="window.location.href='{{ url_for('pets') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Refresh Dashboard</button>
    </div>
</body>
</html>
