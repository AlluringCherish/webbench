<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
<div id="edit-article-page">
    <h1>Edit Article ID {{ article.article_id }}</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul class="flashes">
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="post">
        <label for="edit-article-title">Title:</label><br>
        <input type="text" id="edit-article-title" name="edit-article-title" value="{{ article.title }}" required><br><br>

        <label for="edit-article-content">Content:</label><br>
        <textarea id="edit-article-content" name="edit-article-content" rows="10" cols="60" required>{{ content }}</textarea><br><br>

        <button type="submit" id="save-version-button">Save New Version</button>
        <button type="button" id="cancel-edit" onclick="window.location.href='/articles/mine'">Cancel</button>
    </form>
</div>
</body>
</html>
