<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
<div id="create-article-page">
    <h1>Create New Article</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul class="flashes">
                {% for category, message in messages %}
                    <li class="{{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <form method="post">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="article-title" required><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="article-content" rows="10" cols="60" required></textarea><br><br>

        <button type="submit" id="save-draft-button">Save as Draft</button>
        <button type="button" id="cancel-button" onclick="window.location.href='/dashboard'">Cancel</button>
    </form>
</div>
</body>
</html>
