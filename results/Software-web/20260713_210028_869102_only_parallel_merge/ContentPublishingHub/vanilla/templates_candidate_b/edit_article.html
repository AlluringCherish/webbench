<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article ID {{ article.article_id }}</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
          <ul class="flashes">
            {% for category, message in messages %}
            <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
          </ul>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <label for="edit-article-title">Title:</label><br>
            <input id="edit-article-title" name="edit-article-title" type="text" value="{{ article.title }}" required><br><br>

            <label for="edit-article-content">Content:</label><br>
            <textarea id="edit-article-content" name="edit-article-content" rows="10" cols="50">{{ version.content }}</textarea><br><br>

            <button id="save-version-button" type="submit">Save New Version</button>
            <button id="cancel-edit" type="button" onclick="window.location.href='{{ url_for('my_articles') }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
