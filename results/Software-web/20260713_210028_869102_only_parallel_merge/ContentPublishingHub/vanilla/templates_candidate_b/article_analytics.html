<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="analytics-page">
        <h1>Analytics for Article ID {{ article.article_id }}</h1>

        <div id="analytics-overview">
            <p>Total Views: <span id="analytics-total-views">{{ total_views }}</span></p>
            <p>Unique Visitors: <span id="analytics-unique-visitors">{{ unique_visitors }}</span></p>
            <p>Average Time (seconds): {{ avg_time }}</p>
            <p>Total Shares: {{ total_shares }}</p>
        </div>

        <button id="back-to-article-analytics" onclick="window.location.href='{{ url_for('edit_article', article_id=article.article_id) }}'">Back to Article</button>
    </div>
</body>
</html>
