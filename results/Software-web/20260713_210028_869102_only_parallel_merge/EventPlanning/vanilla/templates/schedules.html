<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Schedules</title>
</head>
<body>
    <div id="schedules-page">
        <h1>Event Schedules</h1>
        <form method="get" action="{{ url_for('event_schedules') }}">
            <label for="schedule-filter-date">Filter by Date:</label>
            <input id="schedule-filter-date" type="date" name="date" value="{{ filter_date }}">
            <label for="schedule-filter-event">Filter by Event:</label>
            <select id="schedule-filter-event" name="event">
                <option value="">All Events</option>
                {% for event in events %}
                    <option value="{{ event.event_id }}" {% if (filter_event|int) == event.event_id %}selected{% endif %}>{{ event.event_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="schedules-timeline">
            {% if schedules %}
                <ul>
                    {% for schedule in schedules %}
                        <li>
                            <strong>{{ schedule.session_title }}</strong> <br>
                            Time: {{ schedule.session_time }} (Duration: {{ schedule.duration_minutes }} minutes)<br>
                            Speaker: {{ schedule.speaker }}<br>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No schedules found.</p>
            {% endif %}
        </div>
        <button id="export-schedule-button" type="button" onclick="alert('Export feature not implemented.')">Export Schedule</button>
    </div>
</body>
</html>
