<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events Catalog</title>
</head>
<body>
    <div id="events-page">
        <h1>Events Catalog</h1>
        <form method="get" action="{{ url_for('events_listing') }}">
            <input type="text" id="event-search-input" name="search" placeholder="Search events" value="{{ search_query }}" />
            <select id="event-category-filter" name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category }}" {% if category == category_filter %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="events-grid">
            {% if events %}
                {% for event in events %}
                    <div class="event-card">
                        <h3>{{ event.event_name }}</h3>
                        <p>{{ event.date }} at {{ event.time }}</p>
                        <p>{{ event.location }}</p>
                        <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
                    </div>
                {% endfor %}
            {% else %}
                <p>No events found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
