<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <form method="get" action="{{ url_for('venues_page') }}">
            <input type="text" id="venue-search-input" name="search" placeholder="Search venues" value="{{ search_query }}" />
            <select id="venue-capacity-filter" name="capacity">
                <option value="">All Capacities</option>
                {% for cap in capacities %}
                    <option value="{{ cap }}" {% if cap == capacity_filter %}selected{% endif %}>{{ cap }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="venues-grid">
            {% if venues %}
                {% for venue in venues %}
                    <div class="venue-card">
                        <h3>{{ venue.venue_name }}</h3>
                        <p>Capacity: {{ venue.capacity }}</p>
                        <p>Amenities: {{ venue.amenities }}</p>
                        <button id="view-venue-details-{{ venue.venue_id }}" type="button" onclick="alert('Venue details not implemented yet.')">View Details</button>
                    </div>
                {% endfor %}
            {% else %}
                <p>No venues found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
