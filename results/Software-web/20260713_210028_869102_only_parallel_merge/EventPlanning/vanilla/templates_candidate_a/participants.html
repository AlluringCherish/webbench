<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Participants Management</title>
</head>
<body>
    <div id="participants-page">
        <h1>Participants Management</h1>
        <form method="get" action="/participants">
            <input type="text" id="search-participant-input" name="search" placeholder="Search participants" value="{{ search_query }}" />
            <select id="participant-status-filter" name="status">
                <option value="">All Statuses</option>
                {% for status in status_options %}
                    <option value="{{ status }}" {% if status == status_filter %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
            <button id="add-participant-button" type="button" onclick="alert('Add Participant functionality is not implemented.')">Add Participant</button>
        </form>

        <table id="participants-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr><th>Name</th><th>Email</th><th>Event</th><th>Status</th></tr>
            </thead>
            <tbody>
                {% if participants %}
                    {% for p in participants %}
                        <tr>
                            <td>{{ p.name }}</td>
                            <td>{{ p.email }}</td>
                            <td>{{ p.event_name }}</td>
                            <td>{{ p.status }}</td>
                        </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="4">No participants found.</td></tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</body>
</html>
