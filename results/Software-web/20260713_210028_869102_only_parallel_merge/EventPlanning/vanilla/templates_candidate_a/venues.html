<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <form method="get" action="/venues">
            <input type="text" id="venue-search-input" name="search" placeholder="Search venues" value="{{ search_query }}" />
            <select id="venue-capacity-filter" name="capacity">
                <option value="">All Capacities</option>
                {% for cap in capacities %}
                    <option value="{{ cap }}" {% if cap == capacity_filter %}selected{% endif %}>{{ cap }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="venues-grid">
            {% if venues %}
                <ul>
                    {% for venue in venues %}
                    <li>
                        <strong>{{ venue.venue_name }}</strong><br/>
                        Capacity: {{ venue.capacity }}<br/>
                        Amenities: {{ venue.amenities }}<br/>
                        <button id="view-venue-details-{{ venue.venue_id }}" onclick="alert('Venue detail page not implemented')">View Details</button>
                    </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No venues found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
