<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
<div id="company-profile-page">
    <h1>{{ company.company_name }}</h1>
    <div id="company-info">
        <p>Industry: {{ company.industry }}</p>
        <p>Location: {{ company.location }}</p>
        <p>Description: {{ company.description }}</p>
    </div>
    <div id="company-jobs">
        <h2>Open Jobs</h2>
        <div id="jobs-list">
            {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <p>Status: Open</p>
                <button id="view-job-button-{{ job.job_id }}" onclick="window.location.href='{{ url_for('job_details', job_id=job.job_id) }}'">View Details</button>
            </div>
            {% endfor %}
            {% if jobs|length == 0 %}
                <p>No open jobs.</p>
            {% endif %}
        </div>
    </div>
    <button id="back-to-companies" onclick="window.location.href='{{ url_for('companies') }}'">Back to Companies</button>
</div>
</body>
</html>
