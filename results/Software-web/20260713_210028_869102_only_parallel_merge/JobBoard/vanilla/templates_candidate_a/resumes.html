<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
<div id="resume-page">
    <h1>My Resumes</h1>
    <button id="upload-resume-button" onclick="document.getElementById('resume-file-input').click();">Upload Resume</button>
    <form method="post" enctype="multipart/form-data" style="display:none;" id="upload-form">
        <input id="resume-file-input" name="resume_file_input" type="file" accept=".pdf,.doc,.docx,.txt" style="display:none;" onchange="document.getElementById('upload-form').submit();" />
        <input type="text" name="applicant_name" placeholder="Applicant Name" required />
        <input type="email" name="applicant_email" placeholder="Applicant Email" required />
        <input type="text" name="summary" placeholder="Summary (optional)" />
    </form>

    <div id="resumes-list">
        {% for resume in resumes %}
            <div class="resume-card">
                <p>Filename: {{ resume.filename }}</p>
                <p>Uploaded on: {{ resume.upload_date }}</p>
                <p>Summary: {{ resume.summary }}</p>
                <form method="post" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}">
                    <button id="delete-resume-button-{{ resume.resume_id }}" type="submit">Delete</button>
                </form>
            </div>
        {% endfor %}
        {% if resumes|length == 0 %}
            <p>No resumes uploaded.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
<script>
// To show the hidden file input with required applicant info, changed form style to visible on button click
const uploadButton = document.getElementById('upload-resume-button');
const uploadForm = document.getElementById('upload-form');
const fileInput = document.getElementById('resume-file-input');
uploadButton.addEventListener('click', function (e) {
    e.preventDefault();
    if (uploadForm.style.display === 'none' || uploadForm.style.display === '') {
        uploadForm.style.display = 'block';
    } else {
        uploadForm.style.display = 'none';
    }
});
</script>
</body>
</html>
