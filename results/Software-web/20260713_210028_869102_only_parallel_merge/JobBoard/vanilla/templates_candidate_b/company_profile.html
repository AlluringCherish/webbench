<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
<div id="company-profile-page">
    <h1>{{ company.company_name }}</h1>
    <div id="company-info">
        <div><strong>Industry:</strong> {{ company.industry }}</div>
        <div><strong>Location:</strong> {{ company.location }}</div>
        <div><strong>Description:</strong> {{ company.description }}</div>
    </div>
    <div id="company-jobs">
        <h2>Open Jobs</h2>
        <div id="jobs-list">
            {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <div>Status: {{ job.status }}</div>
                <button id="view-job-button-{{ job.job_id }}" onclick="location.href='{{ url_for('job_details', job_id=job.job_id) }}'">View Details</button>
            </div>
            {% else %}
            <p>No open jobs available.</p>
            {% endfor %}
        </div>
    </div>
    <button id="back-to-companies" onclick="location.href='{{ url_for('companies') }}'">Back to Companies</button>
</div>
</body>
</html>
