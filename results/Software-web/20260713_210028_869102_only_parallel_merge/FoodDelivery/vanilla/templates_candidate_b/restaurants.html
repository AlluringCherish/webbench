<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Browse Restaurants</title>
</head>
<body>
  <div id="restaurants-page">
    <h1>Browse Restaurants</h1>
    <form method="get" action="{{ url_for('restaurants') }}">
      <input type="text" id="search-input" name="search_query" placeholder="Search by name or cuisine" value="{{ search_query }}" />
      <select id="cuisine-filter" name="cuisine_filter">
        <option value="all" {% if cuisine_filter == 'all' %}selected{% endif %}>All</option>
        <option value="chinese" {% if cuisine_filter == 'chinese' %}selected{% endif %}>Chinese</option>
        <option value="italian" {% if cuisine_filter == 'italian' %}selected{% endif %}>Italian</option>
        <option value="indian" {% if cuisine_filter == 'indian' %}selected{% endif %}>Indian</option>
        <option value="american" {% if cuisine_filter == 'american' %}selected{% endif %}>American</option>
      </select>
      <button type="submit">Filter</button>
    </form>
    <div id="restaurants-grid">
      {% for r in restaurants %}
        <div class="restaurant-card">
          <h3>{{ r.name }}</h3>
          <p>Cuisine: {{ r.cuisine }}</p>
          <p>Rating: {{ r.rating }}</p>
          <p>Delivery Time: {{ r.delivery_time }} minutes</p>
          <button id="view-restaurant-button-{{ r.restaurant_id }}" onclick="location.href='{{ url_for('restaurant_menu', id=r.restaurant_id) }}'">View Menu</button>
        </div>
      {% else %}
        <p>No restaurants found.</p>
      {% endfor %}
    </div>
  </div>
</body>
</html>
