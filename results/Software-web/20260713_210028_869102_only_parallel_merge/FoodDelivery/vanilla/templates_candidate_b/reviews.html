<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order Reviews</title>
</head>
<body>
  <div id="reviews-page">
    <h1>Order Reviews</h1>
    <form method="get" action="{{ url_for('reviews') }}">
      <label for="filter-by-rating">Filter by Rating:</label>
      <select id="filter-by-rating" name="rating_filter" onchange="this.form.submit()">
        <option value="all" {% if rating_filter == 'all' %}selected{% endif %}>All</option>
        <option value="5" {% if rating_filter == '5' %}selected{% endif %}>5 stars</option>
        <option value="4" {% if rating_filter == '4' %}selected{% endif %}>4 stars</option>
        <option value="3" {% if rating_filter == '3' %}selected{% endif %}>3 stars</option>
        <option value="2" {% if rating_filter == '2' %}selected{% endif %}>2 stars</option>
        <option value="1" {% if rating_filter == '1' %}selected{% endif %}>1 star</option>
      </select>
    </form>
    <div id="reviews-list">
      {% for r in reviews %}
        <div class="review-card">
          <p><strong>{{ r.restaurant_name }}</strong> - Rating: {{ r.rating }}</p>
          <p>{{ r.review_text }}</p>
          <p><em>By {{ r.customer_name }} on {{ r.review_date }}</em></p>
        </div>
      {% else %}
        <p>No reviews found.</p>
      {% endfor %}
    </div>
    <button id="write-review-button" onclick="window.open('/write-review', '_blank')">Write Review</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
