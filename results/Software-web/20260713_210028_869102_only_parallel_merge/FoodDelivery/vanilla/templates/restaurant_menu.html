<!DOCTYPE html>
<html lang="en">
<head>
    <title>Restaurant Menu</title>
</head>
<body>
<div id="menu-page">
    <h1 id="restaurant-name">{{ restaurant.name }}</h1>
    <div id="restaurant-info">
        <p>Address: {{ restaurant.address }}</p>
        <p>Phone: {{ restaurant.phone }}</p>
        <p>Rating: {{ restaurant.rating }}</p>
    </div>
    <div id="menu-items-grid">
        {% for item in menu_items %}
            <div class="menu-item">
                <h3>{{ item.item_name }}</h3>
                <p>{{ item.description }}</p>
                <p>Price: ${{ '%.2f'|format(item.price) }}</p>
                <form method="post" action="{{ url_for('item_details', item_id=item.item_id) }}"> 
                  <input type="hidden" name="quantity" value="1" />
                  <button type="submit" id="add-to-cart-button-{{ item.item_id }}">Add to Cart</button>
                </form>
                <button id="view-item-details-{{ item.item_id }}" onclick="window.location='{{ url_for('item_details', item_id=item.item_id) }}'">View Details</button>
            </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
