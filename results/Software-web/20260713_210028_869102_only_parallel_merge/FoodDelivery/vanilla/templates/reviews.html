<!DOCTYPE html>
<html lang="en">
<head>
    <title>Order Reviews</title>
</head>
<body>
<div id="reviews-page">
    <h1>Order Reviews</h1>
    <form method="get" action="{{ url_for('reviews') }}">
        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating" onchange="this.form.submit()">
            {% for rating_opt in ratings %}
                <option value="{{ rating_opt }}" {% if rating_filter == rating_opt %}selected{% endif %}>{{ rating_opt }}</option>
            {% endfor %}
        </select>
    </form>
    <div id="reviews-list">
        {% for review in reviews %}
            <div class="review">
                <p>Restaurant: {{ review.restaurant_name }}</p>
                <p>Rating: {{ review.rating }}</p>
                <p>{{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
            </div>
        {% endfor %}
    </div>
    <button id="write-review-button" onclick="window.location='/write-review'">Write Review</button>
    <button id="back-to-dashboard" onclick="window.location='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
