<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shopping Cart</title>
</head>
<body>
<div id="cart-page">
    <h1>Shopping Cart</h1>
    <form method="post" action="{{ url_for('shopping_cart') }}">
        <table id="cart-items-table" border="1">
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Subtotal</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.item_name }}</td>
                    <td>
                        <input id="update-quantity-{{ item.item_id }}" type="number" name="quantity_{{ item.item_id }}" value="{{ item.quantity }}" min="1" />
                    </td>
                    <td>${{ '%.2f'|format(item.price) }}</td>
                    <td>${{ '%.2f'|format(item.subtotal) }}</td>
                    <td><button id="remove-item-button-{{ item.item_id }}" name="remove_item_id" value="{{ item.item_id }}" type="submit">Remove</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <div id="total-amount">
            Total Amount: ${{ '%.2f'|format(total_amount) }}
        </div>
        <button id="proceed-checkout-button" type="button" onclick="window.location='{{ url_for('checkout') }}'">Proceed to Checkout</button>
    </form>
</div>
</body>
</html>
