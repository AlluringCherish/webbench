<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="dashboard-page">
    <h1>{{ page_title }}</h1>

    <div id="featured-auctions">
        {% if featured_auctions %}
            <ul>
                {% for auction in featured_auctions %}
                    <li>
                        <strong>{{ auction.item_name }}</strong> - Current Bid: ${{ '%.2f'|format(auction.current_bid) }}
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No featured auctions available.</p>
        {% endif %}
    </div>

    <button id="browse-auctions-button" onclick="window.location.href='{{ url_for('catalog') }}'">Browse Auctions</button>
    <button id="view-bids-button" onclick="window.location.href='{{ url_for('bid_history') }}'">View Bids</button>
    <button id="trending-auctions-button" onclick="window.location.href='{{ url_for('trending') }}'">Trending Auctions</button>
</div>
</body>
</html>
