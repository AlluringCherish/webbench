<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="place-bid-page">
    <h1>{{ page_title }}</h1>

    {% if error %}
    <p style="color:red;" id="error-message">{{ error }}</p>
    {% endif %}

    <div id="auction-name">{{ auction.item_name }}</div>
    <div id="minimum-bid">Minimum Bid: ${{ '%.2f'|format(minimum_bid) }}</div>

    <form method="post">
        <label for="bidder-name">Bidder Name:</label>
        <input id="bidder-name" name="bidder_name" type="text" value="{{ bidder_name|default('') }}" required />

        <label for="bid-amount">Bid Amount:</label>
        <input id="bid-amount" name="bid_amount" type="number" step="0.01" value="{{ bid_amount|default('') }}" required />

        <button id="submit-bid-button" type="submit">Submit Bid</button>
    </form>
</div>
</body>
</html>
