<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="categories-page">
    <h1>{{ page_title }}</h1>

    <div id="categories-list">
        {% if categories %}
            {% for category in categories %}
                <div id="category-card-{{ category.category_id }}">
                    <h3>{{ category.category_name }}</h3>
                    <p>{{ category.description }}</p>
                    <p>Items: {{ category.item_count }}</p>
                    <button id="view-category-button-{{ category.category_id }}" onclick="window.location.href='{{ url_for('catalog', category_id=category.category_id) }}'">View Items</button>
                </div>
            {% endfor %}
        {% else %}
            <p>No categories available.</p>
        {% endif %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
