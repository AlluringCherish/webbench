<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>
        <form method="get" action="{{ url_for('catalog') }}">
            <input id="search-input" name="search" type="text" placeholder="Search auctions..." value="{{ search }}" />
            <select id="category-filter" name="category_id">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_id }}" {% if category_filter == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="auctions-grid">
            {% if auctions %}
                {% for auction in auctions %}
                <div class="auction-card">
                    <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}" />
                    <h3>{{ auction.item_name }}</h3>
                    <p>Current Bid: ${{ auction.current_bid }}</p>
                    <p>Time Remaining: {{ auction.end_time }}</p>
                    <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Details</button>
                </div>
                {% endfor %}
            {% else %}
                <p>No auctions found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
