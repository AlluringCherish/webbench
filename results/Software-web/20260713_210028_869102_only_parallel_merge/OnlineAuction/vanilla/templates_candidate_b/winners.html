<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>
        <label for="filter-by-winner">Filter by winner:</label>
        <input id="filter-by-winner" type="text" name="filter_name" value="{{ filter_name }}" onchange="window.location.href='{{ url_for('winners') }}?filter_name='+this.value" />
        <div id="winners-list">
            {% if winners %}
                {% for winner in winners %}
                <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                    <h3>{{ winner.item_name }}</h3>
                    <p>Winner: {{ winner.winner_name }}</p>
                    <p>Winning Bid: ${{ '%.2f'|format(winner.winning_bid) }}</p>
                    <p>Win Date: {{ winner.win_date }}</p>
                </div>
                {% endfor %}
            {% else %}
                <p>No winning items found.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
