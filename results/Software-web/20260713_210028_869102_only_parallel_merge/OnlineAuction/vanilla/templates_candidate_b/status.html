<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>
        <form method="get" action="{{ url_for('auction_status') }}">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status" onchange="this.form.submit()">
                {% for option in ['All', 'Active', 'Closed', 'Upcoming'] %}
                <option value="{{ option }}" {% if status_filter == option %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
            <button id="refresh-status-button" type="submit">Refresh</button>
        </form>
        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Time Remaining</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% if auctions %}
                    {% for auction in auctions %}
                    <tr>
                        <td>{{ auction.item_name }}</td>
                        <td>{{ auction.status }}</td>
                        <td>{{ auction.time_remaining }}</td>
                        <td>${{ auction.current_bid }}</td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="4">No auctions to display.</td></tr>
                {% endif %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
