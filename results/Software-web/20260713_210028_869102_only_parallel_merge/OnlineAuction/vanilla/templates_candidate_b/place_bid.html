<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid</h1>
        {% if error %}
            <div style="color: red;">{{ error }}</div>
        {% endif %}
        <form method="post" action="">
            <label for="bidder-name">Bidder Name:</label>
            <input id="bidder-name" name="bidder_name" type="text" value="" required />
            <br />
            <label for="bid-amount">Bid Amount:</label>
            <input id="bid-amount" name="bid_amount" type="number" step="0.01" min="{{ minimum_bid }}" value="{{ minimum_bid }}" required />
            <br />
            <div id="auction-name">{{ auction.item_name }}</div>
            <div id="minimum-bid">Minimum Bid: ${{ '%.2f'|format(minimum_bid) }}</div>
            <br />
            <button id="submit-bid-button" type="submit">Submit Bid</button>
        </form>
    </div>
</body>
</html>
