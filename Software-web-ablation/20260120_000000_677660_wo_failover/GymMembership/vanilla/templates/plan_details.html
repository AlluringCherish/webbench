<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">Price: {{ plan.price }} ({{ plan.billing_cycle }})</div>
        <div id="plan-features">Features: {{ plan.features }}</div>

        <button id="enroll-plan-button">Enroll in Plan</button>

        <div id="plan-reviews">
            <h2>Member Reviews</h2>
            <ul>
                {% for review in reviews %}
                    <li><strong>{{ review.member_name }}:</strong> {{ review.review_text }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
