<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">{{ trainer.bio }}</div>
        <div id="trainer-certifications">Certifications: {{ trainer.certifications }}</div>

        <a href="{{ url_for('pt_booking') }}?trainer_id={{ trainer.trainer_id }}">
            <button id="book-session-button">Book Session</button>
        </a>

        <div id="trainer-reviews">
            <h2>Client Reviews</h2>
            <ul>
                {% for review in reviews %}
                    <li><strong>{{ review.client_name }}:</strong> {{ review.review_text }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
