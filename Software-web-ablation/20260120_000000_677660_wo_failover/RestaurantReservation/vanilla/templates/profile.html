<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div id="profile-username">Username: {{ user_profile.username }}</div>
        {% if error %}
        <div id="error-message" style="color: red;">{{ error }}</div>
        {% endif %}
        <form method="POST" action="">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ user_profile.email }}" required>

            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
