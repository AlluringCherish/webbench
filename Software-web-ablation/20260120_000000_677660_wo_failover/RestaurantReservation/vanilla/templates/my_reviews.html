<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <h3>{{ review.dish_name }} ({{ review.review_date }})</h3>
                <div>Rating: {{ review.rating }}/5</div>
                <div>{{ review.review_text }}</div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
