<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dish Details</title>
</head>
<body>
    <div id="dish-details-page">
        {% if dish %}
        <h1 id="dish-name">{{ dish.name }}</h1>
        <div id="dish-price">Price: ${{ "%.2f"|format(dish.price) }}</div>
        <div>Category: {{ dish.category }}</div>
        <div>Description: {{ dish.description }}</div>
        <div>Ingredients: {{ dish.ingredients }}</div>
        <div>Dietary: {{ dish.dietary }}</div>
        <div>Average Rating: {{ "%.1f"|format(dish.avg_rating) }}</div>

        <button id="back-to-menu" onclick="location.href='{{ url_for('menu') }}'">Back to Menu</button>
        {% else %}
        <h1>Dish not found.</h1>
        <button id="back-to-menu" onclick="location.href='{{ url_for('menu') }}'">Back to Menu</button>
        {% endif %}
    </div>
</body>
</html>
