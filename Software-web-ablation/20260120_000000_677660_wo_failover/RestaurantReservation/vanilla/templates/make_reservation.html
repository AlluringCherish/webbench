<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <div id="reservation-page">
        {% if error %}
        <div id="error-message" style="color: red;">{{ error }}</div>
        {% endif %}
        <form method="POST" action="">
            <label for="guest-name">Guest Name:</label>
            <input type="text" id="guest-name" name="guest_name" required value="{{ request.form.guest_name if request.method == 'POST' else '' }}">

            <label for="party-size">Party Size:</label>
            <select id="party-size" name="party_size" required>
                {% for i in range(1, 11) %}
                <option value="{{ i }}" {% if request.method == 'POST' and request.form.party_size == i|string %}selected{% endif %}>{{ i }}</option>
                {% endfor %}
            </select>

            <label for="reservation-date">Reservation Date:</label>
            <input type="date" id="reservation-date" name="reservation_date" required value="{{ request.form.reservation_date if request.method == 'POST' else '' }}">

            <button type="submit" id="submit-reservation-button">Submit Reservation</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
