<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders-page">
            <h1>Active Orders</h1>

            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter">
                <option value="">All</option>
                {% set statuses = [] %}
                {% for order in active_orders %}
                    {% if order.status not in statuses %}
                        {% do statuses.append(order.status) %}
                    {% endif %}
                {% endfor %}
                {% for status in statuses %}
                <option value="{{ status }}">{{ status }}</option>
                {% endfor %}
            </select>

            <div id="orders-list">
                {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Restaurant: {{ order.restaurant_name }}</p>
                    <p>Status: {{ order.status }}</p>
                    <p>ETA: {{ order.eta }}</p>
                    <a href="{{ url_for('track_order', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
                {% endfor %}
            </div>

            <a href="{{ url_for('dashboard') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
