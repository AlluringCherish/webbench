<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="main-container">
        <div id="cart-page">
            <h1>Shopping Cart</h1>
            <form method="POST" action="{{ url_for('update_cart') }}">
                <table id="cart-items-table" border="1">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Subtotal</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in cart_items %}
                        <tr>
                            <td>{{ item.item_name }}</td>
                            <td><input id="update-quantity-{{ item.item_id }}" type="number" name="quantity_{{ item.item_id }}" value="{{ item.quantity }}" min="1" /></td>
                            <td>${{ "%.2f"|format(item.price) }}</td>
                            <td>${{ "%.2f"|format(item.subtotal) }}</td>
                            <td>
                                <form method="POST" action="{{ url_for('remove_cart_item', item_id=item.item_id) }}" style="display:inline;">
                                    <button id="remove-item-button-{{ item.item_id }}" type="submit">Remove</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <div id="total-amount">
                    Total: ${{ "%.2f"|format(cart_items|sum(attribute='subtotal')) }}
                </div>

                <a href="{{ url_for('checkout') }}">
                    <button id="proceed-checkout-button" type="button">Proceed to Checkout</button>
                </a>

                <button type="submit">Update Quantities</button>
            </form>
        </div>
    </div>
</body>
</html>
