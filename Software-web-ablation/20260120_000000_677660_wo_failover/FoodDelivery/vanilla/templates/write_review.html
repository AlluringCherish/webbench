<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="main-container">
        <div id="write-review-page">
            <h1>Write Review</h1>
            <form method="POST" action="{{ url_for('submit_review') }}">
                <label for="restaurants-list">Select Restaurant:</label><br>
                <select id="restaurants-list" name="restaurant_id" required>
                    {% for restaurant in restaurants %}
                    <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                    {% endfor %}
                </select><br><br>

                <label for="customer-name-input">Your Name:</label><br>
                <input id="customer-name-input" name="customer_name" type="text" required /><br><br>

                <label for="rating-input">Rating:</label><br>
                <select id="rating-input" name="rating" required>
                    {% for i in range(1,6) %}
                    <option value="{{ i }}">{{ i }}</option>
                    {% endfor %}
                </select><br><br>

                <label for="review-text-input">Review:</label><br>
                <textarea id="review-text-input" name="review_text" required></textarea><br><br>

                <button id="submit-review-button" type="submit">Submit Review</button>
            </form>
        </div>
    </div>
</body>
</html>
