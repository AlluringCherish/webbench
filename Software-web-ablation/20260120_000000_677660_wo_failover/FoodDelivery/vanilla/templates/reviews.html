<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>

            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating">
                <option value="">All Ratings</option>
                {% set ratings = [1,2,3,4,5] %}
                {% for rating in ratings %}
                <option value="{{ rating }}">{{ rating }}</option>
                {% endfor %}
            </select>

            <div id="reviews-list">
                {% for review in reviews %}
                <div class="review-card">
                    <p>Restaurant: {{ review.restaurant_name }}</p>
                    <p>Customer: {{ review.customer_name }}</p>
                    <p>Rating: {{ review.rating }}</p>
                    <p>Review: {{ review.review_text }}</p>
                    <p>Date: {{ review.review_date }}</p>
                </div>
                {% endfor %}
            </div>

            <a href="{{ url_for('write_review') }}">
                <button id="write-review-button">Write Review</button>
            </a>

            <a href="{{ url_for('dashboard') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
