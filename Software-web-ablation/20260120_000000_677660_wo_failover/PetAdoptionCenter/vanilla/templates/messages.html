<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>

        <div id="conversation-list">
            {% for conversation in conversations %}
            <div id="conversation-{{ loop.index }}">
                <div>With: {{ conversation.interlocutor }}</div>
                <div>Last Message: {{ conversation.last_message }}</div>
            </div>
            {% endfor %}
        </div>

        <form method="post" action="{{ url_for('send_message') }}">
            <label for="recipient-username">Recipient Username:</label>
            <input type="text" id="recipient-username" name="recipient_username" required />

            <label for="subject">Subject:</label>
            <input type="text" id="subject" name="subject" required />

            <label for="message-input">Message:</label>
            <textarea id="message-input" name="content" required></textarea>

            <button type="submit" id="send-message-button">Send Message</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
