<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>

        <form method="get" action="{{ url_for('my_applications') }}">
            <label for="filter-status">Status Filter:</label>
            <select id="filter-status" name="filter_status">
                <option value="">All</option>
                <option value="Pending" {% if filter_status == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Approved" {% if filter_status == 'Approved' %}selected{% endif %}>Approved</option>
                <option value="Rejected" {% if filter_status == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Application ID</th>
                    <th>Pet Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
            {% for application in applications %}
                <tr id="application-{{ application.application_id }}">
                    <td>{{ application.application_id }}</td>
                    <td>{{ application.pet_name }}</td>
                    <td>{{ application.date }}</td>
                    <td>{{ application.status }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
