<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Details</title>
</head>
<body>
    <div id="pet-details-page">
        <h1 id="pet-name">{{ pet.name }}</h1>

        <div id="pet-species">Species: {{ pet.species }}</div>
        <div id="pet-description">Description: {{ pet.description }}</div>

        <div id="pet-age">Age: {{ pet.age }}</div>
        <div id="pet-gender">Gender: {{ pet.gender }}</div>

        <div id="shelter-info">
            <h2>Shelter Information</h2>
            <div id="shelter-name">Name: {{ shelter.name }}</div>
            <div id="shelter-address">Address: {{ shelter.address }}</div>
            <div id="shelter-phone">Phone: {{ shelter.phone }}</div>
            <div id="shelter-email">Email: {{ shelter.email }}</div>
        </div>

        <button id="adopt-button" onclick="location.href='{{ url_for('adoption_application', pet_id=pet.id) }}'">Adopt</button>
        <button id="back-to-listings" onclick="location.href='{{ url_for('pet_listings') }}'">Back to Listings</button>
    </div>
</body>
</html>
