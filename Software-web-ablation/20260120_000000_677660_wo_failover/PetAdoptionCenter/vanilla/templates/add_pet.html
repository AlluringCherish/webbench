<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
    <div id="add-pet-page">
        <h1>Add New Pet</h1>

        <form method="post" action="{{ url_for('submit_pet') }}">
            <label for="pet-name-input">Name:</label>
            <input type="text" id="pet-name-input" name="name" required />

            <label for="pet-species-input">Species:</label>
            <select id="pet-species-input" name="species" required>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Bird">Bird</option>
                <option value="Rabbit">Rabbit</option>
                <option value="Other">Other</option>
            </select>

            <label for="pet-breed-input">Breed:</label>
            <input type="text" id="pet-breed-input" name="breed" />

            <label for="pet-age-input">Age:</label>
            <input type="text" id="pet-age-input" name="age" />

            <label for="pet-gender-input">Gender:</label>
            <select id="pet-gender-input" name="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Unknown">Unknown</option>
            </select>

            <label for="pet-size-input">Size:</label>
            <select id="pet-size-input" name="size">
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
                <option value="Extra Large">Extra Large</option>
            </select>

            <label for="pet-description-input">Description:</label>
            <textarea id="pet-description-input" name="description"></textarea>

            <button type="submit" id="submit-pet-button">Add Pet</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
