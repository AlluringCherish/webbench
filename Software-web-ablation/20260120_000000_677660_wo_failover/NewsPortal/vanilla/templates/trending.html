<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Articles</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Articles</h1>
        <form method="POST" action="{{ url_for('filter_trending') }}">
            <label for="time-period-filter">Time Period:</label>
            <select id="time-period-filter" name="time_period">
                {% for period in time_periods %}
                <option value="{{ period }}">{{ period }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="trending-list">
            {% for article in trending_articles %}
                <div class="trending-item">
                    <span>{{ article.article_title }} (Category: {{ article.category }}) - Views: {{ article.view_count }}</span>
                    <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details_page', article_id=article.article_id) }}'">View Article</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
