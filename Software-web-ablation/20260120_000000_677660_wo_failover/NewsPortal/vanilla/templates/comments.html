<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Comments</title>
</head>
<body>
    <div id="comments-page">
        <h1>Article Comments</h1>
        <form method="POST" action="{{ url_for('filter_comments') }}">
            <label for="filter-by-article">Filter by Article:</label>
            <select id="filter-by-article" name="article_id">
                <option value="">All Articles</option>
                {% for article in articles %}
                    <option value="{{ article.article_id }}">{{ article.title }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="comments-list">
            {% for comment in comments %}
                <div class="comment-item">
                    <strong>{{ comment.commenter_name }}</strong> on <em>{{ comment.article_title }}</em> ({{ comment.comment_date }}):
                    <p>{{ comment.comment_text }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="write-comment-button" onclick="location.href='{{ url_for('write_comment_page') }}'">Write a Comment</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
