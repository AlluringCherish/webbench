<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
</head>
<body>
    <div id="bookmarks-page">
        <h1>My Bookmarks</h1>
        <div id="bookmarks-list">
            {% for bookmark in bookmarks %}
                <div class="bookmark-item">
                    <span>{{ bookmark.article_title }} (Bookmarked on {{ bookmark.bookmarked_date }})</span>
                    <form method="POST" action="{{ url_for('remove_bookmark', bookmark_id=bookmark.bookmark_id) }}" style="display:inline;">
                        <button type="submit" id="remove-bookmark-button-{{ bookmark.bookmark_id }}">Remove</button>
                    </form>
                    <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('article_details_page', article_id=bookmark.article_id) }}'">Read</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
