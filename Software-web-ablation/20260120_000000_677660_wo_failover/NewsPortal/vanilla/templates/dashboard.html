<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News Portal</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>News Portal</h1>

        <div id="featured-articles">
            <h2>Featured Articles</h2>
            <ul>
            {% for article in featured_articles %}
                <li>{{ article.title }} by {{ article.author }} ({{ article.date }})</li>
            {% endfor %}
            </ul>
        </div>

        <button id="browse-articles-button" onclick="location.href='{{ url_for('article_catalog_page') }}'">Browse Articles</button>
        <button id="view-bookmarks-button" onclick="location.href='{{ url_for('bookmarks_page') }}'">View Bookmarks</button>
        <button id="trending-articles-button" onclick="location.href='{{ url_for('trending_articles_page') }}'">Trending Articles</button>
    </div>
</body>
</html>
