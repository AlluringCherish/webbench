<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>

        <form method="POST" action="{{ url_for('sort_category_articles', category_name=category_name) }}">
            <button type="submit" id="sort-by-date" name="sort_method" value="date">Sort by Date</button>
            <button type="submit" id="sort-by-popularity" name="sort_method" value="popularity">Sort by Popularity</button>
        </form>

        <div id="category-articles">
            {% for article in articles %}
                <div class="category-article-item">
                    <h3>{{ article.title }}</h3>
                    <p>{{ article.date }}, Views: {{ article.views }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
