<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>

        <div id="featured-movies">
            {% for movie in featured_movies %}
            <div class="featured-movie">
                <img src="{{ movie.poster }}" alt="{{ movie.title }} poster" />
                <div>{{ movie.title }}</div>
                <div>Rating: {{ movie.rating }}</div>
            </div>
            {% endfor %}
        </div>

        <button id="browse-movies-button" onclick="location.href='{{ url_for('movie_catalog') }}'">Browse Movies</button>

        <button id="view-bookings-button" onclick="location.href='{{ url_for('booking_history') }}'">View Bookings</button>

        <button id="showtimes-button" onclick="location.href='{{ url_for('showtime_selection', movie_id=0) }}'">Showtimes</button>
        <!-- Note: specification says alternatively leads to showtimes page root or allow movie selection if needed. Here choose to use movie_id=0 to go to showtimes page with no movie selected -->
    </div>
</body>
</html>
