<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Showtime</title>
</head>
<body>
    <div id="showtime-page">
        <h1>Select Showtime</h1>

        <select id="theater-filter">
            <option value="">All Theaters</option>
            {% for theater in theaters %}
                <option value="{{ theater.theater_id }}">{{ theater.theater_name }}</option>
            {% endfor %}
        </select>

        <input id="date-filter" type="date" />

        <div id="showtimes-list">
            {% for showtime in showtimes %}
            <div class="showtime-item">
                <div>Theater: {{ showtime.theater_name }}</div>
                <div>Date: {{ showtime.showtime_date }}</div>
                <div>Time: {{ showtime.showtime_time }}</div>
                <div>Price: ${{ "%.2f"|format(showtime.price) }}</div>
                <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Select</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
