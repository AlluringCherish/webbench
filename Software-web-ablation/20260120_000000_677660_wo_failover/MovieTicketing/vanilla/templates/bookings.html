<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking History</title>
</head>
<body>
    <div id="bookings-page">
        <h1>Booking History</h1>

        <select id="status-filter">
            <option value="">All Statuses</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Pending">Pending</option>
        </select>

        <table id="bookings-table" border="1">
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Movie</th>
                    <th>Date</th>
                    <th>Seats</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr>
                    <td>{{ booking.booking_id }}</td>
                    <td>{{ booking.movie }}</td>
                    <td>{{ booking.date }}</td>
                    <td>{% for seat in booking.seats %}{{ seat }}{% if not loop.last %}, {% endif %}{% endfor %}</td>
                    <td>{{ booking.status }}</td>
                    <td>
                        <button id="view-booking-button-{{ booking.booking_id }}" onclick="location.href='{{ url_for('view_booking_details', booking_id=booking.booking_id) }}'">View Details</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
