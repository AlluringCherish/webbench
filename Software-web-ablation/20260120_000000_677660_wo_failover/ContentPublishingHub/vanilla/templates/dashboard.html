<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ContentPublishingHub</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>
        <p>Welcome, {{ username }}!</p>
        <nav id="dashboard-nav">
            <ul>
                <li><a href="{{ url_for('create_article') }}" id="nav-create-article">Create New Article</a></li>

                <li><a href="{{ url_for('published_articles') }}" id="nav-published-articles">Published Articles</a></li>

                <li><a href="{{ url_for('article_analytics', article_id=0) }}" id="nav-article-analytics">Article Analytics</a> <!-- example link, replace 0 with valid article_id -->

            </ul>
        </nav>
    </div>

</html>
