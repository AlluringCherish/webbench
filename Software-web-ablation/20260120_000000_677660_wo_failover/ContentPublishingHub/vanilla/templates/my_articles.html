<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>
        <nav id="filter-nav">
            <form id="status-filter-form" method="GET" action="{{ url_for('my_articles') }}">
                <label for="status-filter">Filter by status:</label>
                <select name="status" id="status-filter" onchange="this.form.submit()">
                    <option value="" {% if not status_filter %}selected{% endif %}>All</option>
                    <option value="draft" {% if status_filter == 'draft' %}selected{% endif %}>Draft</option>
                    <option value="pending_review" {% if status_filter == 'pending_review' %}selected{% endif %}>Pending Review</option>
                    <option value="under_review" {% if status_filter == 'under_review' %}selected{% endif %}>Under Review</option>
                    <option value="approved" {% if status_filter == 'approved' %}selected{% endif %}>Approved</option>
                    <option value="rejected" {% if status_filter == 'rejected' %}selected{% endif %}>Rejected</option>
                </select>
            </form>
        </nav>
        <table id="my-articles-list" border="1">
            <thead>
                <tr>
                    <th>Article ID</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Last Modified</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td id="article-id-{{ article.article_id }}">{{ article.article_id }}</td>
                    <td id="article-title-{{ article.article_id }}">{{ article.title }}</td>
                    <td id="article-status-{{ article.article_id }}">{{ article.status }}</td>
                    <td id="article-last-modified-{{ article.article_id }}">{{ article.last_modified }}</td>
                    <td>
                        <a href="{{ url_for('edit_article', article_id=article.article_id) }}" id="btn-edit-article-{{ article.article_id }}">Edit</a>
                        <a href="{{ url_for('version_history', article_id=article.article_id) }}" id="btn-version-history-{{ article.article_id }}">Version History</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">No articles found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
