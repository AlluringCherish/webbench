<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>
        <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ request.form.title if request.method == 'POST' else '' }}" required><br>
            {% if errors and errors.get('title') %}
                <span style="color:red;" id="error-title">{{ errors.get('title') }}</span><br>
            {% endif %}

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="15" cols="80" required>{{ request.form.content if request.method == 'POST' else '' }}</textarea><br>
            {% if errors and errors.get('content') %}
                <span style="color:red;" id="error-content">{{ errors.get('content') }}</span><br>
            {% endif %}

            <button type="submit" id="submit-create-article">Submit</button>
            <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
        </form>
    </div>
</body>
</html>
