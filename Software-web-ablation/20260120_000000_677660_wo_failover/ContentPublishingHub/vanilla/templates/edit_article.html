<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article - {{ article.title }}</h1>
        <form id="edit-article-form" method="POST" action="{{ url_for('edit_article', article_id=article_id) }}">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" required><br>
            {% if errors and errors.get('title') %}
                <span style="color:red;" id="error-title">{{ errors.get('title') }}</span><br>
            {% endif %}

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="15" cols="80" required>{{ current_version.content }}</textarea><br>
            {% if errors and errors.get('content') %}
                <span style="color:red;" id="error-content">{{ errors.get('content') }}</span><br>
            {% endif %}

            <button type="submit" id="submit-edit-article">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
            <a href="{{ url_for('version_history', article_id=article_id) }}" id="btn-view-version-history">View Version History</a>
        </form>
    </div>
</body>
</html>
