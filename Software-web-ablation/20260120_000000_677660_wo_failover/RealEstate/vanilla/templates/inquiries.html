<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Inquiries</title>
</head>
<body>
    <div id="inquiries-page">
        <h1>My Inquiries</h1>

        <form method="GET" action="{{ url_for('my_inquiries') }}">
            <label for="inquiry-status-filter">Filter by Status:</label>
            <select id="inquiry-status-filter" name="status">
                <option value="">All</option>
                {% set statuses = ['Pending', 'Contacted', 'Resolved'] %}
                {% for status in statuses %}
                    <option value="{{ status }}" {% if request.args.get('status') == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <table id="inquiries-table" border="1">
            <thead>
                <tr>
                    <th>Property</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Message</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for inquiry in inquiries %}
                <tr>
                    <td>{{ inquiry.property_id }}</td>
                    <td>{{ inquiry.customer_name }}</td>
                    <td>{{ inquiry.customer_email }}</td>
                    <td>{{ inquiry.customer_phone }}</td>
                    <td>{{ inquiry.message }}</td>
                    <td>{{ inquiry.inquiry_date }}</td>
                    <td>{{ inquiry.status }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('delete_inquiry', inquiry_id=inquiry.inquiry_id) }}" style="display:inline;">
                            <button id="delete-inquiry-button-{{ inquiry.inquiry_id }}" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>

    </div>
</body>
</html>
