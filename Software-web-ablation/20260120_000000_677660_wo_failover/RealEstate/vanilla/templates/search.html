<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Property Search</h1>

        <form method="POST" action="{{ url_for('property_search_post') }}">
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location_input" value="{{ filter_options.selected_location }}">

            <label for="price-range-min">Price Min:</label>
            <input type="number" id="price-range-min" name="price_range_min" value="{{ filter_options.price_min }}">

            <label for="price-range-max">Price Max:</label>
            <input type="number" id="price-range-max" name="price_range_max" value="{{ filter_options.price_max }}">

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type_filter">
                <option value="">Any</option>
                {% set property_types = ["House", "Apartment", "Condo"] %}
                {% for ptype in property_types %}
                    <option value="{{ ptype }}" {% if filter_options.property_type == ptype %}selected{% endif %}>{{ ptype }}</option>
                {% endfor %}
            </select>

            <button id="search-submit-button" type="submit">Search</button>
        </form>

        <div id="properties-grid">
            {% for property in properties %}
                <div class="property-card">
                    <h3>{{ property.address }}</h3>
                    <p>{{ property.location }} - ${{ property.price }} - {{ property.property_type }}</p>
                    <p>{{ property.bedrooms }} Bedrooms, {{ property.bathrooms }} Bathrooms</p>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
