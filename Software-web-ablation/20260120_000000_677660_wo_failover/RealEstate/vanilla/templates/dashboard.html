<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Real Estate Dashboard</h1>

        <div id="featured-properties">
            <h2>Featured Properties</h2>
            <ul>
                {% for property in featured_properties %}
                    <li>{{ property.address }} - {{ property.location }} - ${{ property.price }} - {{ property.property_type }} - {{ property.bedrooms }} BR - {{ property.bathrooms }} BA</li>
                {% endfor %}
            </ul>
        </div>

        <a href="{{ url_for('property_search') }}">
            <button id="browse-properties-button">Browse Properties</button>
        </a>

        <a href="{{ url_for('my_inquiries') }}">
            <button id="my-inquiries-button">My Inquiries</button>
        </a>

        <a href="{{ url_for('my_favorites') }}">
            <button id="my-favorites-button">My Favorites</button>
        </a>

    </div>
</body>
</html>
