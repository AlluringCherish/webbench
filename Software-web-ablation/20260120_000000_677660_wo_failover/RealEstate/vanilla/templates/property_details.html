<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1 id="property-address">{{ property.address }}</h1>

        <div id="property-price">${{ property.price }}</div>

        <div id="property-description">{{ property.description }}</div>

        <div id="property-features">
            <p>Type: {{ property.property_type }}</p>
            <p>Bedrooms: {{ property.bedrooms }}</p>
            <p>Bathrooms: {{ property.bathrooms }}</p>
            <p>Square Feet: {{ property.square_feet }}</p>
            <p>Agent: {{ agent.agent_name }}, {{ agent.specialization }}</p>
        </div>

        <form method="POST" action="{{ url_for('add_to_favorites', property_id=property.property_id) }}">
            <button id="add-to-favorites-button" type="submit">{% if is_favorite %}Remove from Favorites{% else %}Add to Favorites{% endif %}</button>
        </form>

        <a href="{{ url_for('inquiry_form') }}">
            <button id="submit-inquiry-button">Submit Inquiry</button>
        </a>

    </div>
</body>
</html>
