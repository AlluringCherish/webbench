<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Status - OnlineAuction</title>
</head>
<body>
    <div id="status-page">
        <h1>Status</h1>

        <select id="status-filter">
            <option value="">All Statuses</option>
            <!-- Dynamic options to be added here if needed -->
        </select>

        <table id="status-table">
            <thead>
                <tr>
                    <th>Auction</th>
                    <th>Status</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                    <tr id="status-{{ auction.id }}">
                        <td>{{ auction.title }}</td>
                        <td>{{ auction.status }}</td>
                        <td>{{ auction.start_date }}</td>
                        <td>{{ auction.end_date }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="refresh-status-button">Refresh Status</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
