<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog - OnlineAuction</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Catalog</h1>

        <input type="text" id="search-input" placeholder="Search auctions..." />

        <select id="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
            {% endfor %}
        </select>

        <div id="auction-cards">
            {% for auction in auctions %}
                <div class="auction-card">
                    <h2>{{ auction.title }}</h2>
                    <p>{{ auction.description }}</p>
                    <a id="auction-details-button-{{ auction.id }}" href="{{ url_for('auction_details', auction_id=auction.id) }}">View Details</a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
