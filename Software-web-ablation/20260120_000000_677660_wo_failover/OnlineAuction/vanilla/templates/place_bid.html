<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid - OnlineAuction</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place a Bid</h1>
        <form method="post" action="{{ url_for('place_bid', auction_id=auction.id) }}">
            <label for="bidder-name">Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" required />

            <label for="bid-amount">Bid Amount:</label>
            <input type="number" id="bid-amount" name="bid_amount" step="0.01" min="0" required />

            <button type="submit" id="submit-bid-button">Submit Bid</button>
        </form>
    </div>
</body>
</html>
