<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions - OnlineAuction</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>

        <select id="time-range-filter">
            <option value="24h">Last 24 Hours</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
        </select>

        <div id="trending-auction-cards">
            {% for auction in auctions %}
                <div class="auction-card">
                    <h2>{{ auction.title }}</h2>
                    <p>{{ auction.description }}</p>
                    <a id="view-auction-button-{{ auction.id }}" href="{{ url_for('auction_details', auction_id=auction.id) }}">View Details</a>
                </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
