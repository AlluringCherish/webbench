<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winners - OnlineAuction</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winners</h1>

        <input type="text" id="filter-by-winner" placeholder="Filter winners..." />

        <div id="winner-cards">
            {% for winner in winners %}
                <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                    <h2>{{ winner.name }}</h2>
                    <p>Auction: {{ winner.auction_title }}</p>
                    <p>Winning Bid: ${{ winner.amount }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
