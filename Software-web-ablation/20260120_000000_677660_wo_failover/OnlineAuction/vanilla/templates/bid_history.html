<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History - OnlineAuction</title>
</head>
<body>
    <div id="bid-history-page">
        <h1>Bid History</h1>

        <select id="filter-by-auction">
            <option value="">All Auctions</option>
            {% for auction in auctions %}
                <option value="{{ auction.id }}">{{ auction.title }}</option>
            {% endfor %}
        </select>

        <button id="filter-bids-button">Filter Bids</button>

        <table id="bids-table">
            <thead>
                <tr>
                    <th>Bidder</th>
                    <th>Amount</th>
                    <th>Time</th>
                    <th>Auction</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                    <tr id="bid-{{ bid.id }}">
                        <td>{{ bid.bidder_name }}</td>
                        <td>${{ bid.amount }}</td>
                        <td>{{ bid.time }}</td>
                        <td>{{ bid.auction_title }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
