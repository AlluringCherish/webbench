<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Categories - OnlineAuction</title>
</head>
<body>
    <div id="categories-page">
        <h1>Categories</h1>

        <div id="category-cards">
            {% for category in categories %}
                <div id="category-card-{{ category.id }}" class="category-card">
                    <h2>{{ category.name }}</h2>
                    <a id="view-category-button-{{ category.id }}" href="{{ url_for('catalog', category_id=category.id) }}">View Category</a>
                </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
