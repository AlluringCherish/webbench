<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
    <div id="main-container">
        <h1>Car Rental Dashboard</h1>
        <div id="dashboard-page">
            <button id="search-vehicles-button" onclick="window.location.href='{{ url_for('search_vehicles') }}'">Search Vehicles</button>
            <button id="my-reservations-button" onclick="window.location.href='{{ url_for('my_reservations') }}'">My Reservations</button>

            <div id="featured-vehicles">
                {% for vehicle in featured_vehicles %}
                <div class="vehicle-card" id="featured-vehicle-{{ vehicle.vehicle_id }}">
                    <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                    <p>Type: {{ vehicle.vehicle_type }}</p>
                    <p>Daily Rate: ${{ '%.2f'|format(vehicle.daily_rate) }}</p>
                </div>
                {% endfor %}
            </div>

            <div id="promotions-section">
                {% for promo in promotions %}
                <div class="promotion" id="promotion-{{ promo.promotion_id if promo.promotion_id is defined else loop.index }}">
                    <h3>{{ promo.title }}</h3>
                    <p>{{ promo.description }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
