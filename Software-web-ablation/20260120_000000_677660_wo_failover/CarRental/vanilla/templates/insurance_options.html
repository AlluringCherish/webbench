<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="main-container">
        <h1>Select Insurance Coverage</h1>
        <div id="insurance-page">
            <form method="POST" action="{{ url_for('insurance_options', reservation_id=reservation_id) }}">
                <div id="insurance-options">
                    {% for plan in insurance_plans %}
                    <div class="insurance-plan" id="insurance-plan-{{ plan.insurance_id }}">
                        <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="selected_insurance_id" value="{{ plan.insurance_id }}" {% if selected_plan and selected_plan.insurance_id == plan.insurance_id %}checked{% endif %}>
                        <label for="select-insurance-{{ plan.insurance_id }}">
                            {{ plan.plan_name }} - ${{ '%.2f'|format(plan.daily_cost) }} / day
                        </label>
                    </div>
                    {% endfor %}
                </div>

                <div id="insurance-description">
                    {% if selected_plan %}
                    <p>{{ selected_plan.description }}</p>
                    {% else %}
                    <p>Select an insurance plan to see its details.</p>
                    {% endif %}
                </div>

                <div id="insurance-price">
                    {% if selected_plan %}
                    <p>Daily Cost: ${{ '%.2f'|format(selected_plan.daily_cost) }}</p>
                    {% endif %}
                </div>

                <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
