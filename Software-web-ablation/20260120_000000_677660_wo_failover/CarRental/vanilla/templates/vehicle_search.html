<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="main-container">
        <h1>Search Vehicles</h1>
        <div id="search-page">
            <form method="get" action="{{ url_for('search_vehicles') }}">
                <label for="location-filter">Pickup Location:</label>
                <select id="location-filter" name="location">
                    <option value="">All Locations</option>
                    {% for location in locations %}
                    <option value="{{ location.city }}" {% if search_filters.location == location.city %}selected{% endif %}>
                        {{ location.city }} - {{ location.address }}
                    </option>
                    {% endfor %}
                </select>

                <label for="vehicle-type-filter">Vehicle Type:</label>
                <select id="vehicle-type-filter" name="vehicle_type">
                    <option value="">All Types</option>
                    {% for vtype in vehicle_types %}
                    <option value="{{ vtype }}" {% if search_filters.vehicle_type == vtype %}selected{% endif %}>{{ vtype }}</option>
                    {% endfor %}
                </select>

                <label for="date-range-input">Rental Date Range:</label>
                <input id="date-range-input" name="date_range" type="text" value="{{ search_filters.date_range if search_filters.date_range is defined else '' }}" placeholder="YYYY-MM-DD to YYYY-MM-DD">

                <button type="submit">Search</button>
            </form>

            <div id="vehicles-grid">
                {% for vehicle in filtered_vehicles %}
                <div class="vehicle-card" id="vehicle-card-{{ vehicle.vehicle_id }}">
                    <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                    <p>Type: {{ vehicle.vehicle_type }}</p>
                    <p>Seats: {{ vehicle.seats }}</p>
                    <p>Daily Rate: ${{ '%.2f'|format(vehicle.daily_rate) }}</p>
                    <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="window.location.href='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
