<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
            <form method="POST" action="{{ url_for('booking', vehicle_id=vehicle.vehicle_id) }}">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location" required>
                    {% for location in locations %}
                    <option value="{{ location.city }}" {% if pickup_location == location.city %}selected{% endif %}>{{ location.city }} - {{ location.address }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location" required>
                    {% for location in locations %}
                    <option value="{{ location.city }}" {% if dropoff_location == location.city %}selected{% endif %}>{{ location.city }} - {{ location.address }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input id="pickup-date" name="pickup_date" type="date" value="{{ pickup_date }}" required>

                <label for="dropoff-date">Dropoff Date:</label>
                <input id="dropoff-date" name="dropoff_date" type="date" value="{{ dropoff_date }}" required>

                <button type="submit" id="calculate-price-button">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if total_price is not none %}
                <p>Total Price: ${{ '%.2f'|format(total_price) }}</p>
                {% endif %}
            </div>

            {% if total_price is not none %}
            <button id="proceed-to-insurance-button" onclick="window.location.href='{{ url_for('insurance_options', reservation_id=reservation_id) }}'">Proceed to Insurance</button>
            {% endif %}
        </div>
    </div>
</body>
</html>
