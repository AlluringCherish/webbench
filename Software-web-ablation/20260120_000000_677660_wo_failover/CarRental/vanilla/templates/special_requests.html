<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            {% if submitted_request_result %}
            <p id="request-result-message">{{ submitted_request_result }}</p>
            {% endif %}
            <form method="POST" action="{{ url_for('special_requests') }}">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id" required>
                    {% for reservation in reservations %}
                    <option value="{{ reservation.reservation_id }}">{{ reservation.vehicle_make }} {{ reservation.vehicle_model }} ({{ reservation.pickup_date }} - {{ reservation.dropoff_date }})</option>
                    {% endfor %}
                </select>

                <label for="driver-assistance-checkbox">
                    <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance">
                    Driver Assistance
                </label>

                <label for="gps-option-checkbox">
                    <input type="checkbox" id="gps-option-checkbox" name="gps_option">
                    GPS Option
                </label>

                <label for="child-seat-quantity">Child Seat Quantity:</label>
                <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="0">

                <label for="special-notes">Special Notes:</label>
                <textarea id="special-notes" name="special_notes" rows="4" cols="40"></textarea>

                <button type="submit" id="submit-requests-button">Submit Requests</button>
            </form>
        </div>
    </div>
</body>
</html>
