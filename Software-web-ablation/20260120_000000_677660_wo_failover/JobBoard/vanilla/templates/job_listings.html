<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
    <div id="listings-page">
        <h1>Job Listings</h1>
        <form method="POST" action="{{ url_for('jobs_listings') }}">
            <input type="text" id="search-input" name="search_input" placeholder="Search jobs by title, company, or location" value="{{ request.form.search_input if request.method=='POST' else '' }}">

            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in filters.categories %}
                    <option value="{{ category }}" {% if request.form.category_filter == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>

            <select id="location-filter" name="location_filter">
                <option value="">All Locations</option>
                {% for location in filters.locations %}
                    <option value="{{ location }}" {% if request.form.location_filter == location %}selected{% endif %}>{{ location }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="jobs-grid">
            {% for job in jobs %}
                <div>
                    <h2>{{ job.title }}</h2>
                    <p>{{ job.company_name }} - {{ job.location }}</p>
                    <p>Category: {{ job.category }}</p>
                    <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
                    <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Job</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
