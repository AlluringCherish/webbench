<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>
        <form method="POST" action="{{ url_for('resume_management') }}" enctype="multipart/form-data" id="upload-resume-form">
            <input type="file" id="resume-file-input" name="resume_file" style="display:none;" onchange="document.getElementById('upload-resume-form').submit();">
            <button type="button" id="upload-resume-button" onclick="document.getElementById('resume-file-input').click();">Upload Resume</button>
        </form>

        <div id="resumes-list">
            {% for resume in resumes %}
                <div>
                    <h2>{{ resume.filename }}</h2>
                    <p>Uploaded: {{ resume.upload_date }}</p>
                    <p>{{ resume.summary }}</p>
                    <form method="POST" action="{{ url_for('resume_management') }}" style="display:inline;">
                        <input type="hidden" name="delete_resume_id" value="{{ resume.resume_id }}">
                        <button type="submit" id="delete-resume-button-{{ resume.resume_id }}">Delete</button>
                    </form>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
