<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
    <div id="application-form-page">
        <h1>Submit Application</h1>
        {% if errors %}
            <div id="form-errors" style="color: red;">
                <ul>
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}
        <form method="POST" action="{{ url_for('application_form', job_id=job.job_id) }}" enctype="multipart/form-data">
            <label for="applicant-name">Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" required value="{{ form_fields.applicant_name if form_fields and form_fields.applicant_name else '' }}">

            <label for="applicant-email">Email:</label>
            <input type="email" id="applicant-email" name="applicant_email" required value="{{ form_fields.applicant_email if form_fields and form_fields.applicant_email else '' }}">

            <label for="resume-upload">Upload Resume:</label>
            <input type="file" id="resume-upload" name="resume_file" required>

            <label for="cover-letter">Cover Letter:</label>
            <textarea id="cover-letter" name="cover_letter" rows="5" required>{{ form_fields.cover_letter if form_fields and form_fields.cover_letter else '' }}</textarea>

            <button type="submit" id="submit-application-button">Submit Application</button>
        </form>
    </div>
</body>
</html>
