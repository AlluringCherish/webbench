<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>
        <form method="POST" action="{{ url_for('companies_directory') }}">
            <input type="text" id="search-company-input" name="company_search_query" placeholder="Search companies by name or industry" value="{{ request.form.company_search_query if request.method=='POST' else '' }}">
            <button type="submit">Search</button>
        </form>

        <div id="companies-list">
            {% for company in companies %}
                <div>
                    <h2>{{ company.company_name }}</h2>
                    <p>Industry: {{ company.industry }}</p>
                    <p>Employees: {{ company.employee_count }}</p>
                    <a href="{{ url_for('company_profile', company_id=company.company_id) }}">
                        <button id="view-company-button-{{ company.company_id }}">View Profile</button>
                    </a>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
