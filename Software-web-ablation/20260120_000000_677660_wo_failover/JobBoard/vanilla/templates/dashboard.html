<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Board Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Job Board Dashboard</h1>
        <div id="featured-jobs">
            {% for job in featured_jobs %}
                <div>
                    <h2>{{ job.title }}</h2>
                    <p>{{ job.company_name }} - {{ job.location }}</p>
                    <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('jobs_listings') }}">
            <button id="browse-jobs-button">Browse Jobs</button>
        </a>
        <a href="{{ url_for('application_tracking') }}">
            <button id="my-applications-button">My Applications</button>
        </a>
        <a href="{{ url_for('companies_directory') }}">
            <button id="companies-button">Companies</button>
        </a>
    </div>
</body>
</html>
