<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>

        <form method="post" action="{{ url_for('shopping_cart') }}">
            <table id="cart-items-table" border="1" cellspacing="0" cellpadding="5">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td>
                            <input type="number" id="update-quantity-{{ item.cart_id }}" name="quantity_{{ item.cart_id }}" value="{{ item.quantity }}" min="1">
                        </td>
                        <td>${{ "%.2f"|format(item.price) }}</td>
                        <td>${{ "%.2f"|format(item.subtotal) }}</td>
                        <td>
                            <button type="submit" name="update_cart_id" value="{{ item.cart_id }}">Update Quantity</button>
                            <button type="submit" id="remove-item-button-{{ item.cart_id }}" name="remove_cart_id" value="{{ item.cart_id }}">Remove Item</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>

        <div id="total-amount">
            <strong>Total Amount: ${{ "%.2f"|format(total_amount) }}</strong>
        </div>

        <button id="proceed-checkout-button" onclick="window.location.href='{{ url_for('checkout') }}'">Proceed to Checkout</button>
    </div>
</body>
</html>
