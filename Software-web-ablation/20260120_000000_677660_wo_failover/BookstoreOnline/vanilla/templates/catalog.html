<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="{{ url_for('catalog') }}">
            <input id="search-input" type="text" name="search" value="{{ search_query|default('') }}" placeholder="Search books...">
            <select id="category-filter" name="category">
                <option value="" {% if not selected_category %}selected{% endif %}>All Categories</option>
                {% for category in categories %}
                <option value="{{ category.category_name }}" {% if selected_category == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="books-grid">
            {% for book in books %}
            <div class="book-card">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>ISBN: {{ book.isbn }}</p>
                <p>Category: {{ book.category }}</p>
                <p>Price: ${{ "%.2f"|format(book.price) }}</p>
                <p>Stock: {{ book.stock }}</p>
                <p>{{ book.description }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
