<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <h1>My Certificates</h1>
        <div id="certificates-grid">
            {% if certificates %}
                <ul>
                {% for cert in certificates %}
                    <li>
                        <div>Course: {{ cert.title if cert.title is defined else 'Course ID ' ~ cert.course_id }}</div>
                        <div>Issued on: {{ cert.issue_date }}</div>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No certificates available.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
