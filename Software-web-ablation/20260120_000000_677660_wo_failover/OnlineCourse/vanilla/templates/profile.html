<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>

        {% if error_message %}
        <div id="error-message" style="color: red;">{{ error_message }}</div>
        {% endif %}
        {% if update_success %}
        <div id="update-success-message" style="color: green;">Profile updated successfully!</div>
        {% endif %}

        <form method="post" action="{{ url_for('update_profile') }}">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ email }}" required><br>

            <label for="profile-fullname">Full Name:</label>
            <input type="text" id="profile-fullname" name="fullname" value="{{ fullname }}" required><br>

            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
