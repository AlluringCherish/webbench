<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
</head>
<body>
    <div id="bookings-page">
        <h1>My Bookings</h1>
        <input type="text" id="booking-search-input" placeholder="Search bookings..." />
        <table id="bookings-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Event Name</th>
                    <th>Date</th>
                    <th>Ticket Count</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr>
                    <td>{{ booking.booking_id }}</td>
                    <td>{{ booking.event_name }}</td>
                    <td>{{ booking.date }}</td>
                    <td>{{ booking.ticket_count }}</td>
                    <td>{{ booking.status }}</td>
                    <td>
                        <button id="cancel-booking-button-{{ booking.booking_id }}">Cancel</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
