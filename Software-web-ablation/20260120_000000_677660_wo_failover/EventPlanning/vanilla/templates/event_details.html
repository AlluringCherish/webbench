<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>
</head>
<body>
    <div id="event-details-page">
        <h1 id="event-title">{{ event.event_name }}</h1>
        <div id="event-date">Date: {{ event.date }} at {{ event.time }}</div>
        <div id="event-location">Location: {{ event.location }}</div>
        <div id="event-description">{{ event.description }}</div>
        <form action="{{ url_for('book_ticket_get') }}" method="get">
            <input type="hidden" name="event_id" value="{{ event.event_id }}" />
            <button type="submit" id="book-ticket-button">Book Ticket</button>
        </form>
    </div>
</body>
</html>
