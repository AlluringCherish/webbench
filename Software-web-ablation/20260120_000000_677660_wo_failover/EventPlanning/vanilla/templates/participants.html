<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Participants Management</title>
</head>
<body>
    <div id="participants-page">
        <h1>Participants Management</h1>

        <input type="text" id="search-participant-input" placeholder="Search participants..." />

        <select id="participant-status-filter">
            <option value="">All Statuses</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Attended">Attended</option>
            <option value="Pending">Pending</option>
        </select>

        <table id="participants-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Participant ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Event Name</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in participants %}
                <tr>
                    <td>{{ participant.participant_id }}</td>
                    <td>{{ participant.name }}</td>
                    <td>{{ participant.email }}</td>
                    <td>{{ participant.event_name }}</td>
                    <td>{{ participant.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <form action="{{ url_for('add_participant_post') }}" method="post">
            <button type="submit" id="add-participant-button">Add New Participant</button>
        </form>
    </div>
</body>
</html>
