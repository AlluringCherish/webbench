<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <input type="text" id="venue-search-input" placeholder="Search venues..." />
        <select id="venue-capacity-filter">
            <option value="">All Capacities</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
        </select>
        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card">
                <h3>{{ venue.venue_name }}</h3>
                <p>Location: {{ venue.location }}</p>
                <p>Capacity: {{ venue.capacity }}</p>
                <p>Amenities: {{ venue.amenities }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}" onclick="location.href='{{ url_for('venue_details', venue_id=venue.venue_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
