<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flashes">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <div id="borrow-book-info">
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
        </div>
        <div id="due-date-display">Due Date: {{ due_date }}</div>

        <form method="POST" action="{{ url_for('borrow_confirm_post', book_id=book.book_id) }}">
            <button id="confirm-borrow-button" type="submit">Confirm Borrow</button>
        </form>

        <button id="cancel-borrow-button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Cancel</button>
    </div>
</body>
</html>
