<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <ul class="flashes">
            {% for message in messages %}
              <li>{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <div id="book-info-display">
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
        </div>

        {% if review is defined %}
        <form method="POST" action="{{ url_for('edit_review_post', review_id=review.review_id) }}">
        {% else %}
        <form method="POST" action="{{ url_for('write_review_post', book_id=book.book_id) }}">
        {% endif %}

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for i in range(1,6) %}
                <option value="{{ i }}" {% if review is defined and review.rating == i %}selected{% endif %}>{{ i }} Star{% if i > 1 %}s{% endif %}</option>
                {% endfor %}
            </select>

            <br>
            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="40">{% if review is defined %}{{ review.review_text }}{% endif %}</textarea>

            <br>
            <button id="submit-review-button" type="submit">Submit Review</button>
            <button id="back-to-book" type="button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
        </form>
    </div>
</body>
</html>
