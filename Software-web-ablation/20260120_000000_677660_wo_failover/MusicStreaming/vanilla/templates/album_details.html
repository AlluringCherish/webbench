<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
    <div id="album-details-page">
        <h1 id="album-title">{{ album.title }}</h1>

        <div id="album-artist">{{ album.artist_name }}</div>
        <div id="album-year">{{ album.year }}</div>

        <div id="album-songs-list">
            <ul>
                {% for song in songs %}
                <li>{{ song.title }} ({{ song.duration }}s)</li>
                {% endfor %}
            </ul>
        </div>

        <form method="POST" action="{{ url_for('add_album_songs_to_playlist', album_id=album.album_id) }}">
            <label for="playlist-select">Add Album to Playlist:</label>
            <select id="playlist-select" name="playlist_id" required>
                <option value="" disabled selected>Select a playlist</option>
                {% for playlist in playlists %}
                <option value="{{ playlist.playlist_id }}">{{ playlist.title }}</option>
                {% endfor %}
            </select>
            <button id="add-album-to-playlist-button" type="submit">Add</button>
        </form>
    </div>
</body>
</html>
