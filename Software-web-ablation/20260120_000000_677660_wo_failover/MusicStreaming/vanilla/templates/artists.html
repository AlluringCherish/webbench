<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
    <div id="artists-page">
        <h1>Artist Profiles</h1>

        <input type="text" id="search-artists" placeholder="Search artists...">

        <select id="artists-sort">
            <option value="name">Name</option>
            <option value="genre">Genre</option>
        </select>

        <div id="artists-grid">
            <ul>
                {% for artist in artists %}
                <li>
                    <img src="{{ artist.photo_url if artist.photo_url else url_for('static', filename='images/default_artist.png') }}" alt="{{ artist.name }} photo" width="50" height="50">
                    <span>{{ artist.name }} ({{ artist.genre }})</span>
                    <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">
                        <button id="view-artist-button-{{ artist.artist_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
