<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
    <div id="playlists-page">
        <h1>My Playlists</h1>

        <div id="playlists-grid">
            <ul>
                {% for playlist in playlists %}
                <li>
                    <span>{{ playlist.title }} - {{ playlist.description }} ({{ playlist.total_songs }} songs)</span>
                    <a href="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
                        <button id="view-playlist-button-{{ playlist.playlist_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>

        <a href="{{ url_for('create_playlist') }}"><button id="create-playlist-button">Create Playlist</button></a>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
