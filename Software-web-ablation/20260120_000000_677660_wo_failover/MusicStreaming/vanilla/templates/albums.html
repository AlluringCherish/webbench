<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
    <div id="albums-page">
        <h1>Albums</h1>

        <input type="text" id="search-albums" placeholder="Search albums...">

        <select id="sort-albums">
            <option value="year">Year</option>
            <option value="title">Title</option>
            <option value="artist">Artist</option>
        </select>

        <div id="albums-grid">
            <ul>
                {% for album in albums %}
                <li>
                    <span>{{ album.title }} by {{ album.artist_name }} ({{ album.year }})</span>
                    <a href="{{ url_for('album_details', album_id=album.album_id) }}">
                        <button id="view-album-button-{{ album.album_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
