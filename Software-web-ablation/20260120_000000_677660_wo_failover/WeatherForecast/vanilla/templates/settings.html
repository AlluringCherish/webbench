<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1 id="settings-page">Settings</h1>

        <form method="POST" action="">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_units">
                <option value="Celsius"{% if temperature_units == 'Celsius' %} selected{% endif %}>Celsius</option>
                <option value="Fahrenheit"{% if temperature_units == 'Fahrenheit' %} selected{% endif %}>Fahrenheit</option>
                <option value="Kelvin"{% if temperature_units == 'Kelvin' %} selected{% endif %}>Kelvin</option>
            </select>

            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                <option value="0"{% if default_location_id == 0 %} selected{% endif %}>None</option>
                {% for loc in saved_locations %}
                <option value="{{ loc.location_id }}"{% if default_location_id == loc.location_id %} selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>

            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" value="1" {% if alert_notifications_enabled %}checked{% endif %}>

            <button type="submit" id="save-settings-button">Save Settings</button>
        </form>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
