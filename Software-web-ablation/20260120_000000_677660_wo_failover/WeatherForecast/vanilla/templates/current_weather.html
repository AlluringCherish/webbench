<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <div id="current-weather-page">
        <h1 id="location-name">{{ weather.location_name }}</h1>

        <div id="temperature-display">
            Temperature: {{ weather.temperature }}&deg;
        </div>

        <div id="weather-condition">
            Condition: {{ weather.condition }}
        </div>

        <div id="humidity-info">
            Humidity: {{ weather.humidity }}%
        </div>

        <div id="wind-speed-info">
            Wind Speed: {{ weather.wind_speed }} mph
        </div>
    </div>
</body>
</html>
