<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
    <div id="songs-grid">
    {% for song in songs %}
        <div id="song-{{ song.song_id }}">
            <h3 id="song-title-{{ song.song_id }}">{{ song.title }}</h3>
            <p id="artist-name-{{ song.song_id }}">{{ song.artist_name }}</p>
            <p id="album-name-{{ song.song_id }}">{{ song.album_name }}</p>
            <p id="duration-{{ song.song_id }}">Duration: {{ song.duration }}</p>
            <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
        </div>
    {% endfor %}
    </div>
</body>
</html>
