<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
</head>
<body>
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>
    <table id="playlist-songs-table">
        <thead>
            <tr>
                <th>Song</th>
                <th>Artist</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for song in songs_in_playlist %}
            <tr id="song-{{ song.song_id }}">
                <td>{{ song.title }}</td>
                <td>{{ song.artist_name }}</td>
                <td>{{ song.duration }}</td>
                <td>
                    <form method="POST" action="{{ url_for('remove_song_from_playlist', song_id=song.song_id) }}">
                        <button id="remove-song-button-{{ song.song_id }}" type="submit">Remove</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="delete-playlist-button">Delete Playlist</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
