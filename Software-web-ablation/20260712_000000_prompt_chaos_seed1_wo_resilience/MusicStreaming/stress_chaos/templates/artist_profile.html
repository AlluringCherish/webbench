<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profile</title>
</head>
<body>
    <h1>Artists</h1>
    <div id="artists-list">
        {% for artist in artists %}
        <div id="artist-{{ artist.artist_id }}">
            <h3>{{ artist.name }}</h3>
            <p>Genre: {{ artist.genre }}</p>
            <p>Country: {{ artist.country }}</p>
            <button onclick="window.location.href='{{ url_for('artist_details_page', artist_id=artist.artist_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
