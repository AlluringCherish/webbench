<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ song.title }}</title>
</head>
<body>
    <h1 id="song-title">{{ song.title }}</h1>
    <div id="artist-name">Artist: {{ song.artist_name }}</div>
    <div id="album-name">Album: {{ song.album_name }}</div>
    <div id="duration">Duration: {{ song.duration }}</div>
    <button id="play-button">Play</button>
    <button id="artist-details-button" onclick="window.location.href='{{ url_for('artist_details_page', artist_id=song.artist_id) }}'">View Artist Details</button>
</body>
</html>
