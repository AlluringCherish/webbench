<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Browse</title>
</head>
<body>
    <h1 id="albums-page">Albums</h1>
    <select id="album-filter-dropdown">
        <option value="">Select Album</option>
        {% for album in albums %}
        <option value="{{ album.album_id }}">{{ album.title }} ({{ album.release_year }})</option>
        {% endfor %}
    </select>
    <div id="albums-list">
        {% for album in albums %}
        <div id="album-{{ album.album_id }}">
            <h3>{{ album.title }}</h3>
            <p>Artist: {{ album.artist_name }}</p>
            <p>Release Year: {{ album.release_year }}</p>
            <button id="view-album-button-{{ album.album_id }}" onclick="window.location.href='{{ url_for('album_details_page', album_id=album.album_id) }}'">View Album</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
