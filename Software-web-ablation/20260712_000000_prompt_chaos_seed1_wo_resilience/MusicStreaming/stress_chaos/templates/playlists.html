<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
    <h1>My Playlists</h1>
    <div id="playlists-list">
        {% for playlist in playlists %}
        <div id="playlist-card-{{ playlist.playlist_id }}">
            <h2>{{ playlist.title }}</h2>
            <p>{{ playlist.description }}</p>
            <p>Total Songs: {{ playlist.total_songs }}</p>
            <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="window.location.href='{{ url_for('playlist_details_page', playlist_id=playlist.playlist_id) }}'">View</button>
            <button id="delete-playlist-button-{{ playlist.playlist_id }}">Delete</button>
        </div>
        {% endfor %}
    </div>
    <button id="create-playlist-button" onclick="window.location.href='{{ url_for('create_playlist_page') }}'">Create New Playlist</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
