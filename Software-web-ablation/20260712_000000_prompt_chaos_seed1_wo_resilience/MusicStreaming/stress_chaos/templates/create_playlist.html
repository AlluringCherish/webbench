<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Playlist</title>
</head>
<body>
    <h1 id="create-playlist-title">Create Playlist</h1>
    <form id="create-playlist-page" method="POST" action="{{ url_for('create_playlist') }}">
        <label for="playlist-name-input">Playlist Name:</label>
        <input id="playlist-name-input" name="playlist_name" type="text" required>
        <label for="playlist-description-input">Description:</label>
        <input id="playlist-description-input" name="playlist_description" type="text">
        <button id="save-playlist-button" type="submit">Save</button>
        <button id="cancel-create-button" type="button" onclick="window.location.href='{{ url_for('playlists_page') }}'">Cancel</button>
    </form>
</body>
</html>
