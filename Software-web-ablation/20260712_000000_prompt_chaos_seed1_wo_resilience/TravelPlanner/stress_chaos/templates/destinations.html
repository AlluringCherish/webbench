<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destinations</title>
</head>
<body>
    <h1>Destinations</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
        <a href="{{ url_for('packages') }}" id="packages-nav">Packages</a>
        <a href="{{ url_for('trips') }}" id="trips-nav">Trips</a>
        <a href="{{ url_for('recommendations') }}" id="recommendations-nav">Recommendations</a>
    </nav>

    <div id="destinations-container">
        {% for dest in destinations %}
        <div class="destination-card" id="destination-{{ dest.dest_id }}">
            <h2 id="destination-name-{{ dest.dest_id }}">{{ dest.name }}</h2>
            <p>{{ dest.country }}, {{ dest.region }}</p>
            <p>{{ dest.description }}</p>
            <button id="view-destination-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
