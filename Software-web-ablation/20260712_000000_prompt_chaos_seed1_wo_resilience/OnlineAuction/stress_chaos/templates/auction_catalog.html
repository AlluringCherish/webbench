<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Auction Catalog</h1>
    <div id="category-filter">
        <select name="category" id="category-dropdown" onchange="location = this.value;">
            <option value="">Select Category</option>
            {% for category in categories %}
            <option value="{{ url_for('auction_catalog', category_id=category.category_id) }}">{{ category.category_name }} ({{ category.item_count }})</option>
            {% endfor %}
        </select>
    </div>
    <div id="auction-list">
        {% for auction in auctions %}
        <div id="auction-card-{{ auction.auction_id }}">
            <h2>{{ auction.item_name }}</h2>
            <img src="{{ auction.image_url }}" alt="{{ auction.item_name }} image">
            <p>{{ auction.description }}</p>
            <p>Category: {{ auction.category }}</p>
            <p>Starting Bid: {{ auction.starting_bid }}</p>
            <p>Current Bid: {{ auction.current_bid }}</p>
            <p>End Time: {{ auction.end_time }}</p>
            <p>Status: {{ auction.status }}</p>
            <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Auction</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
