<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
<div id="bid-history-page">
    <h1>Bid History</h1>
    <label for="sort-by-amount">Sort By Amount:</label>
    <select id="sort-by-amount" name="sort_by" onchange="location.href='?sort='+this.value">
        <option value="">Select</option>
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>
    <label for="auction-filter">Filter by Auction Item:</label>
    <select id="auction-filter" name="auction_id" onchange="location.href='?auction_id='+this.value">
        <option value="">All Auctions</option>
        {% for auction in auctions %}
        <option value="{{ auction.auction_id }}">{{ auction.item_name }}</option>
        {% endfor %}
    </select>
    <div id="bid-list">
        {% for bid in bids %}
        <div id="bid-card-{{ bid.bid_id }}">
            <p>Auction: {{ bid.auction_name }}</p>
            <p>Bidder: {{ bid.bidder_name }}</p>
            <p>Amount: ${{ bid.bid_amount }}</p>
            <p>Time: {{ bid.bid_timestamp }}</p>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
