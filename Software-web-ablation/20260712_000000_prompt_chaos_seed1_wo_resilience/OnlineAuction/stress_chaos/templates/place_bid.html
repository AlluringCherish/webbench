<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
<div id="place-bid-page">
    <h1>Place Bid</h1>
    <form action="{{ url_for('submit_bid', auction_id=auction_id) }}" method="POST">
        <label for="bidder-name">Bidder Name:</label>
        <input type="text" id="bidder-name" name="bidder_name" required>
        <br>
        <label for="auction-name">Auction Name:</label>
        <input type="text" id="auction-name" name="auction_name" value="{{ auction_name }}" readonly>
        <br>
        <label for="minimum-bid">Minimum Bid:</label>
        <input type="number" id="minimum-bid" name="bid_amount" value="{{ minimum_bid }}" min="{{ minimum_bid }}" step="0.01" required>
        <br>
        <button type="submit" id="submit-bid-button">Submit Bid</button>
    </form>
</div>
</body>
</html>
