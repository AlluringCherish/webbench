<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Movie Catalog</title>
</head>
<body>
    <h1>Movie Catalog</h1>

    <input type="text" id="search-input" name="search_query" placeholder="Search movies..." />

    <table id="movies-table" border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Genre</th>
                <th>Rating</th>
                <th>Duration (min)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for movie in movies %}
            <tr>
                <td>{{ movie.title }}</td>
                <td>{{ movie.genre }}</td>
                <td>{{ movie.rating }}</td>
                <td>{{ movie.duration }}</td>
                <td>
                    <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
                    <button id="showtimes-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('showtime_selection', movie_id=movie.movie_id) }}'">Showtimes</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5">No movies found.</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <button id="dashboard-button" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
</body>
</html>
