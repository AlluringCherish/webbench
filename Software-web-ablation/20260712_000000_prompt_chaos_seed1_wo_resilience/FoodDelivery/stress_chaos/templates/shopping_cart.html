<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <h1>Shopping Cart</h1>
    <table id="cart-items-table">
        <tr>
            <th>Item</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Update Quantity</th>
        </tr>
        {% for item in cart_items %}
        <tr id="cart-item-{{ item.item_id }}">
            <td>{{ item.item_name }}</td>
            <td>{{ item.quantity }}</td>
            <td>${{ item.price }}</td>
            <td><input type="number" id="update-quantity-{{ item.item_id }}" name="quantity" value="{{ item.quantity }}" min="1"></td>
        </tr>
        {% endfor %}
    </table>
    <p>Total: ${{ total_amount }}</p>
    <button id="proceed-checkout-button" onclick="location.href='{{ url_for('checkout_page') }}'">Proceed to Checkout</button>
</body>
</html>
