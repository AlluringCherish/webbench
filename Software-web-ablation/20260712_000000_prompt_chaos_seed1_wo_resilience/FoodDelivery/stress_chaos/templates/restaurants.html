<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurants</title>
</head>
<body>
    <h1 id="page-title">Restaurants</h1>
    <div id="search-input"></div>
    <div id="cuisine-filter"></div>
    <div id="restaurants-list">
        {% for restaurant in restaurants %}
        <div id="restaurant-{{ restaurant.restaurant_id }}" class="restaurant-card">
            <h2>{{ restaurant.name }}</h2>
            <p>Rating: {{ restaurant.rating }}</p>
            <p>Delivery time: {{ restaurant.delivery_time }} minutes</p>
            <button id="view-restaurant-button-{{ restaurant.restaurant_id }}" onclick="location.href='{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}'">View Menu</button>
        </div>
        {% endfor %}
    </div>
    <button id="browse-restaurants-button" onclick="location.href='{{ url_for('restaurant_listing') }}'">Browse Restaurants</button>
</body>
</html>
