<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <h1>Active Orders</h1>
    <select id="status-filter" name="status_filter">
        <option value="all">All</option>
        <option value="preparing">Preparing</option>
        <option value="delivering">Delivering</option>
        <option value="delivered">Delivered</option>
    </select>
    <div id="active-orders-list">
        {% for order in orders %}
        <div class="order-card" id="order-{{ order.order_id }}">
            <p>{{ order.customer_name }} - Total: ${{ order.total_amount }} - Status: {{ order.status }}</p>
            <button id="track-order-button-{{ order.order_id }}" onclick="location.href='{{ url_for('order_tracking', order_id=order.order_id) }}'">Track Order</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard-button" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
