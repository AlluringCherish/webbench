<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <h1 id="reviews-page">Order Reviews</h1>
    <div id="reviews-list">
        {% for review in reviews %}
        <div class="review" id="review-{{ review.review_id }}">
            <p><strong>{{ review.customer_name }}</strong> says:</p>
            <p>{{ review.review_text }}</p>
            <p>Date: {{ review.date }}</p>
        </div>
        {% endfor %}
    </div>
    <select id="review-filter">
        <option value="all">All</option>
        <option value="positive">Positive</option>
        <option value="negative">Negative</option>
    </select>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    <button id="write-review-button" onclick="location.href='{{ url_for('write_review_page') }}'">Write Review</button>
</body>
</html>
