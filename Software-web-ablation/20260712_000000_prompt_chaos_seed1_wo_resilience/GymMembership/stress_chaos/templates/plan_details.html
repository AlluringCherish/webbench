<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plan Details</title>
</head>
<body>
<h1 id="plan-title">{{ plan.plan_name }}</h1>
<p id="plan-price">Price: {{ plan.price }}</p>
<p id="plan-duration">Billing Cycle: {{ plan.billing_cycle }}</p>
<p id="plan-features">Features: {{ plan.features }}</p>
<form method="POST" action="{{ url_for('enroll_plan', plan_id=plan.membership_id) }}">
  <button id="enroll-plan-button-{{ plan.membership_id }}" type="submit">Enroll</button>
</form>
<a id="back-to-memberships" href="{{ url_for('memberships') }}">Back to Memberships</a>
</body>
</html>
