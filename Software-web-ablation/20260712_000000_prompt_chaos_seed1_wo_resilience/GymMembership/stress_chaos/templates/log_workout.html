<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Log Workout</title>
</head>
<body>
<h1 id="page-title">Log Your Workout</h1>
<form id="log-workout-form" method="POST" action="{{ url_for('log_workout') }}">
  <label for="workout-type">Workout Type:</label>
  <select id="workout-type" name="workout_type">
    {% for wt in workout_types %}
    <option value="{{ wt }}">{{ wt }}</option>
    {% endfor %}
  </select><br>
  <label for="duration-minutes">Duration (minutes):</label>
  <input id="duration-minutes" name="duration_minutes" type="number" min="1" required><br>
  <label for="calories-burned">Calories Burned:</label>
  <input id="calories-burned" name="calories_burned" type="number" min="0" required><br>
  <textarea id="workout-notes" name="notes" placeholder="Add notes here..."></textarea><br>
  <button id="submit-workout-button" type="submit">Submit</button>
</form>
<a id="back-to-dashboard" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
