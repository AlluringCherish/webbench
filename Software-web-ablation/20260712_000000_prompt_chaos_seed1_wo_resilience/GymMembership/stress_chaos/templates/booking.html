<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking</title>
</head>
<body>
<h1 id="page-title">Book a Session</h1>
<form id="booking-form" method="POST" action="{{ url_for('booking') }}">
  <label for="trainer-select">Select Trainer:</label>
  <select id="trainer-select" name="trainer_id">
    {% for trainer in trainers %}
    <option value="{{ trainer.trainer_id }}">{{ trainer.name }}</option>
    {% endfor %}
  </select><br>
  <label for="class-select">Select Class:</label>
  <select id="class-select" name="class_id">
    {% for cls in classes %}
    <option value="{{ cls.class_id }}">{{ cls.class_name }}</option>
    {% endfor %}
  </select><br>
  <label for="booking-date">Date:</label>
  <input id="booking-date" name="booking_date" type="date" required><br>
  <label for="booking-time">Time:</label>
  <input id="booking-time" name="booking_time" type="time" required><br>
  <button id="submit-booking-button" type="submit">Submit</button>
</form>
<a id="back-to-schedule" href="{{ url_for('schedule') }}">Back to Schedule</a>
</body>
</html>
