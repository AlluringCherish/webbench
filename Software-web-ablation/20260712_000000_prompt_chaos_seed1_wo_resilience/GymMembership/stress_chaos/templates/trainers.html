<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trainers</title>
</head>
<body>
<h1 id="page-title">Trainers</h1>
<form id="filter-form" method="GET" action="{{ url_for('trainers') }}">
  <label for="specialty-filter">Filter by Specialty:</label>
  <select id="specialty-filter" name="specialty_filter">
    <option value="">All</option>
    {% for specialty in specialties %}
    <option value="{{ specialty }}" {% if specialty == selected_specialty %}selected{% endif %}>{{ specialty }}</option>
    {% endfor %}
  </select>
  <button id="filter-button" type="submit">Filter</button>
</form>
<div id="trainers-grid">
  {% for trainer in trainers %}
  <div id="trainer-card-{{ trainer.trainer_id }}" class="trainer-card">
    <h2 id="trainer-name">{{ trainer.name }}</h2>
    <p id="trainer-bio">{{ trainer.bio }}</p>
    <a id="view-trainer-button-{{ trainer.trainer_id }}" href="{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}">View Profile</a>
  </div>
  {% endfor %}
</div>
<a id="back-to-dashboard" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
