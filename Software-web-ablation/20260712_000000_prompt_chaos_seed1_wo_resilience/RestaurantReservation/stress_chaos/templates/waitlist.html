<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}">Dashboard</a> |
        <a href="{{ url_for('menu_page') }}">Menu</a> |
        <a href="{{ url_for('waitlist') }}">Waitlist</a> |
        <a href="{{ url_for('profile') }}">Profile</a> |
        <a href="{{ url_for('my_reservations') }}">My Reservations</a> |
        <a href="{{ url_for('my_reviews') }}">My Reviews</a> |
        <a href="{{ url_for('write_review') }}">Write Review</a>
    </nav>
    <hr>
    <h1>Waitlist</h1>
    {% if user_waitlist_active %}
        <p>You are on the waitlist at position {{ position }}.</p>
    {% else %}
        <form method="post">
            <label for="party_size">Party Size:</label>
            <input type="number" id="party_size" name="party_size" min="1" max="10" required>
            <button type="submit">Join Waitlist</button>
        </form>
    {% endif %}
</body>
</html>
