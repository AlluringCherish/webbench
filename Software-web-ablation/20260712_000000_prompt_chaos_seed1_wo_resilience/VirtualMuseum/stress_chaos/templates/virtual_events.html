<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Events</title>
</head>
<body>
    <h1>Virtual Events</h1>
    <div id="container-virtual-events">
        <ul>
        {% for event in virtual_events %}
            <li>
                <strong>{{ event.title }}</strong> - {{ event.date }} {{ event.time }}<br>
                Speaker: {{ event.speaker }}<br>
                <button id="register-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('register_event', event_id=event.event_id) }}'">Register</button>
            </li>
        {% endfor %}
        </ul>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
