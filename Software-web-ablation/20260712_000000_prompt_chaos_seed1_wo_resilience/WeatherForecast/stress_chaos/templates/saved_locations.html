<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <h1>Saved Locations</h1>
        <div id="saved-locations-list">
            {% for saved_location in saved_locations %}
                <div class="saved-location-item">
                    <span>{{ saved_location.location_name }}</span>
                    <button id="remove-location-button-{{ saved_location.location_id }}">Remove</button>
                </div>
            {% endfor %}
            <button id="add-new-location-button" onclick="window.location.href='{{ url_for('location_search') }}'">Add New Location</button>
        </div>
    </div>
</body>
</html>
