<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Forecast</title>
</head>
<body>
    <div id="forecast-page">
        <h1>Weekly Forecast for Location {{ selected_location_id }}</h1>

        <form method="GET" action="">
            <label for="location-filter">Select Location:</label>
            <select id="location-filter" name="location_id" onchange="this.form.submit()">
                {% for location in locations %}
                    <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>
                        {{ location.location_name }}
                    </option>
                {% endfor %}
            </select>
        </form>

        <ul id="forecast-list">
            {% for forecast in forecasts %}
                <li>
                    Date: {{ forecast.date }}, High Temp: {{ forecast.high_temp }} 76C, Low Temp: {{ forecast.low_temp }} 76C, Condition: {{ forecast.condition }}
                </li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
