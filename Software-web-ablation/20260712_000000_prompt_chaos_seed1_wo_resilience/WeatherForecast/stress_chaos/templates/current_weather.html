<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <div id="current-weather-page">
        <h1>Current Weather in {{ location.location_name }}</h1>
        <p id="temperature">Temperature: {{ temperature }} 76C</p>
        <p id="condition">Condition: {{ condition }}</p>
        <p id="humidity">Humidity: {{ humidity }}%</p>
        <p id="wind-speed-info">Wind Speed: {{ wind_speed }} km/h</p>
    </div>
</body>
</html>
