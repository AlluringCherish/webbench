<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <h1>Location Search</h1>
        <form method="POST" action="">
            <input type="text" name="search_query" placeholder="Enter location name">
            <button type="submit">Search</button>
        </form>
        <div id="search-results">
            {% if search_results %}
                <ul>
                    {% for result in search_results %}
                        <li>
                            {{ result.location_name }}
                            <form method="POST" action="" style="display:inline;">
                                <input type="hidden" name="select_location_id" value="{{ result.location_id }}">
                                <button type="submit">Select</button>
                            </form>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No results found.</p>
            {% endif %}
        </div>
        <div id="saved-locations-list">
            <h2>Saved Locations</h2>
            {% for saved in saved_locations %}
                <div class="saved-location-item">
                    <span>{{ saved.location_name }}</span>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
