<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>
        <form method="POST" action="">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                <option value="Celsius" {% if temperature_unit == 'Celsius' %}selected{% endif %}>Celsius</option>
                <option value="Fahrenheit" {% if temperature_unit == 'Fahrenheit' %}selected{% endif %}>Fahrenheit</option>
                <option value="Kelvin" {% if temperature_unit == 'Kelvin' %}selected{% endif %}>Kelvin</option>
            </select>
            <br>
            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for location in locations %}
                    <option value="{{ location.location_id }}" {% if location.location_id == default_location_id %}selected{% endif %}>
                        {{ location.location_name }}
                    </option>
                {% endfor %}
            </select>
            <br>
            <input type="checkbox" id="alert-notifications-enabled" name="alert_notifications_enabled" {% if alert_notifications_enabled %}checked{% endif %}>
            <label for="alert-notifications-enabled">Enable Alert Notifications</label>
            <br>
            <button type="submit">Save Settings</button>
            <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
        </form>
    </div>
</body>
</html>
