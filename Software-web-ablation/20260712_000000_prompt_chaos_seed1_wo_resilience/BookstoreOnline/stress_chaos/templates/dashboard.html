<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="dashboard-heading">Dashboard</h1>
        <div id="dashboard-container">
            <button id="browse-catalog-button" onclick="location.href='{{ url_for('book_catalog') }}'">Browse Catalog</button>
            <button id="view-cart-button" onclick="location.href='{{ url_for('shopping_cart') }}'">View Cart</button>
        </div>
        <div id="bestsellers-section">
            <h2>Bestsellers</h2>
            <ul>
                {% for book in bestsellers %}
                <li>{{ book.title }} by {{ book.author }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
