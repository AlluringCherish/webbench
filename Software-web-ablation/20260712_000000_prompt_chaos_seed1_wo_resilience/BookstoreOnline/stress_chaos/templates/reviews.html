<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Reviews</h1>
        <select id="filter-by-rating">
            <option value="">All Ratings</option>
            <option value="5">5 Stars</option>
            <option value="4">4 Stars</option>
            <option value="3">3 Stars</option>
            <option value="2">2 Stars</option>
            <option value="1">1 Star</option>
        </select>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <strong>{{ review.customer_name }}</strong> (Rating: {{ review.rating }})<br>
                {{ review.review_text }}
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('write_review') }}">Write a Review</a>
    </div>
</body>
</html>
