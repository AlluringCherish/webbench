<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <form method="POST" action="{{ url_for('shopping_cart') }}">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price per Item</th>
                        <th>Subtotal</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td><input type="number" name="quantity_{{ item.item_id }}" value="{{ item.quantity }}" min="1"></td>
                        <td>{{ item.price }}</td>
                        <td>{{ item.subtotal }}</td>
                        <td><button type="submit" name="remove_item" value="{{ item.item_id }}">Remove</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div id="total-amount">Total: ${{ total_amount }}</div>
            <button type="submit" name="update_cart">Update Cart</button>
            <button type="button" onclick="location.href='{{ url_for('checkout') }}'">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
