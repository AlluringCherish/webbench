<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>
        <input type="text" id="search-author-isbn" placeholder="Search by author or ISBN">
        <select id="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
            {% endfor %}
        </select>
        <div id="books-grid">
            {% for book in books %}
            <div class="book-item">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>Price: ${{ book.price }}</p>
                <p>Category: {{ book.category }}</p>
                <a href="{{ url_for('book_details', book_id=book.book_id) }}">View Details</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
