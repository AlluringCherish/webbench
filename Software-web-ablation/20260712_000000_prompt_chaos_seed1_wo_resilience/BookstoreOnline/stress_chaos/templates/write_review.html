<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>
        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="select-book">Select Book:</label>
            <select id="select-book" name="book_id">
                {% for book in purchased_books %}
                <option value="{{ book.book_id }}">{{ book.title }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="customer_name">Your Name:</label>
            <input type="text" id="customer_name" name="customer_name" required>
            <br>
            <label for="rating">Rating:</label>
            <select id="rating" name="rating">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <br>
            <label for="review_text">Review:</label>
            <textarea id="review_text" name="review_text" required></textarea>
            <br>
            <button type="submit">Submit Review</button>
        </form>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
