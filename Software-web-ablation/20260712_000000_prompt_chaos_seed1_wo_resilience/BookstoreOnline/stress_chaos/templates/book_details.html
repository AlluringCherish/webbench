<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book.title }}</h1>
        <p id="book-author">Author: {{ book.author }}</p>
        <p id="book-price">Price: ${{ book.price }}</p>
        <form method="POST" action="{{ url_for('book_details', book_id=book.book_id) }}">
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" name="quantity" value="1" min="1">
            <button type="submit">Add to Cart</button>
        </form>
        <div id="book-reviews">
            <h2>Reviews</h2>
            <ul>
                {% for review in reviews %}
                <li><strong>{{ review.customer_name }}</strong>: {{ review.review_text }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
