<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>
        <nav>
            <button id="btn-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="btn-create-article" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>
            <button id="btn-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
        </nav>
        <section id="calendar-view">
            <!-- Dynamic calendar content here -->
            {% for event in calendar_events %}
            <div id="event-{{ event.id }}">
                <h2>{{ event.title }}</h2>
                <p>{{ event.date }}</p>
            </div>
            {% else %}
            <p>No scheduled content.</p>
            {% endfor %}
        </section>
    </div>
</body>
</html>
