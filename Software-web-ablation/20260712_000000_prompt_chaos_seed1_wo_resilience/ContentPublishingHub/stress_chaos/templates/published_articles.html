<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles</title>
</head>
<body>
    <div id="published-articles-page">
        <h1>Published Articles</h1>
        <nav>
            <button id="btn-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="btn-create-article" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>
            <button id="btn-content-calendar" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        </nav>
        <section id="articles-list">
            {% for article in articles %}
            <article id="article-{{ article.id }}">
                <h2>{{ article.title }}</h2>
                <p>{{ article.summary }}</p>
                <button id="btn-view-{{ article.id }}" onclick="location.href='{{ url_for('view_article', article_id=article.id) }}'">View</button>
                <button id="btn-edit-{{ article.id }}" onclick="location.href='{{ url_for('edit_article', article_id=article.id) }}'">Edit</button>
            </article>
            {% else %}
            <p>No articles published yet.</p>
            {% endfor %}
        </section>
    </div>
</body>
</html>
