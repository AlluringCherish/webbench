<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Article</title>
</head>
<body>
    <div id="view-article-page">
        <h1>{{ article.title }}</h1>
        <nav>
            <button id="btn-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="btn-edit-article" onclick="location.href='{{ url_for('edit_article', article_id=article.id) }}'">Edit Article</button>
            <button id="btn-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="btn-content-calendar" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        </nav>
        <article id="article-{{ article.id }}">
            <p>{{ article.content }}</p>
        </article>
    </div>
</body>
</html>
