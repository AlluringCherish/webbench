<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        <nav>
            <button id="btn-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="btn-create-article" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>
            <button id="btn-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="btn-content-calendar" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        </nav>
        <form id="form-edit-article" method="POST" action="{{ url_for('edit_article', article_id=article.id) }}">
            <label for="input-title">Title:</label>
            <input id="input-title" name="title" type="text" required value="{{ article.title }}">
            <br>
            <label for="input-content">Content:</label>
            <textarea id="input-content" name="content" required>{{ article.content }}</textarea>
            <br>
            <button id="btn-save" type="submit">Save</button>
        </form>
    </div>
</body>
</html>
