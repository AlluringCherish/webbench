<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create Article</h1>
        <nav>
            <button id="btn-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
            <button id="btn-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="btn-content-calendar" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
        </nav>
        <form id="form-create-article" method="POST" action="{{ url_for('create_article') }}">
            <label for="input-title">Title:</label>
            <input id="input-title" name="title" type="text" required>
            <br>
            <label for="input-content">Content:</label>
            <textarea id="input-content" name="content" required></textarea>
            <br>
            <button id="btn-submit" type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
