<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>
        <nav>
            <button id="btn-create-article" onclick="location.href='{{ url_for('create_article') }}'">Create Article</button>
            <button id="btn-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Published Articles</button>
            <button id="btn-content-calendar" onclick="location.href='{{ url_for('content_calendar') }}'">Content Calendar</button>
            <button id="btn-user-analytics" onclick="location.href='{{ url_for('user_analytics_view') }}'">User Analytics</button>
        </nav>
        <section id="dashboard-summary">
            <p>Total Articles: {{ data.total_articles }}</p>
            <p>Published Articles: {{ data.published_articles }}</p>
            <p>Scheduled Events: {{ data.scheduled_events }}</p>
        </section>
    </div>
</body>
</html>
