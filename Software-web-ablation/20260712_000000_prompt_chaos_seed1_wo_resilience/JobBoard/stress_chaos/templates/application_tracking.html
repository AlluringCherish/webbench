<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Application Tracking</title>
</head>
<body>
<div id="application-tracking-page">
<h1>My Applications</h1>
<label for="status-filter">Filter by Status:</label>
<select id="status-filter" name="status_filter" onchange="this.form.submit()">
  <option value="">All Statuses</option>
  {% for status in status_options %}
  <option value="{{ status }}" {% if status == status_filter %}selected{% endif %}>{{ status }}</option>
  {% endfor %}
</select>
<table>
<thead>
<tr>
<th>Company</th>
<th>Job Title</th>
<th>Applied Date</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for app in applications %}
<tr>
<td>{{ app.company_name }}</td>
<td>{{ app.job_title }}</td>
<td>{{ app.applied_date }}</td>
<td>{{ app.status }}</td>
<td><button onclick="window.location.href='{{ url_for('application_details', application_id=app.application_id) }}'">View</button></td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
</body>
</html>
