<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page_title }}</title>
</head>
<body>
<div id="dashboard">
<h1>Welcome to Job Board</h1>
<h2>Featured Jobs</h2>
<div id="jobs-grid">
  {% for job in featured_jobs %}
  <div class="job-card" id="job-{{ job.job_id }}">
    <h3>{{ job.title }}</h3>
    <p>Location: {{ job.location }}</p>
    <p>Salary Max: ${{ job.salary_max }}</p>
  </div>
  {% endfor %}
</div>
</div>
</body>
</html>
