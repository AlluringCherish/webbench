<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Companies</title>
</head>
<body id="companies-page">
<h1>Companies</h1>
<form action="" method="GET">
  <input type="text" name="search_company" placeholder="Search companies..." value="{{ request.args.get('search_company', '') }}">
  <button type="submit">Search</button>
</form>
<div id="company-list">
  {% for company in companies %}
  <div class="company-card" id="company-{{ company.company_id }}">
    <h2>{{ company.company_name }}</h2>
    <p>Industry: {{ company.industry }}</p>
    <p>Location: {{ company.location }}</p>
    <p>Employees: {{ company.employee_count }}</p>
    <p>{{ company.description }}</p>
  </div>
  {% endfor %}
</div>
<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
