<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ company.company_name }} Profile</title>
</head>
<body>
<div id="company-profile-page">
<h1>{{ company.company_name }}</h1>
<p>Industry: {{ company.industry }}</p>
<p>Location: {{ company.location }}</p>
<p>{{ company.description }}</p>
<h2>Jobs Posted</h2>
<div id="jobs-list">
  {% for job in company.jobs %}
  <div class="job-card" id="job-title-{{ job.job_id }}">
    <h3>{{ job.title }}</h3>
    <p>Location: {{ job.location }}</p>
    <p>Salary Max: ${{ job.salary_max }}</p>
    <button onclick="window.location.href='{{ url_for('job_details', job_id=job.job_id) }}'">Job Details</button>
  </div>
  {% endfor %}
</div>
<button onclick="window.location.href='{{ url_for('companies') }}'">Back to Companies</button>
</div>
</body>
</html>
