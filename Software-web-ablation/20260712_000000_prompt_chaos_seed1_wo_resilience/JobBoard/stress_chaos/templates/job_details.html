<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ job.title if job else 'Job Details' }}</title>
</head>
<body>
<div id="job-details-page">
{% if job %}
  <h1 id="title">{{ job.title }}</h1>
  <p id="company">Company: {{ job.company_name }}</p>
  <p id="location">Location: {{ job.location }}</p>
  <div id="job-description">
    <h2>Description</h2>
    <p>{{ job.description }}</p>
  </div>
  <div id="job-salary">
    <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
  </div>
  <button onclick="window.location.href='{{ url_for('application_form', job_id=job.job_id) }}'">Apply Now</button>
{% else %}
  <p>Job not found.</p>
{% endif %}
</div>
</body>
</html>
