<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Dashboard</h1>
    <button id="my-borrows-button" onclick="location.href='{{ url_for('my_borrows') }}'">My Borrowings</button>
    <h2>Featured Books</h2>
    <ul>
        {% for book in featured_books %}
        <li>
            <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">
                <strong>{{ book.title }}</strong> by {{ book.author }}
            </button>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('book_catalog') }}" id="catalog-link">Book Catalog</a>
    <a href="{{ url_for('payment_confirmation') }}" id="payment-link">Payment</a>
</div>
</body>
</html>
