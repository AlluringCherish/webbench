<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write Review</h1>
    <form method="POST" action="{{ url_for('submit_edit_review', review_id=review.review_id) if review else url_for('submit_write_review', book_id=book_id) }}">
        <label for="rating-input">Rating:</label>
        <input id="rating-input" name="rating" type="number" min="1" max="5" value="{{ review.rating if review else '' }}" required>
        <label for="review-textarea">Review Text:</label>
        <textarea id="review-textarea" name="review_text" required>{{ review.review_text if review else '' }}</textarea>
        <button id="submit-review-button" type="submit">Submit Review</button>
    </form>
    <a href="{{ url_for('book_details', book_id=book_id) }}" id="back-to-book">Back to Book</a>
</div>
</body>
</html>
