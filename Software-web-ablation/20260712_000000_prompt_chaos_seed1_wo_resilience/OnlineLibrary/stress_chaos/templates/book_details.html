<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
<div id="book-details-page">
    <h1>Book Details</h1>
    <div id="book-info">
        <h2>{{ title }}</h2>
        <p><strong>Author:</strong> {{ author }}</p>
        <p><strong>Status:</strong> {{ status }}</p>
        <p><strong>Description:</strong> {{ description }}</p>
    </div>
    <button id="borrow-button" onclick="location.href='{{ url_for('borrow', book_id=book_id) }}'">Borrow</button>
    <button id="write-review-button" onclick="location.href='{{ url_for('write_review', book_id=book_id) }}'">Write Review</button>
    <h3>Reviews</h3>
    <ul id="reviews-list">
        {% for review in reviews %}
        <li>
            <strong>Rating:</strong> {{ review.rating }}<br>
            <strong>Date:</strong> {{ review.review_date }}<br>
            <p>{{ review.review_text }}</p>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('book_catalog') }}" id="back-to-catalog">Back to Catalog</a>
</div>
</body>
</html>
