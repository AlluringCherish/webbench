<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Borrowings</title>
</head>
<body>
<div id="my-borrows-page">
    <h1>My Borrowings</h1>
    <ul>
        {% for borrow in borrows %}
        <li id="borrow-{{ borrow.borrow_id }}">
            <strong>{{ borrow.book_title }}</strong> - Status: {{ borrow.status }}
            {% if borrow.status == 'borrowed' %}
            <form method="POST" action="{{ url_for('return_book', borrow_id=borrow.borrow_id) }}">
                <button id="return-book-button-{{ borrow.borrow_id }}" type="submit">Return Book</button>
            </form>
            {% endif %}
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
</div>
</body>
</html>
