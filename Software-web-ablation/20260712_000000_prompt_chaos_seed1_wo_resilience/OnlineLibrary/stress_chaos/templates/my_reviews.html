<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
<div id="my-reviews-page">
    <h1>My Reviews</h1>
    <ul>
        {% for review in reviews %}
        <li id="review-{{ review.review_id }}">
            <strong>{{ review.book_title }}</strong>
            <p>{{ review.review_text }}</p>
            <button id="edit-review-button-{{ review.review_id }}" onclick="location.href='{{ url_for('edit_review_page', review_id=review.review_id) }}'">Edit</button>
            <form method="POST" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                <button id="delete-review-button-{{ review.review_id }}" type="submit">Delete</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
</div>
</body>
</html>
