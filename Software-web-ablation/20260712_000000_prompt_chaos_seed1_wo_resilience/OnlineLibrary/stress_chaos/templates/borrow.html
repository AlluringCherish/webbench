<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
<div id="borrow-page">
    <h1>Borrow Confirmation</h1>
    <div id="borrow-info">
        <p>Book Title: {{ book_details.title }}</p>
        <p>Author: {{ book_details.author }}</p>
        <p>Due Date: {{ due_date }}</p>
    </div>
    <form method="POST" action="{{ url_for('confirm_borrow', book_id=book_details.book_id) }}">
        <button id="confirm-borrow-button" type="submit">Confirm Borrow</button>
    </form>
    <form method="POST" action="{{ url_for('cancel_borrow') }}">
        <button id="cancel-borrow-button" type="submit">Cancel</button>
    </form>
</div>
</body>
</html>
