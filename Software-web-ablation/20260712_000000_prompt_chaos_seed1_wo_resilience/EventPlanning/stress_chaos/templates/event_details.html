<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <h1>{{ event.event_name }}</h1>
    <div id="main-container-id">
        <p><strong>Category:</strong> {{ event.category }}</p>
        <p><strong>Date:</strong> {{ event.date }}</p>
        <p><strong>Time:</strong> {{ event.time }}</p>
        <p><strong>Location:</strong> {{ event.location }}</p>
        <p><strong>Description:</strong> {{ event.description }}</p>
        <button id="view-venue-details-{{ event.venue_id }}" onclick="location.href='{{ url_for('venue_details', venue_id=event.venue_id) }}'">View Venue Details</button>
        <button id="book-ticket-button" onclick="location.href='{{ url_for('book_ticket', event_id=event.event_id) }}'">Book Ticket</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
