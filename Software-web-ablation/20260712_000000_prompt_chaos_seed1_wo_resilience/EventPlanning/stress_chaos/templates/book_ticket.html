<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <h1>Book Ticket for {{ event.event_name }}</h1>
    <div id="main-container-id">
        <form method="POST" action="{{ url_for('book_ticket', event_id=event.event_id) }}">
            <label for="ticket-type-select">Ticket Type:</label>
            <select id="ticket-type-select" name="ticket_type">
                {% for ticket in tickets %}
                <option value="{{ ticket.ticket_type }}">{{ ticket.ticket_type }} - ${{ ticket.price }}</option>
                {% endfor %}
            </select>
            <label for="ticket-quantity-input">Quantity:</label>
            <input type="number" id="ticket-quantity-input" name="ticket_quantity" min="1" max="10" value="1" required>
            <button id="book-ticket-button" type="submit">Book Ticket</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
