<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <h1>{{ page_title }}</h1>
    <div id="main-container-id">
        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card" id="venue-card-{{ venue.venue_id }}">
                <h2 class="venue-name">{{ venue.venue_name }}</h2>
                <p class="venue-location">Location: {{ venue.location }}</p>
                <p class="venue-capacity">Capacity: {{ venue.capacity }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}" onclick="location.href='{{ url_for('venue_details', venue_id=venue.venue_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
