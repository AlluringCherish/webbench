<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <h1>{{ page_title }}</h1>
    <div id="main-container-id">
        <div id="events-grid">
            {% for event in events %}
            <div class="event-card" id="event-card-{{ event.event_id }}">
                <h2 class="event-title">{{ event.event_name }}</h2>
                <p class="event-category">Category: {{ event.category }}</p>
                <p class="event-date">Date: {{ event.date }}</p>
                <p class="event-time">Time: {{ event.time }}</p>
                <p class="event-location">Location: {{ event.location }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="browse-events-button" onclick="location.href='{{ url_for('events_listing') }}'">Browse All Events</button>
    </div>
</body>
</html>
