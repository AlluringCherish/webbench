<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <h1>{{ venue.venue_name }}</h1>
    <div id="main-container-id">
        <p><strong>Location:</strong> {{ venue.location }}</p>
        <p><strong>Capacity:</strong> {{ venue.capacity }}</p>
        <p><strong>Amenities:</strong> {{ venue.amenities }}</p>
        <p><strong>Contact:</strong> {{ venue.contact }}</p>
        <button id="back-to-venues-button" onclick="location.href='{{ url_for('venues_page') }}'">Back to Venues</button>
    </div>
</body>
</html>
