<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="events-page">
        <h1>{{ page_title }}</h1>

        <form method="POST" action="{{ url_for('events_search') }}">
            <input type="text" id="event-search-input" name="search_text" placeholder="Search events by name, location, or date" value="{{ search_text if search_text is defined else '' }}">
            <select id="event-category-filter" name="search_category">
                <option value="">All Categories</option>
                <option value="Conference" {% if search_category == 'Conference' %}selected{% endif %}>Conference</option>
                <option value="Concert" {% if search_category == 'Concert' %}selected{% endif %}>Concert</option>
                <option value="Sports" {% if search_category == 'Sports' %}selected{% endif %}>Sports</option>
                <option value="Workshop" {% if search_category == 'Workshop' %}selected{% endif %}>Workshop</option>
                <option value="Social" {% if search_category == 'Social' %}selected{% endif %}>Social</option>
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="events-grid">
            {% for event in events %}
                <div class="event-card">
                    <h2>{{ event.event_name }}</h2>
                    <p>Category: {{ event.category }}</p>
                    <p>Date: {{ event.date }}</p>
                    <p>Location: {{ event.location }}</p>
                    <p>{{ event.description }}</p>
                    <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
                </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
