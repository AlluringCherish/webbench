<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="venues-page">
        <h1>{{ page_title }}</h1>

        <form method="GET" action="{{ url_for('venues_page') }}">
            <input id="venue-search-input" name="search_text" type="text" placeholder="Search venues" value="{{ search_text if search_text is defined else '' }}">
            <select id="venue-capacity-filter" name="capacity_filter">
                <option value="">All Sizes</option>
                <option value="Small" {% if capacity_filter == 'Small' %}selected{% endif %}>Small</option>
                <option value="Medium" {% if capacity_filter == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Large" {% if capacity_filter == 'Large' %}selected{% endif %}>Large</option>
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="venues-grid">
            {% for venue in venues %}
                <div class="venue-card">
                    <h2>{{ venue.venue_name }}</h2>
                    <p>Location: {{ venue.location }}</p>
                    <p>Capacity: {{ venue.capacity }}</p>
                    <p>Amenities: {{ venue.amenities }}</p>
                    <p>Contact: {{ venue.contact }}</p>
                    <button id="view-venue-details-{{ venue.venue_id }}" onclick="alert('Venue details feature not implemented')">View Details</button>
                </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
