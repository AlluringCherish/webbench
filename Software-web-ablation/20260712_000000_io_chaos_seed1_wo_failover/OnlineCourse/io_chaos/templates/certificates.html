<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <h1>My Certificates</h1>

        <div id="certificates-grid">
            {% if certificates %}
                <ul>
                {% for certificate in certificates %}
                    <li>
                        {{ certificate.course_title }} - Issued on {{ certificate.issue_date }}
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No certificates earned yet.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
