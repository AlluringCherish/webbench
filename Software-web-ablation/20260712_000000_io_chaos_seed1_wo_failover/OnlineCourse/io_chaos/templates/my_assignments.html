<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Assignments</title>
</head>
<body>
    <div id="assignments-page">
        <h1>My Assignments</h1>

        <table id="assignments-table" border="1">
            <thead>
                <tr>
                    <th>Course ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Due Date</th>
                    <th>Max Points</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for assignment in assignments %}
                    <tr>
                        <td>{{ assignment.course_id }}</td>
                        <td>{{ assignment.title }}</td>
                        <td>{{ assignment.description }}</td>
                        <td>{{ assignment.due_date }}</td>
                        <td>{{ assignment.max_points }}</td>
                        <td>{{ assignment.submission_status }}</td>
                        <td>
                            <button id="submit-assignment-button-{{ assignment.assignment_id }}" onclick="location.href='{{ url_for('submit_assignment_form', assignment_id=assignment.assignment_id) }}'">Submit</button>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
