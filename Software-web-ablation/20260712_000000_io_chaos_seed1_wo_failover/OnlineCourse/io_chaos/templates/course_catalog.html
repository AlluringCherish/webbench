<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Available Courses</h1>

        <input type="text" id="search-input" name="search" placeholder="Search courses..." value="{{ search_query if search_query is defined else '' }}">

        <div id="course-grid">
            {% for course in courses %}
                <button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">
                    {{ course.title }}
                </button>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
