<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Pets</title>
</head>
<body>
    <div id="pet-listings-page">
        <h1>Available Pets</h1>
        <form method="post" action="{{ url_for('pet_search') }}">
            <input type="text" id="search-input" name="search_query" placeholder="Search pets..." />
            <select id="filter-species" name="filter_species">
                <option value="All" {% if filter_species == 'All' %}selected{% endif %}>All</option>
                <option value="Dog" {% if filter_species == 'Dog' %}selected{% endif %}>Dog</option>
                <option value="Cat" {% if filter_species == 'Cat' %}selected{% endif %}>Cat</option>
                <option value="Bird" {% if filter_species == 'Bird' %}selected{% endif %}>Bird</option>
                <option value="Rabbit" {% if filter_species == 'Rabbit' %}selected{% endif %}>Rabbit</option>
                <option value="Other" {% if filter_species == 'Other' %}selected{% endif %}>Other</option>
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="pet-grid">
            {% for pet in pets %}
            <div class="pet-card" id="pet-{{ pet.pet_id }}">
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}" />
                <div>Name: {{ pet.name }}</div>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
                <button onclick="location.href='{{ url_for('pet_details_page', pet_id=pet.pet_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
