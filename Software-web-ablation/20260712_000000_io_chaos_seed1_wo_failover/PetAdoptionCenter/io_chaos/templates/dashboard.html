<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>
        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div class="featured-pet">
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}" />
                <div>Name: {{ pet.name }}</div>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="browse-pets-button" onclick="location.href='{{ url_for('pet_listings_page') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Refresh Dashboard</button>
        <div id="recent-activities">
            <h2>Recent Activities</h2>
            <ul>
                {% for activity in recent_activities %}
                <li>{{ activity }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
