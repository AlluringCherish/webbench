<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Showtime</title>
</head>
<body>
    <div id="showtime-page">
        <h1>Select Showtime</h1>

        <select id="theater-filter" name="theater">
            <option value="">All Theaters</option>
            {% for theater in theaters %}
                <option value="{{ theater.theater_id }}">{{ theater.theater_name }}</option>
            {% endfor %}
        </select>

        <input type="date" id="date-filter" name="date">

        <div id="showtimes-list">
            {% for showtime in showtimes %}
                <div class="showtime-entry">
                    <p>Theater: {{ showtime.theater_name }}</p>
                    <p>Date: {{ showtime.showtime_date }}</p>
                    <p>Time: {{ showtime.showtime_time }}</p>
                    <p>Price: ${{ '%0.2f' | format(showtime.price) }}</p>
                    <a href="{{ url_for('select_seats', showtime_id=showtime.showtime_id) }}">
                        <button id="select-showtime-button-{{ showtime.showtime_id }}">Select</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
