<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>

        <label for="time-range-filter">Time Range:</label>
        <select id="time-range-filter">
            <option value="Last 24 Hours">Last 24 Hours</option>
            <option value="This Week">This Week</option>
            <option value="All Time">All Time</option>
        </select>

        <div id="trending-list">
            {% for auction in trending_auctions %}
                <div class="trending-auction-item">
                    <h3>#{{ auction.trending_rank }}: {{ auction.item_name }}</h3>
                    <p>Bids: {{ auction.bid_count }}</p>
                    <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
                    <p>Time Period: {{ auction.time_period }}</p>
                    <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}"><button id="view-auction-button-{{ auction.auction_id }}">View Auction</button></a>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_view') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>

    </div>
</body>
</html>
