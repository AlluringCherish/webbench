<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Details</title>
</head>
<body>
    <div id="auction-details-page" role="main">
        <h1 id="auction-title">{{ auction.title }}</h1>
        <p id="auction-description">{{ auction.description }}</p>
        <p id="current-bid">Current Bid: ${{ auction.current_bid }}</p>

        <form action="{{ url_for('place_bid', auction_id=auction.auction_id) }}" method="get">
            <button type="submit" id="place-bid-button">Place Bid</button>
        </form>

        <div id="bid-history">
            <h2>Bid History</h2>
            <ul>
            {% for bid in auction.bids %}
                <li>{{ bid.bidder_name }}: ${{ bid.amount }} at {{ bid.timestamp }}</li>
            {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
