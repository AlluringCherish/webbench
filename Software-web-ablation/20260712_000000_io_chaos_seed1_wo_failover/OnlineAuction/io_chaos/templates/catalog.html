<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>

        <input type="text" id="search-input" placeholder="Search auctions...">

        <select id="category-filter">
            <option value="Electronics">Electronics</option>
            <option value="Collectibles">Collectibles</option>
            <option value="Furniture">Furniture</option>
            <option value="Art">Art</option>
            <option value="Other">Other</option>
        </select>

        <div id="auctions-grid">
            {% for auction in auctions %}
                <div class="auction-card">
                    <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
                    <h3>{{ auction.item_name }}</h3>
                    <p>Category: {{ auction.category }}</p>
                    <p>{{ auction.description }}</p>
                    <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
                    <p>Ends at: {{ auction.end_time }}</p>
                    <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}"><button id="view-auction-button-{{ auction.auction_id }}">View Auction</button></a>
                </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
