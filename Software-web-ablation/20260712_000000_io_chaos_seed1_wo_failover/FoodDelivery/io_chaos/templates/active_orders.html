<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders_pages">
            <h1>Active Orders</h1>
            <select id="status_filter">
                <option value="">All Statuses</option>
                <option value="1" {% if status_filter == 1 %}selected{% endif %}>Pending</option>
                <option value="2" {% if status_filter == 2 %}selected{% endif %}>On the Way</option>
                <option value="3" {% if status_filter == 3 %}selected{% endif %}>Delivered</option>
            </select>
            <div id="orders_list">
                {% for order in active_orders %}
                <div class="order">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Status: {{ order.status_text }}</p>
                    <a href="{{ url_for('order_track', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
                {% endfor %}
            </div>
            <a href="{{ url_for('dashboard') }}">
                <button id="back-to-dashboard-button">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
