<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menus</title>
</head>
<body>
    <div id="main-container">
        <div id="menu_page">
            <h1 id="restaurant_name">{{ restaurant.name }}</h1>
            <section id="restaurant-info">
                <p>Address: {{ restaurant.address }}</p>
                <p>Phone: {{ restaurant.phone }}</p>
                <p>Rating: {{ restaurant.rating }}</p>
                <p>Cuisine: {{ restaurant.cuisine }}</p>
            </section>
            <section id="menu-items-grid">
                {% for item in menu_item %}
                <div class="menu-item">
                    <h3>{{ item.item_name }}</h3>
                    <p>{{ item.description }}</p>
                    <p>Price: ${{ item.price }}</p>
                    <a href="{{ url_for('item_details', item_id=item.item_id) }}">
                        <button id="view-item-detail-{{ item.item_id }}">View Details</button>
                    </a>
                    <button id="add-to-cart-button-{{ item.item_id }}">Add to Cart</button>
                </div>
                {% endfor %}
            </section>
        </div>
    </div>
</body>
</html>
