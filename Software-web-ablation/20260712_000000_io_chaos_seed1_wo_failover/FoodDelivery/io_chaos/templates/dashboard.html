<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Deliveries Dashboard</title>
</head>
<body>
    <div id="main-container">
        <div id="dashboard_pages">
            <h1>Food Deliveries Dashboard</h1>
            <div id="featured_restaurants">
                {% for restaurant in featured_restaurants %}
                <div class="restaurant">
                    <h2>{{ restaurant.name }}</h2>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                </div>
                {% endfor %}
            </div>
            <div>
                <a href="{{ url_for('browse_restaurants') }}">
                    <button id="browse_restaurant_button">Browse Restaurants</button>
                </a>
                <a href="{{ url_for('shopping_cart') }}">
                    <button id="view_cart_buttons">View Cart</button>
                </a>
                <a href="{{ url_for('active_orders') }}">
                    <button id="active_order_button">Active Orders</button>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
