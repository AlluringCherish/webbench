<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurant</title>
</head>
<body>
    <div id="main-container">
        <div id="restaurant_page">
            <h1>Browse Restaurant</h1>
            <textarea id="search-input" placeholder="Search restaurants..."></textarea>
            <select id="cuisinefilter">
                <option value="">All Cuisines</option>
                {% for cuisine in cuisines %}
                <option value="{{ cuisine.id }}" {% if cuisine.name in search_query %}selected{% endif %}>{{ cuisine.name }}</option>
                {% endfor %}
            </select>
            <div id="restaurants_grid">
                {% for restaurant in restaurants %}
                <div class="restaurant-card">
                    <h2>{{ restaurant.name }}</h2>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                    <a href="{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}">
                        <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
