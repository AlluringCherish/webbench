<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews_pages">
            <h1>Order Reviews</h1>
            <select id="filter_by_rating">
                <option value="">All Ratings</option>
                <option value="1" {% if filter_rating == 1 %}selected{% endif %}>1 Star</option>
                <option value="2" {% if filter_rating == 2 %}selected{% endif %}>2 Stars</option>
                <option value="3" {% if filter_rating == 3 %}selected{% endif %}>3 Stars</option>
                <option value="4" {% if filter_rating == 4 %}selected{% endif %}>4 Stars</option>
                <option value="5" {% if filter_rating == 5 %}selected{% endif %}>5 Stars</option>
            </select>
            <section id="reviews_list">
                {% for review in reviews %}
                <div class="review">
                    <p>{{ review.customer_name }} - Rating: {{ review.rating }}</p>
                    <p>{{ review.review_text }}</p>
                    <p>Date: {{ review.review_date }}</p>
                </div>
                {% endfor %}
            </section>
            <input type="button" id="write_review_button" value="Write Review" />
            <input type="button" id="back_to_dashboard" value="Back to Dashboard" onclick="location.href='{{ url_for('dashboard') }}'" />
        </div>
    </div>
</body>
</html>
