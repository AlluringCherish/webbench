<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="main-container">
        <section id="checkout_pages">
            <h1>Checkout</h1>
            <form method="POST" action="{{ url_for('checkout') }}">
                <label for="customer-name">Name:</label>
                <input type="text" id="customer-name" name="customer_name" required>
                <br>
                <label for="delivery-address">Delivery Address:</label>
                <textarea id="delivery-address" name="delivery_address" required></textarea>
                <br>
                <label for="phone-number">Phone Number:</label>
                <textarea id="phone-number" name="phone_number" required></textarea>
                <br>
                <label for="payment-method">Payment Method:</label>
                <select id="payment-method" name="payment_method" required>
                    <option value="credit_card">Credit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="cash">Cash</option>
                </select>
                <br>
                <button id="place-order-button" type="submit">Place Order</button>
            </form>
        </section>
    </div>
</body>
</html>
