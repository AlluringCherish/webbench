<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
</head>
<body>
    <div id="job_details">
        <h1 id="job_title">{{ job.title }}</h1>
        <div id="company_name">{{ company.company_name }}</div>
        <div id="job_desc">
            {% for line in job.description %}
            <p>{{ line }}</p>
            {% endfor %}
        </div>
        <div id="salary_range">
            Salary: {{ job.salary_min }} - {{ job.salary_max }}
        </div>
        <a href="{{ url_for('apply_form', job_id=job.job_id) }}">
            <button id="apply_now_button">Apply Now</button>
        </a>
    </div>
</body>
</html>
