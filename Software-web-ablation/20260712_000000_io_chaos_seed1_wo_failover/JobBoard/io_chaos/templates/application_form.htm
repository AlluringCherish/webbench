<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
    <div id="application_form_page">
        <h1>Submit Application</h1>
        {% if error_message %}
        <div style="color:red;">
            {% for err in error_message %}
                <p>{{ err }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% if success_message %}
        <div style="color:green;">Application submitted successfully.</div>
        {% endif %}
        <form method="POST" enctype="multipart/form-data">
            <label for="applicant_email">Email:</label>
            <input type="email" id="applicant_email" name="applicant_email" required>
            <br>
            <label for="applicant_name">Name:</label>
            <input type="text" id="applicant_name" name="applicant_name" required>
            <br>
            <label for="cover_letter">Cover Letter:</label>
            <textarea id="cover_letter" name="cover_letter" required></textarea>
            <br>
            <label for="resume_text">Resume:</label>
            <input type="text" id="resume_text" name="resume" required>
            <br>
            <button type="submit" id="submit_application_btn">Submit Application</button>
        </form>
    </div>
</body>
</html>
