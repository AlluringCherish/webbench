<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
    <div id="companyprofilepage">
        <h1>{{ company.company_name }}</h1>
        <div id="companyinfo">
            <p>Industry: {{ company.industry }}</p>
            <p>Location: {{ company.location }}</p>
            <div>
                {% for line in company.description %}
                <p>{{ line }}</p>
                {% endfor %}
            </div>
        </div>
        <div id="companyjobs">
            <h2>Jobs</h2>
            <div id="jobslist">
                {% for job_id, job in company_jobs.items() %}
                <div>
                    <h3>{{ job.title }}</h3>
                    <p>Status: {{ job.status }}</p>
                    <a href="{{ url_for('detail_job', job_identifier=job.job_id) }}">
                        <button id="viewjobbutton-{{ job.job_id }}">View Job</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
        <a href="{{ url_for('list_companies') }}">
            <button id="backtocompanies">Back to Companies</button>
        </a>
    </div>
</body>
</html>
