<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
    <div id="application_form_page">
        <h1>Submit Application</h1>
        {% if error_msg %}
        <div style="color:red;">{{ error_msg }}</div>
        {% endif %}
        {% if success_msg %}
        <div style="color:green;">{{ success_msg }}</div>
        {% endif %}
        <form method="POST" enctype="multipart/form-data">
            <label for="applicantemail">Email:</label>
            <input type="email" id="applicantemail" name="applicant_email" required>
            <br>
            <label for="applicantname">Name:</label>
            <input type="text" id="applicantname" name="applicant_name" required>
            <br>
            <label for="coverletter">Cover Letter:</label>
            <textarea id="coverletter" name="cover_letter" required></textarea>
            <br>
            <label for="resumeupload">Resume:</label>
            <input type="text" id="resumeupload" name="resume" required>
            <br>
            <button type="submit" id="submitapplicationbtn">Submit Application</button>
        </form>
    </div>
</body>
</html>
