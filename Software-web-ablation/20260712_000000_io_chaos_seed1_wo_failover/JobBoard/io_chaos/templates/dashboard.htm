<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JobBoard Dashboard</title>
</head>
<body>
    <div id="dashboard_page">
        <h1>JobBoard Dashboard</h1>
        <div id="featured-jobs">
            {% for job in featured_jobs %}
            <div>
                <h3>{{ job.title }}</h3>
                <p>Company: {{ job.company_name }}</p>
                <p>Location: {{ job.location }}</p>
                <p>Salary: {{ job.salary_minimum }} - {{ job.salary_maximum }}</p>
            </div>
            {% endfor %}
        </div>
        <div>
            <h2>Latest Jobs</h2>
            <ul>
                {% for job in latest_jobs %}
                <li>{{ job }}</li>
                {% endfor %}
            </ul>
        </div>
        <a href="{{ url_for('jobs_listing') }}">
            <button id="browse-jobs-button">Browse Jobs</button>
        </a>
        <a href="{{ url_for('track_applications') }}">
            <button id="my-applications-button">My Applications</button>
        </a>
        <a href="{{ url_for('list_companies') }}">
            <button id="companies-button">Companies</button>
        </a>
    </div>
</body>
</html>
