<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
</head>
<body>
    <div id="job-details">
        <h1 id="jobtitle">{{ job.title }}</h1>
        <div id="companyname">{{ company.company_name }}</div>
        <div id="jobdescription">
            {% for line in job.description %}
            <p>{{ line }}</p>
            {% endfor %}
        </div>
        <div id="salaryrange">
            Salary: {{ job.salary_min }} - {{ job.salary_max }}
        </div>
        <a href="{{ url_for('apply_form', job_id=job.job_id) }}">
            <button id="apply-now-btn">Apply Now</button>
        </a>
    </div>
</body>
</html>
