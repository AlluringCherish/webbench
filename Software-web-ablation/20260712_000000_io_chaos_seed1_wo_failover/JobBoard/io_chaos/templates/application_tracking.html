<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="trackingpage">
        <h1>My Applications</h1>
        <select id="statusfilter">
            <option>All</option>
            <option>Applied</option>
            <option>Review</option>
            <option>Interviewed</option>
            <option>Rejected</option>
        </select>
        <table id="applications_table">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for application in application_list %}
                <tr>
                    <td>{{ application.job_title }}</td>
                    <td>{{ application.company }}</td>
                    <td>{{ application.state }}</td>
                    <td>{{ application.applied_date }}</td>
                    <td>
                        <a href="{{ url_for('application_detail', application_id=application.application_id) }}">
                            <button id="view-application-btn-{{ application.application_id }}">View</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('dash') }}">
            <button id="backtodashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
