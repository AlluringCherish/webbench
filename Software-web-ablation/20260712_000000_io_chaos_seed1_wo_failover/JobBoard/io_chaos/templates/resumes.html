<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resumepage">
        <h1>My Resumes</h1>
        <div id="resumeslist">
            {% for resume_id, resume in resume_list.items() %}
            <div>
                <p>Name: {{ resume.applicant_name }}</p>
                <p>Email: {{ resume.applicant_email }}</p>
                <p>Filename: {{ resume.filename }}</p>
                <p>Uploaded: {{ resume.upload_date }}</p>
                <p>Summary: {{ resume.summary }}</p>
                <form method="POST" action="/remove_resume/{{ resume.resume_id }}">
                    <button id="deleteresumebtn-{{ resume.resume_id }}" type="submit">Delete</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <button id="uploadresumebutton" onclick="document.getElementById('resumefileinput').click()">Upload Resume</button>
        <input type="file" id="resumefileinput" name="file_resume" style="display:none;" />
        <a href="{{ url_for('dash') }}">
            <button id="backtodashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
