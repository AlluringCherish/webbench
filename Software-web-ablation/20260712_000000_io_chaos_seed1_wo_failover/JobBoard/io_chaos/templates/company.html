<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companiespage">
        <h1>Company Directory</h1>
        <input type="text" id="searchcompanyinput" placeholder="Search Companies">
        <div id="companieslist">
            {% for key, company in companies.items() %}
            <div>
                <h3>{{ company.company }}</h3>
                <p>Industry: {{ company.industry }}</p>
                <p>Employees: {{ company.employee_count }}</p>
                <a href="{{ url_for('profile_company', company_identifier=company.company_id) }}">
                    <button id="viewcompanybutton-{{ company.company_id }}">View Profile</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dash') }}">
            <button id="backtodashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
