<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu_page">
        <h1>Restaurant Menu</h1>
        <div id="menu-grid">
            {% for dish in menus %}
            <div class="dish-card">
                <h3>{{ dish.name }}</h3>
                <p>Category: {{ dish.category }}</p>
                <p>Price: ${{ dish.price }}</p>
                <p>{{ dish.description }}</p>
                <button id="view-dish-{{ dish.dishid }}" onclick="location.href='{{ url_for('dishDetails', dishid=dish.dishid) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="backtodashboard" onclick="location.href='{{ url_for('dashBoard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
