<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviewspage">
        <h1>My Reviews</h1>
        <div id="reviewslist">
            {% for review in reviews %}
            <div class="review-entry">
                <h3>{{ review.dishname }}</h3>
                <p>Rating: {{ review.rating }}</p>
                <p>Review: {{ review.reviewtext }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="writenewreviewbutton" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="backtodashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
