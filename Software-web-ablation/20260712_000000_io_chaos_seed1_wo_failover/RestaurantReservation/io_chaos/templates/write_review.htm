<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="writereviewpage">
        <h1>Write Review</h1>
        <form action="{{ url_for('write_review') }}" method="GET">
            <label for="selectdish">Select Dish:</label>
            <select id="selectdish" name="dishid">
                {% for dish in dishes %}
                    <option value="{{ dish.dishid }}">{{ dish.name }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="ratinginput">Rating:</label>
            <select id="ratinginput" name="rating">
                {% for i in range(1, 6) %}
                    <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="reviewtext">Review:</label>
            <textarea id="reviewtext" name="reviewtext"></textarea>
            <br>
            <button type="submit" id="submitreviewbutton">Submit Review</button>
        </form>
        <button id="backtoreviews" onclick="location.href='{{ url_for('myReviews') }}'">Back to Reviews</button>
    </div>
</body>
</html>
