<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profilepage">
        <h1>My Profile</h1>
        <form action="{{ url_for('profile') }}" method="GET">
            <div id="profileusername">{{ userprofile.username }}</div>
            <label for="profileemail">Email:</label>
            <input type="text" id="profileemail" name="email" value="{{ userprofile.email }}">
            <button type="submit" id="updateprofilebutton">Update Profile</button>
        </form>
        <button id="backtodashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
