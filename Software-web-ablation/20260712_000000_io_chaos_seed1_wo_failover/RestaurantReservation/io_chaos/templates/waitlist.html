<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <div id="waitlistpage">
        <h1>Waitlist</h1>
        <form action="{{ url_for('waitlist') }}" method="POST">
            <label for="waitlistpartysize">Party Size:</label>
            <select id="waitlistpartysize" name="partysize">
                {% for i in range(1, 11) %}
                    <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="joinwaitlistbutton">Join Waitlist</button>
        </form>
        <div id="userposition">
            {% if position %}
            <p>Your current position: {{ position }}</p>
            {% else %}
            <p>You are not currently on the waitlist.</p>
            {% endif %}
        </div>
        <button id="back_to_dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
