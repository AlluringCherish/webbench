<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <div id="reservationpage">
        <h1>Make Reservation</h1>
        <form action="{{ url_for('make_reservation') }}" method="GET">
            <label for="guestname">Guest Name:</label>
            <input type="text" id="guestname" name="guestname" required>
            <br>
            <label for="partysize">Party Size:</label>
            <select id="partysize" name="partysize">
                {% for i in range(1, 11) %}
                    <option value="{{ i }}">{{ i }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="reservationdate">Reservation Date:</label>
            <input type="date" id="reservationdate" name="reservationdate" required>
            <br>
            <button type="submit" id="submit-reservation-btn">Submit Reservation</button>
        </form>
        <button id="backtodashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
