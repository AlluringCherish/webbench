<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dish Detail</title>
</head>
<body>
    <div id="dishdetailspage">
        <h1 id="dish-name">{{ dish.name }}</h1>
        <div id="dish-cost">Price: ${{ dish.price }}</div>
        <div>Description: {{ dish.description }}</div>
        <div>Category: {{ dish.category }}</div>
        <div>Ingredients: {{ dish.ingredients|join(', ') }}</div>
        <div>Dietary Info: {{ dish.dietary }}</div>
        <div>Average Rating: {{ dish.avg_rating }}</div>
        <button id="back-to-menu" onclick="location.href='{{ url_for('menu_page') }}'">Back to Menu</button>
    </div>
</body>
</html>
