<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1 id="reviews-heading">Customer Reviews</h1>

        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating_filter" onchange="window.location.href='{{ url_for('reviews_page') }}?rating_filter='+this.value">
            <option value="">All Ratings</option>
            <option value="1" {% if rating_filter == '1' %}selected{% endif %}>1 Star</option>
            <option value="2" {% if rating_filter == '2' %}selected{% endif %}>2 Stars</option>
            <option value="3" {% if rating_filter == '3' %}selected{% endif %}>3 Stars</option>
            <option value="4" {% if rating_filter == '4' %}selected{% endif %}>4 Stars</option>
            <option value="5" {% if rating_filter == '5' %}selected{% endif %}>5 Stars</option>
        </select>

        <div id="reviews-list">
            {% for review in reviews %}
                <div class="review" id="review-{{ review.review_id|e }}">
                    <p><strong>{{ review.customer_name|e }}</strong> rated {{ review.rating }} stars</p>
                    <p>{{ review.review_text|e }}</p>
                    <p><small>{{ review.review_date }}</small></p>
                </div>
            {% else %}
                <p>No reviews found.</p>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review_page') }}'">Write a Review</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
