<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookstore Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="dashboard-heading">Bookstore Dashboard</h1>

        <div id="featured-books">
            {% for book in featured_books %}
                <div class="featured-book" id="featured-book-{{ book.book_id|e }}">
                    <h2>{{ book.title|e }}</h2>
                    <p>By {{ book.author|join(', ')|e }}</p>
                    <p>Price: ${{ book.price }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="browse-catalog-button" onclick="window.location.href='{{ url_for('catalog_page') }}'">Browse Catalog</button>
        <button id="view-cart-button" onclick="window.location.href='{{ url_for('cart_page') }}'">View Cart</button>
        <button id="bestsellers-button" onclick="window.location.href='{{ url_for('bestsellers_page') }}'">Bestsellers</button>
    </div>
</body>
</html>
