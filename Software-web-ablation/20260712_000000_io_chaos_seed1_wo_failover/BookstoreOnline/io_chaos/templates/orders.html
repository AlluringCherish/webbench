<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
</head>
<body>
    <div id="orders-page">
        <h1 id="orders-heading">Order History</h1>

        <label for="order-status-filter">Filter by Status:</label>
        <select id="order-status-filter" name="status_filter" onchange="window.location.href='{{ url_for('order_history_page') }}?status_filter='+this.value">
            <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
            <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="Shipped" {% if status_filter == 'Shipped' %}selected{% endif %}>Shipped</option>
            <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
        </select>

        <table id="orders-table" border="1">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Order Date</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for order in orders %}
                    <tr id="order-{{ order.order_id|e }}">
                        <td>{{ order.order_id }}</td>
                        <td>{{ order.customer_name|e }}</td>
                        <td>{{ order.order_date }}</td>
                        <td>${{ order.total_amount }}</td>
                        <td>{{ order.status }}</td>
                        <td><button id="view-order-button-{{ order.order_id|e }}" onclick="window.location.href='{{ url_for('order_details_page', order_id=order.order_id) }}'">View Details</button></td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
