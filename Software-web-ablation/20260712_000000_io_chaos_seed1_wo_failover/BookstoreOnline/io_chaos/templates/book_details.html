<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book.title|e }}</h1>
        <div id="book-author">Author: {{ book.author|e }}</div>
        <div id="book-price">Price: ${{ book.price }}</div>

        <form method="POST" action="">
            <button id="add-to-cart-button" type="submit">Add to Cart</button>
        </form>

        <div id="book-reviews">
            <h2>Customer Reviews</h2>
            {% for review in reviews %}
                <div class="review" id="review-{{ review.review_id|e }}">
                    <p><strong>{{ review.customer_name|e }}</strong> rated {{ review.rating }} stars</p>
                    <p>{{ review.review_text|e }}</p>
                    <p><small>{{ review.review_date }}</small></p>
                </div>
            {% else %}
                <p>No reviews yet.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
