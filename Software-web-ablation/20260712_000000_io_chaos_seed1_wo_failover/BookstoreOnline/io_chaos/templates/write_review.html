<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1 id="write-review-heading">Write a Review</h1>

        <form method="POST" action="">
            <label for="select-book">Select Book:</label>
            <select id="select-book" name="book_id" required>
                {% for book in books_purchased %}
                    <option value="{{ book.book_id|e }}">{{ book.title|e }}</option>
                {% endfor %}
            </select>

            <label for="rating-select">Rating:</label>
            <select id="rating-select" name="rating" required>
                <option value="1">1 Star</option>
                <option value="2">2 Stars</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5">5 Stars</option>
            </select>

            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" required></textarea>

            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
