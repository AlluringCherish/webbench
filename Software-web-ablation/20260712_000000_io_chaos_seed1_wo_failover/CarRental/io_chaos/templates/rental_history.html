<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rental History</title>
</head>
<body>
    <div id="main-container">
        <h1>Rental History</h1>
        <div id="history-page">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status_filter" onchange="this.form.submit()" form="filter-form">
                <option value="" {% if not status_filter %}selected{% endif %}>All</option>
                <option value="Completed" {% if status_filter == 'Completed' %}selected{% endif %}>Completed</option>
                <option value="Active" {% if status_filter == 'Active' %}selected{% endif %}>Active</option>
                <option value="Canceled" {% if status_filter == 'Canceled' %}selected{% endif %}>Canceled</option>
            </select>
            <form id="filter-form" method="GET" action="">
            </form>
            <table id="rentals-table" border="1">
                <thead>
                    <tr>
                        <th>Vehicle</th>
                        <th>Pickup Date</th>
                        <th>Dropoff Date</th>
                        <th>Pickup Location</th>
                        <th>Dropoff Location</th>
                        <th>Status</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rental in rentals %}
                    <tr>
                        <td>{{ rental.vehicle }}</td>
                        <td>{{ rental.pickup_date }}</td>
                        <td>{{ rental.dropoff_date }}</td>
                        <td>{{ rental.pickup_location }}</td>
                        <td>{{ rental.dropoff_location }}</td>
                        <td>{{ rental.status }}</td>
                        <td><button id="view-rental-details-{{ rental.rental_id }}">View Details</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
