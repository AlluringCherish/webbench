<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="main-container">
        <h1>Search Vehicles</h1>
        <div id="search-page">
            <form method="GET" action="{{ url_for('vehicle_search') }}">
                <label for="location-filter">Pickup Location:</label>
                <select id="location-filter" name="location">
                    <option value="" {% if not selected_location %}selected{% endif %}>All Locations</option>
                    {% for loc in filters.locations %}
                    <option value="{{ loc }}" {% if selected_location == loc %}selected{% endif %}>{{ loc }}</option>
                    {% endfor %}
                </select>
                <label for="vehicle-type-filter">Vehicle Type:</label>
                <select id="vehicle-type-filter" name="vehicle_type">
                    <option value="" {% if not selected_vehicle_type %}selected{% endif %}>All Types</option>
                    {% for vtype in filters.vehicle_types %}
                    <option value="{{ vtype }}" {% if selected_vehicle_type == vtype %}selected{% endif %}>{{ vtype }}</option>
                    {% endfor %}
                </select>
                <label for="date-range-input">Rental Date Range:</label>
                <input id="date-range-input" type="text" name="date_range" value="{{ selected_date_range or '' }}" placeholder="YYYY-MM-DD to YYYY-MM-DD">
                <button type="submit">Search</button>
            </form>
            <div id="vehicles-grid">
                {% for vehicle in vehicles %}
                <div class="vehicle-card">
                    <h3>{{ vehicle.make }} {{ vehicle.model }}</h3>
                    <p>Type: {{ vehicle.vehicle_type }}</p>
                    <p>Seats: {{ vehicle.seats }}</p>
                    <p>Daily Rate: ${{ '%.2f' % vehicle.daily_rate }}</p>
                    <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="window.location.href='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
