<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            <form method="POST" action="">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id">
                    {% for res in reservations %}
                    <option value="{{ res.reservation_id }}" {% if form_data.reservation_id == res.reservation_id|string %}selected{% endif %}>{{ res.vehicle }} ({{ res.pickup_date }} to {{ res.dropoff_date }})</option>
                    {% endfor %}
                </select>

                <label><input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance" {% if form_data.driver_assistance %}checked{% endif %}> Driver Assistance</label><br>

                <label><input type="checkbox" id="gps-option-checkbox" name="gps_option" {% if form_data.gps_option %}checked{% endif %}> GPS Option</label><br>

                <label for="child-seat-quantity">Number of Child Seats:</label>
                <input type="number" id="child-seat-quantity" name="child_seats" min="0" value="{{ form_data.child_seats or 0 }}"><br>

                <label for="special-notes">Special Notes:</label><br>
                <textarea id="special-notes" name="special_notes">{{ form_data.special_notes or '' }}</textarea><br>

                <button id="submit-requests-button" type="submit">Submit Requests</button>
            </form>
        </div>
    </div>
</body>
</html>
