<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="main-container">
        <h1>My Reservations</h1>
        <div id="reservations-page">
            <button id="sort-by-date-button" type="button">Sort by Date</button>
            <div id="reservations-list">
                {% for res in reservations %}
                <div class="reservation-item">
                    <p>{{ res.vehicle }} ({{ res.pickup_date }} to {{ res.dropoff_date }}) - Status: {{ res.status }}</p>
                    <button id="modify-reservation-button-{{ res.reservation_id }}">Modify</button>
                    <button id="cancel-reservation-button-{{ res.reservation_id }}">Cancel</button>
                </div>
                {% endfor %}
            </div>
            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
