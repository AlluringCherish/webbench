<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="main-container">
        <h1>Pickup and Dropoff Locations</h1>
        <div id="locations-page">
            <label for="hours-filter">Filter by Operating Hours:</label>
            <select id="hours-filter" name="filter_hours" onchange="this.form.submit()" form="filter-form">
                <option value="" {% if not filter_hours %}selected{% endif %}>All Hours</option>
            </select>
            <input id="search-location-input" name="search_query" type="text" value="{{ search_query or '' }}" placeholder="Search by city or name" form="filter-form">
            <form id="filter-form" method="GET" action="">
            </form>
            <div id="locations-list">
                {% for location in locations %}
                <div class="location-item">
                    <p>{{ location.city }} - {{ location.address }}</p>
                    <p>Phone: {{ location.phone }}</p>
                    <p>Hours: {{ location.hours }}</p>
                    <p>Available Vehicles: {{ location.available_vehicles }}</p>
                    <button id="location-detail-button-{{ location.location_id }}">View Details</button>
                </div>
                {% endfor %}
            </div>
            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
