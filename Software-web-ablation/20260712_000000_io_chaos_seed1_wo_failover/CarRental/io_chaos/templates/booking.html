<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
            <form method="POST" action="">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location">
                    {% for loc in pickup_locations %}
                    <option value="{{ loc }}" {% if booking_form_data.pickup_location == loc %}selected{% endif %}>{{ loc }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location">
                    {% for loc in dropoff_locations %}
                    <option value="{{ loc }}" {% if booking_form_data.dropoff_location == loc %}selected{% endif %}>{{ loc }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input id="pickup-date" name="pickup_date" type="date" value="{{ booking_form_data.pickup_date or '' }}" required>

                <label for="dropoff-date">Dropoff Date:</label>
                <input id="dropoff-date" name="dropoff_date" type="date" value="{{ booking_form_data.dropoff_date or '' }}" required>

                <button id="calculate-price-button" type="submit" name="action" value="calculate">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if total_price is not none %}
                Total Price: ${{ '%.2f' % total_price }}
                {% endif %}
            </div>

            {% if total_price is not none %}
            <form method="POST" action="{{ url_for('insurance_options_page', booking_id=booking_id) }}">
                <button id="proceed-to-insurance-button" type="submit">Proceed to Insurance Options</button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
