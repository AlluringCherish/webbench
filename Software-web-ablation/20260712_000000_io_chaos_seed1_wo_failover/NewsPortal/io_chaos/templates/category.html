<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>

        <div id="category-articles">
            {% for article in category_articles %}
                <div class="category-article">
                    <h3>{{ article.title }}</h3>
                    <p>Date: {{ article.date }}</p>
                    <p>Popularity: {{ article.popularity }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="sort-by-date">Sort by Date</button>
        <button id="sort-by-popularity">Sort by Popularity</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
