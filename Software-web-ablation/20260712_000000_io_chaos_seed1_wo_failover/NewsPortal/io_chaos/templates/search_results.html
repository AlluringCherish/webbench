<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">Results for: "{{ query }}"</div>

        {% if results|length == 0 %}
            <div id="no-results-message">No results found.</div>
        {% else %}
            <div id="results-list">
                {% for article in results %}
                    <div class="search-result">
                        <h3>{{ article.title }}</h3>
                        <p>{{ article.excerpt }}</p>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
