<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Comments</title>
</head>
<body>
    <div id="comments-page">
        <h1>Article Comments</h1>

        <select id="filter-by-article" name="article_filter" onchange="location.href=this.options[this.selectedIndex].value">
            <option value="">-- Filter by Article --</option>
            {% for article in articles %}
                <option value="{{ url_for('comments_page') }}?article_id={{ article.article_id }}">{{ article.title }}</option>
            {% endfor %}
        </select>

        <div id="comments-list">
            {% for comment in comments %}
                <div class="comment">
                    <h3>{{ comment.article_title }} (by {{ comment.commenter_name }})</h3>
                    <p>{{ comment.comment_text }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="write-comment-button" onclick="location.href='{{ url_for('write_comment_page') }}'">Write Comment</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
