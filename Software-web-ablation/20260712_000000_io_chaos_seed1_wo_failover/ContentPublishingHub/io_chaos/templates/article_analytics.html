<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Analytics for Article #{{ article_id }}</h1>

        <section id="analytics-overview">
            <h2>Overview</h2>
            <ul>
                {% for key, value in analytics_overview.items() %}
                <li>{{ key.replace('_', ' ').capitalize() }}: {{ value }}</li>
                {% endfor %}
            </ul>
        </section>

        <button id="btn-back-to-article" onclick="window.location.href='{{ url_for('edit_article', article_id=article_id) }}'">Back to Article</button>
    </div>
</body>
</html>
