<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>

        <form id="create-article-form" method="POST" action="{{ url_for('create_article_route') }}">
            <label for="article-title">Title:</label>
            <input type="text" id="article-title" name="title" value="{{ title|default('') }}" required>
            <br>
            <label for="article-content">Content:</label>
            <textarea id="article-content" name="content" rows="15" cols="80" required>{{ content|default('') }}</textarea>
            <br>
            <label for="article-category">Category:</label>
            <select id="article-category" name="category">
                <option value="General" {% if category == 'General' %}selected{% endif %}>General</option>
                <option value="news" {% if category == 'news' %}selected{% endif %}>News</option>
                <option value="blog" {% if category == 'blog' %}selected{% endif %}>Blog</option>
                <option value="review" {% if category == 'review' %}selected{% endif %}>Review</option>
            </select>
            <br>
            <button type="submit" id="btn-submit-article">Submit Article</button>
            <button type="button" id="btn-cancel-create" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>

            {% if errors %}
            <ul id="form-errors" style="color: red;">
                {% for field, message in errors.items() %}
                <li>{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        </form>

    </div>
</body>
</html>
