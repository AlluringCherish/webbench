<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - ContentPublishingHub</title>
</head>
<body>
    <div id="version-history-page">
        <h1>Version History for Article #{{ article_id }}</h1>

        <table id="versions-table" border="1">
            <thead>
                <tr>
                    <th>Version Number</th>
                    <th>Author</th>
                    <th>Created Date</th>
                    <th>Change Summary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for version in versions %}
                <tr>
                    <td>{{ version.version_number }}</td>
                    <td>{{ version.author }}</td>
                    <td>{{ version.created_date }}</td>
                    <td>{{ version.change_summary }}</td>
                    <td>
                        <a id="view-version-{{ version.version_id }}" href="#" onclick="alert('Content:\n{{ version.content | e }}')">View</a> |
                        <a id="restore-version-{{ version.version_id }}" href="#" onclick="alert('Restore version feature not implemented yet.')">Restore</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">No versions found.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="btn-back-to-article" onclick="window.location.href='{{ url_for('edit_article', article_id=article_id) }}'">Back to Edit Article</button>
    </div>
</body>
</html>
