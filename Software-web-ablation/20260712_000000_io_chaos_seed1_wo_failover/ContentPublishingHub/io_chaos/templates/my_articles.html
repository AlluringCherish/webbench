<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>

        <form id="filter-form" method="GET" action="{{ url_for('my_articles') }}">
            <label for="filter-status">Filter by Status:</label>
            <select id="filter-status" name="filter_status">
                <option value="" {% if not filter_status %}selected{% endif %}>All</option>
                <option value="draft" {% if filter_status == 'draft' %}selected{% endif %}>Draft</option>
                <option value="pending_review" {% if filter_status == 'pending_review' %}selected{% endif %}>Pending Review</option>
                <option value="approved" {% if filter_status == 'approved' %}selected{% endif %}>Approved</option>
                <option value="published" {% if filter_status == 'published' %}selected{% endif %}>Published</option>
            </select>
            <button type="submit" id="btn-filter">Apply Filter</button>
        </form>

        <table id="my-articles-table" border="1">
            <thead>
                <tr>
                    <th>Article ID</th>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Last Updated</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td>{{ article.article_id }}</td>
                    <td>{{ article.title }}</td>
                    <td>{{ article.status }}</td>
                    <td>{{ article.last_updated }}</td>
                    <td>
                        <a id="edit-article-{{ article.article_id }}" href="{{ url_for('edit_article', article_id=article.article_id) }}">Edit</a> |
                        <a id="view-version-history-{{ article.article_id }}" href="{{ url_for('article_version_history', article_id=article.article_id) }}">Versions</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">No articles found.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="btn-back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
