<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>

        <form id="calendar-view-form" method="GET" action="{{ url_for('content_calendar') }}">
            <label for="calendar-view">View Mode:</label>
            <select id="calendar-view" name="calendar_view">
                <option value="monthly" {% if calendar_view == 'monthly' %}selected{% endif %}>Monthly</option>
                <option value="weekly" {% if calendar_view == 'weekly' %}selected{% endif %}>Weekly</option>
            </select>
            <button type="submit" id="btn-apply-view">Apply</button>
        </form>

        <section id="scheduled-items">
            <h2>Scheduled Items</h2>
            <ul>
                {% for item in scheduled_items %}
                <li>{{ item.date }}: {{ item.title }}</li>
                {% else %}
                <li>No scheduled items.</li>
                {% endfor %}
            </ul>
        </section>

        <button id="btn-back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
