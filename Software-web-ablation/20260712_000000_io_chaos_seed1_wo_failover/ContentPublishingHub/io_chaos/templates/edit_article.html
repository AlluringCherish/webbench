<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>

        <form id="edit-article-form" method="POST" action="{{ url_for('edit_article', article_id=article_id) }}">
            <label for="article-title">Title:</label>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" required>
            <br>
            <label for="article-content">Content:</label>
            <textarea id="article-content" name="content" rows="15" cols="80" required>{{ content }}</textarea>
            <br>

            {% if errors %}
            <ul id="form-errors" style="color: red;">
                {% for field, message in errors.items() %}
                <li>{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <button type="submit" id="btn-save-changes">Save Changes</button>
            <button type="button" id="btn-cancel-edit" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
        </form>

    </div>
</body>
</html>
