<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="published-articles-page">
        <h1>Published Articles</h1>

        <form id="filter-category-form" method="GET" action="{{ url_for('published_articles') }}">
            <label for="filter-category">Filter by Category:</label>
            <select id="filter-category" name="category">
                <option value="" {% if not filter_category %}selected{% endif %}>All</option>
                <option value="news" {% if filter_category == 'news' %}selected{% endif %}>News</option>
                <option value="blog" {% if filter_category == 'blog' %}selected{% endif %}>Blog</option>
                <option value="review" {% if filter_category == 'review' %}selected{% endif %}>Review</option>
            </select>

            <label for="sort-order">Sort Order:</label>
            <select id="sort-order" name="sort">
                <option value="asc" {% if sort_order == 'asc' %}selected{% endif %}>Ascending</option>
                <option value="desc" {% if sort_order == 'desc' %}selected{% endif %}>Descending</option>
            </select>

            <button type="submit" id="btn-apply-filters">Apply Filters</button>
        </form>

        <table id="published-articles-table" border="1">
            <thead>
                <tr>
                    <th>Article ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Published Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td>{{ article.article_id }}</td>
                    <td>{{ article.title }}</td>
                    <td>{{ article.category }}</td>
                    <td>{{ article.last_updated }}</td>
                    <td>
                        <a id="view-article-{{ article.article_id }}" href="{{ url_for('edit_article', article_id=article.article_id) }}">View</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">No published articles found.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="btn-back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
