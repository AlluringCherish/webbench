<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather Report</title>
</head>
<body>
    <span id="current_weather_page">
        <h2 id="location_name">{{ location.location_name }}</h2>
        <div id="temperature_display">{{ temperature }}</div>
        <div id="weather_condition">{{ condition }}</div>
        <div id="humidity_info">Humidity: {{ humidity }}</div>
        <div id="wind_speed_info">Wind Speed: {{ wind_speed }}</div>
    </span>
</body>
</html>
