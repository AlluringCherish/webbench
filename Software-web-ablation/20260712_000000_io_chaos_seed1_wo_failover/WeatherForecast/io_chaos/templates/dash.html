<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather-Board</title>
</head>
<body>
    <div id="dashboard_page">
        <h2>Weather Overview</h2>
        {% if default_location %}
        <div id="current_weather_summary">
            <p>Temperature: {{ default_location.temperature }}</p>
            <p>Condition: {{ default_location.condition }}</p>
        </div>
        {% endif %}
        <a href="{{ url_for('location_search') }}">
            <button id="search_location_button">Search Location</button>
        </a>
        <a href="{{ url_for('weeklyForecast') }}">
            <button id="view_forecast_button">View Forecast</button>
        </a>
        <a href="{{ url_for('weatherAlert') }}">
            <button id="view_alerts_button">View Alerts</button>
        </a>
    </div>
</body>
</html>
