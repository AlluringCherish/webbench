<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Locations Saved</title>
</head>
<body>
    <div id="saved_locations_page">
        <h2>Saved Locations</h2>
        <table id="locations_table" border="1">
            <thead>
                <tr>
                    <th>Location Name</th>
                    <th>Current Temp</th>
                    <th>Condition</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for loc in saved_locations %}
                <tr>
                    <td>{{ loc.location_name }}</td>
                    <td>{{ loc.current_temp }}</td>
                    <td>{{ loc.condition }}</td>
                    <td>
                        <a href="{{ url_for('get_current_weather', location_id=loc.location_id) }}">
                            <button id="view_location_weather-{{ loc.location_id }}">View Weather</button>
                        </a>
                        <form method="post" action="{{ url_for('savedLocation') }}" style="display:inline;">
                            <input type="hidden" name="remove_location_id" value="{{ loc.location_id }}" />
                            <button type="submit" id="remove_location_button-{{ loc.location_id }}">Remove</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('location_search') }}">
            <button id="add_new_location_button">Add New Location</button>
        </a>
    </div>
</body>
</html>
