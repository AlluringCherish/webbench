<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Configure Settings</title>
</head>
<body>
    <div id="settings_page">
        <h2>Settings</h2>
        <form method="post" action="">
            <label for="temperature_unit_select">Temperature Unit:</label>
            <select id="temperature_unit_select" name="temperature_unit_select">
                <option value="Celsius" {% if selected_unit == 'Celsius' %}selected{% endif %}>Celsius</option>
                <option value="Fahrenheit" {% if selected_unit == 'Fahrenheit' %}selected{% endif %}>Fahrenheit</option>
                <option value="Kelvin" {% if selected_unit == 'Kelvin' %}selected{% endif %}>Kelvin</option>
            </select>

            <label for="default_location_select">Default Location:</label>
            <select id="default_location_select" name="default_location_select">
                {% for loc in locations %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == selected_default_location %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>

            <label>Alert Notifications:</label>
            <input type="radio" id="alert_notifications_enabled" name="alert_notifications" value="1" {% if alert_notifications_enabled == 1 %}checked{% endif %}> Enabled
            <input type="radio" id="alert_notifications_disabled" name="alert_notifications" value="0" {% if alert_notifications_enabled == 0 %}checked{% endif %}> Disabled

            <button type="submit" id="save_settings_button">Save Settings</button>
        </form>

        <a href="{{ url_for('dash_board') }}">
            <button id="back_to_dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
