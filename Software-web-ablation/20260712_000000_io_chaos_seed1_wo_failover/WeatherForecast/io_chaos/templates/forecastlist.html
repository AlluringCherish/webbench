<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forecast Weekly</title>
</head>
<body>
    <div id="forecast_page">
        <h2>Weekly Weather Forecast</h2>
        <form method="post" action="">
            <label for="location_filter">Filter Location:</label>
            <select id="location_filter" name="location_filter" onchange="this.form.submit()">
                {% for loc in locations %}
                    <option value="{{ loc.location_id }}" {% if loc.location_id == selected_location %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>
        </form>

        <div id="forecastlist">
            <table id="forecasttable" border="1">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>High</th>
                        <th>Low</th>
                        <th>Condition</th>
                    </tr>
                </thead>
                <tbody>
                    {% for forecast in forecast_list %}
                    <tr>
                        <td>{{ forecast.date }}</td>
                        <td>{{ forecast.high_temp }}</td>
                        <td>{{ forecast.low_temp }}</td>
                        <td>{{ forecast.condition }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <a href="{{ url_for('dash_board') }}">
            <button id="back_to_dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
