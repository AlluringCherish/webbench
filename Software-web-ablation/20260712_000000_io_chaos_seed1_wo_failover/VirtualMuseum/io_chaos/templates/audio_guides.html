<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <h1>Audio Guides</h1>
        <form method="POST" action="{{ url_for('audio_guides') }}">
            <label for="filter-language">Language Filter:</label>
            <select id="filter-language" name="filter_language">
                <option value="" {% if not filter_language %}selected{% endif %}>All</option>
                {% set languages = [] %}
                {% for guide in audio_guides %}
                    {% if guide.language not in languages %}
                        {% do languages.append(guide.language) %}
                    {% endif %}
                {% endfor %}
                {% for lang in languages %}
                <option value="{{ lang }}" {% if filter_language == lang %}selected{% endif %}>{{ lang }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="apply-language-filter">Apply Language Filter</button>
        </form>
        <table id="audio-guide-list" border="1">
            <thead>
                <tr>
                    <th>Guide ID</th>
                    <th>Exhibit Number</th>
                    <th>Title</th>
                    <th>Language</th>
                    <th>Duration (min)</th>
                    <th>Narrator</th>
                    <th>Created By</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for guide in audio_guides %}
                <tr>
                    <td>{{ guide.guide_id }}</td>
                    <td>{{ guide.exhibit_number }}</td>
                    <td>{{ guide.title }}</td>
                    <td>{{ guide.language }}</td>
                    <td>{{ guide.duration }}</td>
                    <td>{{ guide.narrator }}</td>
                    <td>{{ guide.created_by }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('audio_guides') }}" style="display:inline;">
                            <input type="hidden" name="guide_id" value="{{ guide.guide_id }}">
                            <button type="submit" id="play-guide-button-{{ guide.guide_id }}">Play</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
