<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibitions</title>
</head>
<body>
    <div id="exhibitions-page">
        <h1>Exhibitions</h1>
        <form method="POST" action="{{ url_for('exhibitions_list') }}">
            <label for="filter-exhibition-type">Filter Type:</label>
            <select id="filter-exhibition-type" name="filter_type">
                <option value="" {% if not filter_type %}selected{% endif %}>All</option>
                <option value="Permanent" {% if filter_type == 'Permanent' %}selected{% endif %}>Permanent</option>
                <option value="Temporary" {% if filter_type == 'Temporary' %}selected{% endif %}>Temporary</option>
                <option value="Virtual" {% if filter_type == 'Virtual' %}selected{% endif %}>Virtual</option>
            </select>
            <button type="submit" id="apply-exhibition-filter">Apply Filter</button>
        </form>
        <table id="exhibition-list" border="1">
            <thead>
                <tr>
                    <th>Exhibition ID</th>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Curator</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for exhibition in exhibitions %}
                <tr>
                    <td>{{ exhibition.exhibition_id }}</td>
                    <td>{{ exhibition.title }}</td>
                    <td>{{ exhibition.exhibition_type }}</td>
                    <td>{{ exhibition.start_date }}</td>
                    <td>{{ exhibition.end_date }}</td>
                    <td>{{ exhibition.curator_name }}</td>
                    <td>
                        <button id="view-exhibition-button-{{ exhibition.exhibition_id }}" onclick="location.href='{{ url_for('exhibition_details', exhibition_id=exhibition.exhibition_id) }}'">View</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
