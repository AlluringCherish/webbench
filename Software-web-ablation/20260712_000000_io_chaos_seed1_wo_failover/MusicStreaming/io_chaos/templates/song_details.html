<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
<div id="song-details-page">
    <h1 id="song-title">{{ song.title }}</h1>

    <div id="artist-name">
        Artist: <a href="{{ url_for('artist_profile', artist_id=song.artist_id) }}">{{ song.artist_name }}</a>
    </div>

    <div id="album-name">
        Album: {{ song.album_name }}
    </div>

    <div id="duration-display">
        Duration: {{ song.duration }} sec
    </div>

    <form method="POST" action="{{ url_for('play_song', song_id=song.song_id) }}">
        <button id="play-button" type="submit">Play</button>
    </form>
</div>
</body>
</html>
