<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>

    <input id="search-albums" type="text" placeholder="Search albums...">

    <select id="sort-albums">
        <option value="title">Sort by Title</option>
        <option value="release_year">Sort by Release Year</option>
        <option value="genre">Sort by Genre</option>
    </select>

    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-item" id="album-{{ album.album_id }}">
            <div>{{ album.title }} by {{ album.artist_name }} ({{ album.release_year }})</div>
            <div>Genre: {{ album.genre }}</div>
            <a href="{{ url_for('album_details', album_id=album.album_id) }}">
                <button id="view-album-button-{{ album.album_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
