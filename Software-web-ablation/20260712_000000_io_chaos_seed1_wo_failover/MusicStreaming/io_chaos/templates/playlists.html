<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
<div id="playlists-page">
    <h1>My Playlists</h1>

    <button id="create-playlist-button" onclick="window.location.href='{{ url_for('create_playlist') }}'">Create Playlist</button>

    <div id="playlists-grid">
        {% for playlist in playlists %}
        <div class="playlist-item" id="playlist-{{ playlist.playlist_id }}">
            <h3>{{ playlist.title }}</h3>
            <p>{{ playlist.description }}</p>
            <p>Songs: {{ playlist.total_songs }}</p>
            <a href="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
                <button id="view-playlist-button-{{ playlist.playlist_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
