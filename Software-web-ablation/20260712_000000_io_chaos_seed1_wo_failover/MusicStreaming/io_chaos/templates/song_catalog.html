<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>

    <input id="search-input" type="text" placeholder="Search songs...">

    <select id="genre-filter">
        <option value="">All Genres</option>
        {% for genre in genres %}
        <option value="{{ genre }}">{{ genre }}</option>
        {% endfor %}
    </select>

    <div id="songs-grid">
        {% for song in songs %}
        <div class="song-item" id="song-{{ song.song_id }}">
            <div>{{ song.title }} by {{ song.artist_name }}</div>
            <div>Album: {{ song.album_name }}</div>
            <div>Genre: {{ song.genre }}</div>
            <div>Duration: {{ song.duration }} sec</div>
            <form method="POST" action="{{ url_for('add_song_to_playlist', song_id=song.song_id) }}">
                <button id="add-to-playlist-button-{{ song.song_id }}" type="submit">Add to Playlist</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
