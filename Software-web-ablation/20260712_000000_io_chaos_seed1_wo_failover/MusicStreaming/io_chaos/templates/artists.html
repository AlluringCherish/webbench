<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>

    <input id="search-artists" type="text" placeholder="Search artists...">

    <select id="artists-sort">
        <option value="name">Sort by Name</option>
        <option value="genre">Sort by Genre</option>
        <option value="country">Sort by Country</option>
    </select>

    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-item" id="artist-{{ artist.artist_id }}">
            <div>{{ artist.name }}</div>
            <div>Genre: {{ artist.genre }}</div>
            <div>Country: {{ artist.country }}</div>
            <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">
                <button id="view-artist-button-{{ artist.artist_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
