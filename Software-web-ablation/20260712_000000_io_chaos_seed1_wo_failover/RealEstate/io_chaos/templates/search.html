<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Property Search</h1>

        <form method="POST" action="{{ url_for('property_search_filter') }}">
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location" value="{{ filter_location }}">

            <label for="price-range-min">Min Price:</label>
            <input type="number" id="price-range-min" name="min_price" {% if min_price is not none %}value="{{ min_price }}"{% endif %}>

            <label for="price-range-max">Max Price:</label>
            <input type="number" id="price-range-max" name="max_price" {% if max_price is not none %}value="{{ max_price }}"{% endif %}>

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type">
                <option value="" {% if property_type_filter == '' %}selected{% endif %}>Any</option>
                <option value="House" {% if property_type_filter == 'House' %}selected{% endif %}>House</option>
                <option value="Apartment" {% if property_type_filter == 'Apartment' %}selected{% endif %}>Apartment</option>
                <option value="Condo" {% if property_type_filter == 'Condo' %}selected{% endif %}>Condo</option>
            </select>

            <button type="submit">Search</button>
        </form>

        <div id="properties-grid">
            {% for property in properties %}
            <div class="property-card">
                <h3>{{ property.address }}</h3>
                <p>Price: ${{ property.price }}</p>
                <a href="{{ url_for('property_details_page', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
