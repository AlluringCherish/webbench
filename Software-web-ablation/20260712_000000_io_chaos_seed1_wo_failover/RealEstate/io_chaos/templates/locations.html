<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Featured Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Featured Locations</h1>

        <form method="GET" action="{{ url_for('locations_page') }}">
            <label for="location-sort">Sort By:</label>
            <select id="location-sort" name="location_sort" onchange="this.form.submit()">
                <option value="" {% if location_sort == '' %}selected{% endif %}>Default</option>
                <option value="average_price" {% if location_sort == 'average_price' %}selected{% endif %}>Average Price</option>
                <option value="property_count" {% if location_sort == 'property_count' %}selected{% endif %}>Property Count</option>
            </select>
        </form>

        <div id="locations-list">
            {% for location in locations %}
            <div class="location">
                <h3>{{ location.location_name }}</h3>
                <p>Region: {{ location.region }}</p>
                <p>Average Price: ${{ location.average_price }}</p>
                <p>Property Count: {{ location.property_count }}</p>
                <a href="{{ url_for('locations_page') }}">
                    <button id="view-location-button-{{ location.location_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
