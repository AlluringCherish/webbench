<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <form method="GET" action="{{ url_for('agents_page') }}">
            <input type="text" id="agent-search" name="agent_search_query" value="{{ agent_search_query }}" placeholder="Search Agents">
            <button type="submit">Search</button>
        </form>

        <div id="agents-list">
            {% for agent in agents %}
            <div class="agent">
                <h3>{{ agent.agent_name }}</h3>
                <p>Specialization: {{ agent.specialization }}</p>
                <p>Email: {{ agent.email }}</p>
                <p>Phone: {{ agent.phone }}</p>
                <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
