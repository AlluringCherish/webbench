<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">
            <p>{{ trainer.bio }}</p>
            <p>Experience: {{ trainer.experience_years }} years</p>
        </div>
        <div id="trainer-certifications">Certifications: {{ trainer.certifications }}</div>
        <a href="{{ url_for('pt_booking_page') }}">
            <button id="book-session-button">Book Session</button>
        </a>
        <div id="trainer-reviews">
            {% if reviews %}
                <h3>Client Reviews:</h3>
                <ul>
                {% for review in reviews %}
                    <li>{{ review }}</li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No reviews available.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
