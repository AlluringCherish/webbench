<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
    <div id="itinerary-page">
        <h1>Plan Your Itinerary</h1>
        <form method="POST" action="{{ url_for('itinerary') }}">
            <label for="itinerary-name-input">Itinerary Name:</label>
            <input type="text" id="itinerary-name-input" name="itinerary_name">
            <label for="start-date-input">Start Date:</label>
            <input type="date" id="start-date-input" name="start_date">
            <label for="end-date-input">End Date:</label>
            <input type="date" id="end-date-input" name="end_date">
            <button id="add-activity-button" type="submit">Add Activity</button>
        </form>
        <div id="itinerary-list">
            <h2>Your Itineraries</h2>
            <ul>
                {% for itin in itineraries %}
                <li>
                    <strong>{{ itin.itinerary_name }}</strong><br>
                    Destination: {{ itin.destination }}<br>
                    Dates: {{ itin.start_date }} - {{ itin.end_date }}<br>
                    Activities: {{ itin.activities }}<br>
                    Status: {{ itin.status }}<br>
                    <button>Edit</button> <!-- Edit/delete handled in page -->
                    <button>Delete</button>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
