<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>
        <select id="status-filter" name="status">
            <option value="">All Statuses</option>
            <option value="Active" {% if selected_status_filter == 'Active' %}selected{% endif %}>Active</option>
            <option value="Closed" {% if selected_status_filter == 'Closed' %}selected{% endif %}>Closed</option>
            <option value="Upcoming" {% if selected_status_filter == 'Upcoming' %}selected{% endif %}>Upcoming</option>
        </select>
        <button id="refresh-status-button">Refresh Status</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Auction Name</th>
                    <th>Status</th>
                    <th>End Time</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                    <tr>
                        <td>{{ auction.item_name }}</td>
                        <td>{{ auction.status }}</td>
                        <td>{{ auction.end_time }}</td>
                        <td>${{ "%.2f"|format(auction.current_bid) }}</td>
                    </tr>
                {% else %}
                    <tr><td colspan="4">No auctions available.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
