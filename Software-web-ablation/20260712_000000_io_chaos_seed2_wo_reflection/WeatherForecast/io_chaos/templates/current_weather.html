<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <div id="current-weather-page">
        <h1 id="location-name">{{ weather_details.location_name }}</h1>
        <div id="temperature-display">
            Temperature: {{ weather_details.temperature }}
        </div>
        <div id="weather-condition">
            Condition: {{ weather_details.condition }}
        </div>
        <div id="humidity-info">
            Humidity: {{ weather_details.humidity }}%
        </div>
        <div id="wind-speed-info">
            Wind Speed: {{ weather_details.wind_speed }} mph
        </div>
    </div>
</body>
</html>
