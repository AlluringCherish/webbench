<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Forecast</title>
</head>
<body>
    <div id="forecast-page">
        <h1>Weekly Forecast</h1>
        <form method="POST" action="">
            <label for="location-filter">Select Location:</label>
            <select id="location-filter" name="selected_location_id">
                {% for location in location_list %}
                <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>
                    {{ location.location_name }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="forecast-list">
            <table id="forecast-table" border="1">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>High Temp</th>
                        <th>Low Temp</th>
                        <th>Condition</th>
                    </tr>
                </thead>
                <tbody>
                    {% for forecast in forecast_list %}
                    <tr>
                        <td>{{ forecast.date }}</td>
                        <td>{{ forecast.high_temp }}</td>
                        <td>{{ forecast.low_temp }}</td>
                        <td>{{ forecast.condition }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
