<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
    <div id="air-quality-page">
        <h1>Air Quality Index</h1>
        <form method="POST" action="">
            <label for="location-aqi-filter">Select Location:</label>
            <select id="location-aqi-filter" name="selected_location_id">
                {% for location in location_list %}
                <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>
                    {{ location.location_name }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="aqi-display">
            <p>AQI Index: {{ aqi_info.aqi_index }}</p>
        </div>
        <div id="aqi-description">
            <p>{{ aqi_info.aqi_description }}</p>
        </div>
        <table id="pollution-details" border="1">
            <tr><th>PM2.5</th><td>{{ aqi_info.pm25 }}</td></tr>
            <tr><th>PM10</th><td>{{ aqi_info.pm10 }}</td></tr>
            <tr><th>NO2</th><td>{{ aqi_info.no2 }}</td></tr>
            <tr><th>O3</th><td>{{ aqi_info.o3 }}</td></tr>
        </table>
        <div id="health-recommendation">
            <p>{{ health_recommendation }}</p>
        </div>
    </div>
</body>
</html>
