<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <h1>Saved Locations</h1>
        <table id="locations-table" border="1">
            <thead>
                <tr>
                    <th>Location Name</th>
                    <th>Temperature</th>
                    <th>Condition</th>
                    <th>Default</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for location in saved_locations %}
                <tr>
                    <td>{{ location.location_name }}</td>
                    <td>{{ location.temperature }}</td>
                    <td>{{ location.condition }}</td>
                    <td>{% if location.is_default %}Yes{% else %}No{% endif %}</td>
                    <td>
                        <a href="{{ url_for('current_weather', location_id=location.location_id) }}">
                            <button id="view-location-weather-{{ location.location_id }}">View Weather</button>
                        </a>
                        <form method="POST" action="" style="display:inline;">
                            <button type="submit" id="remove-location-button-{{ location.location_id }}" name="remove_location_id" value="{{ location.location_id }}">Remove</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="add-new-location-button">Add New Location</button>
    </div>
</body>
</html>
