<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Alerts</title>
</head>
<body>
    <div id="alerts-page">
        <h1>Weather Alerts</h1>
        <form method="POST" action="">
            <label for="severity-filter">Severity:</label>
            <select id="severity-filter" name="severity_filter">
                <option value="All" {% if severity_filter == 'All' %}selected{% endif %}>All</option>
                <option value="Critical" {% if severity_filter == 'Critical' %}selected{% endif %}>Critical</option>
                <option value="High" {% if severity_filter == 'High' %}selected{% endif %}>High</option>
                <option value="Medium" {% if severity_filter == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="Low" {% if severity_filter == 'Low' %}selected{% endif %}>Low</option>
            </select>
            <label for="location-filter-alerts">Location:</label>
            <select id="location-filter-alerts" name="location_filter">
                <option value="" {% if location_filter is none %}selected{% endif %}>All Locations</option>
                {% for idx, alert_location in enumerate(alerts|map(attribute='location_name')|unique) %}
                    <option value="{{ alert_location }}" {% if location_filter == alert_location %}selected{% endif %}>{{ alert_location }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="alerts-list">
            {% for alert in alerts %}
                <div>
                    <h3>{{ alert.alert_type }} - {{ alert.location_name }}</h3>
                    <p>Severity: {{ alert.severity }}</p>
                    <p>{{ alert.description }}</p>
                    <p>From {{ alert.start_time }} to {{ alert.end_time }}</p>
                    {% if not alert.is_acknowledged %}
                    <form method="POST" action="">
                        <button type="submit" id="acknowledge-alert-button-{{ alert.alert_id }}" name="acknowledge_alert_id" value="{{ alert.alert_id }}">Acknowledge</button>
                    </form>
                    {% else %}
                    <p>Acknowledged</p>
                    {% endif %}
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
