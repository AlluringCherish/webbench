<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Weather Dashboard</h1>
        <div id="current-weather-summary">
            <h2>{{ default_location.location_name }}</h2>
            <p>Temperature: {{ default_location.temperature }}</p>
            <p>Condition: {{ default_location.condition }}</p>
        </div>
        <a href="{{ url_for('location_search') }}">
            <button id="search-location-button">Search Locations</button>
        </a>
        <a href="{{ url_for('weekly_forecast') }}">
            <button id="view-forecast-button">View Weekly Forecast</button>
        </a>
        <a href="{{ url_for('weather_alerts') }}">
            <button id="view-alerts-button">View Weather Alerts</button>
        </a>
    </div>
</body>
</html>
