<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="page-title">Food Delivery Dashboard</h1>
        
        <div id="featured-restaurants">
            <h2>Featured Restaurants</h2>
            <ul id="featured-restaurants-list">
                {% for restaurant in feature_restaurants %}
                <li id="restaurant-{{ restaurant.restaurant_id }}">
                    <span id="restaurant-name-{{ restaurant.restaurant_id }}">{{ restaurant.name }}</span>
                    <a href="{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}">
                        <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>

        <div id="popular-cuisines-section">
            <h2>Popular Cuisines</h2>
            <ul id="popular-cuisines-list">
                {% for cuisine in popular_cuisines %}
                <li id="cuisine-{{ loop.index }}">{{ cuisine }}</li>
                {% endfor %}
            </ul>
        </div>

        <nav id="main-navigation">
            <button id="browse-restaurants-button" onclick="window.location.href='{{ url_for('browse_restaurants') }}'">Browse Restaurants</button>
            <button id="view-cart-button" onclick="window.location.href='{{ url_for('shopping_cart') }}'">View Cart</button>
            <button id="active-orders-button" onclick="window.location.href='{{ url_for('active_order') }}'">Active Orders</button>
        </nav>
    </div>
</body>
</html>
