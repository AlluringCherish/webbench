<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="reviews-page">
        <h1 id="page-title">Order Reviews</h1>

        <form id="filter-by-rating" method="GET" action="{{ url_for('reviews') }}">
            <label for="filter-ratings">Filter by Ratings:</label>
            <select id="filter-ratings" name="filter_ratings" onchange="this.form.submit()">
                <option value="" {% if filter_ratings == '' %}selected{% endif %}>All</option>
                <option value="5" {% if filter_ratings == '5' %}selected{% endif %}>5 Stars</option>
                <option value="4" {% if filter_ratings == '4' %}selected{% endif %}>4 Stars & Up</option>
                <option value="3" {% if filter_ratings == '3' %}selected{% endif %}>3 Stars & Up</option>
                <option value="2" {% if filter_ratings == '2' %}selected{% endif %}>2 Stars & Up</option>
                <option value="1" {% if filter_ratings == '1' %}selected{% endif %}>1 Star & Up</option>
            </select>
        </form>

        <div id="reviews-list">
            {% for review in reviews %}
            <div id="review-{{ review.review_id }}">
                <span id="reviewer-name-{{ review.review_id }}">{{ review.reviewer_name }}</span>
                <span id="review-rating-{{ review.review_id }}">Rating: {{ review.rating }}</span>
                <p id="review-comment-{{ review.review_id }}">{{ review.comment }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="window.location.href='{{ url_for('writ_review') }}'">Write a Review</button>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
