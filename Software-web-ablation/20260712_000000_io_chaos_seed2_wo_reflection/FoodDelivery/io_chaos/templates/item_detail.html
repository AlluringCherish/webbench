<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="item-details-page">
        <h1 id="item-name">{{ item.name }}</h1>

        <div id="item-description">{{ item.description }}</div>

        <div id="item-price">${{ '%.2f' | format(item.price) }}</div>

        <form id="add-to-cart-form" method="POST" action="{{ url_for('update_cart_quantity') }}">
            <input type="hidden" name="item_id" value="{{ item.item_id }}">
            <label for="quantity-input">Quantity:</label>
            <input type="number" id="quantity-input" name="quantity" min="1" value="1">
            <button type="submit" id="add-to-cart-button">Add to Cart</button>
        </form>

        <button id="back-to-menu-button" onclick="window.location.href='{{ url_for('restaurant_menu', restaurant_id=item.restaurant_id) }}'">Back to Menu</button>

        <button id="shopping-cart-button" onclick="window.location.href='{{ url_for('shopping_cart') }}'">Shopping Cart</button>
    </div>
</body>
</html>
