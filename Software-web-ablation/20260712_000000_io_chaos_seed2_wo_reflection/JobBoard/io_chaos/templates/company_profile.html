<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Company</title>
</head>
<body>
    <div id="company-profile">
        <h1>Profile Company</h1>
        <div id="company-info">
            <div><strong>{{ company.company_name }}</strong></div>
            <div>Industry: {{ company.industry }}</div>
            <div>Location: {{ company.location }}</div>
            <div>Description: {{ company.description }}</div>
            <div>Employees: {{ company.employee_count }}</div>
        </div>
        <div id="company-jobs">
            <h2>Open Jobs</h2>
            <div id="jobs-list">
                {% for job in jobs %}
                    <div>
                        <span>{{ job.title }}</span>
                        <a href="{{ url_for('job_detail_page', job_id=job.job_id) }}">
                            <button id="view-job-btn-{{ job.job_id }}">View Details</button>
                        </a>
                    </div>
                {% else %}
                    <div>No open jobs.</div>
                {% endfor %}
            </div>
        </div>

        <a href="{{ url_for('companies_dir_page') }}">
            <button id="back-to-companies">Back to Companies</button>
        </a>
    </div>
</body>
</html>
