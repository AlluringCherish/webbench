<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Job Board</title>
</head>
<body>
    <div id="dashboard">
        <h1>Dashboard Job Board</h1>
        <span id="featured-jobs">
            {% for job in featured_jobs %}
                <div>
                    <strong>{{ job.title }}</strong> at {{ job.company }} - {{ job.location }}<br>
                    Salary: {{ job.salary_min }} to {{ job.salary_max }}
                </div>
            {% else %}
                <div>No featured jobs available.</div>
            {% endfor %}
        </span>

        <a href="{{ url_for('jobs_list_page') }}">
            <button id="browse-jobs-btn">Browse Jobs</button>
        </a>

        <a href="{{ url_for('application_tracking') }}">
            <button id="my-applications-btn">My Applications</button>
        </a>

        <a href="{{ url_for('companies_dir_page') }}">
            <button id="companies-btn">Companies</button>
        </a>
    </div>
</body>
</html>
