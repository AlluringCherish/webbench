<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Directory Company</title>
</head>
<body>
    <div id="companies-page">
        <h1>Directory Company</h1>
        <input type="text" id="search-company-input" placeholder="Search companies...">

        <div id="companies-list">
            {% for company in companies %}
            <div class="company-card">
                <div><strong>{{ company.company_name }}</strong></div>
                <div>Industry: {{ company.industry }}</div>
                <div>Employees: {{ company.employee_count }}</div>
                <a href="{{ url_for('company_profile_page', company_id=company.company_id) }}">
                    <button id="view-company-btn-{{ company.company_id }}">View Profile</button>
                </a>
            </div>
            {% else %}
            <div>No companies found.</div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
