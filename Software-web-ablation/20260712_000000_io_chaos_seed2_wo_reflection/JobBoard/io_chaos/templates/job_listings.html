<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>List of Jobs</title>
</head>
<body>
    <div id="listings">
        <h1>List of Jobs</h1>

        <input type="text" id="search-input" placeholder="Search jobs...">

        <select id="category-filter">
            <option value="">Select Category</option>
            <!-- Categories should be dynamically filled if available -->
        </select>

        <select id="location-filter">
            <option value="">Select Location</option>
            <!-- Locations should be dynamically filled if available -->
        </select>

        <div id="jobs-grid">
            {% for job in jobs %}
            <div class="job-card">
                <div><strong>{{ job.title }}</strong></div>
                <div>{{ job.company_name }}</div>
                <div>{{ job.location }}</div>
                <div>Salary: {{ job.salary_min }} to {{ job.salary_max }}</div>
                <a href="{{ url_for('job_detail_page', job_id=job.job_id) }}">
                    <button id="view-job-btn-{{ job.job_id }}">View Details</button>
                </a>
            </div>
            {% else %}
            <div>No jobs available.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
