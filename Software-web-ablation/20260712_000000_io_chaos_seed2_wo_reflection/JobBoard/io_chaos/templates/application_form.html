<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Submit</title>
</head>
<body>
    <div id="application-form">
        <h1>Application Submit</h1>
        <form method="POST" action="{{ url_for('apply_form_page', job_id=job.job_id) }}" enctype="multipart/form-data">
            <label for="applicant-name">Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" required>
            <br>

            <label for="applicant-email">Email:</label>
            <input type="email" id="applicant-email" name="applicant_email" required>
            <br>

            <label for="resume-upload">Resume:</label>
            <input type="file" id="resume-upload" name="resume_file" required>
            <br>

            <label for="cover-letter">Cover Letter:</label>
            <textarea id="cover-letter" name="cover_letter" required></textarea>
            <br>

            <button type="submit" id="submit-application-btn">Submit Application</button>
        </form>
    </div>
</body>
</html>
