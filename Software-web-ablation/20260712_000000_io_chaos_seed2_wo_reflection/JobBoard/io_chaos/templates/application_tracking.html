<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Applications My</title>
</head>
<body>
    <div id="tracking">
        <h1>Applications My</h1>

        <select id="status-filter">
            <option value="">All Statuses</option>
            <!-- Status options should be added dynamically if info available -->
        </select>

        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.job_title }}</td>
                    <td>{{ app.company_name }}</td>
                    <td>{{ app.status }}</td>
                    <td>{{ app.applied_date }}</td>
                    <td>
                        <a href="{{ url_for('app_detail_page', app_id=app.application_id) }}">
                            <button id="view-application-btn-{{ app.application_id }}">View Details</button>
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">No applications found.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
