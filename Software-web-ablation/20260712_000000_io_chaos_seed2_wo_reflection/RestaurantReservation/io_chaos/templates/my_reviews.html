<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <h1>My Reviews for {{ username }}</h1>
    <ul>
    {% for review in reviews %}
        <li>Dish: {{ review['dish_name'] }} - Rating: {{ review['rating'] }}<br>Review: {{ review['review_text'] }}</li>
    {% else %}
        <li>No reviews found.</li>
    {% endfor %}
    </ul>
</body>
</html>
