<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu Restaurant</title>
</head>
<body>
<div id="menu_div">
    <h1>Menu Restaurant</h1>
    <div id="menu_grid">
        {% for dish in menus %}
        <div class="dish_card">
            <h3>{{ dish.name }}</h3>
            <p>Category: {{ dish.category }}</p>
            <p>Price: ${{ dish.price }}</p>
            <p>{{ dish.description }}</p>
            <p>Dietary: {{ dish.dietary }}</p>
            <button id="dish_view_btn-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_detail', dish_id=dish.dish_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    <button id="back_dashboard_btn" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
