<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
    <h1>Waitlist</h1>
    {% if user_pos %}
        <p>Your position: {{ user_pos }}</p>
    {% else %}
        <p>You are not currently on the waitlist.</p>
    {% endif %}
    <form method="post" action="{{ url_for('waitlist') }}">
        Party Size:
        <select name="party_size">
            {% for size in party_size_opts %}
                <option value="{{ size }}">{{ size }}</option>
            {% endfor %}
        </select>
        <input type="submit" value="Join Waitlist">
    </form>

    <h2>Current Waitlist</h2>
    <ul>
        {% for w in waitlist %}
            <li>{{ w['username'] }} - Party Size: {{ w['party_size'] }} - Status: {{ w['status'] }}</li>
        {% endfor %}
    </ul>
</body>
</html>
