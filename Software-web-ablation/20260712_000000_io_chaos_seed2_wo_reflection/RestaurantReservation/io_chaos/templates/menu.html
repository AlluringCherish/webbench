<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
</head>
<body>
    <h1>Menu</h1>
    <ul>
    {% for dish in menu %}
        <li><a href="{{ url_for('dish_detail', dish_id=dish['dish_id']) }}">{{ dish['name'] }}</a> - {{ dish['price'] }}</li>
    {% endfor %}
    </ul>
</body>
</html>
