<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reserve</title>
</head>
<body>
<div id="myreserve_page">
    <h1>My Reserve</h1>
    <table id="reserve_table" border="1">
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Party Size</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for reservation in reservations %}
            <tr>
                <td>{{ reservation.date }}</td>
                <td>{{ reservation.time }}</td>
                <td>{{ reservation.party_size }}</td>
                <td>{{ reservation.status }}</td>
                <td>
                    <form method="POST" action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}" style="display:inline;">
                        <button id="cancel_reserve_btn-{{ reservation.reservation_id }}" type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back_dashboard_btn" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
