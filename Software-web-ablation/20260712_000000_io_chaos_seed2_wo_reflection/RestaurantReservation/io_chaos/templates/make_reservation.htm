<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
<div id="reserve_page">
    <form method="GET" action="{{ url_for('make_reservation') }}">
        <label for="guestname_input">Guest Name:</label>
        <input type="text" id="guestname_input" name="guest" required>

        <label for="party_size_dropdown">Party Size:</label>
        <select id="party_size_dropdown" name="party" required>
            {% for i in range(1, 11) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select>

        <label for="reserve_date_input">Reservation Date:</label>
        <input type="date" id="reserve_date_input" name="date" required>

        <button id="submit_reserve_btn" type="submit">Submit Reservation</button>
    </form>
    <button id="back_dashboard_btn" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
