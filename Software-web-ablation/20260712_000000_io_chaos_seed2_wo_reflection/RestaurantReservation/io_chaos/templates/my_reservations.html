<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <h1>My Reservations for {{ username }}</h1>
    <ul>
    {% for reservation in reservations %}
        <li>{{ reservation['date'] }} at {{ reservation['time'] }} for {{ reservation['party_size'] }} people - Status: {{ reservation['status'] }}</li>
    {% else %}
        <li>No reservations found.</li>
    {% endfor %}
    </ul>
</body>
</html>
