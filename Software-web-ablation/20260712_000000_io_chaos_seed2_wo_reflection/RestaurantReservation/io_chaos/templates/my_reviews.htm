<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews My</title>
</head>
<body>
<div id="review_page">
    <h1>My Reviews</h1>
    <div id="review_list">
        {% for review in reviews %}
        <div class="review_item">
            <p>Dish Name: {{ review.dish_name }}</p>
            <p>Rating: {{ review.rating }}</p>
            <p>Review: {{ review.review_text }}</p>
        </div>
        {% endfor %}
    </div>
    <button id="write_review_btn" onclick="location.href='{{ url_for('write_review') }}'">Write Review</button>
    <button id="back_dashboard_btn" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
