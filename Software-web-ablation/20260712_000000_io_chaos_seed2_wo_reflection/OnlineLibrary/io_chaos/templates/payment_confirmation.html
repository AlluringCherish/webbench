<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">
            <p>Amount to Pay: ${{ '%.2f'|format(fine.amount) }}</p>
        </div>
        <form method="POST" action="{{ url_for('payment_confirmation_post', fine_id=fine.fine_id) }}">
            <button type="submit" id="confirm-payment-button">Confirm Payment</button>
        </form>
        <button id="back-to-profile" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
    </div>
</body>
</html>
