<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <h3>{{ review.book_title }}</h3>
                <p>Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
                <button id="edit-review-button-{{ review.review_id }}" onclick="location.href='{{ url_for('write_review_get', book_id=review.book_id) }}'">Edit</button>
                <!-- Delete form omitted because no route implemented -->
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
