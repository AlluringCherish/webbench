<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        <div id="borrow-book-info">
            <h1>Successfully Borrowed: {{ book.title }}</h1>
            <p>Author: {{ book.author }}</p>
            <p>Status: {{ book.status }}</p>
            <p>ISBN: {{ book.isbn }}</p>
            <p>Genre: {{ book.genre }}</p>
            <p>Publisher: {{ book.publisher }}</p>
            <p>Year: {{ book.year }}</p>
        </div>
        <div id="due-date-display">
            <p>Due Date: {{ due_date }}</p>
        </div>
        <p>Borrow ID: {{ borrow_id }}</p>
        <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
