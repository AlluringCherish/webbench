<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles - ContentPublishingHub</title>
</head>
<body>
<div id="published-articles-page">
    <h1>Published Articles</h1>

    <form id="filter-form" method="get" action="{{ url_for('published_articles') }}">
        <label for="filter-category">Filter by Category:</label>
        <select id="filter-category" name="category">
            <option value="">All</option>
            {% for category in category_options %}
            <option value="{{ category }}" {% if filter_category == category %}selected{% endif %}>{{ category.title() }}</option>
            {% endfor %}
        </select>

        <label for="filter-date">Filter by Publication Date:</label>
        <input type="date" id="filter-date" name="publication_date" value="{{ filter_date }}">

        <button type="submit" id="btn-filter">Apply Filters</button>
        <button type="button" id="btn-clear-filters" onclick="location.href='{{ url_for('published_articles') }}'">Clear Filters</button>
    </form>

    <table id="published-articles-list" border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Category</th>
                <th>Publication Date</th>
                <th>Author</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for article in articles %}
            <tr id="article-{{ article.id }}">
                <td>{{ article.title }}</td>
                <td>{{ article.category }}</td>
                <td>{{ article.publication_date }}</td>
                <td>{{ article.author }}</td>
                <td>
                    <button onclick="location.href='{{ url_for('article_version_history', article_id=article.id) }}'">Versions</button>
                    <button onclick="location.href='{{ url_for('article_analytics', article_id=article.id) }}'">Analytics</button>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="5">No published articles found.</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <nav id="published-articles-navigation">
        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </nav>
</div>
</body>
</html>
