<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
<div id="edit-article-page">
    <h1>Edit Article</h1>
    {% if error %}
    <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form id="edit-article-form" method="post" action="{{ url_for('edit_article', article_id=article_id) }}">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="title" value="{{ article.title }}" readonly><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="content" rows="15" cols="80" required>{{ content }}</textarea><br><br>

        <label for="change-summary">Change Summary:</label><br>
        <textarea id="change-summary" name="change_summary" rows="4" cols="80"></textarea><br><br>

        <button type="submit" id="btn-save-edits">Save Changes</button>
        <button type="button" id="btn-cancel-edit" onclick="location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
