<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
<div id="article-analytics-page">
    <h1>Analytics for Article: {{ article.title }}</h1>

    <div id="analytics-overview">
        <ul>
            {% for metric_key, metric_value in analytics_metrics.items() %}
            <li id="metric-{{ metric_key }}">{{ metric_key.replace('_', ' ').title() }}: {{ metric_value }}</li>
            {% endfor %}
        </ul>
    </div>

    <nav id="article-analytics-navigation">
        <button id="btn-back-my-articles" onclick="location.href='{{ url_for('my_articles') }}'">Back to My Articles</button>
        <button id="btn-back-published-articles" onclick="location.href='{{ url_for('published_articles') }}'">Back to Published Articles</button>
        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </nav>
</div>
</body>
</html>
