<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
<div id="create-article-page">
    <h1>Create New Article</h1>
    <form id="create-article-form" method="post" action="{{ url_for('create_article') }}">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="title" required><br><br>

        <label for="article-category">Category:</label><br>
        <input type="text" id="article-category" name="category" required><br><br>

        <button type="submit" id="btn-submit-article">Create Article</button>
        <button type="button" id="btn-cancel" onclick="location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
