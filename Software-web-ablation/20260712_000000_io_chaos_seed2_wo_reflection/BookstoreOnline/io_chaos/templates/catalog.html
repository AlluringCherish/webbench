<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog_page">
        <h1>Books Catalog</h1>
        <form method="POST" action="">
            <input type="text" id="search_input" name="search" placeholder="Search by title, author, ISBN" value="{{ search_query.get('search', '') }}"/>
            <select id="category_filter" name="category">
                <option value="" {% if selected_category is none %}selected{% endif %}>All Categories</option>
                {% for category_id, category in categories.items() %}
                <option value="{{ category_id }}" {% if selected_category == category_id|int %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="books_grid">
            {% for book in books %}
            <div class="book_item">
                <div><strong>{{ book.title }}</strong> by {{ book.writer }}</div>
                <div>Category: {{ book.category }}</div>
                <div>ISBN: {{ book.isbn }}</div>
                <div>Price: ${{ book.cost }}</div>
                <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_detail', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
