<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart_page">
        <h1>Cart</h1>
        <table id="cart_items_table">
            <thead>
                <tr>
                    <th>Book Title</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.book_title }}</td>
                    <td>
                        <form method="POST" action="/updatecart">
                            <input type="hidden" name="item_id" value="{{ item.item_id }}" />
                            <input type="number" id="update_quantity-{{ item.item_id }}" name="qty" value="{{ item.quantity }}" min="1" />
                            <button type="submit">Update</button>
                        </form>
                    </td>
                    <td>${{ item.price }}</td>
                    <td>${{ item.subtotal }}</td>
                    <td>
                        <form method="POST" action="/removeitem">
                            <input type="hidden" name="item_id" value="{{ item.item_id }}" />
                            <button type="submit" id="remove_item_button-{{ item.item_id }}">Remove</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="5">Your cart is empty.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <div id="total_amount">Total Amount: ${{ total_amount }}</div>
        <form action="/checkout" method="POST">
            <button id="proceed_checkout_button" type="submit">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
