<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write_review_page">
        <h1>Write a Review</h1>
        <form method="GET" action="/write_review">
            <label for="select_book">Select Book:</label>
            <select id="select_book" name="book_id">
                {% for book_id, book in purchased_books.items() %}
                <option value="{{ book_id }}">{{ book.name }}</option>
                {% endfor %}
            </select>
            <br />
            <label for="rating_select">Rating:</label>
            <select id="rating_select" name="rating">
                {% for i in range(1, 11) %}
                <option value="{{ i }}">{{ i }} stars</option>
                {% endfor %}
            </select>
            <br />
            <label for="review_textarea">Review:</label>
            <textarea id="review_textarea" name="review_text"></textarea>
            <br />
            <button id="submit_review_button" type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
