<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book_details_page">
        <h1 id="book-title">{{ book.title }}</h1>
        <div id="book_writer">Author: {{ book.author }}</div>
        <div id="book_cost">Price: ${{ book.price }}</div>
        <form method="GET" action="/addtocart">
            <input type="hidden" name="bookid" value="{{ book.book_id }}" />
            <label for="quantity_input">Quantity:</label>
            <input type="number" id="quantity_input" name="quantity" min="1" value="1" />
            <button id="addtocart-button" type="submit">Add to Cart</button>
        </form>
        <div id="book_reviews">
            <h2>Customer Reviews</h2>
            {% for review in reviews %}
            <div class="review_item">
                <div><strong>{{ review.customer_name }}</strong> rated: {{ review.rating }} stars</div>
                <div>"{{ review.review_text }}"</div>
                <div>Date: {{ review.review_date }}</div>
            </div>
            {% else %}
            <div>No reviews yet.</div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
