<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkoutpage">
        <h1>Checkout</h1>
        <form method="POST" action="/checkout">
            <label for="customer_name_input">Customer Name:</label>
            <input type="text" id="customer_name_input" name="customername" required />
            <br />
            <label for="shipping_addr">Shipping Address:</label>
            <textarea id="shipping_addr" name="ship_address" required></textarea>
            <br />
            <label for="payment_method_select">Payment Method:</label>
            <select id="payment_method_select" name="pay_method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="Pay_Pal">Pay_Pal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>
            <br />
            <button id="place_order_button" type="submit">Place Order</button>
        </form>
    </div>
</body>
</html>
