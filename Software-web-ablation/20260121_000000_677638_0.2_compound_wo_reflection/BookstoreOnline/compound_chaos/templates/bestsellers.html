<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
    <div id="bestsellers-page">
        <h1>Bestsellers</h1>
        <form id="time-period-form" method="get" action="{{ url_for('bestsellers') }}">
            <label for="time-period-filter">Filter by Time Period:</label>
            <select id="time-period-filter" name="time_period">
                <option value="Week" {% if selected_period == 'Week' %}selected{% endif %}>Week</option>
                <option value="Month" {% if selected_period == 'Month' %}selected{% endif %}>Month</option>
                <option value="Year" {% if selected_period == 'Year' %}selected{% endif %}>Year</option>
            </select>
            <button type="submit">Apply Filter</button>
        </form>
        <div id="bestsellers-list">
            <ul>
                {% for bestseller in bestsellers %}
                <li id="bestseller-{{ bestseller.rank }}">
                    <a href="{{ url_for('book_details', book_id=bestseller.book_id) }}">{{ bestseller.title }}</a> (Sales: {{ bestseller.sales_count }})
                </li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
