<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Book Reviews</h1>
        <select id="filter-by-rating" name="filter-by-rating" onchange="this.form.submit()" form="filter-form">
            <option value="">All Ratings</option>
            <option value="5" {% if selected_rating == '5' %}selected{% endif %}>5 Stars</option>
            <option value="4" {% if selected_rating == '4' %}selected{% endif %}>4 Stars</option>
            <option value="3" {% if selected_rating == '3' %}selected{% endif %}>3 Stars</option>
            <option value="2" {% if selected_rating == '2' %}selected{% endif %}>2 Stars</option>
            <option value="1" {% if selected_rating == '1' %}selected{% endif %}>1 Star</option>
        </select>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <ul id="reviews-list">
            {% for review in reviews %}
            <li>
                <strong>{{ review.book_title }}</strong> - Rated: {{ review.rating }}<br>
                {{ review.review_text }}<br>
                <em>by {{ review.customer_name }} on {{ review.review_date }}</em>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
