<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-container">
        <h1 id="dashboard">Dashboard</h1>
        <div id="featured-books">
            {% for book in featured_books %}
            <div id="featured-book-{{ book.book_id }}">
                <h2>{{ book.title }}</h2>
                <p>{{ book.description }}</p>
                <p>Price: ${{ book.price }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="browse-catalog-button" onclick="location.href='{{ url_for('catalog') }}'">Browse Catalog</button>
        <button id="bestsellers-button" onclick="location.href='{{ url_for('bestsellers') }}'">Bestsellers</button>
        <div id="bestsellers">
            <ul>
            {% for bestseller in bestsellers %}
                <li id="bestseller-{{ loop.index }}">{{ bestseller.title }} (Sales: {{ bestseller.sales_count }})</li>
            {% endfor %}
            </ul>
        </div>
        <nav>
            <a href="{{ url_for('catalog') }}" id="catalog-link">Catalog</a>
            <a href="{{ url_for('book_details', book_id=featured_books[0].book_id if featured_books else 0) }}" id="book-details-link">Book Details</a>
            <a href="{{ url_for('orders') }}" id="orders-link">Orders</a>
        </nav>
    </div>
</body>
</html>
