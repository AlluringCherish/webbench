<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book.title }}</h1>
        <div id="book-author">Author: {{ book.author }}</div>
        <div id="book-price">Price: ${{ book.price }}</div>
        <div id="book-description">{{ book.description }}</div>
        <button id="add-to-cart-button" formmethod="post" formaction="{{ url_for('add_to_cart', book_id=book.book_id) }}">Add to Cart</button>
        <div id="book-reviews">
            <h2>Reviews</h2>
            <ul>
                {% for review in reviews %}
                <li id="review-{{ review.review_id }}">
                    <strong>{{ review.customer_name }}</strong> ({{ review.rating }}/5) - {{ review.review_date }}<br>
                    {{ review.review_text }}
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
