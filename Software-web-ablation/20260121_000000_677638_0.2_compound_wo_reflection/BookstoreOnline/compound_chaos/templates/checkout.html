<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1 id="checkout-title">Checkout</h1>
        <form method="post" action="{{ url_for('checkout') }}">
            <label for="customer-name">Customer Name:</label>
            <input type="text" id="customer-name" name="customer-name" value="{{ customer_name or '' }}" required>
            <label for="payment-method">Payment Method:</label>
            <select id="payment-method" name="payment-method">
                <option value="PayPal" {% if payment_method == 'PayPal' %}selected{% endif %}>PayPal</option>
                <option value="Credit Card" {% if payment_method == 'Credit Card' %}selected{% endif %}>Credit Card</option>
                <option value="Transfer" {% if payment_method == 'Transfer' %}selected{% endif %}>Transfer</option>
            </select>
            <button type="submit" id="submit-order-button">Submit Order</button>
        </form>
    </div>
</body>
</html>
