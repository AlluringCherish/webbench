<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1 id="catalog-title">Book Catalog</h1>
        <input type="text" id="search-box" placeholder="Search books...">
        <select id="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_id }}" {% if selected_category and selected_category == category.category_id %}selected{% endif %}>{{ category.name }}</option>
            {% endfor %}
        </select>
        <div id="books-list">
            {% for book in books %}
            <div id="book-{{ book.book_id }}">
                <h2>{{ book.title }}</h2>
                <p>Author: {{ book.author }}</p>
                <p>Price: ${{ book.price }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
