<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <form method="post" action="{{ url_for('cart') }}">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td><input type="number" min="1" id="update-quantity-{{ item.cart_id }}" name="quantity-{{ item.cart_id }}" value="{{ item.quantity }}"></td>
                        <td>${{ item.price * item.quantity }}</td>
                        <td><button type="submit" id="remove-item-button-{{ item.cart_id }}" name="remove-item" value="{{ item.cart_id }}">Remove</button></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div id="total-amount">Total: ${{ total_amount }}</div>
            <button type="submit" id="proceed-checkout-button" name="proceed-checkout">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
