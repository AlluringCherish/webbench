<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>
        <form id="review-form" method="post" action="{{ url_for('write_review') }}">
            <div id="select-book">
                <label for="book-select">Select Book:</label>
                <select id="book-select" name="book_id">
                    {% for book in purchased_books %}
                    <option value="{{ book.book_id }}">{{ book.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div id="rating">
                <label for="rating-select">Rating:</label>
                <select id="rating-select" name="rating">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div id="review-text">
                <label for="review-textarea">Review:</label>
                <textarea id="review-textarea" name="review_text" rows="4" cols="50"></textarea>
            </div>
            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
