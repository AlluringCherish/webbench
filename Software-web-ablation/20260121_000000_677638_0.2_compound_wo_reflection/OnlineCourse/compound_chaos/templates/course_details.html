<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
    <h1 id="course-title">{{ course.title }}</h1>
    <p id="course-description">{{ course.description }}</p>

    <button id="enroll-button" {% if enrolled %}disabled{% endif %}>
        {% if enrolled %}Enrolled{% else %}Enroll{% endif %}
    </button>

    <button id="back-to-catalog" onclick="window.location.href='{{ url_for('catalog') }}'">Back to Catalog</button>
</body>
</html>
