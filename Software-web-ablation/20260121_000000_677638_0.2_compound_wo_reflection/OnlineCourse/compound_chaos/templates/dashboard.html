<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ fullname }}!</h1>

    <button id="browse-courses-button" onclick="window.location.href='{{ url_for('catalog') }}'">Browse Course Catalog</button>

    <h2>Enrolled Courses</h2>
    <div id="enrolled-courses">
        {% if enrolled_courses %}
            <ul>
                {% for course in enrolled_courses %}
                    <li>
                        {{ course.title }} - Progress: {{ course.progress }}%
                        <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('my_courses', course_id=course.course_id) }}'">View Details</button>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No enrolled courses.</p>
        {% endif %}
    </div>
</body>
</html>
