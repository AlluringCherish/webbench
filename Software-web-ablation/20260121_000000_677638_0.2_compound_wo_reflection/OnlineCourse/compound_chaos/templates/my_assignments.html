<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assignments</title>
</head>
<body id="assignments-page">
    <h1>Assignments</h1>

    {% if assignments %}
        <ul>
            {% for assignment in assignments %}
                <li>
                    <div>
                        <strong>{{ assignment.title }}</strong> - Due: {{ assignment.due_date }} - Max Points: {{ assignment.max_points }} - Status: {{ assignment.status }}
                    </div>
                    <button onclick="window.location.href='{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}'">Submit Assignment</button>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No assignments available.</p>
    {% endif %}

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
