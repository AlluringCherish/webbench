<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit</title>
</head>
<body id="submit-assignment-page">
    <h1>Submit Assignment</h1>

    <div id="assignment-info">
        <p><strong>Title:</strong> {{ assignment.title }}</p>
        <p><strong>Description:</strong> {{ assignment.description }}</p>
    </div>

    <form method="POST" action="{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}">
        <label for="submission-text">Your Submission:</label><br>
        <textarea id="submission-text" name="submission_text" rows="10" cols="50"></textarea><br>

        <button type="submit" id="submit-button">Submit</button>
    </form>

    <button id="back-to-assignments" onclick="window.location.href='{{ url_for('assignments') }}'">Back to Assignments</button>
</body>
</html>
