<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="course-learning-page">
        <h1 id="course-title">{{ course.title }}</h1>

        <div id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <p>{{ current_lesson.content }}</p>
        </div>

        {% if can_mark_complete %}
            <form method="POST" action="{{ url_for('mark_complete', course_id=course.course_id, lesson_id=current_lesson.lesson_id) }}">
                <button type="submit" id="mark-complete-button">Mark as Complete</button>
            </form>
        {% endif %}

        <button id="back-to-my-courses" onclick="window.location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
