<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <h1>Certificates</h1>

        {% if certificates %}
            <div id="certificate-cards">
                {% for certificate in certificates %}
                    <div class="certificate-card">
                        <p>Course Title: {{ certificate.course_title }}</p>
                        <p>Issue Date: {{ certificate.issue_date }}</p>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p>No certificates available.</p>
        {% endif %}

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
