<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
</head>
<body>
    <div id="enrolled-courses">
        <h1>My Courses</h1>
        {% if enrolled_courses %}
            <ul>
                {% for course in enrolled_courses %}
                    <li>
                        {{ course.title }} - Progress: {{ course.progress }}%
                        <button id="continue-learning-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('my_courses', course_id=course.course_id) }}'">Continue Learning</button>
                    </li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No enrolled courses found.</p>
        {% endif %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
