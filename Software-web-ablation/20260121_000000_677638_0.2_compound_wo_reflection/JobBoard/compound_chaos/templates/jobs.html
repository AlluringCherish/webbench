<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
    <div id="main-content">
        <h1>Job Listings</h1>

        <form method="POST" action="{{ url_for('jobs') }}">
            <input id="search-input" name="search_query" type="text" />
            <select id="filter-type-dropdown" name="filter_type">
                <option value="">All Types</option>
                <!-- More options -->
            </select>
            <select id="filter-location-dropdown" name="filter_location">
                <option value="">All Locations</option>
                <option value="Remote">Remote</option>
                <!-- More options -->
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="job-cards-container">
            {% for job in job_cards %}
                <div class="job-card">
                    <h3>{{ job.title }}</h3>
                    <p>Company: {{ job.company }}</p>
                    <p>Salary Range: {{ job.salary_range }}</p>
                    <a href="{{ url_for('job_detail', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Job</button>
                    </a>
                </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
