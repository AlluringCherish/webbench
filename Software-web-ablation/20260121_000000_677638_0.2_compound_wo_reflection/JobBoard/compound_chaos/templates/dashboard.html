<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Job Dashboard</h1>
    <a href="{{ url_for('company_directory') }}">Company Directory</a> |
    <a href="{{ url_for('my_applications') }}">My Applications</a>
    <div id="job-list">
        {% for job in job_cards %}
            <div class="job-card">
                <h2>{{ job.title }}</h2>
                <p>Company: {{ job.company }}</p>
                <p>Salary: {{ job.salary_range }}</p>
                <a href="{{ url_for('job_detail', job_id=job.job_id) }}"><button>View Job</button></a>
            </div>
        {% else %}
            <p>No jobs available.</p>
        {% endfor %}
    </div>
</body>
</html>
