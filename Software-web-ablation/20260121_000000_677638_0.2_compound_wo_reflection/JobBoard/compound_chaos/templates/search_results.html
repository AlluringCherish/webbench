<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="main-content">
        <h1>Search Results</h1>

        <div id="search-query-display">Search Query: {{ search_query }}</div>

        <div id="search-tabs">
            <button id="tab-jobs">Jobs</button>
            <button id="tab-companies">Companies</button>
        </div>

        <div id="job-results">
            {% for job in job_results %}
                <div class="job-result">
                    <h3>{{ job.title }}</h3>
                    <p>{{ job.company }}</p>
                </div>
            {% endfor %}
        </div>

        <div id="company-results">
            {% for company in company_results %}
                <div class="company-result">
                    <h3>{{ company.name }}</h3>
                    <p>{{ company.industry }}</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
