<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ job.title }}</title>
</head>
<body>
    <h1>{{ job.title }}</h1>
    <p>Company: {{ company_name }}</p>
    <p>Location: {{ job.location }}</p>
    <p>Category: {{ job.category }}</p>
    <p>Salary Range: {{ salary_range }}</p>
    <div id="job-description">
        <h3>Description</h3>
        <p>{{ job.description }}</p>
    </div>
    <form method="POST" action="">
        <h2>Apply for this job</h2>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        <label for="applicant_name">Name:</label><br>
        <input type="text" id="applicant_name" name="applicant_name" required><br>

        <label for="applicant_email">Email:</label><br>
        <input type="email" id="applicant_email" name="applicant_email" required><br>

        <label for="cover_letter">Cover Letter:</label><br>
        <textarea id="cover_letter" name="cover_letter" rows="10" cols="40" required></textarea><br>

        <input type="submit" value="Submit Application">
    </form>
    <a href="{{ url_for('dashboard') }}"><button>Back to Dashboard</button></a>
</body>
</html>
