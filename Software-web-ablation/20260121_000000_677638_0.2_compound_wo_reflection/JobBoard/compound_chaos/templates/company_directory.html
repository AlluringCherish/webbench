<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <h1>Company Directory</h1>
    <form method="POST" action="{{ url_for('company_directory') }}">
        <input type="text" name="search_company" placeholder="Search Companies" value="{{ search_query }}">
        <button type="submit">Search</button>
    </form>

    {% for company in companies %}
        <div class="company-card">
            <h2><a href="{{ url_for('company_profile', company_id=company.company_id) }}">{{ company.name }}</a></h2>
            <p>Industry: {{ company.industry }}</p>
            <p>Location: {{ company.location }}</p>
        </div>
    {% else %}
        <p>No companies found.</p>
    {% endfor %}
    <a href="{{ url_for('dashboard') }}"><button>Back to Dashboard</button></a>
</body>
</html>
