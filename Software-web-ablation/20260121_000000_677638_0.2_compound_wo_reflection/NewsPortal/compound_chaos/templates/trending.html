<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trending Articles</title>
</head>
<body>

<div id="trending-articles-page">
<h1>{{ page_title }}</h1>

<div id="time-period-filter">
<label for="time-period-select">Filter by time period:</label>
<select id="time-period-select" name="time_period">
<option value="today">Today</option>
<option value="week">This Week</option>
<option value="month">This Month</option>
</select>
</div>

{% for article in trending_articles %}
<div class="trending-article-item">
<p>Category: {{ article.category }}</p>
<p>Views: {{ article.view_count }}</p>
</div>
{% endfor %}

<button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

</div>

</body>
</html>
