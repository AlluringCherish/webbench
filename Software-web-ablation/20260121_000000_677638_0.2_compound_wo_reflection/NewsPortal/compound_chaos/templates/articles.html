<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Articles</title>
</head>
<body>

<h1 id="article-title">{{ article.title }}</h1>
<p>{{ article.author }}</p>
<p>{{ article.date }}</p>
<div id="article-content">{{ article.content }}</div>

{% if article.is_bookmarked %}
<form method="POST">
<button type="submit">Remove Bookmark</button>
</form>
{% else %}
<form method="POST">
<button type="submit">Bookmark</button>
</form>
{% endif %}


<div id="search-filter">
<input type="text" id="search-input" name="search_query" placeholder="Search by title or author">
<select id="category-filter" name="category">
<option value="">Select Category</option>
<!-- Add other category options here -->
</select>
</div>

{% for article in articles %}
<div class="article-item">
<p>{{ article.author }}</p>
<button onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View</button>
</div>
{% endfor %}

</body>
</html>
