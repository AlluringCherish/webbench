<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Comments</title>
</head>
<body>

<div id="comments-page">
<h1>{{ page_title }}</h1>
<ul>
{% for comment in comments %}
<li>
<p>Article: {{ comment.article_title }}</p>
<p>- by {{ comment.commenter_name }}</p>
</li>
{% endfor %}
</ul>

<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>

</div>

</body>
</html>
