<head>
<meta charset="UTF-8">
</head>

<div id="trending-articles-page">
<h1>{{ page_title }}</h1>

<select id="time-period-filter" name="time_period">
  <!-- Options for time period filtering -->
</select>

<div id="trending-articles-list">
  {% for article in trending_articles %}
  <div class="trending-article">
    <h2>{{ article.article_title }}</h2>
    <p>Category: {{ article.category }}</p>
    <p>Views: {{ article.view_count }}</p>
  </div>
  {% endfor %}
</div>

<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

</div>
<!-- Page content here -->
</div>
</body>
