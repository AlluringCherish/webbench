<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <div id="profile-username">Username: {{ username }}</div>
        <form method="POST" action="{{ url_for('update_profile') }}">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ email }}" required />
            <br />
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <div id="borrow-history">
            <h2>Borrow History</h2>
            <ul>
                {% for entry in borrow_history %}
                <li>{{ entry.book_title }} - Borrowed on {{ entry.borrow_date }}{% if entry.return_date %}, Returned on {{ entry.return_date }}{% else %}, Not yet returned{% endif %}</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
