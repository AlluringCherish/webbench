<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">Amount Due: ${{ '%.2f'|format(fine.amount) }}</div>
        {% if not message %}
        <form method="POST" action="{{ url_for('confirm_payment', fine_id=fine.fine_id) }}">
            <button id="confirm-payment-button" type="submit">Confirm Payment</button>
            <button id="back-to-profile" type="button" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
        </form>
        {% else %}
        <div id="payment-message">{{ message }}</div>
        <button id="back-to-profile-after-message" type="button" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
        {% endif %}
    </div>
</body>
</html>
