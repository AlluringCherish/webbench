<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <div id="book-info-display">
            <h1>{{ book.title }}</h1>
            <div>Author: {{ book.author }}</div>
            <div>Current Status: {{ book.status }}</div>
        </div>
        {% if message %}
        <div id="review-message">{{ message }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('submit_review', book_id=book.book_id) }}">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for i in range(1,6) %}
                <option value="{{ i }}" {% if existing_review and existing_review.rating == i %}selected{% endif %}>{{ i }}</option>
                {% endfor %}
            </select>
            <br />
            <label for="review-text">Review Text:</label><br />
            <textarea id="review-text" name="review_text" rows="4" cols="50">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea>
            <br />
            <button id="submit-review-button" type="submit">Submit Review</button>
            <button id="back-to-book" type="button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
        </form>
    </div>
</body>
</html>
