<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Borrowings</title>
</head>
<body>
    <div id="my-borrows-page">
        <select id="filter-status">
            <option value="">All</option>
            <option value="Active">Active</option>
            <option value="Returned">Returned</option>
            <option value="Overdue">Overdue</option>
        </select>
        <table id="borrows-table" border="1">
            <thead>
                <tr>
                    <th>Book Title</th>
                    <th>Borrow Date</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for borrow in borrows %}
                <tr>
                    <td>{{ borrow.book_title }}</td>
                    <td>{{ borrow.borrow_date }}</td>
                    <td>{{ borrow.due_date }}</td>
                    <td>{{ borrow.status }}</td>
                    <td>
                        {% if borrow.status == 'Active' or borrow.status == 'Overdue' %}
                        <form method="POST" action="{{ url_for('return_book', borrow_id=borrow.borrow_id) }}" style="display:inline;">
                            <button id="return-book-button-{{ borrow.borrow_id }}" type="submit">Return Book</button>
                        </form>
                        {% else %}
                        -
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
