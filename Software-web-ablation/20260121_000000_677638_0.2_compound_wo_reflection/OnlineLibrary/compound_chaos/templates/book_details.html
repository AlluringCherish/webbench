<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="book-details-page">
        <h1 id="book-title">{{ book.title }}</h1>
        <div id="book-author">Author: {{ book.author }}</div>
        <div id="book-status">Status: {{ book.status }}</div>
        {% if book.status == 'Available' %}
        <button id="borrow-button" onclick="location.href='{{ url_for('borrow_confirmation', book_id=book.book_id) }}'">Borrow</button>
        {% endif %}
        <div id="reviews-section">
            <h2>Reviews</h2>
            {% for review in reviews %}
            <div class="review">
                <div><strong>{{ review.username }}</strong> - Rating: {{ review.rating }}/5</div>
                <div>{{ review.review_text }}</div>
                <div><small>{{ review.review_date }}</small></div>
            </div>
            {% endfor %}
        </div>
        <button id="write-review-button" onclick="location.href='{{ url_for('write_review', book_id=book.book_id) }}'">Write Review</button>
        <button id="back-to-catalog" onclick="location.href='{{ url_for('book_catalog') }}'">Back to Catalog</button>
    </div>
</body>
</html>
