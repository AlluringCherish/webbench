<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders-page">
            <h1>Active Orders</h1>
            <form method="GET" action="{{ url_for('active_orders') }}">
                <label for="status-filter">Filter by Status:</label>
                <select id="status-filter" name="selected_status" onchange="this.form.submit()">
                    <option value="">All Statuses</option>
                    {% for status in status_options %}
                    <option value="{{ status }}" {% if status == selected_status %}selected{% endif %}>{{ status }}</option>
                    {% endfor %}
                </select>
            </form>
            <div id="orders-list">
                {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Customer: {{ order.customer_name }}</p>
                    <p>Restaurant: {{ order.restaurant_name }}</p>
                    <p>Status: {{ order.status }}</p>
                    <a href="{{ url_for('track_order', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
                {% endfor %}
            </div>
            <a href="{{ url_for('dashboard') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
