<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="main-container">
        <div id="checkout-page">
            <h1>Checkout</h1>
            {% if error %}
                <div id="error-message" style="color:red;">{{ error }}</div>
            {% endif %}
            <form method="POST" action="{{ url_for('checkout') }}">
                <label for="customer-name">Name:</label>
                <input type="text" id="customer-name" name="customer_name" required value="{{ request.form.customer_name if request.form.customer_name else '' }}">
                <br>
                <label for="delivery-address">Delivery Address:</label>
                <textarea id="delivery-address" name="delivery_address" required>{{ request.form.delivery_address if request.form.delivery_address else '' }}</textarea>
                <br>
                <label for="phone-number">Phone Number:</label>
                <input type="text" id="phone-number" name="phone_number" required value="{{ request.form.phone_number if request.form.phone_number else '' }}">
                <br>
                <label for="payment-method">Payment Method:</label>
                <select id="payment-method" name="payment_method" required>
                    <option value="">Select a payment method</option>
                    <option value="Credit Card" {% if request.form.payment_method == 'Credit Card' %}selected{% endif %}>Credit Card</option>
                    <option value="Debit Card" {% if request.form.payment_method == 'Debit Card' %}selected{% endif %}>Debit Card</option>
                    <option value="Cash" {% if request.form.payment_method == 'Cash' %}selected{% endif %}>Cash</option>
                    <option value="Online Payment" {% if request.form.payment_method == 'Online Payment' %}selected{% endif %}>Online Payment</option>
                </select>
                <br>
                <button type="submit" id="place-order-button">Place Order</button>
            </form>
        </div>
    </div>
</body>
</html>
