<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlist</title>
</head>
<body>
<h1>Waitlist</h1>
{% if waitlist %}
<ul>
    {% for w in waitlist %}
    <li>ID: {{ w.waitlist_id }}, User: {{ w.username }}, Party Size: {{ w.party_size }}, Joined: {{ w.join_time }}, Status: {{ w.status }}, Occasion: {{ w.occasion }}</li>
    {% endfor %}
</ul>
{% else %}
<p>No waitlist entries found.</p>
{% endif %}
</body>
</html>
