<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
</head>
<body>
<h1>Menu</h1>
{% if menu %}
<ul>
    {% for dish in menu %}
    <li><a href="{{ url_for('dish_details', dish_id=dish.dish_id) }}">{{ dish.name }}</a> - ${{ '%.2f'|format(dish.price) }}</li>
    {% endfor %}
</ul>
{% else %}
<p>No menu items available.</p>
{% endif %}
</body>
</html>
