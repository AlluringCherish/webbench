<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<h1>My Reservations</h1>
{% if reservations %}
<ul>
    {% for r in reservations %}
    <li>
        Guest: {{ r.guest_name }}, Date: {{ r.date }}, Time: {{ r.time }}, Status: {{ r.status }}
        {% if r.status != 'canceled' %}
        <form method="post" action="{{ url_for('cancel_reservation', reservation_id=r.reservation_id) }}" style="display:inline;">
            <button type="submit">Cancel</button>
        </form>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No reservations found.</p>
{% endif %}
</body>
</html>
