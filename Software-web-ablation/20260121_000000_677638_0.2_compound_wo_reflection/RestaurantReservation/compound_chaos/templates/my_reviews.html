<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
<h1>My Reviews</h1>
{% if reviews %}
<ul>
    {% for r in reviews %}
    <li>
        Dish: {{ menu | selectattr('dish_id', 'equalto', r.dish_id) | map(attribute='name') | list | first }}
        <form method="post" action="{{ url_for('update_review', review_id=r.review_id) }}">
            <label>Rating:
                <select name="rating">
                    {% for i in range(1,6) %}
                    <option value="{{ i }}" {% if i == r.rating %}selected{% endif %}>{{ i }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Review:<br>
                <textarea name="review_text" rows="3" cols="40">{{ r.review_text }}</textarea>
            </label>
            <button type="submit">Update</button>
        </form>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No reviews found.</p>
{% endif %}
</body>
</html>
