<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
    <h1>Adoption Application</h1>
    <form method="POST" action="{{ url_for('submit_adoption_application') }}">
        <label for="applicant-name">Name:</label>
        <input type="text" id="applicant-name" name="applicant_name" required>
        <br>

        <label for="applicant-phone">Phone:</label>
        <input type="tel" id="applicant-phone" name="applicant_phone" required>
        <br>

        <label for="housing-type">Housing Type:</label>
        <select id="housing-type" name="housing_type" required>
            <option value="House">House</option>
            <option value="Apartment">Apartment</option>
            <option value="Other">Other</option>
        </select>
        <br>

        <label for="reason">Reason for Adoption:</label><br>
        <textarea id="reason" name="reason" rows="4" cols="50" required></textarea>
        <br>

        <button type="submit" id="submit-application-button">Submit Application</button>
    </form>
    <br>
    <button id="back-to-pet" onclick="window.location.href='{{ url_for('pet_details', pet_id=pet_id) }}'">Back to Pet Details</button>
</body>
</html>
