<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Details</title>
</head>
<body>
    <h1 id="pet-name">{{ pet.name }}</h1>
    <p id="pet-species">Species: {{ pet.species }}</p>
    <p id="pet-description">{{ pet.description }}</p>
    <button id="adopt-button" onclick="window.location.href='{{ url_for('adoption_application_page', pet_id=pet.pet_id) }}'">Adopt</button>
    <button id="back-to-listings" onclick="window.location.href='{{ url_for('listings_page') }}'">Back to Listings</button>
</body>
</html>
