<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Listings</title>
</head>
<body>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

    <h1>Pet Listings</h1>

    <input type="text" id="search-input" name="search" placeholder="Search pets..." value="{{ search or '' }}">

    <select id="filter-species" name="species">
        <option value="">All Species</option>
        <option value="Cat" {% if filter_species == 'Cat' %}selected{% endif %}>Cat</option>
        <option value="Dog" {% if filter_species == 'Dog' %}selected{% endif %}>Dog</option>
        <option value="Other" {% if filter_species == 'Other' %}selected{% endif %}>Other</option>
    </select>

    <div id="pet-listings">
        {% for pet in pets %}
            <div class="pet" id="pet-{{ pet.pet_id }}">
                <h2>{{ pet.name }}</h2>
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
                <button onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Details</button>
            </div>
        {% else %}
            <p>No pets found.</p>
        {% endfor %}
    </div>
</body>
</html>
