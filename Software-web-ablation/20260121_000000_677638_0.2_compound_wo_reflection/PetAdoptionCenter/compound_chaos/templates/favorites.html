<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

    <h1>My Favorites</h1>

    <div id="favorites-container">
        {% for pet in favorite_pets %}
            <div class="pet" id="pet-{{ pet.pet_id }}">
                <h2>{{ pet.name }}</h2>
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
                <button onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Details</button>
            </div>
        {% else %}
            <p>You have no favorite pets.</p>
        {% endfor %}
    </div>

</body>
</html>
