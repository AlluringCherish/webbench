<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

    <h1>Messages</h1>

    <div id="messages-container">
        {% for message in messages %}
            <div class="message" id="message-{{ message.message_id }}">
                <p><strong>From:</strong> {{ message.sender }}</p>
                <p>{{ message.message }}</p>
                <p><em>Date:</em> {{ message.date_sent }}</p>
            </div>
        {% else %}
            <p>No messages to display.</p>
        {% endfor %}
    </div>

    <form method="POST" action="{{ url_for('send_message') }}">
        <input type="text" id="new-message-input" name="message" placeholder="Type your message here..." required>
        <button type="submit" id="send-message-button">Send</button>
    </form>

</body>
</html>
