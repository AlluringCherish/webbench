<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
    <h1>Add New Pet</h1>
    <form method="POST" action="{{ url_for('submit_new_pet') }}">
        <label for="pet-name-input">Pet Name:</label>
        <input type="text" id="pet-name-input" name="pet_name" required>
        <br>

        <label for="species-select">Species:</label>
        <select id="species-select" name="species" required>
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Other">Other</option>
        </select>
        <br>

        <label for="age-input">Age:</label>
        <input type="number" id="age-input" name="age" min="0" required>
        <br>

        <label for="breed-input">Breed:</label>
        <input type="text" id="breed-input" name="breed" required>
        <br>

        <label for="size-select">Size:</label>
        <select id="size-select" name="size" required>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
        </select>
        <br>

        <label for="description-input">Description:</label><br>
        <textarea id="description-input" name="description" rows="4" cols="50" required></textarea>
        <br>

        <button type="submit" id="submit-pet-button">Add Pet</button>
    </form>
    <br>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
