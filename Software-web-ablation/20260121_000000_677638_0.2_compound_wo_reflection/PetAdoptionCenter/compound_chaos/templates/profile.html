<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>
<body>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>

    <h1>User Profile</h1>

    <form method="POST" action="{{ url_for('update_profile') }}">
        <label for="profile-username">Username:</label>
        <input type="text" id="profile-username" name="username" value="{{ user.username }}" readonly>
        <br>

        <label for="profile-email">Email:</label>
        <input type="email" id="profile-email" name="email" value="{{ user.email }}" required>
        <br>

        <button type="submit" id="save-profile-button">Save Changes</button>
    </form>

</body>
</html>
