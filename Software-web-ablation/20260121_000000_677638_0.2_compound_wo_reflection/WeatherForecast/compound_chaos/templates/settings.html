<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>
        <form method="post" action="">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                {% for unit in temperature_unit_options %}
                    <option value="{{ unit }}" {% if unit == current_temperature_unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for location in saved_locations %}
                    <option value="{{ location.location_id }}" {% if location.location_id == user_settings.default_location_id %}selected{% endif %}>{{ location.location_name }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" value="true" {% if user_settings.alert_notifications_enabled %}checked{% endif %}>
            <br>
            <button id="save-settings-button" type="submit">Save Settings</button>
            <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
