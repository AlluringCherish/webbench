<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <h1>Search Locations</h1>
        <form method="get" action="">
            <input id="location-search-input" name="query" type="text" value="{{ search_query }}" placeholder="Enter location name">
            <button type="submit">Search</button>
        </form>

        <div id="search-results">
            {% for result in search_results %}
                <div class="search-result" id="search-result-{{ result.location_id }}">
                    <span>{{ result.location_name }}</span>
                    <a href="{{ url_for('dashboard', location_id=result.location_id) }}">
                        <button id="select-location-button-{{ result.location_id }}" type="button">Select</button>
                    </a>
                </div>
            {% else %}
                <p>No results found.</p>
            {% endfor %}
        </div>

        <div id="saved-locations-list">
            <h2>Saved Locations</h2>
            <ul>
            {% for saved in saved_locations %}
                <li>{{ saved.location_name }}</li>
            {% else %}
                <li>No saved locations.</li>
            {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
