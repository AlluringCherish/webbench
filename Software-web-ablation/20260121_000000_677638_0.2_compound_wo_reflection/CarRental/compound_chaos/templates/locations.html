<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Pickup and Dropoff Locations</h1>

        <label for="hours-filter">Filter by Hours:</label>
        <select id="hours-filter" name="hours" onchange="location.href='?hours=' + this.value">
            <option value="" {% if filter_hours == '' %}selected{% endif %}>All Hours</option>
            <option value="24/7" {% if filter_hours == '24/7' %}selected{% endif %}>24/7</option>
            <option value="09:00-18:00" {% if filter_hours == '09:00-18:00' %}selected{% endif %}>09:00-18:00</option>
        </select>

        <label for="search-location-input">Search Locations:</label>
        <input type="text" id="search-location-input" name="search_query" value="{{ search_query }}" onkeypress="if(event.key === 'Enter'){ location.href='?search_query=' + encodeURIComponent(this.value); return false;}">

        <div id="locations-list">
            {% for location in locations %}
            <div class="location-card" id="location-{{ location.location_id }}">
                <h3>{{ location.city }}</h3>
                <p>Address: {{ location.address }}</p>
                <p>Phone: {{ location.phone }}</p>
                <p>Hours: {{ location.hours }}</p>
                <p>Available Vehicles: {{ location.available_vehicles }}</p>
                <button id="location-detail-button-{{ location.location_id }}" onclick="location.href='{{ url_for('locations_page') }}'">Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
