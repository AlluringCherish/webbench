<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <h1>My Reservations</h1>

        <button id="sort-by-date-button" onclick="location.href='{{ url_for('reservation_management') }}?sort=date'">
            {% if sorted_by_date %}Sort by Date (Currently On){% else %}Sort by Date{% endif %}
        </button>

        <div id="reservations-list">
            {% for res in reservations %}
            <div class="reservation-item" id="reservation-{{ res.reservation_id }}">
                <p>Reservation ID: {{ res.reservation_id }}</p>
                <p>Vehicle ID: {{ res.vehicle_id }}</p>
                <p>Status: {{ res.status }}</p>

                <form method="post" action="{{ url_for('reservation_management') }}">
                    <input type="hidden" name="reservation_id" value="{{ res.reservation_id }}">
                    <button type="submit" name="action" value="modify" id="modify-reservation-button-{{ res.reservation_id }}">Modify</button>
                    <button type="submit" name="action" value="cancel" id="cancel-reservation-button-{{ res.reservation_id }}" onclick="return confirm('Are you sure you want to cancel this reservation?');">Cancel</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
