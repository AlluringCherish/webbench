<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="search-page">
        <h1>Search Vehicles</h1>

        <form method="get" action="{{ url_for('vehicle_search') }}">
            <label for="location-filter">Pickup Location:</label>
            <select id="location-filter" name="location">
                <option value="">All Locations</option>
                {% for location in locations %}
                <option value="{{ location }}" {% if filters.location == location %}selected{% endif %}>{{ location }}</option>
                {% endfor %}
            </select>

            <label for="vehicle-type-filter">Vehicle Type:</label>
            <select id="vehicle-type-filter" name="vehicle_type">
                <option value="">All Types</option>
                {% for vt in vehicle_types %}
                <option value="{{ vt }}" {% if filters.vehicle_type == vt %}selected{% endif %}>{{ vt }}</option>
                {% endfor %}
            </select>

            <label for="date-range-input">Rental Date Range:</label>
            <input id="date-range-input" type="text" name="date_range" value="{{ filters.date_range|default('') }}" placeholder="YYYY-MM-DD to YYYY-MM-DD">

            <button type="submit">Filter</button>
        </form>

        <div id="vehicles-grid">
            {% for vehicle in vehicles %}
            <div class="vehicle-card" id="vehicle-{{ vehicle.vehicle_id }}">
                <h3>{{ vehicle.make }} {{ vehicle.model }}</h3>
                <p>Type: {{ vehicle.vehicle_type }}</p>
                <p>Seats: {{ vehicle.seats }}</p>
                <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="location.href='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
