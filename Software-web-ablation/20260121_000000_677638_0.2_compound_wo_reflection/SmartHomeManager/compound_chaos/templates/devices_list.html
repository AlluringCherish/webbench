<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Devices List - SmartHomeManager</title>
</head>
<body>
    <h1 id="device-list-page">Devices List</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}">Home</a> |
        <a href="{{ url_for('devices_list') }}">Devices</a> |
        <a href="{{ url_for('activity_page') }}">Activity Logs</a> |
        <a href="{{ url_for('energy_page') }}">Energy</a> |
        <a href="{{ url_for('automation_page') }}">Automation Rules</a>
    </nav>
    <section>
        <table id="device-table" border="1">
            <thead>
                <tr>
                    <th>Device ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Room</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for device in devices %}
                <tr>
                    <td><a href="{{ url_for('device_detail', device_id=device.device_id) }}">{{ device.device_id }}</a></td>
                    <td>{{ device.device_name }}</td>
                    <td>{{ device.device_type }}</td>
                    <td>{{ device.room }}</td>
                    <td>{{ device.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </section>
</body>
</html>
