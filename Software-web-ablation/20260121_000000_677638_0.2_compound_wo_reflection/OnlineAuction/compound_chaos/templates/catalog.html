<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auction Catalog</title>
</head>
<body>
    <h1>Auction Catalog</h1>
    <input type="text" id="search-input" name="search" placeholder="Search...">

    <select id="category-filter" name="category">
        <option value="">All Categories</option>
        {% for category in categories %}
        <option value="{{ category.category_id }}">{{ category.category_name }}</option>
        {% endfor %}
    </select>

    <div id="auctions-grid">
        {% for auction in auctions %}
        <div class="auction-item">
            <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
            <h3>{{ auction.item_name }}</h3>
            <p>{{ auction.description }}</p>
            <p>Category: {{ auction.category }}</p>
            <p>Current Bid: {{ auction.current_bid }}</p>
            <p>Ends: {{ auction.end_time }}</p>
            <a href="{{ url_for('auction', auction_id=auction.auction_id) }}"><button id="view-auction-button-{{ auction.auction_id }}">View Auction</button></a>
        </div>
        {% endfor %}
    </div>

</body>
</html>
