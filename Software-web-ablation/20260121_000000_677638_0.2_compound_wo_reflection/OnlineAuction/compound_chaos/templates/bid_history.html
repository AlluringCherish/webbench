<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bid History</title>
</head>
<body>
    <div id="bid-history-page">
        <h1>Bid History</h1>

        <label for="filter-by-auction">Filter by Auction:</label>
        <select id="filter-by-auction" name="auction_id">
            <option value="">All</option>
            {% for auction in auctions %}
            <option value="{{ auction.auction_id }}">{{ auction.item_name }}</option>
            {% endfor %}
        </select>

        <label for="sort-by-amount">Sort by Amount:</label>
        <select id="sort-by-amount" name="sort_by">
            <option value="asc">Ascending</option>
            <option value="desc">Descending</option>
        </select>

        <table id="bids-table">
            <thead>
                <tr>
                    <th>Bid ID</th>
                    <th>Auction</th>
                    <th>Bidder Name</th>
                    <th>Bid Amount</th>
                    <th>Bid Time</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                <tr>
                    <td>{{ bid.bid_id }}</td>
                    <td>{{ bid.auction_name }}</td>
                    <td>{{ bid.bidder_name }}</td>
                    <td>{{ bid.bid_amount }}</td>
                    <td>{{ bid.bid_timestamp }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
