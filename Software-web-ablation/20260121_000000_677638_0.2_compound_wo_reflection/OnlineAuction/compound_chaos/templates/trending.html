<!DOCTYPE html>
<html lang="en">
<head>
    <title>Trending</title>
</head>
<body>
    <h1>Trending Auctions</h1>

    <label for="status-filter">Filter Status:</label>
    <select id="status-filter" name="status">
        <option value="">All</option>
        {% for auc in trending_list %}
        <option value="{{ auc.status|default('') }}">{{ auc.status|default('') }}</option>
        {% endfor %}
    </select>

    <div id="trending-auctions">
        {% for auction in trending_list %}
        <div class="trending-auction">
            <h3>{{ auction.item_name }}</h3>
            <p>Current Bid: {{ auction.current_bid }}</p>
            <p>Bid Count: {{ auction.bid_count }}</p>
            <p>Trending Rank: {{ auction.trending_rank }}</p>
            <a href="{{ url_for('auction', auction_id=auction.auction_id) }}"><button id="view-auction-button-{{ auction.auction_id }}">View Auction</button></a>
        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
</body>
</html>
