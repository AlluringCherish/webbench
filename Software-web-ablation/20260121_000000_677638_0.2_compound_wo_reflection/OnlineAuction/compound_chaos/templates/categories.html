<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auction Categories</title>
</head>
<body>
    <div id="categories-page">
        <h1>Auction Categories</h1>

        <ul>
            {% for category in categories %}
                <li>
                    <span>{{ category.category_name }}</span>
                </li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
