<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1 id="auction-name">{{ auction_name }}</h1>
        <div id="minimum-bid">Minimum Bid: {{ minimum_bid }}</div>

        <form method="POST">
            <label for="bid-amount">Bid Amount:</label>
            <input type="number" step="0.01" id="bid-amount" name="bid_amount" required value="{{ bid_amount|default('') }}">
            {% if errors %}
                <div class="errors">
                    {% for error in errors %}
                        <p>{{ error }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <button type="submit" id="submit-bid-button">Submit Bid</button>
        </form>
    </div>
</body>
</html>
