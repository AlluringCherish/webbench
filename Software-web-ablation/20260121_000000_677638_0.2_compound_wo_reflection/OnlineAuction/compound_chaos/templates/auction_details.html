<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auction Details</title>
</head>
<body>
    <div id="auction-title">{{ auction.item_name }}</div>

    <div id="auction-description">{{ auction.description }}</div>
    <div id="auction-status">Status: {{ auction.status }}</div>

    <a href="{{ url_for('bid_history', auction_id=auction.auction_id) }}"><button id="bid-history">View Bid History</button></a>

</body>
</html>
