<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auction Status</title>
</head>
<body>
    <h1>Auction Status</h1>

    <label for="status-filter">Filter Status:</label>
    <select id="status-filter" name="status">
        <option value="">All</option>
        {% for auction in auctions %}
        <option value="{{ auction.status }}">{{ auction.status }}</option>
        {% endfor %}
    </select>

    <table id="status-table">
        <thead>
            <tr>
                <th>Auction ID</th>
                <th>Item Name</th>
                <th>Time Remaining</th>
                <th>Current Bid</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for auction in auctions %}
            <tr>
                <td>{{ auction.auction_id }}</td>
                <td>{{ auction.item_name }}</td>
                <td>{{ auction.time_remaining }}</td>
                <td>{{ auction.current_bid }}</td>
                <td>{{ auction.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
</body>
</html>
