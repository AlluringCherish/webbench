<!DOCTYPE html>
<html lang="en">
<head>
    <title>Dashboard - Auction</title>
</head>
<body>
    <h1>Auction Dashboard</h1>

    <div id="featured-auctions">
        {% for auction in featured_auctions %}
        <div class="featured-auction">
            <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
            <h2>{{ auction.item_name }}</h2>
        </div>
        {% endfor %}
    </div>

    <div id="trending-auctions">
        {% for auction in trending_auctions %}
        <div class="trending-auction">
            <h3>{{ auction.item_name }}</h3>
            <p>Current Bid: {{ auction.current_bid }}</p>
            <p>Bid Count: {{ auction.bid_count }}</p>
            <p>Trending Rank: {{ auction.trending_rank }}</p>
        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('bid_history') }}"><button id="view-bids-button">View Bids</button></a>

</body>
</html>
