<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - Content Publishing Hub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>

        <nav>
            <a href="{{ url_for('dashboard.get_dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
        </nav>

        <form method="post" action="{{ url_for('articles.edit_article', article_id=article.id) }}" id="edit-article-form">
            <div>
                <label for="article-title">Title:</label>
                <input type="text" id="article-title" name="title" value="{{ article.title }}" required />
            </div>
            <div>
                <label for="article-content">Content:</label>
                <textarea id="article-content" name="content" rows="10" required>{{ article.content }}</textarea>
            </div>
            <div>
                <label for="article-category">Category:</label>
                <input type="text" id="article-category" name="category" value="{{ article.category }}" />
            </div>
            <div>
                <label for="article-tags">Tags (comma separated):</label>
                <input type="text" id="article-tags" name="tags" value="{{ article.tags|join(', ') if article.tags else '' }}" />
            </div>
            <div>
                <label for="article-featured-image">Featured Image URL:</label>
                <input type="url" id="article-featured-image" name="featured_image" value="{{ article.featured_image }}" />
            </div>
            <div>
                <label for="article-meta-description">Meta Description:</label>
                <textarea id="article-meta-description" name="meta_description" rows="3">{{ article.meta_description }}</textarea>
            </div>
            <div>
                <button type="submit" id="btn-update-article">Update Article</button>
            </div>
        </form>
    </div>
</body>
</html>
