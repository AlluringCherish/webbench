<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - Content Publishing Hub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Analytics for {{ article.title }}</h1>

        <nav>
            <a href="{{ url_for('dashboard.get_dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a> |
            <a href="{{ url_for('articles.edit_article', article_id=article.id) }}" id="btn-edit-article">Edit Article</a>
        </nav>

        <section id="analytics-metrics">
            <h2>Metrics</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Views</th>
                        <th>Shares</th>
                        <th>Unique Visitors</th>
                    </tr>
                </thead>
                <tbody>
                    {% for metric in metrics %}
                    <tr>
                        <td>{{ metric.date }}</td>
                        <td>{{ metric.views }}</td>
                        <td>{{ metric.shares }}</td>
                        <td>{{ metric.unique_visitors }}</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="4">No metrics available.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
