<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - Content Publishing Hub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>

        <nav>
            <a href="{{ url_for('dashboard.get_dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a> |
            <a href="{{ url_for('articles.create_article') }}" id="btn-create-article">Create Article</a>
        </nav>

        <section id="my-articles-list">
            <ul>
                {% for article in articles %}
                <li>
                    <h3>{{ article.title }}</h3>
                    <p>Status: {{ article.status }}</p>
                    <p>Publish Date: {{ article.publish_date }}</p>
                    <a href="{{ url_for('articles.edit_article', article_id=article.id) }}" id="edit-article-{{ article.id }}">Edit</a> |
                    <a href="{{ url_for('articles.get_article_versions', article_id=article.id) }}" id="versions-article-{{ article.id }}">Versions</a>
                </li>
                {% else %}
                <li>No articles found.</li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
