<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - Content Publishing Hub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>

        <nav>
            <a href="{{ url_for('dashboard.get_dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
            |
            <a href="{{ url_for('article.create_article') }}" id="btn-create-article">Create Article</a>
        </nav>

        <section id="calendar-view">
            <!-- Placeholder for calendar UI -->
            {% if calendar_entries %}
            <ul>
                {% for entry in calendar_entries %}
                <li>{{ entry.date }}: {{ entry.title }} (Status: {{ entry.status }})</li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No scheduled articles.</p>
            {% endif %}
        </section>
    </div>
</body>
</html>
