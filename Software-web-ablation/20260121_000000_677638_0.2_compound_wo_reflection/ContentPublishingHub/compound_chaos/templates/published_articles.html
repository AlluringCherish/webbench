<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles - Content Publishing Hub</title>
</head>
<body>
    <div id="published-articles-page">
        <h1>Published Articles</h1>

        <nav>
            <a href="{{ url_for('dashboard.get_dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
        </nav>

        <section id="published-articles-list">
            <ul>
                {% for article in articles %}
                <li>
                    <h3>{{ article.title }}</h3>
                    <p>Publish Date: {{ article.publish_date }}</p>
                    <p>Author: {{ article.author }}</p>
                    <a href="{{ url_for('articles.get_article_versions', article_id=article.id) }}" id="versions-article-{{ article.id }}">Versions</a>
                    <a href="{{ url_for('analytics.get_article_analytics', article_id=article.id) }}" id="analytics-article-{{ article.id }}">Analytics</a>
                </li>
                {% else %}
                <li>No published articles found.</li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
