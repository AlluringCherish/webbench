<!DOCTYPE html>
<html>
<head>
    <title>Select Showtime</title>
</head>
<body>
    <h1 id="select-showtime-title">Select Showtime</h1>
    <div id="theater-location-filter">
        <select id="selected_theater_filter" name="selected_theater_filter">
            {% for theater in theaters %}
            <option value="{{ theater.theater_id }}">{{ theater.theater_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="showtimes-list">
        {% for showtime in showtimes %}
        <div id="showtime-{{ showtime.showtime_id }}">
            <span>{{ showtime.date }} {{ showtime.time }} - ${{ showtime.price }}</span>
            <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Select</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
