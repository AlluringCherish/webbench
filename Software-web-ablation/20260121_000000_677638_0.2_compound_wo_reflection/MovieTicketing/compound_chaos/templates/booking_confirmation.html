<!DOCTYPE html>
<html>
<head>
    <title>Booking Confirmation</title>
</head>
<body>
    <h1 id="booking-confirmation-title">Booking Confirmation</h1>
    <div id="confirmation-details">
        <p id="confirmation-customer-name">Customer: {{ booking.customer_name }}</p>
        <p id="confirmation-booking-date">Date: {{ booking.booking_date }}</p>
        <p id="confirmation-price">Price: ${{ booking.price }}</p>
        <p id="confirmation-status">Status: {{ booking.status }}</p>
        <p id="confirmation-seats">Seats: {{ booking.seats }}</p>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    <button id="view-booking-button-{{ booking.booking_id }}" onclick="location.href='{{ url_for('booking_details', booking_id=booking.booking_id) }}'">View Booking</button>
</body>
</html>
