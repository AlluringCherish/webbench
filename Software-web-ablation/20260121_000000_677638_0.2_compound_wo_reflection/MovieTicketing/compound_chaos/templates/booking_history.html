<!DOCTYPE html>
<html>
<head>
    <title>Booking History</title>
</head>
<body>
    <h1 id="booking-history-title">Booking History</h1>
    <table id="booking-history-table">
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Email</th>
                <th>Booking Date</th>
                <th>Price</th>
                <th>Status</th>
                <th>Seats</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for booking in bookings %}
            <tr id="booking-row-{{ booking.booking_id }}">
                <td id="customer-name-{{ booking.booking_id }}">{{ booking.customer_name }}</td>
                <td id="customer-email-{{ booking.booking_id }}">{{ booking.customer_email }}</td>
                <td id="booking-date-{{ booking.booking_id }}">{{ booking.booking_date }}</td>
                <td id="booking-price-{{ booking.booking_id }}">{{ booking.price }}</td>
                <td id="booking-status-{{ booking.booking_id }}">{{ booking.status }}</td>
                <td id="selected-seats-{{ booking.booking_id }}">{{ booking.seats }}</td>
                <td>
                    <button id="view-booking-button-{{ booking.booking_id }}" onclick="location.href='{{ url_for('booking_details', booking_id=booking.booking_id) }}'">View</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
