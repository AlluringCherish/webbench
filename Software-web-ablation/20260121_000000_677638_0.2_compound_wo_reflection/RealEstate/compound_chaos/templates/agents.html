<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <form method="post" action="{{ url_for('search_agents') }}">
            <label for="agent-search">Search Agents:</label>
            <input type="text" id="agent-search" name="agent_search">
            <button type="submit">Search</button>
        </form>

        <ul id="agents-list">
            {% for agent in agents %}
            <li>
                <p>{{ agent.agent_name }} - {{ agent.specialization }}</p>
                <p>Email: {{ agent.email }}, Phone: {{ agent.phone }}</p>
                <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
            </li>
            {% else %}
                <li>No agents found.</li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
