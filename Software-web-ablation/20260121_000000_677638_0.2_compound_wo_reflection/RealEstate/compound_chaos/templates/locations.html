<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Featured Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Featured Locations</h1>

        <form method="post" action="{{ url_for('sort_locations') }}">
            <label for="location-sort">Sort By:</label>
            <select id="location-sort" name="location_sort">
                <option value="By Name">By Name</option>
                <option value="By Properties Count">By Properties Count</option>
                <option value="By Average Price">By Average Price</option>
            </select>
            <button type="submit">Sort</button>
        </form>

        <ul id="locations-list">
            {% for location in locations %}
            <li>
                <p>{{ location.location_name }} - Region: {{ location.region }} - Avg Price: ${{ location.average_price }} - Properties: {{ location.property_count }}</p>
                <a href="#">
                    <button id="view-location-button-{{ location.location_id }}">View Location</button>
                </a>
            </li>
            {% else %}
                <li>No locations found.</li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
