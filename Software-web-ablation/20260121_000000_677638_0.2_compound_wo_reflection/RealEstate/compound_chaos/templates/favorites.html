<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>
        <ul id="favorites-list">
            {% for property in favorite_properties %}
            <li>
                <p>{{ property.address }} - ${{ property.price }}</p>
                <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View Details</button>
                </a>
                <form method="post" action="{{ url_for('remove_from_favorites', property_id=property.property_id) }}" style="display:inline;">
                    <button type="submit" id="remove-from-favorites-button-{{ property.property_id }}">Remove from Favorites</button>
                </form>
            </li>
            {% else %}
                <li>No favorite properties found.</li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
