<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="event-details-page">
        <h1 id="event-title">{{ event.event_name }}</h1>
        <div id="event-location">{{ event.location }}</div>
        <div id="event-description">{{ event.description }}</div>
        <form method="POST" action="{{ url_for('event_details', event_id=event.event_id) }}">
            <button type="submit" id="book-ticket-button">Book Ticket</button>
        </form>
        <button onclick="window.location.href='{{ url_for('events') }}'">Back to Events</button>
    </div>
</body>
</html>
