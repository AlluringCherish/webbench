<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="ticket-page">
        <h1>{{ page_title }}</h1>
        <form method="POST" action="{{ url_for('tickets') }}">
            <label for="ticket-type-select">Ticket Type:</label>
            <select id="ticket-type-select" name="ticket_type">
                {% for ticket_type in ticket_types %}
                    <option value="{{ ticket_type }}" {% if ticket_type == selected_ticket_type %}selected{% endif %}>{{ ticket_type }}</option>
                {% endfor %}
            </select>
            <label for="ticket-quantity-input">Quantity:</label>
            <input type="number" id="ticket-quantity-input" name="ticket_quantity" min="1" value="{{ ticket_quantity or 1 }}" />
            <button type="submit">Book</button>
        </form>
        <div id="confirmation-details">
            {% if confirmation %}
                <p>Booking Confirmed for {{ confirmation.event_name }}.</p>
                <p>Tickets: {{ confirmation.quantity }}</p>
                <p>Total Price: ${{ confirmation.total_price }}</p>
            {% else %}
                <p>No booking confirmed yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
