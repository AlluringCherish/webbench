<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>

        <div id="confirmation-number">Confirmation Number: {{ booking.confirmation_number }}</div>
        <div id="booking-details">
            <p>Booking Date: {{ booking.booking_date }}</p>
            <p>Amount: ${{ "%.2f"|format(booking.amount) }}</p>
            <p>Details: {{ booking.details }}</p>
        </div>

        <button id="download-itinerary-button" onclick="alert('Download itinerary feature coming soon!')">Download Itinerary</button>
        <button id="share-trip-button" onclick="alert('Share trip feature coming soon!')">Share Trip</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
