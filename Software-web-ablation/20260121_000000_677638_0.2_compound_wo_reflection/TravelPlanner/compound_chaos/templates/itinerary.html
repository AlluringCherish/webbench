<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
    <div id="itinerary-page">
        <h1>Plan Your Itinerary</h1>

        <label for="itinerary-name-input">Itinerary Name:</label>
        <input id="itinerary-name-input" name="itinerary_name" type="text" />

        <label for="start-date-input">Start Date:</label>
        <input id="start-date-input" name="start_date" type="date" />

        <label for="end-date-input">End Date:</label>
        <input id="end-date-input" name="end_date" type="date" />

        <button id="add-activity-button">Add Activity</button>

        <div id="itinerary-list">
            {% for itinerary in itineraries %}
            <div class="itinerary-item">
                <h3>{{ itinerary.itinerary_name }}</h3>
                <p>Start Date: {{ itinerary.start_date }}</p>
                <p>End Date: {{ itinerary.end_date }}</p>
                <p>Status: {{ itinerary.status }}</p>
            </div>
            {% else %}
            <p>No itineraries available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
