<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>

        <label for="duration-filter">Filter by Duration:</label>
        <select id="duration-filter" name="selected_duration_filter">
            <option value="">All</option>
            <option value="1-3 days" {% if selected_duration_filter == '1-3 days' %}selected{% endif %}>1-3 days</option>
            <option value="3-5 days" {% if selected_duration_filter == '3-5 days' %}selected{% endif %}>3-5 days</option>
            <option value="6-10 days" {% if selected_duration_filter == '6-10 days' %}selected{% endif %}>6-10 days</option>
        </select>

        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-card">
                <h3>{{ pkg.package_name }}</h3>
                <p>Destination: {{ pkg.destination }}</p>
                <p>Duration: {{ pkg.duration_days }} days</p>
                <p>Price: ${{ "%.2f"|format(pkg.price) }}</p>
                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_details_page', pkg_id=pkg.package_id) }}'">View Details</button>
                <button id="book-package-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('book_package', pkg_id=pkg.package_id) }}'">Book Package</button>
            </div>
            {% else %}
            <p>No travel packages available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
