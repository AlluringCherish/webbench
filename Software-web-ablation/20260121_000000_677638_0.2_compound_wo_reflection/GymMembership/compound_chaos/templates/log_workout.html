<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
</head>
<body>
    <div id="log-workout-page">
        <h1>Log Workout</h1>
        <form method="POST" action="{{ url_for('submit_workout') }}">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout_type" required>
                <option value="Cardio">Cardio</option>
                <option value="Strength">Strength</option>
                <option value="Flexibility">Flexibility</option>
                <option value="Sports">Sports</option>
            </select>

            <label for="workout-duration">Duration (minutes):</label>
            <input type="number" id="workout-duration" name="workout_duration" min="1" required>

            <label for="calories-burned">Calories Burned:</label>
            <input type="number" id="calories-burned" name="calories_burned" min="0" required>

            <label for="workout-notes">Notes:</label>
            <textarea id="workout-notes" name="workout_notes"></textarea>

            <button type="submit" id="submit-workout-button">Submit</button>
        </form>
    </div>
</body>
</html>
