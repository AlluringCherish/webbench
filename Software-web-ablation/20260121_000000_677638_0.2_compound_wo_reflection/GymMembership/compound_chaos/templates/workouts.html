<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Workout Records</title>
</head>
<body>
    <div id="workouts-page">
        <h1>My Workout Records</h1>

        <label for="filter-by-type">Filter by Type:</label>
        <select id="filter-by-type" name="filter-by-type">
            <!-- Options can be added as needed -->
        </select>

        <table id="workouts-table">
            <thead>
                <tr>
                    <th>Date</th><th>Type</th><th>Duration (min)</th><th>Calories Burned</th><th>Notes</th>
                </tr>
            </thead>
            <tbody>
            {% for w in workouts %}
                <tr>
                    <td>{{ w.workout_date }}</td>
                    <td>{{ w.workout_type }}</td>
                    <td>{{ w.duration_minutes }}</td>
                    <td>{{ w.calories_burned }}</td>
                    <td>{{ w.notes }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('log_workout') }}">
            <button id="log-workout-button">Log Workout</button>
        </a>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
