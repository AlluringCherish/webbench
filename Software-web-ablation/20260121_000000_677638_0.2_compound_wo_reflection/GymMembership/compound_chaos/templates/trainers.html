<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <h1>Trainer Profiles</h1>
        <label for="trainer-search">Search Trainers:</label>
        <input type="text" id="trainer-search" name="trainer-search" placeholder="Search by name or specialty">

        <label for="specialty-filter">Filter by Specialty:</label>
        <select id="specialty-filter" name="specialty-filter">
            <!-- Specialty options could be dynamically generated -->
        </select>

        <div id="trainers-grid">
            {% for trainer in trainers %}
            <div id="trainer-card-{{ trainer.trainer_id }}">
                <h3>{{ trainer.name }}</h3>
                <p>Specialty: {{ trainer.specialty }}</p>
                <a href="{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}">
                    <button id="view-trainer-button-{{ trainer.trainer_id }}">View Profile</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
