<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">
            <p>{{ trainer.bio }}</p>
            <p>Experience: {{ trainer.experience_years }} years</p>
        </div>
        <div id="trainer-certifications">
            <h2>Certifications</h2>
            <p>{{ trainer.certifications }}</p>
        </div>

        <a href="{{ url_for('pt_booking', trainer_id=trainer.trainer_id) }}">
            <button id="book-session-button">Book a Session</button>
        </a>

        <div id="trainer-reviews">
            <h2>Reviews</h2>
            <!-- Reviews content could go here -->
        </div>
    </div>
</body>
</html>
