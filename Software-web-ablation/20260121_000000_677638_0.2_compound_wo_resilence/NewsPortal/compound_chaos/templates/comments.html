<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Comments</title>
</head>
<body>
    <div id="comments-page">
        <div id="comments-list">
            {% for comment in comments %}
            <div class="comment-entry" id="comment-{{ comment.comment_id }}">
                <p><strong>{{ comment.commenter_name }}</strong></p>
                <p>{{ comment.content }}</p>
            </div>
            {% endfor %}
        </div>
        <select id="comment-article-filter" name="selected_article_id">
            <option value="">Select Article</option>
            {% for article in articles %}
            <option value="{{ article.article_id }}" {% if article.article_id == selected_article_id %}selected{% endif %}>{{ article.title }}</option>
            {% endfor %}
        </select>
        <button id="write-comment-button" onclick="location.href='{{ url_for('write_comment') }}'">Write Comment</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
