<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>
        <div id="category-articles">
            {% for article in articles %}
            <div class="category-article-entry">
                <h3>{{ article.title }}</h3>
                <p>Date: {{ article.date }}</p>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>
        <button id="sort-by-date" onclick="location.href='{{ url_for('category_articles', category_name=category_name, sort='date') }}'">Sort by Date</button>
        <button id="sort-by-popularity" onclick="location.href='{{ url_for('category_articles', category_name=category_name, sort='popularity') }}'">Sort by Popularity</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
