<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
</head>
<body>
    <div id="article-page">
        <h1 id="article-title">{{ article.title }}</h1>
        <p id="article-author">Author: {{ article.author }}</p>
        <p id="article-date">Date: {{ article.date }}</p>
        <button id="bookmark-button" onclick="location.href='{{ url_for('bookmark_article', article_id=article.article_id) }}'">
            {% if is_bookmarked %}Remove Bookmark{% else %}Bookmark{% endif %}
        </button>
        <div id="article-content">
            {{ article.content }}
        </div>
    </div>
</body>
</html>
