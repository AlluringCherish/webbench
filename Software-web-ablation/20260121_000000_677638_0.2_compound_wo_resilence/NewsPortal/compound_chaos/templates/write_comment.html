<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Comment</title>
</head>
<body>
    <div id="write-comment-page">
        <h1>Write Comment</h1>
        <form id="write-comment-form" method="POST" action="{{ url_for('submit_comment') }}">
            <label for="article-select">Select Article:</label>
            <select id="article-select" name="article_id">
                {% for article in articles %}
                <option value="{{ article.article_id }}">{{ article.title }}</option>
                {% endfor %}
            </select>
            <label for="commenter-name">Your Name:</label>
            <input type="text" id="commenter-name" name="commenter_name" required>
            <label for="comment-content">Comment:</label>
            <textarea id="comment-content" name="content" required></textarea>
            <button type="submit" id="submit-comment-button">Submit Comment</button>
        </form>
    </div>
</body>
</html>
