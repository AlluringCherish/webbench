<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <form id="search-form" method="GET" action="{{ url_for('article_catalog') }}">
            <input type="text" id="search-author" name="search_author" placeholder="Search by author" value="{{ search_query or '' }}">
            <select id="category-filter" name="selected_category">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category['category_name'] }}" {% if category['category_name'] == selected_category %}selected{% endif %}>{{ category['category_name'] }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="search-button">Search</button>
        </form>
        <div id="articles-grid">
            {% for article in articles %}
            <div class="article-card">
                <h3>{{ article.title }}</h3>
                <p>Author: {{ article.author }}</p>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
