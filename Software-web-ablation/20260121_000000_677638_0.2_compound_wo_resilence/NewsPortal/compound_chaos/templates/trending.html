<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trending Articles</title>
</head>
<body>
    <div id="trending-page">
        <h1>Articles</h1>
        <div id="trending-list">
            {% for item in trending_list %}
            <div class="trending-entry">
                <p>Rank: {{ item.rank }}</p>
                <p>Title: {{ item.title }}</p>
                <p>Views: {{ item.views }}</p>
                <p>Period: {{ item.period }}</p>
                <button id="view-article-button-{{ item.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=item.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
