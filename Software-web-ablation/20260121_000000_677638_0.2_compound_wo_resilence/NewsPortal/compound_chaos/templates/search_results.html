<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Results</h1>
        <div id="search-results">
            {% if articles %}
                {% for article in articles %}
                <div class="search-result-entry">
                    <h3>{{ article.title }}</h3>
                    <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
                </div>
                {% endfor %}
            {% else %}
                <p>No results found for "{{ search_query }}".</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
