<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <h1>Booking Confirmation</h1>
    <div id="booking-details">
        <p><strong>Customer Name:</strong> {{ booking.customer_name }}</p>
        <p><strong>Customer Email:</strong> {{ booking.customer_email }}</p>
        <p><strong>Showtime:</strong> {{ booking.showtime_date }} {{ booking.showtime_time }}</p>
        <p><strong>Total Price:</strong> ${{ booking.total_price }}</p>
        <p><strong>Seats Booked:</strong> {{ booking.seats_booked }}</p>
        <p><strong>Status:</strong> {{ booking.status }}</p>
    </div>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
