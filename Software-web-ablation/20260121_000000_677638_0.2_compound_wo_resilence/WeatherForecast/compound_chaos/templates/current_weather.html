<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <div id="current-weather-container">
        <h1>Current Weather for {{ location.city_name }}, {{ location.country }}</h1>
        <p id="temperature">Temperature: {{ weather.temperature }} °C</p>
        <p id="humidity">Humidity: {{ weather.humidity }}%</p>
        <p id="wind-speed">Wind Speed: {{ weather.wind_speed }} km/h</p>
        <p id="weather-condition">Condition: {{ weather.condition }}</p>
        <a href="{{ url_for('forecast', location_id=location.location_id) }}">
            <button id="view-forecast-button">View Forecast</button>
        </a>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard-button">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
