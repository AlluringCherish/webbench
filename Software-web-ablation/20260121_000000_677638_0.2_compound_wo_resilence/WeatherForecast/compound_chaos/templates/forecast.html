<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Forecast</title>
</head>
<body>
    <div id="forecast-container">
        <h1>Weather Forecast for {{ location.city_name }}, {{ location.country }}</h1>
        <ul id="forecast-list">
            {% for forecast in forecasts %}
            <li id="forecast-{{ forecast.date }}">
                <p>Date: {{ forecast.date }}</p>
                <p>High: {{ forecast.high }} °C</p>
                <p>Low: {{ forecast.low }} °C</p>
                <p>Condition: {{ forecast.condition }}</p>
            </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('current_weather', location_id=location.location_id) }}">
            <button id="back-to-current-weather-button">Back to Current Weather</button>
        </a>
    </div>
</body>
</html>
