<!DOCTYPE html>
<html lang="en">
<head>
    <title>Enrollments</title>
</head>
<body>
<h1>Enrollments</h1>
<a href="{{ url_for('enroll') }}">Enroll Student</a>
<ul>
{% for enrollment in enrollments %}
<li>{{ enrollment.student_name }} - {{ enrollment.course_title }}</li>
{% else %}
<li>No enrollments found.</li>
{% endfor %}
</ul>
<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
