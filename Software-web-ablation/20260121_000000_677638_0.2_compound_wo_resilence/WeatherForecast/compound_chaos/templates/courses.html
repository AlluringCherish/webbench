<!DOCTYPE html>
<html lang="en">
<head>
    <title>Courses</title>
</head>
<body>
<h1>Courses</h1>
<a href="{{ url_for('add_course') }}">Add Course</a>
<ul>
{% for course in courses %}
<li>{{ course.title }} - {{ course.description }}</li>
{% else %}
<li>No courses found.</li>
{% endfor %}
</ul>
<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
