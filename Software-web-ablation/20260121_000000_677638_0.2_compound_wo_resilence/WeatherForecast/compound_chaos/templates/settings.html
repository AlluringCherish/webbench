<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-container">
        <h1>Settings</h1>
        <form method="POST" action="{{ url_for('settings') }}">
            <label for="unit-select">Units:</label>
            <select id="unit-select" name="unit">
                <option value="metric" {% if settings.unit == 'metric' %}selected{% endif %}>Metric (°C, km/h)</option>
                <option value="imperial" {% if settings.unit == 'imperial' %}selected{% endif %}>Imperial (°F, mph)</option>
            </select>
            <button type="submit" id="save-settings-button">Save Settings</button>
        </form>
        <a href="{{ url_for('dashboard') }}">
            <button id="cancel-settings-button">Cancel</button>
        </a>
    </div>
</body>
</html>
