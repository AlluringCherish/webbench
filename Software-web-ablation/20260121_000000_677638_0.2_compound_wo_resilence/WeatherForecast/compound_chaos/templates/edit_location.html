<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Location</title>
</head>
<body>
    <div id="edit-location-container">
        <h1>Edit Location</h1>
        <form method="POST" action="{{ url_for('edit_location', location_id=location.location_id) }}">
            <label for="edit_city_name">City Name:</label>
            <input type="text" id="edit_city_name" name="city_name" value="{{ location.city_name }}" required>
            <label for="edit_country">Country:</label>
            <input type="text" id="edit_country" name="country" value="{{ location.country }}" required>
            <button type="submit" id="submit-edit-location">Save Changes</button>
        </form>
        <a href="{{ url_for('dashboard') }}">
            <button id="cancel-edit-location">Cancel</button>
        </a>
    </div>
</body>
</html>
