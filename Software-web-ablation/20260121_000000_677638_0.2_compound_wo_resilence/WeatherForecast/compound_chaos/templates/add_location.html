<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Location</title>
</head>
<body>
    <div id="add-location-container">
        <h1>Add Location</h1>
        <form method="POST" action="{{ url_for('add_location') }}">
            <label for="input_city_name">City Name:</label>
            <input type="text" id="input_city_name" name="city_name" required>
            <label for="input_country">Country:</label>
            <input type="text" id="input_country" name="country" required>
            <button type="submit" id="submit-add-location">Add Location</button>
        </form>
        <a href="{{ url_for('dashboard') }}">
            <button id="cancel-add-location">Cancel</button>
        </a>
    </div>
</body>
</html>
