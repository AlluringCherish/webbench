<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ Page }}</title>
</head>
<body>
    <h1>{{ Page }}</h1>

    <div id="auctions-list">
        {% for auction in auctions %}
        <div class="auction-item" id="auction-{{ auction.auction_id }}">
            <h2>{{ auction.item_name }}</h2>
            <div>Status: {{ auction.status }}</div>
            <div>Time Remaining: {{ auction.time_remaining }}</div>
            <div>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</div>
            <a id="view-auction-button-{{ auction.auction_id }}" href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                <button>View Auction</button>
            </a>
        </div>
        {% endfor %}
    </div>

    <div>
        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
