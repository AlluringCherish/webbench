<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="GET" action="{{ url_for('catalog') }}">
            <input type="text" id="search-input" name="search" placeholder="Search by title, author, or ISBN" value="{{ request.args.get('search', '') }}">
            <select id="category-filter" name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category.category_name }}" {% if request.args.get('category') == category.category_name %}selected{% endif %}>
                    {{ category.category_name }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
            <button type="button" onclick="window.location='{{ url_for('catalog') }}';">Clear</button>
        </form>

        <div id="books-grid">
            {% for book in books %}
            <div class="book-card">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>Category: {{ book.category }}</p>
                <p>ISBN: {{ book.isbn }}</p>
                <p>Price: ${{ "%.2f"|format(book.price) }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
