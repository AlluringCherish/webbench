<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
    <div id="bestsellers-page">
        <h1>Bestsellers</h1>

        <label for="time-period-filter">Filter by Time Period:</label>
        <select id="time-period-filter" name="time_period_filter" onchange="window.location.href='{{ url_for('bestsellers') }}?time_period_filter=' + this.value">
            <option value="This Week" {% if time_period_filter == 'This Week' %}selected{% endif %}>This Week</option>
            <option value="This Month" {% if time_period_filter == 'This Month' %}selected{% endif %}>This Month</option>
            <option value="All Time" {% if time_period_filter == 'All Time' %}selected{% endif %}>All Time</option>
        </select>

        <div id="bestsellers-list">
            <ol>
                {% for book in bestsellers %}
                <li>
                    Rank {{ book.rank }}: {{ book.title }} by {{ book.author }} (Sales: {{ book.sales_count }})
                    <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
                </li>
                {% endfor %}
            </ol>
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
