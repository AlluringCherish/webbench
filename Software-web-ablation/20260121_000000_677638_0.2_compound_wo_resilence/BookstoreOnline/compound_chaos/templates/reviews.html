<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Customer Reviews</h1>

        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating_filter" onchange="window.location.href='{{ url_for('reviews') }}?rating_filter=' + this.value">
            <option value="All" {% if rating_filter == 'All' %}selected{% endif %}>All</option>
            <option value="5" {% if rating_filter == '5' %}selected{% endif %}>5 stars</option>
            <option value="4" {% if rating_filter == '4' %}selected{% endif %}>4 stars</option>
            <option value="3" {% if rating_filter == '3' %}selected{% endif %}>3 stars</option>
            <option value="2" {% if rating_filter == '2' %}selected{% endif %}>2 stars</option>
            <option value="1" {% if rating_filter == '1' %}selected{% endif %}>1 star</option>
        </select>

        <div id="reviews-list">
            {% if reviews %}
            <ul>
                {% for review in reviews %}
                <li>
                    <strong>{{ review.book_title }}</strong> - Rating: {{ review.rating }}/5<br>
                    {{ review.review_text }}<br>
                    <em>by {{ review.customer_name }} on {{ review.review_date }}</em>
                </li>
                {% endfor %}
            </ul>
            {% else %}
                <p>No reviews available.</p>
            {% endif %}
        </div>

        <button id="write-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write a Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
