<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <h1>My Reservations</h1>
        <table id="reservations-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Reservation Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.title }}</td>
                    <td>{{ reservation.reservation_date }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        {% if reservation.status == 'Active' %}
                        <form method="POST" action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}" style="display:inline;">
                            <button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="submit">Cancel Reservation</button>
                        </form>
                        {% else %}
                            N/A
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
