<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <h1>Payment Confirmation</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul class="flashes">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}
        <div id="fine-amount-display">Amount Due: ${{ "{0:.2f}".format(fine.amount) }}</div>
        <form method="POST" action="{{ url_for('payment_confirmation_page', fine_id=fine.fine_id) }}">
            <button id="confirm-payment-button" type="submit">Confirm Payment</button>
        </form>
        <button id="back-to-profile" onclick="window.location.href='{{ url_for('user_profile_page') }}'">Back to Profile</button>
    </div>
</body>
</html>
