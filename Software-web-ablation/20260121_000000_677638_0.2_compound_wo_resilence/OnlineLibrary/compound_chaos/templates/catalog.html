<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>
        <input type="text" id="search-input" placeholder="Search books..." />
        <div id="book-grid">
            {% for book in books %}
            <div class="book-card">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>Status: {{ book.status }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
