<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        <h1>Borrow Confirmation</h1>
        <div id="borrow-book-info">
            <p>Title: {{ book.title }}</p>
            <p>Author: {{ book.author }}</p>
        </div>
        <div id="due-date-display">
            <p>Due Date: {{ due_date }}</p>
        </div>
        <form method="POST" action="{{ url_for('process_borrow_request', book_id=book.book_id) }}">
            <button id="confirm-borrow-button" type="submit">Confirm Borrow</button>
        </form>
        <button id="cancel-borrow-button" onclick="window.location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">Cancel</button>
    </div>
</body>
</html>
