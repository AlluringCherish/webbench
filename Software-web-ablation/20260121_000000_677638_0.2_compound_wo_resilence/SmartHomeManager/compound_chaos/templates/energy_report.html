<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
    <div id="energy-page">
        <h1>Energy Report</h1>
        <div id="energy-summary">
            <p>Total Consumption: {{ summary.total_consumption }} kWh</p>
            <p>Estimated Cost: ${{ summary.cost_estimate }}</p>
        </div>
        <form method="POST" action="{{ url_for('energy_report_page') }}">
            <label for="date-filter">Filter Date:</label>
            <input type="date" id="date-filter" name="filter_date" value="{{ filter_date if filter_date is defined else '' }}">
            <button type="submit" id="apply-filter-button">Apply Filter</button>
        </form>
        <table id="energy-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Device</th>
                    <th>kWh</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in energy_data %}
                <tr>
                    <td>{{ entry.date }}</td>
                    <td>{{ entry.device_name }}</td>
                    <td>{{ entry.consumption_kwh }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
