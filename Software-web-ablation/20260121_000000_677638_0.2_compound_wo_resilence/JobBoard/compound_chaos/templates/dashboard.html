<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Dashboard</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}"><button id="dashboard-button">Dashboard</button></a>
        <a href="{{ url_for('application_tracking') }}"><button id="applications-button">Applications</button></a>
        <a href="{{ url_for('profile') }}"><button id="profile-button">Profile</button></a>
    </nav>
    <h1 id="dashboard-title">Job Dashboard</h1>
    <div id="job-listings">
        {% for job in jobs %}
        <div id="job-{{ job.job_id }}" class="job-listing">
            <h2 id="job-title-{{ job.job_id }}">{{ job.company_name }}</h2>
            <p id="location-{{ job.job_id }}">Location: {{ job.location }}</p>
            <p id="salary-{{ job.job_id }}">Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
            <a href="{{ url_for('job_details', job_id=job.job_id) }}" id="job-details-link-{{ job.job_id }}">View Details</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
