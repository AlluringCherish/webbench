<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}"><button id="dashboard-button">Dashboard</button></a>
        <a href="{{ url_for('application_tracking') }}"><button id="applications-button">Applications</button></a>
        <a href="{{ url_for('profile') }}"><button id="profile-button">Profile</button></a>
    </nav>
    <h1 id="profile-title">Profile</h1>
    <div id="profile-info">
        <p id="profile-name">{{ user.name }}</p>
        <p id="profile-email">{{ user.email }}</p>
        <button id="edit-profile-button">Edit Profile</button>
    </div>
</body>
</html>
