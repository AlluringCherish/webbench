<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Article</title>
</head>
<body>
<h1 id="new-article-title">Create New Article</h1>
{% if error %}
<p id="error-message" style="color:red;">{{ error }}</p>
{% endif %}
<form method="post" id="new-article-form">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" required>
    <br>
    <label for="content">Content:</label>
    <textarea id="content" name="content" required></textarea>
    <br>
    <button type="submit" id="submit-new-article">Create Article</button>
</form>
<nav>
    <a id="link-back-articles" href="{{ url_for('list_articles') }}">Back to Articles</a>
</nav>
</body>
</html>
