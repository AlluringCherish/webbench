<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
</head>
<body>
<h1 id="edit-article-title">Edit Article</h1>
{% if error %}
<p id="error-message" style="color: red;">{{ error }}</p>
{% endif %}
<form method="post" id="edit-article-form">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" value="{{ article.title }}" required>
    <br>
    <label for="content">Content:</label>
    <textarea id="content" name="content" required>{{ article.content }}</textarea>
    <br>
    <button type="submit" id="submit-edit-article">Save Changes</button>
</form>
<nav>
    <a id="link-back-articles" href="{{ url_for('list_articles') }}">Back to Articles</a>
</nav>
</body>
</html>
