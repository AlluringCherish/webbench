<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <h1>My Reviews</h1>
    <div id="my-reviews">
        {% if reviews %}
            {% for review in reviews %}
            <div class="review-card">
                <h3>{{ review.dish_name }} ({{ review.rating }}/5)</h3>
                <p>{{ review.review_text }}</p>
                <p><em>{{ review.review_date }}</em></p>
                <button onclick="location.href='{{ url_for('write_review', dish_id=review.dish_id) }}'">Edit</button>
            </div>
            {% endfor %}
        {% else %}
            <p>You have not written any reviews yet.</p>
        {% endif %}

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
