<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review for {{ dish.name }}</title>
</head>
<body>
    <h1>Write Review for {{ dish.name }}</h1>
    <form method="post" action="{{ url_for('write_review', dish_id=dish.dish_id) }}">
        <label for="rating-input">Rating (1-5):</label>
        <input type="number" id="rating-input" name="rating" min="1" max="5" step="0.1" value="{{ review.rating if review else '' }}" required><br>

        <label for="review-text">Review Text:</label><br>
        <textarea id="review-text" name="review_text" rows="5" cols="40" required>{{ review.review_text if review else '' }}</textarea><br>

        <button id="submit-review-button" type="submit">Submit Review</button>
        <button id="back-to-reviews" type="button" onclick="location.href='{{ url_for('my_reviews') }}'">Cancel</button>
    </form>
</body>
</html>
