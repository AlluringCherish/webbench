<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="song-details-main">
        <h1 id="song-details-title">{{ song.title }}</h1>
        <p>Artist: <a href="/artists/{{ song.artist_id }}" id="song-details-artist-link">{{ song.artist_name }}</a></p>
        <p>Album: <a href="/albums/{{ song.album_id }}" id="song-details-album-link">{{ song.album_name }}</a></p>
        <p>Genre: <a href="/genres" id="song-details-genre-link">{{ song.genre }}</a></p>
        <p>Duration: {{ song.duration }}</p>
        <a href="/songs" id="back-to-songs">Back to Song Catalog</a>
    </main>
</body>
</html>
