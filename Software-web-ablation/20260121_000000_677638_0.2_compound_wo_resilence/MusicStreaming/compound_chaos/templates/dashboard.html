<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Library Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>
    <main id="dashboard-main">
        <h1 id="dashboard-title">Welcome to Your Music Library</h1>
        <section id="stats-section">
            <div id="total-songs">Total Songs: {{ total_songs }}</div>
            <div id="total-playlists">Total Playlists: {{ total_playlists }}</div>
            <div id="total-albums">Total Albums: {{ total_albums }}</div>
            <div id="total-artists">Total Artists: {{ total_artists }}</div>
        </section>
    </main>
</body>
</html>
