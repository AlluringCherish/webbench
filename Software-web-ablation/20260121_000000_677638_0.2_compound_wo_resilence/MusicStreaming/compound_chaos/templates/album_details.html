<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="album-details-main">
        <h1 id="album-details-title">{{ album.name }}</h1>
        <p>Artist: <a href="/artists/{{ album.artist_id }}" id="album-details-artist-link">{{ album.artist_name }}</a></p>
        <ul id="album-songs-list">
            {% for song in album.songs %}
                <li id="album-song-{{ song.id }}">
                    <a href="/songs/{{ song.id }}" id="album-song-link-{{ song.id }}">{{ song.title }}</a>
                </li>
            {% else %}
                <li id="no-songs-in-album-message">No songs in this album.</li>
            {% endfor %}
        </ul>
        <a href="/albums" id="back-to-albums">Back to Albums</a>
    </main>
</body>
</html>
