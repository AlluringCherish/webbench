<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="artists-main">
        <h1 id="artists-title">Artists</h1>
        <ul id="artists-list">
            {% for artist in artists %}
                <li id="artist-{{ artist.id }}">
                    <a href="/artists/{{ artist.id }}" id="artist-link-{{ artist.id }}">{{ artist.name }}</a>
                </li>
            {% else %}
                <li id="no-artists-message">No artists available.</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
