<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="playlist-details-main">
        <h1 id="playlist-details-title">{{ playlist.name }}</h1>
        <ul id="playlist-songs-list">
            {% for song in playlist.songs %}
                <li id="playlist-song-{{ song.id }}">
                    <a href="/songs/{{ song.id }}" id="playlist-song-link-{{ song.id }}">{{ song.title }}</a>
                </li>
            {% else %}
                <li id="no-songs-in-playlist-message">This playlist has no songs.</li>
            {% endfor %}
        </ul>
        <a href="/playlists" id="back-to-playlists">Back to Playlists</a>
    </main>
</body>
</html>
