<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlists</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="playlists-main">
        <h1 id="playlists-title">Playlists</h1>
        <a href="/playlists/create" id="create-playlist-button">Create New Playlist</a>
        <ul id="playlists-list">
            {% for playlist in playlists %}
                <li id="playlist-{{ playlist.id }}">
                    <a href="/playlists/{{ playlist.id }}" id="playlist-link-{{ playlist.id }}">{{ playlist.name }}</a>
                </li>
            {% else %}
                <li id="no-playlists-message">No playlists available.</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
