<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="songs-main">
        <h1 id="songs-title">Song Catalog</h1>

        <ul id="songs-list">
        {% for song in songs %}
            <li id="song-{{ song.id }}">
                <a href="/songs/{{ song.id }}" id="song-link-{{ song.id }}">{{ song.title }}</a> by 
                <a href="/artists/{{ song.artist_id }}" id="song-artist-link-{{ song.id }}">{{ song.artist_name }}</a>
            </li>
        {% else %}
            <li id="no-songs-message">No songs available.</li>
        {% endfor %}
        </ul>
    </main>
</body>
</html>
