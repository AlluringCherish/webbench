<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Genres</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="genres-main">
        <h1 id="genres-title">Genres</h1>
        <ul id="genres-list">
            {% for genre in genres %}
                <li id="genre-{{ genre }}">{{ genre }}</li>
            {% else %}
                <li id="no-genres-message">No genres available.</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
