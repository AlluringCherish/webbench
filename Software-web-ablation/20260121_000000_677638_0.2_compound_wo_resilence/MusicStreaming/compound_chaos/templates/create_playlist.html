<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Playlist</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="create-playlist-main">
        <h1 id="create-playlist-title">Create a New Playlist</h1>
        {% if error %}
            <p id="create-playlist-error" style="color:red;">{{ error }}</p>
        {% endif %}
        <form id="create-playlist-form" action="/playlists/create" method="post">
            <label for="playlist-name-input" id="playlist-name-label">Playlist Name:</label>
            <input type="text" id="playlist-name-input" name="name" required>
            <button type="submit" id="create-playlist-submit">Create Playlist</button>
        </form>
        <a href="/playlists" id="cancel-create-playlist-link">Cancel</a>
    </main>
</body>
</html>
