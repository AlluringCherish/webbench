<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav id="main-nav">
        <a href="/dashboard" id="nav-dashboard">Dashboard</a>
        <a href="/songs" id="nav-songs">Songs</a>
        <a href="/playlists" id="nav-playlists">Playlists</a>
        <a href="/albums" id="nav-albums">Albums</a>
        <a href="/artists" id="nav-artists">Artists</a>
        <a href="/genres" id="nav-genres">Genres</a>
    </nav>

    <main id="albums-main">
        <h1 id="albums-title">Albums</h1>
        <ul id="albums-list">
            {% for album in albums %}
                <li id="album-{{ album.id }}">
                    <a href="/albums/{{ album.id }}" id="album-link-{{ album.id }}">{{ album.name }}</a> by 
                    <a href="/artists/{{ album.artist_id }}" id="album-artist-link-{{ album.id }}">{{ album.artist_name }}</a>
                </li>
            {% else %}
                <li id="no-albums-message">No albums available.</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
