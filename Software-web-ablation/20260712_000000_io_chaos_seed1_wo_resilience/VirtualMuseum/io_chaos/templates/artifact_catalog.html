<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artifact Catalog</title>
</head>
<body>
    <div id="artifact-catalog-page">
        <h1>Artifact Catalog</h1>
        <form method="GET" action="{{ url_for('artifact_catalog') }}">
            <input id="search-artifact" type="text" name="search_query" value="{{ search_query }}" placeholder="Search artifacts...">
            <button id="apply-artifact-filter" type="submit">Search</button>
        </form>
        <table id="artifact-table" border="1">
            <thead>
                <tr>
                    <th>Artifact ID</th>
                    <th>Artifact Name</th>
                    <th>Period</th>
                    <th>Origin</th>
                    <th>Exhibition Title</th>
                </tr>
            </thead>
            <tbody>
                {% for artifact in artifacts %}
                <tr>
                    <td>{{ artifact.artifact_id }}</td>
                    <td>{{ artifact.artifact_name }}</td>
                    <td>{{ artifact.period }}</td>
                    <td>{{ artifact.origin }}</td>
                    <td>{{ artifact.exhibition_title }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
