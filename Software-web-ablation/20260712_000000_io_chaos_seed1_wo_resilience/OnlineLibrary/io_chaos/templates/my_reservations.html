<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
    <table id="reservations-table" border="1">
        <thead>
            <tr>
                <th>Book Title</th>
                <th>Reservation Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for reservation in reservations %}
            <tr>
                <td>{{ reservation.book_title }}</td>
                <td>{{ reservation.reservation_date }}</td>
                <td>{{ reservation.status }}</td>
                <td>
                    <form method="POST" action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}" style="display:inline;">
                        <button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="4">No reservations found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
