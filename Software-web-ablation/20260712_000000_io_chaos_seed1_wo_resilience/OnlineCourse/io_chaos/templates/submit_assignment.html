<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="submit-page">
        <h1>Submit Assignment</h1>

        <div id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>{{ assignment.description }}</p>
        </div>

        <form method="post" action="{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}">
            <textarea id="submission-text" name="submission_text" required></textarea>
            <br />
            <button id="submit-button" type="submit">Submit</button>
        </form>

        {% if submission_status %}
        <p>{{ submission_status }}</p>
        {% endif %}

        {% if confirmation_message %}
        <p>{{ confirmation_message }}</p>
        {% endif %}

        <button id="back-to-assignments" onclick="window.location.href='{{ url_for('my_assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
