<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="learning-page">
        <h1>Course Learning</h1>

        <div id="lessons-list">
            <ul>
            {% for lesson in lessons %}
                <li>{{ lesson.title }}</li>
            {% else %}
                <li>No lessons available.</li>
            {% endfor %}
            </ul>
        </div>

        <div id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <div>{{ current_lesson.content }}</div>
        </div>

        <form method="post" action="{{ url_for('course_learning', course_id=course.course_id) }}">
            <button id="mark-complete-button" type="submit">Mark Complete</button>
        </form>

        <button id="back-to-my-courses" onclick="window.location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
