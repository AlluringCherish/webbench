<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="events-page">
        <h1>{{ page_title }}</h1>
        <form method="GET" action="{{ url_for('events_listing') }}">
            <input type="text" id="event-search-input" name="search_query" placeholder="Search events" value="{{ search_query }}" />
            <select id="event-category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category }}" {% if category == category_filter %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="events-grid">
            {% for event in events %}
            <div class="event-card">
                <h3>{{ event.event_name }}</h3>
                <p>Category: {{ event.category }}</p>
                <p>Date: {{ event.date }}</p>
                <p>Location: {{ event.location }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="window.location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
