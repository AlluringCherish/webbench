<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Review</title>
</head>
<body>
    <div id="reviews-pag">
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <h3>{{ review.dish_name }}</h3>
                <p>Rating: {{ review.rating }}</p>
                <p>{{ review.review_text }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="write-new-review-btn" onclick="location.href='{{ url_for('write_reviews') }}'">Write New Review</button>
        <button id="back-to-dashbord" onclick="location.href='{{ url_for('dashbord') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
