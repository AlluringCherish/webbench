<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <h1 id="write-review-title">Write a Review</h1>
    <nav>
        <a href="{{ url_for('menu') }}" id="nav-menu">Menu</a> |
        <a href="{{ url_for('my_reviews') }}" id="nav-my-reviews">My Reviews</a>
    </nav>

    <form action="" method="POST" id="write-review-form">
        <label for="dish_id">Dish ID:</label>
        <input type="number" name="dish_id" id="dish_id" required><br>

        <label for="rating">Rating (1-5):</label>
        <input type="number" name="rating" id="rating" min="1" max="5" required><br>

        <label for="review_text">Review Text:</label><br>
        <textarea name="review_text" id="review_text" rows="4" cols="50" required></textarea><br>

        <button type="submit" id="submit-review">Submit Review</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul id="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

</body>
</html>
