<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dish Detail</title>
</head>
<body>
    <div id="dish-detail-pag">
        <h1 id="dish-nam">{{ dish.name }}</h1>
        <div id="dish-pric">Price: ${{ dish.price }}</div>
        <p>Category: {{ dish.category }}</p>
        <p>Description: {{ dish.description }}</p>
        <p>Ingredients: {{ dish.ingredients }}</p>
        <p>Dietary Info: {{ dish.dietary }}</p>
        <p>Average Rating: {{ dish.avg_rating }}</p>
        <button id="back-to-menu" onclick="location.href='{{ url_for('menue') }}'">Back to Menu</button>
    </div>
</body>
</html>
