<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profil</title>
</head>
<body>
    <div id="profile-pag">
        <form method="GET" action="{{ url_for('profil') }}">
            <div id="profile-username">Username: {{ profile.username }}</div>
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="emails" value="{{ profile.email }}" required><br>

            <button type="submit" id="update-profile-btn">Update Profile</button>
        </form>
        <button id="back-to-dashbord" onclick="location.href='{{ url_for('dashbord') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
