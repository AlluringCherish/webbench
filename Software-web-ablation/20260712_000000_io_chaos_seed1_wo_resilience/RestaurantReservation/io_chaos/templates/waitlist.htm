<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waitlistt</title>
</head>
<body>
    <div id="waitlist-pag">
        <form method="GET" action="{{ url_for('wait_list') }}">
            <label for="waitlist-party-siz">Party Size:</label>
            <select id="waitlist-party-siz" name="party_siz">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <button type="submit" id="join-waitlist-btn">Join Waitlist</button>
        </form>

        <div id="user-positon">
            {% if position %}
                Your current waitlist position: {{ position }}
            {% else %}
                You are not currently on the waitlist.
            {% endif %}
        </div>

        <button id="back-to-dashbord" onclick="location.href='{{ url_for('dashbord') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
