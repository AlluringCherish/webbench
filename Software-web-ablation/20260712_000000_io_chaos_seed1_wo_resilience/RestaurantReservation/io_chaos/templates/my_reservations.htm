<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservatons</title>
</head>
<body>
    <div id="my-reservatons-pag">
        <table id="reservatons-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Party Size</th>
                    <th>Statuz</th>
                    <th>Cancel</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.date }}</td>
                    <td>{{ reservation.time }}</td>
                    <td>{{ reservation.party_size }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        <form method="GET" action="{{ url_for('cancel_reservations', reservation_id=reservation.reservation_id) }}">
                            <button type="submit" id="cancel-reservatn-btn-{{ reservation.reservation_id }}">Cancel</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashbord" onclick="location.href='{{ url_for('dashbord') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
