<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservaton</title>
</head>
<body>
    <div id="reservaton-page">
        <form method="GET" action="{{ url_for('make_reservations') }}">
            <label for="guest-nam">Guest Name:</label>
            <input type="text" id="guest-nam" name="guest_nam" required><br>

            <label for="party-siz">Party Size:</label>
            <select id="party-siz" name="party_siz" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select><br>

            <label for="reservation-dat">Reservation Date:</label>
            <input type="date" id="reservation-dat" name="reservation_dat" required><br>

            <button type="submit" id="submit-reservaton-btn">Submit Reservation</button>
        </form>
        <button id="back-to-dashbord" onclick="location.href='{{ url_for('dashbord') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
