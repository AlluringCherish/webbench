<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Reviews</title>
</head>
<body>
    <div id="write-review-pag">
        <form method="GET" action="{{ url_for('write_reviews') }}">
            <label for="select-dish">Select Dish:</label>
            <select id="select-dish" name="dish_id" required>
                {% for dish in dishes %}
                <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
                {% endfor %}
            </select><br>

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                {% for i in range(1, 11) %}
                <option value="{{ i }}">{{ i }} star{{ "s" if i > 1 else "" }}</option>
                {% endfor %}
            </select><br>

            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="4" cols="50" required></textarea><br>

            <button type="submit" id="submit-review-btn">Submit Review</button>
        </form>
        <button id="back-to-reviews" onclick="location.href='{{ url_for('my_review') }}'">Back to Reviews</button>
    </div>
</body>
</html>
