<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
    <h1 id="make-reservation-title">Make a Reservation</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="nav-dashboard">Dashboard</a> |
        <a href="{{ url_for('my_reservations') }}" id="nav-my-reservations">My Reservations</a>
    </nav>

    <form action="" method="POST" id="make-reservation-form">
        <label for="guest_name">Guest Name:</label>
        <input type="text" name="guest_name" id="guest_name" required><br>

        <label for="phone">Phone:</label>
        <input type="text" name="phone" id="phone" required><br>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required><br>

        <label for="party_size">Party Size:</label>
        <input type="number" name="party_size" id="party_size" min="1" required><br>

        <label for="reservation_date">Date:</label>
        <input type="date" name="reservation_date" id="reservation_date" required><br>

        <label for="reservation_time">Time:</label>
        <input type="time" name="reservation_time" id="reservation_time" required><br>

        <label for="special_requests">Special Requests:</label><br>
        <textarea name="special_requests" id="special_requests" rows="4" cols="50"></textarea><br>

        <button type="submit" id="submit-reservation">Make Reservation</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul id="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

</body>
</html>
