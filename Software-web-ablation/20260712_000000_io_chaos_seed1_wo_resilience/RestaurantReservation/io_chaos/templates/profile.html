<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <h1 id="profile-title">Profile</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="nav-dashboard">Dashboard</a>
        <a href="{{ url_for('my_reservations') }}" id="nav-my-reservations">My Reservations</a>
    </nav>
    <form method="POST" id="profile-form">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ user.email }}" required><br>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" name="phone" value="{{ user.phone }}" required><br>

        <label for="full_name">Full Name:</label>
        <input type="text" id="full_name" name="full_name" value="{{ user.full_name }}" required><br>

        <button type="submit" id="update-profile">Update Profile</button>
    </form>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul id="flash-messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
</body>
</html>
