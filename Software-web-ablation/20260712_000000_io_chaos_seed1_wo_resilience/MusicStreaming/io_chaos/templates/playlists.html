<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlists</title>
</head>
<body>
    <h1>Playlists</h1>
    <div id="playlists-container">
        <a href="{{ url_for('create_playlist') }}">
            <button id="create-playlist-button">Create New Playlist</button>
        </a>
        <ul>
        {% for playlist in playlists %}
            <li id="playlist-{{ playlist.playlist_id }}">
                <strong>{{ playlist.title }}</strong> ({{ playlist.total_songs }} songs)
                <p>{{ playlist.description }}</p>
                <a href="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
                    <button id="view-playlist-{{ playlist.playlist_id }}">View</button>
                </a>
            </li>
        {% endfor %}
        </ul>
    </div>
</body>
</html>
