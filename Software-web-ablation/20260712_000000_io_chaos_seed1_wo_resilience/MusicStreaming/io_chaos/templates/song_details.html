<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
    <h1>Song Details</h1>
    <div id="song-details-container">
        <h2 id="song-title">{{ song.title }}</h2>
        <p id="song-artist">Artist: {{ song.artist_name }}</p>
        <p id="song-album">Album: {{ song.album_name }}</p>
        <p id="song-duration">Duration: {{ song.duration }} seconds</p>

        <a href="{{ url_for('song_catalog') }}">
            <button id="back-to-catalog-button">Back to Catalog</button>
        </a>
    </div>
</body>
</html>
