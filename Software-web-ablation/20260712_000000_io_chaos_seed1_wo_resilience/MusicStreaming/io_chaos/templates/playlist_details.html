<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
</head>
<body>
    <h1>Playlist Details</h1>
    <div id="playlist-details-container">
        <h2 id="playlist-title">{{ playlist.title }}</h2>
        <p id="playlist-description">{{ playlist.description }}</p>

        <table id="playlist-songs-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Duration (s)</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for song in songs %}
                <tr id="playlist-song-{{ song.song_id }}">
                    <td>{{ song.title }}</td>
                    <td>{{ song.artist_name }}</td>
                    <td>{{ song.duration }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('remove_from_playlist', playlist_id=playlist.playlist_id, song_id=song.song_id) }}" style="display:inline;">
                            <button type="submit" id="remove-from-playlist-button-{{ song.song_id }}">Remove</button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('playlists_page') }}">
            <button id="back-to-playlists-button">Back to Playlists</button>
        </a>
    </div>
</body>
</html>
