<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <div id="dashboard-container">
        <section id="featured-songs-section">
            <h2>Featured Songs</h2>
            <ul>
            {% for song in featured_songs %}
                <li id="featured-song-{{ song.song_id }}">
                    {{ song.title }} by {{ song.artist_name }} - {{ song.duration }}s
                    <a href="{{ url_for('song_details', song_id=song.song_id) }}">
                        <button id="view-song-details-{{ song.song_id }}">Details</button>
                    </a>
                </li>
            {% endfor %}
            </ul>
        </section>

        <section id="trending-artists-section">
            <h2>Trending Artists</h2>
            <ul>
            {% for artist in trending_artists %}
                <li id="trending-artist-{{ artist.artist_id }}">
                    {{ artist.name }}
                    <a href="{{ url_for('artist_details', artist_id=artist.artist_id) }}">
                        <button id="view-artist-{{ artist.artist_id }}">View</button>
                    </a>
                </li>
            {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
