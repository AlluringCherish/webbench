<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
</head>
<body>
    <h1>Artists</h1>
    <div id="artists-container">
        <form method="POST" action="{{ url_for('artist_profile') }}" id="artist-filter-form">
            <input type="text" name="search_query" id="artist-search-query" placeholder="Search artists..." value="{{ search_query|default('') }}">
            <select name="sort_option" id="artist-sort-option">
                <option value="name" {% if sort_option == 'name' %}selected{% endif %}>Name</option>
                <option value="genre" {% if sort_option == 'genre' %}selected{% endif %}>Genre</option>
            </select>
            <button type="submit" id="filter-artists-button">Filter</button>
        </form>

        <table id="artists-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Genre</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for artist in artists %}
                <tr id="artist-{{ artist.artist_id }}">
                    <td>{{ artist.name }}</td>
                    <td>{{ artist.genre }}</td>
                    <td>
                        <a href="{{ url_for('artist_details', artist_id=artist.artist_id) }}">
                            <button id="view-artist-{{ artist.artist_id }}">View</button>
                        </a>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
