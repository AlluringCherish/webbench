<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Details</title>
</head>
<body>
    <h1>Artist Details</h1>
    <div id="artist-details-container">
        <h2 id="artist-name">{{ artist.name }}</h2>
        <p id="artist-genre">Genre: {{ artist.genre }}</p>
        <p id="artist-country">Country: {{ artist.country }}</p>
        <p id="artist-formation-year">Formation Year: {{ artist.formation_year }}</p>

        <a href="{{ url_for('artist_profile') }}">
            <button id="back-to-artists-button">Back to Artists</button>
        </a>
    </div>
</body>
</html>
