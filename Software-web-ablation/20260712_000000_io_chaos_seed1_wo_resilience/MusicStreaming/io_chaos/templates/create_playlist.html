<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Playlist</title>
</head>
<body>
    <h1>Create Playlist</h1>
    <div id="create-playlist-container">
        <form method="POST" action="{{ url_for('create_playlist') }}" id="create-playlist-form">
            <label for="playlist-title-input">Title:</label>
            <input type="text" id="playlist-title-input" name="title" value="{{ form_data.title|default('') }}" required>
            <br>
            <label for="playlist-description-input">Description:</label>
            <textarea id="playlist-description-input" name="description" required>{{ form_data.description|default('') }}</textarea>
            <br>
            <button type="submit" id="submit-create-playlist">Create</button>
        </form>
        <a href="{{ url_for('playlists_page') }}">
            <button id="cancel-create-playlist">Cancel</button>
        </a>
    </div>
</body>
</html>
