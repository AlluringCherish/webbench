<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
    <h1>Album Details</h1>
    <div id="album-details-container">
        <h2 id="album-title">{{ album.title }}</h2>
        <p id="album-artist">Artist: {{ album.artist_name }}</p>
        <p id="album-year">Year: {{ album.year }}</p>

        <table id="album-songs-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Duration (s)</th>
                </tr>
            </thead>
            <tbody>
            {% for song in songs %}
                <tr id="album-song-{{ song.song_id }}">
                    <td>{{ song.title }}</td>
                    <td>{{ song.duration }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('album_browse') }}">
            <button id="back-to-albums-button">Back to Albums</button>
        </a>
    </div>
</body>
</html>
