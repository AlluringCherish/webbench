<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>
        <div id="conversation-list">
            <ul>
                {% for convo in conversations %}
                <li>{{ convo.subject }}</li>
                {% endfor %}
            </ul>
        </div>
        <div>
            <form method="post" action="{{ url_for('messages') }}">
                <textarea id="message-input" name="message_content" required></textarea>
                <button type="submit" id="send-message-button">Send</button>
            </form>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
