<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>
        <form method="get" action="">
            <label for="filter-status">Filter by Status:</label>
            <select id="filter-status" name="status">
                <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
                <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Approved" {% if status_filter == 'Approved' %}selected{% endif %}>Approved</option>
                <option value="Rejected" {% if status_filter == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>
        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Pet Name</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.pet_name }}</td>
                    <td>{{ app.date_submitted }}</td>
                    <td>{{ app.status }}</td>
                    <td><a href="{{ url_for('pet_details', pet_id=app.pet_id) }}">View Pet</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
