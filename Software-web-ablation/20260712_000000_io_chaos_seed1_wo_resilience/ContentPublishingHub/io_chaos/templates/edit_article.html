<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>

        {% if error %}
            <div id="form-errors">
                <ul>
                    <li>{{ error }}</li>
                </ul>
            </div>
        {% endif %}

        <form id="edit-article-form" method="POST" action="{{ url_for('edit_article', article_id=article.article_id) }}">
            <label for="article-title">Title:</label>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" readonly>

            <label for="article-content">Content:</label>
            <textarea id="article-content" name="content" rows="10" required>{% if latest_version %}{{ latest_version.content }}{% endif %}</textarea>

            <label for="change-summary">Change Summary:</label>
            <input type="text" id="change-summary" name="change_summary" placeholder="Briefly describe your changes">

            <button type="submit" id="btn-submit-edit">Save Changes</button>
            <button type="button" id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
