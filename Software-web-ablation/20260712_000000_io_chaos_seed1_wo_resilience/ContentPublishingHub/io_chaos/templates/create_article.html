<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create Article</h1>

        {% if errors %}
            <div id="form-errors">
                <ul>
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
                </ul>
            </div>
        {% endif %}

        <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
            <label for="article-title">Title:</label>
            <input type="text" id="article-title" name="title" value="{{ form_data.title if form_data else '' }}" required>

            <label for="article-category">Category:</label>
            <input type="text" id="article-category" name="category" value="{{ form_data.category if form_data else '' }}" required>

            <button type="submit" id="btn-submit-article">Submit</button>
            <button type="button" id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
