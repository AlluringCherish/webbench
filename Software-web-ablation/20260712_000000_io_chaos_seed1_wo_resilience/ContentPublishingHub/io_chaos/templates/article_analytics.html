<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Article Analytics</h1>

        <h2 id="article-title">{{ article.title }}</h2>

        <section id="analytics-summary">
            <h3>Summary</h3>
            <ul>
                <li>Views: {{ analytics.views }}</li>
                <li>Likes: {{ analytics.likes }}</li>
                <li>Comments: {{ analytics.comments }}</li>
                <li>Shares: {{ analytics.shares }}</li>
            </ul>
        </section>

        <section id="analytics-charts">
            <!-- Placeholder for charts; in real app, charts would be rendered via JS -->
            <p>Charts will be displayed here.</p>
        </section>

        <button id="btn-back-my-articles" onclick="location.href='{{ url_for('my_articles') }}'">Back to My Articles</button>
    </div>
</body>
</html>
