<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="published-articles-page">
        <h1>Published Articles</h1>

        <form id="category-filter-form" method="GET" action="{{ url_for('published_articles') }}">
            <label for="filter-category">Filter by Category:</label>
            <select id="filter-category" name="category">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>

            <label for="sort-order">Sort by:</label>
            <select id="sort-order" name="sort">
                <option value="date_desc" {% if sort_by == 'date_desc' %}selected{% endif %}>Newest First</option>
                <option value="date_asc" {% if sort_by == 'date_asc' %}selected{% endif %}>Oldest First</option>
            </select>

            <button type="submit" id="btn-filter">Apply Filter</button>
            <button type="button" id="btn-clear-filter" onclick="location.href='{{ url_for('published_articles') }}'">Clear Filter</button>
        </form>

        <table id="published-articles-table" border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Category</th>
                    <th>Published Date</th>
                    <th>Author</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td>{{ article.id }}</td>
                    <td>{{ article.title }}</td>
                    <td>{{ article.category }}</td>
                    <td>{{ article.published_date }}</td>
                    <td>{{ article.author }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
