<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>

        <table id="calendar-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Scheduled Articles</th>
                </tr>
            </thead>
            <tbody>
                {% for date, articles_on_date in scheduled_publications.items() %}
                <tr>
                    <td>{{ date }}</td>
                    <td>
                        <ul>
                            {% for article in articles_on_date %}
                                <li>{{ article.title }} (ID: {{ article.id }})</li>
                            {% endfor %}
                        </ul>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="btn-back-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
