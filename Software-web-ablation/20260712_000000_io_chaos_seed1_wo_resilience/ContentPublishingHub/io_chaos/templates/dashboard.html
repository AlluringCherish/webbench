<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ContentPublishingHub</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>

        <div id="user-info">
            <p>Welcome, {{ username }}!</p>
        </div>

        <section id="quick-stats">
            <h2>Quick Stats</h2>
            <ul>
            {% for key, value in quick_stats.items() %}
                <li>{{ key }}: {{ value }}</li>
            {% endfor %}
            </ul>
        </section>

        <section id="recent-activities">
            <h2>Recent Activities</h2>
            <ul>
            {% for activity in recent_activities %}
                <li>{{ activity }}</li>
            {% endfor %}
            </ul>
        </section>

        <nav id="dashboard-navigation">
            <button onclick="location.href='{{ url_for('create_article') }}'" id="btn-create-article">Create New Article</button>
            <button onclick="location.href='{{ url_for('my_articles') }}'" id="btn-my-articles">My Articles</button>
            <button onclick="location.href='{{ url_for('published_articles') }}'" id="btn-published-articles">Published Articles</button>
            <button onclick="location.href='{{ url_for('content_calendar') }}'" id="btn-content-calendar">Content Calendar</button>
        </nav>
    </div>
</body>
</html>
