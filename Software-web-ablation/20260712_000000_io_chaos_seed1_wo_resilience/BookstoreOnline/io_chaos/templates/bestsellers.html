<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Top Sellers</title>
</head>
<body>
    <div id="bestsellers_container">
        <h2 id="bestsellers_header">Bestsellers</h2>

        <select id="period_filter" name="period" onchange="this.form.submit()">
            <option value="1" {% if current_period == 1 %}selected{% endif %}>Week</option>
            <option value="2" {% if current_period == 2 %}selected{% endif %}>Month</option>
            <option value="3" {% if current_period == 3 %}selected{% endif %}>Year</option>
        </select>

        <div id="bestsellers_listing">
            {% for bookid, book in best_sellers_list.items() %}
            <div class="bestseller">
                <p><strong>#{{ book.rank }}: {{ book.title }}</strong> by {{ book.author_name }} - Sales: {{ book.sales }}</p>
                <button id="view_book_btn_{{ bookid }}" onclick="location.href='{{ url_for('details_book', book_id=bookid) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="dashboard_button" onclick="location.href='{{ url_for('dashboad') }}'">Dashboard</button>
    </div>
</body>
</html>
