<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews by Customers</title>
</head>
<body>
    <div id="reviews_container">
        <h2 id="reviews_header">Customer Reviews</h2>

        <select id="rating_filter" name="rating" onchange="location.href='?rating=' + this.value">
            <option value="0" {% if current_rating == 0 %}selected{% endif %}>All Ratings</option>
            <option value="5" {% if current_rating == 5 %}selected{% endif %}>5 Stars</option>
            <option value="4" {% if current_rating == 4 %}selected{% endif %}>4 Stars</option>
            <option value="3" {% if current_rating == 3 %}selected{% endif %}>3 Stars</option>
            <option value="2" {% if current_rating == 2 %}selected{% endif %}>2 Stars</option>
            <option value="1" {% if current_rating == 1 %}selected{% endif %}>1 Star</option>
        </select>

        <div id="reviews_display">
            {% for book, review in reviews_data.items() %}
            <div class="review">
                <p><strong>Book:</strong> {{ book }}</p>
                <p><strong>Rating:</strong> {{ review.rate }} / 5</p>
                <p><strong>Review:</strong> {{ review.text_review }}</p>
                <p><strong>Customer:</strong> {{ review.customer }}</p>
                <p><strong>Date:</strong> {{ review.date_review }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="write_review_btn" onclick="location.href='{{ url_for('write_reviews') }}'">Write Review</button>
        <button id="dashboard_button" onclick="location.href='{{ url_for('dashboad') }}'">Dashboard</button>
    </div>
</body>
</html>
