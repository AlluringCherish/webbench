<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Info</title>
</head>
<body>
    <div id="order_detail_container">
        <h2 id="order_detail_header">Order Details</h2>

        <table id="items_table" border="1">
            <thead>
                <tr>
                    <th>Book ID</th>
                    <th>Title</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Sum</th>
                </tr>
            </thead>
            <tbody>
            {% for book_id, item in order_items_list.items() %}
                <tr>
                    <td>{{ book_id }}</td>
                    <td>{{ item.title_text }}</td>
                    <td>{{ item.qty }}</td>
                    <td>${{ item.price_value }}</td>
                    <td>{{ item.sum }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
