<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout Process</title>
</head>
<body>
    <div id="checkout_page">
        <h2 id="checkout_header">Checkout</h2>

        <form method="POST" action="/check_out">
            <label for="name_field">Name:</label>
            <input type="text" id="name_field" name="name">
            <br><br>

            <label for="address_field">Address:</label>
            <textarea id="address_field" name="address"></textarea>
            <br><br>

            <label for="payment_dropdown">Payment Method:</label>
            <select id="payment_dropdown" name="payment">
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal">PayPal</option>
                <option value="Bank Transfer">Bank Transfer</option>
            </select>
            <br><br>

            <button id="submit_order_btn" type="submit">Place Order</button>
        </form>

        <p>Total Cost: ${{ total_cost }}</p>
    </div>
</body>
</html>
