<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
</head>
<body>
    <div id="cart_page">
        <h2 id="cart_header">Shopping Cart</h2>

        <form method="GET" action="/carts">
            <table id="cart_table" border="1">
                <thead>
                    <tr>
                        <th>Book</th>
                        <th>Title</th>
                        <th>Price</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                {% for item in cart_list %}
                    <tr>
                        <td>{{ item.book }}</td>
                        <td>{{ item.title_text }}</td>
                        <td>${{ item.price_value }}</td>
                        <td>
                            <input type="text" id="qty_input_{{ item.book }}" name="qty_{{ item.book }}" value="{{ item.qty }}">
                            <button type="submit" id="remove_btn_{{ item.book }}">Remove</button>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </form>

        <p>Total Price: $<span id="total_price">{{ total_price }}</span></p>
        <button id="checkout_btn" onclick="location.href='{{ url_for('checkout_page') }}'">Checkout</button>
    </div>
</body>
</html>
