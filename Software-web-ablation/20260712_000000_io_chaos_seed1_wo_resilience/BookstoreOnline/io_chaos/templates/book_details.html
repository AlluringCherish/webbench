<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Details of Book</title>
</head>
<body>
    <div id="book_detail_page">
        <h2 id="book_name">{{ book_info.title_text }}</h2>
        <div id="book_title">{{ book_info.title_text }}</div>
        <span id="author">{{ book_info.author_name }}</span><br>
        <span id="price">${{ book_info.cost }}</span>

        <form method="POST" action="">
            <label for="qty_field">Quantity:</label>
            <input type="text" id="qty_field" name="qty">
            <button id="add_cart_btn" type="submit">Add to Cart</button>
        </form>

        <div id="reviews_section">
            <h3>Customer Reviews</h3>
            {% for review in reviews_list %}
            <div class="review">
                <p><strong>{{ review.customer }}</strong> rated: {{ review.rate }}/5</p>
                <p>{{ review.review }}</p>
                <p>Date: {{ review.date }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
