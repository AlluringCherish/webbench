<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add a Review</title>
</head>
<body>
    <div id="write_review_container">
        <h2 id="write_review_header">Write a Review</h2>

        <form method="POST" action="/write_reviews">
            <label for="book_selector">Select Book:</label>
            <select id="book_selector" name="bookID">
                {% for bookid, book in book_choices.items() %}
                    <option value="{{ bookid }}">{{ book.name }}</option>
                {% endfor %}
            </select>
            <br><br>

            <label for="rating_selector">Select Rating:</label>
            <select id="rating_selector" name="rate">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <br><br>

            <label for="review_input">Review:</label>
            <textarea id="review_input" name="review_input"></textarea>
            <br><br>

            <button id="submit_review_btn" type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
