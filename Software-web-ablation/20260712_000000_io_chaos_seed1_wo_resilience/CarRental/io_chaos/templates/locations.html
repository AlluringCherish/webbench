<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Pickup and Dropoff Locations</h1>

        <label for="hours-filter">Filter by Hours:</label>
        <select id="hours-filter" name="hours_filter">
            <option value="">All Hours</option>
            <option value="24/7">24/7</option>
            <option value="09:00-18:00">09:00-18:00</option>
        </select>

        <label for="search-location-input">Search Locations:</label>
        <input type="text" id="search-location-input" name="search_location" placeholder="Enter city or address">

        <div id="locations-list">
            {% for location in locations %}
            <div class="location-item">
                <h2>{{ location.city }}</h2>
                <p>Address: {{ location.address }}</p>
                <p>Phone: {{ location.phone }}</p>
                <p>Hours: {{ location.hours }}</p>
                <p>Available Vehicles: {{ location.available_vehicles }}</p>
                <button id="location-detail-button-{{ location.location_id }}">Details</button>
            </div>
            {% else %}
            <p>No locations available.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
