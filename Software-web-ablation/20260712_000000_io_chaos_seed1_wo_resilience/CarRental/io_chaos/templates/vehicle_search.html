<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="search-page">
        <h1>Search Vehicles</h1>
        <label for="location-filter">Location:</label>
        <select id="location-filter" name="location">
            <option value="">All Locations</option>
            {% for location in locations %}
            <option value="{{ location }}">{{ location }}</option>
            {% endfor %}
        </select>

        <label for="vehicle-type-filter">Vehicle Type:</label>
        <select id="vehicle-type-filter" name="vehicle_type">
            <option value="">All Types</option>
            {% for vtype in vehicle_types %}
            <option value="{{ vtype }}">{{ vtype }}</option>
            {% endfor %}
        </select>

        <label for="date-range-input">Date Range:</label>
        <input type="text" id="date-range-input" name="date_range" placeholder="Select Date Range">

        <div id="vehicles-grid">
            {% for vehicle in vehicles %}
            <div class="vehicle-card">
                <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                <div>Daily Rate: ${{ vehicle.daily_rate }}</div>
                <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="location.href='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
