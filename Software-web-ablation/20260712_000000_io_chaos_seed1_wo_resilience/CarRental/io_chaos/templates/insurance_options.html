<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="insurance-page">
        <h1>Select Insurance Coverage</h1>
        <form method="POST">
            <div id="insurance-options">
                {% for plan in insurance_plans %}
                <div class="insurance-plan">
                    <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="selected_insurance_id" value="{{ plan.insurance_id }}" {% if selected_insurance_id == plan.insurance_id %}checked{% endif %}>
                    <label for="select-insurance-{{ plan.insurance_id }}">
                        <strong>{{ plan.plan_name }}</strong><br>
                        <span id="insurance-description">{{ plan.description }}</span><br>
                        <span id="insurance-price">Daily Cost: ${{ plan.daily_cost }}</span>
                    </label>
                </div>
                {% endfor %}
            </div>
            <button type="submit" id="confirm-booking-button">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
