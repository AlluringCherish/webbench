<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="requests-page">
        <h1>Special Requests</h1>
        <form method="POST">
            <label for="select-reservation">Select Reservation:</label>
            <select id="select-reservation" name="reservation_id" required>
                {% for reservation in reservations %}
                <option value="{{ reservation.reservation_id }}">Reservation {{ reservation.reservation_id }} - Status: {{ reservation.status }}</option>
                {% endfor %}
            </select>

            <label><input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance"> Driver Assistance</label><br>
            <label><input type="checkbox" id="gps-option-checkbox" name="gps_option"> GPS Option</label><br>
            <label for="child-seat-quantity">Child Seat Quantity:</label>
            <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="0">

            <label for="special-notes">Special Notes:</label><br>
            <textarea id="special-notes" name="special_notes" rows="4" cols="50"></textarea><br>

            <button type="submit" id="submit-requests-button">Submit Requests</button>
        </form>
    </div>
</body>
</html>
