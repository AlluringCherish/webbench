<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <div id="activity-page">
        <h1>Activity Logs</h1>
        <form method="POST" action="{{ url_for('activity_logs') }}">
            <input type="text" id="search-activity" name="search_term" placeholder="Search logs">
            <button type="submit" id="apply-search-button">Search</button>
        </form>
        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for act in activities %}
                <tr>
                    <td>{{ act.timestamp }}</td>
                    <td>{{ act.device_name }}</td>
                    <td>{{ act.action }}</td>
                    <td>{{ act.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
