<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>
        <h2 id="device-name-display">{{ device.device_name }}</h2>
        <div id="device-status-display">
            Status: {{ device.status }}
        </div>
        <form method="POST" action="{{ url_for('device_control', device_id=device.device_id) }}">
            <button type="submit" name="power_toggle" id="power-toggle">
                {% if device.power == 'on' %}Turn Off{% else %}Turn On{% endif %}
            </button>
            {% if device.device_type == 'Light' or device.device_type == 'Thermostat' or device.device_type == 'Appliance' %}
                {% if device.brightness is not none %}
                <label for="brightness">Brightness:</label>
                <input type="number" id="brightness" name="brightness" min="0" max="100" value="{{ device.brightness }}">
                <br>
                {% endif %}
                {% if device.temperature is not none %}
                <label for="temperature">Temperature:</label>
                <input type="number" id="temperature" name="temperature" value="{{ device.temperature }}">
                <br>
                {% endif %}
            {% endif %}
            <button type="submit" id="save-settings-button">Save Settings</button>
        </form>
        <button id="back-to-devices" onclick="location.href='{{ url_for('device_list') }}'">Back to Devices</button>
    </div>
</body>
</html>
