<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>
        <form method="POST" action="{{ url_for('category_articles', category_name=category_name) }}">
            <button id="sort-by-date" name="sort_by" value="date" type="submit">Sort by Date</button>
            <button id="sort-by-popularity" name="sort_by" value="popularity" type="submit">Sort by Popularity</button>
        </form>
        <div id="category-articles">
            {% for article in articles %}
                <div>
                    <h3>{{ article.title }}</h3>
                    <p>Date: {{ article.date }} | Popularity: {{ article.popularity }}</p>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
