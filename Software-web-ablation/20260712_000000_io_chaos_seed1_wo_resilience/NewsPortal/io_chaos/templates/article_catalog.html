<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Article Catalog</h1>
        <form method="POST" action="{{ url_for('article_catalog') }}">
            <input type="text" id="search-input" name="search_query" placeholder="Search by title, author, keywords" />
            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="articles-grid">
            {% for article in articles %}
                <div>
                    <h3>{{ article.title }}</h3>
                    <p>By {{ article.author }} | {{ article.category }} | {{ article.date }}</p>
                    <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
