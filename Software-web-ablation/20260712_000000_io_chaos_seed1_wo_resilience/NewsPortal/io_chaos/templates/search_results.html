<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">Results for: "{{ query }}"</div>
        {% if results|length == 0 %}
            <div id="no-results-message">No results found.</div>
        {% else %}
            <div id="results-list">
                {% for result in results %}
                    <div>
                        <h3>{{ result.title }}</h3>
                        <p>{{ result.excerpt }}</p>
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
