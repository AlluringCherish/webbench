<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Property Search</h1>

        <form action="{{ url_for('property_search') }}" method="POST">
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location_input" value="{{ location_filter }}">

            <label for="price-range-min">Price Min:</label>
            <input type="number" id="price-range-min" name="price_range_min" step="0.01" value="{{ price_min if price_min is not none else '' }}">

            <label for="price-range-max">Price Max:</label>
            <input type="number" id="price-range-max" name="price_range_max" step="0.01" value="{{ price_max if price_max is not none else '' }}">

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type_filter">
                {% for type in property_types %}
                    <option value="{{ type }}" {% if type == property_type_filter %}selected{% endif %}>{{ type }}</option>
                {% endfor %}
            </select>

            <button type="submit">Search</button>
        </form>

        <div id="properties-grid">
            {% for property in properties %}
                <div class="property-card">
                    <h2>{{ property.address }}</h2>
                    <div>Price: ${{ "{:,.2f}"|format(property.price) }}</div>
                    <div>Type: {{ property.property_type }}</div>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
