<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <form action="{{ url_for('agent_directory') }}" method="GET">
            <input type="text" id="agent-search" name="search_query" value="{{ search_query }}" placeholder="Search agents...">
            <button type="submit">Search</button>
        </form>

        <div id="agents-list">
            {% for agent in agents %}
            <div class="agent-entry">
                <img src="{{ agent.photo_url if agent.photo_url is defined else '' }}" alt="Agent Photo">
                <div>Name: {{ agent.agent_name }}</div>
                <div>Specialization: {{ agent.specialization }}</div>
                <div>Email: {{ agent.email }}</div>
                <div>Phone: {{ agent.phone }}</div>
                <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
