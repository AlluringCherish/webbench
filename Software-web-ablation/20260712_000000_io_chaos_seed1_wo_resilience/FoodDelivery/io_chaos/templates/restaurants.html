<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurant</title>
</head>
<body>
    <div id="restaurants-page">
        <h1>Browse Restaurant</h1>
        <div>
            <input type="text" id="search_input" placeholder="Search restaurants...">
            <select id="cuisine_filter">
                <option value="">All Cuisines</option>
                {% for cuisine in cuisines %}
                <option value="{{ cuisine }}">{{ cuisine }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="restaurants_grid">
            {% for restaurant in restaurants %}
            <div class="restaurant-card">
                <h2>{{ restaurant.name }}</h2>
                <p>Cuisine: {{ restaurant.cuisine }}</p>
                <p>Rating: {{ restaurant.rating }}</p>
                <a href="{{ url_for('restaurant_menu', restaurantid=restaurant.restaurant_id) }}">
                    <button id="view_restaurant_button_{{ restaurant.restaurant_id }}">View Menu</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
