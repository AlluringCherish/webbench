<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews_page">
        <h1>Order Reviews</h1>
        <div id="reviews_list">
            {% for review_id, review in reviews.items() %}
            <div class="review">
                <p>Customer: {{ review.customer_name }}</p>
                <p>Rating: {{ review.rating }}</p>
                <p>Review: {{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
            </div>
            {% endfor %}
        </div>
        <label for="filter_by_rating">Filter by Rating:</label>
        <select id="filter_by_rating" name="filter_by_rating">
            {% for rating in rating_filter_options %}
            <option value="{{ rating }}">{{ rating }}</option>
            {% endfor %}
        </select>
        <a href="{{ url_for('write_review') }}">
            <button id="write_review_button">Write Review</button>
        </a>
        <a href="{{ url_for('dashboard') }}">
            <button id="back_to_dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
