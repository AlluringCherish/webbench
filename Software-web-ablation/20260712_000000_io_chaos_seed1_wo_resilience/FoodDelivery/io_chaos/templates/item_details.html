<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item detail</title>
</head>
<body>
    <div id="item_details_page">
        <h1 id="item_name">{{ item.item_name }}</h1>
        <div id="item_description">{{ item.description }}</div>
        <div id="item-price">Price: ${{ item.price }}</div>
        <div>
            <label for="quantity_input">Quantity:</label>
            <input type="text" id="quantity_input" name="quantity_input" value="1">
        </div>
        <button id="add_to_cart_button" onclick="addToCart()">Add to Cart</button>
    </div>
    <script>
        function addToCart() {
            const quantity = document.getElementById('quantity_input').value;
            const itemId = '{{ item.item_id }}';
            // AJAX GET request to add item with quantity
            fetch(`/cart/update?item_id=${itemId}&action=add&quantity=${quantity}`)
            .then(response => {
                if(response.ok) {
                    alert('Item added to cart');
                } else {
                    alert('Failed to add item to cart');
                }
            });
        }
    </script>
</body>
</html>
