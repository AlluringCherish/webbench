<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Order</title>
</head>
<body>
    <div id="active_orders_page">
        <h1>Active Order</h1>
        <label for="status_filter">Filter Status:</label>
        <select id="status_filter" name="status_filter">
            {% for status in status_filter_options %}
            <option value="{{ status }}">{{ status }}</option>
            {% endfor %}
        </select>
        <div id="orders_list">
            {% for order_id, order in active_orders.items() %}
            <div class="order">
                <p>Order ID: {{ order_id }}</p>
                <p>Customer: {{ order.customer_name }}</p>
                <p>Status: {{ order.status }}</p>
                <a href="{{ url_for('order_tracking', order_id=order_id) }}">
                    <button id="track_order_button_{{ order_id }}">Track Order</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard') }}">
            <button id="back_to_dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
