<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery DashBoard</title>
</head>
<body>
    <div id="dashboard_page">
        <h1>Food Delivery DashBoard</h1>
        <div id="featured_restaurants">
            {% for restaurant in featured_restaurants %}
            <div>
                <h2>{{ restaurant.name }}</h2>
                <p>Cuisine: {{ restaurant.cuisine }}</p>
                <p>Rating: {{ restaurant.rating }}</p>
            </div>
            {% endfor %}
        </div>
        <div>
            <h2>Popular Cuisines</h2>
            <ul>
                {% for cuisine in popular_cuisines %}
                <li>{{ cuisine }}</li>
                {% endfor %}
            </ul>
        </div>
        <div>
            <a href="{{ url_for('restaurants_listing') }}">
                <button id="browse_restaurants_button">Browse Restaurants</button>
            </a>
            <a href="{{ url_for('shopping_cart') }}">
                <button id="view_cart_button">View Cart</button>
            </a>
            <a href="{{ url_for('active_orders') }}">
                <button id="active_orders_button">Active Orders</button>
            </a>
        </div>
    </div>
</body>
</html>
