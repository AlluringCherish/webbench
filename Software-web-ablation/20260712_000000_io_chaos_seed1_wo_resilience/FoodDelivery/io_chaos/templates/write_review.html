<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write_review_page">
        <h1>Write a Review</h1>
        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="restaurant_select">Restaurant:</label>
            <select id="restaurant_select" name="restaurant_select">
                {% for restaurant in restaurants %}
                <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="customer_name_input">Your Name:</label>
            <input type="text" id="customer_name_input" name="customer_name_input" required>
            <br>
            <label for="rating_select">Rating:</label>
            <select id="rating_select" name="rating_select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
            <br>
            <label for="review_text_area">Review:</label>
            <textarea id="review_text_area" name="review_text_area" required></textarea>
            <br>
            <button id="submit_review_button" type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
