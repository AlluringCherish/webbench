<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shoping Cart</title>
</head>
<body>
    <div id="cart_page">
        <h1>Shoping Cart</h1>
        <form method="POST" action="{{ url_for('update_cart') }}">
            <table id="cart_items_table">
                <thead>
                    <tr><th>Item</th><th>Quantity</th><th>Price</th><th>Actions</th></tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.name }}</td>
                        <td>
                            <input type="text" id="update_quantity_{{ item.item_id }}" name="quantity_{{ item.item_id }}" value="{{ item.quantity }}">
                        </td>
                        <td>${{ item.price }}</td>
                        <td>
                            <button type="submit" name="remove" value="{{ item.item_id }}" id="remove_item_button_{{ item.item_id }}">Remove</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>
        <div>
            <span id="total_amount">Total: ${{ total_amount }}</span>
        </div>
        <a href="{{ url_for('checkout') }}">
            <button id="proceed_checkout_button">Proceed to Checkout</button>
        </a>
    </div>
</body>
</html>
