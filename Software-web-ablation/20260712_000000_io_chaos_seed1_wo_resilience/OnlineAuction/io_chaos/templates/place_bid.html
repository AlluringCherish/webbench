<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid</h1>
        <div id="auction-name">{{ auction.item_name }}</div>
        <div id="minimum-bid">Minimum Bid: ${{ '%.2f' | format(auction.minimum_bid) }}</div>
        {% if success is defined %}
            {% if success %}
            <p>Bid placed successfully.</p>
            {% else %}
            <p style="color:red;">{{ error_message }}</p>
            {% endif %}
        {% endif %}
        <form action="{{ url_for('place_bid', auction_id=auction.auction_id) }}" method="POST">
            <input type="text" id="bidder-name" name="bidder_name" placeholder="Your name" required>
            <input type="number" step="0.01" id="bid-amount" name="bid_amount" placeholder="Bid amount" required min="{{ auction.minimum_bid }}">
            <button type="submit" id="submit-bid-button">Submit Bid</button>
        </form>
    </div>
</body>
</html>
