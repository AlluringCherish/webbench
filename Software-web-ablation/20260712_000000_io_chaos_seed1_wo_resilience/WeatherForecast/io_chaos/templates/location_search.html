<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <h1 id="search-page">Search Locations</h1>
        <form method="post" action="">
            <input type="text" id="location-search-input" name="location_search_input" value="{{ search_query }}" placeholder="Search by city or coordinates">
            <button type="submit">Search</button>
        </form>
        <div id="search-results">
            {% for location in search_results %}
            <div class="search-result-item">
                <span>{{ location.location_name }}</span>
                <button id="select-location-button-{{ location.location_id }}">Select</button>
            </div>
            {% endfor %}
        </div>
        <div id="saved-locations-list">
            <h2>Saved Locations</h2>
            <ul>
                {% for saved in saved_locations %}
                <li>{{ saved.location_name }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
