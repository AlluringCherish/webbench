<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1 id="settings-page">Settings</h1>
        <form method="post">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                {% for unit in temperature_units %}
                <option value="{{ unit }}" {% if unit == temperature_units[0] and unit == temperature_unit %}selected{% elif unit == temperature_unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for location in saved_locations %}
                <option value="{{ location.location_id }}" {% if location.location_id == default_location_id %}selected{% endif %}>{{ location.location_name }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" {% if alert_notifications_enabled %}checked{% endif %}>
            <br>
            <button id="save-settings-button" type="submit">Save Settings</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
