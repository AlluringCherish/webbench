<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="dashboard-page">Weather Dashboard</h1>
        <div id="current-weather-summary">
            <h2>{{ current_weather.location_name }}</h2>
            <p>Temperature: {{ current_weather.temperature }}</p>
            <p>Condition: {{ current_weather.condition }}</p>
            <p>Humidity: {{ current_weather.humidity }}%</p>
            <p>Wind Speed: {{ current_weather.wind_speed }}</p>
            <p>Last Updated: {{ current_weather.last_updated }}</p>
        </div>
        <button id="search-location-button" onclick="window.location.href='{{ url_for('location_search_page') }}'">Search Locations</button>
        <button id="view-forecast-button" onclick="window.location.href='{{ url_for('weekly_forecast_page') }}'">View Forecast</button>
        <button id="view-alerts-button" onclick="window.location.href='{{ url_for('weather_alerts_page') }}'">View Alerts</button>
    </div>
</body>
</html>
