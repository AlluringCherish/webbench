<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <div id="saved-locations-page">
        <h1 id="saved-locations-page">Saved Locations</h1>
        <table id="locations-table" border="1">
            <thead>
                <tr>
                    <th>Location Name</th>
                    <th>Temperature</th>
                    <th>Condition</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for location in saved_locations %}
                <tr>
                    <td>{{ location.location_name }}</td>
                    <td>{{ location.temperature if location.temperature is not none else 'N/A' }}</td>
                    <td>{{ location.condition }}</td>
                    <td>
                        <button id="view-location-weather-{{ location.location_id }}">View Weather</button>
                        <form method="post" action="{{ url_for('remove_saved_location', location_id=location.location_id) }}" style="display:inline;">
                            <button id="remove-location-button-{{ location.location_id }}" type="submit">Remove</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="add-new-location-button">Add New Location</button>
    </div>
</body>
</html>
