<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>
        <div id="featured-movies">
            {% for movie in featured_movies %}
            <div class="featured-movie">
                <h2>{{ movie.title }}</h2>
                <div>Genre: {{ movie.genre }}</div>
                <div>Rating: {{ movie.rating }}</div>
                <div>Duration: {{ movie.duration }} minutes</div>
            </div>
            {% endfor %}
        </div>
        <button id="browse-movies-button" onclick="location.href='{{ url_for('movie_catalog') }}'">Browse Movies</button>
        <button id="view-bookings-button" onclick="location.href='{{ url_for('booking_history') }}'">View Bookings</button>
        <button id="showtimes-button" onclick="location.href='{{ url_for('select_showtime', movie_id=featured_movies[0].movie_id if featured_movies else None) }}'">Showtimes</button>
    </div>
</body>
</html>
