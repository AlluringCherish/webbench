<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>

        <select id="theater-location-filter" name="location_filter">
            <option value="">All Locations</option>
            {% set locations = theaters | map(attribute='location') | unique %}
            {% for location in locations %}
                <option value="{{ location }}">{{ location }}</option>
            {% endfor %}
        </select>

        <div id="theaters-list">
            {% for theater in theaters %}
            <div class="theater-entry">
                <h2>{{ theater.theater_name }}</h2>
                <div>Location: {{ theater.location }}</div>
                <div>City: {{ theater.city }}</div>
                <div>Screens: {{ theater.screens }}</div>
                <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
