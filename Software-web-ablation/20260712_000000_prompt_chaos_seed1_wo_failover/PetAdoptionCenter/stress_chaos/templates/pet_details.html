<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" id="meta-charset">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="meta-viewport">
    <title>Pet Details</title>
</head>
<body>
    <div id="pet-details-page">
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <h1>Pet Details</h1>
        <p id="pet-name">{{ pet.name }}</p>
        <p id="pet-age">{{ pet.age }}</p>
        <p id="pet-size">{{ pet.size }}</p>
        <p id="pet-gender">{{ pet.gender }}</p>
        <p id="pet-description">{{ pet.description }}</p>
        <button id="adopt-button" onclick="window.location.href='{{ url_for('adoption_application', pet_id=pet.pet_id) }}'">Adopt</button>
    </div>
</body>
</html>
