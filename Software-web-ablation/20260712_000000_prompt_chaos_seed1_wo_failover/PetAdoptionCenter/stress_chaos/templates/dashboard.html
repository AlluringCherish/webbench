<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" id="meta-charset">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="meta-viewport">
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <h1>Dashboard</h1>
        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div class="featured-pet" id="featured-pet-{{ pet.pet_id }}">
                <h2>{{ pet.name }}</h2>
                <p>Species: {{ pet.species }}</p>
                <button onclick="location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="browse-pets-button" onclick="window.location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>
    </div>
</body>
</html>
