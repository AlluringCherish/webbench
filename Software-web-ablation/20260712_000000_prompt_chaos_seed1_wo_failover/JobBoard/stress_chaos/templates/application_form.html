<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application</title>
</head>
<body>
<div id="application-form-page">
    <h1>Application for {{ job.title }}</h1>
    <form action="{{ url_for('application_form', job_id=job.job_id) }}" method="post" enctype="multipart/form-data">
        <label for="applicant-name">Applicant Name:</label>
        <input type="text" id="applicant-name" name="applicant_name" required>

        <label for="applicant-email">Applicant Email:</label>
        <input type="email" id="applicant-email" name="applicant_email" required>

        <label for="cover-letter">Cover Letter:</label>
        <textarea id="cover-letter" name="cover_letter" required></textarea>

        <label for="resume-upload">Upload Resume:</label>
        <input type="file" id="resume-upload" name="resume_file" required>

        <button id="submit-application-button" type="submit">Submit Application</button>
    </form>
</div>
</body>
</html>
