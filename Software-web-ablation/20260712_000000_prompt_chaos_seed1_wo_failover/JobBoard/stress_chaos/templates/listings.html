<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="listings-page">
    <h1>{{ page_title }}</h1>

    <input type="text" id="search-input" name="search" placeholder="Search jobs...">

    <select id="category-filter" name="category">
        <option value="">All Categories</option>
        {% for category in categories %}
        <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
    </select>

    <select id="location-filter" name="location">
        <option value="">All Locations</option>
        {% for location in locations %}
        <option value="{{ location }}">{{ location }}</option>
        {% endfor %}
    </select>

    <div id="jobs-grid">
        {% for job in jobs %}
        <div class="job-card">
            <h2>{{ job.title }}</h2>
            <p>Company: {{ job.company_name }}</p>
            <p>Location: {{ job.location }}</p>
            <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
            <a href="{{ url_for('job_details', job_id=job.job_id) }}"><button id="view-job-button-{{ job.job_id }}">Details</button></a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
