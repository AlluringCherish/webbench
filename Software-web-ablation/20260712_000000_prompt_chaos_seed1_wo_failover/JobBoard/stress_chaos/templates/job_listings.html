<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
<div id="listings-page">
    <h1>Job Listings</h1>
    <input type="text" id="search-input" placeholder="Search jobs">
    <select id="category-filter">
        <option value="">All Categories</option>
        {% for category in categories %}
        <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
    </select>
    <select id="location-filter">
        <option value="">All Locations</option>
        {% for location in locations %}
        <option value="{{ location }}">{{ location }}</option>
        {% endfor %}
    </select>
    <div id="jobs-grid">
        {% for job in jobs %}
        <div class="job-card">
            <h2>{{ job.title }}</h2>
            <p>{{ job.company_name }} - {{ job.location }}</p>
            <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
            <button id="view-job-button-{{ job.job_id }}" onclick="location.href='{{ url_for('job_details', job_id=job.job_id) }}'">Details</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
