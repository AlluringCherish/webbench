<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Details</title>
</head>
<body>
<div id="tracking-page">
    <h1>My Applications</h1>
    <select id="status-filter">
        <option value="All">All</option>
        <option value="Applied">Applied</option>
        <option value="Under Review">Under Review</option>
        <option value="Rejected">Rejected</option>
    </select>
    <ul>
        {% for app in applications %}
        <li>
            {{ app.job_title }} - {{ app.status }} - {{ app.applied_date }}
            <button onclick="location.href='{{ url_for('application_details', app_id=app.application_id) }}'">View</button>
        </li>
        {% endfor %}
    </ul>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
