<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
</head>
<body>
<div id="job-details-page">
    <h1 id="job-title">{{ job.title }}</h1>
    <h2 id="company-name">{{ company.company_name }}</h2>
    <div id="job-description">
        <p>{{ job.description }}</p>
    </div>
    <div id="salary-range">
        <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
    </div>
    <button id="apply-now-button" onclick="location.href='{{ url_for('application_form', job_id=job.job_id) }}'">Apply Now</button>
</div>
</body>
</html>
