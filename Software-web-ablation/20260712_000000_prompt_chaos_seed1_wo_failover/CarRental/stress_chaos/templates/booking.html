<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<header>
    <h1>Car Rental</h1>
    <nav id="main-nav">
        <button id="dashboard-button" onclick="location.href='{{ url_for('dashboard_page') }}'">Dashboard</button>
        <button id="vehicle-search-button" onclick="location.href='{{ url_for('vehicle_search_page') }}'">Search Vehicles</button>
        <button id="my-reservations-button" onclick="location.href='{{ url_for('reservation_management_page') }}'">My Reservations</button>
    </nav>
</header>
<main id="main-container">
    <h1>{{ page_title }}</h1>

    <form method="POST" id="booking-form">
        <input type="hidden" name="vehicle_id" value="{{ vehicle.vehicle_id }}">
        
        <label for="pickup-location">Pickup Location:</label>
        <select id="pickup-location" name="pickup_location" required>
            {% for loc in locations %}
            <option value="{{ loc.location_id }}"{% if loc.location_id == selected_pickup_location %} selected{% endif %}>{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="dropoff-location">Dropoff Location:</label>
        <select id="dropoff-location" name="dropoff_location" required>
            {% for loc in locations %}
            <option value="{{ loc.location_id }}"{% if loc.location_id == selected_dropoff_location %} selected{% endif %}>{{ loc.city }}</option>
            {% endfor %}
        </select>

        <label for="pickup-date">Pickup Date:</label>
        <input type="date" id="pickup-date" name="pickup_date" value="{{ pickup_date }}" required>

        <label for="dropoff-date">Dropoff Date:</label>
        <input type="date" id="dropoff-date" name="dropoff_date" value="{{ dropoff_date }}" required>

        <label for="special-requests">Special Requests:</label><br>
        <textarea id="special-requests" name="special_requests" rows="4" cols="50">{{ special_requests or '' }}</textarea>

        <button type="submit" id="confirm-booking-button">Confirm Booking</button>
    </form>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</main>
<footer>
    <p>&copy; 2024 Car Rental App</p>
</footer>
</body>
</html>
