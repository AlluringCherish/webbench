<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificates</title>
</head>
<body>
    <div id="main-container">
        <h1>Certificates</h1>
        <section id="certificates-grid">
            <ul>
            {% for certificate in certificates %}
                <li id="certificate-{{ certificate.certificate_id }}">
                    <span>{{ certificate.title }} - Issued on {{ certificate.issue_date }}</span>
                    {% if certificate.earned %}
                        <span>(Earned)</span>
                    {% else %}
                        <span>(Not Earned)</span>
                    {% endif %}
                </li>
            {% else %}
                <li>No certificates available.</li>
            {% endfor %}
            </ul>
        </section>
        <nav id="navigation">
            <a href="{{ url_for('dashboard_view') }}" id="back-to-dashboard">Back to Dashboard</a>
            <a href="{{ url_for('course_catalog_view') }}" id="back-to-catalog">Back to Catalog</a>
        </nav>
    </div>
</body>
</html>
