<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <div id="main-container">
        <h1 id="welcome-message">Welcome, {{ fullname }}</h1>
        <nav id="navigation">
            <a href="{{ url_for('course_catalog_view') }}" id="browse-courses-button">Browse Courses</a> |
            <a href="{{ url_for('my_courses_view') }}" id="my-courses-button">My Courses</a> |
            <a href="{{ url_for('dashboard_view') }}" id="dashboard-link">Dashboard</a> |
            <a href="{{ url_for('profile_view') }}" id="profile-link">Profile</a>
        </nav>
        <section id="enrolled-courses">
            <h2>Enrolled Courses</h2>
            <ul>
            {% for course in enrolled_courses %}
                <li>
                    <span>{{ course.title }} - {{ course.category }}</span>
                    <a href="{{ url_for('course_details_view', course_id=course.course_id) }}" id="view-course-button-{{ course.course_id }}">View Details</a>
                </li>
            {% else %}
                <li>No courses enrolled yet.</li>
            {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
