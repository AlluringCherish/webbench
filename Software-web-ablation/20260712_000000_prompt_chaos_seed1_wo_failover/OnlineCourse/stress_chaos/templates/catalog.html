<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Courses</title>
</head>
<body>
    <div id="main-container">
        <h1>Courses</h1>
        <section id="course-grid">
            <ul>
            {% for course in courses %}
                <li id="course-{{ course.course_id }}">
                    <h2>{{ course.title }}</h2>
                    <p>{{ course.description }}</p>
                    <form method="POST" action="{{ url_for('enroll_course', course_id=course.course_id) }}">
                        <button type="submit" id="enroll-button-{{ course.course_id }}">Enroll</button>
                    </form>
                </li>
            {% else %}
                <li>No courses available.</li>
            {% endfor %}
            </ul>
        </section>
        <nav id="navigation">
            <a href="{{ url_for('dashboard_view') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
    </div>
</body>
</html>
