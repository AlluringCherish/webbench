<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="main-container">
        <h1>Submit Assignment</h1>
        <section id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>Due Date: {{ assignment.due_date }}</p>
            <p>Status: {{ 'Submitted' if assignment.submitted else 'Not Submitted' }}</p>
        </section>
        <form method="POST" action="{{ url_for('submit_assignment_post', assignment_id=assignment.assignment_id) }}">
            <textarea id="submission-text" name="submission_text" required>{{ submission_text or '' }}</textarea>
            <button type="submit" id="submit-assignment-button-{{ assignment.assignment_id }}">Submit</button>
        </form>
        <nav id="navigation">
            <a href="{{ url_for('my_assignments_view') }}" id="back-to-assignments">Back to Assignments</a> |
            <a href="{{ url_for('dashboard_view') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
    </div>
</body>
</html>
