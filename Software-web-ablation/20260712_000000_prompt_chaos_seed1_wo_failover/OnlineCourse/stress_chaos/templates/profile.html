<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <div id="main-container">
        <h1>Profile</h1>
        <p id="profile-fullname">Full Name: {{ fullname }}</p>
        <p id="profile-email">Email: {{ email }}</p>
        <form method="POST" action="{{ url_for('update_profile') }}">
            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>
        <nav id="navigation">
            <a href="{{ url_for('dashboard_view') }}" id="back-to-dashboard">Back to Dashboard</a> |
            <a href="{{ url_for('course_catalog_view') }}" id="back-to-catalog">Back to Catalog</a>
        </nav>
    </div>
</body>
</html>
