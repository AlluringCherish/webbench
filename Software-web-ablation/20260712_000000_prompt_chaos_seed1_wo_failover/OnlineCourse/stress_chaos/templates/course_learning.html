<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
    <div id="main-container">
        <h1>{{ course.title }}</h1>
        <section id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <p>{{ current_lesson.content }}</p>
            {% if not current_lesson.is_completed %}
                <form method="POST" action="{{ url_for('mark_lesson_complete', lesson_id=current_lesson.lesson_id) }}">
                    <button type="submit" id="mark-complete-button">Mark as Complete</button>
                </form>
            {% else %}
                <span>Lesson Completed</span>
                <a href="{{ url_for('course_learning_view', course_id=course.course_id) }}" id="continue-learning-button-{{ course.course_id }}">Continue Learning</a>
            {% endif %}
        </section>
        <nav id="navigation">
            <a href="{{ url_for('course_details_view', course_id=course.course_id) }}" id="back-to-course-details">Back to Course Details</a> |
            <a href="{{ url_for('dashboard_view') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
    </div>
</body>
</html>
