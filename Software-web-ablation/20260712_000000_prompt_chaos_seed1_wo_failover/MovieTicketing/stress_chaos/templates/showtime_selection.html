<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showtime Selection</title>
</head>
<body>
    <div id="showtime-selection-container">
        <h1>Select Showtime for {{ movie_title }}</h1>
        <div id="showtimes-list">
            {% for showtime in showtimes %}
            <div id="showtime-{{ showtime.showtime_id }}" class="showtime-card">
                <div id="showtime-date-{{ showtime.showtime_id }}">Date: {{ showtime.showtime_date }}</div>
                <div id="showtime-time-{{ showtime.showtime_id }}">Time: {{ showtime.showtime_time }}</div>
                <div id="showtime-price-{{ showtime.showtime_id }}">Price: ${{ showtime.price }}</div>
                <div id="showtime-available-seats-{{ showtime.showtime_id }}">Available Seats: {{ showtime.available_seats }}</div>
                <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="window.location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Select</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-movie-details" onclick="window.location.href='{{ url_for('movie_details', movie_id=movie_id) }}'">Back to Movie Details</button>
    </div>
</body>
</html>
