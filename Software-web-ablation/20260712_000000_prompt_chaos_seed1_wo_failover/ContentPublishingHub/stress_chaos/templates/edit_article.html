<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article</title>
</head>
<body id="edit-article-page">
    <h1 id="edit-article-title">Edit Article</h1>
    <form method="POST" action="{{ url_for('article_edit', article_id=article_id) }}">
        <label for="article-summary">Title:</label>
        <input type="text" id="article-summary" name="summary" value="{{ summary }}">
        <br>
        <label for="article-content">Content:</label>
        <textarea id="article-content" name="content" required>{{ content }}</textarea>
        <br>
        <button type="submit" id="btn-save-article">Save</button>
        <a href="{{ url_for('my_articles') }}" id="btn-cancel-edit">Cancel</a>
    </form>
    <a href="{{ url_for('article_versions', article_id=article_id) }}" id="btn-version-history">View Version History</a>
</body>
</html>
