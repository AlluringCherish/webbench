<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics</title>
</head>
<body id="article-analytics-page">
    <h1 id="article-analytics-title">Article Analytics</h1>
    <div id="analytics-summary">{{ analytics_summary }}</div>
    <div id="analytics-details">
        {% for entry in analytics_entries %}
            <div class="analytics-entry">
                <strong>{{ entry.metric }}</strong>: {{ entry.value }}
            </div>
        {% endfor %}
    </div>
    <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
</body>
</html>
