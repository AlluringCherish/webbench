<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar</title>
</head>
<body id="content-calendar-page">
    <h1 id="content-calendar-title">Content Calendar</h1>
    <div id="calendar-list">
        {% for item in calendar_items %}
        <div class="calendar-item">
            <span class="calendar-date">{{ item.date }}</span>: <span class="calendar-article">{{ item.article_title }}</span>
        </div>
        {% endfor %}
    </div>
    <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
</body>
</html>
