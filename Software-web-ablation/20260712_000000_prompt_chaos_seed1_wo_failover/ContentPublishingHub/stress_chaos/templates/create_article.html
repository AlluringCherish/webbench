<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article</title>
</head>
<body id="create-article-page">
    <h1 id="create-article-title">Create New Article</h1>
    <form method="POST" action="{{ url_for('article_create') }}">
        <label for="article-id">Article ID:</label>
        <input type="text" id="article-id" name="article_id" required>
        <br>
        <label for="article-summary">Title:</label>
        <input type="text" id="article-summary" name="summary">
        <br>
        <label for="article-content">Content:</label>
        <textarea id="article-content" name="content" required></textarea>
        <br>
        <button type="submit" id="btn-submit-article">Submit</button>
        <a href="{{ url_for('dashboard') }}" id="btn-cancel">Cancel</a>
    </form>
</body>
</html>
