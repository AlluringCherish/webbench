<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles</title>
</head>
<body id="published-articles-page">
    <h1 id="published-articles-title">Published Articles</h1>
    <ul id="published-articles-list">
        {% for article in published_articles %}
        <li>
            <a href="{{ url_for('article_edit', article_id=article.id) }}" class="article-link">{{ article.title }}</a> 
            - <span class="article-published-date">{{ article.published_date }}</span>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
</body>
</html>
