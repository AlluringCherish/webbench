<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles</title>
</head>
<body id="my-articles-page">
    <h1 id="my-articles-title">My Articles</h1>
    <ul id="articles-list">
        {% for article in articles %}
        <li>
            <a href="{{ url_for('article_edit', article_id=article.id) }}" class="article-link">{{ article.title }}</a> 
            - <span class="article-status">{{ article.status }}</span>
        </li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
</body>
</html>
