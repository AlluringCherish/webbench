<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Article Catalog</h1>
        <input type="text" id="search-input" name="search" placeholder="Search Articles">
        <select id="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_name }}">{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <div id="articles-grid">
            {% for article in articles %}
            <div>
                <span>{{ article.title }} by {{ article.author }} on {{ article.date }}</span>
                <button id="view-details-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details_page', article_id=article.article_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
