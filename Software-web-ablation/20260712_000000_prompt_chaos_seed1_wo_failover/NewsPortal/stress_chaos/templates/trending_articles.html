<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Articles</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Articles</h1>
        <div id="trending-articles-list">
            {% for article in trending_articles %}
            <div>
                <span>{{ article.article_title }} ({{ article.category }}) - Views: {{ article.view_count }} - Period: {{ article.period }}</span>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details_page', article_id=article.article_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
