<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">{{ query }}</div>
        <div id="results-list">
            {% if results %}
                {% for result in results %}
                <div>
                    <a href="{{ url_for('article_details_page', article_id=result.article_id) }}">{{ result.title }}</a><br>
                    <p>{{ result.excerpt }}</p>
                </div>
                {% endfor %}
            {% else %}
                <div id="no-results-message">No results found.</div>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
