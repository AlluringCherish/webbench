<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <main id="settings-page">
        <h1>Settings</h1>
        <form method="POST" action="{{ url_for('settings') }}">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                {% for unit in temperature_units %}
                <option value="{{ unit }}" {% if unit == selected_unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>
            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for loc in saved_locations %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == default_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>
            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" {% if alert_notifications_enabled %}checked{% endif %}>
            <button id="save-settings-button" type="submit">Save Settings</button>
        </form>
        <h2>Saved Locations</h2>
        <ul>
            {% for loc in saved_locations %}
            <li>{{ loc.location_name }}</li>
            {% endfor %}
        </ul>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </main>
</body>
</html>
