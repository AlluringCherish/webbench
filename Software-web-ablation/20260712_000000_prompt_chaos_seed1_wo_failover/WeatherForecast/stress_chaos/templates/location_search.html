<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Location Search</title>
</head>
<body>
    <main id="search-page">
        <h1>Location Search</h1>
        <form method="POST" action="{{ url_for('location_search') }}">
            <input id="location-search-input" name="query" placeholder="Search locations..."/>
            <button type="submit">Search</button>
        </form>
        <ul id="search-results">
            {% for res in search_results %}
            <li>{{ res.location_name }} (ID: {{ res.location_id }}) - Lat: {{ res.latitude }}, Lon: {{ res.longitude }}</li>
            {% endfor %}
        </ul>
        <div id="saved-locations-list">
            <h2>Saved Locations</h2>
            <ul>
                {% for loc in saved_locations %}
                <li>{{ loc.location_name }}</li>
                {% endfor %}
            </ul>
        </div>
    </main>
</body>
</html>
