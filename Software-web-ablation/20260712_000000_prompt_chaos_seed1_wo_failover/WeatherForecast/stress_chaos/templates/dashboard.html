<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <main id="dashboard-page">
        <h1>Dashboard</h1>
        <button id="search-location-button" onclick="location.href='{{ url_for('location_search') }}'">Search Location</button>
        <button id="view-forecast-button" onclick="location.href='{{ url_for('weekly_forecast') }}'">Weekly Forecast</button>
        <button id="view-alerts-button" onclick="location.href='{{ url_for('weather_alerts') }}'">Weather Alerts</button>
        <section>
            {% for loc in saved_locations %}
            <div>
                <p>Location ID: {{ loc.location_id }}</p>
                <p>Location Name: {{ loc.location_name }}</p>
                <p>Condition: {{ loc.condition }}</p>
            </div>
            {% endfor %}
        </section>
    </main>
</body>
</html>
