<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <main id="current-weather-page">
        <h1>Current Weather</h1>
        <div id="location-name">Location: {{ location_name }}</div>
        <div id="temperature-display">Temperature: {{ temperature }}</div>
        <div id="weather-condition">Condition: {{ condition }}</div>
        <div id="humidity-info">Humidity: {{ humidity }}%</div>
        <div id="wind-speed-info">Wind Speed: {{ wind_speed }} km/h</div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </main>
</body>
</html>
