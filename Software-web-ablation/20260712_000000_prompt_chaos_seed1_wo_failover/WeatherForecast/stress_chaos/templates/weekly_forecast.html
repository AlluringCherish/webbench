<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Forecast</title>
</head>
<body>
    <main id="weekly-forecast-page">
        <h1>Weekly Forecast</h1>
        <form method="POST" action="{{ url_for('weekly_forecast') }}">
            <label for="location-filter">Location:</label>
            <select id="location-filter" name="location_filter" onchange="this.form.submit()">
                {% for loc in locations %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == selected_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>
        </form>
        <table id="forecast-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>High Temp</th>
                    <th>Low Temp</th>
                    <th>Condition</th>
                </tr>
            </thead>
            <tbody>
                {% for forecast in forecasts %}
                <tr>
                    <td>{{ forecast.date }}</td>
                    <td>{{ forecast.high_temp }}</td>
                    <td>{{ forecast.low_temp }}</td>
                    <td>{{ forecast.condition }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </main>
</body>
</html>
