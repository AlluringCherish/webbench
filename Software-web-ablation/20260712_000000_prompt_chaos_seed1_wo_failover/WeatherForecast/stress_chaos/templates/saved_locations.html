<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <main id="saved-locations-page">
        <h1>Saved Locations</h1>
        <div id="locations-list">
            {% for loc in saved_locations %}
            <div>
                <p>{{ loc.location_name }}</p>
                <p>Temperature: {{ loc.temperature }}</p>
                <p>Condition: {{ loc.condition }}</p>
                <button id="view-location-weather-{{ loc.location_id }}" onclick="location.href='{{ url_for('current_weather', location_id=loc.location_id) }}'">View Weather</button>
                <form method="POST" action="{{ url_for('saved_locations') }}">
                    <button id="remove-location-button-{{ loc.location_id }}" type="submit">Remove</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <button id="add-new-location-button" onclick="location.href='{{ url_for('location_search') }}'">Add New Location</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </main>
</body>
</html>
