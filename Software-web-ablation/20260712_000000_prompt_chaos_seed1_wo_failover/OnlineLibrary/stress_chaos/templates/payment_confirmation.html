<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
<h1>Payment Confirmation</h1>
<p>Fine Amount: ${{ "%.2f"|format(fine.amount) }}</p>
<p>Status: {{ fine.status }}</p>

{% if payment_success %}
    <p>Payment was successful.</p>
{% else %}
    {% if fine.status == 'Unpaid' %}
    <form method="post" action="">
        <button type="submit">Pay Fine</button>
    </form>
    {% else %}
    <p>Fine has already been paid.</p>
    {% endif %}
{% endif %}

<p><a href="{{ url_for('user_profile') }}">Back to Profile</a></p>
</body>
</html>
