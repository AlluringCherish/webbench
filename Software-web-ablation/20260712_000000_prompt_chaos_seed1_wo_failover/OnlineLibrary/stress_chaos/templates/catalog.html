<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
<h1>Book Catalog</h1>
<ul>
    {% for book in books %}
        <li><a href="{{ url_for('book_details', book_id=book.book_id) }}">{{ book.title }}</a> by {{ book.author }}</li>
    {% else %}
        <li>No books available.</li>
    {% endfor %}
</ul>
<p><a href="{{ url_for('dashboard_page') }}">Back to Dashboard</a></p>
</body>
</html>
