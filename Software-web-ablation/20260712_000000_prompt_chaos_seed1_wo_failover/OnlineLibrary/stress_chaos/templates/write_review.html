<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if existing_review %}Edit Review{% else %}Write Review{% endif %}</title>
</head>
<body>
<h1>{% if existing_review %}Edit Review for {{ book.title }}{% else %}Write Review for {{ book.title }}{% endif %}</h1>
<form method="post" action="">
    <label for="rating">Rating (1-5):</label>
    <input type="number" id="rating" name="rating" min="1" max="5" value="{{ existing_review.rating if existing_review else '' }}" required><br><br>
    <label for="review_text">Review Text:</label><br>
    <textarea id="review_text" name="review_text" rows="4" cols="50">{{ existing_review.review_text if existing_review else '' }}</textarea><br><br>
    <button type="submit">Submit</button>
    <a href="{{ url_for('book_details', book_id=book.book_id) }}">Cancel</a>
</form>
</body>
</html>
