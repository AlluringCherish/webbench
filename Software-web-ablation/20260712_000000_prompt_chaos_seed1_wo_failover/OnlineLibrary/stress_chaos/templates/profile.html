<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<h1>My Profile</h1>
<form method="post" action="">
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value="{{ user.email }}" required>
    <button type="submit">Update Email</button>
</form>
<h2>Borrow History</h2>
<table border="1">
    <thead>
        <tr>
            <th>Book Title</th>
            <th>Borrow Date</th>
            <th>Return Date</th>
        </tr>
    </thead>
    <tbody>
        {% for entry in borrow_history %}
        <tr>
            <td>{{ entry.book_title }}</td>
            <td>{{ entry.borrow_date }}</td>
            <td>{{ entry.return_date }}</td>
        </tr>
        {% else %}
        <tr><td colspan="3">No borrow history found.</td></tr>
        {% endfor %}
    </tbody>
</table>
<p><a href="{{ url_for('dashboard_page') }}">Back to Dashboard</a></p>
</body>
</html>
