<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cancel Reservation</title>
</head>
<body>
{% if cancel_success %}
    <p>Reservation {{ reservation_id }} was cancelled successfully.</p>
{% else %}
    <p>Reservation {{ reservation_id }} could not be cancelled because it was already cancelled.</p>
{% endif %}
<p><a href="{{ url_for('my_reservations') }}">Back to My Reservations</a></p>
</body>
</html>
