<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
<h1>My Reviews</h1>
<table border="1">
    <thead>
        <tr>
            <th>Book Title</th>
            <th>Rating</th>
            <th>Review</th>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for review in reviews %}
        <tr>
            <td>{{ review.book_title }}</td>
            <td>{{ review.rating }}</td>
            <td>{{ review.review_text }}</td>
            <td>{{ review.review_date }}</td>
            <td>
                <a href="{{ url_for('edit_review', review_id=review.review_id) }}">Edit</a>
                <form method="post" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% else %}
        <tr><td colspan="5">No reviews found.</td></tr>
        {% endfor %}
    </tbody>
</table>
<p><a href="{{ url_for('dashboard_page') }}">Back to Dashboard</a></p>
</body>
</html>
