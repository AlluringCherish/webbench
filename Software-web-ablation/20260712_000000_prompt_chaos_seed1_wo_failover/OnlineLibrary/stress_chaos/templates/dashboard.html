<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<h1>Hello, {{ username }}!</h1>
<h2>Featured Books</h2>
<ul>
    {% for book in featured_books %}
        <li><a href="{{ url_for('book_details', book_id=book.book_id) }}">{{ book.title }}</a> by {{ book.author }} (Rating: {{ book.avg_rating }})</li>
    {% else %}
        <li>No featured books available.</li>
    {% endfor %}
</ul>

<p><a href="{{ url_for('book_catalog') }}">View All Books</a></p>
<p><a href="{{ url_for('user_profile') }}">My Profile</a></p>
<p><a href="{{ url_for('my_borrowings') }}">My Borrowings</a></p>
<p><a href="{{ url_for('my_reservations') }}">My Reservations</a></p>
<p><a href="{{ url_for('my_reviews') }}">My Reviews</a></p>
</body>
</html>
