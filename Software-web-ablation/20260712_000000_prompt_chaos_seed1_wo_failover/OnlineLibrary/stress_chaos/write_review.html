<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <h1>Write Review</h1>
    <div id="book-info-display">
        <p>Title: {{ book.title }}</p>
        <p>Author: {{ book.author }}</p>
    </div>
    <form action="{{ url_for('write_review', book_id=book.book_id) }}" method="POST">
        {{ form.hidden_tag() }}
        <textarea name="review_text" id="review-text" required>{{ existing_review.review_text if existing_review else '' }}</textarea>
        <button type="submit" id="submit-review-button">Submit Review</button>
    </form>
    <button id="back-to-book" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
</body>
</html>
