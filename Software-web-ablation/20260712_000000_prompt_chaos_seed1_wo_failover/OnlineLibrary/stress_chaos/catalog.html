<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <h1>Book Catalog</h1>
    <table id="reservations-table">
        <thead>
            <tr>
                <th id="header-title">Title</th>
                <th id="header-author">Author</th>
                <th id="header-genre">Genre</th>
                <th id="header-publisher">Publisher</th>
                <th id="header-year">Year</th>
                <th id="header-actions">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.genre }}</td>
                <td>{{ book.publisher }}</td>
                <td>{{ book.year }}</td>
                <td><button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
