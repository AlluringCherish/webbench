<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <h1>My Reviews</h1>
    <div id="reviews-container">
        {% for review in my_reviews %}
        <div class="review" id="review-{{ review.review_id }}">
            <p>Rating: {{ review.rating }}</p>
            <p>{{ review.review_text }}</p>
            <button id="edit-review-button-{{ review.review_id }}" onclick="location.href='{{ url_for('edit_review', review_id=review.review_id) }}'">Edit</button>
            <form action="{{ url_for('delete_review', review_id=review.review_id) }}" method="POST" style="display:inline;">
                <button id="delete-review-button-{{ review.review_id }}" type="submit">Delete</button>
            </form>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
