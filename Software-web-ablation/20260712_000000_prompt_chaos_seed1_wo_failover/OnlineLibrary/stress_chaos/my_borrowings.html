<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Borrows</title>
</head>
<body>
    <h1>My Borrowings</h1>
    <table id="borrowings-table">
        <thead>
            <tr>
                <th>Book Title</th>
                <th>Due Date</th>
                <th>Return Book</th>
            </tr>
        </thead>
        <tbody>
            {% for borrow in borrows %}
            <tr>
                <td>{{ borrow.book_title }}</td>
                <td>{{ borrow.due_date }}</td>
                <td>
                    <form action="{{ url_for('return_book', borrow_id=borrow.borrow_id) }}" method="POST">
                        <button type="submit" id="return-button">Return</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
