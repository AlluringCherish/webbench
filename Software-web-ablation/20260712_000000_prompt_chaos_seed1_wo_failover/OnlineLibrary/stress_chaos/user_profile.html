<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
</head>
<body>
    <h1>User Profile</h1>
    <div id="user-info">
        <p>Email: {{ user.email }}</p>
        <p>Phone: {{ user.phone }}</p>
    </div>
    <div id="borrow-history">
        <h2>Borrow History</h2>
        <ul>
            {% for borrow in borrow_history %}
            <li>{{ borrow.book_title }} - {{ borrow.borrow_date }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="update-profile-button">Update Profile</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
