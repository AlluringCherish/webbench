<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <button id="browse-books-button" onclick="location.href='{{ url_for('book_catalog') }}'">Browse Books</button>
    <button id="my-borrows-button" onclick="location.href='{{ url_for('my_borrowings') }}'">My Borrows</button>
    <div>
        {% for book in featured_books %}
        <div id="featured-book-{{ book.book_id }}">
            <h3>{{ book.title }}</h3>
            <p>Author: {{ book.author }}</p>
        </div>
        {% endfor %}
    </div>
</body>
</html>
