<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reservations</title>
</head>
<body>
    <h1>Reservations</h1>
    <table id="reservations-table">
        <thead>
            <tr>
                <th>Reservation Date</th>
                <th>Status</th>
                <th>Cancel Reservation</th>
            </tr>
        </thead>
        <tbody>
            {% for reservation in reservations %}
            <tr>
                <td>{{ reservation.reservation_date }}</td>
                <td>{{ reservation.status }}</td>
                <td>
                    <form action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}" method="POST">
                        <button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="submit">Cancel</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</body>
</html>
