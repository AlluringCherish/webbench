<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-confirmation">
        <h1>Payment Confirmation</h1>
        <div id="fine-amount-display">
            Fine Amount: {{ fine.amount }}
        </div>
        <form method="POST">
            <button id="confirm-payment-button" type="submit">Confirm Payment</button>
        </form>
        <button id="back-to-profile" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
    </div>
</body>
</html>
