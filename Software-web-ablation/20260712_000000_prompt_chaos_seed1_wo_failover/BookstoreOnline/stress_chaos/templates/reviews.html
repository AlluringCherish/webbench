<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <h1>Customer Reviews</h1>
    <div id="reviews-list">
        <form method="GET" action="{{ url_for('reviews') }}">
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="filter_rating">
                <option value="" {% if not filter_rating %}selected{% endif %}>All Ratings</option>
                {% for r in range(1,6) %}
                    <option value="{{ r }}" {% if filter_rating|string == r|string %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="reviews-container">
            {% for review in reviews %}
            <div class="review" id="review-{{ review.review_id }}">
                <strong>{{ review.customer_name }}</strong> (Rating: {{ review.rating }})<br>
                {{ review.review_text }}<br>
                <em>{{ review.review_date }}</em>
            </div>
            {% endfor %}
        </div>
        <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
