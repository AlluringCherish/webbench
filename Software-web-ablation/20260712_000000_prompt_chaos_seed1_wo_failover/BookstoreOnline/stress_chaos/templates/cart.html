<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <h1>Shopping Cart</h1>
    <div id="cart-container">
        <form method="POST" action="{{ url_for('cart') }}">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr id="cart-item-{{ item.item_id }}">
                        <td>{{ item.title }}</td>
                        <td>
                            <input type="number" name="quantity_{{ item.item_id }}" value="{{ item.quantity }}" min="1">
                        </td>
                        <td>${{ item.price }}</td>
                        <td>${{ item.subtotal }}</td>
                        <td>
                            <button type="submit" name="remove_item" value="{{ item.item_id }}" id="remove-item-button-{{ item.item_id }}">Remove</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div id="total-amount">Total: ${{ total_amount }}</div>
            <button type="submit" name="action" value="update">Update Cart</button>
            <button type="submit" name="action" value="checkout">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
