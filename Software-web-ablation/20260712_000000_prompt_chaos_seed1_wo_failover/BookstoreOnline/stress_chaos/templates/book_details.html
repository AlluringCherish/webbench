<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <h1 id="book-title">{{ book.title }}</h1>
    <div id="book-author">Author: {{ book.author }}</div>
    <div id="book-price">Price: ${{ book.price }}</div>
    <div id="book-description">Description: {{ book.description }}</div>
    <form method="POST" action="{{ url_for('book_details', book_id=book.book_id) }}">
        <label for="quantity">Quantity:</label>
        <input id="quantity" name="quantity" type="number" value="1" min="1">
        <button id="add-to-cart-button" type="submit">Add to Cart</button>
    </form>
    <div id="reviews">
        <h2>Reviews</h2>
        <ul>
            {% for review in reviews %}
            <li id="review-{{ review.review_id }}">
                <strong>{{ review.customer_name }}</strong> (Rating: {{ review.rating }})<br>
                {{ review.review_text }}<br>
                <em>{{ review.review_date }}</em>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
