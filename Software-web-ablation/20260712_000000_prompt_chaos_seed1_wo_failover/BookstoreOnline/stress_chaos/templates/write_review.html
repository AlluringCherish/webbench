<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <h1>Write a Review</h1>
    <form method="POST" action="{{ url_for('write_review') }}">
        <label for="select-book">Select Book:</label>
        <select id="select-book" name="selected_book_id">
            {% for book in purchased_books %}
            <option value="{{ book.book_id }}">{{ book.title }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="rating">Rating:</label>
        <select id="rating" name="rating">
            {% for r in range(1,6) %}
            <option value="{{ r }}">{{ r }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="review-text">Review Text:</label>
        <textarea id="review-text" name="review_text" required></textarea>
        <br>
        <button type="submit" id="submit-review">Submit Review</button>
    </form>
</body>
</html>
