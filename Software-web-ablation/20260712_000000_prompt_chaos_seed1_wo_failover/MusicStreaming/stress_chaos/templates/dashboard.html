<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Music Streaming Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Music Streaming Dashboard</h1>
        <a href="{{ url_for('song_catalog_page') }}"><button id="browse-songs-button">Browse Songs</button></a>
        <a href="{{ url_for('playlists_page') }}"><button id="my-playlists-button">My Playlists</button></a>
        <a href="{{ url_for('dashboard_page') }}"><button id="trending-artists-button">Trending Artists</button></a>
        <h2>Featured Songs</h2>
        <ul>
            {% for song in featured_songs %}
            <li>{{ song.title }} by {{ song.artist_name }} from {{ song.album_name }} [{{ song.duration }}s]</li>
            {% endfor %}
        </ul>
        <h2>Trending Artists</h2>
        <ul>
            {% for artist in trending_artists %}
            <li>{{ artist.name }}</li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
