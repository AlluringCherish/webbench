<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Create Playlist</title>
</head>
<body>
    <div id="create-playlist-page">
        <h1>Create Playlist</h1>
        <form method="POST">
            <label for="playlist-name-input">Playlist Name:</label><br />
            <input id="playlist-name-input" type="text" name="playlist_name" required />
            <br /><br />
            <label for="playlist-description-textarea">Description:</label><br />
            <textarea id="playlist-description-textarea" name="playlist_description" rows="4" cols="50"></textarea>
            <br /><br />
            <button id="save-playlist-button" type="submit">Save Playlist</button>
            <a href="{{ url_for('playlists_page') }}"><button type="button" id="cancel-create-button">Cancel</button></a>
        </form>
    </div>
</body>
</html>
