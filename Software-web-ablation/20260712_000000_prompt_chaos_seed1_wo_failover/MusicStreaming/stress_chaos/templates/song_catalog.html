<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Song Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Song Catalog</h1>
        <input id="search-input" type="text" name="search_query" placeholder="Search songs..." value="{{ search_query }}" />
        <select id="genre-filter" name="selected_genre">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}" {% if genre == selected_genre %}selected{% endif %}>{{ genre }}</option>
            {% endfor %}
        </select>
        <div id="songs-grid">
            {% for song in songs %}
            <div class="song-card">
                <div>{{ song.title }} by {{ song.artist_name }} from {{ song.album_name }} [{{ song.duration }}s]</div>
                <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
