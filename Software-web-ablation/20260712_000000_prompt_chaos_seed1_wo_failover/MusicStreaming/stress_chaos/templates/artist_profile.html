<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Artist Profiles</title>
</head>
<body>
    <h1 id="artist-name">{{ artist.name }}</h1>
    <div>Genre: {{ artist.genre }}</div>
    <div>Country: {{ artist.country }}</div>
    <div>Formation Year: {{ artist.formation_year }}</div>
    <h2>Songs by {{ artist.name }}</h2>
    <ul>
        {% for song in songs %}
        <li>{{ song.title }} from {{ song.album_name }} - Duration: {{ song.duration }}s</li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('artists_page') }}"><button id="back-to-artists">Back to Artists</button></a>
</body>
</html>
