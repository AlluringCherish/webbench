<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Genre Exploration</title>
</head>
<body>
    <h1>Genre Exploration</h1>
    <div id="genres-page">
        <div id="genres-list">
            <select id="select-genre" name="selected_genre">
                <option value="">Select a Genre</option>
                {% for genre in genres %}
                <option value="{{ genre.genre_id }}" {% if selected_genre == genre.genre_name %}selected{% endif %}>{{ genre.genre_name }}</option>
                {% endfor %}
            </select>
            <button id="back-to-dashboard">Back to Dashboard</button>
        </div>
        <div id="genre-songs">
            <h2>Songs in {{ selected_genre }}</h2>
            <ul>
                {% for song in genre_songs %}
                <li>{{ song.title }} by {{ song.artist_name }} - Duration: {{ song.duration }}s</li>
                {% endfor %}
            </ul>
        </div>
        <div id="genre-artists">
            <h2>Artists in {{ selected_genre }}</h2>
            <ul>
                {% for artist in genre_artists %}
                <li>{{ artist.name }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
