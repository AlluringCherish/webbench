<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Albums</title>
</head>
<body>
    <div id="albums-page">
        <h1>Albums</h1>
        <input id="search-albums" type="text" name="search_query" placeholder="Search albums..." value="{{ search_query }}" />
        <select id="sort-albums" name="sort_option">
            <option value="Title" {% if sort_option == 'Title' %}selected{% endif %}>Title</option>
            <option value="Artist" {% if sort_option == 'Artist' %}selected{% endif %}>Artist</option>
            <option value="Year" {% if sort_option == 'Year' %}selected{% endif %}>Year</option>
        </select>
        <div id="albums-grid">
            {% for album in albums %}
            <div class="album-card">
                <strong>{{ album.title }}</strong> by {{ album.artist_name }}<br />
                Released: {{ album.release_year }}<br />
                Genre: {{ album.genre }}<br />
                <button id="view-album-button-{{ album.album_id }}">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
