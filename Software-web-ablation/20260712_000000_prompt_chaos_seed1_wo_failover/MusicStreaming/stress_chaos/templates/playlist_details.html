<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Playlist Details</title>
</head>
<body>
    <div id="playlist-details-page">
        <h1 id="playlist-title">{{ playlist.title }}</h1>
        <div id="playlist-description">{{ playlist.description }}</div>
        <table id="songs-in-playlist">
            <thead>
                <tr><th>Title</th><th>Artist</th><th>Duration</th><th>Actions</th></tr>
            </thead>
            <tbody>
                {% for song in songs_in_playlist %}
                <tr>
                    <td>{{ song.title }}</td>
                    <td>{{ song.artist_name }}</td>
                    <td>{{ song.duration }}s</td>
                    <td>
                        <button id="remove-song-button-{{ song.song_id }}">Remove</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="delete-playlist-button">Delete Playlist</button>
        <a href="{{ url_for('playlists_page') }}"><button id="back-to-playlists">Back to Playlists</button></a>
    </div>
</body>
</html>
