<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Album Details</title>
</head>
<body>
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">Artist: {{ album.artist_name }}</div>
    <div id="album-year">Release Year: {{ album.release_year }}</div>
    <div id="album-songs-list">
        <ul>
            {% for song in songs_in_album %}
            <li>{{ song.title }} - {{ song.duration }}s</li>
            {% endfor %}
        </ul>
    </div>
    <form method="POST">
        <button id="add-album-to-playlist-button" type="submit">Add Album to Playlist</button>
    </form>
    <a href="{{ url_for('albums_page') }}"><button id="back-to-albums">Back to Albums</button></a>
</body>
</html>
