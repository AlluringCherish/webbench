<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Artist Profiles</title>
</head>
<body>
    <h1>Artist Profiles</h1>
    <input id="search-artists" type="text" name="search_query" placeholder="Search artists..." value="{{ search_query }}" />
    <select id="artists-sort" name="sort_option">
        <option value="Name" {% if sort_option == 'Name' %}selected{% endif %}>Name</option>
        <option value="Genre" {% if sort_option == 'Genre' %}selected{% endif %}>Genre</option>
        <option value="Country" {% if sort_option == 'Country' %}selected{% endif %}>Country</option>
    </select>
    <ul>
        {% for artist in artists %}
        <li>
            {{ artist.name }} ({{ artist.genre }}) from {{ artist.country }}
            <a href="{{ url_for('artist_profile_page', artist_id=artist.artist_id) }}">
                <button id="view-artist-button-{{ artist.artist_id }}">View Profile</button>
            </a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
