<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibition Details</title>
</head>
<body>
    <div id="exhibition-details-page">
        <h1 id="exhibition-title">{{ exhibition.title }}</h1>
        <div id="exhibition-description">{{ exhibition.description }}</div>
        <div id="exhibition-summary">
            <p><strong>Gallery:</strong> {{ exhibition.gallery_name }}</p>
            <p><strong>Type:</strong> {{ exhibition.exhibition_type }}</p>
            <p id="exhibition-dates"><strong>Dates:</strong> {{ exhibition.start_date }} - {{ exhibition.end_date }}</p>
            <p><strong>Curator:</strong> {{ exhibition.curator_name }}</p>
        </div>
        <div>
            <button id="back-to-exhibitions" onclick="location.href='{{ url_for('exhibitions_page') }}'">Back to Exhibitions</button>
        </div>
    </div>
</body>
</html>
