<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trips</title>
</head>
<body>
    <h1 id="trips-title">Your Trips</h1>
    <div id="trips-container">
        <table id="trips-table" border="1">
            <thead>
                <tr>
                    <th>Trip Name</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Duration Days</th>
                    <th>Total Budget</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for trip in trips %}
                <tr>
                    <td>{{ trip.trip_name }}</td>
                    <td>{{ trip.start_date }}</td>
                    <td>{{ trip.end_date }}</td>
                    <td>{{ trip.duration_days }}</td>
                    <td>{{ trip.total_budget }}</td>
                    <td>{{ trip.status }}</td>
                    <td>
                        <button id="view-trip-details-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('trip_details', trip_id=trip.trip_id) }}'">View Details</button>
                        <button id="edit-trip-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('edit_trip', trip_id=trip.trip_id) }}'">Edit</button>
                        <button id="delete-trip-button-{{ trip.trip_id }}" form="delete-trip-form-{{ trip.trip_id }}">Delete</button>
                        <form id="delete-trip-form-{{ trip.trip_id }}" method="POST" action="{{ url_for('delete_trip', trip_id=trip.trip_id) }}" style="display:none;"></form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
