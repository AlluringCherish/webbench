<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Destinations</title>
</head>
<body>
    <h1 id="destinations-title">Destinations</h1>
    <div id="destinations-container">
        <div id="destinations-grid">
            {% for destination in destinations %}
            <div class="destination-card" id="destination-card-{{ destination.dest_id }}">
                <h2>{{ destination.name }}</h2>
                <p>Country: {{ destination.country }}</p>
                <p>Region: {{ destination.region }}</p>
                <p>Climate: {{ destination.climate }}</p>
                <p>Description: {{ destination.description }}</p>
                <button id="view-destination-button-{{ destination.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=destination.dest_id) }}'">View Details</button>
                <button id="add-to-trip-button-{{ destination.dest_id }}" onclick="location.href='{{ url_for('add_destination_to_trip', dest_id=destination.dest_id) }}'">Add to Trip</button>
            </div>
            {% endfor %}
        </div>
        <button id="browse-destinations-button" onclick="location.href='{{ url_for('destinations') }}'">Browse Destinations</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
