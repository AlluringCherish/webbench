<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Packages</title>
</head>
<body>
    <h1 id="packages-title">Travel Packages</h1>
    <div id="packages-container">
        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-card" id="package-card-{{ pkg.package_id }}">
                <h2>{{ pkg.package_name }}</h2>
                <p>Region: {{ pkg.region }}</p>
                <p>Price: ${{ pkg.price }}</p>
                <p>Included Items: {{ pkg.included_items }}</p>
                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_details', package_id=pkg.package_id) }}'">View Details</button>
                <button id="book-package-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('book_package', package_id=pkg.package_id) }}'">Book Package</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
