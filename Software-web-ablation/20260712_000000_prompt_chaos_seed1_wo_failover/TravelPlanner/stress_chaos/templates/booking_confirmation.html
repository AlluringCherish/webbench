<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <h1 id="booking-confirmation-title">Booking Confirmation</h1>
    <div id="booking-details">
        <p>Trip: {{ trip.trip_name }}</p>
        <p>Confirmation Number: {{ booking.confirmation_number }}</p>
        <p>Booking Date: {{ booking.booking_date }}</p>
        <p>Status: {{ booking.status }}</p>
        <p>Price: ${{ booking.price }}</p>
        <p>Booking Type: {{ booking.booking_type }}</p>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
