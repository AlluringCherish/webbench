<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation</title>
</head>
<body>
    <nav id="navigation-container">
        <button id="browse-destinations-button" onclick="location.href='{{ url_for('destinations') }}'">Browse Destinations</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <div id="navigation-buttons">
            {# Example dynamic buttons for trips #}
            {% for trip in trips %}
            <button id="view-trip-details-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('trip_details', trip_id=trip.trip_id) }}'">View Trip Details</button>
            <button id="edit-trip-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('edit_trip', trip_id=trip.trip_id) }}'">Edit Trip</button>
            <button id="delete-trip-button-{{ trip.trip_id }}" form="delete-trip-form-{{ trip.trip_id }}">Delete Trip</button>
            <form id="delete-trip-form-{{ trip.trip_id }}" method="POST" action="{{ url_for('delete_trip', trip_id=trip.trip_id) }}" style="display:none;"></form>
            <button id="share-trip-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('share_trip', trip_id=trip.trip_id) }}'">Share Trip</button>
            {% endfor %}

            {# Example dynamic buttons for packages #}
            {% for pkg in packages %}
            <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_details', package_id=pkg.package_id) }}'">View Package Details</button>
            <button id="book-package-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('book_package', package_id=pkg.package_id) }}'">Book Package</button>
            {% endfor %}

            {# Example dynamic buttons for destinations #}
            {% for dest in destinations %}
            <button id="view-destination-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Destination</button>
            <button id="add-to-trip-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('add_destination_to_trip', dest_id=dest.dest_id) }}'">Add to Trip</button>
            {% endfor %}
        </div>
    </nav>
</body>
</html>
