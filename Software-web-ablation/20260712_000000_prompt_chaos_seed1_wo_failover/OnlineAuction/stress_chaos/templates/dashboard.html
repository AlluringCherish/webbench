<!DOCTYPE html>
<html>
<head>
    <title>Auction Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="dashboard-title">Auction Dashboard</h1>
        <button id="browse-auctions-button" onclick="location.href='{{ url_for('catalog') }}'">Browse Auctions</button>
        <button id="view-bids-button" onclick="location.href='{{ url_for('bid_history') }}'">View Bids</button>
        <button id="trending-auctions-button" onclick="location.href='{{ url_for('trending_auctions') }}'">Trending Auctions</button>

        <h2>Featured Auctions</h2>
        <div id="featured-auctions">
            {% for auction in featured_auctions %}
            <div class="auction-card" id="auction-card-{{ auction.auction_id }}">
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
                <div>{{ auction.item_name }}</div>
                <div>Current Bid: ${{ '%.2f' % auction.current_bid }}</div>
                <div>Ends: {{ auction.end_time }}</div>
                <a id="view-auction-button-{{ auction.auction_id }}" href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">View Details</a>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
