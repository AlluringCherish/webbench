<!DOCTYPE html>
<html>
<head>
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1 id="status-title">Auction Status</h1>
        <select id="status-filter">
            <option>All</option>
            <option>Active</option>
            <option>Closed</option>
        </select>
        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Auction ID</th>
                    <th>Item Name</th>
                    <th>Status</th>
                    <th>End Time</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                <tr>
                    <td>{{ auction.auction_id }}</td>
                    <td>{{ auction.item_name }}</td>
                    <td>{{ auction.status }}</td>
                    <td>{{ auction.end_time }}</td>
                    <td>${{ '%.2f' % auction.current_bid }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
