<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Categories</title>
</head>
<body>
<h1 id="page-title">Auction Categories</h1>
<div id="categories-container">
{% for category in categories %}
    <div id="category-card-{{ category.category_id }}" class="category-card">
        <h3>{{ category.name }}</h3>
        <p>{{ category.description }}</p>
        <a href="{{ url_for('category_items', category_id=category.category_id) }}">View Category</a>
    </div>
{% endfor %}
</div>
</body>
</html>
