<!DOCTYPE html>
<html>
<head>
    <title>Auction Categories</title>
</head>
<body>
    <h1 id="categories-title">Auction Categories</h1>
    <div id="categories-list">
        {% for category in categories %}
        <div id="category-card-{{ category.category_id }}" class="category-card">
            <h2>{{ category.category_name }}</h2>
            <p>{{ category.description }}</p>
            <p>Items Available: {{ category.item_count }}</p>
            <button id="view-category-button-{{ category.category_id }}" onclick="location.href='{{ url_for('category_items', category_id=category.category_id) }}'">View Category</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
