<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winners</title>
</head>
<body>
<h1 id="page-title">Winners</h1>

<label for="filter-input">Filter:</label>
<input id="filter-input" name="filter-input" type="text">

<div id="winners-list">
{% for winner in winners %}
    <div id="winner-{{ winner.winner_id }}" class="winner-card">
        <h3>{{ winner.name }}</h3>
        <p>{{ winner.auction_title }}</p>
        <p>Winning Bid: {{ winner.bid_amount }}</p>
    </div>
{% endfor %}
</div>

<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

</body>
</html>
