<!DOCTYPE html>
<html>
<head>
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1 id="winners-title">Winning Items</h1>
        <input id="filter-by-winner" name="filter-by-winner" placeholder="Filter winners...">
        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-{{ winner.winner_id }}" class="winner-card">
                <h2>{{ winner.item_name }}</h2>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ '%.2f' % winner.winning_bid }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
