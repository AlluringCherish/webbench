<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Details</title>
</head>
<body>
<h1 id="page-title">Auction Details</h1>

<div id="auction-detail-card">
    <h2>{{ auction.title }}</h2>
    <p>{{ auction.description }}</p>
    <p>Category: {{ auction.category_name }}</p>
    <p>Starting Bid: {{ auction.starting_bid }}</p>
    <p>Current Bid: {{ auction.current_bid }}</p>
    <p>Ends At: {{ auction.end_time }}</p>
</div>

<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

</body>
</html>
