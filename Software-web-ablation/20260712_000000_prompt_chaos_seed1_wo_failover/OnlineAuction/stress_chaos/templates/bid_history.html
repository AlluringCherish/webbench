<!DOCTYPE html>
<html>
<head>
    <title>Bid History</title>
</head>
<body>
    <div id="bid-history-page">
        <h1 id="bid-history-title">Bid History</h1>
        <select id="filter-by-auction">
            <option value="all">All Auctions</option>
            {% for auction in auctions %}
            <option value="{{ auction.auction_id }}">{{ auction.item_name }}</option>
            {% endfor %}
        </select>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        <table id="bids-table" border="1">
            <thead>
                <tr>
                    <th>Bid ID</th>
                    <th>Auction Name</th>
                    <th>Bidder Name</th>
                    <th>Bid Amount</th>
                    <th>Bid Timestamp</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                <tr>
                    <td>{{ bid.bid_id }}</td>
                    <td>{{ bid.auction_name }}</td>
                    <td>{{ bid.bidder_name }}</td>
                    <td>${{ '%.2f' % bid.bid_amount }}</td>
                    <td>{{ bid.bid_timestamp }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
