<!DOCTYPE html>
<html>
<head>
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-list">
        <h1 id="trending-title">Trending Auctions</h1>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        {% for auction in trending_auctions %}
        <div class="trending-auction" id="trending-auction-{{ auction.auction_id }}">
            <span>Rank: {{ auction.trending_rank }}</span>
            <h2>{{ auction.item_name }}</h2>
            <span>Current Bid: ${{ '%.2f' % auction.current_bid }}</span>
            <span>Bid Count: {{ auction.bid_count }}</span>
            <a id="view-auction-button-{{ auction.auction_id }}" href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">View Details</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
