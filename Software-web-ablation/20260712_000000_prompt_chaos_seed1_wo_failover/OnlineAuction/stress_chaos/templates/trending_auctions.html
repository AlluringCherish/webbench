<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
<h1 id="page-title">Trending Auctions</h1>

<div id="trending-auctions-list">
{% for auction in trending_auctions %}
    <div id="auction-{{ auction.auction_id }}" class="auction-card">
        <h3>{{ auction.title }}</h3>
        <p>{{ auction.description }}</p>
        <p>Current Bid: {{ auction.current_bid }}</p>
    </div>
{% endfor %}
</div>

<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

</body>
</html>
