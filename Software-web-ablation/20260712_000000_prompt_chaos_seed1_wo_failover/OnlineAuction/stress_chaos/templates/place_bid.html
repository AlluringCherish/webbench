<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
<h1 id="page-title">Place Your Bid</h1>

<form id="place-bid-form" method="POST">
    <label for="bid_amount">Your Bid:</label>
    <input id="bid_amount" name="bid_amount" type="number" min="{{ minimum_bid }}" step="{{ minimum_bid_step }}" required>

    <button type="submit" id="submit-bid">Place Bid</button>
</form>

</body>
</html>
