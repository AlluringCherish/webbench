<!DOCTYPE html>
<html>
<head>
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1 id="place-bid-title">Place Bid</h1>
        <form method="POST" action="{{ url_for('submit_bid', auction_id=auction.auction_id) }}">
            <label for="bidder-name">Bidder Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" required>

            <div id="minimum-bid">Minimum Bid: ${{ '%.2f' % auction.minimum_bid }}</div>
            <label for="bid-amount">Your Bid:</label>
            <input type="number" id="bid-amount" name="bid_amount" min="{{ auction.minimum_bid }}" step="0.01" required>

            <button id="submit-bid-button" type="submit">Submit Bid</button>
        </form>
    </div>
</body>
</html>
