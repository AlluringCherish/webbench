<!DOCTYPE html>
<html>
<head>
    <title>Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1 id="catalog-title">Catalog</h1>
        <input type="text" id="search-input" name="search" placeholder="Search auctions...">
        <select id="category-filter" name="category">
            <option>Electronics</option>
            <option>Collectibles</option>
            <option>Furniture</option>
            <option>Art</option>
            <option>Other</option>
        </select>
        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-card" id="auction-card-{{ auction.auction_id }}">
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
                <h2>{{ auction.item_name }}</h2>
                <p>{{ auction.description }}</p>
                <p>Category: {{ auction.category }}</p>
                <p>Current Bid: ${{ '%.2f' % auction.current_bid }}</p>
                <p>Ends: {{ auction.end_time }}</p>
                <a id="view-auction-button-{{ auction.auction_id }}" href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">View Details</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
