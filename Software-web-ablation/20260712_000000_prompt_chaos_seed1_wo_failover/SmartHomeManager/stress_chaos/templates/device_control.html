<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body id="main-container-id">
    <h1>Device Control</h1>
    <div id="device-control-page">
        <nav>
            <a href="{{ url_for('device_list') }}" id="back-to-devices">Back to Devices</a>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
        <section>
            <h2 id="device-name-display">{{ device.name }}</h2>
            <p>Type: <span id="device-type">{{ device.device_type }}</span></p>
            <p>Room: <span id="device-room">{{ device.room }}</span></p>
            <p>Status: <span id="device-status-display">{{ device.status }}</span></p>
            <form method="POST" action="{{ url_for('device_control', device_id=device.device_id) }}">
                <label for="action-type">Action Type:</label>
                <select id="action-type" name="action-type">
                    <option value="on" {% if device.status == 'on' %}selected{% endif %}>On</option>
                    <option value="off" {% if device.status == 'off' %}selected{% endif %}>Off</option>
                    <option value="toggle">Toggle</option>
                </select>
                <button type="submit" id="apply-action-button">Apply</button>
            </form>
        </section>
    </div>
</body>
</html>
