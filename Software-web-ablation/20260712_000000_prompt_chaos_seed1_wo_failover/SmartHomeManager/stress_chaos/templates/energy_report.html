<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body id="main-container-id">
    <h1>Energy Report</h1>
    <div id="energy-report-page">
        <nav>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
        <section>
            <table id="energy-table">
                <thead>
                    <tr><th>Date</th><th>Device</th><th>Consumption (kWh)</th></tr>
                </thead>
                <tbody>
                    {% for entry in energy_entries %}
                    <tr>
                        <td>{{ entry.date }}</td>
                        <td>{{ entry.device_name }}</td>
                        <td>{{ entry.consumption_kwh }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
