<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Devices</title>
</head>
<body id="main-container-id">
    <h1>My Devices</h1>
    <div id="devices-page">
        <nav>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
            <a href="{{ url_for('add_device') }}" id="add-device-button">Add New Device</a>
        </nav>
        <table id="device-table">
            <thead>
                <tr><th>Name</th><th>Type</th><th>Room</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody>
            {% for device in devices %}
            <tr id="device-row-{{ device.device_id }}">
                <td id="device-name-display-{{ device.device_id }}">{{ device.name }}</td>
                <td id="device-type-{{ device.device_id }}">{{ device.device_type }}</td>
                <td id="device-room-{{ device.device_id }}">{{ device.room }}</td>
                <td id="device-status-display-{{ device.device_id }}">{{ device.status }}</td>
                <td><a href="{{ url_for('device_control', device_id=device.device_id) }}" id="control-device-button-{{ device.device_id }}">Control</a></td>
            </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
