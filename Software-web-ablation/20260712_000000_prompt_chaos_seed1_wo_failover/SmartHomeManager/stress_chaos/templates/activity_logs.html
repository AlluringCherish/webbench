<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body id="main-container-id">
    <h1>Activity Logs</h1>
    <div id="activity-logs-page">
        <nav>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
        <section>
            <table id="activity-table">
                <thead>
                    <tr><th>Timestamp</th><th>User</th><th>Activity</th></tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                        <tr>
                            <td>{{ log.timestamp }}</td>
                            <td>{{ log.user }}</td>
                            <td>{{ log.activity }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
