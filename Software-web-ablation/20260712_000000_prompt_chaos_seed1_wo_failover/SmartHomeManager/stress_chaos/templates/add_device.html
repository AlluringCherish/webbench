<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Device</title>
</head>
<body id="main-container-id">
    <h1>Add New Device</h1>
    <div id="add-device-page">
        <nav>
            <a href="{{ url_for('device_list') }}" id="back-to-devices">Back to Devices</a>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
        </nav>
        <form method="POST" action="{{ url_for('add_device') }}" id="add-device-form">
            <label for="device-name">Device Name:</label>
            <input type="text" id="device-name" name="device-name" required>

            <label for="device-type">Device Type:</label>
            <select id="device-type" name="device-type">
                {% for type in device_types %}
                <option value="{{ type }}">{{ type }}</option>
                {% endfor %}
            </select>

            <label for="device-room">Room:</label>
            <select id="device-room" name="device-room">
                {% for room in rooms %}
                <option value="{{ room }}">{{ room }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="submit-device-button">Add Device</button>
        </form>
    </div>
</body>
</html>
