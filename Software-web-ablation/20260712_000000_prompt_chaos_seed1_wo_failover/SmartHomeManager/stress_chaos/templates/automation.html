<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automation Rules</title>
</head>
<body id="main-container-id">
    <h1>Automation Rules</h1>
    <div id="automation-page">
        <nav>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
            <a href="{{ url_for('add_rule') }}" id="add-rule-button">Add Rule</a>
        </nav>
        <section>
            <table id="rules-table">
                <thead>
                    <tr>
                        <th>Rule Name</th>
                        <th>Trigger Type</th>
                        <th>Action</th>
                        <th>Enabled</th>
                    </tr>
                </thead>
                <tbody>
                    {% for rule in rules %}
                    <tr id="rule-row-{{ rule.rule_id }}">
                        <td>{{ rule.rule_name }}</td>
                        <td>{{ rule.trigger_type }}</td>
                        <td>{{ rule.action }}</td>
                        <td>{{ 'Yes' if rule.enabled else 'No' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
