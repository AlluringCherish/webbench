<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Review</title>
</head>
<body>
    <h1>Write a Review for {{ dish.name }}</h1>
    <form method="POST" action="{{ url_for('write_review', dish_id=dish.dish_id) }}">
        <label for="rating">Rating (1-5):</label>
        <select name="rating" id="rating" required>
            {% for i in range(1, 6) %}
            <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
        </select><br>

        <label for="review_text">Review:</label><br>
        <textarea name="review_text" id="review_text" rows="5" cols="30" required></textarea><br>

        <button type="submit">Submit Review</button>
    </form>
    <button onclick="window.location.href='{{ url_for('dish', dish_id=dish.dish_id) }}'">Back to Dish</button>
</body>
</html>
