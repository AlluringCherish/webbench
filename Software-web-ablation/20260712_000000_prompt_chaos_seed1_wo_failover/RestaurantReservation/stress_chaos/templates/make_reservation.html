<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body class="make-reservation-page">
    <h1>Make a Reservation</h1>
    <form method="POST" action="{{ url_for('make_reservation') }}" id="reservation-form">
        <label for="guest_name">Guest Name:</label>
        <input type="text" id="guest_name" name="guest_name" required />

        <label for="party_size">Party Size:</label>
        <select id="party_size" name="party_size" required>
            {% for size in range(1, 11) %}
            <option value="{{ size }}">{{ size }}</option>
            {% endfor %}
        </select>

        <label for="reservation_date">Reservation Date:</label>
        <input type="date" id="reservation_date" name="reservation_date" required />

        <label for="reservation_time">Reservation Time:</label>
        <input type="time" id="reservation_time" name="reservation_time" required />

        <label for="special_requests">Special Requests:</label>
        <textarea id="special_requests" name="special_requests"></textarea>

        <button type="submit" id="submit-reservation-button">Submit Reservation</button>
    </form>
</body>
</html>
