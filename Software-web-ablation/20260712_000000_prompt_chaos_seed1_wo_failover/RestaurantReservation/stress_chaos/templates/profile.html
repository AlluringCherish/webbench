<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <h1>Profile for {{ user_profile.username }}</h1>
    <p>Full Name: {{ user_profile.full_name }}</p>
    <p>Email: {{ user_profile.email }}</p>
    <p>Phone: {{ user_profile.phone }}</p>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
