<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ dish.name }}</title>
</head>
<body class="dish-page">
    <section>
        <h1 id="dish-name">{{ dish.name }}</h1>
        <div id="dish-price">Price: ${{ '%.2f'|format(dish.price) }}</div>
        <p>Category: {{ dish.category }}</p>
        <p>Description: {{ dish.description }}</p>
        <p>Ingredients: {{ dish.ingredients }}</p>
        <p>Dietary Information: {{ dish.dietary }}</p>
        <p>Average Rating: {{ '%.1f'|format(dish.avg_rating) }}</p>
        <button id="back-to-menu" onclick="window.location.href='{{ url_for('menu') }}'">Back to Menu</button>
    </section>
</body>
</html>
