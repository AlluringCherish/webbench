<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body class="my-reservations-page">
    <h1>My Reservations</h1>
    <table id="reservations-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Party Size</th>
                <th>Status</th>
                <th>Cancel</th>
            </tr>
        </thead>
        <tbody>
            {% for reservation in reservations %}
            <tr>
                <td>{{ reservation.date }}</td>
                <td>{{ reservation.time }}</td>
                <td>{{ reservation.party_size }}</td>
                <td>{{ reservation.status }}</td>
                <td>
                    <form method="POST" action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}">
                        <button type="submit" id="cancel-reservation-button-{{ reservation.reservation_id }}">Cancel</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
