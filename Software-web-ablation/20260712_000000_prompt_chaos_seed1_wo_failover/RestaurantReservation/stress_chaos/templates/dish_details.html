<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ dish.name }}</title>
</head>
<body>
    <h1 id="dish-name">{{ dish.name }}</h1>
    <p id="dish-category">Category: {{ dish.category }}</p>
    <p id="dish-price">Price: ${{ '%.2f'|format(dish.price) }}</p>
    <p id="dish-description">Description: {{ dish.description }}</p>
    <p id="dish-ingredients">Ingredients: {{ dish.ingredients }}</p>
    <p id="dish-dietary">Dietary: {{ dish.dietary }}</p>
    <p id="dish-rating">Average Rating: {{ '%.1f'|format(dish.avg_rating) if dish.avg_rating else 'N/A' }}</p>
    <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review', dish_id=dish.dish_id) }}'">Write Review</button>
    <button id="back-to-menu" onclick="window.location.href='{{ url_for('menu') }}'">Back to Menu</button>
</body>
</html>
