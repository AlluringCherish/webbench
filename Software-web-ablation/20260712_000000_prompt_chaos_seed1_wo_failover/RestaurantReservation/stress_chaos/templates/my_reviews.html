<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reviews</title>
</head>
<body>
    <h1>My Reviews</h1>
    {% if user_reviews %}
    <ul id="my-reviews-list">
        {% for review in user_reviews %}
        <li class="review-item">
            <h3>{{ review.dish_name }}</h3>
            <p>Rating: {{ review.rating }}/5</p>
            <p>Review: {{ review.review_text }}</p>
            <p>Date: {{ review.review_date }}</p>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>You have not written any reviews yet.</p>
    {% endif %}
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
