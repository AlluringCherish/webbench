<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waitlist</title>
</head>
<body>
    <h1>Waitlist</h1>
    {% if waitlist_entries %}
    <ul id="waitlist-entries">
        {% for entry in waitlist_entries %}
        <li>
            {{ entry.join_time }} - Party Size: {{ entry.party_size }} - Status: {{ entry.status }}
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>The waitlist is currently empty.</p>
    {% endif %}
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
