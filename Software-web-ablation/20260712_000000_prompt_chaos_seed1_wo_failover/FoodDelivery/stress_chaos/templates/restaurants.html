<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Restaurants Listing</title>
</head>
<body>
    <div id="restaurants-page">
        <h1>Restaurants Listing</h1>

        <label for="search-input">Search:</label>
        <input id="search-input" name="search" type="text" placeholder="Search restaurants..." />

        <label for="cuisine-filter">Filter by Cuisine:</label>
        <select id="cuisine-filter" name="cuisine">
            <option value="">-- Select Cuisine --</option>
            {% for cuisine in cuisines %}
            <option value="{{ cuisine }}">{{ cuisine }}</option>
            {% endfor %}
        </select>

        <div id="restaurants-grid">
            {% for restaurant in restaurants %}
            <div class="restaurant-item">
                <h3 id="restaurant-name-{{ restaurant.restaurant_id }}">{{ restaurant.name }}</h3>
                <p>Cuisine: {{ restaurant.cuisine }}</p>
                <p>Rating: {{ restaurant.rating }}</p>
                <button id="view-restaurant-button-{{ restaurant.restaurant_id }}" onclick="location.href='{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}'" aria-label="View Menu of {{ restaurant.name }}">View Menu</button>
            </div>
            {% else %}
            <p>No restaurants found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
