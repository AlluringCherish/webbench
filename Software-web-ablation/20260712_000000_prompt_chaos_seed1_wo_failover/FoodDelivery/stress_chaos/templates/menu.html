<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <h1 id="restaurant-name">{{ restaurant.name }}</h1>
        <div id="restaurant-info">
            <p>Cuisine: {{ restaurant.cuisine }}</p>
            <p>Rating: {{ restaurant.rating }}</p>
        </div>

        <div id="menu-items-grid">
            {% for item in menu_items %}
            <div class="menu-item">
                <h3 id="menu-item-name-{{ item.item_id }}">{{ item.item_name }}</h3>
                <p>{{ item.description }}</p>
                <p id="item-price-{{ item.item_id }}">Price: ${{ '%.2f' | format(item.price) }}</p>
                <form method="POST" action="{{ url_for('add_item_to_cart', item_id=item.item_id) }}">
                    <input type="number" id="quantity-input-{{ item.item_id }}" name="quantity" value="1" min="1" required />
                    <button id="add-to-cart-button-{{ item.item_id }}" type="submit">Add to Cart</button>
                </form>
                <button id="view-item-details-{{ item.item_id }}" onclick="location.href='{{ url_for('item_details', item_id=item.item_id) }}'" aria-label="View Details of {{ item.item_name }}">View Details</button>
            </div>
            {% else %}
            <p>No menu items available.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
