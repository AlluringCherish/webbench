<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Reviews</h1>

        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating_filter">
            <option value="">-- Filter Reviews --</option>
            {% for rating in [5,4,3,2,1] %}
            <option value="{{ rating }}">{{ rating }} stars</option>
            {% endfor %}
        </select>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <p>{{ review.customer_name }} ({{ review.rating }}/5)</p>
                <p>{{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
            </div>
            {% else %}
            <p>No reviews available.</p>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="location.href='{{ url_for('write_review') }}'" aria-label="Write a Review">Write a Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'" aria-label="Back to Dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
