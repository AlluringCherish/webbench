<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review</h1>

        {% if errors %}
            <div id="review-errors" aria-live="polite" style="color: red;">
                <ul>
                    {% for field, message in errors.items() %}
                    <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="restaurant-select">Restaurant:</label>
            <select id="restaurant-select" name="restaurant_id" required>
                <option value="">-- Select Restaurant --</option>
                {% for restaurant in restaurants %}
                <option value="{{ restaurant.restaurant_id }}" {% if previous_input and previous_input.restaurant_id|int == restaurant.restaurant_id %}selected{% endif %}>{{ restaurant.name }}</option>
                {% endfor %}
            </select>

            <label for="customer-name-input">Your Name:</label>
            <input id="customer-name-input" name="customer_name" type="text" value="{{ previous_input.customer_name if previous_input else '' }}" required />

            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating" required>
                <option value="">-- Select Rating --</option>
                {% for r in range(1, 6) %}
                <option value="{{ r }}" {% if previous_input and previous_input.rating|int == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>

            <label for="review-textarea">Review:</label>
            <textarea id="review-textarea" name="review_text" required>{{ previous_input.review_text if previous_input else '' }}</textarea>

            <label for="review-date-input">Review Date:</label>
            <input id="review-date-input" name="review_date" type="date" value="{{ previous_input.review_date if previous_input else '' }}" required />

            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>

        <button id="back-to-reviews" onclick="location.href='{{ url_for('reviews') }}'" aria-label="Back to Reviews">Back to Reviews</button>
    </div>
</body>
</html>
