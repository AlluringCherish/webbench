<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Food Delivery Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Food Delivery Dashboard</h1>

        <div id="featured-restaurants">
            <h2>Featured Restaurants</h2>
            <ul>
                {% for restaurant in featured_restaurants %}
                <li>{{ restaurant.name }} - {{ restaurant.cuisine }} - Rating: {{ restaurant.rating }}</li>
                {% else %}
                <li>No featured restaurants</li>
                {% endfor %}
            </ul>
        </div>

        <button id="browse-restaurants-button" onclick="location.href='{{ url_for('restaurant_listing') }}'" aria-label="Browse Restaurants">Browse Restaurants</button>
        <button id="view-cart-button" onclick="location.href='{{ url_for('shopping_cart') }}'" aria-label="View Cart">View Cart</button>
        <button id="active-orders-button" onclick="location.href='{{ url_for('active_orders') }}'" aria-label="View Active Orders">Active Orders</button>
    </div>
</body>
</html>
