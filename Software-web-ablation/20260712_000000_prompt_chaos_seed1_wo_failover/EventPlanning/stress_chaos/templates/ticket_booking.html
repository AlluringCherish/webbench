<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="main-container-id">
    <h1 id="event-title">Book Tickets for {{ event.event_name }}</h1>
    <p id="event-date">Date: {{ event.date }}</p>
    <p id="event-location">Location: {{ event.location }}</p>
    <form action="{{ url_for('book_ticket', event_id=event.event_id) }}" method="POST">
        <label for="ticket-type-select">Ticket Type:</label>
        <select id="ticket-type-select" name="ticket_type">
            {% for ticket_type in ticket_types %}
            <option value="{{ ticket_type.ticket_type }}">{{ ticket_type.ticket_type }} - ${{ ticket_type.price }}</option>
            {% endfor %}
        </select>
        <label for="ticket-quantity-input">Quantity:</label>
        <input type="number" id="ticket-quantity-input" name="ticket_quantity" min="1" max="10" required>
        <button id="book-ticket-button" type="submit">Book Ticket</button>
    </form>
    <button id="back-to-events-button" onclick="location.href='{{ url_for('events_listing') }}'">Back to Events</button>
</div>
</body>
</html>
