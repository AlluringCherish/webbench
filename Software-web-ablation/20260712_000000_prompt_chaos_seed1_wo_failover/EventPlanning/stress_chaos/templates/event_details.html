<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="main-container-id">
    <h1>{{ event.event_name }}</h1>
    <p>Category: {{ event.category }}</p>
    <p>Date: {{ event.date }}</p>
    <p>Time: {{ event.time }}</p>
    <p>Location: {{ event.location }}</p>
    <p>Description: {{ event.description }}</p>
    <button id="view-venue-details-{{ event.venue_id }}" onclick="location.href='{{ url_for('venue_details', venue_id=event.venue_id) }}'">View Venue Details</button>
    <button id="book-now-button-{{ event.event_id }}" onclick="location.href='{{ url_for('book_ticket', event_id=event.event_id) }}'">Book Now</button>
    <button id="back-to-events-button" onclick="location.href='{{ url_for('events_listing') }}'">Back to Events</button>
</div>
</body>
</html>
