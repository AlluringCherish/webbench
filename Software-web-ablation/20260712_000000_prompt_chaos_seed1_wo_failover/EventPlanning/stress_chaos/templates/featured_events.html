<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="main-container-id">
    <h1>{{ page_title }}</h1>
    <nav id="featured-events-nav">
        <button id="back-to-dashboard-button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </nav>
    <div id="featured-events-list">
        {% for event in featured_events %}
        <div class="event-card" id="event-card-{{ event.event_id }}">
            <h2>{{ event.event_name }}</h2>
            <p>Category: {{ event.category }}</p>
            <p>Date: {{ event.date }}</p>
            <p>Time: {{ event.time }}</p>
            <p>Location: {{ event.location }}</p>
            <p>Description: {{ event.description }}</p>
            <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            <button id="book-now-button-{{ event.event_id }}" onclick="location.href='{{ url_for('book_ticket', event_id=event.event_id) }}'">Book Now</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
