<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="main-container-id">
    <h1>{{ page_title }}</h1>

    <nav id="dashboard-nav">
        <button id="browse-events-button" onclick="location.href='{{ url_for('events_listing') }}'">Browse Events</button>
        <button id="featured-events-button" onclick="location.href='{{ url_for('featured_events') }}'">Featured Events</button>
        <button id="bookings-summary-button" onclick="location.href='{{ url_for('bookings_summary') }}'">Bookings Summary</button>
        <button id="venues-button" onclick="location.href='{{ url_for('venues_listing') }}'">Venues</button>
        <button id="schedules-button" onclick="location.href='{{ url_for('schedules') }}'">Schedules</button>
        <button id="participants-button" onclick="location.href='{{ url_for('participants') }}'">Participants</button>
    </nav>

    <div id="events-grid">
        {% for event in events %}
        <div class="event-card" id="event-card-{{ event.event_id }}">
            <h2>{{ event.event_name }}</h2>
            <p>Category: {{ event.category }}</p>
            <p>Date: {{ event.date }}</p>
            <p>Time: {{ event.time }}</p>
            <p>Location: {{ event.location }}</p>
            <p>Description: {{ event.description }}</p>
            <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            <button id="book-now-button-{{ event.event_id }}" onclick="location.href='{{ url_for('book_ticket', event_id=event.event_id) }}'">Book Now</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
