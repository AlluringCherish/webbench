<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibition Details</title>
</head>
<body>
    <h1>{{ exhibition.title }}</h1>
    <div>
        <p>{{ exhibition.description }}</p>
        <p>Gallery: {{ exhibition.gallery_name }}</p>
        <p>Type: {{ exhibition.exhibition_type }}</p>
        <p>Start Date: {{ exhibition.start_date }}</p>
        <p>End Date: {{ exhibition.end_date }}</p>
        <p>Curator: {{ exhibition.curator_name }}</p>
    </div>
    <div>
        <button id="back-to-exhibitions" onclick="location.href='{{ url_for('exhibitions') }}'">Back to Exhibitions</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
