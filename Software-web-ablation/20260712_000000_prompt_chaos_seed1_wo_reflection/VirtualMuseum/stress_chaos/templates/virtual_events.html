<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Events</title>
</head>
<body>
    <h1>Virtual Events</h1>
    <div>
        {% for event in events %}
        <div id="event-{{ event.event_id }}">
            <h2>{{ event.title }}</h2>
            <p>Date: {{ event.date }}</p>
            <p>Type: {{ event.event_type }}</p>
            <p>Speaker: {{ event.speaker }}</p>
            <button id="register-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('register_event', event_id=event.event_id) }}'">Register</button>
        </div>
        {% endfor %}
    </div>
    <div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
