<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Showtime</title>
</head>
<body>
    <section id="showtime-selection-container">
        <h1>Select Showtime for {{ movie.title }}</h1>
        <div id="showtimes-list">
            {% for showtime in showtimes %}
            <div class="showtime-card" id="showtime-{{ showtime.showtime_id }}">
                <p>Date: {{ showtime.showtime_date }}</p>
                <p>Time: {{ showtime.showtime_time }}</p>
                <p>Price: ${{ showtime.price }}</p>
                <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="window.location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Select Showtime</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </section>
</body>
</html>
