<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Track Order</title>
</head>
<body>
    <div id="tracking-page">
        <h1>Track Order</h1>
        <div id="order-details">
            <p>Order ID: {{ order.order_id }}</p>
            <p>Order Date: {{ order.order_date }}</p>
            <p>Phone Number: {{ order.phone_number }}</p>
        </div>
        <div id="driver-info">
            <p>Driver Name: {{ driver.driver_name }}</p>
            <p>Vehicle Info: {{ driver.vehicle_info }}</p>
            <p>Estimated Time: {{ driver.estimated_time }}</p>
        </div>
        <button id="back-to-orders" onclick="location.href='{{ url_for('active_orders_page') }}'">Back to Orders</button>
    </div>
</body>
</html>
