<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Reviews</h1>
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review">
                <h3>{{ review.restaurant_name }}</h3>
                <p>{{ review.review_text }}</p>
                <p>Date: {{ review.review_date }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="write-review-button" onclick="location.href='{{ url_for('write_review_page') }}'">Write Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
