<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurants</title>
</head>
<body>
    <div id="restaurants-page">
        <h1>Restaurants</h1>
        <input id="search-input" type="text" placeholder="Search restaurants...">
        <select id="filter-select">
            <option value="">Filter by cuisine</option>
            <!-- Options dynamically populated -->
        </select>
        <div id="restaurants-list">
            {% for restaurant in restaurants %}
            <div class="restaurant-card">
                <h2>{{ restaurant.name }}</h2>
                <p>Cuisine: {{ restaurant.cuisine }}</p>
                <p>Rating: {{ restaurant.rating }}</p>
                <button id="view-restaurant-button-{{ restaurant.id }}" onclick="location.href='{{ url_for('restaurant_menu_page', restaurant_id=restaurant.id) }}'">View Menu</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
