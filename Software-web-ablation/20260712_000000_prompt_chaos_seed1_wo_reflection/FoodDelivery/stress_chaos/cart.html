<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <table id="cart-items-table">
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart_items %}
                <tr>
                    <td>{{ item.item_name }}</td>
                    <td><input id="update-quantity-{{ item.item_id }}" type="number" value="{{ item.quantity }}" min="1"></td>
                    <td>{{ item.subtotal }}</td>
                    <td>
                        <button id="remove-item-button-{{ item.item_id }}" onclick="location.href='{{ url_for('remove_cart_item', item_id=item.item_id) }}'">Remove</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="proceed-checkout-button" onclick="location.href='{{ url_for('checkout_page') }}'">Proceed to Checkout</button>
    </div>
</body>
</html>
