<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Menu</title>
</head>
<body>
    <div id="menu-page">
        <h1 id="restaurant-name">{{ restaurant.name }}</h1>
        <div id="restaurant-info">
            <p>Cuisine: {{ restaurant.cuisine }}</p>
            <p>Delivery Time: {{ restaurant.delivery_time }} minutes</p>
        </div>
        <div id="menu-items-grid">
            {% for item in menu_items %}
            <div class="menu-item">
                <h3>{{ item.item_name }}</h3>
                <p>{{ item.description }}</p>
                <p>Ingredients: {{ item.ingredients }}</p>
                <p>Price: ${{ item.price }}</p>
                <button id="add-to-cart-button-{{ item.item_id }}" onclick="location.href='{{ url_for('add_to_cart', item_id=item.item_id) }}'">Add to Cart</button>
                <button id="view-item-details-{{ item.item_id }}" onclick="location.href='{{ url_for('item_details_page', item_id=item.item_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
