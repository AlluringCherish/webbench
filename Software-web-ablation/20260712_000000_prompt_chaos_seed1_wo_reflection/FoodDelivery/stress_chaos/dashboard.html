<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <div id="main-container">
            <nav id="navigation">
                <button id="view-cart-button" onclick="location.href='{{ url_for('shopping_cart_page') }}'">View Cart</button>
                <button id="active-orders-button" onclick="location.href='{{ url_for('active_orders_page') }}'">Active Orders</button>
            </nav>
            <!-- Content overview and featured restaurants should be rendered here dynamically -->
            <div id="overview">
                <h1>Dashboard</h1>
                <div id="featured-restaurants">
                    {% for restaurant in featured_restaurants %}
                    <div class="restaurant">
                        <h2>{{ restaurant.name }}</h2>
                        <p>Cuisine: {{ restaurant.cuisine }}</p>
                        <p>Rating: {{ restaurant.rating }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
