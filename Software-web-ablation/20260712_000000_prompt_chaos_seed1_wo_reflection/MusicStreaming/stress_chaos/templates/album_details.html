<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ album.title }} - Album Details</title>
</head>
<body>
    <main id="main-container">
        <h1 id="album-title">{{ album.title }}</h1>
        <p id="album-artist">Artist: {{ album.artist_name }}</p>
        <p id="album-year">Year: {{ album.release_year }}</p>
        <ul id="album-songs-list">
            {% for song in album_songs %}
            <li id="song-{{ song.song_id }}">
                {{ song.title }} ({{ song.duration }}s)
                <button type="button" id="add-song-to-playlist-button-{{ song.song_id }}" onclick="window.location.href='{{ url_for('add_song_to_playlist', song_id=song.song_id) }}'">Add to Playlist</button>
            </li>
            {% endfor %}
        </ul>
        <button type="button" id="add-album-to-playlist-button" onclick="window.location.href='{{ url_for('add_album_to_playlist', album_id=album.album_id) }}'">Add Album to Playlist</button>
        <a href="{{ url_for('albums_page') }}">Back to Albums</a>
    </main>
</body>
</html>
