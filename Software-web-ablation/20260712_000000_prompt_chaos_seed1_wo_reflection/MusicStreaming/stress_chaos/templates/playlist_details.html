<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - Playlist Details</title>
</head>
<body>
    <main id="main-container">
        <h1 id="playlist-title">{{ title }}</h1>
        <p id="playlist-description">{{ description }}</p>
        <ul id="songs-in-playlist">
            {% for song in songs_in_playlist %}
            <li id="song-{{ song.song_id }}">
                {{ song.title }} by {{ song.artist_name }} ({{ song.duration }}s)
                <form method="post" action="{{ url_for('remove_song_from_playlist', playlist_id=playlist_id, song_id=song.song_id) }}" style="display:inline;">
                    <button type="submit">Remove</button>
                </form>
            </li>
            {% endfor %}
        </ul>
        <form method="post" action="{{ url_for('delete_playlist', playlist_id=playlist_id) }}">
            <button id="delete-playlist-button" type="submit">Delete Playlist</button>
        </form>
        <a href="{{ url_for('playlists_page') }}">Back to Playlists</a>
    </main>
</body>
</html>
