<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
    <main id="main-container">
        <h1>My Playlists</h1>
        <ul id="playlists-list">
            {% for playlist in playlists %}
            <li id="playlist-{{ playlist.playlist_id }}">
                <a href="{{ url_for('playlist_details_page', playlist_id=playlist.playlist_id) }}">
                    {{ playlist.title }} ({{ playlist.total_songs }} songs)
                </a>
                <p>{{ playlist.description }}</p>
            </li>
            {% endfor %}
        </ul>
        <button type="button" id="create-playlist-button" onclick="window.location.href='{{ url_for('create_playlist_page') }}'">Create New Playlist</button>
    </main>
</body>
</html>
