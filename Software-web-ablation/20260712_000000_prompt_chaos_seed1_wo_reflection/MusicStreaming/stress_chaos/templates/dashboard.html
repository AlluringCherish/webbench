<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Streaming Dashboard</title>
</head>
<body>
<div id="dashboard-page">
  <h1>Music Dashboard</h1>
  <div id="featured-songs">
    <h2>Featured Songs</h2>
    <ul>
      {% for song in featured_songs %}
      <li id="song-{{ song.song_id }}">{{ song.title }} by {{ song.artist_name }} ({{ song.duration }}s)</li>
      {% endfor %}
    </ul>
  </div>

  <button id="browse-songs-button" onclick="window.location.href='{{ url_for('song_catalog_page') }}'">Browse Songs</button>
  <button id="my-playlists-button" onclick="window.location.href='{{ url_for('playlists_page') }}'">My Playlists</button>
  <button id="trending-artists-button" onclick="window.location.href='{{ url_for('artist_profile_page') }}'">Trending Artists</button>

  <div id="artists">
    <h2>Top Artists</h2>
    <ul>
      {% for artist in artists %}
      <li>{{ artist.name }}</li>
      {% endfor %}
    </ul>
  </div>
</div>
</body>
</html>
