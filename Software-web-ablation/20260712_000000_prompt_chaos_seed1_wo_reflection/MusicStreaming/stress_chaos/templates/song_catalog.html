<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
    <main id="main-container">
        <h1 id="song-catalog-heading">Song Catalog</h1>
        <div id="genre-filter">
            <label for="genre-select">Filter by Genre:</label>
            <select id="genre-select" name="genre">
                <option value="">All</option>
                {% for genre in genres %}
                <option value="{{ genre.genre_name }}" {% if selected_genre == genre.genre_name %}selected{% endif %}>{{ genre.genre_name }}</option>
                {% endfor %}
            </select>
        </div>

        <div id="songs-list-container">
            <ul id="songs-list">
                {% for song in songs %}
                <li id="song-{{ song.song_id }}">
                    {{ song.title }} by {{ song.artist_name }} ({{ song.duration }}s) - {{ song.album_name }} [{{ song.genre }}]
                    <button type="button" id="add-song-button-{{ song.song_id }}" onclick="window.location.href='{{ url_for('add_song_action', song_id=song.song_id) }}'">Add to Playlist</button>
                </li>
                {% endfor %}
            </ul>
        </div>
    </main>
</body>
</html>
