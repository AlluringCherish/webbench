<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ song.title }} - Details</title>
</head>
<body>
    <main id="main-container">
        <h1 id="song-title">{{ song.title }}</h1>
        <p id="artist-name">Artist: <a href="{{ url_for('artist_details_page', artist_id=song.artist_id) }}">{{ song.artist_name }}</a></p>
        <p id="album-name">Album: {{ song.album_name }}</p>
        <p id="duration-display">Duration: {{ song.duration }}s</p>
        <button type="button" id="play-button" onclick="playSong({{ song.song_id }})">Play</button>
    </main>
    <script>
    function playSong(songId) {
        alert('Playing song ID ' + songId);
    }
    </script>
</body>
</html>
