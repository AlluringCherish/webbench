{% extends "base.html" %}
{% block title %}Edit Article - Content Publishing Hub{% endblock %}

{% block content %}
<div id="edit-article-page">
  <h1 id="edit-article-title">Edit Article</h1>
  <form id="edit-article-form" method="POST" action="/article/{{ article.id }}/edit">
    <div class="form-group">
      <label for="article-title-input">Title</label>
      <input type="text" id="article-title-input" name="title" value="{{ article.title }}" readonly />
    </div>
    <div class="form-group">
      <label for="article-content-input">Content</label>
      <textarea id="article-content-input" name="content" required>{{ article.content }}</textarea>
    </div>
    <div class="form-group">
      <label for="version-summary-input">Summary</label>
      <textarea id="version-summary-input" name="summary" required></textarea>
    </div>
    <button type="submit" id="submit-edit-article">Save Changes</button>
  </form>
</div>
{% endblock %}
