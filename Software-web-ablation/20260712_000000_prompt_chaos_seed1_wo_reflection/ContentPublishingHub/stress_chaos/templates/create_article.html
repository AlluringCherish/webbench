{% extends "base.html" %}
{% block title %}Create New Article - Content Publishing Hub{% endblock %}

{% block content %}
<div id="create-article-page">
  <h1 id="create-article-title">Create New Article</h1>
  <form id="create-article-form" method="POST" action="/article/new">
    <div class="form-group">
      <label for="article-title-input">Title</label>
      <input type="text" id="article-title-input" name="title" required />
    </div>
    <div class="form-group">
      <label for="article-content-input">Content</label>
      <textarea id="article-content-input" name="content" required></textarea>
    </div>
    <button type="submit" id="submit-create-article">Submit</button>
  </form>
</div>
{% endblock %}
