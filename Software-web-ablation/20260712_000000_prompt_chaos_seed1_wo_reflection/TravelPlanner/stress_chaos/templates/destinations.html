<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Destinations</title>
</head>
<body>
    <h1>Destinations</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <div id="destinations-grid">
        {% for dest in destinations %}
        <div id="destination-{{ dest.dest_id }}" class="destination">
            <h2>{{ dest.name }}</h2>
            <p>Country: {{ dest.country }}</p>
            <p>Region: {{ dest.region }}</p>
            <p>Climate: {{ dest.climate }}</p>
            <p>Description: {{ dest.description }}</p>
            <button id="view-destination-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
