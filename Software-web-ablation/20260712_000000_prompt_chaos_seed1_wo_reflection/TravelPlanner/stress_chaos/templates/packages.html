<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Packages</title>
</head>
<body>
    <h1>Packages</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <div id="packages-grid">
        {% for pkg in packages %}
        <div id="package-{{ pkg.package_id }}" class="package">
            <h2>{{ pkg.package_name }}</h2>
            <p>Destination: {{ pkg.destination }}</p>
            <p>Duration: {{ pkg.duration_days }} days</p>
            <p>Price: ${{ pkg.price }}</p>
            <p>Included Items: {{ pkg.included_items }}</p>
            <p>Difficulty Level: {{ pkg.difficulty_level }}</p>
            <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_details', package_id=pkg.package_id) }}'">View Details</button>
            <form method="POST" action="{{ url_for('book_package', package_id=pkg.package_id) }}">
                <button type="submit" id="book-package-button-{{ pkg.package_id }}">Book Package</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
