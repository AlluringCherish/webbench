<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Dashboard</a>
    </nav>
    <div id="featured-destinations">
        <h2>Featured Destinations</h2>
        {% for dest in featured_destinations %}
        <div id="destination-{{ dest.dest_id }}" class="destination">
            <h3>{{ dest.name }}</h3>
            <button id="view-destination-button-{{ dest.dest_id }}" onclick="location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    <div id="upcoming-trips">
        <h2>Upcoming Trips</h2>
        {% for trip in upcoming_trips %}
        <div id="trip-{{ trip.trip_id }}" class="trip">
            <h3>{{ trip.trip_name }}</h3>
            <button id="view-trip-details-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('trip_details', trip_id=trip.trip_id) }}'">View Details</button>
            <button id="edit-trip-button-{{ trip.trip_id }}" onclick="location.href='{{ url_for('edit_trip', trip_id=trip.trip_id) }}'">Edit Trip</button>
        </div>
        {% endfor %}
    </div>
</body>
</html>
