<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Locations</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <h1>Search Locations</h1>
    <form method="POST" action="{{ url_for('search_locations') }}">
        <input type="text" name="search_query" id="location-search-input" placeholder="Enter location name or country" value="{{ search_query or '' }}">
        <button type="submit" id="search-button">Search</button>
    </form>
    <div id="search-results">
        {% if search_results %}
            <ul>
            {% for location in search_results %}
                <li>{{ location.location_name }}, {{ location.country }}</li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No results found.</p>
        {% endif %}
    </div>
</body>
</html>
