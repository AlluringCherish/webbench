<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <h1>Settings</h1>
    <form method="POST" action="{{ url_for('settings') }}">
        <label for="default_location_id">Default Location:</label>
        <select name="default_location_id" id="default-location-dropdown">
            {% for location in locations %}
                <option value="{{ location.location_id }}" {% if location.location_id == default_location_id %}selected{% endif %}>{{ location.location_name }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="temperature_unit">Temperature Unit:</label>
        <select name="temperature_unit" id="temperature-unit">
            {% for unit in temperature_units %}
                <option value="{{ unit }}" {% if unit == selected_temperature_unit %}selected{% endif %}>{{ unit }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="alert_notifications_enabled">Alert Notifications:</label>
        <input type="checkbox" name="alert_notifications_enabled" id="alert-notifications" {% if alert_notifications_enabled %}checked{% endif %}>
        <br>
        <button type="submit" id="save-settings">Save</button>
    </form>
</body>
</html>
