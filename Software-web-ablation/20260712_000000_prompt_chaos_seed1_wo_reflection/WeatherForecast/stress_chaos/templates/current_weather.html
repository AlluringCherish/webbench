<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Weather</title>
</head>
<body>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <h1>Current Weather for {{ location_name }}</h1>
    <div id="temperature-display">Temperature: {{ temperature }}°</div>
    <div id="humidity-info">Humidity: {{ humidity }}%</div>
    <div id="wind-speed-info">Wind Speed: {{ wind_speed }} km/h</div>
    <div id="weather-condition">Condition: {{ condition }}</div>
</body>
</html>
