<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations - OnlineLibrary</title>
</head>
<body>
    <div id="my-reservations-page">
        <h1>My Reservations</h1>
        <div id="reservations-list">
            {% for reservation in reservations %}
            <div id="reservation-{{ reservation.reservation_id }}">
                <p>Title: {{ reservation.title }}</p>
                <p>Status: {{ reservation.status }}</p>
                <button id="cancel-reservation-button-{{ reservation.reservation_id }}" onclick="location.href='{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}'">Cancel Reservation</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
