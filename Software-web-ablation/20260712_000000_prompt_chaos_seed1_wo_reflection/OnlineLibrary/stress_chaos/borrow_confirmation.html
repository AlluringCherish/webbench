<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation - OnlineLibrary</title>
</head>
<body>
    <div id="borrow-page">
        <h1>Borrow Confirmation</h1>
        <div id="borrow-book-info">
            <p>Title: {{ book.title }}</p>
            <p>Author: {{ book.author }}</p>
            <p>Due Date: {{ due_date }}</p>
        </div>
        <form method="post" action="{{ url_for('confirm_borrow') }}">
            <button id="confirm-borrow-button">Confirm Borrow</button>
            <button id="cancel-borrow-button" type="button" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
