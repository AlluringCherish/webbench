<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review - OnlineLibrary</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review for {{ book.title }}</h1>
        <form method="post" action="{{ url_for('submit_review', book_id=book.book_id) }}">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for i in range(1, 6) %}
                <option value="{{ i }}" {% if existing_review and existing_review.rating == i %}selected{% endif %}>{{ i }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="review-textarea">Review:</label>
            <textarea id="review-textarea" name="review_text">{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea>
            <br>
            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-book" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">Back to Book</button>
    </div>
</body>
</html>
