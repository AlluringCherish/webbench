<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews - OnlineLibrary</title>
</head>
<body>
    <div id="reviews-page">
        <h1>My Reviews</h1>
        <div id="reviews-list">
            {% for review in reviews %}
            <div id="review-{{ review.review_id }}">
                <p>Book ID: {{ review.book_id }}</p>
                <p>Rating: {{ review.rating }}</p>
                <p>Review: {{ review.review_text }}</p>
                <button id="edit-review-button-{{ review.review_id }}" onclick="location.href='{{ url_for('write_review', book_id=review.book_id) }}'">Edit</button>
                <form method="post" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                    <button id="delete-review-button-{{ review.review_id }}">Delete</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
