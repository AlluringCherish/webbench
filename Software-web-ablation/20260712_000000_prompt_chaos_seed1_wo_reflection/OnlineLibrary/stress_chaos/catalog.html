<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog - OnlineLibrary</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for book in books %}
                <tr id="book-{{ book.book_id }}">
                    <td>{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td id="status-{{ book.book_id }}">{{ book.status }}</td>
                    <td>
                        <a id="details-link-{{ book.book_id }}" href="{{ url_for('book_details', book_id=book.book_id) }}">Details</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
