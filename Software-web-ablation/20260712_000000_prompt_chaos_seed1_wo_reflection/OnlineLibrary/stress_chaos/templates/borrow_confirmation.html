<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <h1>Borrow Confirmation</h1>
    <p>You are about to borrow <strong>{{ book.title }}</strong>.</p>
    <p>Due date for return: {{ due_date }}</p>

    <form method="post">
        <button type="submit">Confirm Borrow</button>
    </form>

    <p><a href="{{ url_for('book_details', book_id=book.book_id) }}">Cancel and go back</a></p>
</body>
</html>
