<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <h1>Payment Confirmation</h1>
    <p>Fine amount: ${{ '%.2f'|format(fine.amount) }}</p>
    <p>Status: {{ fine.status }}</p>

    <form method="post">
        <button type="submit">Confirm Payment</button>
    </form>

    <p><a href="{{ url_for('profile') }}">Cancel and go back</a></p>
</body>
</html>
