<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <h1>My Reservations</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Reservation Date</th>
                <th>Status</th>
                <th>Cancel</th>
            </tr>
        </thead>
        <tbody>
            {% for r in reservations %}
            <tr>
                <td>{{ r.title }}</td>
                <td>{{ r.reservation_date }}</td>
                <td>{{ r.status }}</td>
                <td>
                    {% if r.status == 'Active' %}
                    <form method="post" action="{{ url_for('cancel_reservation', reservation_id=r.reservation_id) }}">
                        <button type="submit">Cancel Reservation</button>
                    </form>
                    {% else %}
                    N/A
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
