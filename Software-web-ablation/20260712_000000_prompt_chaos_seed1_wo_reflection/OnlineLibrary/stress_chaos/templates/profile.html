<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <h1>My Profile</h1>
    <p><strong>Username:</strong> {{ username }}</p>
    <form method="post">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" value="{{ email }}" required>
        <button type="submit">Update Profile</button>
    </form>

    <h2>Borrow History</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Borrow Date</th>
                <th>Return Date</th>
            </tr>
        </thead>
        <tbody>
            {% for b in borrow_history %}
            <tr>
                <td>{{ b.title }}</td>
                <td>{{ b.borrow_date }}</td>
                <td>{% if b.return_date %}{{ b.return_date }}{% else %}Not Returned{% endif %}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
