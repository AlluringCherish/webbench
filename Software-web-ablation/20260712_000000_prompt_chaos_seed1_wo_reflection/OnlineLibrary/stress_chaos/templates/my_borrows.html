<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Borrowings</title>
</head>
<body>
    <h1>My Borrowings</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Borrow Date</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Fine Amount</th>
                <th>Return</th>
            </tr>
        </thead>
        <tbody>
            {% for b in borrowings %}
            <tr>
                <td>{{ b.title }}</td>
                <td>{{ b.borrow_date }}</td>
                <td>{{ b.due_date }}</td>
                <td>{{ b.status }}</td>
                <td>${{ '%.2f'|format(b.fine_amount) }}</td>
                <td>
                    {% if b.status in ['Active', 'Overdue'] %}
                    <form method="post" action="{{ url_for('return_book', borrow_id=b.borrow_id) }}">
                        <button type="submit">Return Book</button>
                    </form>
                    {% else %}
                    N/A
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
