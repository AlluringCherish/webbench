<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <h1>My Reviews</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Rating</th>
                <th>Review Text</th>
                <th>Edit</th>
            </tr>
        </thead>
        <tbody>
            {% for r in reviews %}
            <tr>
                <td>{{ r.title }}</td>
                <td>{{ r.rating }}</td>
                <td>{{ r.review_text }}</td>
                <td><a href="{{ url_for('write_review', book_id=r.book_id) }}">Edit Review</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
