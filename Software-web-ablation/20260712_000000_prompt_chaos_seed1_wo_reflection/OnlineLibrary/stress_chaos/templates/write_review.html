<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review for {{ book.title }}</title>
</head>
<body>
    <h1>Write Review for {{ book.title }}</h1>

    <form method="post">
        <label for="rating">Rating (1-5):</label>
        <input type="number" id="rating" name="rating" min="1" max="5" required value="{{ existing_review.rating if existing_review else '' }}">
        <br>
        <label for="review_text">Review Text:</label><br>
        <textarea id="review_text" name="review_text" rows="5" cols="50">{{ existing_review.review_text if existing_review else '' }}</textarea>
        <br>
        <button type="submit">Submit Review</button>
    </form>

    <p><a href="{{ url_for('book_details', book_id=book.book_id) }}">Back to Book Details</a></p>
</body>
</html>
