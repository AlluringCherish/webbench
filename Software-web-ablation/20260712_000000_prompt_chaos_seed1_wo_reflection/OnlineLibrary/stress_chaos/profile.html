<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - OnlineLibrary</title>
</head>
<body>
    <div id="profile-page">
        <h1>{{ username }}'s Profile</h1>
        <p>Email: {{ email }}</p>
        <h2>Borrowing History</h2>
        <ul>
            {% for borrow in borrows %}
            <li>Borrow ID: {{ borrow.borrow_id }}, Book Title: {{ borrow.title }}, Borrow Date: {{ borrow.borrow_date }}, Return Date: {{ borrow.return_date or 'Not returned' }}</li>
            {% endfor %}
        </ul>
        <button id="update-profile-button" onclick="location.href='{{ url_for('update_profile') }}'">Update Profile</button>
    </div>
</body>
</html>
