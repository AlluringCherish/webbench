<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <style>
        /* Basic styling for smooth UI */
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; }
        nav { background: #004085; padding: 10px; }
        nav a { color: #fff; text-decoration: none; margin-right: 15px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        #main-container { padding: 20px; }
        button { cursor: pointer; padding: 10px 15px; margin: 5px; border: none; background-color: #004085; color: white; border-radius: 4px; transition: background-color 0.3s ease; }
        button:hover { background-color: #002752; }
        select, input, textarea { padding: 8px; margin: 5px 0; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        .form-section { margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav aria-label="Primary Navigation">
        <a id="nav-dashboard" href="{{ url_for('dashboard') }}">Dashboard</a>
        <a id="nav-vehicle-search" href="{{ url_for('vehicle_search') }}">Search Vehicles</a>
        <a id="nav-locations" href="{{ url_for('locations_page') }}">Locations</a>
        <a id="nav-reservations" href="{{ url_for('reservations_page') }}">Reservations</a>
        <a id="nav-rental-history" href="{{ url_for('rental_history') }}">Rental History</a>
        <a id="nav-insurance" href="{{ url_for('insurance_options') }}">Insurance Options</a>
        <a id="nav-special-requests" href="{{ url_for('special_requests') }}">Special Requests</a>
    </nav>

    <main id="main-container">
        <h1>{{ page_title }}</h1>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
