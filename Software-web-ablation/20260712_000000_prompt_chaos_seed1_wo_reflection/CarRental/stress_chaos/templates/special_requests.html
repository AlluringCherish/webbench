{% extends 'layout.html' %}
{% block content %}
<form method="POST" action="{{ url_for('special_requests') }}" id="special-requests-form">
    <div class="form-section">
        <label for="special_requests">Special Requests:</label>
        <textarea id="special_requests" name="special_requests" rows="5" aria-describedby="special-requests-desc">{{ special_requests or '' }}</textarea>
        <small id="special-requests-desc">Please enter any special requests for your rental.</small>
    </div>
    {% if form_errors %}
        <div role="alert" aria-live="assertive" style="color: red;">
            <ul>
            {% for error in form_errors %}
                <li>{{ error }}</li>
            {% endfor %}
            </ul>
        </div>
    {% endif %}
    <button id="submit-requests-button" type="submit">Submit Requests</button>
</form>
{% endblock %}
