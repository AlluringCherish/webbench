<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="ticket-booking-page">
    <h1>Book Ticket for {{ event.event_name }}</h1>
    <form action="{{ url_for('book_ticket_submit', event_id=event.event_id) }}" method="POST">
        <label for="ticket-type-select">Select Ticket Type:</label>
        <select id="ticket-type-select" name="ticket_type">
            {% for ticket in tickets %}
            <option value="{{ ticket.ticket_type }}">{{ ticket.ticket_type }} - ${{ ticket.price }}</option>
            {% endfor %}
        </select>
        <label for="ticket-quantity-input">Quantity:</label>
        <input type="number" id="ticket-quantity-input" name="ticket_count" min="1" max="10" value="1" required>
        <button id="book-ticket-button" type="submit">Book Ticket</button>
    </form>
    <a href="{{ url_for('event_details', event_id=event.event_id) }}" id="back-to-event-details">Back to Event Details</a>
</div>
</body>
</html>
