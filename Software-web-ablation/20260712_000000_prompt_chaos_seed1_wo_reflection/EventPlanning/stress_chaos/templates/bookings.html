<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="bookings-page">
    <h1>My schedules</h1>
    <div id="bookings-list">
        <table>
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Event</th>
                    <th>Booking Date</th>
                    <th>Tickets</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr>
                    <td>{{ booking.booking_id }}</td>
                    <td>{{ booking.event_name }}</td>
                    <td>{{ booking.booking_date }}</td>
                    <td>{{ booking.ticket_count }}</td>
                    <td>{{ booking.status }}</td>
                    <td>
                        <form action="{{ url_for('cancel_booking', booking_id=booking.booking_id) }}" method="POST" style="display:inline;">
                            <button id="cancel-booking-button-{{ booking.booking_id }}" type="submit">Cancel</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <a href="{{ url_for('dashboard_page') }}" id="back-to-dashboard">Back to Dashboard</a>
</div>
</body>
</html>
