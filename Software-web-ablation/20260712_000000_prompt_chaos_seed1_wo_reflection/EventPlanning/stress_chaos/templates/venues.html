<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
<div id="venues-page">
    <h1 id="venues-page">Venues</h1>
    <div id="venues-grid">
        {% for venue in venues %}
        <div class="venue-card">
            <h2>{{ venue.venue_name }}</h2>
            <p><strong>Location:</strong> {{ venue.location }}</p>
            <p><strong>Capacity:</strong> {{ venue.capacity }}</p>
            <p><strong>Amenities:</strong> {{ venue.amenities }}</p>
            <a href="{{ url_for('venue_details', venue_id=venue.venue_id) }}" id="view-venue-details-{{ venue.venue_id }}">View Details</a>
        </div>
        {% endfor %}
    </div>
    <a href="{{ url_for('dashboard_page') }}" id="back-to-dashboard">Back to Dashboard</a>
</div>
</body>
</html>
