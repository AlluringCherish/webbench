<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ event.event_name }} Details</title>
</head>
<body>
<div id="event-details-page">
    <h1 id="event-title">{{ event.event_name }}</h1>
    <p><strong>Category:</strong> {{ event.category }}</p>
    <p><strong>Date:</strong> {{ event.date }} {{ event.time }}</p>
    <p><strong>Location:</strong> {{ event.location }}</p>
    <p><strong>Venue:</strong> <a href="{{ url_for('venue_details', venue_id=event.venue_id) }}" id="view-venue-details-{{ event.venue_id }}">View Venue Details</a></p>
    <p><strong>Description:</strong> {{ event.description }}</p>
    <button id="book-ticket-button" onclick="location.href='{{ url_for('book_ticket_page', event_id=event.event_id) }}'">Book Ticket</button>
    <a href="{{ url_for('events_page') }}" id="back-to-events">Back to Events</a>
</div>
</body>
</html>
