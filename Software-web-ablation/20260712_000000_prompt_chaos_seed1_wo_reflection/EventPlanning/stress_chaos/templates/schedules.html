<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="schedules-page">
    <h1>Schedules</h1>
    <div id="schedules-timeline">
        {% for schedule in schedules %}
        <div class="schedule-entry">
            <h3>{{ schedule.session_title }}</h3>
            <p><strong>Time:</strong> {{ schedule.session_time }} minutes</p>
            <p><strong>Date:</strong> {{ schedule.date }}</p>
            <p><strong>Speaker:</strong> {{ schedule.speaker }}</p>
        </div>
        {% endfor %}
    </div>
    <a href="{{ url_for('dashboard_page') }}" id="back-to-dashboard">Back to Dashboard</a>
</div>
</body>
</html>
