<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Event Planning Dashboard</h1>
    <div id="navigation">
        <a href="{{ url_for('events_page') }}" id="browse-events-button">Browse Events</a>
        <a href="{{ url_for('venues_page') }}" id="venues-button">Venues</a>
        <a href="{{ url_for('bookings_page') }}" id="bookings-button">My Schedules</a>
        <a href="{{ url_for('participants_page') }}" id="participants-button">Participants</a>
    </div>
    <div id="featured-events">
        <h2>Featured Events</h2>
        <div id="events-grid">
            {% for event in featured_events %}
            <div class="event-card">
                <h3 id="event-title">{{ event.event_name }}</h3>
                <p>{{ event.category }} - {{ event.date }} {{ event.time }}</p>
                <p>{{ event.location }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
</body>
</html>
