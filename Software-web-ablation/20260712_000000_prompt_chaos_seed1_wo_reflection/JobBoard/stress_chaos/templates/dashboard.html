<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<h1>Dashboard</h1>
<h2>Featured Jobs</h2>
<div id="featured-jobs">
    {% for job in featured_jobs %}
    <div class="job-card">
        <h3>{{ job.title }}</h3>
        <p>Company: {{ job.company_name }}</p>
        <p>Location: {{ job.location }}</p>
        <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
        <a href="{{ url_for('job_details', job_id=job.job_id) }}">View Details</a>
    </div>
    {% endfor %}
</div>

<a href="{{ url_for('job_listings') }}">View All Jobs</a><br>
<a href="{{ url_for('companies_directory') }}">View Companies</a><br>
<a href="{{ url_for('application_tracking') }}">Track Applications</a>
</body>
</html>
