<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ job.title }} - Details</title>
</head>
<body>
    <div id="job-details-page">
        <h1>{{ job.title }}</h1>
        <p>Company: {{ job.company.company_name }}</p>
        <p>Location: {{ job.location }}</p>
        <p>Description: {{ job.description }}</p>
        <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
        <a href="{{ url_for('job_listings') }}" id="back-to-listings">Back to Listings</a>
    </div>
</body>
</html>
