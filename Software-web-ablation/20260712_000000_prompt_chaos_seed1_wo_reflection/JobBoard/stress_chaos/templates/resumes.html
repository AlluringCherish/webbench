<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>
        <div id="resumes-list">
            {% for resume in resumes %}
                <div class="resume-entry" id="resume-{{ resume.resume_id }}">
                    <p>Name: {{ resume.applicant_name }}</p>
                    <p>Email: {{ resume.applicant_email }}</p>
                    <p>File: {{ resume.filename }}</p>
                    <p>Upload Date: {{ resume.upload_date }}</p>
                </div>
            {% endfor %}
        </div>
        <form method="POST" enctype="multipart/form-data" action="{{ url_for('upload_resume') }}">
            <input type="file" id="resume-file-input" name="resume_file" required>
            <button type="submit" id="upload-resume-button">Upload Resume</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
