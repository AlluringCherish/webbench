<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Application</title>
</head>
<body>
<h1>Apply for {{ job.title }}</h1>
<form action="{{ url_for('application_form', job_id=job.job_id) }}" method="POST" enctype="multipart/form-data">
    <label for="applicant_name">Name:</label>
    <input type="text" id="applicant_name" name="applicant_name" required><br>

    <label for="applicant_email">Email:</label>
    <input type="email" id="applicant_email" name="applicant_email" required><br>

    <label for="resume_file">Upload Resume:</label>
    <input type="file" id="resume_file" name="resume_file" accept=".pdf,.doc,.docx" required><br>

    <label for="cover_letter">Cover Letter:</label><br>
    <textarea id="cover_letter" name="cover_letter" rows="6" cols="60"></textarea><br>

    <button type="submit">Submit Application</button>
</form>

<a href="{{ url_for('job_details', job_id=job.job_id) }}">Back to Job Details</a>
</body>
</html>
