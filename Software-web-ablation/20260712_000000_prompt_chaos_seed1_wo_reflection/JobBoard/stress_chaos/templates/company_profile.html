<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ company.company_name }} Profile</title>
</head>
<body>
    <h1>{{ company.company_name }} Profile</h1>
    <p>{{ company.description }}</p>
    <div id="company-jobs">
        <h2>Jobs at {{ company.company_name }}</h2>
        <ul>
            {% for job in jobs %}
                <li>
                    <span>{{ job.title }}</span>
                    <button id="view-job-button-{{ job.job_id }}" onclick="location.href='{{ url_for('job_details', job_id=job.job_id) }}'">View Job</button>
                </li>
            {% endfor %}
        </ul>
    </div>
    <button id="back-to-companies" onclick="location.href='{{ url_for('companies_directory') }}'">Back to Companies</button>
</body>
</html>
