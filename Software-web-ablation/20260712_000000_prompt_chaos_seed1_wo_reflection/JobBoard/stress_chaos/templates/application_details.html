<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Details</title>
</head>
<body>
<h1>Application Details</h1>
<p>Name: {{ application.applicant_name }}</p>
<p>Email: {{ application.applicant_email }}</p>
<p>Status: {{ application.status }}</p>
<p>Applied Date: {{ application.applied_date }}</p>
<p>Resume: <a href="{{ url_for('static', filename='uploads/' + resume.filename) }}" target="_blank">{{ resume.filename }}</a></p>
<p>Cover Letter:</p>
<p>{{ application.cover_letter }}</p>

<a href="{{ url_for('application_tracking') }}">Back to Application Tracking</a>
</body>
</html>
