<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Details</title>
</head>
<body>
    <div id="application-details-page">
        <h1>Application Details for {{ application.applicant_name }}</h1>
        <p>Email: {{ application.applicant_email }}</p>
        <p>Status: {{ application.status }}</p>
        <p>Date: {{ application.date }}</p>
        <p>Resume: {{ application.resume }}</p>
        <button id="back-to-tracking" onclick="location.href='{{ url_for('application_tracking') }}'">Back to Tracking</button>
    </div>
</body>
</html>
