<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Summary</title>
</head>
<body>
    <h1>Energy Summary</h1>
    <div id="main-container-id">
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <table id="energy-table" border="1">
            <thead>
                <tr>
                    <th>Device</th>
                    <th>Room</th>
                    <th>Status</th>
                    <th>Energy Consumption (kWh)</th>
                </tr>
            </thead>
            <tbody>
                {% for device in devices %}
                <tr>
                    <td>{{ device.device_type }}</td>
                    <td>{{ device.room }}</td>
                    <td>{{ 'Online' if device.online else 'Offline' }}</td>
                    <td>{{ device.consumption_kwh }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
