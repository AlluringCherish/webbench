<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <h1>Device Control</h1>
    <div id="main-container-id">
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <div id="device-summary">
            <h2>{{ device.name }}</h2>
            <p>Type: {{ device.device_type }}</p>
            <p>Room: {{ device.room }}</p>
            <p>Status: {{ 'Online' if device.online else 'Offline' }}</p>
            <form method="POST">
                <button id="control-device-button-{{ device.device_id }}" name="power-toggle" type="submit">
                    {% if device.status == 'on' %}Turn Off{% else %}Turn On{% endif %}
                </button>
            </form>
        </div>
    </div>
</body>
</html>
