<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body id="main-container-id">
    <h1>Bid History</h1>
    <div>
        <label for="filter-by-auction">Filter by Auction:</label>
        <select id="filter-by-auction" name="auction_id" onchange="location.href=this.options[this.selectedIndex].value;">
            <option value="">--Select Auction--</option>
            {% for bid in bids %}
                <option value="{{ url_for('auction_details', auction_id=bid.auction_id) }}">{{ bid.item_name }}</option>
            {% endfor %}
        </select>
    </div>
</body>
</html>
