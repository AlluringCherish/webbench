<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body id="main-container-id">
    <h1>Auction Catalog</h1>
    <div>
        <select id="category-filter" name="category">
            <option value="">--Select Category--</option>
            {% for category in categories %}
                <option value="{{ category.category_id }}">{{ category.category_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div id="auctions-grid">
        {% for auction in auctions %}
            <div id="card-{{ auction.auction_id }}" class="card">
                <h2>{{ auction.item_name }}</h2>
                <p>End Time: {{ auction.end_time }}</p>
                <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Auction</button>
            </div>
        {% endfor %}
    </div>
</body>
</html>
