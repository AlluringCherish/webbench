<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body id="main-container-id">
    <h1>Trending Auctions</h1>
    <div>
        <label for="time-range-filter">Time Range Filter:</label>
        <select id="time-range-filter" name="time_range">
            <option value="24h">Last 24 Hours</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
        </select>
    </div>
    <div id="trending-list">
        {% for auction in trending_auctions %}
            <div id="trending-auction-{{ auction.auction_id }}" class="trending-auction">
                <h2>{{ auction.item_name }}</h2>
                <p>Current Bid: ${{ auction.current_bid }}</p>
                <p>Bid Count: {{ auction.bid_count }}</p>
                <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Auction</button>
            </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('auction_dashboard') }}'">Back to Dashboard</button>
</body>
</html>
