<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body id="main-container-id">
    <h1>Place Bid</h1>
    <form action="{{ url_for('place_bid', auction_id=auction.auction_id) }}" method="POST">
        <div>
            <label for="bidder-name">Bidder Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" required>
        </div>
        <div>
            <label for="minimum-bid">Minimum Bid:</label>
            <div id="minimum-bid">${{ auction.current_bid }}</div>
        </div>
        <button id="place-bid-button" type="submit">Place Bid</button>
    </form>
    <div id="bid-history">
        <h2>Bid History</h2>
        {% for bid in bid_history %}
            <div class="bid-entry">
                <span>{{ bid.bidder_name }}: ${{ bid.bid_amount }}</span>
            </div>
        {% endfor %}
    </div>
</body>
</html>
