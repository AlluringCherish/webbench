<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body id="main-container-id">
    <h1>Winning Items</h1>
    <div id="winners-list">
        {% for winner in winners %}
            <div id="winner-{{ winner.auction_id }}" class="winner-card">
                <h2>{{ winner.item_name }}</h2>
                <p>Winning Bid: ${{ winner.winning_bid }}</p>
                <p>Time Period: {{ winner.time_period }}</p>
            </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('auction_dashboard') }}'">Back to Dashboard</button>
</body>
</html>
