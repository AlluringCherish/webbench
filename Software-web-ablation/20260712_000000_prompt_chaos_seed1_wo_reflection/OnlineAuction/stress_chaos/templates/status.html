<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body id="main-container-id">
    <h1>Auction Status</h1>
    <div id="status-table">
        <table>
            <thead>
                <tr>
                    <th>Auction Item</th>
                    <th>Status</th>
                    <th>Current Bid</th>
                    <th>Time Remaining</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                    <tr>
                        <td>{{ auction.item_name }}</td>
                        <td>{{ auction.status }}</td>
                        <td>${{ auction.current_bid }}</td>
                        <td>{{ auction.time_remaining }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <button id="refresh-status-button" onclick="location.reload()">Refresh Status</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('auction_dashboard') }}'">Back to Dashboard</button>
</body>
</html>
