<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning - {{ course.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="learning-page">
        <h1 id="course-title">{{ course.title }}</h1>
        <div id="lesson-content">
            <h2>{{ current_lesson.title }}</h2>
            <p>{{ current_lesson.content }}</p>
        </div>
        <button id="mark-complete-button" {% if current_lesson.lesson_id in completed_lessons %}disabled{% endif %} 
            onclick="fetch('{{ url_for('mark_complete', course_id=course.course_id, lesson_id=current_lesson.lesson_id) }}', {method: 'POST'})
            .then(() => window.location.reload())">
            {% if current_lesson.lesson_id in completed_lessons %}Completed{% else %}Mark as Complete{% endif %}
        </button>
        <button id="back-to-my-courses" onclick="window.location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
