<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses - {{ username }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="my-courses-page">
        <h1>My Courses</h1>
        <div id="enrolled-courses">
            <ul>
            {% for course in enrolled_courses %}
                <li>
                    <span>{{ course.title }}</span>
                    <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
                </li>
            {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
