<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - {{ username }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="profile-page">
        <h1>Profile for {{ fullname }}</h1>
        <p id="profile-email">Email: {{ email }}</p>
        <p id="profile-fullname">Full Name: {{ fullname }}</p>
        <button id="update-profile-button" onclick="window.location.href='{{ url_for('update_profile') }}'">Update Profile</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
