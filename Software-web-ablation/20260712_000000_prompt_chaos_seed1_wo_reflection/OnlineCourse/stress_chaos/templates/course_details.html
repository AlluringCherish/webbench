<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details: {{ course.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="course-details-page">
        <h1 id="course-title">{{ course.title }}</h1>
        <div id="course-description">
            <p>{{ course.description }}</p>
        </div>
        <div id="lessons-list">
            <h2>Lessons</h2>
            <ul>
            {% for lesson in lessons %}
                <li id="lesson-{{ lesson.lesson_id }}" class="{% if lesson.lesson_id == current_lesson_id %}current{% endif %}">
                    {{ lesson.title }}{% if lesson.lesson_id == current_lesson_id %} (Current){% endif %}
                </li>
            {% endfor %}
            </ul>
        </div>
        <button id="back-to-catalog" onclick="window.location.href='{{ url_for('course_catalog') }}'">Back to Catalog</button>
        <button id="back-to-my-courses" onclick="window.location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
    </div>
</body>
</html>
