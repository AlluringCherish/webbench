<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - {{ username }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ fullname }}!</h1>
        <button id="my-courses-button" onclick="window.location.href='{{ url_for('my_courses') }}'">My Courses</button>
        <button id="back-to-catalog" onclick="window.location.href='{{ url_for('course_catalog') }}'">Browse Courses</button>
        <button id="profile-button" onclick="window.location.href='{{ url_for('user_profile') }}'">Profile</button>
        <button id="my-assignments-button" onclick="window.location.href='{{ url_for('my_assignments') }}'">My Assignments</button>
        <button id="my-certificates-button" onclick="window.location.href='{{ url_for('my_certificates') }}'">My Certificates</button>
    </div>
</body>
</html>
