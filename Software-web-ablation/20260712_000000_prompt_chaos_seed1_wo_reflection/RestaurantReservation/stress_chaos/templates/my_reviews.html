<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <h1>My Reviews</h1>
    <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    <ul>
    {% for review in reviews %}
        <li>
            <strong>{{ review.dish_name }}</strong><br>
            Rating: {{ review.rating }}/5<br>
            <p>{{ review.review_text }}</p>
            <em>{{ review.review_date }}</em>
        </li>
    {% endfor %}
    </ul>
</body>
</html>
