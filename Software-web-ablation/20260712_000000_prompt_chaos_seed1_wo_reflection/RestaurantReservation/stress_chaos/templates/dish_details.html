<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ dish.name }}</title>
</head>
<body>
    <h1>{{ dish.name }}</h1>
    <p>Category: {{ dish.category }}</p>
    <p>Price: ${{ '%.2f'|format(dish.price) }}</p>
    <p>Description: {{ dish.description }}</p>
    <button onclick="window.location.href='{{ url_for('menu') }}'">Back to Menu</button>
</body>
</html>
