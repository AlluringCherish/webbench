<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <h1>Profile</h1>
    <div id="welcome-message">Welcome, {{ user.full_name if user and user.full_name else user.username if user else 'Guest' }}!</div>
    <p>Username: {{ user.username }}</p>
    <p>Email: {{ user.email }}</p>
    <p>Phone: {{ user.phone }}</p>
    <p>Full Name: {{ user.full_name }}</p>
    <button onclick="window.location.href='{{ url_for('update_profile') }}'">Update Profile</button>
    <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
