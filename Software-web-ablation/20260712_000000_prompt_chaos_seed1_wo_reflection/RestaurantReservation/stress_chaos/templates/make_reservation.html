<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Reservation</title>
</head>
<body>
    <h1>Make Reservation</h1>
    <div id="welcome-message">Welcome, {{ user.full_name if user and user.full_name else user.username if user else 'Guest' }}!</div>
    <form action="{{ url_for('make_reservation') }}" method="post">
        <label for="guest_name">Guest Name:</label>
        <input type="text" id="guest_name" name="guest_name" value="{{ user.full_name if user and user.full_name else '' }}" required>
        <br>
        <label for="party_size">Party Size:</label>
        <select id="party_size" name="party_size" required>
            {% for size in range(1, 11) %}
            <option value="{{ size }}">{{ size }}</option>
            {% endfor %}
        </select>
        <br>
        <label for="reservation_date">Date:</label>
        <input type="date" id="reservation_date" name="reservation_date" required>
        <br>
        <label for="reservation_time">Time:</label>
        <input type="time" id="reservation_time" name="reservation_time" required>
        <br>
        <label for="special_requests">Special Requests:</label>
        <textarea id="special_requests" name="special_requests"></textarea>
        <br>
        <button type="submit">Submit Reservation</button>
    </form>
    <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
