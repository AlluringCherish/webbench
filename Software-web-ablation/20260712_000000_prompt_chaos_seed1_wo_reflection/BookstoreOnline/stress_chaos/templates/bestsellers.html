<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
<h1 id="bestsellers-page">Bestsellers</h1>
<div id="bestsellers-container">
    {% for bestseller in bestsellers %}
        <div id="bestseller-{{ bestseller.book_id }}">
            <h2>{{ bestseller.title }}</h2>
            <p>Sales Count: {{ bestseller.sales_count }}</p>
            <p>Period: {{ bestseller.period }}</p>
        </div>
    {% else %}
        <p>No bestsellers data available.</p>
    {% endfor %}
</div>
</body>
</html>
