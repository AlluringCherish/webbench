<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
</head>
<body>
    <h1>Book Catalog</h1>
    <form action="{{ url_for('book_catalog') }}" method="get">
        <input type="text" id="search-input" name="search_query" value="{{ search_query }}" placeholder="Search Books..." />
        <select name="category_filter">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_id }}" {% if category.category_id|string == selected_category %}selected{% endif %}>{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
    </form>

    <div>
        {% for book in books %}
        <div>
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
            <p>ISBN: {{ book.isbn }}</p>
            <p>Category: {{ book.category }}</p>
            <p>Price: ${{ book.price }}</p>
            <a href="{{ url_for('book_details', book_id=book.book_id) }}">Details</a>
        </div>
        {% else %}
        <p>No books found.</p>
        {% endfor %}
    </div>
</body>
</html>
