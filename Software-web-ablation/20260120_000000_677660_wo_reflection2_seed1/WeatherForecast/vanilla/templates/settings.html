<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>
        <form action="{{ url_for('settings') }}" method="post">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                <option value="Celsius" {% if temperature_unit == "Celsius" %}selected{% endif %}>Celsius</option>
                <option value="Fahrenheit" {% if temperature_unit == "Fahrenheit" %}selected{% endif %}>Fahrenheit</option>
                <option value="Kelvin" {% if temperature_unit == "Kelvin" %}selected{% endif %}>Kelvin</option>
            </select>
            <br>
            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for loc in saved_locations %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == default_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" value="true" {% if alert_notifications_enabled %}checked{% endif %}>
            <br>
            <button type="submit" id="save-settings-button">Save Changes</button>
        </form>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
