<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>

        <label for="duration-filter">Duration Filter:</label>
        <select id="duration-filter" name="duration-filter">
            <option value="">All</option>
            <option value="3-5">3-5 days</option>
            <option value="7-10">7-10 days</option>
            <option value="14+">14+ days</option>
        </select>

        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-card" id="package-{{ pkg.package_id }}">
                <h2>{{ pkg.package_name }}</h2>
                <p>Destination: {{ pkg.destination }}</p>
                <p>Duration: {{ pkg.duration_days }} days</p>
                <p>Price: ${{ '%.2f' | format(pkg.price) }}</p>
                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='#'">View Details</button>
                <button id="book-package-button-{{ pkg.package_id }}">Book Package</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
