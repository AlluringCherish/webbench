<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>

        <label for="recommendation-season-filter">Travel Season:</label>
        <select id="recommendation-season-filter" name="recommendation-season-filter">
            <option value="">All Seasons</option>
            <option value="Spring">Spring</option>
            <option value="Summer">Summer</option>
            <option value="Fall">Fall</option>
            <option value="Winter">Winter</option>
        </select>

        <label for="budget-filter">Budget:</label>
        <select id="budget-filter" name="budget-filter">
            <option value="">Any Budget</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <div id="trending-destinations">
            <h2>Trending Destinations</h2>
            <ul>
                {% for dest in trending_destinations %}
                    <li>{{ dest.name }}, {{ dest.country }} (Popularity: {{ dest.popularity }})</li>
                {% endfor %}
            </ul>
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
