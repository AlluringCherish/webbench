<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write Review</h1>
    {% if errors %}
    <ul style="color:red;">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <form method="post" action="{{ url_for('write_review') }}">
        <label for="select-dish">Select Dish:</label>
        <select id="select-dish" name="selected_dish_id" required>
            {% for dish in dishes %}
            <option value="{{ dish.dish_id }}" {% if request.form.selected_dish_id|int == dish.dish_id %}selected{% endif %}>{{ dish.name }}</option>
            {% endfor %}
        </select>
        <br>

        <label for="rating-input">Rating:</label>
        <select id="rating-input" name="rating" required>
            {% for r in range(1, 6) %}
            <option value="{{ r }}" {% if request.form.rating|int == r %}selected{% endif %}>{{ r }}</option>
            {% endfor %}
        </select>
        <br>

        <label for="review-text">Review:</label>
        <textarea id="review-text" name="review_text" rows="4" cols="50" required>{{ request.form.review_text or '' }}</textarea>
        <br>

        <button type="submit" id="submit-review-button">Submit Review</button>
    </form>
    <button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
</div>
</body>
</html>
