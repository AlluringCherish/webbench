<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
<div id="menu-page">
    <h1>Restaurant Menu</h1>
    <div id="menu-grid">
        {% for dish in menus %}
        <div class="dish-card">
            <h2>{{ dish.name }}</h2>
            <p>Category: {{ dish.category }}</p>
            <p>Price: ${{ '%.2f'|format(dish.price) }}</p>
            <p>{{ dish.description }}</p>
            <p>Ingredients: {{ dish.ingredients }}</p>
            <p>Dietary: {{ dish.dietary }}</p>
            <p>Average Rating: {{ '%.1f'|format(dish.avg_rating) }}</p>
            <button id="view-dish-button-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
