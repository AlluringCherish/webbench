<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
<div id="reservation-page">
    <h1>Make Reservation</h1>
    {% if errors %}
    <ul style="color:red;">
        {% for error in errors %}
        <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
    <form method="post" action="{{ url_for('make_reservation') }}">
        <label for="guest-name">Guest Name:</label>
        <input type="text" id="guest-name" name="guest_name" value="{{ request.form.guest_name or '' }}" required>
        <br>

        <label for="party-size">Party Size:</label>
        <select id="party-size" name="party_size" required>
            {% for i in range(1, 11) %}
            <option value="{{ i }}" {% if request.form.party_size|int == i %}selected{% endif %}>{{ i }}</option>
            {% endfor %}
        </select>
        <br>

        <label for="reservation-date">Reservation Date:</label>
        <input type="date" id="reservation-date" name="reservation_date" value="{{ request.form.reservation_date or '' }}" required>
        <br>

        <button type="submit" id="submit-reservation-button">Submit Reservation</button>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
