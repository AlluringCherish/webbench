<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>

        <div id="category-articles">
            {% for article in articles %}
            <div class="category-article">
                <h2>{{ article.title }}</h2>
                <div>Author: {{ article.author }}</div>
                <div>Date: {{ article.date }}</div>
                <div>Views: {{ article.views }}</div>
            </div>
            {% endfor %}
        </div>

        <button id="sort-by-date" onclick="location.href='{{ url_for('sort_category_articles', category_name=category_name, sort_type='date') }}'">Sort by Date</button>
        <button id="sort-by-popularity" onclick="location.href='{{ url_for('sort_category_articles', category_name=category_name, sort_type='popularity') }}'">Sort by Popularity</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
