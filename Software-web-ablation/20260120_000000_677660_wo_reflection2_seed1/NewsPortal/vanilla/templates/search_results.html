<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>

        <div id="search-query-display">Search Query: {{ search_query }}</div>

        {% if search_results|length > 0 %}
        <div id="results-list">
            {% for article in search_results %}
            <div class="search-result-item">
                <h2>{{ article.title }}</h2>
                <p>{{ article.excerpt }}</p>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div id="no-results-message">No results found.</div>
        {% endif %}

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
