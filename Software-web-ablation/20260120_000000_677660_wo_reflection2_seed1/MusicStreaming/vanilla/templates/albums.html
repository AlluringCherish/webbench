<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>

    <input type="text" id="search-albums" placeholder="Search albums..." />

    <select id="sort-albums" name="sort-albums">
        <option value="">Sort By</option>
        <option value="title">Title</option>
        <option value="year">Year</option>
    </select>

    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-card">
            <h3>{{ album.title }}</h3>
            <p>{{ album.artist_name }} - {{ album.year }}</p>
            <a href="{{ url_for('album_details', album_id=album.album_id) }}">
                <button id="view-album-button-{{ album.album_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
