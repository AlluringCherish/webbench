<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Song Catalog</h1>

    <input type="text" id="search-input" placeholder="Search songs..." />

    <select id="genre-filter" name="genre-filter">
        <option value="">All Genres</option>
        {% for genre in genres %}
        <option value="{{ genre }}">{{ genre }}</option>
        {% endfor %}
    </select>

    <div id="songs-grid">
        {% for song in songs %}
        <div class="song-card">
            <p>{{ song.title }} by {{ song.artist_name }}</p>
            <p>Album: {{ song.album_name }} | Genre: {{ song.genre }} | Duration: {{ song.duration }}s</p>
            <form method="POST" action="#">
                <button type="submit" id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
