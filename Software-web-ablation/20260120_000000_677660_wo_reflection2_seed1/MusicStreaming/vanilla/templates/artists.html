<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>

    <input type="text" id="search-artists" placeholder="Search artists..." />

    <select id="artists-sort" name="artists-sort">
        <option value="">Sort By</option>
        <option value="name">Name</option>
        <option value="genre">Genre</option>
    </select>

    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-card">
            <h3>{{ artist.name }}</h3>
            <p>Genre: {{ artist.genre }}</p>
            <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">
                <button id="view-artist-button-{{ artist.artist_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
