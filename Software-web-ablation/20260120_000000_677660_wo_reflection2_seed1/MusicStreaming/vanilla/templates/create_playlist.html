<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
<div id="create-playlist-page">
    <h1>Create New Playlist</h1>

    {% if errors %}
    <ul>
        {% for error in errors %}
        <li style="color:red">{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{{ url_for('create_playlist') }}">
        <label for="playlist-name-input">Name:</label>
        <input id="playlist-name-input" name="title" type="text" required />
        <br />
        <label for="playlist-description-input">Description:</label>
        <textarea id="playlist-description-input" name="description" rows="4" cols="50"></textarea>
        <br />
        <button id="save-playlist-button" type="submit">Save Playlist</button>
        <button id="cancel-create-button" type="button" onclick="location.href='{{ url_for('playlists_page') }}'">Cancel</button>
    </form>
</div>
</body>
</html>
