<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="main-container">
        <div id="cart-page">
            <h1>Shopping Cart</h1>
            <form method="POST" action="{{ url_for('update_cart') }}">
                <table id="cart-items-table" border="1">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Remove</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for cart_item in cart_items %}
                        <tr>
                            <td>{{ cart_item.item_name }}</td>
                            <td>
                                <input type="number" id="update-quantity-{{ cart_item.item_id }}" name="quantity_{{ cart_item.item_id }}" value="{{ cart_item.quantity }}" min="1">
                            </td>
                            <td>${{ '%.2f' | format(cart_item.price * cart_item.quantity) }}</td>
                            <td>
                                <button type="submit" name="remove_item_id" value="{{ cart_item.item_id }}" id="remove-item-button-{{ cart_item.item_id }}">Remove</button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
                <div id="total-amount">
                    <strong>Total: ${{ '%.2f' | format(total_amount) }}</strong>
                </div>
                <a href="{{ url_for('checkout_page') }}">
                    <button type="button" id="proceed-checkout-button">Proceed to Checkout</button>
                </a>
            </form>
        </div>
    </div>
</body>
</html>
