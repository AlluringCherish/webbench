<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="main-container">
        <div id="checkout-page">
            <h1>Checkout</h1>
            <form method="POST" action="{{ url_for('checkout_page') }}">
                <label for="customer-name">Name:</label>
                <input type="text" id="customer-name" name="customer_name" required>

                <label for="delivery-address">Delivery Address:</label>
                <textarea id="delivery-address" name="delivery_address" required></textarea>

                <label for="phone-number">Phone Number:</label>
                <input type="tel" id="phone-number" name="phone_number" required>

                <label for="payment-method">Payment Method:</label>
                <select id="payment-method" name="payment_method" required>
                    <option value="credit_card">Credit Card</option>
                    <option value="debit_card">Debit Card</option>
                    <option value="paypal">PayPal</option>
                    <option value="cash">Cash</option>
                </select>

                <button type="submit" id="place-order-button">Place Order</button>
            </form>
        </div>
    </div>
</body>
</html>
