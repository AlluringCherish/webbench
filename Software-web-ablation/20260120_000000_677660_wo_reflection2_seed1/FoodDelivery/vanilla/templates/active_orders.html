<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders-page">
            <h1>Active Orders</h1>
            <div id="orders-list">
                {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Status: {{ order.status }}</p>
                    <p>Total Amount: ${{ '%.2f' | format(order.total_amount) }}</p>
                    <a href="{{ url_for('order_tracking', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
                {% endfor %}
            </div>
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status_filter">
                <option value="">All</option>
                {% for status in status_filter_options %}
                <option value="{{ status }}">{{ status }}</option>
                {% endfor %}
            </select>

            <a href="{{ url_for('dashboard') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
