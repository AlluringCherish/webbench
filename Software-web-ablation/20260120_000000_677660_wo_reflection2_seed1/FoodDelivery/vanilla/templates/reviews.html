<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>
            <div id="reviews-list">
                {% for review in reviews %}
                <div class="review-card">
                    <p><strong>{{ review.customer_name }}</strong> rated {{ review.rating }}/5</p>
                    <p>{{ review.review_text }}</p>
                    <p><em>{{ review.review_date }}</em></p>
                </div>
                {% endfor %}
            </div>
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="rating_filter">
                <option value="">All Ratings</option>
                {% for rating in rating_filter_options %}
                <option value="{{ rating }}">{{ rating }}</option>
                {% endfor %}
            </select>
            <a href="{{ url_for('write_review') }}">
                <button id="write-review-button">Write Review</button>
            </a>
            <a href="{{ url_for('dashboard') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
