<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
    <div id="energy-page">
        <h1>Energy Report</h1>
        <div id="energy-summary">
            <p>Total Consumption: {{ total_consumption }} kWh</p>
            <p>Estimated Cost: ${{ "%.2f"|format(total_cost) }}</p>
        </div>
        <form method="POST" action="{{ url_for('apply_energy_filter') }}">
            <label for="date-filter">Filter by Date:</label>
            <input type="date" id="date-filter" name="filter_date" />
            <button type="submit" id="apply-filter-button">Apply Filter</button>
        </form>
        <table id="energy-table" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Device</th>
                    <th>Consumption (kWh)</th>
                </tr>
            </thead>
            <tbody>
            {% for log in energy_logs %}
                <tr>
                    <td>{{ log.date }}</td>
                    <td>{{ log.device_name }}</td>
                    <td>{{ log.consumption_kwh }}</td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
