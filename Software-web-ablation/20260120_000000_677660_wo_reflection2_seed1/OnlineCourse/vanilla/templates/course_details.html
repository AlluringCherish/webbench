<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
    <div id="course-details-page">
        <h1 id="course-title">{{ course.title }}</h1>
        <div id="course-description">{{ course.description }}</div>

        <form method="POST" action="{{ url_for('enroll_course', course_id=course.course_id) }}">
            <button type="submit" id="enroll-button" {% if enrolled %}disabled{% endif %}>
                {% if enrolled %}Already Enrolled{% else %}Enroll{% endif %}
            </button>
        </form>

        <button id="back-to-catalog" onclick="window.location.href='{{ url_for('show_catalog') }}'">Back to Catalog</button>
    </div>
</body>
</html>
