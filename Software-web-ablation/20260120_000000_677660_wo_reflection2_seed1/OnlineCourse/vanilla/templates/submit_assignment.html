<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="submit-page">
        <h1>Submit Assignment</h1>

        <div id="assignment-info">
            <h2>{{ assignment.title }}</h2>
            <p>{{ assignment.description }}</p>
            <p>Due Date: {{ assignment.due_date }}</p>
            <p>Max Points: {{ assignment.max_points }}</p>
        </div>

        {% if submission_success is defined %}
            <p>{{ confirmation_message }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('submit_assignment_post', assignment_id=assignment.assignment_id) }}">
            <textarea id="submission-text" name="submission_text" rows="10" cols="50" required></textarea><br />
            <button type="submit" id="submit-button">Submit</button>
        </form>

        <button id="back-to-assignments" onclick="window.location.href='{{ url_for('show_assignments') }}'">Back to Assignments</button>
    </div>
</body>
</html>
