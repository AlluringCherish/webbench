<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Available Courses</h1>

        <form method="POST" action="{{ url_for('search_courses') }}">
            <input type="text" id="search-input" name="search_term" placeholder="Search courses" />
            <button type="submit">Search</button>
        </form>

        <div id="course-grid">
            {% if courses %}
                <ul>
                {% for course in courses %}
                    <li>
                        <strong>{{ course.title }}</strong><br />
                        <em>{{ course.category }} | Level: {{ course.level }} | Duration: {{ course.duration }}</em><br />
                        <p>{{ course.description }}</p>
                        <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('show_course_details', course_id=course.course_id) }}'">View Details</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No courses available.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('show_dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
