<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Assignments</title>
</head>
<body>
    <div id="assignments-page">
        <h1>My Assignments</h1>

        <table id="assignments-table" border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Course</th>
                    <th>Due Date</th>
                    <th>Max Points</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            {% for assignment in assignments %}
                <tr>
                    <td>{{ assignment.title }}</td>
                    <td>{{ assignment.course_id }}</td>
                    <td>{{ assignment.due_date }}</td>
                    <td>{{ assignment.max_points }}</td>
                    <td>
                        {% set submitted = submissions.get(assignment.assignment_id) is not none %}
                        <button id="submit-assignment-button-{{ assignment.assignment_id }}" onclick="window.location.href='{{ url_for('show_submit_assignment', assignment_id=assignment.assignment_id) }}'" {% if submitted %}disabled{% endif %}>Submit</button>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('show_dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
