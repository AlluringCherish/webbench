<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Courses</title>
</head>
<body>
    <div id="my-courses-page">
        <h1>My Courses</h1>

        <div id="courses-list">
            {% if courses %}
                <ul>
                {% for course in courses %}
                    <li>
                        <strong>{{ course.title }}</strong>
                        <button id="continue-learning-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('learn_course', course_id=course.course_id) }}'">Continue Learning</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>You have not enrolled in any courses.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('show_dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
