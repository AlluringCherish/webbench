<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Learning Dashboard</h1>

        <div id="enrolled-courses">
            {% if enrolled_courses %}
                <ul>
                    {% for course in enrolled_courses %}
                        <li>
                            <strong>{{ course.title }}</strong> - Progress: {{ course.progress }}%
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No enrolled courses.</p>
            {% endif %}
        </div>

        <button id="browse-courses-button" onclick="window.location.href='{{ url_for('show_catalog') }}'">Browse Courses</button>
        <button id="my-courses-button" onclick="window.location.href='{{ url_for('show_my_courses') }}'">My Courses</button>
    </div>
</body>
</html>
