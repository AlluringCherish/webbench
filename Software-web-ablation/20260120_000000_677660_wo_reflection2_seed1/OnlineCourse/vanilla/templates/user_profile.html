<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>

        {% if errors %}
            <ul style="color: red;">
                {% for error in errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            </ul>
        {% endif %}

        {% if update_success %}
            <p style="color: green;">Profile updated successfully.</p>
        {% endif %}

        <form method="POST" action="{{ url_for('update_profile') }}">
            <label for="profile-email">Email:</label><br />
            <input type="email" id="profile-email" name="email" value="{{ email }}" required /><br /><br />

            <label for="profile-fullname">Full Name:</label><br />
            <input type="text" id="profile-fullname" name="fullname" value="{{ fullname }}" required /><br /><br />

            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('show_dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
