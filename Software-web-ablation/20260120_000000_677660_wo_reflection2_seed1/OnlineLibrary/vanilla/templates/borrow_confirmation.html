<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Borrow Confirmation</title>
</head>
<body>
  <div id="borrow-page">
    <div id="borrow-book-info">
      <h2>{{ book.title }}</h2>
      <p>Author: {{ book.author }}</p>
    </div>
    <div id="due-date-display">Due Date: {{ due_date }}</div>

    <form method="POST" action="{{ url_for('borrow_confirm_post', book_id=book.book_id) }}">
      <button id="confirm-borrow-button" type="submit" name="confirm" value="yes">Confirm Borrow</button>
      <button id="cancel-borrow-button" type="submit" name="confirm" value="no">Cancel</button>
    </form>
  </div>
</body>
</html>
