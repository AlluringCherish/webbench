<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="schedules-page">
        <h1>{{ page_title }}</h1>

        <label for="schedule-filter-date">Filter by Date:</label>
        <input type="date" id="schedule-filter-date" name="schedule_filter_date" />

        <label for="schedule-filter-event">Filter by Event:</label>
        <select id="schedule-filter-event" name="schedule_filter_event">
            <option value="">All Events</option>
            {% for event in events %}
                <option value="{{ event.event_name }}">{{ event.event_name }}</option>
            {% endfor %}
        </select>

        <button id="export-schedule-button">Export Schedule</button>

        <div id="schedules-timeline">
            <ul>
            {% for schedule in schedules %}
                <li>
                    <strong>{{ schedule.session_title }}</strong> - {{ schedule.session_time }} ({{ schedule.duration_minutes }} mins) - Speaker: {{ schedule.speaker }} - Event: {{ schedule.event_name }}
                </li>
            {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
