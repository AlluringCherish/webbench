<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="venues-page">
        <h1>{{ page_title }}</h1>

        <input type="text" id="venue-search-input" placeholder="Search venues..." />

        <select id="venue-capacity-filter">
            <option value="">All Capacities</option>
            {% for capacity in capacity_filters %}
                <option value="{{ capacity }}">{{ capacity }}</option>
            {% endfor %}
        </select>

        <div id="venues-grid">
            {% for venue in venues %}
                <div class="venue-card">
                    <h3>{{ venue.venue_name }}</h3>
                    <p>Location: {{ venue.location }}</p>
                    <p>Capacity: {{ venue.capacity }}</p>
                    <p>Amenities: {{ venue.amenities }}</p>
                    <button id="view-venue-details-{{ venue.venue_id }}" onclick="location.href='#'">View Details</button>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
