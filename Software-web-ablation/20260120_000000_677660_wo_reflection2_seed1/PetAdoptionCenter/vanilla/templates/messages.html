<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>
        <div id="conversation-list">
            {% if conversations %}
            <ul>
                {% for convo in conversations %}
                <li id="conversation-{{ convo.conversation_id }}">
                    <strong>{{ convo.other_user }}</strong> - {{ convo.last_message }}
                    {% if convo.unread_count > 0 %}
                    <span>({{ convo.unread_count }} unread)</span>
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No conversations.</p>
            {% endif %}
        </div>
        <div id="message-area">
            <form method="post" action="">
                <textarea id="message-input" name="message" rows="4" cols="50" required></textarea><br>
                <button id="send-message-button" type="submit">Send Message</button>
            </form>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
