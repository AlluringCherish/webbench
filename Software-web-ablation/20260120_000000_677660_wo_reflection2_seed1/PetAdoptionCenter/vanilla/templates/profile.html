<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <div id="profile-username">Username: {{ user.username }}</div>
        <form method="post" action="">
            <label for="profile-email">Email:</label><br>
            <input id="profile-email" name="email" type="email" required value="{{ user.email }}">
            {% if profile_update_errors and profile_update_errors.get('email') %}
            <div class="error">{{ profile_update_errors['email'] }}</div>
            {% endif %}
            <br>
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
