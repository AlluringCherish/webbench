<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>
        <div id="favorites-grid">
            {% if favorites %}
            <ul>
                {% for pet in favorites %}
                <li id="favorite-pet-{{ pet.pet_id }}">
                    <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">{{ pet.name }}</a> - {{ pet.species }}, {{ pet.age }}
                    {% if pet.photo_url %}
                    <br><img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}" />
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>You have no favorite pets.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
