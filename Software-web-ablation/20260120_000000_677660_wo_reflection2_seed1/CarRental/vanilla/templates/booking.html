<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="post" action="">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location" required>
                    {% for loc in locations %}
                    <option value="{{ loc.location_id }}" {% if booking_form and booking_form.pickup_location == loc.location_id %}selected{% endif %}>{{ loc.city }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location" required>
                    {% for loc in locations %}
                    <option value="{{ loc.location_id }}" {% if booking_form and booking_form.dropoff_location == loc.location_id %}selected{% endif %}>{{ loc.city }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input type="date" id="pickup-date" name="pickup_date" value="{{ booking_form.pickup_date if booking_form and booking_form.pickup_date else '' }}" required>

                <label for="dropoff-date">Dropoff Date:</label>
                <input type="date" id="dropoff-date" name="dropoff_date" value="{{ booking_form.dropoff_date if booking_form and booking_form.dropoff_date else '' }}" required>

                <button type="submit" id="calculate-price-button">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if calculated_price is not none %}
                <p>Total Price: ${{ "%.2f"|format(calculated_price) }}</p>
                {% else %}
                <p>Total Price: N/A</p>
                {% endif %}
            </div>

            {% if booking_form and booking_form.reservation_id is defined %}
            <form method="post" action="{{ url_for('insurance_options', reservation_id=booking_form.reservation_id) }}">
                <button type="submit" id="proceed-to-insurance-button">Proceed to Insurance Options</button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
