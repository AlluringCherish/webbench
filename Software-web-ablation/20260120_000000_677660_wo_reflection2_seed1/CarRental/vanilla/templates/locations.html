<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="main-container">
        <h1>Pickup and Dropoff Locations</h1>
        <div id="locations-page">
            <label for="hours-filter">Filter by Operating Hours:</label>
            <select id="hours-filter" name="hours">
                <option value="">All</option>
                <option value="24/7">24/7</option>
                <option value="09:00-18:00">09:00-18:00</option>
            </select>

            <label for="search-location-input">Search Location:</label>
            <input type="text" id="search-location-input" name="search_location" placeholder="City or Name">

            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

            <div id="locations-list">
                {% for loc in locations %}
                <div class="location-item">
                    <p>City: {{ loc.city }}</p>
                    <p>Address: {{ loc.address }}</p>
                    <p>Phone: {{ loc.phone }}</p>
                    <p>Hours: {{ loc.hours }}</p>
                    <p>Available Vehicles: {{ loc.available_vehicles }}</p>
                    <button id="location-detail-button-{{ loc.location_id }}">Details</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
