<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            <form method="post" action="">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id" required>
                    {% for reservation in reservations %}
                    <option value="{{ reservation.reservation_id }}" {% if submitted_request and submitted_request.reservation_id == reservation.reservation_id %}selected{% endif %}>
                        Reservation {{ reservation.reservation_id }} - Status: {{ reservation.status }}
                    </option>
                    {% endfor %}
                </select>

                <label><input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance" {% if submitted_request and submitted_request.driver_assistance %}checked{% endif %}> Driver Assistance</label>

                <label><input type="checkbox" id="gps-option-checkbox" name="gps_option" {% if submitted_request and submitted_request.gps_option %}checked{% endif %}> GPS Option</label>

                <label for="child-seat-quantity">Child Seat Quantity:</label>
                <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="{{ submitted_request.child_seat_quantity if submitted_request and submitted_request.child_seat_quantity is defined else 0 }}">

                <label for="special-notes">Special Notes:</label>
                <textarea id="special-notes" name="special_notes">{{ submitted_request.special_notes if submitted_request else '' }}</textarea>

                <button type="submit" id="submit-requests-button">Submit Requests</button>
            </form>
        </div>
    </div>
</body>
</html>
