<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Property Search</h1>

        <form id="property-search-form" method="POST" action="{{ url_for('property_search') }}">
            <label for="location-input">Location:</label>
            <select id="location-input" name="location_input">
                <option value="">--Select Location--</option>
                {% for location in locations %}
                <option value="{{ location.id }}">{{ location.name }}</option>
                {% endfor %}
            </select>

            <label for="price-range-min">Price Min:</label>
            <input type="number" id="price-range-min" name="price_range_min" step="0.01">

            <label for="price-range-max">Price Max:</label>
            <input type="number" id="price-range-max" name="price_range_max" step="0.01">

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type_filter">
                <option value="">--Select Type--</option>
                {% for type in filter_options.property_types %}
                <option value="{{ type }}">{{ type }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="search-properties-button">Search</button>
        </form>

        <section id="search-results-section">
            <h2>Search Results</h2>
            <ul id="search-results-list">
                {% for property in properties %}
                <li id="search-result-{{ property.property_id }}">
                    <span id="search-result-name-{{ property.property_id }}">{{ property.name }}</span>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
