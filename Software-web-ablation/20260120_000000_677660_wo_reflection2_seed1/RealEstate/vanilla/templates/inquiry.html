<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inquiry</title>
</head>
<body>
    <div id="inquiry-page">
        <h1>Inquiry</h1>

        <form id="inquiry-form" method="POST" action="{{ url_for('submit_inquiry') }}">
            <label for="select-property">Select Property:</label>
            <select id="select-property" name="select_property">
                <option value="">--Select Property--</option>
                {% for property in properties %}
                <option value="{{ property.property_id }}">{{ property.name }}</option>
                {% endfor %}
            </select>

            <label for="inquiry-name">Name:</label>
            <input type="text" id="inquiry-name" name="inquiry_name" required>

            <label for="inquiry-email">Email:</label>
            <input type="email" id="inquiry-email" name="inquiry_email" required>

            <label for="inquiry-phone">Phone:</label>
            <input type="tel" id="inquiry-phone" name="inquiry_phone">

            <label for="inquiry-message">Message:</label>
            <textarea id="inquiry-message" name="inquiry_message" required></textarea>

            <button type="submit" id="submit-inquiry-button">Submit Inquiry</button>
        </form>
    </div>
</body>
</html>
