<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>

        <section id="featured-properties-section">
            <h2>Featured Properties</h2>
            <ul id="featured-properties-list">
                {% for property in featured_properties %}
                <li id="featured-property-{{ property.property_id }}">
                    <span id="featured-property-name-{{ property.property_id }}">{{ property.name }}</span>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </section>

        <section id="recent-listings-section">
            <h2>Recent Listings</h2>
            <ul id="recent-listings-list">
                {% for property in recent_listings %}
                <li id="recent-listing-{{ property.property_id }}">
                    <span id="recent-listing-name-{{ property.property_id }}">{{ property.name }}</span>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
