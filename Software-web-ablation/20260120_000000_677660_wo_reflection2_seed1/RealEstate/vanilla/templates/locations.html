<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Locations</h1>

        <form id="location-sort-form" method="POST" action="{{ url_for('sort_locations') }}">
            <label for="location-sort">Sort Locations By:</label>
            <select id="location-sort" name="location_sort">
                <option value="name_asc">Name Ascending</option>
                <option value="name_desc">Name Descending</option>
                <option value="population_asc">Population Ascending</option>
                <option value="population_desc">Population Descending</option>
            </select>
            <button type="submit" id="sort-locations-button">Sort</button>
        </form>

        <ul id="locations-list">
            {% for location in locations %}
            <li id="location-{{ location.id }}">
                <span id="location-name-{{ location.id }}">{{ location.name }}</span>
                <span id="location-population-{{ location.id }}">{{ location.population }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
