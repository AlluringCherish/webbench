<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Directory</title>
</head>
<body>
    <div id="agents-page">
        <h1>Agent Directory</h1>

        <form id="agent-search-form" method="POST" action="{{ url_for('search_agents') }}">
            <label for="agent-search-input">Search Agents:</label>
            <input type="text" id="agent-search-input" name="agent_search">
            <button type="submit" id="agent-search-button">Search</button>
        </form>

        <ul id="agents-list">
            {% for agent in agents %}
            <li id="agent-{{ agent.agent_id }}">
                <span id="agent-name-{{ agent.agent_id }}">{{ agent.name }}</span>
                <span id="agent-contact-{{ agent.agent_id }}">{{ agent.contact }}</span>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
