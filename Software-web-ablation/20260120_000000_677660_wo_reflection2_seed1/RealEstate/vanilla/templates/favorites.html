<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>

        <ul id="favorites-list">
            {% for favorite in favorites %}
            {% set property = properties_dict[favorite.property_id] %}
            <li id="favorite-{{ favorite.property_id }}">
                <span id="favorite-property-name-{{ favorite.property_id }}">{{ property.name }}</span>
                <a href="{{ url_for('property_details', property_id=favorite.property_id) }}">
                    <button id="view-property-button-{{ favorite.property_id }}">View</button>
                </a>

                <form method="POST" action="{{ url_for('remove_from_favorites', property_id=favorite.property_id) }}" style="display:inline;">
                    <button type="submit" id="remove-favorite-button-{{ favorite.property_id }}">Remove</button>
                </form>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
