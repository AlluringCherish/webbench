<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1>Property Details</h1>

        <div id="property-info">
            <h2 id="property-name">{{ property.name }}</h2>
            <p id="property-description">{{ property.description }}</p>
            <p id="property-price">Price: ${{ property.price }}</p>
            <p id="property-location">Location: {{ property.location }}</p>
            <p id="property-type">Type: {{ property.type }}</p>
        </div>

        <a href="{{ url_for('property_search') }}">
            <button id="back-to-search-button">Back to Search</button>
        </a>
    </div>
</body>
</html>
