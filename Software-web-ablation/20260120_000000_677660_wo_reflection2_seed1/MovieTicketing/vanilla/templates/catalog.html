<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <input id="search-input" type="text" placeholder="Search movies by title or genre..." />
        <select id="genre-filter">
            <option value="">All Genres</option>
            {# Assuming a genres context variable could be passed, but spec does not specify, so leave options blank or add via JS #}
        </select>

        <div id="movies-grid">
            {% for movie in movies %}
            <div class="movie-card">
                <img src="{{ movie.poster }}" alt="{{ movie.title }} poster" />
                <div class="movie-title">{{ movie.title }}</div>
                <div class="movie-genre">Genre: {{ movie.genre }}</div>
                <div class="movie-rating">Rating: {{ movie.rating }}</div>
                <div class="movie-duration">Duration: {{ movie.duration }} min</div>
                <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
