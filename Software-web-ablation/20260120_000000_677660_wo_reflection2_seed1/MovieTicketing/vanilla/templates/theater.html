<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>

        <label for="theater-location-filter">Filter by Location:</label>
        <select id="theater-location-filter" name="theater-location-filter">
            <option value="">All Locations</option>
            {# Locations can be dynamically generated if passed, but spec doesn't mention it #}
        </select>

        <div id="theaters-list">
            {% for theater in theaters %}
            <div class="theater-item" data-location="{{ theater.location }}">
                <div>Theater Name: {{ theater.theater_name }}</div>
                <div>Location: {{ theater.location }}</div>
                <div>City: {{ theater.city }}</div>
                <div>Screens: {{ theater.screens }}</div>
            </div>
            {% endfor %}
        </div>

        <div id="facilities-display">
            <!-- Selected theater amenities displayed here -->
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
