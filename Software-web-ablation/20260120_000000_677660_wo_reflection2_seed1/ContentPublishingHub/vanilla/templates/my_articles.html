<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>

        <form id="filter-form" method="get" action="{{ url_for('my_articles') }}">
            <label for="category-filter">Category:</label>
            <input type="text" id="category-filter" name="category" value="{{ request.args.get('category', '') }}">

            <label for="status-filter">Status:</label>
            <input type="text" id="status-filter" name="status" value="{{ request.args.get('status', '') }}">

            <button type="submit">Filter</button>
        </form>

        <ul id="my-articles-list">
        {% for article in articles %}
            <li id="article-{{ article.article_id }}">
                <a href="{{ url_for('edit_article', article_id=article.article_id) }}" class="article-title">{{ article.title }}</a>
                <span class="article-status">({{ article.status }})</span>
            </li>
        {% else %}
            <li>No articles found.</li>
        {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
