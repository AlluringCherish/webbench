<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ContentPublishingHub</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>
        <p>Welcome, {{ username }}!</p>
        <p>Your Articles Count: {{ num_articles }}</p>
        <p>Published Articles: {{ num_published }}</p>
        <p>Draft Articles: {{ num_drafts }}</p>

        <nav>
            <ul>
                <li><a href="{{ url_for('create_article') }}" id="nav-create-article">Create New Article</a></li>
                <li><a href="{{ url_for('my_articles') }}" id="nav-my-articles">My Articles</a></li>
                <li><a href="{{ url_for('published_articles') }}" id="nav-published-articles">Published Articles</a></li>
                <li><a href="{{ url_for('content_calendar') }}" id="nav-content-calendar">Content Calendar</a></li>
                <li><!-- No direct article analytics link without article_id --><a href="{{ url_for('dashboard') }}" id="nav-article-analytics">Article Analytics</a></li>
            </ul>
        </nav>
    </div>
</body>
</html>
