<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Analytics for Article: {{ article.title }}</h1>

        <div id="analytics-metrics">
            <p>Views: {{ metrics.total_views }}</p>
            <p>Unique Visitors: {{ metrics.total_unique_visitors }}</p>
            <p>Shares: {{ metrics.total_shares }}</p>
            <p>Average Reading Time: {{ metrics.average_time }} minutes</p>
            <!-- Add more metrics as needed -->
        </div>

        <a href="{{ url_for('edit_article', article_id=article.article_id) }}" id="btn-back-to-edit">Back to Edit Article</a><br>
        <a href="{{ url_for('dashboard') }}" id="btn-back-to-dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
