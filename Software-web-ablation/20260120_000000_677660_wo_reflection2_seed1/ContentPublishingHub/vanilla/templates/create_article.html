<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>
        <form id="create-article-form" action="{{ url_for('create_article') }}" method="post">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" required><br><br>

            <label for="article-category">Category:</label><br>
            <input type="text" id="article-category" name="category"><br><br>

            <button type="submit" id="submit-create-article">Create Article</button>
            <a href="{{ url_for('dashboard') }}" id="btn-cancel-create">Cancel</a>
        </form>
    </div>
</body>
</html>
