<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        <form id="edit-article-form" action="{{ url_for('edit_article', article_id=article.article_id) }}" method="post">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="10" cols="50" required>{{ content }}</textarea><br><br>

            <label for="article-category">Category:</label><br>
            <input type="text" id="article-category" name="category" value="{{ article.category }}"><br><br>

            <button type="submit" id="submit-edit-article">Save Changes</button>
            <a href="{{ url_for('dashboard') }}" id="btn-cancel-edit">Cancel</a>
        </form>
    </div>
</body>
</html>
