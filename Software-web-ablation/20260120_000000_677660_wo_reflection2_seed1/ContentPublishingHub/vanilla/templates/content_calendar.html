<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>

        <form id="content-calendar-form" action="{{ url_for('content_calendar') }}" method="post">
            <label for="published-date">Schedule Date:</label><br>
            <input type="date" id="published-date" name="published_date" required><br><br>

            <label for="schedule-article">Article:</label><br>
            <select id="schedule-article" name="article_id" required>
                {% for article in articles %}
                    <option value="{{ article.article_id }}">{{ article.title }}</option>
                {% endfor %}
            </select><br><br>

            <button type="submit" id="submit-schedule">Schedule</button>
            <a href="{{ url_for('dashboard') }}" id="btn-cancel-schedule">Cancel</a>
        </form>

        <!-- Additional calendar view or scheduling display can be added here -->
    </div>
</body>
</html>
