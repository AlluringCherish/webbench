<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
    <div id="company-profile-page">
        <h1>{{ company.company_name }}</h1>
        <div id="company-info">
            <div>Industry: {{ company.industry }}</div>
            <div>Location: {{ company.location }}</div>
            <div>Description: {{ company.description }}</div>
            <div>Employees: {{ company.employee_count }}</div>
        </div>
        <div id="company-jobs">
            <h2>Open Positions</h2>
            <div id="jobs-list">
                {% for job in jobs %}
                <div class="job-summary">
                    <span>{{ job.title }}</span>
                    <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Job</button>
                    </a>
                </div>
                {% else %}
                <div>No open positions available.</div>
                {% endfor %}
            </div>
        </div>
        <a href="{{ url_for('companies_directory') }}">
            <button id="back-to-companies">Back to Companies Directory</button>
        </a>
    </div>
</body>
</html>
