<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>
        <form method="get" action="{{ url_for('application_tracking') }}">
            <label for="status-filter">Filter by status:</label>
            <select id="status-filter" name="status" onchange="this.form.submit()">
                <option value="All" {% if filtered_status == 'All' %}selected{% endif %}>All</option>
                <option value="Applied" {% if filtered_status == 'Applied' %}selected{% endif %}>Applied</option>
                <option value="Under Review" {% if filtered_status == 'Under Review' %}selected{% endif %}>Under Review</option>
                <option value="Interview" {% if filtered_status == 'Interview' %}selected{% endif %}>Interview</option>
                <option value="Rejected" {% if filtered_status == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
        </form>
        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.job_title }}</td>
                    <td>{{ app.company_name }}</td>
                    <td>{{ app.status }}</td>
                    <td>{{ app.applied_date }}</td>
                    <td>
                        <a href="{{ url_for('application_details', app_id=app.application_id) }}">
                            <button id="view-application-button-{{ app.application_id }}">View Details</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
