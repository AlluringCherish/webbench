<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>

        <input type="text" id="filter-by-winner" name="filter-winner" placeholder="Filter by Winner Name" />

        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                <h3>{{ winner.item_name }}</h3>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ "%.2f"|format(winner.winning_bid) }}</p>
                <p>Date Won: {{ winner.win_date }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
