<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>

        <select id="status-filter" name="status">
            <option value="">All Statuses</option>
            <option value="Active">Active</option>
            <option value="Closed">Closed</option>
            <option value="Pending">Pending</option>
        </select>

        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Auction ID</th>
                    <th>Item Name</th>
                    <th>Status</th>
                    <th>Current Bid</th>
                    <th>Time Remaining</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                <tr>
                    <td>{{ auction.auction_id }}</td>
                    <td>{{ auction.item_name }}</td>
                    <td>{{ auction.status }}</td>
                    <td>${{ "%.2f"|format(auction.current_bid) }}</td>
                    <td>{{ auction.time_remaining }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="refresh-status-button">Refresh Status</button>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
