<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>

        <input type="text" id="search-input" placeholder="Search auctions..." />

        <select id="category-filter">
            <option value="all">All Categories</option>
            {% for category in categories %}
                <option value="{{ category.category_id }}">{{ category.name }}</option>
            {% endfor %}
        </select>

        <div id="auctions-grid">
            {% for auction in auctions %}
                <div class="auction-card" id="auction-card-{{ auction.auction_id }}">
                    <h3>{{ auction.title }}</h3>
                    <p>{{ auction.short_description }}</p>
                    <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                        <button id="view-auction-button-{{ auction.auction_id }}">View Details</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
