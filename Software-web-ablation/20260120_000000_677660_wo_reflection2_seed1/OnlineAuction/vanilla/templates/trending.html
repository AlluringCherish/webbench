<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>

        <select id="time-range-filter" name="time_range">
            <option value="all">All Time</option>
            <option value="today">Today</option>
            <option value="this_week">This Week</option>
            <option value="this_month">This Month</option>
        </select>

        <div id="trending-list">
            {% for auction in trending_auctions %}
            <div class="trending-item">
                <h3>{{ auction.item_name }} (Rank: {{ auction.trending_rank }})</h3>
                <p>Bids: {{ auction.bid_count }}</p>
                <p>Current Bid: ${{ "%.2f"|format(auction.current_bid) }}</p>
                <p>Time Period: {{ auction.time_period }}</p>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}"><button id="view-auction-button-{{ auction.auction_id }}">View Auction</button></a>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
