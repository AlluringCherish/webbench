<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>

        <label for="duration-filter">Duration Filter:</label>
        <select id="duration-filter" name="duration_filter">
            <option value="3-5 days">3-5 days</option>
            <option value="7-10 days">7-10 days</option>
            <option value="14+ days">14+ days</option>
        </select>

        <div id="packages-grid">
            {% for pkg in packages %}
            <div>
                <h2>{{ pkg.package_name }}</h2>
                <p>Destination: {{ pkg.destination }}</p>
                <p>Duration: {{ pkg.duration_days }} days</p>
                <p>Price: ${{ pkg.price }}</p>

                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="window.location.href='{{ url_for('package_details', pkg_id=pkg.package_id) }}'">View Details</button>

                <form method="POST" action="">
                    <button type="submit" id="book-package-button-{{ pkg.package_id }}">Book Package</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
