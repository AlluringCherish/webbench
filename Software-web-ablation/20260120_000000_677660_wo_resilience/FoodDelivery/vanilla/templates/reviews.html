<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>
            <div>
                <select id="filter-by-rating" name="rating">
                    <option value="">All Ratings</option>
                    <option value="5">5 Stars</option>
                    <option value="4">4 Stars</option>
                    <option value="3">3 Stars</option>
                    <option value="2">2 Stars</option>
                    <option value="1">1 Star</option>
                </select>
                <button id="write-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write Review</button>
                <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
            </div>
            <div id="reviews-list">
                {% for review in reviews %}
                <div class="review-card">
                    <p>Restaurant: {{ review.restaurant_name }}</p>
                    <p>Customer: {{ review.customer_name }}</p>
                    <p>Rating: {{ review.rating }}</p>
                    <p>Review: {{ review.review_text }}</p>
                    <p>Date: {{ review.review_date }}</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
