<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
</head>
<body>
    <div id="main-container">
        <div id="item-details-page">
            <h1 id="item-name">{{ item.item_name }}</h1>
            <div id="item-description">
                <p>{{ item.description }}</p>
            </div>
            <div id="item-price">
                <p>Price: ${{ '%.2f'|format(item.price) }}</p>
            </div>
            <label for="quantity-input">Quantity:</label>
            <input id="quantity-input" type="number" name="quantity" min="1" value="1" />
            <button id="add-to-cart-button" onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <script>
        function addToCart() {
            const quantity = document.getElementById('quantity-input').value;
            const itemId = {{ item.item_id }};
            console.log('Add to cart:', itemId, 'Quantity:', quantity);
            // Implement add to cart logic here, e.g., AJAX POST request
        }
    </script>
</body>
</html>
