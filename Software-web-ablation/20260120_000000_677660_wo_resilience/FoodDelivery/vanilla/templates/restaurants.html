<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurants</title>
</head>
<body>
    <div id="main-container">
        <div id="restaurants-page">
            <h1>Browse Restaurants</h1>
            <div>
                <input type="text" id="search-input" placeholder="Search restaurants..." name="search" />
                <select id="cuisine-filter" name="cuisine">
                    <option value="">All Cuisines</option>
                    <!-- Cuisine options can be dynamically generated here if needed -->
                </select>
            </div>
            <div id="restaurants-grid">
                {% for restaurant in restaurants %}
                <div class="restaurant-card">
                    <h2>{{ restaurant.name }}</h2>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                    <p>Delivery Time: {{ restaurant.delivery_time }} mins</p>
                    <a href="{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}">
                        <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
