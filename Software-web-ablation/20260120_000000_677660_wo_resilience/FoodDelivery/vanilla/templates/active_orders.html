<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="main-container">
        <div id="active-orders-page">
            <h1>Active Orders</h1>
            <div>
                <select id="status-filter" name="status">
                    <option value="">All Statuses</option>
                    <option value="Preparing">Preparing</option>
                    <option value="On the Way">On the Way</option>
                    <option value="Delivered">Delivered</option>
                </select>
                <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
            </div>
            <div id="orders-list">
                {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Restaurant: {{ order.restaurant_name }}</p>
                    <p>Status: {{ order.status }}</p>
                    <p>ETA: {{ order.eta }}</p>
                    <a href="{{ url_for('order_tracking', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <script>
        const statusFilter = document.getElementById('status-filter');
        statusFilter.addEventListener('change', function() {
            const selectedStatus = this.value.toLowerCase();
            const orders = document.querySelectorAll('#orders-list .order-card');
            orders.forEach(order => {
                const status = order.querySelector('p:nth-child(3)').textContent.toLowerCase();
                if (!selectedStatus || status === selectedStatus) {
                    order.style.display = '';
                } else {
                    order.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
