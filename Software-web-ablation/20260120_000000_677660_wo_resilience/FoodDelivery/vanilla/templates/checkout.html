<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="main-container">
        <div id="checkout-page">
            <h1>Checkout</h1>
            <form method="POST" action="{{ url_for('checkout') }}">
                <label for="customer-name">Customer Name:</label><br>
                <input type="text" id="customer-name" name="customer_name" required /><br><br>

                <label for="delivery-address">Delivery Address:</label><br>
                <textarea id="delivery-address" name="delivery_address" required></textarea><br><br>

                <label for="phone-number">Phone Number:</label><br>
                <input type="tel" id="phone-number" name="phone_number" required /><br><br>

                <label for="payment-method">Payment Method:</label><br>
                <select id="payment-method" name="payment_method" required>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="PayPal">PayPal</option>
                    <option value="Cash on Delivery">Cash on Delivery</option>
                </select><br><br>

                <button type="submit" id="place-order-button">Place Order</button>
            </form>
        </div>
    </div>
</body>
</html>
