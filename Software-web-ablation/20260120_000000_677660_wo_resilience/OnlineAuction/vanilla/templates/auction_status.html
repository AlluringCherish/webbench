<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>

        <select id="status-filter">
            <option value="">All Statuses</option>
            {% for auction in auctions %}
                <option value="{{ auction.status }}">{{ auction.status }}</option>
            {% endfor %}
        </select>

        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Auction ID</th>
                    <th>Item Name</th>
                    <th>Status</th>
                    <th>End Time</th>
                    <th>Current Bid</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                <tr>
                    <td>{{ auction.auction_id }}</td>
                    <td>{{ auction.item_name }}</td>
                    <td>{{ auction.status }}</td>
                    <td>{{ auction.end_time }}</td>
                    <td>${{ '%.2f' % auction.current_bid }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="refresh-status-button">Refresh Status</button>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
