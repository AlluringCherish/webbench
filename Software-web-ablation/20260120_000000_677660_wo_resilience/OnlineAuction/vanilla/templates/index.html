{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}
<h1 id="page-title">Welcome to OnlineAuction</h1>
<ul id="auction-list" class="list-group">
  {% for auction in auctions %}
    <li class="list-group-item" id="auction-{{ auction.id }}">
      <a href="/auction/{{ auction.id }}">{{ auction.title }}</a> - Current Bid: ${{ auction.current_bid }}
    </li>
  {% else %}
    <li class="list-group-item">No auctions available.</li>
  {% endfor %}
</ul>
{% endblock %}
