{% extends "base.html" %}

{% block title %}Auction {{ auction.id }}{% endblock %}

{% block content %}
<h1 id="page-title">{{ auction.title }}</h1>
<p id="description">Description: {{ auction.description }}</p>
<p id="current-bid">Current Bid: ${{ auction.current_bid }}</p>
<form method="post" id="bid-form">
  <div class="mb-3">
    <label for="bid_amount" class="form-label">Your Bid</label>
    <input type="number" class="form-control" id="bid_amount" name="bid_amount" min="{{ auction.current_bid + 1 }}" required>
  </div>
  <button type="submit" class="btn btn-primary" id="submit">Place Bid</button>
</form>
{% endblock %}
