<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid</h1>

        <div id="auction-name">Item: {{ auction.item_name }}</div>
        <div id="minimum-bid">Minimum Bid: ${{ '%.2f' % (auction.current_bid + 0.01) }}</div>

        {% if error_message %}
        <div class="error-message" style="color:red;">{{ error_message }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('submit_bid', auction_id=auction.auction_id) }}">
            <label for="bidder-name-input">Your Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" required>

            <label for="bid-amount-input">Bid Amount:</label>
            <input type="number" step="0.01" min="0" id="bid-amount" name="bid_amount" required>

            <button type="submit" id="submit-bid-button">Submit Bid</button>
        </form>
    </div>
</body>
</html>
