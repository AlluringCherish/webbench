{% extends "base.html" %}

{% block title %}Create Auction{% endblock %}

{% block content %}
<h1 id="page-title">Create Auction</h1>
<form method="post" id="create-form">
  <div class="mb-3">
    <label for="title" class="form-label">Title</label>
    <input type="text" class="form-control" id="title" name="title" required>
  </div>
  <div class="mb-3">
    <label for="description" class="form-label">Description</label>
    <textarea class="form-control" id="description" name="description" rows="3" required></textarea>
  </div>
  <div class="mb-3">
    <label for="starting_bid" class="form-label">Starting Bid</label>
    <input type="number" class="form-control" id="starting_bid" name="starting_bid" min="0" required>
  </div>
  <button type="submit" class="btn btn-primary" id="submit">Create</button>
</form>
{% endblock %}
