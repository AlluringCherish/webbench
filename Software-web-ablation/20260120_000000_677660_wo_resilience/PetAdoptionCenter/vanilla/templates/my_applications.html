<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>

        <form method="GET" action="{{ url_for('my_applications') }}">
            <label for="filter-status">Filter by Status:</label>
            <select id="filter-status" name="status" onchange="this.form.submit()">
                <option value="">All</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
        </form>

        <table id="applications-table" border="1" cellpadding="5" cellspacing="0">
            <thead>
                <tr>
                    <th>Application ID</th>
                    <th>Pet Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr id="application-{{ app.application_id }}">
                    <td>{{ app.application_id }}</td>
                    <td>{{ app.pet_name }}</td>
                    <td>{{ app.date }}</td>
                    <td>{{ app.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
