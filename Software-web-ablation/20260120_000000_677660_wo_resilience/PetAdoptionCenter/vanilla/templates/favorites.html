<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>

        <div id="favorites-grid">
            {% for pet in favorites %}
            <div id="favorite-pet-{{ pet.pet_id }}">
                <img src="{{ pet.photo_url }}" alt="{{ pet.name }}" style="max-width:150px; max-height:150px;">
                <h3>{{ pet.name }}</h3>
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
