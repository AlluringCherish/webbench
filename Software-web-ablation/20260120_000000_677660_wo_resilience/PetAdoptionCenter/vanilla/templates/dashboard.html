<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>

        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div id="featured-pet-{{ pet.id }}">
                <img src="{{ pet.photo_url }}" alt="{{ pet.name }}" style="max-width:150px; max-height:150px;">
                <h3>{{ pet.name }}</h3>
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="browse-pets-button" onclick="window.location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Refresh Dashboard</button>
    </div>
</body>
</html>
