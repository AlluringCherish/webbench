<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
</head>
<body>
    <div id="messages-page">
        <h1>Messages</h1>

        <div id="conversation-list">
            {% for convo in conversations %}
            <div id="conversation-{{ convo.recipient_username }}">
                <strong>{{ convo.recipient_username }}</strong>
                <p>{{ convo.last_message }}</p>
                {% if convo.unread_count > 0 %}
                <span>Unread: {{ convo.unread_count }}</span>
                {% endif %}
            </div>
            <hr>
            {% endfor %}
        </div>

        <form method="POST" action="{{ url_for('send_message') }}">
            <textarea id="message-input" name="message" placeholder="Type your message here..."></textarea>
            <button type="submit" id="send-message-button">Send</button>
        </form>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
