<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Write Review</title>
</head>
<body>
  <div id="write-review-page">
    <h1>Write Review</h1>
    {% if form_state is defined and form_state.error is defined %}
      <div style="color: red;">{{ form_state.error }}</div>
    {% endif %}
    <form method="POST" action="">
      <label for="select-dish">Select Dish:</label>
      <select id="select-dish" name="dish_id" required>
        {% for dish in dishes %}
          <option value="{{ dish.dish_id }}" {% if form_state is defined and form_state.dish_id is defined and (form_state.dish_id | int) == dish.dish_id %}selected{% endif %}>{{ dish.name }}</option>
        {% endfor %}
      </select>

      <label for="rating-input">Rating:</label>
      <select id="rating-input" name="rating" required>
        {% for i in range(1, 6) %}
          <option value="{{ i }}" {% if form_state is defined and form_state.rating is defined and (form_state.rating | int) == i %}selected{% endif %}>{{ i }}</option>
        {% endfor %}
      </select>

      <label for="review-text">Review:</label>
      <textarea id="review-text" name="review_text" required>{{ form_state.review_text if form_state is defined and form_state.review_text is defined else '' }}</textarea>

      <button type="submit" id="submit-review-button">Submit Review</button>
    </form>

    <button id="back-to-reviews" onclick="location.href='{{ url_for('my_reviews') }}'">Back to Reviews</button>
  </div>
</body>
</html>
