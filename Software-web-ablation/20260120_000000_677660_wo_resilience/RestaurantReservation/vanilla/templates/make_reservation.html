<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Make Reservation</title>
</head>
<body>
  <div id="reservation-page">
    <h1>Make Reservation</h1>
    {% if form_state is defined and form_state.error is defined %}
      <div style="color: red;">{{ form_state.error }}</div>
    {% endif %}
    <form method="POST" action="">
      <label for="guest-name">Guest Name:</label>
      <input type="text" id="guest-name" name="guest_name" value="{{ form_state.guest_name if form_state is defined and form_state.guest_name is defined else '' }}" required>

      <label for="party-size">Party Size:</label>
      <select id="party-size" name="party_size" required>
        {% for i in range(1, 11) %}
          <option value="{{ i }}" {% if form_state is defined and form_state.party_size is defined and (form_state.party_size | int) == i %}selected{% endif %}>{{ i }}</option>
        {% endfor %}
      </select>

      <label for="reservation-date">Reservation Date:</label>
      <input type="date" id="reservation-date" name="reservation_date" value="{{ form_state.reservation_date if form_state is defined and form_state.reservation_date is defined else '' }}" required>

      <button type="submit" id="submit-reservation-button">Submit Reservation</button>
    </form>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
