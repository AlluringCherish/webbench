<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>

        <form method="POST" action="{{ url_for('device_control_page', device_id=device_id) }}">
            <h2 id="device-name-display">{{ device.device_name }}</h2>
            <div id="device-status-display">Status: {{ device.status }}</div>

            <button id="power-toggle" type="submit" name="power_toggle" value="toggle">Toggle Power</button><br><br>

            <!-- Additional device settings fields could be here -->

            <button id="save-settings-button" type="submit" name="save_settings" value="save">Save Settings</button>
        </form>

        <button id="back-to-devices" onclick="location.href='{{ url_for('device_list_page') }}'">Back to Devices</button>
    </div>
</body>
</html>
