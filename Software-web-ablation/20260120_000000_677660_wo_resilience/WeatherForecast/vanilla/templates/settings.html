<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>
        <form method="post" action="">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                <option value="Celsius" {% if settings.temperature_unit == "Celsius" %}selected{% endif %}>Celsius</option>
                <option value="Fahrenheit" {% if settings.temperature_unit == "Fahrenheit" %}selected{% endif %}>Fahrenheit</option>
                <option value="Kelvin" {% if settings.temperature_unit == "Kelvin" %}selected{% endif %}>Kelvin</option>
            </select>

            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for location in location_list %}
                <option value="{{ location.location_id }}" {% if location.location_id == settings.default_location_id %}selected{% endif %}>
                    {{ location.location_name }}
                </option>
                {% endfor %}
            </select>

            <label for="alert-notifications-toggle">Enable Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" value="1" {% if settings.alert_notifications_enabled %}checked{% endif %} />

            <button type="submit" id="save-settings-button">Save Changes</button>
        </form>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
