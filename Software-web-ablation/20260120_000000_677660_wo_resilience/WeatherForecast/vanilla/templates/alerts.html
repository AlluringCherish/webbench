<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Alerts</title>
</head>
<body>
    <div id="alerts-page">
        <h1>Weather Alerts</h1>

        <form method="get" action="">
            <label for="severity-filter">Severity Filter:</label>
            <select id="severity-filter" name="severity_filter">
                <option value="" {% if severity_filter == "" %}selected{% endif %}>All</option>
                <option value="Critical" {% if severity_filter == "Critical" %}selected{% endif %}>Critical</option>
                <option value="High" {% if severity_filter == "High" %}selected{% endif %}>High</option>
                <option value="Medium" {% if severity_filter == "Medium" %}selected{% endif %}>Medium</option>
                <option value="Low" {% if severity_filter == "Low" %}selected{% endif %}>Low</option>
            </select>

            <label for="location-filter-alerts">Location Filter:</label>
            <select id="location-filter-alerts" name="location_filter_alerts">
                <option value="" {% if not location_filter_alerts %}selected{% endif %}>All</option>
                {% set locations_seen = namespace(locations={}) %}
                {% for alert in alerts %}
                    {% if alert.location_id not in locations_seen.locations %}
                        {% set _ = locations_seen.locations.update({alert.location_id: true}) %}
                    {% endif %}
                {% endfor %}
                {% for location_id in locations_seen.locations.keys()|list|sort %}
                <option value="{{ location_id }}" {% if location_filter_alerts == location_id %}selected{% endif %}>Location {{ location_id }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="filter-alerts-button">Filter</button>
        </form>

        <div id="alerts-list">
            {% for alert in alerts %}
            <div class="alert-entry" style="border:1px solid #ccc; margin:5px; padding:5px;">
                <h3>{{ alert.alert_type }} - Severity: {{ alert.severity }}</h3>
                <p>{{ alert.description }}</p>
                <p>Start: {{ alert.start_time }} | End: {{ alert.end_time }}</p>
                <button id="acknowledge-alert-button-{{ alert.alert_id }}" type="button">
                    {% if alert.is_acknowledged == 1 %}Acknowledged{% else %}Acknowledge{% endif %}
                </button>
            </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
