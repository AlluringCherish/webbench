<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Weather Dashboard</h1>
        <div id="current-weather-summary">
            <h2>{{ current_weather.location_name }}</h2>
            <p>Temperature: {{ current_weather.temperature }}&deg;</p>
            <p>Condition: {{ current_weather.condition }}</p>
            <p>Humidity: {{ current_weather.humidity }}%</p>
            <p>Wind Speed: {{ current_weather.wind_speed }} mph</p>
            <p>Last Updated: {{ current_weather.last_updated }}</p>
        </div>
        <a href="{{ url_for('location_search') }}">
            <button id="search-location-button">Search Locations</button>
        </a>
        <a href="{{ url_for('weekly_forecast') }}">
            <button id="view-forecast-button">View Forecast</button>
        </a>
        <a href="{{ url_for('weather_alerts') }}">
            <button id="view-alerts-button">View Alerts</button>
        </a>
    </div>
</body>
</html>
