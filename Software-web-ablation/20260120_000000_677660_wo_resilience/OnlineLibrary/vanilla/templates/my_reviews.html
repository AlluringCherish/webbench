<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>My Reviews</h1>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item" id="review-{{ review.review_id }}">
                <h3>{{ review.title }}</h3>
                <p>Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>

                <button id="edit-review-button-{{ review.review_id }}" onclick="location.href='{{ url_for('edit_review', review_id=review.review_id) }}'">Edit</button>
                <form method="POST" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                    <button type="submit" id="delete-review-button-{{ review.review_id }}">Delete</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
