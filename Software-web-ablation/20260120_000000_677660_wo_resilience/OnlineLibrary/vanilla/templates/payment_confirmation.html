<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <h1>Payment Confirmation</h1>

        <div id="fine-amount-display">Amount Due: ${{ '%.2f'|format(fine.amount) }}</div>
        <div>Status: {{ fine.status }}</div>

        <form method="POST" action="{{ url_for('payment_confirmation', fine_id=fine.fine_id) }}">
            <button type="submit" id="confirm-payment-button">Confirm Payment</button>
        </form>

        <button id="back-to-profile" onclick="location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
    </div>
</body>
</html>
