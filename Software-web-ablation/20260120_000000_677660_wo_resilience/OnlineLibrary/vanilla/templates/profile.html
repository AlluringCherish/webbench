<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>

        <div id="profile-username">Username: {{ user.username }}</div>
        <form method="POST" action="{{ url_for('user_profile') }}">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ user.email }}" required><br>

            <label for="profile-phone">Phone:</label>
            <input type="text" id="profile-phone" name="phone" value="{{ user.phone }}"><br>

            <label for="profile-address">Address:</label>
            <input type="text" id="profile-address" name="address" value="{{ user.address }}"><br>

            <button type="submit" id="update-profile-button">Update Profile</button>
        </form>

        <div id="borrow-history">
            <h2>Borrow History</h2>
            <ul>
                {% for entry in borrow_history %}
                <li>{{ entry.title }} (Borrowed: {{ entry.borrow_date }}, Returned: {{ entry.return_date or 'N/A' }})</li>
                {% endfor %}
            </ul>
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
