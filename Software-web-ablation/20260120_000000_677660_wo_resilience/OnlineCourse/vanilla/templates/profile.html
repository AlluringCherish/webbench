<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        {% if update_success is not none %}
            {% if update_success %}
                <p id="update-success-message">Profile updated successfully.</p>
            {% else %}
                <p id="update-failure-message">Failed to update profile.</p>
            {% endif %}
        {% endif %}
        <form method="post" action="{{ url_for('profile') }}">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="email" type="email" value="{{ email }}" required />
            <br/>
            <label for="profile-fullname">Full Name:</label>
            <input id="profile-fullname" name="fullname" type="text" value="{{ fullname }}" required />
            <br/>
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
