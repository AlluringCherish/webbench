<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bestsellers</title>
</head>
<body>
    <div id="bestsellers-page">
        <h1>Bestsellers</h1>

        <form method="get" action="{{ url_for('bestsellers_page') }}">
            <label for="time-period-filter">Filter by Time Period:</label>
            <select id="time-period-filter" name="period" onchange="this.form.submit()">
                <option value="This Week" {% if time_period == 'This Week' %}selected{% endif %}>This Week</option>
                <option value="This Month" {% if time_period == 'This Month' %}selected{% endif %}>This Month</option>
                <option value="All Time" {% if time_period == 'All Time' %}selected{% endif %}>All Time</option>
            </select>
        </form>

        <div id="bestsellers-list">
            {% if bestsellers %}
                <ul>
                {% for book in bestsellers %}
                    <li>
                        <strong>{{ book.title }}</strong> by {{ book.author }} - ${{ "%.2f"|format(book.price) }}
                        <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No bestsellers available.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
