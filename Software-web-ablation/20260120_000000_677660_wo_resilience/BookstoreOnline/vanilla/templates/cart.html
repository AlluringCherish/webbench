<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>

        {% if cart_items %}
        <table id="cart-items-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
            {% for item in cart_items %}
            <tr>
                <td>{{ item.book.title }}</td>
                <td>{{ item.book.author }}</td>
                <td>
                    <form method="post" action="{{ url_for('shopping_cart_page') }}/update_quantity" style="display:inline;">
                        <input type="hidden" name="item_id" value="{{ item.item_id }}">
                        <input type="number" id="update-quantity-{{ item.item_id }}" name="quantity" min="1" value="{{ item.quantity }}">
                        <button type="submit">Update</button>
                    </form>
                </td>
                <td>${{ "%.2f"|format(item.subtotal) }}</td>
                <td>
                    <form method="post" action="{{ url_for('shopping_cart_page') }}/remove_item" style="display:inline;">
                        <input type="hidden" name="item_id" value="{{ item.item_id }}">
                        <button type="submit" id="remove-item-button-{{ item.item_id }}">Remove</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>

        <div id="total-amount">
            <strong>Total: ${{ "%.2f"|format(total_amount) }}</strong>
        </div>

        <button id="proceed-checkout-button" onclick="location.href='{{ url_for('checkout_page') }}'">Proceed to Checkout</button>
        {% else %}
        <p>Your shopping cart is empty.</p>
        {% endif %}
    </div>
</body>
</html>
