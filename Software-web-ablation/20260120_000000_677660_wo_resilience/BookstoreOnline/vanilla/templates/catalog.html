<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="{{ url_for('catalog_page') }}">
            <input type="text" id="search-input" name="search" placeholder="Search books..." value="{{ search_query|default('') }}">

            <select id="category-filter" name="category">
                <option value="" {% if not selected_category %}selected{% endif %}>All Categories</option>
                {% for category in categories %}
                <option value="{{ category.category_name }}" {% if category.category_name == selected_category %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="books-grid">
            {% if books %}
                {% for book in books %}
                <div class="book-card" id="book-card-{{ book.book_id }}">
                    <h3>{{ book.title }}</h3>
                    <p>Author: {{ book.author }}</p>
                    <p>Category: {{ book.category }}</p>
                    <p>Price: ${{ "%.2f"|format(book.price) }}</p>
                    <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
                </div>
                {% endfor %}
            {% else %}
                <p>No books found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
