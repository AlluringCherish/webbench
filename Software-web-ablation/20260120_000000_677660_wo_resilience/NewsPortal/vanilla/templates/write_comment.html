<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Comment</title>
</head>
<body>
    <div id="write-comment-page">
        <h1>Write a Comment</h1>

        <form method="post" action="{{ url_for('write_comment') }}">
            <label for="select-article">Select Article:</label><br>
            <select id="select-article" name="article_id">
                {% for article in articles %}
                <option value="{{ article.article_id }}">{{ article.title }}</option>
                {% endfor %}
            </select><br><br>

            <label for="commenter-name">Your Name:</label><br>
            <input type="text" id="commenter-name" name="commenter_name" required><br><br>

            <label for="comment-text">Comment:</label><br>
            <textarea id="comment-text" name="comment_text" rows="4" cols="50" required></textarea><br><br>

            <button type="submit" id="submit-comment-button">Submit Comment</button>
        </form>
    </div>
</body>
</html>
