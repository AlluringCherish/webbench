<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>

        <div id="category-articles">
            {% for article in articles %}
            <div class="category-article-entry">
                <h3>{{ article.title }}</h3>
                <p>By {{ article.author }} on {{ article.date }}</p>
                <p>Views: {{ article.views }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="sort-by-date" type="button">Sort by Date</button>
        <button id="sort-by-popularity" type="button">Sort by Popularity</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
