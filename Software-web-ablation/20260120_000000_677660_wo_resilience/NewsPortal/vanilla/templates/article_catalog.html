<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Article Catalog</h1>

        <form method="get" action="{{ url_for('article_catalog') }}">
            <input type="text" id="search-input" name="search_query" value="{{ search_query if search_query else '' }}" placeholder="Search titles, authors, keywords...">

            <select id="category-filter" name="category">
                <option value="" {% if not selected_category %}selected{% endif %}>All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_name }}" {% if selected_category == category.category_name %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="articles-grid">
            {% for article in articles %}
            <div class="article-card">
                <h3>{{ article.title }}</h3>
                <p>By {{ article.author }} on {{ article.date }}</p>
                <p>Category: {{ article.category }}</p>
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
