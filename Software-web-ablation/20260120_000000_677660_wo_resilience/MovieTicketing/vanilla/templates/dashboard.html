<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Ticketing Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Movie Ticketing Dashboard</h1>
        <div id="featured-movies">
            {% for movie in featured_movies %}
            <div class="featured-movie-card">
                <img src="{{ movie.poster_url }}" alt="{{ movie.title }} poster" />
                <div>{{ movie.title }}</div>
                <div>Rating: {{ movie.rating }}</div>
                <form action="{{ url_for('showtime_selection') }}" method="get">
                    <button type="submit" id="showtimes-button">Showtimes</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <button id="browse-movies-button" onclick="window.location.href='{{ url_for('movie_catalog') }}'">Browse Movies</button>
        <button id="view-bookings-button" onclick="window.location.href='{{ url_for('booking_history') }}'">View Bookings</button>
    </div>
</body>
</html>
