<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>
        <form method="get" action="{{ url_for('theater_info') }}">
            <select id="theater-location-filter" name="selected_location" onchange="this.form.submit()">
                <option value="">All Locations</option>
                {% for location in locations %}
                <option value="{{ location }}" {% if location == selected_location %}selected{% endif %}>{{ location }}</option>
                {% endfor %}
            </select>
        </form>
        <div id="theaters-list">
            {% for theater in theaters %}
            <div class="theater-item">
                <div><strong>{{ theater.theater_name }}</strong></div>
                <div>Location: {{ theater.location }}, {{ theater.city }}</div>
                <div>Screens: {{ theater.screens }}</div>
                <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
