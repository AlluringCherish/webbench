<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="booking-summary">
            <div>Movie: {{ showtime.movie_id }}</div>
            <div>Date: {{ showtime.showtime_date }}</div>
            <div>Time: {{ showtime.showtime_time }}</div>
            <div>Seats: {{ selected_seats | join(", ") }}</div>
            <div>Total Price: ${{ price_total }}</div>
        </div>
        <form method="post" action="{{ url_for('booking_confirmation_post') }}">
            <input type="hidden" name="showtime_id" value="{{ showtime.showtime_id }}" />
            <input type="hidden" name="selected_seats" value="{{ selected_seats | join(",") }}" />
            <label for="customer-name">Name:</label>
            <input type="text" id="customer-name" name="customer_name" required />
            <label for="customer-email">Email:</label>
            <input type="email" id="customer-email" name="customer_email" required />
            <button type="submit" id="confirm-booking-button">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
