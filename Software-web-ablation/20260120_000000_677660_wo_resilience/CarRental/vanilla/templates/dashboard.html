<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
    <div id="main-container">
        <h1>Car Rental Dashboard</h1>
        <div id="dashboard-page">
            <button id="search-vehicles-button" onclick="window.location='{{ url_for('search_vehicles') }}'">Search Vehicles</button>
            <button id="my-reservations-button" onclick="window.location='{{ url_for('reservation_management') }}'">My Reservations</button>
            <div id="featured-vehicles">
                {% for vehicle in featured_vehicles %}
                <div class="featured-vehicle">
                    <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                    <div>Daily Rate: ${{ vehicle.daily_rate }}</div>
                </div>
                {% endfor %}
            </div>
            <div id="promotions-section">
                <h2>Promotions</h2>
                <ul>
                    {% for promo in promotions %}
                    <li>{{ promo }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
