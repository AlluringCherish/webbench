<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="main-container">
        <h1>My Reservations</h1>
        <div id="reservations-page">
            <button id="sort-by-date-button">Sort by Date</button>
            <div id="reservations-list">
                {% for reservation in reservations %}
                <div class="reservation">
                    <p>Vehicle: {{ reservation.vehicle }}</p>
                    <p>Dates: {{ reservation.pickup_date }} to {{ reservation.dropoff_date }}</p>
                    <p>Status: {{ reservation.status }}</p>
                    <button id="modify-reservation-button-{{ reservation.reservation_id }}">Modify</button>
                    <button id="cancel-reservation-button-{{ reservation.reservation_id }}">Cancel</button>
                </div>
                {% endfor %}
            </div>
            <button id="back-to-dashboard" onclick="window.location='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
