<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="main-container">
        <h1>Pickup and Dropoff Locations</h1>
        <div id="locations-page">
            <label for="hours-filter">Filter by Hours:</label>
            <select id="hours-filter" name="hours_filter">
                <option value="24/7">24/7</option>
                <option value="Business Hours">Business Hours</option>
                <option value="Weekend">Weekend</option>
            </select>

            <label for="search-location-input">Search Locations:</label>
            <input type="text" id="search-location-input" name="search_location" placeholder="City or Name">

            <div id="locations-list">
                {% for location in locations %}
                <div class="location-entry">
                    <h2>{{ location.city }}</h2>
                    <p>Address: {{ location.address }}</p>
                    <p>Phone: {{ location.phone }}</p>
                    <p>Hours: {{ location.hours }}</p>
                    <p>Available Vehicles: {{ location.available_vehicles }}</p>
                    <button id="location-detail-button-{{ location.location_id }}">View Details</button>
                </div>
                {% endfor %}
            </div>
            <button id="back-to-dashboard" onclick="window.location='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
