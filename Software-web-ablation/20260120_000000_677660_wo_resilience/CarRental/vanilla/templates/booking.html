<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="POST" action="">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location">
                    {% for location in locations %}
                    <option value="{{ location }}">{{ location }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location">
                    {% for location in locations %}
                    <option value="{{ location }}">{{ location }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input type="date" id="pickup-date" name="pickup_date" required>

                <label for="dropoff-date">Dropoff Date:</label>
                <input type="date" id="dropoff-date" name="dropoff_date" required>

                <button type="submit" id="calculate-price-button">Calculate Price</button>
            </form>
            <div id="total-price"></div>
            <form method="GET" action="{{ url_for('insurance_options', reservation_id=vehicle_id) }}">
                <button type="submit" id="proceed-to-insurance-button">Proceed to Insurance Options</button>
            </form>
        </div>
    </div>
</body>
</html>
