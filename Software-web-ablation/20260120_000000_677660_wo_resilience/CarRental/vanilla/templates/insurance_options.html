<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="main-container">
        <h1>Select Insurance Coverage</h1>
        <div id="insurance-page">
            <form method="POST" action="">
                <div id="insurance-options">
                    {% for plan in insurance_plans %}
                    <div class="insurance-plan">
                        <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="selected_plan_id" value="{{ plan.insurance_id }}" {% if loop.first %}checked{% endif %}>
                        <label for="select-insurance-{{ plan.insurance_id }}">{{ plan.plan_name }}</label>
                    </div>
                    {% endfor %}
                </div>
                <div id="insurance-description">
                    {% if insurance_plans %}
                    <p>{{ insurance_plans[0].description }}</p>
                    {% else %}
                    <p>No insurance plans available.</p>
                    {% endif %}
                </div>
                <div id="insurance-price">
                    {% if insurance_plans %}
                    <p>Daily Cost: ${{ insurance_plans[0].daily_cost }}</p>
                    {% endif %}
                </div>
                <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
