<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="main-container">
        <h1>Search Vehicles</h1>
        <div id="search-page">
            <label for="location-filter">Pickup Location:</label>
            <select id="location-filter" name="location">
                {% for location in locations %}
                <option value="{{ location }}">{{ location }}</option>
                {% endfor %}
            </select>

            <label for="vehicle-type-filter">Vehicle Type:</label>
            <select id="vehicle-type-filter" name="vehicle_type">
                {% for vtype in vehicle_types %}
                <option value="{{ vtype }}">{{ vtype }}</option>
                {% endfor %}
            </select>

            <label for="date-range-input">Rental Date Range:</label>
            <input type="text" id="date-range-input" name="date_range" placeholder="YYYY-MM-DD to YYYY-MM-DD">

            <div id="vehicles-grid">
                {% for vehicle in vehicles %}
                <div class="vehicle-card">
                    <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                    <div>Daily Rate: ${{ vehicle.daily_rate }}</div>
                    <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="window.location='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
