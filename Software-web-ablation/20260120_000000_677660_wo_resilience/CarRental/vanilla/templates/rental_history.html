<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rental History</title>
</head>
<body>
    <div id="main-container">
        <h1>Rental History</h1>
        <div id="history-page">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status_filter">
                <option value="All">All</option>
                <option value="Active">Active</option>
                <option value="Completed">Completed</option>
                <option value="Cancelled">Cancelled</option>
            </select>
            <table id="rentals-table" border="1">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vehicle</th>
                        <th>Rental Dates</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for rental in rentals %}
                    <tr>
                        <td>{{ rental.rental_id }}</td>
                        <td>{{ rental.vehicle }}</td>
                        <td>{{ rental.pickup_date }} to {{ rental.dropoff_date }}</td>
                        <td>{{ rental.pickup_location }} to {{ rental.dropoff_location }}</td>
                        <td>{{ rental.status }}</td>
                        <td><button id="view-rental-details-{{ rental.rental_id }}">View Details</button></td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
            <button id="back-to-dashboard" onclick="window.location='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
