<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile</title>
</head>
<body>
    <div id="company-profile-page">
        <h1>Company Profile</h1>

        <div id="company-info">
            <h2>{{ company.company_name }}</h2>
            <div>Industry: {{ company.industry }}</div>
            <div>Location: {{ company.location }}</div>
            <div>Description: {{ company.description }}</div>
        </div>

        <div id="company-jobs">
            <h3>Open Jobs</h3>
            <div id="jobs-list">
                {% for job in company_jobs %}
                <div class="job-entry">
                    <span>{{ job.title }} - {{ job.status }}</span>
                    <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Job</button>
                    </a>
                </div>
                {% endfor %}
            </div>
        </div>

        <a href="{{ url_for('companies_directory') }}">
            <button id="back-to-companies">Back to Companies</button>
        </a>
    </div>
</body>
</html>
