<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
    <div id="listings-page">
        <h1>Job Listings</h1>
        <form method="POST" action="{{ url_for('job_listings_search') }}">
            <input type="text" id="search-input" name="search_input" placeholder="Search jobs, companies, locations" />
            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_name }}">{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <select id="location-filter" name="location_filter">
                <option value="">All Locations</option>
                {% for loc in locations %}
                    <option value="{{ loc }}">{{ loc }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="jobs-grid">
            {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <div>Company: {{ job.company_name }}</div>
                <div>Location: {{ job.location }}</div>
                <div>Category: {{ job.category }}</div>
                <div>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</div>
                <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                    <button id="view-job-button-{{ job.job_id }}">View Job</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
