<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>
        <form method="GET" action="{{ url_for('application_tracking') }}">
            <select id="status-filter" name="status_filter" onchange="this.form.submit()">
                <option value="" {% if not status_filter %}selected{% endif %}>All Statuses</option>
                <option value="Applied" {% if status_filter=='Applied' %}selected{% endif %}>Applied</option>
                <option value="Under Review" {% if status_filter=='Under Review' %}selected{% endif %}>Under Review</option>
                <option value="Interview" {% if status_filter=='Interview' %}selected{% endif %}>Interview</option>
                <option value="Rejected" {% if status_filter=='Rejected' %}selected{% endif %}>Rejected</option>
            </select>
        </form>

        <table id="applications-table" border="1" cellpadding="5">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.job_title }}</td>
                    <td>{{ app.company_name }}</td>
                    <td>{{ app.status }}</td>
                    <td>{{ app.applied_date }}</td>
                    <td>
                        <a href="{{ url_for('view_application', app_id=app.application_id) }}">
                            <button id="view-application-button-{{ app.application_id }}">View</button>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
