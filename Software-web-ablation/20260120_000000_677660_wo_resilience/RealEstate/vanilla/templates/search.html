<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Property Search</h1>
        <form method="POST" action="{{ url_for('property_search') }}">
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location_input" value="{{ filter_options.location_input }}">

            <label for="price-range-min">Min Price:</label>
            <input type="number" id="price-range-min" name="price_range_min" step="0.01" value="{{ filter_options.min_price }}">

            <label for="price-range-max">Max Price:</label>
            <input type="number" id="price-range-max" name="price_range_max" step="0.01" value="{{ filter_options.max_price }}">

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type_filter">
                <option value="" {% if filter_options.property_type == "" %}selected{% endif %}>Any</option>
                <option value="House" {% if filter_options.property_type == "House" %}selected{% endif %}>House</option>
                <option value="Apartment" {% if filter_options.property_type == "Apartment" %}selected{% endif %}>Apartment</option>
                <option value="Condo" {% if filter_options.property_type == "Condo" %}selected{% endif %}>Condo</option>
                <!-- Add other types as needed -->
            </select>

            <button type="submit" id="search-submit-button">Search</button>
        </form>

        <section id="properties-grid">
            <h2>Properties</h2>
            <ul>
                {% for property in properties %}
                <li>
                    <strong>{{ property.address }}</strong> - {{ property.location }}<br>
                    Price: ${{ '{:,.2f}'.format(property.price) }}<br>
                    Beds: {{ property.bedrooms }} | Baths: {{ property.bathrooms }}<br>
                    <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                        <button id="view-property-button-{{ property.property_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
