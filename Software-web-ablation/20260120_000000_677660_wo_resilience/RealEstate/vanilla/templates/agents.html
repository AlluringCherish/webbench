<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>
        <form method="POST" action="{{ url_for('search_agents') }}">
            <input type="text" id="agent-search" name="agent_search" placeholder="Search Agents">
            <button type="submit" id="agent-search-submit">Search</button>
        </form>
        <ul id="agents-list">
            {% for agent in agents %}
            <li>
                <strong>{{ agent.agent_name }}</strong><br>
                Specialization: {{ agent.specialization }}<br>
                Email: {{ agent.email }}<br>
                Phone: {{ agent.phone }}<br>
                <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
            </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
