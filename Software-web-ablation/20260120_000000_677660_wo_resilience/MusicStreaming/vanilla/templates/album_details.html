<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
    <div id="album-details-page">
        <h1 id="album-title">{{ album.title }}</h1>
        <div id="album-artist">Artist: {{ album.artist_name }}</div>
        <div id="album-year">Release Year: {{ album.release_year }}</div>
        <div id="album-songs-list">
            <h2>Songs</h2>
            <ul>
                {% for song in songs %}
                <li>{{ song.title }} - {{ song.duration }}s</li>
                {% endfor %}
            </ul>
        </div>
        <form method="POST" action="{{ url_for('add_album_to_playlist', album_id=album.album_id) }}">
            <button id="add-album-to-playlist-button" type="submit">Add All Songs to Playlist</button>
        </form>
    </div>
</body>
</html>
