<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
    <div id="albums-page">
        <h1>Albums</h1>
        <input id="search-albums" type="text" placeholder="Search albums..." />
        <select id="sort-albums">
            <option value="release_year">Release Year</option>
            <option value="title">Title</option>
            <option value="artist_name">Artist</option>
            <option value="genre">Genre</option>
        </select>
        <div id="albums-grid">
            {% for album in albums %}
            <div class="album-entry">
                <div><strong>{{ album.title }}</strong></div>
                <div>{{ album.artist_name }}</div>
                <div>{{ album.release_year }}</div>
                <div>{{ album.genre }}</div>
                <a href="{{ url_for('album_details', album_id=album.album_id) }}">
                    <button id="view-album-button-{{ album.album_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
