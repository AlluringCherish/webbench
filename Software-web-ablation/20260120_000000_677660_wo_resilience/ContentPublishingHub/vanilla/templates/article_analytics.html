<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - Content Publishing Hub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Analytics for "{{ article.title }}"</h1>

        <section id="analytics-summary">
            <ul>
                <li id="views-count">Views: {{ analytics.views }}</li>
                <li id="unique-visitors">Unique Visitors: {{ analytics.unique_visitors }}</li>
                <li id="average-time-spent">Average Time Spent: {{ analytics.avg_time_spent }}</li>
                <li id="shares-count">Shares: {{ analytics.shares }}</li>
                <li id="comments-count">Comments: {{ analytics.comments }}</li>
            </ul>
        </section>

        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
