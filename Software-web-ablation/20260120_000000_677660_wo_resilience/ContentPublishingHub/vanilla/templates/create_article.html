<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - Content Publishing Hub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create New Article</h1>

        {% if errors %}
            <div id="form-errors">
                <ul>
                    {% for error in errors %}
                        <li>{{ error }}</li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}

        <form method="post" action="{{ url_for('create_article') }}" id="create-article-form">
            <label for="article-title">Title:</label>
            <input type="text" id="article-title" name="title" value="{{ form_data.title if form_data.title else '' }}" required />

            <label for="article-content">Content:</label>
            <textarea id="article-content" name="content" required>{{ form_data.content if form_data.content else '' }}</textarea>

            <label for="article-category">Category:</label>
            <select id="article-category" name="category" required>
                {% for category in categories %}
                    <option value="{{ category }}" {% if form_data.category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="submit-article">Create Article</button>
            <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Cancel</a>
        </form>
    </div>
</body>
</html>
