<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - Content Publishing Hub</title>
</head>
<body>
    <div id="my-articles-page">
        <h1>My Articles</h1>

        <form method="get" action="{{ url_for('my_articles') }}" id="filter-form">
            <label for="filter-status">Filter by status:</label>
            <select id="filter-status" name="status">
                <option value="">All</option>
                {% for status in status_options %}
                    <option value="{{ status }}" {% if selected_status == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>

            <label for="filter-category">Filter by category:</label>
            <select id="filter-category" name="category">
                <option value="">All</option>
                {% for category in categories %}
                    <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="apply-filters">Apply Filters</button>
        </form>

        <table id="my-articles-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Category</th>
                    <th>Last Modified</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                    <tr id="article-{{ article.article_id }}">
                        <td>{{ article.title }}</td>
                        <td id="status-{{ article.article_id }}">{{ article.status }}</td>
                        <td>{{ article.category }}</td>
                        <td>{{ article.updated_date }}</td>
                        <td>
                            <a href="{{ url_for('edit_article', article_id=article.article_id) }}" id="edit-{{ article.article_id }}">Edit</a> |
                            <a href="{{ url_for('view_article_versions', article_id=article.article_id) }}" id="versions-{{ article.article_id }}">Versions</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
