<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Workout Records</title>
</head>
<body>
    <div id="workouts-page">
        <h1>My Workout Records</h1>
        <select id="filter-by-type">
            <option value="all">All Types</option>
            <!-- Additional filter options -->
        </select>
        <table id="workouts-table" border="1">
            <thead>
                <tr>
                    <th>Member Name</th>
                    <th>Workout Type</th>
                    <th>Date</th>
                    <th>Duration (minutes)</th>
                    <th>Calories Burned</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody>
                {% for w in workouts %}
                <tr>
                    <td>{{ w.member_name }}</td>
                    <td>{{ w.workout_type }}</td>
                    <td>{{ w.workout_date }}</td>
                    <td>{{ w.duration_minutes }}</td>
                    <td>{{ w.calories_burned }}</td>
                    <td>{{ w.notes }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('log_workout') }}">
            <button id="log-workout-button">Log Workout</button>
        </a>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
