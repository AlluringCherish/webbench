<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">{{ trainer.bio }}</div>
        <div id="trainer-certifications">Certifications: {{ trainer.certifications }}</div>
        <button id="book-session-button">
            <a href="{{ url_for('pt_booking') }}?trainer_id={{ trainer.trainer_id }}">Book Session</a>
        </button>
        <div id="trainer-reviews">
            <h2>Client Reviews</h2>
            {% for review in trainer_reviews %}
                <div class="review">
                    <p>{{ review.comment }}</p>
                </div>
            {% else %}
                <p>No reviews yet.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
