<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <h1>Trainer Profiles</h1>
        <input type="text" id="trainer-search" placeholder="Search trainers">
        <select id="specialty-filter">
            <option value="all">All Specialties</option>
            <!-- Additional filter options -->
        </select>
        <div id="trainers-grid">
            {% for trainer in trainers_list %}
            <div class="trainer-card">
                <h2>{{ trainer.name }}</h2>
                <div>Specialty: {{ trainer.specialty }}</div>
                <div>Certifications: {{ trainer.certifications }}</div>
                <div>Experience: {{ trainer.experience_years }} years</div>
                <a href="{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}">
                    <button id="view-trainer-button-{{ trainer.trainer_id }}">View Profile</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
