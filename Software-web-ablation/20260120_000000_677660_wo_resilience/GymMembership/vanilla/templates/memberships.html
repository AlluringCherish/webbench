<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
</head>
<body>
    <div id="membership-page">
        <h1>Membership Plans</h1>
        <select id="plan-filter">
            <option value="all">All Plans</option>
            <!-- Optionally additional filtering options -->
        </select>
        <div id="plans-grid">
            {% for plan in membership_plans %}
            <div class="plan-card">
                <h2>{{ plan.plan_name }}</h2>
                <div>Price: ${{ '%.2f'|format(plan.price) }} / {{ plan.billing_cycle }}</div>
                <div>Features: {{ plan.features }}</div>
                <div>Max Classes: {{ plan.max_classes }}</div>
                <a href="{{ url_for('plan_details', plan_id=plan.membership_id) }}">
                    <button id="view-details-button-{{ plan.membership_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
