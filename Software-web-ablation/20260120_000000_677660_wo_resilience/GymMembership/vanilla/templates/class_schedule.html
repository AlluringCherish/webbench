<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Schedule</title>
</head>
<body>
    <div id="schedule-page">
        <h1>Class Schedule</h1>
        <input type="text" id="schedule-search" placeholder="Search classes">
        <select id="schedule-filter">
            <option value="all">All Types</option>
            <!-- Additional filters could be dynamically added -->
        </select>
        <div id="classes-grid">
            {% for cls in classes %}
            <div class="class-card">
                <h2>{{ cls.class_name }}</h2>
                <div>Type: {{ cls.class_type }}</div>
                <div>Schedule: {{ cls.schedule_day }} at {{ cls.schedule_time }}</div>
                <div>Capacity: {{ cls.capacity }}</div>
                <div>Duration: {{ cls.duration }} minutes</div>
                <a href="#">
                    <button id="enroll-class-button-{{ cls.class_id }}">Enroll</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
