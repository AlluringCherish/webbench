<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Membership Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Gym Membership Dashboard</h1>
        <div id="member-welcome">{{ member_welcome_msg }}</div>
        <div id="featured-classes">
            {% for cls in featured_classes %}
            <div class="featured-class">
                <strong>{{ cls.class_name }}</strong> - {{ cls.schedule_day }} at {{ cls.schedule_time }} (Trainer: {{ cls.trainer_name }})
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for(quick_links['browse-membership-button']) }}">
            <button id="browse-membership-button">Browse Memberships</button>
        </a>

        <a href="{{ url_for(quick_links['view-schedule-button']) }}">
            <button id="view-schedule-button">View Schedule</button>
        </a>

        <a href="{{ url_for(quick_links['book-trainer-button']) }}">
            <button id="book-trainer-button">Book Trainer</button>
        </a>
    </div>
</body>
</html>
