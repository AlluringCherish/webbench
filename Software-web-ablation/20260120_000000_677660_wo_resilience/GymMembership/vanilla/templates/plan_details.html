<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">${{ '%.2f'|format(plan.price) }} / {{ plan.billing_cycle }}</div>
        <div id="plan-features">{{ plan.features }}</div>
        <button id="enroll-plan-button">Enroll in Plan</button>
        <div id="plan-reviews">
            <h2>Member Reviews</h2>
            {% for review in plan_reviews %}
                <div class="review">
                    <p>{{ review.comment }}</p>
                </div>
            {% else %}
                <p>No reviews yet.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
