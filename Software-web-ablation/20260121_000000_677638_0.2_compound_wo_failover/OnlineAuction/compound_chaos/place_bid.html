<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Place Bid - {{ auction.item_name }}</title>
</head>
<body>
  <h1>Place Bid for {{ auction.item_name }}</h1>
  <form action="{{ url_for('place_bid', auction_id=auction.id) }}" method="post" id="place-bid-form">
    <label for="bid-amount">Bid Amount (minimum: ${{ '%.2f'|format(auction.current_bid + auction.bid_increment) }}):</label>
    <input type="number" id="bid-amount" name="bid_amount" min="{{ auction.current_bid + auction.bid_increment }}" required>
    <button type="submit" id="submit-bid-button">Submit Bid</button>
  </form>
  <button id="back-to-details" onclick="location.href='{{ url_for('auction_details', auction_id=auction.id) }}'">Back to Details</button>
</body>
</html>
