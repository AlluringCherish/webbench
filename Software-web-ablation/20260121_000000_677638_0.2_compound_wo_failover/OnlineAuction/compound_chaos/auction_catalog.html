<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auction Catalog</title>
</head>
<body>
  <h1>Auction Catalog</h1>
  <form method="get" id="search-form">
    <input type="text" id="search-input" name="search" placeholder="Search auctions...">
    <select id="category-select" name="category">
      <option value="">All Categories</option>
      {% for category in categories %}
      <option value="{{ category.id }}">{{ category.name }}</option>
      {% endfor %}
    </select>
    <button type="submit" id="search-button">Search</button>
  </form>
  <section id="auctions-grid">
    {% for auction in auctions %}
    <div class="auction-item">
      <h3>{{ auction.item_name }}</h3>
      <img src="{{ auction.image_url }}" alt="Image of {{ auction.item_name }}" style="max-height:200px;">
      <p>{{ auction.description }}</p>
      <p>Category: {{ auction.category }}</p>
      <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
      <p>Ends at: {{ auction.end_time }}</p>
      <a href="{{ url_for('auction_details', auction_id=auction.id) }}" id="view-auction-button-{{ auction.id }}">View Details</a>
    </div>
    {% else %}
    <p>No auctions available.</p>
    {% endfor %}
  </section>
</body>
</html>
