<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Winners</title>
</head>
<body>
  <h1>Winners</h1>
  <section id="winners-list">
    {% for winner in winners %}
    <div class="winner-card" id="winner-{{ winner.id }}">
      <p>Winner: {{ winner.user }}</p>
      <p>Final Bid: ${{ '%.2f'|format(winner.final_bid) }}</p>
    </div>
    {% else %}
    <p>No winners yet.</p>
    {% endfor %}
  </section>
  <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
