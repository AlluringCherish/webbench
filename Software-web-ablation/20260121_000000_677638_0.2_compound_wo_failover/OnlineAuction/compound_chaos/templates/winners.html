<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winners</title>
</head>
<body>
    <h1>Winners</h1>
    <div id="winners-list">
        {% for winner in winners %}
            <div class="winner-card" id="winner-{{ winner.id }}">
                <h2>{{ winner.auction_name }}</h2>
                <p>Winner: {{ winner.user }}</p>
                <p>Final Bid: {{ winner.final_bid }}</p>
            </div>
        {% else %}
            <p>No winners yet.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
