<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <nav>
        <button id="dashboard-button" onclick="location.href='{{ url_for('dashboard') }}'">Dashboard</button>
    </nav>
    <h1>Auction Status</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Status</th>
                <th>Start Time</th>
                <th>End Time</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>{{ auction.item_name }}</td>
                <td>{{ auction.status }}</td>
                <td>{{ auction.start_time }}</td>
                <td>{{ auction.end_time }}</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
