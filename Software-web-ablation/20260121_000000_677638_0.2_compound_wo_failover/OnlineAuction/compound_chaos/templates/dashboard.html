<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>
    <nav>
        <button id="categories-button" onclick="location.href='{{ url_for('auction_categories') }}'">Categories</button>
        <button id="catalog-button" onclick="location.href='{{ url_for('auction_catalog') }}'">Catalog</button>
        <button id="history-button" onclick="location.href='{{ url_for('history') }}'">History</button>
    </nav>
    <section id="active-auctions">
        <h2>Active Auctions</h2>
        <ul>
            {% for auction in active_auctions %}
                <li>
                    {{ auction.item_name }} - Current Bid: {{ auction.current_bid }}
                    <button id="details-button-{{ auction.id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.id) }}'">Details</button>
                </li>
            {% else %}
                <li>No active auctions.</li>
            {% endfor %}
        </ul>
    </section>
</body>
</html>
