<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>

        <input type="text" id="search-input" placeholder="Search auctions...">

        <select id="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_id }}">{{ category.category_name }}</option>
            {% endfor %}
        </select>

        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-item">
                <h3>{{ auction.item_name }}</h3>
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}" style="max-width:200px; max-height:200px;">
                <p>{{ auction.description }}</p>
                <p>Category: {{ auction.category }}</p>
                <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
                <p>Ends at: {{ auction.end_time }}</p>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View Auction</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
