<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid - {{ auction.item_name }}</title>
</head>
<body>
    <h1>Place Your Bid</h1>
    <form action="{{ url_for('place_bid', auction_id=auction.id) }}" method="post">
        <label for="bid-amount">Bid Amount (minimum: {{ auction.current_bid + auction.bid_increment }}):</label>
        <input type="number" id="bid-amount" name="bid_amount" min="{{ auction.current_bid + auction.bid_increment }}" required>
        <button type="submit" id="submit-bid-button">Submit Bid</button>
    </form>
    <button id="cancel-button" onclick="location.href='{{ url_for('auction_details', auction_id=auction.id) }}'">Cancel</button>
</body>
</html>
