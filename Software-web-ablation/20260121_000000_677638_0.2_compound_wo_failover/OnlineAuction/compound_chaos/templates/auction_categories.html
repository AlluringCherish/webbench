<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Categories</title>
</head>
<body>
    <h1>Auction Categories</h1>
    <div id="categories-list">
        {% for category in categories %}
            <div class="category-item" id="category-{{ category.id }}">
                <h2>{{ category.name }}</h2>
                <p>{{ category.description }}</p>
            </div>
        {% else %}
            <p>No categories found.</p>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
