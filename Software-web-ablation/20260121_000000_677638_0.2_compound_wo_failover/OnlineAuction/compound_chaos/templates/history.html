<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
    <h1>Bid History</h1>
    <section>
        <label for="filter-status">Filter by Status:</label>
        <select id="filter-status" name="status">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="closed">Closed</option>
        </select>
    </section>
    <table border="1">
        <thead>
            <tr>
                <th>Auction Item</th>
                <th>Bid Amount</th>
                <th>Bid Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for bid in bids %}
            <tr>
                <td>{{ bid.auction_item }}</td>
                <td>{{ bid.amount }}</td>
                <td>{{ bid.time }}</td>
                <td>{{ bid.status }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
