<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trending Auctions</title>
</head>
<body>
  <h1>Trending Auctions</h1>
  <label for="trending-filter">Filter:</label>
  <select id="trending-filter" name="filter">
    <option value="hour">Last Hour</option>
    <option value="day">Last Day</option>
    <option value="week">Last Week</option>
  </select>
  <section id="trending-auctions">
    {% for auction in trending_auctions %}
    <div class="trending-item" id="trending-{{ auction.id }}">
      <h2>{{ auction.item_name }}</h2>
      <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
      <button id="details-button-{{ auction.id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.id) }}'">Details</button>
    </div>
    {% else %}
    <p>No trending auctions available.</p>
    {% endfor %}
  </section>
</body>
</html>
