<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auction History</title>
</head>
<body>
  <h1>History</h1>
  <label for="filter-status">Filter by Status:</label>
  <select id="filter-status" name="status">
    <option value="all">All</option>
    <option value="active">Active</option>
    <option value="closed">Closed</option>
  </select>
  <table border="1" id="bids-table">
    <thead>
      <tr>
        <th>Auction Item</th>
        <th>Bid Amount</th>
        <th>Bid Timestamp</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      {% for bid in bids %}
      <tr>
        <td>{{ bid.auction_item }}</td>
        <td>${{ '%.2f'|format(bid.amount) }}</td>
        <td>{{ bid.timestamp }}</td>
        <td>{{ bid.status }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4">No bid history available.</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
