<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auction Categories</title>
</head>
<body>
  <h1>Auction Categories</h1>
  <div id="categories-list">
    {% for category in categories %}
    <div class="category-item" id="category-{{ category.id }}">
      <h3>{{ category.name }}</h3>
      <p>{{ category.description }}</p>
      <p>Items: {{ category.item_count }}</p>
      <button onclick="location.href='{{ url_for('auction_catalog', category_id=category.id) }}'">View Category</button>
    </div>
    {% else %}
    <p>No categories available.</p>
    {% endfor %}
  </div>
  <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
