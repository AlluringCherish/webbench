{% extends "base.html" %}

{% block content %}
<h1 id="main-title">{{ page_title }}</h1>

<div id="main-container-id">
    <nav id="navigation-menu">
        <a href="{{ url_for('index') }}" id="nav-home">Home</a>
        <a href="{{ url_for('about') }}" id="nav-about">About</a>
        <a href="{{ url_for('contact') }}" id="nav-contact">Contact</a>
    </nav>
    
    <div id="buttons-container">
        {% for item in items %}
            <button id="button-{{ item.id }}">{{ item.text }}</button>
        {% endfor %}
    </div>
</div>
{% endblock %}
