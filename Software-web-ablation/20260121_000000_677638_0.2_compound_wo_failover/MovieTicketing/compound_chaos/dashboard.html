<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MovieTicketing</title>
</head>
<body>
    <h1 id="dashboard-title">Dashboard</h1>
    <nav id="dashboard-navigation">
        <a href="{{ url_for('catalog_page') }}" id="browse-movies-button">Browse Movies</a> |
        <a href="{{ url_for('bookings_page') }}" id="bookings-button">Bookings</a> |
        <a href="{{ url_for('theaters_list') }}" id="theaters-list-button">Theaters</a>
    </nav>

    <div id="featured-movies">
        <h2>Featured Movies</h2>
        <div id="movies-grid">
            {% for movie in featured_movies %}
            <div class="movie-card" id="movie-{{ movie.movie_id }}">
                <h3 id="movie-title">{{ movie.title }}</h3>
                <p id="movie-director">Director: {{ movie.director }}</p>
                <p id="movie-genre">Genre: {{ movie.genre }}</p>
                <p id="movie-rating">Rating: {{ movie.rating }}</p>
                <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details_page', movie_id=movie.movie_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
