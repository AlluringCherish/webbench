<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>
        <form method="GET">
            <label for="destination-input">Destination:</label>
            <input type="text" id="destination-input" name="destination-input">
            <br>
            <label for="check-in-date">Check-In Date:</label>
            <input type="date" id="check-in-date" name="check-in-date">
            <br>
            <label for="check-out-date">Check-Out Date:</label>
            <input type="date" id="check-out-date" name="check-out-date">
            <br>
            <label for="price-filter">Price Range:</label>
            <select id="price-filter" name="price-filter">
                <option value="">Any</option>
                <option value="Budget">Budget</option>
                <option value="Mid-range">Mid-range</option>
                <option value="Luxury">Luxury</option>
            </select>
            <br>
            <button type="submit">Search</button>
        </form>
        <div id="hotels-list">
            <ul>
                {% for hotel in hotels %}
                    <li>
                        <strong>{{ hotel.name }}</strong> - {{ hotel.city }}<br>
                        Rating: {{ hotel.rating }}<br>
                        Price per Night: ${{ hotel.price_per_night }}<br>
                        Amenities: {{ hotel.amenities }}
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
