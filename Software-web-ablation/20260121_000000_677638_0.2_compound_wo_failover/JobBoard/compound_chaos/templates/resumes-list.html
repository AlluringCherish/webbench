<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resumes-list">
        <h1>Resumes</h1>

        <table border="1">
            <thead>
                <tr>
                    <th>Applicant Name</th>
                    <th>Email</th>
                    <th>Filename</th>
                    <th>Upload Date</th>
                    <th>Summary</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for resume in resumes %}
                <tr>
                    <td>{{ resume.applicant_name }}</td>
                    <td>{{ resume.applicant_email }}</td>
                    <td>{{ resume.filename }}</td>
                    <td>{{ resume.upload_date }}</td>
                    <td>{{ resume.summary }}</td>
                    <td>
                        <form method="post" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}">
                            <button id="delete-resume-button-{{ resume.resume_id }}" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
