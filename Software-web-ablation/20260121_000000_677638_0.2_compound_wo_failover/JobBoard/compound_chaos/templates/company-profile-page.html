<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile - {{ company.company_name }}</title>
</head>
<body>
    <div id="company-info">
        <h1>{{ company.company_name }}</h1>
        <p>Industry: {{ company.industry }}</p>
        <p>Location: {{ company.location }}</p>
        <p>Employees: {{ company.employee_count }}</p>
        <p>Description: {{ company.description }}</p>
    </div>

    <div id="company-jobs">
        <h2>Jobs at {{ company.company_name }}</h2>
        {% for job in jobs %}
        <div class="job-card">
            <h3>{{ job.title }}</h3>
            <a id="view-job-button-{{ job.job_id }}" href="{{ url_for('job_details', job_id=job.job_id) }}">View</a>
        </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('companies_list') }}">
        <button id="back-to-dashboard">Back to Dashboard</button>
    </a>
</body>
</html>
