<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Resume</title>
</head>
<body>
    <div id="upload-resume-page">
        <h1>Upload Resume</h1>

        <form method="post" enctype="multipart/form-data" action="{{ url_for('upload_resume') }}">
            <label for="resume-file-input">Select Resume File:</label>
            <input type="file" id="resume-file-input" name="resume_file" required>
            <br>

            <button id="upload-resume-button" type="submit">Upload</button>
        </form>

        <a href="{{ url_for('resumes_list') }}">
            <button id="back-to-resumes">Back to Resumes</button>
        </a>
    </div>
</body>
</html>
