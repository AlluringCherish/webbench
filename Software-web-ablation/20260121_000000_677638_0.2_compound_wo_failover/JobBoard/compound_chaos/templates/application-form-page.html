<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for {{ job.title }}</title>
</head>
<body>
    <div id="application-form">
        <h1>Apply for {{ job.title }}</h1>

        <form method="post" action="{{ url_for('apply_job', job_id=job.job_id) }}" enctype="multipart/form-data">
            <label for="resume-select">Select Existing Resume:</label>
            <select id="resume-select" name="resume_id">
                <option value="">-- Select Resume --</option>
                {% for resume in resumes %}
                <option value="{{ resume.resume_id }}">{{ resume.filename }} ({{ resume.upload_date }})</option>
                {% endfor %}
            </select>
            <br>

            <label for="resume-file-input">Or Upload New Resume:</label>
            <input type="file" id="resume-file-input" name="resume_file">
            <br>

            <label for="cover-letter">Cover Letter:</label>
            <textarea id="cover-letter" name="cover_letter" rows="5" cols="40"></textarea>
            <br>

            <button id="submit-application-button" type="submit">Submit Application</button>
        </form>

        <a href="{{ url_for('job_details', job_id=job.job_id) }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
