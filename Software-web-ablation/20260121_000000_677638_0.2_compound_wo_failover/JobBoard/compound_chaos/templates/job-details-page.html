<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details - {{ job.title }}</title>
</head>
<body>
    <div id="job-details">
        <h1 id="job-title">{{ job.title }}</h1>

        <div id="job-description">
            <p>{{ job.description }}</p>
        </div>

        <div id="company-info">
            <h2>Company: {{ company.company_name }}</h2>
            <p>Industry: {{ company.industry }}</p>
            <p>Location: {{ company.location }}</p>
            <p>{{ company.description }}</p>
        </div>

        <form method="post" action="{{ url_for('apply_job', job_id=job.job_id) }}">
            <button id="apply-now-button-{{ job.job_id }}" type="submit">Apply Now</button>
        </form>

        <a href="{{ url_for('jobs_list') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
