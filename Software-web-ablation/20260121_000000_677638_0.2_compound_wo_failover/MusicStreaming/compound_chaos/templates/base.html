<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Music App{% endblock %}</title>
</head>
<body>
    <header id="header">
        <nav id="main-nav">
            <ul id="nav-list">
                <li><a id="nav-home-link" href="{{ url_for('home') }}">Home</a></li>
                <li><a id="nav-playlists-link" href="{{ url_for('playlists') }}">Playlists</a></li>
                <li><a id="nav-songs-link" href="{{ url_for('songs') }}">Songs</a></li>
                <li><a id="nav-artists-link" href="{{ url_for('artists') }}">Artists</a></li>
                <li><a id="nav-albums-link" href="{{ url_for('albums') }}">Albums</a></li>
            </ul>
        </nav>
    </header>
    <main id="content">
        {% block content %}{% endblock %}
    </main>
    <footer id="footer">
        <p id="footer-text">&copy; 2024 Music App</p>
    </footer>
</body>
</html>
