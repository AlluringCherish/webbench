<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
    <div id="albums-container">
        <h1 id="albums-title">Albums</h1>
        <table id="albums-table">
            <thead>
                <tr id="albums-table-header-row">
                    <th id="album-header-title">Title</th>
                    <th id="album-header-artist">Artist</th>
                    <th id="album-header-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="albums-table-body">
                {% for album in albums %}
                <tr id="album-row-{{ album.id }}">
                    <td id="album-title-{{ album.id }}">{{ album.title }}</td>
                    <td id="album-artist-{{ album.id }}">{{ album.artist.name }}</td>
                    <td id="album-actions-{{ album.id }}">
                        <a href="{{ url_for('view_album', album_id=album.id) }}">
                            <button id="view-album-button-{{ album.id }}">View</button>
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" id="no-albums-msg">No albums available.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
