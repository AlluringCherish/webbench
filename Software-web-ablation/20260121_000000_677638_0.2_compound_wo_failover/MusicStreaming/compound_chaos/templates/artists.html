<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
</head>
<body>
    <div id="artists-container">
        <h1 id="artists-title">Artists</h1>
        <table id="artists-table">
            <thead>
                <tr id="artists-table-header-row">
                    <th id="artist-header-name">Name</th>
                    <th id="artist-header-genre">Genre</th>
                    <th id="artist-header-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="artists-table-body">
                {% for artist in artists %}
                <tr id="artist-row-{{ artist.id }}">
                    <td id="artist-name-{{ artist.id }}">{{ artist.name }}</td>
                    <td id="artist-genre-{{ artist.id }}">{{ artist.genre }}</td>
                    <td id="artist-actions-{{ artist.id }}">
                        <a href="{{ url_for('view_artist', artist_id=artist.id) }}">
                            <button id="view-artist-button-{{ artist.id }}">View</button>
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" id="no-artists-msg">No artists found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
