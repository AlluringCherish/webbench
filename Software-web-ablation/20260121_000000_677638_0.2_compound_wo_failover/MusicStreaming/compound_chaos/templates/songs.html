<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Songs</title>
</head>
<body>
    <div id="songs-container">
        <h1 id="songs-title">Songs</h1>
        <table id="songs-table">
            <thead>
                <tr id="songs-table-header-row">
                    <th id="song-header-title">Title</th>
                    <th id="song-header-artist">Artist</th>
                    <th id="song-header-album">Album</th>
                    <th id="song-header-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="songs-table-body">
                {% for song in songs %}
                <tr id="song-row-{{ song.id }}">
                    <td id="song-title-{{ song.id }}">{{ song.title }}</td>
                    <td id="song-artist-{{ song.id }}">{{ song.artist.name }}</td>
                    <td id="song-album-{{ song.id }}">{{ song.album.title }}</td>
                    <td id="song-actions-{{ song.id }}">
                        <button id="add-to-playlist-button-{{ song.id }}" onclick="addToPlaylist({{ song.id }})">Add to Playlist</button>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" id="no-songs-msg">No songs available.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
