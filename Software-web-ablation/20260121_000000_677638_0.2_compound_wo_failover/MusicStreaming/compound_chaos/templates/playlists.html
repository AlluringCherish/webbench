<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlists</title>
</head>
<body>
    <div id="playlists-container">
        <h1 id="playlists-title">Playlists</h1>
        <table id="playlists-table">
            <thead>
                <tr id="playlists-table-header-row">
                    <th id="playlist-header-name">Name</th>
                    <th id="playlist-header-description">Description</th>
                    <th id="playlist-header-actions">Actions</th>
                </tr>
            </thead>
            <tbody id="playlists-table-body">
                {% for playlist in playlists %}
                <tr id="playlist-row-{{ playlist.id }}">
                    <td id="playlist-name-{{ playlist.id }}">{{ playlist.name }}</td>
                    <td id="playlist-description-{{ playlist.id }}">{{ playlist.description }}</td>
                    <td id="playlist-actions-{{ playlist.id }}">
                        <a href="{{ url_for('view_playlist', playlist_id=playlist.id) }}">
                            <button id="view-playlist-button-{{ playlist.id }}">View</button>
                        </a>
                        <a href="{{ url_for('edit_playlist', playlist_id=playlist.id) }}">
                            <button id="edit-playlist-button-{{ playlist.id }}">Edit</button>
                        </a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="3" id="no-playlists-msg">No playlists available.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('create_playlist') }}"><button id="create-playlist-button">Create New Playlist</button></a>
    </div>
</body>
</html>
