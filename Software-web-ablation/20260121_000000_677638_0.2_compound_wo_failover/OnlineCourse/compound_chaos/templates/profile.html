<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
</head>
<body>
    <div id="main-container">
        <h1>Profile</h1>

        <div id="profile-container">
            <div id="profile-fullname">{{ user.fullname }}</div>
            <div id="profile-email">{{ user.email }}</div>
        </div>

        <form method="POST" action="{{ url_for('update_profile') }}">
            <label for="fullname">Full Name:</label><br>
            <input id="fullname" name="fullname" type="text" value="{{ user.fullname }}" required><br>
            <label for="email">Email:</label><br>
            <input id="email" name="email" type="email" value="{{ user.email }}" required><br>
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>

        <a id="back-to-dashboard" href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
