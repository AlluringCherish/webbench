<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Assignment</title>
</head>
<body>
    <div id="main-container">
        <h1>Submit Assignment</h1>

        <a id="back-to-dashboard" href="{{ url_for('dashboard') }}">Back to Dashboard</a>

        <div id="submit-assignment-container">
            <form method="POST" action="{{ url_for('assignment_submit_post', assignment_id=assignment.assignment_id) }}">
                <label for="submission_text">Submission Text:</label><br>
                <textarea id="submission_text" name="submission_text" required></textarea><br>
                <button id="submit-button" type="submit">Submit</button>
            </form>
        </div>
    </div>
</body>
</html>
