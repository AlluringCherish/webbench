<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Featured</title>
</head>
<body>
    <div id="locations-page">
        <h1>Featured</h1>
        <form method="POST" action="{{ url_for('sort_locations') }}" id="location-sort-form">
            <label for="location-sort">Sort By:</label>
            <select id="location-sort" name="location_sort">
                <option value="region" {% if sort_option == 'region' %}selected{% endif %}>Region</option>
                <option value="property_count" {% if sort_option == 'property_count' %}selected{% endif %}>Property Count</option>
            </select>
            <button type="submit">Sort</button>
        </form>
        <ul id="locations-list">
            {% for location in locations %}
            <li>
                <p>Location ID: {{ location.location_id }}</p>
                <p>Region: {{ location.region }}</p>
                <p>Property Count: {{ location.property_count }}</p>
                <p>Description: {{ location.description }}</p>
                <a href="{{ url_for('view_location', location_id=location.location_id) }}">
                    <button id="view-location-button-{{ location.location_id }}">View</button>
                </a>
            </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
