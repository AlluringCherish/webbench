<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Estate Agents</h1>
        <ul id="agents-list">
            {% for agent in agents %}
            <li>
                <p>Agent ID: {{ agent.agent_id }}</p>
                <p>Specialization: {{ agent.specialization }}</p>
                <p>Phone: {{ agent.phone }}</p>
                <p>Properties Sold: {{ agent.properties_sold }}</p>
                <a href="{{ url_for('contact_agent', agent_id=agent.agent_id) }}">
                    <button id="contact-agent-button-{{ agent.agent_id }}">Contact Agent</button>
                </a>
            </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
