<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>Favorites</h1>
        <ul id="favorites-list">
            {% for favorite in favorites %}
            <li>
                <p>Property ID: {{ favorite.property_id }}</p>
                <p>Address: {{ properties_dict[favorite.property_id].address }}</p>
                <a href="{{ url_for('property_details', property_id=favorite.property_id) }}">
                    <button id="view-property-button-{{ favorite.property_id }}">View</button>
                </a>
            </li>
            {% endfor %}
        </ul>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
