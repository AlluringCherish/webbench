<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search</title>
</head>
<body>
    <div id="search-page">
        <h1>Search</h1>
        <form method="GET" id="search-form" action="{{ url_for('search') }}">
            <label for="price-range-min">Price Range Min:</label>
            <input type="number" step="0.01" id="price-range-min" name="price_range_min">

            <label for="price-range-max">Price Range Max:</label>
            <input type="number" step="0.01" id="price-range-max" name="price_range_max" value="{{ filter_options.price_range_max }}">

            <label for="property-type-filter">Property Type:</label>
            <select id="property-type-filter" name="property_type">
                {% for type_option in filter_options.property_types %}
                <option value="{{ type_option }}">{{ type_option }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="search-submit-button">Search</button>
        </form>

        <ul id="properties-list">
            {% for property in properties %}
            <li>
                <p>Property ID: {{ property.property_id }}</p>
                <p>Price: {{ property.price }}</p>
                <p>Type: {{ property.property_type }}</p>
                <p>Bedrooms: {{ property.bedrooms }}</p>
                <p>Bathrooms: {{ property.bathrooms }}</p>
                <a href="{{ url_for('property_details', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View</button>
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
