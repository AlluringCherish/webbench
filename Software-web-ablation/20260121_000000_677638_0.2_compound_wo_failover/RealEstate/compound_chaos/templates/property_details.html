<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1>Property Details</h1>
        <p>Property ID: {{ property.property_id }}</p>
        <p>Price: {{ property.price }}</p>
        <p>Description: {{ property.description }}</p>
        <p>Bedrooms: {{ property.bedrooms }}</p>
        <p>Bathrooms: {{ property.bathrooms }}</p>

        <form method="POST" action="{{ url_for('add_to_favorites', property_id=property.property_id) }}">
            <button type="submit" id="add-to-favorites-button">Add to Favorites</button>
        </form>

        <form method="POST" action="{{ url_for('submit_inquiry') }}">
            <input type="hidden" name="property_id" value="{{ property.property_id }}">
            <button type="submit" id="submit-inquiry-button">Submit Inquiry</button>
        </form>
    </div>
</body>
</html>
