<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property</title>
</head>
<body>
    <div id="inquiry-page">
        <h1>Property Inquiry</h1>
        <form method="POST" action="{{ url_for('submit_inquiry') }}">
            <input type="hidden" name="property_id" value="{{ property.property_id }}">
            <label for="inquiry-name">Name:</label>
            <input type="text" id="inquiry-name" name="customer_name" required>

            <label for="inquiry-email">Email:</label>
            <input type="email" id="inquiry-email" name="customer_email" required>

            <label for="inquiry-phone">Phone:</label>
            <input type="tel" id="inquiry-phone" name="customer_phone" required>

            <label for="inquiry-message">Message:</label>
            <textarea id="inquiry-message" name="inquiry_message" required></textarea>

            <button type="submit" id="submit-inquiry-button">Submit Inquiry</button>
        </form>
    </div>
</body>
</html>
