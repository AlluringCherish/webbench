<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - Content Publishing Hub</title>
</head>
<body>
<div id="create-article-page" role="main">
    <h1>Create New Article</h1>
    <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="title" required aria-required="true"><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="content" rows="15" cols="80" required aria-required="true"></textarea><br><br>

        <button type="submit" id="btn-submit-article">Submit Article</button>
    </form>

    <nav aria-label="Navigation">
        <ul>
            <li><a href="{{ url_for('dashboard') }}" id="btn-back-dashboard">Back to Dashboard</a></li>
        </ul>
    </nav>
</div>
</body>
</html>
