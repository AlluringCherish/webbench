<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - Content Publishing Hub</title>
</head>
<body>
<div id="edit-article-page" role="main">
    <h1>Edit Article</h1>
    <form id="edit-article-form" method="POST" action="{{ url_for('edit_article', article_id=article.id) }}">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="title" value="{{ article.title }}" required aria-required="true"><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="content" rows="15" cols="80" required aria-required="true">{{ article.content }}</textarea><br><br>

        <button type="submit" id="btn-save-changes">Save Changes</button>
    </form>

    <nav aria-label="Navigation">
        <ul>
            <li><a href="{{ url_for('dashboard') }}" id="btn-back-dashboard">Back to Dashboard</a></li>
        </ul>
    </nav>
</div>
</body>
</html>
