<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - Content Publishing Hub</title>
</head>
<body>
<div id="article-analytics-page" role="main">
    <h1>Analytics for "{{ article.title }}"</h1>
    <nav aria-label="Article navigation">
        <ul>
            <li><a href="{{ url_for('edit_article', article_id=article.id) }}" id="btn-back-article">Back to Article Editing</a></li>
        </ul>
    </nav>

    <section id="analytics-data" aria-labelledby="analytics-heading">
        <h2 id="analytics-heading">Performance Metrics</h2>
        <ul>
            <li id="views-count">Total Views: {{ analytics.views }}</li>
            <li id="unique-visitors-count">Unique Visitors: {{ analytics.unique_visitors }}</li>
            <li id="average-read-time">Average Read Time: {{ analytics.average_read_time }} seconds</li>
        </ul>
    </section>
</div>
</body>
</html>
