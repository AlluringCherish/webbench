<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Articles - Content Publishing Hub</title>
</head>
<body>
<div id="my-articles-page">
    <h1>My Articles</h1>
    <nav>
        <ul>
            <li><a href="{{ url_for('dashboard') }}" id="btn-back-dashboard">Back to Dashboard</a></li>
            <li><a href="{{ url_for('create_article') }}" id="btn-create-article">Create New Article</a></li>
        </ul>
    </nav>
    <section id="filter-controls">
        <form id="filter-form" method="GET" action="{{ url_for('my_articles') }}">
            <label for="filter-status">Status:</label>
            <select id="filter-status" name="filter_status">
                <option value="draft">Draft</option>
                <option value="under_review">Under Review</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
                <option value="published">Published</option>
                <option value="all" selected>All</option>
            </select>

            <label for="filter-category">Category:</label>
            <select id="filter-category" name="filter_category">
                <option value="all" selected>All</option>
                <!-- Categories dynamically loaded -->
                {% for category in categories %}
                <option value="{{ category }}">{{ category }}</option>
                {% endfor %}
            </select>

            <button type="submit" id="btn-apply-filters">Apply Filters</button>
        </form>
    </section>
    <section id="articles-list">
        <table id="my-articles-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Status</th>
                    <th>Category</th>
                    <th>Last Modified</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td><a href="{{ url_for('edit_article', article_id=article.id) }}" id="article-link-{{ article.id }}">{{ article.title }}</a></td>
                    <td>{{ article.status }}</td>
                    <td>{{ article.category }}</td>
                    <td>{{ article.last_modified }}</td>
                    <td>
                        <a href="{{ url_for('version_history', article_id=article.id) }}" id="btn-version-history-{{ article.id }}">Versions</a>
                        <a href="{{ url_for('article_analytics', article_id=article.id) }}" id="btn-article-analytics-{{ article.id }}">Analytics</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
