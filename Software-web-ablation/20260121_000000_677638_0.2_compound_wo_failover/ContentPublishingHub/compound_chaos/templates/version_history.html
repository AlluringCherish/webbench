<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Version History - Content Publishing Hub</title>
</head>
<body>
<div id="version-history-page" role="main">
    <h1>Version History for "{{ article.title }}"</h1>
    <nav aria-label="Article navigation">
        <ul>
            <li><a href="{{ url_for('edit_article', article_id=article.id) }}" id="btn-back-article">Back to Article Editing</a></li>
        </ul>
    </nav>

    <section id="versions-list" aria-labelledby="versions-heading">
        <h2 id="versions-heading">Versions</h2>
        <table id="versions-table" border="1" cellspacing="0" cellpadding="5">
            <thead>
                <tr>
                    <th>Version Number</th>
                    <th>Date</th>
                    <th>Stage</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for version in versions %}
                <tr>
                    <td>{{ version.version_number }}</td>
                    <td>{{ version.date }}</td>
                    <td>{{ version.stage }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('restore_version', article_id=article.id, version_id=version.id) }}" style="display:inline">
                            <button type="submit" id="btn-restore-version-{{ version.id }}">Restore</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </section>
</div>
</body>
</html>
