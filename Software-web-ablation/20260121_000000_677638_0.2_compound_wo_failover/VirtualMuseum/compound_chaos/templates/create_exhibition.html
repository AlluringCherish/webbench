<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Exhibition</title>
</head>
<body>
    <div id="create-exhibition-container">
        <h1>Create Exhibition</h1>
        <form id="create-exhibition-form" method="POST" action="{{ url_for('create_exhibition') }}">
            <label for="name-input">Name:</label>
            <input type="text" id="name-input" name="name" required>
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location" required>
            <label for="start-date-input">Start Date:</label>
            <input type="date" id="start-date-input" name="start_date" required>
            <label for="end-date-input">End Date:</label>
            <input type="date" id="end-date-input" name="end_date" required>
            <button type="submit" id="submit-exhibition-button">Create</button>
        </form>
        <button id="exhibitions-button" onclick="window.location.href='{{ url_for('exhibitions') }}'">Exhibitions</button>
    </div>
</body>
</html>
