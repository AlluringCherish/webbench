<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibitions</title>
</head>
<body>
    <div id="exhibitions-container">
        <h1>Exhibitions</h1>
        <button id="create-exhibition-button" onclick="window.location.href='{{ url_for('create_exhibition') }}'">Create Exhibition</button>
        <ul id="exhibitions-list">
        {% for exhibition in exhibitions %}
            <li id="exhibition-{{ exhibition.exhibition_id }}">
                <span>{{ exhibition.name }}</span>
                <button id="view-exhibition-button-{{ exhibition.exhibition_id }}" onclick="window.location.href='{{ url_for('view_exhibition', exhibition_id=exhibition.exhibition_id) }}'">View</button>
                <button id="edit-exhibition-button-{{ exhibition.exhibition_id }}" onclick="window.location.href='{{ url_for('edit_exhibition', exhibition_id=exhibition.exhibition_id) }}'">Edit</button>
                <form id="delete-exhibition-form-{{ exhibition.exhibition_id }}" method="POST" action="{{ url_for('delete_exhibition', exhibition_id=exhibition.exhibition_id) }}" style="display:inline;">
                    <button type="submit" id="delete-exhibition-button-{{ exhibition.exhibition_id }}">Delete</button>
                </form>
            </li>
        {% endfor %}
        </ul>
        <button id="dashboard-button" onclick="window.location.href='{{ url_for('dashboard') }}'">Dashboard</button>
    </div>
</body>
</html>
