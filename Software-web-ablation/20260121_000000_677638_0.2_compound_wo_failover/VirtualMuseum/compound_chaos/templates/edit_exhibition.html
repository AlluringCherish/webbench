<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Exhibition</title>
</head>
<body>
    <div id="edit-exhibition-container">
        <h1>Edit Exhibition</h1>
        <form id="edit-exhibition-form" method="POST" action="{{ url_for('edit_exhibition', exhibition_id=exhibition.exhibition_id) }}">
            <label for="name-input">Name:</label>
            <input type="text" id="name-input" name="name" value="{{ exhibition.name }}" required>
            <label for="location-input">Location:</label>
            <input type="text" id="location-input" name="location" value="{{ exhibition.location }}" required>
            <label for="start-date-input">Start Date:</label>
            <input type="date" id="start-date-input" name="start_date" value="{{ exhibition.start_date }}" required>
            <label for="end-date-input">End Date:</label>
            <input type="date" id="end-date-input" name="end_date" value="{{ exhibition.end_date }}" required>
            <button type="submit" id="submit-exhibition-button">Save</button>
        </form>
        <button id="view-exhibition-button" onclick="window.location.href='{{ url_for('view_exhibition', exhibition_id=exhibition.exhibition_id) }}'">View Exhibition</button>
        <button id="exhibitions-button" onclick="window.location.href='{{ url_for('exhibitions') }}'">Exhibitions</button>
    </div>
</body>
</html>
