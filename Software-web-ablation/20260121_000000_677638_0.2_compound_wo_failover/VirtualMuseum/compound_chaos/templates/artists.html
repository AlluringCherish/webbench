<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists</title>
</head>
<body>
    <div id="artists-container">
        <h1>Artists</h1>
        <button id="create-artist-button" onclick="window.location.href='{{ url_for('create_artist') }}'">Create Artist</button>
        <ul id="artists-list">
        {% for artist in artists %}
            <li id="artist-{{ artist.artist_id }}">
                <span>{{ artist.name }}</span>
                <button id="view-artist-button-{{ artist.artist_id }}" onclick="window.location.href='{{ url_for('view_artist', artist_id=artist.artist_id) }}'">View</button>
                <button id="edit-artist-button-{{ artist.artist_id }}" onclick="window.location.href='{{ url_for('edit_artist', artist_id=artist.artist_id) }}'">Edit</button>
                <form id="delete-artist-form-{{ artist.artist_id }}" method="POST" action="{{ url_for('delete_artist', artist_id=artist.artist_id) }}" style="display:inline;">
                    <button type="submit" id="delete-artist-button-{{ artist.artist_id }}">Delete</button>
                </form>
            </li>
        {% endfor %}
        </ul>
        <button id="dashboard-button" onclick="window.location.href='{{ url_for('dashboard') }}'">Dashboard</button>
    </div>
</body>
</html>
