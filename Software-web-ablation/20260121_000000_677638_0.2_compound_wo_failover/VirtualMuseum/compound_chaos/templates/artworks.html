<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artworks</title>
</head>
<body>
    <div id="artworks-container">
        <h1>Artworks</h1>
        <button id="create-artwork-button" onclick="window.location.href='{{ url_for('create_artwork') }}'">Create Artwork</button>
        <ul id="artworks-list">
        {% for artwork in artworks %}
            <li id="artwork-{{ artwork.artwork_id }}">
                <span>{{ artwork.name }}</span>
                <button id="view-artwork-button-{{ artwork.artwork_id }}" onclick="window.location.href='{{ url_for('view_artwork', artwork_id=artwork.artwork_id) }}'">View</button>
                <button id="edit-artwork-button-{{ artwork.artwork_id }}" onclick="window.location.href='{{ url_for('edit_artwork', artwork_id=artwork.artwork_id) }}'">Edit</button>
                <form id="delete-artwork-form-{{ artwork.artwork_id }}" method="POST" action="{{ url_for('delete_artwork', artwork_id=artwork.artwork_id) }}" style="display:inline;">
                    <button type="submit" id="delete-artwork-button-{{ artwork.artwork_id }}">Delete</button>
                </form>
            </li>
        {% endfor %}
        </ul>
        <button id="dashboard-button" onclick="window.location.href='{{ url_for('dashboard') }}'">Dashboard</button>
    </div>
</body>
</html>
