<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books - Library</title>
</head>
<body>
    <h1>Book Search</h1>
    <form method="get" action="{{ url_for('books') }}">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" value="{{ title }}">
        <label for="author">Author:</label>
        <input type="text" id="author" name="author" value="{{ author }}">
        <button type="submit" id="search_button">Search</button>
    </form>

    {% if books %}
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Year</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
        {% for book in books %}
            <tr>
                <td>{{ book.title }}</td>
                <td>{{ book.author }}</td>
                <td>{{ book.year }}</td>
                <td>
                    <form action="{{ url_for('reserve', book_id=book.book_id) }}" method="post" style="display:inline;">
                        <button type="submit" id="reserve_{{ book.book_id }}">Reserve</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
    <p>No books found matching your criteria.</p>
    {% endif %}

    <p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
