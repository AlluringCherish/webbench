<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
<h1>My Reviews</h1>
<ul>
    {% for rev in reviews %}
        <li>{{ rev.review_date }} - Dish: {{ rev.dish_id }} Rating: {{ rev.rating }}<br>{{ rev.review_text }}</li>
    {% else %}
        <li>No reviews found.</li>
    {% endfor %}
</ul>

<h2>Submit a New Review</h2>
<form method="POST">
    <label for="dish_id">Dish:</label>
    <select name="dish_id" id="dish_id" required>
        <option value="">-- Select Dish --</option>
        {% for dish in dishes %}
            <option value="{{ dish.dish_id }}">{{ dish.name }}</option>
        {% endfor %}
    </select><br>
    <label for="rating">Rating (1-5):</label>
    <input type="number" name="rating" id="rating" value="5" min="1" max="5" required><br>
    <label for="review_text">Review:</label><br>
    <textarea name="review_text" id="review_text" cols="30" rows="5" required></textarea><br>
    <input type="submit" value="Submit Review">
</form>
<p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
