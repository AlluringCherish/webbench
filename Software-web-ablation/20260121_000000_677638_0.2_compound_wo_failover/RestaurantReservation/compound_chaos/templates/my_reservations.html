<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
<h1>My Reservations</h1>
<ul>
    {% for res in reservations %}
        <li>{{ res.date }} at {{ res.time }} - Party of {{ res.party_size }} ({{ res.status }})
            {% if res.status == 'Upcoming' %}
            <form method="POST" action="{{ url_for('cancel_reservation', reservation_id=res.reservation_id) }}" style="display:inline;">
                <button type="submit">Cancel</button>
            </form>
            {% endif %}
        </li>
    {% else %}
        <li>No reservations found.</li>
    {% endfor %}
</ul>
<p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
