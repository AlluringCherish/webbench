<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation</title>
</head>
<body>
<h1>Make a Reservation</h1>
<form method="POST">
    Guest Name: <input type="text" name="guest_name" required><br>
    Party Size: <input type="number" name="party_size" min="1" required><br>
    Reservation Date: <input type="date" name="reservation_date" required><br>
    <input type="submit" value="Reserve">
</form>
<p><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
</body>
</html>
