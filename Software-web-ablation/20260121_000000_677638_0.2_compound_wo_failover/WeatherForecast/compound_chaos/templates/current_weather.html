<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Current Weather</title>
</head>
<body>
    <h1>Current Weather</h1>
    <div id="temperature-display">Temperature: {{ temperature }} &deg;C</div>
    <div id="condition-display">Condition: {{ condition }}</div>
    <div id="humidity-display">Humidity: {{ humidity }}%</div>
    <div id="wind-speed-info">Wind Speed: {{ wind_speed }}</div>
</body>
</html>
