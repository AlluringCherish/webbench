<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>
        <form method="post" action="{{ url_for('settings') }}">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                {% for unit in temperature_unit_options %}
                    <option value="{{ unit }}" {% if unit == selected_temperature_unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>

            <br>

            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location">
                {% for loc in default_location_options %}
                    <option value="{{ loc.location_id }}" {% if loc.location_id == selected_default_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
                {% endfor %}
            </select>

            <br>

            <label for="alert-notifications-enabled">Enable Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-enabled" name="alert_notifications_enabled" value="1" {% if alert_notifications_enabled %}checked{% endif %}>

            <br>

            <input type="submit" value="Save">
        </form>

        <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
    </div>
</body>
</html>
