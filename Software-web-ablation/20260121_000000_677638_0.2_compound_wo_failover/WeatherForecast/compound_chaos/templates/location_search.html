<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Locations</title>
</head>
<body>
    <div id="search-page">
        <h1>Search Locations</h1>

        <input type="text" id="location-search-input" name="location_search_input" placeholder="Enter location name">

        <div id="search-results">
            {% for location in search_results %}
                <div class="search-result">
                    <p>{{ location.location_name }} - {{ location.country }} ({{ location.timezone }})</p>
                    <button id="select-location-button-{{ location.location_id }}">Select</button>
                </div>
            {% endfor %}
        </div>

        <h2>Saved Locations</h2>
        <div id="saved-locations-list">
            {% for saved in saved_locations %}
                <div class="saved-location">
                    <p>{{ saved.location_name }} {% if saved.is_default == 1 %}(Default){% endif %}</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
