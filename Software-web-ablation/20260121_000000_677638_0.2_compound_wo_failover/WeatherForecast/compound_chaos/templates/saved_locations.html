<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Locations</title>
</head>
<body>
    <h1>Saved Locations</h1>

    <table border="1">
        <thead>
            <tr>
                <th>Location Name</th>
                <th>Current Temperature</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for saved in saved_locations %}
            <tr>
                <td>{{ saved.location_name }} {% if saved.is_default == 1 %}(Default){% endif %}</td>
                <td>{{ saved.current_temperature }}</td>
                <td>
                    <a href="{{ url_for('current_weather', location_id=saved.location_id) }}">
                        <button>View Current Weather</button>
                    </a>
                    <button id="remove-location-button-{{ saved.location_id }}">Remove</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button id="add-new-location-button">Add New Location</button>
</body>
</html>
