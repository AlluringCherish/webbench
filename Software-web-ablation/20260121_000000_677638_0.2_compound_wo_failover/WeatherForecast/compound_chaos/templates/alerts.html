<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alerts</title>
</head>
<body>
    <div id="alerts-page">
        <label for="severity-filter">Filter by Severity:</label>
        <select id="severity-filter" name="severity_filter">
            {% for option in severity_options %}
                <option value="{{ option }}" {% if option == selected_severity %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>

        <label for="location-filter-alerts">Filter by Location:</label>
        <select id="location-filter-alerts" name="location_filter_alerts">
            {% for loc in locations_filter_alerts %}
                <option value="{{ loc.location_id }}" {% if loc.location_id == selected_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
            {% endfor %}
        </select>

        <div id="alerts-list">
            {% for alert in alerts_list %}
                <div class="alert-item">
                    <p>Type: {{ alert.alert_type }}</p>
                    <p>Severity: {{ alert.severity }}</p>
                    <p>Description: {{ alert.description }}</p>
                    <p>Start Time: {{ alert.start_time }}</p>
                    <p>End Time: {{ alert.end_time }}</p>
                    <p>Acknowledged: {{ 'Yes' if alert.is_acknowledged == 1 else 'No' }}</p>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
