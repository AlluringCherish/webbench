<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weekly Forecast</title>
</head>
<body>
    <h1>Weekly Forecast</h1>

    <label for="location-filter">Location:</label>
    <select id="location-filter" name="location_filter">
        {% for loc in location_filter %}
            <option value="{{ loc.location_id }}" {% if loc.location_id == selected_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
        {% endfor %}
    </select>

    <div id="forecast-list">
        {% for forecast in forecast_list %}
            <div class="forecast-item">
                <p>Date: {{ forecast.date }}</p>
                <p>High Temperature: {{ forecast.high_temp }} &deg;C</p>
                <p>Low Temperature: {{ forecast.low_temp }} &deg;C</p>
                <p>Condition: {{ forecast.condition }}</p>
            </div>
        {% endfor %}
    </div>

    <a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
</body>
</html>
