<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
    <h1>Air Quality</h1>

    <label for="location-aqi-filter">Location:</label>
    <select id="location-aqi-filter" name="location_aqi_filter">
        {% for loc in location_aqi_filter %}
            <option value="{{ loc.location_id }}" {% if loc.location_id == selected_location_id %}selected{% endif %}>{{ loc.location_name }}</option>
        {% endfor %}
    </select>

    <div id="aqi-index">Air Quality Index: {{ aqi_data.aqi_index }}</div>

    <div id="pollution-details">
        <table border="1">
            <thead>
                <tr>
                    <th>Pollutant</th>
                    <th>Level</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>PM2.5</td>
                    <td>{{ aqi_data.pm25 }}</td>
                </tr>
                <tr>
                    <td>O3</td>
                    <td>{{ aqi_data.o3 }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
