<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Weather Dashboard</h1>

        <h2>{{ current_weather.location_name }}</h2>
        <p>Temperature: {{ current_weather.temperature }} &deg;C</p>
        <p>Condition: {{ current_weather.condition }}</p>
        <p>Humidity: {{ current_weather.humidity }}%</p>
        <p>Wind Speed: {{ current_weather.wind_speed }}</p>
        <p>Last Updated: {{ current_weather.last_updated }}</p>

        <button id="search-location-button">Search Locations</button>

        <a href="{{ url_for('weekly_forecast') }}"><button>Weekly Forecast</button></a>
        <a href="{{ url_for('weather_alerts') }}"><button>Alerts</button></a>
    </div>
</body>
</html>
