<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
</head>
<body>
    <div id="MainContainerID">
        <h1>Profile</h1>
        <nav id="NavBar">
            <ul>
                <li><a id="NavDashboard" href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a id="NavSettings" href="{{ url_for('settings') }}">Settings</a></li>
            </ul>
        </nav>
        <section id="UserInfo">
            <form id="UserInfoForm" method="post" action="{{ url_for('update_profile') }}">
                <label for="UsernameField">Username:</label>
                <input id="UsernameField" name="username" type="text" value="{{ user.username }}" required />
                <label for="EmailField">Email:</label>
                <input id="EmailField" name="email" type="email" value="{{ user.email }}" required />
                <button type="submit" id="UpdateProfileButton">Update Profile</button>
            </form>
        </section>
    </div>
</body>
</html>
