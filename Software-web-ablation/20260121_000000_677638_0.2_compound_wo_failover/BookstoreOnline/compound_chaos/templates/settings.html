<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
</head>
<body>
    <div id="MainContainerID">
        <h1>Settings</h1>
        <nav id="NavBar">
            <ul>
                <li><a id="NavDashboard" href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a id="NavProfile" href="{{ url_for('profile') }}">Profile</a></li>
            </ul>
        </nav>
        <section id="SettingsForm">
            <form method="post" id="SettingsFormForm" action="{{ url_for('update_settings') }}">
                <label for="NotificationsCheckbox">Enable Notifications:</label>
                <input id="NotificationsCheckbox" name="notifications" type="checkbox" {% if user.notifications_enabled %}checked{% endif %} />
                <label for="ThemeSelect">Theme:</label>
                <select id="ThemeSelect" name="theme">
                    <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light</option>
                    <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark</option>
                </select>
                <button type="submit" id="SaveSettingsButton">Save Settings</button>
            </form>
        </section>
    </div>
</body>
</html>
