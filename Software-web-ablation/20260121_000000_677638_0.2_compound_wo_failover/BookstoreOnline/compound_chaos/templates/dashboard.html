<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
</head>
<body>
    <div id="MainContainerID">
        <h1>Dashboard</h1>
        <nav id="NavBar">
            <ul>
                <li><a id="NavHome" href="{{ url_for('home') }}">Home</a></li>
                <li><a id="NavProfile" href="{{ url_for('profile') }}">Profile</a></li>
                <li><a id="NavSettings" href="{{ url_for('settings') }}">Settings</a></li>
            </ul>
        </nav>
        <section id="BooksList">
            <ul>
                {% for book in books %}
                <li id="Book_{{ book.book_id }}">
                    <a id="BookLink_{{ book.book_id }}" href="{{ url_for('book_detail', book_id=book.book_id) }}">{{ book.title }}</a>
                </li>
                {% endfor %}
            </ul>
        </section>
        <section id="SearchSection">
            <form id="SearchForm" method="get" action="{{ url_for('search_results') }}">
                <input type="text" id="SearchQuery" name="query" placeholder="Search books..." />
                <button type="submit" id="SearchSubmit">Search</button>
            </form>
        </section>
    </div>
</body>
</html>
