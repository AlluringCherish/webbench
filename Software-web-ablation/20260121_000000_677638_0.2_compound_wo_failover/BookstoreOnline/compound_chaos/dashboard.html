<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>
    <div id="main-container-id">
        <h1>Dashboard Title</h1>

        <!-- Navigation -->
        <nav id="navigation-bar">
            <ul>
                <li><a href="home.html" id="nav-home">Home</a></li>
                <li><a href="profile.html" id="nav-profile">Profile</a></li>
                <li><a href="settings.html" id="nav-settings">Settings</a></li>
            </ul>
        </nav>

        <!-- Dynamic Books List -->
        <section id="books-list">
            <h2>Your Books</h2>
            <ul>
                <!-- Example of dynamic book item -->
                <li>
                    <span id="book-title-{{ book.book_id }}">{{ book.title }}</span>
                    <button id="view-book-button-{{ book.book_id }}">View</button>
                </li>
            </ul>
        </section>

        <!-- Search Form -->
        <section id="search-section">
            <h2>Search Books</h2>
            <form id="search-form" method="get" action="search_results.html">
                <input type="text" id="search-query" name="query" placeholder="Enter book name">
                <input type="submit" value="Search">
            </form>
        </section>
    </div>
</body>
</html>
