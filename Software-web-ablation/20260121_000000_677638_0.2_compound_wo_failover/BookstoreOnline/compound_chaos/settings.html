<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
</head>
<body>
    <div id="main-container-id">
        <h1>Settings</h1>

        <!-- Navigation -->
        <nav id="navigation-bar">
            <ul>
                <li><a href="dashboard.html" id="nav-dashboard">Dashboard</a></li>
                <li><a href="profile.html" id="nav-profile">Profile</a></li>
            </ul>
        </nav>

        <!-- Settings Form -->
        <section id="settings-section">
            <form id="settings-form" method="post" action="update_settings">
                <label for="notifications">Enable Notifications:</label>
                <input type="checkbox" id="notifications" name="notifications" {{ 'checked' if user.notifications_enabled else '' }}>

                <label for="theme">Theme:</label>
                <select id="theme" name="theme">
                    <option value="light" {% if user.theme == 'light' %}selected{% endif %}>Light</option>
                    <option value="dark" {% if user.theme == 'dark' %}selected{% endif %}>Dark</option>
                </select>

                <input type="submit" value="Save Settings">
            </form>
        </section>
    </div>
</body>
</html>
