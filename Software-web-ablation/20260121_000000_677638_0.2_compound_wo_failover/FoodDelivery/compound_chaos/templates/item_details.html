<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
</head>
<body>
    <div id="item-details-page">
        <h1 id="item-name">{{ menu_item.name }}</h1>
        <div id="item-description">{{ menu_item.description }}</div>
        <div id="item-price">Price: ${{ "{:.2f}".format(menu_item.price) }}</div>
        <form method="POST" action="{{ url_for('item_details', item_id=menu_item.item_id) }}">
            <label for="quantity-input">Quantity:</label>
            <input type="number" id="quantity-input" name="quantity" value="1" min="1" required>
            <button type="submit" id="add-to-cart-button">Add to Cart</button>
        </form>
    </div>
</body>
</html>
