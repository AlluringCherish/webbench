<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a New Review</h1>
        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="restaurant-select">Restaurant:</label>
            <select id="restaurant-select" name="restaurant_id" required>
                <option value="">--Select--</option>
                {% for restaurant in restaurants %}
                <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                {% endfor %}
            </select>

            <label for="customer-name">Your Name:</label>
            <input id="customer-name" name="customer_name" type="text" required>

            <label for="rating-select">Rating:</label>
            <select id="rating-select" name="rating" required>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select>

            <label for="review-text">Review:</label>
            <textarea id="review-text" name="review_text" required></textarea>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
        <a href="{{ url_for('reviews') }}">
            <button id="back-to-reviews">Back to Reviews</button>
        </a>
    </div>
</body>
</html>
