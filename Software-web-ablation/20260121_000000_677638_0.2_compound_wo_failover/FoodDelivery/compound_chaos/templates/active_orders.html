<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <h1>Active Orders</h1>
        <form method="GET" id="filter-status-form">
            <label for="status-filter">Filter by Status:</label>
            <select id="status-filter" name="status-filter" onchange="document.getElementById('filter-status-form').submit()">
                <option value="all" {% if 'all' == request.args.get('status-filter', 'all') %}selected{% endif %}>All</option>
                {% for status in statuses %}
                <option value="{{ status }}" {% if status == request.args.get('status-filter') %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </form>

        <div id="orders-list">
            {% for order in orders %}
            <div class="order">
                <div>Order ID: {{ order.order_id }}</div>
                <div>Restaurant: {{ order.restaurant_name }}</div>
                <div>Status: {{ order.status }}</div>
                <div>ETA: {{ order.eta }}</div>
                <a href="{{ url_for('track_order', order_id=order.order_id) }}">
                    <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
