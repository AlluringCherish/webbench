<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Food Delivery Dashboard</h1>
        <div id="featured-restaurants">
            {% for restaurant in featured_restaurants %}
            <div class="restaurant">
                <h2>{{ restaurant.name }}</h2>
                <p>{{ restaurant.cuisine }}</p>
                <p>{{ restaurant.address }}</p>
                <a href="{{ url_for('view_restaurant', restaurant_id=restaurant.restaurant_id) }}">
                    <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Restaurant</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('restaurants') }}">
            <button id="browse-restaurants-button">Browse Restaurants</button>
        </a>
        <a href="{{ url_for('cart') }}">
            <button id="view-cart-button">View Cart</button>
        </a>
        <a href="{{ url_for('active_orders') }}">
            <button id="active-orders-button">Active Orders</button>
        </a>
    </div>
</body>
</html>
