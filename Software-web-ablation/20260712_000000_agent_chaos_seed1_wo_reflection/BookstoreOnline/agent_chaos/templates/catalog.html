<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="{{ url_for('catalog') }}">
            <input id="search-input" type="text" name="search" placeholder="Search books..." value="{{ search_query }}">

            <select id="category-filter" name="category">
                <option value="" {% if selected_category == '' %}selected{% endif %}>All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_name }}" {% if category.category_name == selected_category %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Filter</button>
        </form>

        <div id="books-grid">
            {% if books %}
                <ul>
                {% for book in books %}
                    <li>
                        <div><strong>{{ book.title }}</strong> by {{ book.author }}</div>
                        <div>Price: ${{ '%.2f'|format(book.price) }}</div>
                        <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No books found.</p>
            {% endif %}
        </div>

    </div>
</body>
</html>
