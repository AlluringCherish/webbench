<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write a Review</h1>

        <form method="post" action="{{ url_for('write_review') }}">
            <label for="select-book">Select Book:</label>
            <select id="select-book" name="book_id" required>
                <option value="" disabled selected>Select a book</option>
                {% for book in books %}
                    <option value="{{ book.book_id }}">{{ book.title }}</option>
                {% endfor %}
            </select><br><br>

            <label for="rating-select">Rating:</label>
            <select id="rating-select" name="rating" required>
                <option value="1">1 star</option>
                <option value="2">2 stars</option>
                <option value="3">3 stars</option>
                <option value="4">4 stars</option>
                <option value="5">5 stars</option>
            </select><br><br>

            <label for="review-text">Review Text:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="50" required></textarea><br><br>

            <label for="customer-name">Your Name (optional):</label><br>
            <input type="text" id="customer-name" name="customer_name"><br><br>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
    </div>
</body>
</html>
