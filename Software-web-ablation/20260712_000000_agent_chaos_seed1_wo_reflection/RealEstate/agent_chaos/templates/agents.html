<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>
        <form action="{{ url_for('agent_directory_page') }}" method="GET">
            <input id="agent-search" name="agent-search" type="text" value="{{ search_query }}" />
            <button id="search-agent-button" type="submit">Search</button>
        </form>
        <div id="agents-list">
            {% for agent in agents %}
            <div>
                <h3>{{ agent.agent_name }}</h3>
                <p>Specialization: {{ agent.specialization }}</p>
                <p>Email: {{ agent.email }}</p>
                <p>Phone: {{ agent.phone }}</p>
                <a href="mailto:{{ agent.email }}">
                    <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
