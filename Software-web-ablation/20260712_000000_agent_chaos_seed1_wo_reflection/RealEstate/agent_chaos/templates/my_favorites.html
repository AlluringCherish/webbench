<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>
        <div id="favorites-list">
            {% for property in favorite_properties %}
            <div>
                <h3>{{ property.address }}</h3>
                <p>Location: {{ property.location }}</p>
                <p>Price: ${{ property.price }}</p>
                <p>Type: {{ property.property_type }}</p>
                <a href="{{ url_for('property_details_page', property_id=property.property_id) }}">
                    <button id="view-property-button-{{ property.property_id }}">View</button>
                </a>
                <form action="{{ url_for('my_favorites_page') }}" method="POST" style="display:inline">
                    <input type="hidden" name="remove_favorite_property_id" value="{{ property.property_id }}" />
                    <button id="remove-from-favorites-button-{{ property.property_id }}" type="submit">Remove</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
