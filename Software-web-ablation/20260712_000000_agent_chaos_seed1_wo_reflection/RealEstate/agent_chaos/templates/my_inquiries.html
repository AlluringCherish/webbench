<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Inquiries</title>
</head>
<body>
    <div id="inquiries-page">
        <h1>My Inquiries</h1>
        <form action="{{ url_for('my_inquiries_page') }}" method="POST">
            <label for="inquiry-status-filter">Filter by Status:</label>
            <select id="inquiry-status-filter" name="inquiry_status_filter">
                {% set filter_options = ['All', 'Pending', 'Contacted', 'Resolved'] %}
                {% for option in filter_options %}
                    <option value="{{ option }}" {% if option == inquiry_status_filter %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>
            <button id="filter-inquiries-button" type="submit">Filter</button>
        </form>

        <table id="inquiries-table" border="1">
            <thead>
                <tr>
                    <th>Property</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Message</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for inquiry in inquiries %}
                <tr>
                    <td>{{ inquiry.property_address }}</td>
                    <td>{{ inquiry.customer_name }}</td>
                    <td>{{ inquiry.customer_email }}</td>
                    <td>{{ inquiry.customer_phone }}</td>
                    <td>{{ inquiry.message }}</td>
                    <td>{{ inquiry.inquiry_date }}</td>
                    <td>{{ inquiry.status }}</td>
                    <td>
                        <form action="{{ url_for('my_inquiries_page') }}" method="POST" style="display:inline">
                            <input type="hidden" name="delete_inquiry_id" value="{{ inquiry.inquiry_id }}" />
                            <button id="delete-inquiry-button-{{ inquiry.inquiry_id }}" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
