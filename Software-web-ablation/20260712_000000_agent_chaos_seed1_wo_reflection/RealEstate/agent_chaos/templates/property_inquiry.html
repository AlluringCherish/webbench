<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Property Inquiry</title>
</head>
<body>
    <div id="inquiry-page">
        <h1>Submit Property Inquiry</h1>
        <form action="{{ url_for('property_inquiry_page') }}" method="POST">
            <label for="select-property">Property:</label>
            <select id="select-property" name="select_property">
                {% for property in properties %}
                    <option value="{{ property.property_id }}">{{ property.address }}</option>
                {% endfor %}
            </select>

            <label for="inquiry-name">Name:</label>
            <input id="inquiry-name" name="inquiry_name" type="text" required />

            <label for="inquiry-email">Email:</label>
            <input id="inquiry-email" name="inquiry_email" type="email" required />

            <label for="inquiry-phone">Phone:</label>
            <input id="inquiry-phone" name="inquiry_phone" type="tel" required />

            <label for="inquiry-message">Message:</label>
            <textarea id="inquiry-message" name="inquiry_message" required></textarea>

            <button id="submit-inquiry-button" type="submit">Submit Inquiry</button>
        </form>
    </div>
</body>
</html>
