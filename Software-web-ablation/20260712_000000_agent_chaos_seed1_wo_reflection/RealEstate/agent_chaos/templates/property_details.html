<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1 id="property-address">{{ property.address }}</h1>
        <div id="property-price">
            <p>Price: ${{ property.price }}</p>
        </div>
        <div id="property-description">
            <p>{{ property.description }}</p>
        </div>
        <div id="property-features">
            <ul>
                <li>Type: {{ property.property_type }}</li>
                <li>Bedrooms: {{ property.bedrooms }}</li>
                <li>Bathrooms: {{ property.bathrooms }}</li>
                <li>Square Feet: {{ property.square_feet }}</li>
            </ul>
        </div>

        <form action="{{ url_for('my_favorites_page') }}" method="POST">
            <input type="hidden" name="property_id" value="{{ property.property_id }}" />
            <button id="add-to-favorites-button" type="submit">
                {% if is_favorite %}Remove from Favorites{% else %}Add to Favorites{% endif %}
            </button>
        </form>

        <a href="{{ url_for('property_inquiry_page') }}?property_id={{ property.property_id }}">
            <button id="submit-inquiry-button">Submit Inquiry</button>
        </a>
    </div>
</body>
</html>
