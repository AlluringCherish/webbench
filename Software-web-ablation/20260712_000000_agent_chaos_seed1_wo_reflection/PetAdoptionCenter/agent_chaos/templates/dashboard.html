<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>
        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div class="featured-pet-card" id="featured-pet-{{ pet.pet_id }}">
                <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                <h3>{{ pet.name }}</h3>
                <p>Species: {{ pet.species }}</p>
                <p>Age: {{ pet.age }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="browse-pets-button" onclick="window.location.href='{{ url_for('pet_listings_page') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
