<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>
        <form id="filter-form" method="POST" action="{{ url_for('filter_applications') }}">
            <label for="filter-status">Filter by Status:</label>
            <select id="filter-status" name="filter_status">
                <option value="">All</option>
                <option value="Pending">Pending</option>
                <option value="Approved">Approved</option>
                <option value="Rejected">Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>
        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Pet Name</th>
                    <th>Date Submitted</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr id="application-{{ app.application_id }}">
                    <td>{{ app.pet_name }}</td>
                    <td>{{ app.date_submitted }}</td>
                    <td>{{ app.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
