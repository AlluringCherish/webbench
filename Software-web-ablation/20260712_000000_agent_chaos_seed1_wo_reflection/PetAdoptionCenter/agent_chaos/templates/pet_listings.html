<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Pets</title>
</head>
<body>
    <div id="pet-listings-page">
        <h1>Available Pets</h1>
        <form id="search-form" method="POST" action="{{ url_for('pet_search') }}">
            <input id="search-input" name="search_term" type="text" placeholder="Search pets">
            <select id="filter-species" name="filter_species">
                <option value="">All Species</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Other">Other</option>
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="pet-grid">
            {% for pet in pets %}
            <div class="pet-card" id="pet-{{ pet.pet_id }}">
                <a href="{{ url_for('pet_details_page', pet_id=pet.pet_id) }}">
                    <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
                    <h3>{{ pet.name }}</h3>
                    <p>Species: {{ pet.species }}</p>
                    <p>Age: {{ pet.age }}</p>
                </a>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
