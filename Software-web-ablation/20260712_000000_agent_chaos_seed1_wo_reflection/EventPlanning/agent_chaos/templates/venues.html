<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="venues-page">
        <h1>{{ page_title }}</h1>
        <input type="text" id="venue-search-input" name="search_venue" placeholder="Search venues...">
        <select id="venue-capacity-filter" name="capacity_filter">
            <option value="">All Capacities</option>
            <option value="small">Small (&lt;1000)</option>
            <option value="medium">Medium (1000-3000)</option>
            <option value="large">Large (&gt;3000)</option>
        </select>
        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card">
                <h3>{{ venue.venue_name }}</h3>
                <p>Location: {{ venue.location }}</p>
                <p>Capacity: {{ venue.capacity }}</p>
                <p>Amenities: {{ venue.amenities }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}" onclick="window.location.href='{{ url_for('venue_details_page', venue_id=venue.venue_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
