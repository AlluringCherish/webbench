<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="schedules-page">
        <h1>{{ page_title }}</h1>
        <input type="date" id="schedule-filter-date" name="filter_date">
        <select id="schedule-filter-event" name="filter_event">
            <option value="">All Events</option>
            {% for event in events %}
            <option value="{{ event.event_id }}">{{ event.event_name }}</option>
            {% endfor %}
        </select>
        <button id="export-schedule-button">Export Schedule</button>
        <div id="schedules-timeline">
            {% for schedule in schedules %}
            <div class="schedule-item">
                <h3>{{ schedule.session_title }}</h3>
                <p>Event ID: {{ schedule.event_id }}</p>
                <p>Session Time: {{ schedule.session_time }}</p>
                <p>Duration: {{ schedule.duration_minutes }} minutes</p>
                <p>Speaker: {{ schedule.speaker }}</p>
                <p>Venue ID: {{ schedule.venue_id }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
