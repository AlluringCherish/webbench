<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>

        <form id="upload-resume-form" method="post" action="{{ url_for('upload_resume') }}" enctype="multipart/form-data">
            <input type="file" id="resume-file-input" name="resume_file" hidden>
            <button type="button" id="upload-resume-button" onclick="document.getElementById('resume-file-input').click();">Upload Resume</button>
        </form>

        <div id="resumes-list">
            {% for resume in resumes %}
            <div class="resume-card">
                <h3>{{ resume.applicant_name }}</h3>
                <div>{{ resume.applicant_email }}</div>
                <div>{{ resume.filename }}</div>
                <div>{{ resume.upload_date }}</div>
                <div>{{ resume.summary }}</div>
                <form method="post" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}" style="display:inline;">
                    <button type="submit" id="delete-resume-button-{{ resume.resume_id }}">Delete</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
