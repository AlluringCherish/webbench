<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">Amount Due: ${{ '%.2f' % fine.amount }}</div>

        <form method="POST">
            <button type="submit" id="confirm-payment-button">Confirm Payment</button>
        </form>

        <button id="back-to-profile" onclick="window.location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
    </div>
</body>
</html>
