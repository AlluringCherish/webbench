<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Return Confirmation</title>
</head>
<body>
    <div id="return-confirmation-page">
        <div id="borrow-info">
            <h2>Return Confirmation for: {{ book.title }}</h2>
            <p>Borrow Date: {{ borrow.borrow_date }}</p>
            <p>Due Date: {{ borrow.due_date }}</p>
            <p>Status: {{ borrow.status }}</p>
        </div>

        <form method="POST" action="{{ url_for('confirm_return', borrow_id=borrow.borrow_id) }}">
            <button type="submit" id="confirm-return-button">Confirm Return</button>
        </form>

        <form method="POST" action="{{ url_for('cancel_return', borrow_id=borrow.borrow_id) }}">
            <button type="submit" id="cancel-return-button">Cancel</button>
        </form>
    </div>
</body>
</html>
