<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profile</title>
</head>
<body>
    <div id="trainer-detail-page">
        <h1 id="trainer-name">{{ trainer.name }}</h1>
        <div id="trainer-bio">
            <p>{{ trainer.bio }}</p>
            <p>Experience: {{ trainer.experience_years }} years</p>
        </div>
        <div id="trainer-certifications">
            <p>{{ trainer.certifications }}</p>
        </div>
        <a href="{{ url_for('pt_booking') }}">
            <button id="book-session-button">Book Session</button>
        </a>
        <div id="trainer-reviews">
            <h2>Client Reviews</h2>
            {% for review in trainer_reviews %}
            <div class="review">
                <strong>{{ review.reviewer_name }}</strong> - Rating: {{ review.rating }}/5
                <p>{{ review.review }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
