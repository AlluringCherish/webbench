<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Details</title>
</head>
<body>
    <div id="plan-details-page">
        <h1 id="plan-title">{{ plan.plan_name }}</h1>
        <div id="plan-price">{{ plan.price }} per {{ plan.billing_cycle }}</div>
        <div id="plan-features">{{ plan.features }}</div>
        <a href="#">
            <button id="enroll-plan-button">Enroll in This Plan</button>
        </a>
        <div id="plan-reviews">
            <h2>Member Reviews</h2>
            {% for review in plan_reviews %}
            <div class="review">
                <strong>{{ review.reviewer_name }}</strong> - Rating: {{ review.rating }}/5
                <p>{{ review.review_text }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
