<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Membership Plans</title>
</head>
<body>
    <div id="membership-page">
        <h1>Membership Plans</h1>
        <label for="plan-filter">Filter by Membership Type:</label>
        <select id="plan-filter" name="plan-filter">
            {% for mtype in membership_types %}
            <option value="{{ mtype }}">{{ mtype }}</option>
            {% endfor %}
        </select>
        <div id="plans-grid">
            {% for plan in plans %}
            <div class="plan-card">
                <h2>{{ plan.plan_name }}</h2>
                <p>Price: {{ plan.price }} per {{ plan.billing_cycle }}</p>
                <p>Features: {{ plan.features }}</p>
                <p>Max Classes: {{ plan.max_classes }}</p>
                <a href="{{ url_for('plan_details', plan_id=plan.membership_id) }}">
                    <button id="view-details-button-{{ plan.membership_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('dashboard_page') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
