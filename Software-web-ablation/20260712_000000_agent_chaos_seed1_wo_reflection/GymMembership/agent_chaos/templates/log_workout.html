<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Workout</title>
</head>
<body>
    <div id="log-workout-page">
        <h1>Log Workout</h1>
        {% if submission_status %}
        <p>{{ submission_status }}</p>
        {% endif %}
        <form method="POST" action="{{ url_for('log_workout') }}">
            <label for="workout-type">Workout Type:</label>
            <select id="workout-type" name="workout_type" required>
                {% for wtype in workout_types %}
                <option value="{{ wtype }}">{{ wtype }}</option>
                {% endfor %}
            </select>
            <label for="workout-duration">Duration (minutes):</label>
            <input type="number" id="workout-duration" name="duration_minutes" min="1" required>
            <label for="calories-burned">Calories Burned:</label>
            <input type="number" id="calories-burned" name="calories_burned" min="0" required>
            <label for="workout-notes">Notes:</label>
            <textarea id="workout-notes" name="notes"></textarea>
            <button type="submit" id="submit-workout-button">Submit</button>
        </form>
    </div>
</body>
</html>
