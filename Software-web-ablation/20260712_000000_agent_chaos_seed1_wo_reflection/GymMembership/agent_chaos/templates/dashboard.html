<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Membership Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Gym Membership Dashboard</h1>
        <div id="member-welcome">
            <p>{{ member_welcome_msg }}</p>
        </div>
        <h2>Featured Classes</h2>
        <div id="featured-classes">
            <ul>
                {% for cls in featured_classes %}
                <li>{{ cls.class_name }} - {{ cls.schedule_day }} at {{ cls.schedule_time }}</li>
                {% endfor %}
            </ul>
        </div>
        <a href="{{ url_for('membership_plans') }}">
            <button id="browse-membership-button">Browse Membership Plans</button>
        </a>
        <a href="{{ url_for('class_schedule') }}">
            <button id="view-schedule-button">View Class Schedule</button>
        </a>
        <a href="{{ url_for('pt_booking') }}">
            <button id="book-trainer-button">Book Trainer</button>
        </a>
    </div>
</body>
</html>
