<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <h1>Edit Article: {{ article['title'] }}</h1>

    <form id="edit-article-form" method="post" action="{{ url_for('edit_article', article_id=article['article_id']) }}">
        <input type="hidden" id="article-id" name="article_id" value="{{ article['article_id'] }}">

        <label for="version-content">Version Content:</label><br>
        <textarea id="version-content" name="content" rows="15" cols="80" required>{{ content }}</textarea><br><br>

        {% if error %}
        <div id="error-message" style="color:red;">{{ error }}</div>
        {% endif %}

        <button type="submit" id="submit-edit-article">Save Changes</button>
    </form>

    <nav>
        <a href="{{ url_for('dashboard') }}" id="nav-dashboard">Dashboard</a> |
        <a href="{{ url_for('version_history', article_id=article['article_id']) }}" id="nav-version-history">Version History</a> |
        <a href="{{ url_for('my_articles') }}" id="nav-my-articles">My Articles</a> |
        <a href="{{ url_for('logout') }}" id="nav-logout">Logout</a>
    </nav>
</body>
</html>
