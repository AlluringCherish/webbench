<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <h1>Analytics for Article: {{ article['title'] }}</h1>

    <section id="analytics-data">
        <ul>
            {% for metric, value in analytics.items() %}
            <li>{{ metric }}: {{ value }}</li>
            {% endfor %}
        </ul>
    </section>

    <nav>
        <a href="{{ url_for('edit_article', article_id=article['article_id']) }}" id="nav-edit-article">Edit Article</a> |
        <a href="{{ url_for('my_articles') }}" id="nav-my-articles">My Articles</a> |
        <a href="{{ url_for('dashboard') }}" id="nav-dashboard">Dashboard</a> |
        <a href="{{ url_for('logout') }}" id="nav-logout">Logout</a>
    </nav>
</body>
</html>
