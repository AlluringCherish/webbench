<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <h1>Content Calendar</h1>

    <section id="calendar-view">
        <!-- Calendar rendering expected here -->
        {% if events %}
        <ul id="calendar-events">
            {% for event in events %}
            <li>{{ event['date'] }}: {{ event['title'] }}</li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No events available.</p>
        {% endif %}
    </section>

    <nav>
        <a href="{{ url_for('dashboard') }}" id="nav-dashboard">Dashboard</a> |
        <a href="{{ url_for('create_article') }}" id="nav-create-article">Create Article</a> |
        <a href="{{ url_for('my_articles') }}" id="nav-my-articles">My Articles</a> |
        <a href="{{ url_for('logout') }}" id="nav-logout">Logout</a>
    </nav>
</body>
</html>
