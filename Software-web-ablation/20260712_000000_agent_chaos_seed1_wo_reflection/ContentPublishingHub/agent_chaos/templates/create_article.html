<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <h1>Create New Article</h1>

    <form id="create-article-form" method="post" action="{{ url_for('create_article') }}">
        <label for="article-title">Title:</label><br>
        <input type="text" id="article-title" name="title" required><br><br>

        <label for="article-content">Content:</label><br>
        <textarea id="article-content" name="content" rows="10" cols="60" required></textarea><br><br>

        {% if error %}
        <div id="error-message" style="color:red;">{{ error }}</div>
        {% endif %}

        <button type="submit" id="submit-create-article">Create Article</button>
    </form>

    <nav>
        <a href="{{ url_for('dashboard') }}" id="nav-dashboard">Dashboard</a> |
        <a href="{{ url_for('my_articles') }}" id="nav-my-articles">My Articles</a> |
        <a href="{{ url_for('logout') }}" id="nav-logout">Logout</a>
    </nav>
</body>
</html>
