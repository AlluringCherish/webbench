<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>

        <form method="POST" action="{{ url_for('auction_catalog_search') }}">
            <input id="search-input" name="search_query" type="text" value="{{ search_query|default('') }}" placeholder="Search auctions..." />

            <select id="category-filter" name="selected_category">
                <option value="">All Categories</option>
                {% for category in categories %}
                <option value="{{ category }}" {% if category == selected_category %}selected{% endif %}>{{ category }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-item">
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}" />
                <h2>{{ auction.item_name }}</h2>
                <p>{{ auction.description }}</p>
                <div>Category: {{ auction.category }}</div>
                <div>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</div>
                <div>Time Remaining: {{ auction.time_remaining }}</div>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
