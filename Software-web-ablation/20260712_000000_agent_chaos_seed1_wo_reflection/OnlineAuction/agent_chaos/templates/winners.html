<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>
        <form method="POST" action="{{ url_for('winners_filter') }}">
            <label for="filter-by-winner">Filter by Winner Name:</label>
            <input id="filter-by-winner" name="filter_winner_name" type="text" value="{{ filter_winner_name|default('') }}" />
            <button type="submit">Filter</button>
        </form>

        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                <h2>{{ winner.item_name }}</h2>
                <div>Winner: {{ winner.winner_name }}</div>
                <div>Winning Bid: ${{ '%.2f'|format(winner.winning_bid) }}</div>
                <div>Win Date: {{ winner.win_date }}</div>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard_page') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
