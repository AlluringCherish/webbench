<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid</h1>
        <div id="auction-name">Item: {{ auction.item_name }}</div>
        <div id="minimum-bid">Minimum Bid: ${{ '%.2f'|format(auction.minimum_bid) }}</div>
        <form method="POST" action="{{ url_for('submit_bid', auction_id=auction.auction_id) }}">
            <label for="bidder-name">Your Name:</label>
            <input id="bidder-name" name="bidder_name" type="text" value="{{ bidder_name|default('') }}" />
            {% if errors and errors.bidder_name %}
            <div class="error" id="bidder-name-error">{{ errors.bidder_name }}</div>
            {% endif %}

            <label for="bid-amount">Bid Amount:</label>
            <input id="bid-amount" name="bid_amount" type="number" step="0.01" value="{{ bid_amount|default('') }}" />
            {% if errors and errors.bid_amount %}
            <div class="error" id="bid-amount-error">{{ errors.bid_amount }}</div>
            {% endif %}

            <button id="submit-bid-button" type="submit">Submit Bid</button>
        </form>
    </div>
</body>
</html>
