<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="POST" action="{{ url_for('booking', vehicle_id=vehicle.vehicle_id) }}">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location" required>
                    {% for option in pickup_location_options %}
                    <option value="{{ option }}" {% if option == pickup_location %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location" required>
                    {% for option in dropoff_location_options %}
                    <option value="{{ option }}" {% if option == dropoff_location %}selected{% endif %}>{{ option }}</option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input type="date" id="pickup-date" name="pickup_date" value="{{ pickup_date if pickup_date else '' }}" required />

                <label for="dropoff-date">Dropoff Date:</label>
                <input type="date" id="dropoff-date" name="dropoff_date" value="{{ dropoff_date if dropoff_date else '' }}" required />

                <button type="submit" id="calculate-price-button">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if total_price is not none %}
                <p>Total Price: ${{ '%.2f'|format(total_price) }}</p>
                {% endif %}
            </div>

            {% if reservation_id is not none %}
            <button id="proceed-to-insurance-button" onclick="location.href='{{ url_for('insurance_options', reservation_id=reservation_id) }}'">Proceed to Insurance Options</button>
            {% endif %}
        </div>
    </div>
</body>
</html>
