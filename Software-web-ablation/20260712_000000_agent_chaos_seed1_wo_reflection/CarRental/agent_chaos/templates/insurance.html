<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="main-container">
        <h1>Select Insurance Coverage</h1>
        <div id="insurance-page">
            <form method="POST" action="{{ url_for('insurance_options', reservation_id=reservation_id) }}">
                <div id="insurance-options">
                    {% for insurance in insurance_plans %}
                    <div>
                        <input type="radio" id="select-insurance-{{ insurance.insurance_id }}" name="selected_insurance_id" value="{{ insurance.insurance_id }}" {% if selected_plan and selected_plan.insurance_id == insurance.insurance_id %}checked{% endif %} required />
                        <label for="select-insurance-{{ insurance.insurance_id }}">{{ insurance.plan_name }} - ${{ insurance.daily_cost }} per day</label>
                    </div>
                    {% endfor %}
                </div>
                <div id="insurance-description">
                    {% if selected_plan %}
                    <p>{{ selected_plan.description }}</p>
                    {% else %}
                    <p>Please select an insurance plan to see details.</p>
                    {% endif %}
                </div>
                <div id="insurance-price">
                    {% if selected_plan %}
                    <p>Price: ${{ selected_plan.daily_cost }} per day</p>
                    {% endif %}
                </div>
                <button type="submit" id="confirm-booking-button">Confirm Booking</button>
            </form>
        </div>
    </div>
</body>
</html>
