<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            <form method="POST" action="{{ url_for('special_requests') }}">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id" required>
                    <option value="">--Select Reservation--</option>
                    {% for reservation in reservations_for_selection %}
                    <option value="{{ reservation.reservation_id }}">Reservation #{{ reservation.reservation_id }}</option>
                    {% endfor %}
                </select>

                <label><input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance" {% if special_request_form.driver_assistance %}checked{% endif %} /> Driver Assistance</label>
                <label><input type="checkbox" id="gps-option-checkbox" name="gps_option" {% if special_request_form.gps_option %}checked{% endif %} /> GPS Option</label>

                <label for="child-seat-quantity">Child Seat Quantity:</label>
                <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="{{ special_request_form.child_seat_quantity if special_request_form.child_seat_quantity is not none else 0 }}" />

                <label for="special-notes">Special Notes:</label>
                <textarea id="special-notes" name="special_notes">{{ special_request_form.special_notes if special_request_form.special_notes else '' }}</textarea>

                <button type="submit" id="submit-requests-button">Submit Requests</button>
            </form>
        </div>
    </div>
</body>
</html>
