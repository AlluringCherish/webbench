<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Trips</title>
</head>
<body>
    <div id="trips-page">
        <h1>My Trips</h1>

        <table id="trips-table" border="1">
            <thead>
                <tr>
                    <th>Trip Name</th>
                    <th>Destination</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for trip in trips %}
                <tr>
                    <td>{{ trip.trip_name }}</td>
                    <td>{{ trip.destination }}</td>
                    <td>{{ trip.start_date }}</td>
                    <td>{{ trip.end_date }}</td>
                    <td>{{ trip.status }}</td>
                    <td>
                        <button id="view-trip-details-button-{{ trip.trip_id }}" onclick="window.location.href='{{ url_for('trip_details', trip_id=trip.trip_id) }}'">View Details</button>
                        <form method="POST" action="{{ url_for('manage_trips') }}" style="display:inline;">
                            <input type="hidden" name="trip_id" value="{{ trip.trip_id }}">
                            <button type="submit" id="edit-trip-button-{{ trip.trip_id }}" name="action" value="edit">Edit</button>
                            <button type="submit" id="delete-trip-button-{{ trip.trip_id }}" name="action" value="delete">Delete</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="6">No trips available.</td></tr>
                {% endfor %}
            </tbody>
        </table>

        <button onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
