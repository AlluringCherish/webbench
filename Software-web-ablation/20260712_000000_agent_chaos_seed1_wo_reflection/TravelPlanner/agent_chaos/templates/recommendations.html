<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>

        <form method="POST" action="{{ url_for('travel_recommendations') }}">
            <label for="recommendation-season-filter">Season:</label>
            <select id="recommendation-season-filter" name="selected_season_filter">
                <option value="">All</option>
                <option value="Spring" {% if selected_season_filter == 'Spring' %}selected{% endif %}>Spring</option>
                <option value="Summer" {% if selected_season_filter == 'Summer' %}selected{% endif %}>Summer</option>
                <option value="Fall" {% if selected_season_filter == 'Fall' %}selected{% endif %}>Fall</option>
                <option value="Winter" {% if selected_season_filter == 'Winter' %}selected{% endif %}>Winter</option>
            </select>

            <label for="budget-filter">Budget:</label>
            <select id="budget-filter" name="selected_budget_filter">
                <option value="">All</option>
                <option value="Low" {% if selected_budget_filter == 'Low' %}selected{% endif %}>Low</option>
                <option value="Medium" {% if selected_budget_filter == 'Medium' %}selected{% endif %}>Medium</option>
                <option value="High" {% if selected_budget_filter == 'High' %}selected{% endif %}>High</option>
            </select>

            <button type="submit">Filter</button>
            <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>

        <div id="trending-destinations">
            <ul>
                {% for dest in trending_destinations %}
                <li>{{ dest.name }} (Rank: {{ dest.rank }})</li>
                {% else %}
                <li>No trending destinations found.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
