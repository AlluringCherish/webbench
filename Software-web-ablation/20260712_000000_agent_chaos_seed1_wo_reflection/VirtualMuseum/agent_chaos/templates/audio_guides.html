<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <h1>Audio Guides</h1>
        <form method="POST" action="{{ url_for('audio_guides') }}">
            <select id="filter-language" name="language_filter">
                <option value="" {% if language_filter == '' %}selected{% endif %}>All Languages</option>
                <option value="English" {% if language_filter == 'English' %}selected{% endif %}>English</option>
                <option value="Spanish" {% if language_filter == 'Spanish' %}selected{% endif %}>Spanish</option>
                <option value="French" {% if language_filter == 'French' %}selected{% endif %}>French</option>
            </select>
            <button type="submit" id="apply-language-filter">Apply Filter</button>
        </form>
        <table id="audio-guide-list" border="1">
            <thead>
                <tr>
                    <th>Guide ID</th>
                    <th>Exhibit Number</th>
                    <th>Title</th>
                    <th>Language</th>
                    <th>Duration (minutes)</th>
                    <th>Narrator</th>
                    <th>Created By</th>
                    <th>Play</th>
                </tr>
            </thead>
            <tbody>
                {% for guide in audio_guides %}
                <tr>
                    <td>{{ guide.guide_id }}</td>
                    <td>{{ guide.exhibit_number }}</td>
                    <td>{{ guide.title }}</td>
                    <td>{{ guide.language }}</td>
                    <td>{{ guide.duration }}</td>
                    <td>{{ guide.narrator }}</td>
                    <td>{{ guide.created_by }}</td>
                    <td><button id="play-guide-button-{{ guide.guide_id }}" type="button">Play</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
