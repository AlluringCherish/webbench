<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Song Catalog</h1>

        <form method="POST" action="{{ url_for('song_catalog') }}">
            <input type="text" id="search-input" name="search_query" value="{{ search_query or '' }}" placeholder="Search songs...">
            <select id="genre-filter" name="selected_genre">
                <option value="">All Genres</option>
                {% set genres = [] %}  {# We don't have genres list here, so no options except all #}
                {# If genres available, they should be looped here #}
            </select>
            <button type="submit">Search</button>
        </form>

        <div id="songs-grid">
            <ul>
                {% for song in songs %}
                <li>
                    <strong>{{ song.title }}</strong> by {{ song.artist_name }}<br>
                    Album: {{ song.album_name }}<br>
                    Genre: {{ song.genre }}<br>
                    Duration: {{ song.duration }} seconds<br>
                    <button id="add-to-playlist-button-{{ song.song_id }}">Add to Playlist</button>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
