<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
    <div id="artist-profile-page">
        <h1>Artist Profiles</h1>

        <h1 id="artist-name">{{ artist.name }}</h1>
        <div id="artist-genre">Genre: {{ artist.genre }}</div>
        <div id="artist-country">Country: {{ artist.country }}</div>
        <div id="artist-formation-year">Formed: {{ artist.formation_year }}</div>

        <div id="artist-songs-list">
            <ul>
                {% for song in songs %}
                <li>
                    {{ song.title }} (Album: {{ song.album_name }}) - {{ song.duration }} seconds
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
