<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Streaming Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Music Streaming Dashboard</h1>

        <section id="featured-songs">
            <h2>Featured Songs</h2>
            <ul>
                {% for song in featured_songs %}
                <li>
                    <img src="{{ song.cover_art_url }}" alt="Cover art for {{ song.title }}" style="width:50px;height:50px;vertical-align:middle;"> 
                    <strong>{{ song.title }}</strong> by {{ song.artist_name }} ({{ song.duration }} sec)
                </li>
                {% endfor %}
            </ul>
        </section>

        <section id="trending-artists">
            <h2>Trending Artists</h2>
            <ul>
                {% for artist in trending_artists %}
                <li>
                    <img src="{{ artist.photo_url }}" alt="Photo of {{ artist.name }}" style="width:50px;height:50px;vertical-align:middle;"> 
                    {{ artist.name }} ({{ artist.genre }})
                </li>
                {% endfor %}
            </ul>
        </section>

        <nav>
            <a href="{{ url_for('song_catalog') }}"><button id="browse-songs-button">Browse Songs</button></a>
            <a href="{{ url_for('playlists') }}"><button id="my-playlists-button">My Playlists</button></a>
            <a href="{{ url_for('artist_profiles') }}"><button id="trending-artists-button">Trending Artists</button></a>
        </nav>

    </div>
</body>
</html>
