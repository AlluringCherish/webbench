<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
    <div id="artists-page">
        <h1>Artist Profiles</h1>

        <form method="GET" action="{{ url_for('artist_profiles') }}">
            <input type="text" id="search-artists" name="search_query" value="{{ search_query or '' }}" placeholder="Search artists...">
            <select id="artists-sort" name="sort_option">
                <option value="" {% if not sort_option %}selected{% endif %}>Default</option>
                <option value="name" {% if sort_option == 'name' %}selected{% endif %}>Name</option>
                <option value="genre" {% if sort_option == 'genre' %}selected{% endif %}>Genre</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="artists-grid">
            <ul>
                {% for artist in artists %}
                <li>
                    <img src="{{ artist.photo_url }}" alt="Photo of {{ artist.name }}" style="width:50px;height:50px;vertical-align:middle;">
                    {{ artist.name }} ({{ artist.genre }})<br>
                    <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">
                        <button id="view-artist-button-{{ artist.artist_id }}">View</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
