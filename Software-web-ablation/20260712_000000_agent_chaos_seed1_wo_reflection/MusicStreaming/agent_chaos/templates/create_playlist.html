<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
    <div id="create-playlist-page">
        <h1>Create New Playlist</h1>

        <form method="POST" action="{{ url_for('create_playlist') }}">
            <label for="playlist-name-input">Playlist Name:</label><br>
            <input type="text" id="playlist-name-input" name="playlist_name" value="{{ playlist_name or '' }}"><br>

            <label for="playlist-description-input">Description:</label><br>
            <textarea id="playlist-description-input" name="playlist_description">{{ playlist_description or '' }}</textarea><br>

            <button type="submit" id="save-playlist-button">Save</button>
            <a href="{{ url_for('playlists') }}"><button type="button" id="cancel-create-button">Cancel</button></a>
        </form>

        {% if errors %}
            <ul style="color:red;">
            {% for error in errors %}
                <li>{{ error }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    </div>
</body>
</html>
