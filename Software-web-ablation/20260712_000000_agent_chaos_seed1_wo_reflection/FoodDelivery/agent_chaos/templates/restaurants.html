<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
    <script>
        // JavaScript to handle search and filter form submission
        function onFilterChange() {
            const searchInput = document.getElementById('search-input').value.trim();
            const cuisineFilter = document.getElementById('cuisine-filter').value;
            let url = new URL(window.location.href);
            url.searchParams.delete('search');
            url.searchParams.delete('cuisine');
            if (searchInput) {
                url.searchParams.append('search', searchInput);
            }
            if (cuisineFilter) {
                url.searchParams.append('cuisine', cuisineFilter);
            }
            window.location.href = url.toString();
        }
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('search-input').addEventListener('keydown', event => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    onFilterChange();
                }
            });
            document.getElementById('cuisine-filter').addEventListener('change', onFilterChange);
        });
    </script>
</head>
<body>
    <div id="main-container">
        <div id="restaurants-page">
            <h1>Browse Restaurants</h1>

            <input id="search-input" type="text" placeholder="Search restaurants..." value="{{ search_query }}">

            <select id="cuisine-filter" name="cuisine">
                <option value="">All Cuisines</option>
                {% for cuisine in cuisine_filter_options %}
                    <option value="{{ cuisine }}" {% if cuisine == selected_cuisine %}selected{% endif %}>{{ cuisine }}</option>
                {% endfor %}
            </select>

            <div id="restaurants-grid">
                {% for restaurant in restaurants %}
                    <div class="restaurant-card">
                        <h3>{{ restaurant.name }}</h3>
                        <p>Cuisine: {{ restaurant.cuisine }}</p>
                        <p>Rating: {{ restaurant.rating }}</p>
                        <p>Address: {{ restaurant.address }}</p>
                        <a href="{{ url_for('restaurant_menu_page', restaurant_id=restaurant.restaurant_id) }}">
                            <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                        </a>
                    </div>
                {% else %}
                    <p>No restaurants found.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
