<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="item-details-page">
            <h1 id="item-name">{{ item.item_name }}</h1>
            <div id="item-description">
                <p>{{ item.description }}</p>
            </div>
            <div id="item-price">
                <p>Price: ${{ '%.2f'|format(item.price) }}</p>
            </div>
            <form id="add-to-cart-form" method="POST" action="{{ url_for('update_cart') }}">
                <input type="hidden" name="item_id" value="{{ item.item_id }}">
                <input type="hidden" name="restaurant_id" value="{{ item.restaurant_id }}">
                <label for="quantity-input">Quantity:</label>
                <input id="quantity-input" name="quantity" type="number" min="1" value="1">
                <button id="add-to-cart-button" name="action" type="submit" value="add">Add to Cart</button>
            </form>
        </div>
    </div>
</body>
</html>
