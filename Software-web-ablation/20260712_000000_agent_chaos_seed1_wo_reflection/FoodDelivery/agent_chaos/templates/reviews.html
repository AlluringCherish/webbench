<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="reviews-page">
            <h1>Order Reviews</h1>

            <form id="filter-form" method="GET" action="{{ url_for('reviews_page') }}">
                <label for="filter-by-rating">Filter by Rating:</label>
                <select id="filter-by-rating" name="rating">
                    <option value="">All Ratings</option>
                    {% for rating in rating_filter_options %}
                        <option value="{{ rating }}" {% if rating == selected_rating %}selected{% endif %}>{{ rating }}</option>
                    {% endfor %}
                </select>
                <button type="submit" id="filter-button">Filter</button>
            </form>

            <div id="reviews-list">
                {% for review in reviews %}
                    <div class="review-card">
                        <p><strong>{{ review.customer_name }}</strong> rated {{ review.rating }}/5 for {{ review.restaurant_name }}</p>
                        <p>{{ review.review_text }}</p>
                        <p>Date: {{ review.review_date }}</p>
                    </div>
                {% else %}
                    <p>No reviews found.</p>
                {% endfor %}
            </div>

            <a href="{{ url_for('write_review_page') }}">
                <button id="write-review-button">Write a Review</button>
            </a>

            <a href="{{ url_for('dashboard_page') }}">
                <button id="back-to-dashboard">Back to Dashboard</button>
            </a>
        </div>
    </div>
</body>
</html>
