<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="main-container">
        <div id="write-review-page">
            <h1>Write Review</h1>
            {% if review_submission_status %}
                <p>{{ review_submission_status }}</p>
            {% endif %}
            <form method="POST" action="{{ url_for('write_review_page') }}">
                <label for="restaurant-options">Restaurant:</label>
                <select id="restaurant-options" name="restaurant_id" required>
                    {% for restaurant in restaurant_options %}
                        <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                    {% endfor %}
                </select>

                <label for="customer-name">Name:</label>
                <input id="customer-name" name="customer_name" type="text" required>

                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>

                <label for="review-text">Review:</label>
                <textarea id="review-text" name="review_text" required></textarea>

                <button id="submit-review-button" type="submit">Submit Review</button>
            </form>
        </div>
    </div>
</body>
</html>
