<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Article Catalog</h1>

        <input id="search-input" type="text" name="search" placeholder="Search articles..." />

        <select id="category-filter" name="category">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_name }}">{{ category.category_name }}</option>
            {% endfor %}
        </select>

        <div id="articles-grid">
            {% for article in articles %}
            <div class="article-card">
                <h3>{{ article.title }}</h3>
                <p>By {{ article.author }} on {{ article.date }}</p>
                {% if article.thumbnail %}
                <img src="{{ article.thumbnail }}" alt="Thumbnail for {{ article.title }}" />
                {% endif %}
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details_page', article_id=article.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
