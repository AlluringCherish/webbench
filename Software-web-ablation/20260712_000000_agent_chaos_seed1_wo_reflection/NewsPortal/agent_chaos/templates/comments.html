<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Comments</title>
</head>
<body>
    <div id="comments-page">
        <h1>Article Comments</h1>

        <select id="filter-by-article" name="article_filter" onchange="location.href='?selected_article_id=' + this.value">
            <option value="">All Articles</option>
            {% for article in articles %}
            <option value="{{ article.article_id }}" {% if selected_article_id == article.article_id %}selected{% endif %}>
                {{ article.title }}
            </option>
            {% endfor %}
        </select>

        <div id="comments-list">
            {% for comment in comments %}
            <div class="comment-item">
                <h3>{{ comment.article_title }}</h3>
                <p><strong>{{ comment.commenter_name }}</strong>: {{ comment.comment_text }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="write-comment-button" onclick="location.href='{{ url_for('write_comment_page') }}'">Write Comment</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
