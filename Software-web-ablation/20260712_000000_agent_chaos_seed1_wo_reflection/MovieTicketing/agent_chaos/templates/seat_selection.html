<!DOCTYPE html>
<html>
<head>
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>

        <div id="seat-map">
            {% for seat in seats %}
            <button id="seat-{{ seat.row }}{{ seat.column }}" class="seat-button {{ seat.status|lower }}" data-seat-id="{{ seat.seat_id }}" data-seat-type="{{ seat.seat_type }}">
                {{ seat.row }}{{ seat.column }}
            </button>
            {% endfor %}
        </div>

        <div id="selected-seats-display">
            <p>Selected Seats: <span id="selected-seats-list"></span></p>
        </div>

        <form method="post" action="{{ url_for('book_seats') }}">
            <input type="hidden" id="selected-seats-input" name="selected_seats" value="" />
            <button type="submit" id="proceed-booking-button">Proceed to Booking</button>
        </form>
    </div>
</body>
</html>
