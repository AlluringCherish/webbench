<!DOCTYPE html>
<html>
<head>
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>

        <select id="theater-location-filter" name="theater_location_filter" onchange="location.href=window.location.pathname + '?location_filter=' + this.value">
            <option value="">All Locations</option>
            {% for theater in theaters %}
            <option value="{{ theater.location }}">{{ theater.location }}</option>
            {% endfor %}
        </select>

        <div id="theaters-list">
            {% for theater in theaters %}
            <div class="theater-item">
                <h3>{{ theater.theater_name }}</h3>
                <p><strong>Location:</strong> {{ theater.location }}</p>
                <p><strong>City:</strong> {{ theater.city }}</p>
                <p><strong>Screens:</strong> {{ theater.screens }}</p>
                <div id="facilities-display">
                    <p><strong>Facilities:</strong> {{ theater.facilities }}</p>
                </div>
            </div>
            {% endfor %}

            {% if theaters|length == 0 %}
            <p>No theaters found.</p>
            {% endif %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

    </div>
</body>
</html>
