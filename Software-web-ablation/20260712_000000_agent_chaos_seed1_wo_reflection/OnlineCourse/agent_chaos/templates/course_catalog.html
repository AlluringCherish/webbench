<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Available Courses</h1>
        <input type="text" id="search-input" placeholder="Search courses...">
        <div id="course-grid">
            {% for course in courses %}
            <div class="course-card">
                <h2>{{ course.title }}</h2>
                <p>{{ course.description }}</p>
                <button id="view-course-button-{{ course.course_id }}" onclick="window.location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
