<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
</head>
<body>
<div id="playlist-details-page">
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>

    <table id="songs-in-playlist" border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Artist</th>
                <th>Duration (s)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for song in songs_in_playlist %}
            <tr>
                <td>{{ song.title }}</td>
                <td>{{ song.artist_name }}</td>
                <td>{{ song.duration }}</td>
                <td>
                    <form method="POST" action="">
                        <button id="remove-song-button-{{ song.song_id }}" type="submit" name="remove_song" value="{{ song.song_id }}">Remove</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <form method="POST" action="">
        <button id="delete-playlist-button" type="submit" name="delete_playlist">Delete Playlist</button>
    </form>
</div>
</body>
</html>
