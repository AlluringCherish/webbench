<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <h1>Albums</h1>

    <input id="search-albums" type="text" placeholder="Search albums...">
    <select id="sort-albums">
        <option value="">Sort by</option>
        <option value="title">Title</option>
        <option value="artist">Artist</option>
        <option value="year">Year</option>
    </select>

    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-card">
            <div><b>Title:</b> {{ album.title }}</div>
            <div><b>Artist:</b> {{ album.artist_name }}</div>
            <div><b>Year:</b> {{ album.year }}</div>
            <a href="{{ url_for('album_details_page', album_id=album.album_id) }}">
                <button id="view-album-button-{{ album.album_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
