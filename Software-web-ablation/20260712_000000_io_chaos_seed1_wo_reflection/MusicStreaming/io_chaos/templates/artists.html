<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
<div id="artists-page">
    <h1>Artist Profiles</h1>

    <input id="search-artists" type="text" placeholder="Search artists...">
    <select id="artists-sort">
        <option value="">Sort by</option>
        <option value="name">Name</option>
        <option value="genre">Genre</option>
    </select>

    <div id="artists-grid">
        {% for artist in artists %}
        <div class="artist-card">
            <div><b>Name:</b> {{ artist.name }}</div>
            <div><b>Genre:</b> {{ artist.genre }}</div>
            <a href="{{ url_for('artist_profile_page', artist_id=artist.artist_id) }}">
                <button id="view-artist-button-{{ artist.artist_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
