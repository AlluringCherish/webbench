<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Review</title>
</head>
<body>
    <div id="reviewsPage">
        <h1>My Review</h1>
        <div id="reviewsList">
            {% for review in reviews %}
            <div class="review">
                <strong>Dish Name:</strong> {{ review.dishName }}<br>
                <strong>Rating:</strong> {{ review.rating }}<br>
                <p>{{ review.reviewText }}</p>
                <small>Reviewed on: {{ review.reviewDate }}</small>
            </div>
            {% endfor %}
        </div>
        <button id="writeNewReviewBtn" onclick="window.location.href='{{ url_for('writeReview') }}'">Write New Review</button>
        <button id="backToDashboard" onclick="window.location.href='{{ url_for('dashBoard') }}'">Back To Dashboard</button>
    </div>
</body>
</html>
