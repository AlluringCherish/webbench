<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Make Reservation Form</title>
</head>
<body>
    <div id="reservationPage">
        <h1>Make Reservation Form</h1>
        <form method="GET" action="{{ url_for('makeReservation') }}">
            <label for="guestName">Guest Name:</label>
            <input id="guestName" class="guest_name" type="text" name="guest_name" required>
            <br>

            <label for="partySize">Party Size:</label>
            <select id="partySize" class="party_size" name="party_size">
                {% for size in range(1, 21) %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>
            <br>

            <label for="reservationDate">Reservation Date:</label>
            <input id="reservationDate" class="reservation_date" type="date" name="reservation_date" required>
            <br>

            <button id="submitReservationBtn" type="submit">Submit Reservation</button>
        </form>

        <button id="backToDashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back To Dashboard</button>
    </div>
</body>
</html>
