<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservation List</title>
</head>
<body>
    <div id="myReservationsPage">
        <h1>My Reservation List</h1>
        <table id="reservationsTable" border="1">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Party Size</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for reservation in reservations %}
                <tr>
                    <td>{{ reservation.date }}</td>
                    <td>{{ reservation.time }}</td>
                    <td>{{ reservation.partySize }}</td>
                    <td>{{ reservation.status }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('cancelReservation', reservationId=reservation.reservationId) }}">
                            <button id="cancelReservationBtn-{{ reservation.reservationId }}" type="submit">Cancel Reservation</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="backToDashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back To Dashboard</button>
    </div>
</body>
</html>
