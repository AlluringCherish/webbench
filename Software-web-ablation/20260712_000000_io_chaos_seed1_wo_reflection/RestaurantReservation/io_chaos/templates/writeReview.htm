<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write A Review</title>
</head>
<body>
    <div id="writeReviewPage">
        <h1>Write A Review</h1>
        <form method="GET" action="{{ url_for('writeReview') }}">
            <label for="selectDish">Select Dish:</label>
            <select id="selectDish" class="dish_id" name="dish_id">
                {% for dish in dishes %}
                <option value="{{ dish.dishId }}">{{ dish.name }}</option>
                {% endfor %}
            </select>
            <br>

            <label for="ratingInput">Rating:</label>
            <select id="ratingInput" class="rating" name="rating">
                {% for r in range(1, 6) %}
                <option value="{{ r }}">{{ r }}</option>
                {% endfor %}
            </select>
            <br>

            <label for="reviewText">Review:</label>
            <textarea id="reviewText" class="review_text" name="review_text"></textarea>
            <br>

            <button id="submitReviewBtn" type="submit">Submit Review</button>
        </form>
        <button id="backToReviews" onclick="window.location.href='{{ url_for('myReviews') }}'">Back To Reviews</button>
    </div>
</body>
</html>
