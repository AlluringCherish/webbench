<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wait List</title>
</head>
<body>
    <div id="waitListPage">
        <h1>Wait List</h1>
        <form method="GET" action="{{ url_for('waitlistPage') }}">
            <label for="waitListPartySize">Party Size:</label>
            <select id="waitListPartySize" class="party_size" name="partySize">
                {% for size in range(1, 21) %}
                <option value="{{ size }}">{{ size }}</option>
                {% endfor %}
            </select>
            <button id="joinWaitlistBtn" type="submit">Join Waitlist</button>
        </form>

        <div id="userPosition">
            {% if position %}
                Your current position in the waitlist is: {{ position }}
            {% else %}
                You are not currently on the waitlist.
            {% endif %}
        </div>

        <button id="backToDashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back To Dashboard</button>
    </div>
</body>
</html>
