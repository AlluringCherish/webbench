<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SavedLocationPage</title>
</head>
<body>
    <div id="saved_locations_container">
        <h1>SavedLocationPage</h1>
        <table id="locations_table_display" border="1">
            <thead>
                <tr>
                    <th>Location</th>
                    <th>Temperature</th>
                    <th>Condition</th>
                    <th>Default</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for loc in save_locations %}
                <tr>
                    <td>{{ loc.location }}</td>
                    <td>{{ loc.temp }}</td>
                    <td>{{ loc.condition | join(", ") }}</td>
                    <td>{{ loc.default }}</td>
                    <td>
                        <form method="post" action="">
                            <button type="submit" id="view_weather_button-{{ loc.location_id }}" name="view_weather" value="{{ loc.location_id }}">View Weather</button>
                            <button type="submit" id="remove_saved_location_button-{{ loc.location_id }}" name="remove_location" value="{{ loc.location_id }}">Remove</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{{ url_for('locationSearch') }}">
            <button id="add_location_button">Add New Location</button>
        </a>
    </div>
</body>
</html>
