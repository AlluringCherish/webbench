<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SettingsPage</title>
</head>
<body>
    <div id="settings_page_container">
        <h1>SettingsPage</h1>
        {% if data_error %}
            <p id="data_error_message" style="color:red;">{{ data_error }}</p>
        {% endif %}
        <form method="post" action="">
            <label for="temperature_units_select">Temperature Units:</label>
            <select id="temperature_units_select" name="temperature_unit">
                {% for unit in temperature_unit %}
                    <option value="{{ unit }}" {% if unit == temperature_unit_selected %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>

            <label for="default_location_select">Default Location:</label>
            <select id="default_location_select" name="default_location">
                {% for loc in save_locations %}
                    <option value="{{ loc.loc_id }}" {% if loc.loc_id == default_location %}selected{% endif %}>{{ loc.location_names }}</option>
                {% endfor %}
            </select>

            <label for="alert_notification_toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert_notification_toggle" name="alert_notifications_enabled" value="1" {% if alert_notification_enable %}checked{% endif %}>

            <button type="submit" id="save_settings_btn">Save Settings</button>
        </form>

        <a href="{{ url_for('dash_board') }}">
            <button id="dashboard_back_btn">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
