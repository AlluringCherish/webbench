<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WeatherDashBoard</title>
</head>
<body>
    <div id="dashboard_page">
        <h1>WeatherDashBoard</h1>
        {% if data_error %}
            <p id="data_error_message" style="color:red;">{{ data_error }}</p>
        {% endif %}
        <span id="current_weather_summary">
            Location: {{ current_weather_summary.location_name }}<br>
            Temperature: {{ current_weather_summary.temp }}<br>
            Condition: {{ current_weather_summary.condition | join(", ") }}
        </span>
        <br>
        <a href="{{ url_for('locationSearch') }}">
            <button id="location_search_button">Search Location</button>
        </a>
        <a href="{{ url_for('weeklyforecasts') }}">
            <button id="forecast_view_button">View Weekly Forecast</button>
        </a>
        <a href="#" onclick="alert('Alert feature not implemented yet.'); return false;">
            <button id="alerts_view_button" disabled>View Alerts</button>
        </a>
    </div>
</body>
</html>
