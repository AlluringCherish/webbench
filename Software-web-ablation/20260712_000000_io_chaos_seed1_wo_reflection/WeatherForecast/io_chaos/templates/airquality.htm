<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AirQualityIndex</title>
</head>
<body>
    <div id="air_quality_container">
        <h1>AirQualityIndex</h1>
        <label for="location_filter_aqi">Select Location:</label>
        <select id="location_filter_aqi" name="location_filter_aqi">
            {% for loc in locationList %}
                <option value="{{ loc.loc_id }}" {% if loc.loc_id == selected_loc_id %}selected{% endif %}>{{ loc.location_name }}</option>
            {% endfor %}
        </select>
        <div id="aqi_value_display">AQI Value: {{ airQualityInfo.index_aqi }}</div>
        <div id="aqi_description_display">Description: {{ airQualityInfo.aqidescription }}</div>
        <table id="pollution_details_table" border="1">
            <thead>
                <tr>
                    <th>Pollutant</th>
                    <th>Value</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>PM 2.5</td><td>{{ airQualityInfo.pm25 }}</td></tr>
                <tr><td>PM 10</td><td>{{ airQualityInfo.pm10 }}</td></tr>
                <tr><td>NO2</td><td>{{ airQualityInfo.no2 }}</td></tr>
                <tr><td>O3</td><td>{{ airQualityInfo.o3 }}</td></tr>
            </tbody>
        </table>
        <div id="health_recommendation_display">{{ airQualityInfo.healthRecommendation }}</div>
    </div>
</body>
</html>
