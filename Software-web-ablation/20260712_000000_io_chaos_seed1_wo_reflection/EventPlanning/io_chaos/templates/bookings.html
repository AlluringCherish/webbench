<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="bookings-page">
        <h1>{{ page_title }}</h1>
        <input type="text" id="booking-search-input" name="search" placeholder="Search bookings by event name or booking ID">
        <table id="bookings-table" border="1">
            <thead>
                <tr>
                    <th>Event</th>
                    <th>Date</th>
                    <th>Ticket Count</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr>
                    <td>{{ booking.event }}</td>
                    <td>{{ booking.date }}</td>
                    <td>{{ booking.ticket_count }}</td>
                    <td>{{ booking.status }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('cancel_booking', booking_id=booking.booking_id) }}" style="display:inline;">
                            <button id="cancel-booking-button-{{ booking.booking_id }}" type="submit">Cancel</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
