<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="events-page">
        <h1>{{ page_title }}</h1>
        <form method="POST" action="{{ url_for('events_search') }}" id="search-form">
            <input type="text" id="event-search-input" name="search_query" placeholder="Search events by name, location or date">
            <select id="event-category-filter" name="category_filter">
                <option value="">All Categories</option>
                <option value="Conference">Conference</option>
                <option value="Concert">Concert</option>
                <option value="Sports">Sports</option>
                <option value="Workshop">Workshop</option>
                <option value="Social">Social</option>
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="events-grid">
            {% for event in events %}
            <div class="event-card">
                <h2>{{ event.event_name }}</h2>
                <p>Category: {{ event.category }}</p>
                <p>Date: {{ event.date }}</p>
                <p>Time: {{ event.time }}</p>
                <p>Location: {{ event.location }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="window.location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
