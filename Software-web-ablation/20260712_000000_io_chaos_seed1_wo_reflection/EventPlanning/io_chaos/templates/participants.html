<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="participants-page">
        <h1>{{ page_title }}</h1>

        <input type="text" id="search-participant-input" name="search" placeholder="Search by name or email">
        <select id="participant-status-filter" name="status_filter">
            <option value="">All Statuses</option>
            <option value="Registered">Registered</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Attended">Attended</option>
        </select>
        <button id="add-participant-button">Add Participant</button>

        <table id="participants-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Event</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in participants %}
                <tr>
                    <td>{{ participant.name }}</td>
                    <td>{{ participant.email }}</td>
                    <td>{{ participant.event }}</td>
                    <td>{{ participant.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
