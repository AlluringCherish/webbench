<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page_title }}</title>
</head>
<body>
    <div id="venues-page">
        <h1>{{ page_title }}</h1>
        <input type="text" id="venue-search-input" name="search" placeholder="Search venues by name or location">
        <select id="venue-capacity-filter" name="capacity_filter">
            <option value="">All Capacities</option>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
        </select>
        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card">
                <h2>{{ venue.venue_name }}</h2>
                <p>Location: {{ venue.location }}</p>
                <p>Capacity: {{ venue.capacity }}</p>
                <p>Amenities: {{ venue.amenities }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}" onclick="window.location.href='#'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
