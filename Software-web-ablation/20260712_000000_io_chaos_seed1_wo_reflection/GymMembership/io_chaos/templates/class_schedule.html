<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Schedule</title>
</head>
<body>
    <div id="schedule-page">
        <h1>Class Schedule</h1>
        <input type="text" id="schedule-search" name="schedule-search" placeholder="Search classes by name or trainer">
        <label for="schedule-filter">Filter by Class Type:</label>
        <select id="schedule-filter" name="schedule-filter">
            {% for filter_type in filter_types %}
            <option value="{{ filter_type }}">{{ filter_type }}</option>
            {% endfor %}
        </select>

        <div id="classes-grid">
            {% for cls in classes %}
            <div class="class-card">
                <h2>{{ cls.class_name }}</h2>
                <p>Trainer ID: {{ cls.trainer_id }}</p>
                <p>Type: {{ cls.class_type }}</p>
                <p>Schedule: {{ cls.schedule_day }} at {{ cls.schedule_time }}</p>
                <p>Capacity: {{ cls.capacity }}</p>
                <p>Duration: {{ cls.duration }} minutes</p>
                <button id="enroll-class-button-{{ cls.class_id }}">Enroll</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
