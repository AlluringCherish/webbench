<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Review</title>
</head>
<body>
    <div id="reviewspage">
        <h1>Order Review</h1>

        <label for="filterbyrating">Filter by Rating:</label>
        <select id="filterbyrating" name="filterbyrating">
            <option value="all">All</option>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
        </select>

        <div id="reviewlist">
            {% for review in reviews %}
                <div class="review-item">
                    <p>Rating: {{ review.rating }}</p>
                    <p>{{ review.review_text }}</p>
                    <p>Date: {{ review.review_date }}</p>
                </div>
            {% endfor %}
        </div>

        <button id="write-review-btn">Write Review</button>
        <a href="{{ url_for('dashbord') }}">
            <button id="back-to-dashbord">Back to Dashbord</button>
        </a>
    </div>
</body>
</html>
