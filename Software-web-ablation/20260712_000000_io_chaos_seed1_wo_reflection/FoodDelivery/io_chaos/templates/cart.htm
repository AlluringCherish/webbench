<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <form method="POST" action="#">
            <table id="cart-item-table" border="1">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.item_name }}</td>
                        <td>
                            <input type="number" id="update-quantity-{{ item.item_id }}" name="quantity-{{ item.item_id }}" value="{{ item.quantity }}" min="1">
                        </td>
                        <td>{{ item.price }}</td>
                        <td>
                            <button id="remove-item-btn-{{ item.item_id }}" name="remove-item" value="{{ item.item_id }}" type="submit">Remove</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>
        <div id="totalamount">
            <p>Total Amount: {{ totalamount }}</p>
        </div>
        <a href="{{ url_for('checkout') }}">
            <button id="proceed-checkout-btn">Proceed to Checkout</button>
        </a>
    </div>
</body>
</html>
