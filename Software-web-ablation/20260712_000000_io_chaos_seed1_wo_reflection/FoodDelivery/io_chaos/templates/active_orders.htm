<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Order</title>
</head>
<body>
    <div id="active-orderspage">
        <h1>Active Order</h1>
        <label for="statusfilter">Filter by Status:</label>
        <select id="statusfilter" name="statusfilter">
            <option value="all">All</option>
            <option value="delivered">Delivered</option>
            <option value="on_the_way">On the Way</option>
            <option value="pending">Pending</option>
        </select>

        <div id="orderslist">
            {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Status: {{ order.status }}</p>
                    <a href="{{ url_for('order_tracking', orderid=order.order_id) }}">
                        <button id="track-order-btn-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashbord') }}">
            <button id="back-to-dashbord">Back to Dashbord</button>
        </a>
    </div>
</body>
</html>
