<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restuarants</title>
</head>
<body>
    <div id="restuarants-page">
        <h1>Browse Restuarants</h1>

        <div id="search-filter-bar">
            <input type="text" id="searchinput" name="search" placeholder="Search restaurants...">
            <select id="cuisinefilter" name="cuisine">
                <option value="">All Cuisines</option>
                {% for cuisine in popular_cuisine %}
                    <option value="{{ cuisine }}">{{ cuisine }}</option>
                {% endfor %}
            </select>
        </div>

        <div id="restaurants-grid">
            {% for restaurant in restaurants %}
                <div class="restaurant-card">
                    <h2>{{ restaurant.name }}</h2>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Address: {{ restaurant.address }}</p>
                    <p>Phone: {{ restaurant.phone }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                    <p>Delivery Time: {{ restaurant.delivery_time }} mins</p>
                    <a href="{{ url_for('restaurant_menu', restaurantid=restaurant.restaurant_id) }}">
                        <button id="view-restaurant-btn-{{ restaurant.restaurant_id }}">View Menu</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
