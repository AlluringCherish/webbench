<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashbord</title>
</head>
<body>
    <div id="dashbord-page">
        <h1>Food Delivery Dashbord</h1>
        <div id="feature-restaurants">
            {% for restaurant in featured_restaurants %}
                <div class="featured-restaurant">
                    <h2>{{ restaurant.name }}</h2>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                </div>
            {% endfor %}
        </div>

        <div id="quick-navigation-buttons">
            <a href="{{ url_for('restaurant_listing') }}">
                <button id="browse-restaurants-btn">Browse Restaurants</button>
            </a>
            <a href="{{ url_for('shopping_cart') }}">
                <button id="view-cart-btn">View Cart</button>
            </a>
            <a href="{{ url_for('active_orders') }}">
                <button id="active-orders-btn">Active Orders</button>
            </a>
        </div>
    </div>
</body>
</html>
