<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Board Job</title>
</head>
<body>
    <div id="dashboard">
        <h1>Dashboard Board Job</h1>

        <div id="featured-jobs-section">
            {% for job_id, job in featured_jobs.items() %}
                <div>
                    <h3>{{ job.title }}</h3>
                    <p>{{ job.company_name }} - {{ job.location }}</p>
                    <p>Salary: {{ job.salary_min }} - {{ job.salary_max }}</p>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('job_listings') }}">
            <button id="browse-jobs-btn">Browse Jobs</button>
        </a>

        <a href="{{ url_for('application_tracking') }}">
            <button id="my-applications-btn">My Applications</button>
        </a>

        <a href="{{ url_for('companies_directory') }}">
            <button id="companies-btn">Companies</button>
        </a>
    </div>
</body>
</html>
