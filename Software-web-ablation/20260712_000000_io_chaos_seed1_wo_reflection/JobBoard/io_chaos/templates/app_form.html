<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application Submit</title>
</head>
<body>
    <div id="app-form-page">
        <h1>Application Submit</h1>

        <form method="POST" enctype="multipart/form-data" action="{{ url_for('application_form', job_id=job.job_id) }}">
            <input id="applicant_name" name="applicant_name" type="text" placeholder="Full Name" required>
            <input id="applicant_email" name="applicant_email" type="email" placeholder="Email Address" required>
            <input id="resume_file" name="resume_file" type="file" required>
            <textarea id="cover_letter_txt" name="cover_letter" placeholder="Cover Letter" required></textarea>
            <button id="submit_btn" type="submit">Submit Application</button>
        </form>

    </div>
</body>
</html>
