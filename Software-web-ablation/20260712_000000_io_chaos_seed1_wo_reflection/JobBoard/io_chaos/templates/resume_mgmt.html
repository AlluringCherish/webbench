<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resumes</title>
</head>
<body>
    <div id="resume_page">
        <h1>Resumes</h1>

        <div id="resume_list">
            {% for resume in resumes %}
                <div class="resume-card">
                    <p>Name: {{ resume.applicant_name }}</p>
                    <p>Email: {{ resume.applicant_email }}</p>
                    <p>Filename: {{ resume.filename }}</p>
                    <p>Uploaded: {{ resume.upload_date }}</p>
                    <p>Summary: {{ resume.summary }}</p>
                    <a href="/delete_resume/{{ resume.resume_id }}">
                        <button id="delete_resume_btn-{{ resume.resume_id }}">Delete</button>
                    </a>
                </div>
            {% endfor %}
        </div>

        <input id="resume_file_input" name="resume_file_input" type="file" style="display:block;">

        <button id="upload_resume_btn" type="button" onclick="document.getElementById('resume_file_input').click();">Upload Resume</button>

        <a href="{{ url_for('dashboard') }}">
            <button id="back_btn">Back</button>
        </a>
    </div>
</body>
</html>
