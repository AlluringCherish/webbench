<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Directory Companies</title>
</head>
<body>
    <div id="comps_page">
        <h1>Directory Companies</h1>

        <input id="search_comp_field" type="text" placeholder="Search companies by name or industry">

        <div id="comps_list">
            {% for company in companies %}
                <div class="company-card">
                    <h3>{{ company.company_name }}</h3>
                    <p>Industry: {{ company.industry }}</p>
                    <p>Employees: {{ company.employee_count }}</p>
                    <a href="{{ url_for('company_profile', company_id=company.company_id) }}">
                        <button id="view_comp_btn-{{ company.company_id }}">View Profile</button>
                    </a>
                </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}">
            <button id="back_btn">Back</button>
        </a>
    </div>
</body>
</html>
