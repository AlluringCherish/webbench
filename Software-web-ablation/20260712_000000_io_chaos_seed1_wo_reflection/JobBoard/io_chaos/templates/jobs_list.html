<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Listings of Jobs</title>
</head>
<body>
    <div id="jobs-container">
        <h1>Listings of Jobs</h1>

        <input id="search-field" type="text" placeholder="Search by title, company, or location">

        <select id="category-select">
            <option value="">Select Category</option>
            {% for category in categories %}
                <option value="{{ category }}">{{ category }}</option>
            {% endfor %}
        </select>

        <select id="location-select">
            <option value="">Select Location</option>
            {% for loc in locations %}
                <option value="{{ loc }}">{{ loc }}</option>
            {% endfor %}
        </select>

        <div id="jobs-listing">
            {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <p>{{ job.company_name }} - {{ job.location }}</p>
                <p>Salary: {{ job.salary_min }} - {{ job.salary_max }}</p>
                <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                    <button id="view-job-btn-{{ job.job_id }}">View Job</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
