<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <div id="borrow-page">
        <div id="borrow-book-info">
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
            <p>Status: {{ book.status }}</p>
        </div>
        <div id="due-date-display">Due Date: {{ due_date }}</div>
        {% if message %}
        <div id="message" style="color: red;">{{ message }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('confirm_borrow', book_id=book.book_id) }}">
            <button id="confirm-borrow-button" type="submit">Confirm Borrow</button>
        </form>
        <form method="POST" action="{{ url_for('cancel_borrow', book_id=book.book_id) }}">
            <button id="cancel-borrow-button" type="submit">Cancel</button>
        </form>
    </div>
</body>
</html>
