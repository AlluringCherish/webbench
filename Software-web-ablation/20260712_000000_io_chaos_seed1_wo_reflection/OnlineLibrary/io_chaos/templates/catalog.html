<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <form method="GET" action="">
            <input type="text" id="search-input" name="search" value="{{ search_query|e }}" placeholder="Search books...">
            <button type="submit">Search</button>
        </form>
        <div id="book-grid">
            {% for book in books %}
            <div class="book-item">
                <h3>{{ book.title }}</h3>
                <p>{{ book.author }}</p>
                <p>Status: {{ book.status }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
