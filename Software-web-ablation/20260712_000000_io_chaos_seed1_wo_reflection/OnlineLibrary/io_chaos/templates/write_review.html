<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <div id="book-info-display">
            <h2>{{ book.title }}</h2>
            <p>Author: {{ book.author }}</p>
            <p>Status: {{ book.status }}</p>
        </div>
        {% if message %}
        <div id="message" style="color: red;">{{ message }}</div>
        {% endif %}
        <form method="POST" action="{{ url_for('submit_review', book_id=book.book_id) }}">
            <label for="rating-input">Rating:</label>
            <select id="rating-input" name="rating">
                {% for r in range(1,6) %}
                <option value="{{ r }}" {% if review and review.rating == r %}selected{% endif %}>{{ r }}</option>
                {% endfor %}
            </select>
            <br>
            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" rows="5" cols="40">{% if review %}{{ review.review_text }}{% endif %}</textarea>
            <br>
            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
        <button id="back-to-book" onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">Back to Book</button>
    </div>
</body>
</html>
