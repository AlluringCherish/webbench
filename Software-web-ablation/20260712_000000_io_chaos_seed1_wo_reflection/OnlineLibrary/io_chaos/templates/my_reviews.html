<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item" id="review-{{ review.review_id }}">
                <h3>{{ review.book_title }}</h3>
                <p>Rating: {{ review.rating }}</p>
                <p>{{ review.review_text }}</p>
                <small>{{ review.review_date }}</small>
                <button id="edit-review-button-{{ review.review_id }}" onclick="location.href='{{ url_for('edit_review_page', review_id=review.review_id) }}'">Edit</button>
                <form method="POST" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                    <button id="delete-review-button-{{ review.review_id }}" type="submit">Delete</button>
                </form>
            </div>
            {% else %}
            <p>No reviews found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
