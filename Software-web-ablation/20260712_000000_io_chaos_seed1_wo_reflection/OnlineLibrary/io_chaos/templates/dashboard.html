<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="welcome-message">Welcome, {{ username }}!</h1>
        <button id="browse-books-button" onclick="location.href='{{ url_for('book_catalog_page') }}'">Browse Books</button>
        <button id="my-borrows-button" onclick="location.href='{{ url_for('my_borrowings_page') }}'">My Borrowings</button>
        <h2>Featured Books</h2>
        <ul>
        {% for book in featured_books %}
            <li>{{ book.title }} by {{ book.author }} ({{ book.status }})</li>
        {% endfor %}
        </ul>
    </div>
</body>
</html>
