<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OnlineAuction Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>

        <section id="featured-auctions">
            <h2>Featured Auctions</h2>
            <div class="featured-items">
                {% for auction in featured_auctions %}
                <div class="featured-item">
                    <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                        <h3>{{ auction.title }}</h3>
                        <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
                    </a>
                </div>
                {% endfor %}
            </div>
        </section>

        <button id="browse-catalog-button" onclick="location.href='{{ url_for('catalog') }}'">Browse Catalog</button>
        <button id="view-bids-button" onclick="location.href='{{ url_for('bid_history') }}'">View Bids</button>
        <button id="view-trending-button" onclick="location.href='{{ url_for('trending') }}'">Trending Auctions</button>
    </div>
</body>
</html>
