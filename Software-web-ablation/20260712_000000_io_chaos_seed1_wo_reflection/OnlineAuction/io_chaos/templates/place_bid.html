<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Place Bid</title>
</head>
<body>
    <div id="place-bid-page">
        <h1>Place Bid</h1>

        <div id="auction-name">{{ auction.item_name }}</div>
        <div id="minimum-bid">Minimum Bid: ${{ '%.2f'|format(auction.minimum_bid) }}</div>

        <form method="POST" action="{{ url_for('submit_bid', auction_id=auction.auction_id) }}">

            <label for="bidder-name">Bidder Name:</label>
            <input type="text" id="bidder-name" name="bidder_name" value="{{ request.form.bidder_name if request.form.bidder_name else '' }}">
            {% if errors and errors.bidder_name %}
            <div class="error">{{ errors.bidder_name }}</div>
            {% endif %}

            <label for="bid-amount">Bid Amount:</label>
            <input type="number" step="0.01" id="bid-amount" name="bid_amount" value="{{ request.form.bid_amount if request.form.bid_amount else '' }}">
            {% if errors and errors.bid_amount %}
            <div class="error">{{ errors.bid_amount }}</div>
            {% endif %}

            <button type="submit" id="submit-bid-button">Submit Bid</button>
        </form>
    </div>
</body>
</html>
