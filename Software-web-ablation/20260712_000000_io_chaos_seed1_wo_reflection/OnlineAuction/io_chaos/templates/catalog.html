<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OnlineAuction Catalog</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div id="catalog-page">
        <h1>Catalog</h1>
        <input type="text" id="search-input" placeholder="Search auctions...">

        <select id="category-filter">
            <option value="all">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_id }}">{{ category.name }}</option>
            {% endfor %}
        </select>

        <div id="auction-grid">
            {% for auction in auctions %}
            <div class="auction-item">
                <h3>{{ auction.title }}</h3>
                <p>Starting Bid: ${{ '%.2f'|format(auction.starting_bid) }}</p>
                <p>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</p>
                <button id="view-auction-button-{{ auction.auction_id }}" onclick="location.href='{{ url_for('auction_details', auction_id=auction.auction_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </div>
</body>
</html>
