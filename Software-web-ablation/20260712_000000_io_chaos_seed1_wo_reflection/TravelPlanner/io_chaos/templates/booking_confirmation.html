<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="confirmation-number">Confirmation Number: {{ booking.confirmation_number }}</div>
        <div id="booking-details">
            <p>Booking ID: {{ booking.booking_id }}</p>
            <p>Trip ID: {{ booking.trip_id }}</p>
            <p>Booking Type: {{ booking.booking_type }}</p>
            <p>Booking Date: {{ booking.booking_date }}</p>
            <p>Amount: ${{ booking.amount }}</p>
            <p>Status: {{ booking.status }}</p>
        </div>
        <button id="download-itinerary-button" type="button">Download Itinerary</button>
        <button id="share-trip-button" type="button">Share Trip</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
