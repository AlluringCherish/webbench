<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>
        <form method="GET" action="{{ url_for('packages') }}">
            <label for="duration-filter">Filter by Duration:</label>
            <select id="duration-filter" name="duration_filter">
                <option value="">All</option>
                {% set durations = packages|map(attribute='duration_days')|unique|list|sort %}
                {% for duration in durations %}
                    <option value="{{ duration }}" {% if duration|string == duration_filter|string %}selected{% endif %}>{{ duration }} days</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-card">
                <h3>{{ pkg.package_name }}</h3>
                <p>Destination: {{ pkg.destination }}</p>
                <p>Duration: {{ pkg.duration_days }} days</p>
                <p>Price: ${{ pkg.price }}</p>
                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_details', package_id=pkg.package_id) }}'">View Details</button>
                <button id="book-package-button-{{ pkg.package_id }}" type="button">Book Package</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
