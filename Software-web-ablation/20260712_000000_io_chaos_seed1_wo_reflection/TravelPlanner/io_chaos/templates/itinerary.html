<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plan Your Itinerary</title>
</head>
<body>
    <div id="itinerary-page">
        <h1>Plan Your Itinerary</h1>
        <form method="POST" action="{{ url_for('itinerary') }}">
            <label for="itinerary-name-input">Itinerary Name:</label>
            <input type="text" id="itinerary-name-input" name="itinerary_name" required />
            <label for="start-date-input">Start Date:</label>
            <input type="date" id="start-date-input" name="start_date" required />
            <label for="end-date-input">End Date:</label>
            <input type="date" id="end-date-input" name="end_date" required />
            <button type="submit" id="add-activity-button">Add Activity</button>
        </form>
        <div id="itinerary-list">
            <h2>Your Itineraries</h2>
            <ul>
                {% for itinerary in itineraries %}
                <li>
                    <strong>{{ itinerary.itinerary_name }}</strong> - {{ itinerary.destination }} from {{ itinerary.start_date }} to {{ itinerary.end_date }}<br>
                    Activities: {{ itinerary.activities }}<br>
                    Status: {{ itinerary.status }}<br>
                    <button type="button" onclick="editItinerary({{ itinerary.itinerary_id }})" id="edit-itinerary-button-{{ itinerary.itinerary_id }}">Edit</button>
                    <button type="button" onclick="deleteItinerary({{ itinerary.itinerary_id }})" id="delete-itinerary-button-{{ itinerary.itinerary_id }}">Delete</button>
                </li>
                {% endfor %}
            </ul>
        </div>
        <script>
            function editItinerary(id) {
                // JavaScript to trigger edit action
                alert('Edit itinerary: ' + id);
            }
            function deleteItinerary(id) {
                // JavaScript to trigger delete action
                alert('Delete itinerary: ' + id);
            }
        </script>
    </div>
</body>
</html>
