<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cartPage">
        <h1>Shopping Cart</h1>
        <form method="GET" action="{{ url_for('shoppingCart') }}">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td><input type="text" id="update_quantity_{{ item.cartID }}" name="update-qty-{{ item.cartID }}" value="{{ item.quantity }}" /></td>
                        <td>${{ item.price }}</td>
                        <td>${{ item.subtotal }}</td>
                        <td>
                            <button type="submit" id="update_quantity_button_{{ item.cartID }}">Update Quantity</button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div>Total Amount: ${{ total_amount }}</div>
            <button type="button" id="proceed-checkout-button" onclick="window.location.href='{{ url_for('checkoutPage') }}'">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
