<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>
        <form method="POST" action="{{ url_for('checkoutPage') }}">
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td>{{ item.quantity }}</td>
                        <td>${{ item.price }}</td>
                        <td>${{ item.subtotal }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <div>Total Amount: ${{ total_amount }}</div>
            <label for="shipping-address">Shipping Address:</label><br>
            <textarea id="shipping-address" name="shipping_address" required></textarea><br><br>
            <label for="payment-method">Payment Method:</label>
            <select id="payment-method" name="payment_method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="PayPal" disabled>PayPal (Not Supported)</option>
                <option value="Bank Transfer" disabled>Bank Transfer (Not Supported)</option>
            </select><br><br>
            <button type="submit" id="place-order-button">Place Order</button>
        </form>
    </div>
</body>
</html>
