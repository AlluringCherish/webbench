<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviewsPage">
        <h1>Customer Reviews</h1>
        <div>
            <button id="write-review-button" onclick="window.location.href='{{ url_for('writeReview') }}'">Write a Review</button>
            <select id="filter-by-rating" name="rating" onchange="this.form.submit()">
                <option value="">All Ratings</option>
                <option value="5" {% if filter_rating == '5' %}selected{% endif %}>5 Stars</option>
            </select>
        </div>
        <div id="reviewsList">
            {% for review in reviews %}
            <div class="review">
                <strong>{{ review.customer_name }}</strong> - Rating: {{ review.rating }}<br />
                <p>{{ review.review_text }}</p>
                <small>{{ review.review_date }}</small>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
