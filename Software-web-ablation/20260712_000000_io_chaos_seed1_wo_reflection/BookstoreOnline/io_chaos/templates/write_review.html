<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
    <div id="writeReviewPage">
        <h1>Write a Review</h1>
        <form method="POST" action="/write_review">
            <label for="select-book">Book:</label>
            <select id="select-book" name="book_id" required>
                {% for book in purchased_books %}
                <option value="{{ book.bookID }}">{{ book.Title }}</option>
                {% endfor %}
            </select><br>

            <label for="rating-select">Rating:</label>
            <select id="rating-select" name="rating" required>
                {% for i in range(1,6) %}
                <option value="{{ i }}">{{ i }} Star{% if i > 1 %}s{% endif %}</option>
                {% endfor %}
            </select><br>

            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" required></textarea><br>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
    </div>
</body>
</html>
