<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalogPage">
        <h1>Book Catalog</h1>
        <form method="GET" action="{{ url_for('bookcatalog') }}">
            <input type="text" id="search-input" name="search" value="{{ search_query }}" placeholder="Search by title or ISBN" />
            <select id="category_filter" name="category" disabled>
                <option value="">Select Category</option>
                {% for category in categories %}
                <option value="{{ category.categoryID }}" {% if category.categoryID == selected_category %}selected{% endif %}>{{ category.category_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="booksList">
            {% for book in books %}
            <div class="book-card">
                <h3>{{ book.title }}</h3>
                <p>Author: {{ book.author }}</p>
                <p>ISBN: {{ book.isbn }}</p>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('bookDetails', bookId=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
