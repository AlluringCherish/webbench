<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>
</head>
<body>
    <div id="bookDetailsPage">
        <h1 id="bookTitle">{{ book.title }}</h1>
        <div id="bookAuthor">Author: {{ book.author }}</div>
        <div id="bookCost">Price: ${{ book.price }}</div>
        <div id="bookISBN">ISBN: {{ book.isbn }}</div>
        <div id="bookCategory">Category: {{ book.category }}</div>
        <form method="GET" action="{{ url_for('bookcatalog') }}">
            <input type="hidden" name="book_id" value="{{ book.book_id }}" />
            <input type="hidden" name="quantity" value="5" />
            <button type="submit" id="add-to-cart-button">Add to Cart</button>
        </form>
        <h2>Reviews</h2>
        <div id="reviews">
            {% for review_id, review in reviews.items() %}
                <div class="review" id="review-{{ review.review_id }}">
                    <strong>{{ review.customer_name }}</strong> - Rating: {{ review.rating }}<br>
                    <p>{{ review.review_text }}</p>
                    <small>{{ review.review_date }}</small>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
