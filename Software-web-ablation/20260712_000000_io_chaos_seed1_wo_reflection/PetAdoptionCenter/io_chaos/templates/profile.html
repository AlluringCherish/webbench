<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>

        <div id="profile-username">Username: {{ profile.username }}</div>

        <form method="POST" action="{{ url_for('update_user_profile') }}">
            <label for="profile-email">Email:</label>
            <input type="email" id="profile-email" name="email" value="{{ profile.email }}">
            {% if form_errors and form_errors.get('email') %}<div class="error">{{ form_errors['email'] }}</div>{% endif %}

            <button id="update-profile-button" type="submit">Update Profile</button>
            <button type="button" id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
