<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Comments</title>
</head>
<body>
    <div id="comments-page">
        <h1>Article Comments</h1>
        <form method="post" action="{{ url_for('filter_comments') }}">
            <label for="filter-by-article">Filter by Article:</label>
            <select id="filter-by-article" name="filter_article_id">
                <option value="">All Articles</option>
                {% for article in articles %}
                <option value="{{ article.article_id }}" {% if article.article_id == filter_article_id %}selected{% endif %}>{{ article.title }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="comments-list">
            {% for comment in comments %}
            <div class="comment-item">
                <h3>{{ comment.article_title }}</h3>
                <p><strong>{{ comment.commenter_name }}</strong>: {{ comment.comment_text }}</p>
                <p>Date: {{ comment.comment_date }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="write-comment-button" onclick="window.location.href='{{ url_for('write_comment_get') }}'">Write Comment</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
