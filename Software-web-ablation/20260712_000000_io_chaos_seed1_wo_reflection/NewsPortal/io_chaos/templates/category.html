<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>
        <div id="category-articles">
            {% for article in articles %}
            <div class="category-article">
                <h3>{{ article.title }}</h3>
                <p>Author: {{ article.author }}</p>
                <p>Date: {{ article.date }}</p>
                <p>Views: {{ article.views }}</p>
            </div>
            {% endfor %}
        </div>
        <form method="post" action="{{ url_for('sort_category_articles', category_name=category_name) }}">
            <button id="sort-by-date" name="sort_by" type="submit" value="date">Sort by Date</button>
            <button id="sort-by-popularity" name="sort_by" type="submit" value="popularity">Sort by Popularity</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
