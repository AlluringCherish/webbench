<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">Search Query: {{ search_query }}</div>
        <div id="results-list">
            {% if results|length == 0 %}
            <div id="no-results-message">No results found.</div>
            {% else %}
                {% for result in results %}
                <div class="search-result">
                    <h3>{{ result.title }}</h3>
                    <p>{{ result.excerpt }}</p>
                </div>
                {% endfor %}
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
