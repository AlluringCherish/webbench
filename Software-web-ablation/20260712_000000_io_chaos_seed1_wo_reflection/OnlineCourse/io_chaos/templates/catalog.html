<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Available Courses</h1>

        <input type="text" id="search-input" placeholder="Search courses..." />

        <div id="course-grid">
            {% for course in courses %}
            <div class="course-item">
                <h3>{{ course.title }}</h3>
                <p>Category: {{ course.category }}</p>
                <p>Level: {{ course.level }}</p>
                <p>Duration: {{ course.duration }}</p>
                <p>Status: {{ course.status }}</p>
                <button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Course</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
