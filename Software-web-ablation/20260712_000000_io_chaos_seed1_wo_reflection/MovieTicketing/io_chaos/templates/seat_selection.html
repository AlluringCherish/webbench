<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>
        <div id="seat-map">
            {% for seat in seat_map %}
            <button id="seat-{{ seat.seat_id }}" class="seat-button {{ seat.status|lower }}">{{ seat.seat_id }}</button>
            {% endfor %}
        </div>
        <div id="selected-seats-display">
            Selected Seats: {% for seat in selected_seats %}{{ seat }} {% endfor %}
        </div>
        <button id="proceed-booking-button">Proceed to Booking</button>
    </div>
</body>
</html>
