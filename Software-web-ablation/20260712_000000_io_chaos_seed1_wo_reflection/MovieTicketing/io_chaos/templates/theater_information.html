<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Theater Information</title>
</head>
<body>
    <div id="theater-page">
        <h1>Theater Information</h1>
        <select id="theater-location-filter" name="location">
            <option value="">All Locations</option>
            {% for location in locations %}
            <option value="{{ location }}">{{ location }}</option>
            {% endfor %}
        </select>
        <div id="theaters-list">
            {% for theater in theaters %}
            <div class="theater-item">
                <div>Name: {{ theater.name }}</div>
                <div>Location: {{ theater.location }}</div>
                <div>Screens: {{ theater.screens }}</div>
                <div>Facilities:</div>
                <div id="facilities-display">{{ theater.facilities }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
