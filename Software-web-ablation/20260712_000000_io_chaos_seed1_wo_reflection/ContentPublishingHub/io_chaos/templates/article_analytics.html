<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Article Analytics</h1>
        <div id="analytics-overview">
            <ul>
                {% for metric, value in analytics_overview.items() %}
                <li><strong>{{ metric }}:</strong> {{ value }}</li>
                {% endfor %}
            </ul>
        </div>
        <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
