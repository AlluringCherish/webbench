<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        <form method="POST" action="{{ url_for('edit_article', article_id=article_id) }}" id="edit-article-form">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ article_title }}" readonly><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="10" cols="80" required>{{ article_content }}</textarea><br><br>

            <button type="submit" id="submit-edit">Submit Changes</button>
        </form>
        <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
