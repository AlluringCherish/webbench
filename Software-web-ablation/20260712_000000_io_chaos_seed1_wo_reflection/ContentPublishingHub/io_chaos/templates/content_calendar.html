<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>
        <div id="calendar-view-options">
            <form method="GET" action="{{ url_for('content_calendar') }}">
                <label for="calendar-view">View:</label>
                <select id="calendar-view" name="calendar_view" onchange="this.form.submit()">
                    <option value="month" {% if calendar_view == 'month' %}selected{% endif %}>Month</option>
                    <option value="week" {% if calendar_view == 'week' %}selected{% endif %}>Week</option>
                    <option value="day" {% if calendar_view == 'day' %}selected{% endif %}>Day</option>
                </select>
            </form>
        </div>
        <div id="scheduled-articles">
            <h2>Scheduled Articles</h2>
            <ul>
                {% for article in scheduled_articles %}
                <li>{{ article.title }} - Scheduled on: {{ article.scheduled_date }}</li>
                {% endfor %}
            </ul>
        </div>
        <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
