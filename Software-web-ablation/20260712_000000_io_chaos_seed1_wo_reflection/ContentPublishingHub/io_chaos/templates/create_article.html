<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create Article</h1>
        <form method="POST" action="{{ url_for('create_article') }}" id="create-article-form">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="10" cols="80" required></textarea><br><br>

            <button type="submit" id="submit-article">Submit</button>
        </form>
        <button onclick="location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
    </div>
</body>
</html>
