<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Agents</title>
</head>
<body>
    <div id="agents-page">
        <h1>Real Estate Agents</h1>

        <input type="text" id="agent-search" name="agent-search" placeholder="Search agents..." />

        <ul id="agents-list">
            {% for agent in agents %}
            <li>
                <strong>{{ agent.agent_name }}</strong> - {{ agent.specialization }}<br />
                Email: {{ agent.email }}<br />
                Phone: {{ agent.phone }}<br />
                Properties Sold: {{ agent.properties_sold }}<br />
                <button id="contact-agent-button-{{ agent.agent_id }}" onclick="location.href='mailto:{{ agent.email }}'">Contact</button>
            </li>
            {% endfor %}
        </ul>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
