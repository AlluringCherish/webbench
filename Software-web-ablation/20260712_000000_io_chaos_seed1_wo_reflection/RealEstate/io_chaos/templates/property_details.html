<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Property Details</title>
</head>
<body>
    <div id="property-details-page">
        <h1>Property Details</h1>

        <p id="property-address"><strong>Address:</strong> {{ property.address }}</p>
        <p id="property-price"><strong>Price:</strong> ${{ property.price }}</p>
        <p id="property-description"><strong>Description:</strong> {{ property.description }}</p>

        <div id="property-features">
            <p><strong>Bedrooms:</strong> {{ property.bedrooms }}</p>
            <p><strong>Bathrooms:</strong> {{ property.bathrooms }}</p>
            <p><strong>Square Feet:</strong> {{ property.square_feet }}</p>
            <p><strong>Status:</strong> {{ property.status }}</p>
        </div>

        <form method="POST" action="{{ url_for('add_to_favorites', property_id=property.property_id) }}">
            <button type="submit" id="add-to-favorites-button">Add to Favorites</button>
        </form>

        <a href="{{ url_for('property_inquiry_form', property_id=property.property_id) }}">
            <button id="submit-inquiry-button">Submit Inquiry</button>
        </a>
    </div>
</body>
</html>
