<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="main-container">
        <h1>Special Requests</h1>
        <div id="requests-page">
            <form method="POST" action="">
                <label for="select-reservation">Select Reservation:</label>
                <select id="select-reservation" name="reservation_id">
                    {% for reservation in reservations %}
                    <option value="{{ reservation.reservation_id }}">Reservation {{ reservation.reservation_id }} - Status: {{ reservation.status }}</option>
                    {% endfor %}
                </select>

                <label><input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance"> Driver Assistance Request</label><br>
                <label><input type="checkbox" id="gps-option-checkbox" name="gps_option"> GPS Option</label><br>

                <label for="child-seat-quantity">Number of Child Seats:</label>
                <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="0" />

                <label for="special-notes">Special Notes and Requests:</label><br>
                <textarea id="special-notes" name="special_notes" rows="4" cols="50"></textarea><br>

                <button id="submit-requests-button" type="submit">Submit Special Requests</button>
            </form>
            <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
            {% if submitted_request_status %}
            <p>{{ submitted_request_status }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
