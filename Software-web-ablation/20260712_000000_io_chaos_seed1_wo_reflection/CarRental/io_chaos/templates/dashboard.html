<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
    <div id="main-container">
        <h1>Car Rental Dashboard</h1>
        <div id="dashboard-page">
            <div id="featured-vehicles">
                {% for vehicle in featured_vehicles %}
                <div>
                    <p>{{ vehicle.make }} {{ vehicle.model }} - ${{ vehicle.daily_rate }} per day</p>
                </div>
                {% endfor %}
            </div>
            <button id="search-vehicles-button" onclick="location.href='{{ url_for('vehicle_search') }}'">Search Vehicles</button>
            <button id="my-reservations-button" onclick="location.href='{{ url_for('reservations_management') }}'">My Reservations</button>
            <div id="promotions-section">
                <h2>Current Promotions</h2>
                <ul>
                    {% for promo in current_promotions %}
                    <li>{{ promo }}</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
