<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Your Rental</title>
</head>
<body>
    <div id="main-container">
        <h1>Book Your Rental</h1>
        <div id="booking-page">
            <form method="POST" action="">
                <label for="pickup-location">Pickup Location:</label>
                <select id="pickup-location" name="pickup_location">
                    {% for location in pickup_locations %}
                    <option value="{{ location.location_id }}" {% if booking_data and booking_data.pickup_location_id == location.location_id %}selected{% endif %}>
                        {{ location.city }} - {{ location.address }}
                    </option>
                    {% endfor %}
                </select>

                <label for="dropoff-location">Dropoff Location:</label>
                <select id="dropoff-location" name="dropoff_location">
                    {% for location in dropoff_locations %}
                    <option value="{{ location.location_id }}" {% if booking_data and booking_data.dropoff_location_id == location.location_id %}selected{% endif %}>
                        {{ location.city }} - {{ location.address }}
                    </option>
                    {% endfor %}
                </select>

                <label for="pickup-date">Pickup Date:</label>
                <input id="pickup-date" name="pickup_date" type="date" value="{% if booking_data %}{{ booking_data.pickup_date }}{% endif %}" />

                <label for="dropoff-date">Dropoff Date:</label>
                <input id="dropoff-date" name="dropoff_date" type="date" value="{% if booking_data %}{{ booking_data.dropoff_date }}{% endif %}" />

                <button id="calculate-price-button" type="submit" name="calculate_price">Calculate Price</button>
            </form>

            <div id="total-price">
                {% if calculated_price is not none %}
                <p>Total Price: ${{ '%.2f'|format(calculated_price) }}</p>
                {% else %}
                <p>Total Price: N/A</p>
                {% endif %}
            </div>

            {% if calculated_price is not none and booking_data %}
            <form method="POST" action="">
                <button id="proceed-to-insurance-button" name="proceed_to_insurance" formaction="{{ url_for('insurance_options', reservation_id=booking_data.get('reservation_id', 0)) }}" type="submit">Proceed to Insurance</button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
