<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="main-container">
        <h1>Pickup and Dropoff Locations</h1>
        <div id="locations-page">
            <label for="hours-filter">Filter by Operating Hours:</label>
            <select id="hours-filter" name="hours-filter">
                <option value="">-- Select Hours Filter --</option>
                {% for hours_option in hours_filter_options %}
                <option value="{{ hours_option }}">{{ hours_option }}</option>
                {% endfor %}
            </select>

            <label for="search-location-input">Search Locations:</label>
            <input id="search-location-input" name="search-location-input" type="text" placeholder="Enter city or address" />

            <div id="locations-list">
                {% for location in locations %}
                <div>
                    <p>{{ location.city }} - {{ location.address }} (Phone: {{ location.phone }})</p>
                    <button id="location-detail-button-{{ location.location_id }}">View Details</button>
                </div>
                {% endfor %}
            </div>

            <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
