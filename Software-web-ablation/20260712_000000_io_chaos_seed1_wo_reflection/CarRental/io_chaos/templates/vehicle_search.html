<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="main-container">
        <h1>Search Vehicles</h1>
        <div id="search-page">
            <label for="location-filter">Pickup Location:</label>
            <select id="location-filter" name="location-filter">
                <option value="">-- Select Location --</option>
                {% for location in locations %}
                <option value="{{ location.location_id }}">{{ location.city }} - {{ location.address }}</option>
                {% endfor %}
            </select>

            <label for="vehicle-type-filter">Vehicle Type:</label>
            <select id="vehicle-type-filter" name="vehicle-type-filter">
                <option value="">-- Select Vehicle Type --</option>
                {% for vtype in vehicle_types %}
                <option value="{{ vtype }}">{{ vtype }}</option>
                {% endfor %}
            </select>

            <label for="date-range-input">Rental Date Range:</label>
            <input id="date-range-input" name="date-range-input" type="text" placeholder="YYYY-MM-DD to YYYY-MM-DD" />

            <div id="vehicles-grid">
                {% for vehicle in vehicles %}
                <div>
                    <p>{{ vehicle.make }} {{ vehicle.model }} - {{ vehicle.vehicle_type }} - ${{ vehicle.daily_rate }}</p>
                    <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="location.href='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
