<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="main-container">
        <h1>My Reservations</h1>
        <div id="reservations-page">
            <div id="reservations-list">
                {% for reservation in reservations %}
                <div>
                    <p>Reservation ID: {{ reservation.reservation_id }} - Status: {{ reservation.status }}</p>
                    <button id="modify-reservation-button-{{ reservation.reservation_id }}">Modify Reservation</button>
                    <button id="cancel-reservation-button-{{ reservation.reservation_id }}">Cancel Reservation</button>
                </div>
                {% endfor %}
            </div>
            <button id="sort-by-date-button">Sort by Date</button>
            <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
    </div>
</body>
</html>
