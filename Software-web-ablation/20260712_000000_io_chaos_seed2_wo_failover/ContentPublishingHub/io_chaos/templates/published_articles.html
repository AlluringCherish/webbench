<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles - ContentPublishingHub</title>
</head>
<body>
    <div id="published-articles-page">
        <h1>Published Articles</h1>
        <table id="published-articles-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Published Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                <tr>
                    <td>{{ article.title }}</td>
                    <td>{{ article.author }}</td>
                    <td>{{ article.published_date }}</td>
                    <td>
                        <a href="{{ url_for('article_analytics', article_id=article.article_id) }}" id="analytics-{{ article.article_id }}">Analytics</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
