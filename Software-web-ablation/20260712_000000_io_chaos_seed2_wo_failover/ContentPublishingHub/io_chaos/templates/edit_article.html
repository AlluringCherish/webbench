<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - ContentPublishingHub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        <form id="edit-article-form" method="POST" action="{{ url_for('edit_article', article_id=article.article_id) }}">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="15" cols="80" required>{{ article.content }}</textarea><br><br>

            <button type="submit" id="submit-article">Update</button>
        </form>
        <br>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
