<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Article - ContentPublishingHub</title>
</head>
<body>
    <div id="create-article-page">
        <h1>Create Article</h1>
        <form id="create-article-form" method="POST" action="{{ url_for('create_article') }}">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" required><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="15" cols="80" required></textarea><br><br>

            <button type="submit" id="submit-article">Submit</button>
        </form>
        <br>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
