<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - ContentPublishingHub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>
        <table id="content-calendar-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Scheduled Publication Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for item in scheduled_items %}
                <tr>
                    <td>{{ item.title }}</td>
                    <td>{{ item.scheduled_date }}</td>
                    <td>{{ item.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <br>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
