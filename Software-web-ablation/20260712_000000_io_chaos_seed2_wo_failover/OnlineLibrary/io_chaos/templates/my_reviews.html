<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <div id="reviews-list">
            {% for review in reviews %}
            <div>
                <p><strong>{{ review.book_title }}</strong></p>
                <p>Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
                <p><em>{{ review.review_date }}</em></p>
                <button id="edit-review-button-{{ review.review_id }}" onclick="window.location.href='{{ url_for('write_review_page', book_id=review.book_id) }}'">Edit</button>
                <form method="POST" action="{{ url_for('delete_review', review_id=review.review_id) }}" style="display:inline;">
                    <button type="submit" id="delete-review-button-{{ review.review_id }}">Delete</button>
                </form>
            </div>
            {% else %}
            <p>No reviews found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
