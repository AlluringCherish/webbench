<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
</head>
<body>
    <div id="payment-page">
        <div id="fine-amount-display">
            Fine Amount: {{ fine.amount }}
        </div>
        <div>Status: {{ fine.status }}</div>
        <form method="POST" action="{{ url_for('confirm_payment', fine_id=fine.fine_id) }}">
            <button type="submit" id="confirm-payment-button">Confirm Payment</button>
        </form>
        <button id="back-to-profile" onclick="window.location.href='{{ url_for('user_profile_page') }}'">Back to Profile</button>
    </div>
</body>
</html>
