<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
<div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">Artist: {{ album.artist_name }}</div>
    <div id="album-year">Year: {{ album.release_year }}</div>

    <div id="album-songs-list">
        <ul>
            {% for song in songs %}
            <li>{{ song.title }} ({{ song.duration }} seconds)</li>
            {% endfor %}
        </ul>
    </div>

    <form method="POST" action="{{ url_for('add_album_to_playlist', album_id=album.album_id) }}">
        <label for="target-playlist-select">Add Album to Playlist:</label>
        <select id="target-playlist-select" name="target_playlist_id">
            <!-- Options should be populated dynamically by backend or client-side script -->
        </select>
        <button type="submit" id="add-album-to-playlist-button">Add to Playlist</button>
    </form>
</div>
</body>
</html>
