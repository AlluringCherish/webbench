<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Streaming Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1 id="dashboard-header">Music Streaming Dashboard</h1>

    <div id="featured-songs">
        <h2>Featured Songs</h2>
        <ul>
            {% for song in featured_songs %}
            <li>{{ song.title }} by {{ song.artist_name }} ({{ song.duration }} seconds)</li>
            {% endfor %}
        </ul>
    </div>

    <a href="{{ url_for('song_catalog_page') }}"><button id="browse-songs-button">Browse Songs</button></a>
    <a href="{{ url_for('playlists_page') }}"><button id="my-playlists-button">My Playlists</button></a>
    <a href="{{ url_for('artists_page') }}"><button id="trending-artists-button">Trending Artists</button></a>

</div>
</body>
</html>
