<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
<div id="create-playlist-page">
    <form method="POST" action="{{ url_for('create_playlist_submit') }}">
        <label for="playlist-name-input">Playlist Name:</label><br>
        <input type="text" id="playlist-name-input" name="playlist_name" required><br>

        <label for="playlist-description-input">Description:</label><br>
        <textarea id="playlist-description-input" name="playlist_description" rows="4" cols="50"></textarea><br>

        <button type="submit" id="save-playlist-button">Save Playlist</button>
        <a href="{{ url_for('playlists_page') }}"><button type="button" id="cancel-create-button">Cancel</button></a>
    </form>
</div>
</body>
</html>
