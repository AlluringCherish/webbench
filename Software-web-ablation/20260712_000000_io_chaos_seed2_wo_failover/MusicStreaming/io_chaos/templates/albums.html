<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
<div id="albums-page">
    <form method="GET" action="{{ url_for('albums_page') }}">
        <input type="text" id="search-albums" name="search" value="{{ search_query }}" placeholder="Search albums...">
        <select id="sort-albums" name="sort">
            <option value="">Sort By</option>
            <option value="title" {% if sort_by == 'title' %}selected{% endif %}>Title</option>
            <option value="year" {% if sort_by == 'year' %}selected{% endif %}>Year</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <div id="albums-grid">
        {% for album in albums %}
        <div class="album-item">
            <div>{{ album.title }} by {{ album.artist_name }} ({{ album.year }})</div>
            <a href="{{ url_for('album_details_page', album_id=album.album_id) }}">
                <button id="view-album-button-{{ album.album_id }}">View</button>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
