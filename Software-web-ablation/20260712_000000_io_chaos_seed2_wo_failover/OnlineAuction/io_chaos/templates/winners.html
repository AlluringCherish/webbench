<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>

        <input type="text" id="filter-by-winner" placeholder="Filter by winner name">

        <div id="winners-list">
            {% for winner in winners %}
            <div id="winner-card-{{ winner.auction_id }}" class="winner-card">
                <div>Item: {{ winner.item_name }}</div>
                <div>Winner: {{ winner.winner_name }}</div>
                <div>Winning Bid: ${{ '%.2f'|format(winner.winning_bid) }}</div>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
