<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>

        <select id="time-range-filter">
            {% set time_periods = trending_auctions | map(attribute='time_period') | unique | list %}
            {% for period in time_periods %}
            <option value="{{ period }}">{{ period }}</option>
            {% endfor %}
        </select>

        <div id="trending-list">
            {% for auction in trending_auctions %}
            <div class="trending-auction-card">
                <div>Rank: {{ auction.trending_rank }}</div>
                <div>Item: {{ auction.item_name }}</div>
                <div>Bids: {{ auction.bid_count }}</div>
                <div>Current Bid: ${{ '%.2f'|format(auction.current_bid) }}</div>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>

        <a href="{{ url_for('dashboard') }}"><button id="back-to-dashboard">Back to Dashboard</button></a>
    </div>
</body>
</html>
