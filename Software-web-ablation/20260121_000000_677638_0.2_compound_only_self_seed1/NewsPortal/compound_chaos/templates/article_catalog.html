<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Article Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <input id="search-input" type="text" name="search" value="{{ search_query if search_query else '' }}" placeholder="Search articles by title, author, or keywords" />
        <select id="category-filter" name="category">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_name }}" {% if category.category_name == selected_category %}selected{% endif %}>{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <div id="articles-grid">
            {% for article in articles %}
            <div>
                <h2>{{ article.title }}</h2>
                <p>By {{ article.author }} on {{ article.date }}</p>
                {% if article.thumbnail_url %}
                <img src="{{ article.thumbnail_url }}" alt="Thumbnail for {{ article.title }}" />
                {% endif %}
                <button id="view-article-button-{{ article.article_id }}" onclick="location.href='{{ url_for('article_details', article_id=article.article_id) }}'">View Article</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
