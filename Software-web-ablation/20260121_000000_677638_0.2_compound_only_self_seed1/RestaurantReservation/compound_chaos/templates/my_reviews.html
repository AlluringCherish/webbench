<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Reviews</title>
</head>
<body>
<div id="reviews-list">
 {% for review in reviews %}
    <div class="review">
        <p>Dish: {{ dish_names[review.dish_id] if review.dish_id in dish_names else 'Unknown' }}</p>
        <p>Rating: {{ review.rating }}/5</p>
        <p>{{ review.review_text }}</p>
        <p>{{ review.review_date }}</p>
    </div>
 {% endfor %}
 <button onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
 <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
