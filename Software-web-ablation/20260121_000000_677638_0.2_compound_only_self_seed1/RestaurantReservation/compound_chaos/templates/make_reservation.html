<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Make Reservation</title>
</head>
<body>
<h2>Make a Reservation</h2>
<form method="post" action="">
    <label for="guest-name">Guest Name:</label>
    <input type="text" id="guest-name" name="guest_name" value="{{ guest_name|default('') }}" required>
    {% if errors and errors.get('guest_name') %}<div style="color:red">{{ errors['guest_name'] }}</div>{% endif %}
    <br>

    <label for="party-size">Party Size:</label>
    <select id="party-size" name="party_size">
        {% for i in range(1, 11) %}
        <option value="{{ i }}" {% if party_size is defined and party_size|int == i %}selected{% endif %}>{{ i }}</option>
        {% endfor %}
    </select>
    {% if errors and errors.get('party_size') %}<div style="color:red">{{ errors['party_size'] }}</div>{% endif %}
    <br>

    <label for="reservation-date">Reservation Date:</label>
    <input type="date" id="reservation-date" name="reservation_date" value="{{ reservation_date|default('') }}" required>
    {% if errors and errors.get('reservation_date') %}<div style="color:red">{{ errors['reservation_date'] }}</div>{% endif %}
    <br>

    <button type="submit">Submit</button>
</form>
<button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
