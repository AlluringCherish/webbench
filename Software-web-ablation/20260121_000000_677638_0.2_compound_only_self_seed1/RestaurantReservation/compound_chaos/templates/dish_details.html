<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dish Details</title>
</head>
<body>
<h1>{{ dish.name }}</h1>
<p>Category: {{ dish.category }}</p>
<p>Description: {{ dish.description }}</p>
<p>Ingredients: {{ dish.ingredients }}</p>
<p>Dietary: {{ dish.dietary }}</p>
<p>Average Rating: {{ "%.1f"|format(dish.avg_rating) }}</p>
<button onclick="location.href='{{ url_for('menu') }}'">Back to Menu</button>
</body>
</html>
