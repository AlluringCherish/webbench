<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu</title>
</head>
<body>
<div id="menu-page">
    <div>
        {% for dish in menus %}
        <div class="dish-card">
            <h3>{{ dish.name }} - ${{ "%.2f"|format(dish.price) }}</h3>
            <p>Category: {{ dish.category }}</p>
            <p>Description: {{ dish.description }}</p>
            <p>Ingredients: {{ dish.ingredients }}</p>
            <p>Dietary: {{ dish.dietary }}</p>
            <p>Average Rating: {{ "%.1f"|format(dish.avg_rating) }}</p>
            <button onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">Details</button>
        </div>
        {% endfor %}
    </div>
    <button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
