<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waitlist</title>
</head>
<body>
<h2>Waitlist</h2>
<form method="post" action="">
    <label for="party-size">Party Size:</label>
    <select id="party-size" name="party_size">
        {% for i in range(1, 11) %}
        <option value="{{ i }}">{{ i }}</option>
        {% endfor %}
    </select>
    {% if errors and errors.get('party_size') %}<div style="color:red">{{ errors['party_size'] }}</div>{% endif %}
    <br>
    <button id="join-waitlist-button">Join Waitlist</button>
</form>

{% if user_active %}
<p>You are currently on the waitlist.</p>
<p>Your current position is: {{ user_position }}</p>
{% else %}
<p>You are not currently on the waitlist.</p>
{% endif %}

<button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
