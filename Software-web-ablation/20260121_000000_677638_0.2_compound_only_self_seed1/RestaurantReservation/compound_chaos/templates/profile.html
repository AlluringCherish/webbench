<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile</title>
</head>
<body>
<h2>User Profile</h2>
<form method="post" action="">
    <label for="email">Email:</label>
    <input type="text" id="email" name="email" value="{{ user_profile.email }}">
    {% if errors and errors.get('email') %}<div style="color:red">{{ errors['email'] }}</div>{% endif %}
    <br>
    <button type="submit">Update</button>
</form>
<button onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
