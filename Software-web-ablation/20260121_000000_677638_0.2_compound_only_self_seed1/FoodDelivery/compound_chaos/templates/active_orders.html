<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <h1>Active Orders</h1>
        <form method="GET" action="{{ url_for('active_orders') }}">
            <label for="status-filter">Filter Status:</label>
            <select id="status-filter" name="status_filter" onchange="this.form.submit()">
                <option value="">All</option>
                <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Confirmed" {% if status_filter == 'Confirmed' %}selected{% endif %}>Confirmed</option>
                <option value="On the Way" {% if status_filter == 'On the Way' %}selected{% endif %}>On the Way</option>
                <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
                <option value="Cancelled" {% if status_filter == 'Cancelled' %}selected{% endif %}>Cancelled</option>
            </select>
        </form>
        <div id="orders-list">
            {% for order in orders %}
            <div class="order-item">
                <p>Order #{{ order.order_id }} - {{ order.status }} - Total: ${{ "%.2f"|format(order.total_amount) }}</p>
                <button id="track-order-button-{{ order.order_id }}" onclick="window.location.href='{{ url_for('order_tracking', order_id=order.order_id) }}'">Track Order</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
