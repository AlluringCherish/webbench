<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurants</title>
</head>
<body>
    <div id="restaurants-page">
        <h1>Browse Restaurants</h1>
        <form method="GET" action="{{ url_for('browse_restaurants') }}">
            <input type="text" id="search-input" name="search_query" placeholder="Search restaurants" value="{{ search_query }}" />
            <select id="cuisine-filter" name="filter_cuisine">
                <option value="">All Cuisines</option>
                {% for cuisine in cuisines %}
                <option value="{{ cuisine }}" {% if cuisine == filter_cuisine %}selected{% endif %}>{{ cuisine }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search</button>
        </form>
        <div id="restaurants-grid">
            {% for restaurant in restaurants %}
            <div class="restaurant-card">
                <h2>{{ restaurant.name }}</h2>
                <p>Cuisine: {{ restaurant.cuisine }}</p>
                <p>Address: {{ restaurant.address }}</p>
                <button id="view-restaurant-button-{{ restaurant.restaurant_id }}" onclick="window.location.href='{{ url_for('restaurant_menu', restaurant_id=restaurant.restaurant_id) }}'">View Restaurant</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
