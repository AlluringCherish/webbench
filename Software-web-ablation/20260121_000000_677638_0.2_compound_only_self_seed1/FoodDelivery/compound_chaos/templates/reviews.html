<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Order Reviews</h1>
        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="filter_rating" onchange="window.location.href='{{ url_for('reviews_page') }}?filter_rating=' + this.value">
            <option value="">All Ratings</option>
            <option value="5" {% if filter_rating == '5' %}selected{% endif %}>5</option>
            <option value="4" {% if filter_rating == '4' %}selected{% endif %}>4</option>
            <option value="3" {% if filter_rating == '3' %}selected{% endif %}>3</option>
            <option value="2" {% if filter_rating == '2' %}selected{% endif %}>2</option>
            <option value="1" {% if filter_rating == '1' %}selected{% endif %}>1</option>
        </select>
        <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review') }}'">Write Review</button>
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-item">
                <p><strong>{{ review.customer_name }}</strong> rated <strong>{{ review.rating }}</strong></p>
                <p>{{ review.review_text }}</p>
                <p><em>{{ review.review_date }}</em></p>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
