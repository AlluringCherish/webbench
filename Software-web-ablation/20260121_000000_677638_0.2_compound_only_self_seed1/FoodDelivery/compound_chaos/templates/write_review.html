<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review</h1>
        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="restaurant-select">Select Restaurant:</label><br>
            <select id="restaurant-select" name="restaurant_id" required>
                {% for restaurant in restaurants %}
                <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                {% endfor %}
            </select><br><br>

            <label for="customer-name-input">Your Name:</label><br>
            <input type="text" id="customer-name-input" name="customer_name" required><br><br>

            <label for="rating-select">Rating:</label><br>
            <select id="rating-select" name="rating" required>
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
            </select><br><br>

            <label for="review-textarea">Review:</label><br>
            <textarea id="review-textarea" name="review_text" rows="5" cols="50" required></textarea><br><br>

            <button type="submit" id="submit-review-button">Submit Review</button>
        </form>
    </div>
</body>
</html>
