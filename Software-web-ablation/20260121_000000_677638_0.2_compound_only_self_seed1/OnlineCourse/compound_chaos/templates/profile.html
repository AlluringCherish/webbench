<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
<div id="profile-page">
    <h1>My Profile</h1>
    <form method="post" action="{{ url_for('profile') }}">
        <label for="profile-email">Email:</label>
        <input type="email" id="profile-email" name="user_email" value="{{ user_email }}"/>
        <br/>
        <label for="profile-fullname">Full Name:</label>
        <input type="text" id="profile-fullname" name="user_fullname" value="{{ user_fullname }}"/>
        <br/>
        <button id="update-profile-button" type="submit">Save</button>
    </form>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
