<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Assignment</title>
</head>
<body>
<div id="submit-page">
    <h1>Submit Assignment: {{ assignment.title }}</h1>
    <form method="post" action="{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}">
        <textarea id="submission-text" name="submission_text" placeholder="Enter your submission here">{{ previous_submission.submission_text if previous_submission else '' }}</textarea><br>
        <button id="submit-assignment-button-{{ assignment.assignment_id }}" type="submit">Submit</button>
    </form>
    <button id="back-to-assignments" onclick="location.href='{{ url_for('assignments') }}'">Back to Assignments</button>
</div>
</body>
</html>
