<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Learning</title>
</head>
<body>
<div id="learning-page">
    <h1>Course Learning</h1>
    <div id="lessons-list">
        <ul>
            {% for lesson in lessons %}
            <li>
                <button id="continue-learning-button-{{ lesson.lesson_id }}" onclick="location.href='{{ url_for('learn_lesson', course_id=course.course_id, lesson_id=lesson.lesson_id) }}'">{{ lesson.title }}</button>
            </li>
            {% endfor %}
        </ul>
    </div>
    <div id="lesson-content">
        <h2>{{ current_lesson.title }}</h2>
        <p>{{ current_lesson.content }}</p>
    </div>
    <button id="mark-complete-button" {% if progress == 100 %}disabled{% endif %}>Mark Complete</button>
    <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
</div>
</body>
</html>
