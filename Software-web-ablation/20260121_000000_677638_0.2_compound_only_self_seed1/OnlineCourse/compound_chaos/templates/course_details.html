<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
</head>
<body>
<div id="course-details-page">
    <h1 id="course-title">{{ course.title }}</h1>
    <div id="course-description">{{ course.description }}</div>
    <button id="enroll-button" {% if already_enrolled %}disabled{% endif %}>
        {% if already_enrolled %}Already Enrolled{% else %}Enroll{% endif %}
    </button>
    <button id="back-to-catalog" onclick="location.href='{{ url_for('catalog') }}'">Back to Catalog</button>
</div>
</body>
</html>
