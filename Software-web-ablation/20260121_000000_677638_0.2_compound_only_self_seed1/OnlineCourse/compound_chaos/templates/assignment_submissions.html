<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assignment Submissions</title>
</head>
<body>
<div id="submissions-page">
    <h1>Submissions for {{ assignment.title }}</h1>
    <table id="submissions-table">
        <thead>
            <tr>
                <th>Username</th>
                <th>Submission Text</th>
                <th>Submit Date</th>
                <th>Grade</th>
                <th>Feedback</th>
            </tr>
        </thead>
        <tbody>
            {% for submission in submissions %}
            <tr>
                <td>{{ submission.username }}</td>
                <td>{{ submission.submission_text }}</td>
                <td>{{ submission.submit_date }}</td>
                <td>{{ submission.grade }}</td>
                <td>{{ submission.feedback }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button id="back-to-assignments" onclick="location.href='{{ url_for('assignments') }}'">Back to Assignments</button>
</div>
</body>
</html>
