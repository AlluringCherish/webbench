<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Course Learning</title>
</head>
<body>
<div id="learning-page">
    <h1>Learning: {{ course.title }}</h1>
    <div id="lesson-content">
        <h2>{{ lesson.title }}</h2>
        <div>{{ lesson.content }}</div>
    </div>
    <div id="lessons-list">
        <h3>Lessons</h3>
        <ul>
        {% for l in lessons %}
            <li>
                <button id="continue-learning-button-{{ l.lesson_id }}" onclick="location.href='{{ url_for('learn_lesson', course_id=course.course_id, lesson_id=l.lesson_id) }}'">{{ l.title }}</button>
            </li>
        {% endfor %}
        </ul>
    </div>
    <button id="back-to-my-courses" onclick="location.href='{{ url_for('my_courses') }}'">Back to My Courses</button>
</div>
</body>
</html>
