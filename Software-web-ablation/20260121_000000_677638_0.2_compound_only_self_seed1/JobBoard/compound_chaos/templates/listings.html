<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
<div id="listings-page">
    <input id="search-input" type="text" placeholder="Enter search terms..." name="search" />
    <select id="category-filter" name="category">
        <option value="">All Categories</option>
        {% for category in categories %}
        <option value="{{ category }}">{{ category }}</option>
        {% endfor %}
    </select>
    <select id="location-filter" name="location">
        <option value="">All Locations</option>
        {% for location in locations %}
        <option value="{{ location }}">{{ location }}</option>
        {% endfor %}
    </select>
    <div id="jobs-grid">
        {% for job in jobs %}
        <div class="job-item" id="job-{{ job.job_id }}">
            <h3>{{ job.title }}</h3>
            <div>{{ job.company_name }} - {{ job.location }}</div>
            <div>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</div>
            <div>Category: {{ job.category }}</div>
            <button id="view-job-button-{{ job.job_id }}" onclick="location.href='{{ url_for('job_details_page', job_id=job.job_id) }}'">View Job</button>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
