<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
<div id="application-form-page">
    {% if error_messages %}
    <div id="error-messages">
        <ul>
            {% for error in error_messages %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
    <form method="POST" action="{{ url_for('submit_application', job_id=job_id) }}" enctype="multipart/form-data">
        <label for="applicant-name">Name:</label>
        <input type="text" id="applicant-name" name="applicant_name" required />
        <label for="applicant-email">Email:</label>
        <input type="email" id="applicant-email" name="applicant_email" required />
        <label for="cover-letter">Cover Letter:</label>
        <textarea id="cover-letter" name="cover_letter"></textarea>
        <label for="resume-upload">Upload Resume:</label>
        <input type="file" id="resume-upload" name="resume_file" accept="application/pdf" required />
        <button id="submit-application-button" type="submit">Submit Application</button>
    </form>
</div>
</body>
</html>
