<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Board Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <button id="browse-jobs-button" onclick="location.href='{{ url_for('job_listings_page') }}'">Browse Jobs</button>
    <button id="my-applications-button" onclick="location.href='{{ url_for('application_tracking_page') }}'">My Applications</button>
    <button id="companies-button" onclick="location.href='{{ url_for('companies_directory_page') }}'">Companies</button>
    <div id="featured-jobs">
        {% for job in featured_jobs %}
        <div class="job-item" id="job-{{ job.job_id }}">
            <h3>{{ job.title }}</h3>
            <div>{{ job.company_name }} - {{ job.location }}</div>
            <div>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
