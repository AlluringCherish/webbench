<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Details</title>
</head>
<body>
<div id="job-details-page">
    <h1 id="job-title">{{ job.title }}</h1>
    <div id="company-name">{{ job.company_name }}</div>
    <div id="salary-range">${{ job.salary_min }} - ${{ job.salary_max }}</div>
    <div id="job-description">{{ job.description }}</div>
    <button id="apply-now-button" onclick="location.href='{{ url_for('application_form_page', job_id=job.job_id) }}'">Apply Now</button>
</div>
</body>
</html>
