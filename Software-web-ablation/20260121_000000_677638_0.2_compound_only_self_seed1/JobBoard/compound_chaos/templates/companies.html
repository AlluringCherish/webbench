<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Company Directory</title>
</head>
<body>
<div id="companies-page">
    <input type="text" id="search-company-input" placeholder="Search companies..." name="search" />
    <div id="companies-list">
        {% for company in companies %}
        <div class="company-item" id="company-{{ company.company_id }}">
            <h3>{{ company.company_name }}</h3>
            <div>Industry: {{ company.industry }}</div>
            <div>Location: {{ company.location }}</div>
            <div>Employee Count: {{ company.employee_count }}</div>
            <button id="view-company-button-{{ company.company_id }}" onclick="location.href='{{ url_for('company_profile_page', company_id=company.company_id) }}'">View Company</button>
        </div>
        {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
