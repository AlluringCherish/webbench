<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Analytics - Content Publishing Hub</title>
</head>
<body>
    <div id="article-analytics-page">
        <h1>Article Analytics for: {{ article.title }}</h1>
        <div id="analytics-summary">
            <p id="views">Views: {{ analytics.views }}</p>
            <p id="unique-visitors">Unique Visitors: {{ analytics.unique_visitors }}</p>
            <p id="avg-time-spent">Average Time Spent (seconds): {{ analytics.avg_time_seconds }}</p>
            <p id="shares">Shares: {{ analytics.shares }}</p>
        </div>
        <div id="analytics-charts">
            <!-- JS charts rendering container -->
        </div>
        <button id="back-to-dashboard-published" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
