<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Article - Content Publishing Hub</title>
</head>
<body>
    <div id="edit-article-page">
        <h1>Edit Article</h1>
        <form id="edit-article-form" method="post" action="{{ url_for('article_edit', article_id=article.article_id) }}">
            <label for="article-title">Title:</label><br>
            <input type="text" id="article-title" name="title" value="{{ article.title }}" required><br><br>

            <label for="article-category">Category:</label><br>
            <input type="text" id="article-category" name="category" value="{{ article.category }}"><br><br>

            <label for="article-tags">Tags (comma separated):</label><br>
            <input type="text" id="article-tags" name="tags" value="{{ article.tags }}"><br><br>

            <label for="article-featured-image">Featured Image URL:</label><br>
            <input type="url" id="article-featured-image" name="featured_image" value="{{ article.featured_image }}"><br><br>

            <label for="article-meta-description">Meta Description:</label><br>
            <textarea id="article-meta-description" name="meta_description">{{ article.meta_description }}</textarea><br><br>

            <label for="article-content">Content:</label><br>
            <textarea id="article-content" name="content" rows="15" required>{% if version %}{{ version.content }}{% endif %}</textarea><br><br>

            <button type="submit" id="save-draft-button" name="action" value="save_draft">Save Draft</button>
            <button type="submit" id="publish-button" name="action" value="publish">Publish</button>
            <button type="button" id="cancel-button" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
