<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Content Calendar - Content Publishing Hub</title>
</head>
<body>
    <div id="content-calendar-page">
        <h1>Content Calendar</h1>
        <div id="calendar-controls">
            <button id="schedule-button">Schedule Article</button>
            <button id="save-calendar-button" onclick="document.getElementById('calendar-form').submit();">Save Calendar</button>
            <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </div>
        <form id="calendar-form" method="post" action="{{ url_for('calendar_save') }}">
            <div id="calendar-container">
                <!-- Calendar will be rendered here by JS fetching /calendar/data -->
            </div>
        </form>
    </div>
</body>
</html>
