<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Content Publishing Hub</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Dashboard</h1>

        <section id="quick-stats">
            <div id="stat-total-articles">Total Articles: {{ total_articles }}</div>
            <div id="stat-published-articles">Published Articles: {{ published_articles }}</div>
            <div id="stat-pending-approval">Pending Approval: {{ pending_approval }}</div>
            <div id="stat-drafts">Drafts: {{ drafts }}</div>
        </section>

        <nav id="dashboard-navigation">
            <button id="create-article-button" onclick="window.location.href='{{ url_for('article_create') }}'">Create Article</button>
            <button id="my-articles-button" onclick="window.location.href='{{ url_for('articles_mine') }}'">My Articles</button>
            <button id="published-articles-button" onclick="window.location.href='{{ url_for('articles_published') }}'">Published Articles</button>
            <button id="content-calendar-button" onclick="window.location.href='{{ url_for('calendar_view') }}'">Content Calendar</button>
            <button id="article-analytics-button" onclick="window.location.href='{{ url_for('dashboard') }}'">Article Analytics</button>
        </nav>
    </div>
</body>
</html>
