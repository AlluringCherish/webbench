<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Published Articles - Content Publishing Hub</title>
</head>
<body>
    <div id="published-articles-page">
        <h1>Published Articles</h1>
        <label for="filter_published_category">Filter by Category:</label>
        <select id="filter_published_category" name="filter_published_category" onchange="window.location.href='{{ url_for('published_articles') }}?category='+this.value;">
            <option value="">All</option>
            {% for category in categories %}
                <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
            {% endfor %}
        </select>
        <table id="published-articles-table" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Category</th>
                    <th>Publish Date</th>
                </tr>
            </thead>
            <tbody>
                {% for article in articles %}
                    <tr>
                        <td>{{ article.title }}</td>
                        <td>{{ article.author }}</td>
                        <td>{{ article.category }}</td>
                        <td>{{ article.publish_date }}</td>
                    </tr>
                {% else %}
                    <tr><td colspan="4">No published articles found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard-published" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
