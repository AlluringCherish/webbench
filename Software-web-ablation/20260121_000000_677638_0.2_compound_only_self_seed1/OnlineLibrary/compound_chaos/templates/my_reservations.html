<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Reservations</title>
</head>
<body>
<div id="reservations-page">
<h1>My Reservations</h1>

<table id="reservations-table">
<thead>
<tr>
<th>Book Title</th>
<th>Reservation Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody>
{% for reservation in reservations %}
<tr>
<td>{{ reservation.book_title }}</td>
<td>{{ reservation.reservation_date }}</td>
<td>{{ reservation.status }}</td>
<td>
<form method="POST" action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}">
<button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="submit">Cancel Reservation</button>
</form>
</td>
</tr>
{% endfor %}
</tbody>
</table>

<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
