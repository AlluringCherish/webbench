<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>
</head>
<body>
<div id="profile-page">
<h1>My Profile</h1>
<div id="profile-username">Username: {{ username }}</div>
<form method="POST" action="{{ url_for('update_profile') }}">
<label for="profile-email">Email:</label>
<input type="email" id="profile-email" name="email" value="{{ email }}" required>
<br>
<label for="profile-phone">Phone:</label>
<input type="tel" id="profile-phone" name="phone" value="{{ phone }}">
<br>
<label for="profile-address">Address:</label>
<input type="text" id="profile-address" name="address" value="{{ address }}">
<br>
<button id="update-profile-button" type="submit">Update Profile</button>
</form>

<h2>Borrow History</h2>
<div id="borrow-history">
<ul>
{% for entry in borrow_history %}
<li>{{ entry.book_title }}: Borrowed on {{ entry.borrow_date }}, Returned on {{ entry.return_date if entry.return_date else 'Not yet returned' }}</li>
{% endfor %}
</ul>
</div>

<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
