<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Catalog</title>
</head>
<body>
<div id="catalog-page">
<h1>Book Catalog</h1>

<input type="text" id="search-input" placeholder="Search by title or author">

<div id="book-grid">
{% for book in books %}
<div class="book-card">
<div class="book-title">{{ book.title }}</div>
<div class="book-author">{{ book.author }}</div>
<div class="book-status">{{ book.status }}</div>
<button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
</div>
{% endfor %}
</div>

<button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
