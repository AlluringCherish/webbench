<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment</title>
</head>
<body>
<h1>Payment</h1>
<div id="payment-page">
    <form method="POST" action="{{ url_for('pay_fine', fine_id=fine_id) }}">
        <label for="amount">Amount to Pay:</label>
        <input type="text" id="amount" name="amount" value="{{ amount }}" readonly>
        <br>
        <button id="pay-fine-button" type="submit">Pay Fine</button>
    </form>
</div>

<button id="back-to-profile" onclick="window.location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
</body>
</html>
