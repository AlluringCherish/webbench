<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Dashboard</title>
</head>
<body>
<div id="dashboard-page">
<h1 id="welcome-message">Welcome, {{ username }}</h1>

<button id="browse-books-button" onclick="window.location.href='{{ url_for('catalog_page') }}'">Browse Books</button>
<button id="my-borrows-button" onclick="window.location.href='{{ url_for('my_borrowings') }}'">My Borrowings</button>

<div id="featured_books">
<h2>Featured Books</h2>
<ul>
{% for book in featured_books %}
<li>{{ book.title }}</li>
{% endfor %}
</ul>
</div>
</div>
</body>
</html>
