<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Confirmation</title>
</head>
<body>
<div id="payment-page">
<h1>Payment Confirmation</h1>
<div id="fine-amount-display">Fine Amount: {{ fine_amount }}</div>
<form method="POST" action="{{ url_for('confirm_payment', fine_id=fine_id) }}">
<button id="confirm-payment-button" type="submit">Confirm Payment</button>
</form>
<button id="back-to-profile" onclick="window.location.href='{{ url_for('user_profile') }}'">Back to Profile</button>
</div>
</body>
</html>
