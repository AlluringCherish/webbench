<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Album Details</title>
</head>
<body>
    <div id="album-details-page">
        <h1 id="album-title">{{ album.title }}</h1>
        <div id="album-artist">Artist: {{ album.artist_name }}</div>
        <div id="album-year">Year: {{ album.release_year }}</div>
        <div id="album-songs-list">
            {% for song in songs %}
            <div class="song-item">
                <span>{{ song.title }}</span>
                <form method="POST" action="{{ url_for('add_album_to_playlist', album_id=album.album_id) }}">
                    <button id="add-album-to-playlist-button-{{ song.song_id }}" type="submit">Add to Playlist</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
