<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Genre Exploration</title>
</head>
<body>
    <div id="genres-page">
        <h1>Genre Exploration</h1>
        <form method="POST" action="{{ url_for('select_genre') }}">
            <select id="select-genre" name="selected_genre">
                <option value="">Select Genre</option>
                {% for genre in genres %}
                <option value="{{ genre.genre_id }}">{{ genre.genre_name }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="genre-songs">
            <h2>Songs</h2>
            <ul>
                {% for song in songs %}
                <li>{{ song.title }} by {{ song.artist_name }}</li>
                {% endfor %}
            </ul>
        </div>
        <div id="genre-artists">
            <h2>Artists</h2>
            <ul>
                {% for artist in artists %}
                <li>{{ artist.name }}</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
