<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Artist Profile</title>
</head>
<body>
    <h1>{{ artist.name }}</h1>
    <div>
        <p><strong>Genre:</strong> {{ artist.genre }}</p>
        <p><strong>Country:</strong> {{ artist.country }}</p>
        <p><strong>Formed:</strong> {{ artist.formation_year }}</p>
    </div>
    <nav>
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
</body>
</html>
