<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Albums</title>
</head>
<body>
    <div id="albums-page">
        <h1>Albums</h1>
        <form method="POST" action="{{ url_for('albums_search_sort') }}">
            <input type="text" id="search-albums" name="search_albums" placeholder="Search Albums..." />
            <select id="sort-albums" name="sort_albums">
                {% for option in sort_options %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search/Sort</button>
        </form>
        <div id="albums-grid">
            {% for album in albums %}
            <div class="album-item">
                <h2>{{ album.title }}</h2>
                <p>Artist: {{ album.artist_name }}</p>
                <p>Year: {{ album.year }}</p>
                <a href="{{ url_for('album_details', album_id=album.album_id) }}">
                    <button id="view-album-button-{{ album.album_id }}">View Album</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
