<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artists Search/Sort</title>
</head>
<body>
    <h1 id="page-header">By Artist</h1>
    <form method="GET" action="{{ url_for('artists_search_sort') }}" id="search-sort-form">
        <label for="search-input">Search:</label>
        <input type="text" id="search-input" name="query">
        <label for="sort-options">Sort by:</label>
        <select id="sort-options" name="sort_field">
            {% for field in sort_options %}
            <option value="{{ field }}">{{ field }}</option>
            {% endfor %}
        </select>
        <button type="submit" id="search-button">Search</button>
    </form>
    <div id="artists-list">
        {% for artist in artists %}
        <div id="artist-{{ artist.artist_id }}" class="artist-item">
            <span class="artist-name">{{ artist.name }}</span> - <span class="artist-genre">{{ artist.genre }}</span>
            <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}"><button id="view-artist-button-{{ artist.artist_id }}">View Profile</button></a>
        </div>
        {% endfor %}
    </div>
    <nav id="navigation">
        <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
</body>
</html>
