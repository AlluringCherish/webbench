<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Create New Playlist</title>
</head>
<body>
    <div id="create-playlist-page">
        <h1>Create New Playlist</h1>
        <form id="create-playlist-form" method="POST" action="{{ url_for('create_playlist_post') }}">
            <label for="playlist-name-input">Playlist Name:</label>
            <input type="text" id="playlist-name-input" name="playlist_name" required />
            <br />
            <label for="playlist-description-input">Description:</label>
            <textarea id="playlist-description-input" name="playlist_description"></textarea>
            <br />
            <button type="submit" id="save-playlist-button">Save Playlist</button>
            <button type="button" id="cancel-create-button" onclick="location.href='{{ url_for('playlists') }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
