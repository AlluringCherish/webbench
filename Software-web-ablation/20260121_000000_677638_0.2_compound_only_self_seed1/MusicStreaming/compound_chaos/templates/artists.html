<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Artist Profiles</title>
</head>
<body>
    <div id="artists-page">
        <h1>Artist Profiles</h1>
        <form id="artists-search-sort-form" method="POST" action="{{ url_for('artists_search_sort') }}">
            <input type="text" id="search-artists" name="search_query" placeholder="Search Artists..." />
            <select id="artists-sort" name="sort_field">
                {% for option in sort_options %}
                <option value="{{ option }}">{{ option }}</option>
                {% endfor %}
            </select>
            <button type="submit">Search/Sort</button>
        </form>
        <div id="artists-grid">
            {% for artist in artists %}
            <div class="artist-item">
                <span>{{ artist.name }}</span>
                <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_profile', artist_id=artist.artist_id) }}'">View Profile</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
