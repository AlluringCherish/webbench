<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Pets</title>
</head>
<body>
  <div id="pet-listings-page">
    <h1>Available Pets</h1>
    <form method="post" action="{{ url_for('pet_listings_filtered') }}">
      <input type="text" id="search-input" name="search" placeholder="Search pets...">
      <select id="filter-species" name="species">
        <option value="">All Species</option>
        <option value="Dog">Dog</option>
        <option value="Cat">Cat</option>
        <option value="Bird">Bird</option>
        <option value="Rabbit">Rabbit</option>
        <option value="Other">Other</option>
      </select>
      <button type="submit">Filter</button>
    </form>
    <div id="pet-grid">
      {% for pet in pets %}
      <div class="pet-card">
        <img src="{{ pet.photo_url }}" alt="Photo of {{ pet.name }}">
        <h3>{{ pet.name }}</h3>
        <p>Species: {{ pet.species }}</p>
        <p>Age: {{ pet.age }}</p>
        <button onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Details</button>
      </div>
      {% endfor %}
    </div>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
