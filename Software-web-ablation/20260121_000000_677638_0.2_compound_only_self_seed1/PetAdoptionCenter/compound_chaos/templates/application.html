<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adoption Application</title>
</head>
<body>
  <div id="application-page">
    <h1>Adoption Application for {{ pet.name }}</h1>
    {% if form_errors %}
    <div id="form-errors" style="color: red;">
      <ul>
        {% for field, error in form_errors.items() %}
        <li>{{ field }}: {{ error }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}
    {% if success_message %}
    <div id="success-message" style="color: green;">
      {{ success_message }}
    </div>
    {% endif %}
    <form method="post" action="{{ url_for('submit_application', pet_id=pet.pet_id) }}">
      <label for="applicant-name">Your Name:</label>
      <input type="text" id="applicant-name" name="applicant_name" required>

      <label for="applicant-phone">Phone Number:</label>
      <input type="text" id="applicant-phone" name="phone" required>

      <label for="housing-type">Housing Type:</label>
      <select id="housing-type" name="housing_type" required>
        <option value="House">House</option>
        <option value="Apartment">Apartment</option>
        <option value="Condo">Condo</option>
        <option value="Other">Other</option>
      </select>

      <label for="reason">Reason for Adoption:</label>
      <textarea id="reason" name="reason" required></textarea>

      <button type="submit" id="submit-application-button">Submit Application</button>
    </form>
    <button id="back-to-pet" onclick="window.location.href='{{ url_for('pet_details', pet_id=pet.pet_id) }}'">Back to Pet Details</button>
  </div>
</body>
</html>
