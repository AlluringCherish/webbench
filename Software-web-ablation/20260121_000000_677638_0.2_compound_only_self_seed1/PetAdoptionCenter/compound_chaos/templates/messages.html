<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messages</title>
</head>
<body>
  <div id="messages-page">
    <h1>Messages</h1>
    <div id="conversation-list">
      {% for conversation in conversations %}
      <div class="conversation-card">
        <h3>{{ conversation.other_user }}</h3>
        <p>Last message: {{ conversation.last_message }}</p>
        {% if conversation.unread_count > 0 %}
        <p><strong>Unread: {{ conversation.unread_count }}</strong></p>
        {% endif %}
        <button onclick="window.location.href='{{ url_for('messages_page') }}'">Open</button>
      </div>
      {% endfor %}
    </div>
    <form method="post" action="{{ url_for('send_message') }}">
      <textarea id="message-input" name="message" placeholder="Type your message here..."></textarea>
      <button type="submit" id="send-message-button">Send Message</button>
    </form>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
