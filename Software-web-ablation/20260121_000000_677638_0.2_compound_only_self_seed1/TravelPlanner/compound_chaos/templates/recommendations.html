<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Recommendations</title>
</head>
<body>
  <div id="recommendations-page">
    <h1>Travel Recommendations</h1>
    <div id="trending-destinations">
      <h2>Trending Destinations</h2>
      <ul>
        {% for trend in trending_destinations %}
        <li>{{ trend.name }} (Popularity: {{ trend.popularity }})</li>
        {% endfor %}
      </ul>
    </div>
    <label for="recommendation-season-filter">Season:</label>
    <select id="recommendation-season-filter" name="season_filter">
      <option value="">All Seasons</option>
      <option value="spring">Spring</option>
      <option value="summer">Summer</option>
      <option value="autumn">Autumn</option>
      <option value="winter">Winter</option>
    </select>
    <label for="budget-filter">Budget:</label>
    <select id="budget-filter" name="budget_filter">
      <option value="">All Budgets</option>
      <option value="low">Low</option>
      <option value="medium">Medium</option>
      <option value="high">High</option>
    </select>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
