<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Travel Packages</title>
</head>
<body>
  <div id="packages-page">
    <h1>Travel Packages</h1>
    <label for="duration-filter">Duration Filter:</label>
    <select id="duration-filter" name="duration_filter">
      <option value="">All Durations</option>
      <option value="short">Short (1-3 days)</option>
      <option value="medium">Medium (4-7 days)</option>
      <option value="long">Long (8+ days)</option>
    </select>
    <div id="packages-grid">
      {% for pkg in packages %}
      <div class="package-card">
        <h2>{{ pkg.package_name }}</h2>
        <p>Destination: {{ pkg.destination }}</p>
        <p>Duration (days): {{ pkg.duration_days }}</p>
        <p>Price: ${{ pkg.price }}</p>
        <p>Included: {{ pkg.included_items }}</p>
        <p>Difficulty: {{ pkg.difficulty_level }}</p>
        <button id="view-package-details-button-{{ pkg.package_id }}" onclick="location.href='{{ url_for('package_details', pkg_id=pkg.package_id) }}'">View Details</button>
        <button id="book-package-button-{{ pkg.package_id }}">Book Package</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
