<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <h1>Trainer Profiles</h1>
        <input type="text" id="trainer-search" name="trainer-search" placeholder="Search trainers by name or specialty">
        <label for="specialty-filter">Filter by Specialty:</label>
        <select id="specialty-filter" name="specialty-filter">
            <option value="All">All</option>
            <option value="Yoga & Flexibility">Yoga & Flexibility</option>
            <option value="Strength & Conditioning">Strength & Conditioning</option>
            <option value="Pilates">Pilates</option>
        </select>
        <div id="trainers-grid">
            {% for trainer in trainers %}
            <div class="trainer-card" id="trainer-{{ trainer.trainer_id }}">
                <h2>{{ trainer.name }}</h2>
                <p>Specialty: {{ trainer.specialty }}</p>
                <p>Certifications: {{ trainer.certifications }}</p>
                <p>Experience: {{ trainer.experience_years }} years</p>
                <button id="view-trainer-button-{{ trainer.trainer_id }}" onclick="location.href='{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}'">View Profile</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
