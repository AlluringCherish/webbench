<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Schedule</title>
</head>
<body>
    <div id="schedule-page">
        <h1>Class Schedule</h1>
        <input type="text" id="schedule-search" name="schedule-search" placeholder="Search classes by name or trainer">
        <label for="schedule-filter">Filter by type:</label>
        <select id="schedule-filter" name="schedule-filter">
            <option value="All">All</option>
            <option value="Yoga">Yoga</option>
            <option value="CrossFit">CrossFit</option>
            <option value="Pilates">Pilates</option>
        </select>
        <div id="classes-grid">
            {% for class in classes %}
            <div class="class-card" id="class-{{ class.class_id }}">
                <h2>{{ class.class_name }}</h2>
                <p>Trainer ID: {{ class.trainer_id }}</p>
                <p>Type: {{ class.class_type }}</p>
                <p>Day: {{ class.schedule_day }}</p>
                <p>Time: {{ class.schedule_time }}</p>
                <p>Capacity: {{ class.capacity }}</p>
                <p>Duration: {{ class.duration }} minutes</p>
                <button id="enroll-class-button-{{ class.class_id }}">Enroll in Class</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
