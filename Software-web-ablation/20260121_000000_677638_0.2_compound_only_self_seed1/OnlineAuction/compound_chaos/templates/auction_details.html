<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Details</title>
</head>
<body>
    <div id="auction-details-page">
        <h1>Auction Details</h1>
        <h1 id="auction-title">{{ auction.item_name }}</h1>
        <div id="auction-description">{{ auction.description }}</div>
        <div id="current-bid">Current Bid: ${{ auction.current_bid }}</div>
        <a href="{{ url_for('place_bid', auction_id=auction.auction_id) }}">
            <button id="place-bid-button">Place Bid</button>
        </a>
        <div id="bid-history">
            <h2>Bid History</h2>
            <ul>
                {% for bid in bids %}
                <li>{{ bid.bidder_name }}: ${{ bid.bid_amount }} at {{ bid.bid_timestamp }}</li>
                {% else %}
                <li>No bids yet.</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
