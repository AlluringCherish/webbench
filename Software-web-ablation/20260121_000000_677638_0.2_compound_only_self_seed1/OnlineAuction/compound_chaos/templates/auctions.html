<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>
        <input type="text" id="search-input" placeholder="Search by item name, description, or ID">
        <select id="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category.category_id }}">{{ category.category_name }}</option>
            {% endfor %}
        </select>
        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-card">
                <h3>{{ auction.item_name }}</h3>
                <p>{{ auction.description }}</p>
                <p>Current Bid: ${{ auction.current_bid }}</p>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
