<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Auction Dashboard</h1>
        <div id="featured-auctions">
            {% for auction in featured_auctions %}
            <div class="featured-auction-item">
                <h3>{{ auction.item_name }}</h3>
                <p>{{ auction.description }}</p>
                <p>Current Bid: ${{ auction.current_bid }}</p>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View Details</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('auctions_list') }}"><button id="browse-auctions-button">Browse Auctions</button></a>
        <a href="{{ url_for('bid_history') }}"><button id="view-bids-button">View Bids</button></a>
        <a href="{{ url_for('trending_auctions') }}"><button id="trending-auctions-button">Trending Auctions</button></a>
    </div>
</body>
</html>
