<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
</head>
<body>
  <div id="checkout-page">
    <h1>Checkout</h1>
    <form method="POST" action="{{ url_for('checkout') }}">
      <label for="customer-name">Customer Name:</label><br>
      <input id="customer-name" name="customer_name" type="text" required><br>
      <label for="shipping-address">Shipping Address:</label><br>
      <textarea id="shipping-address" name="shipping_address" required></textarea><br>
      <label for="payment-method">Payment Method:</label><br>
      <select id="payment-method" name="payment_method" required>
        <option value="credit_card">Credit Card</option>
        <option value="paypal">PayPal</option>
        <option value="bank_transfer">Bank Transfer</option>
      </select><br>
      <button type="submit" id="place-order-button">Place Order</button>
    </form>
  </div>
</body>
</html>
