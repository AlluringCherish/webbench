<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Book Details</title>
</head>
<body>
  <div id="book-details-page">
    <h1 id="book-title">{{ book.title }}</h1>
    <div id="book-author">Author: {{ book.author }}</div>
    <div id="book-price">Price: ${{ '%.2f'|format(book.price) }}</div>
    <form method="POST" action="{{ url_for('book_details', book_id=book.book_id) }}">
      <button type="submit" id="add-to-cart-button">Add to Cart</button>
    </form>
    <div id="book-reviews">
      <h2>Reviews</h2>
      {% for review in reviews %}
      <div class="review">
        <p><strong>{{ review.customer_name }}</strong>: {{ review.review_text }}</p>
        <p>Rating: {{ review.rating }}</p>
      </div>
      {% else %}
      <p>No reviews available.</p>
      {% endfor %}
    </div>
  </div>
</body>
</html>
