<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Bookstore Dashboard</title>
</head>
<body>
  <div id="dashboard-page">
    <h1>Bookstore Dashboard</h1>
    <div id="featured-books">
      {% for book in featured_books %}
      <div id="featured-book-{{ book.book_id }}">
        <h2>{{ book.title }}</h2>
        <p>Author: {{ book.author }}</p>
        <p>Price: ${{ '%.2f'|format(book.price) }}</p>
      </div>
      {% endfor %}
    </div>
    <button id="browse-catalog-button" onclick="location.href='{{ url_for('book_catalog') }}'">Browse Catalog</button>
    <button id="view-cart-button" onclick="location.href='{{ url_for('shopping_cart') }}'">View Cart</button>
    <button id="bestsellers-button" onclick="location.href='{{ url_for('bestsellers') }}'">Bestsellers</button>
  </div>
</body>
</html>
