<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Order History</title>
</head>
<body>
  <div id="orders-page">
    <h1>Order History</h1>
    <form method="POST" action="{{ url_for('order_history') }}">
      <label for="order-status-filter">Filter by Status:</label>
      <select id="order-status-filter" name="status_filter">
        <option value="All" {% if status_filter == 'All' %}selected{% endif %}>All</option>
        <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
        <option value="Shipped" {% if status_filter == 'Shipped' %}selected{% endif %}>Shipped</option>
        <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
      </select>
      <button type="submit">Filter</button>
    </form>
    <table id="orders-table" border="1">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer Name</th>
          <th>Order Date</th>
          <th>Total Amount</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for order in orders %}
        <tr>
          <td>{{ order.order_id }}</td>
          <td>{{ order.customer_name }}</td>
          <td>{{ order.order_date }}</td>
          <td>${{ '%.2f'|format(order.total_amount) }}</td>
          <td>{{ order.status }}</td>
          <td>
            <!-- View button disabled because no view_order route -->
            <button type="button" disabled id="view-order-button-{{ order.order_id }}">View</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
