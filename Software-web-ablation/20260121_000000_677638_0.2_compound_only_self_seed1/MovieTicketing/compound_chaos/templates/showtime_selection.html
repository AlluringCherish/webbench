<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Showtime</title>
</head>
<body>
    <div id="showtime-page">
        <h1>Select Showtime</h1>

        <select id="theater-filter" name="theater">
            <option value="">All Theaters</option>
            {% for theater in theaters %}
            <option value="{{ theater.theater_name }}" {% if theater.theater_name == selected_theater %}selected{% endif %}>{{ theater.theater_name }}</option>
            {% endfor %}
        </select>

        <input type="date" id="date-filter" name="date" value="{{ selected_date }}">

        <div id="showtimes-list">
            {% for showtime in showtimes %}
            <div class="showtime-entry">
                <p>Date: {{ showtime.showtime_date }}</p>
                <p>Time: {{ showtime.showtime_time }}</p>
                <p>Price: ${{ "%.2f"|format(showtime.price) }}</p>
                <p>Available Seats: {{ showtime.available_seats }}</p>
                <button id="select-showtime-button-{{ showtime.showtime_id }}" onclick="location.href='{{ url_for('seat_selection', showtime_id=showtime.showtime_id) }}'">Select Showtime</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
