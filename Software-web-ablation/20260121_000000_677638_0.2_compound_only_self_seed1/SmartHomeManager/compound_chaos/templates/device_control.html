<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Device Control</title>
</head>
<body>
    <div id="device-control-page">
        <h1>Device Control</h1>

        <h2 id="device-name-display">{{ device.device_name }}</h2>

        <div id="device-status-display">Status: {{ device.status }}</div>

        <form method="POST" action="{{ url_for('device_control', device_id=device.device_id) }}">
            <button type="submit" name="power_toggle" id="power-toggle">Toggle Power</button>

            <!-- Additional settings inputs can be dynamically added here if needed -->

            <button type="submit" id="save-settings-button" name="save_settings">Save Settings</button>
        </form>

        <button id="back-to-devices" onclick="location.href='{{ url_for('device_list') }}'">Back to Devices</button>
    </div>
</body>
</html>
