<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
    <div id="energy-page">
        <h1>Energy Report</h1>

        <div id="energy-summary">
            <!-- Summary content can be added here if desired -->
        </div>

        <form method="GET" action="{{ url_for('energy') }}">
            <label for="date-filter">Date Filter:</label>
            <input type="date" id="date-filter" name="date_filter" value="{{ date_filter if date_filter else '' }}">
            <button type="submit" id="apply-filter-button">Apply Filter</button>
        </form>

        <table id="energy-table" border="1">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Device ID</th>
                    <th>Device Name</th>
                    <th>Date</th>
                    <th>Consumption (kWh)</th>
                </tr>
            </thead>
            <tbody>
                {% for record in energy_records %}
                <tr>
                    <td>{{ record.username }}</td>
                    <td>{{ record.device_id }}</td>
                    <td>{{ record.device_name }}</td>
                    <td>{{ record.date }}</td>
                    <td>{{ record.consumption_kwh }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
