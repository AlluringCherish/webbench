<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Home Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Smart Home Dashboard</h1>

        <div id="device-summary">
            <p>Total Devices: {{ total_devices }}</p>
            <p>Active Devices: {{ active_devices }}</p>
            <p>Offline Devices: {{ offline_devices }}</p>
        </div>

        <button id="device-list-button" onclick="location.href='{{ url_for('device_list') }}'">Device List</button>
        <button id="add-device-button" onclick="location.href='{{ url_for('add_device') }}'">Add New Device</button>
        <button id="automation-button" onclick="location.href='{{ url_for('automation') }}'">Automation Rules</button>
        <button id="energy-button" onclick="location.href='{{ url_for('energy') }}'">Energy Report</button>
        <button id="activity-button" onclick="location.href='{{ url_for('activity_logs') }}'">Activity Logs</button>

        <div id="room-list">
            <h2>Rooms</h2>
            <ul>
                {% for room, count in rooms.items() %}
                <li>{{ room }}: {{ count }} device{{ 's' if count != 1 else '' }}</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
