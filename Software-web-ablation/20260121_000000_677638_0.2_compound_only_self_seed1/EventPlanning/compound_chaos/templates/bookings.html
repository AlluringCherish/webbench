<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
</head>
<body>
    <div id="bookings-page">
        <h1>My Bookings</h1>

        <input type="text" id="booking-search-input" name="search" placeholder="Search bookings by event name or booking ID">

        <table id="bookings-table" border="1">
            <thead>
                <tr>
                    <th>Event</th>
                    <th>Date</th>
                    <th>Ticket Count</th>
                    <th>Booking Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr>
                    <td>{{ booking.event_id }}</td>
                    <td>{{ booking.booking_date }}</td>
                    <td>{{ booking.ticket_count }}</td>
                    <td>{{ booking.status }}</td>
                    <td><button id="cancel-booking-button-{{ booking.booking_id }}" onclick="window.location='{{ url_for('bookings_summary') }}'">Cancel</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
