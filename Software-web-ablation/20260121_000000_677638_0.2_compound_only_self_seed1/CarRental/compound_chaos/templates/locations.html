<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Pickup and Dropoff Locations</h1>
        <label for="hours-filter">Filter by Operating Hours:</label>
        <select id="hours-filter" name="hours_filter">
            {% for hours in hours_filter_options %}
            <option value="{{ hours }}">{{ hours }}</option>
            {% endfor %}
        </select>

        <label for="search-location-input">Search by City or Name:</label>
        <input type="text" id="search-location-input" name="search_location">

        <div id="locations-list">
            {% for location in locations %}
            <div class="location-entry" id="location-{{ location.location_id }}">
                <p>{{ location.city }}</p>
                <p>{{ location.address }}</p>
                <p>Phone: {{ location.phone }}</p>
                <button id="location-detail-button-{{ location.location_id }}" type="button">View Details</button>
            </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
