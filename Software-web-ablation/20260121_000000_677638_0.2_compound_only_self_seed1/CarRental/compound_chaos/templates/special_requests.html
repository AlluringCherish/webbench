<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="requests-page">
        <h1>Special Requests</h1>
        <form method="POST">
            <label for="select-reservation">Select Reservation:</label>
            <select id="select-reservation" name="reservation_id">
                {% for reservation in reservations %}
                <option value="{{ reservation.reservation_id }}" {% if submitted_requests and submitted_requests.reservation_id == reservation.reservation_id %}selected{% endif %}>Reservation {{ reservation.reservation_id }}</option>
                {% endfor %}
            </select>

            <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance" {% if submitted_requests and submitted_requests.driver_assistance %}checked{% endif %}>
            <label for="driver-assistance-checkbox">Driver Assistance</label>

            <input type="checkbox" id="gps-option-checkbox" name="gps_option" {% if submitted_requests and submitted_requests.gps_option %}checked{% endif %}>
            <label for="gps-option-checkbox">GPS Option</label>

            <label for="child-seat-quantity">Child Seat Quantity:</label>
            <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="{% if submitted_requests and submitted_requests.child_seat_quantity is defined %}{{ submitted_requests.child_seat_quantity }}{% else %}0{% endif %}">

            <label for="special-notes">Special Notes:</label>
            <textarea id="special-notes" name="special_notes">{% if submitted_requests %}{{ submitted_requests.special_notes }}{% endif %}</textarea>

            <button type="submit" id="submit-requests-button">Submit Requests</button>
        </form>
    </div>
</body>
</html>
