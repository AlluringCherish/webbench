<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="reservations-page">
        <h1>My Reservations</h1>
        <div id="reservations-list">
            {% for reservation in reservations %}
            <div class="reservation-entry" id="reservation-{{ reservation.reservation_id }}">
                <p>Reservation ID: {{ reservation.reservation_id }}</p>
                <p>Vehicle ID: {{ reservation.vehicle_id }}</p>
                <p>Status: {{ reservation.status }}</p>
                <button id="modify-reservation-button-{{ reservation.reservation_id }}" type="button">Modify</button>
                <button id="cancel-reservation-button-{{ reservation.reservation_id }}" type="button">Cancel</button>
            </div>
            {% endfor %}
        </div>
        <button id="sort-by-date-button" type="button">Sort by Date</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
