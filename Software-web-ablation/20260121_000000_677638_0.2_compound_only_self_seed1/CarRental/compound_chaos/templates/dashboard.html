<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Rental Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Car Rental Dashboard</h1>
        <div id="featured-vehicles">
            {% for vehicle in featured_vehicles %}
            <div id="vehicle-{{ vehicle.vehicle_id }}" class="vehicle-card">
                <h2>{{ vehicle.make }} {{ vehicle.model }}</h2>
                <p>Type: {{ vehicle.vehicle_type }}</p>
                <p>Daily Rate: ${{ vehicle.daily_rate }}</p>
            </div>
            {% endfor %}
        </div>

        <button id="search-vehicles-button" onclick="location.href='{{ url_for('search_vehicles_page') }}'">Search Vehicles</button>
        <button id="my-reservations-button" onclick="location.href='{{ url_for('reservation_management_page') }}'">My Reservations</button>

        <div id="promotions-section">
            {% for promo in promotions %}
            <div class="promotion-item" id="promotion-{{ promo.id }}">
                <h3>{{ promo.title }}</h3>
                <p>{{ promo.description }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
