<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real Estate Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Real Estate Dashboard</h1>
        <div id="featured-properties">
            {% for property in featured_properties %}
            <div class="featured-property">
                <img src="{{ property.image_url }}" alt="Image of {{ property.address }}">
                <h2>{{ property.address }}</h2>
                <p>Price: ${{ "{:,}"|format(property.price) }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="browse-properties-button" onclick="window.location.href='{{ url_for('property_search') }}'">Browse Properties</button>
        <button id="my-inquiries-button" onclick="window.location.href='{{ url_for('my_inquiries') }}'">My Inquiries</button>
        <button id="my-favorites-button" onclick="window.location.href='{{ url_for('my_favorites') }}'">My Favorites</button>
    </div>
</body>
</html>
