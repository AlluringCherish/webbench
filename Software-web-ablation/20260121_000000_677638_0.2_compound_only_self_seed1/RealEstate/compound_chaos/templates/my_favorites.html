<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorite Properties</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorite Properties</h1>
        <div id="favorites-list">
            {% for property in favorite_properties %}
            <div class="favorite-property">
                <img src="{{ property.image_url }}" alt="Image of {{ property.address }}">
                <h2>{{ property.address }}</h2>
                <p>Price: ${{ "{:,}"|format(property.price) }}</p>
                <button id="view-property-button-{{ property.property_id }}" onclick="window.location.href='{{ url_for('property_details', property_id=property.property_id) }}'">View Details</button>
                <form method="post" action="{{ url_for('remove_from_favorites', property_id=property.property_id) }}">
                    <button type="submit" id="remove-from-favorites-button-{{ property.property_id }}">Remove from Favorites</button>
                </form>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
