<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}OnlineAuction{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1 id="app-title">OnlineAuction</h1>
        <nav>
            <ul>
                <li><a href="/{{ url_for('index') }}" id="nav-home">Home</a></li>
                <li><a href="/{{ url_for('login') }}" id="nav-login">Login</a></li>
                <li><a href="/{{ url_for('register') }}" id="nav-register">Register</a></li>
                <li><a href="/{{ url_for('logout') }}" id="nav-logout">Logout</a></li>
                <li><a href="/{{ url_for('create_auction') }}" id="nav-create">Create Auction</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2024 OnlineAuction</p>
    </footer>
</body>
</html>
