{% extends 'layout.html' %}

{% block title %}Create Auction - OnlineAuction{% endblock %}

{% block content %}
<h2 id="page-title">Create Auction</h2>
<form method="post" action="{{ url_for('create_auction') }}" id="create-auction-form">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" required>

    <label for="description">Description:</label>
    <textarea id="description" name="description" required></textarea>

    <label for="starting-bid">Starting Bid:</label>
    <input type="number" id="starting-bid" name="starting_bid" min="1" required>

    <button type="submit" id="create-auction-button">Create Auction</button>
</form>
{% endblock %}
