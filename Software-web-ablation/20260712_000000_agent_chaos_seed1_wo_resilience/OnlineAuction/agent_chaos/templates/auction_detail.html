{% extends 'layout.html' %}

{% block title %}Auction Detail - {{ auction.title }}{% endblock %}

{% block content %}
<h2 id="page-title">{{ auction.title }}</h2>
<p id="auction-description">{{ auction.description }}</p>
<p id="auction-status">Status: {{ auction.status }}</p>
<p id="auction-current-bid">Current Bid: {{ auction.current_bid }}</p>
<form method="post" action="{{ url_for('place_bid', auction_id=auction.id) }}" id="bid-form">
    <label for="bid-amount">Your Bid:</label>
    <input type="number" id="bid-amount" name="bid_amount" min="1" required>
    <button type="submit" id="place-bid-button">Place Bid</button>
</form>
{% endblock %}
