<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery Dashboard</title>
</head>
<body>
<div id="dashboard-page">
    <h1>Food Delivery Dashboard</h1>
    <div id="featured-restaurants">
        <h2>Featured Restaurants</h2>
        <ul>
            {% for restaurant in featured_restaurants %}
            <li>{{ restaurant.name }} - Rating: {{ restaurant.rating }} - Cuisine: {{ restaurant.cuisine }}</li>
            {% endfor %}
        </ul>
    </div>
    <button id="browse-restaurants-button" onclick="window.location.href='{{ url_for('restaurants_page') }}'">Browse Restaurants</button>
    <button id="view-cart-button" onclick="window.location.href='{{ url_for('cart_page') }}'">View Cart</button>
    <button id="active-orders-button" onclick="window.location.href='{{ url_for('active_orders') }}'">Active Orders</button>
</div>
</body>
</html>
