<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write a Review</title>
</head>
<body>
<div id="write-review-page">
    <h1>Write a Review</h1>
    {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    <form method="POST">
        <label for="customer-name">Name:</label>
        <input id="customer-name" name="customer_name" type="text" required><br>
        <label for="restaurant-id">Restaurant:</label>
        <select id="restaurant-id" name="restaurant_id" required>
            <option value="">Select a restaurant</option>
            {% for restaurant in restaurants %}
            <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
            {% endfor %}
        </select><br>
        <label for="rating">Rating:</label>
        <select id="rating" name="rating" required>
            <option value="">Select rating</option>
            <option value="5">5</option>
            <option value="4">4</option>
            <option value="3">3</option>
            <option value="2">2</option>
            <option value="1">1</option>
        </select><br>
        <label for="review-text">Review:</label>
        <textarea id="review-text" name="review_text" required></textarea><br>
        <button type="submit">Submit Review</button>
    </form>
</div>
</body>
</html>
