<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
<div id="checkout-page">
    <h1>Checkout</h1>
    {% if error %}<p style="color: red;">{{ error }}</p>{% endif %}
    <form method="POST">
        <label for="customer-name">Name:</label>
        <input id="customer-name" name="customer_name" type="text" required><br>
        <label for="delivery-address">Delivery Address:</label>
        <textarea id="delivery-address" name="delivery_address" required></textarea><br>
        <label for="phone-number">Phone Number:</label>
        <input id="phone-number" name="phone_number" type="text" required><br>
        <label for="payment-method">Payment Method:</label>
        <select id="payment-method" name="payment_method" required>
            <option value="">Select</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Cash">Cash</option>
            <option value="PayPal">PayPal</option>
        </select><br>
        <button id="place-order-button" type="submit">Place Order</button>
    </form>
</div>
</body>
</html>
