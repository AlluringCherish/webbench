<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
<div id="reviews-page">
    <h1>Order Reviews</h1>
    <label for="filter-by-rating">Filter by Rating:</label>
    <select id="filter-by-rating" onchange="location.href='?rating=' + this.value">
        <option value="All" {% if filter_rating == 'All' %}selected{% endif %}>All</option>
        <option value="5" {% if filter_rating == '5' %}selected{% endif %}>5 stars</option>
        <option value="4" {% if filter_rating == '4' %}selected{% endif %}>4 stars</option>
        <option value="3" {% if filter_rating == '3' %}selected{% endif %}>3 stars</option>
        <option value="2" {% if filter_rating == '2' %}selected{% endif %}>2 stars</option>
        <option value="1" {% if filter_rating == '1' %}selected{% endif %}>1 star</option>
    </select>
    <div id="reviews-list">
        {% for review in reviews %}
        <div class="review-entry">
            <p><strong>{{ review.restaurant_name }}</strong></p>
            <p>Rating: {{ review.rating }}</p>
            <p>{{ review.review_text }}</p>
        </div>
        {% else %}
        <p>No reviews found.</p>
        {% endfor %}
    </div>
    <button id="write-review-button" onclick="window.location.href='{{ url_for('write_review') }}'">Write a Review</button>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
