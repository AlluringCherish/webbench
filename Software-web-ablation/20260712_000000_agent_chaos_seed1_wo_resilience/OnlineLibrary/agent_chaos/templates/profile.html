<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
</head>
<body>
    <h1>User Profile</h1>
    <p><a href="{{ url_for('dashboard') }}">Dashboard</a> | <a href="{{ url_for('edit_profile') }}">Edit Profile</a> | <a href="{{ url_for('logout') }}">Logout</a></p>

    <ul>
        <li>Username: {{ user.username }}</li>
        <li>Full Name: {{ user.full_name }}</li>
        <li>Email: {{ user.email }}</li>
        <li>Phone: {{ user.phone }}</li>
    </ul>
</body>
</html>
