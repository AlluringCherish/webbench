{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<h2>Dashboard</h2>
<table border="1">
    <thead>
        <tr>
            <th>ID</th><th>Title</th><th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for article in articles %}
        <tr>
            <td>{{ article.id }}</td>
            <td>{{ article.title }}</td>
            <td>{{ article.status }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
