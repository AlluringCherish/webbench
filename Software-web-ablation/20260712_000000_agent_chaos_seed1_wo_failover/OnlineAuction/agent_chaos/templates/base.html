<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OnlineAuction{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a id="nav-home" href="{{ url_for('home') }}">Home</a></li>
                <li><a id="nav-auctions" href="{{ url_for('auctions') }}">Auctions</a></li>
                <li><a id="nav-login" href="{{ url_for('login') }}">Login</a></li>
                <li><a id="nav-register" href="{{ url_for('register') }}">Register</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2024 OnlineAuction</p>
    </footer>
</body>
</html>
