<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
    <div id="checkout-page">
        <h1>Checkout</h1>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="post">
            <label for="customer-name">Name:</label><br>
            <input id="customer-name" name="customer-name" type="text" required><br>

            <label for="delivery-address">Delivery Address:</label><br>
            <textarea id="delivery-address" name="delivery-address" required></textarea><br>

            <label for="phone-number">Phone Number:</label><br>
            <input id="phone-number" name="phone-number" type="text" required><br>

            <label for="payment-method">Payment Method:</label><br>
            <select id="payment-method" name="payment-method" required>
                <option value="Credit Card">Credit Card</option>
                <option value="Cash">Cash</option>
                <option value="PayPal">PayPal</option>
            </select><br><br>

            <button id="place-order-button" type="submit">Place Order</button>
        </form>

        <h2>Order Summary</h2>
        <ul>
            {% for item in cart_items %}
            <li>{{ item.item_name }} x {{ item.quantity }}: ${{ item.subtotal }}</li>
            {% endfor %}
        </ul>
        <p>Total: ${{ total_amount }}</p>
    </div>
</body>
</html>
