<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>
        <form method="post">
            <table id="cart-items-table">
                <thead>
                    <tr>
                        <th>Item Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Remove</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in cart_items %}
                    <tr>
                        <td>{{ item.item_name }}</td>
                        <td><input id="update-quantity-{{ item.item_id }}" name="update-quantity-{{ item.item_id }}" type="number" value="{{ item.quantity }}" min="1"></td>
                        <td>${{ item.price }}</td>
                        <td>${{ item.subtotal }}</td>
                        <td><button type="submit" id="remove-item-button-{{ item.item_id }}" name="remove-item-button-{{ item.item_id }}">Remove</button></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="5">Your cart is empty.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
            <div id="total-amount">Total: ${{ total_amount }}</div>
            <button id="proceed-checkout-button" type="button" onclick="location.href='{{ url_for('checkout') }}'">Proceed to Checkout</button>
        </form>
    </div>
</body>
</html>
