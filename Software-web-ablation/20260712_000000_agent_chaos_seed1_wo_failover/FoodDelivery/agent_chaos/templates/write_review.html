<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review for {{ restaurant.name }}</h1>

        {% if error %}
        <p style="color:red;">{{ error }}</p>
        {% endif %}

        <form method="post">
            <label for="customer-name">Name:</label><br>
            <input id="customer-name" name="customer-name" type="text" required><br>

            <label for="rating">Rating:</label><br>
            <select id="rating" name="rating" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select><br>

            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review-text" required></textarea><br><br>

            <button type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
