<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <h1>Active Orders</h1>

        <label for="status-filter">Filter by Status:</label>
        <select id="status-filter" onchange="location.href='?status=' + this.value">
            {% for status in statuses %}
            <option value="{{ status }}" {% if status == selected_status %}selected{% endif %}>{{ status }}</option>
            {% endfor %}
        </select>

        <div id="orders-list">
            {% for order in orders %}
            <div class="order-card">
                <h3>Order #{{ order.order_id }} - {{ order.restaurant_name }}</h3>
                <p>Status: {{ order.status }}</p>
                <p>ETA: {{ order.estimated_time }}</p>
                <button id="track-order-button-{{ order.order_id }}" onclick="location.href='{{ url_for('track_order', order_id=order.order_id) }}'">Track Order</button>
            </div>
            {% else %}
            <p>No active orders found.</p>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
