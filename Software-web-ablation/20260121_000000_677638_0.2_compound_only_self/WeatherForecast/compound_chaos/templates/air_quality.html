<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
    <div id="air-quality-page">
        <h1>Air Quality Index</h1>
        <form method="POST">
            <label for="location-aqi-filter">Select Location:</label>
            <select id="location-aqi-filter" name="selected_location_id" onchange="this.form.submit()">
                <option value="" {% if selected_location_id is none %}selected{% endif %}>All Locations</option>
                {% for location in locations %}
                    <option value="{{ location.location_id }}" {% if selected_location_id == location.location_id %}selected{% endif %}>{{ location.location_name }}</option>
                {% endfor %}
            </select>
        </form>

        <div id="aqi-display">AQI Index: {{ aqi_data.aqi_index }}</div>
        <div id="aqi-description">{{ aqi_data.aqi_description }}</div>

        <table id="pollution-details" border="1">
            <thead>
                <tr><th>Pollutant</th><th>Value</th></tr>
            </thead>
            <tbody>
                <tr><td>PM2.5</td><td>{{ aqi_data.pm25 }}</td></tr>
                <tr><td>PM10</td><td>{{ aqi_data.pm10 }}</td></tr>
                <tr><td>NO2</td><td>{{ aqi_data.no2 }}</td></tr>
                <tr><td>O3</td><td>{{ aqi_data.o3 }}</td></tr>
            </tbody>
        </table>

        <div id="health-recommendation">{{ health_recommendation }}</div>
    </div>
</body>
</html>
