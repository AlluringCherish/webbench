<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>
        <form method="POST">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                {% for unit in temperature_units %}
                    <option value="{{ unit }}" {% if selected_unit == unit %}selected{% endif %}>{{ unit }}</option>
                {% endfor %}
            </select>
            <br/><br/>
            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                <option value="" {% if default_location_id is none %}selected{% endif %}>None</option>
                {% for location in saved_locations %}
                    <option value="{{ location.location_id }}" {% if default_location_id == location.location_id %}selected{% endif %}>{{ location.location_name }}</option>
                {% endfor %}
            </select>
            <br/><br/>
            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input type="checkbox" id="alert-notifications-toggle" name="alert_notifications_enabled" value="true" {% if alert_notifications_enabled %}checked{% endif %} />
            <br/><br/>
            <button type="submit" id="save-settings-button">Save Changes</button>
            <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        </form>
    </div>
</body>
</html>
