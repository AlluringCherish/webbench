<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Weather Dashboard</h1>
        <div id="current-weather-summary">
            <p><strong>Location:</strong> {{ current_weather.location_name }}</p>
            <p><strong>Temperature:</strong> {{ current_weather.temperature }}</p>
            <p><strong>Condition:</strong> {{ current_weather.condition }}</p>
            <p><strong>Humidity:</strong> {{ current_weather.humidity }}%</p>
            <p><strong>Wind Speed:</strong> {{ current_weather.wind_speed }}</p>
            <p><small>Last Updated: {{ current_weather.last_updated }}</small></p>
        </div>
        <a href="{{ url_for('location_search') }}"><button id="search-location-button">Search Location</button></a>
        <a href="{{ url_for('weekly_forecast') }}"><button id="view-forecast-button">View Weekly Forecast</button></a>
        <a href="{{ url_for('weather_alerts') }}"><button id="view-alerts-button">View Weather Alerts</button></a>
    </div>
</body>
</html>
