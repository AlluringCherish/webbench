<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
</head>
<body>
    <div id="menu-page">
        <h1>Restaurant Menu</h1>

        <div id="menu-grid">
            {% for category in menu_categories %}
                <h2>{{ category }}</h2>
                <div class="category-items">
                    {% for dish in menu_items %}
                        {% if dish.category == category %}
                            <div class="dish-card">
                                <h3>{{ dish.name }}</h3>
                                <p>{{ dish.description }}</p>
                                <p>Price: ${{ "%.2f" | format(dish.price) }}</p>
                                <button id="view-dish-button-{{ dish.dish_id }}" onclick="location.href='{{ url_for('dish_details', dish_id=dish.dish_id) }}'">View Details</button>
                            </div>
                        {% endif %}
                    {% endfor %}
                </div>
            {% endfor %}
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
