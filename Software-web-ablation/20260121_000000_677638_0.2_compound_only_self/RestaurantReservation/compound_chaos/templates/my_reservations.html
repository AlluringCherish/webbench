<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reservations</title>
</head>
<body>
    <div id="my-reservations-page">
        <h1>My Reservations</h1>

        <form method="post" action="{{ url_for('my_reservations') }}">
            <table id="reservations-table" border="1">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Party Size</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for reservation in reservations %}
                    <tr>
                        <td>{{ reservation.date }}</td>
                        <td>{{ reservation.time }}</td>
                        <td>{{ reservation.party_size }}</td>
                        <td>{{ reservation.status }}</td>
                        <td>
                            {% if reservation.status == 'Upcoming' %}
                            <button type="submit" name="cancel_reservation_id" value="{{ reservation.reservation_id }}" id="cancel-reservation-button-{{ reservation.reservation_id }}">Cancel</button>
                            {% else %}
                            -
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
