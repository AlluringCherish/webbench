<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Details</title>
</head>
<body>
  <div id="course-details-page">
    <h1 id="course-title">{{ course.title }}</h1>
    <p id="course-description">{{ course.description }}</p>
    <p>Category: {{ course.category }}</p>
    <p>Level: {{ course.level }}</p>
    <p>Duration: {{ course.duration }}</p>
    <p>Status: {{ course.status }}</p>
    <form action="{{ url_for('course_details', course_id=course.course_id) }}" method="POST">
      <button type="submit" id="enroll-button" {% if already_enrolled %}disabled{% endif %}>Enroll</button>
    </form>
    <nav id="navigation">
      <a href="{{ url_for('course_catalog') }}" id="back-to-catalog">Back to Catalog</a>
    </nav>
  </div>
</body>
</html>
