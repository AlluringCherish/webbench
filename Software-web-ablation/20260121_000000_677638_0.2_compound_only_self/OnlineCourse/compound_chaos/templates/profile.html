<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
</head>
<body>
  <div id="profile-page">
    <h1>My Profile</h1>
    <form method="POST" action="{{ url_for('profile') }}">
      <label for="profile-email">Email:</label><br>
      <input type="email" id="profile-email" name="email" value="{{ user_profile.email }}" required><br>
      <label for="profile-fullname">Full Name:</label><br>
      <input type="text" id="profile-fullname" name="fullname" value="{{ user_profile.fullname }}" required><br>
      <button id="update-profile-button" type="submit">Update Profile</button>
    </form>
    <nav>
      <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    {% if update_status %}
    <p id="update-status">{{ update_status }}</p>
    {% endif %}
  </div>
</body>
</html>
