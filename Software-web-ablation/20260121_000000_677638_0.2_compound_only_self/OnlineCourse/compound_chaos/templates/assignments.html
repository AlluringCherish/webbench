<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Assignments</title>
</head>
<body>
  <div id="assignments-page">
    <h1>My Assignments</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <table id="assignments-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Due Date</th>
          <th>Description</th>
          <th>Max Points</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for assignment in assignments %}
        <tr id="assignment-{{ assignment.assignment_id }}">
          <td>{{ assignment.title }}</td>
          <td>{{ assignment.due_date }}</td>
          <td>{{ assignment.description }}</td>
          <td>{{ assignment.max_points }}</td>
          <td><button id="submit-assignment-button-{{ assignment.assignment_id }}" onclick="location.href='{{ url_for('submit_assignment', assignment_id=assignment.assignment_id) }}'">Submit</button></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</body>
</html>
