<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Learning</title>
</head>
<body>
  <div id="learning-page">
    <h1>{{ course.title }}</h1>
    <nav>
      <a href="{{ url_for('my_courses') }}" id="back-to-my-courses">Back to My Courses</a>
    </nav>
    <section id="lessons-list">
      <ul>
      {% for lesson in lessons %}
        <li id="lesson-{{ lesson.lesson_number }}">{{ lesson.title }}</li>
      {% endfor %}
      </ul>
    </section>
    <section id="lesson-content">
      <h2>{{ current_lesson.title }}</h2>
      <p>{{ current_lesson.content }}</p>
    </section>
    <form action="{{ url_for('course_learning', course_id=course.course_id) }}" method="POST">
      <button id="mark-complete-button" type="submit" {% if not can_mark_complete %}disabled{% endif %}>Mark Complete</button>
    </form>
  </div>
</body>
</html>
