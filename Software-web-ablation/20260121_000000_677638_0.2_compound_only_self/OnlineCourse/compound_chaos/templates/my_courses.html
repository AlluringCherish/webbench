<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Courses</title>
</head>
<body>
  <div id="my-courses-page">
    <h1>My Courses</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <section id="courses-list">
      {% for course in enrolled_courses %}
      <div class="course-entry">
        <h2>{{ course.title }}</h2>
        <button id="continue-learning-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_learning', course_id=course.course_id) }}'">Continue Learning</button>
      </div>
      {% endfor %}
    </section>
  </div>
</body>
</html>
