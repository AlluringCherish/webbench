<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Courses</title>
</head>
<body>
  <div id="catalog-page">
    <h1>Available Courses</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <input type="text" id="search-input" name="search_query" value="{{ search_query | default('') }}" placeholder="Search courses..." />
    <section id="course-grid">
      {% for course in courses %}
      <div id="course-{{ course.course_id }}" class="course-entry">
        <h2 id="course-title">{{ course.title }}</h2>
        <p id="course-description">{{ course.description }}</p>
        <p>Category: {{ course.category }}</p>
        <p>Level: {{ course.level }}</p>
        <p>Duration: {{ course.duration }}</p>
        <p>Status: {{ course.status }}</p>
        <button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Course</button>
      </div>
      {% endfor %}
    </section>
  </div>
</body>
</html>
