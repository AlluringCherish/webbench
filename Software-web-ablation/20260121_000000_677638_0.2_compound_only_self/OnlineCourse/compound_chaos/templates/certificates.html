<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Certificates</title>
</head>
<body>
  <div id="certificates-page">
    <h1>My Certificates</h1>
    <nav>
      <a href="{{ url_for('dashboard') }}" id="back-to-dashboard">Back to Dashboard</a>
    </nav>
    <section id="certificates-grid">
      <ul>
        {% for certificate in certificates %}
          <li id="certificate-{{ certificate.certificate_id }}">Course ID: {{ certificate.course_id }}, Issued on {{ certificate.issue_date }}</li>
        {% endfor %}
      </ul>
    </section>
  </div>
</body>
</html>
