<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Learning Dashboard</title>
</head>
<body>
  <div id="dashboard-page">
    <h1 id="welcome-message">Welcome, {{ fullname }}</h1>
    <nav id="navigation">
      <a href="{{ url_for('course_catalog') }}" id="browse-courses-button">Browse Courses</a>
      <a href="{{ url_for('my_courses') }}" id="my-courses-button">My Courses</a>
    </nav>
    <section id="enrolled-courses">
      <ul>
      {% for course in enrolled_courses %}
        <li id="course-{{ course.course_id }}">{{ course.title }} - Progress: {{ course.progress }}%</li>
      {% endfor %}
      </ul>
    </section>
  </div>
</body>
</html>
