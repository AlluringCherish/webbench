<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Write Review</title>
</head>
<body>
<div id="write-review-page">
<h1>Write Review for {{ book.title }}</h1>
<form method="POST">
    <label for="rating-input">Rating:</label>
    <select id="rating-input" name="rating">
        {% for i in range(1, 6) %}
        <option value="{{ i }}" {% if existing_review and existing_review.rating == i %}selected{% endif %}>{{ i }}</option>
        {% endfor %}
    </select>
    <br>
    <label for="review-text">Review:</label>
    <textarea id="review-text" name="review_text" required>{% if existing_review %}{{ existing_review.review_text }}{% endif %}</textarea>
    <br>
    <button type="submit">Submit</button>
</form>
<button onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">Back to Book</button>
</div>
</body>
</html>
