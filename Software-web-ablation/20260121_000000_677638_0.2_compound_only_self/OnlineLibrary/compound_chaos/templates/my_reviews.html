<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Reviews</title>
</head>
<body>
<div id="reviews-page">
<h1>My Reviews</h1>
<div id="reviews-list">
{% for review in reviews %}
<div class="review-item">
    <p><strong>Book Title:</strong> {{ review.book_title }}</p>
    <p><strong>Rating:</strong> {{ review.rating }}/5</p>
    <p><strong>Date:</strong> {{ review.review_date }}</p>
    <p><strong>Review:</strong> {{ review.review_text }}</p>
</div>
{% endfor %}
</div>
<button onclick="location.href='{{ url_for('dashboard_page') }}'">Back</button>
</body>
</html>
