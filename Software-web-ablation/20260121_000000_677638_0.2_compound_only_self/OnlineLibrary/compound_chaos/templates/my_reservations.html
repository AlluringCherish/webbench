<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Reservations</title>
</head>
<body>
<div id="my-reservations-page">
<h1>My Reservations</h1>
<table border="1">
    <thead>
    <tr>
        <th>Book Title</th>
        <th>Reservation Date</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    {% for reservation in reservations %}
    <tr>
        <td>{{ reservation.book_title }}</td>
        <td>{{ reservation.reservation_date }}</td>
        <td>{{ reservation.status }}</td>
        <td>
        {% if reservation.status == 'Active' %}
            <form action="{{ url_for('cancel_reservation', reservation_id=reservation.reservation_id) }}" method="post">
                <button type="submit">Cancel</button>
            </form>
        {% else %}
            No actions
        {% endif %}
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
<button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back</button>
</div>
</body>
</html>
