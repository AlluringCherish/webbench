<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Borrow Confirmation</title>
</head>
<body>
    <h1>Borrow Confirmation</h1>
    <p>Title: {{ book.title }}</p>
    <p>Author: {{ book.author }}</p>
    <p>Due {{ due_date }}</p>
    <form method="POST">
        <button type="submit">Confirm Borrow</button>
        <button type="button" onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">Cancel</button>
    </form>
</body>
</html>
