<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog</title>
</head>
<body>
<div id="catalog-page">
    <h1>Book Catalog</h1>

    {% for book in books %}
    <div class="book-item">
        <h2>{{ book.title }}</h2>
        <p><strong>Author:</strong> {{ book.author }}</p>
        <p><strong>ISBN:</strong> {{ book.isbn }}</p>
        <p><strong>Genre:</strong> {{ book.genre }}</p>
        <p><strong>Publisher:</strong> {{ book.publisher }}</p>
        <p><strong>Year:</strong> {{ book.year }}</p>
        <p><strong>Description:</strong> {{ book.description }}</p>
        <p><strong>Status:</strong> {{ book.status }}</p>
        <p><strong>Rating:</strong> {{ book.avg_rating }}</p>
        <button onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
    </div>
    {% endfor %}

    <button onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
