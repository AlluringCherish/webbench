<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
</head>
<body>
    <div id="bookings-page">
        <h1>My Bookings</h1>
        <input id="booking-search-input" type="text" placeholder="Search Bookings...">
        <table id="bookings-table">
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Event Name</th>
                    <th>Ticket Type</th>
                    <th>Ticket Count</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr id="booking-{{ booking.booking_id }}">
                    <td>{{ booking.booking_id }}</td>
                    <td>{{ booking.event_name }}</td>
                    <td>{{ booking.ticket_type }}</td>
                    <td>{{ booking.ticket_count }}</td>
                    <td>${{ booking.total_amount }}</td>
                    <td id="booking-status-{{ booking.booking_id }}">{{ booking.status }}</td>
                    <td>
                        <form method="POST" action="{{ url_for('cancel_booking', booking_id=booking.booking_id) }}">
                            <button id="cancel-booking-button-{{ booking.booking_id }}" type="submit">Cancel</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
