<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events Catalog</title>
</head>
<body>
    <div id="events-page">
        <h1>Events Catalog</h1>
        <input id="event-search-input" type="text" placeholder="Search events..." name="search">
        <select id="event-category-filter" name="category">
            <option value="">All Categories</option>
            {% for category in categories %}
            <option value="{{ category }}">{{ category }}</option>
            {% endfor %}
        </select>
        <div id="events-grid">
            {% for event in events %}
            <div class="event-card" id="event-{{ event.event_id }}">
                <h2 id="event-title-{{ event.event_id }}">{{ event.event_name }}</h2>
                <p id="event-description-{{ event.event_id }}">{{ event.description }}</p>
                <p id="event-date-{{ event.event_id }}">{{ event.date }}</p>
                <p id="event-location-{{ event.event_id }}">{{ event.location }}</p>
                <button id="view-event-button-{{ event.event_id }}" onclick="location.href='{{ url_for('event_details', event_id=event.event_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
