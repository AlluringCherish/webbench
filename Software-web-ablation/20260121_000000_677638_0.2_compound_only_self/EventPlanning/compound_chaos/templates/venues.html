<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <input id="venue-search-input" type="text" placeholder="Search Venues..." name="search">
        <select id="venue-capacity-filter" name="capacity">
            <option value="">All Capacities</option>
        </select>
        <div id="venues-grid">
            {% for venue in venues %}
            <div class="venue-card" id="venue-{{ venue.venue_id }}">
                <h2 id="venue-name-{{ venue.venue_id }}">{{ venue.venue_name }}</h2>
                <p id="venue-location-{{ venue.venue_id }}">{{ venue.location }}</p>
                <p id="venue-capacity-{{ venue.venue_id }}">{{ venue.capacity }}</p>
                <p id="venue-amenities-{{ venue.venue_id }}">{{ venue.amenities }}</p>
                <button id="view-venue-details-{{ venue.venue_id }}" onclick="location.href='{{ url_for('venue_details', venue_id=venue.venue_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
