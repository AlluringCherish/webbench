<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Schedules</title>
</head>
<body>
    <div id="schedules-page">
        <h1>Event Schedules</h1>
        <input id="schedule-filter-date" type="date" name="filter_date">
        <select id="schedule-filter-event" name="filter_event">
            <option value="">All Events</option>
            {% for event in events %}
            <option value="{{ event.event_id }}">{{ event.event_name }}</option>
            {% endfor %}
        </select>
        <div id="schedules-timeline">
            {% for schedule in schedules %}
            <div class="schedule-item" id="schedule-{{ schedule.schedule_id }}">
                <p id="session-title-{{ schedule.schedule_id }}">{{ schedule.session_title }}</p>
                <p id="session-time-{{ schedule.schedule_id }}">{{ schedule.session_time }}</p>
                <p id="duration-{{ schedule.schedule_id }}">Duration: {{ schedule.duration_minutes }} minutes</p>
                <p id="speaker-{{ schedule.schedule_id }}">Speaker: {{ schedule.speaker }}</p>
                <p id="schedule-venue-{{ schedule.schedule_id }}">Venue ID: {{ schedule.venue_id }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="export-schedule-button">Export Schedule</button>
    </div>
</body>
</html>
