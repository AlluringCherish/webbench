<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <h1>Booking Confirmation</h1>
    <p id="confirmation-message">{{ confirmation }}</p>
    <div id="booking-details">
        <p id="event-name">Event: {{ booking.event_name }}</p>
        <p id="ticket-type">Ticket Type: {{ booking.ticket_type }}</p>
        <p id="ticket-count">Number of Tickets: {{ booking.ticket_count }}</p>
        <p id="total-amount">Total Amount: ${{ booking.total_amount }}</p>
        <p id="booking-status">Status: {{ booking.status }}</p>
    </div>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</body>
</html>
