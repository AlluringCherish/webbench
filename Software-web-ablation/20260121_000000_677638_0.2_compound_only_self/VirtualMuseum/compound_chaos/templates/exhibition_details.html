<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Exhibition Details</title>
</head>
<body>
    <div id="exhibition-details-page">
        <h1 id="exhibition-title">{{ exhibition.title }}</h1>
        <div id="exhibition-description">
            <p>{{ exhibition.description }}</p>
        </div>
        <div id="exhibition-dates">
            <p>Start Date: {{ exhibition.start_date }}</p>
            <p>End Date: {{ exhibition.end_date }}</p>
        </div>
        <div id="exhibition-artifacts">
            <h2>Artifacts in this Exhibition</h2>
            <ul>
                {% for artifact in artifacts %}
                <li>{{ artifact.artifact_name }} (ID: {{ artifact.artifact_id }})</li>
                {% endfor %}
            </ul>
        </div>

        <button id="back-to-exhibitions" onclick="location.href='{{ url_for('exhibitions') }}'">Back to Exhibitions</button>
    </div>
</body>
</html>
