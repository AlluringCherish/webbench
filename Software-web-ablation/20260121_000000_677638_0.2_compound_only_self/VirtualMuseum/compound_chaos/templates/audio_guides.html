<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Guides</title>
</head>
<body>
    <div id="audio-guides-page">
        <h1>Audio Guides</h1>

        <form method="GET" action="">
            <label for="filter-language">Filter by Language:</label>
            <select id="filter-language" name="filter_language">
                <option value="" {% if filter_language == "" %}selected{% endif %}>All</option>
                {% set languages = audio_guides|map(attribute='language')|unique|list %}
                {% for lang in languages %}
                <option value="{{ lang }}" {% if filter_language == lang %}selected{% endif %}>{{ lang }}</option>
                {% endfor %}
            </select>
            <button type="submit" id="apply-language-filter">Apply Filter</button>
        </form>

        <div id="audio-guide-list">
            <ul>
                {% for guide in audio_guides %}
                <li>
                    <span>{{ guide.title }} ({{ guide.language }}, Duration: {{ guide.duration }} mins)</span>
                    <button id="play-guide-button-{{ guide.guide_id }}">Play Guide</button>
                </li>
                {% endfor %}
            </ul>
        </div>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
