<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>
        <input type="text" id="search-company-input" name="search" placeholder="Search companies...">
        <div id="companies-list">
            {% for company in companies %}
            <div class="company-card">
                <h3>{{ company.company_name }}</h3>
                <p>Industry: {{ company.industry }}</p>
                <p>Employees: {{ company.employee_count }}</p>
                <button id="view-company-button-{{ company.company_id }}" onclick="window.location.href='{{ url_for('company_profile', company_id=company.company_id) }}'">View Profile</button>
            </div>
            {% else %}
            <p>No companies found.</p>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
