<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
    <div id="listings-page">
        <h1>Job Listings</h1>
        <form method="GET" action="" id="filter-form">
            <input type="text" id="search-input" name="search" placeholder="Search jobs..." value="{{ request.args.get('search', '') }}">
            <select id="category-filter" name="category">
                <option value="">-- Select Category --</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if cat == request.args.get('category', '') %}selected{% endif %}>{{ cat }}</option>
                {% endfor %}
            </select>
            <select id="location-filter" name="location">
                <option value="">-- Select Location --</option>
                {% for loc in locations %}
                <option value="{{ loc }}" {% if loc == request.args.get('location', '') %}selected{% endif %}>{{ loc }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="jobs-grid">
            {% for job in jobs %}
            <div class="job-card">
                <h3>{{ job.title }}</h3>
                <p>{{ job.company }} - {{ job.location }}</p>
                <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
                <button id="view-job-button-{{ job.job_id }}" onclick="window.location.href='{{ url_for('job_details', job_id=job.job_id) }}'">View Job Details</button>
            </div>
            {% else %}
            <p>No jobs found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
