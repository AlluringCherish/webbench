<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Board Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Job Board Dashboard</h1>
        <div id="featured-jobs">
            {% for job in featured_jobs %}
            <div class="featured-job-card">
                <h3>{{ job.title }}</h3>
                <p>{{ job.company_name }} - {{ job.location }}</p>
                <p>Salary: ${{ job.salary_min }} - ${{ job.salary_max }}</p>
            </div>
            {% else %}
            <p>No featured jobs available.</p>
            {% endfor %}
        </div>

        <button id="browse-jobs-button" onclick="window.location.href='{{ url_for('job_listings') }}'">Browse Jobs</button>
        <button id="my-applications-button" onclick="window.location.href='{{ url_for('application_tracking') }}'">My Applications</button>
        <button id="companies-button" onclick="window.location.href='{{ url_for('companies_directory') }}'">Companies</button>
    </div>
</body>
</html>
