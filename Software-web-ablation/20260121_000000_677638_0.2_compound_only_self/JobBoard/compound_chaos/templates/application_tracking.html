<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>
        <label for="status-filter">Filter by Status:</label>
        <select id="status-filter" name="status">
            <option value="">-- All Statuses --</option>
        </select>
        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Date Applied</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr>
                    <td>{{ app.job_title }}</td>
                    <td>{{ app.company }}</td>
                    <td>{{ app.status }}</td>
                    <td>{{ app.applied_date }}</td>
                    <td><button id="view-application-button-{{ app.application_id }}" onclick="window.location.href='{{ url_for('application_detail', application_id=app.application_id) }}'">View Details</button></td>
                </tr>
                {% else %}
                <tr><td colspan="5">No applications found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
