<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Application</title>
</head>
<body>
    <div id="application-form-page">
        <h1>Submit Application</h1>
        {% if error %}
        <p style="color:red;" id="error-message">{{ error }}</p>
        {% endif %}
        <form method="POST" enctype="multipart/form-data" action="">
            <label for="applicant-name">Name:</label>
            <input type="text" id="applicant-name" name="applicant_name" required>

            <label for="applicant-email">Email:</label>
            <input type="email" id="applicant-email" name="applicant_email" required>

            <label for="resume-upload">Resume Upload:</label>
            <input type="file" id="resume-upload" name="resume_upload" required>

            <label for="cover-letter">Cover Letter:</label>
            <textarea id="cover-letter" name="cover_letter" required></textarea>

            <button type="submit" id="submit-application-button">Submit Application</button>
        </form>
    </div>
</body>
</html>
