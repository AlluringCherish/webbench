<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Active Orders</title>
</head>
<body>
    <div id="active-orders-page">
        <h1>Active Orders</h1>
        <label for="status-filter">Filter by Status:</label>
        <select id="status-filter" name="status_filter">
            <option value="">All</option>
            <option value="Pending" {% if status_filter == 'Pending' %}selected{% endif %}>Pending</option>
            <option value="On the Way" {% if status_filter == 'On the Way' %}selected{% endif %}>On the Way</option>
            <option value="Delivered" {% if status_filter == 'Delivered' %}selected{% endif %}>Delivered</option>
        </select>
        <div id="orders-list">
            {% for order in active_orders %}
                <div class="order-card">
                    <p>Order ID: {{ order.order_id }}</p>
                    <p>Customer: {{ order.customer_name }}</p>
                    <p>Status: {{ order.status }}</p>
                    <a href="{{ url_for('track_order', order_id=order.order_id) }}">
                        <button id="track-order-button-{{ order.order_id }}">Track Order</button>
                    </a>
                </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('show_dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
