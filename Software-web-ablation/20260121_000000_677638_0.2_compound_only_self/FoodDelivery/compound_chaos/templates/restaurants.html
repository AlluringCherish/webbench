<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse Restaurants</title>
</head>
<body>
    <div id="restaurants-page">
        <h1>Browse Restaurants</h1>
        <input type="text" id="search-input" name="search_query" value="{{ search_query }}" placeholder="Search restaurants...">
        <select id="cuisine-filter" name="cuisine_filter">
            <option value="">All Cuisines</option>
            {% for cuisine in ['Chinese', 'Italian', 'Indian', 'Mexican', 'American', 'Thai', 'Japanese', 'French'] %}
                <option value="{{ cuisine }}" {% if cuisine == cuisine_filter %}selected{% endif %}>{{ cuisine }}</option>
            {% endfor %}
        </select>
        <div id="restaurants-grid">
            {% for restaurant in restaurants %}
                <div class="restaurant-card">
                    <h3>{{ restaurant.name }}</h3>
                    <p>Cuisine: {{ restaurant.cuisine }}</p>
                    <p>Rating: {{ restaurant.rating }}</p>
                    <a href="{{ url_for('show_menu', restaurant_id=restaurant.restaurant_id) }}">
                        <button id="view-restaurant-button-{{ restaurant.restaurant_id }}">View Menu</button>
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
