<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="main-container">
        <div id="write-review-page">
            <h1>Write Review</h1>
            <form method="POST" action="{{ url_for('write_review') }}">
                <label for="restaurant-id">Restaurant ID:</label><br>
                <input type="number" id="restaurant-id" name="restaurant_id" required><br><br>

                <label for="customer-name">Your Name:</label><br>
                <input type="text" id="customer-name" name="customer_name" required><br><br>

                <label for="rating">Rating (1-5):</label><br>
                <input type="number" id="rating" name="rating" min="1" max="5" required><br><br>

                <label for="review-text">Review:</label><br>
                <textarea id="review-text" name="review_text" required></textarea><br><br>

                <button type="submit" id="submit-review-button">Submit Review</button>
            </form>
        </div>
    </div>
</body>
</html>
