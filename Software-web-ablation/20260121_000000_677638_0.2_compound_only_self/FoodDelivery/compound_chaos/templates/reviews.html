<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Order Reviews</h1>
        <label for="filter-by-rating">Filter by Rating:</label>
        <select id="filter-by-rating" name="rating_filter">
            <option value="">All</option>
            {% for rating in [5,4,3,2,1] %}
                <option value="{{ rating }}" {% if rating|string == rating_filter %}selected{% endif %}>{{ rating }}</option>
            {% endfor %}
        </select>
        <div id="reviews-list">
            {% for review in reviews %}
                <div class="review-card">
                    <p>Customer: {{ review.customer_name }}</p>
                    <p>Rating: {{ review.rating }}</p>
                    <p>{{ review.review_text }}</p>
                    <p>Date: {{ review.review_date }}</p>
                </div>
            {% endfor %}
        </div>
        <a href="{{ url_for('write_review') }}">
            <button id="write-review-button">Write Review</button>
        </a>
        <a href="{{ url_for('show_dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
