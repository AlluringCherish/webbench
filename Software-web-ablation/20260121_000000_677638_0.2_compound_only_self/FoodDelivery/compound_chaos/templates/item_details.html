<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Item Details</title>
</head>
<body>
    <div id="item-details-page">
        <h1 id="item-name">{{ item.item_name }}</h1>
        <div id="item-description">{{ item.description }}</div>
        <div id="item-price">${{ '%.2f' % item.price }}</div>
        <form method="POST" action="{{ url_for('add_to_cart', item_id=item.item_id) }}">
            <label for="quantity-input">Quantity:</label>
            <input type="number" id="quantity-input" name="quantity" value="1" min="1">
            <button type="submit" id="add-to-cart-button">Add to Cart</button>
        </form>
    </div>
</body>
</html>
