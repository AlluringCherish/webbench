<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Devices List</title>
</head>
<body>
<div id="devices-page">
    <h1>Devices List</h1>
    <table id="device-table">
        <thead>
        <tr><th>Device ID</th><th>Name</th><th>Type</th><th>Status</th><th>Controls</th></tr>
        </thead>
        <tbody>
        {% for device in devices %}
            <tr>
                <td>{{ device.device_id }}</td>
                <td>{{ device.device_name }}</td>
                <td>{{ device.device_type }}</td>
                <td>{{ device.status }}</td>
                <td><button id="device-control-button-{{ device.device_id }}" onclick="location.href='{{ url_for('device_control', device_id=device.device_id) }}'">Control</button></td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
    <button id="add-device-button" onclick="location.href='{{ url_for('add_device') }}'">Add Device</button>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
