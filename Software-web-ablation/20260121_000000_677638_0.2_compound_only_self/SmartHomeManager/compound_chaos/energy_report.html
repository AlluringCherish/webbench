<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Energy Report</title>
</head>
<body>
<div id="energy-report-page">
    <h1>Energy Consumption Report</h1>

    <div id="energy-summary">
        <!-- Summary info -->
    </div>

    <input type="date" id="filter-start-date" name="start_date" />
    <input type="date" id="filter-end-date" name="end_date" />
    <button id="apply-filter-button" onclick="applyFilter()">Apply Filter</button>
    
    <table id="energy-table">
        <thead>
        <tr><th>Date</th><th>Device</th><th>Energy Consumption</th></tr>
        </thead>
        <tbody>
        {% for entry in energy_entries %}
        <tr>
            <td>{{ entry.date }}</td>
            <td>{{ entry.device_name }}</td>
            <td>{{ entry.energy_consumption }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
<script>
function applyFilter() {
    // JS code to apply date filter
}
</script>
</body>
</html>
