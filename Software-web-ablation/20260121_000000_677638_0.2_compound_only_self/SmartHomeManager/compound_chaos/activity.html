<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
<div id="activity-page">
    <h1>Activity Logs</h1>
    <input type="text" id="search-activity" placeholder="Search by details..." />
    <button id="apply-search-button" onclick="applySearch()">Search</button>
    <table id="activity-table">
        <thead>
        <tr><th>Timestamp</th><th>Device</th><th>Action</th><th>Details</th></tr>
        </thead>
        <tbody>
        {% for log in activity_logs %}
        <tr>
            <td>{{ log.timestamp }}</td>
            <td>{{ log.device_name }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.details }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
<script>
function applySearch() {
    // JS code to filter activity logs
}
</script>
</body>
</html>
