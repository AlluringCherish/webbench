<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>
</head>
<body>
    <div id="activity-page">
        <h1>Activity Logs</h1>

        <label for="search-activity">Search Logs:</label>
        <input type="text" id="search-activity" name="search_term" value="{{ search_term if search_term is defined else '' }}">
        <button id="apply-search-button" onclick="window.location.href='{{ url_for('activity_logs') }}?search=' + encodeURIComponent(document.getElementById('search-activity').value)">Apply Search</button>

        <table id="activity-table" border="1">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Device</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for log in activity_logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td>{{ log.device_name }}</td>
                    <td>{{ log.action }}</td>
                    <td>{{ log.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
