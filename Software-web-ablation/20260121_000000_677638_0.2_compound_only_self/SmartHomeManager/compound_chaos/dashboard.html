<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartHomeManager Dashboard</title>
</head>
<body>
<div id="dashboard-container">
    <h1>SmartHomeManager Dashboard</h1>
    <div id="device-summary">
        <!-- Summary info: total devices, offline count, online count -->
    </div>
    <button id="device-list-button" onclick="location.href='{{ url_for('devices') }}'">Devices List</button>
    <button id="add-device-button" onclick="location.href='{{ url_for('add_device') }}'">Add Device</button>
    <button id="automation-rules-button" onclick="location.href='{{ url_for('automation_rules') }}'">Automation Rules</button>
    <button id="energy-button" onclick="location.href='{{ url_for('energy_report') }}'">Energy Report</button>
    <button id="activity-button" onclick="location.href='{{ url_for('activity_logs') }}'">Activity Logs</button>
    <div id="room-list">
        <!-- List of rooms -->
    </div>
</div>
</body>
</html>
