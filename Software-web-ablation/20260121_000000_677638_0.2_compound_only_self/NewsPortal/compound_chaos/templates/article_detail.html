<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Article Details</title>
</head>
<body>
    <div id="article-details-page">
        <h1 id="article-title">{{ article.title }}</h1>
        <div id="article-author">By {{ article.author }}</div>
        <div id="article-date">{{ article.date }}</div>
        <form method="post">
            <button id="bookmark-button" type="submit">{{ 'Remove Bookmark' if is_bookmarked else 'Bookmark' }}</button>
        </form>
        <div id="article-content">{{ article.content|safe }}</div>
    </div>
</body>
</html>
