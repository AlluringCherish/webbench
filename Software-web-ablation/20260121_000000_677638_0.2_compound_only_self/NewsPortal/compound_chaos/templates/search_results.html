<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results</title>
</head>
<body>
    <div id="search-results-page">
        <h1>Search Results</h1>
        <div id="search-query-display">Search Query: {{ search_query }}</div>
        <div id="results-list">
            {% if matching_articles|length == 0 %}
            <div id="no-results-message">No results found.</div>
            {% else %}
            {% for article in matching_articles %}
            <div class="search-result">
                <h3>{{ article.title }}</h3>
                <p>By {{ article.author }}</p>
                <p>{{ article.snippet }}</p>
            </div>
            {% endfor %}
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
