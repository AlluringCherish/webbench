<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookmarks</title>
</head>
<body>
    <div id="bookmarks-page">
        <h1>My Bookmarks</h1>
        <div id="bookmarks-list">
            {% for bookmark in bookmarks %}
            <div class="bookmark-item">
                <h3>{{ bookmark.article_title }}</h3>
                <p>Bookmarked on {{ bookmark.bookmarked_date }}</p>
                <form method="post" style="display:inline;">
                    <button id="remove-bookmark-button-{{ bookmark.bookmark_id }}" name="remove_bookmark" value="{{ bookmark.bookmark_id }}" type="submit">Remove Bookmark</button>
                </form>
                <button id="read-bookmark-button-{{ bookmark.bookmark_id }}" onclick="location.href='{{ url_for('article_detail', article_id=bookmark.article_id) }}'">Read</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
