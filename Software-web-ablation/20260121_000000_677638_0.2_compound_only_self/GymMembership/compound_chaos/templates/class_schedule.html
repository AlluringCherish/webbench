<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Schedule</title>
</head>
<body>
    <div id="schedule-page">
        <h1>Class Schedule</h1>
        <input type="text" id="schedule-search" name="schedule-search" placeholder="Search classes...">
        <select id="schedule-filter" name="schedule-filter">
            <option value="All">All</option>
            {% set class_types = classes | map(attribute='class_type') | unique %}
            {% for class_type in class_types %}
            <option value="{{ class_type }}">{{ class_type }}</option>
            {% endfor %}
        </select>
        <div id="classes-grid">
            {% for class_item in classes %}
            <div class="class-card">
                <h2>{{ class_item.class_name }}</h2>
                <p>Type: {{ class_item.class_type }}</p>
                <p>Day: {{ class_item.schedule_day }}</p>
                <p>Time: {{ class_item.schedule_time }}</p>
                <p>Duration: {{ class_item.duration }} minutes</p>
                <p>Capacity: {{ class_item.capacity }}</p>
                <button id="enroll-class-button-{{ class_item.class_id }}">Enroll</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
