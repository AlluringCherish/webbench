<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trainer Profiles</title>
</head>
<body>
    <div id="trainers-page">
        <h1>Trainer Profiles</h1>
        <input type="text" id="trainer-search" name="trainer-search" placeholder="Search trainers...">
        <select id="specialty-filter" name="specialty-filter">
            <option value="All">All</option>
            {% set specialties = trainers | map(attribute='specialty') | unique %}
            {% for specialty in specialties %}
            <option value="{{ specialty }}">{{ specialty }}</option>
            {% endfor %}
        </select>
        <div id="trainers-grid">
            {% for trainer in trainers %}
            <div class="trainer-card">
                <h2>{{ trainer.name }}</h2>
                <p>Specialty: {{ trainer.specialty }}</p>
                <p>Experience: {{ trainer.experience_years }} years</p>
                <a href="{{ url_for('trainer_detail', trainer_id=trainer.trainer_id) }}">
                    <button id="view-trainer-button-{{ trainer.trainer_id }}">View Profile</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
