<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Accommodations</title>
</head>
<body>
    <div id="accommodations-page">
        <h1>Search Accommodations</h1>
        <form method="GET" action="{{ url_for('accommodations') }}">
            <label for="destination-input">Destination:</label>
            <input type="text" id="destination-input" name="destination" value="{{ search_params.destination if search_params.destination else '' }}" />

            <label for="check-in-date">Check-in Date:</label>
            <input type="date" id="check-in-date" name="check_in_date" value="{{ search_params.check_in_date if search_params.check_in_date else '' }}" />

            <label for="check-out-date">Check-out Date:</label>
            <input type="date" id="check-out-date" name="check_out_date" value="{{ search_params.check_out_date if search_params.check_out_date else '' }}" />

            <label for="price-filter">Price Range:</label>
            <select id="price-filter" name="price_filter">
                <option value="" {% if not search_params.price_filter %}selected{% endif %}>All</option>
                {% for pr in price_ranges %}
                <option value="{{ pr }}" {% if search_params.price_filter == pr %}selected{% endif %}>{{ pr }}</option>
                {% endfor %}
            </select>

            <button type="submit">Search</button>
        </form>
        <div id="hotels-list">
            {% for hotel in hotels %}
            <div class="hotel-card">
                <h3>{{ hotel.name }}</h3>
                <p>City: {{ hotel.city }}</p>
                <p>Rating: {{ hotel.rating }}</p>
                <p>Price per night: ${{ "%.2f"|format(hotel.price_per_night) }}</p>
                <p>Amenities: {{ hotel.amenities }}</p>
                <p>Category: {{ hotel.category }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
