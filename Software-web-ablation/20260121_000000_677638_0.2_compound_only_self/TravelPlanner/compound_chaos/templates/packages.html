<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Packages</title>
</head>
<body>
    <div id="packages-page">
        <h1>Travel Packages</h1>
        <form method="GET" action="{{ url_for('travel_packages') }}">
            <label for="duration-filter">Duration Filter:</label>
            <select id="duration-filter" name="selected_duration_filter">
                <option value="" {% if not selected_duration_filter %}selected{% endif %}>All</option>
                {% for df in duration_filters %}
                <option value="{{ df }}" {% if selected_duration_filter == df %}selected{% endif %}>{{ df }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="packages-grid">
            {% for pkg in packages %}
            <div class="package-card">
                <h3>{{ pkg.package_name }}</h3>
                <p>Destination: {{ pkg.destination }}</p>
                <p>Duration: {{ pkg.duration_days }} days</p>
                <p>Price: ${{ "%.2f"|format(pkg.price) }}</p>
                <button id="view-package-details-button-{{ pkg.package_id }}" onclick="window.location.href='{{ url_for('package_details', package_id=pkg.package_id) }}'">View Details</button>
                <form method="POST" action="">
                    <input type="hidden" name="package_id" value="{{ pkg.package_id }}" />
                    <button id="book-package-button-{{ pkg.package_id }}" type="submit">Book Package</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
