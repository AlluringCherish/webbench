<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Trips</title>
</head>
<body>
    <div id="trips-page">
        <h1>My Trips</h1>
        <table id="trips-table" border="1">
            <thead>
                <tr>
                    <th>Trip Name</th>
                    <th>Destination</th>
                    <th>Start Date</th>
                    <th>End Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for trip in trips %}
                <tr>
                    <td>{{ trip.trip_name }}</td>
                    <td>{{ trip.destination }}</td>
                    <td>{{ trip.start_date }}</td>
                    <td>{{ trip.end_date }}</td>
                    <td>{{ trip.status }}</td>
                    <td>
                        <button id="view-trip-details-button-{{ trip.trip_id }}" onclick="window.location.href='{{ url_for('trip_details', trip_id=trip.trip_id) }}'">View</button>
                        <button id="edit-trip-button-{{ trip.trip_id }}" onclick="window.location.href='{{ url_for('edit_trip', trip_id=trip.trip_id) }}'">Edit</button>
                        <form method="POST" action="" style="display:inline;">
                            <input type="hidden" name="delete_trip_id" value="{{ trip.trip_id }}" />
                            <button id="delete-trip-button-{{ trip.trip_id }}" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
