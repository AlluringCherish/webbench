<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Destinations</title>
</head>
<body>
    <div id="destinations-page">
        <h1>Travel Destinations</h1>
        <form method="GET" action="{{ url_for('destinations') }}">
            <input type="text" id="search-destination" name="search_query" placeholder="Search destinations..." value="{{ search_query if search_query else '' }}" />
            <select id="region-filter" name="selected_region">
                <option value="" {% if not selected_region %}selected{% endif %}>All Regions</option>
                {% for region in regions %}
                <option value="{{ region }}" {% if selected_region == region %}selected{% endif %}>{{ region }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="destinations-grid">
            {% for dest in destinations %}
            <div class="destination-card">
                <h3>{{ dest.name }}</h3>
                <p>{{ dest.country }}</p>
                <button id="view-destination-button-{{ dest.dest_id }}" onclick="window.location.href='{{ url_for('destination_details', dest_id=dest.dest_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
