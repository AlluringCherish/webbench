<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>
        <form method="GET" action="{{ url_for('travel_recommendations') }}">
            <label for="recommendation-season-filter">Season:</label>
            <select id="recommendation-season-filter" name="selected_season">
                <option value="" {% if not selected_season %}selected{% endif %}>All</option>
                {% for season in seasons %}
                <option value="{{ season }}" {% if selected_season == season %}selected{% endif %}>{{ season }}</option>
                {% endfor %}
            </select>
            <label for="budget-filter">Budget:</label>
            <select id="budget-filter" name="selected_budget">
                <option value="" {% if not selected_budget %}selected{% endif %}>All</option>
                {% for budget in budgets %}
                <option value="{{ budget }}" {% if selected_budget == budget %}selected{% endif %}>{{ budget }}</option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="trending-destinations">
            <h2>Trending Destinations</h2>
            <ul>
                {% for dest in trending_destinations %}
                <li>{{ dest.name }} (Popularity Rank: {{ dest.popularity_rank }})</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
