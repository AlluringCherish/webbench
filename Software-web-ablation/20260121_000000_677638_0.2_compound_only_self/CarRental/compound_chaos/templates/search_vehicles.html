<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicles</title>
</head>
<body>
    <div id="search-page">
        <h1>Search Vehicles</h1>
        <form method="get">
            <label for="location-filter">Pickup Location:</label>
            <select id="location-filter" name="location">
                <option value="">-- All Locations --</option>
                {% for location in locations %}
                <option value="{{ location }}" {% if request.args.get('location') == location %}selected{% endif %}>{{ location }}</option>
                {% endfor %}
            </select>

            <label for="vehicle-type-filter">Vehicle Type:</label>
            <select id="vehicle-type-filter" name="vehicle_type">
                <option value="">-- All Types --</option>
                {% for vtype in vehicle_types %}
                <option value="{{ vtype }}" {% if request.args.get('vehicle_type') == vtype %}selected{% endif %}>{{ vtype }}</option>
                {% endfor %}
            </select>

            <label for="date-range-input">Rental Date Range:</label>
            <input type="text" id="date-range-input" name="date_range" placeholder="YYYY-MM-DD to YYYY-MM-DD" value="{{ request.args.get('date_range', '') }}">

            <button type="submit">Search</button>
        </form>

        <div id="vehicles-grid">
            {% for vehicle in vehicles %}
            <div class="vehicle-card">
                <h3>{{ vehicle.make }} {{ vehicle.model }}</h3>
                <p>Type: {{ vehicle.vehicle_type }}</p>
                <p>Daily Rate: ${{ "%.2f"|format(vehicle.daily_rate) }}</p>
                <button id="view-details-button-{{ vehicle.vehicle_id }}" onclick="location.href='{{ url_for('vehicle_details', vehicle_id=vehicle.vehicle_id) }}'">View Details</button>
            </div>
            {% else %}
            <p>No vehicles found.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
