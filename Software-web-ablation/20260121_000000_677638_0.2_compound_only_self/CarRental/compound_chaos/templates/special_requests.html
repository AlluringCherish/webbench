<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Special Requests</title>
</head>
<body>
    <div id="requests-page">
        <h1>Special Requests</h1>
        <form method="post">
            <label for="select-reservation">Select Reservation:</label>
            <select id="select-reservation" name="reservation_id" required>
                {% for reservation in reservations %}
                <option value="{{ reservation.reservation_id }}" {% if form_data and form_data.reservation_id == reservation.reservation_id %}selected{% endif %}>Reservation #{{ reservation.reservation_id }}</option>
                {% endfor %}
            </select>

            <input type="checkbox" id="driver-assistance-checkbox" name="driver_assistance" {% if form_data and form_data.driver_assistance %}checked{% endif %}>
            <label for="driver-assistance-checkbox">Driver Assistance</label><br>

            <input type="checkbox" id="gps-option-checkbox" name="gps_option" {% if form_data and form_data.gps_option %}checked{% endif %}>
            <label for="gps-option-checkbox">GPS Option</label><br>

            <label for="child-seat-quantity">Child Seat Quantity:</label>
            <input type="number" id="child-seat-quantity" name="child_seat_quantity" min="0" value="{{ form_data.child_seat_quantity if form_data and form_data.child_seat_quantity is not none else 0 }}">

            <label for="special-notes">Special Notes:</label>
            <textarea id="special-notes" name="special_notes">{{ form_data.special_notes if form_data and form_data.special_notes else '' }}</textarea>

            <button type="submit" id="submit-requests-button">Submit Requests</button>
        </form>
    </div>
</body>
</html>
