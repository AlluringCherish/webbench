<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="insurance-page">
        <h1>Select Insurance Coverage</h1>
        <form method="post">
            <div id="insurance-options">
                {% for plan in insurance_plans %}
                <div class="insurance-plan">
                    <input type="radio" id="select-insurance-{{ plan.insurance_id }}" name="selected_insurance_id" value="{{ plan.insurance_id }}" {% if selected_insurance_id == plan.insurance_id %}checked{% endif %}>
                    <label for="select-insurance-{{ plan.insurance_id }}">{{ plan.plan_name }}</label>
                </div>
                {% endfor %}
            </div>
            <div id="insurance-description">
                {% if insurance_details %}
                <p>{{ insurance_details.description }}</p>
                {% endif %}
            </div>
            <div id="insurance-price">
                {% if insurance_details %}
                <p>Daily Cost: ${{ "%.2f"|format(insurance_details.daily_cost) }}</p>
                {% endif %}
            </div>
            <button id="confirm-booking-button" type="submit">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
