<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Book Catalog</h1>

        <form method="get" action="{{ url_for('book_catalog') }}">
            <input
                type="text"
                id="search-input"
                name="search"
                value="{{ search_query|default('') }}"
                placeholder="Search books..."
            />

            <select id="category-filter" name="category">
                <option value="" {% if not selected_category %}selected{% endif %}>All Categories</option>
                {% for category in categories %}
                    <option value="{{ category.category_name }}" {% if category.category_name == selected_category %}selected{% endif %}>
                        {{ category.category_name }}
                    </option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="books-grid">
            {% if books %}
                <ul>
                {% for book in books %}
                    <li>
                        <strong>{{ book.title }}</strong> by {{ book.author }}<br />
                        Price: ${{ '%.2f'|format(book.price) }}<br />
                        <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details', book_id=book.book_id) }}'">View Details</button>
                    </li>
                {% endfor %}
                </ul>
            {% else %}
                <p>No books found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
