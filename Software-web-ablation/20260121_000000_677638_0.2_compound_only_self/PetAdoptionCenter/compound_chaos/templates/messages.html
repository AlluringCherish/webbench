<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Messages</title>
</head>
<body>
  <div id="messages-page">
    <h1>Messages</h1>
    <div id="conversation-list">
      {% for convo in conversations %}
      <div id="conversation-{{ convo.conversation_id }}">
        <h3>{{ convo.participant }}</h3>
        <p>Last message: {{ convo.last_message }}</p>
      </div>
      {% endfor %}
    </div>
    <form method="POST" action="{{ url_for('messages') }}">
      <label for="recipient_username">Recipient Username:</label>
      <input type="text" id="recipient_username" name="recipient_username" required />
      <label for="subject">Subject:</label>
      <input type="text" id="subject" name="subject" required />
      <label for="message-input">Message:</label>
      <textarea id="message-input" name="message_input" required></textarea>
      <button type="submit" id="send-message-button">Send</button>
    </form>
    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
