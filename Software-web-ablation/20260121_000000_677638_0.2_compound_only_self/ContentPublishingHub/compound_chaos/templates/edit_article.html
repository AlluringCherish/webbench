<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Article - ContentPublishingHub</title>
</head>
<body>
<div id="edit-article-page">
<h1>Edit Article - {{ article.title }}</h1>

{% if errors %}
<div id="error-messages">
<ul>
{% for field, error in errors.items() %}
<li>{{ error }}</li>
{% endfor %}
</ul>
</div>
{% endif %}

<form method="post" action="{{ url_for('edit_article', article_id=article.id) }}" id="edit-article-form">
<label for="article-title">Title:</label><br>
<input type="text" id="article-title" name="title" value="{{ article.title }}" readonly><br><br>

<label for="article-content">Content:</label><br>
<textarea id="article-content" name="content" rows="15" cols="80" required>{{ article.content }}</textarea><br><br>

<label for="article-category">Category:</label><br>
<input type="text" id="article-category" name="category" value="{{ article.category }}" readonly><br><br>

<label for="change-summary">Change Summary:</label><br>
<input type="text" id="change-summary" name="change_summary" required><br><br>

<button type="submit" id="submit-article">Save Changes</button>
</form>

<button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
<button onclick="window.location.href='{{ url_for('version_history', article_id=article.id) }}'" id="view-version-history">View Version History</button>
</div>
</body>
</html>
