<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Article - ContentPublishingHub</title>
</head>
<body>
<div id="create-article-page">
<h1>Create New Article</h1>

{% if errors %}
<div id="error-messages">
<ul>
{% for field, error in errors.items() %}
<li>{{ error }}</li>
{% endfor %}
</ul>
</div>
{% endif %}

<form method="post" action="{{ url_for('create_article') }}" id="create-article-form">
<label for="article-title">Title:</label><br>
<input type="text" id="article-title" name="title" value="{{ request.form.title or '' }}" required><br><br>

<label for="article-content">Content:</label><br>
<textarea id="article-content" name="content" rows="15" cols="80" required>{{ request.form.content or '' }}</textarea><br><br>

<label for="article-category">Category:</label><br>
<input type="text" id="article-category" name="category" value="{{ request.form.category or '' }}"><br><br>

<button type="submit" id="submit-article">Create Article</button>
</form>

<button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
</div>
</body>
</html>
