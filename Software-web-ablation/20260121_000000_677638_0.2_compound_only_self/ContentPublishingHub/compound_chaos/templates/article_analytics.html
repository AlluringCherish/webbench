<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Article Analytics - ContentPublishingHub</title>
</head>
<body>
<div id="article-analytics-page">
<h1>Analytics for Article ID {{ article_id }}</h1>
<button onclick="window.location.href='{{ url_for('published_articles') }}'" id="back-to-published-articles">Back to Published Articles</button>

{% if analytics %}
<table id="analytics-table" border="1">
<thead>
<tr>
<th>Metric</th>
<th>Value</th>
</tr>
</thead>
<tbody>
{% for item in analytics %}
<tr>
<td>{{ item.metric }}</td>
<td>{{ item.value }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% else %}
<p>No analytics data available.</p>
{% endif %}
</div>
</body>
</html>
