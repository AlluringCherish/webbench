<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Articles - ContentPublishingHub</title>
</head>
<body>
<div id="my-articles-page">
<h1>My Articles</h1>

<nav>
<button onclick="window.location.href='{{ url_for('dashboard') }}'" id="back-to-dashboard">Back to Dashboard</button>
<button onclick="window.location.href='{{ url_for('create_article') }}'" id="create-new-article">Create New Article</button>
</nav>

{% if articles %}
<table id="my-articles-table" border="1">
<thead>
<tr>
<th>Article ID</th>
<th>Title</th>
<th>Category</th>
<th>Status</th>
<th>Last Modified</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for article in articles %}
<tr>
<td>{{ article.id }}</td>
<td>{{ article.title }}</td>
<td>{{ article.category }}</td>
<td>{{ article.status }}</td>
<td>{{ article.last_modified }}</td>
<td>
<a href="{{ url_for('edit_article', article_id=article.id) }}" id="edit-article-{{ article.id }}">Edit</a> |
<a href="{{ url_for('version_history', article_id=article.id) }}" id="view-version-history-{{ article.id }}">Versions</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
{% else %}
<p>No articles found.</p>
{% endif %}
</div>
</body>
</html>
