<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}OnlineAuction{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<header>
    <h1>OnlineAuction</h1>
    <nav>
        <ul>
            <li><a id="nav_home" href="{{ url_for('index') }}">Home</a></li>
            <li><a id="nav_login" href="{{ url_for('login') }}">Login</a></li>
            <li><a id="nav_register" href="{{ url_for('register') }}">Register</a></li>
            <li><a id="nav_create_listing" href="{{ url_for('create_listing') }}">Create Listing</a></li>
            <li><a id="nav_watchlist" href="{{ url_for('watchlist') }}">Watchlist</a></li>
            <li><a id="nav_categories" href="{{ url_for('categories') }}">Categories</a></li>
            <li><a id="nav_logout" href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
    </nav>
</header>
<main>
    {% block content %}{% endblock %}
</main>
<footer>
    <p>&copy; 2024 OnlineAuction</p>
</footer>
</body>
</html>
