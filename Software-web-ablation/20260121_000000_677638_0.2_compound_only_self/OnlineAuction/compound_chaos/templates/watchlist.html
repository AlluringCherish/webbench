{% extends "base.html" %}

{% block title %}Watchlist - OnlineAuction{% endblock %}

{% block content %}
  <h2>Your Watchlist</h2>
  <ul id="watchlist_list">
    {% if watchlist %}
      {% for item in watchlist %}
        <li><a href="{{ url_for('listing', listing_id=item.id) }}" id="watchlist_listing_{{ item.id }}">{{ item.title }}</a></li>
      {% endfor %}
    {% else %}
      <p id="empty_watchlist">Your watchlist is empty.</p>
    {% endif %}
  </ul>
{% endblock %}
