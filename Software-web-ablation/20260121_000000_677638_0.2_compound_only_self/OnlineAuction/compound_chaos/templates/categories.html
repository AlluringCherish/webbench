{% extends "base.html" %}

{% block title %}Categories - OnlineAuction{% endblock %}

{% block content %}
  <h2>Categories</h2>
  <ul id="categories_list">
    {% for category in categories %}
      <li><a id="category_{{ category.id }}" href="{{ url_for('category', category_id=category.id) }}">{{ category.name }}</a></li>
    {% endfor %}
  </ul>
{% endblock %}
