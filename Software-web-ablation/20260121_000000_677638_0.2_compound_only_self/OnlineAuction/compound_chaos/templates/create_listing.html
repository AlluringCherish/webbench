{% extends "base.html" %}

{% block title %}Create Listing - OnlineAuction{% endblock %}

{% block content %}
  <h2>Create Listing</h2>
  {% if error %}
    <p id="error_message" style="color:red;">{{ error }}</p>
  {% endif %}
  <form method="post" id="create_listing_form">
    <label for="title">Title:</label>
    <input type="text" id="title" name="title" required>

    <label for="description">Description:</label>
    <textarea id="description" name="description" required></textarea>

    <label for="starting_bid">Starting Bid ($):</label>
    <input type="number" id="starting_bid" name="starting_bid" min="0" step="0.01" required>

    <label for="category">Category:</label>
    <select id="category" name="category">
      <option value="">-- Select a category --</option>
      {% for category in categories %}
        <option value="{{ category.id }}">{{ category.name }}</option>
      {% endfor %}
    </select>

    <button type="submit" id="create_listing_button">Create</button>
  </form>
{% endblock %}
