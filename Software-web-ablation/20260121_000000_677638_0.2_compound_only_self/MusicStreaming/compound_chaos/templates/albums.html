<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Albums</title>
</head>
<body>
    <div id="albums-page">
        <h1>Albums</h1>
        <input type="text" id="search-albums" name="search" placeholder="Search albums...">
        <select id="sort-albums" name="sort">
            {% for option in sort_options %}
            <option value="{{ option }}" {% if request.args.get('sort') == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>
        <div id="albums-grid">
            <ul>
                {% for album in albums %}
                <li>
                    {{ album.title }} by {{ album.artist_name }} ({{ album.year }})
                    <button id="view-album-button-{{ album.album_id }}" onclick="location.href='{{ url_for('album_details', album_id=album.album_id) }}'">View</button>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
