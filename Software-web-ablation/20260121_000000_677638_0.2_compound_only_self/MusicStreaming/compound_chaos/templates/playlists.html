<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Playlists</title>
</head>
<body>
    <div id="playlists-page">
        <h1>My Playlists</h1>
        <div id="playlists-grid">
            <ul>
                {% for playlist in playlists %}
                <li>
                    <strong>{{ playlist.title }}</strong> - {{ playlist.description }} ({{ playlist.total_songs }} songs)
                    <button id="view-playlist-button-{{ playlist.playlist_id }}" onclick="location.href='{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}'">View</button>
                </li>
                {% endfor %}
            </ul>
        </div>
        <button id="create-playlist-button" onclick="location.href='{{ url_for('create_playlist') }}'">Create Playlist</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
