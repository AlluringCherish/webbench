<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Music Streaming Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Music Streaming Dashboard</h1>
        <div id="featured-songs">
            <ul>
                {% for song in featured_songs %}
                <li>{{ song.title }} by {{ song.artist_name }} ({{ (song.duration // 60) }}:{{ '%02d' % (song.duration % 60) }})</li>
                {% endfor %}
            </ul>
        </div>
        <div id="dashboard-buttons">
            <button id="browse-songs-button" onclick="location.href='{{ url_for('song_catalog') }}'">Browse Songs</button>
            <button id="my-playlists-button" onclick="location.href='{{ url_for('my_playlists') }}'">My Playlists</button>
            <button id="trending-artists-button" onclick="location.href='{{ url_for('artist_profiles') }}'">Trending Artists</button>
        </div>
    </div>
</body>
</html>
