<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Playlist Details</title>
</head>
<body>
    <div id="playlist-details-page">
        <h1 id="playlist-title">{{ playlist.title }}</h1>
        <div id="playlist-description">{{ playlist.description }}</div>
        <table id="songs-in-playlist" border="1">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Artist</th>
                    <th>Duration</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for song in songs_in_playlist %}
                <tr>
                    <td>{{ song.title }}</td>
                    <td>{{ song.artist_name }}</td>
                    <td>{{ (song.duration // 60) }}:{{ '%02d' % (song.duration % 60) }}</td>
                    <td><button id="remove-song-button-{{ song.song_id }}" onclick="removeSong({{ song.song_id }})">Remove</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="delete-playlist-button" onclick="deletePlaylist()">Delete Playlist</button>
    </div>

        function removeSong(songId) {
            // Placeholder: Implement song removal from playlist
            alert('Remove song ' + songId + ' from playlist functionality not implemented.');
        }

        function deletePlaylist() {
            // Placeholder: Implement playlist deletion
            alert('Delete playlist functionality not implemented.');
        }
    </script>
</body>
</html>
