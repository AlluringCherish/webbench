<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Profiles</title>
</head>
<body>
    <div id="artists-page">
        <h1>Artist Profiles</h1>
        <input type="text" id="search-artists" name="search" placeholder="Search artists...">
        <select id="artists-sort" name="sort">
            {% for option in sort_options %}
            <option value="{{ option }}" {% if request.args.get('sort') == option %}selected{% endif %}>{{ option }}</option>
            {% endfor %}
        </select>
        <div id="artists-grid">
            <ul>
                {% for artist in artists %}
                <li>
                    {{ artist.name }} ({{ artist.genre }}, {{ artist.country }})
                    <button id="view-artist-button-{{ artist.artist_id }}" onclick="location.href='{{ url_for('artist_profile', artist_id=artist.artist_id) }}'">View</button>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
