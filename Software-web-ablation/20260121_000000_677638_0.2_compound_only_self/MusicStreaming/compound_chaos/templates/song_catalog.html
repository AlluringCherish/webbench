<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Song Catalog</h1>
        <input type="text" id="search-input" name="search" placeholder="Search songs...">
        <select id="genre-filter" name="genre">
            <option value="">All Genres</option>
            {% for genre in genres %}
            <option value="{{ genre }}" {% if request.args.get('genre') == genre %}selected{% endif %}>{{ genre }}</option>
            {% endfor %}
        </select>
        <div id="songs-grid">
            <ul>
            {% for song in songs %}
                <li>
                    {{ song.title }} by {{ song.artist_name }} - {{ song.album_name }} ({{ (song.duration // 60) }}:{{ '%02d' % (song.duration % 60) }}) 
                    <button id="add-to-playlist-button-{{ song.song_id }}" onclick="addToPlaylist({{ song.song_id }})">Add to Playlist</button>
                </li>
            {% endfor %}
            </ul>
        </div>
    </div>

    <script>
        function addToPlaylist(songId) {
            // Placeholder: Implement the POST or JS action to add song to playlist
            alert('Add song ' + songId + ' to playlist functionality is not implemented.');
        }
    </script>
</body>
</html>
