<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Album Details</title>
</head>
<body>
    <div id="album-details-page">
        <h1 id="album-title">{{ album.title }}</h1>
        <div id="album-artist">{{ album.artist_name }}</div>
        <div id="album-year">{{ album.year }}</div>
        <div id="album-songs-list">
            <ul>
                {% for song in album_songs %}
                <li>{{ song.title }} by {{ song.artist_name }} ({{ (song.duration // 60) }}:{{ '%02d' % (song.duration % 60) }})</li>
                {% endfor %}
            </ul>
        </div>
        <button id="add-album-to-playlist-button" onclick="addAlbumToPlaylist()">Add Album to Playlist</button>
    </div>

    <script>
        function addAlbumToPlaylist() {

            alert('Add all songs from album to playlist functionality not implemented.');
        }
    </script>
</body>
</html>
