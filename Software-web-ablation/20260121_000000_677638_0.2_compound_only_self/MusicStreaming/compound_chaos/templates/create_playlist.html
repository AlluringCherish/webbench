<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Playlist</title>
</head>
<body>
    <div id="create-playlist-page">
        <h1>Create New Playlist</h1>
        <form method="post" action="{{ url_for('save_playlist') }}">
            <label for="playlist-name-input">Playlist Name:</label><br>
            <input type="text" id="playlist-name-input" name="playlist_name" required><br><br>
            <label for="playlist-description-input">Playlist Description:</label><br>
            <textarea id="playlist-description-input" name="playlist_description" rows="4" cols="50"></textarea><br><br>
            <button type="submit" id="save-playlist-button">Save Playlist</button>
            <button type="button" id="cancel-create-button" onclick="location.href='{{ url_for('my_playlists') }}'">Cancel</button>
        </form>
    </div>
</body>
</html>
