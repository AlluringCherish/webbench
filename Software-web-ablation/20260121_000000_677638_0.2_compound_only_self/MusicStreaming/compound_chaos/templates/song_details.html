<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Song Details</title>
</head>
<body>
    <div id="song-details-page">
        <h1 id="song-title">{{ song.title }}</h1>
        <div id="artist-name">
            <a href="{{ url_for('artist_profile', artist_id=song.artist_id) }}">{{ song.artist_name }}</a>
        </div>
        <div id="album-name">{{ song.album_name }}</div>
        <div id="duration-display">{{ (song.duration // 60) }}:{{ '%02d' % (song.duration % 60) }}</div>
        <button id="play-button" onclick="playSong()">Play</button>
    </div>

    <script>
        function playSong() {
            // Placeholder: Implement the song play functionality
            alert('Playing song: {{ song.title }}');
        }
    </script>
</body>
</html>
