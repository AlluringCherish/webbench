<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Estate Dashboard</title>
</head>
<body>
<div id="dashboard-page">
  <div id="featured-properties">
    {% for property in featured_properties %}
    <div>
      <h3>{{ property.address }}</h3>
      <div>Price: {{ property.price }}</div>
    </div>
    {% endfor %}
  </div>
  <button id="browse-properties-button" onclick="window.location.href='{{ url_for('property_search') }}'">Browse Properties</button>
  <button id="my-inquiries-button" onclick="window.location.href='{{ url_for('inquiries_list') }}'">My Inquiries</button>
  <button id="my-favorites-button" onclick="window.location.href='{{ url_for('favorites_list') }}'">My Favorites</button>
</div>
</body>
</html>
