<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Favorite Properties</title>
</head>
<body>
<div id="favorites-page">
  <div id="favorites-list">
    {% for property in favorite_properties %}
    <div>
      <div>{{ property.address }}</div>
      <div>Price: {{ property.price }}</div>
      <form method="POST" action="{{ url_for('remove_favorite', property_id=property.property_id) }}" style="display:inline;">
        <button type="submit" id="remove-from-favorites-button-{{ property.property_id }}">Remove</button>
      </form>
      <button id="view-property-button-{{ property.property_id }}" onclick="window.location.href='{{ url_for('property_details', property_id=property.property_id) }}'">View</button>
    </div>
    {% endfor %}
  </div>
  <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
