<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Property Search</title>
</head>
<body>
<div id="search-page">
  <label for="location-input">Location:</label>
  <input type="text" id="location-input" name="location">

  <label for="price-range-min">Minimum Price:</label>
  <input type="number" id="price-range-min" name="price_min">

  <label for="price-range-max">Maximum Price:</label>
  <input type="number" id="price-range-max" name="price_max">

  <label for="property-type-filter">Property Type:</label>
  <select id="property-type-filter" name="property_type">
    <option value="">All</option>
    <option value="House">House</option>
    <option value="Apartment">Apartment</option>
    <option value="Condo">Condo</option>
  </select>

  <div id="properties-grid">
    {% for property in properties %}
    <div>
      <div>{{ property.address }}</div>
      <div>Price: {{ property.price }}</div>
      <button id="view-property-button-{{ property.property_id }}" onclick="window.location.href='{{ url_for('property_details', property_id=property.property_id) }}'">View Details</button>
    </div>
    {% endfor %}
  </div>
</div>
</body>
</html>
