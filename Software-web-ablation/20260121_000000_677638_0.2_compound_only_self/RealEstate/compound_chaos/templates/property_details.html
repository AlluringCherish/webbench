<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Property Details</title>
</head>
<body>
<div id="property-details-page">
  <h1 id="property-address">{{ property.address }}</h1>
  <div id="property-price">Price: {{ property.price }}</div>
  <div id="property-description">{{ property.description }}</div>
  <div id="property-features">
    <div>Bedrooms: {{ property.bedrooms }}</div>
    <div>Bathrooms: {{ property.bathrooms }}</div>
    <div>Square Feet: {{ property.square_feet }}</div>
  </div>
  <form method="POST" action="{{ url_for('add_favorite', property_id=property.property_id) }}">
    <button type="submit" id="add-to-favorites-button">Add to Favorites</button>
  </form>
  <button id="submit-inquiry-button" onclick="window.location.href='{{ url_for('inquiry_form') }}'">Submit Inquiry</button>
</div>
</body>
</html>
