<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Estate Agents</title>
</head>
<body>
<div id="agents-page">
  <input type="text" id="agent-search" name="agent-search" placeholder="Search agents">
  <div id="agents-list">
    {% for agent in agents %}
    <div>
      <div>{{ agent.agent_name }}</div>
      <div>Specialization: {{ agent.specialization }}</div>
      <div>Email: {{ agent.email }}</div>
      <div>Phone: {{ agent.phone }}</div>
      <div>Properties Sold: {{ agent.properties_sold }}</div>
      <button id="contact-agent-button-{{ agent.agent_id }}">Contact</button>
    </div>
    {% endfor %}
  </div>
  <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
