<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Featured Locations</title>
</head>
<body>
<div id="locations-page">
  <label for="location-sort">Sort Locations:</label>
  <select id="location-sort" name="location_sort">
    <option value="name_asc">Name Ascending</option>
    <option value="name_desc">Name Descending</option>
    <option value="price_asc">Price Ascending</option>
    <option value="price_desc">Price Descending</option>
  </select>

  <div id="locations-list">
    {% for location in locations %}
    <div>
      <h3>{{ location.location_name }}</h3>
      <div>Region: {{ location.region }}</div>
      <div>Average Price: {{ location.average_price }}</div>
      <div>Properties: {{ location.property_count }}</div>
      <div>{{ location.description }}</div>
      <button id="view-location-button-{{ location.location_id }}">View Properties</button>
    </div>
    {% endfor %}
  </div>
  <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
</div>
</body>
</html>
