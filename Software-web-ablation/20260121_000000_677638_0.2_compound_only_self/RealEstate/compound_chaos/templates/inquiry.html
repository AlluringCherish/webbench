<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Submit Property Inquiry</title>
</head>
<body>
<div id="inquiry-page">
  <form method="POST" action="{{ url_for('submit_inquiry') }}">
    <label for="select-property">Select Property:</label>
    <select id="select-property" name="property_id">
      {% for property in properties %}
      <option value="{{ property.property_id }}" {% if errors and errors.property_id %}style="border-color:red;"{% endif %}>{{ property.address }}</option>
      {% endfor %}
    </select>

    <label for="inquiry-name">Name:</label>
    <input type="text" id="inquiry-name" name="customer_name" value="{{ request.form.customer_name if request.form.customer_name else '' }}" {% if errors and errors.customer_name %}style="border-color:red;"{% endif %}>

    <label for="inquiry-email">Email:</label>
    <input type="email" id="inquiry-email" name="customer_email" value="{{ request.form.customer_email if request.form.customer_email else '' }}" {% if errors and errors.customer_email %}style="border-color:red;"{% endif %}>

    <label for="inquiry-phone">Phone:</label>
    <input type="tel" id="inquiry-phone" name="customer_phone" value="{{ request.form.customer_phone if request.form.customer_phone else '' }}" {% if errors and errors.customer_phone %}style="border-color:red;"{% endif %}>

    <label for="inquiry-message">Message:</label>
    <textarea id="inquiry-message" name="message" {% if errors and errors.message %}style="border-color:red;"{% endif %}>{{ request.form.message if request.form.message else '' }}</textarea>

    <button type="submit" id="submit-inquiry-button">Submit Inquiry</button>
  </form>
</div>
</body>
</html>
