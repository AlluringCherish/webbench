<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Seats</title>
</head>
<body>
    <div id="seat-selection-page">
        <h1>Select Seats</h1>
        <div id="seat-map">
            {% for seat in seat_map %}
                <button id="seat-{{ seat.row }}{{ seat.column }}" class="seat {{ seat.status|lower }} {{ seat.seat_type|lower }}" data-seat-id="{{ seat.seat_id }}" data-row="{{ seat.row }}" data-column="{{ seat.column }}" data-seat-type="{{ seat.seat_type }}" data-status="{{ seat.status }}">{{ seat.row }}{{ seat.column }}</button>
            {% endfor %}
        </div>
        <div id="selected-seats-display">
            <h3>Selected Seats:</h3>
            <ul id="selected-seats-list">
                <!-- placeholder for selected seats -->
            </ul>
        </div>
        <button id="proceed-booking-button" onclick="location.href='{{ url_for('booking_confirmation') }}'">Proceed to Booking</button>
    </div>
</body>
</html>
