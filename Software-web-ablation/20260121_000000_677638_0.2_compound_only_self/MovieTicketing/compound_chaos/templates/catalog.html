<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Movie Catalog</h1>
        <input id="search-input" type="text" placeholder="Search by title or genre" />
        <select id="genre-filter">
            <option value="">All Genres</option>
            {% for genre in genres %}
                <option value="{{ genre }}">{{ genre }}</option>
            {% endfor %}
        </select>
        <div id="movies-grid">
            {% for movie in movies %}
                <div class="movie-card">
                    <h3>{{ movie.title }}</h3>
                    <p>Genre: {{ movie.genre }}</p>
                    <p>Rating: {{ movie.rating }}</p>
                    <p>Duration: {{ movie.duration }} mins</p>
                    <button id="view-movie-button-{{ movie.movie_id }}" onclick="location.href='{{ url_for('movie_details', movie_id=movie.movie_id) }}'">View Details</button>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
