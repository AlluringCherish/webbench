<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking History</title>
</head>
<body>
    <div id="bookings-page">
        <h1>Booking History</h1>
        <select id="status-filter">
            {% for status in status_options %}
                <option value="{{ status }}">{{ status }}</option>
            {% endfor %}
        </select>
        <table id="bookings-table" border="1">
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Movie Title</th>
                    <th>Booking Date</th>
                    <th>Seats</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                <tr>
                    <td>{{ booking.booking_id }}</td>
                    <td>{{ booking.movie_title }}</td>
                    <td>{{ booking.booking_date }}</td>
                    <td>{{ booking.seats }}</td>
                    <td>{{ booking.status }}</td>
                    <td><button id="view-booking-button-{{ booking.booking_id }}" onclick="location.href='{{ url_for('booking_details', booking_id=booking.booking_id) }}'">View Details</button></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
