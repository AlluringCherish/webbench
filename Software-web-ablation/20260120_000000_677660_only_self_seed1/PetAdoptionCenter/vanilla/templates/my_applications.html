<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="my-applications-page">
        <h1>My Applications</h1>
        <form method="get" action="{{ url_for('my_applications') }}">
            <label for="filter-status">Filter by status:</label>
            <select id="filter-status" name="status">
                <option value="">All</option>
                <option value="Pending" {% if request.args.get('status') == 'Pending' %}selected{% endif %}>Pending</option>
                <option value="Approved" {% if request.args.get('status') == 'Approved' %}selected{% endif %}>Approved</option>
                <option value="Rejected" {% if request.args.get('status') == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>
        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Application ID</th>
                    <th>Pet Name</th>
                    <th>Date Submitted</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for app in applications %}
                <tr id="application-{{ app.application_id }}">
                    <td>{{ app.application_id }}</td>
                    <td>{{ app.pet_name }}</td>
                    <td>{{ app.date_submitted }}</td>
                    <td>{{ app.status }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
