<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Favorites</title>
</head>
<body>
    <div id="favorites-page">
        <h1>My Favorites</h1>
        <div id="favorites-grid">
            {% for pet in favorite_pets %}
            <div id="favorite-pet-{{ pet.pet_id }}">
                <a href="{{ url_for('pet_details', pet_id=pet.pet_id) }}">
                    <h2>{{ pet.name }}</h2>
                </a>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
