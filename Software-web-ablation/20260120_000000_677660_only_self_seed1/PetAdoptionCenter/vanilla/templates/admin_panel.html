<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>
    <div id="admin-panel-page">
        <h1>Admin Panel</h1>
        <div id="pending-applications">
            <h2>Pending Applications</h2>
            {% for app in pending_applications %}
            <div id="pending-application-{{ app.application_id }}">
                <div>Applicant: {{ app.applicant_name }}</div>
                <div>Pet: {{ app.pet_name }}</div>
            </div>
            {% endfor %}
        </div>
        <div id="all-pets-list">
            <h2>All Pets</h2>
            {% for pet in all_pets %}
            <div id="pet-{{ pet.pet_id }}">
                <div>Name: {{ pet.name }}</div>
                <div>Species: {{ pet.species }}</div>
                <div>Status: {{ pet.status }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
