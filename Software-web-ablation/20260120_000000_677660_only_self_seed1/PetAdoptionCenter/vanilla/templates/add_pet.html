<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Pet</title>
</head>
<body>
    <div id="add-pet-page">
        <h1>Add New Pet</h1>
        <form method="post" action="{{ url_for('submit_new_pet') }}">
            <label for="pet-name-input">Name:</label>
            <input id="pet-name-input" name="name" type="text" required />

            <label for="pet-species-input">Species:</label>
            <select id="pet-species-input" name="species" required>
                <option value="">Select species</option>
                <option value="Dog">Dog</option>
                <option value="Cat">Cat</option>
                <option value="Other">Other</option>
            </select>

            <label for="pet-breed-input">Breed:</label>
            <input id="pet-breed-input" name="breed" type="text" />

            <label for="pet-age-input">Age:</label>
            <input id="pet-age-input" name="age" type="text" required />

            <label for="pet-gender-input">Gender:</label>
            <select id="pet-gender-input" name="gender" required>
                <option value="">Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Unknown">Unknown</option>
            </select>

            <label for="pet-size-input">Size:</label>
            <select id="pet-size-input" name="size" required>
                <option value="">Select size</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>

            <label for="pet-description-input">Description:</label>
            <textarea id="pet-description-input" name="description" rows="4" cols="50"></textarea>

            <button id="submit-pet-button" type="submit">Add Pet</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        {% if success_message %}
        <div id="success-message" style="color:green;">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
        <div id="error-message" style="color:red;">{{ error_message }}</div>
        {% endif %}
    </div>
</body>
</html>
