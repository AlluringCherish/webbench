<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pet Adoption Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Pet Adoption Dashboard</h1>
        <div id="featured-pets">
            {% for pet in featured_pets %}
            <div id="featured-pet-{{ pet.pet_id }}">
                <h2>{{ pet.name }}</h2>
                <div>Species: {{ pet.species }}</div>
                <div>Age: {{ pet.age }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="browse-pets-button" onclick="window.location.href='{{ url_for('pet_listings') }}'">Browse Pets</button>
        <button id="back-to-dashboard" onclick="window.location.reload()">Back to Dashboard</button>
    </div>
</body>
</html>
