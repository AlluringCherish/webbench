<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adoption Application</title>
</head>
<body>
    <div id="application-page">
        <h1>Adoption Application</h1>
        <form method="post" action="{{ url_for('submit_adoption_application', pet_id=pet_id) }}">
            <label for="applicant-name">Name:</label>
            <input id="applicant-name" name="applicant_name" type="text" required />

            <label for="applicant-phone">Phone:</label>
            <input id="applicant-phone" name="applicant_phone" type="text" required />

            <label for="housing-type">Housing Type:</label>
            <select id="housing-type" name="housing_type" required>
                <option value="">Select housing type</option>
                <option value="House">House</option>
                <option value="Apartment">Apartment</option>
                <option value="Other">Other</option>
            </select>

            <label for="reason">Reason for Adoption:</label>
            <textarea id="reason" name="reason" rows="4" cols="50" required></textarea>

            <button id="submit-application-button" type="submit">Submit Application</button>
        </form>
        <button id="back-to-pet" onclick="window.location.href='{{ url_for('pet_details', pet_id=pet_id) }}'">Back to Pet</button>
        {% if success_message %}
        <div id="success-message" style="color:green;">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
        <div id="error-message" style="color:red;">{{ error_message }}</div>
        {% endif %}
    </div>
</body>
</html>
