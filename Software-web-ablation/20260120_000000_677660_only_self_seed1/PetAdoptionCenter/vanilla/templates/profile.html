<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <div id="profile-page">
        <h1>My Profile</h1>
        <div id="profile-username">Username: {{ username }}</div>
        <form method="post" action="{{ url_for('update_profile') }}">
            <label for="profile-email">Email:</label>
            <input id="profile-email" name="email" type="email" value="{{ email }}" required />
            <button id="update-profile-button" type="submit">Update Profile</button>
        </form>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        {% if success_message %}
        <div id="success-message" style="color:green;">{{ success_message }}</div>
        {% endif %}
        {% if error_message %}
        <div id="error-message" style="color:red;">{{ error_message }}</div>
        {% endif %}
    </div>
</body>
</html>
