<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>My Reviews</h1>
        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-entry">
                <h2>{{ review.dish_name }} (Rating: {{ review.rating }}/5)</h2>
                <p>{{ review.review_text }}</p>
                <small>Date: {{ review.review_date }}</small>
            </div>
            {% endfor %}
        </div>
        <button id="write-new-review-button" onclick="location.href='{{ url_for('write_review') }}'">Write New Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
