<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Recommendations</title>
</head>
<body>
    <div id="recommendations-page">
        <h1>Travel Recommendations</h1>
        <label for="recommendation-season-filter">Season Filter:</label>
        <select id="recommendation-season-filter">
            <option value="">All Seasons</option>
        </select>
        <label for="budget-filter">Budget Filter:</label>
        <select id="budget-filter">
            <option value="">All Budgets</option>
        </select>
        <div id="trending-destinations">
            <h2>Trending Destinations</h2>
            <ul>
                {% for dest in trending_destinations %}
                <li>{{ dest.name }} - Popularity: {{ dest.popularity }}</li>
                {% endfor %}
            </ul>
        </div>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
