<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Confirmation</title>
</head>
<body>
    <div id="confirmation-page">
        <h1>Booking Confirmation</h1>
        <div id="confirmation-number">Confirmation Number: {{ booking.confirmation_number }}</div>
        <div id="booking-details">{{ booking.booking_details }}</div>
        <button id="download-itinerary-button" type="button">Download Itinerary PDF</button>
        <button id="share-trip-button" type="button">Share Trip</button>
        <button id="back-to-dashboard" type="button" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
