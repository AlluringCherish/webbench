<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Status</title>
</head>
<body>
    <div id="status-page">
        <h1>Auction Status</h1>
        <select id="status-filter" name="status-filter">
            <option value="all">All</option>
            <option value="open">Open</option>
            <option value="closed">Closed</option>
            <option value="cancelled">Cancelled</option>
        </select>
        <button id="refresh-status-button" onclick="location.reload()">Refresh Status</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <table id="status-table" border="1">
            <thead>
                <tr>
                    <th>Auction</th>
                    <th>Status</th>
                    <th>Current Bid</th>
                    <th>End Time</th>
                </tr>
            </thead>
            <tbody>
                {% for auction in auctions %}
                <tr>
                    <td>{{ auction.item_name }}</td>
                    <td>{{ auction.status }}</td>
                    <td>${{ "%.2f"|format(auction.current_bid) }}</td>
                    <td>{{ auction.end_time }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
