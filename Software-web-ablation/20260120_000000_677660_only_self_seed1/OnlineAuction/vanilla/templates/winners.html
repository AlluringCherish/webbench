<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winning Items</title>
</head>
<body>
    <div id="winners-page">
        <h1>Winning Items</h1>
        <input type="text" id="filter-by-winner" placeholder="Filter winners..." />
        <div id="winners-list">
            {% for winner in winners %}
            <div class="winner-card" id="winner-card-{{ winner.auction_id }}">
                <h2>{{ winner.item_name }}</h2>
                <p>Winner: {{ winner.winner_name }}</p>
                <p>Winning Bid: ${{ "%.2f"|format(winner.winning_bid) }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
