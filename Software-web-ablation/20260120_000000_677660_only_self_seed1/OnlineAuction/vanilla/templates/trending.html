<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trending Auctions</title>
</head>
<body>
    <div id="trending-page">
        <h1>Trending Auctions</h1>
        <select id="time-range-filter" name="time-range-filter">
            <option value="24h">Last 24 Hours</option>
            <option value="7d">Last 7 Days</option>
            <option value="30d">Last 30 Days</option>
        </select>
        <div id="trending-list">
            {% for auction in trending_auctions %}
            <div class="trending-auction" id="trending-auction-{{ auction.auction_id }}">
                <h2>{{ auction.item_name }}</h2>
                <p>Current Bid: ${{ "%.2f"|format(auction.current_bid) }}</p>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View Auction</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
