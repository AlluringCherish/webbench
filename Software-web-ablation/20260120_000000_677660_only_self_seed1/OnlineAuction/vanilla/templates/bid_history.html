<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bid History</title>
</head>
<body>
    <div id="bid-history-page">
        <h1>Bid History</h1>
        <select id="filter-by-auction" name="filter-by-auction">
            <option value="">All Auctions</option>
            {% for auction in auctions %}
            <option value="{{ auction.auction_id }}">{{ auction.item_name }}</option>
            {% endfor %}
        </select>
        <button id="sort-by-amount" onclick="sortBids()">Sort by Amount</button>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
        <table id="bids-table" border="1">
            <thead>
                <tr>
                    <th>Bidder Name</th>
                    <th>Amount</th>
                    <th>Timestamp</th>
                    <th>Auction</th>
                </tr>
            </thead>
            <tbody>
                {% for bid in bids %}
                <tr>
                    <td>{{ bid.bidder_name }}</td>
                    <td>${{ "%.2f"|format(bid.amount) }}</td>
                    <td>{{ bid.timestamp }}</td>
                    <td>{{ bid.auction_name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script>
        function sortBids() {
            // client side sort code could be here
        }
    </script>
</body>
</html>
