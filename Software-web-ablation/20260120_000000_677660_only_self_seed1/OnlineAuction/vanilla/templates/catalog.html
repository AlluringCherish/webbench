<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <h1>Auction Catalog</h1>
        <input type="text" id="search-input" name="search" placeholder="Search auctions..." />
        <select id="category-filter" name="category-filter">
            <option value="">All Categories</option>
            {% for category in categories %}
                <option value="{{ category.category_id }}">{{ category.name }}</option>
            {% endfor %}
        </select>
        <div id="auctions-grid">
            {% for auction in auctions %}
            <div class="auction-card" id="auction-card-{{ auction.auction_id }}">
                <h2>{{ auction.item_name }}</h2>
                <p>Current Bid: ${{ "%.2f"|format(auction.current_bid) }}</p>
                <a href="{{ url_for('auction_details', auction_id=auction.auction_id) }}">
                    <button id="view-auction-button-{{ auction.auction_id }}">View Auction</button>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
