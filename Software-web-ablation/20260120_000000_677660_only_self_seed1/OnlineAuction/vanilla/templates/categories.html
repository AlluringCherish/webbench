<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Categories</title>
</head>
<body>
    <div id="categories-page">
        <h1>Auction Categories</h1>
        <div id="categories-list">
            {% for category in categories %}
            <div class="category-card" id="category-card-{{ category.category_id }}">
                <h2>{{ category.name }}</h2>
                <a href="{{ url_for('auction_catalog', category_id=category.category_id) }}">
                    <button id="view-category-button-{{ category.category_id }}">View Category</button>
                </a>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
