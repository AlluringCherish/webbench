<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auction Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Auction Dashboard</h1>
        <div id="featured-auctions">
            {% for auction in featured_auctions %}
            <div class="featured-auction" id="featured-auction-{{ auction.auction_id }}">
                <img src="{{ auction.image_url }}" alt="{{ auction.item_name }}">
                <h2>{{ auction.item_name }}</h2>
                <p>Current Bid: ${{ "%.2f"|format(auction.current_bid) }}</p>
                <p>Ends: {{ auction.end_time }}</p>
                <p>Status: {{ auction.status }}</p>
            </div>
            {% endfor %}
        </div>
        <button id="browse-auctions-button" onclick="window.location.href='{{ url_for('auction_catalog') }}'">Browse Auctions</button>
        <button id="view-bids-button" onclick="window.location.href='{{ url_for('bid_history') }}'">View Bids</button>
        <button id="trending-auctions-button" onclick="window.location.href='{{ url_for('trending_auctions') }}'">Trending Auctions</button>
    </div>
</body>
</html>
