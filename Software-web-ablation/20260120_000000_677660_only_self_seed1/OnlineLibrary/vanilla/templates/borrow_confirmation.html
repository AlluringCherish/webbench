<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Borrow Confirmation</title>
</head>
<body>
<div id="borrow-page">
  <div id="borrow-book-info">
    <h2>{{ book.title }}</h2>
    <p>Author: {{ book.author }}</p>
    <p>Description: {{ book.description }}</p>
  </div>
  <div id="due-date-display">Due Date: {{ due_date }}</div>
  <form method="POST" action="{{ url_for('confirm_borrow_book') }}">
    <input type="hidden" name="book_id" value="{{ book.book_id }}">
    <button type="submit" id="confirm-borrow-button">Confirm Borrow</button>
  </form>
  <button id="cancel-borrow-button" onclick="location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">Cancel</button>
</div>
</body>
</html>
