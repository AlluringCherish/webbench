<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Catalog</title>
</head>
<body>
    <div id="catalog-page">
        <input type="text" id="search-input" placeholder="Search books...">
        <div id="book-grid">
            {% for book in books %}
            <div class="book-item">
                <div><strong>Title:</strong> {{ book.title }}</div>
                <div><strong>Author:</strong> {{ book.author }}</div>
                <div><strong>Status:</strong> {{ book.status }}</div>
                <button id="view-book-button-{{ book.book_id }}" onclick="window.location.href='{{ url_for('book_details_page', book_id=book.book_id) }}'">View Details</button>
            </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
