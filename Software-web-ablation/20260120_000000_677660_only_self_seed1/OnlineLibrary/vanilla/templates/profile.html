<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Profile</title>
</head>
<body>
<div id="profile-page">
  <div id="profile-username">Username: {{ user.username }}</div>
  <form method="POST" action="{{ url_for('update_profile') }}">
    <label for="profile-email">Email:</label>
    <input type="text" id="profile-email" name="email" value="{{ user.email }}">
    <br>
    <label for="profile-phone">Phone:</label>
    <input type="text" id="profile-phone" name="phone" value="{{ user.phone }}">
    <br>
    <label for="profile-address">Address:</label>
    <input type="text" id="profile-address" name="address" value="{{ user.address }}">
    <br>
    <button type="submit" id="update-profile-button">Update Profile</button>
  </form>
  <div id="borrow-history">
    <h2>Borrow History</h2>
    <ul>
      {% for entry in borrow_history %}
      <li>{{ entry.title }} borrowed on {{ entry.borrow_date }}{% if entry.return_date %}, returned on {{ entry.return_date }}{% endif %}</li>
      {% endfor %}
    </ul>
  </div>
  <div id="total-fines">Total Fines: ${{ "%.2f" | format(total_fines) }}</div>
  <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
</div>
</body>
</html>
