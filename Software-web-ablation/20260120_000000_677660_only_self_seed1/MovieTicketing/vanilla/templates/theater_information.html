<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Theater Information</title>
</head>
<body>
  <div id="theater-page">
    <h1>Theater Information</h1>

    <form method="get" action="" id="filter-location-form">
      <label for="theater-location-filter">Filter by Location:</label>
      <select id="theater-location-filter" name="selected_location">
        <option value="">-- All Locations --</option>
        {% set locations = theaters | map(attribute='location') | list | unique %}
        {% for location in locations %}
          <option value="{{ location }}" {% if location == selected_location %}selected{% endif %}>{{ location }}</option>
        {% endfor %}
      </select>
      <button type="submit">Filter</button>
    </form>

    <div id="theaters-list">
      {% for theater in theaters %}
      <div class="theater-item">
        <h2>{{ theater.theater_name }}</h2>
        <p>Location: {{ theater.location }}</p>
        <div id="facilities-display">Facilities: {{ theater.facilities }}</div>
      </div>
      {% endfor %}
    </div>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
