<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Booking History</title>
</head>
<body>
  <div id="bookings-page">
    <h1>Booking History</h1>

    <form method="get" action="" id="filter-status-form">
      <label for="status-filter">Filter by Status:</label>
      <select id="status-filter" name="filtered_status">
        <option value="All" {% if filtered_status == 'All' %}selected{% endif %}>All</option>
        <option value="Confirmed" {% if filtered_status == 'Confirmed' %}selected{% endif %}>Confirmed</option>
        <option value="Cancelled" {% if filtered_status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
        <option value="Completed" {% if filtered_status == 'Completed' %}selected{% endif %}>Completed</option>
      </select>
      <button type="submit">Filter</button>
    </form>

    <table id="bookings-table" border="1" cellspacing="0" cellpadding="5">
      <thead>
        <tr>
          <th>Booking ID</th>
          <th>Movie</th>
          <th>Booking Date</th>
          <th>Seats</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for booking in bookings %}
        <tr>
          <td>{{ booking.booking_id }}</td>
          <td>{{ booking.movie_title }}</td>
          <td>{{ booking.booking_date }}</td>
          <td>{{ booking.seats | join(', ') }}</td>
          <td>{{ booking.status }}</td>
          <td><button id="view-booking-button-{{ booking.booking_id }}" onclick="window.location.href='{{ url_for('booking_details', booking_id=booking.booking_id) }}'">View Details</button></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
