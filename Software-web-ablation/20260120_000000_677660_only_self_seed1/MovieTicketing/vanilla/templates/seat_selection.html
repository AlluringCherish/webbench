<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Seats</title>
</head>
<body>
  <div id="seat-selection-page">
    <h1>Select Seats</h1>

    <div id="seat-map">
      {% for seat in seats %}
      <button id="seat-{{ seat.row }}{{ seat.column }}" {% if seat.status != 'Available' %}disabled{% endif %}>{{ seat.row }}{{ seat.column }} ({{ seat.seat_type }})</button>
      {% endfor %}
    </div>

    <div id="selected-seats-display">
      <strong>Selected Seats:</strong>
      {% if selected_seats %}
        <span>{{ selected_seats | join(', ') }}</span>
      {% else %}
        <span>None</span>
      {% endif %}
    </div>

    <button id="proceed-booking-button" onclick="window.location.href='{{ url_for('booking_confirmation') }}'">Proceed to Booking</button>
  </div>
</body>
</html>
