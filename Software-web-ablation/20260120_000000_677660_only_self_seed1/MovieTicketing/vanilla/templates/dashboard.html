<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Ticketing Dashboard</title>
</head>
<body>
  <div id="dashboard-page">
    <h1>Movie Ticketing Dashboard</h1>

    <div id="featured-movies">
      <h2>Featured Movies</h2>
      <ul>
        {% for movie in featured_movies %}
          <li>
            <strong>{{ movie.title }}</strong>
            {% if movie.poster_url %}
              <br>
              <img src="{{ movie.poster_url }}" alt="Poster for {{ movie.title }}" style="max-height:150px;">
            {% endif %}
          </li>
        {% endfor %}
      </ul>
    </div>

    <button id="browse-movies-button" onclick="window.location.href='{{ url_for('movie_catalog') }}'">Browse Movies</button>
    <button id="view-bookings-button" onclick="window.location.href='{{ url_for('booking_history') }}'">View Bookings</button>
    <button id="showtimes-button" onclick="alert('Please select a movie first from Movie Catalog.');">Showtimes</button>
  </div>
</body>
</html>
