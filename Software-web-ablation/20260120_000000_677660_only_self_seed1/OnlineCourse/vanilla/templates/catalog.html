<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Courses</title>
</head>
<body>
    <div id="catalog-page">
        <input type="text" id="search-input" placeholder="Search courses...">
        <div id="course-grid">
            {% if courses %}
                <div style="display:flex; flex-wrap: wrap; gap: 10px;">
                    {% for course in courses %}
                        <div style="border: 1px solid #ccc; padding: 10px; width: 300px;">
                            <h2>{{ course.title }}</h2>
                            <p>{{ course.description }}</p>
                            <p><strong>Category:</strong> {{ course.category }}</p>
                            <p><strong>Level:</strong> {{ course.level }}</p>
                            <p><strong>Duration:</strong> {{ course.duration }}</p>
                            <p><strong>Status:</strong> {{ course.status }}</p>
                            <button id="view-course-button-{{ course.course_id }}" onclick="location.href='{{ url_for('course_details', course_id=course.course_id) }}'">View Details</button>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <p>No courses available.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
