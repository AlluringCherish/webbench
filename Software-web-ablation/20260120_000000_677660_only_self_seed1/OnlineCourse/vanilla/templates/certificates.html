<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Certificates</title>
</head>
<body>
    <div id="certificates-page">
        <div id="certificates-grid">
            {% if certificates %}
                <div style="display:flex; flex-wrap:wrap; gap: 10px;">
                    {% for cert in certificates %}
                        <div style="border:1px solid #ccc; padding:10px; width:300px;">
                            <p><strong>Certificate ID:</strong> {{ cert.certificate_id }}</p>
                            <p><strong>Username:</strong> {{ cert.username }}</p>
                            <p><strong>Course ID:</strong> {{ cert.course_id }}</p>
                            <p><strong>Issue Date:</strong> {{ cert.issue_date }}</p>
                        </div>
                    {% endfor %}
                </div>
            {% else %}
                <p>No certificates found.</p>
            {% endif %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
