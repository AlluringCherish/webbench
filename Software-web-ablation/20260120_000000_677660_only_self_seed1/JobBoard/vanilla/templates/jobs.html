<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Listings</title>
</head>
<body>
    <div id="listings-page">
        <h1>Job Listings</h1>
        <form method="POST" action="{{ url_for('job_listings') }}">
            <input type="text" id="search-input" name="search_input" placeholder="Search jobs by title, company, or location" value="{{ request.form.search_input if request.method == 'POST' else '' }}">
            <select id="category-filter" name="category_filter">
                <option value="">All Categories</option>
                {% if categories %}
                    {% for category in categories %}
                    <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                {% endif %}
            </select>
            <select id="location-filter" name="location_filter">
                <option value="">All Locations</option>
                {% if locations %}
                    {% for location in locations %}
                    <option value="{{ location }}" {% if selected_location == location %}selected{% endif %}>{{ location }}</option>
                    {% endfor %}
                {% endif %}
            </select>
            <button type="submit">Filter</button>
        </form>
        <div id="jobs-grid">
            {% if jobs %}
            <ul>
                {% for job in jobs %}
                <li>
                    <strong>{{ job.title }}</strong> at {{ job.company_name }} - {{ job.location }}<br>
                    Salary: ${{ job.salary_min }} to ${{ job.salary_max }}<br>
                    Category: {{ job.category }}<br>
                    <a href="{{ url_for('job_details', job_id=job.job_id) }}">
                        <button id="view-job-button-{{ job.job_id }}">View Details</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No jobs found matching the criteria.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
