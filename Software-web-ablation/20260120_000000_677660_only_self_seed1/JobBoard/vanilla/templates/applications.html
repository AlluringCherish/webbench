<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Applications</title>
</head>
<body>
    <div id="tracking-page">
        <h1>My Applications</h1>
        <form method="POST" action="{{ url_for('application_tracking') }}">
            <label for="status-filter">Filter by status:</label>
            <select id="status-filter" name="status_filter">
                <option value="All" {% if request.method == 'POST' and request.form.get('status_filter') == 'All' %}selected{% endif %}>All</option>
                <option value="Applied" {% if request.method == 'POST' and request.form.get('status_filter') == 'Applied' %}selected{% endif %}>Applied</option>
                <option value="Under Review" {% if request.method == 'POST' and request.form.get('status_filter') == 'Under Review' %}selected{% endif %}>Under Review</option>
                <option value="Interview" {% if request.method == 'POST' and request.form.get('status_filter') == 'Interview' %}selected{% endif %}>Interview</option>
                <option value="Rejected" {% if request.method == 'POST' and request.form.get('status_filter') == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <table id="applications-table" border="1">
            <thead>
                <tr>
                    <th>Job Title</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th>Applied Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% if applications %}
                    {% for application in applications %}
                    <tr>
                        <td>{{ application.job_title }}</td>
                        <td>{{ application.company_name }}</td>
                        <td>{{ application.status }}</td>
                        <td>{{ application.applied_date }}</td>
                        <td>
                            <a href="{{ url_for('application_details', app_id=application.application_id) }}">
                                <button id="view-application-button-{{ application.application_id }}">View</button>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr><td colspan="5">No applications found.</td></tr>
                {% endif %}
            </tbody>
        </table>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
