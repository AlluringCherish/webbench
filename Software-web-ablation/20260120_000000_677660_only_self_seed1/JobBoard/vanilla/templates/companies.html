<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Directory</title>
</head>
<body>
    <div id="companies-page">
        <h1>Company Directory</h1>
        <form method="POST" action="{{ url_for('companies_directory') }}">
            <input type="text" id="search-company-input" name="search_company_input" placeholder="Search companies" value="{{ search_company_input }}">
            <button type="submit">Search</button>
        </form>
        <div id="companies-list">
            {% if companies %}
            <ul>
                {% for company in companies %}
                <li>
                    <strong>{{ company.company_name }}</strong><br>
                    Industry: {{ company.industry }}<br>
                    Employees: {{ company.employee_count }}<br>
                    <a href="{{ url_for('company_profile', company_id=company.company_id) }}">
                        <button id="view-company-button-{{ company.company_id }}">View Profile</button>
                    </a>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No companies found.</p>
            {% endif %}
        </div>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
