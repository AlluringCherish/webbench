<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resumes</title>
</head>
<body>
    <div id="resume-page">
        <h1>My Resumes</h1>
        <div id="resumes-list">
            {% if resumes %}
            <ul>
                {% for resume in resumes %}
                <li>
                    <strong>{{ resume.filename }}</strong> (Uploaded: {{ resume.upload_date }})<br>
                    Summary: {{ resume.summary }}<br>
                    <form method="POST" action="{{ url_for('delete_resume', resume_id=resume.resume_id) }}" style="display:inline;">
                        <button id="delete-resume-button-{{ resume.resume_id }}" type="submit">Delete</button>
                    </form>
                </li>
                {% endfor %}
            </ul>
            {% else %}
            <p>No resumes uploaded.</p>
            {% endif %}
        </div>
        <form method="POST" action="{{ url_for('resume_management') }}" enctype="multipart/form-data" id="upload-resume-form" style="display:none;">
            <input type="file" id="resume-file-input" name="resume_file" accept="application/pdf,application/msword" required>
            <input type="text" name="applicant_name" placeholder="Your Name" required>
            <input type="email" name="applicant_email" placeholder="Your Email" required>
            <button type="submit" id="upload-resume-button">Upload Resume</button>
        </form>
        <button id="upload-resume-show-button" onclick="showUploadForm(); return false;">Upload New Resume</button>
        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>

    <script>
    function showUploadForm() {
        document.getElementById('upload-resume-form').style.display = 'block';
        document.getElementById('upload-resume-show-button').style.display = 'none';
    }
    </script>
</body>
</html>
