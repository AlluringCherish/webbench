<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
</head>
<body>
    <div id="settings-page">
        <h1>Settings</h1>

        <form method="POST" action="{{ url_for('settings') }}">
            <label for="temperature-unit-select">Temperature Unit:</label>
            <select id="temperature-unit-select" name="temperature_unit">
                {% for option in temperature_units_options %}
                <option value="{{ option }}" {% if option == selected_temperature_unit %}selected{% endif %}>{{ option }}</option>
                {% endfor %}
            </select>

            <br />

            <label for="default-location-select">Default Location:</label>
            <select id="default-location-select" name="default_location_id">
                {% for location in locations %}
                <option value="{{ location.location_id }}" {% if location.location_id == selected_default_location_id %}selected{% endif %}>
                    {{ location.location_name }}
                </option>
                {% endfor %}
            </select>

            <br />

            <label for="alert-notifications-toggle">Alert Notifications:</label>
            <input id="alert-notifications-toggle" type="checkbox" name="alert_notifications_enabled" value="1" {% if alert_notifications_enabled %}checked{% endif %} />

            <br />

            <button id="save-settings-button" type="submit">Save Changes</button>
        </form>

        <a href="{{ url_for('dashboard') }}">
            <button id="back-to-dashboard">Back to Dashboard</button>
        </a>
    </div>
</body>
</html>
