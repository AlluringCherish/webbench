<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Quality Index</title>
</head>
<body>
    <div id="air-quality-page">
        <h1>Air Quality Index</h1>

        <form method="POST" action="{{ url_for('air_quality') }}">
            <label for="location-aqi-filter">Select Location:</label>
            <select id="location-aqi-filter" name="location_id">
                {% for location in locations %}
                <option value="{{ location.location_id }}" {% if location.location_id == selected_location_id %}selected{% endif %}>
                    {{ location.location_name }}
                </option>
                {% endfor %}
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="aqi-display">AQI: {{ aqi_index }}</div>
        <div id="aqi-description">Description: {{ aqi_description }}</div>

        <table id="pollution-details" border="1">
            <thead>
                <tr>
                    <th>PM2.5</th>
                    <th>PM10</th>
                    <th>NO2</th>
                    <th>O3</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>{{ pollution_details.pm25 }}</td>
                    <td>{{ pollution_details.pm10 }}</td>
                    <td>{{ pollution_details.no2 }}</td>
                    <td>{{ pollution_details.o3 }}</td>
                </tr>
            </tbody>
        </table>

        <div id="health-recommendation">Recommendation: {{ health_recommendation }}</div>
    </div>
</body>
</html>
