<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Published Articles - Content Publishing Hub</title>
</head>
<body>
  <div id="published-articles-page">
    <h1>Published Articles</h1>

    <form method="GET" action="{{ url_for('published_articles') }}" id="filter-published-articles">
      <label for="category-filter">Category:</label>
      <select name="category" id="category-filter">
        <option value="">--All--</option>
        {% for category in categories %}
        <option value="{{ category }}" {% if selected_category == category %}selected{% endif %}>{{ category }}</option>
        {% endfor %}
      </select>

      <label for="sort-filter">Sort By:</label>
      <select name="sort" id="sort-filter">
        <option value="date" {% if selected_sort == 'date' %}selected{% endif %}>Date</option>
        <option value="title" {% if selected_sort == 'title' %}selected{% endif %}>Title</option>
      </select>

      <button type="submit" id="apply-filters">Apply Filters</button>
    </form>

    {% if articles %}
    <table id="published-articles-table" border="1" cellpadding="5" cellspacing="0">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Publish Date</th>
          <th>Category</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for article in articles %}
        <tr>
          <td>{{ article.title }}</td>
          <td>{{ article.author }}</td>
          <td>{{ article.publish_date }}</td>
          <td>{{ article.category }}</td>
          <td>
            <a href="{{ url_for('article_analytics', article_id=article.id) }}" id="analytics-article-{{ article.id }}">Analytics</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <p>No published articles found.</p>
    {% endif %}

    <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
