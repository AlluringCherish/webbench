<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Content Publishing Hub</title>
</head>
<body>
  <div id="dashboard-page">
    <h1>Dashboard</h1>
    <p>Welcome, {{ username }}!</p>

    <nav>
      <ul>
        <li><a href="{{ url_for('create_article') }}" id="nav-create-article">Create Article</a></li>
        <li><a href="{{ url_for('my_articles') }}" id="nav-my-articles">My Articles</a></li>
        <li><a href="{{ url_for('published_articles') }}" id="nav-published-articles">Published Articles</a></li>
        <li><a href="{{ url_for('content_calendar') }}" id="nav-content-calendar">Content Calendar</a></li>
        {% if analytics_article_id %}
        <li><a href="{{ url_for('article_analytics', article_id=analytics_article_id) }}" id="nav-article-analytics">Article Analytics</a></li>
        {% else %}
        <li><span>Article Analytics (No articles)</span></li>
        {% endif %}
      </ul>
    </nav>
  </div>
</body>
</html>
