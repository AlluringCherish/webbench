<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Article - Content Publishing Hub</title>
</head>
<body>
  <div id="create-article-page">
    <h1>Create Article</h1>

    <form method="POST" action="{{ url_for('create_article') }}" id="create-article-form">
      <label for="article-title">Title:</label><br>
      <input type="text" id="article-title" name="title" value="{{ article.title if article else '' }}"><br>
      {% if validation_errors.title %}
      <span id="error-article-title" style="color: red;">{{ validation_errors.title }}</span><br>
      {% endif %}

      <label for="article-category">Category:</label><br>
      <input type="text" id="article-category" name="category" value="{{ article.category if article else '' }}"><br>
      {% if validation_errors.category %}
      <span id="error-article-category" style="color: red;">{{ validation_errors.category }}</span><br>
      {% endif %}

      <button type="submit" id="submit-article">Submit</button>
      <button type="button" id="cancel-create-article" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
  </div>
</body>
</html>
