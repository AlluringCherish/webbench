<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Article - Content Publishing Hub</title>
</head>
<body>
  <div id="edit-article-page">
    <h1>Edit Article</h1>

    <form method="POST" action="{{ url_for('edit_article', article_id=article.article_id) }}" id="edit-article-form">
      <label for="article-title">Title:</label><br>
      <input type="text" id="article-title" name="title" value="{{ form.title if form else article.title }}"><br>
      {% if validation_errors.title %}
      <span id="error-article-title" style="color: red;">{{ validation_errors.title }}</span><br>
      {% endif %}

      <label for="article-category">Category:</label><br>
      <input type="text" id="article-category" name="category" value="{{ form.category if form else article.category }}"><br>
      {% if validation_errors.category %}
      <span id="error-article-category" style="color: red;">{{ validation_errors.category }}</span><br>
      {% endif %}

      <label for="article-content">Content:</label><br>
      <textarea id="article-content" name="content" rows="10" cols="50">{{ form.content if form else current_version.content if current_version else '' }}</textarea><br>
      {% if validation_errors.content %}
      <span id="error-article-content" style="color: red;">{{ validation_errors.content }}</span><br>
      {% endif %}

      <label for="change-summary">Change Summary:</label><br>
      <input type="text" id="change-summary" name="change_summary" value="{{ form.change_summary if form else '' }}"><br>

      <button type="submit" id="submit-article-edit">Save Changes</button>
      <button type="button" id="cancel-edit-article" onclick="window.location.href='{{ url_for('dashboard') }}'">Cancel</button>
    </form>
  </div>
</body>
</html>
