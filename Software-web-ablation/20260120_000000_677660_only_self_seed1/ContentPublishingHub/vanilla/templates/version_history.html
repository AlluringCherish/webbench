<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Version History - Content Publishing Hub</title>
</head>
<body>
  <div id="version-history-page">
    <h1>Version History for Article: {{ article.title }}</h1>

    <table id="version-history-table" border="1" cellpadding="5" cellspacing="0">
      <thead>
        <tr>
          <th>Version Number</th>
          <th>Author</th>
          <th>Timestamp</th>
          <th>Change Summary</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for version in versions %}
        <tr>
          <td>{{ version.version_number }}</td>
          <td>{{ version.author }}</td>
          <td>{{ version.timestamp }}</td>
          <td>{{ version.change_summary }}</td>
          <td>
            <a href="{{ url_for('edit_article', article_id=article.id) }}" id="edit-version-{{ version.version_id }}">Edit</a> |
            <a href="#" id="compare-version-{{ version.version_id }}">Compare</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <button type="button" id="back-to-article" onclick="window.location.href='{{ url_for('edit_article', article_id=article.id) }}'">Back to Article</button>
    <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
