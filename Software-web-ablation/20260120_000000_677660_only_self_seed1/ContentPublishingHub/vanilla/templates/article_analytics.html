<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Article Analytics - Content Publishing Hub</title>
</head>
<body>
  <div id="article-analytics-page">
    <h1>Analytics for Article: {{ article.title }}</h1>

    <table id="analytics-table" border="1" cellpadding="5" cellspacing="0">
      <thead>
        <tr>
          <th>Date</th>
          <th>Views</th>
          <th>Comments</th>
          <th>Approvals</th>
        </tr>
      </thead>
      <tbody>
        {% for data in analytics.daily_data %}
        <tr>
          <td>{{ data.date }}</td>
          <td>{{ data.views }}</td>
          <td>{{ data.comments }}</td>
          <td>{{ data.approvals }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <button type="button" id="back-to-article" onclick="window.location.href='{{ url_for('edit_article', article_id=article.article_id) }}'">Back to Article</button>
    <button type="button" id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
