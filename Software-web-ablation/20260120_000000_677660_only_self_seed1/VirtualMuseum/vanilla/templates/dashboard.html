<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Museum Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1 id="dashboard-page">Museum Dashboard</h1>
        <div id="exhibition-summary">
            <p>Total Exhibitions: {{ exhibitions_count }}</p>
            <p>Active Exhibitions: {{ active_exhibitions_count }}</p>
        </div>
        <button id="artifact-catalog-button" onclick="location.href='{{ url_for('artifact_catalog_view') }}'">Artifact Catalog</button>
        <button id="exhibitions-button" onclick="location.href='{{ url_for('exhibitions_view') }}'">Exhibitions</button>
        <button id="visitor-tickets-button" onclick="location.href='{{ url_for('visitor_tickets_view') }}'">Visitor Tickets</button>
        <button id="virtual-events-button" onclick="location.href='{{ url_for('virtual_events_view') }}'">Virtual Events</button>
        <button id="audio-guides-button" onclick="location.href='{{ url_for('audio_guides_view') }}'">Audio Guides</button>
    </div>
</body>
</html>
