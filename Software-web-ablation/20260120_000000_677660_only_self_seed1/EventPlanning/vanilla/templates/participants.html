<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Participants Management</title>
</head>
<body>
    <div id="participants-page">
        <h1>Participants Management</h1>
        <input type="text" id="search-participant-input" placeholder="Search participants..." />
        <select id="participant-status-filter">
            <option value="">All Statuses</option>
            {% for status in statuses %}
                <option value="{{ status }}">{{ status }}</option>
            {% endfor %}
        </select>
        <button id="add-participant-button">Add Participant</button>
        <table id="participants-table" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Event</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for participant in participants %}
                    <tr>
                        <td>{{ participant.name }}</td>
                        <td>{{ participant.email }}</td>
                        <td>{{ participant.event_id }}</td>
                        <td>{{ participant.status }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
