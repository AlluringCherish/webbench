<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Venues</title>
</head>
<body>
    <div id="venues-page">
        <h1>Venues</h1>
        <input type="text" id="venue-search-input" placeholder="Search venues..." />
        <select id="venue-capacity-filter">
            <option value="">All Capacities</option>
            <option value="Small">Small</option>
            <option value="Medium">Medium</option>
            <option value="Large">Large</option>
        </select>
        <div id="venues-grid">
            {% for venue in venues %}
                <div class="venue-card">
                    <h2>{{ venue.venue_name }}</h2>
                    <p>Location: {{ venue.location }}</p>
                    <p>Capacity: {{ venue.capacity }}</p>
                    <p>Amenities: {{ venue.amenities }}</p>
                    <p>Contact: {{ venue.contact }}</p>
                    <button id="view-venue-details-{{ venue.venue_id }}">View Venue Details</button>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
