<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Planning Dashboard</title>
</head>
<body>
    <div id="dashboard-page">
        <h1>Event Planning Dashboard</h1>
        <div id="featured-events">
            <ul>
                {% for event in featured_events %}
                    <li><strong>{{ event.event_name }}</strong> - {{ event.date }} at {{ event.location }} (Category: {{ event.category }})</li>
                {% endfor %}
            </ul>
        </div>
        <button id="browse-events-button" onclick="window.location.href='{{ url_for('list_events') }}'">Browse Events</button>
        <button id="view-tickets-button" onclick="window.location.href='{{ url_for('bookings_summary') }}'">View Tickets</button>
        <button id="venues-button" onclick="window.location.href='{{ url_for('venues_page') }}'">Venues</button>
    </div>
</body>
</html>
