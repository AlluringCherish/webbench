<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
</head>
<body>
    <div id="bookings-page">
        <h1>My Bookings</h1>
        <input type="text" id="booking-search-input" placeholder="Search bookings..." />
        <table id="bookings-table" border="1">
            <thead>
                <tr>
                    <th>Event</th>
                    <th>Booking Date</th>
                    <th>Ticket Count</th>
                    <th>Ticket Type</th>
                    <th>Total Amount</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for booking in bookings %}
                    <tr>
                        <td>{{ events_map[booking.event_id] }}</td>
                        <td>{{ booking.booking_date }}</td>
                        <td>{{ booking.ticket_count }}</td>
                        <td>{{ booking.ticket_type }}</td>
                        <td>${{ booking.total_amount }}</td>
                        <td>{{ booking.status }}</td>
                        <td>
                            <form method="POST" action="{{ url_for('cancel_booking', booking_id=booking.booking_id) }}" style="display:inline;">
                                <button id="cancel-booking-button-{{ booking.booking_id }}" type="submit">Cancel Booking</button>
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <button id="back-to-dashboard" onclick="window.location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
