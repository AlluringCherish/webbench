<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
</head>
<body>
    <div id="cart-page">
        <h1>Shopping Cart</h1>

        <form method="POST" action="">
            <table id="cart-items-table" border="1">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Subtotal</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for item in cart_items %}
                    <tr>
                        <td>{{ item.title }}</td>
                        <td>
                            <input type="number" id="update-quantity-{{ item.cart_id }}" name="update-quantity-{{ item.cart_id }}" value="{{ item.quantity }}" min="1">
                        </td>
                        <td>${{ "%.2f"|format(item.price) }}</td>
                        <td>${{ "%.2f"|format(item.subtotal) }}</td>
                        <td>
                            <button type="submit" name="remove-item-button-{{ item.cart_id }}" value="{{ item.cart_id }}" id="remove-item-button-{{ item.cart_id }}">Remove</button>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>

            <div id="total-amount">Total: ${{ "%.2f"|format(total_amount) }}</div>

            <button type="submit">Update Cart</button>
        </form>

        <button id="proceed-checkout-button" onclick="location.href='{{ url_for('checkout_page') }}'">Proceed to Checkout</button>
    </div>
</body>
</html>
