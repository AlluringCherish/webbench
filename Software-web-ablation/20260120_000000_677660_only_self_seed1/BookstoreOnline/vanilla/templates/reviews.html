<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Reviews</title>
</head>
<body>
    <div id="reviews-page">
        <h1>Customer Reviews</h1>

        <form method="get" action="">
            <label for="filter-by-rating">Filter by Rating:</label>
            <select id="filter-by-rating" name="filter_rating">
                <option value="All" {% if filter_rating == 'All' %}selected{% endif %}>All</option>
                <option value="5" {% if filter_rating == '5' %}selected{% endif %}>5</option>
                <option value="4" {% if filter_rating == '4' %}selected{% endif %}>4</option>
                <option value="3" {% if filter_rating == '3' %}selected{% endif %}>3</option>
                <option value="2" {% if filter_rating == '2' %}selected{% endif %}>2</option>
                <option value="1" {% if filter_rating == '1' %}selected{% endif %}>1</option>
            </select>
            <button type="submit">Filter</button>
        </form>

        <div id="reviews-list">
            {% for review in reviews %}
            <div class="review-entry">
                <h3>{{ review.book_title }}</h3>
                <p><strong>{{ review.customer_name }}</strong> - Rating: {{ review.rating }}/5</p>
                <p>{{ review.review_text }}</p>
            </div>
            {% else %}
            <p>No reviews found.</p>
            {% endfor %}
        </div>

        <button id="write-review-button" onclick="location.href='{{ url_for('write_review_page') }}'">Write a Review</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
