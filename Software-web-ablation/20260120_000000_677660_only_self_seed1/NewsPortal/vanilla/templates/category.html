<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Category Articles</title>
</head>
<body>
    <div id="category-page">
        <h1 id="category-title">{{ category_name }}</h1>
        <div id="category-articles">
            {% for article in articles %}
            <div>
                <h2>{{ article.title }}</h2>
                <div>By {{ article.author }} | {{ article.date }} | Views: {{ article.views }}</div>
            </div>
            {% endfor %}
        </div>
        <button id="sort-by-date" onclick="location.href='{{ url_for('sort_category_articles', category_name=category_name, sort_by='date') }}'">Sort by Date</button>
        <button id="sort-by-popularity" onclick="location.href='{{ url_for('sort_category_articles', category_name=category_name, sort_by='popularity') }}'">Sort by Popularity</button>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
