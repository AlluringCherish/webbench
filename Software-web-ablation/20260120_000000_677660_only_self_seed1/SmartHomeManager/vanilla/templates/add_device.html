<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Device</title>
</head>
<body>
    <div id="add-device-page">
        <h1>Add New Device</h1>

        <form method="POST" action="{{ url_for('add_device') }}">
            <label for="device-name">Device Name:</label>
            <input type="text" id="device-name" name="device_name" required>
            <br>

            <label for="device-type">Device Type:</label>
            <select id="device-type" name="device_type" required>
                {% for type in device_types %}
                <option value="{{ type }}">{{ type }}</option>
                {% endfor %}
            </select>
            <br>

            <label for="device-room">Room:</label>
            <select id="device-room" name="room" required>
                {% for room in rooms %}
                <option value="{{ room.room_name }}">{{ room.room_name }}</option>
                {% endfor %}
            </select>
            <br>

            <button type="submit" id="submit-device-button">Add Device</button>
        </form>

        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>

        {% if form_errors %}
        <div id="form-errors">
            <ul>
            {% for field, error in form_errors.items() %}
                <li>{{ field }}: {{ error }}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}
    </div>
</body>
</html>
