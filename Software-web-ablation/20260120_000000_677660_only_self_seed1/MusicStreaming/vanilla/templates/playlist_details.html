<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Playlist Details</title>
</head>
<body>
  <div id="playlist-details-page">
    <h1 id="playlist-title">{{ playlist.title }}</h1>
    <div id="playlist-description">{{ playlist.description }}</div>
    <table id="songs-in-playlist" border="1">
      <thead>
        <tr>
          <th>Title</th>
          <th>Artist</th>
          <th>Duration (sec)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for song in songs %}
        <tr>
          <td>{{ song.title }}</td>
          <td>{{ song.artist_name }}</td>
          <td>{{ song.duration }}</td>
          <td>
            <form method="POST" action="" style="display:inline;">
              <button id="remove-song-button-{{ song.song_id }}" name="remove_song" value="{{ song.song_id }}" type="submit">Remove</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    <form method="POST" action="" style="margin-top: 20px;">
      <button id="delete-playlist-button" name="delete_playlist" type="submit">Delete Playlist</button>
    </form>
  </div>
</body>
</html>
