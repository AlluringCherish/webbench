<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create New Playlist</title>
</head>
<body>
  <div id="create-playlist-page">
    <h1>Create New Playlist</h1>
    <form method="POST" action="{{ url_for('save_new_playlist') }}">
      <label for="playlist-name-input">Playlist Name:</label><br>
      <input type="text" id="playlist-name-input" name="title" required><br><br>
      <label for="playlist-description-input">Description:</label><br>
      <textarea id="playlist-description-input" name="description" rows="4" cols="50"></textarea><br><br>
      <button id="save-playlist-button" type="submit">Save Playlist</button>
      <a href="{{ url_for('playlists_page') }}"><button id="cancel-create-button" type="button">Cancel</button></a>
    </form>
  </div>
</body>
</html>
