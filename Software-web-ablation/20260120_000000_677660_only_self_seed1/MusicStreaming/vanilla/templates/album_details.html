<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Album Details</title>
</head>
<body>
  <div id="album-details-page">
    <h1 id="album-title">{{ album.title }}</h1>
    <div id="album-artist">{{ album.artist_name }}</div>
    <div id="album-year">{{ album.release_year }}</div>
    <div id="album-songs-list">
      <ul>
        {% for song in songs %}
        <li>{{ song.title }} ({{ song.duration }} sec)</li>
        {% endfor %}
      </ul>
    </div>
    <button id="add-album-to-playlist-button" type="button">Add Album to Playlist</button>
  </div>
</body>
</html>
