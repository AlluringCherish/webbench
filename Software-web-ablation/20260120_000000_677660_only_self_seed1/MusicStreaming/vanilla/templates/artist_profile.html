<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artist Profile</title>
</head>
<body>
  <div id="artist-profile-page">
    <h1 id="artist-name">{{ artist.name }}</h1>
    <div id="artist-genre">Genre: {{ artist.genre }}</div>
    <div id="artist-country">Country: {{ artist.country }}</div>
    <div id="artist-bio">{{ artist.biography }}</div>
    <div id="artist-albums">
      <h2>Albums</h2>
      <ul>
        {% for album in albums %}
        <li>{{ album.title }} ({{ album.release_year }})</li>
        {% endfor %}
      </ul>
    </div>
    <button id="back-to-artists-button" onclick="location.href='{{ url_for('artists_page') }}'">Back to Artists</button>
  </div>
</body>
</html>
