<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Playlists</title>
</head>
<body>
  <div id="playlists-page">
    <h1>My Playlists</h1>
    <div id="playlists-grid">
      {% for playlist in playlists %}
      <div class="playlist-card">
        <div>{{ playlist.title }}</div>
        <div>{{ playlist.description }}</div>
        <div>Total songs: {{ playlist.total_songs }}</div>
        <a href="{{ url_for('playlist_details', playlist_id=playlist.playlist_id) }}">
          <button id="view-playlist-button-{{ playlist.playlist_id }}" type="button">View</button>
        </a>
      </div>
      {% endfor %}
    </div>
    <a href="{{ url_for('create_playlist') }}"><button id="create-playlist-button" type="button">Create Playlist</button></a>
    <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard_page') }}'">Back to Dashboard</button>
  </div>
</body>
</html>
