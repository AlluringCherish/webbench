<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artist Profiles</title>
</head>
<body>
  <div id="artists-page">
    <h1>Artist Profiles</h1>
    <input type="text" id="search-artists" name="search_artists" placeholder="Search artists..." />
    <select id="artists-sort" name="sort_artists">
      <option value="name">Name</option>
      <option value="genre">Genre</option>
      <option value="country">Country</option>
    </select>
    <div id="artists-grid">
      {% for artist in artists %}
      <div class="artist-card">
        <div>{{ artist.name }}</div>
        <div>{{ artist.genre }}</div>
        <div>{{ artist.country }}</div>
        <a href="{{ url_for('artist_profile', artist_id=artist.artist_id) }}">
          <button id="view-artist-button-{{ artist.artist_id }}" type="button">View</button>
        </a>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
