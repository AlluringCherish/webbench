<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Song Catalog</title>
</head>
<body>
  <div id="catalog-page">
    <h1>Song Catalog</h1>
    <form method="get" action="{{ url_for('song_catalog') }}">
      <input type="text" id="search-input" name="search_query" value="{{ search_query or '' }}" placeholder="Search songs..." />
      <select id="genre-filter" name="filter_genre">
        <option value="" {% if not filter_genre %}selected{% endif %}>All Genres</option>
        {% set genres = [] %}
        {% for song in all_songs %}
          {% if song.genre not in genres %}
            {% do genres.append(song.genre) %}
          {% endif %}
        {% endfor %}
        {% for genre in genres|sort %}
          <option value="{{ genre }}" {% if filter_genre == genre %}selected{% endif %}>{{ genre }}</option>
        {% endfor %}
      </select>
      <button type="submit">Filter</button>
    </form>
    <div id="songs-grid">
      {% for song in songs %}
      <div class="song-card">
        <div>{{ song.title }}</div>
        <div>{{ song.artist_name }}</div>
        <div>{{ song.album_title }}</div>
        <div>{{ song.genre }}</div>
        <div>{{ song.duration }} sec</div>
        <button id="add-to-playlist-button-{{ song.song_id }}" type="button">Add to Playlist</button>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
