<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Pickup and Dropoff Locations</title>
</head>
<body>
    <div id="locations-page">
        <h1>Pickup and Dropoff Locations</h1>
        <label for="hours-filter">Filter by Operating Hours:</label>
        <select id="hours-filter" name="hours-filter">
            <option value="24/7" {% if hours_filter == '24/7' %}selected{% endif %}>24/7</option>
            <option value="Business Hours" {% if hours_filter == 'Business Hours' %}selected{% endif %}>Business Hours</option>
            <option value="Weekend" {% if hours_filter == 'Weekend' %}selected{% endif %}>Weekend</option>
        </select>
        <label for="search-location-input">Search by City or Name:</label>
        <input type="text" id="search-location-input" name="search-location-input" value="{{ search_query }}" placeholder="Enter city or location name" />
        <div id="locations-list">
            {% for location in locations %}
                <div id="location-{{ location.location_id }}" class="location">
                    <p>City: {{ location.city }}</p>
                    <p>Address: {{ location.address }}</p>
                    <p>Phone: {{ location.phone }}</p>
                    <p>Hours: {{ location.hours }}</p>
                    <p>Available Vehicles: {{ location.available_vehicles }}</p>
                    <button id="location-detail-button-{{ location.location_id }}">View Details</button>
                </div>
            {% endfor %}
        </div>
        <button id="back-to-dashboard" onclick="location.href='{{ url_for('dashboard') }}'">Back to Dashboard</button>
    </div>
</body>
</html>
