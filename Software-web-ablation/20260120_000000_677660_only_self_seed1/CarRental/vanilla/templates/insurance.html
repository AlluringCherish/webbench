<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Select Insurance Coverage</title>
</head>
<body>
    <div id="insurance-page">
        <h1>Select Insurance Coverage</h1>
        <form method="POST" action="">
            <div id="insurance-options">
                {% for insurance in insurances %}
                    <div id="insurance-option-{{ insurance.insurance_id }}">
                        <input type="radio" id="select-insurance-{{ insurance.insurance_id }}" name="selected_insurance_id" value="{{ insurance.insurance_id }}" {% if insurance.insurance_id == selected_insurance_id %}checked{% endif %} required />
                        <label for="select-insurance-{{ insurance.insurance_id }}">{{ insurance.plan_name }}</label>
                        <div id="insurance-description">
                            <p>{{ insurance.description }}</p>
                            <p>Coverage Limit: {{ insurance.coverage_limit }}</p>
                            <p>Deductible: ${{ insurance.deductible }}</p>
                            <div id="insurance-price">
                                <p>Daily Cost: ${{ '%.2f'|format(insurance.daily_cost) }}</p>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
            <button type="submit" id="confirm-booking-button">Confirm Booking</button>
        </form>
    </div>
</body>
</html>
