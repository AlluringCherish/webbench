<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
</head>
<body>
    <div id="write-review-page">
        <h1>Write Review</h1>
        <form method="POST" action="{{ url_for('write_review') }}">
            <label for="restaurant-select">Restaurant:</label><br>
            <select id="restaurant-select" name="restaurant_id" required>
                {% for restaurant in restaurants %}
                <option value="{{ restaurant.restaurant_id }}">{{ restaurant.name }}</option>
                {% endfor %}
            </select><br><br>
            <label for="customer-name">Customer Name:</label><br>
            <input type="text" id="customer-name" name="customer_name" required /><br><br>
            <label for="rating">Rating:</label><br>
            <select id="rating" name="rating" required>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select><br><br>
            <label for="review-text">Review:</label><br>
            <textarea id="review-text" name="review_text" required></textarea><br><br>
            <button id="submit-review-button" type="submit">Submit Review</button>
        </form>
    </div>
</body>
</html>
